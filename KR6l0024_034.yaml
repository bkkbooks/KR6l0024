body:
  text: 俱舍論第十卷抄上問題問寶法師意明無明十二處攝歟問論中釋無明體舉多異説爾者論主正解意如何釋之耶問論主意可存無明實有義耶問論文云如是惡慧應名無明文爾者舉經部師義歟問光法師釋如何不許諸染汚慧間雜善慧令不清淨説為能染論文云經部救意文爾者經部宗意善慧種子間雜染汚慧名能染義可有耶問論文云有執煩惱皆是無明文爾者論主意可許此義耶問論中引契經説云諸所有見文爾者寶法師意今此見者如何釋之耶問論文云豈不可説為餘慢等文爾者寶法師意今此等如何釋之耶問名色者唯限五蘊攝歟問光法師引婆沙論非色即是受等四蘊文爾者為證今論又類似名義引之歟問光法師述現在意識及現在觸望未來法境為異義作二解釋爾者第二釋意今此果者增上果攝歟問經部宗意六識界可通彼同分耶問論中釋意近行名舉二師説爾者傳説言可互初二説耶問第三靜慮樂受可立意近行耶問論中述第三靜慮樂受不立意近行舉二故爾者第二故如何釋之耶問不雜緣捨法意近行可斷煩惱邪問斷惑加行道位可有憂意近行現前義耶問憂意近行可緣上二界耶問論中明空無邊處近分地意近行舉四意近行一意近行二説爾者光法師意何説為止耶問異生離第四靜慮染第九解脫道位可修緣第四靜慮心耶問光法師意無覆無記意近行可緣同界上地耶問正理論意依身在下地起上地無覆無記意近行下緣下地境耶問光法師釋意近行起不起相無記意近行通起上下地者通果心文爾者通果心言可攝天眼天耳二通耶問變化心唯緣現在歟問發業通果心唯緣現在歟問光法師意通果無記心唯與捨受相應歟問正理論中明意近行不通無漏舉三師説爾者第二師意如何釋之耶問光法師所引婆沙論中明生初靜慮成就欲界意近行舉三師説爾者成就色聲法三意近行云説正意歟問光法師所引婆沙論中明生初靜慮成就欲界意近行舉三師説爾者第三師意變化心總緣所化境歟問寶法師依今論意生色界成就欲界色聲法三意近行云説可為正義耶問寶法師意變化心必總緣所化境歟問寶法師意化事發業通果心外可有餘意識通果耶問論中述有説義云唯雜染者是意近行文爾者光法師如何釋其故耶問論中明六恆住法云謂見色已不喜不憂心恆住捨具念正知廣説乃至知法亦爾文爾者心恆住捨者捨受名捨歟問六恆住法為唯限意識相應念慧為當通五識相應慧歟問六恆住法以何為體耶問阿羅漢果聖者初起善眼識現在前位過去現在可成就恆住耶問六恆住法為唯限有漏為當通無漏歟問六恆住法可通四無色地耶問六恆住法眼等六根律儀其體可同耶
