body:
  text: 俱舍論第二十七卷抄下問題問今論意麟喻獨覺及三州利根無學聖者初盡智位得無諍願智四無礙解可云耶問婆沙論意麟喻獨覺及三州利根無學聖者初盡智位得無諍願智四無礙解可云耶問以詞無礙解為邊際智攝可云耶問頌文云邊際六後定文爾者為四禪究竟處故得邊際名為當遍順至究竟故得邊際名可云耶問當處付明六通相且以漏盡通為共聖德可云耶問今論意於五通立勝進道可云耶問論中答何緣此五不依無色問初三別緣色為境故乃至故此五通不依無色文爾者光法師如何牒釋之耶問從無色界沒生欲色界人依自相續初起宿住通義可有耶問從上三靜慮沒生下三靜慮等人依自相續初起宿住通義可有耶問異生所起天眼通緣五淨居天事可云耶問當處付明六通相且正理論意神境等五通勝漏盡一通劣可云耶問天眼天耳二通緣上地境可云耶問天眼天耳二通者為唯限初禪繫為當通上三禪繫可云耶問二乘聖者及異生所起神境等三通同緣現在三千界境可云耶問於他心通宿住通境有三千世界不同可云耶問麟喻獨覺得知麟喻獨覺心他心智可云耶問麟喻獨覺於十方世界中有並出義可云耶問二乘聖者及異生於離染時得未曾得五通可云耶問凡夫二乘起曾得五通現前時用加行可云耶問今論意宿住通者唯限法念住可云耶問神境通者唯限善性可云耶問頌文云天眼耳無記文爾者異熟等諸無記中何可云耶問依身在初靜慮所起天眼天耳二通通善可云耶問正理論意天眼天耳二通以眼耳二識相應慧為體可云耶問當處付明三明相且於六通中以何通為死生智明體判耶問死生智明善無記二性中何可云耶問光法師付釋天眼通與死生智差異且死生智明唯緣未來可云耶問論文云是天眼通力所引故與通合立死生智明文爾者為天眼通無間起死生智明為當餘心間隔可云耶問以他心通攝三明可云耶問正理論意漏盡智明治中際愚可云耶問不以他心通攝三示導中可云耶問正理論意於勝解通無遠行義可云耶問今論意於意勢通有中間間斷義可云耶問光法師定判中答若非間斷如至極遠度一極微經一剎那如何舉心身至彼問作三解釋爾者初釋意如何述之耶問光法師定判中答若非間斷如至極遠度一極微經一剎那如何舉心身即至彼問作三解釋爾者第二釋意如何述之耶問婆沙論中以運身勝解意勢三通約聲聞獨覺世尊三乘明成就不成就相舉二師異説見爾者光法師以何師説為正判耶問論中舉依身在色界作欲界化時或云化香味二境或云不化之二師異説見爾者光法師以何説為正判耶問光法師意自身化他身化即身化離身化所攝色觸二處悉成就可云耶問今論意於所化境立通果名可云耶問頌文云化事由自地文爾者自地者指所依定可云耶問今論意化人所發語唯由自地心發可云耶問光法師意變化心化聲處可云耶問他化自在天化聲境可云耶問生得業得化心化五根可云耶問生得業得化心五根可云耶問變化心緣未來境可云耶問發業通果心緣現在境可云耶問正理論意於天眼天耳二根有彼同分時可云耶問天眼天耳二通者為唯限色界繫為當通欲界繫可云耶問論中以修得業得等六義釋五通云除修皆三性文爾者於生得業得中非善非不善通者為異熟無記為當如何
