body:
  text: 俱舍論第十七卷抄下問自作殺盜一時成業道義可有耶答可有此義也兩方若有此義者殺麁語嗔恚究竟皆由嗔盜邪行及貪皆由貪究竟者餘卷論判之所定也而貪嗔二惑不並起亦是性相之所顯也能成之貪嗔既不俱生所成之殺盜豈一時哉何況殺以斷命為所期盜以屬己為所求行相既各別也如何可有俱時究竟之義哉若依之爾者今論中述不善業道三俱轉相云謂以嗔心於屬他生俱時殺盜文如此文者自作之殺盜一時成業道之義可有之被得如何答此事誠難思論家既明不善業道三俱轉之中云謂以嗔心俱時殺盜故自作之殺盜一時成業道之義有之云事更不可疑之退安其道理若人於他人所屬之雞鴨等起貪心忽欲屬己身之盜心起之則往他所欲獵捕彼雞鴨等彼雞鴨等飛逃違貪心之時則起嗔恚欲加害以刀杖射打其時雞等被疵不動則取之屬己身之剋彼雞等忽斷命既有屬己之義盜業道豈不成亦即令斷命何不成殺業道哉故光法師釋云謂以嗔心於屬他人雞鴨生正斷命已亦離本處故於爾時嗔盜殺三與思俱轉文如此成之時諸難悉被遮畢但於餘卷之論文者則論家自以彼意難上説云若爾不説偷盜業道由貪究竟理應不成文則答之云依不異心不非究竟故作如是決判應知文文意云殺盜二業俱依異心不異心而究竟且殺業之依異心而究竟者依貪究竟是也殺業以嗔為因等起故次盜業之依異心而究竟不依嗔究竟是也盜業以貪為因等起故為言此等義門皆有道理有依憑勿疑之又光法師釋此文作二釋恐繁不引之考可悉之仍不可有相違重難云能成貪嗔既不並起所成殺盜寧可俱生哉之難尚不開如何答能發心雖不俱起所發業可得並生非無其證所謂以殺生等六業令他作之時或以嗔心教他或以貪教他或以誑心教他等此皆不並起之心品也然而若一時所作究竟之義有之者彼六業豈不一時成業道哉尋云究竟者何義耶答光法師餘處以成辨終了二義釋之當卷以終了之一義釋之也此事十六卷抄中雖記之可思擇之法門故重録之問光法師述依不異心所作究竟故作如是決判應知論文作二解釋爾者初釋意於殺業道論異心究竟不異心究竟二門可云耶答可論之也兩方若論之者正披光法師之初釋雖述前文中偷盜業道貪究竟者依不異心所作究竟乃至後文言嗔亦究竟盜者依別異心所作究竟文於盜業道成異心究竟不異心究竟之旨全無於殺業道論異心究竟不異心究竟二門之文定知無此義云事若依之爾者於盜業道已論異心究竟不異心究竟之二門於殺業道何不論此二門哉答於殺業道可有異心究竟不異心究竟之二門也其異心究竟者如餘處論判中述剎那緣起之相云依貪行殺其不異心究竟者如餘卷論説中判殺麁語嗔恚究竟皆由心但於初釋中唯就盜業道論此二門不就殺業道論之者論中就之三俱轉者謂以嗔心於屬他生俱時殺盜若爾所説偷盜業道由貪究竟理應不成之難答之云依不異心所作究竟文問答之鉤鎖併就盜業道而起故説此釋義也更非謂於殺業道無異心究竟不異心究竟之二門何為強疑哉或云略故云爾也或以盜顯殺也問光法師述依不異心所作究竟故作如是決判應知論文作二解釋爾者第二釋意不異心究竟相如何釋之耶進云光法師釋云又解後文中言嗔能究竟殺盜二種依不異心所作究竟謂殺盜二同一嗔心所作究竟故云依不異心所作究竟文付之凡論異心不異心事尤可二心相對論之也何於一嗔心可立不異稱哉是以談異心之時於貪嗔二心立其名見相例可同如何答初釋意因等起剎那等起二心相對而就之論異心不異心第二釋意翻彼殺盜二罪相對而就之一嗔心通成殺盜二罪之邊名之不異心嗔貪二心如次成殺盜二罪之邊名之異心也此又非無其意如次得意之時難勢自被遮者歟重難云若如此者一貪嗔亦通成殺盜二罪見何不云以彼名不異心哉答宜以貪心望殺盜名不異心也然不云爾者略故爾也或以嗔心欲顯之也例如初釋中於盜者論異心不異心於殺者不論異心不異心可思之問光法師解釋中述念法師意云即前三語義説雜穢名即雜穢文爾者如何破之耶進云光法師破之云即獨之義當成實論師非是此宗文付之設雖成實論意其義若同有宗之義者何可破之哉彼至如識以了別為性色以質礙為義雖是成實論意亦無背有宗之義寧可破之哉何況見餘卷之論文問若所誑者未解言義此言是何答是雜穢語準問答之起盡以不具解義緣之虛誑語名雜穢被得若爾即前三語義説雜穢之釋既同餘卷之論判當成實論非是此宗之能破豈非違文理哉加之成實多依經部者出光法師餘處之定判而論主多朋經部為釋家寧可破之哉答凡有宗意異想誑心所發之言名之虛誑語壞他染心所發之言名之離間語毀辱罵心所發之言名之麁惡語一切染心所發之言名之雜穢語語四之得名既各別也所詮之自體豈混一哉例如殺生偷盜邪淫之分名體於三種是以光法師所引衆事分毗曇中述五戒之相云五表五無表文既於五戒有五表五無表明知於一戒無二表二無表云事既於一戒無二表二無表亦知於一支無二名云事既於一支無二名重知於虛誑語無雜穢語之稱云事若夫於前三語名立雜穢語之名者於五戒中第四戒何不立不虛誑語不雜穢之二名哉五戒既爾也乃至具戒豈異哉善身語既爾也惡身語豈異哉虛誑語既不得雜穢語之稱離間麁惡寧可得雜穢語之名哉為言故光法師餘卷解釋中述若前三語起時必兼雜穢語簡即雜穢之義見何況當卷解釋中云若依此宗前三語起同時別有雜穢語體名俱起雜穢語若離前三語起倭歌等名不共雜穢語總而言之若三語俱起有三表三無表若四語俱起有四表四無表故衆事分明受五戒人一時俱得五表五無表彼善業道既得俱起不善業道理亦應然文而成實論意亦一切染心所發諸語名雜穢之義故以染汚心所發之言直名綺語其中以誑心所發之言別名妄語以壞他心所發之言別名兩舌以罵心所發之言別名惡口以前三所不攝之言別名綺語故於前三語者依別門故立妄語等三名於第四語者總則別名故立綺語名若爾於前三語者隨應自名之外名得綺語之稱於第四語者唯得綺語一名不得餘名也爰念法師向今論設解釋之日述即前三語義説雜穢以前三語直名雜穢語之旨成之故光法師引彼釋破當成實論非是此宗尤有其謂者哉如此成之時設雖成實論意若同此論者何可必破之哉難自被會畢次於餘卷論若所誑者未解言義等之問答者雖難思正義意存必兼雜穢之義故為顯俱起雜穢約第四語答之也若正答彼問者須云是虛誑語加行虛誑語業道也若夫強以彼證義説雜穢之義者未具解義哉彌以知虛誑語加行之極微與雜穢語之極微俱生故為顯此義有此問答云事次於論主意朋經部之難勢者論主意朋經部者於一義一文有宗經部之二家致諍論之時為顯有宗之深義暫稟經部之義還難有宗之義等之時所談之義門也今念法師釋有部説之時同朋經部義云成論意故以破之何以論主意朋經部為由忽可疑光法師之能破哉尋云光法師釋云由非時故必兼雜穢文意何答就前三語必與雜穢語俱起之所以也所謂前三語若具解義緣之時則成業道則是時之義也若不具彼緣不成業道則是非時之義也若夫前三語具解義緣者實不可必與雜穢語俱生然具不具不定之故談必兼雜穢之旨也若夫前三語不具解義緣而不與雜穢俱生者此語何物耶既染心之所發何云善無記攝哉亦不具解義緣何云前三語攝哉爰知前三語必與雜穢俱起而具解義緣之時隨應立前三語之名若不具解義緣之時立雜穢語之名云事難云若爾不具解義緣前三語兼與雜穢語俱起若彼緣者何位與雜穢語俱起哉答解義緣者所誑等人之所起之心品前三語者能誑等人之所起之語言也若爾所誑等人之領不領者隨時不定也何能誑等人之所發語可有不定義哉所謂初前三語隨應與第四語俱起後不俱或初不俱起後俱起可云歟此義不可然若前三與第四可俱起之理有之者自初可俱起若不可俱起者自初不可俱起既由非時故有可俱起之道理故得俱起然依解義緣具不具或隨應立前三語之名或立第四語之名此義順道理何足為疑哉十六卷抄中粗記此事法門之出處異故為別疑宜得其意也問不善惡道思俱轉中説不律儀可云耶答雖難測暫可存説之云義也兩方若説之者廣披論疏之前後尋惡業道思俱轉全無説不律儀之文哉若依之爾者善業道思俱轉中説律儀見準例思之尤可説之哉何況不律儀具支故雖前六俱轉中不説之何七八俱轉中不説之可云耶答此事雖難思暫任暗推所存説不律儀之義也其旨如一方之疑難重成其義者若生不律儀家自初行殺等事若生餘家誓受不律儀之類慢疑等非業道心品現前之時彼不律儀初成就豈非七俱轉之義哉或此人貪嗔邪見之隨一現前之時彼不律儀初成就何非八俱轉之義哉但於論疏中不説之云難者於不善業道者自一俱轉至六俱轉於色業中偏約處中分別故不説不律儀尤有其謂何可疑之哉乘之明七俱轉八俱轉之義故唯約處中亦明之豈不爾哉況論中述如是五六七皆如理應知釋中判餘未説者思量可知寧非顯攝不律儀之義哉依之重見下文論述謂於欲界天鬼傍生及人三洲十惡業道皆通成現文光法師釋云又準此不律儀名為業道言非業道非細尋文文何可異求之哉尋云若爾何故明善業道思俱轉之中多分約律儀分別之遮處中耶答律儀方五八十具定散漏無漏其數多故專約律儀論之處中其體羸劣而非多故引遮之然有可分別之謂故至下述俱轉者五俱轉者八俱轉者等也不可有相違問聲問乘人初盡智位得具足戒義可有耶答可有此義也兩方若有此義者凡聲聞乘人其根既劣品也何可有初盡智位得具足戒之義哉是以披餘處十四之論判述十種得戒之相云一由自然謂佛獨覺若夫聲聞乘人中有此類者自然得戒之類寧可限佛獨覺哉若依之爾者見當論文述善業道九俱轉之相云或依無色盡無生智現在前時得苾芻戒文如論判者可有此義被得如何答聲聞乘人先安住勤策依靜慮地證不還果後對五師十師等欲受苾芻戒之時漸起欲界聞思等善色界修所成善等畢終無色地證無學果之初念大戒發得之義何無之哉依此義故則今論中述九俱轉之相云或依無色盡無生智現在前時得苾芻戒也更不可異求者歟若以今文顯佛獨覺者不然佛獨覺必依靜慮地證果故也但於爾處論文者凡以盡智名自然智者就佛獨覺所論之也聲聞以佛為依止依教力證果故無無師自覺之義何可以彼盡智名自然智哉彼盡智既非自然智所得之戒品寧可自然得戒之哉重意云自然得戒唯限佛獨覺盡智位得戒可通三乘也若爾以彼餘處之論判為難勢頗無其謂者歟問無學聖者初盡智現前時所得別解脫戒者為唯限苾芻一戒為當亘勤策等三戒可云耶答此事雖難測暫可存苾芻一戒亘勤策等三戒之義也兩方若唯限苾芻一戒者凡五八十具之戒品者從淺至深從劣向勝從略及廣自小趣大所建立之也而深勝廣大之苾芻戒猶得之淺劣略小之勤策等盍得之哉何況無學聖者初盡智位於九地有漏功德悉得自在定知欲界別解脫戒同可得之云事唯初盡遍修九地有漏德之性相誰可疑之哉若夫初盡智位唯得苾芻一戒不得自餘三戒者豈無別解脫闕減之過哉若依之爾者當論中述善業道思俱轉相之時雖判盡無生智現在前時得苾芻戒未舉勤策等三戒或雖判惡無記心現在前位得近住近事勤策律儀無盡無生智位定知初盡智之位不得勤策等三戒云事加之如佛獨覺之依自然智得別解脫律儀是苾芻戒非勤策等文是以十誦律中云世尊自然無師得具足戒文光法師餘處解釋中云一由自然謂佛獨覺無師自然盡智心時得具足戒文加之見道得戒亦限苾芻戒不通餘三戒見依之正理論餘處文三由得入正性離生謂五苾芻由證見道得具足戒文俱舍論餘處云三由正定聚得大戒如憍陳如等文十誦律中云五苾芻得道即得具足戒文圓暉法師釋中云二由得入正性離生謂憍陳如等五比丘見道時得具足戒文無學初念之得戒相例可同何況見今論餘處文云至第七有逢無佛法時彼在居家得阿羅漢果既得果已必不住家法爾自得苾芻形相文同正理論文述此意云苾芻威儀法爾成就文若夫初盡智位得勤策等戒者何可必表苾芻之形相成苾芻之威儀哉答此疑日比未及見聞仍始終落居雖難知暫任愚推成一義者凡亘三乘之無學聖者皆可有此疑先就佛獨覺成之者夫如來於一切功德得自在故初盡智時悉成就之設為一種不成之者更不可云衆德具足人如餘處論判中述佛無一德由加行得暫起欲示現在前時一切圓滿隨樂而起故佛衆德皆離染得若夫世尊不成五八十種之三戒者何得判一切圓德述故佛衆德哉又彼三戒既為防非止惡之根本寧可不攝圓德衆德之中哉大覺既爾也獨覺盍爾哉以何知者麟喻雖不能成不共佛法是最上利根人故於皆聖皆凡之德者悉得之還相似世尊故婆沙論中明七十五等至成就不成就之相云佛定成就五十七部行喻者如欲界聲聞麟角喻者如佛文勝品之定善猶同佛劣品之散善何不爾哉況泰法師解釋中述自然得戒之相云謂怫獨覺本在不淨觀亦起欲界善心為近因等起要期發願等文要期發願何可必限苾芻大戒哉若通五八十種者初盡智之時總可得五八十具之四戒云事頗以炳然也是以泰法師餘處解釋中或述謂佛獨覺本在不淨觀前要期發願盡智自然得別解脫故或云以佛自然結跏趺坐發願邀期得盡智時當受此戒從此表業發別解脫文若夫自然得戒唯限苾芻戒者何廣可判得別解脫哉加之見道得戒亦不限具足戒可通勤策等也故正理論餘處文如得果時五苾芻不得別解脫戒文光法師餘處解釋中云然依得果五苾芻等先加行時必定有表相續乃至得果入道依此表業發別解脫文泰法師餘處解釋中云然彼五比丘先加行時必定有表端身而坐相續不斷入見道時發別解脫文若夫見道得戒唯限苾芻者何從述發別解脫哉見道得戒既亘五八十具之戒品自然得戒何可限苾芻一戒哉次就聲聞乘人論之者聲聞見道得戒之外皆悉對師作法受得別解脫戒故無自誓要期受之故雖初盡智時得別解脫律儀其作法之攝非自誓之攝光法師餘處解釋中判羅漢非自然得戒其意在之歟若爾受近事戒之時唯得近事戒非餘乃至受苾芻戒之時唯得苾芻戒非餘被得若依此意者無學初念得苾芻戒之時兼得勤策等三戒之義不可有之然初盡智位或得近事一戒乃至得勤策一戒之類可有之被得所謂有學位未得近事之類始受近事戒之時初盡智既現前或有學已得近事未得勤策之類始受勤策之時初盡智現前等是也又有學位已得苾芻未得近事或未得勤策或並未得近事近住勤策之類可有之此等類隨應始受近事勤策等戒之時初盡智現前等是也凡云不得前劣戒而得後勝戒之義無之或云不得前劣而得後勝戒之義有之二説是光法師餘處十四所引婆沙正理兩論之中有之又為羅漢未成別解脫戒始受諸律儀之類有之云事在光法師餘處十六所引婆沙論之中恐繁不引之但於當卷明善業道思俱轉之論文者其中九俱轉之文是約聲聞説之非約佛獨覺説之以何知者次上標或依無色下結盡無生智現在前時得苾芻戒而佛麟喻必依第四靜慮成果寧可致混亂哉故唯舉苾芻戒不舉餘三戒也彼六俱轉中不云盡無生智現前位是勝位也前三戒是劣戒也依解不齊故暫不舉之歟次於十誦律之文者佛獨覺初盡智位具雖得近事近住勤策苾芻之四律儀從勝立名故云俱具足戒也例如光法師餘處解釋中述雖一身或具二戒或具三戒後戒勝故從勝立名也次光法師餘處解釋準前可會之也次見道得戒之例難諸文會通如前次於俱舍正理餘處之文者光法師餘處解釋中判剃髮染衣不言得戒故極七返有聖者盡智得別解脫戒之義雖是難知暫約形相就威儀立苾芻之名也是亦從勝現相立名歟同準前可得其意也重難云就三乘成義其旨皆以胸臆然而暫佛獨覺事同之就聲聞乘初盡智位得近事等三戒云事大難思當卷論文明善業道六俱轉之相云謂善五識現在前時得上三戒文是則善五識相應無貪無嗔二善根歟近事等三戒之隨一身三語一之四支是也若夫盡無生智現前位得近事三戒之隨一者依無色地之時又無貪無嗔二善根與彼身三語一之四支俱轉故今六俱轉中宜出之既不爾唯舉善五識現前位明知盡智之時不得彼三戒云事何或云略故不舉或云位體不齊故不舉之假答可設之哉次餘處論判中述近事戒之得時云稱近事發戒文既發語言之時發五戒寧可盡無生智現前之中哉近住近策相例可同如何答當卷六俱轉之論文之料簡只如前重之難勢未必為重次於餘處稱近事發戒之論文者誠難思然而試回愚推云光法師餘處所引正理論中述一師意云有餘師説不受前律儀亦有即能受得後解理故持律者作是誦言雖於先時不受勤策戒而今但受具足律儀者亦名善受具足律儀由此勤策容有受得近事律儀苾芻容有受得勤策近事戒理豈不勤策不應自稱唯願證知我是近事苾芻亦不應自稱唯願證知我是前二非離如是自稱號言有得近事勤策戒理此難非理俱可稱故謂可稱言我是勤策亦是近事唯願證知苾芻亦應如應而説等文準此文受具足戒之時亦可稱我是苾芻被得既前時稱我是苾芻之時不發戒後時作羯摩至第三之時始發戒苾芻既爾也勤策亦可爾若爾設雖近事戒何可必稱近事言之時發戒哉所謂前唱我是近事之言乃至後唱願尊憶持慈悲護念之言畢可發戒也則此時入定證果之類有之初盡智現前位得近事戒之類可有云事炳然也但於稱近事發戒之故者彼對經部意云受三歸之時得近事名或唱近事言之時發戒云義成之許也何可必唱近事言之剎那發戒之義成之哉重意云受三歸之言與發五戒之言是別時故也可思之一義云自然得戒見道得戒之兩門同得具足戒之時兼得五八十種之戒品也聲聞盡無生智現前之時唯得具足戒雖有之於餘三戒者於彼時更不可云如之可思之問聖者於五八十具四戒作法受得義可有耶答可有此義也兩方若有此義者凡聖者者經賢位聖位之二道達事和理和之兩門因茲於殺盜邪誑酒之五罪者得不作之律儀於五見疑所增之戒品者雖未斷不起之是以佛獨覺依自然智之力得別解律儀五苾芻依正定聚之功得欲善調伏何況將趣見諦道應住戒勤修者餘處偈頌之所結也於凡位已成就戒品之功德至聖位何可勵受持之作法哉若依之爾者今論餘處之述由如是理諸阿羅漢或有成就下品律儀然諸異生或成上品光法師餘處所引婆沙論中云謂有新學苾芻以上品心起有表業受諸律儀有阿羅漢以下品心起有表業受諸律儀文準此等之論判無學聖者於五八十具之戒品有作法受得之儀被得有學聖者豈不爾哉答頌文結下中上隨心以求戒之心品判律儀之勝劣而長行及婆沙論中異生羅漢相對論戒品之上下新學應果相望比尸羅之儀深明知羅漢於具足戒有作法受得之義云事亦云諸律儀寧可簡前三戒哉無學猶如此況於有學哉兩論之全文如一方之難勢仍不能委之但於經賢位聖位之二道達事和理和之兩門之難者凡別解脫戒者微劣難得之功德故設雖成二道通兩門非作法受得之儀式者不能輒成就之故佛獨覺猶有學位不得之五苾芻亦異生位不得之是以上根之身子猶作法受得中下之聲聞豈不爾哉次於殺盜邪誑酒之五罪得不律儀之難者彼身三語一者是四根本罪也酒亦遮罪之根本之故聖者法爾不行之然而不作法受得故無得無表故為功德成就唱作法受得之儀式可有何失哉如此成之時未斷不起戒之難自被遮畢次於自然見道二種得戒之難者佛獨覺者猛利根故諸德具足故依自然智力得之五苾芻者依別緣力故得之更不可例次於餘處將趣見諦道應住戒勤修之頌文者誠難思然而試會之者彼暫約處中戒云爾歟之間成之可有何失哉設五八十具之戒者現身證得聖果乃至無學更重作法受得之義不可有之今於聖位作法受得者就今生未得五八十具戒之類論之也不可有相違尋云五苾芻依別緣見道位得別解者其別緣如何答傳聞大聖世尊於因位立誓云我為大魚有捕之食者我成佛之時最初度之而五苾芻捕之食故今時最初入見道並得別解是阿含經之説也云云可考之問頌文云不善地獄中麁雜嗔通二貪邪見成就文爾者無殺業道所以如何判之耶進云論中云業盡死故文付之凡欲界天鬼傍生人三州皆雖備業盡死故之道理非無殺生業道加之於北州者雖定壽千歲之後命終述無殺業道之所以時全不云業盡死故哉何況提婆達多雖生阿鼻大那落迦不終一中劫從地獄沒生人中者正出毗奈耶藏之所説誰云於無間獄造殺業哉業盡死故之論判亦似背金言如何答凡尋無殺業道之所以略有二因所謂無惡意樂與業盡死故是也其無惡意樂者約能殺之有情論之其業盡死故者約所殺之有情談之而於欲界者不造殺業之處唯在北洲與地獄其中北洲由無惡意樂之因不造殺業地獄由業盡死故之因不造殺業故論中述北州無殺生業道之所以無惡意樂故彼無殺生等文述地獄無殺生業道之所以云業盡死故無殺業道文隨光法師述北州之相云無惡意樂故彼無殺生等文述地獄之相云業盡死故無殺業道文或云北州約果論之地獄約因論之故論述北州之相云壽量定故文光法師釋云又別釋云壽量定千歲故無殺業道文地獄如前如此成之時業盡死故之論判無疑北俱盧州之例難非重次於欲界天鬼類傍生三州之例難者如六欲天雖有業盡死故壽量定故之所以有惡意樂故於殺業道備成就現行之二門如論中述雖諸天趣無有殺天而或有時殺害餘趣如鬼類傍生三州悉闕業盡死故壽量定故之所以而有惡意業故亦於殺業具成現之二門故論中云謂於欲界天鬼傍生及人三州十惡業道皆通成現文次於調達不受一中業盡云難者天授者雖造三逆斷善根之極量人由別緣力不滿一中劫從地獄沒生人中證獨覺菩提何以之為例可疑業盡死故之道理哉隨而如成斷善破僧等之餘人必終一中劫然後從無間獄生餘處所也不可相違重難云諸處有中夭除北俱盧州者性相之所定也何於欲天有業盡死故壽量定故之所以可云哉又地獄有中夭寧可用業盡死故之道理哉次調達之別緣者是如何答地獄傍生鬼北俱盧等人三州六欲天及色無色界隨應皆具業盡死故壽量定故之所以其中北州依無我觀之修因故其性柔和善順永離自他害安隱無惱之處也然無波若故無證果入寂之謂不造壞劫滿業故無三災所壞之難永離中夭者蓋此謂也地獄猛業之所感故雖難有中間命終之義造業之人前已終三生六十等修行至暖頂位遇邪師邪教等之惡緣斷善根作逆罪隨彼之人所修善根熟之時不受彼果報盡有命終義故名之中夭也乃至三界諸天悉勝業之所生故亦雖不可有中間命終之義皆隨應斷惑證果入無餘涅槃三禪以下諸隨應為三災被壞故不受其壽命盡之義有之故名之中夭也如此得意之時疑難悉被遮畢次調達別緣者日比未勘之今驚疑回愚推云既云舍利弗等所不能及故非聲聞種姓人又非從暖善根一座成覺故非佛麟喻然云獨覺菩提定知今此調達者六十已上百劫已下修行別種姓部行云事而此人已修暖善根未修頂善根故逢國王之惡緣作三逆斷善根忽墮阿鼻獄然而六十已上百劫已下修因不空暖必至涅槃之薰習今時熟故不受一中劫壽果盡第十減劫人壽四萬歲之時從無間獄沒生人中證獨覺菩提是其別緣也可云者歟此論義者唯為古疑其義之趣非如所存故別所録愚意之旨也問頌文云北州成後三雜語通現成文爾者今此雜穢語者業道攝可云耶答或云是業道攝或云非業道攝二義可有之也兩方若業道者成表非無表住中劣思作者餘處偈頌之施設也而北州雜穢語之能發思定可非強勝寧可發無表哉若不發無表者更難為業道之攝哉是以披餘處之論判云惡六道無表彼自作淫二善七受生二定生唯無表文何況勘光法師定判餘處述輪王北州染心歌等綺語是輕當卷判由彼有時染心歌詠故有雜穢以北州雜穢語偏是輕之類更無重之類被得例如彼貪煩惱之唯限輕不通重故非業道也若依之爾者正見當卷論文明約處成業道偈頌結北州成後三雜語通現成長行云唯雜穢語通現及成由彼有時染心歌詠文以北州雜穢語為業道攝云事誰可疑之哉夫彼雜穢語非業道者何可與虛誑語等餘九業道同約處論成就現行哉答此事為古疑故前重雖舉兩義欲破邪義顯正義故非業道之旨所成之也其趣大都如一方之難勢重成其意者凡不善業道者不出惡戒與處中而定惡戒人除北故於北州不可成不律儀是諸得不律儀由作及誓受之謂也又於北州不可成處中無表之得所餘無表由田受重行不殺田無誓受非重行者彼處軌則也以何可為不善業道之體哉例於輪王雜穢語是輕不發無表故非業道之攝也是以光法師餘處解釋中述輪王北州染心歌等綺語是輕北州雜穢語同輪王雜穢語見是又非無依憑所謂以當卷論文標北俱盧州結唯雜穢語通現及成由彼有時染心歌詠為證也非只雜穢語彼此一同起貪煩惱亦以齊等也故光法師貪解釋中云如輪王北州貪輕非業道文何可疑北州雜穢語者非業道哉但於雜穢語通現成之論判者雖似難思愚案云以輕同重若不致此分別者似於彼總無雜穢語之相故也例如光法師述地獄之相云雖有冷風觸身起貪輕非業道仍無過此論義為古疑然貞禪聖禪等之先哲皆云於北州有輕重二種雜穢語以重為業道以輕不為業道文恐謬不被考此等委曲之令然也仍圓範顯録之之趣十六卷抄記之仍略之問於欲天邪見業道現前可云耶答可現前也兩方若現前者於天中者有生所得智知過去現在因果相生事故難起撥無邪見是以光法師述地獄無邪見業道之所以云生所得智知前身造業來生此中現見業果故無邪見業道現行文何況見上論文述斷善之依身云人三州男女文寧可云於欲天邪見業道現前哉若依之爾者謂於欲界天鬼傍生及人三州十惡業道皆通成現者亦論文之所顯也如何答案此事於邪見可有輕重不同其性類者只泛爾撥無善惡因果等非如斷善邪見之功善得之類是也彼餘欲十通二之偈頌並天鬼傍生及人三州十惡業道皆通成現之長行則顯此意也其重類者正逢邪師邪教親依因力緣力思惟分別加行力勵忽起邪見斷除善得不成善本之類是也彼人三州男女之偈頌並人趣三州在惡趣亦非天趣之長行則顯此意也若爾性邪見於六欲天亦起重邪見不起之旨炳然也兩方之疑難還為潤色何可約局云哉但於地獄不起邪見之難者於天趣地獄者邪見異熟果不現前故因果必然之理不當胸故猶起撥無邪見之義有之於地獄者邪見異熟正現前故因果必然之理庸受之故不起撥無邪見之謂有之者哉若爾以地獄不可難天中光法師之釋亦為今義之潤色何可備難勢哉重難云披餘卷論文云意惡業道於意惡行不攝意及輕貪等文如此論文者不以輕邪見為業道攝被得例如判語惡業道於語惡行不攝加行後起及輕亦上二界邪見豈非其例哉而今乍輕邪見猶攝業道寧可順此等文理哉若強攝業道者更難云輕類者歟如何答斷善邪見必感無間獄天中邪見未感滿果豈無輕重哉然以天中邪見立業道之邪見其過越餘惑故輕猶為業道況於重哉為言天中邪見實雖非業道以輕同重云爾也前之疑處處記之例而可知以上界邪見非不善何可例欲天邪見哉貞禪大僧都祇短抄中引珍海已講明眼抄云天趣地獄雖俱現見業果而有差別謂天趣受樂其心容預雖見業果亦起邪見地獄受苦其心逼切已見其因不起邪見天雖起邪見由見業果所起邪見非上品圓滿若極作意思惟之時便見業果故不斷善但光法師言不撥因果者且據不起極重邪見也非言全不撥因果也或亦應言現見業果故不斷善根而不可言不撥因果者是誤故泰法師直云以天趣中有生處得智現見業果不言不撥因果前義為勝也云云亦委細之旨在祇短抄重可見彼也問依身無色有學聖者必成過去律儀可云耶答或云必成或云不必成古來兩義可有之也兩方若必成之者已離色染超越證不還及已離色染練根不還者設雖不修勝果道生無色成果道攝無漏故兼成過去律儀如以有漏道斷欲界下三品及色界四靜慮修惑不還之生無色預流一來向果之外無起無漏道依何忽成過去律儀可云哉是以婆沙論一師意依身無色有學聖者不必成過去律儀見若依之爾者今論中云謂聖有情生無色界成就過未無漏律儀文如論判者必可成之被得如何答此事遠者秀惠顯範諍雌雄近者良忠聖禪競矛盾末學徒輩寧輒及取捨乎然而依身無色有學聖者必成過去律儀者祖師法印權大僧都相承之實義也仍今所成其旨也夫三乘行果之梯蹬者惑品從麁斷之道品從劣起之修惑從上上斷之修道自下下起之良以不斷麁品斷細品不起劣道起勝道之義是不可得者歟若夫不起劣道起勝道者兼不斷麁品斷細品則不斷下界見惑斷上界見惑不斷上中修惑斷中下修惑之義可有之若如此者則不起加行道起根本道不起無間道起解脫道不起見修道起修無學道等之義亦可有之若許此義者只非背皆許極成之道理六足發智俱舍婆沙之性相忽為徒然豈非有部一宗之愁吟哉故考守金言不亂麁細淺深之階級二乘教敕無違強弱劣勝之釣鎖解脫決擇見修無學之次第誰可疑之哉就中至正斷惑門者其旨彌決然也所謂菩薩麟喻自業修行滿然後將斷惑證果之時必凡位預以有漏道斷無所有處以下煩惱是則一座成覺之間顧煩勞之故也又用無漏道者為有漏道之不及也於下八地惑品者俗智盛治何用起無漏智哉聲聞中若有一座成覺之類者同可有此意也設雖非一座成覺之類自可有如此行之類也若爾三乘俱於凡位以有漏道斷無所有處以下煩惱之義已成立其中於菩薩者極上利根人故有學位不起無所作道故第十六心無間不起加行直起有頂上上品惑能治無間道則名之超間道是不起初定以上無所有處以下能治無漏故然不亂行位之次第所以然者第十六心當不還果之坪有頂初無間道當羅漢之初念故也然無不起下地能治之至於凡位已以有漏道勤彼所作故故見惑能治十六心修或能治十八心合論成三十四心也麟喻雖利根不及佛智故不能起超間道第十六心無間於上七地已斷煩惱之上從初定能治初無問道乃至無處有處能治第九解脫道擬宜起之則名之勝果道亦名羅漢向道攝然後兼起有頂能治初無間道乃至起初盡智三十四心如菩薩其上加中間七地能治無間解脫百二十六心總成一百六十心也是則第十六心已當不還果之坪以不還果名離欲果離欲果無間起初定一品能治無間道名羅漢向道初念之謂也若不起中間一百二十六者離欲果心無間可不得有頂能治初無間道離欲果是極麁也有頂初無間道是炳然也極麁心無間如何可生極細之心哉既趣一百二十六重之階級豈非懸隔之至極哉故欲起有頂能治後道之時須先悉起中間七地能治前道也若不起前道欲起後道者何異不斷下地惑欲斷上地惑哉是皆不可得也又於阿羅漢向道中何起少分不起多分哉就中麟喻與佛同依第四靜慮一座成覺然第四靜慮非下三靜慮能治地而乍依第四靜慮擬宜起下三靜慮各各九無間九解脫道豈非無用之至極哉然猶為證後道以藉前道為今羅漢向道起五十四心為簡異超間不失剎那次第勝果道之指南實在斯於聲聞若有一座成覺之類者宜類之可知但不必以第四靜慮為所依又不可限一百六十心其旨恐繁略之抑於三乘中菩薩最上利根人故三十四念成覺尤於上七地已斷煩惱之上不起勝果道故也麟喻雖勝聲聞不及大覺故一百六十心成覺是於上七地已斷之煩惱上雖起勝果道不起自餘無所作道故也聲聞中設雖一座成覺之類非只於上七地已斷煩惱之上起勝果道亦猶可起無所作道故不可限一百六十心一座成覺之類猶不限一百六十心況非一座成覺之類於禪以上之惑寧可有不起勝果道義哉是以正理論中云諸有先離無所有染入聖道者唯除菩薩餘亦定於二界一切修斷離繫得無漏得彼皆必於二界修斷自勝果道遍現前故文又云謂聲聞獨覺無自在功力能超間起諸對治道欲證後道必藉前道以為加行方能證故文菩薩三祇之間斷不染無知於功德得自在故不用加行直起根本不藉前道能起後道故不起勝果道三十四心成覺其旨理在絶言也於二乘者才致三生六十四生百劫之修行故知不染無知品不除於功德豈得自在哉故不依加行難起根本不藉前道難證後道故麟喻之為二乘之長猶已斷煩惱之上重起勝果道況於聲聞哉聲聞一座成覺猶爾也況於非一座成覺之類哉非只正理一論中述此意亦今論餘處二十三中云然諸先斷欲界修惑一至五等至得果時此生必定起勝果道由此先離三靜慮染後依下地入見道者亦能引生後勝果道若異此者聖生上地應不可説定成樂根文光法師釋此文云然諸先斷欲界修惑一至五等至得果時此生必定起勝果道然後命終必無未起而命終者即生證言由此凡位先離下三靜慮染依下地入見道者彼得果已於現生中必能引起後勝果道若異此者聖生第四靜慮已上諸地應不可説定成樂根故知此身決定能起後勝果道文先離一至五等之類今生必起勝道先離七八品之類義準亦爾也先離三靜慮染之類今生必起之者來生欲以無漏道斷餘惑之時無可藉之前道以何可起後道哉又既得勝生如何可起劣生所起之道哉故於一至五等惑之上並七八品惑之上今生必起勝果道也先離三靜慮染者若今生不起勝果道生第四靜慮者欲以無漏道斷自地以上煩惱之時前未起劣道以何可起後勝道哉不可上地起下地道諸定依自下非上無用故之故亦不可以自地道為下地能治餘八離自上有漏離次下之故故此類永不可有斷餘惑證應果之義故今生必起勝果道所為其所由也彼本論中述説聖者生第四靜慮以上諸地定成樂根及説聖者生於無色定有色貪盡斷遍知得故者為顯此等聖者悉今生必起勝果道之義也良以已離第三靜慮者依二禪等入見道之後若於三禪以下煩惱不起勝果道者此人生第四靜慮之時據何忽得成樂根又已離色染者入見道之後若於四靜慮煩惱不起勝果道者此人生無色界之時據何亦得成色愛盡遍知哉爰知本論云生第四靜慮之人定成樂根又云生無色之人得定得色愛盡遍知併欲顯此等諸人今生必起勝果道之義若不起勝果道者生第四靜慮之人不成樂根生無色界之人不得色愛盡遍知故也故今論述若異此者聖生上地應不可説定成樂根光法師釋此文云故知此身決定能起後勝果道文又餘處述麟喻一百六十心取果之相畢云以此準知獨覺亦得色愛遍知文尤足準例者歟先離之類皆以如此今時有漏道斷惑之類亦復爾也以何知者光法師所引婆沙論中或云一百三十四云有作是説無有學者生無色界不成就過去色以彼先在欲色界時於第三果或第四向必已起已滅方命終故是故本論説言若諸學者生無色界成就過去未來所造色若於彼得阿羅漢果成就未來所造色非過去所造色若謂不爾本論應説學者生無色界有不成就過去所造文或云一百三十二亦有兩説云有説彼在欲色界時必已起已滅諸無漏道如勝進道必起現前無有住果而命終故文或云一百二十二亦有兩説云有餘師説得聖果已必起勝果聖道現前故諸學者生無色界必定成就過去身無表業文今時有漏道斷惑之類既爾也練根之類亦可然以何知者婆沙一百六十九云若爾便違十門所説其信勝解練根作見至者有説彼得果必起勝果修道無漏四靜慮然後命終生無色文若爾者先離並有漏道斷惑及練根之三類悉今生必起靜慮攝勝果道之後生無色界此亦為有學聖者豈非成過去無漏律儀哉文理既明鏡也更勿殘疑滯矣如此成之時諸難悉被遮畢但於婆沙一師之説者是不正義也存正義意之時以違彼全不可為病以何知然者必起勝果道之義順道理順本論不必起勝果道之義違道理違本論故寶法師解釋中云婆沙一百二十二云有作是説亦有學者生無色界不成就過去身無表業有餘師説得聖果已必起勝果聖道現前故諸學者生無色界必定成就過去身無表業一百三十二一百二十四皆同兩説今許二説後説為正此論及正理皆同本論説不言無色有學有不成過去七支文又婆沙抄七本云二説中後師為正文重難云若菩薩之起超間道是實義者聲聞之不起勝果道是可正義若麟喻之起勝果道是實義者設雖菩薩何可起超間道哉是一次於隨信行隨法行各有七十三人者出餘處論判若爾已離無所有處染所起之八忍八智無間起有頂能治初無間道是次第道之儀式也何可名之超間道哉二乘聖者於今此中間各上七地能治以起無漏道豈非是剩哉是二次已以有漏道斷上七地煩惱無殘於此上重起無漏無間解脫豈非無用之至極哉若有漏斷惑非實斷惑者其是為無用又後時所起無漏道可斷之既後時無漏道不斷之還知前有漏道實斷之云事是以菩薩無於此上起勝果道二乘例可同是三次若有漏道斷惑之上重起無漏道者於欲界修惑先離六品之上亦可起能治無漏道彼既不爾上七地寧可爾哉是四次有漏道證中間二果者定是所許也知於有漏道之斷五品七八品之上不必起勝果道云事若爾上七地亦可同是五次本論定成樂根之文並得色愛盡遍知之説誠雖約先離三靜慮四靜慮之時為必起勝果道之潤色約聖位有漏道斷惑者之時未隨應必修六地無漏故彼樂根隨彼得色愛盡知故不必為必起勝果道之誠證者哉是六次餘論然諸先斷欲界修惑等之文並光法師之釋約先離之類論之故猶難備必起勝果道之誠證者哉是七次於婆沙論文者光寶兩祖所引三處之説皆舉不必起勝果道必起勝果道之二師然無評文據何寶法師淨達忽可判正不哉就中於不必起勝果道之師者直舉其義不標有作是説有説有餘師説之名於必起勝果道之説者既標此三名還知必起勝果道之師是不正義云事是八次光法師雖引今此三處之全文無判正不於兩義何無左右取必起勝果道之義可存成過去律儀之義哉是九次約練根之類婆沙論中亦有二説同無評文準上可難是十次於先離練根之兩類者唯成有漏離繫得不成無漏離繫得故重所起勝果道也於有漏道斷惑之類者任聖二離八修各二離繫得之道理故不用起勝果道也豈不爾哉是十一答菩薩之起超間道是實義中之實義也是最上利根不起無所作道故聲聞是極鈍也何以菩薩可為例哉麟喻之不起超間道亦實義之實義也亦不及菩薩故不起之亦何可例菩薩哉次設雖已離無所有處染所起之八忍八智此是不還向不還果之攝故其位不及羅漢向設雖無所有處以下七地能治無漏此是羅漢向之攝故其位勝於不還向果若爾須第十六心已後有頂初無間已前起上七地能治無漏也然不起之第十六心無間直起有頂初無間道豈非超間之至極哉故成三十四心成之旨是極利根之人故是以麟喻其根稍劣故起彼七地能治無漏故成一百十六心取果之義也是通途之儀式故更不可致是剩也云難勢然不起向餘無所作道故不可類聲聞者也次顧聖位之煩勞故先見道預以有漏道斷上七地煩惱然依利鈍不同有勝果道之起不起此等之趣前重委成之何重可疑之哉次於欲界先離六品九品修惑之上不起勝果道者有別所以故正理論餘處中述此事云先斷六品入見道者彼見所斷六品離繫亦五時得除一如前彼修所斷六品離繫唯世俗道治生時得必不起彼無漏對治是一來果向道攝故非住果時起彼向道以住勝果不起劣故文光法師云又準正理先斷欲六品或第九品彼六九品修斷離繫唯有漏得畢竟無無漏得文論判解釋分明也勿生疑矣次以有漏道證中間二果之時於五品及七八品之上不起勝果道者六品九品無間解脫既有漏道故向彼之五品七八品能治道何可必起無漏道哉彼於上七地必起勝果道者有頂能治必無漏故向彼之道豈非無漏哉可思之又若有斷三四品七八品可命終之類者命終以前必起勝果道之後可命終也不爾者則以有漏道證二果此類住果之後於已斷煩惱上不可起無漏道如前次於本論定成樂根之文並得色愛盡遍知之文者顯必起勝果道之義不爾者頗無用也諸論皆以此文為證成必起勝果道之證豈無深所以哉其旨如前次於餘處論文及光法師之釋者深立理引證成先離之類必起勝果道之旨其成先離之勝果道者顯有漏道斷惑之類必起勝果道之義也論結若異此者釋證故知此身其旨豈輒哉深可思之次寶法師淨達師判正不者任理依文其旨如前恐繁略之次婆沙云有説云有作是説云有餘師説者雖一往似有其謂都非定量凡此論之取肝云有説云餘師而是正義太是多況於彼廣論哉應作是説猶通不正義況於不標其名哉仍不可弱身也次光法師不判正不者極有異曲所謂今論長行中釋無色無想天前七唯成就之偈頌云謂聖有情生無色界成就過未無漏律儀文此文中云無想有情之時述必成過未置必之言云無色聖者之時述成就過未不置必之言是則為含云必起勝果道云不必起勝果道之婆沙兩説也被得況婆沙論中無評文故光法師深思惟此論不置必之言而婆沙評文所不判正不也非謂云爾故以必起勝果道之師為不正義以不必起勝果道之師為正義者哉以何知者餘處解釋中釋若異此者聖生上地應不可説定成樂根之論文云故知此身決定能起後勝果道文何況光法師鑒六足發智婆沙雜心正理顯宗等之諸論然後製此論釋之家豈忘正理論自勝果道遍現前故之説欲證後道必藉前道之文並存利根麟喻猶不及佛於已斷煩惱起擬宜道鈍根聲聞還同大覺云義哉次婆沙論練根之兩説準三處之兩説可會之也次先離與練根之兩類不成無漏離繫得故起勝果道有漏斷惑之一類成無漏離繫得故不起勝果道云難不可然本論文只云定成樂根不云為成無漏離繫得又正理論亦云自勝果道遍現前故云欲證後道必藉前道不云為成無漏離繫得何況麟喻之起勝果道起擬宜道於下三靜慮煩惱全不得無漏離繫得此文語如何救之哉此論義為大疑仍九牛之一毛録之就中於光法師之所存猶有委曲恐繁略之問傍生鬼趣中於律儀攝業道有成就現行義可云耶答不可有此義也兩方若有此義者今論述謂鬼傍生有離律儀處中業道以依彼身無律儀故但有處中文傍生鬼趣中於律儀攝業道無成就現行之義云事論疏之定判實明鏡也若依之爾者傍生鬼趣其類非一準何於律儀攝業道無成就現行之義是以餘處所引契經中云有卵生龍半月八日每從宮出來生人間正受八支近住齋戒文經文之起盡無爭傍生趣中於律儀業道有成就現行之義見傍生既爾也鬼類豈不爾哉依之今偈頌中結無色無想天前七唯成就餘處通成現除地獄北州於前七業道成就現行之處所之中唯除地獄北州無簡鬼畜而前七善業道全不限處中見如何答傍生鬼趣所得律儀故於彼業道無成就現行之義云事更不可疑之其旨如一方之難勢重成其義者餘處偈頌中結律儀亦在天唯人具三種生欲天色界有靜慮律儀無漏並無色除中定無想出律儀依身之中更不舉三惡趣其旨彌炳然也但於餘處所引之契經之説者論則會之云此得妙行非是律儀是故律儀唯人天有文光法師釋此文云龍雖受戒唯得處中文何為末學之約身乎次於今偈頌者雖不簡鬼畜不擇律儀長行並光法師既同述謂鬼傍生有離律儀處中業道之上者何以髣佛之偈頌可疑性相之決判哉問依身北州人於處中所攝前七業道有成就現行義可云耶進云頌文結除地獄北州無成現行之義見付之傍生鬼趣之兩類猶於彼處中所不攝前七善業道有成就現行之義見人趣之北州何無此義哉何況於處中所攝前七惡業道者有成就現行之義見相例可同如何答身三語四之得業道名者必依成無表如餘處偈頌中結惡六定無表彼自作淫二善七受生二定生唯無表亦處中無表必依得緣成之如同偈頌云得所餘無表由田受重行而北州無田無受無重行據何忽可發無表哉遍雖起身三隨一之惡行語四隨一之惡行唯成表業不發無表如餘處偈頌中述成表非無表住中劣思作故是輕非重寧可云以身一語一之惡行為業道之攝哉是以光法師釋今論餘處語惡業道於語惡行不攝加行後起及輕之文云輪王北州染心歌綺語是輕身三業道損他是重輪王北州一向不起故身業等不説輕也彼非梵行非損他之攝故此不舉或略故爾也若盡理者宜出之也以何知者光法師餘處釋意惡業道於意惡行不攝惡思及輕貪等之論文及輪王時北州人等起輕貪等非麁顯故不名業道文能發之貪已輕也所發之業豈重哉若爾依身北州人非只不起前七處中善業道亦兼不起前七處中惡業道也但於傍生鬼趣之例難者彼鬼畜中自有善意樂增盛之類自有惡意樂增盛之類隨應起處中所攝前七善惡兩種之業道更不可遮也何為相例哉次於處中前七惡業道有成就現行之義云例難者彼是今論雜語通現成之文歟彼舉輕同重故爾也例如欲天邪見業道不可有相違此疑之意趣多在當處兩卷中則上處處記之仍不委之問於初靜慮起處中所攝前七業道義可有耶答不可有此義也兩方若有此義者凡前七業道者以無表為根本如餘處論中述惡六定無表彼自作淫二善七受生二定生唯無表而色界必無依表發無表者出光法師餘處定判明知於初靜慮不起處中所攝前七業道云事若依之爾者於初靜慮有三性發表心者性相之所定也設雖染汚表不發無表何可定善表業不發無表哉若有發無表之義者豈非起處中所攝前七業道哉答於初靜慮不起處中所攝前七業道云事文理必然也何可疑哉其旨如一方之難勢重披光法師今解釋云若於色界唯有律儀無處中業道於初定中發身表業但是妙行而非業道文文意顯者歟但於初靜慮有三性發表心云難者善心及表業未必發無表何可以備難勢之端哉就中欲界散心強故能發律儀不律儀及非二無表色界散心劣故不發此等無表彼欲界必無隨轉無表色界必無依表發無表之定判深顯此意也問論中明業道三果相云皆能招異熟等流增上果文爾者等流果者為約相似門目之為當就真實義説之可云耶答約相似門就真實義之二意可有之也兩方若約相似門目之者正披今論文尋等流果相云貪者貪盛嗔者嗔增邪見者癡增彼品癡增是名業道等流果別文就真實義説云事誠炳然也若依之爾者從彼出已來生此間人同分中受等流果謂殺生者壽量短促者亦論文之所顯也而斷他命是殺生業道則不善性也短促壽量是命根則異熟無記也既非同類遍行二因之所生定知是相似門非真實義云事如何答此事如前重成之總論十業道可通相似真實之兩門也所謂前七業道所得之果約相似門立等流名後三業道所得果就真實義立等流名也則如殺生業道之他命根短促顯自命根還短促也光法師釋云言等流者是相似義如斷他命令壽短促今時壽命還短促故文自餘惡色六業道所得之果例之可知故光法師釋云盜等準釋文前七惡業道之果既爾也前七善業道之果例亦可知故論云生於天中受異熟果從彼沒已來生此間人同分中受等流果謂離殺者得壽命長餘上相違如理應説文次於後三惡業道之果者其旨亦如第二重之所引仍重不引之但於邪見與癡之相者光法師作二解釋初釋意云簡起邪見之人今時癡增盛也為言第二釋意云簡起邪見人今時邪增盛也然邪見起之之時癡必增盛也云云何釋意邪見以癡為等流果之旨成之乎若爾是真實等流果非相似等流果餘處六論文云如邪見有身見品雖性不同同是染故為等流果文不善有覆尚為實等流果況於同不善之邪見無明哉此亦光法師今解釋中有細釋可見彼也尋云光法師述言等流者是相似義有依憑耶答下論文云此中所説等流果言非越異熟及增上果據少相似據説等流文問殺生業道感人中短壽異熟可云耶答不可感之也兩方若感之者人中之壽命是善業之所感非惡業之所得設雖短壽異熟何可云殺業之所受哉若依之爾者今論中述業道三果中等流果之相云從彼出已來生此間人同分中受等流果謂殺生者壽量短促文如此文者殺生業道可感人中短壽之異熟被得如何答今此癡之趣者今論問難之意也故論問云人中短壽亦善業果如何可説是殺等流文則答之云不言人趣則殺業道但言由殺人壽量短應知殺業與人命根作障礙因令不久住文論家之問答既以明鏡也不足加末學之料簡者歟問頌文云皆能招異熟等流增上果此令他受苦斷命壞威故文爾者今此三果者為一念業所感為當多念業所感可云耶答論中舉二師異説見兩方若一念業所感者所感之果既非一果還知能感之業定非一業云事若夫強一業感三果者一業現前之時望彼三果難起三因取果用哉依之第二師意述有宗説言二果因別先謂加行後謂根本文若依之爾者既云業道之三果定知十業道各各可得三果云事而身三語四意三之三類成業道者唯限一念不通多念如餘處論判唯約表無表名別解業道述貪嗔邪見才現在前即説名為根本業道是以初師意云有餘師言即一殺業先感彼異熟後感彼等流文如何答此事依難輒定論家既及二師異説末學寧可取義於一邊哉仍以彼二師之説為依憑可成二義邊也先初師意云凡一業感三果云事始不可疑也且如一殺業之現前於當來異熟果起異熟因取果用於此時亦望未來殺業起同類因取果用於此時兼望餘一切生法起能作因取果用豈非於一念殺業起異熟等流增上之三果哉真實因果猶以如此況於相似所談哉何況廣案六因五果之相配如有漏無間道具得五果如無漏無間道得四果自餘漏無漏善惡等如應可思之今偈頌中結斷道有漏業具足有五果無漏業有四謂唯除異熟餘有漏善惡亦四除離繫等則此意也為言若爾初師意述即一殺業先感彼異熟後感此等流尤符道理者哉如此成之時一時難起三因取果用之難更不可來者歟次於第二師之説者自本別師之意也存初師意之時何以違彼為病哉次第二師意云令他受苦斷命壞威之三因是各別也異熟等流增上之三果亦不同也故如次以三因三果可為能感所感也不可有三因皆感一果一因兼感三果之義若爾經中説一業感三果者加行根本二位通説云爾故非相違為言故第二師意述二果因別先謂加行後謂根本雖復總説一殺生言而通收根本眷屬雖不順道理與名言然廢立門之所談中何無此謂哉如此成之時身三語四意三之三類成業道事皆是一念不通多念云等難勢自被遮畢次於初師之説者既為別師之所存何可及會通哉重難云以今論二師之説為依憑所説之兩義俱不明且就初義凡論文之為總實明之以光法師之定判而光法師述初師意之時作二釋其初釋意云一念業感三果故以為不正義為言故初釋云此師意説一殺根本業道能感二果乃至此説非正文第二釋意云殺業之稱未限根本一位兼通加行之位殺業名既在加行根本兩位若爾彼令他受苦斷命壞威之三業隨應可通在加行根本兩位中其中令他受苦與壞威是加行之功能非根本之功能斷命一門不限根本之力用亦通加行之力用然彼令他受苦斷命壞威之三業各能感異熟等流增上之三果皆以異熟為先以增上為後但下論文三業如次感三果者從強立名若如此得意之時初説亦為正義為言故第二釋云又解一殺業言具攝令他受苦斷命壞威三業此三皆能先感異熟此三皆能後感等流後文説三別感果從增強偏説如下當辨今言通感強弱總論於三業中初後是加行中一是根本加行果亦名業道果者以是業道加行果故亦名業道果若作此解還順論文可亦為正文光法師既判初師意之時以一念業感多果之義為不正義以多念業感多果之義為正義之旨成之而今成一念業感多果之義豈非自不正義哉抑於根本業道一位全不具令他受苦與壞威之兩義如何根本一念業兼感異熟等三果可云哉答初釋意偏存真實門永忘似設門故以之為不正義第二釋意暫存真實門兼許似設門故以之為正義也次根本業道位兼具令他受苦與壞威之二義者凡加行學根本根本募根本若非根本者如何起加行哉若非加行者如何成根本哉求根本故起加行酬加行故成根本起加行果究竟誰可疑之哉重意云光法師初釋意以初師為不正義者違談似設門之下論文故爾也全非違道理故為不正義若爾一念乘感彼三果之義之時以光法師之初釋為難勢未得論疏之總致之令然也果殺生業道根本後起感異熟果可云耶答可感之也兩方若感之者光法師今解釋中述業道三果之相云於十不善業道中且初殺業於殺他位一令他受苦二令他斷命三令他失威謂殺生時於加行位令他受苦故墮於地獄受苦異熟果非正死時以正死時無有苦受唯捨受故於根本位斷他命故從地獄出來生人中受命短促為等流果將行殺時執刀杖等於所殺生壞他威故感諸外物解小光澤為增上果壞威據遠加行受苦據近加行文文相之起盡無諍殺生業道之根本後起不感異熟果被得若依之爾者異熟因不善及善唯有漏者餘處偈頌之所定也而殺生業道之根本後起既有漏而不善也寧可云不成異熟果哉答今此疑之趣者光法師問難之意也則自問云斷命壞威俱是不善應感異熟何故唯説受苦感耶文則答之云理亦能感而不説者為令他苦相顯偏説文文意云斷命壞威之業與令他受苦之一業同可感異熟果也而不云爾者令他受苦業之感地獄苦果是顯故暫説之若理實而言之者斷命壞威之二業亦可感地獄異熟為言而雖斷命是根本之所作壞威是加行之所作根本業之不令他受苦既感地獄異熟後起之不令他受苦豈不爾哉況其道理文證如一方難勢仍不及重成之但於難勢者光法師既會之何可及末學之弱身哉尋云於根本斷命業及後起業者無令他受苦之義故不可有於地獄感苦果之義又是斷命之根本後起故不可云於地獄受長壽果又是色業攝故不可云於地獄感同分爾者感何物可云耶答造業感果之相是微細深遠暗以難測然而任常途之義相案之加行根本後起之三業隨應可感心心所及色不相應等之異熟也就中正理論意雖述非心隨轉身語二業定不能引命衆同分於今論者光法師作二釋之中一釋意欲界繫身語二業為引業之旨成之見彼文許此三業非前後熟故之文二無心定得不能引餘通之説尤足為誠證者歟若爾設雖殺生加行所感之果何可限苦受哉宜通色不相應等設雖彼根本後起所感之果何可限色不相應等哉尤可通苦受也又彼根本後起之業設雖為引業感同分感命根可有何失哉於善趣令他命根短促之業於惡趣亦令我命根長遠之謂也所以然者令受樂受之善趣命根短促之故還令受苦受之惡趣命根長遠也豈不爾哉須考之又尋云受苦壞威二業如次感等流增上二果感異熟等流二果可云耶答彼二業如次各各可感彼二果也故光法師釋此事云據增上邊理亦能感而不説者以斷他命業望彼短壽有別勝用故偏説之文又云餘二理亦能感增上而不説者以壞他威相顯別説文可思之問當處付明三邪行相且邪命者為唯限貪所生身語二業為當通嗔癡所生身語二業可云耶答可限貪所生身語二業也兩方若唯限貪所生身語二業者貪嗔癡者同是三毒也同是三縛也況亦得三不善根之名何況於得三邪之稱哉明知嗔癡所生之身語二業亦可名邪命云事若依之爾者以無嗔癡二善根所起之身語二業唯名正語正業不名正命唯以無貪所起之身語二業名正命見準例思之邪命之稱偏限貪所起之身業語業不通嗔癡所起之身業語業被得如何答見今論文偈頌結貪生身語業邪命難除故長行述嗔癡所生語身二業如次名為邪語邪業從貪所生身語二業以難除故別立邪命謂貪能奪諸有情心彼所起業難可禁護為於正命令殷重修故佛離前別説為一光法師釋此文云但從嗔癡所生語業各有四支總名邪業以身非業故不言身但從貪所生身語二業身三語四以難除故別立邪命謂貪微細而能映奪諸有情心彼所起業難可禁護佛為於正命令殷重修故佛離前邪業邪語別説邪命文加之婆沙論中云如於不善語業若貪所起名為邪語亦名邪命嗔癡所起但名邪業不名邪命所以如前文加之正理論中云諸出家者邪命難除所有命緣皆屬他故文諸論一同之定判釋家指南之明判其旨既分明也何加私料簡哉但至難勢者論家釋遮述其所以貪煩惱與嗔癡惑何可致混亂哉尋云於初禪及北州可有貪癡所生身語二業亦於輪王時可有貪嗔癡所生身語二業然者悉可為三邪攝哉答貞禪大僧都祇短抄中此難云問以一切貪嗔癡所生身語二業悉名邪語業命耶云云問題並講答之趣未分明得之改之如此題也問光法師解釋中云即無間道能引斷得至生相時説名能證文爾者以無間道名能證道者為望所得離繫立其名為當望能得得立名可云耶答雖難測暫可存望所得離繫得立其名云義也兩方若望所得離繫得立其名者既云能引斷得説名能證明知望能得之得得其名云事加之光法師餘處解釋中述未知根在無間道已知根在解脫道此二相資得最初果能為引因依因性故之論文云若據未知根在無間道能斷惑邊望離繫得能為引因性故引因謂同類因能因彼離繫得起為等流士用果文其意與今解釋是同寧可云望所得離繫哉若依之爾者見正理論文云若據住此能證離繫目無間道若據住此正證離繫目解脫道文如論判者唯望所得離繫不望能得之得被得如何答凡於證有契證得證之二義者出光法師餘處解釋其證之名之所而專在所證之法故以無間道望擇滅體以為能證所證之謂道理之所推也其意諸論一同之定判諸師一同之所釋也更不可疑也則一方之難勢所舉之正理之明判頗分明也重披彼論云重證本時所證擇滅非離繫果唯士用果文豈不為指南哉但於光法師當卷之解釋者凡無得之得得所得之法之義故舉能得之得顯所得之法也就中擇滅是無為法故不與無間道為所引故欲顯引有為法之能得之得今至生相而證得擇滅之義故暫對離繫得以無間道名能引名引因也是則欲證離繫得離繫之志顯之許也更非謂云爾故以無間道對離繫得論能證所證之義何來為難勢哉例如滅煩惱故欲斷煩惱之時則斷彼得也故光法師述於無間道有能證能斷二名之義云即無間道能引斷得至生相時説名能證能斷惑得不至生相説名能斷文重舉世間流布之譬喻成此義者如乘馬人欲以足打馬之時不直馬打而打泥障也問論文云道能證斷及能斷惑文爾者能證道者為唯限無間道為當通解脫可云耶答可限無間道也兩方若限無間道者凡以無間解脫二道望所證擇滅皆有能證之功何偏限無間道不通解脫道哉是以披寶法師之解釋云解脫道正證斷得名為能證文若依之爾者能證道唯限無間道不通解脫道者諸論一同之定判諸師多分之解釋也就中光法師正述即無間道能引斷得至生相時説名能證誰可異求哉答凡證者契證得證之義未選無間解脫能者運功力之義簡解脫取無間正顯無纍出障目解脫非無間故以解脫道名正證道以無間道名能證道正理論述若據住此能證離繫目無間道若據住此正證離繫目解脫道光法師判即無間道能引斷得至生相時説名能證則此意也如此成之時於無間解脫俱有能證之功云難未知此等之委曲故所來也何足設會通哉次於寶法師之解釋者雖似難思倩案之專以無間道名能證道之上以正證之義暫作能證之名也是則光法師偏以無間道名能證道之旨成之故為違彼釋故作此釋歟或實異光法師之定判者不足設會通問光法師所引正理論中云增上果者有如是説謂離自性餘有為法唯除前生有作是言斷亦應是道增上果文以何師為正判耶進云光法師判正理兩解前師為正也付之據道增上之力所得之擇滅也何不以彼擇滅名道增上果哉是以光法師於彼二師判正不之時作二釋之中初釋意雖以第二師為不正義第二釋意第二師亦為正義之旨成之見如何答今論餘處中云除前有為法有為增上果文正理論中無改此頌何況彼論長行中云果必由因取故唯有二因唯據無障故許通三文衆賢論師意增上果唯有為云事炳然也況諸論一同之定判也設雖彼師意何可背常途施設哉若爾第二師意增上果通無為事寧可正義哉但於據道增上之力所得之擇滅也何不名道增上果哉云難者既由道力所得之擇滅得離繫果之名何可混增上果之稱哉諸論中同於擇滅不立增上果之名其意在之歟次於光法師之解釋者雖作二釋於彼二釋自判勝劣述有兩解前解為勝以為不正義之前釋為勝何隱此決判以為難勢哉重難云以擇滅既名離繫故難名增上果云事不可然以離繫果亦名不生士用果何不以離繫果名道增上果哉答問以非擇滅為心果法可云耶進云光法師解釋中云亦有處説非擇滅法是心果故文付之凡非擇滅者非擇力所得只勝緣闕之時所得之無為故得其名見彼餘處偈頌中結擇滅謂離繫隨繫事各別畢竟礙當生別得非擇滅則此意也若夫以非擇滅為心果法者豈不得擇滅之稱哉是以披今論餘處之文云如本論説果法云何謂諸有為及與擇滅文依之見品類足論之説云心果法云何謂一切有為及擇滅非心果法云何謂虛空非擇滅文如何答此事為古來之難義然而暫成愚案之趣者非擇滅非心果法云義可存之也其旨如難勢重勘婆沙論之説云非擇滅不名道果如品類足論説云何果法謂一切有為法及擇滅云何非果法謂虛空非擇滅文但於光法師今解釋者彼暫依正理論一師意所判爾也全非為自義成心果之義也故正理論中云增上果者有如是説謂離自性餘有為法唯除前生有作是言斷亦應是道增上果道增上力能證彼故若爾何故毗婆沙中唯説欲界十隨眠斷為苦法智忍離繫士用果曾不説是增上果耶非由不説便非彼果以即彼文説苦法智為苦法智忍等流士用果曾不説是增上果故然實苦法智是彼增上果而不説者義極成故此亦應然舉士用果理即已舉增上果故非唯可生法是增上果説非擇滅是心果故離此更無餘異果義故文光法師今解釋中引此文畢云正理兩解前師為正同此論故又諸論中皆言有為不説無為故又解正理既無立破據義不同皆無有妨雖有兩解前解為勝於未來世非唯可生法是增上果亦有處説非擇滅法是心果故以此故知諸不生法亦是增上果餘又可知文尋云亦有處説者指正理論何文耶答指上所引之正理論第二師之末之説非擇滅是心果故離此更無餘果義故之文也難云此師意既以非擇滅為心果法何不名士用果哉若士用果者忽為得士用增上二果之名寧可云離此更無餘果義故哉答此事在貞禪大僧都祇短抄中然而彼義意不分明故別成今一義也委可見彼抄者歟問不善無記二業相互為等流果義可有耶答可有此義也兩方若有此義者凡等流果者從同類遍行二因所生之法如光法師餘處解釋中述然從同類遍行因生者名等流而不善無記既異性異類闕同類遍行之義何於所生果可立等流之稱哉若依之爾者當處餘處論判解釋中互可為等流果見如何答披餘處偈頌或結同類因相似自部地前生或述遍行謂前遍為同地染因成自部同類因他部遍行之旨見而欲界見苦所斷身遍二見是有覆無記也則望之自部餘八隨眠及餘部二十六隨眠之為不善隨應或與自部遍行非遍互為等流果或與他部遍行隨眠互為等流果或以他部非遍行為等流果故彼長行中云如邪見生有身見品雖性不同同是染故為等流果文隨而披當卷論文云等流云何謂遍行不善及見苦所斷餘不善業以有身見邊執見品諸無記法為等流果文光法師釋此文云若不善業以無記法為等流果者謂苦集遍行不善及見苦所斷餘不善業以有身見邊執見品諸無記法為等流果故或遍行因等流果或是同類因等流果文其意實明者歟但於難勢者既云同是染故何可約同性致難勢哉重難云若不善無記互為等流果者善無記亦可為等流若彼不為等流果者不善無記猶難為等流果哉答光法師餘處解釋中會此例難云染法易同故得為果淨法難同故不為果文問有宗意未來業以現在法為果義可有耶答可有此義也兩方若有此義者凡果前因後之義者聖教之所不許也設雖有宗意何有此義可云耶是以今論中云不説後業有前果者前法定非後業果故文若依之爾者今論餘處中述此則名和合謂因果義成必同一果故名和合謂根境識三同順生觸故未來境為因生現在識觸之旨成之見隨而光法師釋此文作二解釋之中第二釋意云又解現在意識及現觸果望未來法境亦是增上果凡增上果有二一取果與果增上果此果必無在因前也二非是取果與果增上果此果容在因前我今據此説也文準論判解釋現在識緣未來三業之時未來三業為境因還生現在識觸果被得如何答有宗意談法之性相盡義之淵源故設雖同時設雖異時若雖無為若雖有為有依彼法此法生者可處之因果也六因五果之廢立則顯此意者歟若爾有未來業生現在果之義云事其旨實必然也一方之難勢則可此意餘處論判解釋誠以委悉宜以彼為指南者歟但於當處之論文者此則當餘處除前有為法有為增上果之頌意彼約取果與果增上果云爾故所遮以後為因以前為果之義也今文意亦是同若爾第六十七與第十卷文甚異也混而不可難也如此得意之時果前因後之義者聖教之所不許也云難更不可來者歟問雜心論意以離繫為地法可云耶進云光法師解釋中云若準雜心文離繫果亦地法攝文付之離繫是無為無漏法更不墮界繫何以彼為地法可云耶是以披今論文述同地有四果異地二或三以異地法唯為二果三果不為四果見若以離繫為地法者何無以異地法為四果義哉雜心論意相例可同如何答驚光法師解釋披雜心論所説偈頌結自地自地四或以他地二若正思惟地亦有解脫果長行云若正思惟地亦有解脫果者定地或有解脫果謂無間道所攝文光法師向彼論判故雜心論云若正思惟地亦有解脫果若準雜心文離繫亦地法攝實符本説者歟但於難勢者光法師釋今論文之時作二解釋初釋意云以此文證離繫非地法攝文文意顯也第二釋意云通舉九地業以同地法為四果若別分別上八地業以地法為五果故雜心論云若正思惟地亦有解脫果若準雜心文離繫果亦地法攝文初釋顯俱舍雜心論意各別之旨第二釋示兩論和會之意然而至下述離繫既是無為不依地起如何可説地法所攝故知此論所説為善於兩論者以俱舍為正於自釋者以初釋為正之旨成之被得若爾義難悉被遮者歟貞禪大僧都祇短抄中有此疑而問題之作樣非如所存仍別記之委可見彼也問頌文云同地有四果異地二或三文爾者下地無漏法與上地無漏業為等流果義可有耶答可為等流果也兩方若云為等流果者今論餘處文述道展轉九地唯等勝為果婆沙論中云以加行善法勝非劣因故而上地無漏業勝下地無漏法劣也如何有下地無漏法與上地無漏業為等流果之義哉依之光法師餘處所引正理論中述同類因之相云於依自上有於依下地無文若依之爾者今論長行中釋偈頌異地二或三之文云若是無漏業以異地法為三果除異熟及離繫不墮界故不遮等流文既無間下地無漏法與上地無漏業為等流果之義知可有此義云事如何答夫未至中間四本靜慮下三無色之九地各有九品三道六姓之無漏然此三類無漏互具足此三類無漏又初靜慮勝未至地乃至無所有處勝識無遍處然而無漏不墮界地故未至地無漏不必劣初靜慮無漏乃至識無邊處無漏不必劣無所有處無漏爰九品差異不幾一地中建立之故九地差異亦不幾一位中建立之故三道差異亦復不幾一姓中建立之故六姓差異尤是懸隔無殘之無漏故彼如寶法師釋中判地疏於位位疏種姓也若爾初靜慮下下品無漏勝未至地上上品無漏乃至無所有處下下品無漏勝識無邊所上上品無漏又未至地修道無漏勝第四靜慮見道無漏乃至未至地無學道無漏勝無所有處修道無漏又見道思法種姓無漏勝修道退法種姓無漏乃至見道第六種姓無漏勝修道堪達種姓無漏修道思法種姓無漏勝無學道退法種姓無漏乃至修道第六種姓無漏勝學道堪達種姓無漏此中位位品品無間解脫等準知可知準此義門以劣等為因以等勝為果以談同類因等流果之義無相違實又於此上有能修所修之不同有得修習修之差異就其門有無量義門不能具述此旨性相之所定也仍不及設依憑歟勿疑之如此成之時以上地無漏業為因以下地無漏法為果之旨宛如指掌也何足為疑哉又疑難所備之諸文還為誠證仍不及會之但於於依自上有於依下地無之論判者且據現起次第等而説也亦就同姓同品等而論之故爾者不可為相違者歟此事雖為一宗之大義一釋綱概第六卷已抄之畢又恐繁略之後學宜思擇之問今論意利學法與鈍無學業為等流果義可有耶答可有二意也兩方若為等流果者正見今論文偈頌結無學一三二長行述無學業以學法為一果謂增上學法都不與無學法為等流果定設雖以利學法望鈍無色學業更難云為等流果哉若依之爾者地疏於位位疏種姓者寶法師之明判也定諸論之幽致歟被得明知今論意許利學法與鈍無學業為等流果云事是以正理論意存此義見如何答此事既為俱舍正理之相違豈輒會通之哉仍光法師釋正披彼解釋上引正理論無學業以學法為一果謂增上理應言二謂加等流之文畢解云正理意説鈍無學道與未來利學道為同類因此約不現起或時解脫退已轉根為見至以過去鈍無學道為同類因學見至為等流果此約現起故言加等流不同俱舍此則論意各別難為會釋又俱舍據同姓相望漸次相生故學與無學為因無學非與學為因正理據異姓相望故説無學亦與學為因各據一義亦不相違文初釋就文相述之第二釋據義理説之兩論之順違寧可定哉但於寶法師之釋者同光法師之第二釋意何為強相違哉若夫簡光法師之初釋者兩論之文相如何可會之哉尋云正理論今文中述理應言二理言顯何意耶答今論中云學法為一果不應理云義顯之故判爾也問見所斷業感色法異熟可云耶答兩方若感之者見所斷業者其體非色業亦不發色業依何可有感色法異熟之義若依之爾者今論中偈頌結初有三四一長行述初見所斷業乃至以修所斷法為四果除離繫文光法師釋此文云若見所斷以四諦所斷行蘊少分為體乃至若修所斷法以修所斷五蘊為體文論判解釋無爭見所斷業可感色法異熟被得如何答問光法師意許一業感多生多業感一生義可云耶答若據常途之義者不可許之若據別途之義者可許之也兩方若許此義者正披今論之所説偈頌結一業引一生長行云依我所宗應作是説但由一業輕引一生此一生言顯一同分以得同分方説名生文光法師何可破有宗之大義耶一之定判可許此義歟被得如何答此事依為一宗之大義披光法師餘處之解釋述留多壽行之相云若據常途一業感一生一生一業感若據別緣一業感多生多業感一生文準此文光法師意許一業感多生多業感一生之義云事炳然也就中此釋者餘處解釋中引合婆沙正理兩論之説於今論判正不校同異之時婆沙六説正理四説此論二説一一分別之科文分章之中是其隨一之決判也更不為不正釋仍今引彼所證此義若爾當卷文所施設者是常途之義相非別途之所説何為相違哉又餘處十五解釋中釋能引唯三除順現受現身同分前業引故之論文之時引婆沙三説對此論判同異決正不作二釋之中一釋意成同分為現業所感之旨誰可疑之哉尋云據留多壽行門之時有多業感一生之義云事暫有其謂歟有一業感多生之義云事未分明其相如何答婆沙六説正理四説此論二説之中一師意前生所造業中不悉感今生同分之業今依布施邊際定力今所殘之同分相續之義有之為攝如此之義有一業感多生之義云歟此疑三卷抄中雖被記之是九牛之一毛非再往之所説仍婆沙正理之諸師雖此論二師全不及其見頗無念也仍當代學者迷失非一因茲圓範録十五卷抄之中粗記之畢爰自去年十二月十七日於東南院被始行俱舍三十講之時宗辨法師為新問者舉此題其時所存之旨梗概授之畢於講場問者述此旨之處為講答為定無遣其道誠失本意非翰墨之所記者哉今頃悉之處文義俱繁多也仍略之問論中付明引滿二因且二無心定及得不感引果所以如何釋之耶進云論中云以與諸業非俱有因故判以與諸業非同一果故也付之異熟因不善及善唯有漏者餘處偈頌之所定也設雖與業非俱有因非同一果其體其有漏而非無記者何無感引果之義哉是以如欲界繫表無表雖與業非俱有因非同一果可有感引果之義歟被得抑於二無心定者設非俱有因故之所由於得者立非同一果故之所以有何深意哉答凡雖二無心定有漏善非惡無記有漏善得及不善得亦非無記其體不相應行自本羸劣故才雖有感滿果之義都無有感引果之義尋其羸劣之所以彼四相雖不相應行與業為俱有因與業為同一果故其力是強有能感引果之義於無想滅盡之二定與有漏善惡之得者與業非同一果故所無感引果之功也凡感異熟果者以業為本之故也故論云二無心定雖有異熟而無勢力引衆同分以與諸業非俱有故得亦無力引衆同分以與諸業非一果故文但於欲界繫表無表與業非俱有因之難者其體既是業何可待餘業之力哉若強致此難勢者思業亦與業非俱有因如何可感引果哉彼既不待餘業而感引果此豈不爾哉然於欲界繫身語二業者光法師為二釋何取義於一邊可備難勢哉次於云非俱有因故云非同一果故之不同者彼只是表裏之二義更非各別之意趣所謂為俱有因之法必引同一果同一果之法必為俱有因之故也何為疑之端哉尋云今云與業非俱因之業者唯限思業歟為當通身語二業歟答論既述以與諸業明知通三業云事但光法師欲界繫身語二業不通引業云釋之前唯限思業之旨可存之也於諸之言者思業亦非一準何不之説哉又尋云以與諸業非俱有因故者有深意耶答有謂不相應行中四相與業為俱有因故為引業二無心定與業非俱有因故不為引業為言問婆沙論意以命根衆同分引滿二果中如何判之耶進云光法師所引婆沙論云亦説衆同分是引果餘是滿果文付之命根是有情之總報也尤為引果可云也是以光法師餘處所引婆沙論中命根衆同分是牽引果文如何答凡以同分為引果者諸論一同之施設諸師一相之定判也於命根者其旨非一準或以彼為引果則如難勢依之光法師餘處中云引業非唯感總同分亦能兼感別命根故文或以彼為滿果則如進釋重見婆沙論文云同分是總遍任持命根是則別遍任持文若爾論文家既及異端釋家亦有斟酌皆有理有證不可為一邊仍可有二意也重意云以命根望色心等法是為總報望衆同分是為別報故論判解釋中或為引或為滿皆有其謂何可疑之哉問異熟障中説大梵天可云耶進云不説之見付之凡異熟障者於彼依身永不起聖道加行況於聖道根本必不現起之謂也而於大梵天者不起三賢四善根況於聖道得非擇滅之類哉然異熟障之中尤可舉之哉是以今論餘處中述聖必不生大梵天處一導師故正理論餘處文云諸大梵王必異生攝以無聖者還生下故上二界無入見道故文加之重披今論餘處之定判出增上忍非擇滅之類之處謂無想北俱盧州大梵處文今至説異熟障寧可除之哉答光法師釋中釋此事上正理論能障聖道及道資糧並離染故之文畢即準此理異熟障中不説大梵以有漏道能離染故文誠以於三惡趣及北俱盧無想天者非只不起聖道加行並聖道根本亦不能離染而於大梵天者離染上生之義有之何可類三惡趣及北俱盧州哉如此成之時難勢悉被遮畢重意云入聖之後永不生大梵故所判爾也不可混異熟障者歟俱舍論第十七卷抄下貞和五年巳丑六月十日巳時於東大寺藏輪院草之訖右筆前笠置寺座主權律師圓範六十二四十八于時嘉吉三年三月十四日於三面僧坊北室成願坊經藏西部屋來六月為俱舍三十講書之英祐年二十七成十四蟲喰令損失之條加修覆畢寬永元甲子八月吉日擬講賢盛
