body:
  text: 俱舍論第二十七卷抄上問題問論文云如是已辨諸智差別智所成德今當顯示文爾者能成智與所成德其體同可言耶問頌文云贍部男佛身文爾者光法師如何釋之耶問當處付明佛十力相且初處非處智力一種與後業異熟智力等九種彼此相望時為開合為異為當作用各別可云耶問光法師釋根上下智力根言作二解釋爾者第二釋意云何釋之耶問於死生智力根本攝天耳通可云耶問以天眼他心宿住漏盡四通為十力攝可云耶問宿住隨念智力通四念住可云耶問死生智力通四念住可云耶問論文云如舍利子捨求度人不能觀智鷹所逐鴿前後二際生多少等文爾者智過去八萬劫事者為宿住通力為當願智力可云耶問論文云如舍利子捨求度人不能觀知鷹所逐鴿前後二際生多少等文爾者知未來八萬劫事者為死生智力為當願智力可云耶問於聲聞乘人有二生得脫類可云耶問論中明如來身力相舉三師異説爾者以何説為正判耶問論中明身力體舉二師異説爾者初師意如何釋之耶問論中明身力體舉二師異説爾者第二師意如何釋之耶問光法師釋如是身力觸處為性謂所觸中大種差別論文作或云有宗義或云經部義二解釋爾者何釋為正判耶問今論意判四無畏以何為體耶問光法師解理實無畏是智所成不應説言體即是智云論文作二解釋爾者第二釋意如何釋之耶問諸佛因位必修百大劫行可云耶問諸佛利他益必同可云耶問論文云如來三種圓德文爾者如何烈之耶問光法師釋智圓德中一切智一切種智不同作三解釋爾者第二釋意如何釋之耶問論文云斷圓德有四種一一切煩惱斷二一切定障斷三畢竟斷四再習斷文爾者光法師意一切煩惱斷者為唯限自性斷為當通緣縛斷可云耶問論文云斷圓德有四種一一切煩惱斷二一切定障斷等文爾者今此定障體光法師云何釋之耶問論文云斷圓德有四種乃至二一切定障斷文爾者今此斷體光法師如何釋之耶問論文云斷圓德有四種乃至四並習斷文爾者光法師意於習氣有別體可云耶問論文云斷圓德有四種乃至四並習斷文爾者光法師意於今此斷有別體可云耶問光法師當解釋中云又準此中所明斷德通於二滅或正斷德唯是擇滅若據兼説通非擇滅此文斷德據正及兼故通二滅前明斷德據正以論故唯擇滅文爾者於今此文中為有二釋為當如何問論中明威勢圓德開二箇四種爾者初四種中第二圓德光法師如何釋之耶問論文云彼恩圓德亦有四種謂令永解脫三惡趣生死或能安置善趣三乘文爾者於今此文開四種方光法師如何釋之耶問論中引薄伽梵所説頌云若於佛福田能殖少分善初獲勝善趣後必得涅槃文爾者今此少分善者指解脫分善根可云耶問無諍智以第四靜慮為所依所以論家如何判之耶問無諍智所緣惑者唯限有事惑可云耶問無諍智所依定通下地可云耶問願智知無色界法可云耶問願智知未來事可云耶問當處付明法無礙解所緣境且文身不詮義可云耶問今論意法無礙解者為唯緣自地名等為當緣下地名等義可有之耶問論中明詞無礙解相云緣方言詞立為第三文爾者光法師如何釋之耶問論文云詞此無礙解唯依二地謂欲界初靜慮文爾者依二地所以光法師如何釋之耶問論中付明四無礙解相且辨無礙解依地云何判之耶問頌文云義十六辨九皆依一切地文爾者一切地者為指八近分八根本及中間欲界為當除上八地近分並中間禪指餘地可云耶問當處付明四無礙解相且辨無礙解緣何境判耶問施設足論意名等離語聲獨起可云耶問論中明四無礙解加行舉二師異説爾者彼正不光法師如何判之耶問光法師釋但得必具四論文引正理論有餘師云有無具得無理得一必令得四説爾者正義可云耶
