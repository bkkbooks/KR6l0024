body:
  text: 俱舍論第五卷抄下問題問微微心位必緣滅盡定歟問今論意微微心位未來必修心心所歟問光法師所引婆沙論中舉入滅盡定時或滅未來心心所法或通滅未來現在心心所法云二説爾者二説俱正義歟問論文云此滅盡定唯聖者得文爾者異生不起滅盡定故如何釋之耶問麟喻獨覺得滅盡定為加行得為當離繫染得歟問佛身所起功德中可有未曾得類耶問論主意可存菩薩三十四念成覺義耶問正理論意滅盡定出心可通識無邊處耶問身證不還果聖者約離染得可有十種不同耶問婆沙論中述如是説者義云此滅盡定有十一種文爾者今此十一種中可舉本得不動種姓所起滅盡定耶問有學位所得滅盡定俱解脫聖者所得滅盡定其體可同耶問離非想非非想處一品染者於具縛者所起滅盡定可有得亦在身義耶問聲聞種姓無學聖者所起滅盡定可有九品不同耶問起滅盡定時必伏非想非非想處煩惱歟問光法師釋起無想定處引婆沙論三師説爾者今論意可同第二師説耶問雜心論意依身在色界可起無想定耶問依身在色界起滅盡定者唯限信解類歟問論文云尊者世友問論中説文爾者今此世友者四種婆多中世友歟問經部宗意善心現起位受想可俱起耶問論主意可存命根實有義耶問光法師釋今論謂三界業所引同分等文引正理論由業所引六處並依等文爾者相違二説歟問依身在欲界入滅盡定人過七晝夜後出定時必命終歟問論中解發智論隨相續轉一起便住文云彼言何義若所依身可損害故壽隨損害乃至是名第二一起便住文爾者寶法師如何釋之耶問光法師出俱非害類引婆沙論住最後有補特伽羅所作未辨文爾者住最後有補特伽羅者可通異生聖者耶問有宗意住異滅三相同時起作用歟問光法師明有為四相引婆沙論二師説爾者初師意合生相現在名一剎那歟問光法師明有為四相引婆沙論二師説畢云又是一解云云爾者今此一解意異上二師説歟問今論意二無心定入心起等無間緣取果用可通過去耶問論中引有頌云方獸地光言金剛眼天水等文顯何事耶問光法師引今論餘處法無礙解通依五地云文作二解釋爾者初釋意名等隨語繫隨身繫中云何釋之耶問光法師意詞無礙解唯緣自地言詞歟問光法師引今論餘處法無礙解依五地云文作二解釋爾者第二釋意名等隨語繫隨身繫中如何釋之耶問法無礙解唯緣無覆無記法歟問光法師明發業通果心所緣作二解釋爾者初釋意發業通果心可緣名等及心等耶問光法師明發業通果心所緣作二解釋爾者第二釋意發業通果心緣身語二業時兼緣能造大種及俱起香味等歟問光法師解釋中云非緣七種法故名緣法文爾者今此七種法者唯限法處攝歟問光法師釋異熟同分相會俱舍正理兩論相違云正理據五趣四生異熟同分橫望以論此論據引一生總衆同分竪望以説文爾者正理論意竪望所説通中生二有一生總衆同分者趣生同分歟問家家聖者三緣中受生緣上同分異熟同分歟
