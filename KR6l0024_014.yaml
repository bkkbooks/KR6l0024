body:
  text: 俱舍論第四卷抄下問光法師解釋中云馬勝苾芻為問四大種無餘滅位誓多林沒往六欲天乃至梵世文爾者今此運身者定內歟答可定外也兩方若定內者定內有行動者其心寧不散亂哉若依之爾者光法師釋馬勝苾芻運身云諸四大種當於何位盡滅無餘為欲知故入勝等持即以定心於誓多林沒於四大王衆天出從定而起問彼天衆文解釋無諍今此運身者可定內見如何答今此運身者可定外歟思其道理定中既微細寂靜也若有運身者豈不出定哉是以光法師述馬勝苾芻運身至初靜慮作彼地化云應知運身及化神境通果文勘今論餘處二十七文云神體謂等持境二謂行化行三意勢佛運身勝解通運身者出定之後神境通果見準此等文理馬勝苾芻運身者可定外云事炳然也但於光法師釋者出定之後雖有運身依禪定力令運身故云即以定心也非謂定內即有運身至彼天畢欲發問處彼此依身大小不同能問所問儀不相應故為化作別大依身問四大種無餘滅位在彼天中亦入等持依彼定力出定之後化作別大依身問四大種無餘滅位故云從定而起問彼天衆也非謂定內運身至彼天畢初從定起問彼天衆重意云婆沙論百二十九中明此因緣唯舉初入定後出定許略不説中間出定入定事委悉而言入勝等持發神境通依彼通力出定之後運身往至四大王衆天等在彼彼天中亦入勝等持發神境通依彼通力出定之後化作別大依身對四大王衆天等問四大種無餘滅位可云也理實言之初為運身後為化身數數入定數數出定文唯舉初後有略中間也光法師任彼論現文取要引載之故亦不及委悉釋歟問馬勝苾芻可知四大種無餘滅位耶答可知也兩方若知之者光法師解釋中述馬勝苾芻運身相云諸四大種當知何位盡滅無餘為欲知故入勝等持即以定心於誓多林沒於四大王衆天出從定而起問彼天衆文此釋無諍馬勝苾芻不知四大種無餘滅位見若依之爾者馬勝苾芻者大阿羅漢也何不知四大種無餘滅哉答見婆沙論百二十九文云如佛昔在室羅筏住誓多林時有苾芻名曰馬勝是阿羅漢獨於靜室作是思惟諸四大種何處永滅文馬勝苾芻既阿羅漢果聖者也豈不知四大種無餘滅位哉但於光法師為欲知故入勝等持等之釋者為顯初靜慮有諂誑示不知相致此問也凡光法師今解釋略引載婆沙論説非私定判也故述此運身起問相畢云略述如是廣如婆沙一百二十九説文問馬勝苾芻運身後可作化事耶答運身後可作化事也兩方若運身後作化事者必入所依定之後可作化事定中未起化事馬勝依身何可依對哉若依之爾者光法師解釋中馬勝苾芻運身後可作化事見如何答馬勝苾芻為問四大種無餘滅位入勝等持發神境通依彼通力出定之後運身往至四大王衆天等至彼彼天畢欲發問之處彼此依身大小不同能問所問儀不相應故為化作別大依身問四大種無餘滅位在彼彼天中亦入勝等持發神境通依彼通力出定之後化作別大依身對四大王衆天等問四大種無餘滅位故運身後可作化事云事必然也故光法師釋云馬勝運身至彼初定作彼地化大梵故得執手相牽若不別化欲界色麁執便不得文但於定中未起化事馬勝依身何可依對哉云難者馬勝苾芻依神境通力出定之後以此本依身往六欲天乃至梵世故運身後亦入勝等持發神境通依彼通力作自身化有何所背哉運身依身即本依身更非化身存之化身致今疑者問難之趣頗可落居歟問無色界可有緣補特伽羅愛敬耶進云今論云如是愛敬欲色界有無色界無文付之無色界既有緣法愛敬何無緣補特伽羅愛敬耶何況無色界雖無自他彼此相貌七慢俱起之相例可同如何答見今論文云愛敬有二謂緣於法補特伽羅緣法愛敬通三界有此中意説緣補特伽羅者故欲色有無色界無文光法師釋此文云若據緣法愛敬實通三界此中意説緣補特迦羅故不通無色以欲色界有色身故有尊卑故相貌顯故可得相望有愛有敬無色不爾故在彼無文寶法師釋此文云無色界中無色身故不能緣他起敬愛也不緣下佛世尊等故無有敬文任此等定判無色界有緣法愛敬無緣補特伽羅愛敬之理炳然也但於無色界雖無自他彼此相貌七慢俱起之例難者煩惱品類無始時來數習力故上二界中雖無校量種性等義生彼七慢俱現起之也故婆沙論四十三云評曰應作是説非卑慢等要比度他勝劣而起無始時來數習力故雖生上界亦有現行是故三界皆具七慢文善品心所無有無始時來數習力義故無色界無色身故無尊卑故無相貌故不起緣補特伽羅愛敬也問論中敘經部宗義云乃至有頂應有尋伺文爾者與婆沙論所説譬喻者義同歟答可同也兩方若同者今論乃至有頂應有尋伺之義麁細相對假立尋伺見寧與譬喻者義同哉若依之爾者光法師釋此文引婆沙論所説譬喻者義明知彼此其義可同云事如何答光法師釋今論又麁細性相待而立界地品別上下相形乃至有頂應有尋伺之文云論主敘經部計為難故婆沙五十二云或有執從欲界乃至有頂皆有尋伺如譬喻者文思此釋意今論乃至有頂應有尋伺文與婆沙論所説譬喻者義同云事炳然也但於今論乃至有頂應有尋伺之義麁細相對假立尋伺見寧與譬喻者義同哉云難者勘婆沙論五十二文云謂或有執從欲界乃至有頂皆有尋伺如譬喻者彼何故作此執依契經故謂契經説心麁性名尋心細性名伺然麁細性從欲界乃至有頂皆可得故知三界皆有尋伺譬喻者意引契經心麁性名尋心細性名伺之文麁細相對假立尋伺故從欲界乃至有頂皆有尋伺云事與今論所敘經部宗義全無相替疑難之旨未得其意歟問光法師所引婆沙論四十三中述評家義云非一切慢要方他起無始時來數習力故依自相續慢亦現行文爾者依自相續慢者唯限我慢增上慢邪慢三慢歟答可通七慢也兩方若唯限我慢等三慢者披婆沙論前後之文可通七慢見若依之爾者光法師引婆沙論今文畢云慢過慢慢過慢卑慢此四方他我慢增上慢邪慢依自相續起文如此文者依自相續者唯限我慢增上慢邪慢三慢云事分明也如何答婆沙論中云依自相續慢亦現行者可通七慢也故見光法師餘處解釋云應知七慢皆通三界故婆沙四十三云評曰應作是説非卑慢等要比度他勝劣而起無始時來數習力故雖生上界亦有現行是故三界皆具七慢文此文意云非卑慢等要方他起無始時來數習力故生上界中七慢俱依自相續起是故三界皆具七慢為言但於光法師釋者就七慢顯相且分別方他依自相續差異許也以實而言雖方他慢數習力故依自相續可現起也光法師釋方他起慢之中雖舉卑慢婆沙論文云非卑慢等要比度他勝劣而起故判方他慢數習力故依自相續現起之旨炳然也問無色界七慢俱可起之耶答七慢俱可起之也兩方若七慢俱起之者無色界無有校量自他種性色力財位智等之義何七慢俱可起之哉例如無色界無有緣補特伽羅愛敬若依之爾者見光法師餘處解釋云應知七慢皆通三界文如何答無色界七慢俱可起之也故披光法師餘處十九解釋云應知七慢皆通三界故婆沙四十三云評曰應作是説非卑慢等要比度他勝劣而起無始時來數習力故雖生上界亦有現行是故三界皆具七慢文但於無色界無有校量自他種姓色力財位智等之義何七慢俱可起之哉云難者無色界中無色身故無尊卑故無相貌故雖無校量自他種姓色力財位智等之義無始時來數習力故依自相續七慢俱可現起也故光法師釋云方他之言從多分説故婆沙四十三云評曰應作是説非一切慢要方他起無始時來數習力故依自相續慢亦現行文次於無色界無有緣補特伽羅愛敬之例難者三界流轉之凡夫五道輪回之有情於煩惱者無始時來數串習之於善心者雖適現起非如惑品故無自他彼此相對之處不起對他善故無有緣補特伽羅愛敬也例如無色界中煩惱雖有別緣色法之類善心無身念住也重難云光法師引婆沙論非一切慢要方他起無始時來數習力故依自相續慢亦現行之文畢云慢過慢慢過慢卑慢此四方他我慢增上慢邪慢依自相續起文如此釋者依自相續慢亦現行者唯限我慢增上慢邪慢三慢見何云無色界依自相續七慢俱現起哉答依自相續慢亦現行者可通七慢也是故三界皆具七慢之下文此旨分明故也但於光法師釋者就七慢顯相且分別方他依自相續差異許也以實而言雖方他慢數習力故依自相續可現起也貞禪大僧都云光法師今釋且致一往分別也就實論之七慢俱方他起亦依自相續可起故無色界依自相續七慢俱現起更無所背也問婆沙論意依自相續慢引契經何文證之耶進云婆沙論四十三云如契經言尊者無滅往詣尊者舍利子所作如是言我有天眼清淨過人觀千世界不多用力文付之既云清淨過人定可方他慢何引今經文為依自相續慢之證據哉何況尊者無滅者是阿羅漢果聖者也寧可起慢煩惱哉答方他慢者正對他人校量自他種姓色力財位智等所起慢也而尊者無滅云我有天眼清淨過人不對他人故引此文為依自相續慢之證據也但於過人之言者就總有情雖稱過人非對別人校量自他天眼勝劣分齊之義故名依自相續慢更無相違也次於尊者無滅者是阿羅漢果聖者也寧可起慢煩惱哉云難者實以難思且試推之若夫退阿羅漢果起慢煩惱歟或亦雖非起慢煩惱以云清淨過人之當準例依自相續慢相可如此哉云歟已上相傳義也愚案云我有天眼清淨過人者非云對他人過彼天眼殊勝過人眼故天眼總名云過人也故問有宗意心心所上所現影像為能緣用為當所緣用歟答可能緣用也兩方若能緣用者披光法師餘處一末解釋云若依大乘此行相當相分此相分是境攝隨變色等即色等中攝文而大乘相分既所緣用也定知類之有宗影像亦所緣用云事加之有人立量云心心所上所現影像可非能緣用許境相貌故如青黃等色文此量付何過可成影像能緣用義哉若依之爾者影像不離心體尤可能緣用是以光法師解釋中心心所上所現影像可能緣用見如何答有宗意心心所上所現影像者謂心心所法其之體明淨對前境時其心心所上法爾任運前境相貌皆悉顯現如清池明鏡衆像顯現名影像故是能緣用非所緣用也故見光法師處處解釋當卷云謂心心所法其體明淨隨對何境法爾前境皆悉現於心心所上此所現者名為行相即由此現帶境義邊似前境邊説為能緣此行相無有別體不離心等即心等攝非是所緣猶如明鏡對衆色相皆現鏡面此所現像而非所照然約像現説鏡能照此亦應然言行相者謂有境界像貌故名行相文餘處一末或云言行相者謂心心所其體清淨但對前境不由作意法爾任運影像顯現如清池明鏡衆像皆現文或云問行解行相為約何者説名能緣解云據行相説非據行解謂彼心等對境之時有影像現據此義邊名為能緣境名所緣以心心所緣境時非如燈焰舒光至境亦非如鉗桿取彼物據影現義名能所緣文或云問如善心心所法緣不善色時有影像現如何行相同彼體耶解云雖所緣色是其不善以此影像不離能緣故亦是善如鏡中火似火非真影像亦爾似彼不善而非不善如善既爾不善無記記準善應知文何況勘今論餘處二十六文云如是行相以惠為體文正理七十四顯宗三十五兩論之文全亦同之婆沙論中述正義意云評曰應作是説言行相者自性是惠文依之泰法師今解釋云今依薩婆多影像相非蘊界處攝亦非所緣云然心心所同取惠所現影像相名行相同如下智品中説文任此等定判心心所上所現影像是能緣用非所緣用云事甚分明也但於光法師餘處解釋者有宗意影像者心心所上所現所緣前境像故當大乘所立心心所相分云也大乘意談相分是心內境不離心故雖所緣境為能緣心用有宗意心存在境外境在心外故心心所上所現影像唯屬能緣心用更非所緣境言為言次於有人所立比量者有宗意定心心所上所現影像是能緣用故立心心所上所現影像可非能緣用之時可有自教相違過也問今論意受苾芻戒時可捨勤策同分耶進云光法師釋云受大戒時不捨十戒而捨勤策同分文付之由得勤策十戒得勤策同分而受苾芻戒之時不捨勤策十戒何可捨勤策同分哉答光法師會正理論若依戒得破僧之時戒既不捨如何捨彼和合同分云難敘俱舍師解云諸法不定何必因彼同捨如因十戒得勤策同分受大戒時不捨十戒而捨勤策同分以得苾芻衆同分故文受苾芻戒之時捨勤策同分云事此釋炳然也但於受苾芻戒之時不捨勤策十戒何可捨勤策同分哉云難者諸法捨緣極不定故不必因彼而得與彼同捨戒品增進位無捨前所得戒故受苾芻戒之時雖不捨勤策十戒受苾芻戒得苾芻衆同分之後猶不捨勤策同分者應有一人亦名苾芻亦名勤策之過故受苾芻戒得苾芻衆同分之時捨勤策同分也故光法師敘俱舍師反詰云若不捨者即應一人亦名苾芻亦名勤策文問品類足論又云復有所餘如是類法與心不相應總名心不相應行文爾者光法師意所餘心不相應行者唯限非得歟答唯限非得也兩方若唯限非得者復有所餘如是類法之言是廣何唯限非得哉是以披泰法師餘處十八解釋云十四不相應行攝不相應不盡故亦有所餘言其僧不和合性非十四攝是所餘不相應行令毗婆沙師存此義也文如此釋者所餘心不相應行者不限非得云事分明也若依之爾者光法師解釋中所餘心不相應行者唯限非得見如何答勘品類足論一文明心不相應行舉得無想定滅定無想事命根衆同分依得事得處得生老住無常性名身句身文身十三類畢云復有所餘如是類法與心不相應總名心不相應行思其所餘心不相應行體尤當非得一類故光法師述品類足説依事處得約法別説應知即是得中攝也不説非得即是復有所餘不相應攝即是此論非得所取品類足論所説所餘心不相應行者即是今論所列非得所收之旨釋成也但於泰法師餘處釋者頗難依用之其故光法師意釋破僧不和合即是非得攝存破僧之時不和合性十四不相應中非得攝故所餘心不相應行體十四不相應行外無之而泰法師意異之云其僧不和合性非十四攝是所餘不相應行故不可及劬勞也重難云品類足論復有所餘如是類法與心不相應之文唯限非得云事猶不可然若唯限非得者直可喚非得名言何煩云復有所餘如是類法哉如是類法之言無諍可有多類見是以次上文舉受想思觸作意欲勝解念定惠信勤尋伺放逸不放逸等心所畢云復有所餘如是類法與心相應總名心所法指欣厭怖多類心所故撿婆沙論處處之文或二十八云評曰有別法名厭非惠非無貪是心所法與心所法與心相應此説在復有所餘如是類諸心所法與心相應文或百九十六云評曰應説厭性異非無貪非惠別有心所法名厭與心相應此即攝在復有所餘心所中文或七十五云評曰應作是説此所起中應別説怖所以者何有別心所與心相應是怖自性此即攝在復有所餘如是類法與心相應心所法內非諸煩惱文而為唯説非得一法云復有所如是類法與心不相應甚難思是一加之寶法師難光法師釋云自云品類足論不説非得説有十三同俱舍論又云彼論云復有所餘如是類法與心不相應法蘊足論第一同品類足論彼論既言所餘如是類法焉知準有非得此論不説更無正理不彈俱舍六足言有所餘正理説有和合餘文皆通兩解正理更無異論教既分明理須依釋故知十四之外更有不相應行文此釋意明所餘心不相應行者不限非得通和合性判是二答光法師意依今論説之時存十四不相應外更無餘不相應故品類足論中舉得等十三類不相應畢復有所餘如是類法與心不相應唯限非得云事解釋所定尤有其謂也但於如是類疑問之趣實以難遁然而且試會之云凡於非得或名異生性或名退自性或名不和合性有多種類故為總攝此等種類云復有所餘如是類法與心不相應也故見婆沙論處處之文或四十五云云何異生性答若於聖法聖暖聖見聖忍聖欲聖惠諸非得已非得當非得是謂異生性文或六十云問退以何法為自性耶評曰退自性者是不成就無覆無記即是非得心不相應行蘊所攝即在復有所餘如是類法心不相應中攝文或云問僧破以何為自性答以不和合無覆無記不相應行為自性是不相應行蘊所攝即餘處説復有所餘如是種類不相應行文準此等文思之雖非得一法有多種類故為總攝之云復有所餘如是類法與心不相應也何可替總攝欣厭怖多類心所云復有所餘如是類法與心不相應哉次於寶法師釋者彼師意不和合性非得所攝復有所餘如是類法與心不相應之言攝之云義邊同光法師釋意故餘處十八釋云問僧破以何為自性答以不和合無覆無記不相應行為自性是不相應行蘊所攝即餘處説復有所餘如是種類不相應行準此論文不和合性即是非得無別體也文今此定判其義可然而當卷釋意令今論意同正理論説十四不相應外立和合性存故異光法師釋意復有所餘如是類法與心不相應之言攝和合性云也故當卷釋云今案此論心不相應但有十四若依正理加和合性故正理云等者等取句身文身及和合性諦光師以二説不同廣為問答此論雖不別説和合亦不述無正理釋此論頌言等和合故知不是兩論相違若謂不説即是無者此論頌中不説怖等應無其怖怖等既不定無和合寧知非有今詳此論只是略而不論非是所明之外更無心所心所既爾和合應同不依論文信自胸襟問答往還徒煩紙墨文倩案兩處釋意可有縱奪二門餘處不和合性非得所攝十四不相應外無別體之釋既順文理專可賞玩當卷令今論意同正理論所説不云和合性是衆同分攝十四不相應外有別體復有所餘不相應行攝之云釋全無依憑恐難信用歟重難云就泰法師餘處釋旁有其疑見正理論文釋相名身等類之等言云等者等取句身文身及和合性十四不相應外雖立和合性無舉不和合性故當卷釋云故正理論第十二卷云等者等取句身文身及和合性此云等者頌舉名身等取句身文身及和合性不和合性非得中攝故不別説文今此釋任文引正理論説其意同光法師釋而餘處十八釋云其僧不和合性非十四攝是所餘不相應行令毗婆沙師存此義也正理論師亦存此義列十四不相應後頌中言等長行釋云等者是不和合性定文不和合性非十四不相應攝引正理論文云等者是不和合性非只背本説亦相違自釋哉是一次不和合性非得為體故翻之和合性應得為體云疑一往且可然故當卷釋云問不和合性既是非得翻不和合立和合和合應是得所收答諸法不必相翻立如以凡翻於聖凡性是非得不可以聖反於凡聖性即是得文而餘處十八釋云問和合既是得不和合應是不得答諸法不必相翻而立如凡夫性是不得聖性非是得判和合性以得為體述不和合性非非得攝之旨不叶道理亦違自釋哉是二答問光法師釋成就不成就相云據得非得流至現在相續已去文爾者初念得非得可有相續義耶答不可有相續義也兩方若有相續義者相續者後念續前念之義也而初念得非得既無續前念得非得之義何可有相續義哉若依之爾者流至現在相續已去之言無所簡別設雖初念得非得寧不論相續義哉答見品類足論文云相續法云何謂若法以滅法為先或已生或正生此復云何謂過去現在及未來現前正起法如是後去與前法相續是名相續法文此文意述後念續前念名相續法之旨而光法師成與不成據得非得流至現在相續已去之釋意一類法得非得初至現在世相續已去論成就不成就義為言非云初念得非得即有相續義也重意云一類法得非得初至生相位未來不定無後念得非得定續前念得非得之義故不立相續稱一類得非得初至現在位後念生相得非得定續前念現在得非得故一類得非得初至現在世已去即與相續稱故云流至現在相續已去一類得非得初至現在位非彼得非得自有相續義也問正理論文云先未得得説名為獲文爾者寶法師意先未得得者唯限從來未得得歟進云寶法師意先未得得者通已失還得得釋也付之依寶法師釋披正理論十二文述先未得得説名為獲先已得得説名成就從來未得得名獲先已得得名成就之旨分明也是以光法師解此文云正理論意但據從來未得今時創得名獲若已會得設令因退今時重得但名成就以重得故文若爾寶法師釋豈不背正理論文哉答正理論先未得得説名為獲先已得得説名成就之文其言幽玄其趣難測故光寶二師解之意異即寶法師釋此文云今詳正理文雖少異其義亦同先未得得説名為獲者有二種一會未來得如無漏道等二得已失如生上地生下地等先未得得説名為獲者即是於二位初得至生相時先已得得説名成就者有二一無始已來恆成就者二初得已後第二念失皆名先已得得文此釋意云先未得得説名為獲者若從來未得得若已失還得得初至生相位名先未得得得體初至生相位先時得體無故名先未得得非簡已失還得得云先未得得也先已得得説名成就者若從來未得得若已失還得得至現在世名先已得得生相位已得故名先已得得非簡從來未得得云先已得得也第二念去者得體至現在世望生相位名第二念也寶法師料簡正理論今文其意如此但於光法師釋者任正理論現文作釋也其意云從來未得得若在生相位若至現在世名獲已失還得得若在生相位若至現在世名成就為言此義大異在生相位名得至現在世名成就之常途廢立故結釋云正理若作斯解與得捨成就不成就四句相違或可得獲成就本唯一物隨作論者寬狹異門莊嚴於義不可皆使例同文寶法師意欲令正理論今文同常途義相故若從來未得得若已失還得得在生相位名獲至現在世名成就釋也既為人師異釋不及和會之歟重難云就寶法師釋疑難未被會獲與成就其義縱雖許之不獲不成就其相猶不可然若翻獲與成就論不獲不成就者若從來未得法非得若先得後捨法非得在生相位名不獲至現在世名不成就可云也而寶法師釋應知非得與此相違者非得有二種一無一無始已來曾未得者名為不獲通其前後名為不獲二謂已得後捨於初念生相名為不獲第二念去名不成就從來未得法非得若在生相位若至現在世同名不獲先得後捨法非得在生相位名不獲至現在世名不成就云事彼此參差甚難信用何況正理論中全不見先得後捨法非得在生相位不獲之旨哉答彼此實參差解釋尤難思但勘正理論文云故説異生性名不獲聖法從來未得法非得若在生相位若至現在世同名不獲云事彼論中自所見也故寶法師通其前後名為不獲之釋非無依憑歟對之先得後捨法非得雖名不成就不遮彼生相位名為不獲之義邊也尋云寶法師文雖少異其義亦同之釋其意如何答以正理論文對今論説文言雖少異得體在生相立名獲至現在世名成就之義是同為言重難云正理論意從來未得法非得若在生相位若至現在世同名不獲云者異今論意非得唯在生相位名不獲之義何云其義亦同哉答從多分云爾也寶法師釋旁以難會間可案之元瑜釋意同光法師釋所詮不如此等歟問光法師意可有唯有非得無得法耶答不可有此類也兩方若有此類者得非得是是相翻法也何可有此類哉是以光法師解釋中不可有此類見若依之爾者披光法師餘處六定判引婆沙論由此義準亦有異生決定不入正性離性此則名為無𣵀槃法即無𣵀槃法名非心為因之文畢云若無𣵀槃法無初無漏心與𣵀槃為證得了因名非心為因文如此釋者決定不入正性離性之者未來無漏心唯有非得無得法可云也如何答見今論文云決定無有成就虛空故於虛空不言有得以得無故非得亦無宗明得非得相翻而立故諸有得者亦有非得義準可知故不別釋文光法師釋此文云以理而言諸有得者亦有非得義準可知故於前文但解二滅得不別擇二滅非得文此等釋意云有得法必有非得有非得法必有得為言故不可有唯有非得無得法也但於光法師餘處所引婆沙論文並自解釋者決定不入正性離性之者未來無漏心雖永不現起必容有得故不可云唯有非得無得法也問光法師意已生法上法俱得在未來義可有之耶答不可有此義也兩方若有此義者已生法上法俱得也何可有在未來之義哉是以光法師解釋中不可有此義見若依之爾者光法師述過去現在法上前得後得在未來之旨法俱得相例可同如何答法俱得者名與所得法俱生得既已生法上法俱得也更不可有在未來之義故光法師述過去法有現在未來得者皆是法後據世橫望雖皆法後若據起用前後未來亦有彼法前得現在法有未來得者唯法後據世橫望雖唯法後若據起用前後未來亦有彼法前得過去現在法上未來得者是法後得或法前得無法俱得定但於過去現在法上前得後得在未來之例難者法前得法後得不與所得法俱故已生法上法前得法後得在未來也全非相例歟問寶法師意法前法後法俱三得其體可各別耶答寶法師意今此三得體一非各別釋也兩方若三得體一者法前法後法俱三得其時既別也何云其體是一哉是以見婆沙論百五十八文或明所得法有六種出有俱得無前得後得有前得無俱得後得等不同若三得體一者爭可有此等句數哉或判三類智邊世俗得亦有俱得既許現起得外有別俱得三得體別之旨分明也何況婆沙論三評家意述世第一法得不為體云若彼俱起若後起得一切皆非世第一法種類同故文若三得體一者豈可云種類同故哉加之寶法師釋道類忍有前得俱得云若現在者若未來者皆容有二得文云現在道類忍有法前得定可指未來得爰知從未來世三得其體各別云事若依之爾者寶法師當卷定判並餘處解釋中法前法後法俱三得其體是一見如何答勘寶法師解釋當卷中或述過去世法於未來無法前得云得無決定𠃍隨起説前後故文或明三得體不定云前後俱得若言決定如何論言或前或後亦不可言總同類説於此類中有定俱者應須簡故故知言有法前法俱皆是不定據容有説非得準此文餘處六解得與所得非定俱行或前或後或俱生故之論文云故知即俱生得可或前或後準此亦令前得可後後得可前前後之得亦可法俱文案此等釋意專依今論餘處六得與所得非定俱行等之文釋成三得體一之旨也但於三得其時既別其體可一云難者隨其所應雖起用時別在未來時三得體一故時別體一不背法類也次於婆沙所得法有俱得無前得後得等之文者在未來世中雖其體不定隨所得法起前後俱三得用故就現起相分前後俱論三得有無全非相違也次於婆沙論三類智邊世俗智亦有俱得云文者於未來得有容為前得俱得之義故云有俱得非謂從未來世其體決定是俱得也次於婆沙論種類同故之文者就現起得云俱得後得種類同故更不遮未來得體不定義邊也次於寶法師現在道類忍有法前得云釋者於現起法俱得有容為法前得之義故云皆容有二得故寶法師釋云如道類忍唯有法前法俱者以不定故文非許現起法俱得之外有別體法前得此釋還順三得體一之意也問三類智邊世俗智可有法後得耶答不可有法後得也兩方若有法後得者三類智邊世俗智是畢竟不生法也寧可有法後得哉是以光法師所引婆沙論百五十八中述三類智邊世俗智無法後得見若依之爾者三類智邊世俗智至見道三類智邊位得非擇滅明知前位容有可生義云事若有可生義者何無法後得哉何況披婆沙論文三類智邊世俗智有法俱得判若許有法俱得者豈可簡法後得耶答三類智邊世俗智是本來畢竟不生法永無現起義故無法後得云事道理必然也故見光法師所引婆沙論百五十八文述所得法有六種不同云二有所得法唯有前得如三類智邊世俗智等有説此等亦有俱得文初師意約其起用云唯有前得第二師意有情數法必有法俱得故云亦有俱得今此二師説更非相違義望邊邊門出添之也然而此世俗智是未來定不生法無法後得之義本來定故二師説意何不云有法後得也但於三類智邊世俗智至見道三類智邊位得非擇滅云難者此世俗智未來畢竟不生法故前位雖無可生之義至見道中三類智位勝緣闕故得非擇滅也故光法師餘處一釋云如現觀邊世俗智等雖復體性畢竟不生於前位中亦不出觀然至三諦現觀後邊勝緣闕故得非擇滅文思此釋意此世俗智於前位中畢竟不生之義既定何可有法後得哉次於婆沙論三類智邊世俗智有法俱得云文者有情數法必有法俱得故此世俗智雖不現起有法俱得為言法前法後二得由用起不起論其有無故此世俗智永不現起無法後得也重難云有為法中最強盛者有法前得次強勝者有法後得無法前得最羸劣者唯有法俱得無有前後得而三類智邊世俗智既有法前得何無法後得哉是一次見光法師解釋問現在道類忍如何得有法前得耶答之作三解中第三釋云又解現在道類忍約世而言唯有法俱得而無法前得由此現忍有未來法前得故亦名有法前得此未來得約世橫望實在現忍後而名法前得不名法後得者以此得不起即已起必在彼忍前以能得得約容起用説前後俱也由斯現忍亦有前得文準此釋思之三類智邊世俗智尤可有未來法後得也是二答有為法中約起用有無所論前後得具不具也而三類智邊世俗智是畢竟不生法故雖勢力強盛有法前得更不可有法後得也次現在道類忍有未來法前得者若不現前者容法前得起故約容有義未來世中有法前得為言三類智邊世俗智假無容現前之義故未來世中無法後得也問道類忍可有法後得耶答不可有法後得也兩方若有法後得者得果位必無成就向道道類忍何可有法後得起義哉是以光法師所引婆沙論中道類忍無法後得若依之爾者有為法中最強盛者有法前得次強勝者有法後得無法前得最羸劣者唯有法俱無有前得後得而道類忍既有法前得寧無法後得哉何況現在道類忍雖無法後得未來道類忍可有法後得例如婆沙論文述三類智邊世俗智有法俱得光法師釋云現在道類忍有法前得如何答道類智是初證得沙門果位更無成就向道之義故道類忍無法後得云事道理必然也故見光法師所引婆沙論百五十八文明所得法有六種不同云四有所得法唯有俱得如道類智忍等文若道類忍有法後得者豈可論六種不同哉是以寶法師釋云四唯有俱得及法前得如道類忍等即此剎那時捨故文圓暉法師釋云謂道類忍是向道攝至道類智是果道攝得果道中捨向道故故道類忍無法後得文道類忍無法後得之旨此等定判亦分明也但於道類忍既有法前得寧無法後得哉云難者若道類忍有法後得現起位分者實可有法後得而次念所起道類智是得果位必捨道類忍故無法後得現起之分位故雖勢力強盛有法前得無法後得也次於未來道類忍可有法後得云難者道類忍定無現起之後容被成就之義故未來道類忍亦無法後得也次於婆沙論三類智邊世俗智有法俱得之文者有情數法必有法俱得故三類智邊世俗智雖畢竟不生法可有法俱得於前後得者隨所得法相有無不定不必具之道類忍既云法後得現起位分故從本以來無法後得也次於光法師現在道類忍有法前得之釋者若不現前者容法前得起故約容有義未來世中有法前得釋也道類忍假無容法後得起之義故未來世中何可有法後得哉問光法師明現在道類忍有法前得作三解釋爾者初釋意現在道類忍實可有法前得耶答初釋意雖許現在道類忍實有法前得之義邊釋面不言有法前得也兩方若實有法前得者光法師述初釋意云現在道類忍雖復唯有法俱得文唯有法俱得之言豈不簡法前得哉若依之爾者明現在道類忍有法前得之三釋也定知初釋意現在道類忍實可有法前得云事如何答光法師三解釋從顯向隱自麁至細述邊邊義門遂不相違故初釋意就實通論之時可謂現在道類忍有未來法前得然而釋面旨趣各別即出彼釋可成其意也故見光法師釋問現在道類忍如何得有法前得耶答之作三釋云解云現在道類忍雖復唯有法俱得未來道類忍亦有法前得約忍種類説故言有法前以所得法據種類説故又解現在道類忍今雖唯有法俱得若不現前即有法前得約容有説言有法前又解現在道類忍約世而言唯有法俱得而無法前得由此現忍有未來法前得故亦名有法前得此未來得約世橫望實在現忍後而名法前得不名法後得者以此得不起即已起必在彼忍前以能得得約容起用説前後俱也由斯現忍亦有前後文初釋意云就正起用論之者現在道類忍雖唯有法俱得無法前得未來道類忍有法前得故約種類現在道類忍有法前得成為言第二釋意云就正起用談之者現在道類忍雖唯有法俱得無法前得若不現前者即容法前得起故約容有義現在道類忍有法前得為言第三釋意云約世言之者現在道類忍雖唯有法俱得無法前得就實細論之時約容起用辨前後者現在道類忍實有未來法前得為言是顯邊邊義門更非相違三釋也問金剛喻定可有法後得耶答可有法後得也兩方若有法後得者得果位必無成就向道金剛喻定何可有法後得哉例如道類忍無法後得若依之爾者見光法師所引婆沙論文明所得法有六種不同中唯有俱得前得法無舉金剛喻定爰知可有法後得云事如何答得阿羅漢果位雖必捨金剛喻定鈍根阿羅漢果聖者退所得果住有學位之後還欲得阿羅漢果起金剛喻定之時現起金剛喻定雖未曾得法先所捨金剛喻定其時還得之故金剛喻定有法後得云事道理必然也故勘識身足論十二文述現在學心有八向中云非已了別今了別當了別者謂先不退阿羅漢果住阿羅漢果無間道中得阿羅漢果從阿羅漢果決定當退已了別今了別當了別者謂先已退阿羅漢果住阿羅漢果無間道中得阿羅漢果從阿羅漢果決定當退文此文既明現在學心今了別當了別義云住阿羅漢果無間道中得阿羅漢果從阿羅漢果決定當退約現在金剛喻定退阿羅漢果之後有當了別義云故有法後得當亦成就之旨甚分明也但於道類忍無法後得之例難者初得沙門果永無有退故全不可為相例難也問隨能證道判離繫得性類歟問論文云若工巧處及威儀路極數習者得亦許爾文爾者述餘師義歟答是述正義意非舉餘師義也兩方若述餘師義者論文不云有餘師説光法師等無釋餘師別義爰知非述餘師義云事若依之爾者見舊俱舍論三文云工巧處無記及別威儀無記極所數習有餘師欲此至得同三世文如何答工巧心及欲界威儀心極數習者有三世得者諸論一同之定判薩婆多宗之正義也故正理論云又威儀路四蘊之得多分世斷及剎那斷唯除諸佛馬勝苾芻及餘善習威儀路者若工巧處四蘊之得亦多世斷及剎那斷除毗濕縛羯磨天神及餘善習工巧處者文顯宗論文全亦同之婆沙論解欲界中云威儀路四蘊中善串習者如佛馬勝及餘有情所善串習並工巧處四蘊中善串習者如佛妙業天子及餘有情所善串習彼得亦皆世雜剎那雜謂在三世各有三世得故文雜心論云威儀四蘊多以世斷及剎那斷得若彼善修得三世得工巧亦如是文任此等諸論説工巧心是欲界威儀心極數習者有三世得之旨甚分明也定知正義家意非餘師義云事但於舊俱舍論有餘師欲之言者是譯者之謬歟新譯今論既無有餘師説之文推之可為舊譯之謬也問威儀路四塵能造大種可有前後得耶答不可有前後得也兩方若有前後得者能造大種其性微劣也何可有前後得哉若依之爾者見今論文云若工巧處及威儀路極數習者得亦許爾文準此文思之彼能造大種有串習類者寧無前後得哉答威儀路四塵能造大種勢力微劣故唯有俱得無前後得也彼威儀路能依四蘊極數習者有三世得不串習者尚無前後得況於彼能造大種色法勢力微劣哉故光法師釋云除上別簡有三世得自餘一切異熟五蘊及威儀路工巧處通果色蘊及威儀路工巧處四蘊一分並自性無記色行一分唯有法俱得文寶法師釋云有覆無記色尚無前後得況無覆無記色文婆沙論解欲界中云無覆無記一切色蘊異熟生四蘊及威儀路工巧處多分四蘊彼得世不離剎那不雜若在過去得亦過去若在未來得亦未來若在現在得亦現在文任此等定判威儀路四塵能造大種唯有俱得無前後得云事甚分明也但於今論若工巧處及威儀路等之文者心望色強又是能發故能依威儀心極數習者有三世得色望心劣又是所發故所依威儀路四塵之中若能造大種若所造色法雖數習者不可有前後得也問色界威儀心可有前後得耶進云光法師釋云明知色界威儀四蘊無三世得文付之設雖色界威儀心有串習類者何無前後得哉依之見婆沙論九十文述生欲界及初靜慮成就眼耳身三識云諸無記中有串習者亦恆成就如勝威儀工巧通果明生第二靜慮已上無記三識若不現前現不成就説以五識身性羸劣故他地現起勢不堅強披光法師餘處二解釋成依自地發眼耳二通有三世得云如善習自地威儀工巧有三世得例生上三靜慮所起眼耳二通唯有𠃍法俱得釋如泛借下三識及威儀心非是善習唯法俱得任此等定判生初靜慮所起威儀心可有前後得見加之識身足論十二中舉現在色界無覆無記心已了別今了別非當了別句云謂色界生長趣無色界諸不還者住最後無覆無記心文既云色界無覆無記命終心有已了別義豈非彼界威儀心有法前得哉答色界是定地麁動威儀心不串習故無前後得也故見光法師解釋問色界威儀路四蘊有三世得不答之云解云彼界非極串習無三世得引婆沙論百五十七解欲界中云威儀路四蘊中善串習者如佛馬勝及餘有情所善串習並工巧處四蘊中善串習者如佛妙業天子及餘有情所善串習彼得亦皆世雜剎那雜謂在三世各有三世得故解色界中云一切有覆無記無覆無記色蘊及威儀路異熟生四蘊彼得世不雜剎那不雜隨在彼世即唯有彼世得故之文畢準婆沙論文於欲界中即別簡威儀工巧極串習者有三世得於色界中即不別簡威儀有三世得明知色界威儀四蘊無三世得文寶法師引此文畢云準此故知色界二無記心無前後得文光寶二師同引婆沙論説釋成色界威儀心無前後得之旨其意如此但於婆沙論文者上雖標謂生欲界及初靜慮下置隨其所應之言隨應論之故諸無記中有串習者亦恆成就如勝威儀工巧者舉欲界威儀工巧心也若執謂生欲界及初靜慮之言亘欲界及初靜慮心得意者豈生初靜慮起工巧心哉爰知隨其所應可配欲界及初靜慮心云事以五識身性羸劣故他地現起勢不堅強者對自地所起三識通善染汚即恆成就以五識身性羸劣故他地現起唯限無覆無記心勢不堅強故無前後得若不現前則不成就為言非謂云爾故生初靜慮所起三識身勢力堅強有前後得也次於光法師餘處解釋者指善串習欲界威儀工巧心有三世得云如善習自地威儀工巧有三世得也初靜慮威儀心無論串習不串習義以如善習自地威儀之文何可云生初靜慮所起威儀心哉次於識身足論文者彼論意就十二心分別已了別等之義故云現在色界無覆無記心之時彼界異熟威儀通果三無記心同被呼之其中通果無記心有法前得有已了別義故出現在色界無覆無記心已了別今了別非當了別句云謂色界生長趣無色界諸不還者住最後無覆無記心也彼命終位正所現起威儀心非有已了別義故全無相違歟問正理論意不串習者欲界威儀工巧心可有前後得耶答可有二義也兩方若有前後得者披光法師解釋云此論正理婆沙雜心亦據不串習者所以有不成就文如此釋者彼論意不串習者欲界威儀工巧心不可有前後得見若依之爾者光法師餘處定判中明得心多少云正理二十雖不改頌長行意同識身文若正理論意不串習者欲界威儀工巧心無前後得者寧可云長行意同識身哉答此事雖有相承祕説且可存正理論意不串習者欲界威儀工巧心有前後得云義也故見光法師餘處七解釋云顯宗十一亦同識身故顯宗改頌云三界染如次得七六二種色善二學三二無餘自得正理二十雖不改頌長行意同識身文依今此所引勘顯宗論十一説偈頌結三界染如次得七六二種色善二學三二無餘自得長行或云界退還時得自界四從上界沒還生欲界之時得自界無覆無記心判若不串習者彼二無記心無前後得者豈可界退還時得之哉或云色界善心正現前位十二心內容得二心謂自善心無覆無記由升進故若有學心正現前位十二心內容得三心謂有學心及色無覆並無色善色界善心及有學心現在前位不得欲界無覆無記心見若不串習者彼二無記心無前後得者以色界善心及有學心離欲界染第九解脫道位初得欲界通果心何不云色界善心及有學心現在前位得欲界無覆無記心哉準此顯宗論明文可知正理論實義也何況撿正理論二十或一本文或述界退還時除自無覆定得自界善等三心畢云理亦應言得自無覆以本論説成不善心欲無覆心定成就故或述色界善心正現前位十二心內容得三心謂自善心及欲色界無覆無記由升進故畢云理實不得欲無覆心以於先時定成就故或述若有學心正現前位十二心內容得四心謂有學心及欲色界無覆無記並無色善畢云理亦不得欲無覆心義如先辨任此等文正理論意不串習者欲界威儀工巧心有前後得云事甚分明也光法師正理二十雖不改頌長行意同識身之釋即指此本一段長行之文歟但於光法師此論正理婆沙雜心亦據不串習者等之釋者披正理論當卷文云又威儀路四蘊之得多分世斷及剎那斷唯除諸佛馬勝苾芻及餘善習威儀路者若工巧處四蘊之得亦多世斷及剎那斷除毗濕縛羯磨天神及餘善習工巧處者文顯宗論文全亦同之此偏載婆沙雜心今論等常途義勢雖非顯衆賢論師本意且就現文云正理亦據不串習者歟問雜心論意不串習者欲界威儀工巧處可有前後得耶答不可有前後得也兩方若有前後得者披光法師解釋云此論正理婆沙雜心亦據不串習者所以有不成就文如此釋者彼論意不串習者欲界威儀工巧心不可有前後得見若依之爾者今論餘處七中難雜心師説云於善心中應言得七文正理論師代雜心師義救此難云理亦應得欲界善心謂以正見續諸善本雖加欲善除無覆心經主不應難令得七文光法師釋此文云彼論同識身離欲染不得欲界文若雜心論意不串習者欲界威儀工巧心無前後得者寧可云同識身哉答勘雜心論九文或明得心多少云善心得六種者善心中明六心欲界不隱沒無記色界善不隱沒無記無色界善及學無學此亦通説非一時得文若不串習者欲界威儀工巧心有前後得者從上界沒還生欲界之時可得欲界不隱沒無記心何云善心現前位得之哉或九云威儀四蘊多以世斷及剎那斷得若彼善修者三世得工巧亦如是文不串習者欲界威儀工巧心無前後得之旨此文亦炳然也故光法師雜心亦據不串習者之釋妙叶彼論説者歟加之泰法師釋云若依雜心及俱舍從上界沒生欲界時皆不得欲界不隱沒無記心與識身論相違善作論主者立義別也亦可雜心俱舍據欲界不極數習威儀工巧者命終生上界後退生欲界初心不得欲界不隱沒無記心也文元瑜法師餘處釋云今意二解後代論師於識身文不善思擇代習此解相傳不改便為指定不更推求是故法勝尊者法上所師世親菩薩衆賢論主皆作此釋識身文一切威儀及工巧處心皆有三世得故生欲界此心定成於欲界還位欲染心中應言定得欲界無覆文若爾任雜心論現文準諸人師定判彼論意不串習者欲界威儀工巧心無前後得云事甚分明也誰可疑之哉但於光法師餘處彼論同識身等之釋者正理論師代雜心師説以自所存理亦應言得自無覆以本論説成不善心欲無覆心定成就故之意救世親論主於善心中應言得七之難故彼論者雖指雜心論寄自義同識身云也問光法師意初靜慮善身語表可發無表耶答不可發無表也兩方若發無表者婆沙論中色界表業不發無表見若依之爾者披今論文述有覆無記身語表色唯有俱得無前後得云而亦不能發無表故文而準光法師初定善身語表亦唯有俱得後得之釋思之初靜慮善身語表色有法後得者何不發無表哉答勘婆沙論百二十二文云此中所説決定義者欲界必無隨心轉無表色界必無依表發無表文任此文初靜慮善身語表不發無表云事甚分明也但於今論文並光法師釋者見今論具文云謂諸有覆無記表色得亦如前但有俱起雖有上品而亦不能發無表故勢力微劣由此定無法前後得文此文意云有覆無記身語表色不發無表故勢力微劣唯有俱得無前後得為言初靜慮善身語表不發無表故總相而言雖勢力微劣其勢力強自有覆無記身語表色有法後得更非所遮故光法師初定善身語表亦唯有俱得後得之釋亦無相違也問於定共戒法前法俱二得現前位必可有法後得耶答可有二意也兩方若必有法後得者於定共戒其類區分法前法俱二得現前位何必可有法後得哉是以披正理論三十六餘處文於定共戒法前法俱二得現前位不必有法後得見若依之爾者得靜慮律儀恆成就過未者性相之所定也於定共戒法前法俱二得現前位必可有法後得哉答光法師餘處十四釋今論諸有獲得靜慮律儀乃至未捨恆成過未餘生所失過去定律儀今初剎那必還得彼故之文作從思惠入暖善根初剎那位得不得無始所失過去定共戒之二釋初釋云解云從思惠入暖初一剎那亦修異類故亦得彼無始所失定第二念後唯修同類從多分説不修異類文如釋意任得靜慮律儀恆成就過未之理會要同分者方能修故之文也若依此釋意者於定共戒法前法俱二得現前位必可有法後得也第二釋云又解據福分説初得定時必成過未若約決擇分初得定時不成過去故正理三十六云諸有獲得靜慮律儀乃至未捨恆成過未前生所失過去定律儀今初剎那必還得彼故此中應作簡別而説以順決擇分所攝定律儀初剎那中不成過去餘生所得命終時捨未生無容重得彼故文此釋意任要同今者方能修故之理會得律儀恆成就過未文也若依此釋意者於定共戒法前法俱二得現前位不必有法後得也此二釋意深可思之此事依為餘處論議委悉難答併以省略至第十四卷之處可記録之問非得可通異熟生耶進云光法師所引婆沙論云隨等流性文付之非得隨所依判性類者性相之所定也其所依中命根唯限異熟生衆同分亦通異熟生隨所依判性類之時非得可通異熟生也是以光法師明非得三性門釋一切非得無覆無記以諸非得皆隨所依命衆同分無記性故畢引婆沙論百五十八彼定不隨所不得法以相違故又不隨道非道所求故但依命根衆同分轉故隨所依性類差別之文任此解釋非得隨命根判性類見若隨命根判性類者非得寧不通異熟生哉答披今論餘處五文偈頌結非得定等流長行述非得二定唯是等流唯言為明非異熟等正理十四顯宗兩論之文全亦同之依之光法師五釋非得二定於五類中唯是等流從同類因生故非業滅故非異熟元瑜法師判一切非得皆無覆無記性以諸非得皆隨所依非作意起如界同分等流性攝準此等定判非得唯限等流性不通異熟生云事甚分明也但於非得所依中命根唯限異熟生衆同分亦通異熟生隨所依判性類之時非得可通異熟生云難者非得所依雖通命根衆同分等流義遍異熟義狹故判非得性類唯隨等流同分也故光法師所引婆沙論百五十八云隨等流以義遍故異熟非遍故不隨立文次於光法師釋並所引婆沙論文者判非得性類雖唯隨等流同分於其所依中且舉具命根也非謂隨彼命根判其性類解釋論説有何相違哉問光法師所引婆沙論百五十八中出唯有法前非得法云謂未來情數畢竟不生法文爾者今此畢竟不生法者通一切未來不生法歟答光法師意唯限三類智邊世俗智不通一切未來不生法也兩方若通一切未來不生法者光法師釋此文云畢竟不生法謂三類智邊世俗智等文如此釋者不通一切未來不生法見若依之爾者文不置簡別之言云謂未來情數畢竟不生法廣可通一切未來不生法也如彼由所緣闕五識身等得非擇滅豈非未來情數畢竟不生法哉是以披寶法師解釋云言畢竟不生者簡暫不生法也如眼識等闕緣不生故亦得名畢竟不生得非擇滅文光法師意其義可同如何答解婆沙論今文光寶二師其意各別光法師釋意云設雖得非擇滅法非本來畢竟不生法其種類中有現起法不限法前非得未來亦可有法後非得故舉唯有法前非得法云謂未來情數畢竟不生法唯可限三類智邊世俗智為言故光法師釋此文云畢竟不生法謂三類智邊世俗智等此法既畢竟不生所以唯有法前非得文圓暉法師引婆沙論文釋未來情數畢竟不生法者謂是三類智邊所修俗智也其意同之但於由所緣闕五識身等得非擇滅豈非未來情數畢竟不生法哉云難者如眼與意專一色時餘識等五境落謝過去容緣彼境界五識身等由所緣闕留未來世得非擇滅全非本來畢竟不生法若彼色等境不落謝過去能緣五識容現起法故約容有義未來世中亦可有法後非得也故婆沙論百五十八云二有所不得法通有法前法後非得謂諸餘有情數法之中可攝此等法也次於寶法師釋者其意異之寶法師意云法前法後非得就現起定其體在未來時法前法後其義未定若未來法得非擇滅永不生者現起非得有法前故唯有法前非得若未來法遇緣現前落謝過去現起非得非得亦有法後故總論之通有法前法後非得也故唯有法前非得法不限三類智邊世俗智廣通一切未來不生法為言人師異釋不可和會之也重難云見泰法師所引婆沙論文云一有所不得法唯有法前非得謂一切未來定不生法文勘現行本多如此文光法師所引一有所不得法唯有法前非得謂未來情數畢竟不生法之文其言雖替其意可同例如云未捨必起彼類盡故述先不成時必起非得故文言大替義道全同若爾既云謂一切未來定不生法明知不限三類智邊世俗智廣可通一切未來不生法云事光法師釋猶似難思答光法師意謂一切未來定不生法之本與謂未來情數畢竟不生法之文其意是同唯限三類智邊世俗智可得意也其種類中有現起法生不生義容不定故設雖後時緣闕不生義定得非擇滅未來世中本來可有法後非得故舉有法前非得非云謂一切未來定不生法唯限三類智邊世俗智不通一切未來不生法可云也如彼如眼與意專一色時餘色等五境落謝過去容緣彼境界五識身等由所緣闕留未來世得非擇滅等生不生義本來未定何可名未來定不生法哉故云未來定不生法與謂未來情數畢竟不生法之文其意是同唯限三類智邊世俗智不通一切未來不生法為言但於一切之言者可通一切三類智邊世俗智故全非相違歟問不時解脫聖者所起盡智可有法後非得耶答不可有法後非得也兩方若有法後非得者不時解脫聖者所起盡智更無捨緣何可有法後非得哉若依之爾者見光法師解釋列唯有法前非得法中雖舉無生智無出盡智爰知不時解脫聖者所起盡智可有法後非得云事如何答不時解脫聖者一起盡智之後永無不成就義故不可有法後非得之理必然也但於光法師列唯有法前非得法中雖舉無生智無出盡智云難者無生智唯不時解脫聖者起之故起無生智之後永無不成就義故光法師釋此無生智等一得不退故亦無有法後非得也盡智時解脫不時解脫聖者俱起之故不時解脫聖者所起盡智雖無法後非得時解脫聖者所起盡智或退失時或練根位可有法後非得故總見盡智一類通有法前法後非得故列唯有法前非得法中不出盡智尤有其謂何致其疑哉問光法師為證所不得法中無唯有法後非得句引婆沙論何文耶進云光法師引婆沙論非無始來恆成就彼未捨必起彼類盡故之文證之也付之依光法師所引披婆沙論所説云非無始來恆成就彼先不成時必起非得故文泰法師所引即如今現文若爾光法師所引之文二句異彼論説十六十七字致其相違豈非大疑哉次云未捨必起彼類盡故述先不成時必起非得故其意如何可同哉答光法師為證所不得法中無唯有法後非得句引婆沙論亦無唯有彼法後非得非無始來恆成就彼未捨必起彼類盡故之文畢問如斷有頂見惑必無有退已入過去者豈非唯有法後非得答之作三釋云解云所不得法約法種類説有非得有頂見惑種類衆多已入過去雖復但有法後非得在未來者即有法前非得故彼有頂過去見惑不可得説唯有法後非得又解過去見惑今雖但有法後非得脫不現前即有法前非得約容有説言有法前又解過去見惑約世而言唯有法後非得而無法前非得由彼過去惑有未來法前非得故亦名有法前非得此未來一類非得約世橫望實在過去惑後而名法前非得不名法後非得者以此非得不起即已起必在彼法前由彼非得約容起用辨前後也由斯過去惑亦有法前非得此中三解應知準前道類忍説文初釋意云有頂過去見惑雖唯有法後非得無法前非得彼未來見惑有法前非得故約種類彼過去見惑有法前非得成不可得説唯有法後非得為言第二釋意云有頂過去見惑雖唯有法後非得無法前非得若不現前者即容法前非得起故約容有義彼過去見惑有法前非得為言第三釋意云有頂過去見惑約世而言雖唯有法後非得無法前非得約容起用辨前後者彼過去見惑實有未來法前非得為言但於光法師所引之文二句異彼論説十六十七字致其相違云難者遍覺三藏蒙寶法師難初改婆沙論文所不得法中加唯有法後非得句以為四句長安流行多本是也寶法師釋即顯此旨次改四句本如翻釋初唯三句釋無唯有法後非得句云非無始來恆成就彼先不成時必起非得故泰法師所引本是也後亦改此文云非無始來恆成就彼未捨必起彼類盡故光法師寶法師圓暉法師等所引本是也婆沙論有多異本故疑難被出之文當其一本人師各別其時流行之本故二句相替十六十七字有其不同也準製疏之時代推改文之前後其次第可如此歟次未捨必起彼類盡故之本意非無始來恆成就有頂見惑未斷捨位必起彼見惑盡令入過去故斷捨彼過去見惑時未來見惑同被斷捨法前非得起故約其種類過去見惑不許唯有法後非得為言先不成時必起非得故之本意云非無始來恆成就有頂見惑彼先起見惑不成就時必起法後非得故未來見惑同不成就法前非得起故約其種類過去見惑不説唯有法後非得為言故云未捨必起彼類盡故述先不成時必起非得故其言雖異其趣是同也重難云未捨必起彼類盡故之本其意實顯也即訓之云非無始來恆成就彼未捨必起彼類盡故文先不成時必時非得故之本如何可訓之哉如今料簡者先不成時之時字其義似不符順是一次勘世流布婆沙論多本云先不成時必起非得故文所不得法中加唯有法後非得句以為四句之本並未捨必起彼類盡故之本近代之間何處有之哉是二次見大宋高僧傳四云奘初譯婆沙論畢寶有疑情以非想見惑請益之奘別以十六字入乎論中以遮難辭寶白奘曰此二句四句為梵本有無奘曰吾以義意觸情作耳寶曰師豈宜以凡語加聖言量乎奘曰斯言不行我知之矣文今所云二句四句者指何文哉是三答先不成時必起非得故之文意無替未捨必起彼類盡故之會通即訓之云非無始來恆成就彼先不成時必起非得故文遁難之志兩本是同也但先不成時之時字全無所背過去見惑不成就起法後非得時即未來見惑同不成就起法前非得云故今此時字尤有其由也次世流布婆沙論中多有所不得法加唯有法後非得句以為四句之本歟披珍海已講婆沙論抄出云亦無唯有彼後非得非無始來恆成就彼先不成時必起非得故文或本論無此文直云唯法後非得者非想地見惑也文寶法師俱舍疏云新婆沙論今有二本現行可考之文巳上珍抄或抄出云石山寺舍那院本加唯有法後非得句以為四句件本以東南院未軸本比校之彼東南院本去治承四年南都炎上之時燒失畢云云勘策源律師相傳本云所不得法則有四種一有所不得唯有法前非得謂一切未來定不生法及入無餘𣵀槃時最後剎那諸蘊二有所不得法唯有法後非得謂諸餘有情數法四有非得可與法俱以法現在前時是所得者必有得故非所得者無得非得故文我朝之中近代之間所不得法則有四種之本既多傳來流行況於異朝哉況於上代哉寶法師釋見今長安多本流行猶作四句何強疑之哉次未捨必起彼類盡故之本非只為光法師寶法師圓暉法師所引輔正記九中牒疏九記及婆沙一十六字置進退在人何關聖旨之文云非無始來恆成就彼未捨必起彼類盡故者此十六字為遮非想見惑難破云謂唐三藏譯婆沙畢寶法師以非想見惑難三藏言合唯有法後非得其難意者非想見惑無始來無法前非得見道斷已畢竟不退於過去見惑理合唯有法後非得何故無耶三藏於婆沙加十六字為通此難文唐朝諸師舉引此文定知其時流布專在此本云事故見唐本文云亦無唯有彼後非得非無始來恆成就彼未捨必起彼類盡故文次於大宋高僧傳二句四句言者實以難思然而既以非無始來恆成就彼等十六字為二句四句故推之八字為一句者二句也四字為一句者四句故含此二義云二句四句歟私云伺諸師定判案解釋旨趣雖見婆沙論中有三本不同度度改文極為難信而今弘長三年八月十日尋訪婆沙論多本披覽所不得一段之處東大寺尊勝院知足院並笠置寺護法所及當山經藏安置之本云先不成時必起非得故文笠置寺彌勒堂經藏安置之唐本云未捨必起彼類盡故文策源律師相傳本云所不得法則有四種文親感得三箇異本知實有數度改文歟問婆沙論文明所不得法中無唯有法後非得句云非無始來恆成就彼未捨必起彼類盡故文爾者寶法師意可許此義耶答不許此義也兩方若許此義者寶法師引此文畢由不得婆沙意故由未盡理文如此釋者寶法師意不許此義見若依之爾者披圓暉法師解釋云唐三藏為通有頂過去見惑應有唯法後非得云難於婆沙加一十六字文取意是既遍覺三藏所加之言也寶法師何不許此義哉何況今此一十六字所述之趣專有道理尤可許之也如何答寶法師意不許非無始來恆成就彼未捨必起彼類盡故之會通也其故今此文顯意云斷有頂見惑之時彼過去見惑雖唯有法後非得未來見惑有法前非得故約其種類過去見惑不説唯有法後非得為言故光法師作三釋中初釋云所不得法約法種類説有非得有頂見惑種類衆多已入過去雖復但有法後非得在未來者即有法前非得故有頂過去見惑不可得説唯有法後非得文而寶法師引婆沙論今文畢難之云然此文是被難之後重改婆沙然此不順得中六句應云以不定故容有二種非得以非想地過去見道煩惱於過去世中煩惱未起之前皆容入聖若未起時即斷見惑即此煩惱即有法前非得由此説過去煩惱不得名為唯法後非得若作此釋即順得中六句即同自餘通二非得由不得此意被將過去見惑唯法後非得難應成四句通難不得遂改婆沙以為四句見今長安多本流行猶作四句於後數年重改論文唯有三句遂加文遮難云非無始來等一十六字通此妨難由不得婆沙意故由未盡故理文此難意云按婆沙論中於所得法分別六種之文意現在道類忍雖無法前得起道類忍若不現前者容法前得起故無簡別以道類忍為唯有俱得前得句現在未來別解脫戒雖無法後得起此別解脫戒至過去世容法後得起故無簡別以別解脫戒為唯有俱得後得句是則未來無有前後諸法現起不定故也準此理思之若彼有頂過去見惑不起之前入聖道者容法前非得起故由此不定故彼過去見惑不説唯有法後非得也然今文意不説此旨只約種類未來見惑有法前非得故過去見惑不説唯有法後非得云故由不得婆沙意故由未盡理為言但於遍覺三藏所加之言也寶法師何不許此義哉云難者雖遍覺三藏所加之言自本舉應唯有法後非得句云難之上會通之趣猶非盡理云
