body:
  text: 俱舍論第十九卷抄下問題問聖者未斷不起隨煩惱唯限不善惡作歟問聖者可起邪慢耶問異生位可有未斷不起類耶問忍善根位可起五見疑煩惱耶問現在五見名一念中除相應俱有法遍緣五部一切法類可有耶問遍行隨眠中可有唯緣一部類耶問修所斷隨眠可緣上界耶問九上緣惑可為遍行因耶問欲界九上緣惑與無覆無記眼識為異熟因歟問他界緣遍行隨眠可通無漏緣耶問光法師釋今論此二非見是邪智攝文云言邪智者謂無明相應邪智文爾者寶法師意可許此義耶問疑相應慧可名智耶問光法師意無覆無記心可緣上界耶問寶法師意無覆無記心可緣上界耶問光法師意通果無記心可緣心及名等耶問遍行隨眠相應心王遍行攝歟問已斷遍行因可起與果用耶問婆沙論中引品類足論説云九十八隨眠中三十三是遍行六十五非遍行文爾者三十三是遍行中無明可通相應不共耶問無色界可有他界緣遍行隨眠耶問見滅道所斷有漏緣惑互可相緣耶問色界上緣惑可緣憂根斷道耶問中間禪可有見惑耶問頌文云緣道六九地文爾者滅道法智所證離繫得唯限六地攝歟問道諦所斷無漏隨眠中可有不緣心品唯別緣道共戒得四相類耶問無色界道諦所斷無漏緣隨眠可緣下地能治類智品道耶問光法師意於見修所斷煩惱對治決定對治不定義如何釋之耶問見苦集所斷法中可有唯為相應隨增不為所緣隨增類耶問以煩惱俱時四相等望同時煩惱可有繫縛義耶問慢煩惱可為斷善根牢強加行耶問處中無表可有離染捨耶
