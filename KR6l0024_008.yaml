不簡彼二通哉二通是五識攝唯在意言中不可攝之故也爰知寶法師意通果心唯限意識不通五識借識之類不除二通悉自性無記云事是五答婆沙論者五百阿羅漢之所造一切有部宗之本論也俱舍源出自彼諸師舉依憑之寶法師爭不依用説五識通果無記之文哉是以見寶法師解釋第二述二十心中説威儀工巧唯是意識會婆沙論説云然婆沙説四識五識有威儀工巧心此就威儀工巧加行中説為威儀工巧如殺加行亦名殺生文寶法師若不依用婆沙論説者豈可會通之哉但如彼許自性無記心心所婆沙論説之上添自義也全非不依用之次寶法師餘處據化心説之釋尤為此義證據還如是三心唯是意識之論文云此説通果心唯意識據化心説會唯是意識之言云事甚分明也如次上文述威儀工巧唯是意識非是五識之旨會婆沙論説云婆沙云是威儀工巧者唯加行也但明諸心相生亦唯意識者亦變化心唯限意識明諸心相生亦唯就意識論之為言亦言更有何疑殆哉次準此借識非通果也之釋亦為此義潤色此釋意依正理論中生上三靜慮所起初靜慮眼耳身三識與上三靜慮善染無記三種作意相生見文證泛借起眼耳身三識非通果無記故天眼天耳二通唯與定相生有何故可非通果無記哉準之還知二通通果無記云事也次會通寶法師當卷問答之旨義勢同前問言實云生上三定起下眼耳二通是何無記雖問二通其志廣問借識之類欲成泛爾起耳識等自性無記四無記心攝心不盡之義也但其第二通果心唯是意識不通五識者就變化心論之為證此事引今論廣心威儀路等三無覆心色香味觸為所緣境工巧處等亦緣於聲如是三心唯是意識之文而此文寶法師自第七釋據化心説故非變化心述唯是意識云事炳然也其第二通果心定唯意識之文無異論之釋其意同之次會通餘處問答之趣亦以同前會問言不異當卷解釋其志廣問借識之類也以何知之者答此問出有人泛借起眼耳身三識威儀無記云義問意若限二通者答中何舉三識哉何況寶法師難此有人義明發語表心非威儀無記之理破之爰知今問廣問借識之類云事若爾答之云何妨四無記亦攝心不盡判此借識心是自性無記專欲成泛爾起耳識及發語表心非威儀無記之義成泛爾起耳識及發語表心非威儀無記畢四無記心攝心不盡之旨即顯故也但變化唯在意非變化無記者且舉意識通果無記簡之不必簡通果無記種類盡歟重難云見識身足論文出無記眼識無記為因非善及不善為因之類云謂威儀路工巧處眼識及梵世所繫染汚眼識文若天眼通通果無記者何不舉通果心哉答盡理云之無記眼識無記為因非善及不善為因類中可列通果心天眼通相應識即可此類也但識身足中出此類不舉通果心且略之也何求別由哉彼論次下文出無記意識無記為因非善及不善為因之類云謂威儀路工巧處意識及色無色所繫染汚意識不舉通果心亦略之也尋云泛借起眼識身識中可有自性無記類耶答成四無記心攝心不盡之旨者泛借起眼身識中可有自性無記類更非所遮也尋云發身表心中可有自性無記類耶答問光法師引婆沙論明相續內外相爾者可有離質自身耶答可有離質自身也兩方若有離質自身者既自身寧可離本質哉是以見寶法師餘處一解釋云二準婆沙評家義及此論下文色界身作欲界化所化香味如莊嚴具尚不成就如何離質語得成就耶文若有離質自身者何不成就離質化語哉若依之爾者光法師餘處解釋中可有離質自身見如何答見光法師餘處二十解釋云問異界化色觸皆成就不解云皆成就如婆沙一百三十二云有成就欲界繫大種亦色界繫大種謂生欲界色界大種現在前若生色界作欲界化發欲界語又云有成就欲界繫大種亦色界繫所造色謂生欲界得色界善心若生色界作欲界化發欲界語又云有成就欲界繫所造色亦色界繫大種謂生欲界色界大種現在前若生色界作欲界化發欲界語又云有成就欲界繫所造色亦色界繫所造色謂生欲界得色界善心若生色界作欲界化發欲界語婆沙既言若生色界作欲界化發欲界語成就欲界大種及所造色文不別簡明知異界化若化自身若化他身色觸二種皆悉成就義準應知若即身化若離身化若離身化亦皆成就文此釋意自身化他身化即身化離身化各別論之見推其意云自身上化作種種形各自身化他有情身及木石等上化作種種形并通惠成滿位無所依託化作種種形皆名他身化若自身上若他身上附著身作化事名即身化若自身上若他身上不附著身作化事名離身化也故自身上不附著身如籠張涓著自身上作化事可名離質自身化也如此得意之時既云自身不可離本質之疑自被會畢但於寶法師餘處解釋者光法師意云成就離質化語故寶法師定判既異此意不及和會也問論文云我執依止故假説心為我文光法師釋此文作三解釋爾者第三釋意我執可通無漏心耶進云光法師釋云二者取執謂一切心於境自在執取前境皆名我執我執通無漏心見付之廣勘諸經論説無漏心不帶我執見何釋我執通無漏心哉是以見今論次下文為證説心為我引契經由善調伏我智者得生天之文并應善調伏心心調能引樂之説既云調伏心明知我執唯限有漏心云事如何答見今論文釋六根六識十二名內云我依名內外謂此餘文就之問我體既無內外何有答之云我執依止故假説心為我文此文意以一切心皆名我執依止云事甚依難思光法師釋此文作三解釋其中第三釋云又解我執有二一者迷執謂即我見但緣有漏二者取執謂一切心於境自在執取前境皆名我執二執所緣雖通諸法心強勝故偏名依止故於此心假説為我此解依止遍通諸心可無妨矣文此釋意云一切心品於境自在執我取前境皆名我執故依此門論之我執通無漏心為言若爾非謂迷執通無漏心諸經論説何為相違哉但於今論所引契經二文者依我執依止之義以心名我之時有漏心是本故且出之許也於境自在執取前境故立我執稱之時更非遮我執通無漏心歟問現在心所以別性意根為所依歟答可為所依也兩方若為所依者披光法師解釋明心所不名內云雖諸心所依彼心王同一生等不名內者異類相望非所依故不名為親文如此釋者現在心所唯以同性意根為所依見若依之爾者現在心王既以別性意根為所依同時相應心所何不以彼意根為所依哉答現在心王既以別性意根為所依同時相應心所同以彼意根為所依之義必然也故見光法師餘處四解釋云謂心心所五義平等相似故説相應一所依平等謂必同所依根意識及相應法有一種依謂無間滅意根五識及相應法各有二種依一同時依正根二無間滅意根隨應皆是所依平等文此釋意六識及相應心所同以同性別性無間滅意根為所依云事甚分明也但於光法師異類相望非所依故之釋者心王與同性別性心心所但為所依故異類相望有所依義故名為內心所雖與同時相應同性心心所為所依不與異時同性別性心心所為所依故異類相望無所依義故不名內為言此釋非無所據源依正理論文故正理論六云又諸心所雖復興心一生住等而心望心獨名為內非心所者同異類心展轉相望為所依性皆不捨故諸心所法異類望心必定捨離能依性故謂若善心染汚及無記心為所依性皆不捨離染汚無記心亦如是若善心所望彼染汚及無記心捨能依性染汚無記望餘亦爾故心望心為所依性無相簡隔得名為內心所望心為能依性有相簡隔不得內名又諸心望同類心為能依性或多或少心為所依則不如是由此內名在心非所文此文意心所不與別性心心所為所依故不名內之旨炳然也若爾異類相望非所依故之釋全非謂現在心所不以別性意根為所依何舉今釋猥致此疑哉問正理論中明説心為我我恆於自境自在行故文爾者光法師引此文如何釋之耶進云光法師釋云若作俱舍師破不異我前第三解也文付之光法師第三釋意云心是我執所緣故從能緣名我正理論意釋約心自體恆於自境自在行故名我彼此二文義門遙異更不可難不異我前第三解也是以寶法師難光法師今解釋云今詳前第三解與正理師其意全別如何是同文何況正理論説設雖不異我解何可有其過哉答見正理論六文云若爾何緣説心為我恆於自境自在行故我謂於自境常自在行心曾無有時不行自境故一切心皆名為我文此文意不異光法師第三解二者取執謂一切心於境自在執取前境皆名我執之釋故光法師作俱舍師破云不異我前第三解也解釋尤有其謂哉但於光法師第三釋意從能緣名我正理論意約心體名我云難者光法師第三釋意云二執所緣雖通諸法心強勝故偏名依止之名雖從能緣述謂一切心於境自在執取前境皆名我執我執之稱約心自體故更無異正理論説也如此得意之時寶法師解釋還有其疑者哉次於正理説設雖不異我解何可有其過哉云難者正理論師破今論我執依止故假説心為我之文畢成自義云恆於自境自在行故故不異我前第三解得今論文意何為別義舉之哉破也問論中明十八界同分彼同分相爾者立同分稱唯限現在歟進云論疏中通三世見付之於作自業立同分稱唯限現在不可通過未例如立有執受稱唯限現在如何答披諸論定判尋十八界同分相今論云此中眼界於有見色已正當見名同分眼如是廣説乃至意界各於自境應説自用文正理論云且同分眼説有三種謂於色界已正當見如眼耳舌身亦然各於自境應説自用意界同分説有三種謂於所緣已正當分色界同分説有三種謂眼所見已正當滅廣説乃至觸界亦爾各對自根應説自用眼等六識依生不生立二分故如意界説文顯宗論説一宗無替婆沙論七十一中委明此本其文雖繁其意同之即述意界彼同分相云及彼同分者謂未來畢竟不生意界無有過去現在意界是彼同分心心所法必託所緣方能起故由未來當生意界亦必是同分文任此等諸論文意同分稱廣通三世云事甚分明也但於立有執受稱唯限現在云例難者光法師自問答也即問過未曾當用皆説名同分過未曾當覺皆應名執受答之作二解釋云有執受義異體相有要假相依方成有義故唯現在同分據有作用用非離體故約曾當皆名同分又解分是類義可以遍收同類執受非類所以唯局現在文解釋先顯其差異學者何勞此例難問光法師意舊俱舍論中罽賓國師名西方師歟進云光法師釋云然舊俱舍云是西方師文付之依光法師解釋見舊俱舍論文云罽賓國師説非等分眼有四種乃至西方諸師説有五種罽賓國師之外別舉西方師義明知罽賓國師是各別師云事如何答光法師釋迦濕彌羅國毗婆沙師説彼同分眼但有四種乃至西方諸師説有五種之論文云迦濕彌邏迦云惡濕彌邏云名舊罽賓訛也然舊俱舍云是西方師翻者謬也西方諸師即是迦濕彌羅國西方健馱羅國彼亦多有説一切有部師文此釋意舊俱舍論中罽賓國師名西方師見若爾令此解釋既替現行舊俱舍論説推之光法師所覽本中有此文歟或一義云勘舊俱舍論餘處三文云罽賓國毗婆沙師説先入無心定後得盡智文披今論餘處五文云西方師説菩薩學位先起此定後得菩提文任今此新舊二論説舊俱舍論云罽賓國毗婆沙師説今論云西方師説故罽賓國師即西方師見光法師解釋若依此文歟重難云此義料簡舊俱舍論文之旨甚不可然見彼論具文云罽賓國毗婆沙師説先入無心定後得盡智是義不然文此文意云罽賓國毗婆沙師意西方諸師先入無心定後得盡智者是義不然為言非謂罽賓國毗婆沙師意存先入無心定後得盡智罽賓國毗婆沙師能破西方諸師義之人也能破所破定是別人云事炳然也若爾此文還為難者潤色更非答之證據哉問論中明彼同分眼云西方諸師説有五種謂不生法復開為二一有識屬二無識屬文爾者光法師如何破之耶進云光法師破云彼於不生開為二者此解不然若猶不生有根無識生中亦有何獨不生𠃍生既不開不生如何別立此即違理文付之可生眼根中有識屬者是同分無識屬者彼同分也若爾可生眼根中不可有有識屬彼同分何破可生彼同分眼根中可開二類哉答迦濕彌羅國師意一切眼根皆有識屬若過生緣眼識現起即是同分若餘識起眼識不生名彼同分無識屬者識都不可依之義也寧有眼識根中非眼識所依之類哉以此道理思之一切眼根皆有識屬更不可無有識屬類故寶法師釋云薩婆多師釋是正義不許有識不與根合文泰法師釋云若依正義一切眼皆有識屬應依故無識屬不正義也文而西方師意云不生眼根中有或可與識合或本來不與識合之二類故若許爾者可生彼同分眼根中可有或雖有可與識合之義餘緣被障眼識不起故不見色或本來不與識合故不見色之二類若可生彼同分眼根中無此二類者不生眼根中亦不可別立之破也元瑜法師解釋亦同光法師定判諸師一同難破即存此意歟若爾可生眼根中有識屬者是同分無識屬者彼同分云難甚不可然哉問論文云迦濕彌羅國毗婆沙師説彼同分眼但有四種文爾者從婆沙會前有此義歟答從婆沙會之前可有此義也兩方若從婆沙會前有此義者披光法師解釋判造婆沙時既取四種為正婆沙會時初有此義見若依之爾者彼同分眼但有四種者是有部本義也從婆沙會之前何無此義哉是以健陀羅國師意彼同分眼但有四種者從婆沙會之前有此義見相例可同如何答迦濕彌羅國師意彼同分眼但有四種者從婆沙會之前可有此義也故勘識身足論十二文云何彼同分眼處謂彼同分眼處或過去或未來或現在云何過去彼同分眼處謂諸眼處不見色已滅云何未來彼同分眼處謂諸眼處或在未來定不當生或有當生不見色當滅云何現在彼同分眼處謂諸眼處不見色今滅文而識身足論者釋尊𣵀槃之後一百年中所造故從婆沙會之前有此義云事炳然也但於光法師造婆沙時既取四種為正之釋者正見解釋前後之文婆沙七十一云舊此國師説有五種西方諸師説有四種今此國師説有四種西方諸師説有五種造婆沙時既取四種為正明知説五非理此即文證文此釋意云從未造婆沙論之前迦濕彌羅國毗婆沙師意雖説彼同分眼但有四種造婆沙論之時決判今此國師説有四種西方諸師説有五種二義邪正今此國師説有四種取為正義為言若未造婆沙論之前此國不説彼同分眼但有四種者造婆沙論之時何定兩國師義之是非哉爰知從未造婆沙論之前有此義云也問一有情眼根見色境時望餘有情可名同分耶進云今論云眼若於一是同分於餘一切亦同分文付之一有情眼根見色境時望此見色有情可名同分望餘有情更不可立同分稱是以於色境者望此見色有情名同分望餘不名色有情名彼同分相例可同如何答光法師釋眼若於一是同分於餘一切亦同分彼同分亦如是之論文云根是不共一人之根必無多人同用此眼而得見色故根不共五境容有多人受用故名為共由不共故一起用時名為同分所餘一切不起用者望此眼亦同分彼同分亦爾由色共故於此色等起見等者名同分不見等者名彼同分文此釋意云六根是不共法故一有情眼見色之時必無餘有情同用此眼根見色之義故望餘若見色若不見色有情此見色有情眼根亦名同分五境容有多人共受用法故望此見色有情名為同分望餘不見色有情名彼同分為言寶法師泰法師釋其意同之正理論六顯宗論三文其趣無替加之見婆沙論七十一文云諸見色眼於自有情名同分眼於餘有情亦名同分諸不見色眼於自有情名彼同分眼於餘有情亦名彼同分文任此等定判一有情眼根見色境時望餘有情亦名同分云事文理甚分明也但於色境例難者會通之旨已顯光法師解釋文重勘婆沙論七十一文會此例難云容一色界多有情見無一眼界二有情用故謂有色界一有情見容二三四乃至百千有情亦見是共見故諸有見者此色界於彼名同分諸不見者此色界於彼名彼同分無一眼界二有情用況多有情是不共故諸用此眼能見色者此眼於彼名同分諸餘有情眼若見色若不見色此眼於彼亦名有作用眼既是不共於一切時相恆定故文重難云一有情眼根見色境時以此眼根望餘若見色若不見色有情亦名同分云事其義實可然不及重難之但光法師所餘一切不起用者望此眼亦同分之釋餘不見色有情眼根望此見色有情眼根亦同分見婆沙論七十一諸餘有情眼若見色若不見色此眼於彼亦名有作用眼之文餘若見色若不見色有情眼根望此見色有情眼根亦名有作用眼見若爾此等定判甚似難思既餘有情不見色眼根也更不可名同分眼又不可云有作用眼哉答餘不見色有情眼根望此見色有情眼根亦名同分之義假不可有事也但光法師釋意云望所餘一切不見色者此見色有情眼根亦名同分為言婆沙論文料簡同之望諸餘有情眼若見色若不見色此見色有情眼根亦名有作用眼為言此眼者指此見色有情眼根於彼者指餘若見色若不見色有情亦名有作用眼者指此見色有情眼根也光法師釋婆沙論文如此得意之時全無相違歟問光法師釋香味觸共境相作三解釋爾者第二釋意如何釋之耶進云光法師釋云又解猶如兩人舌身三根各相著同嗅中間香同嘗中間味同覺中間觸故名為共文付之兩人受用香味觸時各可取別香味觸於一極微寧可有兩人共受用義哉是以今論中云皆有可生等識義約容有義釋共境相見如何答見今論文述香味觸三界共境相云雖有是理而容有共所以者何香等三界於一及餘皆有可生等識義眼等不然故如色説約容有義明共境相故光法師解此文雖及異釋何釋意約容有義釋共境相是必然也即於光法師一段解釋可料簡之初釋云色聲二境有多有情同共見聞故名為共香味觸三雖於一人根正合時餘不能取若在未來根未合時於一及餘皆有可生等識義容有共取眼等不然故如色説文此釋意云一人舌身三根若在未來根未合時於一及餘香味觸有生舌身三識容共取義故約容有義名為共境為言第二釋云又解猶如兩人舌身三根各相著同嗅中間香同嘗中間味同覺中間觸故名為共根即不爾無有兩人共用一根文此釋意云兩人舌身三根若在未來根未合時於中間一香味觸有容共取義故約容有義名為共境為言約容有義釋共境相第一第二釋其大概雖同初釋意以一人舌身三根望多香味觸共境相第二釋意以兩人舌身三根望一香味觸釋共境相是其二釋差異也次文云或一類香味觸能發多識故名為共相即不爾無一類根兩人共用發識根各別故者此非別釋第二釋中上唯望能取根釋共境相未及能發多識之義此兼添能發多識之義釋顯共境相許也就之舉問難云問如正理第六云聲如色説是共境故香味觸三如內界説非共境故然諸世間依假名想有言我等同嗅此香同嘗此味同覺此觸雜心意同正理説香味觸第一義如眼説俗數如色説此論豈不與彼相違文此問意顯也答之作二解釋初釋云解云此論約外香味觸未取之時在未來世容有多人共受用義故名色説雜心正理據正取時餘不能取説非共境故如內界各據一義亦不相違文此釋意今論意香味觸三界在未來世時容有多人共受用義故為共境之旨分明也準此釋思上第二釋意約容有義釋共境相云事可知之第二釋云又解論意各別雜心正理唯取身中內香味觸不能取外外但為緣引發於內此論意説不但取內香味觸亦能取外文此釋意云雜心論云耳舌身意聲香味觸亦如是第一義如眼説俗數如色説正理論六云聲如色説是共境故香味觸三如內界説非共境故然諸世間依假名想有言我等同嗅此香同嘗此味同覺此觸唯取身中內香味觸不能取外香味觸故云非共境今論云如色界聲香味觸應知亦爾不但取內香味觸亦能取外香味觸故名為共境故論意各別為言婆沙論七十一中有二師異説初師云或有欲令唯嗅嘗覺各自身中諸香味觸文第二師云復有欲令亦嗅嘗覺他及情諸香味觸文故光法師引此文云雜心正理同婆沙前師此論同婆沙後師也若依各據一義亦不相違之初釋意者今論意與雜心正理兩論意不相違故云若依前解雜心正理亦同婆沙後師也但婆沙雖有兩説然無評家且以後師為正以攝法盡故若外香味觸非三根取應法處取既法處中無香等三明知後師為正之釋意婆沙論二説之中以後師為正判故若依論意各別之第二釋意者雜心正理兩論意同婆沙論不正義説可得意也重難云或一類香味觸能發多識故名為共云釋意一種類香味觸中非容有義實於一分發識亦於餘分發識故為共境眼於根無此義故為不共釋也何云非別釋哉以之思次上猶如兩人舌身三根各相著等之釋意約一香味觸非容有義就舌身三根正取釋共境相可得意也此釋意約容有義名為共境云事文言為見哉答共境者於一香味觸二根同取之義也若於一種類中各別香味觸發識者何可云共境哉舌身三種正取境時唯取一香味觸故全無義故何釋意約容有義名為共境為言問異生性唯限無覆無記有何故耶進云今論云已離欲者斷善根者於成就故文付之異生性設雖通三性已離欲者成就善無覆無記異生性斷善根者可成就不善無覆無記異生性若爾以今此故何可成異生性唯限無覆無記之義哉例如大地法心所及得四相等雖通三性已離欲者斷善根者猶成就之如何答異生性若通善染汚者已離欲染位捨欲界染汚異生性不成就之斷善根位捨善異生性可不成就而未離欲染位不斷善根時所成就異生性雖已離欲染位斷善根時定無所捨猶成就故以今此故或異生性唯限無覆無記之義也故光法師釋其異生性是不染汚無記性攝已離欲者斷善根者猶成就故之論文云其異生性是不染汚無記性攝緣縛斷故已離欲者猶成就故明知非染汚斷善根者猶成就故明知非善文寶法師泰法師釋隨述此旨正理論六婆沙論四十五文同説此趣其言雖繁其意在之但於大地法心所及得四相等例難者此等諸法有分捨故已離欲染位斷善根時善染汚中隨其所應一類雖捨一類成就異生性者世第一法正現在前苦法智忍在生相位一時頓捨無分捨義故更不可以彼例此歟問異生性若見所斷者可有何過耶進云今論云苦法忍位應是異生文付之異生性者世第一法位捨之設雖見所斷何可有應是異生過哉是以異生性雖修所斷全無應是異生過如何答見所斷者唯染汚法自性斷故斷對治無間道現在前位所斷惑障猶成就之其時正斷捨故異生性若見所斷者苦法忍位可成就彼性故付應是異性過也故光法師釋此異生性若見所斷苦法忍位應是異生之論文云此異生性若見所斷苦法忍位既成彼性應是異生爾時若成即有一人名凡聖過成聖法故名聖成凡性故名凡與理相違故非見斷文寶法師釋此文云若忍斷者必無間道猶成或得若忍斷異生性忍現起時應成異生則應聖者亦是異生文泰法師釋此文云此異生性若見所斷者苦法忍位猶成就故應是異生如苦下十使是見所斷法苦法忍位猶成就文加之正理論六云既不染法非見所斷應忍所斷若忍所斷忍正起時猶應成就則應聖者亦是異生文婆沙論四十五云若異生性是見所斷應此位中未捨彼性則具縛者住苦法智忍時應成就異生性見所斷法具成就故住此位者應名聖者亦名異生便成雜亂故異生性非見所斷文任此等定判異生性若見所斷者可有苦法忍位應是異生過云事可思之但於異生性者世第一法位捨之設雖見所斷何可有應是異生過哉云難者未得其意見所斷法必自性斷自性斷法定斷捨同時也而乍許世第一法位捨異生性異生性可見所斷之疑豈不背性相之所定哉次於異生性雖修所斷全無應是異生過云例難者世第一法正現在前苦法智忍在生相位一時頓捨三界異生性畢至修道位離欲界乃至非想非非想處染各於第九無間道時證緣縛斷無為故異生性雖修道所斷前位已離不成就故無應是異生過也緣縛斷法不必成就非如自性斷法斷對治無間道位必與或得俱故不可為相例難歟尋云世第一法正現在前苦法智忍在生相位一時頓捨三界異生性云事何處見哉答勘婆沙論第四十五卷文或云何故異生性非見所斷耶答見所斷法皆染汚異生性不染汚故諸染汚法隨部隨品漸漸斷之得不成就諸異生性苦法智忍一時頓捨隨地第九無間道力一時頓斷故非染汚又世第一法正滅苦法智忍正生爾時捨三界異生性得彼不成就性非於爾時見所斷法而有捨故文或云依如是義故有問言頗有法一時捨九時斷耶答有謂異生性一時捨者謂苦法智忍生時九時斷者謂離欲界乃至非想非非想處染各於第九無間道時文世第一法正現在前苦法智忍在生相位一時頓捨三界異生性云事此等定判其旨分明歟問論文云前及此色定非見斷文光法師釋此文作二解釋爾者第二釋意今此前者指不染汚法及非六生法歟進云光法師釋云又解前非六及此色定非見斷文付之依第二釋意披今論之文上述不染汚法非六生法非見所斷之旨畢下云前及此色定非見斷文言無諍今此前言可指不染法非六生法見是以寶法師釋此文云總結三種非見所斷所以文泰法師釋此文云此三斷法非迷諦理親發起故不同見斷文如何答見今論一段之文上明異生性非見所斷委成不染汚法非見所斷云旨畢下云六謂意處異此而生名非六生是從眼等五根生義即五識等色謂一切身語業等鄰之結釋前及此色定非見斷所以者何非迷諦理親發起故故第二釋意今此前言唯指次上文所舉非六生法非迷諦理者述彼非六生法非見所斷之故得意也故見光法師第二釋云又解前非六及此色定非見斷五識非迷諦理色非見惑親發起故不染非見斷前已別解故文但於疑難之趣者是光法師初釋意也寶法師泰法師即存此旨歟自本二解釋其意各別也何以初釋意難第二釋哉問見所斷惑中可有別緣色聲等境類哉答可有別緣色聲等境之類也兩方若有此類者光法師所引顯宗論中述非六生法非見所斷云緣色等境外門轉故文而見所斷惑是內門轉可總緣境何有別緣色聲等境之類哉若依之爾者披婆沙論百三十九説見所斷惑中可有別緣色聲等境之類見如何答見所斷惑是內門轉迷理起故行相之所向雖可總緣境自亦可有別緣色聲等境之類也故婆沙論百三十九中明欲界三十六意近行緣界地相云十八通緣欲色界繫文今此十八者喜憂捨色聲觸九意近行中各有耽嗜依出離依差別故成十八也而欲界耽嗜依喜憂捨色聲觸意近行緣色界繫者他界緣遍行隨眼故見所斷惑中有別緣色聲等境之類云事炳然也但於光法師所引顯宗論緣色等境外門轉故之文者眼等五識緣色等五境外門轉故非見所斷云許也見所斷惑雖內門轉自亦有別緣色聲等境之類全非所遮歟如彼品類足論九云緣無所緣法一切隨眠隨增婆沙論八云問頗有於一蘊執我我所耶答有見所斷惑有別緣類云事亦分明也更不可疑之問尊者法救意眼見識見二義中存何義耶進云光法師釋云尊者法救眼識見文付之依光法師解釋勘法救所造論雜心論一文云自分眼見色非彼眼識見非惠非和合不見障色故五事論一中述若眼識見諸識但以了別為相非見為相豈能見色成見義破識見家加之清涼大法師演五十一釋法救論師耳聞非識乃至如聞既爾見等亦述若爾光法師解釋豈不背法救所造兩論説哉答見婆沙論十三文云謂或有執眼識見色如尊者法救文寶法師釋云尊者法救眼識見文圓暉法師釋云謂尊者法救許眼識見文惠苑法師刊定記二釋云法救論師識聞非耳成實同此文若爾光法師尊者法救眼識見之釋源依婆沙論説諸師定判隨亦同之既有依憑何獨疑之哉但於雜依五事兩論文者存識見義法救者釋尊𣵀槃之後四百年中出世四種薩婆多之其一也雜心論主法救者任光法師餘處一解釋至六百年以出來世見時代遙隔彼此別人云事必然也所存義異何可劬勞哉五事論説準可思之次於清涼大師解釋者即述雜心論主法救義也故演義鈔五十一云薩婆多宗自有二義一法救論師耳聞非識謂雖自分識依根方聞然聞體是根非是於識如聞既爾見等亦然故雜心云自分眼見色非彼眼識見非惠非和合不見障外色故文既引雜心論説證眼見義明知法救論師立眼見義者雜心論主法救云事重難云彼此法救設雖別人雜心論主法救意定以四種薩婆多法救義可為依憑故雜心論云此達摩多羅以古昔達摩多羅為尊者文妙樂大師疏記三末釋云此達摩多羅是雜心論主婆沙有法救論師是雜心論主所承從師為名文任此等定判雜心論主法救意不可背四種薩婆多法救義哉答雜心論主法救意以婆沙會四種薩婆多法救義為依憑故雖稱尊者自亦可有其義相替也例如雖俱舍論自婆沙論出俱舍論説違婆沙論正義家意其事非一彼此前後二人法救所存義異何可為痛哉尋云雜心論主法救造五事論歟答勘元瑜法師述文記八解釋云然雜心論主達摩多羅所造五事毗婆沙中文如此釋者雜心論主法救同造五事論歟問尊者妙音意耳識相應惠聞聲歟答彼師意云耳識相應惠聞聲也兩方若耳識相應惠聞聲者光法師所引五事論中難眼識相應惠見色之義云若與眼識相應惠見應許耳識相應惠聞彼既非聞此云何見文如此文者彼師意不云耳識相應惠聞聲見若依之爾者既云眼識相應惠見色定知耳識相應惠聞聲云事如何答尊者妙音意存耳識相應惠聞聲也故見婆沙論十三文云或復有執眼識相應惠見色如尊者妙音文光法師釋云尊者妙音眼識相應惠見文寶法師釋云尊者妙音眼識相應惠見文任此等定判既云彼師意執眼識相應見色準知耳識相應惠聞聲云事必然也何況清涼大師演祕抄五十一述法救論師耳聞非識之義畢云如聞既爾見等亦然文見色聞聲其體可同之旨此釋亦分明也但於光法師所引五事論文者彼師意雖存耳識相應惠聞聲法體本來惠無聞相故依自義意定置耳識相應惠非聞以之為例難眼識相應惠見色云義也故婆沙論十三中難尊者妙音意眼識相應惠見色云義云若眼識相應惠見色者耳識相應惠亦應聞聲然惠無聞相故不應理文準此婆沙論説可會五事論文也問光法師答此頌何故但破識耶問作四解釋爾者初釋意今論中唯破識見家義歟進云光法師初釋意唯破識見家義釋也付之披今論文尋能破相云五識俱生惠非見不度故亦破眼識相應惠見義見何釋唯破識見家義哉答見光法師解釋始末問如婆沙五事雜心論等皆破識惠和合此頌何故但破識耶答之作四解釋之中初釋意云隨作論者意樂破故問難之旨唯破識見家義釋也此釋意云披今論文偈頌結眼見色同分非彼能依識傳説不能觀被障諸色故長行隨述頌意云不爾眼識定非能見所以者何傳説不能觀障色故現見壁等所障諸色則不能觀若識見者識無對故壁等不礙應見障色專破識見家義故任文相顯唯破識見家義為言但於五識俱生惠非見不度故之文者五識俱生惠是無分別不能決度故由無決度能之門不名見云許也不破眼識相應惠無見色義故初釋意以此文不見破眼識相應惠見義也問有覆無記眼識與幾心所相應耶答可與十九心所相應也進云光法師所引五事論一云有覆無記眼識與十八種心所相應文付之有覆無記眼識者初靜慮貪煩惱相應眼識也定可與大地法十大煩惱地法六尋伺二貪一種十九心所相應若爾與十八種心所相應云事此中除何類哉答有覆無記眼識可與十九心所相應也其旨即如疑難之趣故雜心論二中述初靜慮心品俱生云愛慢疑俱生十九文而有覆無記眼識者初靜慮愛俱生眼識故與十九心所相應云事此文甚分明也但於光法師所引五事論文者有覆無記眼識相應聚中貪煩惱是獨頭起故一聚中本決定有之餘十八心所即隨從末也其隨從末隨獨頭起本起故且不論獨頭本貪煩惱決定有之就隨從末云與十八種心所相應也重難云見五事論一文云不善眼識與二十一心所所相應文此文既舉獨頭起本貪嗔隨一云與二十一心所相應有覆無記眼識相應心所中由獨頭起本除貪煩惱云事甚以難思如何答有覆無記眼識相應聚中獨頭起本唯限貪其義決定理在絶言故且除之不善眼識相應聚中獨頭起本亙貪嗔二惑其義不定故舉彼隨一云與二十一心所相應也問光法師意不共無明相應惠不名見故如何釋之耶進云光法師釋云其過尤重過二煩惱文付之設雖不共無明勢力強勝何可過二煩惱力用哉是以見光法師餘處二十六解釋述忍與疑得即不名智忍與疑得俱名為見故云疑有相應無明助疑得有力能違忍獨頭無明無惑助忍與彼得俱可説名為見若言亦有相應無明今言助者據別剎那文如此釋者不共無明無相應無明助故力用不及二煩惱若爾者過二煩惱之釋豈非前後相違哉答不共無明遲記愚癡增盛法故障推度之力用強勝過餘貪等隨一并彼相應無明二煩惱障推度之力用故釋不共無明相應惠雖復唯為一惑損覆其過尤重過二煩惱也勘婆沙論九十五文云問若爾不共無明相應惠應是見唯一煩惱相應起故答彼無明有二種一見所斷不共無明覆障尤重過二煩惱二修所斷不共無明與自力起纒垢相應彼獨立故能覆損惠如貪嗔等故彼相應惠如貪等相應亦不名見文見雜心論六説云疑愛恚慢無明相應惠非見何以故二使覆故無明相應惠雖無二使一能損覆非餘煩惱何以故非觀察方便故文其過尤重過二煩惱之釋源依此等論判歟但於光法師餘處解釋者疑煩惱是猶豫不決增盛法故障決斷之力用強勝過餘貪等隨一并彼相應無明二煩惱障決之力用如彼不共無明障推度之力用強勝過二煩惱即疑一惑障決斷之力用與不共無明一惑障推度之力用彼此相望其力齊等而疑煩惱有相應無明助故障決斷之力用猶勝不共無明障推度之力用故忍與疑得俱忍不名智忍與不共無明得俱忍名為見若言獨頭無明亦有相應無明助者今言助者據別頭起煩惱同時有相應無明助論之即如疑煩惱有相應無明助名為助也為言重難云不共無明無惑助故忍與彼得俱忍名為見者不共無明相應惠何不名見哉答相應心品甚以親近為障礙之力用強勝故不共無明相應惠不名見俱起得等稍是疏遠為障礙之力用羸劣故忍與不共無明得俱忍名為見也問論文云及諸餘法非見應知文光法師釋此文作二解釋爾者第二釋意以何法為諸餘法耶進云光法師釋云或可此文別簡法界文付之依第二釋意見今論定判上述眼根及法界中五染汚見世間正見有學正見無學正見八種名見之旨畢下云及諸餘法非見應知文言無諍簡十六界全法界少分非見也何釋別簡法界哉是以泰法師釋此文云及諸餘十六界全法界少分非見應知文如何答見今論文一段上云眼全是見故餘耳等十六界全非見云事既顯下述法界中身見等八種惠名見之旨畢云準此所餘染無染惠於法界中簡所餘染及無染惠非見畢乘之云及諸餘法非見應知故第二釋意於法界中亦簡所餘法非見得意也故見光法師第二釋云或可此文別簡法界於法界中準此前義所餘染惠所餘無染惠及諸餘法界非見應知乘前解惠有此文故文但於疑難之趣者是光法師初釋意也泰法師即存此旨歟自本二解釋其意各別也何以初釋意難第二解哉問論中釋見義舉決度及明利觀照二義爾者寶法師意對雜心論所説觀視決定堅受深入四義如何相攝之耶進云寶法師今論決度攝雜心論決定堅受二義今論明利觀照攝雜心論深入觀視二義釋也取意付之今論決度者推度之名雜心論決定堅受者無癡難捨之稱也何決度義攝決定堅受二義哉今論明利觀照者眼根名見故雜心論觀視深入者心品作用也寧明利觀照義攝觀視深入二義哉答正見寶法師解釋云雜心有四義一觀視者惠性故二決定者無癡故三堅受者難捨故四深入者洞境故通八種見皆具上四義此論決度名見略舉二義決是決定度是自度即堅受也定中雖無計度有餘義故亦名見也眼根雖無決定二義而有明利觀照二義故亦名見明利即義當雜心深入觀照即義當雜心觀視文此釋意云今論決度名見之中決者決定義故攝雜心論決定決定者決了無癡義故度者推度義故攝雜心論堅受堅受者堅牢難捨義故今論明利觀照名見之中明利者明達義故攝雜心論深入深入者猛利洞境義故觀照者照境義故攝雜心論觀視觀視者能見所緣義故為言若爾以今論決度明利觀照二義攝雜心論觀視決定堅受深入四義其相能符順其疑何為難哉但於今論明利觀照者眼根名見故雜心論觀視深入者心品作用也不可相攝云難者今論中且釋眼根名見故雖述以能別觀照諸色故亦名見理實於惠亦可有明利觀照故名見之義也故光法師釋云應知此中見有二種一者觀照名見所謂眼根雖惠亦名觀照此中且以眼名觀照文任此釋於惠既有明利觀照之義故雜心論深入觀視二義雖心品作用今論明利觀照之義攝之全無所背也問寶法師引諸師異説明眼見識見等相爾者依犢子部意如何釋之耶進云寶法師釋云又説犢子部心心所和合見文付之依寶法師解釋披婆沙論十三所説云或復有執一眼見色如犢子部文犢子部意存眼見義見依之光法師釋如犢子部兩眼互見非俱時見處隔越故速疾轉故謂俱時見若爾寶法師解釋依憑在何處哉答犢子部意存一眼并眼識同時心心所法和合見義也其中眼識同時心心所法和合見色之邊同譬喻者義故婆沙論中別不出之一眼色云事異諸師義故舉此一方云如犢子部也故寶法師釋於見色時為一眼見為二眼見之論文云犢子部計兩眼互見非同時見處隔越故速疾轉故謂同時見文寶法師解釋前後述犢子部義或云心心所和合見或釋兩眼互見一師定判不可相違故準兩處釋思之犢子部存一眼并眼識同時心心所和合見義見若如此得意者寶法師解釋不背婆沙論説光法師釋歟重難云犢子部意一眼見色者婆沙論説既分明故自本非所疑眼識同時心心所法和合見色云事若無證據者其義難成哉答見光法師解釋云若依經部中上座部大同犢子部故正理第七云由此亦遮上座所説彼作是言二眼於境別復起用見則分明或復一眼有閉壞時一眼雖開無相替代彼所生識唯依一門速疾轉故見不明了文經部中上座計者即當譬喻者義譬喻者意存眼識同時心心所法和合見義而以此義之大同犢子故犢子部意存眼識同時心心所法和合見義歟所被推知也寶法師解釋若存此趣歟弘長二年之秋八月十三日夜於海住山草菴回此愚推了問論中明識見家義云毗婆沙中亦作是説若眼所得眼識所受説名所見文光法師釋此文作三解釋爾者初釋意眼識所受文如何釋之耶進云光法師釋云眼識所受同文故來文付之尊者法救等意存識見義故引眼識所受之文可證識見義何釋同文故來哉答見光法師初釋云識見家言何但我作斯解毗婆沙中亦作是説若眼所得説名所見明知眼名能見眼識所受同文故來此即證眼名能見不名能識文今此釋意能叶論文即披論文前後深思引證旨趣識見家意會若爾眼根識所依故應名能識之難述無如是失世間同許眼識是見由彼生時説能見色不言識色為證眼根説名能見不名能識引毗婆沙中若眼所得眼識所受説名所見之文故若眼所得説名所見之文正是證據眼識所受之言同文故來見故論中引此文了云是故但説眼名能見不名能識結成眼名能見不名能識之旨也此即證眼名能見不名能識之釋尤順此文者歟但於引眼識所受之文可證識見義何釋同文故來哉云難者眼識見義本來所存故上引契經梵志當知以眼為門唯為見色之文證之也今對眼見家欲成眼名能見不名能識故若眼所得説名所見之文取為證據眼識所受之言同文故來為言初釋意存此趣歟問論主意眼見識見二師中朋何義耶進云光法師釋云論主意朋識見文付之依光法師解釋披今論現文偈頌結眼見色同分非彼能依識成眼見義破識見家長行舉眼見二師異説互述難答未定邪正光法師得何文理釋論主意朋識見哉答披論文前後尋論主所存偈頌結傳説不能觀被障諸色故長行隨明頌意云傳説不能觀障色故現見壁等所障諸色則不能觀若識見者識無對故壁等不礙應見障色於眼見師難識見義之文豈傳説語依之正理論六云然經主意不忍彼因故於頌中標傳説語文顯宗論改頌云眼見色同分非識見因故識類無別故不觀障色故文任此等定判論主意不信眼見家朋識見義云事分明也但於眼見色同分非彼能依識之文者眼見義是有部正義故偈頌文賞玩此義雖破識見家論主以理為宗非以婆沙評家為量故長行中成識見義朋之也次於長行互述難答未定邪正云難者長行中實舉眼見識見二師異説雖互述難答不決判邪正至其終文成識見義云無如是失世間同許眼識是見由彼生時説能見色不言識色毗婆沙中亦作是説若眼所得眼識所受説名所見是故但説眼名能見不名能識唯識現前説能識色譬如説日名能作晝文會通名能識之難引毗婆沙論之證論主意不朋識見義者何可會難引證哉故光法師釋上來雖復明眼見識見兩家異諍看其文勢論主意朋識見尤順今論一段之文也重難云披光法師解釋云或可以和合計分同經部論主意朋故不別破論主意朋經部和合見義見若爾論主意朋識見之釋豈非前後相違哉答眼見識見二義之中論主意雖且朋識見義遂存經部根境識和合見義故光法師一段兩處之釋全非前後相違也重難云見今論餘處三文述識見義云有餘師説能導養身非眼等用是識增上識了方能避於險難受段食故見色等用亦非異識故不共事於眼等根不可立為別增上用故非由此眼等成根文寶法師釋此文云述曇無德建立根也真諦云經部文惠暉疏釋其意同之何況探玄記記二云成實識同文成實論師者經部別師也以聞思見其義可同加之弘決二本中釋止觀眼識能見之文云此依經部附近少乘故云識見文任此等定判經部宗意存識見義見若爾論主意實朋此義也何云遂存經部根境識和合見義哉答見今論文舉眼見識見二家諍論了云經部諸師有作是説如何共聚楂掣虛空眼識等緣生於眼識此等於見孰為能所唯法因果實無作用為順世情假興言説眼名能見識名能了智者於中不應封著如世尊説方域言詞不應堅執世俗名想不應同求文經部宗意眼根色境眼識和合假名為見云事此文炳然也論主意若不存此義者何舉眼見識見二家評論了終出此義哉故光法師答此論何故不具説三之問作二解釋之中第二釋云又解經部計眼無實作用説名為見根境識三和合之時假名眼見非實眼見又無實像色論主意朋經部不言眼見不言像現文但於寶法師等解釋者識見家是雖尊者法救并大衆部等義若經部末計中亦有立此義之人歟諸師定判全非所痛識見家設雖何師何部義眼見識見二義之中論主意朋識見義故見今論餘處三文偈頌結傳説五於四四根於二種長行述毗婆沙師傳説如此眼見家義置傳説言標不信旨次云有餘師説能導養身非眼等用是識增上舉識見義專依用之故光法師論主意朋識見之釋亦順今論餘處之文也然而論主意通存經部根境識和合見義云事當卷論文并光法師釋尤明鏡歟尋云光法師以和合計分同經部之釋其意如何答譬喻者意眼識同時心心所法和合名見經部宗意眼根色境眼識和合名見故今此二師義其意實雖異和合名見之邊彼此是同故云分同歟問耳根可取離質聲耶答可取離質聲也兩方若取離質聲者見光法師解釋云若依勝論外道六根皆取至境乃至耳無光故聲來入耳故先見擊鐘後聞聲故彼計有離質聲文若耳根取離質聲者豈不同勝論外道宗義哉加之正理論七中破有説耳能取於至境云義云手才執鈴聲頓息故若聲相續來入耳中聞然執鈴時現見一切鈴聲相息都不可聞不可息餘餘亦隨息不聞餘故餘亦不聞文如此文者耳根不取離質聲見若依之爾者光法師餘處解釋中可有離質聲見耳根既取不至境何不取離質聲哉答見光法師餘處一末解釋引正理論此居口內名語亦業流出外時但名為語之文了云又以此文亦可證有離質聲也文此釋意云在口內聲名依質聲出口外聲名離質聲為言而耳根既取出口外聲故取離質聲云事必然也但於光法師解釋者勝論宗意云聲離本質相續傳生來入耳中至境聞之故破之不許也更非遮出口外離質聲不至境取之何為相違正理論文準之可會問論中明極微相觸不相觸義舉四師異説爾者光法師依婆沙論意有幾師説判耶進云光法師釋云婆沙一百三十二亦有四解同此論文付之依光法師定判見婆沙論所説唯舉三師説無有四師義若爾婆沙一百三十二亦有四解之釋甚似難思如何答見今論文問又諸極微為相觸不答之舉四師異説所謂迦濕彌羅國毗婆沙師説不相觸者第一師也又和合色許有分故相觸無失由許此理毗婆沙文義善成立故彼問言諸是觸物為是觸為因故生為非觸為固故生諸非觸物為問亦爾彼就此理為不定答有時是觸為因生於非觸謂和合物正離散時有時非觸為因生於是觸謂離散物正和合時有時是觸為因生於是觸謂和合物復和合時有時非觸為因生於非觸謂向遊塵同類相續者第二師也尊者世友説諸極微相觸義應住至後念者第三師也然大德説一切極微不相觸但由無間假立觸名者第四師也而勘婆沙論百三十二文應作是説極微互不相觸者即當今論第一師説尊者世友作如是説若諸極微互相觸者彼應得住至後剎那者即當今論第三師説大德説言實不相觸但於合集無間生中隨世俗諦假名相觸者即當今論第四師説問諸是觸物為是為因故生為非觸為因故生諸非觸物為非觸為因故生為是觸為因故生答有時是觸為因生於非觸謂和合物正離散時有時非觸為因生於是觸謂離散物正和合時有時是觸為因生於是觸謂和合物復和合時有時非觸為因生於非觸謂向遊塵同類相續者即當今論第二師説若爾婆沙論文與今論説前後雖相替四説俱有之故光法師釋婆沙一百三十二亦有四解同此論尤順婆沙論説也重難云婆沙論問諸是觸物為是觸為因故生等之文乘大德法救義被此問答也何為別師義哉答今論第二師意與大德法救説其義勢大同故今論中述第二師義引婆沙論此問答文婆沙論中乘大德法救義致此問答也然而此問答趣專順今論第二師義故準今論説推婆沙論意以此問答文可為別師義得意也光法師解釋若存此旨歟重難云今論第二師義與大德法救説其意若同者何為別義哉答今論第二師意與大德法救説思其義勢大概雖同委云之者第二師意云和合聚色有方分故雖許相續於諸極微假不與相觸名大德法救意云以實論之極微最細無方分故雖不相觸但由無間極相鄰近於極微上假立相觸名為言以之可為其差異歟問論文云若異此者是諸極微應有間隙文光法師釋此文作四解釋爾者初釋意如何釋之耶進云光法師釋云一破前第三師文付之披今論現文尋第三師義雖述尊者世友説諸極微相觸即應住至後念未云諸極微中間可有空隙是諸極微應有間隙之文何釋破第三尊者世友義耶答見光法師初釋云此即初文所以先破第三家論主意謂大德極微無間最相鄰近將世友説中間稍遠故言若異此大德説者是諸極微應有間隙中間既空誰障其行不得前進相逼近耶若各別住中間有空即不相礙如何許為障礙有對文此釋意云按今論尊者世友説諸極微相觸即應住至後念之文意諸極微中間可有空隙當故光法師釋此文作二解釋之中第二釋云又解未來極微散住若言相觸如二極微初念至現中有空隙才欲相觸便謝過去若度此空應至後念以度一微名一剎那雖有空隙不容一微欲相觸時還至後念若至後念還應是常文準此釋思之彼師義意諸極微中間可有空隙之理必然也見伏若異此者是諸極微應有間隙中間既空誰障其行許為有對之文破世友義為言寶法師釋此文云亦是兼破第三師也兩師一同之釋定探彼師義意歟問論文云若異此者是諸極微應有間隙文光法師釋此文作四釋爾者第二釋意如何釋之耶進云光法師釋云又解此文破婆沙中異説文付之見今論現文明極微相觸不相觸義有四師異説之中述然大德説一切極微實不相觸但由無間假立觸名此大德意應可愛樂論主意許取第四大德法救義難破前三師説而尊者世友意存諸極微中間有空隙之旨故破彼師義云是諸極微應有間隙也何釋破婆沙中異説哉答見光法師第二釋云又解此文破婆沙中異説不破世友以世友解言無違故為婆沙異説中有空隙故今非彼文此釋意云婆沙論百三十二中問大種等聚中有間隙不設爾何失二俱有過若有間隙寧不相離間隙若無可不成一答之有二師異師之中初師説云有説此有間隙空界於中相雜住故文此説意明許大種等聚中有間隙故今論若異此者是諸極微應有間隙中間既空誰障其行許為有對之文破婆沙論此師説也今論云尊者世友説諸極微相觸即應住至後念婆沙論云尊者世友作如是説若諸極微互相觸者彼應得住至後剎那此兩論中述尊者世友義不云諸極微中間有空隙其言無是大德法救義故不破世友解為言問經部宗意云識可緣現在境耶問依身在初靜慮人以第三靜慮天眼可見上地色耶答若以色境望彼天眼論自上下地者以第三靜慮天眼不可見上地色也進云今論中云見上地色也付之五依四靜慮自下地為境者性相之所定也以第三靜慮天眼何可見上地色哉是以依身在初靜慮人以第二靜慮天眼不見上地色加之依身在欲界人以第三靜慮天眼無見上地色相例可同如何答眼根色境相望之時以下地眼根不見上地色者性相之所定也更不可疑之故見今論文云色識望眼等下非上下眼不能見上地色故文正理論云色識望眼等下非上下地眼根串見麁色於上細色無見功能文顯宗論四文全亦同之任此等論説依身在初靜慮人以第三靜慮天眼不見上地色云事炳然也但於進釋者今論生初靜慮乃至若以三四靜慮地眼見自地色或下上色如理應思之文也此文意以色境望依身論自上下地故云見上地色也故光法師釋此文云若以三四靜慮地眼見自地色或下上色者以色望身説自下上謂身生初定以三四定眼見初定色名自見欲界色名下見二定已上色名上若以色望眼但有自下不得言上以下地眼不見上色故文問下地耳根可聞上地聲耶答不聞上地聲也兩方若聞上地聲者上地聲是微細也何可下地耳根聞之哉是以見今論文述色識非上眼畢云如眼耳亦然云云若下地耳根聞上地聲者豈不背此文哉若依之爾者婆沙論中下地耳根可聞上地聲見如何答耳根聲境相望之時下地耳根不聞上地聲者性相之所定也更不可疑之故見今論文云廣説耳界應知如眼謂耳不下於身聲識非上耳文正理論八文顯宗論説全亦同之任此等論説下地耳根不聞上地聲云事炳然也但於婆沙論説者彼論中問若生欲界依初靜慮發天耳通能聞上三靜慮諸天語表聲不答之有二師異説之中舉初師義云有説不聞以處違故或微細故文故此師意非今難趣述第二師之有説若極作意者亦能聞以是同地法故文以此師説致今疑歟若爾上三靜慮諸天語表聲由初靜慮心發故即初靜慮所攝也故依初靜慮所發天耳通聞上靜慮語表聲初靜慮耳根即聞初靜慮聲故今非下地耳根聞上地聲也問眼識後起無覆無記分別意識為唯限異熟生為當可通威儀心耶答可通異熟威儀二心也兩方若唯限異熟生者無覆無記分別意識種類非一準何不通威儀心哉若依之爾者婆沙論七十三文云無覆無記分別意識唯生自地容現在前由此必定繫屬生故文披正理論八説云非生餘地能起餘地無覆無記分別現在此亦必定繫屬生故文婆沙正理兩論之文既云繫屬生故明知唯限異熟生云事依之元瑜法師述文記六釋正理論今文云過去所見色分別者唯異熟生無記於餘地不得起故繫屬生按此亦證緣過去分別唯異熟生文如何答眼識後起無覆無記分別意識可通異熟威儀二心也故見光法師餘處解釋引疑難中所令出婆沙正理兩論之文了云解云婆沙正理意説五識引起意識地中三種分別緣前過去五識所緣色等五境夫生餘地起餘地無覆無記所謂變化心三識身及發業心若化心唯緣現事若三識性非分別又唯緣現若發業心緣所發業此等非是緣過去五識曾所緣境分別意識所以婆沙正理説無記分別唯自地能起不能起餘地文此釋意偏簡變化心三識身及發業心故餘無覆無記心緣過去五識曾所緣境皆可名分別意識見明知通異熟威儀二心云事何況婆沙抄四末中釋無覆無記分別意識相問四無記中何無記心答解通異熟威儀無記通異熟威儀二心之旨此釋亦分明也但於婆沙正理兩論繫屬生故之文者緣過去五識曾所緣境無覆無記分別意識中無他地現起之義故云繫屬生故也何由今此故定唯限異熟生哉次於元瑜法師解釋者非只不順道理亦背光法師定判且不可依用之問眼識後起分別意識可通第三生已後耶答可通第三生已後也兩方若通第三生已後者見正理論八文依身在欲界已離欲界貪未離初定貪不退法異生以欲界及初靜慮眼見欲界色後唯起欲界善及無覆無記分別意識以初靜慮眼見初靜慮色後唯起欲界善分別意識云云若通第三生已後者此不起欲界染汚分別意識哉婆沙論説其意同之依之辰旦人師婆沙抄四末釋婆沙論文云言此後者約第二生名為後也不通第三生已後判若依之爾者婆沙論中眼識後起分別意識可通第三生已後見如何答眼識後起分別意識可通第三生已後也故正理論八云非此中意唯説一生所起分別若説一生則生上地應定無有下地分別即此生中彼三分別無容得有現在前故又上地分別應唯善非無記前已説因故通説餘生皆得具有文婆沙論七十三云眼識後起分別意識非唯一生設經多生緣所見色亦得起故文若眼識後起分別意識不通第三生已後者寧可云設經多生哉任光法師餘處依聲明法言三已去方説為多之釋三已去事置多言故也重勘婆沙論第七十三卷一段之文眼識後起分別意識通第三生已後云事其證雖多且出一文者彼論云若諸異生生初靜慮即彼已離初靜慮染未離第二靜慮染即彼以第二靜慮眼見欲界色時於彼色起無覆無記眼識此後於彼復起分別意識欲界三種前二靜慮二種見初靜慮色時於彼色起無覆無記眼識此後於彼復起分別意識欲界及第二靜慮各二種初靜慮三種見第二靜慮色時於彼色起無覆無記眼識此後於彼復起分別意識欲界及初靜慮各二種第二靜慮三種文此文既云依身在初靜慮已離初靜慮染未離第二靜慮染異生以第二靜慮眼見欲界色後起欲界善及染汚無覆無記三種分別意識見初靜慮及第二靜慮色後起欲界善及染汚二種分別意識故眼識後起分別意識通第三生已後云事必然也其故依身在初靜慮已離初靜慮染人故不可有從初靜慮生欲界義從已離染地不下生者性相之所定故也若不生欲界者亦不可起欲界分別意識故第三生已後生欲界時可起欲界二種三種分別意識之理勿論故也但於正理論文者依身在欲界有入聖得果之義故此生即可入聖得果之類名不退法異生故依身在欲界已離欲界貪未離初定貪不退法異生以欲界及初靜慮眼見欲界色以初靜慮眼見初靜慮色後盡未來際永不可起欲界染汚分別意識也故元瑜法師述文記八會此疑云若欲令通多生者應言不退謂永不退便成聖果文依身在初靜慮無入聖得果之義故婆沙論中依身在初靜慮已離初靜慮染未離第二靜慮染異生以第二靜慮眼見欲界及前二靜慮色後約第三生已後起欲界分別意識云也婆沙抄解釋不辨此深旨既背婆沙論文全不可依用之尋云眼識後起分別意識通第三生已後者婆沙論中猶有所見哉答重勘婆沙論第七十三卷文云若諸異生生初靜慮即彼已離初靜慮染未離第二靜慮染以初靜慮眼見欲界色時於彼色起眼識分別廣説如前見初靜慮色時於彼色起二種眼識所起分別如前應知文於彼色起眼識分別廣説如前者指上未離初靜慮染見欲界色時於彼色起二種眼識除識除染汚此後於彼復起分別意識欲界三種初靜慮二種之文於彼色起二種眼識所起分別如前應知者指上此後於彼復起分別意識欲界二種初靜慮三種之文故依身在初靜慮已離初靜慮染未離第二靜慮染異生以初靜慮眼見欲界及初靜慮色後起欲界分別意識見初靜慮色後亦起初靜慮染汚分別意識者是皆第三生已後可起之後已離染地不下生故依身在初靜慮不退起煩惱故也若爾此等論文眼識後起分別意識通第三生已後云事甚分明也弘長二年壬戌極月五日申時於海住山十輪院抄之了去後七月二十二日始清書之此窮冬天今日今時終結集之隙駟之影空馳雖送百餘日之光陰拾螢之勤稍怠才記百餘條之論議愚鈍之至後學察之方今宗性官職自亞先師之古迹年齒已過列士之昔夢前途更期何事後年亦歷幾程五更枕上遁世之思頻催一點燈下蟄居之志尤切依之去初秋天上旬九日忽辭西郊清涼寺之朝露早玩𭀫原海住山之夜月以降願樂所專雖可修大乘之觀行妄執無晴猶記録少宗之問端哀哉悲哉不可不痛於戲捧此抄出意業奉資春日大明神之法樂依此修學微功必遂上生兜率天之宿望現當二世之間併蒙權現冥助龍花三會之曉速悟唯心深理厭其往事尋訪笠置當山今生經行處處之砌鑒其薰契濟度二親九族同法知識各各之輩殊別覺遍僧正之唱也遂再會於逍遙生死之秋雲實弘法師之告訣也結一緣於雞足山之春風乃至有緣無緣利益等布自界他界回向普及而已右筆華嚴宗末葉法印權大僧都宗性年齡六十一夏臘四十九寫本云于時文明十七年乙巳二月上旬之比加修復奉書縫了心中志後學可哀之三論末葉英憲二十三
