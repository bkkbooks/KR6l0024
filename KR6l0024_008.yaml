body:
  text: 俱舍論第二卷抄下問寶法師意三性表業俱生香味觸俱等流性攝歟答俱可等流性攝也兩方若俱等流性攝者披寶法師解釋云無記業俱者是等流性文若善惡表業俱生香味觸等流性攝者何唯云無記業俱者哉若依之爾者以道理思之三性表業俱色俱可等流攝見相例可同如何答見今論餘處十三文偈頌結表唯等流性長行述應知有表唯是等流三性表業唯等流性攝故俱生香味觸同可等流性攝云事道理必然也但於寶法師解釋者且就同性業唯云無記歟即見次上釋云色有情數者有異熟生及所長養三性業俱唯有等流性色通三性故三性業俱舉之云唯有等流性也準知香味觸唯依無記故且就同性業云無記業俱者是等流性歟問一剎那法唯限現在苦法忍歟答唯限現在苦法忍也兩方若唯限現在苦法忍者未來苦法忍亦非同類因生一剎那法何唯限現在苦法忍哉是以品類足論中明非心為因法云及諸餘異生定當入正性離性者未來初無漏心文此文無諍一剎那法不限現在苦法忍見若依之爾者披光法師所引正理論五文釋一剎那法云此説正現行亦非等流者文既云正現行明知唯限現在苦法忍云事如何答見今論文明一剎那法云謂初無漏苦法忍品非等流故名一剎那此説究竟非等流者文光法師釋此文云初苦忍言顯取現忍故正理云此説正現行亦非等流者一剎那法唯限現在苦法忍所定也即述一剎那法唯限現在苦法忍不取未來故云現在苦忍非是等流其義決定未來苦忍雖在凡位非是等流若至聖位住不生者即是現忍等流果故非是剎那其義不定文此釋意顯也就之重問云如上忍現行未來下忍住不生法非等流攝應是剎那如何但取現忍文此問意云上品苦法忍現在前位不與未來不生下品苦法忍為同類因亦不修彼故彼未來不生下品苦法忍非等流攝應是一剎那法何唯取現在苦法忍哉為言即答此問云苦忍名一剎那由具二義一者現行二非等流如不生下忍雖非等流而闕現行如苦法智雖有現行闕非等流如不生上忍二義並闕餘隨所應準此通釋文此釋意云上品苦法忍現在前位不與未來不生下品苦法忍為同類因亦不修彼故彼未來不生下品苦法忍雖非等流攝若下品苦法忍現在前者容與未來不生下品苦法忍為同類因亦容修彼故彼未來不生下品苦法忍由非等流義猶不決定唯以現在苦法忍為一剎那法也為言但於品類足論文者婆沙論舉未來可有同類因云疑之中引此文為難即會之雖有二師異説且初師説云彼唯説畢竟非心為因法雖彼未入正性離生者諸無漏心皆非心為因然彼若入正性離生唯有初無漏心是非心為因法餘心無不以心為因文此文意云雖未入正性離生位諸無漏心皆非心為因若至初苦法忍位唯現在苦法忍是非心為因法故指始終究竟可為非心為因法云及諸餘異生定當入正性離生者未來初無漏心也為言故此文意亦指入正性離生位可現行初無漏心名非心為因法故一剎那法唯限現在苦法忍云釋全無相違也重難云世第一法現在前位生相苦法忍非等流義既令決定一剎那法何不通未來生相位哉答準光法師未來苦忍雖在凡位非是等流若至聖位住不生者即是現忍等流果故非是剎那其義不定之釋可會此疑也所謂尅性論之彼生相苦法非等流義雖令決定總見未來苦法忍者等流非等流其義不定故唯以現在苦法忍為非等流法也尋云上品苦法忍現在前位未來不生下品苦法忍五類門中何類可攝之耶答上品苦法忍現在前位未來不生下品苦法忍雖無等流義若下品苦法忍現在前者容為等流法故五類門中可等流攝之也問上品苦法忍現在前位可得修未來不生下品苦法忍耶答不得修未來不生下品法忍也兩方若得修之者見光法師解釋云如不生下忍雖非等流而闕現行文若得修之者何云非等流哉若依之爾者一相續身中可有三品苦法忍上品苦法忍現在前位寧不得修未來不生下品苦法忍哉例如依上地見道現在前位得修未來不生依下地見道如何答上品苦法忍現在前位不得修未來不生下品苦法忍也其故見婆沙論處處之文或百五云若現在道與彼為因者可説彼為得修現在道與過去無因義故過去道名得非修文或百五十八云評曰應説此為彼因彼是此果一相續攝非劣道故如是乃至金剛喻定現在前時修未來無量金剛喻定此現在定與所修為因彼是此果文此等文意諸無漏道現在前位得修以現起道為同類因與彼道為等流果未來道品定而任唯等勝為果之理上品苦法忍現在前位不與未來不生下品苦法忍為同類因故不得修彼未來不生下品苦法忍也何況若上品苦法忍現在前位得修未來不生下品苦法忍者彼苦法忍上法前得容與苦法忍為同類因故彼苦法忍應是等流攝光法師何釋如不生下忍雖非等流而闕現行哉故不得修之云事文理旁必然也但準光法師餘處二十六所引正理論七十三或諸種姓各有九品成一九品必不成餘故前後言無相違釋之文一相續身中雖有九品苦法忍上品苦法忍現在前位不與未來不生下品苦法忍為同類因故不得修彼未來不生下品苦法忍更有何疑哉次於依上地見道現在前位得修未來不生依下地見道云例難者見今論餘處三文述道展轉九地唯等勝為果諸無漏道不繫法故九地聖道展轉相望互為同類因全非相例難也問論中明得眼不得識句云謂生欲界漸得眼根文光法師釋不舉生盲及漸捨眼人從欲界沒還生欲界故作三解釋爾者初釋意如何釋之耶進云光法師釋云以生欲界等不定故約漸得眼説文付之既置生盲等言簡別餘人彼從欲界沒還生欲界中有初心得眼不得識其義決定可有何不定哉是以見今論文從二三四靜慮地沒生欲界時為得識不得眼句從無色界沒生欲界時為眼識俱得句若如此釋者第二第三句亦可有不定義哉答見光法師解釋云雖有生盲及漸捨眼等欲界沒還生欲界等名得眼不得識若從二定已上生欲界等中有初心即名得識不得眼若無色沒生欲界等即眼識俱得以生欲界等不定故約漸得眼説文此釋意云生盲及漸捨眼等人從欲界沒還生欲界等中有初心得眼不得識其義雖決定從二三四靜慮地沒生欲界等中有初心為得識不得眼句從無色界沒生欲界等中有初心為眼識俱得句故總見欲界中有初心有此不定可濫餘句故得眼不得識句中唯舉胎卵濕生漸得眼根之類無有不定不濫餘句不出生盲及漸捨眼等人從欲界沒還生欲界等中有初心有不定義可濫餘句為言但於第二第三句亦可有不定義云難者得識不得眼之類生欲界中唯有一類眼識俱得之類唯限從無色界沒生欲界等之一類故雖有不定義舉之也得眼不得識類生欲界中有二類故且舉無不定不出有不定為言問論中明得眼不得識句云謂生欲界漸得眼根文光法師釋不舉生盲及漸捨眼人從欲界沒還生欲界故作三解釋爾者第三釋意如何釋之耶進云光法師釋云又解漸得眼言亦攝此等文付之生盲及漸捨眼人從欲界沒還生欲界中有初心頓得眼根何釋漸得眼言亦攝此等哉答生盲及漸捨眼等人從欲界沒還生欲界之時得眼根有二時也所謂生欲界中有初心及受胎卵濕生之文復漸得眼根位也故今此人中有初心雖頓得眼根受胎卵濕生之後亦有漸得眼根之義故漸得眼言攝此等類為言非謂中有初心頓得眼根漸得眼言攝之今疑問之趣恐背解釋意歟問雜心論意天眼天耳二通威儀無記歟答雖有學者二義且可存通果無記云義也兩方若威儀無記者雜心論十中色界威儀心無間不生方便善心定若天眼天耳二通威儀無記者彼威儀心無間寧不生方便善心哉若依之爾者披光法師解釋云雜心論主達摩多羅造對法藏論中説天眼耳通是威儀無記文此釋無諍雜心論意天眼天耳二通威儀無記如何答天眼天耳二通是禪定前生法故設雖雜心論意何不名通果無記哉故見光法師餘處四解釋云雜心説異生性應知即是非得少分如變化心是通果少分雜心略舉一邊非為盡理文此釋意云雜心論中明非得説異生性應知是舉非得少分如彼論中明通果心云變化心是舉通果心少分為言如此釋者彼論意通果心者不限變化心可取天眼天耳二通見何況雜心論十中述二十心相生云威儀心生七色界威儀心無間生自界生得穢汚報生威儀欲界二穢汚無色界染汚七心不生方便善心見若天眼天耳二通威儀無記者色界威儀心無間豈不生自界方便善心哉爰知彼論意存天眼天耳二通通果無記云事但於光法師解釋者非光法師自義云彼論意存天眼天耳二通威儀無記引古德釋顯其非也所謂雜心論中無分明定判故有古德意謂彼論意存天眼天耳二通威儀無記故光法師引古德釋重重難破之也重難云披光法師解釋前後問生上三定起下眼耳二通是可無記答解云雜心論主達摩多羅造對法藏論中説天眼耳通是威儀無記工巧唯欲不通上界異熟非異地起變化唯意既非餘三明知二通定是威儀思此問答意光法師自義謂造心論意存天眼天耳二通威儀無記徵嘖彼論説也引古德釋難破彼義云事解釋中焉處見哉是一是以雜心論披處處之文或一云無記有四種報生威儀工巧變化心文或二云不隱沒無記四種報生威儀工巧變化心文或十云無記有四種報生威儀工巧變化心文任此等文列通果心云變化心明知天眼天耳二通是威儀無記非通果無記云事是二何況勘雜心論七文云方便得者謂天眼天耳智此無記性故不入淨無漏味相應是故得彼三種禪時不得作方便已乃現在前文大乘義章六通義二十云何故天眼天耳二通唯方便得毗曇宣説眼耳二通體是無記定外作用不與定俱斷離下欲得上定時不得此通以是義故非離欲得定之後別修方便方始得之以是義故唯方便得文若天眼天耳二通通果無記者如變化心可通離欲得何釋唯方便得哉是三加之大乘義章中述毗曇意或云六威儀心謂行住座臥見聞等心或就欲界中方便善心問何故不生上地威儀答身在欲界雖起初禪眼耳等識彼所生識必依上地眼耳等根上地之根必依上地淨禪而生不依下地善心生故此等解釋無諍毗曇心天眼天耳二通威儀無記見是豈非依雜心論説哉是四但光法師餘處雜心説異生性等之釋為證據事不可然此釋意云雜心論中明非得説異生性應知是舉非得少分如舊譯諸論中明通果心云變化心是舉通果心少分為言非謂雜心中明通果心云變化心是舉通果心少分何為證據哉是五次雜心論色界威儀心無間不生方便善心云文為證據事亦難審定珍海已講義章要三會此文云論云威儀心不生加行善者據泛爾威儀心耳文此義聊有潤色光法師初釋意會今論中舉得識不得眼句云謂生二三四靜慮地眼識現起之文云論不説成據泛借説文雜心論文準之可會也是六答光法師解釋引古德釋云事非無所據即見光法師餘處七定判敘古德釋云又言身在欲界起天眼通從天眼通却入定時若無生得善心便不能生加行善心以諸論説除變化心不許餘無覆無記心生加行善心若不許起上地生得善者天眼體是無覆無記云何能生加行善心以此準知身在下界起上界生得善心文此古德意存雜心論中説天眼天耳二通威儀無記故釋天眼通無間不生加行善心也光法師今解釋敘此古德釋意云雜心論主達摩多羅造對法論中説天眼耳通是威儀無記也若雜心論説破之哉次雜心論處處文明通果心云通果心少分光法師餘處如變化心是通果少分之釋即述此旨也彼論意不存天眼天耳二通是威儀無記非通果無記次雜心論方便得者謂天眼天耳智之文非相違彼意雖存天眼天耳二通通果無記依得淨定之力為見色聞聲後修加行起彼二通故之方便得也大乘義章唯方便得之釋會通同之次大乘義章六威儀心謂行住坐臥見聞等心之釋不為痛見聞等心者指泛爾起眼耳身三識等也不可取天眼天耳二通何故不生上地威儀等之問答實以難思然而珍海已講義章要三會此文云然四緣義文者顯是禪果非威儀也故欲界方便善不生上威儀也文次光法師餘處雜心説異生性等之釋尤為此義證據既為雜心論中明廣非得説狹異生性之例證明知彼論意明廣攝二通等通果心喚狹變化心名云事次雜心論威儀心生七之文亦為此義規模證據二十心相生之盡理之談也何唯就泛爾起威儀心論之哉光法師引此文難破天眼天耳二通威儀無記云義設雖有明匠通釋實是難會之證文也重難云光法師解釋引古德釋云事猶難思見寶法師定判云問生上三定起下眼耳二通是何無記解云雜心論云達摩多羅造對法藏論中説天眼耳通是威儀無記文此釋豈定引古德義哉是一次披大衆義章文十五十四化心義見變化心得有二種一離欲得凡夫二乘斷欲界結得初禪時頓得初禪二種化心一當地化二下地化如是次第乃至斷彼三禪結時頓得四禪五種化心當地中一下地中四二者生得文明天眼天耳二通云唯方便得文若二通變化同通果無記者何二通唯方便得變化心通離欲得哉今此差異甚所難辨也是二次雜心論色界威儀心無間不生方便善心云文據泛爾起威儀心云事亦有潤色即勘彼論十文云謂威儀心樂習威儀故是故次第不起方便善心文若天眼天耳二通威儀無記者可云專樂見色聞聲故不生方便善心寧釋樂習威儀故不起方便善心哉是三次雜心論主達摩多羅造對法藏論中説者指雜心論歟為當引別論歟是四答寶法師定判引載光法師解釋亦破彼難破之旨故引古德釋云事更無相違也問雜心論意變化心外別許發業通果心歟答此事難測且可有許不許二義也兩方若別許發業通果心者勘雜心論一部始末未見變化心外別説發業通果心之文爰知變化心外不別許之云事若依之爾者設雖雜心論意化人發業之外豈無能發心哉答見雜心論處處之文或一云無記有四種報生威儀工巧變化文或二云欲界不隱沒無記心四種報生威儀工巧變化心文或十云無記有四種報生威儀工巧變化心文任此等文明通果心云變化心外不別説發業通果心也但於化人發業之時豈無能發心哉云難者且以二義可會通之或雜心論意存變化心即發表業歟以何知之者見今論餘處十三文云有餘師言上三靜慮亦有無覆無記表業無善無染文泰法師釋此文云有餘師言上三靜慮亦有無覆無記變化語表業無善無染文如此釋者此有餘師意意存變化心即發表業見而寶法師釋此有餘師義云此是雜心師釋故雜心論意存變化心即發表業云事自所推知也或亦準光法師餘處四雜心説異生性應知即是非得少分如變化心是通果少分雜心略舉一邊非為盡理之釋明通果心云變化心且舉通果心少分盡理之文變化心外可出發業通果心也問光法師意二十心相生唯就意識論之歟答廣通意識五識論之也兩方若唯就意識論之者廣明諸心相生之時何唯就意識論之哉是以光法師解釋中二十心相生廣通意識五識論之見若依之爾者披今論餘處七文明二十心相生云威儀路等三無覆心色香味觸為所緣境工巧處等亦緣於聲如是三心唯是意識文既云唯是意識明知唯就意識論之云事如何答就二十心明其相生之時廣通意識五識普可分別云何唯就意識論之哉故見光法師處處解釋當卷破雜心論主達摩多羅造對法藏論中説天眼天耳通是威儀無記云義云此解不然違理教發故如下論云色界威儀心二十心中從五心生謂自界五除通果心能生七心謂自界四除加行通果欲界二染汚無色界一染汚若言二通威儀心者應生加行善心如變化心由定引起與定相生不與餘心相生二通亦爾既由定引起還應與定相生不生餘心若説威儀能生於定此即不然違論文故威儀定不能生加行文若二十心相生唯就意識論之者設雖天眼天耳二通是威儀無記何可違色界威儀心無間不生加行善心云論文哉餘處二十八難泰法師然眼耳身識雖非化心無記是化心類定地繫故總名禪果心云義云泰法師若將修得天眼天耳二識是化心類同名通果容有此理若將泛爾起眼耳身識名通果心良謂不然準諸論二十心中通果心唯與定心相生豈有從上起下三識皆入定耶文若二十心相生唯就意識論之者依二十心中通果心唯與定心相生之論文更不可難豈有從上起下三識皆入定耶哉任此等解釋二十心相生廣就意識五識論之云事尤分明也但於今論餘處如是三心唯是意識之文者光法師釋此文云夫通果心有二一五識中通果即天眼天耳通二意識通果即變化心及發業通果心此中且據第二通果心故言唯是意識若據二通亦在五識若威儀路心唯意識者據起威儀心説若威儀路加行不但在意識亦通四識緣四境故若工巧處心唯意識者據起工巧處心説若工巧處加行不但在意識亦通緣五境故文任此解釋可會通之也問光法師意依身在下地可起上地聞惠耶進云光法師釋云亦不能起異地聞惠文付之衆生種類分萬差心品現起非一準設雖聞惠善心何無他地現起之義哉是以披婆沙論十述色界聞所成非我行相加行得義云謂若此間出自共相善修習者生彼便得文如此文者依身在欲界修習色界聞所成非我行相見加之婆沙論七十三中明眼識後起分別意識云善及染汚分別意識生自下地容現在前非生上地文辰旦人師引此文云以此文證身在下地亦能起上地聞惠文任此等定判依身在欲界起上地聞惠云事甚分明也如何答異地聞惠起不起者先哲未決古來難義也然而且依一義意可存婆沙論中有異地聞惠起不起二師異説光法師成不起一説意之義也依此義意料簡諸文者見光法師當卷解釋云身在下地非能起上生得善心不起異地生得善心正理有文如下當引亦不能起異地聞惠此惠由彼生得導引既不能起生得善心故聞惠心亦不能起不起異地聞惠善心婆沙有文亦如下引文不起異地生得善心正理有文如下當引者讓光法師第七卷疏所引正理論二十無容起彼生得善心生在此間不能令彼起現前故之文此惠由彼生得導引者述婆沙論應作是説若於三藏十二分教受持讀誦究竟流布是生得惠依此發生聞所成惠之文意不起異地聞惠善心婆沙有文亦如下引者指光法師第二十六卷疏所引婆沙論二文也即披彼第二十六卷疏文初引婆沙論十色界聞所成非我行相可言加行得可言生得云何可言加行得謂若此間於自共相善修習者生彼便得若不爾者生彼不得云何可言生得謂雖此間善修習已若未生彼終不能得生彼方得彼聞所成非我行相必依此間所修加行生彼得故之文云婆沙既解色界聞惠非我行相若加行得者生彼便得若生得者亦言生彼方得明知身在下地不得起上聞惠若先已得如何論言生彼便得古德皆言身在欲界修習色界聞惠非我觀生彼即得者不然若言先得何須復言生彼即得文疑難之趣當此古德義意若言先得何須復言生彼即得者顯此古德義非成依身在欲界不起色界聞惠之旨也次引婆沙論十若生初靜慮起初靜慮非我行相不定者亦得緣一切法定者唯緣從初靜慮乃至有頂起上三靜慮非我行相亦唯能緣從初靜慮乃至有頂若生第二靜慮起第二靜慮非我行相不定者能緣一切法定者唯緣從第二靜慮乃至有頂起第三第四靜慮非我行相亦唯能緣從第二靜慮乃至有頂若生第三第四靜慮如理應説之文云婆沙既言身生此地起此地非我觀分定不定若起上地非我觀唯約定心緣自上地不言不定以此故知身生下地不起上地聞惠非我觀聞惠非我既不得起所餘聞惠準皆不起文光法師依婆沙論一師説意成依身在下地不起上地聞惠之旨立理引文其意如此加之泰法師引婆沙論今文云若依此文身生下地不得起上地聞惠若依婆沙文引婆沙論今文證依身在下地不起上地聞惠之旨其意亦同光法師釋兩師一同之釋定有源由歟但對若依此文身生下地不得起上地聞惠述若依婆沙故知婆沙論中亦有依身在下地起上地聞惠云師義云事依之勘婆沙論第七十二三兩卷中説眼識後起分別意識之文其證雖甚多且出一兩文者或七十二云若諸異生即彼若生欲界即彼已離初靜慮染未離第二靜慮染以初靜慮眼見欲界色時於彼色起無覆無記眼識此後於彼復起分別意識不退法者欲界二種初靜慮唯善見靜慮色時於彼色起無覆無記眼識此後於彼復起分別意識不退法者欲界初靜慮各唯善文或七十三云若諸聖者即彼若生欲界即彼已離初靜慮未離第二靜慮染以初靜慮眼見欲界色時於彼色起無覆無記眼識此後於彼復起分別意識不退法者欲界二種初靜慮唯善見初靜慮色時於彼色起無覆無記眼識此後於彼復起分別意識欲界唯善初靜慮不退法者唯善文此等文既云依身在欲界已離初靜慮染未離第二靜慮染不退法異生聖者以初靜慮眼見欲界及初靜慮色後起初靜慮善分別意識故依身在欲界起上地聞惠之旨甚分明也今此初靜慮善計度分別意識者可聞所成善心故也遂至下文述善及染汚分別意識生自下地容現在前非生上地依身在下地起上地聞惠云事誰可疑之哉婆沙抄四末中引此文云以此文證身在下地亦能起上地聞惠若唯第四十二卷文如納異中金剛定又不許下地起上地聞惠若爾時違此文勘定文此釋意婆沙論中有異地聞惠起不起二師異説見若爾婆沙論文前後相違各述一師説意不可和會之歟重難云婆沙論中有異地聞惠起不起二師異説者光法師可述其旨何唯成不起一説意哉是一次婆沙論説眼識後起分別意識之文可通定善更非起異地聞惠之證據哉是二答婆沙論中雖有異地聞惠起不起二師異説今論意存不起異地聞惠云師義見故勘今論餘處七文明十二心相生云欲界善心無間生九謂自界四色界二心於入定時及續生位如其次第生善染心出欲界善心無間生色界善心位唯舉入定時若起異地聞惠者何唯限入定時哉爰知今論意存依身在下地不起上地聞惠云師義云事故光法師製今論疏處處數成不起異地聞惠之旨餘處解釋中云必不能起異地散善故不別説亦此意也何況披婆沙論處處之文多順不起異地聞惠云義所謂或百七云然滅道法智能斷色無色界結者唯生欲界非生色無色界所以者何入於法智方便心唯欲界繫生上二界者已捨此心必不起故文或百十三云生欲界者若起色界善心及彼地無漏正見俱生心由十善業道俱生思究竟轉若起彼地盡智無生智俱生心由九善業道俱生思究竟轉文若依身在欲界起色界聞惠者入於法智散心寧不通色界哉依身在欲界何亦無色界三善業俱生思究竟轉之義哉此等論文不起異地聞惠見歟故光法師不顧起異地聞惠云一處説當卷之中餘處之釋數述依身在下地不起上地聞惠之旨也次婆沙論説眼識後起分別意識之文唯就散心論之也故婆沙論七十二云問此六識身幾有分別幾無分別答前五識身唯無分別第六識身或有分別或無分別且在定者皆無分別不在定者容有分別計度分別遍與不定意識俱故此中且説眼識後起分別意識文正理論云應知此中且辨計度及與不定隨念分別遍諸地故約此二種文任此當論文眼識後起分別意識唯就散心論之云事甚分明也重難云光法師假設得起聞惠亦不能生以威儀心不能生加行善心故之釋可起異地聞惠見何云光法師釋偏成不起異地聞惠之旨哉答此釋顯假令事非許起異地聞惠也去承久三年愚僧於東大寺東南院勤仕世親講講師之時問者藏圓法師疑此論義憶念其座講答之趣記其梗概耳別有相承義委細問答等如彼本抄載之問正理論意依身在下地可起上地聞惠耶答此事難測且可有起不起二義也兩方若起上地聞惠者披光師解釋云不起異地生得善心正理有文如下當引亦不能起異地聞惠此惠由彼生得導引既不能起生得善心故聞惠心亦不能起文文相起盡無諍正理論意依身在下地不起上地聞惠見若依之爾者正理論八中説眼識後起分別意識云又上地分別應唯善非無記前已説因故文此文既述依身在下地起上地善分別意識之旨明知起異地聞惠云事加之辰旦人師釋正理論二十無容起彼生得善心生在此間不能令彼起現前故云文云當知下地起上散善但聞惠攝文如何答依此首難定且可載學者二義也一義云正理論意依身在下地可起上地聞惠也其趣即如一方疑難何況勘正理論八文云若諸異生生在欲界已離初定貪未離二定貪以二靜慮眼見欲界色時此色唯是無覆無記眼識所識於此復起初定分別不退法者則唯有善以二靜慮眼見初定色時此色唯是無覆無記眼識所識於此復起初定分別不退法者則唯是善文此文既云依身在欲界已離初靜慮貪未離第二靜慮貪不退法異生以第二靜慮眼見欲界及初定色後起初靜慮善分別意識故依身在欲界起上地聞惠之旨甚分明也但於光師解釋者正理有文如下當引者但為證不起異地生得善心也亦不能起異地聞惠以下依別文理證成不起異地聞惠之旨故全非相違歟問光法師釋生上三靜慮天眼天耳二通不現前位成就不成就後二通相作三解釋爾者初釋意如何釋之耶進云光法師釋云解云生上三定成下二通文付之五識是勢力微劣法也他地現起之時何可有三世得哉是以今論中舉得識不得眼句云謂生二三四靜慮地眼識現起文若成就彼二通者生上三靜慮眼識現起位不可云得眼識何況披婆沙論文述生上三靜慮成就眼耳身三識云唯無記者時有現前即便成就若不現前則不成就以五識身性羸劣故他地現起勢不堅強文此文無諍生上三靜慮天眼天耳二通不現前位不成就彼二通見加之泰法師引遍學三藏釋云二通初禪繫依初禪地發自地通三世成就乃至此中據身生上地起下地二通故唯有法俱得文寶法師引此釋依用之若爾光法師初釋意非只背俱舍婆沙兩論之文寧不違遍覺三藏稟承之釋哉答見光法師初釋云解云生上三定或下二通是通果故如成化心文此釋意云天眼天耳二通及變化心同是通果無記勢力強盛故設雖他地現起必可有三世得如彼生上地下地變化心不現前位成就彼變化心生上三靜慮天眼天耳二通不現前位成就彼二通為言故披今論餘處四文偈頌云無記得俱起除二通變化長行述謂眼耳通惠及能變化心勢力強故加行差別所成辨故雖是無覆無記性收而有前後及俱起得若工巧處及威儀路極數習者得亦許爾天眼天耳二通及變化心無所簡悉有三世得見若於二通三世得有無不定者何不如威儀工巧心分別之哉何況今論餘處中云未曾由加行曾修離染得婆沙論百三十一文述離染得者謂初靜慮所引發者離欲界染時得乃至第四靜慮所引發者離第三靜慮染時得五通有離染得云事分明也若生上三靜慮所起天眼天耳二通無前後得者豈可離下地染時得之哉若爾光法師初釋意專順此等文理者歟但於五識是勢力微劣法故他地現起不可有三世得云難者天眼天耳二通雖是五識攝禪定所生果勢力強盛法故他地現起亦有三世得也次於今論謂生二三四靜慮地眼識現起之文者光法師會之云論不説成據泛借説文婆沙論以五識身性羸劣故等之文準此釋可會通也次於泰法師所引遍覺三藏釋者光法師作三解釋之中第二釋意即存此稟承説也凡相傳儀外回邪意樂作別解釋人師常習歟至今此釋何強疑之哉重難云就初釋意猶不可然見今論定判不限謂生二三四靜慮地眼識現起之文以眼界望眼識界述得并成就四句分別之中生上三靜慮眼識不現前位不成就眼識之旨處處所見也正理顯宗三之説大同今論判婆沙雜心一之文亦明此廢立若生上三靜慮天眼天耳二通不現前位成就彼二通者寧不違此等諸論所説哉是一次婆沙論以五識身性羸劣故等之文據泛借説云會通亦有疑準次下若意識中變化心等設生他地勢亦堅強故不現前亦得成就之文思之五識身類無所簡他地現起勢不堅故生上三靜慮不現前位不成就之見明知生上三靜慮天眼天耳二通不現前位不成就彼二通云事是二答光法師會今論謂生二三四靜慮地眼識現起之文釋論不説成據泛借説之文由不限今論一段定判正理顯宗之説婆沙雜心之文同可會據泛借説也設雖有衆多之文會通之旨不可替歟次婆沙論以五識身性羸劣故等之文亦就泛借起眼耳身三識論之云今此文中不明生上三靜慮所起天眼天耳二通三世得有無相若意識中變化心等之等言等取發業通果心及相應心所立義可存也問光法師釋上三靜慮天眼天耳二通不現前位成就不成就彼二通作三解釋爾者第二釋意如何釋之耶進云光法師釋云又解生上三定不成下二通文付之天眼天耳二通禪定所生果勢力強盛法也設雖生上三靜慮彼二通不現前位何不成就哉是以披今論餘處四文述無記得俱起除二通變化天眼天耳二通可有三世得見加之五通有離染得者諸論一同所説也若天眼天耳二通無前後得者豈可有離染得義哉答見光法師第二釋云又解生上三定不成下二通通果有二一在意識其力強盛生上成下如變化心二在五識其力稍劣不能成下若繫屬自地依自地發者即有三世得如善習自地威儀工巧有三世得文此釋意云意識通果其力強盛他地現起有三世得故生上成下如變化心等五識通果其力稍劣他地現起唯有法俱得故生上三靜慮彼二通不現前位不成就之依初靜慮所發二通繫屬自地故有三世得彼二通不現前位亦成就之為言故見今論文舉得眼界非眼識句云及無色沒生二三四靜慮地時文若成就彼二通者從無色界沒生上三靜慮時寧不得眼識哉出得眼識非眼界句云謂生二三四靜慮地眼識現起及從彼沒生下地時文若成就彼二通者生上三靜慮眼識現起及從上三靜慮沒生下地時豈可得眼識哉述成就眼界非眼識句云謂生二三四靜慮地眼識不起明成就眼界亦眼識句云若生二三四靜慮地正見色時文生上三靜慮眼識不現前位不成就眼識云事此等文亦分明也正理論五文顯宗論説亦以同之加之婆沙論七十三中舉成就眼界不成就眼識界句云謂生第二第三第四靜慮眼識界不現在前文出成就眼界亦成就眼識界句云或生第二第三第四靜慮眼識界現在前文述成就色界不成就眼識界句云謂生第二第三第四靜慮眼識界不現在前文舉眼界不成就得成就非眼界識句云謂無色界沒生第二第三第四靜慮文出眼識界不成就得成就非眼界句云謂生第二第三第四靜慮眼識界現在前或從彼沒生欲界及初靜慮文述色界不成就得成就非眼識界句云謂無色界沒生第二第三第四靜慮文明眼識界不成就得成就非色界句云謂生第二第三第四靜慮眼識界現在前或從彼沒生欲界及初靜慮文如此證文前後猶多恐繁不抄可引見之雜心論中舉眼界不成就得成就非眼識界句云謂無色界沒生第二第三第四禪文出眼識界不成就得成就非眼界句云謂上三禪地沒生欲界及初禪若即位彼眼識現在前文述色界不成就得成就非眼識界句云無色界沒生上三禪中文明眼識界不成就得成就非色界句云即彼三禪沒生欲界及初禪若即住彼眼識現在前文任此等論諸説生上三靜慮眼識不現前位不成就眼識見若生上三靜慮所起天眼天耳二通有三世得者何無眼識不現前位成就眼識之義哉何況婆沙論中釋發智論六眼耳身識界梵世以下及生上三靜慮現在前成就不現在前及無色界不成就之文云若生第二靜慮已上唯無記者時有現前即便成就若不現前則不成就以五識身性羸劣故他地現起勢不堅強若意識中變化心等設生他地勢亦堅強故不現前亦得成就文此文意云若泛借起眼耳身三識若天眼天耳二通五識身類性羸劣故他地現起唯有法俱得其體不現前位不成就之若意識中變化心等勢力堅強故他地現起有三世得其體不現前位亦得成就為言就中見泰法師釋云奘法師釋云二通初禪繫依初禪地發自地通三世成就如善習自地威儀工巧三世得下文言二通變化三世得者據初禪二通説此中據身生上地起下地二通故唯有法俱得如身生上地借下三識及威儀心非是善習唯法俱得化心在意地不類二通也文若爾光法師第二釋意既得證據於有部諸論之説亦稟相傳於遍覺三藏之釋專順文理旁可依憑者歟但於天眼天耳二通禪定所生果勢力強盛法云難者彼二通雖是禪定所生果五識其性羸劣他地現起唯有法俱得故生上三靜慮不現前位不成就之也次於今論餘處無記得俱起除二通變化之文者光法師會之云諸論説二通三世得者據初定二通説若生上三定起下異地二通唯有法俱如泛借下三識及威儀心非是善習唯法俱得此論言不成下據此以説文次於諸論中説五通有離染得之文者就依身在欲界及初靜慮之人之天眼天耳二通有離染得也尋云第三釋意依身在初靜慮依上三靜慮所發天眼天耳二通有三世得歟次今此人生上三靜慮時可成就彼二通耶答云此事有二義或一義云依身在初靜慮依上三靜慮所發天眼天耳二通唯可有法俱得依他地發勢力羸劣故無前後得也故光法師釋云若繫屬自地依自地發者即有三世得如善習自地威儀工巧有三世得文此釋既云若繫屬自地依自地發者即有三世得故知依上三靜慮所發二通唯有法俱得也次今此人生上三靜慮時雖成就所依定不可成就能依二通彼二通無前後得不現在前位不成就故也或一義云依身在初靜慮依上三靜慮所發天眼天耳二通可有三世得彼二通繫屬自地法故雖依上三靜慮發在自地現起勢力強盛故也次今此人將生上三靜慮之時命終心位由易地故捨彼二通故生上三靜慮時雖成就所依定不可成就能緣二通也就後義疑云光法師若繫屬自地依自地發者即有三世得之釋依身在初靜慮依上三靜慮所發二通不可有前後得見若依身在初靜慮設雖何靜慮所發二通有三世得者依自地發者之言豈非無用哉就中見此釋所依憑泰法師所引遍覺三藏釋云二通初禪繫依初禪地發自地通三世成就文如何答問光法師釋生上三靜慮天眼天耳二通不現前位成就不成就彼二通相作三解釋爾