body:
  text: 俱舍論第十二卷抄問題問論中明一剎那量云或有動法行度一極微文寶法師意可云經部義耶問論中明一剎那量舉三師異説第二師意如可釋之耶問論文釋壞劫相云若時地獄有情命終無復新生為壞劫始文今此地獄者唯限無間地獄歟問論文云諸有地獄定受業者業力引置他方獄中文唯付未生有情論之歟為當可通已墮有情耶問論文云由此準知傍生鬼趣文爾者準知者指引置他方義歟問壞劫時除地獄餘趣中可有移往他方義耶問北洲可造不善順生業耶問水災風災時上生有情必可生梵世耶問大梵王必自上地下生歟問大梵王壞劫時上生極光淨天次成劫時還生為大梵王義可有耶問正理論意極光淨天有情中唯經二十中劫命終可有耶問光法師釋住劫時分作二解釋初釋意初減以去八萬已上住劫攝歟問光法師釋住劫中第二十劫云上至八萬多時經停文爾者八萬歲畢多時經停歟問婆沙論中述有説義云十劫器世間成十劫有情斷住文可正義耶問婆沙論評家意述大梵王相云經於半劫獨一而住文爾者指成劫二十劫歟問解脫經所説六十數中阿僧祇耶第六十數歟問論文云若餘方便亦得涅槃文今此涅槃者可亘二乘涅槃耶問增劫佛可出世耶問寶法師意第九住劫㸸留孫佛等四佛出世者引何文證之耶問賢劫最初出世佛可得先佛補處耶問聲聞種姓外可有別種姓部行獨覺耶問光法師釋部行獨覺先是聲聞得勝果時轉名獨勝論文作二解釋爾者以何釋判正義耶問論中明部行獨覺相舉二師異説第二師意唯限先是異生歟為當可許先是聲聞義耶問論文云麟角喻者謂必獨居文唯約一大三千界論之為當可通十方世界耶問光法師所引婆沙論云麟角喻者準佛應知文爾者正義意麟喻獨覺得緣麟喻獨覺他心智義可有耶問麟喻獨覺可得四無礙解耶問麟喻獨覺初發心可依教力耶問提婆達多當來所證獨覺菩提部行麟喻中何耶問論王出世可通增減劫耶問薩婆多宗意十方世界可許多佛同時出世義耶問輪王順次生必生欲天歟問四種輪王俱可具七寶耶問論文云有説彼地有淨居天故彼不遭諸災所壞文爾者他三千界可有淨居天耶俱舍論第十二卷抄問論中明一剎那量云或有動法行度一極微文寶法師意可云經義耶進云寶法師釋云經部答文付之論文無有簡別之言何云經部義哉是以光法師不判經部義哉何況正理論中雖破衆緣和合法得自體頃之初師義無破第二師今義若經部義者正理論師何不破此義耶答論文述一剎那量舉三師異説之中出第三師義云對法諸師説如壯士一疾彈指頃六十五剎那如是名為一剎那量文第三師義始置對法諸師之言故前二師説是經部義見故寶法師釋經部答中有二尤順論文哉但於光法師不判經部義云難者有部義中亦有此義故別不釋經部義歟次於正理論中不破此義云難者此義不違有部義故更不破之歟重難云光法師餘處釋三者意勢謂極遠方舉心緣時身即能至此勢如意得意勢名之論文舉一箇問難云若非間斷如至極遠度一極微經一剎那如何舉心身即至彼云云如此釋者度一極微經一剎那者是可有部義見如何答云寶法師意論文所載或有動法行度一極微者舉經部義云許也更非遮有部義中亦有此義故光法師餘處解釋全非相違歟問論中明一剎那量舉三師異説第二師意如何釋之耶進云論云或有動法行度一極微文付之日輪行度一四天下之間是一日一夜之時分也尋其一四天下周圍量遠三十六億一萬三百五十喻繕那也所有極微其數幾許算數譬喻所不能及若以行度一極微為一剎那量者所經剎那隨難稱計而任百二十剎那為怛剎那量臘縛此六十此三十須臾此三十晝夜之文思一日一夜之剎那數量當六百四十八萬剎那依之寶法師釋云日夜剎那唯有六百四十八萬文若爾行度一極微為一剎那量云師義豈不背百二十剎那為怛剎那量等之理哉答寶法師釋此事作二解釋第一釋云一日一夜剎那與此剎那不同日夜剎那唯是算數之法如此稱尺寸量極少之名無佛法時此數常定此生滅剎那即是諸法生滅之量經部云是諸法得自體頃有部即是取果之頃也文此釋意云日夜剎那與生滅剎那彼此自本各別長短不同也時極少剎那是諸法生滅剎那量一日一夜之間所有剎那數量不可稱計日夜剎那是算數譬喻之所及更非時極少剎那云也第二釋云二釋時之極少名一剎那是數量時之名也即是極少名一剎那極多名劫等剎那非不更有細分劫非更無有多時應更思之文此釋意云日夜剎那生滅剎那同是剎那名言所攝也本以時極多雖名劫其劫中如非無大中小不同本以時極少雖名剎那其剎那中亦可有細分長短不同故彼此更非相違云也問論文釋壞劫相云若時地獄有情命終無復新生為壞劫始文今此地獄者唯限無間地獄歟答唯可限無間地獄也兩方若唯限無間地獄者今論云若時地獄有情命終無復新生為壞劫始文婆沙論云從此以後捺落迦中有情命終不復生彼爾時已度二十住劫二十壞劫此為最初文兩論之文既無簡別之言明知可通餘地獄也若依之爾者今論釋成劫相云若初一有情生無間獄二十中成劫應知已滿文以成劫滿思壞劫初地獄無新生有情為壞劫始者唯可限無間地獄也如何答準法爾後壞必最初成之理思之最初壞處最後可成也故泰法師釋云法爾梵王後壞必最初成若地獄初壞必最後成故文婆沙論百三十四云由法爾力若處後空彼必先住若處先空彼必後住文而論文云若初一有情生無間獄二十中成劫應知已滿有情初生無間地獄之時為成劫滿故有情新生不生無間地獄之時可為壞劫始云事文理實必然也但於兩論之文無簡別之言云難者文實雖無簡別之言意唯可限無間地獄也尋云無間地獄壞畢之後極熱地獄等壞歟答不爾也地獄壞時分不過一中劫故一中劫間自無間地獄次第漸漸可壞也問論文云諸有地獄定受業者業力引置他方獄中文唯付未生有情論之歟為當可通已墮有情耶答可有二義也兩方若唯約未生有情論之者有情業力不思議受報之義是萬差也設雖已墮有情有受報未盡之類者依定業力何不引置他方地獄哉是以舊俱舍論云若衆生有定業必應於地獄受報未盡業引此衆生於餘世界地獄受報文泰法師釋云業由未盡者業力引置他方獄中文若非已墮有情者何可云受報未盡判業由未盡哉何況勘婆沙論處處之文地獄有情現身移往他方地獄中見若依之爾者見論文前後上云若時地獄有情命終無復新生為壞劫始下述諸有地獄定受業者業力引置他方獄中文相起盡無諍唯約未生有情論之見依之寶法師釋云應生不生名為壞劫文此釋意唯約未生有情論之云事尤分明也如何答云此事雖有二義暫可存唯約未墮有情論之云義也其故設雖業力不思議也於已墮有情何可有引置他方之義哉就中既云若時地獄有情命終無復新生為壞劫始文若有一劫等定報業之類何可生將壞地獄哉何況住劫之末生無間地獄之衆生不盡一劫壽命者寶法師何可釋地獄壞時不越中劫哉若至壞劫時盡一劫壽命者於已墮有情更不可有引置他方之義爰知約未墮有情論引置他方之義云事加之寶法師釋諸有地獄定受業者業力引置他方獄中之論文云此世界中若不定者容後時受或全不受諸有定者他方受也文若約已墮有情論之者豈可有或全不受之義哉約未墮有情論此義云事解釋實分明也但於舊俱舍論文者容受報未盡之者引置他方地獄云也更非約已墮有情論引置他方之義泰法師解釋會通亦同之次於婆沙論文者先見問詞或云若因破僧生無間地獄壽命未盡世界便壞者彼中夭不或云若諸有情於劫將壞餘半劫在破和合僧墮無間獄有中夭不述於壞劫時犯破僧罪之旨故假設問非實義見答此問一師意或云彼由業力引置餘世界地獄中受或云劫欲壞時業增上力飄置餘界大地獄中亦可述假設義門何為實義相違哉重難云增一阿含經三十三云設復地獄中衆生宿罪以畢生天上若他方剎土設彼地獄衆生罪未畢者復移至他方剎土文如現文者已墮有情移往他方世界見是一次光法師所引正理論云毗婆沙師説第四定攝淨居故災不能損由彼不可生無色天亦復不應更往餘處由此證餘界無淨居天若餘世界中有淨居者應如地獄移往他方寧説不應更往餘處文上云由彼不可生無色天就已生淨居天之類論之鄰之云應如地獄移往他方約已墮有情論之云事尤分明也是二次寶法師釋遍淨天壽云此天劫初成時最初生容受六十四劫於後生者皆不得也若有定業應移餘界文上云於後生者皆不得也下判若有定業應移餘界約已生遍淨天之類論應移餘界之義見地獄例可同哉是三答增一阿含經文實似難思然而暫存一會通者已生地獄之者雖償一生罪業地獄宿罪猶未畢者自地獄亦生地獄為言非云現身移往他方地獄歟次正理論云餘世界中有淨居天者可移往餘世界中淨居天就未生淨居天之類可論之何可定就已生之類論之哉次寶法師若有定業應移餘界之釋此界遍淨天劫初成時過畢之後若有可受盡遍淨天六十四劫之定業之類可生餘世界劫初成遍淨天云也此釋意何亦可定就已生之類談之哉或一義云有情業力不思議也地獄業因最強盛也設雖已墮有情何無引置他方之義哉上至世尊無能遮抑以業勢力最強盛故之理誰不信之哉是以舊俱舍論云若衆生有定業必應於地獄受報未盡引此衆生於餘世界地獄受報文泰法師釋云諸有地獄定報業應受一劫報者至地獄空盡時業由未盡者業力引置他方獄中文未墮有情未全受報何可云受報未盡判業由未盡哉何況增一阿含經云設復地獄中衆生宿罪以畢生天上若他方剎土設彼地獄衆生罪未畢者復移至他方剎土文見婆沙論處處文或百十九問若因破僧生無間地獄壽命未盡世界便壞者彼中夭不畢彼無中夭云一師意云彼由業力引置餘世界地獄中受文或百三十四問若諸有情於劫將壞餘半劫在破和合僧墮無間獄中夭不畢彼無中夭云一師意云劫欲壞時業增上力飄置餘界大地獄中文約已墮有情論引置他方之義云事此等經論之文實分明也彼云劫將壞時犯破僧罪設雖假設之言約引置他方之義何亦云假設之義哉加之光法師所引正理論云毗婆沙師説第四定攝淨居故災不起損由彼不可生無色天亦復不應更往餘處由此證餘界無淨居天若餘世界中有淨若者應如地獄移往他方寧説不應更往餘處文上云由彼不可生無色天就已生淨居天之類論之鄰之云若餘世界中有淨居者應如地獄移往他方就已墮有情論之云事尤分明也加之寶法師釋遍淨天壽云此天劫初成時最初生容壽六十四劫於後生者皆不得也若有定業應移餘界文上云於後生者皆不得也下判若有定業應移餘界約已生遍淨天之類論應移餘界之義見地獄引置他方之義例可同哉但於今論文者上云無復新生為壞劫始只先述劫將壞相許也下正述引置他方之義之時未見唯限未墮有情哉次寶法師應生不生名為壞劫之釋非難彼釋無復新生為壞劫始之論文故也釋業力引置他方獄中之論文之時非云應生不生何為疑難之端哉問論文云由此準知傍生鬼趣文爾者準知者指引置他方義歟答只總傍生鬼趣壞相可準知云也兩方若指引置他方義者光法師所引正理論云由此準知傍生鬼趣時人身內無有諸蟲與佛身同傍生壞故文如此文者非指引置他方之義見若依之爾者見論文起盡上述諸有地獄定受業者業力引置他方獄中畢下云由此準知傍生鬼趣文文相無諍可指引置他方之義見如何答由此準知傍生鬼趣者只總傍生鬼趣壞相準地獄壞相可知之云也非唯指引置他方之義許也故論具文云由此準知傍生鬼趣然各先壞本處住者人天雜居者與人天同壞文泰法師釋此文云由此準知下類釋傍生及鬼趣壞正文若爾光法師所引正理論文全非相違問壞劫時除地獄餘趣中可有移往他方義耶答可有此義也兩方若有此義者地獄是業果甚重之處故可有移往他方之義餘趣中何可有此義哉是以論中雖述諸有地獄定受業者業力引置他方獄中於餘趣中未論此義哉若依之爾者設雖餘趣中有決定業之者何無移往他方之義哉答諸有地獄定受業者業力引置他方獄中者就未墮有情論此義之義意者設雖餘趣中有決定業之者此界將壞之時豈無移往他方之義哉是以寶法師釋遍淨天相云若有定業應移餘界文餘趣中有移往他方之義云事寶法師解釋尤分明也但於論文餘趣中未論此義云難者暫從初舉地獄歟非云餘趣中無引置他方之義也問北洲可造不善順生業耶答可造之也兩方若云不造者於欲天既受不善果報北洲何不造不善順生業哉若依之爾者婆沙論云北俱盧洲能造四種善業三種不善業除順次生受文如何答當卷論文云北洲命盡生欲界天自北洲沒必生欲天者性相之所定也而於欲天既受不善果報故北洲造不善順生業云事更不可疑之是以餘處十五論文云諸處造四種地獄善除現不簡北洲不造不善順生業哉但於婆沙論文者就引業論之也更不可遮北洲造不善順生滿業矣問水災風災時上生有情必可生梵世耶答必先可生梵世也兩方若如生梵世者見長阿含經文二十一云水災起時世間人即修第三禪道身壞命終生遍淨天風災起時此世間人即修第四禪道身壞命終生果實天文取意如是文者水災風災之時上生有情不生梵世見若依之爾者論中説火災相云命終並得生梵世中畢餘災亦爾如應當知文文相起盡無諍水災風災之時上生有情必可生梵世見如何答水災風災之時上生有情必先可生梵世也法爾必然之理次第可上生故也是以論中説火災相云若時人趣此洲一人無師法然得初靜慮從靜慮起唱如是言離生喜樂甚樂甚靜餘人聞已皆入靜慮命終並得生梵世中乃至若時梵世隨一有情無師法然得二靜慮從彼定起唱如是言定生喜樂甚樂甚靜餘天聞已皆入彼靜慮命終並得生極光淨天文正理論三十二婆沙論百三十三文其意同之也既云火災欲起之時直不生極光淨天先世生梵世之後次生極光淨天故以之思之水災風災欲起之時必先可生梵世也何況今論云餘災亦爾如應當知文婆沙論云如説火劫世間壞時有情上生災起時分水劫風劫廣説亦然文水災風災之時有情上生之相可同火災之時云事此等論文實分明也加之探玄記十六云若生色界有三因謂加法爾力但器壞時法爾有聲又不得越次生二禪等仍待火至初禪始生二禪仍風至三禪始生第四文水災風災之時上生有情必先可生梵世云事此釋亦分明也但於長阿含經文者水災之時遂生遍淨天風災之時遂生廣果天故就遂可生留之處云爾也更不遮先世梵世歟重難云見正理論文云雖彼非無有中夭義而廣大福方生彼天八大劫壽中始經少分二十中劫頃寧即命終生極光淨天唯經二十中劫即命終之類無之見若水災風災之時自梵世生極光淨天自極光淨天生遍淨天者生極光淨天不及二十中劫即命終之義可有哉答正理論中生極光淨天唯經二十中劫即命終之類無之者談常途相也水災風災將起有情自下天次第上生之時法爾力故有此義事更非所遮歟問大梵王必自上地下生歟答爾也兩方若必下生者衆生造業感果其義非一準何必自上地下生哉若依之爾者光法師所引正理論云諸大梵王必異生攝以無聖者還生下故文如此文者大梵王必自上地下生見如何答有情業力衆生果報是不思議法爾所定故大梵王必依順後業自上地下生也故今論云初一有情極光淨歿生大梵處為大梵王文正理論云諸大梵王必異生攝以無聖者還生下故文大梵王必自上地下生之旨兩論之文實分明哉重難云此界大梵王修中間定造順生業為他三千界大梵王之義何強遮之哉是一次定諸處有中夭除北俱盧洲故大梵王可有中夭若爾何必自極光淨天下生可為大梵王哉成劫時初靜慮以下無一有情故自極光淨天下生為大梵王事可然大梵王有中夭之時初靜慮以下可有多有情故彼有情中何無修中間定為大梵王之類哉是二次以無聖者還生下故者多分自極光淨天下生為大梵王故從多分一往備必異生攝之故也何以之為定量可定必自上地下生為大梵王哉是三答法爾必然之理必自此界分齊極光淨天下生為大梵王也自他三千界來為此界大梵王自此界往為他三千界大梵王之義全不可有也必依順後業自此界分齊極光淨天下生為大梵王也次大梵王設雖有中夭六十中劫之內少分不受盡之可名中夭六十中劫之初中時分不可有中夭何可有替生別大梵王之義哉次述必異生攝之故云以無聖者還生下故從多分論之云事甚不可然哉問大梵王壞劫時上生極光淨天次成劫時還生為大梵王義可有歟答不可有此義也兩方若無此義者造業感果其相萬差也極光淨天亦非無中夭何強遮此義哉若依之爾者正理論中不可有此義見如何答極光淨天壽量是八大劫也而大梵王上生極光淨天即還生為大梵王之時分才二十中劫也時分長短遙異也何可有此義哉極光淨天有情雖非無中夭依廣大福業受彼天果報之類何才受彼天壽量三十二分之一分忽可有命終之義哉故正理論云初一有情極光淨歿生大梵宮者即為大梵王諸大梵王必異生攝以無聖者還生下故上二界無入見道故即由此故無一有情無間二生為大梵義既説大梵最後命終極光淨天壽八大劫二十中劫世界還成如何梵王生極光淨受少壽量還從彼歿雖彼非無有中夭義而廣大福方生彼天八大劫壽中始經少分二十中劫頃寧即命終以此觀知餘來生此文立理會疑之旨如文可思之重難云水災風災之時自梵世生極光淨天自極光淨天生遍淨天之者於極光淨天不可經八大劫壽量若爾例彼思之大梵王壞劫時上生極光淨天次成劫時還生為大梵王之義何強遮之哉是一次自大梵天生極光淨天盡八大劫壽量之後何無為他三千界大梵王之義哉是二次雜阿含經云佛告比丘我自憶宿命長夜修福得諸勝妙可愛果報之事於七年中修習慈心經七劫成壞不還此世七劫壞時生無音天七劫成時還生梵世空宮殿中作大梵王無勝無上領千世界文如此文者大梵王壞劫時上生極光淨天次成劫時還生可為大梵王見是三答水災風災之時有情自下天次第上生是法爾力異常途相故彼時生極光淨天才經少時壽量是別事也以之為例不可難常途義相哉次法爾必然之理必自此界分齊極光淨天下生為大梵王也自他三千界分齊極光淨天下生為此界大梵王自此界分齊極光淨天下生為他三千界大梵王之義全不可有也若許此義者依身欲界初靜慮人修中間定造順生業為他三千界大梵王之義可許歟若爾大可背文理故也次於雜阿含經文者問正理論意極光淨天有情中唯經二十中劫命終類可有耶答可有二意也兩方若無此類者極光淨天有情非無中夭何無唯經二十中間即命終之類哉若作之爾者正理論中不可有此義見如何答水災風災之時上生極光淨天之有情不經二十中劫之前即命終可生遍淨天也餘時極光淨天有情之中唯經二十中劫即命終之類全不可有也其故依廣大福業既受彼天果報寧可有才經二十中劫即命終之類哉故正理論云雖彼非無有中夭義而廣大福方生彼天八大劫壽中始經少分二十中劫頃寧即命終文以此文思之極光淨天等有情有中夭者隨其所應少分不受盡彼天壽量劫數許也才受最少分壽量即命終之類無之歟但水災風災被通有情自下天次第上之時生極光淨天才受最少分壽量即命終可生遍淨天是則法爾力非常途相故正理論中不顧彼時云八大劫壽中始經少分二十中劫頃寧即命終也問光法師釋住劫時分作二解釋初釋意初減以去八萬已上住劫攝歟答爾也兩方若住劫攝者見光法師初解釋云二十住劫前後相望前有情福勝後有情福劣住中初劫福最勝故應合受用上妙境界故下時極遲文若以初減以去八萬已上屬住劫攝者寧可云下時極遲哉設不言下時極遲從無量歲減至十歲之時分何不等中間十八哉若依之爾者光法師釋云從無量歲初減已去方名住劫文如何答光法師初釋意以初減以去八萬已上可云住劫攝也是以論云此洲人壽經無量時至住劫初壽方漸減從無量減至極十年即名為初一住中劫文光法師釋此文云準此論文壽漸減時方名住劫壽未減時是成劫攝文以初減以去八萬已上屬住劫攝云事論疏定判實以分明也故初第二兩釋意同以初減以去八萬已上可云住劫攝也兩釋意自無量歲減至十歲之時分齊等更不可有長短差異而以第二釋意思其初減時分自無量歲減至八萬歲之時分可同自八萬歲減至十歲之時分也不云增時減時之遲速之釋意初減時分同中間一增一減時分云故也而初釋意第二劫等已後有情福漸薄故增時稍遲減時漸疾故增減時分相望之時增時遲減時速也初減時分若如第二劫等減時同速者不可及一增一減時分故對第二劫等減時速初減云下時極遲也對第二劫等增時以初減時分不云下時極遲也如此得意之時初釋意更無其疑者歟問光法師釋住劫中第二十劫云上至八萬多時經停文爾者至八萬歲畢多時經停歟答爾也兩方若至八萬歲畢多時經停者設雖增至八萬歲之間何無多時經停之義哉是以寶法師釋此事云此後一劫雖同十八增至八萬以增遲故同前上下文如此釋者增至八萬歲之間多時經停見若依之爾者光法師釋此事作二解釋述初釋意云至第二十劫福最薄故上時極遲故初後劫等中十八畢第二釋意異之云上至八萬多時經停至八萬歲畢多時經停見如何答光法師第二釋意增時減時不論遲速故云上至八萬多時經停第二十劫增至八萬歲畢之後多時經停為言其旨如一方疑難之趣但於寶法師解釋者與光法師第二釋意可別也問婆沙論中述有説義云十劫器世間成十劫有情漸住文可正義耶答不正義也兩方若非正義者光法師引立世經云十劫成器世間十劫成有情世間文婆沙論有説義既同立世經意尤可正義哉若依之爾者見婆沙論文上舉此義畢下於如是説者義云一劫器世間成十九劫有情漸住文知十劫器世間成十劫有情漸住云有説義非正義云事如何答成中初劫起器世間後十九中有情漸住壞中後劫減器世間前十九中有情漸捨者俱舍正理顯宗三論其文全同之定知有宗一同之正義也故婆沙論有説意十劫器世間成十劫有情漸住者可非正義也故婆沙論百三十三云問幾劫器世間成幾劫有情漸住有説十劫器世間成十劫有情漸住有説五劫器世間成十五劫有情漸住如是説者一劫器世間成十九劫有情漸住文上二有説義俱非正義云事婆沙論文亦分明也但於立世經文者光法師會此文云立世經説梵王十小劫獨住然後梵輔等生彼經意説以大梵王獨一少故攝入器中故説十劫成器世間據梵輔已下從多分説故言十劫成有情世間此論多少通論故説十九劫成有情世間一劫成器世間文寶法師會此文云立世經説器及有情成壞各十劫與此不同者彼説梵王先生十劫獨住後梵輔等次第生故知梵輔已下十劫成也若兼梵王十九劫成梵王入成器中故十劫也故知梵王劫壞後十劫獨住文泰法師會此文云若依立世經十劫器世間成梵王一人入器世間攝十劫有情次第住文諸師會通其意一同也即其意云立世經意成劫初十劫間大梵王已雖下生唯大梵王一人是少故器世間中攝入之云十劫成器世間也故不可違後十九中有情漸住之意為言而婆沙論有説意存成劫初十劫間大梵王未下生第十一劫大梵王始下生云十劫器世間成十劫有情漸住故背後十九中有情漸住之意違大梵王壽量六十劫云文故為不正義也婆沙論有説意十劫壞有情十劫壞器云義非正義事準之可思也問婆沙論評家意述大梵王相云經於半劫獨一而住文爾者指成劫二十劫歟答爾也兩方若指成劫二十劫者成劫後十劫間梵輔天等亦可下生何可有大梵王獨一而住之義哉若依之爾者思婆沙論文相起盡可指成劫二十劫見答婆沙論述大梵王獨住等相舉三異説之中出評家義云應作是説經於半劫獨一而住經於半劫與衆共住經於半劫復與衆別二十中劫量半劫量文經於半劫獨一而住者指成劫間經於半劫與衆共住者指住劫間經於半劫復與衆別者指壞劫間也但於成劫後十劫間梵輔天等亦可下生云難者光法師釋此事云前有情世間中引婆沙評家義梵王二十中劫獨一而住者通初後説初十劫獨一而住梵衆生已未敢共居後經十劫然始共居故知有二十劫文此釋意云經於半劫獨一而住者通説成劫初後十劫也初十劫間大梵王實獨一而住後十劫間梵輔天等亦雖下生恐大梵王之威勢力未敢共居故猶有大梵王獨一而住之義為言問解脫經所説六十數中阿僧祇耶者第六十數歟答雖有二義暫可存第六十數云義也兩方若第六十數者今論中十十倍增至第五十二重為阿僧祇耶見若忘失中間者寧不背十十倍增之義哉是以光法師釋云阿僧祇耶第五十二於此六十數中其一至論主出世現有前五十二諸傳誦者忘失後八若數大劫至此六十數中第五十二阿僧祇耶名劫無數文圓暉法師釋云解脫經説六十數中阿僧祇耶是第五十二一數文加之婆沙論中十十倍增至第五十二數列阿僧祇耶畢云此後更有八數及前為六十數積一一大劫至此第五十二阿僧祇耶數時名一劫阿僧祇耶文泰法師引此文畢云依毗婆沙有七師説今俱舍文取毗婆沙第三師説若數大劫至此六十數中第五十二阿僧祇耶文阿僧祇耶第五十二數云事此等定判誰可疑之哉若依之爾者舊俱舍論并唐土人師解釋中阿僧祇耶第六十數見如何答阿僧祇耶者梵語此翻云無數若第五十二數者寧可云無數哉是以今論云於此數中忘失餘八全不云忘失後八有何誠證可判第五十二哉何況舊俱舍論云間中有八處忘失如此大劫次第數至第六十處説名一阿僧祇文加之見香象大師處處解釋五教章云如是展轉至第六十為一阿僧祇依此以數三僧祇也文探玄記十五云準俱舍論數至六十重名一阿僧祇此約小乘文任此等定判阿僧祇耶第六十數云事實分明也但於背十十倍增之義云難者傳誦者誦解脫經之時忘失中間八數誦之故實雖非十十倍增附現所有數誦十十倍增之旨也次於光法師解釋者具舉六十數之時阿僧祇耶雖可為第六十數忘失中間八數自當第五十二數故付此現所數云前五十二云忘失後八也婆沙論文諸師解釋會通之旨準之可思也問論文云若餘方便亦得涅槃文今此涅槃者可亙二乘涅槃耶答可亙二乘涅槃也兩方若亙二乘涅槃者寶法師釋此文云既有六十劫或三生方便亦得涅槃文如解釋者唯可限聲聞涅槃見若依之爾者涅槃之言是廣何不亙二乘涅槃哉答見論文前後上述如何不許願長時修無上菩提甚難可得非多願行無容得成菩薩要經三劫無數修大福德智慧資糧六波羅蜜多多百千苦行方證無上正等菩提是故定應發長時願畢次難之云若餘方便亦得涅槃何用為菩提久修多苦行文既舉修少方便速得涅槃之類難之故若餘方便亦得涅槃之文可亙聲聞緣覺涅槃云事道理實必然也故光法師釋此文云若餘二乘修少方便亦得涅槃文但於寶法師正釋者暫就速得涅槃之類先舉聲聞三生六十劫修行略不舉緣覺歟故泰法師釋此文云若餘三生方便亦得涅槃文唯舉三生得脫之類即亦此意歟更非遮涅槃之言實通緣覺也問增劫佛可出世耶進云論云減八萬至百諸佛現世間文增劫佛不出世也附之諸佛大悲是廣普可利增減劫衆生何唯減劫出世增劫不出世哉何況二十住劫之中第九住劫四佛既出世後十一住劫之中九百九十六佛可出世歟而增劫佛不出世者上天下天之時分不可相稱哉答增劫之時有情樂增難教化故佛不出世也故論中問答此事云何緣增位無佛出耶有情樂增難教厭故文婆沙論云唯於減時佛出于世文加之雜心論九云劫減時佛興於此順解脫師故佛是解脫師為捨生死出世説法增時衆生向生死見轉勝樂故若爾時佛出世者則為空於以衆生不能捨生死極著樂故文增劫之時佛不出世之旨此等論文尤分明也但於增劫佛不出世上天下天之時分不可相稱云難者後十一住劫之中十箇減劫時分猶久其間九百九十六佛次第出世有何所遮哉一增一減之間補處菩薩於兜率天數死數生以之思之十箇減劫之間九百九十六佛次第出世之時上天下天之時分何不相稱哉重難云後十一住劫之中諸佛出世不亙十箇減劫歟其故演義鈔云如大賢劫有二十增減為中劫第十五劫有九百九十四佛出世則一劫中容多佛矣文玄贊云如賢劫千佛今第九住劫已四佛出後第十劫彌勒佛出至第十五劫有九百九十四佛出文妙樂大師疏記之釋其意大同之如此等解釋者第十五劫一減之間九百九十四佛出世見若爾上天下天之時分爭可相稱哉答問寶法師意第九住劫拘留孫佛等四佛出世者引何文證之耶進云寶法師引立世經第九卷八小劫已過十一小劫未來第九一劫現在未盡之文證之也付之第九一劫現在未盡之文雖見第九住劫釋尊出世之旨未云第九住劫拘留孫佛拘那含牟尼佛迦葉佛出世寶法師何引此文證第九住劫拘留孫佛等四佛出世云義哉答勘立世阿毗曇論文云是二十小劫世界起成已住者幾多已過幾多未過八小劫已過十一小劫未來第九一劫現在未盡第九住劫釋尊出世見而賢劫經中述拘留孫如來人壽四萬歲時出世拘那含牟尼如來人壽三萬歲時出世迦葉如來人壽二萬歲時出世釋迦牟尼如來人壽百歲時出世之旨更不云各別劫出世故依立世阿毗曇論今文拘留孫佛等四佛同劫可出世得意也故寶法師解釋強無其疑歟問賢劫最初出世佛可得先佛補處耶答可有二義也兩方若得先佛補處者既隔壞劫空劫成劫之時分於何佛處得補處記別哉若依之爾者諸佛出世成道之習得先佛補處可成正覺也如何答思此事可有二義也或一義云賢劫最初出世佛既隔壞劫空劫成劫之時分故不可得先佛補處也得先佛補處出世成道者被云一生所繫菩薩上生下生之時常儀式也如賢劫最初出世佛少分不得先佛補處成正覺之類強不可遮之歟或一義云賢劫最初出世佛可得先佛補處也諸佛出世成道之習必得先佛處可成正覺至賢劫最初出世佛豈無此義哉但至隔壞劫空劫成劫云難者莊嚴劫之末得先佛補處之後此界壞劫等之時生他三千界人天趣等至此界住劫之時上生兜率天被云一生所繫菩薩之後下生人中可唱正覺也例如釋尊人壽二萬歲之時得迦葉佛補處之後人壽千二百歲之時上生兜率天被云一生所繫菩薩之後人壽百歲之時下生人中得菩提也問聲聞種姓外可有別種姓部行獨覺耶答可有二義也兩方若有別種姓部行獨覺者今論云然諸獨覺有二種殊一者部行二麟角喻部行獨覺先是聲聞得勝果時轉名獨勝文正理論云然獨覺乘總有二種一麟角喻二先聲聞文任此等論文聲聞種姓之外全不可有別種姓部行獨覺見若依之爾者今論餘卷二十三述轉向餘乘之義云有餘獨覺異麟角喻起彼種姓初二善根轉向餘乘理無遮礙文此文無諍可有別種姓部行獨覺見如何答別種性部行獨覺有無者雖為古來之未決任先德多分之義有別種性部行獨覺云義可存也其故有情根性分萬差斷惑證果非一準何無自本有部行種姓求獨覺菩提之類哉是以勘婆沙論處處之文或七云轉獨覺種姓暖起佛或聲聞種性暖文或六十八云部行喻者暖頂位中轉趣佛乘不違理故文或三十云若部行喻獨覺其力不可定説以彼多是聲聞種姓後遇別緣得無學果文加之今論餘卷云有餘獨覺異麟角喻起彼種姓初二善根轉向餘乘理無遮礙文光法師釋此文云雖初發心由其教力後將入聖獨悟道故得獨覺名若麟角喻唯獨悟道文顯宗論十七云部行獨覺修因時量減百大劫時無定限文任此等文理聲聞種姓之外可有別種姓部行獨覺云事實分明也但於今論部行獨覺先是聲聞之文者部行獨覺多分先聲聞之類故從多分如此云也非遮少分有別種姓之類次於正理論一麟角喻二先聲聞之文者別種姓部行獨覺初發心時由教力故先聲聞之言下攝之也故光法師釋説別種姓部行獨覺相之論文云雖初發心由其教力後將入聖獨悟道故得獨覺名若麟角喻唯獨悟道故正理云然獨覺乘總有二種一麟角喻二先聲聞若先聲聞如聲聞説文既標故正理云引合此文明知二先聲聞之言下可攝別種姓部行獨覺云事重意云二先聲聞者廣亙先聲聞別種姓二類部行獨覺若先聲聞者唯當別種姓部行獨覺明轉向餘乘相故也重難云廣披諸論説委尋獨覺相部行獨覺有別種姓之類云事全所不見也所謂見今論餘卷文或云七聲聞二佛差別由九根或述聲聞麟喻佛如次知見道二三念一切全不見有別種姓部行獨覺加之見婆沙論處處之文或七説獨覺種姓云部行獨覺種姓不定如聲聞説文或六十三述九遍知成就云部行喻者如聲聞説麟角喻者如菩薩説文或百七十明六十五等至成就云獨覺中部行者如欲界聲聞麟角喻者如佛文此等諸文併以部行獨覺似同聲聞見若爾先聲聞之外全不可有別種姓部行獨覺哉次光法師雖初發心由其教力後將入聖獨悟道故得獨覺名之釋為證據者今論有餘師説彼先是異生曾修聲聞順決擇分今自證道得獨勝名之文有別種姓部行獨覺云歟若爾部行獨覺先是聲聞云師意可云不許別種姓部行獨覺歟答部行獨覺多分先聲聞之類也如云婆沙論文以彼多是聲聞種姓也故此等諸論之文從多分論之更非遮少分有別種姓之類次今論有餘説彼先是異生之文更非別種姓部行獨覺之證據彼聲聞種姓異生離教力入聖道之時得獨覺稱云也後將入聖獨悟道故者自本談獨覺種姓之類故為別種姓部行獨覺之證據也彼此義門遙異不足為相例歟問光法師釋部行獨覺先是聲聞得勝果時轉名獨勝論文作二解釋爾者以何釋判正義耶進云光法師判前解為勝部行獨覺先是聲聞前三果人後得第四勝果之時離教獨證勝果轉名獨勝云初釋為正義云也附之依解釋定判見論文起盡只述先是聲聞未云前三果僅判得勝果時未見第四果何得論文忽判前解為勝哉是以泰法師雖作二解釋更無判正不何況七生須陀洹果聖者出無佛世證第二第三果之時豈無離教獨證之義哉若有離教獨證之義者以初果云先是聲聞指後三果可云轉名獨勝也依之寶法師釋云部行獨覺先是預流果聲聞彼後無佛時進得勝果故名獨覺文此釋意以初果云先是聲聞以後三果可名獨覺見加之若云是先聲聞前三果人者證聲聞第三果之人何總出無佛世可證獨覺菩提哉答光法師前解為勝之定判非無深由先思道理獨覺者以麟喻為其本而彼偏一向一果之人也先聲聞部行者本是聲聞種姓更非獨覺種姓然而似同麟喻有離教力得第四果之義故得獨覺名也更以前三果不可云獨覺果是以婆沙論云若部行喻獨覺其力不可定説以彼多是聲聞種姓後遇別緣得無學果文今論餘卷云至第七有逢無佛法時彼在居家得阿羅漢果文獨覺果者指無學果云事此等論文實分明也若爾前解為勝之定判尤順文理者歟但七生須陀洹果聖者出無佛世證第二第三果之時雖有離教獨證之義不可云獨覺果獨覺果者自本名第四果故也故聲聞種姓之人所證第二第三果故雖有離教獨證之義猶是聲聞果所攝不可云獨覺果也次於寶法師解釋者人師異釋也不必一準歟即同光法師第二釋意歟次由教力證第三果之人至無佛世證第四果之義更不可許之先是聲聞前三果人者證第三果之時雖不由教力獨覺果者自本名第四果故出無佛世證第三果猶可攝屬聲聞果也問論中明部行獨覺相舉二師異説第二師意唯限先是異生歟為當可許先是聲聞義耶答可許先是聲聞之義也兩方若不許先是聲聞義者設雖此師意何不許七生須陀洹果聖者出無佛世獨證第四果之義哉若依之爾者見論文異先是聲聞之義述有餘説彼先異生定知不許先是聲聞之義云事如何答論中明部行獨覺相舉二師異説出初師義云部行獨覺先是聲聞得勝果時轉名獨勝文此師意云初先聲聞部行獨覺不許先是異生之義彼住師迦山中五百仙人本是初果聖者也為言即可同婆沙論四十六評家云如是説者彼法爾成佛弟子相乃至得極果如五百仙人在件師迦山中修道本是聲聞於無佛世獼猴為現佛弟子相彼皆學之證獨覺果無學不受外道相故之義也出第二師義云有餘説彼先是異生曾修聲聞順決擇分今自證道得獨勝名由本事中説一山處總有五百苦行外仙有一獼猴曾與獨覺相近而住見彼威儀展轉遊行至外仙所現先所見獨覺威儀諸仙覩之咸生敬慕須臾皆證獨覺菩提若先是聖人不應修苦行文此師意云為先聲聞部行獨覺之本件師迦山中五百仙人本是凡夫也起戒禁取修苦行故為言廣論之時非不許七生須陀洹果聖者出無佛世獨證第四果名先聲聞部行獨覺也重意云初師意不許先是異生之義第二師意兼許先是聲聞之義是其今論二説差異也問論文云麟角喻者謂必獨居文唯約一大三千界論之歟為當可通十方世界耶答可有二義也兩方若唯約一大三千界論之者麟喻獨覺是最上利根之人也約十方世界更難有並出之義哉是以光法師所引婆沙論云麟角喻者根極勝故樂無故當知如佛文如此文者約十方世界無並出之義見若依之爾者他三千界非麟喻獨覺境界設雖樂獨居約十方世界有並出之義有何所遮哉是以約輪王者雖述獨如佛豈非餘世界出現哉加之婆沙論云餘世界中有麟角喻獨覺出世無理遮故如何答云此事雖有二義暫可存通十方世界論之云義也其故麟喻獨覺是最上利根之人也設雖十方世界輒不可有多類是以光法師所引婆沙論云麟角喻者根極勝故樂獨出故當知如佛必無有二並出世間如舍利子尚無並出況麟角喻勝彼多倍文既云樂獨出故當知如佛亦述如舍利子尚無並出一段之文無諍約十方世界唯可有一人見但於他三千界非麟喻獨覺境界云難者他三千界實雖非彼境界根極勝故無並出之義何強疑之哉次於輪王例難者輪王就統領分齊述獨如佛故約一四天下論之麟喻依根極勝故云當知如佛故約十方世界論之義門既異彼此更非相例次於婆沙論文者指他三千界云餘世界也彼一師意他三千界有麟喻獨覺出世故此世界麟喻獨覺起他心智緣彼云故是不正義也故光法師引婆沙論二説畢云雖有二説然無評家前既不言有説且以前説為正又同婆沙前文文此釋意婆沙論正義意麟喻獨覺約十方世界唯可有一人見加之婆沙抄云麟角獨覺亦有二説前説為勝在他界中亦無獨覺故衆出獨覺如聲聞説文此釋意以餘世界中有麟角喻獨覺出世無理遮故之義為不正義之旨亦分明也問光法師所引婆沙論云麟角喻者準佛應知文爾者正義意麟喻獨覺得緣麟喻獨覺他心智義可有耶答可有此義也兩方若有此義者既決定不起智品也何可有得彼之義哉若依之爾者見婆沙論一段之文上舉佛緣佛他心智得不得之二説了下云麟角喻者準佛應知文論文無諍麟喻獨覺緣麟喻覺他心智得不得可有二説聞而光法師以今此二説俱判正義見若爾正義意麟喻獨覺得緣麟喻獨覺他心智之義可有被得如何答約婆沙論今異説大定邪正之時或云麟喻獨覺不得緣麟喻獨覺他心智或云得而不現起之二説俱無背道理故對亦説能緣亦説現起餘世界中有麟角喻獨覺出世無理遮故云師義之時以上二説俱可為正義也光法師判雖有二説然無評家前既不言有説且以前説為正又同婆沙論文即述此意也此判前説為正之內二説之中強又判邪正之時麟喻獨覺不得緣麟喻獨覺他心智云師義是勝麟喻獨覺得緣麟喻獨覺他心智云師義可劣也既決定不起智品不可有得能緣之義故也故婆沙抄云問佛得緣佛他心智不有説不得無二如來俱出世故有説得緣此説能緣不説現起雖無評家前説為善故論云如來無漏心心所法及未曾得有漏心心所法俱非他心智現所取境麟角獨覺亦有二説前説為勝在他界中亦無獨覺故衆出獨覺如聲聞説文加之婆沙論十八云非想非非想處亦有十一遍行隨眠皆唯自地緣無上地故不緣上故有説亦有他地緣者然能緣定非現起定評曰彼不應作是説既無上地可緣如何有能緣定是故説無於理為善文是又例證也問麟喻獨覺可得四無礙解耶答可得之也兩方若得之者得四無礙解專可由教力也而麟前獨覺不藉教力何可得四無礙解哉是以淨影大師大乘義章云或有功德唯佛菩薩阿羅漢百餘人皆無謂四無礙無諍願智邊際智等文如此釋者麟喻獨覺不得四無礙解見若依之爾者光法師解釋中獨覺可得四無礙解見如何答麟喻獨覺是最上利根之人也何不得四無礙解哉是以論文云何緣獨覺言不調他非彼無能演説正法以彼亦得無礙解故文光法師釋此文云何緣獨覺言不調他非彼無能演説正法以彼亦得四無礙解故文既云獨覺得四無礙解定可當麟喻獨覺也何況光法師餘處釋除佛所餘一切聖者所説六種唯加行得非離染得非皆得故之論文云然婆沙明願智無上智中皆言如是説者若決定可得者彼離染得盡智時得故後加行現在前佛不加行獨覺下加行聲聞或中或上然有願智無諍智由邊際定加行故得加行故現在前解云婆沙通據少分故説二乘亦有離染得俱舍以二乘離染得不定故但言加行得文麟喻獨覺既最上利根之人也豈非無諍願智四無礙解決定可得之類哉加之婆沙論明六十五等至成就云佛定成就五十七獨覺中部行者如欲界聲聞麟角喻者如佛文麟喻獨覺得四無礙解云事此文尤分明也但於麟喻獨覺不藉教力不可得四無礙解云難者麟喻獨覺初發心已後雖不藉教力極利根故初盡智現前位決定可得法可得四無礙解也次於大乘義章解釋者不云毗曇義者何及會通哉問麟喻獨覺初發心可依教力耶答可依教力也兩方若依教力者麟喻獨覺是最上利根之人也設雖初發心更不可依教力是以光法師餘處解釋中釋獨覺名言上判雖初發心由其教力後將入聖獨悟道故得獨覺名畢下云若麟角喻唯獨悟道文文相起盡無諍麟喻獨覺初發心不由教力見若依之爾者出生死證菩提尤可由教力何難如來方便説可有出離得脫之義哉是以論文釋獨覺相云又能憶念過去所聞諸佛所宣正教理故文如此文者麟喻獨覺初發心可由教力見如何答出離生死證得菩提必由佛教力設雖麟喻獨覺初發心何不由教力哉是以光法師釋又能憶念過去所聞諸佛所宣聖教理故之論文云又彼獨覺得宿命智而能憶念過去所聞佛説教理文寶法師釋言獨覺者謂現身中雖稟至教唯自悟道以能自調不調他故之論文云非唯因位不因教也文何況見今論處處之文或一云如理師言顯利他德能方便説如理正教從生死泥拔衆生出不由威力與願神通文光法師釋此文云但由正教濟拔有情令出生死文或釋獨覺智勝之義云久習多聞勝思擇故文或述殖順解脫分善之義云遇佛出世殖此善根文寶法師釋此文云準此論餘時不能種殖遇佛出世者或親見佛或遇教法知生死可厭知涅槃可欣故能種殖解脫分也文加之婆沙論釋殖順解脫分善之相云佛出世時要有佛法方能種故文任此等文理麟喻獨覺初發心必可由教力云事更不可疑之但於光法師餘處解釋者除最初發心就中間發心部行獨覺云雖初發心由其教力對之判若麟角喻唯獨悟道也全非相違問提婆達多當來所證獨覺菩提部行麟喻中何答可有二義也兩方若部行獨覺者既不云有部儻定可麟喻獨覺也是以光法師餘處引婆沙論説云如毗奈耶説提婆達多當於人壽四萬歲時來生人中必定當證獨覺菩提舍利子等所不能及文若部行獨覺者豈可云舍利子等所不能及哉若依之爾者婆沙論云提婆達多已修得暖不久得頂著名利故還退失暖復斷善根文而麟喻獨覺是一坐成覺之人也更不可云退暖善根斷善根哉答云此事雖有二義暫可存部行獨覺云義也其故麟喻獨覺是最上利根依第四靜慮一坐成覺提婆達多既退暖善根之人也定可非暖喻獨覺又不可云昔起聲聞暖善根畢轉成麟喻獨覺提婆達多退暖善根者不見曾所起暖善根故也即推之可云別種姓部行獨覺也若爾云舍利子等所不能及全非相違問輪王出世可通增減劫耶答可通增減劫也兩方若通增減劫者輪王果報是甚勝也更不可有減劫出世之義哉依之婆沙論云於唯增時輪王出世文若依之爾者雜心論云轉輪聖王多於增時出于世間文多言所顯少分可有減劫出世之義見如何答見論文前後偈頌結輪王八萬上長行述從此洲人壽無量歲乃至八萬歲有轉輪王生減八萬時有情富樂壽量損減衆惡漸盛非大人器故無輪王輪王人壽八萬歲已上時分出世故通增減劫也所謂二十住劫之中自無量歲初減人壽八萬歲已上位并十九增位人壽八萬歲時輪王出世也故光法師釋此文云準此論文四輔輪王皆於人壽八萬已上方出世間文減劫唯限初減增劫廣亘十九增位故多分增劫出世少分減劫出世也雜心論轉輪聖王多於增時出于世間之文其意在之加之泰法師餘處釋如有能招轉輪王業要至人壽八萬歲時或過此時方頓與果非於餘位此亦應然之論文云譬如有能招轉輪王業要至人壽八萬歲時或過此時如劫初時無量歲等方頓與果非餘劫減餘位文自無量歲初減人壽八萬歲已上位輪王出世之旨此釋亦分明也但於婆沙論於唯增時輪王出世之文者準雜心論多於增時之文思之從多分云也從多分置唯言事慈恩大師因明大疏中有例證也問薩婆多宗意十萬世界可許多佛同時出世義耶進云論云唯一世尊普於十方能教化故文付之衆多菩薩同時發菩提心俱修習菩提資糧至出世成道何可有前後哉何況見餘處論文云三界無邊如虛空量文若唯限一佛者教化力用難及無邊世界哉加之今論引梵王經云我今於此三千大千諸世界中得自在轉文如此文者一佛教化力用不及餘界見若一佛化用不及餘界者他三千界寧無能化佛出世之義哉答薩婆多宗意定勿薄伽梵功能有礙唯一世尊普於十方能教化故世尊功能無障無礙利益遍及十方世界故十方世界唯一佛出世無多佛並出之義云也是以今論引舍利子經云無處無位非前非後有二如來應正等覺出現於世有處有位唯一如來文十方世界唯一佛出世之旨今經文實分明也薩婆多宗意任此等文理定十方世界唯有一佛也但於衆多菩薩同時發心修行云難者設雖衆多菩薩同時發心修行成道有前後更有何過哉次於餘處論文者自本談世尊功能無障無礙普及十方一切世界故云三界無邊如虛空量更非所痛也次於梵王經説者即論會此文云謂若世尊不起加行唯能觀此三千大千若時世尊發起加行無邊世界皆佛眼境天耳通等例此應知文會通先在之疑難更非重矣重難云發心乍許同時成佛必定前後云事甚難思哉是一是以見契經説云稽首去來現在佛亦復歸命釋迦文文上舉現在佛畢下云亦復歸命釋迦文多佛並出云事實分明哉是二次證據所備舍利子經云有處有位唯一如來者是舍利弗尊者之言也而他三千界非彼境界何以此文可證十方世界一佛出世之義哉是三何況今論引契經云無處無位非前非後有二如來應正等覺出現於世有處有位唯一如來如説如來輪王亦爾文而輪王既有餘界出世之義如來例可同哉是四加之餘部意依此等文理許多佛並出之義哉是五答衆多菩薩同時雖發心修行所化根機有熟未熟所修行業有精進懈怠故約成佛時有前後事更有何過哉次於契經稽首去來現在佛亦復歸命釋迦文之文者釋迦是現在教主故別亦歸敬之也非云現在有多佛並出之義次於舍利子經説者有處有位唯一如來之文實雖舍利弗尊者之言佛不非之故引備證據也次於契經如説如來輪王亦爾之文者欲明一世界中二輪王不並出如佛不並出云也非云輪王如來其義全同何違文哉次於餘部説者自部他部宗義相分立道理之旨所存遙異引證據之文經説不同至此一事不足為疑者歟問輪王順次生必生欲天歟答受生之時必生欲天也兩方若必生欲天者輪王種類是萬差也何順次生必生欲天哉是以正理論云勸化令修十善業道故輪王死多得生天文多言所顯少分不生欲天之類可有聞若依之爾者今論云故輪王死定得生天文定得生天之言無諍順次生必生欲天見答輪王出世之時以十善業道教化有情故由此善業順次生必生欲天也故今論云勸化令修十善業道故輪王死定得生天文婆沙論云轉輪王出世時以十善法教導有情此法必於欲界天中受異熟果文輪王受生之時順次生必生欲天云事此等文理實分明也但於正理論多得生天之文者輪王之中有現身證阿羅漢果入涅槃之類故置多言也非少有生餘處之類故置多言也尋云輪王之中有現身證阿羅漢果入般涅槃之類云事證據有何處哉答婆沙論百七十八云如世尊説於末世人壽八萬歲時此贍部洲其地寬廣人民熾盛安隱豐樂有轉輪王名日銄佉威伏四方如法化世成就七寶其後不久剃除鬚髮以信出家勤修梵行於現法中成阿羅漢即能自知我生已盡梵行已立所作已辨不受後有得般涅槃文是其證文也問四種輪王俱可具七寶耶答俱可具七寶也兩方若俱具七寶者慈恩大師瑜伽論略纂云餘三輪王雖皆輪應銀銅鐵別亦無餘寶文如解釋者四種輪王不必具七寶見若依之爾者見今論文四種輪王無簡可具七寶見如何答四種輪王金銀銅鐵輪應雖別必可具七寶也是以見論文前後上標如是所説四種輪王威定諸方亦有差別畢下云經説輪王出現於世便有七寶出現世間文文相起盡無諍四種輪王俱可具七寶見何況次下輪文云如是所説諸轉輪王非唯有七寶與餘王別亦有三十二大士相殊文光法師釋此文云四種非一名諸輪王文四種輪王俱具七寶云事論疏今定判尤分明也但於瑜伽論略纂解釋者問論文云有説彼地有淨居天故彼不遭諸災所壞文爾者他三千界可有淨居天耶進云光法師釋云以此文證餘界無淨居天文付之世界安立自界他方其相可齊設雖他三千界何可嫌淨居天哉是以於下三天所無所遮之哉何況見餘卷論文云色究竟上復有欲界於欲界下有色究竟文如此文者他三千界有淨居天云事尤分明也加之若云有淨居天故不為外災所壞者他三千界第四靜慮寧不為外災所壞哉答論中釋第四靜慮不為外災所壞云有説彼地有淨居天故彼不遭諸災所壞由彼不可生無色天亦復不應更往餘處文若餘世界中有淨居天者應如地獄移往餘世界中淨居天也而既云亦復不應更往餘處故餘世界中無淨居天得意也故光法師二釋此文云以此文證餘界無淨居天故正理云毗婆沙師説第四定攝淨居故災不能損由彼不可生無色天亦復不應更往餘處由此證餘界無淨居天若餘世界中有淨居者應如地獄移往他方寧説不應更往餘處文但於餘卷論文者彼就世界重纍云師義論之今餘世界無淨居天者就世界傍布云師義論之既為別師異義不可及會通也次於他三千界第四靜慮可為外災所壞云難者他三千界第四靜慮雖無淨居天同是第四靜慮之類故不為外災所壞也重難云或一義云他三千界無淨居天者第四靜慮量無邊際云師意也非云淨居天唯限此世界更不可有他三千界第四靜慮可為外災所壞云疑也建長三年秋九月二十五日申時於東大寺知足院別所之草庵抄之畢俱舍論第十二卷者為去年總寺三十講之當處之間為聽聞加一見之次或訪明師或任愚案為開後昆後學之慧解聊記一問一答之網要不顧五旬之齡傾遙期一部之終功冥衆必垂納受善願遂欲成就而已仰世上之無常遮眼心中之悲歎銘肝之間自去十五日之暮立出尊勝院蟄居此別所日日受持八齋戒品夜夜讀誦一乘妙典終日記録俱舍問答寤寐奉唱彌勒寶號以懺悔過去現在甚重之罪障以欣求上天下生慈尊之值遇擬之今生無雙之作善必為來生得脫之良因仰願答此殷勤之誠心依此稽古今微功念念早捨離順逆之妄緣生生必習學權實之教法矣右筆華嚴宗末葉法印權大僧都宗性年齡滿五十夏臘三十八正和五年潤十月一日於東大寺三面僧坊南詣深位坊寅剋計馳筆了倩思上依之素意是為勤學之大勞因顧下愚昧心僅疲書寫之微功望古之聖訓注似有恥之象蹤業無益乎仍如形染抄了而已右筆兼學顯門沙門
