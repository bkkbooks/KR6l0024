body:
  text: 俱舍論第一卷抄下問佛𣵀槃後一千年中造雜心論歟答六百年中造雜心論也兩方若一千年中造之者光法師解釋中一千年中不造之見若依之爾者見嘉祥大師定判云千年之間有達多羅以婆沙太博四卷極略更撰三百五十偈足四卷合六百偈名為雜心也文如此釋者一千年中造雜心論見如何答披諸師解釋尋雜心説時光法師釋云佛𣵀槃後五百年中土火羅縛蝎國法勝論師造阿毗曇心論中隨生解有漏至六百年達磨多羅此云法救以生義有過如滅道諦諸漏雖生而非有漏改為隨增即無有過故今論主亦同彼釋文寶法師釋云佛𣵀槃後五百年中土火羅縛國法勝論師造阿毗曇心論中云若生諸煩惱是聖説有漏至六百年達磨多羅造雜阿毗曇心論以生名濫改云若增諸煩惱是聖説有漏此正其文不正其義文任此等定判佛𣵀槃後六百年中達磨多羅造雜心論云事尤分明也但於嘉祥大師解釋者相傳不同歟可勘依憑本説也問雜心論中釋有漏名云若增諸煩惱是聖説有漏文爾者可正義耶答可正義也兩方若正義者見寶法師解釋云至六百年達磨多羅造雜阿毗曇心論以生名濫改云若增諸煩惱是聖説有漏此正其文不正其義文如此釋者可非正義見若依之爾者若增諸煩惱是聖説有漏由隨增義釋有漏名尤可正義哉答雜心論若增諸煩惱是聖説有漏之文改同今論於彼漏隨增故説名有有漏之意尤可正義也故光法師釋云佛𣵀槃後五百年中土火羅縛竭國法勝論師造阿毗曇心論中隨生解有漏至六百年達磨多羅此云法救以生義有過如滅道諦諸漏雖生而非有漏改為隨增即無有過故今論主亦同彼釋文泰法師釋云所以除道餘有為是有漏者何以諸惑漏於餘有為中等皆隨增故故雜心論若增諸煩惱是聖説有漏文但此等解釋雜心論若增諸煩惱是聖説有漏之文可正義云事分明也但於寶法師不正其義之釋者正義意貪等煩惱緣境之時互相增長之中得有漏名唯由境能增煩惱之門不望煩惱能增境之邊故寶法師引正理論四十九如何隨於相應法及所緣境有隨增義等之文畢云準此故知苦集與漏更互相增雖漏與境更相增然取增漏名為有漏不取增境以此正釋境能煩惱名有漏故文而雜心論今論煩惱能增境境能增煩惱二門之由何義門得有漏名云事委不分別故且云不正其義也偏述不正釋歟問光法師釋虛空但以無礙為性由無障故色於中行論文作二解釋爾者第二釋意如何釋之耶進云光法師釋云此中解虛空而言空界色文付之依第二解意見今論現文標於略所説三無為中云虛空但以無礙為性由無障故色於中行文相起盡無諍明虛空無為見是以寶法師云色於中行者釋虛空相也泰法師釋虛空無為若爾光法師第二釋意背今論所説違諸師定判哉答見光法師第二釋云又解虛空既無方所不可得言色於中行而言行者於空界色中行空界復由虛空得有文此釋意云虛空無為無有在此在彼方所故不可云色於中行故今云虛空指空界色也為言但於於略所説三無為中之論文者第二釋意會此疑云此中解虛空而言空界色者以麁顯細文此釋意云論文明三無為相故説虛空無為云事必然也而虛空無為微細難顯故以麁空界色顯細虛空無為為言勘婆沙論七十五文云有處問虛空而答以空界如品類足作如是言云何虛空謂有虛空無障無礙色於中行周遍增長問何故問虛空而答以空界答虛空微細難可顯説空界相麁易可開示以麁顯細故作是説文光法師第二解源起自此婆沙論文歟次於寶法師并泰法師解釋者光法師初釋意同存此旨也光法師非獨不許此義今以婆沙論文為潤色別亦作一釋許也何為相違哉問光法師意斷煩惱證擇滅為離能繫邊得之為當離所繫邊得之歟進云光法師釋雖斷能縛所縛解脫證得擇滅云云離所繫邊得擇滅也付之斷煩惱證擇滅者斷能繫迷執之義也尤可離能繫邊得之哉何況證得擇滅不過自性緣縛二斷而斷煩惱證擇滅名自性斷定可離能繫邊得之若離所繫邊得之者與緣縛斷有何差異哉是以見今論餘處文云自相續中煩惱等斷由得斷故他相續中諸煩惱等及一切色不染法斷由能緣彼自相續中所有諸惑究竟斷故文對緣縛斷云由得斷故離能繫邊得擇滅云事分明也依之寶法師意任此等文理自性斷無為離能繫邊得之釋答光法師意斷煩惱證擇滅離所繫邊得之釋有深由也今論中述於彼漏隨增故説名有漏煩惱被繫縛名之有漏故斷有漏者由離能縛所縛解脫之義也而以能繫望能繫自體不名有漏何離能繫邊得擇滅哉以所繫望能繫得名有漏故若自性斷若緣縛斷俱斷有漏之義故由離能縛所縛解脫之時離所繫邊得擇滅也光法師深得此道理自性斷無為離所繫邊得之釋也故今論云擇滅即以離繫為性諸有漏法遠離繫縛證得解脫名為擇滅文光法師釋此文云雖斷能縛解脫證得擇滅然能縛惑有強有弱立五縛強弱離所繫邊證得擇滅之旨釋成深叶道理亦任論文也加之今論云隨繫事各別謂隨繫事量離繫事亦爾文正理論云由是定應許離繫事隨繫事量不違正理文顯宗論文全亦同之婆沙論云應作是説隨有漏法有爾所體擇滅亦爾隨所繫事體有爾所離繫亦有爾所體故文若離能繫邊得擇滅者此等諸論中何述隨所繫事體有離繫事量之旨哉何況婆沙論中述評家義云諸有漏法無始時來煩惱所繫不得解脫若斷煩惱彼離繫故便得解脫如人被縛後解脫時人名解脫非謂繩等既於所繫證得解脫故外物中亦得解脫文此文既引如人被縛後解脫時之譬委成既於所繫證得解脫之旨離所繫邊得擇滅云事尤分明也誰可疑之哉但於自性斷者斷能繫迷執故離能繫邊可得擇滅云難者自性斷者斷繫迷執自體不成就之義云事更非所諍於其不成就煩惱彼此相望之時有能繫所繫二邊之中離所繫邊得擇滅云許也何可背自性斷之義哉次於離所繫邊得擇滅者與緣縛斷不可有差異云難者離所繫邊得擇滅事自性緣縛二斷雖無差異自性斷者斷品品煩惱位得之斷已更不成就緣縛斷者斷第九品煩惱位得之斷已猶容現前是豈非其差異哉次於今論餘處文者自性斷者斷已不成就之義故雖述由得斷故離所繫邊得擇滅事全無相違次於寶法師釋者兩師所存其意各別也不可劬勞之重難云自性斷者名煩惱自體斷已不成就之義其煩惱自體不成就者由斷能繫迷執故即由此門可得擇滅離所繫邊無自體不成就之義何由此門得擇滅哉是一答於諸煩惱彼此相望之時有能繫所繫二邊之中由斷能繫自體邊不成就之由離所繫邊得擇滅事文理能成立更有何相違哉次能治道品現起正斷能繫迷執更不向所繫邊定知離能繫迷執邊可得擇滅何離所繫邊得之哉是二答能治道品現起斷能繫迷執如彼無我觀門現起對治我見由此門故不成就我見自體非由此門故得擇滅此我見上有常見繫縛由離此繫縛故得擇滅也重意云自體不成就之義由斷我見能繫得擇滅之門由離常見所縛也餘貪等煩惱自體不成就之義得擇滅之門準之可思之次對所緣斷名自性斷故自性斷者離能繫自性邊可得擇滅若離所繫邊得之者自性斷亦可名所緣斷哉是三答緣縛斷者唯離所繫縛得無為故名所緣縛無自體不成就之義故不名自性斷自性斷者得擇滅事同雖由離所繫邊有自體不成就之義故名自性斷不名所緣斷也次自性斷無為離所繫邊得之者以第九品惑自性斷望善憂根等緣縛斷之時可差異哉彼此同全離能繫惑位得擇滅斷已不成就故也是四答第九品惑自性斷者由自體被斷故有不成就之義善憂根等非由斷繫縛故不成就之只是其體麁品法隨順欲界煩惱故全斷欲界煩惱盡位與彼煩惱同時捨之也次於諸論中隨所繫事體有離繫事量之文者全非證據餘師意隨見修所斷能繫煩惱數量定擇滅數量故正義意異之述隨所繫事量有擇滅數量之旨也更非云離所繫邊得擇滅故寶法師會諸論今説云且如所引隨繫事量無為亦爾者此明擇滅數量不明斷證以婆沙異師計擇滅無為同能繫事量故對法師説如所繫事量又對正量部立唯一無為故作是説非明染汚法是所緣斷文是五答諸論中隨所繫事體有離繫事量之文尤為證據若離能繫邊得擇滅者隨能繫惑體定擇滅數量而隨所繫事體定擇滅數量離所繫邊得擇滅云事炳然也寶法師會通諸論所説之旨恐難信用歟次於婆沙論諸有漏法無始時來等之文者亦非證據有餘師意云外物中無擇滅可得唯斷能繫諸煩惱縛得擇滅故為破彼説述所繫外物中亦得擇滅之旨也全非云自性斷無為離所繫邊得之故寶法師會此文云諸有漏法無始時來乃至如人被縛得解脫時人名解脫非謂繩等者此以異師執斷外法而於能繫法上得於解脫非所縛外法上得故作是説非是不許有自性斷作是説也文是六答婆沙論諸有漏法無始時來等之文是為規模證據破有餘師意云外物中無擇滅可得諸有漏法離所繫邊得擇滅故於外法中亦得擇滅為言諸有漏法之言既廣豈可簡諸煩惱哉寶法師會通此文之趣甚不順文意也問煩惱上四相與同時煩惱可被繫縛耶答可被縛也兩方若被繫縛者披本論末論所説尋隨眠增廢立唯限相應所緣二縛全無立俱有縛而以四相望同時煩惱之時非相應法故不可為相應縛不緣同時四相故不可為所緣縛若二縛俱無者何可被繫縛哉是以見品類足論文於見滅道所斷心不相應行有漏緣隨眠隨增文婆沙論八十六所説其旨亦同之若與同時煩惱被繫縛者寧可簡無漏緣隨眠哉加之披光法師解釋云得與四相除相應縛有餘四縛文若縛俱有法者更不可限四縛哉若依之爾者以煩惱上四相望同時煩惱之時極相鄰近法也豈不施縛用哉何況於相應心心所既施縛用與同時四相何無此義哉答以煩惱上四相望同時煩惱之時極相鄰近法故尤可被繫縛也是以寶法師餘處十九引正理論四十九亦令隨行生等成染之文畢云準上論文亦令生等成染亦令隨增俱有文淨影大師釋遍使遍緣寬狹云使則通縛一切外境及縛相應共有之法故名為寬文任此等定判煩惱上四相與同時煩惱被繫縛云事實分明也但於諸論中唯明相應所緣二縛云難者相應心心所所緣縛普通一切有漏法今此二縛其義廣故諸論中唯明相應所緣二縛不論俱有縛也然而縛俱有四相其理為必然故委探其實義寶法師云亦令隨增俱有淨影大師釋及縛相應共有之法也次於品類足論文者故論自本唯約相應所緣二縛明隨眠隨增故生等四相非相應法故無相應隨增無漏緣隨眠緣無漏法故無所緣隨增故於見滅道所斷心不相應行唯有漏緣隨眠增云也以實論之無漏緣隨眠亦可隨增也婆沙論文會通同之次於光法師解釋者是亦任諸論説唯約相應所緣二縛論五縛強弱相故云有餘四縛也重難云見光法師解釋破德光論師不染無知以未成佛來鈍自性無記心心所法為體非四無記攝通於三界恆成過未云義云若不染無知以自性無記心等為體通三界中恆成過未者雖無不成之過然與識身足論十四相違彼解十二心中生無色界異熟生心不現在前不成就無覆無記心既違此説故亦非理文準此能破定判思之若有俱有縛者可違品類足論見滅道所斷心不相應行唯有漏緣隨眠增云文豈不為痛哉若會云彼相應所緣二縛論之者德光論師亦會可云識身足論生無色界異熟生心不現前不成就無覆無記心者唯就四無記心論之也若爾光法師今能破不成哉答光法師意不許自性無記心故以識身足論説為違文難之可許俱有縛故會品類足論文不令致相違也彼此大異更非相例歟尋云煩惱上法俱得與同時煩惱可繫縛耶答彼法俱法極相鄰近法故亦可被繫縛也問光法師意於見所斷惑判同部異品縛強弱作二解釋爾者初釋意如何釋之耶進云光法師釋云所以同部同品異品俱可説強文付之判繫縛強弱可任惑品親疏由能治離合何定所斷功能哉是以異生斷惑之時雖不斷同部異品縛證得擇滅若同部異品縛強者寧可證擇滅哉何況於修所斷惑以同部異品縛為弱判準修惑思見惑繫縛強弱其義可同如何答定惑品強弱尤可由能治離合而見所斷惑其性猛利九品相望縛用強勝故於見道位必九品頓斷也但於異生斷惑之時雖不斷同部異品縛證得擇滅云難者有漏斷道非真對治非極相違故同部異品惑不起能障強用故雖不斷同部異品縛證擇滅也雖證擇滅非真證滅故品類足論中以擇滅無為不名異生法也次於修所斷惑以同部異品縛為弱云例難者迷事惑品縛用弱故不可準例見所斷惑故光法師釋其差異云若斷初品染相應法由斷相應縛同部同品縛證得無為以斷強故爾時雖為同部異品餘八品縛以劣弱故亦證無為不同見道見道九品一品斷故所以同部同品異品俱可説強修道九品別斷所以同部異品説名為弱文問光法師意於見所斷惑判同部異品縛強弱作二解釋爾者第二釋意如何釋之耶進云光法師釋云或可見道同部異品亦名為弱文付之見道為真對治道既九品頓斷定知同部異品縛強云事異生所起斷惑道非真對治何由彼定同部異品縛弱哉何況若以異生九品別斷為其所以者異生五部合斷故以異部同品縛可為強歟如何答異生斷惑九品別斷證擇滅故知同部異品縛弱也若於見所斷惑同部異品縛強者異生五部合斷九品別斷之時於見所斷惑寧可證擇滅哉故光法師釋成此旨云或可見道同部異品亦名為弱如諸異生五部雜斷隨斷前品猶為未斷見惑之所繫縛以劣弱故亦證擇滅以此而言故知是弱文解釋所成尤有其謂哉但於見道為真對治道九品頓斷云難者見道是初得聖道勢力強勝故頓斷九品惑更不由所治惑強弱也次於異生九品別斷為其所以者異部同品縛可為強云難者異部同品惑雖不及論縛用強弱異生以六行智觀五部合斷故由能治道力斷之如彼滅道所斷及修所斷惑雖不繫縛他部所斷法五部合斷位一念斷之也問光法師意有漏法中斷同部同品縛位不證擇滅義可有耶答可有此義也兩方若此義者既斷同部同品縛位也寧可有不證擇滅之義哉是以光法師解釋中全不云有此義哉若依之爾者同部同品縛種類非一準何強可簡此義哉依之披光法師解釋有漏法中斷同部異品縛位不證擇滅之義可有見相例可同如何答見光法師解釋云餘有漏法亦有九品擬儀相當故説同品異品斷餘有漏法時由斷同部同品異品縛以斷強故證得無為異部同品先已斷故設不斷彼亦證擇滅以縛劣故文此釋意斷前八品修惑位於前八品善及無覆無記法雖斷同部同品縛未斷第九品修惑故依由此乃至緣彼煩惱餘一品在斷義不成善法爾時未離繫故之理不證擇滅也故有漏法中斷同部同品縛位不證擇滅之類可有也重難云光法師既釋由斷同部同品異品縛以斷強故證得無為如解釋者於有漏法斷同部同品縛位必可證擇滅見如何答斷前八品修惑位於前八品善及無覆無記法雖斷同部同品縛未斷同部異品第九品修惑故不證擇滅斷第九品修惑位於彼前八品善及無覆無記法由斷同部同品縛同部異品縛故證擇滅也重意云無不斷同部同品縛證擇滅之義由斷同部同品縛同部異品縛證擇滅故云由斷同部同品異品縛以斷強故證得無為也問於他身見惑可得緣縛斷無為耶答可得緣縛斷無為也兩方若得緣縛斷無為者緣縛斷無為者斷修惑第九品位所證之也而修惑無緣見惑之義彼位於他身見惑何得緣縛斷無為哉若依之爾者今論餘處中述得緣縛斷無為之他相續中諸煩惱等及一切色不染法斷由能緣彼自相續中所有諸惑究竟斷故文此文無諍於他身見惑得緣斷無為見如何答於他身見惑可得緣縛斷無為也凡見所斷修所斷不同專依迷理迷事差別今論餘處文云若緣見此所斷為境名見此所斷餘名修所斷即述此意也而以他身見惑望自身之時非迷理迷事偏同色法不染汚法何可名見所斷哉何況斷此地煩惱之時悉可斷此地一切有漏法寧殘他身見惑哉既無迷理之義故定非見所斷豈非緣縛斷哉但於修惑不緣見惑云難者修惑不緣見惑者迷事惑是非遍行故不緣他部云也他身見惑緣縛斷故望自身之時既修所斷是自部法也豈不緣之哉是以寶法師餘處釋今論有餘師説於自見解取捨位中起憎嫌故見諦所斷貪等生時緣自相續見為境故之文云若生見斷嗔應如餘師説通生修道嗔亦緣他相續文修惑緣他身見惑云事此釋亦分明也故修惑盡處第九解脫道位於他身見惑得緣縛斷無為可有何相違哉重難云寶法師餘處通生修道嗔亦緣他相續之釋更非證據正理論餘處中即述此事云於他所起違見生嗔如執我徒憎無我見文顯宗論文全亦同之緣他所起正見生嗔煩惱之旨既分明也準知寶法師釋意述修所斷嗔煩惱緣他相續正見生之旨也全非云修所斷嗔煩惱緣他相續五見等生何為證據哉是一次見發智論文云有身見結見苦所斷一切及見集所斷遍行隨眠隨增有身見順下分結有身見邊執見亦爾戒禁取結見苦所斷一切及見集所斷有漏緣隨眠隨增戒禁取及戒禁取身繫順下分結戒禁取亦爾疑結見所斷有漏緣及疑相應無漏緣無明隨眠隨增疑順下分結疑隨眠疑結亦爾文若修惑緣他身見惑者有身見結等所隨增隨眠中何不舉修惑哉是二答寶法師餘處通生修道嗔亦緣他相續之釋修所斷嗔煩惱緣他相續五見等亦緣他相續修所斷正見為言正理論等文且出一類也依此文不可定修惑不緣他身五見等哉次於發智論有身見結等所隨增隨眠中不舉修惑之文者以有身見結等望自身之時唯見所斷法故就之論隨眠隨增故不舉修惑也若以他身有身見等望自身之時是修所斷法故修惑豈不隨增自部法哉問光法師釋擇謂簡擇即惠差別論文云無染異染名惠差別文爾者今此無染惠者可通有漏惠耶答可通有漏惠也兩方若通有漏惠者有漏惠是劣品也何可名擇法哉何況見論次下文云各別簡擇四聖諦故文而有漏惠無觀四諦證得擇滅之義何可通有漏惠哉若依之爾者無染之言既廣何不通有漏惠哉答光法師釋擇謂簡擇即惠差別之論文云謂無漏惠異有漏惠名惠差別或無染異染名惠差別文上既云謂無漏惠異有漏惠名惠差別畢異之述或無染異染名惠差別無諍無染惠者可通有漏惠也但於論次下各別簡擇四聖諦故之文者無染惠中無漏惠各別簡擇四諦證得擇滅故指彼云各別簡擇四聖諦故也非云一切無染惠皆簡擇證得擇滅何為相違哉尋云此釋意無染惠中可攝無覆無記惠耶答云無染異染之時無染惠中可攝無覆無記惠歟但無覆無記惠無簡擇四諦證得擇滅之義云難準有漏善惠可會通之也問光法師釋得滅異前名非擇滅論文作二解釋爾者初釋意如何釋之耶進云光法師釋云前滅是善後滅無記故云異前名非擇滅文付之為曉初釋意見論文前後上云各別簡擇四聖諦故擇力所得滅名為擇滅下述得滅異前名非擇力但由闕緣故云得滅異前見若爾光法師第二釋意豈不背論文始末哉答光法師初釋意得滅異前名非擇滅之文明二滅體異故釋前滅是善後滅無記得不因擇但由闕緣之文顯二滅名異故述此釋名也也故初釋具文云前滅是善後滅無記故云異前名非擇滅此結體也由擇故得名為擇滅得不因擇但由闕緣名非擇滅此釋名也文但疑難之趣即第二釋意也二解釋意自本各別也何以彼難此哉問寶法師引婆沙論説云虛空與四大等近增上緣文爾者今此近增上緣歟答不作有增上緣也兩方若作有力增上緣者婆沙論今文明虛空無為而虛空無為無作用何云作有力增上緣哉若依之爾者既云近增上緣尤可作有力增上緣也如何答虛空無為無有作用故設與空界色設與四大種作近增上緣者只依無障礙義全非作有力增上緣故云作近增上緣也故寶法師會婆沙論今文云虛空無礙大種有礙故名為近非謂有力名為近也文尋云見婆沙論文云虛空無為無有作用然此能與種種空界作近增上緣彼種種空界能與種種大種作近增上緣彼種種大種能與有對造色等作近增上緣彼有對造色能與心心所法作近增上緣若無虛空如是展轉因果次第皆不成立勿有此失是故虛空體相實有不應撥無文寶法師當卷中兩處引此文上段即如婆沙論本説引之而下段引婆沙云虛空與四大等近增上緣豈不背婆沙論現文哉答虛空無為與空界色作近增上緣者與空界色能造大種作近增上緣之義必可為必然故探其文意引虛空與四大等近增上緣歟問所依根緣闕時能依識可得非擇滅耶答可得非擇滅也兩方若得非擇滅者見今論文云如眼與意專一色時餘色聲香味觸等謝緣彼境界五識身等住未來世畢竟不生由彼不能緣過去境緣不具故得非擇滅雖述所緣境緣闕之時於能緣識得非擇滅之旨未云所依根緣闕之時於能依識得非擇滅以知無此義云事若依之爾者所緣境緣闕之時於能緣識既得非擇滅準彼思之所依根緣闕之時於能依識何不得非擇滅哉答所依根緣闕之時於能依識可得非擇滅也故見今論餘處文云心心所法如於所緣處事剎那三皆決定於所依亦有如是決定耶應言亦有如是決定文光法師釋此文云應言於所依六根亦有如是三種決定處定者謂眼識及相應法於眼處定以依眼故不依耳等雖亦依意今據別依顯法差別事定者就處定中復有男女天人等眼不同或異熟長養等眼別眼識及相應法應依此事定不依餘事名事定剎那定者復就事中剎那剎那定謂眼識及相應法應於此剎那不於餘剎那文任今此定判能依識望所依根有處事剎那三定見若能依識望所依根有處事剎那三定者所依根緣闕之時於能依識得非擇滅云事亦必然也且出一位顯其相者一眼根與緣青色眼識及緣黃色眼識俱容為所依有之而緣青色眼識起以此眼根為所依緣青色畢緣青色眼識與此眼識并所緣青色俱落謝過去故容緣黃色眼識所依眼根闕未來永不生之義定故得非擇滅也但於今論中不述此義云難者所緣境緣闕之時於能緣識得非擇滅其義顯故且明此一邊也委悉論之所依根緣闕之時於能依識得非擇滅可云也故正理論云如眼與意專一色時於所餘色及一切聲香味觸等念念滅中對彼小分意處法處得非擇滅以五識身及與一分意識身等於已滅境終不能生緣俱境故由彼生用繫屬同時所依緣故文顯宗論文其意同之此兩論中既云由彼生用繫屬同時所依緣故所依根緣闕之時於能依識得非擇滅云事炳然者歟問光法師意有為法永不生唯由緣闕歟進云光法師釋云非唯緣闕令法不生此法不生亦由滅故文付之於未來法具生緣之類即生生緣闕者永不生定知有為法永不生唯可由緣闕何可借非擇滅力哉是以見論文云得不因擇但由闕緣文若借非擇滅力者寧可置但言哉依之寶法師釋此文云準此論文但由闕緣即是更無餘力文何況無為法無有作用豈可礙未來法生哉答於未來法生緣闕時得非擇滅故後雖遇同類緣永不生也故有為法永不生必由緣闕兼可借非擇滅力也是以光法師問法不生時但由闕緣何關此滅答之引顯宗論非唯緣闕便永不生後遇同類緣彼復應生故謂若先緣闕彼法可不生後遇同類緣何障令不起之文畢云彼論意説非唯緣闕令法不生此法不生亦由滅故文顯宗論中既云後遇同類緣何障令不起故光法師依此文判此法不生亦由滅故兼借非擇滅力云事解釋源起自論説何獨疑光法師定判哉但於今論得不因擇但由闕緣之文者於未來法生緣闕時得非擇滅如擇力所得滅故但由闕緣云也全非云有為法永不生但由闕緣何為相違哉次寶法師準此論文但由闕緣即是更無餘力之釋者任但由闕緣之論文有為法永不生但由闕緣不由非擇滅力云也兩師所存其意各別也何始可疑之哉次於無為法無有作用不可礙未來法生云難者無為法本來不生不滅違有為生滅故得違此生滅非擇滅彼未來法永不生也更非非擇滅有礙生用或又非擇滅德礙未來全不生全非非擇滅施礙生作用云義可有也故光法師釋此事云此法本欲礙法不生若法不生便即起得送與行者故名得滅文重難云有為法生時必可有處事剎那三定若此剎那緣闕者後時更不可起若後時可起者不可有剎那定何云後遇同類緣彼復應生故哉是一次後遇同類緣彼復應生故者其同類緣者緣哉若生緣者不可云前時緣闕故寶法師難此文云後遇同類緣為是生緣為非生緣若後有生緣前非闕緣若後非生緣如何得生由無生緣永不生何關滅力文此難尤可然如何會通之哉是二次見今論文云永礙當生得非擇滅謂永礙未來法生得生得滅異前名非擇滅得不因擇但由闕緣文如此文者於未來法永不生之義定事但緣闕不由非擇滅力云事是三次非擇滅無礙生用云事難思今論云永礙當生得非擇滅謂能永礙未來法生文正理論云若法能礙彼法生用此法離惠定礙彼法令住未來永不生故得非擇滅文婆沙論中述評家義云此非擇滅唯於未來不生法得所以者何此滅本欲遮有為法令永不生若法不生此得便起文任此等諸論所説非擇滅可有礙生用見是四答光法師意由非擇滅力有為法永不生之義定故有剎那定也若不爾者後遇同類緣之時可生故不可有剎那定有剎那定故知由非擇滅力未來法永不生之義定云事次由非擇滅力後雖遇同類緣彼法不生云事可有深旨且出一類者此剎那緣白色眼識容起緣青色眼識容起其中緣白色眼識起畢青色空落謝過去容緣彼青色眼識所緣緣闕故未來不生之義定得非擇滅若容緣彼青色眼識雖留未來不得非擇滅者後時同類青色現在前位何不起哉是則容緣彼青色眼識得非擇滅故後時同類青色現在前位永不起也後遇同類緣彼復應生故之理其意在之歟寶法師微被恐似不存此深意次於未來法初不生之義定事但由緣闕由其緣闕得非擇滅畢被礙彼非擇滅力後永不生之義定故尋其源但由緣闕故初後不生之義合論之云永礙當生得非擇滅乃至得不因擇但由闕緣也次無為法無作用者性相之所定也故非擇滅雖無礙生用由此非擇滅力彼所得法永不生之義定也今論正理婆沙之文述由非擇滅力彼法永不生之旨許也全非云非擇滅有礙生用歟問所得法得非擇滅時於能得得必得非擇滅歟答於彼法俱得必可得非擇滅也兩方若於能得得必得非擇滅者所得法能能得得種類非一準所得法得非擇滅之時於能得得何必得非擇滅哉若依之爾者寶法師釋正理論如眼與意專一色時於所餘色及一切聲香味觸等念念滅中對彼少分意處法處得非擇滅之文云意及法處者意是諸識法處者心所及四相等文等言豈非等能得得哉答所得法得非擇滅之時於彼法俱得必可得非擇滅故寶法師及四相等言可等法俱得也若爾今解釋有何疑哉重難云見光法師餘處所引婆沙論百五十八文云二有所得法唯有前得如三類智邊世俗智等有説此等亦有俱得文此初師意三類智邊世俗智無法俱得見若爾三類智邊世俗智得非擇滅之時於能得得不可得非擇滅哉答初師意實雖存三類智邊世俗智有法俱得且就現起云唯有法前得也三類智邊世俗智得非擇滅之時於彼法俱得可得非擇滅也問寶法師所引正理論中云如契經説言依有三無四無五文爾者今此無四無五者唯就有為法論之歟答可有二義也兩方若唯就有為法論之者既舉無四無五之兩類不唯就有為法論之見若依之爾者寶法師引正理論今文畢成唯有為法名言依之旨知唯就有為法論之云事如何答見婆沙論文云問契經但説有三種言依於義已足何故復説無第四第五答無第四者遮第四世恐有執有第四世故無第五者遮無第五者遮無為法恐執無為是言依故文任此婆沙論文契經中無第四者遮就有為法有第四世之執無第五遮者遮約無為法名為言依之執也正理論中雖不釋顯今契經文準婆沙論説可思之歟有人云見正理論文云如契經説言依有三無四無五由此善通品類足論彼説言依五蘊所攝文既引契經言依有三無四無五之文畢同品類足論言依五蘊攝之説明知無四無五簡無為法之言歟故光法師釋云正理為破言依亦通無為者執故偏引彼五蘊文也文問正理論意言依不通無為云義引品類足論何文證之耶進云光法師釋云正理為破言依亦通無為者執故偏引彼五蘊文也付之言依既通五蘊故品類足論中説言依五蘊攝也非為遮通無為之義説五蘊攝是以見品類足論文雖説非異生法法及不共異生法五蘊攝亦通無為爰知正理論中引品類足論言依五蘊攝之文只為顯言依具攝一切有為諸法之義非簡無為之故光法師何釋正理為破言依亦通無為者執故偏引彼五蘊文也哉答今論云若不爾者應違品類足論所説彼説言依十八界攝文正理論云由此善通品類足論彼説言依五蘊所攝文光法師問何故兩論引文不同會其相違作二解釋之中第二釋云又解此論為遮唯執言依名為體者故偏引彼十八界文正理為破言依亦通無為者執故偏引彼五蘊文也各引一邊並無違害文此釋意云今論為遮言依唯名為體云執引十八界攝之文正理論為破言依亦通無為云執引五蘊攝之文是則以蘊不攝無為之理一往為其由許也更非盡理之釋自本不遮亘五蘊通無為之法有五蘊攝之言品類足論中非異生法法及不共異生法雖有五蘊攝之言亦通無為更非相違也問無為法遠近二法所攝歟答近法所攝也兩方若遠近二法所攝者見今論文云去來名遠現在名近文如此文者無為法非遠近二法所攝見若依之爾者見品類足論中無為法遠近二法所攝見如何答見品類足論文云遠法云何謂過未來法近法云何謂現在及無為法文無為法近法所説云事此文炳然也就此文案其理擇滅無為同有漏法數量非擇滅無為同有為法數量虛空無為由無障故色於中行法望現在法疏遠故名為近法過去法已作用未來法未作用望現在法尤疏故名為遠法也但於今論去來名遠現在名近文者彼就色法論遠近相故不云無為名近也重難云見品類足論文云近法十八界中二處五蘊攝文既云五蘊攝何通無為哉是以光法師第二釋意述正理論中引品類足論言依五蘊攝之文云正理為破言依亦通無為者執故偏引彼五蘊文也文此釋意既云引品類足論言依五蘊攝之文破言依通無為云執準彼思此云近法五蘊攝知不通無為云事答品類足論之習亘五蘊通無為之法就有為邊述五蘊攝事處處定判也始不可疑之如彼雖説非異生法及不共異生法五蘊攝亦通無為也就中品類足論文遠法云九智知除滅智近法云十智知無除滅智近法通無為云事甚分明也但於光法師第二釋意云引言依五蘊攝之文破言依通無為之執者以蘊不攝無為之理一往為其由許也更非盡理之談歟問光法師解釋中明言依相引婆沙論二師異説爾者今論意同何師説耶進云光法師釋云或同前師或同後師皆無有妨文付或同前師之釋不可然見今論文云如是言依具攝一切有為諸法畢引品類足論所説述言依十八界攝之旨婆沙論十五初師意云言依一界一處一蘊所攝文若爾其義既異何釋或同前師哉是以寶法師釋此事云此論同於後説文如何答見品類足論文云三世三言依事十八界十二處五蘊攝文言依十八界攝者既出品類足論説故設雖婆沙論何師意更不可背此文而婆沙論初師意言依一界一處一蘊攝者言依與展轉依各別作論之意也此師意會品類足論文云彼論應説言依一界一處一蘊所攝而言十八界十二處所攝者依展轉因故作是説謂語依名轉名依義轉義是言展轉依義中具有十八界十二處五蘊故説者聽者皆為義是故彼論依展轉因説言依自性文初師意言依與展轉依合名言依之時言依十八界攝云事自本所許故今論中述言依十八異攝之旨全不可違婆沙論初師説故光法師或同前師之義更有何相違哉但於寶法師解釋者今論中不分別言依與展轉依只述言依十八界攝之旨故任文相之顯釋此論同於後説歟問光法師依正理論意有漏法名見處故如何釋之耶進云光法師釋云依正理論四門廢立一一切種二一切時三無差別四堅執不動文付四義中無差別義不可然五見體性各別行相亦異何可有無差別義哉是以光法師釋無明不具無差別義云以有獨頭相應差別故言非無差別文相例可同如何答寶法師釋正理論而彼諸見乃至相無差別之文云不與自相煩惱及非隨眠相應故相無差別文此釋意云五見同是共相煩惱唯迷理起不迷事起不與自相煩惱及非隨眠忿等隨惑相應故有無差別義也為言獨頭無明雖是共相煩惱相應無明之中有與自相煩惱及忿等隨惑相應之類故不具無差別義也問譬喻者意意識可緣眼等五根耶答不緣眼等五根也兩方若緣眼等五根者別師異計非一準何可定緣眼等五根哉是以婆沙論中不緣之見若依之爾者見震旦人師解釋云此論中譬喻宗意識不緣五識境唯緣十三文如解釋者譬喻者意意識可緣眼等五根見如何答披婆沙論八十七説尋譬喻者義云又説六識唯緣外境不緣內根亦不緣識云云任此文彼師意意識不緣眼等云事甚分明也但於人師意識不緣五識境唯緣十三之釋者是婆沙抄定判也既背婆沙論説更不可依用之重難云譬喻者意云意識不緣眼等五根者彼師意存眼等五根全無能緣識歟若無能緣識者爭可知有眼等五根云事哉答問雲煙塵霧影光明暗八色可實有色耶答可實有色也兩方若實有色者見今論文云顯色有四青黃赤白餘顯是此四色差別文光法師所引正理論中云青等四種是正顯色雲等八種是此差別文任此等文雲等八色青等四色之上假立不可有別體見若依之爾者二十種色中別既立之定知是實有色云事如何答廣勘俱舍婆沙正理顯宗等諸論説顯色列十二種之中青黃赤白四色之外別舉雲煙塵霧影光明暗八色故實有色云事是炳然也但於今論餘顯是此四色差別之文正理論雲等八種是此差別之説者光法師問答此疑云問光等八色是四差別寧非是假解云論其本色但是青黃赤白四種於此四中隨義差別立餘八名各有實體而是非假文此釋意云論其本色唯是青黃赤白四色餘雲煙塵霧影光明暗八色皆雖此四色之差別立雲等八色名畢不見本為青等四色之邊偏為雲等八色實體故青等四色之外別有雲等八色實體為言重難云經部宗意云受想思實有餘心所法思上假立實無餘觸等心所思上假立故假立法無有實體例彼思之雲等八色是青等四色差別彼四色上假立之者何可有實體哉答經部宗意思心所上假立餘觸等心所之時猶談思心所分位之義故思心所有實體餘觸等心所是假上法無有實體也雲等八色青等四色差別云事異此義門雲等八色本雖青等四色別名雲等八色之上全不與青等四色之外別有雲等八色實體云也問長短極微可有別體耶進云光法師釋云長短極微各有別體付之長短是相待法於一法其義可不定豈就各別極微可論長短實體哉是以光法師釋此事云形長見短形短見長文長短二色相形不定之旨此釋尤分明也何況見今論餘卷文云然無極微名為長等故即多物如是安布差別相中假立長等文披正理論餘處文云豈不已説即形極微如是安布眼識所得積集差別假立長等文加之勘婆沙論處處之文或云五相待有謂此彼岸長短事等文或云應知極微是最細色不可斷截破壞貫穿乃至非長非短文任此等論説更不可云長短極微各有別體哉答薩婆多宗意廣談諸法實有之旨二十種色中長短二色定可實有若自本無長短差別極微者衆微聚集長短二色豈有別體哉是以見婆沙論十三文云若一極微非長等形者衆微聚集亦應非長等形文光法師長短極微各有別體相雜而住之定判專順此等文理也但於形長見短形短見長之釋者於一色聚各別有長短極微相雜而住之中相形餘長色聚之時見此色聚中短色極微不見長色極微相形餘短色聚之時見此色聚中長極微不見短色極微若亦俱時相形長短色聚之時並見此色聚中長短二色為言全非一色由相形長短不定也次今論餘卷差別相中假立長等之文者光法師餘處釋此文云經部復難文若爾此文述經部宗計非有部實義何為疑難哉次於正理論餘處積集差別假立長等之文者長短極微各別體之義自宗本所談專雖存此旨為會通經部難別顯假立長短也故光法師餘處引此文畢云準正理救意云假長等意識所知非五識了文次於婆沙論應知極微是最細色乃至非長非短之文者光法師會此文云婆沙論據別一微是最細分更不可折非眼所見言非長等此論據見已去有實體類故成長等故故名長等文次於婆沙論五相待有謂此彼岸長短事等之文者就假立長短論之也故光法師釋云若泛明長短亦通假實若二十種色中長短相對以實剋實若通約諸假聚相對辨長短即以假對假故婆沙第九解諸有中第三師云五相待有謂此彼岸長短事等文光法師既會通此等論文後學更不可劬勞哉重難云相形餘長色聚之時此色聚中長色極微相雜而住者何不見之哉相形餘短色聚之時此色聚中短色極微相雜而住者何不見之哉答相形餘長色聚之時此色聚中短色極微施作用故見之雖長色極微相雜而住不施作用故不見之也相形餘短色聚之時此色聚中長色極微施作用故見之雖色極微相雜而住不施作用故不見之也重難云見光法師第二釋云又解可量已去名長不可量者名短世間形長説為短者於彼長中假説為短如於重中假説為輕文此釋意長短極微無有別體見如何答長短極微各有別體相雜而住之理第二釋意同亦所存也而初釋意云形長色見短色極微形短色見長色極微第二釋意異之可量色聚長色極微施作用故名之長也不可量色聚短色極微施作用故名之短色為言以實論之長短極微各有別體相雜而住成其可量色聚長短極微各有別體相雜而住成其不可量色聚也問空一顯色二十種色外歟答可二十種色之內也兩方若二十種色外者見光法師解釋判此空界色以明為體述空一顯色以明色為體之旨定知空一顯色二十種色之內云事若依之爾者披今論文云有餘師説空一顯色第二十一文婆沙論中或十三云有説色處有二十一謂前二十及空一顯色文或七十五云復有説此有二十一謂前二十種加空一顯色文任此等論説空一顯色可二十種色之外見如何答空界色以影光明暗四色為體空一顯色以空界色中明色為體故二十種色之內云事炳然也故見光法師解釋或云問空一顯色以何為體云以空界色為體故正理論第一云有説色有二十一種空一顯色第二十一此即空界色之差別文或云問空一顯色即是空界色是光影明暗未知空一顯色於光影明暗中以何為體解云若據一切空界色即以光影明暗為體若據別相即四色不定此中言空一顯色是空界色者此空界色以明為體文既云此即空界色之差別亦述此空界色以明為體故空一顯色二十種之內云事誰可疑之哉但於今論等中有餘師意二十種色之外別舉空一顯色云難者光法師釋云由斯理證定知是明故此明色即是青黃赤白差別若作斯釋空一顯色餘師所説正義無違然別説者為顯差別又解是不正義以別説故雖説空一顯色是空界色然別有體正理不破前解為勝文初釋意云空一顯色是空界色之一分明色為體此明色即青黃赤白四色差別二十種色之內故雖餘師所説正義意無違然二十種色之外別説為第二十一者為顯差別為言光法師自判正理不破前解為勝以初解為正釋故任然別説者為顯差別之文可會通今論等中二十種色之外別舉空一顯色之説也空一顯色二十種色之外別有其體云第二釋既為不正釋故正釋意空一顯色二十種色之內云事甚分明者歟重難云見光法師解釋云若依識身十一婆沙十三正理三十四第一句中更加空一顯色此非正義以別説故或是正義空一顯色若據本色青等色攝若據末色明色所攝並如前解然別説者為顯差別文初釋意識身足論十一婆沙論十三正理論三十四中有顯無形之類青黃赤白影光明暗之外舉空一顯色之文云此非正義若爾此釋意空一顯色可二十種色之外見如何答初釋意空一顯色二十種色之外別有其體云故準次上正理不破前解為勝之決判思之定可不正釋以或是正義云第二釋可為正釋也但於此處不判二釋正不者上段既判正不畢故此處讓上略不判正不也有何由至此處此釋忽可為正釋哉其道理甚不可得故也問光法師解釋中云此空一顯色即是彼青黃赤白文爾者離影光明暗外可有別體耶答光法師述此事作二解釋若依初釋意者離影光明暗之外可有別體也若依第二釋意者離影光明暗之外不可有別體也兩方若有別體者光法師所引正理論中云青等四種是正顯色雲等八種是此差別文如此文者離影光明暗之外無離質青黃赤白見若依之爾者披光法師解釋問準論文此空界色以光影明暗為體如何乃説青黃赤白答若妙高四邊離質青等亦是空界問答起盡無諍離影光明暗之外可有離質青黃赤白見如何答先聊簡光法師一段解釋次可會申今疑問也見光法師解釋初舉問難云問若以空界色為體者何故識身足論第十一云空一顯色此即如彼青黃赤白準彼論文即以青黃赤白為體文此問意云空一顯色若以空界色為體者可違識身足論空一顯色此即如彼青黃赤白之文意空一顯色即以青黃赤白四色為體見故為言次答此問作二解釋初釋云解云彼論言如彼青黃赤白者謂妙高山四邊空中各現一色名空界色如之言似此空一顯色似彼青黃赤白非即是也文此釋意云四州空中所現空一顯色須彌山四寶錟故是明色攝非青黃赤白四色攝識身足論此即如彼青黃赤白之如言似義也空一顯色似彼青黃赤白故云如非即是也為言此釋意四州空中所現空一顯色是明色攝非青等四色攝故青等四色中無離質之類云也下段引正理論三十四有一説意第一準顯無形句中唯説影光明暗之師義云此師意説青黃赤白無有離形俱句所攝非初句攝此即意別文準下釋趣思上文意此初釋意以正理論此師説存正義以此文為證據青等四色中無離形之類故空一顯色是明色攝非青等四色攝為言依此釋意會今論中第一有顯無形句影光明暗之外舉青黃赤白之文者可云生顯智強勝故影光明暗之外別舉青等四色也故光法師釋此文云理實無有離形青等而言青等有顯無形據生顯智偏強勝説如雜染絹雖亦有形以顯雜生生顯智強故初句攝文初釋旨趣大概如此第二釋云或可如之言是此空一顯色即是彼青黃赤白文此釋意云四州空中所現空一顯色即是青黃赤白色攝故識身足論此即如彼青黃赤白之如言是義也為言此釋意四州空中所現空一顯色即是青等四色攝故青等四色中有離質之類云也第二釋意其趣如此次就此第二釋重舉問難云問準諸論文此空界色以光影明暗為體如何乃説青黃赤白文第二釋意云空一顯色即是青等四色攝云故就此釋致今疑也次答此問亦作二釋初釋云解云青黃赤白有其二類若即質青等非空界色若妙高四邊離質青等亦是空界文此釋意云即質青等四色非空界色妙高山四邊空中所現空一顯色中有離質青等四色攝之類亦有明色攝之類為言此釋意空一顯色中離影光明暗之外有離質青等四色攝之類云也初釋旨大概如此第二釋云又解此空界色雖以光影明暗為體然彼光影明暗若據正顯隨其所應亦是青黃赤白所攝故正理云青等四種是正顯色雲等八種是此差別已上論文若言青等據本以説若言光等據末以説各據一義並不相違文此釋意云空一顯色若據本云之青等四色攝若據末論之明色攝故四州空中所現離質青等四色據末云之即是明色攝故離影光明暗之外無離質青等四色故空界色或云影光明暗為體或云青等四色為體各據一義並不相違為言第二釋意其趣如此今論義者就此二釋中初釋意疑之也成初釋意會其疑者見今論文述於色處中顯形二色相對四句分別云或有色處有顯無形謂青黃赤白影光明暗出第一有顯無形句影光明暗之外舉青黃赤白故離影光明暗之外可有離質青等四色見故以此文為證據空一顯色中離影光明暗之外有離質青等四色之旨釋成也故光法師釋此文作二釋之中第二釋云又解四洲空中所現顯色青黃赤白唯顯無形或可天中青黃赤白四種寶地如光明等有顯無形故初句攝若作此解形俱顯色及顯新生皆俱句攝文此第二釋意當離影光明暗之外有離質青等四色初釋意也但於光法師所引正理論青等四種是正顯色雲等八種是此差別之文者從多分説也離影光明暗之外自有離質青等四色云事更非所遮歟重難云見光法師定判釋識身十一婆沙十三正理三十四第一唯顯無形句中更加空一顯色之文云或是正義空一顯色若據本色青等色攝若據末色明色所攝並如前解然別説者為顯差別文如此釋者離明色之外無離質青等四色如何答此且依上第二釋意述第一唯顯無形句中更加空一顯色正義無違之旨也若依初釋意者可云空一顯色是青黃赤白及明色攝故正義無違也重難云空一顯色其相可一準若離明色之外離質青等四色為體者何云亦有明色攝之類哉答空一顯色其相可一準若離明色之外離質青等四色攝之類或有明色攝之類也又尋云離影光明暗之外無離質青等四色云第二釋意如何可會論中第一有顯無形句影光明暗之外舉青黃赤白之文哉答依第二釋意會此文者離影光明暗之外雖無離質青等四色即質青等四色中有生顯智強勝之類故影光明暗之外別舉青黃赤白可云也私云離影光明暗之外離質青等四色有無事本抄委細被記之可引見之問光法師引正理論一説意唯顯無形句中唯説影光明暗文作二解釋爾者初釋意今此師説可正義耶答可正義也兩方若正義者見光法師初釋云此師意説青黃赤白無有離形俱句所攝非初句攝此即意別文而次上解釋中云四洲空中所現顯色青黃赤白唯顯無形文準次上釋思此師意定知非正義云事若依之爾者見光法師第二釋云此非正義諸論皆説青黃赤白初句攝故云云第二釋意既云此非正義初釋意異之尤可云正義哉答見光法師一段上文大段作二解釋初釋意云四洲空中所現空一顯色須彌山四寶錟故是明色攝非青黃赤白四色攝識身足論此即如彼青黃赤白之如言似義也為言第二釋意云四州空中所現空一顯色即是青黃赤白四色攝故識身足論此即如彼青黃赤白之如言是義也為言而此師意説青黃赤白無有離形俱句攝非初句收此即意別之釋述如言似義也云初釋意依此釋意者以正理論唯顯無形句中唯説影光明暗之師義可為正義也但此釋意會今論或有色處有顯無形謂青黃赤白影光明暗之文者任理實無有離形青等而言青等有顯無形據生顯智偏強勝説如新染絹雖亦有形以顯雜生生顯智強故初句攝之釋可會通之也又解四州空中所現顯色青黃赤白唯顯無形句中唯説影光明暗之師義可為不正義也一段前後處處之中多述各別釋意何以彼此解釋相違致其疑哉師云光法師此師意説青黃赤白無有離形俱句所攝非初句收此即意別之釋意以今論中有顯無形句舉青黃赤白影光明暗之文可云不正義也文尤雖可依用此義今且存別義畢問婆沙論意空界可無顯無形色耶答正義意可非無顯無形色也兩方若無顯無形色者空界色以影光明暗四色為體何云無顯無形色哉若依之爾者見婆沙論處處之文或七十五云或有色無顯無形謂除前相即空界色文或百二十二云顯形俱不可了者謂空界色文任此等文空界色可無顯無形色見如何答説一切有部意空界色以影光明暗四色為體定而見婆沙論處處之文有顯無形色中舉影光明暗故空界色是有顯無形色云事甚炳然也故見婆沙論一處文云如是諸色或有顯故可知非形故謂青黃赤白影光明暗及空一顯色或有形故可知非顯故謂身表業或有顯形故可知謂餘十二種色若非顯形故可知者無表文任此文色處中無無顯無形之類云事亦分明也但於婆沙論或有色無顯無形謂除前相即空界色之文者此述有説意即可不正義也故光法師釋云若依婆沙論十五有一説空界色第四句此非正義諸論皆説顯色攝故文寶法師釋云婆沙七十五一師云二十色內八有顯無形謂青黃赤白影光明暗餘十二色有顯有形此師意説有形必有顯自有顯無形有一師四句與此論同第四句取空界色非形非顯以恆被明暗覆故此之四句非是正義正義空界明暗為體理合是顯非形文婆沙論顯形俱不了者謂空界色之文準此等非形文婆沙論顯形俱不了者謂空界色之文準此等釋思之同可不正義也重難云識身足論中云無顯無形者謂若諸色無顯無形可有無顯無形色見豈非空界色哉答見識身足論文云有顯無形者謂青黃赤白影光明暗空一顯色有顯無形色中既列空一顯色故空界色是有顯無形色非無形色云事分明也但於無形者謂若諸色無顯無形之文者識身足論意就十一種色述有顯無形等四句分別故指五根四境及無表色為無顯無形色也故光法師釋云若依識身十一意説五根四境及無表色為第四句故彼論云無顯無形者謂若諸色無顯無形識身論意據十一種色四句分別此於正義亦不相違云云又尋云婆沙論有説意空界色無顯無形者以何為體哉若以影光明暗為體者定可有顯無形何云無顯無形哉答婆沙論一師意雖空界色影光明暗為體異十二顯色之中影光明暗彼影光明被覆障不明了故云無顯無形歟問光法師意無執受大種為因聲中可有有情名聲耶進云光法師釋云無執受中得有有情名聲文付之既以無執受大種為因何可有有情名聲哉是以見今論文當卷云有情名聲謂語表業餘處十三述散依等流性有受異大生散無表能造大種是有執受定畢判餘義皆與散無表同表業能造大種同散無表能造大種明知語表業能造大種是有執受云事若爾無執受中得有有情名聲之釋豈不背今論餘處定判哉答光法師意無執受大種為因聲中有有情名聲云事源任婆沙五事兩論所説故光法師引婆沙論聲處有八種謂執受大種因聲非執受大種因聲此各有二謂有情名聲非有情名聲之文畢問無執受中如何得有有情名聲答之引入阿毗達磨論聲有二種謂有執受及無執受大種為因有差別故乃至後聲中化語聲名有情名聲餘聲名非有情名聲之文畢云彼論既説後無執受聲中化語聲是有情名聲明知無執受中得有有情名聲文無執受大種為因聲中有有情名聲云事引婆沙五事兩論所説釋成之旨炳然也但於無執受大種為因不可名有情名聲云難者化人語聲故雖無執受大種為因名令起有詮表故亦名有情名聲有何相違哉次於今論餘處餘義皆與散無表同之文者光法師以婆沙論中化語是業云初師説為正云釋意會此文云若作前解釋後證言同散無表者據非化語業若據化語業即用無執受大種為因文既有會通解釋何背餘處論文哉問寶法師引入阿毗達磨論説云化語聲名有情名聲文爾者正義歟答寶法師釋然非正義也兩方若正義者寶法師引婆沙論聲處有八種諸執受大種因聲非執受大種因聲此各有二有情名聲非有情名聲之文畢云此師與入阿毗達磨意同然非正義文如解釋者入阿毗達磨論今文非正義見若依之爾者寶法師會今論等與入阿毗達磨論相違云各依一義故不同也文既云各依一義知入阿毗達磨論化語聲名有情名聲之文與今論等説遂不相違亦可正義答寶法師意存有情名聲必有執受大種所造故入阿毗達磨論中化語聲名有情名聲之文非正義得意也其故見今論文當卷云有情名聲謂語表業餘處十三述散依等流性受異大生散無能造大種是有執受定畢判餘義皆與散無表同表業能造大種同散無表能造大種故語表業能造大種是有執受云事分明也加之正理論云此聲八種謂有執受或無執受大種為因及有情數非有情數差別有四有執受大種為因聲即是有情數聲見故準此今論正理兩論之文思之婆沙論十三云聲處有八種謂執受大種因聲非執受大種因聲此各有二謂有情名聲非有情名聲入阿毗達磨論云聲有二種謂有執受及無執受大種為因有差別故乃至後聲中化語聲名有情名餘聲名非有情名無執受大種為因聲中有有情名聲云義非正義為言故寶法師引今文畢云此師與入阿毗達磨意同然非正義正理此兩文不用此義也但於寶法師各依一義故不同也之釋者述彼兩説意不同之由許也不云並不相違者何為疑難哉重意云今論并正理論意述化人語聲無能得得故非有情名聲之旨婆沙論一師并入阿毗達磨論意存化人語聲由有情心發故名有情名聲之義故云各依一義也今此二義之中化人語聲無能得得故非有情名聲云義寶法師存應道理故化人語聲由有情心發名有情名聲云義非正義判也問寶法師意能化人可成就離質化人語聲耶進云寶法師釋既非有情無得得也不成就之云也付之化語聲名有情名聲者於入阿毗達磨論説能化人何不成就之哉是以婆沙論百三十二中出成就欲色界繫所造色之類云若生色界作欲界化發欲界語文此文無諍能化人可成就化人語聲見設雖離質化人語聲寧不成就之哉依之光法師引此文畢云以此準知成就化語文加之廣勘婆沙論一部之始末未見能化人不成就化人語聲云文寶法師解釋依憑在何處哉答寶法師意離質化人語聲非有情數法故化人不成就之云也故勘寶法師處處解釋當卷云問既非是業有得得不答既非有情無得得也問如何得知化聲無得答一準正理論云非執受大種為因聲與非有情數聲無寬狹故化人同許非執受故故知不成就也二準婆沙評家義及此論下文色界身作欲界化所化香味如莊嚴具尚不成就如何離質化語得成就耶文餘處十三或云化人語等既無有得故知非業文或引光法師婆沙既言若生色界作欲界化發欲界語成就欲界大種及所造色文不別簡明知異界化若化自身若化他身色觸二種皆悉成就義準應知若即身化若離身化亦皆成就或可若即身化即成就若離身化即不成就婆沙言成就者據即身化雖有兩解前解為勝之釋畢云今詳二釋前解為非若別化人有成就得不應道理諸有為法住現在世有成就得必是有情説別化人為有情法不應理故住現在世色觸二境若是有情住散心位無非執受諸化人語聲應是執受大種所發又婆沙評家云自身化如莊嚴具而不成就況異身化而成就也以此證知前解為異云云此等解釋中能化人不成就離質化人語聲之旨立道理引證據委悉釋成之其意炳然也但於入阿毗達磨論化語聲名有情名聲之文者寶法師釋此師與入阿毗達磨意同然非正義不依用之也次於婆沙論若生色界作欲界化心發欲界語故作是説非謂此是離質化人所發語也所以得知身生色界作欲界化一説不化香味一説化而不成就如莊嚴具離質化人語既更疏遠身莊嚴具如何説語有成就義餘如前説文次於光法師以此準知成就化語之釋者兩師所存其意各別故寶法師意不依用此釋也故寶法師破此釋云此不成證通異解故前引文證化人無得文是決定此文容有兩釋故不成證文次於婆沙論一部中無能化人語聲之文云難者寶法師會此疑云此不在疑故不別説即是人總不成就無情法中此已説故故不別説如不別説一樹一石等名不成就又如説髮毛爪等非執受者非有情數無得得故此物親於離質化人尚不成就如何離質化語須更別説文處處之文一一之疑寶法師即會通之後學更不可劬勞歟問口外語聲可名業耶進云光法師釋云口內者是語亦業出口者是語非業文付之設雖口外語聲何不名業哉何況光法師初釋意述化語是業之旨以婆沙論有作是説彼是語業由心發故云前師義為正判而化人所發語定可口外聲此釋意豈非口外語聲名業哉答口外語聲非業云事非光法師私解釋源依正理論文故見光法師解釋云又問語皆業不解云口內者是語亦業出口者是語非業故正理六十解發語風中云此居口內名語亦業流出外時但名為語又以此文亦可證有離質聲也文尋解釋所引勘正理論文一字無替所引之言顯意論文全亦同之就此文案其意口外語聲非有情數法故不名業也但於光法師化語是業云釋者若依此釋意會正理論文者就非化語論之可云也重意云約口內外分別是業非業就自身語釋之所謂口內語聲是有執受大種因聲有情數法故名為業以口內語聲為緣別所發生口外語聲是無執受大種因聲非情數法故不名業也如寶法師餘處釋準此出身非出入息非有情故也化人語聲實是口外語聲也然而化主口內語故屬化主口內分且云業名許也約化人口內口外不分別是業非業歟問雜心論意有執受無執受大種合生聲歟進云光法師敘雜心論師義云許內外兩具四大合生一聲文付之依光法師解釋披雜心論所説未見有執受無執受大種合生一聲之文光法師解釋依憑在何處哉何況見法救所造論説述語手等聲有執受大種為因風林等聲無執受大種為因之旨若爾光法師今解釋有違文無證據哉答勘雜心論文於聲入出因受四大聲因不受四大聲因俱聲三類之中云因俱聲者謂擊鼓吹貝因緣發聲文有執受無執受大種合生一聲云事此文既分明也故光法師釋有説有聲通有執受及無執受大種為因如手鼓等合所生聲之論文云此敘雜心論師義許內外兩具四大合生一聲名因俱聲既得依憑於雜心論説故解釋所指更無其過雜心論中無有執受無執受大種合生一聲之文云疑恐不見雜心論今文歟何況以今此有説釋雜心論師義不限光法師解釋寶法師亦釋此雜心師説兩師一同之定判何有所謬哉但於法救所造論説者是五事論説歟雜心五事兩論同人所造云事甚以難測設亦雖同人所造語手等聲有執受大種為因風林等聲無執受大種為因云事諸論一同之定判也雜心論意即可存此理故今疑難之趣旁非相違歟問輕重極微可有別體耶答可有別體也兩方若有別體者見論文述於色界中有重觸云彼界衣服別不可稱聚則可稱文如此文者不可有別體見若依之爾者長短極微既有別體輕重極微寧無別體哉答薩婆多宗意廣談諸法實有之旨十一種觸中輕重二觸定可有別體也故見今論文云觸有十一謂四大種滑性澀性重性輕性及冷飢渴文光法師釋此文云滑等四種顯別有體不同經部故各言性乃至法蘊第十亦同此論然婆沙十三七所造觸皆有性字言性者據體性説一切諸法皆有自性故文任此等文理輕重極微各有別體云事更不可疑之但於今論彼界衣服別不可稱聚則可稱之文者雖一衣服輕重極微相雜而住多具衣服輕重極微相雜而住一依別住之時輕觸極微施作用多衣積聚之時重觸極微施作用故如此云也問頌文云亂心無心等文爾者光法師依正理論意如何釋亂不亂心相耶進云光法師釋云若依正理不善無記記名亂心善心名不亂釋稍不同文付之以道理思之望不善無表之時以善心名亂心以不善心可名不亂心也依之今論意即存此旨正理論意何偏可定不善心名亂心善心名不亂心哉是以寶法師正理論同今論説之旨釋成如何答見正理論文云不善無記名亂心餘心名不亂文光法師若依正理不善無記名亂心善心名不亂心之釋既任正理論説何致疑殆哉但於望不善無表之時以善心名亂心以不善心可名不亂心云難者今論意云亂心者謂此餘心存此義門即與無表其性相違名為亂心其性不相違名不亂心也故光法師釋今論文云以三性心望善惡無表明亂不亂若異性相望名亂以異性故若同性相望名不亂以同性故謂此善無表餘不善無記名為亂心即以自善心名不亂謂此不善無表餘善無記名為亂心即以自不善心名不亂心是即善不善心通亂不亂無記唯名亂自無無表故文正理論意異之不善無記心不與見相應故名為亂心善心是與正見相應故名為亂心也次於寶法師解釋者以正理論文強欲令同今論意故會之云正理論云不善無記名亂心餘心名不亂者就善無表説也也然而正理論中唯就善無表明亂心相既非盡理故光法師解釋能順正理論説也問無表中可有唯一剎那類耶進云光法師所引入阿毗達磨論云亦有無表唯一剎那文付之今論中説無表相似相續説名隨流文如此文者無表中不可有唯一剎那之類見如何答正理論中難今論相似相續説名隨流之文云非初剎那可名相續而有大過之失是故決定初念無表不入所説相中文光法師作俱舍師救云言相續者或以前續後如初無表或以後續前如後無表或續前續後如中間無表故初及後皆名相續設有無表唯一剎那相續類故亦名相續如乳如薪故入阿毗達磨云亦有無表唯一剎那依總種類故説相續文解釋既會疑難之文末學更不可致劬勞歟尋云何無表中有唯一剎那之類哉答別解脫靜慮無漏三種無表中難有唯一剎那之類歟處中無表勢力微劣捨緣是多其中可有唯一剎那之類歟但別解脫戒得戒次念捨緣出來有唯一剎那之類何強遮之哉又一念間入有漏定入無漏定即出定事以何文理全不許之哉故別解脫靜慮無漏三種無表中此類有無頗以難測處中無表中決定可有唯一剎那之類歟問光法師意現在世可有獨住極微耶進云光法師引正理論云有説亦有獨住極微文付之八事俱生隨一不減者薩婆多宗之性相也何云現在世有獨住極微哉答見今論文云無一極微各處而住衆微聚集變礙義成現在世無獨住極微定正理論初説其意亦同之故正理論云無一極微現在獨住積集住故變礙義成文而今光法師所引之文者彼論第二有説義也故光法師所引正理論云有説亦有獨住極微然能變礙而不發識依緣要積集故如立極微雖無方分亦無觸對而許極微有礙有對有障用故應知變礙義亦如是文此義意實違八事俱生隨一不減之理故可云不正義也例如今論餘處中云有説在色唯化二處之義違欲界八微必不相離之理故判不正義也問過未二世可有獨住極微耶答不可有獨住極微也兩方若有獨住極微者設雖過未二世不可有衆微離散之義若許此義者寧同外道宗計也若依之爾者光法師釋今論過去未來應不名色之文云現在衆微集變礙義可成過未衆微散應不名為色文如此釋者過未二世可有獨住極微見如何答任有部宗義案極微相狀於未來世衆微離散至現在世初令聚集過去落謝還亦獨住云事其道理甚不可得故過未二世不可有獨住極微云事必然也但於光法師過未衆微散應不名為色之釋者現在正作用位變礙之義是顯故云衆微集過未已當作用位變礙之義不顯故云衆微散也非云過未二世實有獨住極微歟問經部宗意可界處實有耶進云光法師釋云然經部師處假界實文付之十二處者六根六境也十八界中既有六根六境彼若實有者此何假立哉依之光法師餘處解釋中述經部宗義云現十二處八處實有四處少分實有少分實無文如何答光法師當卷定判餘處解釋廢立是異旨趣亦別也當卷釋意就三科廢立論其假實義之時十八界廢立各別開立色心自性施設之故為實義門十二處廢立合十八界中六識界施設之故為假立門五蘊廢立隨其所應合十八界十二處施設之故亦為假立門也故光法師釋云經部所立蘊處是假唯界是實文然經部師處假界實之釋即述此意也餘處釋意就十二處法體明其假實故云八處實有四處少分實有少分實無也若爾兩處解釋各述一門歟問光法師答行解行相為約何者説名能緣問作五解釋爾者初釋意如何釋之耶進云光法師釋云據行相説非據行解文付之行相者名心心所對境之時心心所上所緣境影像顯現寧約之立能緣稱哉行解者名心心所緣慮作用差別專望之可名能緣也何釋據行相説非據行解哉答見光法師初釋云據行相説非據行解謂彼心等對境之時有影像現據此義邊名為能緣境名所緣以心心所緣境之時非如燈焰舒光至境亦非如鉗桿取彼物據影現義名能所緣文據行相名能緣之旨解釋意頗炳然也但於據行解可名能緣云難者光法師自問意也即答此問云行解或正或邪於境不定行相理定故約此明文此釋意云何解者心心所緣慮作用差別故對境之時或正任境或邪不境其義不定故由之不立能緣稱行相者心心所對所緣境之時心心所上所緣境影像顯現之義故緣色之時色影像顯現緣之時心影像顯現其相決然無不定故約之專能緣名為言問尊者法救意可許無表色耶答不許無表色有實體也兩方許無表色者見寶法師解釋云此師不説有對色文如此釋者不許無表色見若依之爾者法處所攝色者源出阿含經説設雖尊者法救意何可違經説哉是以光法師釋大德法救復作是言五根所取名麁色所餘名細色之論文云五根所取五境名麁色所餘五根無表名細色文此釋無諍可許無表色見加之披法救所造論尋彼師所立義雜心論云十種謂色入及無作假色是分別色陰牟尼之所説文五事論云律儀所攝無表復有四種文任此等論説許無表色云事炳然也如何答尊者法救意存無表色是假立法無有實體也故見寶法師解釋上引婆沙論七十四故此尊者法救亦言諸所有色皆五識身所依所緣如何是色非五識身所依所緣之文畢下釋今論大德法救復作是言五根所取名麁色所餘名細色之文云此師不説有無對色如前引婆沙文五根所取名麁色者即是五境名麁所餘名細者即是五根非無表也文加之勘婆沙論文云尊者法救説離大種別有造色説心所法非即是心然説色中二非實有謂所造觸及法處色立蘊處界如對法宗文任此等定判尊者法救意不許無表色有實體云事尤分明也但於阿含經説者尊者法救意雖不許無表色有實體談假立義邊故全無相違次於光法師所餘五根無表名細色之釋者是亦就假立義邊細色之中舉無表色也非云實有色許之何為違文哉次於雜心五事兩論所説者彼亦就假立分際談也何況雜心論既云無作假色還為答之潤色歟就中婆沙論中所舉法救與雜心論主法救定可為別人時代遙隔義通釋異故也若爾雜心論文旁非疑難五事論説準可思之問薩婆多宗意有為法體可生滅耶答雖有二義暫可存生滅云義也兩方若生滅者薩婆多宗意述三世實有之義若有為法體生滅者何可談三世實有之旨哉是以見婆沙論處處文或三十一我説諸因以作用為果非以實體為果又説諸果以作用為因非以實體為因諸法實體恆無轉變非因果故文或三十九云若依自體轉變説者應言諸行無有轉變以彼自體無改易故文任此等論文有為法體三世恆有無有生滅轉變之義歟加之見光法師餘處解釋或第一釋是能生長彼作用義之論文云法體先有不可言生但能生長彼作用義文或第五釋法若有此應是有為之論文云此宗諸法體皆本有四相於法但望用説非據體論文寶法師餘處解釋中云心心所法先有體性由十二處令行世取果名為作用文圓暉法師餘處第五解釋中云依薩婆多宗法體先有不可言生但生其用耳文有為法體不生滅云事此等解釋亦分明也若依之爾者立有為名由法體生滅之義若法體不生滅者與無為法有何差別哉是以光法師解釋中云體非常故用亦非常文如何答有為法體生滅有無者上古明匠猶未決下愚末學輒雖定深思道理廣勘諸文可存有為法體生滅云義也其故立有為名由造作遷流之義若法體不生滅者豈名有為哉與無為法有何差異耶是以見婆沙論處處之文或三十九答諸有為法生時為體是生法故生為與生相合故生耶之問云應作是説體是生法故生答諸有為法滅時為體是無常法故滅為與無常相合故滅耶之問應作是説體是無常法故滅畢評家指此説云應知此中初説為善文或百八十三釋發智論諸生何世攝答未來諸滅何世攝答現在之文云復次為止執有為法唯轉變隱顯而無體生滅今説未來生現在滅故即顯有為法非但轉變而實有生滅故作斯論文有為法體生滅云事論文尤分明也加之見光法師處處解釋當卷釋若許作用異法體者可有此失然無有異故不應言有此過失之論文云體非常故用亦非常文有為法體生滅云事此釋亦分明也第一餘處之中或釋此有為法亦名世路已行正行當行性故或為無常所吞食故之論文云無常四相是能吞食諸有為法是所吞食此所吞食是可破壞故名世是無常所依故名路即世名路持業釋也文若有為法體不生滅者何云諸有為法是所吞食哉或第二釋若於彼法此有功能即説彼為此法境界心心所法執彼而起彼於心等名為所緣之論文云又解礙體義邊名所緣有對礙用義邊名境界有對文所緣有對者名心心所託自所緣境界現起若心心所法體不生滅者寧有礙體之義哉何況圓暉法師餘處第五解釋中云謂相法體令是有為文若許相法體者豈不云生滅哉準此等文理有為法體生滅云事誰可疑之哉但於薩婆宗意談三世實有之旨云難者是實難義也云法體恆有談其性非常倩案其意尤以難思經部師難許體恆有説性非常如是義言所未曾有即此意也誠會之者有為法體遷流三世之時其性實雖生滅不如其用本無今有有已還無故云三世體恆有也次於婆沙論諸實體恆有轉變之文者云我説作用以為因果光取今文意所引之言也作用雖為本無今有有已還無於其體者無此義故如此云也對我説作用以為因果云諸法實體恆無轉變此旨自炳然也光法師法體先有體性之釋圓暉法師法體先有不可言生之釋會通亦同云有為法體雖遷流三世不如其用本無今有有已還無故諸師同述法體先有之旨也非謂其法體實不生滅歟次於婆沙論應言諸行無有轉變之文者色色自性不轉心心心自性不轉色故如此云也以生自體無改易故之文此旨實分明也重難云見婆沙論處處文或十七答若未來世無同類因及遍行因過現乃有則應無因而有因亦應無果而有果如是便壞三世有宗之問云若許亦無失約位非體以和合作用位果非體然位與體非即非離體雖恆有而位非恆故同類因及遍行因本無今有亦無有失三十一或釋發智論云何無常滅答諸行散壞破沒已退之文云諸有為法自性恆有由生相故有作用起由滅相故無復作用名為散壞破沒已退文體雖恆有而位非恆之文諸有為法自性恆有之言有為法體不生滅見是一加之南寺護命僧正研神章中舉或云有為法體生滅或云有為法體不生滅或云有為法體不生滅之二傳畢自述本義云今述本聞不必當用有為法體無生滅恆在不斷是此本義代至像末人失本義不可得悲也文先德決判誰不依用哉是二答有為法體生滅云事道理證文前重成之畢重勘諸師解釋嘉祥大師十二門論下疏或答有為法體是生故生為與生合故生之問云體是生但要由生相顯發如暗中雖有瓶要須燈顯發不説燈生彼亦如是文或答法體本無生滅而假四相生耶云問法體本有生滅性但假四相發動之耳文問頌文云彼體語或名此色行蘊攝文爾者光法師意今此二説其意可同耶答其意可不同也兩方若其意同者既云彼體語或名亦述此色行蘊攝今此二説其意豈可同也若依之爾者披光法師解釋云若約逗機説法以聲為體若據詮法以名句文為體文如此釋者今此二説其意不相違見如何答述佛教體諸師意異或依逗機説法之邊云以聲為體或依詮法顯宗之門云以名句文為體故見光法師解釋云此中教體兩説不同自古諸德出教體或有以聲為體或有以名句文為體或具合二種若約逗機説法以聲為體若據詮法以名句文為體所以諸論於教體中皆有兩説不同今依新譯婆沙以此論初説為正故婆沙一百二十六云問如是佛教以何為體乃是語業為是名等答應作是説語業為體有説佛教名等為體如是説者語業為體佛意所説他所聞故文婆沙論中既舉二師異説評家意判存語業為體之義今此二説其意若同者何判二説正不出評家實義哉故知今此二説其意是異云事而依光法師今解釋致二説意不相違云疑難勢之趣還不得其意者歟問光法師釋八萬四千法蘊量舉三毒等分四人爾者等分言唯限末後一人歟答可通前三人也兩方若唯限末後一人者見光法師解釋上舉多貪多嗔等五類下出三毒等分四人若等分之言唯限末後一人者上下之文所列其差異難辨哉答依之爾者既云三毒等分四人等分之言何可通前三人哉答光法師意三毒等分四人者約貪瞋癡三毒或貪瞋癡三毒或貪嗔等分非癡或瞋癡等分非貪或貪嗔等分非嗔或貪嗔癡等分之四人也若三毒偏增為前三類三毒等分為第四類者其三毒偏增三類與上所舉多貪多嗔多癡三類有何差異哉爰知下所列三毒等分四人者名貪嗔等分嗔癡等分貪癡等分貪嗔癡等分四人云事若爾等分之言可通前三人也問論中明五解脫處相爾者以幾法名解脫處耶進云集異門足論云此中七法名解脫處云云付之五解脫處者源出長阿含經説而彼經中全無七法名解脫處之文論家定判豈不背經文哉何況今論中明五解脫處相云五解脫處惠為性故此法處攝若兼助伴即此聲意法處所攝文若爾就剋性體論之者唯限惠一法望助伴體云之者可十二處中三處所攝七法名解脫處云事甚難思哉抑今此正法者何等法耶答見集異門足論文云解脫處者此中何謂解脫處耶答此中七法名解脫處一者正了知法二者正了知義三者欣四者喜五者輕安六者樂七者定文此中第一正了知法第二正了知義者惠心所即剋性體法也第三欣者欣心所第四喜者喜受第五輕安心所第六樂者樂受第七定者定心所也助伴體中就有勝作用且舉此五法歟但於長阿含經中無今此七法名解脫處之文云難者問光法師意六界中識界可攝命根耶進云光法師釋云既攝命根文付之心法非心法既異何釋識界攝命根哉何況光法師自釋有為法中但標六界云色心二種諸部極成是故偏説心所有法不相應行即非極成文若爾極成非極成亦別寧云識界攝命根哉答光法師釋今論由許六界是諸有情生所依故如是諸界從續生心至命終心恆持生故諸無漏法則不如是之文舉問難云入無心定識即不行云何乃言恆持生故云云答此問難作四解釋之中第三釋云又解色法中強偏説四大亦攝所造無色中強心法為勝亦攝餘法既攝命根故言恆持生也文此釋意云色法之中四大種強勝故説地等四界攝所造色無色法中心法強勝故説識界攝餘無色法既攝命根故云恆持生也為言但於心法非心法既異識界不可攝命根云難者心法非心法雖異同無色法故識界攝命根可有何過哉次於極成非極成亦別識界不可攝命根云難者就文舉地等六界不出心所并不相應行判極成非極成不同也其中識界攝命根事更非所遮歟問尊者法救意可許心王別體耶答可許心王別體也兩方若許心王別體者婆沙論中明世第一法體云尊者法救作如是言諸心心所是思差別故世第一法以思為自性文如此文者心王是思心所上假立不可有別體見是以震旦人師釋此文云若依此計唯有心所無別心王文若依之爾者色心二種是諸部極成法也設雖尊者法救意何不許心王別體哉答尊者法救意可許心王別體也故見光法師解釋述立地等六界故云四大及空五法中色法攝識是心法攝色心二種諸部極成是故偏説心所有法不相應行即非極成如覺天説心所是假經部説不相應行是假是故不説文思此釋意諸師意必可許心王別體見若尊者法救意不許心王別體者可云如法救説心王是假豈定色心二種諸部極成哉何況見婆沙論文云尊者法救説離大種別有造色説心所法非即是心文此文意異尊者覺天云心所即是心之差別存諸心所皆心王上假立尊者法救云諸心所皆心王上假立心王之外許思心所別體為言若爾尊者法救意許心王別體云事此文亦分別也但於婆沙論諸心心所是思差別之文者是可言總意別心心所中諸心所是思差別思上假立為言非云心王亦思差別思上假立故慈恩大師釋法救説心所體即是思不云心王體即是思即此意歟次於人師唯有心所無別心王之釋者是婆沙抄判也不可依用之去寬喜元年十二月之候於當寺東南院被行俱舍三十講之時宗性初案立此論義對定覺法師疑之頗雖為小事以珍用之畢問尊者覺天意可許心所別體耶答不許心所別體也兩方若許心所別體者光法師釋心所非極成云如覺天説心所是假文此釋無諍不許心所別體見若依之爾者見婆沙論文云尊者覺天作如是説相應隨眠令相應心於所緣境悉謬不了文若尊者覺天意不許心所別體者何可有隨眠與心相應之義哉答尊者覺天意不許心所別體也即不限光法師當卷如覺天説心所是假之釋見餘處定判云若依成實論訶利伐摩及覺天計無有心所但有心王心分位殊假立心所文何況見婆沙論處處之文或明世第一法體云尊者覺天作如是説諸心心所體即是心故世第一法以心為自性文或云覺天所説色唯大種心所即心彼作是説造色即是大種差別心所即是心之差別文或百四十二出二十二根體云尊者覺天作如是説名二十二實體唯一所謂意根彼作是説諸有為法有二自性一大種二心離大種無所造色離心無心所諸色皆是大種差別無色皆是心之差別文加之清涼大師引唯識論或執離心無別心所之文畢云釋曰此即經部覺天所計以經言士夫六界染淨由心無心所故雖於蘊中亦有心所但於識上分位假立無別實有文慈恩大師釋此文云述曰此第四計即是經部覺天等執覺天所執亦依經故經説三法和合名觸乃至廣説又説士夫六界染淨由心故無心所彼説唯有受及想行信思等心更無餘法隨心功用立心所名亦恐違至教故無心所説文撲揚大師釋云若經部師自有二釋一譬喻師唯心無所同覺天計文任此等定判尊者覺天意不計心所別體云事甚分明也但於婆沙論相應隨眠令相應心之文者剋實性論之心王之外雖無心所別體就假立云之談貪嗔等煩惱故許心王與彼煩惱相應云義邊歟問欲恚害三界相攝十八界時可有多少不同耶答若就剋性體云之不可有多少不同若就助伴體論之可有其不同也兩方若有多少不同者披光法師解釋舉欲恚害無欲無恚無害六界畢云此六是心所法皆是法界攝文如此釋者不可有多少不同見若依之爾者品類足論中欲恚害三界相攝十八界之時可有多少不同見如何答若就剋性體云之欲界以貪為性恚界以瞋為性害界以害為性故同是法界攝不可有多少不同故光法師釋云欲以貪為性恚以瞋為性害以害為性乃至此六是心所法皆是法界攝文若就助伴體論之欲恚害三界同可取相應心心所及彼等起身語業并彼等起心不相應行而欲恚二界通與六識相應故六識界意界色界聲界法界十界攝也害界唯與意識相應故意界意識界色界聲界法界五界攝也故今此三界相攝十八界之時可有十界五界不同也故見品類足論兩處文或六云欲界云何謂欲貪及欲貪相應受想行識若彼等起身語業若彼等起心不相應行是名欲界恚界云何謂瞋及瞋相應受想行識若彼等起身語業若彼等起心不相應行是名恚界害界云何謂害及害相應受想行識若彼等起身語業若彼等起心不相應行是名害界文或云欲界十界四處五蘊攝七智知除類滅道智三識識欲界有漏緣隨眠增恚界亦爾害界五界四處五蘊攝七智知除類滅道智三識識欲界遍行及修所斷隨眠增文問心俱生法心俱滅法相攝十八界時可有多少不同耶答可有多少不同也兩方若有多少不同者云心俱生法云心俱滅法其名雖異其體可同相攝十八界之時何可有多少不同哉是以今此二法相攝五蘊之時無有多少不同相例可同若依之爾者品類足論中心俱生法心俱滅法相攝十八界之時可有多少不同見如何答見品類足論兩處文或六云心俱生法云何謂心俱生十一處少分除意處乃至心俱滅法云何謂心俱滅十處少分除聲意處文或九云心俱生法十一界十一處四蘊攝九智知除滅智六識識一切隨眠隨增乃至心俱滅法十界十處四蘊攝九智知除滅智五識識一切隨眠隨增文任此兩處論文心俱生法中取聲界心俱滅法中除聲界故今此二法相攝十八界之時有十一界十界不同也推其文意初受生位有一類聲與心俱生之後其心雖相續其聲有間斷故以聲界唯名心俱生法不云心俱滅法也於五蘊例難者五蘊廢立五根五境及無表色合立色蘊故今此二法攝五蘊之時同唯除識蘊餘四蘊攝無有多少不同也寫本云弘長壬戌二月二十九日午時於東大寺知足院別所之草菴抄之畢去年四月十二日初記録當卷之論義此春今日聊終其抄出之微功問端數多餘百條光陰空移及兩年懈怠之至深可悲之者歟但去去年秋七月二十日不圖被補東大寺別當職之間去年一回匆忙無隙就中中夏下旬初參禁裏最勝講證義七月二日亦勤法勝寺御八講證義暮秋之始上皇之臨幸忘寢食窮冬之半拜堂之經營費身心仍天性疏荒彌以後賢後學之輩可垂賢察焉抑捧此所生惠業奉資春日大明神之法樂依此修學善根必遂上生兜率天之願望晝夜朝暮常禮慈尊聖容造次顛沛親聞補處説法以滅多生曠劫我執法執之迷以開三無差別唯識唯心之悟道遂慈尊下生閻浮回來東大笠置今生止住之處見古迹尋訪同法善友當世結契之族報其舊恩豫受慈尊加被明知二親師範之宿緣恣預大聖化導廣度六道輪回之群類殊別先師覺遍僧正之告別也期再覲於逍遙苑之月前門弟實弘法師早世也一緣於龍花樹之露底乃至功德所及利益不限矣右筆東大寺別當華嚴宗末葉法印權大僧都宗性年齡六十一夏﨟四十九
