body:
  text: 俱舍論第二十八卷抄下問題問色無色界近分地可有定煩惱耶問第四靜慮以上命終心為唯限近分為當通根本歟問頌文云初亦聖或三文爾者或三者正義歟問未至定有味定云師意今此味定可緣未至定耶問論文云中間靜慮與諸近分為無別義為亦有殊文爾者寶法師如何釋之耶問中間靜慮業可感梵輔天異熟果耶問依無願三摩地入見道者一相續身中可有空三摩地現起義耶問利根聖者以無相及道無願三摩地斷三界煩惱義可有耶問空等三三摩地唯限無漏歟問重空重無願等持可緣未來耶問重空重無願等持可緣無相三摩地耶問論中明重無相等持緣境相緣無學無相三摩地上非擇滅作靜行相不作滅行相故如何釋之耶問光法師所引婆沙論文云有處説二滅無處説二靜文爾者有處説二滅者為指擇滅非擇滅為當指非擇滅無常滅歟問不得邊際定不時解脫阿羅漢可起重三等持耶問初靜慮重空重無願等持唯緣初靜慮聖道歟問重三等持可通曾得耶問重三等持現前時可有未來修耶問重三等持順勝進分攝歟問以無漏道離下三無色染無漏加行道位必可修無色界有漏耶問未至地業可感初靜慮衆同分果耶問上地下地近分相望時可有相生義耶問成就淨初靜慮不成就味相應無漏初靜慮為唯限異生為當可通聖者耶問得不還果位得無漏初靜慮不得味相應淨初靜慮義可有耶問阿羅漢果聖者起初靜慮煩惱退時可有味淨無漏三等至俱時得義耶問捨無漏三無色不捨味相應淨四無色類可有耶問起第二靜慮煩惱退淨初靜慮義可有耶問非第四靜慮世俗智現前時修淨無漏第四靜慮義可有耶問發智論中舉已得非第四靜慮世俗智現在前不修淨無漏第四靜慮句爾者今此非第四靜慮世俗智者為唯限上二界世俗智為當可通欲界世俗智耶問依身在第二靜慮成就初二靜慮人生得故成就第二靜慮義可有耶問退無漏三無色不退淨四無色類可有耶問有學聖者中可有不起無色界煩惱退無漏靜慮不退淨靜慮類耶問有學聖者退種姓時可退練根無間道耶問無漏靜慮與淨靜慮俱時得別捨義為唯限有學練根為當可通無學練根耶問五通所依定可通退分定耶問除從第三靜慮生第四靜慮時餘時中捨一等至無所得義可有耶問慧解脫阿羅漢起味相應初靜慮退時淨初靜慮中可有不捨不得類耶問不還果聖者中於六十五等至極少成就十八等至類可有耶問不還果聖者中於六十五等至極多成就四十八等至類可有耶問阿羅漢向聖者中於六十五等至極少成就十二等至類可有耶問阿羅漢向聖者中於六十五等至極少成就十三等至唯限無所有處非想非非想處二地依身歟問生無色界阿羅漢果聖者可成就他心通所依定耶問有學聖者修練根時可有無漏四靜慮頓得義耶
