body:
  text: 俱舍論第三卷抄問雜心論行品中可説二十二根相耶答不説二十二根相也兩方若説二十二根相者正勘雜心論行品不説二十二根相哉若依之爾者光法師釋今論根品云雜心名行品文而今論根品中既説二十二根相知雜心論行品中亦説二十二根相云事如何答見光法師解釋云界品明諸法體根品明諸法用文而雜心論行品中明諸法用者設雖不説二十二根相以彼論行品對判今論根品可有何疑哉何況彼論行品中明心品定俱生色法定俱生有為四相六因四緣等相皆是今論根品中所説法門故光法師釋雜心名行品正理名差別品何故此論名根品耶尤符順兩論現文哉故寶法師釋云此論名根品雜心名行品正理名差別品然雜心合此論根品世品總名行品文但於今論根本中既説二十二根相雜心論行品中可説二十二根相云難者彼論廢立大異今論説相委勘彼論一部始末修多羅品中廣説二十二根相雜品九中雖明二十二根極多極少成就相彼兩品中所説法門與今論根品所説法門多分相替故以今論根品不對判彼論修多羅品及雜品也問光法師意扇搋無形人歟答扇搋不限無形也進云光法師釋云扇搋唯無根文付之依光法師定判披婆沙論七所説或問起順決擇分善根已更可受扇搋半擇迦無形二形身不或百二十四問扇搋半擇迦無形二形受近住律儀得律儀不處處之文扇搋之外別列無形明知扇搋即非無形人云事依之光法師餘處二十三解釋中判此四善根唯依男女不依扇搋半擇無形二形扇搋無形各別舉之哉答扇搋中有全無根有分無根有本性者有損壞者故不限無形可通有根也故寶法師釋云扇搋中有全無根有分無根乃至諸經論中有説扇搋是無根者全無少無同名無故文準此釋思光法師意扇搋唯無根者含全無分無云唯無根也其中本性全無根者即名無形故扇搋寬無形是狹有此寬狹差異故婆沙論處處之文并光法師餘處解釋中扇搋之外別列無形更非相違也重難云若扇搋寬無形狹故扇搋之外別無無形者今論餘處十五中偈頌結二黃門二形長行述於三洲內復除扇搋及半擇迦具二形者扇搋之中即攝無形無簡殘類光法師何引婆沙論扇搋半擇迦無形二形受近住律儀得律儀不等之文畢問此論何故不説無形答此論不説略而不論哉其所略者何等類哉次光法師言扇搋等成就者據非丈夫男根無志氣者云釋意扇搋可成就非丈夫男根見豈不背扇搋唯無根之釋哉答扇搋寬通全無根分無根無形狹限全無根故扇搋之外雖無無形扇搋無形既有寬狹差異故婆沙論處處之文搋之外別列無形而今論餘處中云二黃門二形扇搋之外別不舉無形故光法師判此論不説略而不論此論略而不論無形一重釋也非云扇搋之外有別類無形歟次光法師扇搋唯無根之釋意含全無根分無根云唯無根而光法師次下引婆沙論或有成就男根而不名丈夫如扇搋半擇迦等文作三解釋之中初釋云解云男根有二一丈夫男根二非丈夫男根言扇搋等不成者據丈夫男根有志氣者言扇搋等成就者據非丈夫男根無志氣者文第二釋云又解男根有二一具足成謂有勢力能離欲等二不具足成謂無勢力不能離欲等言不成者據初説言成者據第二説文此第一第二釋意存扇搋中分無根類成就非丈夫男根第三釋云又解從多分説雖扇搋不成男根以半擇二形成就男根彼言扇搋者同文故來文此第三釋意扇搋之中分無根類猶不成就非丈夫男根為言故光法師前後之釋全無所背也問中有末後念必起染汚心歟答不必起染汚心也兩方若必起染汚心者披今論餘處十文雖述應知中有初續剎那亦必染汚猶如生有不云中有末後念必起染汚心哉若依之爾者光法師釋意根二者謂能續後有之論文云謂中有末心與愛等俱能續生有故名能續後有文如此釋者中有末後念必起染汚心見如何答中有末後念不必起染汚心也故見婆沙論處處之文或百五十四云生無相天幾根滅答八謂眼耳舌身命意捨根問此説從何處生無想天耶答此説從無相中有生無相生有問爾時亦有信等五根現在前滅何故不説答此文應作是説或八或十三中有最後心無記者八善者十三而不作是説者應知此義有餘有作是説此中但依滅位生位皆有者説信等五根唯滅位有非生位有是故不説文此文既云此説從無想中有生無相生有無相天中有末後念信等五根現在前之旨炳然也或百九十二十九釋發智論諸捨欲有欲有相續之文云謂欲界命終還生欲界從死有往中有時捨欲有者謂欲界死有欲有相續者謂欲界中有若從中有往生有時捨欲有者謂欲界中有欲有相續者謂欲界生有問若住欲界無覆無記心命終者住中有時不成就死有住生有時不成就中有可名為捨若住善或染心而命終者住中有時成就死有住生有時成就中有云何名捨有説此中但依住無覆無記心命終者説是故無過文此文亦述欲界命終還生欲界之者住生有時不成就中有若中有末後念不起無覆無記心者豈不成就中有哉任此等論判中有末後念不必起染汚心云事甚分明也但於光法師謂中有末心與愛等俱之釋者就當受胎卵二生之者中有末後念與愛恚心俱云也更不遮當受濕化二生之者中有末後念起善及無覆無記心何為相違哉問寶法師意了自境增上等三行頌誰人義判耶進云寶法師釋云述曇無德建立根也真諦云經部也文付之依寶法師釋披今論現文云有餘師説能導養身非眼等用是識增上述識見家義見是以光法師釋此文云有餘識見等家作如是説文何況今論習本頌之中偏載有宗義無舉餘部説若爾寶法師以今此三行頌何判經部宗義哉答識見家義專雖尊者法救説經部宗中亦談此旨故泰法師釋云第二了自境增上下三行頌述曇無德部建立二十二根文惠暉法師釋此事云識見師真諦師云是經部師也文諸師一同之釋定有深意歟但於今論文者經部宗中有存識見義之師故是識增上之言全非相違次於光法師釋者有部宗中識見等家作如是説為言與寶法師其趣可異歟次於今論之習本頌之中偏載有宗義無舉餘部説云難者尋論主本意所志雖舉經部宗義有宗義中亦有其説本頌之中載之無過也如彼云此上十七處二十八述後色起從心其志雖存經部宗義有宗義中同許其言故本頌結之人不為奇也重難云披今論餘處文上舉眼見識見二師義畢下破此兩家云經部諸師有作是説如何共聚楂掣虛空眼色等緣生於眼識此等於見孰為能所唯法因果實無作用為順世情假興言説眼名能見識名能了智者於中不應封著文此文無諍經部宗意不存識見義見若爾經部宗中有存識見義之師云事證據在何處哉答經部宗本義存根境識和合見之義故雖破眼見識見家説傍亦可有立識見義之師也故弘決二本中釋止觀眼識能見之文云眼識能見等者此依經部附近小乘故云識見文加之探玄記二云成實識聞刊定記判二法救論師識聞非耳成實同此成實論意存識聞義見而成實論師者是經部別師也以聞思見定知經部宗中有立識見義之師歟問寶法師意心所依此別等一行頌述有宗義歟進云寶法師釋云第三一頌述曇無德重説根相文付之披一部始末尋八品前後本頌結有宗義長行時朋經部説定知今一行頌可述有宗義也何況顯宗論中載此一行頌若非有宗義者彼論中何可有此頌哉是以光法師釋此文云述自宗答即説一切有部文泰法師釋此文云世親論主建立二十二根文如何答為叶寶法師釋委案論文起盡標有餘師説能導養身非眼等用是識增上舉了自境增上等三行頌寶法師釋此文云第二述曇無德建立根也真諦云經部也文而論中難此了自境增上等義云若增上故立為根者無明等性應立為根無明等因於行等果各各別有增上用故等文答此難云如是等事不應立根由所許根有如是相結心所依此別等一行頌故寶法師第三論主為曇無德建立根也所任論文由來也但於本頌偏結有宗義云難者尋論主本意雖朋經部義有宗義中亦有其説本頌中載之無過也如彼八云此上十七處述後二十八色起從心所志雖存經部宗義有宗義中亦有其説故本頌結之人不為奇也次於顯宗論載此一行頌云難者有宗義中同談此旨故彼論中有此偈頌全非相違次於光法師并泰法師釋者人師異釋不可必和會歟問寶法師依正理論意述還滅得體作二解釋爾者第二釋意如何釋之耶進云寶法師釋云即非擇滅得也文付之依寶法師今釋披正理論九現文云生死止息是還滅義即是六處畢竟斷滅此得所依謂信等五以是一切善根生長最勝因故還滅得體可擇滅得見是以光法師釋正理論意約𣵀槃得明圓暉法師判生死止息名為還滅取𣵀槃得為還滅體若爾寶法師第二釋意甚似難思如何答寶法師引正理論今文還滅得體作二解釋其中初釋意云此得者是擇滅得也其意即如光法師并圓暉法師釋但第二釋意正理論文解還滅義云即是六處畢竟斷滅故釋或是六處不生即非擇滅得也亦非無其謂歟問未知當知根及喜覺支通相應根二十二根中有幾根耶進云婆沙論百十云八根文付之任性相思此事未知當知根及喜覺支通相應根二十二根中可意信等五根六根加何根云八根哉答未知當知根及喜覺支通相應根二十二根中可意信等五根六根也其旨即如疑難之趣但於進文者披婆沙論説以未知當知根相應對喜覺支相應作四句分別中出第三句云有法未知當知根相應亦喜謂未知當知根所攝喜相應法此法是何謂餘八根及彼相應諸非根心所法文謂餘八根者未知當知根以九根為體之中除喜根餘意樂捨信等五根八根也以實論之雖亦可除樂捨二根次上文以未知當知根相應對念覺支相應作四句分別中出第三俱句云有法未知當知根相應亦念謂未知當知根所攝念相應法此法是何謂餘八根及彼相應諸非根心所法除念根餘意樂喜捨信等四根八根為俱句體故乘此言便未知當知根相應及喜覺支相應相對俱句中亦云謂餘八根也重難云未知當知根以意樂喜捨信等五根九根為體故未知當知根望未知當知根可有相應義故見婆沙論百五十四文云未知當知根與未知當知根九根少分相應與未知當知根相應者此根九法為性一一除自與餘相應皆名此根此根相應九根少分相應者謂意樂喜捨信等五根文而今出未知當知根及喜覺支通相應根之中何不舉未知當知根哉答泛論之者未知當知根望未知當知根可有相應義婆沙論説其旨即分明也但今文意以未知當知根望餘根論相應義故出未知當知根及喜覺支通相應根之中不舉未知當知根也問寶法師意二乘聖者第十六心次念必果道相續歟答可有二意也兩方若必果道相續者二乘聖者種類非一準第十六心次念何必可果道相續哉若依之爾者寶法師解釋中二乘聖者第十六心次念必可果道相續見如何答寶法師引婆沙論百四十三謂初剎那雖與七智相似後諸剎那皆與彼異從多分説悉名已知根一類性故之文作二解釋初釋云準此論文前七智唯一剎那道類智二乘必有多念文此釋意云聲聞緣覺第十六心以後必果道攝道類智多念相續為言第二釋云或聲聞衆出必有多念文此釋意云聲聞及部行獨覺第十六心以後必果道攝道類智多念相續麟喻獨覺第十六心次念必起勝果道故無果道相續多念現起之義為言重難云披寶法師餘處二十一解釋引婆沙論部行喻者如聲聞説麟角喻者如菩薩説之文畢云此與正理不同正理同聲聞不同菩薩無超越道故論意各別不應和會文如此釋者婆沙論意麟喻獨覺如菩薩三十四念成覺之故第十六心次念必可起非想地能治道見若爾與道類智二乘必有多念之今釋豈不相違哉答道類智二乘必有多念之今釋可當餘處二十一必若欲釋應云麟喻獨覺有其二類一猛利根二少鈍於上猛利根者如菩薩説少劣上者起次第道之釋意歟或聲聞衆出必有多念之今釋可當餘處論意各別之釋意也巳上一義之趣如此私云麟喻獨覺入聖以後一百六十心成覺之釋意不可有果道攝道類智多念相續之義以此道理推今釋意二乘必有多念者聲聞并部行獨覺第十六心以後必果道攝道類智多念相續為言或聲聞衆出必有多念者聲聞衆出第十六心以後必果道攝道類智多念相續為言衆出者指聲聞非部行獨覺歟問尊者法救意苦樂憂喜信進念惠八根可有別體耶答可有二義邊也兩方若有別體者婆沙論二中云尊者法救作如是言諸心心所是思差別文若諸心所皆思上假立者苦樂憂喜信進念惠八根更不可有別體哉若依之爾者婆沙論百四十二文述尊者法救義云名二十二實體十四二十二根中除女男命捨定三無漏根餘十四根可有別體見如何答尊者法救意云諸心心所是思差別存諸心所皆思上假立故談此義邊者苦樂憂喜信進念惠八根思心所上假立之不可有別體也但於婆沙論實體十四之文者女男二根是身根少分故身根之外無有別體命根是不相應行蘊所攝故無有別體捨根是離苦樂受無別不苦不樂受故無有別體定根是心一境性名為定故離心外無有別體三無漏根是意樂喜捨信等五根九根約見修無學三道位立其名故此九根外無有別體故女男命捨定三無漏根八根無有別體苦樂憂喜信進念惠八根思心所分位假立之故從所依思心所亦有別體之義邊可有也如彼經部宗意雖談受想思實有之旨大乘師對彼師立觸別有體量之時以愛心所為共同喻也故慈恩大師唯識本疏中釋此事云經部計愛亦是實有思分位故不同假觸文準此釋可思之也重意云女男命捨定三無漏根八根不及思心所分位假立之故如彼根境識三和合名觸不及假立分故名假觸全無有別體之義邊也為言問已知根可通有漏耶進云今論云唯無漏後三文付之修道既通有漏已知根何唯限無漏哉答唯無漏後三者性相之所定也後學之輩更不可異求之何況思其道理已知而知名已知根世俗智是相似觀解實無已知而知之義何立已知根稱哉但於修道既通有漏已知根何唯限無漏哉云難者修道位中以世俗智斷諸煩惱證中間二果故通有漏云也故見今論餘處二十二文云見道應知唯是無漏修道通二文依此義門雖述修道亦通有漏真實修道唯限無漏故已知根不通有漏其義符順者歟問論文云謂阿羅漢成就神通文爾者今此阿羅漢者可通惠解脫俱解脫耶進云光法師釋云顯俱解脫簡惠解脫文付之依光法師解釋披今論定判説入邊際定延壽人相雖述謂阿羅漢成就神通無簡惠解脫加之廣勘婆沙論説未見入邊際定延促壽人唯限俱解脫云文光法師解釋依憑在何處哉何況泰法師釋成就神通之論文云成就六神通文成就六神通寧可限俱解脫哉答見今論文云如本論説云何苾芻留多壽行謂阿羅漢成就神通文光法師釋成就神通之文云二解脫勝成就神通顯俱解脫簡惠解脫文此釋竊依今論餘處文并任正理論餘處説也故披今論餘處二十九文明由二緣故修八解脫等功德云二為於定得勝自在故能引起無諍等德及聖神通由此使能轉變諸事起留捨等種種作用文勘正理論餘處八十説問行者何為修解脫等答為於等至得自在故既得自在便能引發無諍等德及聖神通由此便能轉變諸境起留捨等種種事業顯宗論四十文全亦同之此等文意由修習八解脫等力引發依邊際定所得無諍願智等功德及聖神通由此能起延促壽等種種事業云故準此餘處釋思今當卷文謂阿羅漢成就神通者唯限俱解脫云事必然也故寶法師釋此文云成就神通簡惠解脫文但於泰法師釋者受成就神通之論文釋成就六神通甚難依用歟然而判二解脫勝即俱解脫人成就六神通方有此能簡異惠解脫人限俱解脫簡惠解脫之趣其大綱同光法師等釋意故強無所背歟重難云今論餘處五中明得滅盡定云聖由加行得除佛之外所餘聖者唯加行得見而婆沙論百七十九中述二乘聖者得願智無諍智云如是説者若決定可得者彼離染得盡智時得故文準此兩論文思之不得滅盡定得願智無諍智之類可有見可云引發依邊際定所得無諍願智等功德之人必俱解脫哉答今論餘處中明得滅盡定云聖由加行得者麟喻獨覺初盡智位得滅盡定故雖離染得部行獨覺及聲聞乘得滅盡定加行得故以二乘離染得不定除佛之外所餘聖者由加行得云也故光法師餘處二十七釋除佛所餘一切聖者所説六種唯加行得非離染得非皆得故之諭文云俱舍以二乘離染得不定故但言加行得文準此釋可思之婆沙論中述二乘聖者得願智無諍智云如是説者若決定可得者彼離染得盡智時得故者聲聞有學位得八解脫人初盡智位得無諍願智等功德麟喻獨覺最上利根人故初盡智位得滅盡定及無諍願智等功德故若決定可得者初盡智位由離染得為言故婆沙論百七十中述六十五等至極多極少成就相云佛定成就五十七獨覺中部行者如欲界聲聞麟角喻者如佛文任此等文理不得滅盡定引發依邊際定所得無諍智等功德之類更不可許之故光法師顯俱解脫簡惠解脫之釋有深由也問論中明留多壽行相云時彼能感富異熟業則皆轉招壽異熟果文爾者光法師意今此富異熟業者先世業歟進云光法師釋云此則現業感現命果文付之命根是有情本也輒不可云現在業所感是以披婆沙論説或三十二云以命根衆同分俱是牽引業果或百四十三説命衆同分名遍任持正理論餘處文述要業牽引命衆同分今論餘處十五中判能引唯三除順現受任此等文現在業不感現在命根見依之寶法師釋由施命緣能引過去招富之業感壽果也成先世業感現在命根之旨何況論中明捨多壽行相云時彼能感壽異熟業則皆轉招富異熟果文若促壽時壽業先世業者延壽時富業亦可非現在業加之勘婆沙論百二十六文云謂由布施邊際定力轉富異熟業招壽異熟果文若布施時無貪相應思正感現在命根者如何以布施還可為轉業緣哉次若轉富業感壽果者今此布施時無貪相應思富壽二果中於何果起取果用哉若於壽果起取果用者不可云轉富業若於富果起取果用者感壽果時可不取果而與果寧不背能為彼種故名取果之理哉答留多壽行者利根俱解脫阿羅漢先世業所感命衆同分中有同分長命根短者為延命根修布施行入邊際定從定起已心念口言諸我能感富異熟業願皆轉招壽異熟果殷勤發願欣求之時布施時無貪相應思由邊際定力答誓願思感現在命根也故今論云如本論説云何苾芻留多壽行謂阿羅漢成就神通得心自在若於僧衆若於別人以諸命緣衣鉢等物隨分布施施已發願即入第四邊際靜慮從定起已心念口言諸我能感富異熟業願皆轉招壽異熟果時彼能感富異熟業則皆轉招壽異熟果文案此文意上云以諸命緣衣鉢等物隨分布施施已發願下述時彼能感富異熟業則皆轉招壽異熟果明轉此布施業即感現在壽異熟果見依之光法師釋此文或云此家意説以布施時無貪相應思正能感現異熟命根以邊際定等為緣能轉富業令感壽果此即現業感現命果或判此論既言轉招壽果以此故知現容感命以今論文為證現在業感現在命根之旨釋成也何況今論中明命壽差別云有餘師説先世業果名為壽行現世業果名為命行文光法師釋此文云第二師解先世業果名壽行現在布施業果名命行文泰法師釋此文云有餘師説先世業果名為壽行羅漢延命現起業果名為命行文此等釋意現在布施業即感現在命根見加之婆沙論百二十六中問所留壽行正由誰引為由施力為定力耶答之舉評家義云如是説者俱由二種雖多行施若不入定彼終不能引壽果故雖數入定若不行施彼終不能引壽果故然施力能引定力令決定由此故言俱由二種文既云然施力能引現在布施業感現在命根云事亦分明也但於命根是有情本也輒不可云現在業所感云難者命根雖有情本是別報故現在業感現在命根也故光法師釋云同分是總命根是別同分非現感命根容現感文次於婆沙論以命根衆同分俱是牽引業果之文者光法師會此文云引業非唯感總同分亦能兼感別命根故文正理論餘處要業牽引命衆同分之文會通同之次於婆沙論命衆同分名遍任持之文者光法師會此文云任持有二同分是總遍任持命根是別遍任持文次於今論餘處能引唯三除順現受之文者就感衆同分總報論之也即具文云能引唯三除順現受現身同分先業引故不云命根先業引故還是現在業感現在命根云釋證據也故光法師引此文畢云彼文既不云命根故知現業不感同分容感命根文若爾何以講答潤色之文浪為問難疑滯之端哉次於寶法師由施命緣能引過去等之釋者人師異釋也不及和會之泰法師作二釋云然命根由現報業延命故通現報不由現報業延衆同分故衆同分非現報業感也又釋由施定願力轉過去富業感命故命非現業果也文其中光法師意明轉現在富業感現在命根之釋寶法師意存轉過去不定富業感現在命根之義其旨趣各異不可劬勞歟次於若促壽時壽業先世業者延壽時富業亦可非現在業云難者促壽行時捨本所感壽果故尤轉先世業可令感富異熟果今時布施邊際定唯為轉業緣許也延壽行時延本所無壽果故專修現在業可延之故布施時無貪相應思感現在壽異熟果云也次於婆沙論謂由布施邊際定力轉富異熟業招壽異熟果之文者布施業廣通身語及能發思富業者唯限布施俱生無貪相應思故彼身語及能發布施思與邊際定力合轉布施俱生無貪相應思業令感壽異熟果故以布施為轉業緣全無相違也次於布施時無貪相應思富壽二果中於何果起取果用哉云疑者見今論餘處文述身語及能發此招大富果布施業感富果定故於富果起取果用也然而由布施業邊際定等力轉富業令感壽果故於壽果可起與果用也如彼動業於天等果起取果用於人等果起與果用就其業體見之起取果用起與果用故不可背能為彼種故名取果正與彼力故名與果之理歟重難云光法師引業非唯感總同分亦能兼感別命根故之釋難思若命根衆同分一引業所感者寧可有同分長命根短之義哉是一次光法師任持有二同分是總遍任持命根是別遍任持之釋有疑遍非遍者即可總別義於遍任持中何論總別不同哉是二次光法師彼文既不云命根故知現業不感同分容感命根之釋不明既判現身同分先業引故設雖不云命根同是引業所感其義定可等引此文為現在業感現在命根之證據誰可信用之哉是三次布施時無貪相應思感壽異熟果者入邊際定及願轉富業感壽果頗似無用是四次延壽行時行布施為得富果歟為當為得壽果歟若為得富果者為得富果行布施畢有何所以忽願轉招壽果哉何況今論云以諸命緣衣鉢等物隨分布施婆沙論百二十六説以衣以鉢或以隨一沙門命緣衆具布施為感壽果以衣鉢等命緣衆具行布施見加之婆沙論百二十六云為留壽行以衣鉢等施僧別人文為感壽果行布施云事此文亦分明也若亦為感壽果者以彼布施時無貪相應思豈可名富業哉是五答命根衆同分雖一引業所感所感命根衆同分各別故有長短不同更可有何過哉問光法師依婆沙論正義家意可許順現業感衆同分義耶答不許之也兩方若許之者光法師雖及異釋第一正釋意述順現業不感衆同分之旨若婆沙論正義家意許此義者光法師豈可作此釋哉若依之爾者披婆沙論七十説舉評家義中云諸有欲令順現受業引衆同分文此文無諍可許此義見如何答光法師解衆同分現感不現感命根衆同分總報別報義雖作六釋自判雖作六解初解稍勝非但多順論文亦於理為善以第一同分是總命根是別同分非現感命根容現感云釋為所存實義而此釋意引婆沙論百十四或有説者二業能引衆同分果亦能滿衆同分果謂順次生受業順後次受業二能滿衆同分果不能引衆同分果謂順現法受業順不定受業復有説者三能引衆同分果亦能滿衆同分果謂除順現法受一能滿衆同分果不能引衆同分果謂順現法受復有欲令順現法受業亦能引衆同分果若作是説此四種業一切皆能引衆同分果及滿衆同分果之文取意引之畢云婆沙雖無評家且以第二師為正以餘論文於四業中皆不説現感同分故文此釋既判且以第二師為正故順現業感衆同分云師説非正義云事甚分明也但於婆沙論諸有欲令順現受業引衆同分之文者不足為疑即披一段現文委尋二義正不解天帝釋於佛前所説大仙應當知我即於此座還得天壽命唯願尊憶持之頌問天帝爾時有死生不答之初述應作是説彼無死生云義此師説中舉諸有欲令順現受業引衆同分彼作是説天帝即於聽法座上更新引得命等八根諸有欲令順現受業不能引得衆同分者彼作是説天帝即於聽法座上除五衰相身位如本由此理趣故無死生云二説次於有餘師説時天帝釋亦有死生云義畢遂判正不云如是説者彼無死生故二説中初説為善經死生者身心變故文此文意天帝釋爾時無死生云初師説為善判許也非云彼初師説中所舉順現受業引衆同分云義為善何以此文猥致今疑哉問寶法師意非業非異熟根有幾種耶進云寶法師釋云九根非業非異熟文付之以道理思之非業異熟根唯可限三無漏根何釋九根非業非異熟哉答寶法師九根非業非異熟之釋非私定判引本論説見故披寶法師解釋引尊者法勝説此命根亦非異熟故彼論説有十三根皆通二種云義畢破之云此違本論一根非業是異熟九根非業非異熟十二不定文既引本論説定有深意歟何況案釋旨趣非無其理業者名身語意三業異熟者是異熟無記法故憂根信等五根三無漏根非身語意三業故云非業非異熟無記法故云非異熟也故以今此九根云非業非異熟更可有何疑哉尋云引本論説者何本論説哉答問經部宗意於無色界起善染汚心時所假立命根為是異熟法為當非異熟法歟答非異熟法也兩方若是異熟法者既善染汚心上所假立命根也更不可云是異熟法哉若依之爾者今論中依經部宗意釋邊際定所引命根云故此命根非是異熟所餘一切皆是異熟文如此文者於無色界起善染汚心時所假立命根是異熟法見如何答見光法師餘處五解釋云又正理難經部云若處無業所引異熟內五色處於彼或時無業所引第六意處謂於長時起染汚識或善有漏及無漏識相續位中無業所引異熟勢分説何為壽正理難意於無色界無內五處或起餘心又無異熟意處異熟勢分於彼既無説何為壽俱舍師解云若依異熟立者是異熟若依餘立者非是異熟雖依彼立非隨彼法判性如名句等依善惡聲文準正理論於無色界無內五處或起餘心等之難意任俱舍師若依餘立者非是異熟等之答趣於無色界起善染汚心時所假立命根非是異熟法云事甚分明也但於今論所餘一切皆是異熟之文者除邊際定所引命根所餘一切異熟勢分所假立命根皆是異熟法為言故光法師釋此文云所餘一切異熟勢分假建立者皆是異熟文此釋意即顯非異熟法所假立命根非異熟法也若得此意當卷論文還為答之潤色全非疑難之論哉尋云若爾於無色界起善染汚心時所假立命根五類門中何耶答等流義寬故可等流性也非異熟法所假立故非異熟生無能長養緣故非所長養有為法故非有實事同類因生故非一剎那也問光法師意不由邊際定力延命根義可有耶答可有此義也兩方若有此義者今論中述留多壽行相云即入第四邊際意無舉餘緣知不由邊際定力延命根之義無之云事若依之爾者披光法師餘處五解釋云又解二定不損壽命是故別説如人應受百年命根至年五十入彼二定設經千年方始出定不食段食還更受餘五十年命文此釋無諍不由邊際定力延命根之義可有見如何答入二無心定之間不損命根故於彼定中雖經多年其間命根別業所感也如人應受百年壽命其中間入二無心定除入定間壽命之外出定之後還更應受本百年中所殘壽命盡故由二無心定力延命根之義可有也光法師餘處解釋即顯此意也但於今論中述留多壽行相云即入第四邊際靜慮無舉餘緣云難者彼明由定力出定之後延命根故唯於邊際定力不舉餘緣也問由定力延一劫壽命義可有耶答不可有此義也兩方若有此義者設雖定力難思爭可延一劫壽命哉若依之爾者披今論文云又為成立先自稱言我善修行四神足故欲住一劫或一劫餘如心所期則便能住文此文無諍由定力延一劫壽命之義可有見如何答欲界善業無感一劫壽果總衆同分不通現業所感設雖世尊定力自在更不可延一劫壽命但於今論欲住一劫或一劫餘如心所期則便能住之文者述假令義勢許也非云實有此事歟問雜心論意是異熟喜根無間可生他地心耶答可生他地心也兩方若生他地心者是異熟喜根其性羸劣也更不可生他地心哉若依之爾者披雜心論文非異熟喜根無間可生他地心見相例可同如何答雜心論意是異熟喜根無間可生他地心也即第二靜慮是異熟喜根無間可生初靜慮眼耳身三識也退見寶法師餘處七所引正理論二十文云若生第二靜慮以上起初靜慮三識身時諸有未離自地染者彼從自地善染無記作意無間三識現前三識無間還生自地三種作意諸有已離自地染者除染作意唯善無記作意無間三識現前三識無間亦唯起此二種作意文婆沙論十一説其意同之此等論中既述第二靜慮善染無記三種心無間起初靜慮眼耳身三識之旨其無記心中何可簡異熟生心哉雜心論意亦可存此理歟此論義者去正治二年俱舍三十講貞禪大僧都問增玄擬講于時兩人俱非成業之疑也論義旨趣云勘今論餘處十五欲界及下三靜慮無捨受異熟云師意會中間定業應無異熟之難云有餘師説業能感根本地中樂根異熟有説此業不感受果文光法師釋此文引雜心論業品三問下地何故無不苦不樂報耶答有説下地麁而彼受細故下地不寂靜而彼受寂靜故之文畢云雜心意同二説文如此釋者雜心論意同欲界及下三靜慮無捨受異熟云師義見若爾從欲界及下三靜慮生上界地命終心位所起異熟生心不與喜根相應者可與何根相應哉為言會此疑云雜心論意可存欲界及下三靜慮有捨受異熟云義也即彼論十中明二十心相生云報生威儀八欲界報生心無間生色無色界穢汚心云故任死生唯捨受之理欲界有捨受異熟云事分明也光法師餘處十釋今論若説欲界有捨異熟彼説欲界入𣵀槃心亦具威儀異熟無記若説欲界無捨異熟彼説欲界入𣵀槃心但有威儀而無異熟之文云於二説中初説為正如二十心相生中欲界異熟生心能生上二界染汚心即是欲界異熟生心捨受相應命終於上二界染心受生以受生命終心定捨受故以此明知欲界定有捨受異熟文準此釋意思之雜心論九中解阿羅漢入𣵀槃心雖舉欲界及下三靜慮捨受異熟有無二説述二十心相生之報生威儀八故彼論意下地有捨受異熟云師説存正義可云也但於光法師餘處雜心意同二説之釋者引雜心論欲界及下三靜慮無捨受異熟云一説同今論下地無捨受異熟云義中二説釋許也非謂雜心論意存下地無捨受異熟云義有何相違哉此事當卷三十講近代明德所問用故疑問之趣聊雖記録是為餘處論義之問委悉難答併省略之問光法師意以威儀工巧心望五受根明相應不相應義作三解釋爾者初釋意如何釋之耶進云光法師釋意及捨受若威儀路工巧處非異熟唯捨根相應云也付之依光法師釋披今論現文述意及四受若善染汚若威儀路及工巧處并能變化隨其所應亦非異熟餘皆異熟威儀工巧心可通苦樂喜捨四根相應見若爾初釋意依何文理判唯捨根相應哉答見光法師初釋云意及捨受若威儀路及工巧處非異熟問何故不通苦樂喜根答婆沙一百四十四解苦根通三性中云云何無記謂無記作意相應苦根此復云何謂異熟生已上論文婆沙苦根四無記中但言異熟不言餘三明知苦根不通威儀工巧苦根既不通威儀工巧準知樂根亦不通彼喜根有二一者分別二者任運若分別強者唯同憂根不通無記若任運者四無記中唯是異熟不通餘三以此準知但是威儀工巧處心唯是捨根不通苦樂喜根文初釋意引證文立道理成威儀工巧心唯捨根相應之旨其趣在之但於今論意及四受若善染汚等之文者既置隨其所應之言故威儀工巧心唯限意及捨根相應全無所背也重難云勘品類足論十五文或舉意根非善非善為因之類云謂除善異熟生意根諸餘無記不善意根樂喜捨根亦爾文此文意樂喜捨根不限異熟無記見或出苦根非不善非不善為因之類云謂除異熟生苦根諸餘無記及善苦根文此文意苦根不限異熟無記見若爾威儀工巧心可通苦樂喜捨四根相應唯捨根相應云初釋豈不違品類足論説哉答光法師初釋意就起威儀心起工巧處心唯捨根相應云也品類足論文據威儀路加行心緣威儀路心似威儀路心工巧處加行心緣工巧處心似工巧處心論之故廣通苦樂喜捨四根相應也所望各別更非相違歟重難云若爾光法師初釋意與第三釋意有何差別哉答約今論若威儀路及工巧處之文初釋意云唯限起威儀心起工巧處心第三釋意存兼通加行緣似威儀工巧心是其兩釋差異也重難云光法師初釋證據所引婆沙論云何無記謂無記作意相應苦根此復云何謂異熟生之文就起威儀心起工巧處心不通苦根相應云者彼論次上文述意根無覆無記云無覆無記者謂威儀路工巧處異熟生通果俱生作意相應意根如意根捨根喜根樂根隨應亦爾文此文意起威儀心起工巧心可通喜樂相應見若爾初釋意寧不背此文哉答婆沙論今文有隨應言故威儀工巧異熟通果四無記心隨其所應通喜樂捨根相應為言即如今論意及四受若善染汚若威儀路及工巧處并能變化隨其所應亦非異熟餘皆異熟之文非云四無記心皆通喜樂捨根相應不足為疑歟若如此疑者今文意存通果心通喜樂相應得意歟甚不可然事也問光法師以變化心望五受根明相應不相應義作二解釋爾者第二釋意如何釋之耶進云光法師釋云又解意喜樂捨若能變化非異熟文付之變化心者是微劣心品喜樂二根亦強勝行相也彼此既無相順之義豈可相應哉是以見今論餘處十文述成就十八意近行相若生色界唯成欲界一捨法近行謂通果心俱文若變化心通喜樂相應者何不成就喜法意近行哉何況今論中云樂根異生生第四定及無色界定不成就喜根異生生三四定及無色界定不成就若變化心通喜樂相應者可有異生生第四定成就樂根生三四定成就喜根之義哉加之婆沙論八十九中明諸心相生云要欲界捨根等無間能生色界心等故文若變化心通喜樂相應者欲界喜根等無間寧不生色界心哉答變化心者廣通欲色二界可亙近分根本若不通喜樂相應者下三靜慮根本地中可無變化心故變化心通喜樂相應下三靜慮根本地中亦可有之為言第二釋所存大有此事歟但於變化心者是微劣心品喜樂二根亦強勝行相云難者變化心者既禪定所生果也何必微劣心品哉通喜樂相應全不可有所背次於今論餘處若生色界唯成欲界等之文者光法師會此文云捨是中庸起時稍稍易生上可言成下喜樂非是中庸起時稍難生上不能成下故但言捨不言喜樂以云實餘時亦有成就文此釋意云捨是中庸起時稍易故下地變化心上地為所依唯與捨根相應故生上地成就下地捨根相應變化心喜樂非是中庸起時稍難故下地變化心上地為所依中無喜樂相應之類故生上地不成就下地喜樂相應變化心故生上地成就下地通果心但言捨相應不言喜樂相應以實云之初二靜慮變化心自地為所依與喜根相應第三靜慮變化心自地為所依與樂根相應故於自下地亦成就喜樂相應變化心為言以云實餘時亦有成就之釋其意在之下地變化上地為所依中無喜樂相應之類故可有異生生第四定成就樂根生三四定成就喜根之義云難更不可來也次於婆沙論要欲界捨根等無間能生色界心等故之文者此義意欲界變化心中無喜根相應之類故此文頗不足為疑歟重難云見光法師解釋始末變化心唯捨相應云初釋意引諸論解十八意近行中皆云若生色界唯成欲界一捨法近行謂通果心俱之文為證判以此故知不通喜樂而第二釋意存變化心通喜樂相應之時問若通喜樂意近行中生上成下何故不言文相起盡無諍指初釋為證若生色界唯成欲界等之文致此問難也答此問云捨是中庸起時稍易生上可言成下等欲界變化心中與捨根相應是中庸故生上成下與喜根相應非中庸故生上不成下云也變化心通喜相應者唯限初二靜慮變化心自地為所依云事甚違問答首尾哉是一次捨是中庸起時稍易等之釋意由中庸非中庸不同有成就不成就差異釋成也若下地變化心上地為所依中無喜樂相應之類故生上地不成就下地喜樂相應變化心者直可云爾何煩釋捨是中庸起時稍易等哉是二次有何所以欲界變化心中無喜根相應之類哉是三答勘婆沙論百三十九文述生初二三四靜慮成就下地意近行同唯舉捨意近行爰知變化心唯捨相應云初釋意引若生色界唯成欲界一捨法近行謂通果心俱之文為證且引文初也意廣取生初二三四靜慮成就下地意近行唯舉捨意近行之文為其證據若不爾者何引此文證變化心不通樂根相應之旨哉故第二釋意問若通喜樂意近行中生上成下何故不言探初釋為證之意趣生初二三四靜慮成就下地意近行何故言捨不言喜樂哉問也答此問云捨是中庸等生初二三四靜慮成就下地意近行唯限捨意近行不通喜樂之旨顯也非云欲界變化心中有喜根相應之類次捨是中庸起時稍易等之釋意捨是中庸起時稍易故有下地捨根相應變化心上地為所依之義故生上地可成就下地捨根相應化心喜樂非是中庸起時稍難故無下地喜樂相應變化心上地為所依之義故生上地不成就下地喜樂相應變化心故諸論解十八意近行中生上地成就下地意近行但言捨不言喜樂會也中庸變化心上地為所依非中庸變化心上地不為所依故云捨是中庸等即成上地為所依不為所依之義門也何為別事哉次此義意下地變化心上地為所依唯限捨根相應云故欲界變化心中無喜根相應之類為言已上相傳義趣大概如此委細問答併讓本抄而已尋云變化心通喜樂相應云釋意有證文哉答光法師第二釋意無分明證文歟只依今論意及四受若善染汚若威儀路及工巧處并能變化隨其所應亦非異熟餘皆異熟之文作此釋也品類足論十五中舉意根非善非善為因之類云謂除善異熟生意根諸餘無記不善意根樂喜捨根亦爾文此文意喜樂二根不限異熟無記見然而不云通通果無記歟婆沙論百四十四中或云無覆無記有四謂威儀路工巧處異熟生及變化等通果心如意根樂根喜根捨根信根精進根念根定根惠根亦爾然有差別謂信等五根除染無記餘隨所應文或百四十四云無覆無記者謂威儀路工巧處異熟生通果俱生作意相應意根如意根捨根喜根樂根隨應亦爾文此等文意同今論説有隨應言故非變化心通喜樂相應云釋證據歟有入以此等文為其證據恐難依用之問下三靜慮根本地可有捨受耶進云光法師釋云又準正理婆沙根本地中無有捨受文付之設雖下三靜慮根本地何無捨受哉是以今論餘處二十二文述持息念依地云有説根本下三靜慮中亦有捨受文婆沙論百三十九中明得意近行云離第二靜慮染第九無間道時得第三靜慮及彼近分六文第三靜慮根本地無捨受者寧云得第三靜慮意近行哉答見正理論三十餘處文云非明利識有死生義以死生時必昧劣故由此故説下三靜慮唯近分心有死生理以根本地無捨受故文勘婆沙論九十八説云梵輔梵衆依未至地心命終結生大梵依靜慮中間心命終結生所以者何命終結生心唯捨受相應捨受唯在初靜慮近分地非根本地故文光法師餘處十引此正理婆沙兩論文畢云又準正理婆沙根本地中無有捨受文光法師今解釋中云又準正理婆沙根本地中無有捨受引文如下即指此第十卷衆釋也準正理婆沙兩論定判述下三靜慮根本地無有捨受之旨餘處當卷之釋其意如此但於今論餘處有説根本下三靜慮中亦有捨受之文者光法師釋此文云此非正義文次於婆沙論得第三靜慮及彼近分六之文者乘言便説也婆沙論次上文云離欲界染第九無間道時得初靜慮及彼眷屬十二離初靜慮染第九無間道時得第二靜慮及彼近分十二文乘此言便云離第二靜慮染第九無間道時得第三靜慮及彼近分六也披婆沙論處處之文或九十三舉學八支捨緣云得果轉根或退捨故乘此言便出九十四十無學支捨緣亦云得果轉根或退捨故文或百十明未知當知根相應亦念覺支相應法云謂餘八根乘此言便述未知當知根相應亦喜覺支相應法同云謂餘八根文以實論之十無學支捨緣無得果捨未知當知根相應亦喜覺支相應根唯限六根然而乘言便説例證如此準彼思之云得第三靜慮及彼近分六乘言便説非存第三靜慮根本地有六捨意近行歟已上貞禪大僧都義也聖禪擬講傳存此義或一義云得第三靜慮者得第三靜慮根本地果意近行為言舉因顯果也已上乘信僧都并義海得業義也問論中明二十二根三性門云唯善後八根文光法師釋本頌先説信等八根故作二解釋爾者第二釋意如何釋之耶進云光法師釋云又解乘前先問善是故先説文付之幾善等問是長行也而本頌先結長行後製若爾今故不可然如何答説三性法之次第必列善不善無記故先可問幾善耶也故本頌先説信等八根事乘前先問善故釋也但雖本頌先結長行後製先可問善之義是必然故如此釋也如彼云善等於善等初有四二三等説三性法之次第必列善不善無記事聖教中自本所定也後學輩始不可疑歟問憂根與身邊二見相應歟答不相應也兩方若相應者光法師所引婆沙論中憂根不與身邊二見相應見若依之爾者披婆沙論文述憂根與欲界一切隨眠相應之旨一切之言是廣何可簡身邊二見哉答憂根唯限善及不善身邊二見有覆無記法故憂根不與身邊二見相應云事道理先必然也是以光法師所引婆沙論百四十四中述憂根非無記云憂根且非有覆無記由與欲界有身見邊執見不相應故文但於婆沙論文者實似難會然而任愚推試會之云正見婆沙論八十六説牒釋發智論憂根欲界一切隨眠隨增之文云憂根欲界一切隨眠隨增者憂根唯欲界通五部及一切隨眠相應故有爾所隨眠增文此文意云憂根與無漏緣一切隨眠相應故憂根欲界一切隨眠隨增為言重意云無漏緣隨眠有相應隨增無所緣隨增故若欲界無漏緣隨眠中有不與憂根相應之類者欲界隨眠中容有憂根不隨增之隨眠而欲界滅道所斷邪見疑無明無漏緣一切隨眠皆與憂根相應故發智論文云憂根欲界一切隨眠隨增也為言總而言之欲界隨眠中貪慢身見邊見見取戒禁取雖不與憂根相應緣憂根故約憂根有所緣隨增也問歡行轉心所與戚行轉心相應義可有耶答不可有此義也兩方若有此義者歡戚行相既異何可有相應義哉是以光法師所引婆沙論中歡行轉心所與戚行轉心所亦不相應見若依之爾者尋伺麁細相替沈悼行相遙異彼此尚許相應之義歡戚行相相例可同如何答歡行轉心所戚行轉心所行相水火異故更不可有相應之義是以光法師所引婆沙論百四十四中明憂根非無記云憂且非有覆無記由與欲界有身見邊執見不相應故所以者何行相異故彼二見歡行相轉憂根戚行相轉互相違法不相應文勘光法師餘處二十九所引正理論七十九文述悲無量依地云此勝解作意理應違近有歡戚處中行相別故悲既戚行相傳非喜樂相應勿二行相俱時轉故文任此等文歡行轉心所與戚行轉心所不相應云事甚分明也但於尋伺沈掉等例難者彼雖麁細相替行相亦異非如歡戚互相違故全非相例之疑難也問苦根唯緣不善法歟答廣可緣三性法也兩方若唯緣不善法者舌身三識相應苦根豈可緣不善法哉若依之爾者光法師釋又彼無有不善法故之論文云無不善法故無苦境文如此釋者苦根唯可緣不善法見如何答苦根廣可緣三性法也所謂眼耳二識相應苦根廣緣三性法舌身三識相應苦根唯緣無記法故苦根所緣廣通三性法不限不善法云事必然也但於光法師無不善法故無苦境之釋者苦根以不善法為所緣境是其本故若無不善法之處亦無有苦根為言有不善法故有苦根之上兼緣善無記法更非所遮也問憂根可緣上二界耶答可緣上二界也兩方若緣上二界者上二界無有惱害事憂根何可緣之哉是以光法師釋又彼定無惱害事故之論文云無惱害事故無憂境文如此釋者憂根不緣上二界見若彼之爾者欲界邪見疑無明既上緣惑也彼相應憂根寧不緣上二界哉答善憂根并欲界上緣惑中邪見疑無明相應憂根可緣上二界也故見今論餘處十文釋十八意近行緣境相偈頌結欲緣欲十八色十二上三長行述欲界所繫具有十八緣欲界境其數亦然緣色界境唯有十二除香味六彼無境故緣無色境唯得有三彼無色等五所緣故正理論二十九文顯宗論十五説偈頌長行全亦同之何況披正理論次下段文云所緣定者欲緣欲境具三十六緣色界境唯二十四除緣香味二依各六緣無色境唯有六種謂法近行二依各三文顯宗論説亦同此文加之勘婆沙論百三十九説上明十八意近行緣境相云欲界繫十八中六唯緣欲界繫謂緣香味喜憂捨近行九通緣欲色界繫謂緣色聲觸喜憂捨近行三通緣三界繫及不繫謂緣法喜憂捨近行文下説三十六師句緣境相云欲界三十六中十二唯緣欲界繫十八通緣欲色界六通緣三界及不繫文任此等諸論説善及不善憂根緣上二界云事甚分明也但於光法師無惱害事故無憂境之釋者憂根以惱害事為所緣境是其本故若無惱害事之處亦無有憂根為言有惱害事故有憂根上兼緣無惱害事上二界更非所遮也問經部宗意第四靜慮可有樂受耶答可有樂受也兩方若有樂受者披今論餘處九文依經部宗意明十二緣起體云或有於樂非苦樂受發生色愛文光法師釋此文云或有於色界初二三定樂第四非苦樂受發生色界受文泰法師釋此文云或於三定樂及四定非苦樂受發生色愛文加之今論餘處二十八中依經部宗意述三靜慮支相云由此可説依初五支滅二三四立第二等文光法師解此文云由此可説依初五支滅尋伺二立第二定滅尋伺喜三立第三定滅尋伺喜樂四立第四定文寶法師并泰法師釋其意同之任此等定判經部宗意第四靜慮無有樂受見若依之爾者光法師今解釋中云若依經部苦樂隨身至四定憂喜隨心至有頂彼宗意説有身即有苦樂有心即有憂喜文如何答勘婆沙論處處之文或五十二舉譬喻者義云彼作是説欲界初靜慮一切善染無覆無記及靜慮中間乃至有頂染汚心等名有尋有伺地靜慮中間善及無覆無記心等名無尋唯伺地第二靜慮乃至有頂善及無覆無記心等名無尋無伺地文或百四十五云譬喻者言始從欲界乃至有頂皆有善染無記三法一切地染法皆名有尋有伺唯善無記有三地別文準尋伺依地思五受界繫經部宗意若約染汚受論之者苦樂隨身至四定憂喜隨心至有頂光法師當卷解釋即顯此意也若就善及無覆無記受云之者欲界具有五受初靜慮有喜樂捨三受第二靜慮有喜捨二受第三靜慮有樂捨二受第四靜慮以上唯有捨受今論等餘處定判亦存此旨也若爾當卷之釋餘處之文各據一門更非相違歟私云見婆沙論處處之文或九十云或有執樂苦二受隨所依身從欲界乃至第四靜慮皆有喜憂二受所依心從欲界乃至非想非非想處皆有文或百四十五云復有説言樂根苦根五地可得謂欲界四靜慮彼説有身皆有苦樂或復有説喜根憂根九地可得謂從欲界乃至有頂彼説有心皆憂喜三界九地皆有心故憂喜亦有文此等文既云或有執述復有説言明知有部宗中亦有此義也問經部宗意可立有尋有伺等三地耶答可有二義邊也兩方若立有尋有伺等三地者披今論餘處四文論主難毗婆沙師云又麁細性相待而立界地品別上下相形乃至有頂應有尋伺文光法師釋此文云論主敘經部計為難故婆沙五十二云或有執從欲界乃至有頂皆有尋伺如譬喻者文此釋無諍經部宗意不立有尋有伺等三地見若依之爾者有尋有伺等三地廢立源出自契經説經部宗意尤可立此三地是以今論餘處中依經部宗意述立靜慮支相或二十八云由此可説依初五支滅二三四立第二等文光法師釋此文云由此可説依初五支滅尋伺二立第二定文或云二十八此定遠離尋伺鼓動相續清淨轉名為內等淨文光法師解此文云此第二定能遠離彼尋伺鼓動定體相續清淨寂靜轉名為內等淨文任此等定判經部宗意立有尋有伺等三地云事分明也如何答勘婆沙論處處之文或五十二舉譬喻者義云彼作是説欲界初靜慮一切善染無覆無記及靜慮中間乃至有頂染汚心等名有尋有伺地靜慮中間善及無覆無記心等名無尋唯伺地第二靜慮乃至有頂善及無覆無記心等名無尋無伺地文或百四十五云譬喻者言始從欲界乃至有頂皆有善染無記三法一切地染法皆有名有尋有伺唯善無記有三地別文準此等文思之經部宗意若約染汚心品論之者始從欲界乃至有頂皆有尋伺故不可立有尋有伺等三地今論餘處乃至有頂應有尋伺之文并光法師所引婆沙論説即顯此意也若就善及無覆無記心品立之者可立有尋有伺等三地今論餘處云立靜慮支之文并光法師釋亦述此旨也若爾兩方之難各據一門彼此之釋更非相違歟問婆沙論百四十四中明二十二根三斷門云如意根亦爾文爾者亦爾言可攝喜樂二根耶答不攝喜樂二根也兩方若攝喜樂二根者披婆沙論文今此亦爾之言不攝喜樂二根見若依之爾者今論中云意三受通三喜樂二根通見修非三斷既同意根如意根亦爾之言何不攝喜樂二根哉是以婆沙論中述二十二根三性門及有異熟無異熟門如意根亦爾之言攝喜樂二根相例可同如何答九十八隨眠中意捨二根遍與一切隨眠相應喜根與見所斷五十二隨眠相應謂欲界二十四隨眠除嗔疑八色界二十八隨眠除疑四也與修所斷六隨眠相應謂欲色界貪慢無明六隨眠也故總與見修所斷五十八隨眠相應樂根與見所斷二十八隨眠相應謂第三靜慮二十八隨眠也與修所斷五隨眠相應謂欲界貪無明色界貪慢無明五隨眠也故總與見修所斷三十三隨眠相應非如意捨二根遍與九十八隨眠相應故如意根亦爾之言唯攝捨根不攝喜樂二根也但於今論意三受通三之文者總論之者意喜樂捨四根通見修非三斷故雖説意三受通三別云之者意捨二根遍與九十八隨眠相應喜樂二根有不相應之隨眠故婆沙論中明二十二根三斷門如意根亦爾之言唯攝捨根不攝喜樂二根也次於婆沙論中述二十二根三性門及有異熟無異熟門如意根亦爾之言攝喜樂二根云例難者喜樂二根通三性亘有異熟無異熟大同意根故如意根亦爾之言攝喜樂二根全無其過聊有所替置隨應言兼遮其疑也問光法師釋正理論遮無染心能續生故文云或經部計異熟心受生文爾者所受生異熟生心可通引滿二果耶答不通引滿二果也兩方若通引滿二果者光法師餘處九解釋中不通引滿二果見若依之爾者異熟生心種類非一準設雖所受生異熟生心何不通引滿二果哉答見今論餘處九述經部宗義云由引業力識相續流如火焰行往彼彼趣憑附中有馳赴所生結生有身名行緣識若作此釋善順契經分別識支通於六識文光法師釋此文云九既言引業明知行支是引業非滿業由彼過去引業力故六識相續流轉如火焰行相續不斷往彼彼趣此之六識相續不斷憑附中有馳赴所生處續生有身名行緣識此識通於中生二有生有雖唯意識於中有位通起六識若作此釋善順契經分別識支通於六識文泰法師釋此文云九由引業力識相續流中生二有名行緣識若作此釋善順契經分別識支通於六識於中有位起六識故文任此等定判經部宗意行支體唯限引業不通滿業彼行支所感異熟生識為識支體故云或經部計異熟心受生唯限引業果不通滿業果也問欲界生有初受生位可有初得信等五根義耶答不可有此義也兩方若有此義者中有初念初可得信等五根欲界生有初受生位何可有此義哉是以光法師所引婆沙論中述彼位信等五根得不得相云若自地沒還生自地彼皆不得文此文無諍欲界生有初受生位定無初得信等五根之義見若依之爾者披光法師解釋或述胎卵濕三生初受生位得根義云苦樂憂喜信等五根初受生位雖亦成就非異熟故此亦不説文或明中生有初受生得根相云意及五受信等五根於中生有初受生位雖亦有得非異熟故不名為得文任此等定判欲界生有初受生位可有初得信等五根之義見何況婆沙論三十五中説轉身續善位分云若由因力斷善根者地獄死時方續若由緣力斷善根者地獄生時能續文續生時續善根可指生有初受生位哉加之伺論家所説尋胎卵濕三生初受生位得根義正理論九云爾時亦得信等五根非異熟故此中不説文雜心論八云餘根亦得而不説非報故文準此兩論文欲界生有初受生位可有初得信等五根之義云事甚分明也如何答上二界沒還生欲界中有初念初得信等五根故欲界生有初受生位全無初得信等五根之義也故光法師所引婆沙論百四十七中乘解化生初位得六七八根問餘無色根爾時亦得謂意五受信等五根此中何故不説答之舉一師説云有説爾時一切得者此中則説餘無色根雖有得者而非一切是故不説謂上地沒生下地時雖得彼根若自地沒還生自地彼皆不得是故不説文從欲界沒還生欲界中有初念尚無初得信等五根之義況於欲界生有初受生位哉但於光法師苦樂憂喜信等五根初受生位雖亦成就等之釋者光法師釋初得異熟根相云是異熟根體現在前剎那新成即名為得非先不成方名為得與前解得義稍不同先念成就亦名為得故欲界生有初受生位雖無初得信等五根有成就義故云雖亦成就非異熟故此亦不説也次於光法師意及五受信等五根於中生有初受生位等之釋者見解釋一段上標應知此中四生初得異熟根者通據中生二有初念出初得異熟根位畢下云意及五受信等五根於中生有初受生位總舉彼位分許也雖亦有得者中生二有初念之中意指中有初念有初得意及五受信等五根之義為言非云欲界生有初受生位有此義故全無所背也次於婆沙論若由緣力斷善根者地獄生時能續之文者生時者是中有將生時非生有初受生位也故見今論餘處文云言將生位謂中有中文次於正理論爾時亦得信等五根之文者勘顯宗論五説云爾時得信等五根非異熟故此中不説此因化説不辨三生文此文意云當受胎卵濕三生之者中有初念初得信等五根屬當生有云爾時亦得信等五根也實據彼中有初念而説不辨胎卵濕三生初受生位初得信等五根為言元瑜法師述文記七問答此中云問此文遮化生約三生説中有必是化生此中不應説三生生有初起豈有初得意捨信等耶解云此中明得二異熟根本據三生初得而説此最初故就中料簡兼述化生非謂三生初得意等文今此解釋意亦同顯宗論説歟雜心論餘根亦得而不説非報故之文準之可會也問光法師意中有位可有二形類耶答可有二形類也兩方若有二形類者二形者非男非女也何於父母起愛恚心哉是以見今論餘處九文云必無中有非男非女以中有身必具根故披正理論餘處二十四説述無欲中有非男非女以中有身不闕根故任此等文無中有位非男非女之類云事分明也加之光法師釋二形化生唯是生有初念不通中有以中有身女男定故畢引下論必無中有非男非女等之文此釋無諍中有位無二形類定若依之爾者發智論中説中有位極多成就十九根之旨若中有位無二形類者寧有極多成就十九根之義哉答此一業引故如當本有形者性相之所定也本有既有二形類中有何可簡之哉是以勘發智論處處之文或十五明二十二根極多極少成就相云中有極多十九文婆沙論百五十中釋此文云十九者謂二形者除三無漏根文或十五舉無想天沒生欲界時中有初念所現前根云或八或九或十無形八一形九二形十文婆沙論百五十四中釋此文云無形八謂眼耳舌身命意捨根一形九加男女根隨一二形十加男女根文或十五出欲界沒生欲界時中有初念所現前根云或八或九或十無形八一形九二形十文色界沒生欲界時中有初念所現前根及無色界沒生欲界時中有初念所現前根其類亦同之婆沙論百五十五中釋此文云無形八謂眼耳身命意捨根一形九謂前八加一形二形十謂前九復加一形文準此等文理中有位有二形類云事甚炳然也但於二形者非男非女也何於父母起愛恚哉云難者當受濕化二生之者中有位於父母不起愛恚心故彼中有位有二形類更無所背也次於今論必無中有非男非女等之文正理論無欲中有非男非女等之説者就當受胎卵二生之者論之也故今論結如是且説胎卵二生正理論判此説欲界胎卵二生其意在之次於光法師二形化生唯是生有初念不通中有等之釋者既述故下論云必無中有非男非女以中有身必具根故以今此文為其證據故準所引證文思解釋本旨不通中有不通當受胎卵二生之者中有為言全不遮當受濕化二生之者中有位有二形類何為相違哉重難云今論餘處如是且説胎卵二生之文倒心趣欲境之義限胎卵二生為言非云必無中有非男非女之義限胎卵二生寧為證據哉正理論此説欲界胎卵二生之釋準之可思何況今論化生初位得六七八乃至若二形者初得八根之文廣可通當受四生之者中有光法師受此文釋以中有身女男定故畢引必無中有非男非女等之文為證明知此文意當受四生之者中有位無非男非女之類云也若爾光法師不通中有之釋當受四生之者中有位無二形類為言若當受濕化二生之者中有位有二形類者何混云不通中有哉答倒心趣欲境者中有位男於母起愛於父起恚女於父起愛於母起恚欲趣生有之義也是則由以中有身必具根故之理起此倒心故指倒心趣欲境之義云如是且説胎卵二生即指必無中有非男非女之義也何為各別事致疑哉次今論化生初位得六七八之文實可通當受四生之者中有及四生中化生生有也其中化生生有有二形類無其濫故云二形化生唯是生有初念中有不定當受濕化二生之者中有位雖有二形類當受胎卵二生之者中有位唯有或男或女無二形類故為顯此義釋以中有身女男定故畢引今論餘處就胎卵二生云必無中有非男非女以中有身必具根故之文也爰知不通中有以中有身女男定故者不通當受胎卵二生之者中有彼女男定故為言文言雖難釋意在之歟問光法師意非劫初時中有位可有無形類耶答可有無形類也兩方若有無形類者無形者非男非女也何於父母起愛恚心哉是以見今論餘處九文云必無中有非男非女以中有身必具根故披正理論餘處二十四説述無欲中有非女非男以中有身不闕根故任此等文中有位無非男非女之類云事分明也加之婆沙論百五十中釋中有位極少成就十三根云除一形文若中有位有無形類者寧於極少成就根可舉男女隨一哉若依之爾者勘發智論文中有位有無形類見如何答此一業引故如當本有形者性相之所定也本有既有無形類中有何可簡之哉何況勘婆沙論文云欲界中有彼亦不定當受卵胎二類生者住中有位有女男根至卵胎中方有不具若不爾者應無當受卵胎生義文此文無諍當受濕化二生之者中有位可有無形類見而劫初時全無有受濕生之者明知當受濕生之者中有位有無形類者非劫初時云事加之披發智論處處之文或十五舉無相天沒生欲界時中有初念所現前根云或八或九或十無形八一形九二形十文婆沙論百五十四中釋此文云無形八謂眼耳舌身命意捨根一形九加男女根隨一二形十謂加男女根文或十五出欲界沒生欲界時中有初念所現前根云或八或九或十無形八一形九二形十文色界沒生欲界時中有初念所現前根及無色界沒生欲界時中有初念所現前根其類亦同之婆沙論百五十五中釋此文云無形八謂眼耳舌身命意捨根一形九謂前八加一形二形十謂前九復加一形文此等文中云中有位有二形類既非劫初時劫初時無二形類故也準知述中有位有無形類非劫初時亦有此類云事但於無形者非男非女也何於父母起愛恚心哉云難者當受濕化二生之者中有位於父母不起愛恚心故彼中有位有無形類更無所背也次於今論必無中有非男非女等之文正理論無欲中有非女非男等之説者就當受胎卵二生之者論之也故今論結如是且説胎卵二生正理論判此説欲界胎卵二生其意在之全不遮當受濕化二生之者中有位有無形類何為相違哉次於婆沙論中釋中有位極少成就十三根除一形之文者中有位極少成就十三根者是斷善根者故必成就男女二根隨一云也故見婆沙論具文釋發智論中有極多十九極少十三之文云十三者謂斷善者除一形信等五三無漏根文中有位不斷善根之類中雖不成就男女二根彼可成就信等五根故不為極少成就者也重難云業通疾具根者今論餘處九定判也中有位何可有不具男女二根之類哉是一何況婆沙論七十中破有作是説若此命終受中有者中有形狀即如此身之義云又色界沒生欲界者所受中有應非女男文若中有位有無形類者豈可致應非女男之難破哉是二次今論必無中有非男非女等之文就當受胎卵二生之者論之者無形二形其義可同若爾光法師依此文偏釋二形化生唯是生有初念不通中有不云無形化生唯是生有初念不通中有有何深由哉是三次中有位極少成就之類舉斷善根者故除一形者斷善根者極少成就八根何述極少成就十三根哉是四答業通疾具根者一切中有位必具根等五根為言非就男女二根論之故長行釋此頌意云一切中有皆具五根文婆沙論七十中問中有諸根為具不具答之有二師異説中指一切中有皆具諸根初受異熟必圓妙故故初師説云此中初説於理為善謂中有位於六處門遍求生處根必無闕此説眼等非女男根色界中有無彼根故欲界中有彼亦不定當受卵胎二類生者住中有位有女男根至卵胎中方有不具若不爾者應無當受卵胎生義文準此等文諸中有位具諸根者唯就眼等五根論之非説男女二根云事分明也次於婆沙論所受中有應非男女之難破者見彼論文破中有形狀如前生身云師義若色界沒生欲界者所受中有如色界身者諸色界沒生欲界者中有依身皆容無女男根故應非女男為言非遮欲界諸中有位有無形類不足為疑歟次光法師不云無形化生唯是生有初念不通中有事劫初中有決定無形故且不釋無形化生不通中有之旨歟次斷善根者極少成就八根者是漸命終者及在地獄已失六色根者也故婆沙論百五十中釋發智論十五斷善根者極少十三極少八之文云八者謂身命意及五受根即漸命終及在地獄已失六色根者文而中有位無命終者無失六色根者故斷善根在中有位更無極少成就八根之類也問欲界沒生上二界時頓命終者可有八根滅義耶答可有此義也兩方若有此義者披發智論十五文述欲界沒生上二界時頓命終者或九根或十四根滅之旨不可有八根滅義見若依之爾者頓命終者種類非一準何無八根滅義哉答生盲及已得眼根而失人住無覆無記心頓命終生上二界時可有耳舌身命意捨女男根隨一八根滅義也但於發智論文者諸根不闕頓命終者生上二界住無覆無記心眼耳舌身命意捨女男根隨一九根滅住善心於前九根加信等五根十四根滅云也不遮生盲等人住無覆無記心頓命終上二界時有八根滅義更非指疑也問論文云於離繫得能為引因依因性故文爾者引因道者唯限無間道歟答唯限無間道也兩方若唯限無間道者離繫得能引道種類萬差也何唯限無間道哉何況道類智位及初盡智位所得離繫得隨無間道判性類者豈不見道修道雜亂學無學道混濫哉加之披婆沙論百五十八文以滅道法智離色無色界修所斷染時所得無漏離繫得道類智品攝見若隨無間道判性類者寧非法智品攝哉若依之爾者婆沙論百五十八中判離繫得性類云擇滅得隨能證道性類差別以諸擇滅自無作用但由道力求證彼時引彼得故文此文意由道作用引起離繫得名能證道故能證引因道唯限無見道見如何答引因道者現起斷對治無間道與離繫得為同類因引起離繫得是其本故唯限能證無間道也故光法師釋於離繫得能為引因依因性故之論文云若依未知根在無間道能斷惑邊望離繫得能為引因性故引因謂同類因能引彼離繫得起為等流士用果文既云在無間道能斷惑邊望離繫得能為引因性故成唯限無間道之旨亦判引因謂同類因能引彼離繫得起為等流士用果不可通解脫道解脫道與離繫得同時不與離繫得為同類因故也是以披今論餘處四文云若有學道所引擇滅得即有學若無學道所引擇滅得即無學文以所引言思之引因道者唯限無間道見光法師釋此文云若有學道所引擇滅得即有學隨能證道是有學故若無學道轉根時所引擇滅得即無學隨能證道是無學故文無學得果位引因現起無間道是有學攝故不舉之唯出引因現起無間道同無學攝轉根時明知引因道者唯限無間道也何況光法師餘處二十一所引正理論五十中云若據住此能證離繫因無間道若據住此正證離繫因解脫道文能證道者即引因道故引因道唯限無間道云事此文亦分明也加之勘婆沙論處處之文或九十遮唯無間道能斷隨眠唯解脫道能證彼滅云執云為遮彼意顯無間道能斷煩惱隔煩惱得令不續故亦能證滅引離繫得令正起故諸解脫道唯名證滅與離繫得俱現前故文或百八釋發智論諸結法智斷彼結滅法智作證之文云謂隨法智為無間道斷爾所結此無間道即能證彼爾所滅故文釋諸結類智斷彼結滅類智作證之文準之可思或百五十七明有漏離繫得界繫云擇滅者謂欲界下三靜慮五蘊擇滅彼世俗道類得皆色界繫以下地擇滅有漏得皆上地近分攝故文若引因道不限無間道者下地法上擇滅有漏得豈不通上地根本地攝哉或百五十八述欲界見修所斷法無漏離繫得唯未至定攝議云評曰此中初説為善諸離繫得必由斷對治力不引起故文若引因道廣通解脫道者寧可定必由斷對治力所引起故哉但於道類智位及初盡智位所得離繫得者現起無間解脫二道見道修道相替有學無學分別之時不隨現起無間道判離繫得性類道類智位未來修擬無間道修道攝道品初盡智位未來修擬無間道無學道攝道品故隨彼未來所修無間道判離繫得性類故無見修無學三道雜亂之過亦不背隨引因無間道判離繫得性類之理也次於婆沙論以滅道法智離色無色界修所斷染時所得無漏離繫得類智品攝之文者以實云之彼無漏離繫得可法智品攝故婆沙論云若類智品攝亦不應理彼斷及得法智所證故文但評曰此中初説為善以類智品是彼不共決定對治故者論彼離繫得正性類雖是法智品攝由類智不共決定對治義邊類智品中且攝屬之為言實是法智品攝故專順隨現起能證引因無間道判離繫得性類之義也重難云勘婆沙論百五十八文云苦類智忍四得俱生三道得一離繫得苦類智忍與彼四得互不為因苦法智忍為四得因苦法智為三得因除苦法智忍得以加行善法勝非劣因故有為法得隨法勝劣故文如此文者苦法智與苦類忍俱生欲界見苦所斷煩惱上離繫得為同類因見若引因道唯限無間道隨彼判離繫得性類者欲界見苦所斷煩惱上離繫得隨苦法忍可判性類苦法智何與彼為同類因哉例如苦法智不與苦類忍俱生苦法忍得為同類因是一次道類智位及初盡智位隨未來所修無間道判離繫得性類云事甚難思光法師既釋引因謂同類因以未來所修道不可名引因未來無同類因故也是二何況婆沙論六十六中述有漏道證中間二果名沙門果舉尊者僧迦筏蘇説云以世俗道離欲染時亦修未來諸無漏道所得二果是彼果故亦得建立沙門果名文正義家破之云彼不應作是説所以者何未來聖道未有作用如何於彼此得果名文若以未來所修道為引因以離繫得為其果者可同僧伽筏蘇義勢豈不蒙婆沙論正義家難破哉是三加之無間道是向道攝故得果位必捨之若道類智位及初盡智位未來修無間道攝道品者寧無向果雜亂之過哉是四就中得果位未來修無間道攝道品云事論家定判人師解釋中未見其證據若無分明依憑者誰可信用之哉是五次以滅道法智離色無色界修所斷染時所得無漏離繫得實法智品攝者評家可嘆後説為善何判初説為善哉是六答隨無間道雖判離繫得性類離繫得者解脫道位始現起故其品類與解説道同不可云隨無間道判其性類故品類自解脫道物品類分齊既與解脫道同故苦法智與苦類忍俱生欲界見苦所斷煩惱上離繫得為同類因也有為法得隨法勝劣故苦法智不與苦類忍俱生苦法忍得為同類因其理可然更非相例歟次現起無間道與離繫得為同類因引起彼離繫得是其引因本故光法師釋引因謂同類因也雖然修容起能證引因用未來斷對治道之時由彼所修未來斷對治道力引起離繫得故雖正不起能證引因用以彼未來所修斷對治道亦名能證引因道也故光法師餘處四釋各二離繫得之義云無漏道斷惑雖亦能引有漏得有漏道斷惑雖亦能引無漏得而非正引但是兼引故不互隨二道判性但隨自道彼能證道雖復不起然互相修而由彼力擇滅得起故各隨自能證道判文以未來所修斷對治道為能證引因得離繫得之旨此釋炳然也次於婆沙論中破尊者僧伽筏蘇説之文者僧伽筏蘇意未來所修無漏道實以中間二果為果云故正義家破之云未來聖道未有作用如何於彼此得果名也今以未來所修斷對治道為引因者由修彼道力得容為彼所引果離繫得故以彼為能證引因道判離繫得性類為言非云彼未來所修斷對治道正起引因用以離繫得為果異僧伽筏蘇意也次無間道是向道攝故得果位必捨之者長途所定也不可異求之今道類智位及初盡智位隨現起無間道判離繫得性類者可有大過故未來修擬無間道果道攝道品隨彼未來所修果道攝無間道判離繫得性類故向果二道全不雜亂也次得果位未來修擬無間道果道攝道品云事人師釋中粗有師見泰法師餘處二十一釋云今言一味者是一類義理實而得果之時修過恆沙四法四類對治智故得隨治道亦過恆沙法類得也文淨影大師大乘義章十七釋云言定體者須陀洹果聖德為體聖德不同泛論有三一是果體依如毗曇行修分別唯第十六道比智心是其果體得修分別通攝見諦十六聖心悉為果體文任此等定判得果位未來修果道攝無間道之旨分明也今論餘處文云集斷得八智頓修十六行即此意歟次以滅道法智離色無色界修所斷染時能證引因現起無間是法智故彼所引離繫得可法智品攝之理必然也然而由類智是不共決定對治故以彼法智所引離繫得類智品中且可攝屬之義門傍亦有之法智品攝云後師説意不存此義門故評家雖判初説為善理實而言彼離繫得可法智品攝也問雜心論意次第證不還果聖者可有喜根證義耶答可有喜根證義也兩方若有善根證義者披雜心論文述若次第得斯陀含果世俗道七謂意捨及信等五根無漏道八前七及已知根畢云次第得阿那含果亦如是文淨影大師大乘義章四引雜心論説釋阿那含果云次第之人但有八根信等五根意根捨根及與已知根無舉喜根任此等定判彼論意次第證不還果聖者不可有喜根證義見若依之爾者以道理思之設雖雜心論意次第證不還果聖者中何無喜根證義哉答雜心論意次第證不還果聖者中第九解脫道位入初靜慮根本地之類可有喜根證義也故今論云又次第證不還果者若於第九解脫道中入根本地依世間道由八根得彼無間道捨受相應解脫道中復有喜受此二相資得第三果於離繫得二因如前依出世道由九根得八根如前已知第九無間解脫此俱有故文正理論九中明不還果云次第證者若於第九解脫道中入根本地依世間道由八根得喜為第八依出世道由九根得已知第九文顯宗論五説全亦同之準此等文次第證不還果聖者有喜根證義云事有宗依憑諸論之中一同談之至雜心論寧不存此性相哉但於雜心論次第得阿那含果亦如是之文者次第證不還果聖者第九解脫道位多分起未至定故從多分説更不遮少分入根本地有喜根證義也以何知之者勘發智論十五文問幾根得不還果答若從一來果得不還果者世俗道七無漏道八婆沙論百四十七中牒釋此文云若從一來果得不還果者世俗道七無漏道八七及八如一來説此依多分若入根本或八或九文準發智論文可會雜心論説也淨影大師解釋會通亦同之問無學聖者修練根位以喜根為無間道以捨根為解脫道義可有耶答可有此義也兩方若有此義者轉入異受其義甚難得勝種姓位何可有此義哉是以光法師釋實得第四唯由九根之論文云應知此據從向得果唯論初得故説九根三受隨一不據轉根若據轉根應説八根三受隨一文如此釋者無學聖者修練根無間解脫道位不轉入異受云事分明也何況光法師述得無學果無間解脫道位不轉入異受之旨相例可有若依之爾者披婆沙論説用樂遲苦速二通行可修練根見若爾無學聖者修練根位何無以喜根為無間道以捨根為解脫道之義哉答聖者種類分萬差心品現起非一準無學聖者修練根位以喜根為無間道以捨根為解脫道之義可有也即勘婆沙論九十三文云或復有用樂遲通行及喜速通行作所作事如鈍根者依初靜慮等及依未至定等隨其所應入正性離生得果練根離染修餘功德而般𣵀槃文此文無諍修練根位以初靜慮根本地喜根為無間道以未至定及中間禪捨根為解脫道之義可有見此文既無置簡別之言此義寧不通無學聖者哉但於光法師若據轉根應説八根三受隨一之釋者對得無學果位加已知根由九根得無學聖者修練根位除已知根由八根得為言更不遮無學聖者修練根第九無間解脫道位轉入異受由九根得之義也次於得無學果無間解脫道位不轉入異受云例難者得無學果解脫道是息求位不欣樂異受故不轉入異受無學聖者修練根位除欣求勝種姓故可轉入異受也準光法師解脫道是盡智盡智是息求故不能入之釋可思之重難云見婆沙論九十三文不舉用苦遲樂速二通行作所作事之類若有無學聖者修練根無間解脫道位轉入異受者何無以未至定及中間禪捨根為無間道以初靜慮根本地喜根為解脫道之義哉答無學聖者修練根位以未至定及中間禪捨根為九無間前八解脫道以初靜慮根本地喜根為第九解脫道之義可有也但於婆沙論中不舉用苦遲樂速二通行作所作事之類云難者既出用樂遲苦速二通行作所作事之類畢可準知用苦遲樂速二通行作所作事之義故略不舉之也問樂根證不還果聖者可退所得果耶進云今論云以無樂根證不還果而於後時得有退義文付之論退不退義尤可任種姓利鈍設雖樂根證不還果聖者其姓若鈍根者豈不退所得果哉是以喜根證捨根證不還果聖者退所得果以樂根修練根證不還果之人亦退所得種姓相例可同如何答樂根證不還果聖者者已離第二靜慮染依第三靜慮入見道第十六心證不還果之類故定是超越證人也而超越證人必無退故不退所得果云事道理炳然也故光法師釋以無樂根證不還果而於後時得有退義之論文云以樂證果必是超越夫超越人必無退義文正理論九云次第無容樂根得故超越無容有退失故文顯宗論九文全亦同之超越證人必不退果非無其由故光法師釋非先離欲超證第三有還退義此離欲果二道所得極堅牢故之論文云非先離欲界超越證第三果有還退義此離欲不還果二道所得極堅牢故一先以世間道得二後以出世道得此顯超越不還不退也文此釋意云先於凡位斷欲界九品類惱至不還果位分云世間道得後入見道至道類智位證不還果名出世道得既是世間出世二道所得極堅牢果故不還之為言故超越證人雖其姓鈍根永不退所得果也但於喜根證捨根證不還果聖者退所得果云例難者次第論人斷欲界煩惱第九解脫道位入根本地以喜根證不還果依未至定以捨根證不還果故退所得果也光法師若次第者以喜根證即容有退之釋即顯此意也次於以樂根修練根證不還果之人亦退所得種姓云例難者彼練根所得不還果非世間出世二道所得故有種姓退也彼此相例更非齊等歟問喜根證不還果聖者可退所得果耶答可退所得果也兩方若退所得果者樂根證不還果聖者既不還所得果喜根證不還果聖者相例可同是以婆沙論百四十七中述以喜樂得無退義故喜根證不還果聖者不退所得果見若依之爾者喜根證不還果聖者既通次第證何不退所得果哉答泛論之者喜根證不還果聖者實通次第超越二類其次第證人斷欲界煩惱第九解脫道位入根本定以喜根證不還果之中退所得果之類可有也是以光法師釋云若次第者以喜根證即容有退文但於樂根證不還果聖者不退所得果云例難者彼唯限超越證類故不退所得果全非相例次於婆沙論以喜樂得無退義故之文者以無間道為能證以解脫道為正證者性相之所定也而次第證喜根證不還者是正證非能證故今文且就喜根為能證道超越證不還論之故同樂根證不還者是正證非能證故今文且就喜根為能證道超越證不還之故同樂根證不還不退所得果云也問迦濕彌羅國師意成就憂根人五受根俱過未定成就根歟進云發智論云定成就過去未來四除一受根也付之成就憂根人五受根俱過去未來定成就之何唯限四受根哉是以健馱羅國師意成就憂根人五受根俱過未定成就根判如何答勘發智論十六文云若成就憂根彼定不成就過去未來八三世一定成就過去未來四三世二現二餘不定文婆沙論百五十六中釋此文云過未四者謂四受三世二者謂意一受現二者謂身命餘不定如前説健馱羅國説此文應言過未成五謂五受三世成一謂意受名不定故迦濕彌羅説名雖不定以數定故應如前説文此文意云成就憂根者必有一受現在前故五受根中名雖不定以數定故迦濕彌羅國師意以一受根為三世定成就根以餘四受根為過未定成就根也光法師所引婆沙論百五十六迦濕彌羅國諸論師言名雖不定而數則定必有一受現在前故此中説數不説名之文其意亦在之但於健馱羅國師義者五受根中名雖不定於現在世必有一受總為唯過未二世定成就根頗不叶實義也問成就憂根人可有現在定不成就根耶答可有現在定不成就根也兩方若有現在定不成就根者發智論中明成就憂根者相離出過未定不成就及三世定不成就根不舉現在定不成就根知無此類云事若依之爾者既有現在定成就根相翻思之何無現在定不成就根哉答出發智論全文抄婆沙論具文令朋疑難之趣可成會通之旨也即勘發智論文云若成就憂根彼定不成就過去未來八三世一定成就過去未來四三世二現在二餘不定文婆沙論百五十六中釋此文云若成就憂根彼定不成就過去未來八三世一過未八者謂命等三世一者謂具知定成就過去未來四三世二現在二過未四者謂四受三世二者謂意一受現二者謂身命餘不定如前説健馱羅國説此文應言過未成五謂五受三世成一謂意受名不定故迦濕彌羅説名雖不定以數定故應如前説文就今文有此疑也會之云成就憂根者必有一受現在前故五受根中名雖不定以數定故迦濕彌羅國師意以一受根為三世定成就根之時餘四受根現在定不成就之義必然也但於發智論中不舉現在定不成就根云難者以一受根為三世定成就根畢餘四受根現在定不成就之義不言自顯故論文雖別不舉之以實云之餘四受根可為現在定不成就根也問光法師意無形人可有入聖義耶進云光法師釋云所以無形能入聖者文付之伺有宗論説尋無形入聖今論云本性損壞扇搋半擇及二形人乃至亦無律儀得果離染諸清淨法正理論九判言一形者無有二形及與無形得聖法故任此等論文無形人不入聖見是以念法師等古德意無形人不入聖釋如何答見今論文偈頌結初無漏十三長行釋若成未知根定成就十三謂身命意苦樂喜捨等五根及未知根成就未知當知根人定成就根中不舉男女二根隨一正理論九文顯宗論五説偈頌長行亦以同之何況發智論十六云若成就未知當知根彼定成就十三文婆沙論百五十六中釋此文成就十三者謂身命意四受除憂信等五未知當知根文若見道位必成就男女二根隨一者此等諸論中豈不云成就未知當知根定成就十四加之披光法師定判破他師釋引婆沙論百五十六中出成就未知當知根時定成就根云三世七者謂意一受信等五過未三者謂三受未現一者謂未知當知現二者謂身命之文畢云彼論既言三世定成一受雖名不定以數定故標數説之男女二根於見道中既隨成一行故不説文述今正解云於見道中男女二根或有或無若有者隨成就一若無者據從下漸捨男女根説所以無形能入聖者漸命終位深心猛利厭生死故能入見道故婆沙百五十解隨信行極少成十三根言十三根者身命意四受信等五根一無漏根即離欲染漸命終位入見道者婆沙意説漸命終位捨男女根無眼等四能入見道此存不疑故知漸命終言説男女或可婆沙一無漏根言顯不成餘二無漏根離欲染言顯不成憂漸命終位入見道言顯捨男女及眼等四以此故知漸捨男女能入見道文任此等文理無形人有入聖義云事甚分明也但於今論本性損壞扇搋半擇等之文者光法師會之云彼文既不遮漸捨入見道何妨無形能入見道彼言不得入者據本性損壞扇搋半擇説文次於正理論無有二形及與無形得聖法故之文者光法師會之作二解釋云正理云無有無形得聖法者此據本性損壞扇搋半擇無形者説或可正理言中有失以此論解極多中不云無形故此論云女男二根隨除一種以諸聖者無二形故文次於念法師等釋者光法師破之云念法師若説男女二根於見道中雖定成一以名不定故不説者此是西方義若必成一者迦濕羅國義説數定故應有十四然説十三故説非理良由未見新婆沙也文若爾彼此難勢之趣光法師先皆會通之後學之輩更不可劬勞歟重難云勘舊俱舍論二文云偈曰未知欲知根與十三相應釋曰何者為十三謂意命身根女男根隨一及三受根信等五根未知欲知根為第十三文此文明述成就未知當知根定成就男女根隨一之旨若無形人有入聖義者何云成就未知當知根定成就男女二根隨一哉是一次光法師若必成一者迦濕彌羅國義説數定故應有十四之釋亦難思唯成就命意捨各定成就三之上文案初無漏十三之下意就名論之見既云極少八無善成受身命意愚生無色界成善命意捨就數定論之者可云成就命意捨各定成就八故也若成就命意捨各定成就三之文就名論之者初無漏十三之文同可就名論之寧判説數定故應有十四哉若爾念法師釋似順今論文是二答舊俱舍論文是可譯者謬違諸論説亦背道理故也故光法師釋云成未知根必在欲界故身及苦亦説定成舊俱舍不説苦根男女隨一者譯家謬矣文次就數名異説出者一時定成就其隨一根其名不定之時迦濕彌羅國師意以數定故云定成就西方師意名不定故可為定成就命意捨三根之類中或俱成就五受根成就信等五根或成就五受根不成就信等五根或成就信等五根不成就四受根等其位各別其數不定故就數定論定成就相之義意成就命意捨三根以四受根及信等五根不為定成就根也故發智論十六中就數定明定成就相云若成就命根彼定成就三餘不定意根捨根亦爾文準知今論文云成就命意捨名定成就三述初無漏十三亦就數定論之云事念法師就名判定成就相之釋不辨此深理故光法師既難破之誰可依用之哉問正理論意無形人可有入聖義耶答可有入聖義也兩方若有入聖義者見正理論文或云言一形者無有二形及與無形得聖法故正簡無形入聖之義或述漸命終位傳説深心厭生死故能入見道無形入聖之義置傳説言明知自所存不許此義云事是以古德引此文畢云正理稱傳顯己不信故知男女定隨成一文若依之爾者無形人有入聖義者源出發智論説正理論意寧不許此義哉答見發智論處處之文或十五明二十二根極多極少成就相云隨信行極多十九極少十三隨法行亦爾文婆沙論百五十中釋此文云十三者身命意四受信等五一無漏根即已離欲染漸命終位入見道者文或十六述二十二根定成就定不成就相云若成就未知當知根彼定成就十三文婆沙論百五十六中釋此文云成就十三者謂身命意四受除憂信等五未知當知根文此發智論文人有入聖義云事甚分明也正理論意豈不許本論説哉但於無有二形及與無形得聖法故之文者光法師會之云正理云無有無形得聖法者此據本性損壞扇搋半擇無形者説文次於漸命終位傳説深心等之文者光法師會之云或可正理敘古相傳何必不信既無別破不可執斯傳字以作指南文次於古德正理稱傳顯己不信等之釋者既背光法師釋意更不可依用之重難云光法師或可正理敘古相傳等之釋是第二釋也初釋云正理稱傳自是不信本宗之義非我過也撿尋婆沙論文全無傳説之語文此釋意正理論意不許漸命終位無形入聖之義見如何答光法師正理稱傳自是不信等釋意古師意以正理論傳説之言為不許漸命終位無形入聖之證故乘古師意存不信傳若正理論師意不信漸命終位無形入聖之義者自是不信本宗之義可彼師過全非我過更不可用正理論説為言是則乘古師為非古師義作一往釋也非云正理論實意不許漸命終位無形入聖之義以實論之如第二釋是相傳傳非不信傳可云也光法師意以第二或可正理敘古相傳等之釋可為所存正釋也問光法師釋無形人具足戒得不得相作三解釋爾者初釋意如何釋之耶進云光法師釋云解云得受具戒文付之無形人者卑劣依身也何可得具足戒耶是以今論云本性損壞扇搋半擇及二形人乃至亦無律儀得果離染諸清淨法光法師餘處十五所引婆沙論中問扇搋半擇迦無形二形受近住律儀得律儀不答應言不得所以者何彼所依身志性羸劣非律儀器無形人近住律儀尚不得之況於具足戒哉答光法師初釋意非無由來所謂依若成未知根定成就十三謂身命意苦樂喜捨信等五根及未知根之論文判所以無形能入聖者漸命終位深心猛利厭生死故能入見道成漸命終位無形入聖之義畢乘之問漸死無形得入聖者亦可漸死無形得受具戒答得受具戒如入見道心猛利故此釋意云漸命終位隨其所應捨男女根之人深心猛利厭生死故能入見道準之亦可得具足戒為言初釋所存其意在之歟何況寶法師問漸命終者無形得戒以不答亦得戒無失泰法師問漸終厭生死無形入見道亦可漸終厭生死無形得受戒答例釋得亦無失任此等定判漸命終位無形人得具足戒云事甚分明也但於無形人者卑劣依身也何可得具足戒哉云難者無形人卑劣依身者據本性損壞無形漸命終位隨其所應捨男女根之人其依身不必卑劣寧不得具足戒哉故寶法師釋云漸命終者性猶未轉何不得戒又漸捨命者命衆同分本男女根依漸捨故無非是無根所依衆同分如何即全不得戒即漸命終者如入無心亦得於戒又緣具故文次於今論本性損壞扇搋半擇等之文者光法師會之云言無根不得戒者據本性損壞扇搋半擇説文婆沙論説準之可會也問寶法師意斷善根人不續善前可作二形人耶答不作二形人也兩方若作二形人者見今論文云本性損壞扇搋半擇及二形人無不律儀無間斷善諸雜染法顯二形人不斷善根之旨知斷善根人不續善前不作二形人云事若依之爾者寶法師解釋中述二十二根極多極少成就相云斷善者極少成八極多十四文若斷善根人不續善前不作二形人者何有極多成就十四根之義哉答披今論餘處十七文或云如是斷善依何類身唯男女身志意定或判諸見行者惡阿世耶極堅深故由斯理趣非扇搋等能斷善根愛行類故根姓猛利人能斷善根定與二形人二依貪欲極增上故不善意樂甚為羸劣爭起上品邪見可能斷善根哉若斷善根人當容作二形者根姓相違故必先可續善不續善前全不作二形人也故勘發智論十五文明二十二根極多極少成就相云斷善根者極多十三文婆沙論百五十中釋此文云十三者謂除一形及信等五三無漏根文若斷善根人不續善前作二形人者寧云謂除一形哉加之見婆沙論百五十六文云若成就男女二根彼定成就十五根謂男女身命意五受信等五根斷善根人不續善前二形人重可舉信等五根哉見此等文斷善根人不續善前不作二形人云事甚分明也但於寶法師極多十四之釋者斷善根者總所成就根極多眼等五根女男命意五受根十四根為言非云一時成就此十四根何為難義哉若於一時所成就根者此十四根中除男女隨一極多成就十三根可云也此旨既出婆沙論説寶法師意更不可背彼論説哉重難云寶法師釋就斷善根人總所成就根云極多十四者可云隨信行人極多成就二十根何判隨信行極多十九哉是一次披發智論十五文明二十二根極多極少成就相云邪定聚極多十九文婆沙論百五十中釋此文云十九者如地獄極多説文而地獄極多成就十九根者除三無漏根餘十九根也明知造五無間業畢作二形人云事準例思之斷善根畢不續善前可作二形人也是二答案寶法師極多十四之釋意就今論極少八無善成受身命意愚生無色界成善命意捨之義畢生生無色界唯成就信等五根命意捨八根更無自此增之義對之斷善根人雖極少成就五受根身命意八根總所成就極多眼等五根女男命意五受根十四根也為言隨信行極多十九者異今論極多極少成就廢立彼引婆沙論説非舉總所成就根故全非相例故寶法師釋云婆沙一百五十隨信行極多十九極少三十九者除一形二形無漏根即未離欲染住見道者文次於發智論邪定聚極多十九之文者造五無間業之時起猛利心故二形人雖不造之造五無間業畢之後其心亦可為羸劣故作二形人也後時其心甚為羸劣雖起追悔心身語二業造罪畢不捨之成就彼業故邪定聚而作二形人也斷善根是意業罪故若當容作二形者必先其心為羸劣可續善故不續善前不作二形人也問婆沙論意斷善根者不續善生地獄時受二形身類可有耶答不可有此類也兩方若有此類者發智論十五中説二十二根極多極少成就相云斷善根者極多十三文若有受二形身之類者何無極多成就十四根之義哉若依之爾者見婆沙論文或百五十明地獄極多成就八根云八者謂身命意及五受根即失六色根已斷善者或百五十釋斷善根者極多成就八根述及在地獄已失六色根者任此等文既云失六色根知可有受二形身之類也如何答斷善根者不續善前不作二形人云事文理如次前論答中記之設雖生地獄不續善前爭可受二形身哉但於婆沙論二處之文者總舉斷善根者在地獄中所失根也所謂男失眼等四根及男根女失眼等四根及女根故男女合論失六色根云也非云一相續身失六色根何為違文哉問欲界可有眼根斷道耶答可有眼根斷道也兩方若有眼根斷道者欲界是散地也何可有眼根斷道哉是以見婆沙論九十二文出不成就根斷道者云若聖者在見修道諸結所繫乃至諸纒所纒如未離欲染在見修道諸聖者説文若欲界有眼根斷道者未離欲染聖者寧不就斷道哉若依之爾者婆沙論九十一中舉眼根斷道緣識為所緣縛亦相應縛隨眠云謂三界遍行及修所斷隨眠文既述欲界遍行及修所斷隨眠於眼根斷道緣識為所緣相應二縛明知欲界有眼根斷道云事如何答披婆沙論一段之文出眼根斷道緣識為相應縛非所緣縛隨眠云謂三界見道所斷無漏緣文欲色界他界他地緣遍行隨眠以欲界中他界緣遍行隨眠取為相應縛非所緣縛之句舉眼根斷道緣識為所緣縛亦相應縛隨眠云謂三界遍行及修所斷隨眠以欲界中自界緣遍行及修所斷隨眠為俱句也若欲界無眼根斷道者欲界中自界緣遍行及修所斷隨眠於眼根斷道緣識爭可為所緣相應二縛哉爰知欲界有眼根斷道云事但於欲界是散地也何可有眼根斷道哉云難者欲界實散地故雖無眼根無間解脫等斷道之稱通加行道故欲界中可有眼根加行伏斷道也故婆沙抄五本中釋云是故光法師抄云欲界中有欲界眼根伏斷道也文解釋亦有潤色即勘婆沙論九十二文云不成就樂根斷道者應言在第三靜慮未起加行道文此文意已起加行道爰知成就樂根斷道見故加行道攝之旨炳然也次於婆沙論出不成就眼根斷道者云如未離欲染在見修道諸聚者説之文者此以一地全斷道名斷道門也其意聊異不可一準歟重難云婆沙抄中解此事雖作二解指又有解云及修所斷者唯説色無色界若遍行或通三界有云釋判若作是説於義無妨為所存義見今何存初釋意哉答婆沙抄有解意甚難信用其故見婆沙論文上標三界遍行下云及修所斷隨眠豈唯限色無色界修所斷隨眠哉何況眼根斷道緣識為相應縛非所緣縛之句中舉欲界中他界緣遍行隨眠故為所緣縛亦相應縛之句中所出欲界遍行隨眠者無諍自界緣十一遍行隨眠俱取之也若爾不緣上界事與修所斷隨眠無替與欲界遍行隨眠於眼根斷道緣識為所緣相應二縛許置但簡欲界修所斷隨眠道理寧可然哉就中欲界身邊二見於彼斷道緣識如何可為二縛哉加之此俱句中不取欲界修所斷隨眠者為所緣縛非相應縛之句中何不舉欲界修所斷隨眠哉倩案此解釋意旁背婆沙論説故婆沙抄中作此釋畢自判云而失論上下體例文有解意既違此等文理故後學更不可依用之問類智現前位必可成就樂根滅耶問未離欲染聖者見修道位可成就喜根斷道耶問依身第二靜慮以上聖者可成就憂根斷道耶已上三條論義第二十卷之處先年比已記録畢問從無想天沒時可有信等五根滅義耶答可有此義也兩方若有信等五根滅義者發智論十五中云無想天沒幾根滅答八唯限眼耳舌身命意捨八根明知無信等五根滅義云事若依之爾者披婆沙論百五十四文生無想天時可有信等五根滅義見以生時思死位其義可同如何答從無想天沒命終心位容起善及染汚無覆無記心故可有信等五根滅義也故婆沙論百五十四中明出無想想五部所斷通局云有餘師言唯修所斷問此文所説當云何通答此文應言彼想色界遍行及修所斷隨眠隨增焉不作是説者有何意耶當知此中兼説和合彼有命終時心通於五部非但説出無想心以命終心是前眷屬故此兼説文此文意從無想天沒命終心位容起善及染汚無覆無記心見既起善心可有信等五根滅義云事炳然也但於發智論無想天沒幾根滅答八之文者準婆沙論問答可會通之也故婆沙論百五十四中釋發智論次上生無想天幾根滅答八之文致問答云問此説從何處生無想天耶答此説從無想中有生無想生有問爾時亦有信等五根現在前滅何故不説答此文應作是説或八或十三中有最後心無記者八善者十三而不作是説者應知此義有餘有作是説此中但依滅位生位皆有者説信等五根唯滅位有非生位有是故不説文發智論中無想天沒時所滅根不舉信等五根準此問答可思之也重難云勘婆沙論處處之文或百六十四云生無想天者有説彼天盡衆同分善心不起有説彼天善心雖起而非修所依故無修道文或百八十五云生無想天者有説生彼於一切時不起善心有説生彼雖起善心而非修所依文此兩處中初師説意述生無想天者盡衆同分善心不起之旨今此師説定不正義何云彼命終心位有善心現起之義哉答發智論十五中説出無想想云彼想當言善為無記耶答或善或無記文無想天中善心現起云事此文既分明也爰知婆沙論處處二説中初師彼天盡衆同分善心不起云説是不正義第二師説可為正義也問根為緣生根非根根非根為緣生根非根時兩類所生根其數可同耶進云婆沙論百四十六中有十四根九根不同見付之以道理思此事今此兩類所生根其數尤可同是以根為緣生根非根非根為所緣生根非根時兩類所生根其數是同加之根為緣唯生根非根根非根為緣唯生根非根時兩類所生根其數亦無異彼此相例其義可同如何答且任婆沙論現文出其根體者根為緣生根非根時所生根者眼根為所依生意苦樂捨信等五根九根非根為所緣生意樂喜憂捨信等五根三無漏根十三根彼此合論者是十四根也根非根為緣生根非根時所生根者眼根為所依色境為所緣生意苦樂捨信等五根九根故兩類所生根可有十四根九根不同也但於例難者根為緣生根非根時所生根者即十四根也如上出之非根為緣生根非根所生根者色境為所緣生意五受根信等五根三無漏根十四根故兩類所生根同十四根無其不同次根為緣唯生根非根時所生根者眼根為所依生意苦樂捨信等五根九根根非根為緣唯生根非時所生根者眼根為所依色境為所緣生意苦樂捨信等五根九根故兩類所生根同九根亦無其不同也重難云見婆沙論一段之文根為緣生根非根時舉眼根為所依眼根為所緣之二緣故彼此合論其所生根者意五受根信等五根三無漏根十四根非根為緣生根非根時含色境為眼識所緣為意識所緣之二義故其所生根亦出意五受根信等五根三無漏根十四根與根非根為緣生根非根時唯舉眼根為所依不出眼根為所緣唯舉眼識緣色境不出意識緣色境故其所生根唯列意苦樂捨信等五根九根尤似難思根非根為緣生根為緣生根非根之句中可舉意識以眼根色境為所緣生意樂喜憂捨信等五根三無漏根十三根故彼此合論其所生根者可有意五受根信等五根三無漏根十四根若爾根為緣生根非根及根非根為緣生根非根時兩類所生相同是意五受根信等五根三無漏根十四根不可有十四根九根不同婆沙論説如何可會之哉答委悉論之者根非根為緣生根非根之句中舉意識以眼根色境為所緣生意樂喜憂捨信等五根三無漏根十三根也故根為緣生根非根及根非根為緣生根非根時兩類所生根同是意五受根信等五根三無漏根十四根其數不可有多少不同然與眼識以眼根為所依以色境為所緣時根非根為緣之義既滿足故婆沙論中且舉此一類略不出眼根所緣故為緣之邊也婆沙論次下文述根非為緣生根及根非為緣生非根并根非根為緣唯生根非根之句唯舉眼根為所緣色境為所緣生意樂喜憂捨信等五根三無漏根十三根之義準之可會通也此論義者去弘長元年最勝講當代始也東大寺定緣得業對興福寺實寬律師疑之其時宗性初加證義者座以此趣令成敗畢問根為緣唯生根非根時所生根唯限九根歟答不限九根也兩方若唯限九根者披婆沙論百四十六説根為緣生根非根時所生根不限九根見相例可同若依之爾者婆沙論百四十六中舉今此句唯出意苦樂捨信等五根九根如何答根為緣唯生根非根時所生根不可根九根所謂眼根為所依生意苦樂捨信等五根九根眼根為所緣生意樂喜憂捨信等五根三無漏根十三根故彼此合論者可有十四根也故婆沙論中根為緣生根非根時所生根列此十四根根為緣唯生根非根時所生根更不可替之也但於婆沙論中舉今此句唯出意苦樂捨信等五根九根云難者見婆沙論前後之上述根為緣生根非根之句既舉眼根為所依眼根為所緣之兩類所生根合出意五受信等五根三無漏根十四根畢故下明根為緣唯生根非根之句且舉眼根為所依之門讓上略下論眼根為所緣之邊故所生根唯出意苦樂捨信等五根九根也委悉云之者可載眼根為所緣之義故所生根可有意樂喜憂捨信等五根三無漏根十三根加眼根為所依時所生苦根總可有十四根也寫本云弘長三年癸亥七月十五日午時於海住山十輪院抄之畢去五月十日始清書之今初秋半候遂結集之前後首尾送六月十五日之光陰大小新古記五十三條之論義後覺之輩可察其志方今宗性去年之秋七月九日依不慮子細初移住此地以降離本寺早歷兩年遁世路既餘一回為常禮祖師上人之遺迹故所卜當山寂寞之間居也仰願我山本尊觀自在尊施大悲之引攝伏乞佛法擁護春日權現照無二無三之誠心終焉之暮必導兜率內院龍花之朝速援唯心法門預慈尊教化受冥衆加被六道輪回之間尋訪往昔之恩愛三途劇苦之底濟度宿生之朋友於戲此山者觀音利有情之靈砌也無妨于求菩提道今朝者自速修孝行之良辰也有便于報已魂恩微功不空自他同得益回向無限親疏共開悟而已右筆華嚴宗末葉法印權大僧都宗性年齡六十二夏﨟滿五十明德二年辛未正月十一日於尊勝院書寫之畢華嚴末葉經範之永正五戌辰九月二十七日自雲順房令相傳了喜悅無極以今生值遇之緣力備未來得悟之資糧兼者悲母出離生死祈者也乃至法界平等利益矣三論沙門英算生年三十
