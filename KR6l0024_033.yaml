body:
  text: 俱舍論第九卷抄下問頌文云如是諸緣起文爾者於三際如何廢立之耶進云頌文云十二支三際前後際各二中八據圓滿文付之於中際既立八支準知於前後兩際各亦可立八支豈非二十四支哉若於前後際各立二支者於中際宜立四支何非八支哉三際十二之廢立未得其意如何答前際是因非果故約惑業兩門立無明行二支後際是果非因故約始終兩門立生老二支也中際翻前際故以立果於果有識名色六處觸受之差別故以立五果招後際故以立因於因有愛取有之差別故以立三因也若爾談過去二因現在五果現在三因未來二果以明三際十二之廢立實有深所以者哉若夫於過去開果於未來開因其義不便況招無窮過爭得為教門談故有輪無初之道理耶如此得意之時可立二十四支立八支之難自被遮畢但於現未有果不同於過現有因差異者現在之果其相分明故開五支未來之果其相微隱故開二支也故光法師云現在名色等四用勝故相顯現故各立一支未來老死雖復相顯望現四支相稱難知總標老故文現在之愛取與過去之無明寬狹宜知者歟又云中際相顯廣説果因前後準知所以略説文三世兩重之因果中前後之四支無疑者歟尋云何以中際初念名識支以後際初念名生支耶答光法師釋云現在識勝標以識名未來生勝從生立稱文可思之問頌文云如是諸緣起十二支三際前後際各二中八據圓滿文爾者為唯約欲界論之為當廣約三界論之可云耶答唯約欲界論之可云也兩方若唯約欲界論之者凡分位緣起之談者顯相續不斷之義何限欲界之有情不通上界有情耶是以見光法師所引婆沙論文或述有作是説此經但説欲界三生不説上界化生亦無有失應作是説此經通説三界四生謂化生者初受生時雖具諸根而未猛利後漸增長方便得猛利未猛利時諸剎那頃名識支第二剎那以後名名色支至猛利位名六處支是故此經無不應失或云有作是説欲界具十二支色界有十一支一除名色無色界有十支除名色六處色界應作是説識緣六處彼無未起四根時故無色界應言識緣觸彼無有色及五根故評曰應作是説三界皆具十二有支問色界生時諸根頓起云何有名色位無色界無色無五根云何有名色六處位耶色界五根雖定頓起而生未久根不猛利爾時但是名色支攝無色界雖無色及五根而有名及意根彼應作是説識緣名名緣意處意處緣觸是故三界皆具十二文亘三界具十二云事評家之説既明鏡也設雖今論意何可違彼論之説耶若依之爾者正見今論之文云此中意説補特伽羅歷一切位名圓滿者非諸中夭及色無色但據欲界補特伽羅大緣起經説具有故彼説佛告阿難陀言識若不入胎得增廣大不不也世尊乃至廣説文具十二支事唯限欲界不通色無色之旨論説定分明也如何答此是兩論之異説也更不可學者會通故光法師釋云準婆沙前後文評家俱説上界皆具十二云何此論乃言不具解云此論非以婆沙評家為量取婆沙前師義此即論意各別文問當處付明十二緣起相且無明支體者為唯限無明及相應俱有等法為當廣通眼等五根命根衆同分等可云耶答廣以無明俱時五蘊為體可云也兩方若唯限無明及相應俱有等法者光法師解釋中廣以色等五蘊為體見若依之爾者披今論之所説宿惑位無明長行述於宿生中諸煩惱位至今果熟總謂無明彼與無明俱時行故由無明力彼現行故唯限無明品類不通眼等五根命根衆同分等歟被得若夫通眼等五根命根衆同分等者尤可云色不相應等既不爾如何答凡立十二緣起之由來者外道計云我我所合成有有情內有士夫我是常住也外有我所眼等是無常也然而常住我被持故相續不斷也與彼被受用故轉變差別也則總名之有情相續云云取要爰佛法家不許者內尋士夫我是不可得也故為之無既無有能受用我何得以眼等為所受用耶只於色受想行識五蘊諸法和合之上假立我名假立有情名然有業煩惱力用之時令此五蘊相續其力用斷位之時諸蘊則壞而三乘賢聖遍厭生死過患故除此業煩惱則入無餘具縛異生多迷五欲妙境故起三業諸惑久漂有為故愚夫忘有情相續謂有情相續謂有情常住為令知之為令厭之佛出世説大緣起經於過去遠遠未來永永輪轉無際相不斷之生死略作三世兩重之因果暫顯十二緣起之相生故彼偈頌上説無我唯諸蘊煩惱業所為由中有相續入胎如燈焰如引次第增相續由惑業更趣於餘世故有輪無初下云如是諸緣起十二支三際前後際各二中八據圓滿文故十二緣起之廢立以分位為本既取位位作相續故分分皆以五蘊為體然立名者從勝故非疑下頌文云傳許約位説從勝立支名則此意也若夫唯約無明品類唯三業品類談者無明獨不行三業獨不起爭得顯相續不斷之義若強依名疑之者名色老死以何為體可云耶故光法師釋云於無始宿生中諸發業煩惱位所有五蘊至今五果熟位總謂無明彼五蘊與無明俱時行故由無明力彼五蘊現行故以無明勝從勝立名文文意顯也如此成之時偈頌長行更非違文況正見長行之文云諸煩惱位云至今果熟云總謂無明云俱時行故云彼現行故豈非廣顯五蘊耶何況至下文云如説王行非無導從王俱勝故總謂王行文何為怪哉光法師釋云以前況可知文尋云論文何故云彼與無明俱時行故之外重云由無明力彼現行故耶答案此事俱時行故者顯以無明同時諸蘊名無明支云義彼現行故者顯依前念無明力後念諸蘊現行故亦名無明支云義被得問頌文云宿惑位無明文爾者發業潤生兩惑中何可云耶答可有二意也兩方若發業煩惱者正披今論文雖述宿惑位無明未分發業潤生別以何為由忽可關發業煩惱耶若夫以發業煩惱名無明者潤生煩惱可非無明支寧可不置簡別之言總標宿惑位無明哉若依之爾者光法師釋於宿生中諸煩惱位至今果熟總謂無明云論文云於無始宿生中諸發業煩惱位所有五蘊至今五果熟位總謂無明文準今此釋宿惑位無明云無明者是發業煩惱非潤生煩惱被得如何答如前重成也可有二意也所謂凡今宗意於見修二惑皆有潤生之功如餘處論判中述諸煩惱中無一煩惱於結生中無潤功能發業惑唯限修惑不通見惑如餘處論中云又發表心唯修所斷見所斷惑內門轉故若爾宿生所起煩惱中何無有見惑哉定知云宿生位無明中非發業惑而潤生之類有之云事然而今者以助宿業令感現在五果之煩惱名發業以助現在五果而生之煩惱為潤生故以宿生所起煩惱偏名發業以現在五果位所起煩惱唯名潤生既宿生現世俱起見修二惑豈過去無潤生現在無發業耶然宿惑皆助宿業故名之發業現惑亦助五果故名之潤生如此心得之時兩方之難勢各為二義之潤色何足設會通哉尋云宿惑非一何故偏稱無明耶答光法師餘處解釋中云無明通與諸惑相應若説無明亦顯餘惑文可思之問當處付明十二緣起相且以現在愛取二支望過去無明一支時其體全同開合為異可云耶答兩方若其體全同開合為異者凡無明支者以宿生所起之諸惑為體愛支以現在貪煩惱為體取支以現在貪煩惱或四取為體既無明其體是廣愛取其體是狹何可云其體全同開合為異耶若依之爾者光法師解釋中述現在名色等四用各勝故相顯現故各立一支未來老死雖復相顯望現四支相稍難知總標老死以現在名色等之四支望未來老死之一支之時其體全同開合為異見無明愛取相例可同如何答於無明行二支者取無始已來宿生所起之惑業為體故廣通一切煩惱與福等三業於愛取有三支者且據現在人趣胎生圓滿之類談之故以貪煩惱為愛支以貪或四取為取支以馳求增廣橫牽引業為有支既過去二因之建立與現在三因之施設其義遙異也更不可準例何可云其體全同云開合為異耶但於現在名色等之四果與未來老死之一果其體全同開合為異之例難者誠牒光法師今釋之時一往雖似其體全同開合為異於未來無窮之生死建立老死之一支故其中必可有三界五道四生二有等之果何可必與現在四支是同哉相稍難知之言潛顯此意者歟況於行支既舉福等三業於老死寧可簡上二界天趣化生等之果耶若爾現在之四支與未來之一支其體全同開合為異之例難似未知深義老死是廣四支是狹是也問以識生二支前中有位攝分位緣起可云耶答可攝之也兩方若攝之者廣伺諸論之施設未見以彼二種中有攝緣起之文隨而正披今論之定判及光法師之解釋全不云攝之哉定知不攝之云事若依之爾者凡談三世兩重之因果者為顯相續不斷之輪轉也若夫以彼中有攝緣起者三世之輪轉恐止有情之相續宜絶況大聖之善巧空壞論家之法相將破寧可不攝之耶答此事誠難思夫欲以識支之前之中有攝行支過現二生各別也欲以生支之前之中有攝有支現未兩生亦異也加之欲以彼二種之中有攝識生二支難攝多念於一念如何可成之哉倩案之淨達法師婆沙抄中以中有名方便識支事有之歟以彼為依憑以識支之前之中有還攝識支以生支之前之中有還攝生支可云也但於難攝多念於一念云難者既云方便識支何可濫根本之一念耶宜云方便生死豈不為根本之眷屬耶婆沙抄釋可考之問當處付明胎內五位相且鉢羅奢佉者為名色支攝為當六處支攝可云耶答可有二意也兩方若名色攝者光法師所引婆沙論中云云何六處謂已起四色根六處已滿即鉢羅奢佉位眼等諸根未能與觸作所依止是六處位文如此文者是六處之攝非名色之攝見若依之爾者同上解釋中引婆沙論文云中間五位謂羯刺藍頞部曇閉尸健南鉢羅奢佉是名色位文鉢羅奢佉是名色之攝非六處之攝云事甚炳然也如何答一論兩處之相違不可不和會則回愚案云今論上文引金口之偈頌云最初羯刺藍次生頞部曇從此生閉尸閉尸生健南次鉢羅奢佉後髮毛爪等及色根形相漸次而轉增文準此説於鉢羅奢佉位造多時被得若爾以六處未滿之初位則為名色支之攝以六處已滿之後位亦為六處支之攝可云也如此得意之時兩文更相違何足為疑耶問愛支唯限一念可云耶答可有二義也兩方若限一念者正披論文偈頌説貪資具淫愛長行云貪妙資具淫愛現行未廣追求此位名愛文論判無諍可通多念被得依之光法師釋此文云十六十七已去貪妙資具及淫愛現行簡前位未廣追簡後此中間位所有五蘊總名為愛此位愛勝故別標名文若依之爾者光法師所引正理論中云如何別立愛取二支毗婆沙師許初念愛以愛聲説即此相續增廣熾盛立以取名相續取境轉堅猛故文準今此文愛支唯限一念見如何答此事誠似難思然而任愚意存一義者凡案分位緣起之相如識生二支自元以結生一念成其義故唯限一念不通多念於其業十支者就多念顯其相故約一剎那之義不可有之是以頌文説貪資具淫愛長行述貪妙資具淫愛現行未廣追求若非多念者寧可有如此之義相耶故光法師任文據義判十六十七已去被彼何可疑之耶但於光法師所引之正理論之文者非謂必初一念是愛支也只貪煩惱多時經歷相續現起之中初位不增廣不熾盛故名之愛支不名取支論云未廣追求則此意也後位為增廣為熾盛故名之取支論述周遍馳求則此謂也舊云初念取一念以致此疑歟全不爾若如此者光法師何不釋爾哉既不釋爾定知如上斷簡得其意云事或云愛支唯限一念也其旨如一方之難勢立義會難翻前可思之重難云二義俱難思且就前義光法師解釋中云愛取別者初起名愛相續熾盛立以取名文此釋意不違正理文故引正理證之若爾初念者初一念云意歟被得若爾者光法師則可釋其旨既不爾明知唯限一念不通多念云事如何答此難尤可然但如前會之無相違仍猶準前義可得其意也問當處付明十二緣起相且有支者為唯限引業為當通滿業可云耶答可通滿業也兩方若限引業者凡現在所造業悉攝在有支中有支若限引業不通滿業者當果隨可限引果不通滿果寧可有中生本死等相續之義耶既許現在未來中有生有相續不斷之義定知於未來有滿果云事若未來有滿果者現在可有滿業云事必然也若現在有滿業者有支通滿業云事誰可疑之耶何況未來所建立之生老死之二果者是滿果非引果豈非現在有支之所感哉是以過去二因之中行支未云限引業哉現在三因之中有支相例可同若依之爾者披今論之定判偈頌説有謂正能造牽當有果業長行云因馳求故積集能牽當有果業此位名有文光法師釋此文云又漸長大因取馳求勝故積集能牽當有果業此業生位所有五蘊總名為有業名為有是能有故此從業勝標以有名乃至準此文有支已前多造滿業未多造牽引業文如何答此事誠以難思然而任愚意成一義者於有支攝滿業可云也其旨則如一方難勢但於論文并光法師之解釋者為極難不通退案之凡分位緣起之廢立者於一位約勝法標名立義而於有支位者專造引業疏其滿業況於滿業者前位多造之故於有支位不必造之設雖造之對引業是劣也故從強據勝顯引業隱滿業餘支之廢立皆以如此今何可必標劣耶論文及解釋併顯此意者歟重意云一位中業勝故以業標名中引業勝故以引業標名為言就中光法師結釋述準此文有支已前多造滿業不多造牽引業翻而思之於有支位多造引業不多造滿業之義顯之被得可思之尋云有之名何標業之名耶答光法師所引顯宗論中云能有當果故立有名有有二種謂業異熟今於此中唯取業有文又尋云有支限一念歟答可通多念也可感順生順後等多生命根衆同分故可思之問當處付明十二緣起相且無明愛取三支唯限染汚性可云耶答廣可通三性也兩方若限染汚性者見光法師之解釋十二支悉以當位五蘊為體之旨釋成設雖無明愛取三支何可限唯染汚性耶若依之爾者十二支中別以染汚標其名定知於無明愛取三支者唯限染汚性歟被得如何答披光法師解釋云所有五蘊至今五果熟位總謂無明此中間位所有五蘊總名為愛此中間位所有五蘊總名為取文三支既通五蘊明知亦亘無記染汚二性云事三支既經歷多時於其間若起善心所有之者隨應可通三性云事亦必然也但於以染汚標三支之名云難者光法師釋云以無明勝從勝立名此位愛勝故別標名此位取勝故別標名文豈不爾哉重難云勘婆沙論之説云有作是説五染汚謂無明識愛取及生餘通染汚不染汚文準此文前三支及識生二支限染汚性見如何答此是不正義也何可依用之哉以何知者披一具之文云問此十二支緣起法幾染汚幾不染汚有作是説五染汚謂無明識愛取及生餘通染汚不染汚評曰彼不應作是説此中説分位緣起故應作是説一切皆通染汚不染汚前所説五支中心心所法唯是染汚餘通染汚不染汚有作是説識生二支心心所法定是染汚餘皆不定文問論中付説四種緣起相且剎那緣起相如何説之耶進云論中云謂剎那頃由貪行殺具十二支等文付之稽今此論判披餘處俱頌云殺麁語嗔恚究竟皆由嗔盜邪行及貪皆由貪究竟文明知殺業唯由嗔究竟不由貪盜業唯由貪究竟不由嗔云事何今為成剎那緣起忽可成殺業由貪究竟之義哉若強成此義者豈不招前後相違之過哉加之於一剎那無二心生故立識支之時六處支忽闕立六處之時識支方闕寧可得具十二支哉何況此宗生相未來起用住異滅三於現在前同時起用者光法師餘處之明判也若爾立生支之時現在諸支難成立現在諸支之時生支亦難成豈談剎那緣起之本意哉答凡殺盜二罪俱由異不異二心而成其如殺由嗔而成盜由貪而成是不異心究竟之門也其如殺由貪而成盜由嗔而成是異心究竟之門也如餘處論判中述三俱轉者謂以嗔心於屬他生俱時殺盜若爾所説偷盜業道由貪究竟理應不成依不異心所作究竟故作如是決判應知光法師釋之作二解釋恐繁略之餘處十業道三根究竟者談不異心之相故爾也當處剎那緣起者論異心之相故爾也既各據一義也何足為疑耶就中今談剎那緣起之時若不舉貪者愛支可闕故別標之嗔非支之數故不標之又舉殺業者色業之第一故也更非謂無由貪行盜之義豈為疑之端耶如此成之時招前後相違之過之難勢兼被遮了但於識支六處支之闕不闕者光法師釋此事云五有色根説為六處雖數有少如名色釋或由彼力能滿六故故正理云有色諸根説為六處又解意住名根眼等五根説為六處意雖過去五在現在從多分説名六處或可現識望後名意若爾受蘊望彼名色亦名名色何故不説解云名色二種各有別法充名色體意於現在更無別法故説識為意六處對餘境文解釋既委悉也何可及學者之劬勞耶次於生支餘支之有無者光法師又釋云問生在未來老死現在是則時別云何剎那具有十二解云此據四相作用究竟名一剎那故具十二又解生相不據作用但體現前説有生支此説剎那緣起唯約有情有漏文此亦委細也何可異求耶問識身足論中説剎那緣起可云耶答可有二義也兩方若説之者勘婆沙論之説云雖有此理而此中説時分緣起依十二位立十二支一一支中各具五蘊非剎那頃有十二支然識身足復作是説乃至彼論雖説多心相續十二有支而不同此以彼所説十二有支多是別法或同時起文依婆沙論所説亦識身足論意不説剎那緣起被得若依之爾者正披識身足論之説云於可愛事由無知故便生貪等此中無知即是無明貪即是行了別事相即是其識識俱四蘊即是名色名色依根即是六處和合即是其觸此中領納即是其受受生欣喜即是其愛增廣即名為取能生後有業即名有依現起即名為生諸蘊成就即名為老諸蘊棄捨即名為死文此文無諍明剎那緣起見若非剎那者標今此緣起相之時何可必於可愛事由無知故便生貪等哉加之釋識名色二支之時寧可判了別事相即是其識識俱四蘊即是名色哉於分位緣起等者一位具五蘊故也加之今論中述剎那緣起之相云謂剎那頃由貪行殺具十二支癡謂無明思即是行於諸境事了別名識識俱三蘊總稱名色住名色根説為六處六處對餘和合有觸領觸名受貪即是愛與此相應諸纒名取所起身語二業名有如是諸法起即名生熟變為老滅壞名死文文言少雖異其義更無替何況見雜心論之説云一剎那頃一切有支現在前故説剎那如身論説於莊嚴事無知故起貪無知者如是無明貪者是行於事知者是識識共起四蘊是名色名色建立諸根是六入六入所著是觸觸隨覺是受受所喜樂是愛愛俱生纒是取受當來生業是未來陰起是生陰熟故是老捨陰是死文達摩多羅既引身論之説説剎那緣起豈非識身足論中施設云耶答此事依難測前重雖出二義稽難勢重案之暫可存識身足論中説剎那緣起云義也其旨如一方之疑難退案道理俱舍婆沙正理顯宗等之末論舉談四種緣起是併任本論誠説之所以歟被得還知本論中定可説剎那緣起云事而識身足論既為提婆設摩之所造將為六足論之隨一豈不説今此緣起哉況於婆沙有文哉何況於雜心論之説是分明哉但於婆沙論文一説者凡披婆沙論二十三卷有二師異説初師云設摩達多説曰一剎那頃有十二支如起貪心害衆生命此相應癡是無明此相應思是行此相應心是識起有表業必有俱時名色諸相共起伴助即是名色及與六處此相應觸是觸此相應受是受貪即是愛即此相應諸纒是取所起身語二業是有如是諸法能起即是生熟變是老滅壞是死嗔癡殺有十一支無愛支故文第二師云雖有此理而此中説時分緣起依十二位立十二支一一支中各具五蘊非剎那頃有十二支然識身論復作是説於可愛境由無知故起貪著時此中無知是無明乃至滅壞是死內熱是愁哀泣是悲五識相應不平安等受是苦意識相應不平等受是憂心憔是惱乃至廣説文重起問答云前説後説有何差別答前説是一心後説是多心前説是剎那後説是相續是謂差別彼論雖説多心相續十二有支而不同此以彼所説十二有支多是別法或同時起此論所説十二有支皆具五蘊時分各異文然所以二師相分者於識身足論文有委曲故也則彼論云於可愛事由無知故便生貪等此中無知即是無明貪即是行了別事相即是其識識俱四蘊即是名色名色依根即是六處和合即是觸此中領納即是其受生欣喜即是其愛增廣即名為取能生後有業即名有諸蘊現起即名為生諸蘊成就即名為老諸蘊棄捨即名為死於內熱惱即名為愁發言惡嗟即名為歎五識相應不平安受説名為苦意識相應不平等安受説名為憂其心熱惱擾惱燋惱説名擾惱等起謂生言如是者示現了開發增語能生起故説名積集謂至極究竟圓滿大苦蘊者大災猛大苦大惱顯大世分衆苦聚又諸無明未斷未知為因為説諸行生起謂隨福行隨非福行隨不動行如是諸行未斷未知為因為緣諸識生起或往善趣或橫惡趣如是諸識未斷未知為因為緣名色起或在此世或在後世如是名色未斷未知為因為緣六處生起或有圓滿或不圓滿六處和合故有其觸隨觸領納故有其受受生欣喜故有其愛即愛增益説名為取能感後有業名為有諸蘊現起説名為生諸蘊成就説名為老諸蘊棄捨説名為死於熱惱説名為愁發言惡嗟説名為歎五識相應不平安受説名為苦意識相應不平安受説名為憂其心熱惱擾惱燋惱説名擾惱等起謂生言如是者示現顯了開發增語能生起故説名積集純謂至極究竟圓滿大苦蘊者大災大橫大苦大惱順大世分苦蘊聚文從於可愛事由無知故至順大世分衆苦聚者明剎那緣起從又諸無明未斷未知至大世分苦蘊聚者明分位緣起初師取初文為證明剎那緣起第二師取後文為證明分位緣起也又就初文有二段諸蘊棄捨説名為死以上正明剎那緣起於內熱惱即名為愁以下準分位緣起之老死支於剎那緣起之老死支亦可有愁歎苦憂惱等之義之旨顯也更非謂約實事有其相有其義勿以為怪以何知者至結文云順大世分衆苦故故也或四種緣起中分位緣起是其本也其中既説愁歎苦憂惱等之相故剎那緣起中亦説之是則如云乘言便故也可思之是以俱舍婆沙等中説剎那之中更無説愁歎苦憂惱等事故説分位緣起之中自有説愁歎苦憂惱等事故可思之又諸論中説剎那緣起分位緣起之文皆符合識身足論之今文明知彼論並説二種緣起云事若夫不以識身足論之上文為剎那緣起者方可名何緣起哉依之婆沙論下問答之中述彼論雖説多心相續十二有支而不同此以彼所説十二有支多是別法或同時起之或同時起之言豈非説剎那緣起哉遂至下判此論所説十二有支皆具五蘊時分各異顯發智論中唯説分位緣起不説剎那緣起歟被得若爾對明説剎那緣起之識身足論舉今此疑對發智不舉此還招其不審者歟凡於識身足論之初文明剎那之證是多恐繁略之學者宜留心見之又婆沙論之説以同中初師之結文云嗔癡殺有十一支無愛支故文此是結貪行殺之義也第二師對之述雖有此理而此中説時分緣起乃至非剎那頃有十二支然識身足論復作是説等頗違理背文仍以第二師暫可處不正義歟被得不可有相違重難云識身足論中明分位緣起畢結文云順大世分苦蘊聚文於三世中順何世哉是一初文明緣起畢同結順大世分衆苦聚若爾上所説之順大世之言同下所説之順大世之言何以彼為證成剎那緣起之義哉答此難尤可爾但上剎那緣起之時云順大世是準分位緣起例分位緣起為言下分位緣起之時云順大世是準過去例現在為言譬如因明疏中云言同意別故無諸過也可思之此疑者貞禪大僧都祇短抄中被載之間定有深所以歟仍同舉之今所引之諸文悉如彼抄被引之於義者却不被記之但進釋中云非説剎那緣起云云第二重難云付之文相起盡無爭説剎那緣起見依之雜心論中云云以上問論文云復有説者剎那連縛如品類足俱遍有為文爾者正義可云耶答兩方若正義者凡四種緣起中以分位為其本顯有情三際輪轉無窮之義故也而分位緣起既限有情有漏不通非情無漏剎那連縛相例可同何況本末兩論中説剎那緣起皆限有情有漏不通非情無漏見連縛緣起準例可等是以前師意剎那連縛俱限有情有漏見明知後師意非正義云事若依之爾者此師既依品類足論意成俱遍有為之義何可諍云不正義哉依之光法師全不判正不云不正義以知是正義云事答今此第二師意是正義非不正義可云也其旨則如一方之難勢但於疑難者自本為別師之義何可以初師意難之耶重難云無漏棄背生死何於彼立緣起可云耶況於無漏法者無明愛取之三支決定不可有也寧可成十二支耶答此難尤可然但會之可有二義也所謂一義云設雖於無明愛取三支闕之以餘九支廢立之可有何失哉例如今論意於欲界中際不圓滿之類及於色無色界自本不圓滿隨應立緣起也一義云翻無明而立明支翻愛而立無貪翻取支而或立增上愛為支或以相應心所隨應為取支何無其謂哉可思之尋云前師意説連縛緣起歟答説之也光法師釋云剎那不同故敘異説連縛意同故不別解文意云於剎那緣起者初師云限有情有漏第二師云通非情無漏故前後二師之説是不同也於連縛緣起者第二師雖始云出之是同剎那緣起通非情無漏也還知初師意亦説連縛緣起然通非情無漏故其意與第二師是同故不別解也為言云事重意云初師意剎那連縛二種緣起中剎那緣起唯限有情有漏不通非情無漏連縛緣起不限有情有漏廣通非情無漏之義存之第二師剎那連縛俱不限有情有漏同通非情無漏之義存之故於剎那者前後異説相分於連縛者無異義故初師無別述是則讓其義於第二師故也為言可思之問光法師述連縛緣起相作二解釋爾者其二釋意如何判之哉進云光法師釋云無間名連相接為縛或鄰次名連相屬名縛文付之無間鄰次其義是同相接相屬不異寧可為二釋哉答無間者以遮詮釋連之義鄰次者以表詮釋連之義接者是續之義也相者前念能令後念續後念還能續前念之義顯也是則縛多物令不離之義成之也屬者是者攝之義也以前念攝後念以後念攝前念名之相屬此是前後兩念至親近故不離名之縛為言其義各別也何不為二釋哉尋云次文云故正理云連縛緣起謂同異類因果無間相屬而起文二釋俱證之歟唯證第二釋歟答並證二釋可云也則以無間之言證二釋以相屬之言證第二釋之旨可得其意也自餘準知可證之也問光法師所引正理論文云分位緣起謂三生中十二五蘊無間相續文爾者三生中過未二生者為唯限現在前後一生為當過去無始未來無窮生可云耶答兩方若限現在前後一生者披光法師上解釋述無明行二支之相云於無始宿生中諸發業煩惱位所有五蘊至今五果熟位總謂無明乃至於無始宿生中福非福不動等業位所有五蘊至今五果熟位總得行名文過去之生既及無始未來之生何非無窮哉今論意以如此正理論豈不然耶若依之爾者光法師引今此正理論之説為證云此約生及不定業煩惱説文明知過未二生者唯限現在前後之一生不通無始無窮生云事若通過去遠遠未來永永之生者行有二支豈限順生不定之二業無通順後業之義哉答此事誠為難義不可不審定仍試回愚案云自本談過未二生之時或云取過去無始未來無窮之生之義有之或云取現在前後之一生之義有之歟故光法師釋上宿惑位無明宿諸業名行等之一段文之時判於無始宿生中諸發業煩惱乃至總謂無明述於無始宿生中福非福不動等業乃至總得行名釋下十二支位所有五蘊皆分位攝之文之時云此約前後十二支位所有五蘊無間相續名為分位此約生及不定業煩惱説文重意云上論文雖無無始之言光法師自別加無始之言下論文雖無無間相續之言光法師自別加之明知於上下兩文各據一義成之云事就中今論兩處俱不云無間相續故正理論師故加此言歟被得光法師則釋下文之時引正理為證成取現在前後之一生為過未二生之義如此得意之時一往文理能成歟不可有相違若準下文者過去無明與現在愛取開合為異又現在名色等四支與未來老死一支亦爾也可思之此事者上疑現在名色四支與未來老死一支之同異之時粗雖顯其旨今違上之文出來之間重疑之但今舉兩義上成一義況論義之作精是異故不可有繁重之過者歟問寶法師意連續緣起通非情可云耶答可通非情見兩方若通非情者為定寶法師意正披今論誠説上述十二支位所有五蘊皆分位攝畢下云即此懸遠相續無始説名遠續文而分位緣起既限有情遠續緣起寧可通非情哉依之見光法師之定判云即此分位緣起隔遠相續名為遠續乃至分位遠續唯是有情有漏文設雖寶法師意更不可背論判之施設者歟若依之爾者寶法師解釋中云今評遠續連縛二種緣起別者遠續唯隔越連縛唯無間遠續是異熟因若兼無情亦遠同類因若有情亦遍行因連續定非異熟因通同類遍行及能作除相應俱有異熟因異熟因非連續故相應俱有非前後故不名相續文如解釋者可通非情被得如何答寶法師既連縛遠續二種相對論差異之時唯談六因之具不具更不云情非情之通局而連縛緣起既通非情遠續緣起豈限有情哉況正述若兼無情亦遠同類因其旨彌必然也但於論文之起盡者雖難思推此師意光法師任論文成限有情之旨故為違彼釋故顯通非情之義是則許隔越同類因故爾也若存此義之時會論文者於有情談遠續緣起是其本故云即此懸遠也更非謂云爾故遮通非情之義何無其謂哉次於光法師之解釋者為人師之異釋不及設會通者歟尋云光法師何故乍許連縛緣起通非情不許遠續緣起通非情之義哉就中遠續連縛之不同者隔越鄰次之時分許歟聞如何答有情名相續非情名非相續所以然者有情具業煩惱故無始以來無有間斷故名相續非情不具業煩惱故只花實芽莖等無間續生之程似有相續之義然而若一念有不續之義則枯椊不續故名非相續若爾於非情者雖許鄰次緣起立連縛之名無許隔越緣起立遠續之稱被得準知於非情者雖許鄰次之同類因不許隔越之同類因故遠續緣起不通非情之旨成之歟難云若爾者光法師意於非情有一剎那之義許之歟豈不違諸論一同之定判哉答問以過去業名有支以現在業名行支可云耶進云論疏中不云爾也付之凡過去所造業正感現有有現果豈不立有支之名耶現在所造業既為意亦為身語何當體受稱不名行支哉答光法師釋此事云有謂能有未來世果即是業性此位業勝故標有名現業創求當果勝故標以有名過業非是創求故當體受稱文準此釋於過去業有有現果之義於現業有有當果之義若爾俱可與行之名同可立有之稱雖然過去業無創求當果之義故不約能有門名有而當體受稱現在業有創求當果之義故不當體受稱約能有門立名被得豈不然耶重難云據創求之義立有之名據不創求之義當體受稱云事猶難得其意如何答此難尤可然但案此事可有深意所謂光法師上解釋所引顯宗論中云有有二種一業有二異熟有文而今論頌文云有謂正能造牽當有果業文定知是引業引果非滿業滿果云事若爾現業中雖可攝滿業以引業為本故今立有之名不當體受稱過業中雖可攝引業以滿業為本故當體受稱不與有之名以何知者現在五果既為滿果過去業豈非滿業耶若據此義者未來二果雖為滿果生滅之名宜通引果有始終故若爾生老死之名只顯生滅也若顯生滅者不可遮引果云事必然也況生之言專顯引果如云此一生言顯一同分爰知生之言先雖顯生有一念兼潛示引果也光法師今解釋中述有謂能有未來世果即是業性此位業勝故標有名專顯此意也源存此義也上談創求不創求之差云添之也乞勿執枝葉忘根本矣光法師今以過去業釋不創求明知以過去無始之生為一生全非唯取現在前一生為過去一生云事以今疑之次決上來之義也可思之問論文云有餘釋言餘契經説非理作意為無明因等文爾者論主許此説可云耶進云論疏中論主破之不許之見付之凡今此説者古世親意也而論主是為法師之門人何不許之耶寧可破之耶加之正理論師猶不破之見今論主豈不依用之哉答論主以理為宗非以婆沙評家為量者光法師處處之明判也準知設雖論主為彼門人彼師若成違理之義之時宜可破之更不可許之云事其旨必然也但於正理論師不破之云難者披光法師一段之解釋云此下敘異説古世親解是後世親祖師即是雜心初卷子注中云和須般豆是説一切有部中異師此中已破故正理不非文不可有相違問以無漏心現前位攝分位緣起可云耶答兩方若攝分位緣起者凡三世兩重之緣起者約異熟因果以論之也而無漏心者非異熟因非異熟果何可有攝分位緣起之義哉是以光法師解釋之中云分位遠續唯是有情有漏文若以無漏現前位攝分位緣起者分位緣起豈不通無漏耶若依之爾者凡分位緣起者為顯相續不斷義也若以無漏心現前位不為分位緣起之攝者有非分位攝之有情無間相續義忽可壞耶依之尊者望滿意以無漏心成就之人攝分位緣起之中見如何答案此事可有委細之料簡也所謂尋有為無漏之相無漏非過去二因非現在五果非現在三因非未來兩果故全不可有以無漏法施設分位緣起之義據此意故光法師述分位遠續唯是有情有漏不云通無漏也若於被剋愛支之位若於被剋取支之位若於被剋有支之位宿習開發聖道現前之人有之者則論應名愛支位三人名取支位之人名有支位之人可云也何據無漏心現前不立愛支取支等之稱耶例如中有位斷惑證果之人名中般涅槃聖者也重意云非被剋愛支之時分必念念恆時起貪心非被剋取支之時必念念恆時起取心非被剋有支之時分必念念恆時造牽引業只如此分位此法勝故從此法立支之名云許也是以光法師釋云四歲五歲已去十四十五以來此中間位所有五蘊總名為受受用勝故別標受名文又云十六十七已去貪妙資具及媱愛現行此中間位所有五蘊總名為愛此位愛勝故別標名文又云年漸長大為得種種上妙境界周遍馳求不辭勞倦此中間位所有五蘊總名為取此位取勝故別標名文又云又漸長大因取馳求勝故積集能牽當有果業此業生位所有五蘊總名為有業名為有是能有故此位業勝標以有名文若爾設雖不云以無漏法為緣起體以之攝緣起以為緣起攝云事何可強遮之哉若夫強不攝緣起者三乘聖者無不處緣起中若不以所起無漏心攝緣起者受想識三蘊及色行二蘊少分是無漏也緣起體唯是色行二蘊少分可是寧可得云所有五蘊總名為受云所有五蘊總名為愛云所有五蘊總名為取云所有五蘊總名為有耶何況光法師釋彼與無明俱時行故由無明力彼現行故之論文云於無始宿生中諸發業煩惱位所有五蘊至今五果熟位總謂無明彼五蘊與無明俱時行故由無明力彼五蘊現行故以無明勝從勝立名文準此文經生聖者過去曾起無漏五蘊由無明力現行故是可無明攝被得爰知雖非以無漏法正施設分位緣起之作法以無漏心攝緣起中以為緣起攝事更不可遮之云事若不爾者諸文忽致相違道理亦致牟盾可思之如此成之時兩方之難勢還為答之潤色者歟重難云論文云彼與無明俱時行故云由無明力彼現行故者約有漏五蘊可云爾何可關無漏五蘊哉良以無漏心與無明俱時行之義不可有也二心一念不並故又由無明力無漏心現行之義不可有也乖角二法故次若以無漏攝緣起者無漏則云緣起體何乍云攝緣起非緣起體之旨成之哉答凡分位緣起之廢立者談有情相續之因緣故正以異熟因異熟果為其體是有情之本故也然而非異熟因果之外無餘因果之相然餘因果彼因果之上談之故以餘因果攝異熟因果之中以立其名更非所遮者哉如此之廢立者聖教通備之施設諸部一同之談旨也何可始疑之耶夫欲取之體者非異熟因果如何可成之耶欲不取之體者有情相續方斷有何要須哉不如只為之攝不為之體被得例如以暖等善根之得望暖等善根之時是疏故不為之善根體有便故為之善根攝次有無明故有行支有行支故有五果有五果故無漏心轉無漏現行豈不由無明力哉又無明得現行故有漏色行二蘊現行有漏色行二蘊現行故無漏五蘊現行豈不云無漏五蘊與無明俱時現行哉何不舉彼與無明俱時行故之論文為難哉問以威儀工巧通果三無記心現前位攝分位緣起可云耶答可攝分位緣起也兩方若攝之者凡分位緣起之廢立約異熟因果論之也而威儀工巧等三心全非異熟因非異熟果何可攝在分位緣起之中耶若強攝之者寧可順過去二因現在五果現在三因未來兩果之施設哉若依之爾者凡有情之為有情無不攝在今此緣起設雖威儀工巧等三無記心現前之位何不攝之可云哉答光法師釋云四歲五歲已去十四十五以來此中間位所有五蘊總名為受受用勝故別標受名十六十七已去此位中間所有五蘊總名為愛此位愛勝故別標名年漸長大此中間位所有五蘊總名為取又漸長大此業生位所有五蘊總名為有業名為有是能有故是能有故此位業勝標以有名文準此等解釋位位所起之五蘊設雖非異熟因異熟果之攝皆悉攝彼位位隨應以得位位之稱被得重意云以異熟因果為本餘三性因果攝之屬之彼四五歲十二三歲十六七歲年漸長大之言可思之若以所標之名定其體者一二年之間念念寧起受哉念念寧起愛哉念念寧起取耶念念寧造引業哉如此成之時分位緣起之廢立能成難勢之趣自被遮也以前之疑中委細記之準彼可思之問以他界他地有漏諸蘊攝自界自地分位緣起可云耶答可有二義也兩方若攝之者凡分位緣起之廢立者約異熟因果以施設之如云過去二因現在五果現在三因未來兩果而他界地之有漏法非自界地之因果攝何以彼攝此可云耶若夫強攝之者然由煩惱界有差別之性相忽招相違然由有漏繫地堅牢之軌則似致牟盾若依之爾者於愛取有等之諸位若有入定得通離染得果等之人者何不以彼諸心攝愛取有之分位哉何況披今論之上文上述但據欲界補特伽羅大緣起經説具有故畢下云於宿生中福等業位至今果熟總得行名文光法師釋此文云於無始宿生中福非福不動等業位所有五蘊至今五果熟位總得行名以業感果勝故別標文既於欲界行支正攝不動業見行支以如此餘支亦準例明知以他界他地之有漏諸蘊攝自界自地之分位緣起云事如何答如前重成之可有二義也一義云前疑之中以無漏五蘊攝分位緣起之旨成之畢今疑併準彼可思之仍文義今略之一義云無漏五蘊非繫地法故還屬欲界地之分位緣起云事頗不道理有漏五蘊是繫地法故難以他界地之所屬攝自界地之緣起哉例如云有漏自地依無漏隨生處但會難者起他界他地心之時唯色行二蘊猶存故緣起之相續更無別何可違有情之輪轉心次云所有五蘊者約不起他界他地心之人論之或約多分論之或念念具五蘊故云所有更非謂一念必具五蘊或五蘊者總相云之也若約一念者以色行之存在猶名五蘊也是五蘊之所攝故也例如六處之隨一生之時名具六處次於不動業之難者彼他界他地之行支故別若彼界地緣起之攝何可攝此界地之緣起哉然光法師加福非福二業烈不動業者廣舉無始所造之業故烈之也更非謂欲界地行支故烈之何為難勢哉或福等三業之所攝故烈之或乘言便故爾也可有何失耶尋云二無心定如何答可有二義也如上問當處付明十二緣起相且有支唯限一念可云耶答不可限一念也兩方若限一念者光法師解釋中云又漸長大因取馳求勝故積集能牽引當有果業此業生位所有五蘊總名為有業名為有是能有故此位業勝標以有名文準今此釋可通多念歟被得若依之爾者光法師引正理論分位緣起謂三生中十二五蘊無間相續之文為誠證釋成行有二支是順生業非順後業之旨而見今論之前後餘處結一業引一生多業能圓滿當卷云有謂正能造牽當有果業文準此生諸文思之有支唯局一念不通多念被得若夫通多念者有支豈不通順後業哉答有支一念多念事雖未窺先賢所存可通多念之條理在絶言之謂也其旨如一方之難勢重成其趣者設雖疊分位於三生設雖結引業於剎那考有支之造時宜經歷於多時也所謂自十六七歲乃至二十四五歲名之愛支位自二十五六歲乃至三十四五歲為之取支位自三十五六歲乃至四五十歲五六十歲云之有支位歟被得光法師判十六七已去乃至總名為愛年漸長大乃至總名為取又漸長大乃至總名為有故也若爾自三十五六歲乃至五六十歲或由妻子眷屬等致種種之奔波或亦家業相承等運時時之妄念此等惡業何不取果用於當來之同分哉或由教緣師命等切切行施戒等或由生得聞思惠數數知苦樂等此等善業豈不絶感有身於人天之總報哉此中若隨應一念結引業者餘宜滿業如餘處之解釋中述初是引業後是滿業判唯一能引餘助滿故凡今此分位者有情之心品堅牢而微性通體故堪結引業以前分位未如此故不能造引業云許也何得意於一一念皆為引業何得意於三性五蘊皆爾也致如此之難勢哉光法師述有支已前多造滿業未多造牽引業之意在斯者歟此旨前前疑之中多顯之何可始疑哉故如此得意之時難勢自被遮者歟況有支通滿業之義之前彌不可限一念其旨論也又老死通多生之義之前有支可通順後業云事必然也寧可限一念哉可思之問尊者望滿意約分位緣起緣起緣已生相對明四句分別相見爾者以未來羅漢最後心攝第四句可云耶答可攝之也兩方若攝第四句者今論述第四句者諸無為法婆沙論判有非緣起法亦非緣已生謂無為法依之光法師釋云第四句非是緣起亦非緣已生謂諸無為法不能為因取諸果故體是亦可云故不從因起非緣已生文依此等之諸文云以未來羅漢之後心攝第四句見若依之爾者凡羅漢之後心者異熟威儀二無記心是也而未來故非同類因非染汚故非遍行因非善惡故非異熟因分位緣起故非俱有相應因誰可云緣起法哉然而是非過現二世豈為緣已生哉若爾非緣已生非緣起寧可不攝第四句哉答可以未來羅漢之最後心攝非緣起非緣已生之句也其旨如一方之疑難但於俱舍婆沙兩論及光法師解釋者不云攝之云難者無為法既非三世攝故是為非緣起非緣已生之句仍就顯露且舉無為法不出彼後心也若總理論之者宜答如之者歟以何知者於緣已生非緣起之句之中舉過現羅漢之後心準知彼未來後心非緣起非緣已生被得其理必然也尋云今此師説正義歟答既不以緣已生置未來定知非正義云事正義意為因之邊名緣起為果之邊名緣已生故可思之問尊者望滿意分位緣起者為唯約異熟因果論為當兼約同類遍行等餘因果論之可云耶答不限異熟因果可約餘因果論之也兩方若限異熟因果者云無明緣行之時以無明望行支更非異熟因以行支望無明全非異熟果云識緣名色之時以識支望名色更非異熟因以名色望識支全非異熟果乃至生緣老死隨應亦復如此以知兼約同類遍行等餘因果論之云事若爾設雖今此師意何限異熟因果可云耶若依之爾者彼師意緣起緣已生相對致四句分別之中於緣已生非緣起句之時舉過去現在羅漢後心以之思之唯約異熟因果立分位緣起被得若夫約同類遍行等業因論之者雖羅漢後心非異熟遍行之二因與未來諸無記心起同類因取果用豈不為緣起法哉既為非緣起法測知不約餘因果論之云事如何答彼師意分位緣起者專約異熟因果談之兼約同類遍行等餘因果論之可云也其旨如一方之難勢但於難勢者凡分位緣起者談相續無間之因果也而羅漢最後臨入涅槃二無記心之次念無有相續現起心故以之所為非緣起法也今此二無記心雖與遠未來諸無記心隨應起同類因取果用是遠續緣起之攝非分位緣起之攝何為難勢之端哉問正義意許尊者望滿緣起緣已生四句分別説可云耶答不可許之也兩方若許之者彼師意既於未來不立緣已生正義意寧可許之哉若依之爾者彼所説既叶道理正義意尤可許之也答見論文偈頌結此中意正説因起果已生長行云諸支因分説名緣起由此為緣能起果故諸支果分説緣已生由此皆從緣所生故如是一切二義俱成諸支皆因果性故乃至謂若觀此名緣已生非即觀斯復名緣起猶如因果父子等名文此文意既顯以一支望前名緣已生望後名緣起然一一支皆具緣起緣已生之二義之旨成之始自無明終至老死名緣起名緣已生云事更不可疑之若爾設雖未來法望前之時為緣已生云事亦必然此是過現法之種類故也正義意如此而望滿意不存此等義門寧可許之哉問正義意分位緣起者為唯約異熟因果論之為當約同類遍行等餘因果論之可云耶答總約異熟因果論之別約同類遍行等餘因果論之可云也以前就者望滿説粗記此事畢準彼可得其意也仍不委之問經部宗意十二緣起悉不以五蘊為體可云耶答悉非以五蘊為體可云也兩方若悉不以五蘊為體者凡十二緣起之廢立者前位次第與後位為因後位次第與前位為果如云無明緣行行緣識乃至有緣生生緣老死是則三世流轉十二相續之謂也豈非取位位五蘊為其體而從勝立名哉若夫無明行二支唯以行蘊為體識支唯以識蘊為等者彼同時餘蘊據何得相續流轉耶何況如名色六處生老死等未標別名寧可不通五蘊耶是以有宗意十二支悉以五蘊為體定加之光法師餘處解釋中釋豈不可説為餘慢等之論文云經部諸師不信無明別有實體文若爾無明既無體也餘四蘊非無明體以何為無明支與行支為緣之義可成之哉若依之爾者光法師釋經部諸師作如是問此中所説為述己情為是經義若是經義不然所以者何亦前所説分位緣起十二五蘊為十二支違背契經乃至故前所説分位緣起經義相違之論文云此是決擇此即述經部難分位緣五蘊為體經中既説無明等四以三際無智等為體故知非以五蘊為體此即違經經了義故文論判無爭經部師意存十二支悉非五蘊為體之義見如何答云十二支悉以五蘊為體云悉不以五蘊為體者是有部經部之諍也然光法師釋云經部立理通釋結成己義雖於諸十二位皆有五蘊非即用彼五蘊為體相由籍者方立違然隨此因有無彼果定有無者可立此因法為彼果法支如阿羅漢雖有五蘊而無有行隨福行非福行不動行乃至或有五蘊而無愛等故知非由五蘊力故立十二支汝若言無學五蘊由無無明等故不立支者是即正由無明等力立支不由五蘊力立是故緣起經義即如文所説或如我所説唯用無明等為體文解釋既明著也學者何劬勞哉但於無明緣行行緣識乃至有緣生生緣老死之施設者凡前前後後之相續者是疏助之緣果非真實之因果其云緣不云因豈無深致耶其真實因果者以過去二因望現在五果以現在三因望未來兩果是也而於過去世起無明行二支之時雖非無色受想識四蘊彼四蘊非現在五果之因何可為彼二支之攝哉於現在世識等五果生之時雖非無惑業現起非過去二因之果寧可為今五果之攝耶於現在三因未來兩果之時各各不具五蘊準例可知悉歟如此得意之時自餘之難勢隨而被遮畢次於有部宗之例難者既及對論何以彼義可難此義哉不足設會通次於無明無體之難者彼宗意無明無體者慢等煩惱不知諸法故即以彼名無明故所述無明無別體之旨也非謂之爾故於無明總無其體何來為難勢哉重意云過去所起慢等諸煩惱即無明也豈不為現在五果之因哉問經部宗意色無色界受支如次以五受三受為體可云耶答可有二意也兩方若如次以五受三受為體者凡色無色界者其處勝妙其心微細也宜於色界建立三受於無色界建立一受設雖經部宗意何不辨五識意識之差異可不存身受心受之不同耶依之今論中述彼部意或判依此便生樂等三受從此三受引生三愛謂由苦逼有於樂受發生欲愛或有於樂非苦樂受發生色愛或有唯於非苦樂受生無色愛或云為自受樂非苦樂故造作身等各三種業謂為自身受當樂故造諸福業受當來樂非苦樂故造不動業受現樂故造非福業如是名為無明緣行文光法師釋前文判從此三引生三愛謂由欲界苦逼惱故有於樂受發生欲界愛或有於色界初二三定樂第四非苦樂受發生色界愛或有唯於無色界非苦樂受發生無色界愛述後文云衆生為自受樂及非苦樂故造作身語意各三種福非福不動業謂為自身受欲界當樂故造諸福業為受當來色界下三定樂及四定以上非苦樂故造不動業為受欲界現在世中五欲樂故造作殺等諸非福業如是名為由無明為緣能起於行文若依之爾者勘光法師餘處之解釋云若依經部苦樂隨身至四定憂喜隨心至有頂彼宗意説有身即有苦樂心即有憂喜文退披成實論之説云苦樂在身隨所得身乃至四禪餘三在心隨所得必乃至有頂文而成實多依經部者出光法師餘處之定判誰可疑之耶加之淨影大師解釋中述成實論意云苦總四禪憂至非想乃至樂在欲界喜至非想文若爾約十二支論受支體之時於色界者通五受於無色者亘三受云事論判解釋其旨甚炳然也如何答此事頗為難義如何可會之哉然光法師兩處之定判既致桙楯實有深所以歟倩案之彼部意於三界談五受有麁細之不同歟若約麁論之者憂苦二受唯局欲界喜樂二受通在欲色捨受一者廣亘三界也若就細云之者苦樂捨三受在欲色二界憂喜捨三受通欲色無色可云也思而可知也故淨影大師大乘義章中云憂根苦根成實大乘麁在欲界論其細者苦總四禪憂至非想故經説言苦樂隨至於四禪憂喜隨心至有頂也喜根樂根成實大乘麁同毗曇論其細者樂在欲色喜至非想文準高祖之定判可思光法師之解釋也不可有相違尋云就大乘義章釋且成實大乘者成實即大乘歟成實與大乘歟答貞禪大僧都祇短抄中被記之可見彼也問論文云有説緣起是無為法以契經言如來出世若不出世如是緣起法性常住文爾者説一切有部異師説歟答或云當部之中之異師説或云餘部之説之二義可有之也兩方若當部之中異師説者光法師釋今此論文云準宗輪論是大衆部等計文若依之爾者此説既出本論婆沙之説豈非當部之異師説哉答光法師問俱舍論之今文作二釋其釋云準宗輪論是大衆部計又婆沙二十三呼為分別論者文初釋意今論云有説者直引大衆部之説載之被得若爾是餘部之有説非當部之異師為言第二釋意今論云有説者是引婆沙會分別論者之説載之被得則當部之異説非他部之異説為言重意云婆沙會五百羅漢者悉有宗之門人不交他部之學者其中分別論者意自同大衆部之計歟可思之尋云今此分別論者意同尊者望滿説歟答不爾今分別論者意同大乘有佛無佛性相常然之説大衆部之計多以如此尊者望滿意以無為法攝云非緣起非緣已生之第四句云許也其義既不同大衆部之計是以論疏中雖述非正義之旨全不云餘部之説者哉應永十二年九月二日夜於東大寺普門院書寫功已凡厥書寫之功不虛而光亡後滅之有緣遂開悟於梵行已立之臺鑽仰之力無朽而有宗經部之疑開辨通釋於決擇談論之庭願以善根餘薰普及沙界群萠而已右筆華嚴宗相傳清熏年齡二十九呼悲
