body:
  text: 俱舍論第八卷抄上問題問他化自在天可他聲塵耶問光法師釋南贍部洲名云或從林立號或以果標名文爾者此洲南邊有贍部樹歟問論受道勝劣時東州勝西州劣歟問外法異生可生北州耶問聖者可成就北州蘊處界耶問光法師所引正理論中明第三靜慮天立淨名爾者以何法名淨耶問光法師所引正理論中釋無熱天名云已善伏除雜修靜慮上中品障文爾者今此上中品障者指上中二品歟問光法師所引正理論中釋無熱名作三解釋爾者第二解意如何釋之耶問光法師所引正理中釋色究竟天名作三解釋爾者第三解意如何問異生所起天眼通可見五淨居天事耶問頌文云此上十七處文爾者為有宗義為當經部宗義歟問無想天多有情可居在耶問無色界中可有方處耶問無色界中可有自界他界不同耶問四無色處可立三天不同耶問光法師釋命終即於是處生故復從彼沒生欲色時即於是處中有起故論文作二解釋爾者初釋意如何釋之耶問光法師釋命終即於是處生故復從彼沒生欲色時即於是處中有起故論文作二解釋爾者第二釋意如何釋之耶問光法師所引婆沙論中述有説意從無色界沒生欲色界時在第四靜慮中有現在前文爾者評家如何破之耶問論主意可存衆同分命根實有義耶問正理論意眼等六識現在前位依非所依不相應行唯限七種歟問論文云欲所屬界説名欲界文爾者可有依主釋義耶問論文云所言色者是變礙義文爾者寶法師意是變礙義者可通十一種色耶問有宗意於有情界可有窮盡耶問論中明世界安立云當言傍住文爾者有宗義歟問論中明世界安立云有説亦有上下二方文爾者有宗義歟問論文云有説亦有上下二方文爾者依初靜慮所發神通可至上下二方梵世耶問離一界通障時可離餘界通障耶問千世界有幾梵王耶問婆沙論評家意阿素洛何趣攝耶問五趣體可通善染汚耶問論中明五趣相云體非中有文爾者引法蘊足論何文證此義耶問論文云有説趣體亦通善染文爾者論主意可許此義耶問大衆部五趣體唯限善染汚歟問死有現前必本有無間歟
