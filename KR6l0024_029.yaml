body:
  text: 俱舍論第八卷抄下問題問論中明身異想異識住云如人一分天文爾者一分天者唯限欲界天歟問論中明身異想一識住云如梵衆天謂却初起是第二識住文爾者初靜慮三天相望論身異義歟問論中答梵衆何處曾見梵王問舉三師説爾者論主正義意如何釋之耶問正理論中明身一想異識住解契經極光天中有時諸天同共集會其身有異光明並同文舉二師説爾者第二師意如何釋之耶問以識蘊可為七識住體耶問論中述第四靜慮不立識住云謂諸異生求入無想文爾者今此説可為正義耶問寶法師所引正理論中述上代師資相承説云若處具有見修所斷及無斷識立識住名文此義意會以有頂天例欲界人天應名識住之難作二解釋爾者初師意如何釋之耶問寶法師所引正理論中述上代師資相承説云若處具有見修所斷及無斷識立識住名文此義意會以有頂天例欲界人天應名識住之難作二解釋爾者第二釋意如何釋之耶問寶法師意九有情居可經説耶問論中述立四識住云識所依著名識住故文爾者以與識同時受想二蘊為所著義可有耶問立四識住必由同時相望歟問入無想滅盡二定位色行二蘊可為識住體耶問今論意由所依所著義立四識住爾者正理論意許此義歟問論文云餘契經言於識食中有喜有染有喜染故識住其中識所乘御文爾者唯緣識蘊生喜染義可有耶問七識住中可攝中有耶問四識住中可攝中有耶問胎卵等四生人俱可入聖耶問寶法師意卵生人可作輪王耶問光法師意鬼趣不受卵濕二生故如何釋之耶問正理論意一具四大種所造色必可為俱有因耶問光法師所引正理論中判四生多少舉二師異説爾者初師意如何釋之耶問大衆部意可許中有耶問上座部意可許中有耶問論主意可存像色實有義耶問有宗意可存像色實有義耶問初靜慮上中下三品善業通感三品異熟果歟問今論所引嗢陀南伽陀中云總集衆聖賢四靜慮各十文爾者光法師意今此十賢聖中可舉現般聖者耶問今論所引嗢陀南伽陀中云總集衆聖賢四靜慮各十文爾者光法師意今此十賢聖中可舉阿羅漢果聖者耶問光法師依宗輪論意經部宗出世時代如何釋之耶當卷二十九條上下合六十三條
