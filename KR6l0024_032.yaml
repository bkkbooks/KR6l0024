body:
  text: 俱舍論第九卷抄下問題問頌文云如是諸緣起文爾者於三際如何廢立之耶問頌文云如是諸緣起十二支三際前後際各二中八據圓滿文爾者為唯約欲界論之為當廣約三界論之可云耶問當處付明十二緣起相且無明支體者為唯限無明及相應俱有等法為當廣通眼等五根命根衆同分等可云耶問頌文云宿惑位無明文爾者發業潤生兩惑中何可云耶問當處付明十二緣起相且以現在愛取二支望過去無明一支時其體全同開合為異可云耶問以識生二支前中有位攝分位緣起可云耶問當處付明胎內五位相且鉢羅奢佉直為名色支攝為當六處支攝可云耶問愛支唯限一念可云耶問當處付明十二緣起相且有支者為唯局引業為當通滿業可云耶問當處付明十二緣起相且無明愛取三支唯限染汚性可云耶問論中付説四種緣起相且剎那緣起相如何説之耶問識身足論中説剎那緣起可云耶問論文云復有説者剎那連縛如品類足俱遍有為文爾者正義可云耶問光法師述連縛緣起相作二解釋爾者其二釋意如何判之耶問光法師所引正理論文云分位緣起謂三生中十二五蘊無間相續文爾者三生中過未二生者為唯限現在前後一生為當通過去無始未來無窮生可云耶問寶法師意連縛緣起通非情可云耶問以過去業名有支以現在業名行支可云耶問論文云有餘釋言餘契經説非理作意為無明因等文爾者論主許此説可云耶問以無漏心現前位攝分位緣起可云耶問以威儀工巧通果三無記心現前位攝分位緣起可云耶問以他界他地有漏諸蘊攝自界自地分位緣起可云耶問當處付明十二緣起相且有支唯限一念可云耶問尊者望滿意約分位緣起緣起緣已生相對明四句分別相見爾者以未來羅漢最後心攝第四句可云耶問尊者望滿意分位緣起者為唯約異熟因果論之為當兼約同類遍行等餘因果論之可云耶問正義意許尊者望滿緣起緣已生四句分別説可云耶問正義意分位緣起者為唯約異熟因果論之為當約同類遍行等餘因果論之可云耶問經部宗意十二緣起悉不以五蘊為體可云耶問經部宗意色無色界受支如次以五受三受為體可云耶問論文云有説緣起是無為法以契經言如來出世若不出世如是緣起法性常住文爾者説一切有部異師説歟
