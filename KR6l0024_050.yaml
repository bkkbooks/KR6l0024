body:
  text: 俱舍論第十六卷抄下問今論前師云十惡業道互為加行後起後師云互不為加行後起正理論前師云互不為加行後起後師云互為加行後起云云取意爾者光法師兩論二師正不如何判之耶進云光法師釋云正理以後説為正此論以前師為難即以前師為正文付之依解釋披兩論今論前師説又諸業道展轉相望容有互為加行後起後師判貪等不應能為加行非唯心起加行即成唯起心時未作事故正理論前師述有餘師説貪等不應能為加行非唯心起加行即成未作事故後師云如是説者貪等雖非所作事性然彼貪所緣境生時非無力用由有力用得加行名方便引生諸業道故文若爾二師之異説兩論既是同但前後為異然俱舍以云互不為加行後起為正正理以云互為加行後起為正之旨可成之何可釋此論以前師為難判即以前師為正哉若論以前師為正者其意可與正理同何至下可會作論意異不為加行據親無力能為加行據疏有力哉答此事未見其義憑蹤尤為珍重所令説耳今驚疑問之旨親披解釋之文誠難得其之一趣然而倩案之則得其旨所謂正理論正初師並有餘師之言後師唱如是論者之語正不自顯然也今論二師俱不表邪正之差異故先就顯了所判正理以後説為正也於此論者其正不難辨故以難之言為由所判即以前師為正也其前師者是正理之前師非此論之前師也此論前師存互為加行後起之義豈此論本意哉故下述貪等不應能為加行非唯心起加行即成還難前師是則於此論者是後師於彼論者是前師也若爾此論以前師為難即以前師為正者以正理論前師之意難此論前師故知此論之後師是正義為言若不爾者此論以前師為難即以前師為正之釋太難得其意故也疑難之趣頗此意歟而如今成得其意之時更非疑者歟尋云以何知今論意存十業道互不為加行後起之義耶答論云貪嗔邪見才現在前即説名為根本業道故無加行後起差別文於貪等既無加行後起況十業道互相望之時為加行後起哉尤為準例者歟又尋云光法師釋貪等不應等之論文云論主敘餘師計為難文餘師者何師耶答指上所舉之互為加行後起之師也可思之問殺生等自作六業道根本成時必具表業可云耶答不必具之可云也兩方若必具之云者凡殺生等自作六業道種類非一準設雖根本成之時何必具表業可云哉是以遣他六業道根本成之時不必具之見相例可同若依之爾者正披今論之定判偈頌結惡六定無表彼自作淫二長行述若有自作彼六業道則六皆有表無表二必可具表業被得如何答殺生等自作六業道根本成之時分不一準或有與表業俱所作究竟或有作表業已所作究竟若與表業俱所作究之竟之時者不必具表業也故論中述此事云謂起表時彼便死等彼方死等與遣使同根本成時唯無表故文論文既明鏡也何足為難哉但於偈頌並長行上文者約多分就大都所判爾也然至下委成之時述則六皆有表無表二謂起表時彼便死等顯彼自作淫二之理述後方死等與遣使同根本成時唯無表故顯不具表業之旨若爾此等之文未違所存之義何可備難勢之端哉況於一具之文引始不引終頗似矯者歟何況倩案偈頌文於無表者必具之故云六定無表於表業者不必具之故只云彼自作淫二不置定之字其意在斯歟重意云謂起表時便死等以上顯偈頌之文相後方死與遣使同以下顯頌所含之義可思之重難云於殺生及誑語離間等三惡業道者設雖有根本成之時不具表業於偷盜及麁惡雜穢等三惡業道者必可具表業被得何可判後方死等與遣使同根本成時唯無表故哉答偈頌中上結染異想發言解義虛誑語下云染心壞他語説名離間語非愛麁惡語諸染雜穢語餘説異三染佞歌邪論等至長行云解義不誤流至此中文明知語四業道皆具解義之緣云事若爾設雖麁惡雜穢二語作表業見云云後所罵所染之人生領解之義有之者根本業道之時可必具表業哉次於盜業道者誠難思暫回今案懸推云於自作盜業道者如邪淫業道必可具表業也述若有自作彼六業道則六皆有表無表二謂起表時彼便死則此意也於後方死等與遣使同根本成時唯無表故之論文者可料簡之所謂等之言中唯攝語四業道不攝盜業道之旨可存之也如此得意之時無強違文歟別有別違文者重可了簡也或云若有自作等之彼方死等等約多分故非相違或述彼便死等述彼方死等舉殺業道不盜業道故非強病歟問今論意遣使殺等根本成時必可具表業可云耶答不必具之可云也兩方若必具之者披論文之前後偈頌結惡六定無表彼自作淫二長行述如是六種若遣使為根本成時自表無故遣使殺等根本成之時不必具表業見若依之爾者披發智論文云若成就不善身表彼成就此無表耶答諸成就不善身無表彼成就此表文如此文者設雖遣使殺等根本成之時必可具表業被得依之勘婆沙論處處之文或述如表數量無表亦爾或云若能發語遣他殺等由此發得身無表者必忽成就不善身表以必能動身手等故文本論婆沙之説必成就表無表業之旨顯也世親論主意寧可違依憑之論判耶答遣使殺等根本成之時不必具表業云事今論定判分明之上光法師設遣使殺等根本成時有何表耶之明釋難可疑之哉但發智論之文者彼暫約自作約多分約大都可云爾何可必決定哉又前後之文未考之重可思之次於婆沙論如表數量無表亦爾之文者彼未必約成就不成就門而分別云只如身表有三身無表亦有三如語表有四語表語無表亦有四為言歟何可為強難勢哉次於同若能發語遣他殺等之文者誠以難思然而倩案之就能發人之能發心所發業之未息之位所教人速往所殺等之時所作究竟所判爾也若經多時隔遠路所作究竟之時能發人何可必有動身發語之義哉況正述其成表業之所以云以必能動身手故文重見下文也故知發言遣他施等由此發得身無表者必亦能動身手等故由此成就善身表業文明知能教人之表業等未止息之時所發人所作究竟故能教人亦成就表無表故評家意破遣使殺等根本成之時無表業云不正義而成就根本成之時有表業之旨云事非謂云爾故經多時交餘念表業止息之時唯成就無表不成就表之義無之何為違文哉又設雖評家意至後時猶必成表業之義存之者彼既違道理世親論主何可必用彼説哉非以婆沙評家為量其旨炳然也問論文云七善業道若從受生必皆具二謂表無表受生尸羅必依表故文爾者攝自然見道二種得戒可云耶答可有二意也兩方若攝之者凡自然見道二種得戒者無漏心現前位所得之散戒也何可表業轉之義哉是以披今論餘處之定判述十種得戒之相云一由自然謂佛獨覺二由得入正性離生乃至如是所得別解律儀非必定依表業而發文光法師釋此文云謂初二種不從表生後依表生文何況此是受生尸羅彼非受生尸羅彼此義門遙異也何今文中攝之可云哉若依之爾者欲界無表必依表業而生設雖自然見道二種得戒何不從表業可云哉依之見下論文云欲無無表離表而生文光法師釋此文云欲界中無有無表離表而生文若爾可以自然見道二種得戒攝必皆具二之文中云事論判解釋實炳然也如何答此事諸論之難義諸師之異端也然而依光法師意成之者於餘處非必定依表業而發之文或云非必定依根本表發或云非必定依自類表發或云餘師義之三義有之故光法師釋云或可通據加行根本乃至若不爾者遣使殺等根本成時有何表耶文又云或可無表非必定自類表發顯互發也文又云前文敘餘師義文次於下欲無無表離表而生之文亦或云欲無無表離根本表生或云欲無無表離加行表生或云餘師義之三義有之故光法師釋云若彼仙人及布他時而不動身亦不發語於欲界無有無有無表離表而生此殺誑語如何成業道文文云言欲無無表離表而生者通據加行根本兩位必有表業能生無表乃至若不爾者遣使殺等根本成時有何表耶文又餘處云下文論主敘餘師義難文二文既致相違故互立義會文之時各有三義其中依加行表根本無表生之釋意不以自然見道二種得戒攝今必皆具二之文可云也故光法師釋之解云既言受生明非自然見道此文據生尸羅故言具二前文通據自然見道得戒故云非必定依表業而發問若言有離表生何故下文言欲無無表離表而生解云下文論主敘餘師義難或通據加行根本故言欲無無表離表而生若不爾者遣使殺等根本成時有何表耶文依根本表彼無表生之釋意以自然見道二種得戒攝今必皆具二之文可云也故光法師釋云佛與獨覺五苾芻等要期受故受生類故亦名受生若作此解十種得戒皆依表生問何故前言非必定依表業而發解云前文敘餘師義或可無表非必定依自類表發顯互發也如前解釋若作此解善順下文欲無無表離表而生文如此得意之時二義之趣能成兩方之疑被遮者歟尋云於非必定依表業而發之文與欲無無表離表而生之文者各作或云依加行表或云依根本表之異釋何故於必皆具無之文者唯依根本表不依加行表之旨成之耶答於餘處之文與下論文者未必分加行根本故隨應或云依加行表或云依根本表之異釋作之也於今文者唯約根本不約加行故所不及異釋也故論中釋惡六定無表彼自作終二等之頌文云如是六種若遣他為根本成時自表無故若有自作彼六業道則六皆表無表者謂起表時彼便死等後方死等與遣使同根本成時唯無表故文光法師釋問起頌答云上論文云此下第二明業道差別就中一約表無表明二約三根以辨三明業道依處四問答分別五明業道相就約表無表明中一約根本明二約前後辨此即第一約根本明文誰可疑之哉文尋云必皆具二者為唯約自類表為當通他類表耶答或云約自類表或云通他類表之二意可有之也故光法師釋云如受大戒依七表業發七無表止善微細其相難了雖有語表不令人聞如鬼語等人不聞故既言必皆具二明知表無表業數皆齊等大戒既然餘戒例爾又解若羯磨受戒依身三表正發身三無表兼發語四無表若有語表如何不聞既不聞聲明無語四表若三歸受具依語四表正發語四無表兼發身三無表由隨師語而發戒故七支無表雖有互發必定皆依表業而生故言必皆具二非言一一各別表生餘近事等三歸戒唯一語表發四無表文又尋云抑以非必定依表業而發文為本之時以欲無無表離表而生之文云敘餘師義以欲無無表離表而生文為本之時以非必定依表業而發之文云敘餘師義意如何答存非必定依根本表發之義之時以欲無無表離根本表生之義之時以非必定依根本表發之義為餘師義是一釋意也又存非必定依自類表發之義時以欲無無表離自類表生之義為餘師義存欲無無表離自類表生之義之時以非必定依自類表發之義為餘師義為言又尋云何故無非必定依加行根本表業而發之義耶答云欲界無表之總不依加行根本二表而生之義無之故亦違欲無無表離表而生故可思之問七善業道受生無表不以大種為所依可云耶答可以大種為所依也兩方若不以大種為所依者凡以無表名色者偏據所依大種為色法若不以大種為所依者據何忽可於無表立色法之名哉彼大種所造性由此説無表之性相何足為怪哉若依之爾者正見今論文述七善業道若從受生必皆具二謂表無表受生尸羅必依表故文依此文者無表唯以表業為所依不以大種為所依被得若夫以大種為所依者寧可於一箇無表有立二種所依之義哉是以披餘處之論判云眼識等五所依不定或有變礙謂眼等根或無變礙謂無間意無表所依則不如是故前所難定為不齊變礙名色理得成就文何況同論判中云有釋表色有變礙故無表隨彼亦受色名譬如樹動影亦隨動文加之雜心論意亦存此意見如何答凡有宗之本義論主之正意同無表之大種為所依大種立色名云事其旨餘處論判之所施設也更不可疑之餘處論中結此能造大種異於表所依述從一和合有細麁果不應理故其旨炳然也但於必依表故之論文者雖云未云所依何可為強違文哉設有云所依之文者是只可於依加所之字更可非約所依之門云爾全不可為難勢何況今文中未云不以大種為所依何為違文哉次於一箇無表不可有二種所依云難者彼如眼等五識或以變礙眼等五根為所依或以無變礙過去意根為所依何至無表可簡二箇所依哉況於未云所依哉次於餘處眼識等五所依不定等之論文者論主通外難述正義之時於五識所依者有色根非色根二種故約所依立色名之義不可有之於無表所依唯限色不通非色故約所依立色名豈不順道理哉之義成之文也其所依者是大種非表業故是以大種為無表所依之誠證也何可備難勢之證文哉次於餘處有釋表色有變礙故無表隨彼亦受色名之論文者是不正義也故正理論破之云此不應理隨心轉色不從表生應非色故文何可及會通哉次於雜心論之説者今論所舉之有釋則是也故光法師釋云是雜心論主義文其旨如何問靜慮無漏二種律儀依表業生可云耶進云光法師釋云定生無表不依表起依心生故文付之凡無表之得名對表業而所起也故雖靜慮無漏二種律儀何不依表業而生可云哉若夫強不依表業而生者無表之稱號更難遣者哉是以披餘處之論判云意業非色不能表示故不名表由無表故無表亦無文何況見正理論餘處之文述佛獨覺及五苾芻入聖相云然彼先時決定有表文光法師則以彼説為依憑述自然見道謂彼先時決定有表相續不斷乃至聖位文靜慮無漏二種律儀依表業而生云事此等之定判實分明也如何答凡欲界必無隨轉無表色界必無依發無表者光法師餘處之明判也麁劣之靜慮律義猶不依而發細勝之無漏律儀何可依表而發哉餘處當卷既以符合何為疑之端哉此則今論文之所顯也故偈頌結定生唯無表長行云靜慮無漏所攝律儀名為定生此唯無表但依心力而得生故文但於依表立無表云難者凡表無表相對立之者就散戒所論也何約定戒可疑之哉或云表業是麁動也定中是細寂也故於定心之上不建立表唯立無表也或云定無表亦依表而生之義可有之然論疏中云不依表而生者定散異之鹿細遙也故不以表為定無表之依而所為散無表之依也次於意業非色不能表示等之論文者準前會通之旨可成之也況彼於意業不立無表之所以成之故非強難勢次於餘處正理論之説並光法師之釋者彼約自然見道二種得戒成其旨故是散無表非定無表何來為難勢哉重難云佛獨覺及五苾芻入聖以前之端身正聖之表者是定心之表示非別解之前相何以彼為由忽可來自然見道二種得戒依表而來之旨哉論判解釋俱難思如何答問定生無表非大種所造可云耶答是大種所造可云也兩方若非大種所造者凡以無表名色法者為大種之所造故也設雖定生無表何非大種所造可云哉是以今論餘處文述定生依長養無受無異大正理論餘處文云定生無表七支相望展轉互生同一果故唯從一具四大種生文若依之爾者披當論文述靜慮無漏所攝律儀名為定生此唯無表俱依心力而得生故定生無表唯依心力而生不依大種力見依之光法師餘處解釋中云無漏戒非大種力故成無漏但由心力隨無漏心所等起故文有漏定戒相例可同如何答大種所造性由此説無表之定判未簡靜慮無漏二種律儀定生無表豈非大種之所造哉但於當卷論判者為顯定生無表之不依表而生之旨云但依心力而得生故也全非為成非大種所造之義云爾何來為難勢哉次於光法師餘處之解釋者為顯有漏自地依無漏隨生處之道理云但由心力隨無漏心所等起故也此亦更非為成非大種所造之義云爾何可備疑難之端哉次於有漏定戒者無漏戒之為細勝猶為大種之所造有漏戒之為麁劣豈非大種所造哉是以次下之文云有漏戒由大種力繫屬界地故不相似文何隱此文稱難勢哉問有漏業道加行位必發無表可云耶進云論中述加行定有表無表或有無不必發之見付之凡加行者引根本之方便也而根本位必發無表加行位豈不爾哉例如見諦道位發道共戒故四善根位發定共戒也何況見餘處之論文或述三殺一誑語一殺生加行或云造逆定加行無離染得果加行之罪業感那落迦果障離染得果見若加行位不發無表之義有之者寧可施如此之功力哉答凡異熟因不善及善唯有漏者性相之所定也設雖不發無表之表業何無感異熟果之功能哉皆能招異熟等流增上果者論判之所顯也設雖不至根本之身語何無障凡聖益之力用哉況加行者才發身語二業引根本業道云許也何可必施無表俱生之作用哉若夫必發無表者更不可有加行根本之不同立三位差異豈非無用哉就中成表非無表住中劣思作者餘處論判之施設也豈不聞加行善惡哉若爾有漏業道加行位不必發無表云事炳然也如此成之時諸難自被遮者歟但於見諦道四善根例難者凡以四善根為加行以見諦道為根本者有漏修慧十六行不現前無漏十六行難現起之故也非必以定共戒為方便以道共戒為根本者哉設雖彼此相望為加行根本定散大異也有漏無漏亦各別也何可為所例哉次於一殺生加行之文者自本不遮加行中自有發無表之類何為疑哉次於造逆定加行之文者準前可會之也問不善業道根本後起從三不善根生可云哉進云論中述加行三根起彼無間生故根本後起不從三根生見付之加行既從三根而生根本後起豈不爾哉是以於善業道根本後起者從三善根而生見相例可同如何答凡貪嗔癡是本惑故必無俱起之理然前七惡業道根本及意三惡業道依時隨應或有唯由嗔而究竟如殺生麁語嗔恚三業道或有唯由貪而究竟如偷盜邪行及貪三業道或有唯由癡而究竟如邪見一業道或有由三根而究竟如誑語離間雜語三業道既於十業究竟之時有如此不同故不得一相之由三根而究竟乃至云由一根而究竟尤分別可顯其相也故下偈頌文云殺麁語嗔恚究竟皆由嗔盜邪行及貪皆由貪究竟邪見癡究竟許所餘由三文彼後起準例可思之而於彼加行者隨應從三根而生其相如誑語離間雜語三業道之根本今述加行三根起彼無間生則此意也若依此意者意三惡業道亦隨應從三不善根而生其相如前七業道加行之從三不善根而生頌文結貪等三根生是也若爾總云前七惡業道三位及意三業道之生起之旨云隨應從三根而生更不可云一一皆從三根而生者歟次於前七善業道三位之例難者無貪無嗔無癡三善根必並起故彼三位從善心而發之時必皆從三善根而生也此中無貪無嗔二善根是大善地法之攝無癡善根是大地法之攝故也彼此義門遙異也混而不可難之故光法師解釋中云善法相順故三法並生惡多相違故貪嗔不並文尋云三根中癡不善根者獨頭相應二無明中何答是獨頭無明非相應無明可云也若約相應無明論之者下云十惡業道究竟之時尤可云十惡業道皆由癡而究竟既不爾知約獨頭無明論云事問頌文云殺麁語嗔恚究竟皆由嗔盜邪行及貪皆由貪究竟邪見癡究竟許所餘由三文爾者光法師意約剎那等起論業道究竟可云耶進云光法師判後之二解俱可為正約因等起剎那等起論之見付之於因等起位者業道未成故名之加行不名根本何可約彼論究竟之義是以餘處論中明業道之聞思俱轉之相之時上述三俱轉之義云謂以嗔心於屬他生俱時殺盜畢下會若爾所説偷盜業道由貪究竟理應不成之難云依不異心所作究竟故作如是大判應知文約剎那等起論業道究竟云事此等實分明也依之寶法師意簡因等起之解同剎那等起之釋見次剎那等起心通三性故不隨彼心判身語二業之性類見餘處於轉善等性隨轉各容三之論判其旨實炳然也若強約剎那等起論究竟門者前七業道皆了依三根而究竟又自本依自體而究竟之義不可有之意三業道依何方可論究竟之義哉殺麁語嗔恚究竟皆由嗔盜邪行及貪皆由貪究竟邪見癡究竟許所餘由三之偈頌豈非設徒然之決判哉次因等起剎那等起其相遙異也何可成約二種等起之義哉答此事光寶兩師既及異釋之上者定是為性相之難義歟被得故光法師大致斟酌作三釋也然而自判正不以云約剎那等起云約因等起剎那等起之後兩釋為正之旨成之仍今可存通二種等起之義也所謂就十業道中且以前七業道望因等起剎那等起二心之時因等起心是親剎那等起心是疏故隨因等起心判性類不隨剎那等起心判性類餘處論判中述等起有二種因及彼剎那如次第應知名轉名隨轉則此意也故光法師初釋云剎那等起即通三性心不定故彼非究竟若因等起心性即決定以決定故從彼究竟然不以此釋為正者暫所住論之也所謂論中釋殺麁語嗔恚究竟皆由嗔等之頌文云殺生麁語嗔恚業道由嗔究竟要無所願極麁惡心現在前時此三成故乃至以貪嗔等現在前時一一能令此三成故文此則一途之説相也若約實義云之時就究竟之所由可有因等起剎那等起二心論文暫約剎那等起心論究竟初釋還約因等起論究竟故也然而遂論釋互顯義故不可致相違者歟例如餘卷解釋中述業道思俱轉之相會今論約剎那等起思論之婆沙雜心兩論約因等起思論之相違作二釋其中初釋成論意各別之旨第二釋述和會之義門其第二釋意云俱有二種一是並俱謂同剎那俱時並起二是有俱謂前後俱由有故彼前法故此從法得有俱舍據並起不説無心婆沙雜心通據有俱故兼説無心各據一義並不相違也此義意會因等起心在加行位究竟義在根本位云難者若無因等起心者難有剎那等起心若無二種等起心者前七業道爭得成哉還知前七業道源由因等起心而成云事若爾由因等起心論業道究竟豈不立道理哉彼由有彼前法故此後得有之釋豈非顯此意哉次於餘卷依不異心所作究竟等之論文者準上所引之光法師餘卷之解釋可會之也次於寶法師之解釋者為人師之異釋何足設會通哉況為違光法師之定判故作彼釋何可劬勞哉次約剎那等起心論業道究竟者其文理粗先成文畢重成其道理者加行位三業未究竟根本位三業始究竟故約剎那等起心所論業道之究竟也誠以貪等未至根本之位希求之意樂未滿足之貪等之已至根本之位希求等之意樂已滿足尤以前七業道望剎那等起心可談究竟門也彼殺生麁語嗔恚業道由嗔究竟要無所顧極麁惡心現在前時此三成故等之論文專顯此意也光法師第二釋述此中據剎那等起非因等起乃至此文亦據自作者説其意在斯此義意會剎那等起心通三性云難者彼約遣使殺等六業道可云爾更不可關自作業道者歟彼此文亦據自作者説之釋則此意也依此釋之時前七業道皆由三根而可究竟云難兼被遮畢次於自體不由自體而究竟由何可論意三業道之究竟哉云難者光法師自救此難云貪嗔不善根與貪嗔業道同一剎那雖無別體根道義別故得説根業道究竟文豈無其謂哉次通因等起剎那等起論之者若就遣使殺等六惡業道及自作後方起等之類論之者約因等起心可云也若就自作六業道及後方起等並邪亦意三業道論之者約剎那等起可云也故彼第三釋云通據因等起剎那等起若遣使剎等六惡業道或時自作後方起等唯由近因等起三根究竟非剎那等起以剎那等起心不定故容起餘心非由餘心究竟故若貪嗔邪見唯由剎那等起起三根究竟非因等起若自行殺等七惡業道具由二種或因等起或剎那等起文此釋意大都合前二釋用之故不委之抑就三解釋聊似背論文故暫判正不之後之二解釋俱可為正也就之以實云之者初釋亦可正義也重難云第二第三釋意於意三業道立剎那等起云事道理未開其所以者俱舍一部中於一法體分其義門以名能等起所等起之例未考得之於異體分之例太多之則餘處論判中或云思即是意業所作謂身語文光法師釋之云思是能作能等起身語是所作所等起文或難等起善云若異類心所起得等云何成善此義應思文光法師釋云如疑心續善於善心後能引善得及四相起所起得等云何成善此義應思文正理論餘處文云此業依意復與意俱等起身語名為意業文此外約法論能等起所等起云事於綸論判及人師之釋歟次自判三解正不云初解非理文其非理之趣如何又述後二解是正之旨云貪等定由剎那等起文其意不可次光法師自既判正不以初解為非理以後二解為正今何助初解實為正義之旨成之哉答於意三業道立剎那等起之道理誠未通其源致然而先重豫引論文成之畢所謂以貪嗔等現在前時一一能令此三成故之論文正顯此旨故也然非謗無其證光法師釋述今偈頌之長行之時引正理第四十一三師之異説其第二師之説云有餘於此作是釋言即説此法由此究竟自體生時即業道故等文光法師釋云第二師説貪由貪究竟嗔由嗔究竟文寶法師引初二師之説畢云準上論文剎那等起名為究竟此等皆頌中云嗔由嗔究竟貪由貪究竟與正理論初師不同同第二師文兩祖一同之定判也何可疑之哉重案其道理是只貪嗔邪見起即業道故不立加行之謂也若由加行者立借前念力既無加行何可借前念哉明知自體還由自體而究竟云事然於體者無二故更不可論所出能出故於一體之上分二義以限之義為所由以道之義為能由論業道之究竟尤順道理歟被得如此成之時難勢悉被遮義道能成立者歟但於餘處論判解釋等者就三業論之故爾也何來為難勢哉次助初釋者第二釋中雖云約剎那等起於遣使殺等六業道者云亦通果心所作究竟故似背殺麁語嗔恚究竟皆由嗔等之定判若爾初釋意還存道理何可背論文哉之志自顯其旨前重成之畢何重可擬之哉尋云貪由貪究竟嗔由嗔究竟之時等起稱如何可成之耶答能起在貪根及相應心心所等起在貪道此則能起名等所起名起或能等起在根所等起在道難云根道義別隱顯互彰前念顯根隱道後念顯道隱根者光法師之當解釋也若約一念分根道者豈不致相違哉答道者目思之所遊履之義根者目令法增長之義若爾設雖約一念何不分根道二門哉於光法師之解釋根道之二門或約前後論之或約一念論之何強可一準哉此事論家之異説人師之往釋也敢不可處聊爾恐繁不要委可見光寶兩祖之解釋文貞禪大僧都祇短抄及文義要中被記之問殺生業道依貪究竟義可有耶答可有此義也兩方若有此義者殺麁語嗔恚究竟皆由嗔者偈頌之所顯也明知無依貪而究竟之義云事若依之爾者見餘處之論文或述剎那緣起之相云依貪行殺云云取意殺生業道依貪而究竟云事炳然也答於殺生業道究竟之心可有二心所謂一異心則貪俱生心是也二不異心則嗔俱生心是也殺麁語嗔恚究竟皆由嗔者明不異心之究竟也依貪行殺者明異心之究竟也例如今論餘卷中明業道思俱轉之時述不善業道三俱轉之相云三俱轉者謂以嗔心於攝他生俱時殺盜若爾所説偷盜業道由貪究竟理應不成依不異心所作究竟故作如是決判應知也文意顯也如此成之時兩方之疑非相違者歟問盜業道由嗔究竟義可有耶答可有此義也兩方若有此義者盜邪行及貪皆由貪究竟者偈頌之所定也明知不可有此義云事若依之爾者見餘卷之論文述不善業道三俱轉之相云以嗔心行殺盜云云取意盜業道由嗔而究竟云事炳然也如何準上疑之答可得其意也仍略云云問光法師意以擇滅為名色體可云耶答為名色體可云也兩方若為名色體者蘊不攝無為義不相應故者餘處論判之所顯也而名色者以五蘊為體明知擇滅是非名色體云事若依之爾者光法師今解釋中以擇滅為名色體見如何答論中明業道依處之時以有情具名色名身等處起之偈頌為三三一三之四節還配上殺麁語嗔究竟體所餘由三之頌文顯其起處之中光法師述第三節邪見業道之所緣作二釋其初釋意云色蘊是色餘四蘊是名此中且據緣有為説文此釋不以擇滅為名之體為言其之一顯也既二釋意云色蘊是色餘四蘊及擇滅是名邪見不緣虛空非擇滅此中不説是名所攝言非色法皆名名者婆沙云諸法有二分謂色非色名在非色分中故總説非色分為名文此釋以擇滅攝名中以為名之體色法不待名而其體自顯非色法非名其體不顯故依名所顯之法皆悉得名之名故擇滅亦由名而顯豈不攝名中為名之體哉為言若爾一方難勢中名色以五蘊為體者初釋意也是常途之所談也仍不可致劬勞故不及引證第二釋意非常途之所談故以婆沙之説為證所成云也既得本據何如重難云見餘處之論文或述又諸有為法謂色等五蘊亦世路言依或云名無色四蘊文如何可會之哉答是則只如前初釋之證據也何為重疑哉問光法師意麁惡語表業必依名等起可云耶進云光法師解釋中判有麁惡語不依名等不必依名等起見付之麁惡語是有情名聲之所攝也必依名等而起可云也若有不依名等之聲者寧可成語業哉是以披餘處之論文云有情名聲謂語表業文何況麁惡語既為業道之所攝別不與名等俱生者更不可有詮表何可有待解義緣成業道之義哉答一切三性語業及虛誑離間雜穢等三語多皆依名等而起其旨如難勢然而其中自有不依名等而起之類何為強善哉況今釋非無依憑則引正理論此語表復有二種謂依名起及不待名起之文證也其不緣名起之豈非麁惡語之所攝哉其麁惡語亦非一切不依名等而起不依名等之類者則於云云如吠吒等文豈云不爾哉但於有情名聲謂語表業之論判者彼亦從多分云爾歟以何知者光法師以化語為非業之釋意會彼文云彼似業如鏡中之火似火而非真火云云取意化語既似語而非語麁惡語豈不爾哉次於不與名等俱生者難有詮表之難者誠以難思然存一義者準化語可得其意者歟不可相違重難云光法師餘處一釋意以化語為非業故似語而非語之旨成之尤有其謂於吠吒等麁語者既成業成業道寧可例彼歟況正見正理論之文雖云及不緣名起未正云麁惡語若爾今此不緣名起之語者若指化語歟被得何忽可關麁惡語哉光法師解釋難思如何答正理論文正云麁惡語之時有此文何可關化語哉一義云正理論文是餘師之説非衆賢之正義光法師彼論中有此説故為顯此義作兩釋之中為一義暫任此釋之談也何可依此釋亂一宗之性相哉問殺生等加行究竟時必成彼根本業道可云耶進云論中述俱死及前死無根依別故不必成之見付之既殺生等加行究竟之時分也何可有不成根本業道之義哉是以披餘處之論判云造逆定加行無離染得果文若夫殺等加行滿時不成業道之義有之者何無造逆罪加行之人離染得果之義哉若依加行之罪墮那落迦者加行之外立根本業道豈非無用耶答光法師述俱死及前死無根依別故之道理者以所殺生現命猶存不可令彼俱死前死能殺生者成殺生罪以所殺生命未斷故夫成業道命斷方成非俱死前死能殺生者其命已終至第二念可得殺罪所以者何至第二念雖所殺生其命不續彼能殺者以更後有身別依生故謂殺加行所依止身今已斷滅落謝過去至第二念雖有別類身同分生非是殺罪所依止身此身曾未起殺生加行成殺業道理不應然文解釋既明鏡也非學者可劬勞但此釋之時既殺生加行究竟之時分也何可有不成根本業道之義哉云難自被遮畢但於餘處造逆定加行無離染得果之論判者誠以難思然而推之云造逆定加行者指近因等起非遠因等起被得若起逆罪近因等起云程之人必今生起彼根本業道故順次必墮捺落迦故起彼定加行之人無今生離染得果之義云歟被得故光法師餘處所引顯宗論云然我所宗無間加行總説有二一近二遠近不可轉遠可轉義文不可有相違重難云俱死及前死無根依別故之所判頗難思凡身語二業依意業而起隨意業判性類如云思即是意業所作身語云於轉善等性若爾今生依三根起殺加行之人命終生他世之時設不成身語二業定可成過去三根相應意業其時過去所殺之人斷命之時今意業則究竟何不於今意業立殺業之名哉若彼意業得殺業之名者俱生貪等則可為業道哉又今此位雖與起加行之依身是異未捨能發意業何無成根本業道之義哉次以逆罪近因等起名定加行故今生必令業道究竟者餘殺罪近因等起亦可得定名若爾何可定俱死及前死無根依別故哉答殺生業道者是色業非意業彼表無表必命終之時捨之故後世未發加行故不能發根本此是宗之所談也更不可難之又今生所起之三根後世成之者是法後得非其法體何可為業業哉意業例之可知意業與色業雖為能所發得不得成不成捨不捨等之緣隨應遂不同也混而不可難也次於餘殺業道之例難者光法師述此事云若造餘惡業道加行中間若聖道生業道不起經至聖位所依心身與彼惡業道定相違故以彼業道劣聖道力強能令此業不得現起得入聖離染道劣不能令彼惡業不起文又難云顯宗論意設雖造逆加行近因等起以前可有離染得果之義歟被得光法師意於逆罪近遠二種等起中間者不入聖於餘惡業道二種等起中間者可入聖被得豈不致相違哉答尋云盜等六業道加行根本同殺生耶答問所殺人住死有時能殺人成業道可云耶進云光法師釋云宗許命終後方成業道故文付之以道理思之尤可云所殺人之住死有之時能殺人成業道哉是以論中云至命未終如是皆名殺生加行隨此表業彼正命終此剎那頃表無表業是謂殺生根本業道文宗許命終後方成業道之定判豈不違此等文理哉答此事源起於發智本論之説相終及于俱舍正理之決判仍其文於論處處其義散出在在故不能具述要述也所謂披光法師之解釋或判凡論殺生令命不續故於續方成業道現在命猶存如何成業道或述以所殺生現命猶存不可令彼俱死前死能殺生者成殺生罪以所殺生命未斷故夫成業道命斷方成非俱死前死能殺生者其命已終至第二念可得殺罪或云殺據命斷現命不續方名業道故言殺已文任此等解釋非所殺人之住死有之位能殺之人不成業道而於所殺人命終以後之初念能殺之人成業道云事實以明鏡也何可致以道理思之尤所殺人住死有之位能殺之人可成業道之難哉但於論文者光法師則會之云而前文言彼正命終成業道者於過去事説現在聲或於加行因中假立業道果號文此亦非無證據所謂正理論云決定死後業道而前所言正命終者於已往事却説現聲如有大王自遠已至而問爾者從何所來或此於因假説為果文何足為疑哉尋云本論文云加行未息文毗婆沙師如何釋之今論如何破之正理如何救之俱舍師如何責之耶答毗婆沙師釋之云此中於後起以加行聲説文意云於斷命初念以後立加行之名則以後起名加行此是以所殺人之死有為能殺令成業道之位為言今論破之云應説根本説加行聲許命終後根本未息故文意云毗婆沙師以命終以後總名後起者正命終位可成根本業道豈不違俱死無根之宗義哉妄改前解釋於死有之次一剎那根本位立加行之名為言正理論救之云豈不根本及與後起皆於所殺死有後生俱可名為殺生後起是故應信之婆沙師於本論文極為善釋意云死有之後初念第二念等皆在死有之後對死有何不名後起哉若爾於後起之上立加行名云毗婆娑之説應理為言俱舍師責之云若作此救義實無違然後起言不分明故文意云前毗婆娑之説致違宗汝正理師助彼説如此成者非相違後起之言頗相濫以根本之後名後起以後起前名根本而今根本後起今論以名後起似不辨加行後為言可思之俱舍論中引本論之全文恐繁不引可見論之也又此疑者雖可在上記明業道時之段今思出之具記之也問頌文云殺生由故思他想不誤殺文爾者寶師如何釋耶進云寶法師釋云明殺業道相具三緣成殺生一由故思二由他想三不誤殺或開為四殺生為一緣也文付之依解釋見論文述要由先發欲殺故思於他有情他有情想作殺加行不誤而殺謂唯殺彼不漫殺餘依五緣立殺生見依之光法師解釋中云具此五緣名殺業道文何況頌文所摽之殺生者總舉業道也未出其緣何加彼為一緣總可判或開為四哉答凡於一文含多義故於今此半行之頌或見三緣或見五緣之意趣有之所謂寶法師意以故思為一緣以他想為一緣以不誤殺為一緣故以為三緣光法師以故思為一緣以他為一緣以他為一緣以想為一緣以不誤為一緣以殺為一緣以為五緣也兩祖之所存以之為異雖於偈頌者兩祖之所存未知其順不披長行之時如難勢開五緣之旨分明也光法師則依長行見偈頌故以為五緣也寶法師以偈頌押長行則以於他有情他有情想為一緣以不誤而殺為一緣以為三緣也聊雖似背文如此之釋義其例非一何可為強之疑哉是則違光法師之釋義故作如此之釋歟重意云光法師以長行考偈頌寶法師以偈頌計長行然光法師意是順也善法師意是逆也然而寶法師意一分非無其謂何無用之義哉如此得意之時疑難自被遮畢但於或開為四之釋者誠難思退推之此釋意以不誤殺之殺之言立業道之稱之義存之時初所標之殺生之言以之為一緣為言可思之也此事非指疑故不委之宜見寶師之釋又雜心有文同可考之問盜業道者為必於現人成之為當於過去人成之義可有耶此疑者十五卷抄中記之仍第二重等略之今題目可得其意名目頗有憚故以隱顯義如此作之然而及問答決擇之時必可出其語豈無其憚哉大方論義者相稱相稱有憚之名目可禁之也貞禪大僧都祇短抄中舉問題問婆沙評家意盜現在率都物者於何處結罪耶雖為先匠之善言庸愚之淺才聊憚之後學必可存故實也問論中述虛誑語業道解義緣云善言義者無迷亂緣耳識已生名為能解文光法師述此文作云耳識能解云意識能解二釋爾者以何釋為正判耶進云光法師釋云雖有兩解意謂前勝文付之耳識是五識之所攝也五識既無有分別何可立能解之名哉是以披餘處之論判云説五無分別由計度隨念以意地散慧意諸念為體文若夫於耳識許能解之義者豈可立計度隨念二分別哉付之見當卷之論文難耳識能解之義云然未了知如何正聞可名能解文何況見下解釋述如無失者應取為宗之論文或云正聞能解名解或云聞正解名解之二釋作之時全不云意謂前勝哉答此事誠以難思更無處于設會通一一皆負難誰可救之哉然而聊有所可思所謂見次上之論文舉云已聞正解名解正聞能解名解之二義畢兩開徴之其中於意識已聞正解名解之義者以了言所詮義為德以具無表不具表業為失於耳識正聞能解名解之義者以不了言所詮義為失以並具表無表為德見而虛誑語業道既通表無表明知耳識正聞能解名解之義順業道之義順業道之談旨云事故以前解為正為言被得況見論文云耳識已生名為能解故是耳識現前位非意識現前位云事分明也所判意謂前勝也但於難勢者五識雖無計度隨念二分別既有自性一分別亦雖無勝分別既有劣分別何無評解之義哉是以下解釋中以耳識名正聞名能解以意識名已聞名正解見正能之二字可思之次於述如無失者應取為宗論文之釋者具解義緣之時成虛誑語故論主隨應亘正聞能解已聞能解之二義之旨成之又業道通表無表故限正聞能解之一義之旨成之兩釋各有其謂故所不及正不也況二解俱無所背論文何可有所簡哉尋云寶法師意如何釋之耶答見寶法師解釋云論主評取正聞能解成業道也文又尋云正理論意正聞能解已聞正解二義中存何義耶答披正理論文云是故理應善言義者住耳識位業道即成能誑具足表無表故文問仙人意憤成殺業時有表業可云耶答依光法師解釋表業有無是可不定也兩方若有表業者凡表業有無隨時不定也設雖仙人意憤成殺業之時何有表業可云哉是以光法師解釋中云遣使殺等根本成時有何表耶文而仙人意憤義等教他者正理論之施設也定知於今此無表業云事若依之爾者今論中述欲無無表離表而生欲界無表必依表業而生見設雖仙人意憤成殺業之時何不發表業而成無表之義可有之哉答光法師會當處欲無無表離表而生之論文與餘處非必定依表業而發之論文之相違當處餘處同大作二釋其中以欲無無表離表而生之文為本之時立欲無無表離根本表而生之義以非必定依表業而發之文或為餘師之義或會非必定依自類表發以非必定依表業而發之文為本之時立非必定依根本表發之義以欲無無表離表而生之文或為餘師之義或會欲無無表離加行表生此兩釋思之於遣使殺等根本成之時表業有無是不定也是以婆沙之評家成有表業之旨光法師依今論餘處之文述遣使殺等根本成時有何表耶而仙人意憤義等教他者正理論之定判也若爾仙人意憤成殺業之時或云有表業或云無表業之二意可有之也如此得意之時兩方之疑難還為講答之潤色者歟布灑他之時虛誑語表有無事準之可思之歟問頌文云染心壞他語説名離間語文爾者寶法師具幾緣判耶此疑者貞禪大僧都祇短抄中被載之然而非指題目之上上所記之殺生業道緣此風情故第二重等略之若欲悉之者披論文及光法師寶法師神泰之釋可擬之但彼抄中悉被引之問頌文云諸染雜穢語餘説異三染文爾者初師意雜穢語表業與虛誑語等表業其時同可云耶答可云其體不同也兩方若同者雜穢語無表與虛誑語等無表其體既不同也彼此表業豈同哉加之邪行表業與殺盜表業不同也相例可爾何況第四語與前三語其緣亦不同也其體何同哉是以光法師解釋中云此師意説雖有獨起雜穢語若前三語起時必兼雜穢文若依之爾者披論文述此師意云一切染心所發諸語名雜穢語所以者何染所發言皆雜穢故文文相之起盡無爭其體是同被得加之見上論文問若所誑者未解言義此言是何答是雜穢語豈非述此師意哉答今論意説雜穢語有二種一俱起雜穢語二獨起雜穢語也此中俱起雜穢語者前三語起之時必與彼俱起雜穢語也獨起雜穢語者前三語之外不與彼俱起雜穢語也此則二師異説之意也初師存俱起雜穢語之義兼存獨起雜穢語之義頌云諸染雜穢語即是也第二師存獨起雜穢語之義不兼存俱起雜穢語之義也頌云餘説異三染即意也故光法師述初師意云此師意説雖有獨起雜穢語若雜穢語若前三語起時必兼雜穢語文又述第二師意云此師意説無前三語染心所發方名雜穢語皆是獨起雜穢語也前三語起時必兼雜穢有此不同故敘異説也文爰知諸染雜穢語之初師意發前三語表業之時必別發第四語表業也故論或云一切染心所發諸語名雜穢語或云若所誑者未解言義此言是何是雜穢語也若不與前三語同發雜穢語者難云一切染心亦難云諸染之故也若夫於前三語立二名者不然前三語與第語其相大異故是以無表既異也表豈同哉其旨如一方之難勢依之重考下解釋云問前三語起必兼雜穢表無表業四各別耶今法師等解云雜穢有二謂即獨雜穢即前三語義説雜穢離前三語別起佞歌等名獨雜穢今解不然即獨之義當成實論非是此宗若依此宗前三語起同時別有雜穢語體名俱起雜穢語若離前三語別起佞歌等名不共雜穢語總而言之若三語俱起有三表三無表若四語俱起有四無表故衆事分明受五戒人一時俱得五表五無表彼善業道既得俱起不善業道理亦應然文如此成之時難勢所舉之論判皆悉被會畢何為違文哉重難云披餘卷論文述業道思俱轉之相云一俱轉者謂離所餘貪等三中隨一現起若先加行造惡色業不染心時隨一究竟文光法師釋此文云若先加行遣使殺等造六惡色業不染心時隨一究竟亦一業道而思俱轉文準此等文前三語起之時不兼雜穢語被得若前三語起之時必兼雜穢語者惡色業起之時唯第二與語一之三業道隨一可起何可云六業道隨一哉前三語必兼雜穢語故知不兼雜穢語故殺等六業道除邪行各一業道與思俱轉更無二業道與思俱轉之義云事如何答此難尤可然暫回愚推云論於二俱轉之相云謂嗔心時究竟殺業若起貪位成不與取或欲邪行或雜穢語文若前三語起之時不兼雜穢語者此中尤可出前三語既不爾唯出雜穢語明知前三語必兼第四故宜三俱轉之攝故今舉不與前三語俱起之獨起雜穢語以為三俱轉之攝事故光法師釋云問何故不説誑語等三解云有雜穢語離誑等三若誑等三由非時故必兼雜穢此中明二俱轉故但説雜穢不言虛誑等三文又難云頌云殺麁語嗔恚究竟皆由嗔盜邪行及貪皆由貪究竟邪見癡究竟許所餘由三有情具名色名身等處起文準此頌文雜穢語必不與麁惡語故俱被許若雜穢語必與麁惡語俱者雜穢語亦於有情處而可起既於名身等處而起於有情處而不起明知雜穢語不與麁惡語俱云事例麁惡語思之誑語離間準例可同如何答此難亦尤可然但案之此約獨起雜穢語論之也無相濫故若約俱起雜穢語者可有其濫故如此判歟此疑者在貞禪大僧都祇短抄中但彼以前三語亦名離穢語之義被成之其義聊難思之間即別所成此義頗以有其恐先賢宜致觀後學尤所病也又委細引文在彼抄須見彼也問今論意雜穢語業道具解義緣可云耶答不具之可云也兩方若具之者披論文之前後上偈頌文結殺生由故思他想不誤殺述染異想發言解義虛誑語畢下長行中判離間語之相説解義不誤流至此中明麁惡語之相云解義不誤亦與前同文而至下釋雜穢語之相云唯前語字流至此中文若夫於雜穢語具解義緣者何不云解義不誤流至此中哉若依之爾者前二語既具解義緣第四語豈不爾哉是以婆沙論中述不生領解非四所攝具解義緣見設雖今論意寧可違本論婆沙之説哉答前三語必對所誑所離所罵之人發之故具解義緣尤有其謂於第四語者無如此之相故不具解義緣也其旨如一方之難勢如此得意之時前三語之例難自被遮了但於婆沙論文者論主以理為正非以婆沙評家為量之光法師處處之定判也不可始疑之一義云於雜穢語具解義緣可云也其所以者今論中説雜穢語有二師異説所謂謂諸染雜穢語云餘説異三染是也此中初師是今論之本義歟被得以何知然者於第二師之餘説故也而光法師釋初師意若前三語起時必兼雜穢然雜穢語他不領解非四語業道收文此釋同難勢所舉之婆沙文則光法師引之證上釋若爾解釋既具解義緣之旨分明也論意豈不爾哉但於論文之起盡者於前三語者解義緣顯了故故舉之於第四語者此緣不顯了故不舉之可云也重難云於獨起雜穢語者立解義緣尤有其謂於俱起雜穢語者難立解義緣所謂若生前三語之領解者雜穢語難成若生雜穢語之領解者前三語難成故也次光法師引彼婆沙文畢云準彼論説更加一緣所謂解義文劣爾今論意於雜穢語不許解義緣見如何答凡前三語極微必各各與雜穢語極微俱生其師若所誑等者於誑等極微生解之時雜穢極微隱而不顯若於雜穢極微生解之時誑等極微隱而不顯也豈不爾哉四語成不成以之可思之例如長短輕重等極微一法中雖俱生依物依時一隱一顯也次於光法師解釋者此亦暫任論文之顯如此判也非謂今論意實不具解義緣故加一緣歟問於雜穢語立不誤緣可云耶答不立之可云也兩方若立之者論衆中不立之見若依之爾者婆沙論中立解義緣見不誤緣相例可同如何答光法師解釋中述於雜穢語有解義緣之旨畢下云或云雜穢亦有不誤乃至若據斯義或具四緣然前解為勝文以知不立之云釋是勝云事若爾任光法師意不立之義所成之也但於解義緣者其相異不誤仍不可為相例可思之一義云可立之也如光法師之釋但於然前為勝者於云諸染雜穢語餘説異三染之二師異説所判正不也全非於不誤緣具不具判正不其所以者更於云具釋之上無有云不具之釋攝何物可判前解為勝哉可思之此疑者許無攝事就文義有委曲能可思之恐繁略之問以欲界五部貪悉名業道可云耶答唯以欲界修所斷貪名業道不以見所斷貪名業道可云也兩方若悉名業道者凡惡欲他財貪者論判之所定也而惡欲他財者唯限修所斷之貪不通見所斷之貪見是以光法師判今論中或云以欲界五部貪名貪業道或云唯以修所斷貪名貪業道之二師正不云於二説中後師為正以見斷貪不緣財故文若爾不以欲界五部貪悉名業道見若依之爾者今論中於貪分輕重以重為業道不以輕為業道見而出輕類之時唯舉輪王北州之貪以知見所斷之貪可得業道之稱云事若夫不以見斷之貪為業道之攝者寧不以見道所斷之貪類輪王北州之貪哉答凡見所斷貪等是重迷惑故唯緣自迷理惑不緣色聲等事法彼修所斷貪者是迷事惑故直緣自他事法不緣理及無事惑而論中述貪業道之相偈頌結惡欲他財貪長行云於他財物惡欲名貪文論判之所顯併是修所斷貪更非見所斷貪歟被得況有二師異説述此義之時初師意云有餘師言諸欲界愛皆貪業道文第二師意有説欲愛雖盡名貪而不可説皆成業道此惡行中攝麁品故文光法師判二師之正不云於二説中後師為正以見斷貪不緣財故文唯以欲界修所斷貪為業道不以見所斷貪為業道云事文理實明鏡也但於舉輕貪之中不出見斷貪云難者唯以修所斷貪為業道不以見所斷貪為業道云事其理必然故舉輕類之中不出見斷貪也於輪王北州之貪者就修惑貪而是輕故舉之也彼此品類遙異也更不可相例若舉如此之疑者色無色界貪亦可疑之何不爾哉如此得意之時全非難勢者歟重意云論中為遮輪王北州貪之例難者勿輪王世及北俱盧所起欲貪成貪業道文正理論意大總同此論又寶法師亦判正不云第三説為正文故不違光法師定判也尋云光法師判於二説中後師為正寶法師云第三説為正第二第三不同如何答光法師意長行於他財物惡欲名貪等之文述偈頌惡欲他財貪之句故非別師至下云有餘師言諸欲界愛皆貪業道云有説欲愛雖盡名貪是其二師異説也為言寶法師意以於他財物惡欲名貪等之文為一師故有二師異説為言若強論兩師釋之順不者光法師之所判尤有其謂歟所謂初文先不分見惑修惑述偈頌意之許也至下論五部一部差異之時有二説故也寶法師意以初文則為一師也若如此者可以初師為正順偈頌故既以第三為正豈不以順頌之文為正哉可思之問聖者起癡所引離間等三語可云耶答不起之可云也兩方若起之見光法師餘處所引婆沙論之文不起之見若依之爾者今此聖者起貪嗔所引之三語見癡所引之三語相例可同如何答凡聖者於殺生不與取欲邪行虛誑語飮酒之五罪決定不行之故得不作律儀是以經生之時設雖有捨先生所受近事無表而不得之無犯之故於語四業道中之虛誑語者三根之所引悉所不起之也如餘處論文中云邪行最可訶易離得不作云以開虛誑語便越諸學處也於離間等三語者可有分別所謂於貪嗔所引之三語者雖起之於癡根所引之三語者不起之也故光法師餘處所引婆沙論文云有餘復説若諸聖者經生不犯立近事戒聖者經生必定遠離虛誑語業非餘語業所以者何餘語有三謂從貪嗔癡生經生聖者雖不犯從癡所生見品攝故聖者已斷而犯貪嗔所生文如此成之時貪嗔所引三語之例難更不可來者歟重難云諸聖者必成就道共戒者性相之所定也而道戒既防七支性罪故七支惡非恚不可起也設雖離間等三語之從貪嗔而發之類有之何可起之哉次準今婆沙文癡者是見所斷不共無明非修所斷相應無明被得而見所斷惑不發道業何可有癡根發語四業道之義哉答見所斷惑不發道業者約近因等起論之也為遠因等起發之義更不可遮之如餘處論判中結見斷識唯轉述應言如轉心表成善等性然非如彼見斷轉心修斷轉心為間隔故也次於聖者不可起離間等三語之難者貞和五年巳丑二月十二日酉時於東大寺藏輪院之草庵終二十六條結集之為功畢此內多分任今案之旨記之少少披祇短抄及文義要録也但彼抄中於義者遍被住之多是文許也仍任推意顯筆總頗可謂狼籍者歟抑捧結集之為功奉資宗廟三所之法味若然者內證四智三身之菩提外施濟生利物之巨益其功滿本之故圓範除病延命令成就圓滿六卷結集之願望矣法界衆生普皆回向而已右筆三論宗權律師上人位圓範六十二四十八問依身無色有學聖者必成過去律儀可云耶答或云必成或云不必成古來兩義可有之也兩方若必成之者於已離色染超越證不還及已離色染練根得不還者設雖不修勝果道生無色成果道攝無漏故兼成過去律儀如以有漏道斷欲界下三品及色界四靜慮修惑不還之生無色預流一來向果之外無起無漏道依何忽成過去律儀可云哉是以婆沙論一師意依身無色有學聖者不必成過去律儀見若依之爾者今論中云謂聖有情生無色界成就過未無漏律儀文如論判者必可成之被得如何答此事遠者秀惠顯範諍雌雄近者良忠聖禪競鉾楯末學後輩輒及取捨畢然而依身無色有學聖者必成過去律儀者祖師法印權大僧都相承之實義也仍今所成其旨也夫三乘行果之梯橙者惑品從麁斷之道品從劣起之修惑從上上斷之修道自下下起之良以不斷麁品斷細品不起劣道起勝道之義是不可得之歟若夫不起劣道起勝道者宜不斷麁品斷細品則不斷下界見惑斷上界見惑不斷細品則不斷下界見惑斷上界見惑不斷上中修惑斷中下修惑之義可有之歟乃至不斷欲界四靜慮修惑斷四禪四無色修惑之義亦可有之若如此者則不起加行道起根本道不起無間道起解脫道不起見修道起修無學道等之義亦可有之若許此義者非只背皆許極成之道理六足發智俱舍婆沙之性相忽為徒然還非有部一宗之愁吟哉故考守金言不亂麁細淺深之階級二乘賎教敕無違強弱劣勝之鉤鎖解脫決擇見修無學之次第誰可疑哉就中至正斷惑門者其旨彌決然也所謂菩薩麟喻自乘修行滿然後將斷惑證果之時必凡位預以有漏道斷無所有處以下煩惱是則於一座成覺之間顧煩勞之故也又用無漏道者為有漏道之不及也於下八地惑品者俗智盛作之何用起無漏智哉聲聞中若有一座成覺之類者同可有此意也設雖非一座成覺之類自可有如此行之類也若爾三乘俱於凡位以有漏道斷無所有處以下煩惱之義已成立其中於菩薩者極上利根人故有學徒不起無所作道故第十六心無間不起加行直起有頂上上品惑能治無間道則名之超間道是不起初定以上無所有處以下能治無漏故然不亂行位之次第所以然者第十六心當不還果之坪有頂初無間道當羅漢向之初念故也然無不起下地能治之至於凡位已以有漏道勤彼所作故故見惑能治十六心修惑能治十八心合論成三十四心也麟喻雖利根不及佛智故不能起超間道第十六心無間於上七地已斷煩惱之上從初定能治初無間道乃至無所有處能治第九解脫道擬宜起之則名之勝果道亦名羅漢向道攝然後兼起有頂能治初無間道乃至起初盡智三十四心如菩薩其上加中間七地能治無間解脫百二十六心總成百六十心也是則第十六心已當不還果之坪以不還果名離欲果離欲果無間起初定一品能治無間道名羅漢向道初念之謂也若不起中間一百二十六者離欲果心無間可不得起有頂能治初無間道離欲果是極麁也有頂初無間道是極細也極麁心無間如何可生極細心哉既超一百二十六重之階級豈非懸隔之至極哉故欲起有頂能治後道之時須先悉起中間七地能治前道也若不起前道欲起後道者何異不斷下地惑欲斷上地惑哉是皆不可得其又於同羅漢向道中何起少分不起多分哉就中麟喻者佛同依第四靜慮一座成覺然第四靜慮非下三靜慮能治地而乍依第四靜慮擬宜起下三靜慮各各九無間九解脫道豈非無用之至極哉然猶為證後道以籍前道為阿羅漢向道起五十四心為簡異超間道不失剎那次第勝果道之指南實在斯於聲聞若有一座成覺之類者宜類之可知但不必以第四靜慮為所依又不可限一百六十心其旨恐繁略之抑於三乘中菩薩最上利根人故三十四念成覺是於上七地已斷煩惱之上不起勝果故也麟喻雖勝聲聞不及大覺故一百六十心成覺是於上七地已斷煩惱之上雖起勝果道不起自餘無所作道故也聲聞中設雖一座成覺之類非只於上七地已斷煩惱之上起勝果道亦猶可起無所作道故不可限一百六十心一座成覺之類猶不限一百六十心況非一座成覺之類於初禪以上之惑寧可有不起勝果道之義哉是以正理論中云諸有先離無所有染入聖者唯除菩薩餘亦定於二界一切修斷離繫得無漏得彼皆必於二界修斷自勝果道兼現前故文又云謂聲聞獨覺無自在功力能超間起諸對治道欲證後道必籍前道以為加行方能證故文菩薩三祇之間斷不染無知於功德得自在故不用加行直起根本不籍前道能起後道故不起勝果道三十四心成覺其旨理在絶言於二乘者才致三生六十四生百劫之修行故如知不染無知品不除於功德豈得自在哉故不依加行難起根本不籍前道難證後道故麟喻之為二乘之長猶已斷煩惱之上重起勝果道況於聲聞哉聲聞一座成覺猶爾也況於非一座成覺之類哉非只正理一論中述此意亦今論餘處中云然諸先斷欲界修惑一至五等至得果時此生必定起勝果道由此先離三靜慮染後依下地入見道者亦起能引生後勝果道若異此者聖生上地應不可説定成樂根文光法師釋此文云然諸先斷欲界修惑一至五等至得果時此生必定起勝果道然後命終必無未起而命終者即引證言由此凡位先離下三靜慮染依下地入見道者彼得果也於現生中必能引起後勝果道若異此者聖生第四靜慮已上諸地應不可説定成樂根故知此身決定能起後勝果道文先離一至五等之類今生必起勝果道先離七八品之類義準亦爾也先離三靜慮染之類今生必起之者來生欲以無漏道斷餘惑之時無可籍之前道以何可起後道哉又既得勝果如何可起劣生所起之道哉故於一至五等惑之上並七八品惑之上今生必起勝果道也又先離三靜慮染者若今生不起勝果道生第四靜慮者欲以無漏道斷自地以上煩惱之時前未起劣道以何可起後勝道哉不可上地起下地道諸定依自下非上無用故也故亦不可以自地道為下地能治餘八離自上有漏離次下之故故此類永不可有斷餘惑證應果之義故今生必起勝果道所為其所由也彼本論中述諸聖者生第四靜慮以上諸地定成樂根及説聖者生於無色定有色貪盡斷遍知得故者為顯此等聖者悉今生必起勝果道之義也良以已離第三靜慮者依二禪等入見道之後若於三禪以下煩惱不起勝果道者此人生第四靜慮之時據何忽得成樂根又已離色染者入見道之後若於四靜慮煩惱不起勝果道者此人生無色界之時據何亦得成色愛盡遍知哉爰知本論云生第四靜慮之人定成樂根又云生無色之人得定得色愛盡遍知併欲顯此等諸人今生必起勝果道之義若不起勝果道者對第四靜慮之人不成樂根生無色界之人不得色愛盡遍知故也故今論述若異此者聖生上地應不可説定成樂根光法師釋此文云故知此義決定能起後勝果道文又餘處述麟喻一百六十心得果之相畢云以此準知觸覺亦得色愛遍知文尤足準例者歟先離之類皆以如此今時有漏道斷惑之類亦復爾也以何知者光法師所引婆沙論中或云一百四十四云有作是説無有學者生無色界不成就過去色以彼先在欲色界時於第三果或第四向必已起已滅方命終故其故本論説言若諸學者生無色界成就過去未來所造色若於彼得阿羅漢果成就未來所造色非過去所造色若謂不爾本論應説學者生無色界有不成就過去所造文或云一百三十二亦有兩説云有説彼在欲色界時必已起已滅諸無漏道如勝進道必起現前無有住果而命終故文或云一百二十二亦有兩説云有餘師説得聖果已必起勝果聖道現前故諸學者生無色界必定成就過去身無表業文今時有漏道斷或之類既爾也練根之類亦可然以何知者婆沙一百六十九云若爾便違十門所説其信勝練根作見聖者有説彼得果已必起勝果修道無漏四靜慮然後命終生無色文若爾者先離並有漏道斷惑及練根之三類悉今生必起靜慮攝勝果道之後生無色界此亦為有學聖者豈非必成過去無漏律儀哉文理既明鏡也更勿殘疑殆矣如此成之時諸難悉被遮畢但於婆沙一師之説者是不正義也在正義意之時以違彼全不可為病以何知者必起勝果道之義順道理順本論不必起勝果道之義違道理違本論故寶法師解釋中云婆沙一百三十二云有作是説亦有學者生無色界不成就過去身無表業有餘師説得聖果已必起勝果聖道現前故諸學者生無色界必定成就過去身無表業一百三十二一百二十四皆同兩説今譯許二説後説為正此論及正理皆同本論説不言無色有學有不成過去七支文又婆沙抄七本云二説中後師為正文矣重難云若菩薩之超間道是實義者聲聞之不起勝果道是可正義若麟喻之起勝果道是實義者設雖菩薩何可起超間道哉是一次於隨信行隨法行各有七十三人者出餘處論判若爾已離無所有處染所起之八忍八智無間起有頂能治初無間道是次第道之儀也何可名之超間道哉二乘聖者於今此中間名上七地能治以起無漏道豈非是剩哉是二次已以有漏道斷上七地煩惱無殘於此上重起無漏無間解脫豈非無用之至極哉若有漏斷惑非實斷惑者其是為無用又後時所起無漏道時斷之既後時無漏道不斷之還知前有漏道實斷之云事是以菩薩無於此上起勝果道一乘例可同是三次若有漏道斷惑之上重起無漏道者於欲界修惑先離六品之上亦可起能治無漏道彼既不爾上七地可爾哉是四次有漏道證中間二果者宗之所許也知於有漏道斷五品七八品之上不必起勝果道云事若爾上七地亦可同是五次本論定成樂根之文並得色愛盡知之説誠雖約先離三靜慮四靜慮者之時為必起勝果之潤色約聖位有漏道斷惑者之時未隨應必修六地無漏故彼樂根隨彼得色愛盡遍知故不必為必起勝果道之誠證者哉是六次今論然諸先斷欲界修惑等之文並光法師之釋約先離之類論之故猶難備必起勝果道之誠證者哉是七次於婆沙論文者光寶兩祖所引三處之説皆舉不必起勝果道必起勝果道之二師然無評文據何寶法師淨違忽可判正不哉就中於不必起勝果道之師者直舉其義不標有作是説有説有餘師説之名於必起勝果道之説者既標此三名還知必起勝果道之師是不正義云事是八次光法師雖引今此三處之全文無判正不於兩義何無左右取必起勝果道之義可存成過去律儀云義哉是九次約練根之類婆沙論中亦有二説同無評文準上可難是十次於先離練根之兩類者唯成有漏離繫得不成無漏離繫得故重所起勝果道也於有漏道斷惑之類者任聖二離八修各二離繫得之道理故不用起勝果道云豈爾哉是十一依為來俱舍三十講當處為被用意兼為紹隆佛法修學繁昌出東大寺北室庵乘坊學室如形書寫畢後覺之輩可愍其志而已永享九年正月日兼三論宗英俊
