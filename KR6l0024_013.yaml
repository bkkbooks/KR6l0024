body:
  text: 俱舍論第四卷抄下問題問光法師解釋中云馬勝苾芻為問四大種無餘滅位誓多林沒住六欲天乃至梵世文爾者今此運身者定內歟問馬勝苾芻可知四大種無餘滅位耶問馬勝苾芻運身後可作化事耶問無色界可有緣補特伽羅愛敬耶問論中敘經部宗義云乃至有頂應有尋伺文爾者與婆沙論所説譬喻者義同歟問光法師所引婆沙論中述評家義云非一切慢要方他起無始時來數習力故依自相續慢亦現行文爾者依自相續慢者唯限我慢增上慢邪慢三慢歟問無色界七慢俱可起之耶問婆沙論意依自相續慢引契經何文證之耶問有宗意心心所上所現影像為能緣用為當所緣用歟問今論意受苾芻戒時可捨勤策同分耶問品類足論文云復有所餘如是類法與心不相應總名心不相應行文爾者光法師意所餘心不相應行者唯限非得歟問光法師釋成就不成就相云據得非得流至現在相續已生文爾者初念得非得可有相續義耶問正理論文云先未得得説名為獲文爾者寶法師意先未得得者唯限從未來得得歟問光法師意可有唯有非得無得法耶問光法師意已生法上法俱得在未來義可有耶問寶法師意法前法後法俱三得其體可各別耶問三類智邊世俗智可有法後得耶問道類忍可有法後得耶問光法師明現在道類忍有法前得作三解釋爾者初釋意現在道類忍實可有法前得耶問金剛喻定可有法後得耶問隨能證道判離繫得性類歟問論文云若工巧處及威儀路極數習者得亦許爾文爾者述餘師義歟問威儀路四塵能造大種可有前後得耶問色界威儀心可有前後得耶問正理論意不串習者欲界威儀工巧心可有前後得耶問雜心論意不串習者欲界威儀工巧心可有前後得耶問光法師意初靜慮善身語表可發無表耶問於定共戒共前法俱二得現前位必可有法後得耶問非得可通異熟生耶問光法師所引婆沙論中出唯有法前非得法云謂未來情數畢竟不生法文爾者今此畢竟不生法者通一切未來不生法歟問不時解脫聖者所起盡智可有法後非得耶問光法師為證所不得法中無唯有法後非得句引婆沙論何文耶問婆沙論文明所不得法中無唯有法後非得句非無始來恆成就彼未捨必起彼類盡故文爾者寶法師意可許此義耶問寶法師意一類有情中可有永不證三乘菩提者耶問光法師意異生位可成就非異生法耶問論中明本法大得小得俱起相爾者第三剎那幾法俱起耶
