body:
  text: 俱舍論第二十二卷抄問題問頌文云已説煩惱斷由見諦修故文爾者已説者指斷遍知有九頌歟問付四諦名言唯名滅諦不名靜等三諦有何故耶問道諦可行苦攝耶問論中述經部宗義云有謂樂事是苦因故諸聖亦觀彼為苦者文爾者薩婆多宗意如何破之耶問經部宗意無色界可有樂受耶問論中引有頌云諸佛正遍覺知諸行無常及有為變壞故説受皆苦文爾者苦苦行苦壞苦中説何苦耶問經部宗意可許愛心所實有義耶問苦集滅道四諦俱可通世俗勝義耶問光法師所引婆沙論中釋聞惠依地舉三師異説爾者第二師意未至地可有聞惠耶問光法師所引婆沙論中明聞思修三惠加行得離染得生得相舉三師異説爾者初師意聞惠離染得唯限離有頂染位歟問光法師所引婆沙論中明聞思修三惠加行得離染得生得相舉三師異説爾者初師意修惠可通生得耶問光法師所引婆沙論中明聞思修三惠加行得離染得生得相舉三師異説爾者聞思修三惠可通離染得耶問光法師所引婆沙論中明聞思修三惠加行得離染得生得相舉三師異説爾者第二師意從上地沒沒生下地時可得色界聞惠耶問光法師所婆沙論中明聞思修三惠加行得離染得生得相舉三師異説爾者第三師意欲界聞惠并思惠可得生得耶問光法師所引婆沙論中明聞思修三惠加行得離染得生得相舉三師異説爾者第三師意色界聞惠中可有唯加行得非生得類耶問色界有情一衆同分中必可起聞惠耶問光法師所引婆沙論中明聞思修三惠加行得離染得生得相舉三師異説爾者第三師意聞思二惠可通離染得耶問聞思二惠現在前時可有未來修耶問四聖種中前三聖種唯限有漏歟問以生得善心所發無表可為聖種體耶問四聖種中得前三聖種時必可得第四聖種耶問不淨觀可觀大海耶問不淨觀於外色處可有別緣義耶問光法師解釋中明起不淨觀依身引婆沙論二師異説爾者今論意同何師説耶問不淨觀唯緣現在故寶法師如何釋之耶問正理論意不淨觀可通真實作意耶問除後有異生所餘異生所起不淨觀可通未曾得耶問離自地染位可得自地不淨觀耶問不淨觀可與聖道相生耶問不淨觀可攝初二解脫耶問斷初靜慮煩惱九無間道位修第二靜慮近分地攝不淨觀義可有耶問今論意依身在色界可起持息念耶問衆賢論師意持息念可通離染得耶問今論意持息念可通勝解觀門耶問雜心論意持息念可通勝解觀門耶問婆沙論意持息念可通真實作意耶問持息念可緣非相續法耶問欲界所繫入出息離欲界染第九無間道位悉滅歟問論文云謂要身中有諸孔隙出入息地心正現前文爾者寶法師意有幾緣耶問下三靜慮無漏心現前位入出息可轉耶問光法師意於羯刺藍等四位息轉四緣中闕幾緣耶問一剎那定心隨轉戒為唯限一具七支為當有多具七支歟問光法師意依身在第四靜慮約息轉四緣闕具作二解釋爾者第二釋意如何釋之耶問光法師意第二靜慮以上可有起威儀心耶問婆沙論文明持息念十七種觀中覺心行者緣想思心所歟
