body:
  text: 俱舍論第四卷抄上問題問論文云今應思擇一切有為如相不同生亦各異為有諸法決定俱生文光法師釋此文作二解釋爾者初釋意為一箇問歟問論文云謂一切法略有五品文爾者今此色心等五品法外可有餘法歟問頌文云欲微聚無聲文爾者立微聚名為唯限八事俱生為當可通九事十事等歟問正理論意立微聚名為唯限八事俱生為當可通九事十事等耶問光法師解釋中云發智言成就據一身中相續不斷文爾者一相續身中等流聲不間斷歟問寶法師意四大種不相擊發聲義可有歟問念法師意一相續身中恆成就聲歟問泰法師意一相續身中一切四大種皆遍發聲歟問正理論意四大種體增者為有多體故名體增為當增強故名體增歟問光法師解釋中云正理論師以世親論主造勝義諦論中敘用增家破遂不認此解文爾者為世親論主破用增義為當正理論師破用增義歟問婆沙論中可有四大種用增義耶問寶法師意四大種體增用增義俱盡理説歟問微聚中擊發電炎由何法耶問光法師意色界微聚可有五事俱生義耶問光法師引婆沙論説明心所諸地法相爾者大煩惱地法中不説惛沈故如何釋之耶問經部宗中可有計十大地法心所實有義耶問論中明輕安心所云如何可立此為覺支文爾者於餘覺支可有身心差別耶問光法師述經部宗義云由入定故身中即有輕安風起能引覺支心輕安故文爾者今此能引所引可同時歟問正理論意以欣厭心所可立大善地法耶問善心現前位必可起欣厭隨一耶問寶法師意惡作心所為唯自力起為當可通隨從起耶問寶法師意睡眠心所為自力起為當隨從起歟問本論所説十大煩惱地法中心亂以何為體耶問本論所説十大煩惱地法中無明望十隨眼中無明時其體可同耶問光法師意依幾義建立少煩惱地法耶問寶法師意以大煩惱地法大不善地法心所不立小煩惱地法故如何釋之耶問貪嗔二惑可俱起耶問小煩惱地法十種心所聖者悉起之歟問小煩惱地法十種心所北州悉起之歟問小煩惱地法心所中歡行轉煩惱等流不與歡行轉受相應類可有耶問大善地法心所為自力起為當隨從起歟問光法師意睡眠心所為自力起為當隨從起歟問光法師明睡眠心所自力隨從相作四解釋爾者第二釋意睡眠心所與不共無明相應歟問今論意不共無明唯限見所斷歟問光法師所引正理論文云然此惡作通善不善不通無記隨憂行故離欲貪者不成就故文爾者離欲貪者不成就故者釋上隨憂行故歟問惡作心所唯與憂根相應歟問雜心論意無記惡作與憂根相應歟
