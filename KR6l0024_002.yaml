body:
  text: 俱舍論第一卷抄上問真諦三藏所譯俱舍論中有幾謬耶進云光法師釋云略舉二三文付之見光法師解釋舉舊俱舍論謬云現法非得先哲同疑常非果因前賢莫辨文若爾唯舉二事之謬何釋略舉二三哉答現法非得與常非因果為二常非因果之中開果與因為三云略舉二三歟或又文面雖舉二事為顯猶有謬事舉此等二三云意歟問佛𣵀槃後六百年造婆沙論歟答四百年中造婆沙論也兩方若六百年中造之者婆沙論中六百年中不造婆沙論見若依之爾者嘉祥大師釋六百年間有五百羅漢是旃延弟子於天竺共造婆沙釋八犍度妙樂大師弘決一本判釋迦滅後六百餘年北天竺國五百應真共撰集於世尊所説任此等定判佛𣵀槃後六百年中造婆沙論見如何答見婆沙論奧文云三藏法師玄奘譯斯論訖説二頌言佛𣵀槃後四百年迦膩色迦王瞻部召集五百應真士迦濕彌羅釋三藏其中對法毗婆沙具獲本文今譯訖願此等潤諸含識速登圓寂妙菩提文佛𣵀槃後四百年中五百阿羅漢造婆沙論云事此文甚分明也故婆沙抄中述如來滅後第四百年造婆沙論之旨也但於嘉祥妙樂兩大師解釋者彼依舊婆沙論文歟故勘舊婆沙論序云問造婆沙論五百阿羅漢可通六種姓耶答可有二義也兩方若通六種姓者人師解釋中唯可限第六種姓見若依之爾者見婆沙論文復次有説異師甚多所述之義邪正相分若根無利鈍者何義有邪正哉答此事暗依難定且可存二義也一義意云造婆沙論五百阿羅漢唯可限第六種姓也故圓暉法師明造論緣起云於無學內定滿六通智圓四辨內間三藏外達五明方堪結集故以簡留文淨達法師釋婆沙抄一本云更復宣告唯無學住猶是太多告唯不動性者住猶多後告若能博通三藏具解十八部諸知韋陀書者住文任此等解釋造婆沙論五百阿羅漢唯限第六種姓之旨炳然也但於婆沙論中復次有説異師甚多所述之義邪正相分云難者第六種姓之內其根亦可有勝劣歟如彼婆沙論百五十二中述無學聖者所起滅盡定有九品不同云始得不動種姓所起為上下餘本得不動種姓所起為上中波羅蜜多聲聞所起為上上也一義意云造婆沙論五百阿羅漢可通六種姓也以道理思之五百阿羅漢其類既繁多也種姓廣可通利鈍何唯限利根一類哉即以其義有邪正可知其根有利鈍也但於人師解釋者圓暉法師並淨達法師定判歟彼且顯一會之勝事更可非再往之解釋也問大毗婆沙論梵本唯有十萬頌歟答今二百卷大毗婆沙論梵本唯有十萬頌也兩方若唯有十萬頌者大毗婆沙者梵語此翻廣説何唯限十萬頌哉若依之爾者圓暉法師解釋中大毗婆沙論梵本唯有十萬頌見如何答佛𣵀槃後四百年中迦膩色迦王召集五百阿羅漢於迦濕彌羅國釋素怛覽毗奈耶阿毗達磨三藏各有十萬頌總而論之有三十萬頌其中釋素怛覽藏十萬頌釋毗奈耶藏十萬頌唯有梵本更無翻譯釋阿毗達磨藏十萬頌遍覺三藏得其梵本譯之為二百卷大毗婆沙論故就今現行大毗婆沙論梵本云唯可有十萬頌也故頌疏序云於是五百聖衆初集十萬頌釋素怛覽藏次造十萬頌釋毗奈耶藏後造十萬頌釋阿毗達磨藏即大毗婆沙是也文婆沙抄一本云今所譯者即十萬頌本翻成二百卷故名大毗婆沙文今現行二百卷大毗婆沙論梵本唯有十萬頌云事此等解釋甚分明也尋云釋素怛覽藏十萬頌釋毗奈耶藏十萬頌立大毗婆沙論稱歟答釋素怛覽藏十萬頌釋毗奈耶藏十萬頌前後三藏不翻譯故立不立大毗婆沙論稱暗以難測但元瑜疏云次造十萬頌毗奈耶毗婆沙論文婆沙抄一本云在迦濕彌羅國一夏之中造一切有部三藏婆沙如是三種毗婆沙論凡有二十萬頌九百六十萬言備釋三藏文任此等解釋釋素怛覽藏十萬頌釋毗奈耶藏十萬頌立毗婆沙論稱歟問今論中唯明諸法無我義歟進云光法師釋云如俱舍論等解諸法無我此即是舉一以明三文付之披今論文述有漏無漏法等唯明諸法無我之義見何釋舉一以明三哉如彼五蘊論唯解諸行無常之義𣵀槃論唯釋𣵀槃寂靜之義例彼思之今論中唯明諸法無我之義可云哉答今論中總釋一部綱要云有漏無漏法等舉有為無為一切諸法述唯有諸法之旨故就一部大綱論之唯明諸法無我之義故云舉一其中擇滅謂離繫隨繫事各別者明𣵀槃寂靜之義又諸有為法謂色等五蘊等者解諸行無常之旨故云以明三也五蘊論中如其名言唯解諸行無常之義𣵀槃論中如其名言唯釋𣵀槃寂靜之義故彼兩論云此即是偏釋一法印也重意云今論中正宗廣明諸法無我諸行無常𣵀槃寂靜三種法印故云以明三法印五蘊論中雖兼明諸行無常之義正宗唯釋𣵀槃寂靜之義故云偏釋一法印也尋云見光法師解釋云此論一部總有九品釋佛經中諸法無我前八品明諸法事雖亦明理從多分説或非正明後一品釋無我理雖亦明事從多分説或非正明文如此釋者前八品中不明無我理歟答前八品中隨其所應廣明有漏無漏諸法故説唯有諸法裏無我理顯故前八品中明無我理可云也光法師釋任其文面前八品中廣明有漏無漏諸法故云前八品明諸法事破我品中專説無我理故云後一品釋無我理也問光法師意今論造頌時可有破我品耶答今論造頌之時無破我品也兩方若有破我品者寶法師解釋中述今論造釋之時破我品加之旨以知造頌之時無破我品云事光法師意其義可同若依之爾者諸法無我者今論宗趣也造頌之時尤可有破我品哉答準圓暉法師破我一品無別正頌故此不論之釋破我品無世親菩薩所造之本頌見明知造頌之時無破我品云事是以見寶法師解釋云此論一部總有九品前之八品述自宗義釋本頌文所以先明後之一品造釋時加破外執故所以後明文今論造頌之時無破我品云事此釋炳然也光法師解釋中雖無分明定判準寶法師解釋可思之歟但於諸法無我者今論宗趣也造頌之時可有破我品云難者前八品中明諸法體無我之義自亦顯故雖無破我品更無其苦也問頌文云對法藏論我當説文爾者寶法師意歸敬發起二序中如何釋之耶進云寶法師意釋歸敬序也付之既述對法藏論我當説尤可云發起序也是以光法師釋云前三句明歸敬序第四句明發起序文如何答寶法師意以初三行頌為釋六百行根本頌之序其中述初之一頌明歸敬序次之二頌明發起序自諸一切種諸冥滅至對法藏論我當説一行頌為歸敬序自淨惠隨行名對法至因此傳佛説對法二行頌為發起序也初一行頌為歸敬序之中諸一切種諸冥滅拔衆生出生死泥者所讃所歸敬敬禮如是如理師者正申敬禮對法藏論我當説者述歸敬意也故寶法師釋云頌中有三前兩句讃所歸敬次之一句正申敬禮後之一句述歸敬意文此釋意為造對法藏論今歸敬世尊故對法藏論我當説者述歸敬世尊之由也故以此文屬歸敬序為言其論者何謂對法藏論已下之論文明發起序舉昔論名體釋今論名體述説論之意明先説之人發起本頌有漏無漏一切法故也故寶法師釋云論其論者何已下第二明發起序舉論名體發起本頌一切法故文但於光法師解釋者兩師所存其意各別也彼此相違不可和會之問阿毗曇心論中可有發起序耶進云光法師釋云或有歸敬而無發起如阿毗曇心論文付之依光法師解釋披阿毗曇心論所説云若知法法相正覺開惠眼亦為他顯現是今我當説文既有所發起之言何釋而無發起哉答或有歸敬而無發起如阿毗曇心論者不限光法師解釋寶法師亦述此旨兩師一同之釋定有所據歟即勘阿毗曇心論文云前頂禮最勝離惱慈哀顏亦敬順教衆無著應真僧文此文既有歸敬之言更無發起之文故兩師定判尤順依憑論説哉但於若知法法相正覺開惠眼等之文者界品之中上有長行多文後問前説法相應當知此法云何以今偈頌答之故此偈頌尤可正宗攝何為發起序哉重意云前頂禮最勝等之文若知法法相等之説同雖有界品之中前頂禮最勝等之文未説正宗法門之前有之故為之歸敬序若知法法相等之説正宗法門之後有之故不為發起序也何況阿毗曇心論中每説一法門多有今當説之言豈可以此等文為發起序哉問雜心論中有歸敬序耶進云光法師釋云或有發起而無歸敬如雜心論文付之依光法師解釋見雜心論所説云頂禮前最勝離惱安教尊所説悉具足羅漢見真諦文既有歸敬之言何釋而無歸敬哉答或有發起而無歸敬如雜心論者不限光法師解釋寶法師定判亦同之兩師一同之釋定有所據歟即勘雜心論序品文或云我今處中説廣説義莊嚴文或云我達摩多羅説彼未曾説文或云顯示三寶真實功德方造論端故説是論文處處既有發起之言更無歸敬之文故兩師定判尤順依憑論説哉但於頂禮最勝離惱安教尊等之文者是界品初正宗段之文也何可為歸敬序哉重難云今論界品云諸一切種諸冥滅拔衆生出生死泥敬禮如是如理師阿毗曇心論界品云前頂禮最勝離惱慈哀顏亦敬順教衆無著應真僧既為歸敬序至雜心論界品之文何不為歸敬序哉答自本無序品之論中正宗之初置歸敬之言為之歸敬序如今論並阿毗曇心論界品初文為歸敬序也有序品之論中序品無歸敬之言正宗之初有歸敬之文只可云歸敬之言更不可為歸敬序也重難云見雜心論序品文云敬禮尊法勝所説我頂受文序品之中既有歸敬之言何不為歸敬序哉答歸敬序者名歸敬佛故光法師釋云歸敬謂歸敬世尊文而今文歸敬我師法勝論師非歸敬佛之言故不為歸敬序也問阿毗曇心論中可歸敬佛三德耶進云光法師釋云或説三寶不言三德如阿毗曇心論文付之依光法師解釋見阿毗曇心論文云前頂禮最勝離惱慈哀顏文最勝離惱者顯智斷二德慈哀顏者明恩德依之法勝阿毗曇心論中云復次世尊於一切法於一切種而得自在故名最勝離熱者離燒義也謂煩惱熱能燒身心世尊離彼故名離熱此是自己智斷成就乃至次説饒益言者世尊言説能饒益一切衆生饒益者謂安穩也安穩饒益一義異名文此釋明以今文相配佛三德何判不言三德哉答阿毗曇心論前頂禮最勝離惱慈哀顏亦敬順教衆無著應真僧之文雖説歸依三寶之旨別不明佛三德相故或説三寶不言三德如阿毗曇心論之釋尤順依憑論説哉但於最勝離惱者顯智斷二德慈哀顏者明恩德云難者歸敬佛德之文自相配智斷恩三德事更非所遮只任文相之顯就三寶門歸敬云歸敬三寶寄三德邊歸敬云歸敬三德也阿毗曇心論文雖無三德之分別歸敬其三寶之中歸敬佛寶之文自相配智斷恩三德故法勝阿毗曇心論中入三德釋之何亦為相違哉問光法師意今論中不歸敬僧寶故如何釋之耶進云光法師釋云又時四向四果説之為僧世親菩薩一阿僧祇向滿智惠勝彼故不歸敬文付之世親菩薩位居凡地所起智惠是世俗智也望四向四果無漏智之時何云智惠勝彼哉是以世親菩哉薩造攝大乘論中云學無學僧居道果勝一切所餘僧乃至故我至誠身語思頻修無倒歸命禮歸敬僧寶見如何答有漏無漏二智相對實雖有漏智劣無漏智勝由種姓勝劣判智惠明昧之時菩薩種姓所起智品遙超聲聞所起智分豈不云智惠勝彼所但於世親菩薩所造攝大乘論中歸敬僧寶云難者光法師會之云僧者謂衆大乘菩薩容有衆多同時入聖名僧歸敬此宗菩薩一得入三十四心不名為僧故不歸敬文解釋先會通之後學更不可劬勞哉問論文云諸言所表謂佛世尊文爾者光法師意今此佛世尊者為唯限釋迦一佛為當可通一切諸佛耶答云此事雖有學者異義且可存唯限釋迦一佛云義也兩方若唯限釋迦一佛者智斷恩三德者一切諸佛同具足既舉三德致歸敬何唯限釋迦一佛哉是以寶法師云此事言諸顯一切諸佛諸具三德皆歸敬禮故圓暉法師釋諸者謂諸佛光法師意何不存此理哉若依之爾者光法師釋今欲造論為顯自師其體尊高之論文云若偏歸敬釋迦牟尼恐彼生謗故置諸言息其異論文如今解釋者唯可限釋迦一佛見如何答頌置諸言甚有委曲論主若任本意言唯歸敬釋迦一佛者諸外道輩可生謗故為息其異論置廣諸言顯無有朋黨以德召人之旨云諸一切種諸冥滅拔衆生出生死泥敬禮如是如理師之時諸外道輩皆存我師亦具三德故此歸敬言即攝我師思不生謗也外道自師實不具三德故以德召人之言即被簡畢一切諸佛皆具三德故以德召人之言雖可攝之釋尊是當時教主故論主本意唯歸敬釋迦一佛也故光法師釋此事初説諸言顯無朋黨以德召人諸有三德我即歸敬以諸外道各謂自師是一切智若偏歸敬釋迦牟尼恐彼生謗故置諸言息其異論或恐佛化根淺有情權作彼師引入正法故置諸言文若偏歸敬釋迦牟尼之文論主本意唯歸敬釋迦一佛云事炳然也若亦歸敬諸佛者諸言有何所痛可煩釋或恐佛化根淺有情等哉實唯歸敬釋迦一佛文置諸言故痛之釋迦一佛為化根淺諸有情類現種種形權作彼師引入正法故置諸言釋也唯限釋迦一佛之旨此釋亦分明也加之正見論文偈頌云諸一切種諸冥滅等以德召人之言廣可歸敬一切諸佛見長行之初總標頌意云今欲造論為顯自師其體尊高超諸聖衆故先讃德方申敬禮唯歸敬釋迦自師見偈頌長行聊似相違故光法師釋長行今文竊會其相違云論主今欲造俱舍論雖復以德召人本意為顯釋迦自師德體尊高超諸二乘菩薩聖衆故先讃德方申敬禮文文意云以德召人之文其言雖廣論主造今論初明歸敬序之本意唯歸敬釋迦自師德體尊高為言以德召人之處置雖言會通之為顯自師之文稱本意賞玩之論主唯歸敬釋迦一佛之事今此定判尤明鏡也如此聊簡光法師一段解釋之時智斷恩三德者一切諸佛同具之舉三德致歸敬之文不可限釋迦一佛云難自被會畢但於寶法師圓暉法師解釋者人師異釋也不可和會之重難云見光法師解釋前後上釋偈頌諸言云初説諸言顯無朋黨以德召人諸有三德我即歸敬文下解諸言所表謂佛世尊之論文云以德召人餘人無德諸言雖總還表世尊文此等解釋意述諸有三德之者論主皆歸敬之旨故諸言所表謂佛世尊者廣可通一切諸佛見何云唯限釋迦一佛哉答光法師若偏歸敬釋迦牟尼恐彼生謗之解釋本意為顯釋迦自師德體尊高之定判唯限釋迦一佛之旨分明也何及疑殆哉但於光法師諸有三德我即歸敬之釋以德召人餘人無德之文者述以德召人之志許也非云諸有三德之者皆悉歸敬之就中諸言雖總者會通諸言之廣還表世尊者唯表釋迦一佛云也若爾還為答之潤色更不可為違文哉問寶法師意不染無知可緣虛空非擇滅耶答可緣虛空非擇滅也兩方若緣虛空非擇滅者寶法師意不染無知唯限無覆無記定而無覆無記心勢力微劣也何可緣虛空非擇滅哉是以見婆沙論文云虛空非擇滅三界修所斷善識所緣云文明知不染無知不緣虛空非擇滅云事若依之爾者寶法師解釋中不染無知可緣虛空非擇滅見如何答寶法師意不染無知可緣虛空非擇滅也即見彼師定判上述染心不緣二無為故不云一切畢下云不染無知緣一切品類皆盡故言一切文解釋前後無諍不染無知可緣虛空非擇滅見但於無覆無記心勢力微劣不可緣虛空非擇滅云難者寶法師意許有自性無記心心所故不染無知體通取自性無記劣惠故自性無記所攝不染無知之中可有緣虛空非擇滅之類也次於婆沙論虛空非擇滅三界修所斷善識所緣云文者婆沙論意無覆無記心唯限異熟威儀工巧通果四無記故唯修所斷善識緣虛空非擇滅無覆無記心不緣云也寶法師意婆沙論等説之外許有自性無記心心所故無覆無記心亦緣虛空非擇滅云也婆沙論中雖述無覆無記心不緣上界之旨寶法師餘處解釋中云餘無覆無記亦緣於上即是例證也重難云寶法師意設雖許有自性無記心心所彼無記心勢力亦可微劣何可緣虛空非擇滅哉自性無記心勝異熟等四無記心緣虛空非擇滅云事證據在何處哉是一何況見寶法師解釋述不染無知無覆無記劣惠為體通四無記不染無知體唯限異熟等四無記劣惠不通自性無記劣惠見何云自性無記所攝不染無知之中有緣虛空非擇滅之類哉加之見寶法師處處解釋或云應言四無記心攝心不盡借識之類非四攝也或述此借識心是自性無記以借識之類為自性無記體若爾彼師意不染無知體設雖取自性無記劣惠彼既借識之類也更不可緣虛空非擇滅哉是三次見寶法師餘解釋十九引婆沙論邪行相智緣虛空非擇滅名云文畢云準此不染無知不是染善文此釋意存邪行相智之外無不染無知不染無知不通善染汚之旨釋成見若爾不染無知既限邪行相智何可緣虛空非擇滅哉若會云邪行相智雖不緣虛空非擇滅有餘不染無知緣虛空非擇滅者邪行相智雖限無覆無記有餘不染無知可通善何依此文成準此不染無知不是染善哉是四次寶法師餘處餘無覆無記亦緣於上之釋非例證寶法師意存威儀無記緣上界歟何可定自性無記心緣上界哉何況有餘無覆無記不緣於上之本旁不落居歟是五答寶法師意許有自性無記心心所專同德光論師義也而光法師述德光論師義云不染無知以未成佛來鈍自性無記心心所法為體非四無記攝通於三界恆成過未文就此釋案其意異熟無記心唯有法俱得威儀工巧二無記心串習之類雖有三世得不串習者亦無前後得自性無記心既云恆成過未知勝異熟威儀工巧三無記心有三世得云事通果無記心禪定所生果其體雖勝隨其所應緣五塵境全無緣虛空非擇滅亦緣上界之儀故自性無記心勝異熟威儀工巧三無記心異通果心相緣虛空非擇滅亦緣上界存也次寶法師意許有自性無記心心所故不染無知體通取自性無記劣惠事必然也故見彼師定判上釋不染無知體引諸師異説云第一師云不染無知以未成佛來鈍異熟心心所法為體第二師云以未成佛來鈍四無記心心所法為體第三西方德光論師云以未成佛來鈍自性無記心心所法為體第四師云以未成佛來鈍衆同分為體文下破此等異説云正理婆沙分明唯無記惠為體性因何前三師説兼心心所第四師取衆同分耶文此能破釋意專破不染無知體廣取心心所等之邊不破德光論師不染無知體取自性無記云義爰知寶法師意不染無知體通取自性無記劣惠云事但於通四無記之釋者且就通途相論之歟次寶法師處處解釋中以借識之類為自性無記體事就其相顯且舉一類也就實通論之時同德光論師義廣亘三界有自性無記心心所可云也次寶法師餘處準此不染無知不是染善之釋意婆沙論中邪行相智為不染無知體既云無覆無記故不染無知唯可限無覆無記不染無知若通善者邪行相智何不通善哉以邪行相智不通善染汚可準知不染無知不通善染汚云事釋成也邪行相智之相如杌起人想及於人起杌想於虛空非擇滅名起二無為想故緣彼名不緣其體也邪行相如此故雖不緣虛空非擇滅有餘自性無記所接不染無知緣虛空非擇滅事何可背此釋哉次威儀無記心不緣上界云事云文云理不可疑之故婆沙論八十七云問威儀路識能緣何法答欲界者唯緣欲界五部法色界者唯緣欲色界五部法文設雖寶法師意更不可背婆沙論説哉但不緣於上之本不叶一段起盡其故今論餘處十九中釋生在欲界計大梵王或為有情或為常住云對法者言此二非見是邪智攝文寶法師釋此文今此邪智者是不染汚邪行相智非疑等貪等煩惱相應邪智彼不緣上故可餘無覆無記邪智彼緣上故取意釋成也故亦緣於上之本尤叶解釋本旨以之可為正本不緣於上之本全不可為依用也問寶法師意不染無知可緣滅道二諦耶答可緣滅道二諦也兩方若緣滅道二諦者不染無知所緣者是味勢熟等境也何可緣滅道二諦哉若依之爾者見寶法師解釋云不染無知緣一切品類皆盡故言一切文一切之言是廣豈不通滅道二諦哉答寶法師意不染無知體通取自性無記劣惠故自性無記所攝不染無知之中可有緣滅道二諦之類也不染無知緣一切品類皆盡故言一切之釋即可為其潤色也但於不染無知緣味勢熟等境不可緣滅道二諦云難者不染無知者廣緣一切諸法不能如實覺之劣惠為體故自性無記所攝劣惠之中何無緣滅道二諦不能如實覺之類哉寶法師意許有自性無記心心所故無覆無記心中可有緣虛空非擇滅亦緣上界之類見緣滅道二諦準彼可思之問光法師所引今論餘處二十七文云斷圓德有四種文爾者其中一切定障斷者為唯限定障斷為當可通根障等斷耶答可通根障等斷也兩方若通根障等斷者既云一切定障斷任其名言不可通根障等斷哉若依之爾者光法師餘處解釋中可通根障等斷見如何答今論餘處文明如來斷圓德相故一切定障斷者廣可通一切不染無知非擇滅也故文唯雖述一切定障斷實義可通障根等斷也故光法師餘處釋云此中亦應別説斷根障等言斷定障影顯可知以類同故或略不説文問光法師釋畢竟斷相云通得擇滅及非擇滅文爾者今此非擇滅者為唯限定障上非擇滅為當可通煩惱障上非擇滅耶答唯限定障上非擇滅也兩方若唯限定障上非擇滅者見光法師解釋云即前二障斷已不退名畢竟斷文若煩惱障斷已不退之邊名畢竟斷者畢竟斷體何不通煩惱障上非擇滅哉若依之爾者披光法師解釋前後上述若一切煩惱障斷得擇滅若不染無知定障斷得非擇滅畢下云通得擇滅及非擇滅文文相起盡無諍非擇滅者唯可限定障上非擇滅見如何答勘光法師解釋始末引俱舍論第二十七卷斷圓德有四種一一切煩惱斷二一切定障斷三畢竟斷四并習斷之文畢云準彼論文若一切煩惱障斷得擇滅若不染無知定障斷得非擇滅即前二障斷已不退名畢竟斷通得擇滅及非擇滅文通得擇滅及非擇滅之言指上煩惱障上擇滅定障上非擇滅之旨解釋實分明也但於煩惱障斷已不退之邊名畢竟斷可通煩惱障上非擇滅云難者通論之者雖煩惱障上得非擇滅定障上得擇滅煩惱障斷者自性斷以擇滅為體定障斷者不生斷以非擇滅為體故今得畢竟斷之稱唯取斷煩惱障得擇滅斷定障得非擇滅之邊也問光法師意并習斷可有別體耶答可有別體也兩方若無別體者并習斷者四種斷圓德隨一也尤可有別體哉是以見光法師定判云有是習氣而非無知謂無知俱生心心所法文若習氣有別體者并習斷豈無別體哉若依之爾者披光法師餘處解釋云或云習氣無有別體但習無時説名為斷斷無別體文解釋無諍并習斷無別體見如何答光法師意并習斷可有別體也其旨即如一方疑難加之光法師釋并習斷相云如來不但斷彼煩惱并彼煩惱習氣亦斷得非擇滅此簡利根二乘又解并習斷者不但斷煩惱障定障并二障習氣亦斷文此釋意習氣之上所得非擇滅為并習斷體故并習斷有別體云事更不可疑之但於光法師餘處解釋者為簡古師意於心所中別有一體名為習氣云義故云或云習氣無有別體也即見光法師今解釋出不染無知體有十一師異説之中敘第十古師説云於心所中別有一體名為習氣是不染無知習氣無知體無寬狹如染無知別有無明文餘處解釋竊簡此師義無名習氣別體心所為言重意云光法師意不染無知并無知俱生心心所法總名習氣不許獨名習氣別體心所故為簡古師於心所中別有一體名為習氣云義云或云習氣無有別體非云習氣者是無體法也但習無時説名為斷斷無別體者以習氣無名斷非如斷煩惱得擇滅名斷故云斷無別體也非遮習氣之上所得非擇滅名并習斷之邊歟問光法師意非兼正通論義意斷德通非擇滅義可有耶答不可有此義也兩方若有此義者光法師判斷德體雖作三解釋非兼正通論之釋意斷德唯以擇滅為體不通非擇滅見若依之爾者見光法師餘處解釋上云又準此中所明斷德通於二滅畢下述或正斷德唯是擇滅若據兼説通非擇滅明知通於二滅之上文非兼正通論之義意云事如何答光法師判斷德體作三解釋云斷德從強擇滅為體若據其兼通非擇滅故不相違又解斷德唯以擇滅為體然有定障等擇滅不顯定障等若無擇滅即顯能顯斷故名斷圓德又解彼文四斷皆是擇滅若煩惱斷是自性斷緣縛斷若定障斷并習斷是緣縛斷若畢竟斷通自性斷緣縛斷文此三解釋之中第二第三釋意同存斷德唯以擇滅為體故非兼正通論云初釋意斷德通非擇滅之義不可有也但於光法師餘處解釋者彼處唯作兼正通論斷德通非擇滅之一釋不作餘二釋也唯具文云又準此中所明斷德通於二滅或正斷德唯是擇滅若據兼説通非擇滅此文斷德據正及兼故通二滅前明斷德據正以論故唯擇滅文聊簡此釋云又準此中所明斷德通於二滅者是總標之言或正斷德等以下別顯其相非別釋也如此之例處處有之且出一例證者勘光法師餘處解釋云今解不然生上三定起下諸識若起下身識唯是威儀心或是似威儀心若起下眼識修得者通果攝泛爾起者威儀心或是緣威儀心成是似威儀心文是威儀心者總標之言或是緣威儀心等以下別顯其相非別釋也又準此中所明斷德通於二滅等之釋準例可思之問不染無知可通見所斷耶答不通見所斷也兩方若通見所斷者今論疏中廣雖明不染無知相不云通見所斷哉若依之爾者見光法師解釋云不染無知能障理事二種真見文如此釋者不染無知有迷理之義見何不通見所斷哉答見今論餘處文云不染非六生色定非見斷文而不染無知不通不善有覆無記故非見所斷法云事更不可疑之但於光法師不染無知能障理事二種身見之釋者不染無知不能了知理事實義故障理事二種身見云也非如彼見所斷煩惱迷非常苦空無我等之理起常樂淨我等之執故不通見所斷也問染汚無知體唯限無明一惑歟答唯限無明一惑也兩方若唯限無明一惑者無知者覆實義障真見之義也而五部煩惱悉是染汚性十種隨眠皆於境不悟立染汚無知之稱何唯限無明一惑哉是以見光法師解釋云所以不言餘煩惱者無明通與諸惑相應若説無明亦顯餘惑文加之披圓暉法師定判標諸冥者是染汚無知畢云冥者即是見修所斷一切煩惱文任此等文理染汚無知體可通諸惑哉若依之爾者光法師釋染汚無知體述以無明為體唯可限無明一惑見如何答無知者名於境不悟之義其體專當無明一惑行相故染汚無知體唯可限無明一惑也是以見光法師解釋或云問染汚無知以何為體解云以無明為體或出古師於心所中別有一體名為習氣是不染無知云義之例證云如染無知別有無明文何況勘寶法師解釋云染汚無明為體文圓暉法師定判全亦同之加之披今論餘處文云此中癡者所謂愚癡即是無明無智無顯文此文意無明即是無知體性見任此等文理染汚無知體唯限無明一惑云事更不可疑之但於十種隨眠皆具於境不悟之義可名染汚無知云難者餘煩惱具於境不悟之義由與無明相應故正立染汚無知之稱唯限無明一惑也次於光法師所以不言餘煩惱者等之釋者論中云諸一切種諸冥滅説佛斷染汚無知不云斷餘煩惱故為通此伏難如此云也所以不言餘煩惱者牒伏難意也豈牒以無明為體之自釋會之哉無明通與諸惑相應等者無明通與一切煩惱相應故斷無明畢悉被斷餘煩惱故若説斷無明亦顯被斷餘煩惱之義為言即見寶法師解釋云問世尊實斷一切煩惱并及習氣如何但説滅二無知答但顯無知即兼顯餘無知通與一切煩惱習相應故無知即是一切煩惱習氣本故無斷無知留餘煩惱及習氣故所以但説斷二無知文此釋廣雖就染汚不染二無知致問答就其染汚無知釋成之邊其旨全同光法師解釋意故準寶法師今釋可思光法師釋意也次於圓暉法師冥者即是見修所斷一切煩惱之釋者就剋性體論之者染汚無知體雖唯限無明一惑由餘煩惱與無明相應故亦作不了行相以何知之者光法師所引婆沙論中出無慚行相轉非無慚之類云謂無慚相應法作無慚行相轉文準此文思之由餘煩惱與無明相應故亦作不了行相云事必然也依此義邊染汚無知助伴體廣取餘煩惱故就助伴體云冥者即是見修所斷一切煩惱也問光法師釋不染無知體引十一師異説爾者第十古師意如何釋之耶進云光法師釋云雖復遍與三性相應然其體是無覆無記文付之其性既無覆無記也何云與三性心相應哉何況第十古師説者源出正理論説而見正理論文全不言其體是無覆無記遍與三性心相應哉答光法師所引正理論中述此師義云有古師説習氣相言有不染汚心所差別染不染法數習所引非一切智相續現行令心心所不自在轉是名習氣文既云有不染汚心所差別非染汚法見而善無記中探取其體之時善法不順能障之義又與不善法相違全不可有相應之義無記法專順能障之義其性中庸不違善不善法可有相應之義故釋然其體是無覆無記尤順其文理也又述非一切智相續現行令心心所不自在轉光法師釋此文云未成佛來一切心品恆相續生令所俱心不自在轉文此釋意云此古師意為不染無知體習氣心所未成佛來一切心品恆相應起令所俱心不自在轉為言加之正理論二十八中破此古師義云又一一念彼心心所差別而生應念念中各有別別無知法起文光法師釋此文云若謂此法不違一切於念念中常相應者所相應品有差別故應有差別由彼差別令相應品別異而生文以此能破之文勢思彼所起之義意今此習氣心所未成佛來一切心品其性隨順不相違背常相應俱起令所相應心品念念障之為言此等正理論文意此古師義存善心現起之時為不染無知體不染汚習氣心所常相應俱起之旨見若爾雖復遍與三性相應之釋深探彼古師義意也問光法師意以未成佛位一切有漏無染惠悉可為不染無知體耶答可有非不染無知體之類也兩方若悉為不染無知體者有漏無染惠種類萬差於所緣境可有悟不悟不同何以一切有漏無染惠悉可為不染無知體哉何況暖等四善根是殊勝惠也寧可立不染無知稱哉若依之爾者見光法師解釋云不染無知以未成佛來所有一切有漏無染劣惠為體文未成佛來者簡已成佛所有一切有漏無染劣惠為體者對佛果位勝惠指因位有漏諸惠皆名劣惠也明知以未成佛來一切有漏無染惠悉為不染無知體云事如何答未成佛位一切有漏無染惠種類非一準可有非不染無知體之類也即疑難中所被出暖等四善根等是其類也加之今論述若離擇法定無餘能滅諸惑勝方便對法者是煩惱能治也豈可為不染無知體哉光法師所引正理論二十八云或諸有情有煩惱位所有無染心及相續由諸煩惱間雜所熏有能順生煩惱氣分故諸無染心及眷屬似彼行相差別而生由數習力相繼而起故離過身中仍名有習氣文元瑜法師釋此文云以諸無染心及相續身中有諸煩惱熏成氣分是無明多者善心現行亦多暗昧隨順無明餘例亦爾以此習氣名此無知此體是何以未成佛來一切有漏善無記法順無明故違遍知故皆名無知文光疏引之此釋意有漏無染惠中隨順無明暗昧之類名不染無知見準此等定判思之對法者煩惱能治也不染無知者有漏無染惠中煩惱間雜所熏氣分隨順無明相似無明行相之類也體性既各別行相亦乖違明知得對法稱有漏諸惠不為不染無知體為不染無知體之劣惠不得對法稱云事若爾聞思修加行勝惠并生得惠中受持讀誦三藏十二分教之類生無漏惠之方便得對法稱故不可為不染無知體隨順無明暗昧劣惠專備於境不悟之義故以之可為不染無知體也但於光法師解釋者不染無知以未成佛來者標起不染無知之位分所有一切者指所有一切不染無知全非云一切諸惠有漏者簡無漏無染者簡染汚劣惠者簡勝惠也既於諸惠之中次第簡之文言無諍不染無知體唯限有漏無染劣惠不通有漏勝惠見光法師今解釋如此聊簡之時還為答之潤色更不可有相違重難云暖等四善根非不染無知體云事不可然見光法師解釋述不染無知得非擇滅舉不染無知三十四念亦定不行何故不於見道初位得非擇滅之間若暖等四善根非不染無知體者菩薩暖等四善根位已後一座成覺無有出觀於暖善根初位可得不染無知非擇滅可問也而既不爾問明知暖等四善根為不染無知體云事答見今論餘處文明定生善法捨緣云等言為顯捨衆同分捨少分殊勝善根文光法師釋此文云殊勝善根謂暖等四文暖等四善根既名殊勝善根非不染無知體云事更不可疑之何況不染無知者煩惱習氣隨順相似無明行相正理論以彼行相差別而生之文其旨分明也故七方便等加行勝惠非不染無知體云事道理亦必然也但於光法師問詞者暖等四善根雖非不染無知體且就聖位致此問歟見寶法師解釋述不染無知得非擇滅舉五停心位應得不生之間準彼思之光法師意可致此問也尋云無覆無記惠悉為不染無知體歟答無覆無記惠其體皆微劣相順無明暗昧多故悉可為不染無知體也疑云通果無記是禪定所生果也寧可為不染無知體哉是一若不染無知通通果無記者斷變化心攝不染無知之時可捨所依定若爾今論餘處中出定生善法捨緣之時何不舉此位哉是設雖不染無知通四無記一切四無記惠何悉為不染無知體哉是以見寶法師解釋述不染無知通威儀工巧變化云所以知通威儀工巧習氣相應劣惠名不染無知二乘齊足越坑迦葉起舞是威儀習氣畢陵伽喚河神為小婢等是工巧習氣故知定通三種無記通變化者有似貪嗔等起變化者然未見文皆是習氣故知亦通變化文此釋既別出為不染無知體威儀工巧變化之類明知一切威儀工巧通果惠非悉為不染無知體云事是三答通果無記惠雖禪定所生果其性微劣暗昧之類故可為不染無知體也是以光法師破第二師義之處不難不染無知通鈍四無記之邊述不染無知通善故之段唯約無色無學付應名為佛過若不染無知不通通果無記者色界威儀心無有前後得故依身色界無學聖者異熟威儀二無記心不現前位不成就不染無知故亦容有應名為佛過何唯限無色無學哉明知不染無知通通果無記云事寶法師釋不染無知體通局云不染無知無覆無記劣慧為體通四無記文任此等解釋不染無知通通果無記云事尤分明也但斷變化心攝不染無知之時雖必捨所依定非全捨淨定故定生善法捨緣之中不舉之也準光法師餘處離染非全略而不論之釋可思之也次於寶法師解釋者為顯不染無知通威儀工巧變化三無記之相且出一類許也更非許彼三無記慧中非不染無知體之類歟問寶法師意習氣不通相續身云義引正理論何文證之耶進云寶法師引正理論是故即於味勢熟等不勤求解慧與異相法俱為因引生後同類慧等之文證之也付之正理論今文雖説不染無知相未分別習氣通局何引此文證習氣不通相續身云義哉何況見正理論次下文云或諸有情有煩惱位所有無染心及相續明述習氣通相續身之旨依之光法師引元瑜法師釋云此意總以無染有漏若心若身順煩惱者似煩惱故名為習氣文如何答寶法師意習氣不通相續身云事依正理論二十八一段現文故見寶法師所引正理論或云故即於彼味等境中數習於解無堪能智此所引劣智名不染無知即此俱生心心所法總名習氣理定應然文此文意不染無知俱生心心所法總名習氣故不通相續身見或云然於已斷見所斷位通染不染心相續中有餘順生煩惱習性是見所斷煩惱氣分於中染者説名類性金剛道斷皆不現行若不染者名見所斷煩惱習氣亦彼道斷由根差別有行不行文寶法師解此文判準此論文類性既非是身習氣故知心所成習氣唯限心心所不通相續身之旨或云若於已斷修所斷位唯於不染心相續中有餘順生煩惱習性是修所斷煩惱氣分名修所斷煩惱習氣是有漏故無學已斷隨根勝劣有行不行文此文意不染汚心心所名修所斷煩惱習氣故習氣唯限心心所不通相續身云事亦分明也故寶法師引此等文畢述準此故知正理二説唯心心所以為習氣即彼相應慧名不染無知習氣唯限心心所不通相續身之義所結成也但於正理論所有無染心及相續之文者寶法師會此文云後釋以無染心及與相續由諸煩惱間雜所熏有能順生煩惱氣分由此為因引生習氣是心心所不取於身元瑜師以此文證兼取其身以為習氣者誤也所以定知不通於身文此釋意云由諸煩惱間雜所熏順生煩惱氣分無染心心所法相續現起名為習氣非所依身名為相續為言問光法師意不染無知唯限無覆無記歟進云光法師作或云通善無覆無記或云不通於善之二釋畢判雖有兩解意謂前勝也付之不染無知者數習煩惱之氣分染心所熏之劣慧也能覆實義專障真見何以白品善慧可為暗冥無知哉是以婆沙論中明邪行相智相云此是欲界修所斷中無覆無記邪行相智文見正理論餘處所説或云有劣無知無覆無記性能障解脫是解脫障體文或云我所承稟諸大論師咸言練根皆為遮見修所斷惑力所引發無覆無記無知現行文任今此婆沙正理兩論之文不染無知唯可限無覆無記見若爾不染無知通善無覆無記之釋豈不背此等文理哉答光法師初釋意不染無知種類萬差於障法力用有勝劣不同故通善無覆無記為言即光法師釋不染無知通善故云若通於善無色無學恆成就故可不名佛若唯無記無色無學異熟生心不現在前不成就故應名為佛以此而言故亦通善文若唯限無覆無記者寧可通應名為佛過哉加之見光法師所引正理論文云即於彼味勢等境中數習於解無堪能為智此所引劣智名不染無知即是俱生心心所法總名習氣理定應然或諸有情有煩惱位所有無染心及相續由諸煩惱間雜所熏有能順生煩惱氣分故諸無染心及眷屬似彼行相差別而生由數習力相繼而起故離過身中仍名有習氣一切智者永斷不行文既云所有無染心及相續唯簡染汚故習氣體可通善無覆無記見習氣體若通善者習氣俱生劣慧為不染無知體故不染無知通善云事亦必然也故元瑜法師釋此文云以未成佛來一切有漏善無記法順無明故違遍知故皆名無知文不染無知通善云事此釋亦分明也但於婆沙正理兩論之文者光法師作二解釋會通之云婆沙但解邪行相智非實知故名之為邪故言無記正理出解脫障體及根障體故言無記今者總出一切不染無知體性故亦通善或無知有二一者是善障法力劣二者無記障法力勝婆沙正理據勝而説故言無記今言通善亦據劣明文光法師既會通此兩論説後學何可致劬勞哉重難云無知者名於境不悟之義如云以諸無知能覆實義及障真見故説名冥也而善有漏惠名為正見何於正見立無知稱哉是一次佛與二乘相對之時種姓勝劣遙替智慧明昧甚異佛永對治不染無知更無起之無色無學異熟生心不現前位設雖暫不成就不染無知後念必可起之何以無學異熟生心不現前位齊佛付應名為佛過哉是二次會婆沙正理兩論之文二解釋俱不可然先就初釋難思此釋意定障根障體唯限無覆無記云歟若爾準應名為佛過思之生無色界惠解脫聖者異熟生心不現前位不成就定障故應名俱解脫聖者生無色界時解脫聖者此等相例之疑如何可遁之哉是三次就第二釋亦有疑此釋意劣邪行相智通善云歟若爾善有漏惠得正見稱更不可名邪行相智故見婆沙論文述邪行相智相舉或云無覆無記或云亦通染汚之二説畢云由此前説於理為善謂是欲界修所斷中無覆無記邪行相智文任此等文理邪行相智唯可限無覆無記何云此釋意邪行相智通善哉是四答善有漏劣惠不如實知味勢熟等境故雖立無知稱於所知分非邪知故亦得正見名有何相違哉次見論文云諸一切種諸冥滅不成就二無知名佛故無色無學異熟生心不現前位設雖暫時不成就二無知之當與佛不異故付應名為佛過也故婆沙論九十三中約譬喻者意無實成就性云義付失云謂諸異生不染汚心現在前位應成無學不成就三界一切煩惱故諸無學者起有漏心現在前位應成異生不成就一切學無學法故文光法師不成就故應名為佛之釋源起自此文歟但佛與二乘相對之時種姓勝劣智慧明昧等事非初所論今且就不成就二無知之義邊齊等付應名為佛過也次聊簡光法師初釋意可有二義一義意云此釋意定障根障體唯可限無覆無記但於應名俱解脫聖者應名不時解脫聖者之例難者述俱由得滅定得滅盡定者名俱解脫聖者故生無色界惠解脫聖者異熟生心不現前位雖不成就定障不可名俱解脫聖者判復不時解脫利根阿羅漢名不時解脫聖者故生無色界時解脫聖者異熟生心不現前位雖不成就根障不可名不時解脫聖者也一義意云此釋意定障根障體亦可通善但正理出解脫障體及根障體故言無記者問意任正理論現文定障根障體無覆無記定置致難故且關難意定定障根障體無覆無記置不染無知不限定障故定障根障之外餘不染無知可通善故不善無知通善釋也為言重意云初釋意就定障根障之外餘不染無知通善之旨釋第二釋意還就定障根障體亦通善之相顯也二釋各述邊邊義門實不相違歟次第二釋意邪行相智唯可限無覆無記其文理如疑難之趣但婆沙正理據勝而説故言無記今言通善亦據劣明者婆沙論意就障法力勝邪行相智唯無覆無記論之故雖述無覆無記邪行相智今廣就餘障法力劣不染無知談之故不染無知通善云也正理論中明障法力勝定障根障相故雖述無覆無記之旨今廣就障法力劣不染無知論之故定障根障之中障法力劣之類定障根障之外餘障法力劣不染無知可通善故總相而言不染無知通善也為言問光法師意邪行相智可通善耶答不通善也兩方若通善者問佛果位可成就不染無知耶答不成就不染無知也兩方成就不染無知者不染無知者於境不悟之迷障也佛果位更不可成就之是以見光法師解釋述不染無知通善故云若唯無記無色無學異熟生心不現在前不成就故應名為佛文此釋無諍佛果位不成就不染無知見若依之爾者光法師釋不染無知相出體云有漏無染劣惠為體定性判通善無覆無記而見今論餘處文出善法捨緣或云捨定生善法由易地退等或述捨欲非色善由根斷上生全無舉成佛捨若不云佛果位捨不染無知者豈不成就之哉何況光法師釋三乘差別云不染無知雖復三乘同斷緣縛二乘現行佛不現行文既云佛不現行不云佛不成就明知佛果位成就不染無知云事如何答佛果者出障圓明之極位無知者於境不悟之迷障也佛果位不成就不染無知云事道理實必然也是以見光法師解釋述不染無知三性分別云不染無知通善無覆無記既云不染明非不善有覆無記若通於善無色無學恆成就故可不名佛若唯無記無色無學異熟生心不現在前不成就故應名為佛以此而言故亦通善文若佛果位成就不染無知者豈可依不成就之故付應名為佛之過哉次上段出他師過非之中破第一師義云若不染無知異熟無記心心所法為體性者二乘無學異熟生心不現在前非成就故應名為佛若言以必起故不名佛者後起成時可不名佛未起不成應名為佛若言有習氣故不名佛者是即由彼不名為佛何開異熟心心所法故説非理文破第二師義云若不染無知以四無記心等為體者欲色二界無覆無記不現在前容成過未無色無學異熟生心不現在前非過未應名為佛故亦非理若言以必起故有習氣故不名為佛者準前徵破故亦非理文破他師義之時非成就故應名為佛之過故佛果位不成就不染無知云事亦分明也加之明斷分位云應知此論據證不生名之為斷且説未來若據不成名之為斷亦通過去文任此等文理佛果位不成就不染無知云事頗以勿論也更不可疑之但於今論餘處文出善法捨緣之中不舉之云難者不染無知通善性者唯取生得善惠之中隨順煩惱似彼行相之劣惠故非色善中之少分也故捨緣中不舉此類更有何過哉準光法師餘處十五離染非全略而不論之釋可會之也或亦成佛位捨不染無知登無上覺王位之別緣力故捨之善等捨緣者是談通滿之義更不論別緣捨故不舉之云義意可有也次於光法師佛不現行之釋者緣縛斷者不斷其自性斷彼能緣縛用為顯此義述已斷之後猶成就現行之旨也而成就之者不必現行現行之者必成就故以斷已之後猶現在前顯緣縛斷相也今論餘處中曰以諸善法非自性斷斷已有容現在前故即顯此意也問菩薩斷不染無知得非擇滅為唯限金剛心位為當可通前位耶答云此事雖有學者異義且可存通前位云義也兩方若唯限金剛心位者不染無知體廣互善無記性亦通定障根障其種類相分千品緣闕位可非一準設雖三阿僧祇之間何無分得非擇滅之義哉是以見光法師解釋云此不染無知若菩薩三無數劫隨位漸斷至金剛喻定方總斷盡文既云三無數劫隨位漸斷不限金剛心云事甚分明也若依之爾者披光法師定判問菩薩斷不染無知得非擇滅於何位得答至金剛喻定方總斷盡得非擇滅任此問答起盡菩薩斷不染無知得非擇滅唯限金剛心位見加之會見道所斷染汚無知之例難述得非擇滅但據闕緣勝緣闕時方得彼滅至金剛喻三摩地時不染無知勝緣方闕故於此位得非擇滅若於前位不染無知勝緣未闕者何可得非擇滅哉答不染無知斷位者古來難義先哲未決也二義是非輒雖難定且依一義意可存不限金剛心位通前位云義也其故菩薩三無數劫之間數學五明之教久修六度之行於彼彼境界漸得如實覺若得永對治如實覺者豈不證不染無知非擇滅哉是以見光法師解釋明不染無知斷分位云此不染無知若菩薩三無數劫隨位漸斷至金剛喻定方總斷盡若二乘等雖有分斷而非斷盡應知此中所言斷者畢竟不生得非擇滅名之為斷非據擇滅若據滅三乘同斷即無差別見寶法師解釋明不染無知斷差別云二不生斷謂於彼彼位得畢竟不生二乘分斷佛全斷故文述不染無知斷分位云於中有二一分斷二全斷分斷者隨彼彼位畢竟不生爾時名斷如根定障等全斷者菩薩至金剛心爾時總得一切不染無知非擇滅故爾時斷盡文任此等解釋菩薩斷不染無知得非擇滅不限金剛心位通前位之事實分明也加之光法師釋斷圓德中畢竟斷相云即前二障斷已不退名畢竟斷通得擇滅及非擇滅此簡異鈍根文畢竟斷者既名煩惱障斷得擇滅不染無知斷得非擇滅斷已不退之義若利根二乘不具此斷者豈唯簡鈍根一類哉寶法師釋云獨覺雖滅諸冥以染無知畢竟斷故非一切種所以者何之論文云解脫人是利根者惑定二障悉已永斷如何説非一切種智耶文若俱解脫利根二乘不得定障非擇滅者寧齊佛一切種冥滅致所以者何之徵問哉此等解釋意利根二乘分得不染無知非擇滅見若利根二乘分得不染無知非擇滅者菩薩金剛心已前位分得不染無知非擇滅之事亦必然也但於光法師問答者存分斷義之時難會者只有此釋今會此釋異義雖區分且存一義意者頌文諸一切種冥滅者述佛斷一切不染無知盡得非擇滅之旨故上雖明不染無知漸斷斷盡之義未正顯一切種冥滅位故問菩薩斷不染無知得非擇滅於何位得立歸頌文正問一切種冥滅位也答此問至金剛喻定方總斷盡得非擇滅者指金剛心位是其斷不染無知盡得非擇滅一切種冥滅位答也雖有前位分斷不染無知得非擇滅之義非論文今所明故唯舉總斷盡位也次於得非擇滅但據闕緣等之釋者此亦指斷不染無知盡位顯彼勝緣總闕之義也次實論之菩薩三無數劫之間久修福智資糧漸得永對治如實覺故分亦雖有不染無知勝緣闕義今亦就彼勝緣總闕唯舉金剛心位也更不遮於前位中分有此義歟重難云光法師此不染無知若菩薩三無數劫隨位漸斷之釋述不成斷相也應知此中所言斷者等者立歸論文標不染無知斷者非擇滅之旨非釋上隨位漸斷等之斷言何為前位分斷之證據哉答論中明不染無知斷就非擇滅斷論之故光法師指論文標第四明斷分位者也鄰之云此不染無知菩薩三無數劫隨位漸斷等述非擇滅斷位云事炳然也豈可非釋上所標置不成斷相哉應知此中所言斷者等者上所明三乘差別不染無知斷者是畢竟不生非擇滅斷為言疑難之旨全不叶解釋起盡哉問三類智邊世俗智本來可得非擇滅耶答本來不得非擇滅也兩方若本來得非擇滅者光法師解釋中至見道三類智位得非擇滅見若依之爾者見今論餘處二十六文云此世俗智是不生法於一切時無容起故文若此世俗智本來不生法者本來何不得非擇滅哉是以前論百五十八中云如三類智邊世俗智等非擇滅法本來有得無有非得以彼本來定不生故文如何答三類智邊世俗智雖本來不生法至見道三類智位勝緣方闕故彼位得非擇滅本來不得之也故見光法師解釋云得非擇滅但據闕緣勝緣闕時方得彼滅至金剛喻三摩地時不染無知勝緣方闕故於此位得非擇滅如現觀邊世俗智等雖復體性畢竟不生於前位中亦不出觀然至三諦現觀後邊勝緣闕故得非擇滅故正理論七十四解三現觀邊世俗智云謂於爾時起得自在餘緣障故體不現前文此釋意云見道位中不出觀故三類智邊世俗智雖本來不生法三類智位起得自在故其體若容現起者此位容現起故前位中勝緣未闕三類智位見道依身現起故此被障俗智依力永不現起故此位俗智勝緣方闕得非擇滅也俗智勝緣者俗智依身也餘緣障故體不現前者見道依身被障俗智依身永不現前為言但於今論餘處此世俗智是不生法之文者三類智邊世俗智本來不生法云事自本非所諍故更非違文次於婆沙論本來有得無有非得之文者是一師不正義也更不可依用之問三類智邊世俗智所依身與見道所依身可同耶答可各別也兩方若同者俗智與見道有漏無漏既別也彼所依身豈同哉若依之爾者見寶法師解釋云其勝緣者正理論云謂彼所依身與見道同在見道時無容得起出現觀時所依已滅既闕勝依故不得起文如此釋者三類智邊世俗智所依身與見道所依身可同見如何答三類智邊世俗智所依身與見道所依身其體可各別也故見婆沙論三十六文云問若不現前云何説此依隨信隨法行身答彼身有二種一是見道所依二是現觀邊世俗智所依見道於見道所依身得亦在身成就亦現前現觀世俗智於彼身得而不在身成就不現前現觀邊世俗智於現觀邊世俗智所依身得亦在身成就亦現前見道於彼身得而不在身成就不現前文任此文三類智邊世俗智所依身與見道所依身其體各別云事甚分明也但於寶法師彼所依身與見道同之釋者同隨信行隨法行依身俱三類智位容現起故云彼所依身與見道同也非云三類智邊世俗智所依身與見道所依身其體同歟問二乘通力可緣他三千界事耶答可有二義也兩方若緣他三千界事者二乘通力作用狹劣也何可緣他三千界事哉是以見今論文當卷云聲聞獨覺雖滅諸冥以染無知畢竟斷故非一切種所以者何由於佛法極遠時處及諸義類無邊差別不染無知猶未斷故文光法師釋此文云極遠時謂八萬劫外時極遠處謂三千大千世界外處文寶法師并泰法師亦同之餘處二十七偈頌結聲聞麟喻佛二三千無數長行云即此五通於世界境作用廣狹諸聖不同謂大聲聞麟喻大覺乃至若極作意如次能於二千三千無數世界文任此定判二乘通力不緣他三千界事見若依之爾者見光法師餘處解釋述求度人相云舍利子等觀知此人八萬劫來未種解脫分善文引智論説云舍利弗即時入宿命智三昧觀見此鴿從鴿中來如是一二三世乃至八萬大劫常作鴿身文而三千界壞劫之時彼求度人并鴿鳥定可生他三千界若二乘通力不知他三千界事者何云八萬劫來未種解脫分善釋八萬大劫常作鴿身哉答此事依難思學者存異義或一義云二乘通力可緣他三千界事也所謂二乘所得通中神境天眼天耳他心四通唯緣現在法而現在有鐵圍山障隔故今此四通雖不緣他三千界事過去未來無鐵圍山障隔故宿住死生二通可緣他三千界事也故寶法師釋由於佛法極遠時處之論文云二乘宿住不能觀知八萬劫前死生智通不能觀知八萬劫後天眼天耳神境智通不能見聞往三千外文案此釋意二乘通力不緣他三千界事者就唯緣現在法通論之宿住死生二通可緣他三千界事見加之勘神泰法師餘處二十七解釋云現在鐵圍山障隔故凡夫二乘知境別過未無山障隔故凡夫二乘同知八萬文此釋意既述現在鐵圍山障隔故凡夫二乘天眼所見境界有遠近別過去未來無鐵圍山障隔故凡夫二乘宿住死生二通同知八萬事無有差異之旨故知過去未來無鐵圍山障隔故二乘宿住死生二通可緣他三千界事云事存此義之時舍利弗知求人八萬劫來未種解脫分善并知鴒鳥八萬大劫常作鴿身云二文尤為證據但於當卷由於佛法極遠時處等之文餘處聲聞麟喻佛二三千無數等之説者二乘神境天眼天耳他心四通全不知他三千界事宿住死生二通不知住他三千界有情過去未來事故聲聞通力知二千界事獨覺通力知三千界事云也非云不知住此三千界有情曾所更等他三千界事更無相違也重難云二乘宿住通知住此三千界有情曾所更他三千界事者亦可知住此三千界有情曾所更上地事歟若爾不背自下地為境之理哉答五依四意自下地為境者性相之所定也上地事總非五通境界故三乘聖者同無知之故雖住此三千界有情曾更上地事二乘宿住通更不可知之他三千界事是五通境界故二乘宿住通可知住此三千界有情曾所更他三千界事也或一義云二乘通力作用狹劣故不可緣他三千界事云事今論當處解釋餘處定判其旨分明也即如一方疑難之中出之何況見正理論餘處七十六文同今論説偈頌結聲聞麟喻佛二三千無數長行云即是五通於世界境作用廣狹諸聖不同謂大聲聞麟喻大覺乃至若極作意如次能於二千三千無數世界文顯宗論三十七文全亦同之加之勘婆沙論百五十處處之文或云聲聞天眼不作加行見小千界若作加行見中千界獨覺天眼不作加行見中千界若作加行見大千界世尊天眼不作加行見大千界若作加行能見無量無邊世界如天眼通天耳通等亦然文或百八十六明神境通相云聲聞不作意傍極小千世界作意極中千世界獨覺不作意極中千世界作意極大千世界佛不作意極大千世界作意能極無邊世界如神境通四通亦爾文任此等定判二乘通力不緣他三千界事云事亦炳然也但於光法師餘處解釋者此三千界壞畢求度人并鴿鳥生他三千界之時彼他三千界事可比知之也所謂求度人於此三千界八萬劫來未種解脫分善鴿鳥於此三千界八萬劫來常作鴿身故生他三千界之間亦可如此比知之也見婆沙論文評家意會契經世尊於過去諸宿住事若有色若無色若有想若無想種種相狀及所言説皆能憶知之文云然佛不以宿住隨念智憶知無色界諸宿住事但以比智知無色界諸宿住事文此文頗為今義潤色歟問離如來教力出離生死類可有耶答不可有此類也兩方若有此類者出離生死尤可由如來教力若可出離生死見若依之爾者見今論餘處二十一文述殖順解脫分善根云有餘師言亦遇獨覺文婆沙論中明此事云有餘師説雖無佛法若遇獨覺亦能種此善根文加之勘正理論餘處六十一文云有佛出世若無佛時俱能種殖順解脫分文任此等論説離如來教力出離生死之類可有見何況麟喻獨覺者最上利根人也出離生死何可由教力哉依之光法師餘處解釋中明獨覺名言上述初雖發心由其教力後將入聖獨悟道故得獨覺名畢下判若麟角喻唯獨悟道文相起盡無諍麟喻獨覺初發心不由教力見如何答出離生死必可由如來教力離如來教力更不可有出離生死之類是以見論文云能方便説如理正教從生死泥拔衆生出不由威力與願神通文光法師釋此文云但由正教拔濟有情令出生死不由輪王等威力不由天神等與願不由示現神通令出生死此三但能暫時拔濟非能究竟令出生死文但於今論餘處有餘師言亦遇獨覺之文婆沙論有餘師説雖無佛法等之説者同可不正義寧依用之哉今論遇佛出世殖此善根婆沙論佛出世時要有佛法方能種故初師説可正義也次正理論有佛出世若無佛時等之文者有佛出世者指親見佛出世之時若無佛時者指佛滅度後遇佛教法之時也是則當今論遇佛出世殖此善根之文故寶法師餘處二十三釋今論遇佛出世殖此善根之文述準此論餘時不能種殖遇佛出世者或親見佛或遇教法知生死可厭知涅槃可欣故能種殖解脫分也畢引正理論有佛出世若無佛時俱能種殖順解脫分之文明知若無佛時者指佛滅度後遇佛教法之時云事重意云正理論若無佛時之文今論云遇佛出世殖此善根之內事不當有餘師言亦遇獨覺之文正理論中總不舉此有餘師説也如此得正理論文意之時還為證據全無相違次於光法師餘處若麟角喻唯獨悟道之釋者凡於初發心可有二位分一初殖順解脫分善根位二初殖順解脫分善根已後順決擇分善根次前位也麟角獨覺初殖順解脫分善根位雖由教力初殖順解脫分善根已後順決擇分已前發心不由教力故就今此第二發心別種姓部行獨覺云雖初發心由其教力麟喻獨覺云若麟角喻唯獨悟道也勘今論餘處文云又能憶念過去所聞諸佛所宣聖教理故麟喻獨覺初發心由教力云事亦分明也問寶法師意隨行對法唯限為俱有因法歟進云寶法師解釋意隨行對法唯限為俱有因法見付之得與所得雖不為俱有因既有性相隨順之義隨行對法中何不接得哉是以光法師釋隨行對法云淨惠眷屬即惠相應俱有及得名曰隨行文如何答見寶法師解釋云問得為隨行不答得非隨行故正理出眷屬對法體中不言得故婆沙第三解得非世第一法中云得與彼法不相隨行又俱有因中云以得或前或後所以非俱有因故知雖有得起與法俱時非隨行隨轉也有人云隨轉有二一俱有因故名隨轉二相隨順故名隨轉隨行亦有二一俱有因故名隨行二相隨順故名隨行若諸論中説得為隨行隨轉據相順説若諸論中説得非隨行隨轉據非俱有因説彈曰既不見文豈得斟酌有何文證而為此釋詳其言義得非隨行亦非隨轉隨轉隨行皆是定俱起義非不定偏俱起名曰隨行如欲界心起時無隨轉色起彼心時雖定有色非心隨轉得既或前或後非俱有因有何文證云定是隨轉雖許得與所得名為隨順義亦無違隨順非是行轉義也無文説相隨順名隨行故文隨行對法唯限為俱有因法云事引證據立道理之旨破他師成自義之趣此釋委悉也其意可思之但於光法師俱有及得名曰隨行之釋者是初釋也第二釋云準彼引文得非隨行與寶法師釋其意同之何舉相違一釋為疑哉重難云見品類足論十三文明約四無量隨心轉非受相應等四句中出俱非句云或非隨心轉非受相應謂除無量所接隨心轉心不相應行諸餘無量所接心不相應行文如此文者四無量體取得見若爾豈非隨行中接得哉答品類足論文意四無量助伴體取得也非云隨行接得何為相違哉問光法師意隨行對法接得云釋寶法師如何破之耶進云寶法師釋云彈曰既不見文豈得斟酌有何文證而為此釋文付之隨行法中接得云事設雖無文證其義有道理者何可破此釋哉何況見論餘文二述後三界通見所斷云八十八隨眠及彼俱有法并隨行得皆見所斷文此文既云并隨行得何破既不見文哉答依文成義者釋家定習也而隨行法中接得云事諸論定判無其證故責有何文證而此釋也但於今論餘處并隨行得之文者寶法師釋此文云并隨行得者謂是隨眠上得并隨行心心所法上得非是説得為隨行也文任此釋意非以得名隨行何惡得文意備疑難哉問光法師作隨行對法接不接得云二解釋爾者不接得云釋可正釋耶答可正釋也兩方若正釋者披光法師解釋隨行對法不接惠云釋非正釋見相例思之隨行對法不接得云釋可非正釋哉若依之爾者光法師雖作隨行對法接不接得之二釋無判正不知可正釋云事如何答見光法師解釋問相應俱有俱有因故可名隨行得非俱有因如何説隨行答此問雖作或云隨順名隨非要成因隨行對法攝得或云準彼引文得非隨行隨行對法不接得之二釋無判正不若隨行對法不攝得云釋非正釋者寧不判雖有兩解前解為勝哉爰知隨行對法不接得云釋順婆沙論得與彼法不同一果不相隨行性相離不和合或前或後得與所得有時相離云文故可正釋云事但於又解隨行不接於惠之釋為不正釋云例難者隨行對法不接惠云釋不存彼此展轉互隨行故之理亦違婆沙論出喜無量體之文正理顯宗兩論解釋相雜念住之釋故判雖有兩解前解為勝以今此釋為不正釋也彼此義門大異何為相例之難哉問光法師意隨行對法中可接淨惠耶進云光法師作或云接惠或云不攝惠之二釋畢判雖有兩解前解為勝也付之隨行對法者隨淨惠行之義也隨行對法中何可攝淨惠哉若隨行對法中攝淨惠者以誰為主隨誰行可名隨行哉是以披今論餘處文心隨轉法中不攝心王見依之寶法師意隨行對法中不接淨惠釋光法師定判不可然如何答光法師初釋意立彼此展轉互隨行故之道理引婆沙論云喜無量相應隨轉通四蘊五蘊之文正理六十顯宗三十兩論云相雜念住接惠之説為證據隨行對法中接淨惠釋也故光法師釋云亦接於惠淨惠及眷屬皆名隨行彼此展轉互隨行故故婆沙八十一出喜無量體云喜者以喜根為自性若兼取相應隨轉欲界者四蘊為自性色界者五蘊為自性又正理顯宗三念住中解相雜念住皆言接惠以三念住中唯相雜念住能斷惑故至念住中當具引釋文立道理引文證解釋所成如此但於今論餘處文心隨轉法中不接心王云難者名心隨轉法既置心言云心云心隨轉其體各別更無以隨轉法亦名心之義故心隨轉法中不接心王尤有其謂今以無漏淨惠名自性對法以喜受為喜無量體之時就隨行對法論之相應俱有法亦名對法就眷屬體云之相應隨轉法亦名喜無量故依彼此展轉互隨行故之義望隨行對法重論隨行故以淨惠名隨行對法依互相隨轉之義以喜受名喜無量隨轉之意可有也次於寶法師解釋者以淨惠名自性對法望彼立隨行對法故隨行對法中不接淨惠釋也兩師所存自本各別也彼此相違始不可疑之重難云見今論文云淨惠眷屬名曰隨行文文言無諍淨惠之眷屬名隨行對法見何釋隨行對法中接淨惠哉是一次婆沙論文更非證據喜以喜根為自性若兼取相應隨轉則欲界者四蘊為自性色界者五蘊為自性者喜受自體上兼加相應隨轉云四蘊五蘊為自性也更非相應隨轉之中取喜受何為證據哉是二次正理顯宗兩論之文亦非證據相雜者更相交雜之義隨行者隨淨惠行之名也設雖相雜念住體取惠隨行對法中更不可接淨惠是以寶法師難光法師釋云彼論兩文名義不同此云隨行能隨所隨別彼云相雜互相雜也因何將相雜文證隨行耶文是三答今論淨惠眷屬名曰隨行之文非相違今文意淨惠與眷屬俱名隨行對法為言故光法師釋此文云淨惠及眷屬皆名隨行文非云淨惠之眷屬名為隨行對法何為違文哉次引婆沙論文為證據可有深由彼論中會品類足論云何喜無量謂喜及喜相應受想行識之文云復次彼論總説五蘊為喜無量自性雖喜受與受不相應而餘心心所法與受相應故作是説亦不違理文此文意依互相隨轉之義喜無量相應隨轉之中接喜受之故次上若兼取相應隨轉則欲界者四蘊為自性色界者五蘊為自性云文意相應隨轉之中可攝喜受得意引此文為證據也次引正理顯宗兩論之文為證據亦有其由相雜念住者對自性念住以隨行法為其體也而正理顯宗兩論之中相雜念住接惠見故引彼説為證據也重難云婆沙論中會品類足論云何喜無量謂喜及喜相應受想行識之文舉二師異説復次彼論總説五蘊等者第二師義也初師云彼文應説謂喜及喜相應想行識不應言受而言受者是誦者謬文此師意喜無量相應隨轉之中不接喜受見若依此師意者若兼取相應隨轉則欲界者四蘊為自性色界者五蘊為自性之文意相應隨轉之中不可攝喜受何引此文為證據哉次光法師隨行對法中攝惠不攝惠之二釋源依婆沙論今二師説見何自判前解為勝哉答婆沙論今二師説其意遂不相違於喜無量體有剋性體有助伴體若就剋性體云之者第二師意可釋而言受者是誦者謬若助伴體論之者初師意可會而餘心心所法與受想應而初師意且就剋性體釋之第二師意且就助伴體會之許也實二師意互可許二門故依何師意之時相應隨轉之中可攝喜受也故婆沙論次下段述喜無量根相應云喜全不與受根相應若兼説彼相應隨轉則喜亦與喜根相應不及異説即此意也光法師深得彼論意引四蘊五蘊為自性之文為相應隨轉之中攝喜受之證也次光法師第二釋意云又解隨行不攝於惠不存彼此展轉互隨行故之理婆沙論初師意就助伴體云之可許而餘心心所法與受相應之義故彼此所存其意相異故光法師第二釋意遂可違而餘心心所法與受相應之理故自判為不正釋也問婆沙論中釋喜無量體云欲界者四蘊為自性色界者五蘊為自性文爾者寶法師意隨轉中可攝喜受耶進云寶法師釋云隨轉非喜根文付之依寶法師解釋見品類足論文出喜無量體云謂喜及喜相應受想行識文此文無諍喜無量隨轉之中攝喜受見依之婆沙論八十一中釋此文云復次彼論總説五蘊為喜無量自性雖喜受與受不相應而餘心心所法與受相應故作是説亦不違理文若爾隨轉非喜根之釋豈不背婆沙論文哉答寶法師意自性對法唯以淨惠為體隨行對法以淨惠之眷屬相應俱有等法為體不攝淨惠喜無量唯以喜受為體若兼取相應隨轉同時心心所等法為體不攝喜受得意故釋隨轉非喜根也故寶法師釋云今詳此文惠非隨行何者彼文以喜根為自性如此論對法以淨惠為自性若兼取相應隨轉即四蘊五蘊性者如此論若兼取隨轉即五蘊性彼文出喜根無量體隨轉非喜根準知此論隨轉亦非取惠文此釋意婆沙論中云喜以喜根為自性若兼取相應隨轉則欲界者四蘊為自性色界者五蘊為自性者喜受自體之上兼加相應隨轉云四蘊五蘊為自性也隨轉之中非攝喜受為言但於品類足論謂喜及喜相應受想行識之文者任婆沙論二師説可會之若依初師意者可云受言謬也故婆沙論云彼文應説謂喜及喜相應想行識不應言受而言受者是誦者謬文若依第二師復次彼論總説五蘊等之文意者喜無量助伴體兼取相應隨轉法之時有喜無量與喜受相應之義故云喜相應受想行識也然而喜受自體自性非隨轉同時心心所隨轉非自性更無喜受自性亦為隨轉之義故釋隨轉非喜根全無相違也尋云寶法師意與光法師第二釋意同歟答隨行對法中不攝淨惠之義邊彼此雖同寶法師意釋隨非喜根喜無量隨轉之中簡喜受光法師第二釋意云婆沙據互相隨轉喜無量隨轉之中攝喜受之義邊相替也問隨行對法中可攝心王耶答可攝心王也兩方若攝心王者心王者心品之中上主也隨行對法中何可攝之哉若依之爾者見光法師解釋述淨惠及眷屬皆名隨行彼此展轉互隨行故淨惠及相應俱有法皆名隨行對法見設雖心王豈不名隨行對法哉答隨行對法中可攝心王也心王與心所一聚相應法互為俱有因隨行對法中何不攝心王哉故光法師問云相應俱有俱有因故可名隨行得非俱有因如何説隨行文此問意無諍與諍惠為俱有因法皆名隨行對法見而心王與淨惠既互為俱有因名隨行對法更不可疑之但於心王者心品之中上主也隨行對法中不可攝之云難者雖心王者心品之中上主也以淨惠名自性對法之時心王既一聚相應法有隨淨惠行之義故名隨行對法更有何疑哉重難云勘今論餘處文云除得餘隨行亦是遍行攝遍行隨眠并隨行法為遍行體見而婆沙論中云為止彼執顯無明見有是遍行有非遍行餘三一向非遍行愛慢心王三種一向非遍行見若隨行中取心王者遍行隨眠相應心王何非遍行哉答除得餘隨行亦是遍行攝之理遍行隨眠相應心王可為遍行體也但於婆沙論中心王一向非遍行云文者心王遍行隨眠之隨行故亦雖遍行攝非遍行隨眠故就剋性體作論之時云一向非邊行也問光法師意別相念住總相念住可通生得惠耶問光法師述暖等四善根修惠總別念住思惠五停心觀聞惠畢云且依一相文爾者今此一相者為依觀門一相為當依未離欲染一相歟答可依觀門一相也兩方若依觀門一相者見光法師餘處二十三解釋引正理論六十一總相念住思所成攝之文畢云此中且據未離欲染故言總相思惠所攝文準餘處定判思今解釋意可云未離欲染一相哉若依之爾者今解釋前後依觀門一相見如何答見光法師解釋云修惠謂暖等四善根思惠謂總別念住聞惠謂五停心觀生得惠謂能受持三藏教法且依一相明四種惠漸入觀位前後次第未是盡理若據共相別相及五停位皆通修思聞惠文顯一相義云明四種惠漸入觀位前後次第明盡理相判共相別相及五停位皆通修思聞惠依觀門一相云事解釋前後甚分明也何況述總別前念住思惠五停心觀聞惠不可依未離欲染已離欲染且依一相者不依未離欲染一相云事亦炳然也但於光法師餘處解釋者總相念住思所成攝者且依未離欲染説若已離欲染者總相念住修所成攝為言更不論三賢四善根三惠分別全異當卷解釋意也問聞惠無間可起暖善根耶答可起暖善根也兩方若起暖善根者聞惠是勢力微劣也何可引起殊勝暖善根哉是以見正理論餘處文云若有先離欲界染者依色界攝修所成惠厭患生死欣樂𣵀槃多厭行俱作意次第能引異類善根生諸有先時未離欲染依思所成惠引暖善根生文婆沙論中述色界定修所成行相無間引起暖善根畢問已離欲染者可爾未離欲染者云何答之云欲界亦有似彼作意思所成行相攝有厭離有渴仰有惡賊有思慕未離欲染者此作意無間引起暖文任此等論文聞惠無間不起暖善根見若依之爾者見光法師解釋云若據盡理共相別相及五停位皆通修惠思惠聞惠文總相念住通聞惠者聞惠無間寧不起暖善根哉加之辰旦人師解釋中云若從聞惠無間得初剎那暖或有捨惡戒文此釋無諍聞惠無間起暖善根見如何答暖善根是見道近加行初起難故雖聞惠無間不引起之後起易故聞惠無間可引起之也正理婆沙兩論且就初起暖善根論之於後起暖善根者聞惠無間亦引起之更非所遮但於光法師解釋者總相念住通聞思修三惠者初後起通論也初修觀門之間雖通聞惠後純熟位正引起初剎那暖善根唯限思惠修惠不通聞惠也次於辰旦人師解釋者是婆沙抄定判也聞惠無間起初剎那暖善根云事背文理故不可依用之重難云勘今論餘處文云此中五種作意無間聖道現前除生所得聖道繫屬加行心故聞惠無間生聖道見若生聖道者何不生初剎那暖善根哉答聞惠無間生聖道者就後純熟位論之也光法師餘處釋此文會婆沙論十一云欲界唯思所成無間聖道現在前不説聞惠無間聖道現在前之相違作二解釋之中第二釋云又解婆沙約初修次第起者説此論等通約純熟位説故不相違文若爾初起暖善根聞惠無間不起之後起暖善根聞惠無間可起之云義以此解釋為其潤色今何為例難哉問光法師所引正理論四十二中云律儀先捨後斷善根文爾者今此律儀者即後斷善根所發歟答非後斷善根所發也兩方若後斷善根所發者今此律儀者加行善心所發也何云後斷善根所發哉若依之爾者既云律儀先捨後斷善根如文相者能發善根及所發律儀相望論斷捨時先後見如何答若加行善心及彼所發律儀斷善根加行位同時捨之若生得善心及彼所發律儀斷善根根本位同時捨之也故婆沙論中述評家義云應説不定所以者何隨彼彼類心起彼彼律儀彼心捨時彼律儀隨捨文而任所斷欲生得之理後斷善根者生得善心也其所先捨之律儀者是加行善心所發非所後斷之生得善心所發也故光法師所引正理論云若從加行善心生者律儀先捨後斷善根文捨生得善心所發律儀之位次下文別明之故正理論云若從生得善心生者隨斷何品能生善根所生律儀爾時便捨捨能等起彼隨捨故文論説既分明也學者何疑之哉但於律儀先捨後斷善根之文相能發善根及所發律儀相望論斷捨時先後見云難者今文只述斷善根位捨諸律儀之相更非能發善根及彼所發律儀相望論斷捨時先後也問光法師所引婆沙論中明相異熟業或云唯思所成或云通聞思所成二説爾者通聞思所成云説正義歟答不正義也兩方若正義者披光法師餘處解釋相異熟業通聞思所成云義可不正義見若依之爾者光法師引婆沙論今二説畢云以此文證故知聞思能發身語文若不正義者何引之為聞思二惠發身語業之證耶答相異熟業是欲界中殊勝善業故唯限思所成不通聞所成云義可正義也故見今論餘處十八文偈頌結佛思思所成長行云是思所成非聞修類文披正理論餘處四十四文云感妙相業唯思所成非修所成不定界故所感異熟此所繫故非聞所成彼羸劣故亦非生得加行起故文顯宗論二十四文全亦同之雜心論十一云問相報業為何等性答有漏業增上意業又是思惠性非聞惠以劣故非修惠欲界不定故文廣勘此等諸論之文相異熟業唯限思所成不通聞所成見光法師餘處解釋中引婆沙論今二説畢婆沙雖無評家諸論既同前即以前師為正以相異熟業唯思所成非聞非修云初師説為正義判也聞所成善是羸劣故相異熟業通聞所成云第二師説雖為不正義全非聞所成善發身語業云邊為不正義故光法師引婆沙論百七十七問相異熟業以何為自性為身業為語業為意業耶答三業為自性之文并問相異熟業為聞所成思所成修所成耶答唯思所成非聞非修所以者何此業勝故非聞所成欲界繫故非修所成有説此業通聞思所成但非修所成之文畢擇以此文證故知聞思能發身語也重意云婆沙論中述相異熟業通身語意三業畢亦有通聞思所成云説故證聞思二惠能發身語二業之旨也更不顧相異熟業通聞所成之邊為不正義歟問光法師意色界聞惠可發表業耶答可發表業也兩方若發表業者定地散惠勢力微劣也何可發表業哉是以見古德所引婆沙論十七文出初靜慮善心無隨轉戒之類云五起表善心六聞所成惠相應善心文聞所成惠相應善心之外別舉起表善心明知色界聞惠不發表業之事若依之爾者光法師判聞思能發勝身語業總無有簡別何可簡色界聞惠哉答欲界聞惠能發表業云事光法師所引正理論諸律儀果有從加行善心所生之文婆沙論百七十七相異熟業通聞思所成之説其旨分明也而欲色二界雖異同是聞惠也欲界聞惠能發表業者色界聞惠何不發表業哉但於古德所引婆沙論文者光法師難古德義云命終是生得別説生得能發業何妨聞惠外別説聞惠能發業若言命終心劣不能發業所以別説生得發業心何妨聞惠不發業者説聞惠心能發業者亦發業心攝故非定證況有明文以此故知古諸非理文解釋既悉委會之後學何可致劬勞哉重難云命終心發業心雖同生得善心其體異故各別舉之其理尤可然聞所所成惠相應善心之言廣故遍可攝初靜慮一切聞所成善心何此外別可説聞所成發業心哉是一次見光法師餘處所引婆沙論百二十二文云復有説者欲界生得能發業心殷重猛利故所發表能發無表色界生得能發業心非殷重猛利故所發表不能發無表文準此文思之欲界生得能發業心殷重猛利故有發表能發無表者色界聞惠猶可勝之若許發表業者彼所發表何不發無表哉是二答婆沙論中上舉聞所成惠相應善心下出起表善心者此難實可然而上舉起表善心下出聞所成惠相應善心故知上所舉起表善心之中攝聞惠發業心下聞所成惠相應善心者出不發業聞惠心也次色界聞惠望欲界生得惠互可有勝劣若依順定心之邊云之者色界聞惠勝欲界生得惠劣故色界聞惠無間生無漏心欲界生得惠無間不生無漏心若順散善之邊論之者欲界生得惠勝色界聞惠劣故欲界生得惠所發表能發無表色界聞惠所發表不發無表也問光法師意發智品類兩論相望時造時前後如何釋之耶進云光法師釋佛𣵀槃後至三百年初筏蘇密多羅造品類足論至三百年末迦陀衍尼子造發智論也取意付之定發智品類兩論造時前後可任婆沙論所説也而見婆沙論四十五文釋發智論中説異生性不説異生法品類足論説異生法不説異生性云此論已説異生性故品類足論不重説之此論未説異生法故品類足論説異生法此顯彼論在此後造文如此文者發智論先造品類足論後造見如何答發智品類兩論造時先後者婆沙論二説也故婆沙論中問誰造此論答之舉二師説之中初師意云佛世尊造第二師意云尊者迦多衍尼子造若依初師意者發智論先造品類足論後造若依第二師意者品類足論先造發智論後造也佛説云師意發智論先造品類足論後造云事勿論也尊者迦多衍尼子造云師意品類足論先造發智論後造云也以此意思第四十五卷文此論已説異生性故品類足論不重説之此論未説異生法故品類足論説異生法此顯彼論在此後造者當發智論佛世尊造云初師意也有作是説彼論已説異生法故此不重説彼論未説異生性故此論説之此顯彼論在此前造者當發智論尊者迦多衍尼子造云第二師意也一論之中兩處各有二師異説尤可得意合也但於光法師解釋者佛𣵀槃後至三百年初筏蘇密多羅造品類足論至三百年末迦多衍尼子造發智論云事不限光法師解釋寶法師圓暉法師天台妙樂大師疏記一本等同述此旨此等定判專雖順發智論非佛説云師意佛説云師前亦無相違依受持演説廣令流布之邊亦名尊者迦多衍尼子造故如婆沙論中云由彼尊者受持演説廣令流布是故此論名稱歸彼然是佛説也或亦光法師等解釋準依發智論非佛説云師意云義可有也尋云婆沙抄中釋此顯彼論在此後造之論文儲一箇問答云問佛滅二百年中造品類足三百年內始造發智如何會釋解云若約始終究竟造論發智在後造若約一部之內一章一牒別云造者亦有發智一章在品類足前造故不相違也文此釋巧妙也何存別義哉答婆沙抄今解釋旁難依用若發智論説異生性之一章雖品類足論之前造之造一部論訖事品類足論之後者初師意何可云此論未説異生法故品類足論説異生法哉以何知後所造訖發智論中不説異生法品類足論中説異生法哉加之第二師意亦存發智論説異生性之一章品類足論之前造之者何可云彼論未説異生性故此論説之哉婆沙抄今會釋甚以難信更不可依用之歟問佛𣵀槃後二百年中造品類足論歟答三百年初造品類足論也兩方若二百年中造品類足論者見光法師解釋云佛𣵀槃後乃至至三百年初筏蘇密多羅造品類足論文解釋無諍二百年中不造之見若依之爾者元瑜法師解釋中云第二百年尊者筏蘇密坦羅造品類足論婆沙抄中述佛滅二百年中造品類足任此等定判佛𣵀槃後二百年中造品類足論云事分明也如何答佛𣵀槃後至三百年初筏蘇密多羅造品類足論云事不限光法師定判諸師舉所釋也寶法師釋云佛般𣵀槃後乃至至三百年初筏蘇密多羅造品類足論六千頌文圓暉法師釋云佛𣵀槃後乃至至三百年初尊者世友造品類足論文妙樂大師釋云五品類足佛滅後三百年世友造文任此等定判佛𣵀槃至三百年初尊者世友造品類足論云事尤分明也但於元瑜疏并婆沙抄解釋者依相傳不同及人師異釋何強通會之哉強和會之者佛𣵀槃後二百年末造始品類足論三百年初造訖之歟若如此得意者諸師定判更非相違也問光法師意能對所對俱可名對法耶進云光法師釋云能所俱名對法文付之見今論文偈頌云淨惠隨行名對法長行述此能對向或能對觀故稱對法唯以能對名對法見何釋能所俱名對法哉答光法師釋今論釋此名者能持自相故名為法若勝義法唯是𣵀槃若法相法通四聖諦此能對向或能對觀故稱對法之文云應知此中能對對勝且與對名以實而言亦名為對是所對故或各舉一邊影略互顯或據依主謂法之對故能對名對所對名法若據有財持業能所俱名對法以此準知四諦名理對法𣵀槃名果對法頌本偏舉能對所以不説理果長行通據能所所以亦言理果或可影顯文立道理會論文成能對所對俱名對法之旨此釋委悉也其意易知之尋云據有財釋能對所對俱名對法方何答能對名對法所對有之所對名對法能對有之能對名對法為言問寶法師引真諦三藏説明以無漏惠望𣵀槃果為趣向至得對非如實相知對等四句分明爾者趣向至得對唯限無間道歟答正限無間道兼通加行道也兩方若唯限無間道者以道理思之趣向至得對之義何不通加行道哉是以泰法師解釋中趣向至得對可通加行道見若依之爾者見寶法師解釋引真諦三藏説述趣向至得對相唯出無間道無舉加行道以知趣向至得對唯限無間道云事如何答無漏惠趣解脫道中名趣向至得對故近趣解脫道是無間道故就近論之趣向至得對唯限無間道也故見寶法師解釋述真諦三藏意無漏惠緣苦集道三諦無間道位為趣向至得諦對非如實相知對之句無漏惠緣滅諦加行解脫勝進道位為如實相知對非趣向至得諦對之句無漏惠緣滅諦無間道位為俱句無漏惠緣苦集道三諦加行解脫勝進道位為俱非句故趣向至得對唯限無間道見但加行道亦有遠趣解脫道之義故遠近合論之時趣向至得對可通加行無間二道也故泰法師引真諦三藏義云修道無學道中以無礙攝方便以解脫攝勝進文若爾寶法師泰法師引真諦三藏説各述邊邊義門遂非致相違哉問寶法師引真諦三藏説明以無漏惠望𣵀槃果為趣向至得對非如實相知對等四句分別爾者四諦知中各可有四句耶答四諦智中各有二句也兩方若四諦智中各有此四句者加行無間解脫勝進四道中各不具此四句相例可同若依之爾者四諦智種類非一準何各不具此四句哉答案寶法師所引真諦三藏解釋意無間道趣解脫道名趣向至得對無漏惠緣滅諦理名如實相知對故無漏惠緣苦集道三諦無間道位為趣向至得對非如實相知對非趣向至得對之句無漏惠緣滅諦無間道位為俱句無漏惠緣苦集道三諦加行解脫勝進道位為俱非句也故四諦智中各有二句不具四句也故寶法師釋云真諦法師以無漏惠望其𣵀槃觀向不同以為四句無間道趣解脫道名為趣向至得對趣解脫道中得擇滅故名為至得惠心緣滅理名如實相知對諸道不同以為四句有是趣向至得對非如實相知對者謂無漏惠觀三諦無間道時有如實相知對非趣向至得對謂緣滅諦加行勝進解脫道時有是如實相知對亦是趣向至得對謂緣滅諦無間道時俱非者謂緣三諦餘三道時文問寶法師所引婆沙論二十三中明一剎那頃於隨眠滅身作證惠不見彼滅惠見彼滅身不作證等四句分別爾者得不還果時可有此四句耶答可有此四句也兩方若有此四句者見寶法師所引婆沙論文雖述以滅法智得一來果時一剎那頃有此四句之旨不云得不還果時有此四句知無此義云事若依之爾者以性相思之得不還果時何無此四句哉答超越證一來果聖者以滅法智得不還果時一剎那頃可有此四句也所謂於隨眠滅身作證惠不見彼滅者色無色界見所斷諸隨眠滅惠見彼滅身不作證者欲界修所斷前六品諸隨眠滅身作證惠亦見彼滅者欲界見所斷及修所斷後三品諸隨眠滅身不作證惠亦不見彼滅者色無色界修所斷諸隨眠滅也但於婆沙論中述一剎那頃有此四句不舉得不還果時云難者且就次第證者分別其相故不云得不還果時有此四句也問以無漏惠根可名甚深阿毗達磨耶答可名甚深阿毗達磨也兩方若名甚深阿毗達磨者光法師所引婆沙論中出甚深阿毗達磨體或云謂空無我及如實覺或述謂滅定退及如實覺任此等論文以無漏惠根不名甚深阿毗達磨見若依之爾者無漏惠既勝義阿毗達磨體也何不名甚深阿毗達磨哉答見今論文云惠謂擇法淨謂無漏淨惠眷屬名曰隨行如是總説無漏五蘊名為對法此則勝義阿毗達磨以無漏惠根既稱勝義阿毗達磨尤可名甚深阿毗達磨也故披婆沙論説或云問阿毗達磨自性云何答無漏惠根以為自性文或云如契經説此藥叉天於長夜中其心質直無有諂誑諸有所問皆為了知不為嬈亂我以甚深阿毗達磨恣彼意問此中何者甚深阿毗達磨謂無漏惠根又契經説此筏蹉氏及善賢外道并梵壽婆羅門皆於長夜其性質直無諂無誑諸有所問皆為了知不為嬈亂我以甚深阿毗達磨恣彼意問此中何者甚深阿毗達磨謂無漏惠文任此等論判以無漏惠根名甚深阿毗達磨云事尤分明也但於光法師所引婆沙論文者以無漏惠根為甚深阿毗達磨體是其本義也更雖非所諍諸契經中隨別別意趣作種種異説也故婆沙論一中舉或云此中何者甚深阿毗達磨謂空無我及如實覺或云此中何者甚深阿毗達磨謂滅定退及如實覺或云此中何者甚深阿毗達磨謂因緣性及如實覺等多異説畢云雖此等經中隨別意趣作種種異説然阿毗達磨勝義自性唯無漏惠根文問以滅盡定退可名甚深阿毗達磨耶進云光法師所引婆沙論云此中何者甚深阿毗達磨謂滅定退及如實文付之滅盡定退者就有漏麁淺法論之何名甚深阿毗達磨哉答案婆沙論百五十三意舍利子説滅盡定有退塢陀夷云滅盡定無退再三即述違逆之言即至佛所復作如上違逆之言爾時佛呵塢陀夷云汝是愚人盲無惠眼云何與上座苾芻論甚深阿毗達磨文思此文意滅盡定有退生色界中由串習力能數入出滅盡定者彼塢陀夷所不開悟甚深道理故以愚人所不開悟甚深道理名甚深阿毗達磨之時以塢陀夷所不開悟滅盡定退名甚深阿毗達磨為言故光法師釋云又解諸法甚深道理皆名為理故婆沙云此中何者甚深阿毗達磨謂滅定退及如實覺等如彼廣説文尋解釋所引勘婆沙論文云又如佛告塢陀夷言汝是愚夫盲無惠目云何乃與上坐苾芻共論甚深阿毗達磨此中何者甚深阿毗達磨謂滅定退及如實覺文問頌文云因此傳佛説對法文爾者今此傳言表不信義歟答表不信義也兩方若表不信義者披今論文云離説對法弟子不能於諸法相如理簡擇文如此文者離佛説對法弟子不得擇法見明知迦多衍尼子等傳佛説對法得擇法故能滅諸惑云事何況判法正理在牟尼者今論餘處定判也豈不信佛説對法哉若依之爾者長行中釋今傳言云毗婆沙師傳説如此文光法師寶法師受此文表不信之旨釋成如何答今此傳言表不信之義也今論頌文處處多置傳説傳許之言併表不信之義今云因此傳佛説對法即表不信之義也長行中釋毗婆沙師傳説如此其意在斯是以光法師釋此文云論主意明經部於本所學心生疑惑所以於此俱舍頌文往往置斯傳説之言顯非親聞也文寶法師釋此文云言傳説者顯己不信文泰法師釋此文云論主不皆信諸阿毗達磨師所説悉得佛意故言毗婆沙師所傳若傳之有謬則失不在我論主後破毗婆沙執故先置此言也文正理論云經主稱傳顯己不信文顯宗論改頌云為寂大師説對法文任此等定判今此傳言表不信之義云事實分明也但於今論離説對法弟子不能等之文者即述然佛世尊處處散説阿毗達磨大德迦多衍尼子等諸大聲聞結集安置之意也而論主意存發智論等非結集佛處處散説偏是迦多衍尼子等自造故不信此義也正理論中云阿毗達磨是佛所説何緣不信傳聞尊者迦多衍尼子等造故即述此意也次於今論餘處判法正理在牟尼之文者只述判法正理唯在世尊及諸如來大聖弟子之旨全非云發智論等結集佛説何為相違哉重難云今論云然佛世尊處處散説阿毗達磨大德迦多衍尼子等諸大聲聞結集安置猶如大德法救所集無常品等塢陀南頌當婆沙論中發智論非佛説云師義是以寶法師引婆沙論中發智論佛説非佛説云二師説畢判此論即是第二釋也今論所述即是婆沙論二説中第二發智論非佛説云義也釋若爾云毗婆沙師傳説如此不信發智論非佛説云義之旨分明也而頌文云傳佛説對法定知相傳佛説對法得擇滅諸惑之意也尤可相傳之傳何云不信之傳哉答今論然佛世尊處處散説等之文當婆沙論二説中發智論非佛説云師義云事如疑難之趣更非所諍也然佛世尊處處散説者釋頌佛説之言阿毗達磨者釋頌對法之言毗婆沙師傳説如此者釋頌傳之言也今此發智論非佛説云師意云結集佛處處散説故尋源是佛説也而論主意存發智論等非結集佛處處散説偏是迦多衍尼子等以自語造故不信婆沙論第二師發智論非佛説云義也論主意不信婆沙初師發智佛説云義理在不疑故不及舉此義置傳説之言表不信之由也重尋云本頌因此傳佛説對法之言中含發智論佛説云師義歟答長行釋頌之中唯舉發智論非佛説云師義不述發智論佛説云義意明知本頌因此傳佛説對法之言中不含發智論佛説云師義也重難云既云傳佛説對法豈不含發智論佛説云師義哉是一何況正理論中就經主義問阿毗達磨是佛所説何緣不信答傳聞尊者迦多衍尼子等造故既述迦多衍尼子等造故不信佛説云義之旨明知不信發智論佛説云師義云事若不信發智論非佛説云師義者何云傳聞尊者迦多衍尼子等造故哉發智論非佛説云師意存迦多衍尼子造故也是二答正理論中難經主義云此皆不然諸大聲聞隨佛聖教而結集故以今此難破之文思論主不信之義不信發智論非佛説迦多衍尼子結集佛處處散説云師義見若不信之義非此師説者難破之文何云諸大聲聞隨佛聖教而結集故哉爰知今論因比傳佛説對法之言中唯舉發智論佛説云師義云事但於既云傳佛説對法可含發智論佛説云師義云難者發智論非佛説云師意云結集佛處處散説故尋源是佛説故云傳佛説對法也此師説甚難信故唯舉此一師説置傳説之言表不信之義也次於正理論傳聞尊者迦多衍尼子等造故之文者經主意存發智論等非結集佛處處散説偏是迦多衍尼子等自造故不信發智論結集佛處處散説云師義為言婆沙論中發智論非佛説云師意述迦多衍尼子結集佛説之旨故論主意不信此師義也寫本云弘長二年壬戌二月二十九日巳時於東大寺知足院別所之草庵抄之畢去年四月十二日初記録當卷之論義此春今日聊終其抄出之微功間端數多依餘百條結集之次分為兩帖而已捧此所生惠業奉資春日大明神之法樂依此修學功勞必遂上生都率天之願望稽古之勤佛哀愍神納受回向之志親為先疏不漏矣右筆東大寺別當華嚴宗末葉法印權大僧都宗性年齡六十一夏﨟四十九
