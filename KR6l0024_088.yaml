body:
  text: 俱舍論第二十九卷抄問凡夫二乘所起四無量可緣他三千界有情耶答不緣他三千界有情也兩方若緣他三千界有情者凡夫二乘通力無及他三千界設雖四無量觀門何可緣他三千界有情哉若依之爾者今論文釋無量名云無量有情為所緣故文婆沙論八十二中述評家義云應作是説此不決定以四無量皆是假想皆與勝解作意相應或有一切皆以有情邊際而觀或有一切皆以方域邊際而觀文任此等論判凡夫二乘所起四無量可緣他三千界有情見如何答凡夫二乘通力不知他三千界故他三千界既非其境界彼所起四無量不可緣他三千界有情云事道理必然也但於今論無量有情為所緣故之文婆沙論或有一切皆以有情邊際而觀等之説者就凡夫二乘所知分齊談之也問慈無量以何為體耶進云今論疏中以無瞋善根為體釋也付之慈無量作與樂行相尤可無貪善根為體例如布施無貪為體如何答修慈無量對治瞋故以無瞋善根為其自性也故今論云四中初二體是無瞋文正理論七十九云此中慈悲無瞋為性文顯宗論説全亦同之加之勘婆沙論處處之文或八十一云慈悲俱以無瞋善根為自性對治瞋故文或百四十一云慈謂與樂作意相應無瞋善根為性文雜心論七云二無量無恚者謂慈及悲是無恚善根性瞋恚對治故文任此等定判慈無量以無瞋善根為體云事諸論一同之説更無有異義也但於慈無量作與樂行相尤可無貪善根為體云難者慈無量願令諸有情得樂能伏瞋煩惱故雖作與樂行相以無瞋善根為體也次於布施無貪為體云例難者彼捨自財寶施與他人故以無貪善根為其體性全不可為相例難也問悲無量以何為體耶答今論中明悲無量體或云無瞋為體或云不害為體也且付無瞋為體云義不可然悲無量以無瞋善根為體者與慈無量有何差別哉何況見今論文云謂諸瞋害不欣慰欲貪瞋治此如次建立慈等悲無量治害述尤可不害為體例如捨無量對治貪瞋故無貪無瞋二善根為體如何答披諸論所説尋悲無量體舉無瞋不害之二師異説故今論云四中初二體是無瞋理實應言悲是不害文正理論七十九云此中慈悲無瞋為性有作是言悲是不害近治害故理實如是但害似瞋以瞋名説悲之行相亦似無瞋立無瞋名實是不害文顯宗論四十説全亦同之加之勘婆沙論處處之文或八十一云慈悲俱以無瞋善根為自性對治瞋故有作是説慈無量以無瞋善根為自性對治瞋故悲無量以不害為自性對治害故文或百四十一云悲謂除苦作意相應無瞋善根為性有説不害為性文此中悲無量以無瞋善根為體云義意修悲無量對治瞋故無瞋善根為其自性云也但於悲無量以無瞋善根為體者與慈無量有何差別哉云難者光法師所引正理論七十九中會此疑云性雖無別然慈能治殺有情瞋歡行相轉悲能對治惱有情瞋戚行相轉是謂差別文婆沙論慈對治斷命瞋悲對治捶打瞋復次慈對治應瞋處瞋悲對治不應瞋處瞋之文雜心論七是處恚者以慈對治非處恚者以悲對治復次為捨衆生命起恚以慈對治為楚罰衆生起恚以悲對治之説其意亦同之次於今論悲無量治害云文者光法師會之云以實而言悲正治瞋害是瞋家等流果故悲亦治害文思此釋意悲無量正所對治瞋煩惱故以無瞋善根為體也如此得意之時捨無量之例難自被遮畢問正理論意喜無量喜受為體義如何破之耶進云正理論七十九云何緣觀行者爾時喜受生若緣與樂與慈無異若緣拔苦應與悲同文付之喜無量是喜受也設雖作與樂拔苦行相其體何可與慈同哉何況如今難破者以欣為體無貪為體云義亦可有此過哉答喜無量者慈無量與樂悲無量拔苦之上作欣慰行相也是則欣諸有情得樂免苦之義也而今難喜受為體師若作與樂行相者應慈相應喜何別為喜無量體若作拔苦行相者應悲相應喜何別為喜無量體若作欣慰行相者契經中云欣故生喜欣是能生喜是所生別體法故不可云喜受作欣慰行相破也重意云喜受作欣慰行相者為難違契經欣故生喜之又先述作與樂拔苦行相者可有過之旨也難破意趣欲成欣是能生喜是所生所生喜受非喜受無量體故以欣為體無貪為體云義不可蒙此難破也問正理論意引何經文破喜無量喜受為體義耶進云正理論中引契經欣故生喜之文破之也付之契經中雖説欣故生喜全無違喜無量喜受為體之義何引今文破此義哉答正理論中破喜無量喜受為體之義云又契經言欣故生喜喜即喜受如先已辨此喜行相與彼欣同喜故生喜義有何異文此文意云契經中云欣故生喜喜者喜受也欣者喜無量行相也而喜無量體是喜受者今此欣即可喜受若爾能生所生同是喜受喜故生喜之義也有何別異云欣故生喜哉破也如此破意云欣云喜名別故其體可異故知喜無量體可非喜受為言尋云正理論此喜行相與彼欣同之文意喜無量行相與欣同云歟為當述欣故生喜之喜行相與欣同云歟答此喜行相者指喜無量行相也此喜無量行相與欣同故喜無量體即喜受者欣故生喜者喜故生喜之義也能生所生義有何異哉破也故泰法師釋此文云此喜無量行相與彼欣同欣即喜受者經言喜故生喜義有何異經不言喜故生喜乃言欣故生喜文光法師釋此文云又喜與欣名義俱別寧言喜行與彼欣同説喜喜受名義行相皆順契經文尋云正理論次下文云若言下上義有異者輕安與樂義亦應然差別因緣不可得故文此文意如何答喜無量喜受為體云義意會契經欣故生喜之若云下喜名欣上喜名喜能生所生雖同喜受其體異故説欣故生喜無其過者云輕安故生樂下樂名輕安上樂名樂輕安與樂可同樂受若欣故生喜者同喜受中分下與上輕安樂故生樂者輕安是輕安非樂受樂是樂受非輕安云者欣故生喜云輕安故生樂其義可同何彼就同喜受中下上分之此望輕安與樂受各別法論之哉其差別因緣不可得故為言問正理論中明喜無量體云諸古師説喜即喜受文爾者今此師意劣喜名欣歟答不劣喜名欣也兩方若劣喜名欣者欣與喜受其體既異設雖此師意何可劣喜名欣哉若依之爾者正理論中破此師義引契經欣故生喜之文此師救之云若言下上義有異者述劣喜名欣之旨如何答喜即喜受云師意全不可云劣喜名欣也故光法師喜無量喜受為體之義為正云釋意難正理論中引契經欣故生喜之文破此師義云又喜與欣名義俱別寧言喜行與彼欣同説喜喜受名義行相皆順契經文但於正理論若言下上義有異者之文者正理論師引契經欣故生喜之文破喜無量喜受為體云師義之時自作彼師轉救重引契經輕安故生樂之文為此難此轉救假全彼師救云下喜名欣上喜名喜者為言非謂彼師意實存劣喜名欣頗不足為疑歟問品類足論中出喜無量體云謂喜及喜相應受想行識文爾者今此喜者喜受歟答可有唯限喜受廣通五蘊之二意也兩方若喜受者不喜受與受相應何云喜相應受想行識哉若依之爾者披品類足論文問喜無量云何答之云謂喜及喜相應受想行識文相無諍可喜受見如何答喜無量體可有局通之二門也若約尅性體云之者可限喜受故婆沙論八十一中改此文云彼文應説謂喜及喜相應想行識不應言受而言受者是誦者謬文若就助伴體論之者可通五蘊故婆沙論中會此文云復次彼論總説五蘊為喜無量自性雖喜受與受不相應而餘心心所法與受相應故作是説亦不違理文光法師餘處一中隨行對法攝慧云釋意述彼此展轉互隨行故之旨畢云故婆沙八十一出喜無量體云喜者以喜根為自性若兼取相應隨轉欲界者四蘊為自性色界者五蘊為自性深探此文意以為其證據也問四無量眷屬體中可攝得耶答可攝得也兩方若攝得者得望本法婆沙抄五本是疏遠非俱有因四無量眷屬體中何可取得哉是以人師解釋中云慈悲俱以無瞋為體若不相應中生等亦是無量體除得得非無量故文若依之爾者見今論文出四無量體云若並眷屬五蘊為體文若五蘊為體者寧不攝得哉答四無量眷屬體中可攝得也故勘品類足論十三文明約四無量隨心轉非受相應等四句分別出非隨心轉非受相應之句云謂無量所攝隨心不相應行諸餘無量所攝心不相應行文隨心轉心不相應行者是四相也除之云諸餘無量所攝心不相應行豈非指得哉爰知四無量眷屬體中攝得云事但於得望本法是疏遠非俱有因云難者雖不得與本法為俱有因性相隨順故眷屬體中可取之也次於人師解釋者婆沙抄定判也非只違本論説亦似背道理故不可依用之問四無量可緣見所斷法耶答可緣見所斷法也兩方若緣見所斷法者四無量觀門作與樂拔苦等行相何可緣見所斷法哉若依之爾者婆沙論中四無量緣見所斷法見如何答四無量觀門總緣欲界有情故緣起見所斷惑有情者寧不緣見所斷法哉故勘婆沙論八十一文或明四無量緣境云若諸有情住自地心者則緣彼五蘊文或八十一云此四無量唯修所斷緣見修所斷文但於四無量觀門作與樂拔苦等行相何可緣見所斷法哉云難者四無量是假想觀門故總緣欲界有情作與樂拔苦等行相之時緣彼有情所起見所斷惑有何所背哉問未來四無量可緣自相續耶答不緣自相續也兩方若緣自相續者思四無量行相更不可緣自相續是以披婆沙論文四無量唯緣他相續釋若依之爾者婆沙論五十七中現在嫉結雖不緣自相續未來嫉結可緣自相續見相例可同如何答修四無量願令諸有情與樂拔苦等也設雖未來四無量何可緣自相續哉故婆沙論八十一云此四無量唯緣他相續文但於婆沙論中未來嫉結可緣自相續見云例難者以彼論有作是説嫉結於他能緣亦現起於自能緣不現起慳結於自能緣亦現起於他能緣不現起此據能緣故言如是之文致此例難歟若爾彼不正義也全不可為痛重難云婆沙論中無有正不以何知彼不正義哉答勘婆沙論處處之文於染汚法有能緣定非現起定云義為評家所破如或破有餘師有緣一極微起薩迦耶見此約所緣故説有非約現起故説有云義述評曰彼説非理所以者何如何此見能住所緣而不能起是故前説於理為勝或十八破有説意非想非非想處亦有他地緣隨眠者然能緣定非現起定云義判評曰彼不應作是説既無上地可緣如何有能緣定是故説無於理為善等也準此等正不思之彼不正義云事必然歟問四無量可通順勝進分耶答可通順勝進分也兩方若通順勝進分者見婆沙論百六十三文云順勝進分者能觀自地為麁苦障而生厭背能觀上地為靜妙離而生欣樂文而四無量唯緣欲界有情何可通順勝進分哉若依之爾者雜心論八中云此不淨觀復有四種謂退分住分勝分決定分不淨觀既通順勝進分四無量例可同如何答婆沙論百七十五中明雜修靜慮行相述評家義云如是説者能雜修作十六行相所雜修或作十六行相或作餘行相謂無量解脫勝處等以四無量等為所雜修有漏功德定知四無量可通順決擇分云事若通勝順決擇分者何不通劣順勝進分哉但於婆沙論順勝進分緣自上地云文者任如次順煩惱自上地無漏之理分別四分定相之時且以順勝進分緣自上地云也全非遮兼緣下地之義歟問斷欲界煩惱九無間前八解脫道位可修喜無量耶答依婆沙正理兩論一師説意者可修喜無量也兩方若修喜無量者任今論喜初二靜慮之文未至地不可有喜無量可修何地喜無量哉若依之爾者光法師餘處二十四所引正理論六十六中云有餘師言異生聖者離欲無間解脫道中亦修不淨息念慈等文等言豈非等悲喜捨三無量哉婆沙論六十四文云有作是説諸異生者離欲染時九無間道中修九行相謂麁等三及慈悲喜捨不淨觀持息念八解脫道中修十二行相謂即前九及解等三文此等論判無諍斷欲界煩惱九無間前八解脫道位修喜無量見如何答喜無量體異説非一如婆沙論舉二師説正理論文出三師説也其中以欣為體云義內亦有異説故婆沙論云有餘師説此喜無量欣為自性欣體非受別有心所與心相應有説欣在喜根相應聚中可得有作是説喜根後生欣由喜力所引起故文依此初師意者非必喜根相應欣非必喜根後生欣故未至地中可有喜無量也光法師所引婆沙論文百四十一云有説以善心所中欣為自性正理論七十九中判若喜異喜受亦通思所成彼應説喜通依七地與樂捨受亦相應故即述此師意也故婆沙正理兩論之中舉此師義云斷欲界煩惱九無間前八解脫道位修喜無量更有何疑哉但於今論喜初二靜慮之文者此喜無量喜受為體云義意也既為別師説不及致會通重難云婆沙論百六十七中釋發智論第三第四靜慮與三無量相應云文云三無量者除喜無量後二靜慮無喜根故諸有欲令喜無量不以喜受為自性者亦説此與喜受相應故彼二地唯三無量文如此文者喜無量不以喜受為自性云師意無喜受之處無喜無量見若爾未至地何有喜無量哉答此文亦當有説欣在喜根相應聚中可得云別師義也不足為疑歟尋云正理論中出喜無量體云或即無貪文唯限喜受相應無貪歟答此義意唯以喜受相應無貪為喜無量體也故正理論云此與喜根必俱行故三地可得如悔憂俱喜亦無貪文疑云以欣為體云師中通非喜相應欣云義有之無貪為體云釋意何唯限喜受相應無貪哉答喜無量必作欣慰行相而欣心所雖不與喜受相應作欣慰行相故非喜相應欣為喜無量體無貪不爾不與喜受相應者不可作欣慰行相故非喜相應無貪不為喜無量體也問正理論中明喜無量體舉喜即喜受喜異喜受二義爾者今此二義意分別聞思修所成時可有不同耶進云正理論中喜即喜受義唯是修所成喜異喜受義亦通思所成釋也付之若約定地云之者同限修所成若就散善論之者可通思所成何依喜即喜受異喜受之義可有通不通思所成之不同哉答見正理論七十九文云此四無量依地別者若喜即喜受唯是修所成彼應説喜唯初二定以於餘地無喜根故若喜異喜受亦通思所成彼應説喜通依七地與樂捨受亦相應故文思此文意喜即喜受者據根本論故唯修所成唯依初二靜慮喜異喜受者兼加行談故通思所成通依欲界未至中間四本意七地為言是則一往之廢立也理實而言依喜即喜受異喜受之義不可有限修所成通思所成之不同歟問正理論中明喜無量體舉三師説爾者以欣為體云義意依上三靜慮近分地可起喜無量耶答依上三靜慮近分地可起喜無量也兩方若依上三靜慮近分地起喜無量者披正理論七十九文云若喜異喜受亦通思所成彼應説喜通依七地與樂捨受亦相應故文此文無諍依上三靜慮近分地不起喜無量見若依之爾者上三靜慮近分地既有欣心所喜無量以欣為體云義意何依上三靜慮近分地不起喜無量哉答喜無量以欣為體云義中通非喜相應欣云説意依上三靜慮近分地可起喜無量也其理即如疑難之趣但於正理論説彼應説喜通依七地之文者理實而言依上三靜慮近分地雖起喜無量彼近分地無勝善根故屬根本地別不論之未至定中間禪有勝善根故四靜慮外為別依地云通依七地也例如依第二靜慮近分地雖起初二解脫婆沙論八十四中述彼依地云初二解脫在初二靜慮及未至定靜慮中間不舉第二靜慮近分地也問慈無量可感第四靜慮異熟果耶答可感第四靜慮異熟果也兩方若感第四靜慮異熟果者婆沙論八十三中引契經修慈究竟極至遍淨天之文畢云修慈究竟極至遍淨是事可爾文如此釋者慈無量不感第四靜慮異熟果見若依之爾者慈無量既依第四靜慮何不感彼異熟果哉答今論中明四無量依地云所餘三種通依六地謂四靜慮未至中間慈無量依地通第四靜慮尤可感彼異熟果也故發智論十七云慈異熟何處受答或梵世或極光淨或遍淨或廣果文婆沙論百六十二中釋此文云謂四靜慮慈無量異熟果生者文任此等論判慈無量感第四靜慮異熟果之旨甚分明也但於婆沙論修慈究竟極至遍淨是事可爾之釋者正見問言云修慈究竟極至遍淨是事可爾得彼果故繫屬彼故修三無量究竟極至下三無色云何可爾豈有色界善招無色果耶文此文意云對悲喜捨三無量色界善故如次感下三無色異熟果不可得修慈無量感遍淨天異熟果故慈無量與樂行相轉樂受極至第三靜慮故修慈無量極至遍淨天者是事可爾為言得彼果故繫屬彼故者即顯此義也理實而言依第四靜慮慈無量感第四靜慮異熟果之義更非所遮歟尋云婆沙論中云繫屬彼故其意如何答慈無量與樂行相轉樂受極至第三靜慮故由相似義云繫屬彼故也是當有餘復言與彼相似故作是説之義意歟問慈無量可感五淨居天異熟果耶答可感五淨居天異熟果也兩方若感五淨居天異熟果者勘發智論十七文云慈異熟何處受答或梵世或極光淨或遍淨或廣果文如此文者慈無量不感五淨居天異熟果見若依之爾者慈無量既依第四靜慮何不感五淨居天異熟果哉答今論中明四無量依地云所餘三種通依六地謂四靜慮未至中間慈無量依地通第四靜慮尤可感五淨居天異熟果也故光法師餘處二十四引婆沙論百七十五如是説者能雜修作十六行相所雜修或作十六行相或作餘行相謂無量解脫勝處等之文畢云如是五品雜修靜慮如其次第感五淨居文既指通慈無量等所雜修中間有漏善根云如其次第感五淨居慈無量感五淨居天異熟果之旨甚分明也但於發智論或廣果之文者且就凡聖共居之處云廣果也問四無量唯感色界異熟果歟答唯感色界異熟果也進云婆沙論八十三引契經説云修慈究竟極至遍淨天修悲究竟極至空無邊處修喜究竟極至識無邊處修捨究竟極至無所有處慈無量感色界異熟果後三無量感無色界異熟果見付之四無量是色界有漏功德也唯可感色界異熟果後三無量何感無色界異熟果哉答婆沙論中引此契經説解之屢及八箇異説其中初師説云此説甚深彌勒下生當解此義文此文難辨以之可知第五師説云有餘復言與彼相似故作是説謂慈無量樂行相轉受極至第三靜慮悲無量苦行相轉有色便有斷手足等種種苦事空無邊處訶責諸色似悲行相喜無量歡喜相轉識無邊處於識歡悅似喜行相捨無量捨行相轉無所有處多所棄捨似捨行相故依相似説無量聲文正理論七十九中引此契經文雖載諸論會通判是故應知前釋為善以此師義為正釋故且依此一師説會今契經文也問悲無量可依下三靜慮耶通云今論疏中悲無量依下三靜慮釋也付之悲無量者是戚行相轉也若依下三靜慮者如何可與喜樂二受相應哉答今論云所餘三種通依六地謂四靜慮未至中間文發智論十八云初靜慮攝初靜慮四無量初二解脫前四勝處八智三三摩地第二靜慮攝第二靜慮四無量初二解脫前四勝處八智三三摩地第三靜慮攝第三靜慮三無量八智三三摩地文婆沙論八十一中述評家義引此文云評曰應作是説初二靜慮有悲無量云何知然有至教故如定蘊説初二靜慮攝初二靜慮四無量等故知有悲文源起自發智論文至今論等説悲無量依下三靜慮之旨分明也但於若依下三靜慮者如何可與喜樂二受相應哉云難者正理論問答也故光法師所引正理論七十九云若悲亦依下三靜慮如何得與喜樂相應悲緣苦有情戚行相轉故此如無漏厭作意生是故通依下三靜慮彼真實作意能順生欣喜樂相應可無有過此勝解作意不順生欣如何可言與彼相似疑是戚性不順生欣如何許疑喜樂俱起勝解作意應與彼同然此於欣極相隨順力能引生真作意故疑則不爾極違真故彼尚相應此寧不許此勝解作意理應違欣有歡戚處中行相故悲既戚行相轉應非喜樂相應勿二行相俱時轉故若爾應不許與捨受相應捨受處中行相轉故既非不許捨受相應與喜樂俱理定應許勿全不與受相應故文重重問答其意自顯也顯宗論四十説全亦同之問除後有異生所餘異生所起四無量可通未曾得耶答可通未曾得也兩方若通未曾得者婆沙論中述四無量曾得未曾得相云此四無量皆通二種一切聖者及住後有異生皆通一種諸餘異生唯是曾得文此文無諍除後有異生所餘異生所起四無量不通未曾得見若依之爾者披婆沙論文異生起四無量時修淨靜慮判若不通未曾得者何可有未來修哉答除後有異生所餘異生類非一準所起四無量可通未曾得也是以見婆沙論處處文或八十四述前七解脫曾得相云謂諸聖者及內法異生皆通曾得及未曾得外法異生唯是曾得文或八十三明八勝處曾得未曾得相云謂諸聖者及內法異生皆通二種外法異生唯是曾得文或八十五説十遍處曾得未曾得相云謂諸聖者及內法異生通曾得未曾得外法異生唯是曾得文或九十九判他心智曾得未曾得相云一切聖者及內法異生皆通曾得外法異生唯是曾得文任此等論文除後有異生所餘異生所起前七解脫八勝處十遍處他心智等功德皆通未曾得見至四無量寧唯限曾得哉但於婆沙論諸餘異生唯是曾得之文者除後有異生所餘異生所起四無量中論其法體雖有未曾得類其勢力劣不越曾得分齊故屬曾得類也光法師餘處二十六得勝曾得名未曾得之釋意實雖曾得法勝曾得法與未曾得名翻而思之實雖未曾得法劣未曾得法可與曾得名也重難云勘婆沙論八十一文述四無量曾得未曾得相云有作是説一切聖者及住內法異生皆通二種外法異生唯是曾得文若初師意除後有異生所餘異生所起四無量中有未曾得類云者與第二師義有何差異哉答按婆沙論兩師所説義勢雖相替實事無所背歟初師意云實雖未曾得其勢力劣不越曾得分齊故屬曾得類第二師云其勢力劣雖不越曾得分齊其體實是未曾得故云未曾得也問無佛世時除近佛地菩薩可起上三靜慮無量耶答不起上三靜慮無量也兩方若起上三無量者披婆沙論八十二文述世無佛時無有能起後三靜慮諸無量者唯除鄰近佛地菩薩無佛世時除近佛地菩薩之外不起上三靜慮無量見若依之爾者今論中明起定緣云謂器世界將欲壞時下地有情法爾能起上地靜慮文思此文意無佛世時除近佛地菩薩何不起上三靜慮無量哉答欲界有情非教力者根本靜慮甚難現起故無佛世時除近佛地菩薩不起上三靜慮無量也故見婆沙論説不限疑難之中被出之文次下文又云復次世無佛時無有能起後三靜慮諸無量者唯有妙眼能起第二靜慮無量故名為上是故尊者妙音説曰異生無能起上三地諸無量者由佛説力世尊弟子亦能起之文但於今論法爾能起上地靜慮之文者難勢之趣未得其意無佛世時不起上三靜慮無量者唯就欲界有情論之上界都無有佛出世不談有佛無佛時故也而此文明生色界起色界定緣故全不為疑也重難云欲界有情非教力者根本靜慮甚難現起者無佛世時何起初靜慮根本定哉是一次麟喻獨覺出無佛世將成自乘菩提之時寧不起第四靜慮無量哉是二答欲界有情無佛世時起初靜慮根本定者壞劫時也謂器世間將壞之時欲界有情由法爾力離欲界染起初靜慮故無佛世時起初靜慮根本定也次麟角喻者如菩薩説者婆沙論所説也故麟喻獨覺同近佛地菩薩無佛世時可起上三靜慮無量也問未離欲染聖者起相似四無量時可得通行耶答可得通行也兩方若得通行者相似四無量者微劣功德也何可得通行哉若依之爾者婆沙論中未離欲染聖者起相似四無量時得通行見如何答勘婆沙論九十四文云若未離欲染聖者起諸相似無量解脫勝處遍處及不淨觀持息念念住等諸功德時皆無捨得一文今此相似無量等者欲界四無量等也欲界聞思所成四無量等無間緣無漏道品可現起故就生相得得一通行為言如彼上文云世第一法現在前時得一或二未有所捨也但於相似四無量者微劣功德也何可得通行哉云難者欲界聞思所成功德實雖微劣許彼無間無漏道品現起之義故得通行無其過也重難云相似無量等者是色界修所成四無量得修無漏道品故得通行也何云欲界四無量等哉答相似無量等若非欲界四無量等者寧唯限未離欲染聖者所起哉何況亦通色界四無量等者所得通行豈唯限一種哉故知今此相似無量者唯限欲界四無量等云事問以初靜慮無漏斷初靜慮煩惱九無間九解脫道位可修自地四無量耶答不修自地四無量也兩方若修自地四無量者四無量非同對治道何可修之哉若依之爾者見婆沙論八十一文云或離自地上地染時修得無量文如何答以初靜慮無漏斷初靜慮煩惱九無間九解脫道位不可修自地四無量四無量非同對治道故彼九無間九解脫道位不修之也故婆沙論百六十三中出未得無漏初靜慮現在前而不修淨初靜慮之句云聖者依初靜慮離初靜慮乃至無所有處染九無間道九解脫道時及離非想非非想處染九無間道八解脫道時文光法師餘處二十六引此文畢云婆沙既言依初定離初定染不修初定淨明知有無漏依此地不修此地有漏又準此文依初定起無漏解脫道中不修當地有漏他心智前言修者據無漏他心智説文任此婆沙論文光法師釋以初靜慮無漏斷初靜慮煩惱九無間解脫道位不修自地有漏功德云事甚分明也但於婆沙論或離自地上地染時修得無量之文者就加行道位論之也以初靜慮無漏斷初靜慮煩惱九無間九解脫道位雖不修自地有漏功德加行道位得修之故云爾也故勘婆沙論百六十三文出未得無漏初靜慮現在前而修淨初靜慮之句云依初靜慮為離初靜慮乃至非想非非想處染若無漏為加行彼加行道時文重難云見今論餘處二十六文云諸道依得此修此地有漏文彼九無間九解脫道位既有依此地義何不修自地四無量等有漏功德哉是一次思婆沙論或離自地上地染時修得無量之文意專可指無間解脫道位也加行道非正斷或道寧云離染時哉是二答諸道依得此修此地有漏者修有漏功德有依此地得此地二類云許也非謂一切依此地位皆修此地有漏功德故光法師問依此地起無漏法皆修此地有漏法耶答之云亦有不修者文次加行道雖非正斷或道是斷或道所攝也是以今論餘處二十六文云為離此言通二四道文婆沙論九十二中舉不成就樂根斷道位云應言在第三靜慮未起加行道文故加行道位所得修功德可屬離染道種類也問四無量緣欲界有情時具可有緣有緣緣無緣等四句耶進云婆沙論中唯有三句無一句也付之欲界有情其類非一準具可有四句何闕一句哉答婆沙論百四十六中釋此事云四無量中若取自性緣住同分心有情則為第三句若緣不住同分心有情則為第二句若並取相應隨轉緣住同分心有情則為第三第四句若緣不住同分心有情則為第二第四句文此文意云若就四無量自性云之文者四無量自性皆心所法能緣性故若緣住同分心有情之時緣有所緣同分心等及無所緣依身等故為第三緣有緣緣無緣句若緣不住同分心有情之時唯緣無所緣依身等故為第二緣無緣句若四無量體並取相應隨轉者其相應心心所若緣住同分心有情之時緣有所緣同分心等及無所緣依身等故為第三緣有緣緣無緣句若緣不住同分心有情之時唯緣無所緣依身等故第二緣無緣句也隨轉色不相應非能緣性故為第四非緣有緣非緣無緣句也故四無量緣欲界有情之時有第二緣無緣有緣緣無緣第四非緣有緣非緣無緣三句為言四無量必緣無所緣依身等故無第一緣有緣句也重難云四無量總緣欲界有情故雖緣不住同分一類有情亦可緣住同分心一類有情何有緣無緣句哉若所緣有情中義分論此義者寧無緣有緣句哉答四無量雖總緣欲界有情亦別緣不住同分心有情全無所背也問勝解作意無間可生他地心耶答可生他地心也兩方若生他地心者假想觀門者勢力微劣也何可生他地心哉是以披婆沙論文釋後二遍處無間唯生無色界五部心云是假想觀不能引起色界定心文若依之爾者婆沙論中四無量無間生欲界欲界修所斷心見明知勝解作意無間生他地心云事如何答勝解作意無間可生他地心也即初靜慮四無量初二解脫前四勝處無間可生欲界修所斷心也欲界心是無始以來極數串習起之甚易故也故婆沙論八十九中解發智論六四無量等無間生六心云文云謂色界五部及欲界修所斷緣欲界故緣有情故不能引起無色界心前二解脫前四勝處應知亦爾緣欲界故文但於假想觀門者勢力微劣也何可生他地心哉云難者假想觀門實雖勢力微劣起欲界心數習甚易故初靜慮假想觀門無間起之也次於婆沙論是假想觀不能引起色界定心之文者假想觀門無間所生他地心者唯是欲界心非色無色界心色無色界心無有極數串習之義故他地勝解作意無間不生也故婆沙論文亦非相違歟重難云見婆沙論文明六十五等至相生他地心無間所起等至中不舉勝解作意功德所依若爾他地心無間既無現起之義何可生他地心哉是一次勝解作意無間不生他地色無色界心者豈亦可生欲界心哉是二次婆沙論中述四無量無間生欲界修所斷心云緣欲界故緣有情故文全不釋欲界心是無始串習故他地勝解作意無間起之哉是三答四無量等勝解作意功德勢力微劣專以自地心為加行起故他地心無間雖不現起出觀之時心品易起故初靜慮四無量等無間生欲界修所斷心也次色無色界善心無有極數串習之義故他地勝解作意無間雖無現起之義欲界散心無始以來極數串習故初靜慮四無量等無間生之也故光法師餘處七解若依未至定得阿羅漢果後出觀心或是欲界依無所有處得阿羅漢果後出觀心或即彼地或是有頂若依餘地得阿羅漢果後出觀心唯自非餘地之論文云若於欲界散心是強衆生無始多生其中數數串習起時即易有依未至定不得自在者容起欲界散心上二界定及與散心有情無始不多生彼初無學後異地相生起時即難當地即易故依二定等得無學果後出觀心唯依自地不依下地定及散心文以此解釋為今潤色也但婆沙論四無量無間生欲界修所斷心者欲界四無量無間生欲界修所斷心也云聊簡甚不可然若就欲界四無量論所生心者可生欲界五部心寧限修所斷心哉次婆沙論緣欲界故緣有情故之文明四無量無間不生無色界心故非述生欲界心故故婆沙論云緣欲界故緣有情故不能引起無色界心文就中心品相生更不由為所緣境之處何為生欲界心故哉問初二解脫為唯治顯色貪為當治形色貪歟答通治顯形二色貪也兩方若唯治顯色貪者披今論餘處二十二文舉不淨觀所治貪述一顯色貪二形色貪不淨觀通治顯形二色貪定初二解脫作不淨行相例亦可治顯形二色貪也若依之爾者今論中云初二解脫一一通依初二靜慮能治欲界初靜慮中顯色貪故文光法師釋此文云初二解脫一一通依初二靜慮初二亦攝近分中間能治欲界眼識所引顯色貪故能治初定眼識所引顯色貪故故初二解脫但依初二定文光法師所引正理論八十云欲及初定有顯色貪由眼識身所引起故為解脫彼初二定中建立初二不淨解脫文任此等定判初二解脫唯治顯色貪見如何答三境欲可見者性相之所定也初二解脫何不緣形色哉若通緣顯形二色者豈不治顯形二色貪哉是以婆沙論八十五中云故八勝處唯以欲界一切色處者為所緣境文一切色處之言廣可通顯形二色見若八勝處如前三解脫緣顯形二色者前三解脫亦緣顯形二色云事必然也加之光法師所引正理論八十中釋前八遍處但緣色處云風與風界既無差別如何可言亦緣色處此難非理以諸世間亦説黑風團風等故由此前八緣色理成文顯宗論説全亦同之婆沙論文明十遍處加行有三師説之中舉第二師義云地水大遍處以形顯色為所緣故出第三師義云風遍處亦以色為所緣故如世間説東風南風西風北風有塵風無塵風毗𣵀縛風毗嵐婆風風輪風等故風遍處亦緣色處前八遍處如淨解脫緣顯形二色見準知淨解脫亦緣顯形二色云事勿論也若淨解脫緣顯形二色者初二解脫亦緣顯形二色可治顯形二色貪之旨道理先言極成更不可異求之但於今論能治欲界初靜慮中顯色貪故之文者就顯且述治顯色貪盡理論之可云通治顯形二色貪也光法師釋正理論文會通之趣亦以同之問初二解脫為唯緣顯色為當緣形色歟答通緣顯形二色也兩方若唯緣顯色者辰旦人師婆沙抄三本引顯宗論云不淨觀前八遍處緣顯形色為境界故文初二解脫例亦可同若依之爾者今論疏中述初二解脫治顯色貪之旨若緣形色者豈不治形色貪哉答三境欲可見者性相之所定也初二解脫何不緣形色哉是以婆沙論八十五中云故八勝處唯以欲界一切色處為所緣境文一切色處之言廣可通顯形二色見若八勝處如前三解脫緣顯形二色者前三解脫亦緣顯形二色云事必然也加之光法師所引正理論中釋前八遍處但緣色處云風與風界既無差別如何可言亦緣色處此難非理以諸世間亦説黑風團風等故由此前八緣色理成文顯宗論四十説全亦同之婆沙論八十五文明十遍處加行有三師説之中舉第二師義云地水大遍處以顯形色為所緣故出第三師義云風遍處亦以色為所緣故如世間説東風南風西風北風有塵風無塵風毗𣵀縛風吠嵐婆風風輪風等故風遍處亦緣色處前八勝遍如淨解脫緣顯形二色見準知淨解脫亦緣顯形二色云事勿論也若淨解脫緣顯形二色者初二解脫亦同可緣之也但於今論疏中述初二解脫治顯色貪之旨者就顯且判治顯色貪盡理論之可云通治顯形二色貪也問初二解脫為唯治眼識所引貪為當治耳等四識所引貪歟答唯治眼識所引貪也兩方若唯治眼識所引貪者婆沙論八十文云如不淨觀能伏色貪亦能伏餘四境貪故辰旦人師婆沙抄三本釋謂初定中解脫對治欲界五識所引緣色相貪第二定中解脫對治初定中三識身所引緣色相貪任此等定判初二解脫通治耳等四識所引貪見若依之爾者今論疏中述初二解脫唯治眼識所引貪之旨如何答定三境欲可見初二解脫緣欲界可見色處為境故唯治眼識所引貪也故見今論文云初二解脫一一通依初二靜慮能治欲初靜慮中顯色貪故文光法師釋此文云初二解脫一一通依初二靜慮初二亦攝近分中間能治欲界眼識所引顯色貪故能治初定眼識所引顯色貪故故初二解脫但依初二定文寶法師釋此文云欲界初定有顯色貪者眼識身所引起故文光法師所引正理論八十云欲及初定有顯色貪由眼識身所引起故為解脫彼初二定中建立初二不淨解脫顯宗論四十説全亦同之加之勘婆沙論處處之文或八十四云棄背欲界及初靜慮識身所引緣色貪心故初二靜慮立初二不淨解脫文或八十五云對治欲界初靜慮中識身所引緣色貪故初二靜慮立緣色不淨解脫勝處文或百六十七評家意破有説厭食想同不淨想俱觀色處作不淨行解而不淨想對治淫欲愛厭食想對治段食愛云義云又段食愛緣段食起香味觸處是段食性若許此想對治彼愛云何説同不淨想觀色處故攝初二解脫耶文此等文意初二解脫唯治眼識所引貪云事分明也但於婆沙論亦能伏餘四境貪故之文者初二解脫緣欲界有見色作青瘀等行解專治眼識所引貪之時兼被伏耳等四識所引貪不現起故談其兼用云爾也如不淨觀能伏色貪亦能伏餘四境貪故之亦言此旨炳然者歟次於辰旦人師解釋者婆沙抄定判也婆沙論中對治欲界初靜慮中識身所引緣色貪故者對治欲界初靜慮中眼識身所引緣色貪故為言而識身之言廣故可通五識身得意釋謂初定中解脫對治欲界五識所引緣色相貪等背婆沙論意故更不可依用之重難云勘婆沙論百七十七文云有説初靜慮中初二解脫及不淨想對治欲界舌二識第二靜慮初二解脫及不淨想對治初靜慮眼耳身識文此文旁難思初靜慮初二解脫對治欲界眼識所引貪事必然也何閣之云對治欲界舌二識哉是一次初二解脫及不淨想不治五識體對治彼所引貪也而説對治欲界舌二識述對治初靜慮眼耳身識不云對治彼所引貪亦有疑哉是二答初靜慮初二解脫對治欲界眼識所引顯色貪事勿論也但今文云對治欲界舌二識舉唯初靜慮初二解脫所對治法也眼耳身三識所引貪第二靜慮初二解脫亦對治之故讓彼略之歟次初二解脫對治貪故無貪為性者極成理也故知説對治欲界舌二識述對治初靜慮眼耳身識且舉能引五識以顯所引貪也是亦據兼用云初二解脫對治耳等四識所引貪也問依第二靜慮近分地可起初二解脫耶答可起初二解脫也兩方若起初二解脫者婆沙論八十四中述初二解脫依地云初二解脫在初靜慮及未至定靜慮中間文如此文者依第二靜慮近分地不起初二解脫見若依之爾者依初靜慮近分地既起初二解脫準彼思之依第二靜慮近分地何不起之哉答依第二靜慮近分地可起初二解脫也故光法師所引正理論八十云初二解脫一一通依初二靜慮能治欲界初靜慮中顯色貪故初二通攝近分中間五地皆能起初二故顯宗論四十説全亦同之婆沙論中出未得非初靜慮世俗智現在前而修無漏初靜慮非淨之句云即聖者依第二靜慮近分起三無量初二解脫前四勝處不淨觀持息念念住三義觀時文任此等論判依第二靜慮近分地起初二解脫之旨甚分明也但於婆沙論初二解脫在初二靜慮及未至定靜慮中間之文者二靜慮言中含彼近分地也故次下文明第三解脫依地云第三解脫在第四靜慮別不舉第四靜慮近分地即存此意歟重難云若爾初靜慮外何別舉未至定哉答未至定異上七近分地有諸善根亦通無漏故初靜慮外別舉之也問未離第三靜慮染聖者可成就淨解脫耶答可有成就不成就淨解脫二義也兩方若成就淨解脫者披發智論一段之文遍淨愛未盡但不成就淨解脫見若依之爾者光法師所引正理論八十云第三解脫依後靜慮離八災患心澄淨故第四並近分立後靜慮名文婆沙論百六十三中出未得非初靜慮世俗智現在前而修無漏初靜慮非淨之句云即聖者依第四靜慮近分起三無量淨解脫後四勝處前八遍處不淨觀念住三義觀時文準此等論判思之未離第三靜慮染聖者何不成就依第四靜慮近分地淨解脫哉答此事雖難測且依相傳義者可云未離第三靜慮染聖者不成就淨解脫也其故勘發智論十八文明成就初靜慮成就不成就八解脫出不成就八解脫位云謂生遍淨即彼愛未盡文婆沙論百六十八釋此文云此即聖者生遍淨成就無漏初靜慮而不成就解脫初二解脫越地捨故後六解脫未離遍淨染未得故是故言無文發智論出成就一解脫位云謂生遍淨即彼愛盡上愛未盡文婆沙論釋此文云若生遍淨即彼愛盡上愛未盡彼成就淨解脫非餘前二越地捨故後五未得故文發智論出成就二解脫位云謂生欲界梵世極光淨遍淨愛未盡文婆沙論釋此文云若生欲界梵世遍淨愛未盡彼成就有漏無漏初靜慮及初二解脫非餘未得故文發智論出成就三解脫位云謂生欲界梵世極光淨遍淨愛盡上愛未盡文婆沙論釋此文云若生欲界梵世遍淨愛盡上愛未盡彼成就有漏無漏初靜慮及前三解脫非餘未得故文任發智婆沙兩論所説按成就解脫一段文相遍淨愛未盡位不成就淨解脫遍淨愛盡後成就淨解脫加之雜心論中出成就一背捨位云若生遍淨天於彼愛盡果實愛未盡文出成就二背捨位云若生欲界及生初禪於彼愛盡遍淨愛未盡文出成就三背捨位云若生欲界及初禪二禪遍淨愛盡果實愛未盡文準此等論判思之未離第三靜慮染聖者不成就淨解脫之旨分明也但於光法師所引正理論第四並近分立後靜慮名之文者淨解脫等功德以根本地為本故已得第四靜慮根本地後依彼近分地起之也故淨解脫依地通第四靜慮近分地云文全非相違婆沙論聖者依第四靜慮近分起淨解脫云文會通之趣亦以同之重難云見婆沙論百六十四文出未得非初靜慮世俗智現在前而不修淨初靜慮及無漏之句云即異生未離欲染依未至定起三無量初二解脫前四勝處不淨觀持息念念住三義觀暖頂忍世第一法時即聖者未離欲染依未至定起三無量初二解脫前四勝處不淨觀持息念世俗念住三義觀七處善時文此文既云未離欲染異生聖者依未至定起初二解脫故未得初靜慮根本地前起之云事炳然也準知未離第三靜慮染未得第四靜慮根本地前依第四靜慮近分地可起淨解脫也如何答未至地者近欲界故無始以來數習力故起之甚易故未離欲染未得初靜慮根本地前依未至定起初二解脫第二靜慮以上近分地不數習故起之稍難故未離第三靜慮染未得第四靜慮根本地前無依第四靜慮近分地起淨解脫之義也退勘婆沙論説釋契經若不動心解脫身作證具足住我説於彼都無有退之文云佛雖於諸定能速疾入而於最近者數入非餘故佛數數入未至定文準此文可思之問欲界可有相似四無色解脫滅受想解脫耶答可有二義也兩方若有相似四無色解脫滅受想解脫者今論疏中雖述欲界有相似前三解脫之旨不云有相似四無色解脫滅受想解脫知無此義云事若依之爾者披婆沙論處處之文或四十三云欲界具有一切功德相似法故或八十三判欲界具有一切善根相似種子乃至亦有相似滅定一切功德之言無所簡何唯限色界善根哉乃至亦有之詞所含攝廣可通四無色解脫見如何答此事雖難測且存一義云欲界有相似功德者專可相似色界攝善根緣欲界之類也四無色解脫滅受想解脫望欲界極遠也又無色界心品無緣欲界欲界之中無無心善根旁思其理欲界何可有相似四無色解脫滅受想解脫哉故今論中明前三解脫云餘地亦有相似解脫而不建立非增上故文光法師解此文云餘三四定及欲界地亦有初二相似解脫餘初二二定及欲界地亦有第三相似解脫而不建立非增上故畢引正理論八十云初二解脫相似善根雖欲界中亦容得有而為欲界貪所陵雜故不建立二解脫名第三解脫依後靜慮離八災患心澄淨故第四並近分立後靜慮名相似善根下地雖有非增上故不名解脫欲貪所陵雜故文顯宗論四十説全亦同之婆沙論八十四云初二解脫在初二靜慮及未至定靜慮中間餘地亦有相似善根而不立為初二解脫所以者何欲界散亂棄背力劣故不建立初二解脫第三解脫在第四靜慮下地亦有相似善根而不立為第三解脫文任此等論判欲界有相似前三解脫無相似四無色解脫滅受想解脫可云也但於婆沙論處處之文者欲界具有一切功德相似法故之文不云指有何功德故會通頗無煩歟欲界具有一切善根相似種子乃至亦有相似滅定之文尤似難欲界思慧緣無色界中施設相似四無色解脫欲界思慧微細勝品中施設相似滅盡定歟非謂云爾故欲界有無心善根也問論文云彼散善者如命終心文爾者無色界起散善唯限命終心歟答不限命終心也兩方若唯限命終心者無色界所起散善者生得善心也何可限命終心哉是以欲色界起生得善心無限命終心相例可同若依之爾者既云如命終心寧可通餘時哉何況次下論文述餘師義云有説餘時亦有散善文光法師釋此文云有説不但命終有善餘時亦有生得散善文以此有説義還思初師意無色界起生得善心唯限命終心見如何答無色界起生得善心其位可不定更不可限命終心是以今論餘處七中明二十心相生云生得善心無間生七無色界生得善心無間生角界加行善心判若無色界起生得善心唯限命終心者豈可生加行善心哉但於既云如命終心寧可通餘時哉云難者按論文起盡四無色解脫體簡彼界散善種標亦非散善性微劣故畢云彼散善者如命終心無色界散善微劣事如命終心云也如言所顯其意在之全非遮餘時起生得善心次於有説餘時亦有散善之文者異上如命終心之義餘時亦有生得善心現起之義其微劣分齊何可定必如命終心哉為言光法師釋會通同之問論文云近分解脫道亦得解脫名文爾者彼前八解脫道位未來所修麁等三行相可為四無色解脫體耶答可為四無色解脫體也兩方若為四無色解脫體者彼前八解脫道位未來所修麁等三行相有緣下地之義何可為四無色解脫體哉答今論意云近分解脫道亦得解脫名以近分地前八解脫道為四無色解脫體故彼位未來所修麁等三行相可為四無色解脫體也如此功德之相攝多從能修道品可定所修分齊故也但於彼前八解脫道位未來所修麁等三行相有緣下地之義云難者現起前八解脫道不緣下地故為四無色解脫體之時未來所修麁等三行相異現起道雖有緣下地之義現起道正緣下地故定能修道可為念住從現起道同見道攝也重難云若近分地解脫道位解脫體者空無邊處近分地前八解脫道位未來所修麁等三行相緣第四靜慮故空無邊處解脫可緣色界豈不違婆沙論八十四四無色處解脫緣無色界繫及不繫之文哉答婆沙論意近分地前八解脫道不為四無色解脫體云師説為正義故就此師義存空無邊處解脫不緣色界歟問今論意異生無色解脫現前位未來修身念住義可有耶答可有此義也兩方若有此義者婆沙論中異生起無色解脫時後三念住隨一現在修未來三除身念住文今論意何可背婆沙論説哉若依之爾者見今論文云近分解脫道亦得解脫名文若近分地前八解脫道為無色解脫體者寧無未來修身念住之義哉答任今論近分解脫道亦得解脫名之文空無邊處近分地前八解脫道為空無邊處解脫體見而彼位未來所修麁等三行相緣第四靜慮故異生無色解脫現前位未來修身念住之義可有也但於婆沙論未來修三除身念住之文者勘婆沙論處處之文第百四十一卷云次四即以根本地加行善四蘊為性有説亦以彼近分地前八解脫道為性雖舉二説第八十四卷云第四解脫在空無邊處問於此地中何法是解脫何法非解脫答離第四靜慮染諸加行道九無間道八解脫道及生得善等非解脫餘有為善是解脫第五第六第七解脫準之可知偏簡近分地前八解脫道不為四無色解脫體爰知婆沙論意以近分地前八解脫道不為四無色解脫體云師説為正義云事第百八十九卷中就其正義意明四念住時後三念住隨一現在修未來修三除身念住也今論意明婆沙論不正義説存近分地前八解脫道為四無色解脫體故異彼生義意異生空無邊處解脫現前位未來修身念住之義可許也問論中明無色解脫相云近分解脫道亦得解脫名文爾者寶法師意今此近分解脫道者可通四無色近分地解脫道耶答可通四無色近分地解脫道也兩方若通四無色近分地解脫道者寶法師釋此文云述空處近分中解脫道文如此釋者不通四無色近分地解脫道見若依之爾者近分解脫道亦得解脫名之言是廣何不通四無色近分地解脫道哉答披今論文起盡思近分地通局上標次四解脫如其次第以四無色定善為性下述近分解脫道亦得解脫名無間不然以緣下故近分解脫道之言可通四無色近分地解脫道久旨炳然也故泰法師釋此文云四無色定近分八解脫道亦得解脫名九無間不然以緣下故文此釋既叶今論所説寶法師意何可違之哉但於寶法師述空處近分中解脫道之釋者且從初論之也問今論意以近分地加行道可為四無色解脫體耶答不為四無色解脫體也兩方若四無色解脫體者近分地加行道既有緣下地之義何可為四無色解脫體哉若依之爾者今論中出四無色解脫體無簡近分地加行道爰知以彼加行道為四無色解脫體云事如何答今論意以近分加行道不可為四無色解脫體即見論文明四無色解脫體云近分解脫道亦得解脫名無間不然以緣下故彼要背下地方名解脫故尚簡無間道況加行道未斷下地煩惱之位自無間道之前現起數緣下地無有棄背下地之義寧為四無色解脫體哉故婆沙論八十四云第四解脫在空無邊處問於此地中何法是解脫何法非解脫答離第四靜慮染諸加行道九無間道八解脫道及生得善等非解脫餘有為善是解脫文第五第六第七解脫準之可知淨影大師大乘義章十三八禪定義釋云八解脫中空識解脫唯取空識二解脫道及彼定體餘皆不取何故如是彼方便道之未離下過故非解脫無礙雖斷下地之過未能出纍亦非解脫文依此婆沙論文任淨影大師釋以近分地加行道不為四無色解脫體云事甚分明也思今論意亦可同之但於今論中出四無色解脫體無簡近分地加行道云難者述無間不然以緣下故簡無間道之時彼加行道自無間道之前現起有緣下地之義故不待言自被簡畢故不別舉之歟重難云雜心論七中説四無色背捨相云餘即名背捨者除空處九無礙道及命終心餘善盡説空處背捨無礙道向第四禪命終心向生是故不立背捨當知餘無色亦如是文此文唯除空無邊處九無礙道及命終心不簡加行道云餘善盡説空處背捨故以空無邊處近分地加行道為空無邊處背捨體見準雜心説推今論意以近分地加行道為四無色解脫體可云也簡無間道之時彼加行道自被簡云事誰可信之哉是一何況無間道唯緣下地無棄背義故偏簡之無間不然以緣下故者即顯此意也加行道中亦有不緣下地之類以彼何不為四無色解脫體哉是二答淨影大師釋彼方便道未離下過故非解脫畢又雜心云無礙下緣故非背捨非背捨故不名解脫引合雜心論文故明知雜心論意以近分地加行道不為四無色解脫體云事但於不簡加行道云難者如會通今論文也次加行道中雖有不緣下地之類未斷下地煩惱之前所起道故不可為四無色解脫體淨影大師彼方便道未離下過故非解脫之釋此旨炳然也問婆沙論意異生無色解脫現前位可修身念住耶答不修身念住也兩方若修身念住者婆沙論中異生起無色解脫時不修身念住見若依之爾者無色解脫時現前位修身念住者論家人師之所定也異生例可同如何答婆沙論意空無邊處近分地前八解脫道不為空無邊處解脫體云師説為正義故異生無色解脫現前位不可修緣第四靜慮有漏色法身念住又異生所起無色界善心無聖道助勢力微劣不別緣下六地類智品道俱生戒色故現在未來不修身念住也故婆沙論百八十九云即諸異生若起無色解脫及後三念住時後三念住隨一現在修未來修三除身心念住文但於聖者無色解脫現前位修身念住云例難者聖者所起無色界善心有聖道助勢力強盛別緣下六地類智品道俱生戒色故現在未來修身念住也故婆沙論百八十九云若諸聖者無色解脫入滅定想微細心時四念住隨一現在修未來修四文光法師餘處二十八釋無色雖亦緣下六地類智品道俱生戒色就聖者所起無色界善心論之也問論中釋滅盡定得解脫名舉二師説爾者初師意解脫定障故名滅受想解脫歟答初師意於滅盡定得解脫名不由解脫定障故也兩方若解脫定障故名滅受想解脫者見論文初師意不云解脫定障故名滅受想解脫哉若依之爾者以道理思之勝品定現前位必可解脫定障明知於滅盡定得解脫名可由解脫定障故云事如何答披一段論文尋二師所存述初師義云厭背受想而起此故或總厭背有所緣故此滅盡定得解脫名厭背受想厭背諸有所緣心心所故於滅盡定得解脫名為言舉第二師説云有説由此解脫定障解脫定障故於滅盡定得解脫名為言凡於滅盡定有厭背受想及總厭背諸有所緣心心所法之義亦有解脫定障之義初師意由初義立解脫名第二師意由第二義立解脫名也其中初師義能順滅受想解脫名言亦同婆沙論八十四想受滅解脫棄背一切有所緣心故棄背義是解脫義之文有何所背疑此師義哉但於勝品定現前位必可解脫定障云難者誰云滅盡定不解脫定障雖有解脫定障之義得解脫名不由此故也問論文云有説由此解脫定障文爾者寶法師意今此文明滅盡定得解脫名歟答明滅盡定得解脫名也兩方若明滅盡定得解脫名者寶法師釋此文云述此定入出心異也文如此釋者不明滅盡定得解脫名見若依之爾者既云有説由此解脫定障爰知明滅盡定得解脫名之一説云事如何答見論文云第八解脫即滅盡定彼自性等如先已説厭背受想而起此故或總厭背有所緣故此滅盡定得解脫名有説由此解脫定障文言無諍明滅盡定得解脫名出或云厭背受想故或云總厭背有所緣故或云解脫定障故之異説見故光法師釋此文云厭背受想起此定故此滅盡定得解脫名或總厭背諸有所緣心心所故此滅盡定得解脫名有説由此滅定解脫不染無知定障故名解脫文泰法師釋此文云滅盡定解脫受想或解脫有所緣得解脫名有説由此滅盡定解脫不染無知定障故名解脫文此等解釋能叶論文寶法師意何可違之哉但於寶法師述此定入出心異也之釋者按論文起盡釋滅受想解脫微微無間生由自地淨心及下無漏出之本頌一科段中明滅盡定得解脫名及滅盡定入出心相故説滅盡定入出心相之文初牒加有説由此解脫定障之文許也非云此文正述滅盡定入出心相歟何況若此文述滅盡定入出心相云者釋滅盡定入出心相全無異説有説之言甚難消哉問論中明滅受想解脫云微微心後此定現前文爾者寶法師意微微心後位可有欣心所現起義耶答可有此義也兩方若有此義者寶法師餘處五解釋中引婆沙論百五十二有説此定二十一物為體以十大地法十大善地法及心滅故如是説者隨滅爾所心心所法即有爾所物現前為此定體之文畢云此與第三師別者評家兼取欣厭第三唯二十一故不同也準義無想有二十二謂加欣滅定有二十二謂加厭也文如此釋者微微心位不可有欣心所所現起義見若依之爾者微微心位厭受想欣滅定隨其所應欣厭隨一定可現前何不許欣心所現起義哉答微微心位雖有厭受想之義專緣所入滅盡定欣求之故可有欣心所現起云事必然也故勘光法師處處定判當卷云入心緣彼滅定寂靜方能入故故唯有漏文餘處五引婆沙論如是説者隨滅爾所心心所法即有爾所物現前為此定體之文畢云評家意更有欣厭心所隨其所應與心相應而非並起故與前家不同無想定體準此應知文清涼大師演義抄二十五中引俱舍論滅盡定亦然為靜住有頂之文畢云謂滅盡定以二十二物為體謂修定前有二十一心所及心王一故言二十一心所者謂大地十大善地十欣厭隨一為滅定故有二十二物不相應行替處名為滅定隨滅爾許心心所法為定體也文任此等釋微微心位可有欣心所現起義見設雖寶法師意何可背此文理哉但於寶法師餘處準此無想有二十二謂加欣滅定有二十二謂加厭也之釋者理實而言無想定滅盡定入心位雖同欣厭隨一現前無想定為求解脫以出離想為無欣得定為故云加欣滅盡定為求靜住以止息想為先厭受想為本故云加厭也是則一往之分別更非盡理之定判歟問滅盡定出心可通無所有處有漏心耶答不通無所有處有漏心也兩方若通無所有處有漏心者由自地淨心及下無漏出者性相之所定也更不可通無所有處有漏心哉若依之爾者淨影大師大乘義章九滅盡定義依毗曇意釋滅盡定出心云非想心出一向有漏無所有處或漏無漏無所有中具有有漏無漏心故文此釋無諍滅盡定出心可通無所有處有漏心見如何答今論中明滅盡定出心偈頌結由自地淨心及下無漏出長行云從滅定出或起有頂淨定心或即能起無所有處無漏心文正理論八十文顯宗論説偈頌長行全亦同之婆沙論百五十二中述滅盡定出心謂若非想非非想處心出者無色界繫若無所有處心出者不繫文任此等論判滅盡定出心不通無所有處有漏心云事分明也但於淨影大師無所有處或漏無漏之釋者甚以難會若夫依舊俱舍論二十一或由於有頂清淨心從彼得出或由無所有入為地清淨心及無流心從彼得出之文歟是可舊譯之謬強不可劬勞之問正理論意滅盡定出心可通識無邊處耶問微微心位必緣滅盡定歟已上兩條論義第五卷抄記録之畢問光法師解釋中云入心緣彼滅定寂靜方能入故故唯有漏文爾者今此入心者可通想微細微微三心耶答可通想微細微微三心也兩方若通想微細微微三心者婆沙論百五十三中云想微細現在前時四念住隨一現在修想微細心不必緣所入滅盡定見若爾入心緣彼滅定寂靜之言不可通想微細心哉若依之爾者按光法師解釋前後上舉想微細微微三心畢云入心緣彼滅定寂靜文文相起盡無諍今此入心者可通想微細微微三心見如何答今此入心者專雖自微微心廣取之者可通想微細心也其入心中雖有緣餘法之類專欣滅盡定故對彼出心不欣滅盡定云入心緣彼滅定寂靜方能入故故唯有漏出心不必及緣滅盡定故通二種也自本非云想微細心必緣所入滅盡定婆沙論想微細現在前時四念住隨一現在修之文全無所背也問想微細微微三心位可斷滅盡定障耶答可斷滅盡定障也兩方若斷滅盡定障者想微細微微三心位無立無間道稱知不斷滅盡定障云事是以光法師餘處二十六釋聖起所餘四無量等修所成攝有漏德時現在皆修一世俗智有學未來未離欲七已離欲八無學未來鈍九利十除微微心此於未來唯修俗故之論文云此明聖者起餘有漏功德不別除障所以不約四道以明臨入滅定心名微微心此心羸劣現未唯俗不修無漏文任此釋想微細微微三心位不斷滅盡定障見若依之爾者以道理思之想微細微微三心位可斷滅盡定障也若此三心位不斷滅盡定障者何位可斷之哉答想微細微微三心位可斷滅盡定障也若此三心加行位不斷滅盡定障不染無知者何可得滅盡定哉故婆沙論八十四中云加依八方能調龍象解脫亦爾依八加行而現在前除解脫障八解脫障彼加行位除之見明知想微細微微三心加行位可斷滅盡定障云事但於想微細微微三心無立無間道稱云難者將入滅盡定想微細微微三心加行位自然被斷滅盡定障故非功用勤勞斷之者不立無間道稱也次於光法師餘處不別除障所以不約四道以明之釋者非如為得無擁通等斷通障等時用加行無間解脫勝進四道故云所以不約四道以明也更不遮想微細微微三心位斷滅盡定障之義歟重難云能斷障位無修他心智故今論餘處中述練根無間道位不修他心智云能斷障故不修他心文而勘婆沙論百七文云入滅定想微細心時現在唯修世俗智未來修八智想微細心時未來修他心智見若想微細心時斷滅盡定障者何可修他心智哉是一次思光法師餘處二十五由滅定力解脫彼解脫障故障解脫故名解脫障之釋意由滅盡定力解脫滅盡定障云也彼加行位不斷之歟是二答想微細心位雖斷滅盡定障異無間道斷根障等故未來修他心智也次將入滅盡定想微細微微三心加行位斷滅盡定障推功歸本云由滅盡定力解脫彼障也問滅盡定障為唯限無覆無記為當通染汚歟答唯限無覆無記也兩方若唯限無覆無記者光法師餘處七所引正理論十二中云非諸異生能起滅定彼有自地起滅定障猶未斷故未起有頂見所斷惑於起滅定畢竟無能文如此文者滅盡定障可通染汚見若依之爾者不染無知無通染汚明知滅盡定障唯限無覆無記云事如何答滅盡定障唯限無覆無記也故見正理論餘處七十文云謂於所障諸解脫中有劣無知無覆無記性能障解脫是解脫障體文光法師餘處引此等文畢云正理出解脫障體及根障體故言無記文任今此正理論文光法師釋滅盡定障唯限無覆無記之旨甚分明也但於光法師餘處所引正理論彼有自地起滅定障猶未斷故等之中者有頂見惑雖非滅盡定正近能障遠有障彼定之義故云爾也若不斷有頂見惑不起滅盡定故以彼見惑為滅盡定正近能障者未離無所有處染聖者不起滅盡定故以無所有處修惑可為滅盡定正近能障歟彼既非滅盡定正近能障故知滅盡定正近能障者是不染無知無覆無記解脫障也重意云雖斷無所有處見修二惑有頂見惑不斷無覆無記障不起滅盡定斷無覆無記障之後即起滅盡定故滅盡定正近能障唯限無覆無記也問初二解脫對治何地貪耶進云今論疏中能治欲界初靜慮貪釋也付之初二解脫緣欲界色更不可對治初靜慮貪是以苦集法智不斷色界煩惱如何答見今論文云初二解脫一一通依初二靜慮能治欲界初靜慮中顯色貪故文光法師釋此文上述初二解脫一一通依初二靜慮初二亦攝近分中間能治欲界眼識所引顯色貪故能治初定眼識所引顯色貪故初二解脫俱依初二定下引正理論八十云初二解脫一一通依初二靜慮能治欲界初靜慮中顯色貪故初二通攝近分中間五地皆能起初二故欲及初定有顯色貪由眼識身所引起故為解脫彼初二定中建立初二不淨解脫文婆沙論八十四云棄背欲界及初靜慮識身所引緣色貪心故初二靜慮立初二不淨解脫文此等文意云初靜慮初二解脫能治欲界中眼識所引顯色貪第二靜慮初二解脫能治初靜慮中眼識所引顯色貪故初二靜慮建立初二解脫為言但於初二解脫緣欲界色更不可對治初靜慮貪云難者光法師自問答也即問色界色淨觀欲不淨如何能離色界色貪答之云此非正能斷令暫遠離故文此釋意云初二解脫是暫伏斷非實斷惑道故緣欲界色離色界貪全無其過為言若實斷惑道者緣欲界法不可斷色界煩惱故苦集法智不斷色界煩惱云難自亦被遮畢尋云勘婆沙抄五本云問如何緣欲界色對治色界貪耶解云所緣色類初定中有既緣欲界色治欲界貪亦治初定貪也準文思此釋意與光法師會通之趣同歟答此釋意與光法師會通之旨異也頗難依用歟問正理論意前三解脫為唯限勝解作意為當通真實作意歟答唯限勝解作意也兩方若唯限勝解作意者正理論八十文云觀未成滿但得名為勝解作意後成滿時離染果故引聖道故亦得名為真實作意文顯宗論四十中云緣少思多假勝解引聖道故亦名真實文任此等論判前三解脫通真實作意見若依之爾者前三解脫唯限勝解作意者有宗一同之所談也設雖正理論意何不存此旨哉答初二解脫緣欲界淨不淨可見色處作青瘀等不淨行相第三解脫緣欲界淨不淨可見色處作淨光鮮清淨行相故前三解脫唯限勝解作意不通真實作意也故正理論八十云由勝解力此於境生故説此為勝解作意即由此故得解脫名勝解解脫義相鄰故或於少事由勝解力漸漸增益觀名勝解作意文加之今論餘處七中明勝解作意云謂不淨觀及四無量有色解脫勝處遍處如是等觀相應作意文光法師釋此文云不淨無量勝處遍處唯是假想解脫之中通其假實言有色解脫標前三解脫唯假想故無色解脫通於假實故言有色文正理二十顯宗十一兩論之文亦同今論説云有色解脫定知彼論意前三解脫唯限勝解作意云事但於正理論亦得名為真實作意之文顯宗論引聖道故亦名真實之説者前三解脫雖唯是限勝解作意至成滿時離染果故引聖道故傍且亦與真實作意之名云也非謂其體實通真實作意歟問四無色解脫可緣下地法上擇滅耶問四無色解脫可緣下地能治類智品道耶問虛空無為可有多體耶已上三條論義第二十卷抄記録之畢問四無色解脫可通退分定耶答可通退分定也兩方若通退分定者勘婆沙論百七十文惠解脫阿羅漢起味相應初靜慮退時不得初二解脫見爰知初二解脫不通退分定云事四無色解脫例亦可同若依之爾者今論疏中四無色解脫體無簡退分定若四無色解脫不通退分定者尤可簡之也如何答四無色解脫可通退分定也立四無色解脫由棄背次下地心之義故光法師所引婆沙論八十四云四無色處解脫各自棄背次下地心文而無色界根本地攝四分定俱不緣下地有棄背次下地心之義故四無色解脫可通退分定也今論疏中明四無色解脫體之時雖簡散善等不簡退分定即此意也但於色界解脫不通退分定云例難者前三解脫無貪為性能治貪故不通退分定退分定順煩惱違棄背色貪之義故也色無色界解脫廢立既異更不可為相例之難歟重難云勘雜心論八文云此不淨觀復有四種謂退分住分勝分決定分不淨觀通退分定見初二解脫同作不淨行相何不通退分定哉答立初二解脫稱由棄背色貪之義故不通順煩惱退分定不淨觀名不必由棄背之義故通退分定歟問非想非非想處解脫唯緣自地歟答唯緣自地也兩方若唯緣自地者婆沙論百六十九中云十等至唯緣自地謂八味相應及空識無邊處遍處不舉非想非非想處解脫知非唯緣自地云事若依之爾者思非想非非想處解脫所緣自地之外更可緣何地哉答非想非非想處解脫唯緣自地可云也無上地容緣故不可緣上地任根本善無色不緣下有漏之性相故不可緣下地故唯緣自地云事其理必然也但於婆沙論出唯緣自地等至中不舉之云難者以實論之非想非非想處解脫雖不緣上地若有上地者有容緣彼之義勢故唯緣自地等至中不舉之實不緣上地故緣自地及上地等至中亦不舉之也今論中明四無色解脫所緣無簡別云自上苦集滅四無色解脫俱可緣自地及上地見即由此義邊也正理論餘處云唯有雜緣諸捨近行能正離染以意近行但有漏故婆沙論百三十九述一謂雜緣捨法意近行能為無間道故可為此義之潤色也問今論意第三靜慮不立解脫故如何釋之耶進云今論云第二定中無色貪故自地妙樂所動亂故文付之第三定中雖無色貪第四靜慮建立解脫何以第二定中無色貪故第三靜慮不立解脫哉加之初二靜慮自地勝喜所動亂立解脫第三靜慮雖自地妙樂所動亂寧不立解脫哉何況第三靜慮不淨觀無量等功德立之解脫例可同如何答第二定中無色貪故者述第三靜慮不立初二解脫故欲界中有眼識所引顯色貪故為對治彼初靜慮立初二解脫初定中有眼識所引顯色貪故為對治彼第二靜慮立初二解脫第二定中無眼識所引顯色貪故第三靜慮不立初二解脫為言故光法師所引正理論八十云二三定中眼識無故亦無所引顯色貪故三四定中無不淨解脫文婆沙論八十四云第二第三靜慮無識身所引緣色貪心故第三第四靜慮不立初二不淨解脫文自地妙樂所動亂故者明第三靜慮不立淨解脫故第三靜慮靜慮地妙樂受所動亂故不立淨解脫為言故光法師所引正理論八十云第三定中樂所迷故文婆沙論八十四云第三靜慮雖無初二不淨解脫而為勝樂所迷亂故不廣不明故不建立文但於第三定中雖無色貪第四靜慮建立解脫云難者第四靜慮立解脫者是淨解脫非初二解脫故出第三靜慮無初二解脫故云第二定中無色貪故更不可致其疑次於初二靜慮自地勝喜所動亂立解脫云難者初二靜慮立解脫者是初二解脫非淨解脫故顯第三靜慮無淨解脫故云自地妙樂所動亂故亦無所背次於第三靜慮不淨觀無量等功德立之云例難者彼作不淨與樂拔苦等行相故第三靜慮云之也非由棄背色貪心棄背不淨觀心立不淨觀無量等功德全不可為相例難也問以盡無生智可為前三無色解脫體耶答可為前三無色解脫體也兩方若為前三無色解脫體者故婆沙論八十四文云前三無色處解脫六智俱謂苦集滅道智類智世俗智文明知以盡無生智不為前三無色解脫體云事若依之爾者正理論中以盡無生智為前三無色解脫體見如何答婆沙論八十四中以八解脫分別學無學非學非無學云前三無色處解脫通三種文前三無色解脫通無學以盡無生智何不為其體哉是以勘正理論八十文云第四五六八智相應文顯宗論説全亦同之任此等文理以盡無生智為前三無色解脫體云事甚分明也但於婆沙論前三無色處解脫六智俱之文者彼結蘊所説依八智作論故不舉盡無生智也故婆沙論百五智蘊中述依八智作論云餘處亦依八智作論如前結蘊後定蘊等文重難云婆沙抄五本中釋前三無色處解脫六智俱之論文云盡無生智無棄背義故文此釋意以盡無生智實不為前三無色解脫體見如何答婆沙抄釋甚難信用更不可劬勞之重難云勘發智論十八文云空無邊處解脫攝空無邊處解脫及彼遍處六智三三摩地識無邊處解脫攝識無邊處解脫及彼遍處六智三三摩地無所有處解脫攝無所有處解脫六智三三摩地文此文亦以盡無生智不為前三無色解脫見如何答本論今文是定蘊説故亦依八智作論也故次上文云空無邊處等攝六智其意可知之問第二第三解脫可緣自相續耶答可有二意也兩方若緣自相續者正理論八十中云初緣自他身次二緣他第二第三解脫唯緣他相續不緣自相續見若依之爾者初解脫既緣自相續第二第三解脫相例可同如何答第二第三解脫緣不緣自相續婆沙論中有二師説也故婆沙論八十四云初解脫緣自他相續第二第三解脫有説唯緣他相續有説通緣自他相續文正理論文同婆沙論初師説就此初師義被舉今疑歟試會之云初解脫者於內色身有色想貪為除彼色想貪觀外諸色作青瘀等不淨行相故緣自相續他相續色第二解脫者於內色身無色想貪為令彼已伏貪不起觀外諸色作青瘀等不淨行相故唯緣他相續色第三解脫者於內色身無色想貪為顯自心堅牢猛利雖緣淨色令彼已伏貪不退起觀外諸色作淨光鮮清淨行相故亦唯緣他相續云也重意云於內色身有色想貪通緣自相續於內色身無色想貪唯緣他相續為言婆沙論八十五中後六勝處前八遍處同有此二説準而可思之問淨解脫可通曾得耶答可通曾得也兩方若通曾得者正理論八十中明八解脫曾得未曾得相云第八第三唯未曾得文顯宗論説亦以同之若淨解脫通曾得者豈不背此等文哉若依之爾者設雖淨解脫何不通曾得哉是以今論並婆沙論中淨解脫通曾得見如何答前七解脫是諸異生無始以來所得功德也離第三靜慮染之時寧不得先所得淨解脫哉淨解脫可通曾得之理必然也是以披今論文偈頌結滅定如先辨餘皆通二得長行云第八解脫如先已辨以即是前滅盡定故餘解脫等通由二得謂由離染及加行得以有曾習未曾習故文光法師釋此文云餘七解脫八勝處十遍處通由二得若曾習者由離染得未曾習者由加行得文寶法師釋此文云述餘七解脫通二得也言等者等八勝處及十遍處有曾習者是離染得新習得者是加行得文泰法師釋此文云餘七解脫通由二得以有曾習是離染得未曾習者唯加行得文婆沙論八十四中述八解脫曾得相云想受滅解脫唯未曾得餘七解脫通曾得未曾得謂諸聖者及內法異生皆通曾得及未曾得外法異生唯是曾得文此等文意無諍淨解脫道曾得見加之婆沙論八十五中明八勝處曾得未曾得相云皆通曾得未曾得謂諸聖者及內法異生皆通二種外法異生唯是曾得文釋十遍處曾得未曾得相云皆通曾得未曾得謂諸聖者及內法異生通曾得未曾得外法異生唯是曾得文任此等定判後四勝處前八遍處如淨解脫皆通曾得見爰知淨解脫亦通曾得云事但於正理論第八第三唯未曾得之文者淨解脫是殊勝功德異生六解脫立身作證名故一往同第八解脫云唯未曾得也盡理言之正理論意淨解脫通曾得可云也故勘正理論八十下段之文偈頌結滅定如先辨餘皆通二得長行云第八解脫如先已辨以即是前滅盡定故餘解脫等通由二得謂由離染及加行得以有曾得未曾故全同今論説淨解脫通曾得為言顯宗論文全亦同之重難云見正理論八十一段之文或顯第二第三解脫差別云通曾得未曾得唯未曾得故或解唯第三第八解脫名身作證判唯未曾得故數成淨解脫唯限未曾得之旨輒難會一往説哉答或顯第二第三解脫差別或解唯第三第八解脫名身作證云淨解脫唯未曾得皆是一往之定判也問外法異生可起淨解脫耶答可起淨解脫也兩方若起淨解脫者披婆沙論八十四文述第二第三解脫差別云謂第二解脫通依內外道相續淨解脫唯依內道相續文正理論八十中或明第二第三解脫差別云內外道身共不共故或解唯第三第八解脫名身作證釋或唯此二種唯內道得故任此等論判外法異生不起淨解脫見若依之爾者外法異生既起初二解脫寧不起淨解脫哉答淨解脫是假想觀門也外法異生何不起之哉是以婆沙論八十四中述八解脫曾得未曾得相云想受滅解脫唯未曾得餘七解脫通曾得未曾得謂諸聖者及外法異生皆通曾得及未曾得外法異生唯是曾得文此文意外法異生得淨解脫之旨炳然也若許得之者豈不現起哉加之婆沙論八十五中明八勝處曾得未曾得相云皆通曾得未曾得謂諸聖者及內法異生皆通二種外法異生唯是曾得文釋十遍處曾得未曾得相云皆通曾得未曾得謂諸聖者及內法異生通曾得未曾得外法異生唯是曾得文此等文意從四勝處前八遍處如淨解脫外法異生得之見爰知亦可起淨解脫云事但於婆沙論淨解脫唯依內道相續之文者淨解脫是殊勝功德異餘六解脫立身作證名故對第二解脫論其差別之時一往云唯依內道相續也非盡理談歟準光法師所引婆沙論百五十三有説淨解脫雖取色淨相而不起煩惱以殊勝故世尊安立身作證名之説可思之正理論兩處之文會通之趣亦以同之問起滅盡定時必伏非想非非想處煩惱歟第五卷抄記録之畢問有學聖者所起滅盡定可受無色界等流果耶答可受無色界等流果也兩方若受無色界等流果者婆沙論中有學聖者所起滅盡定不受無色界等流果見若依之爾者無學聖者所起滅盡定既受無色界等流果有學聖者例亦可同如何答有學聖者所起滅盡定為同類因受無色界等流果之義必然也更不可異求之但於婆沙論説者正見彼論文云滅盡定令諸學者更受無色界異熟果令無色界等流果文此文意云有學聖者所起滅盡定為異熟因受無色界異熟果故以之為本且不論受無色界等流果無學聖者所起滅盡定無為異熟因受無色界異熟果之義故受無色界等流果為言非謂云爾故有學聖者所起滅盡定不受無色界等流果歟問前八遍處俱緣可見色歟答俱緣可見色也兩方若俱緣可見色者地水火風遍處尤可緣觸處也是以光法師所引婆沙論八十五中云謂觀青等一一無邊復思青等為何所依知依大種故次觀地等一一無邊文此文意地水火風遍處可緣觸處見若依之爾者披今論疏解釋前八遍處俱緣可見色判如何答云三境欲可見述八如淨解脫性相之所定也明知前八遍處俱緣可見色云事故今論云十中前八如淨解脫依第四靜慮緣欲可見色文正理論八十云又如淨解脫依第四靜慮及緣欲界色處為境文顯宗論四十説全亦同之婆沙論八十五云前八遍處唯緣欲界色處文任此等論文前八遍處俱緣可見色之旨分明也但於地水火風遍處尤可緣觸處也云難者光法師釋此疑云實緣色處假想地等故正理八十云如何地等亦名色處地地界等有差別故顯形名地等如先已説故説地等遍處不言地界等故前八種但緣色處風與風界既無差別如何可言亦緣色處此難非理以諸世間亦説黑風團風等故由此前八緣色理成文此釋意云上卷云地謂顯形色隨世想立名水火亦復然風即界亦爾顯形二色之上隨世間想假立地水火風四大種名故前八遍處之中後四遍處緣此假立地水火風四大種名顯形二色假作青等所依實地水火風四大種行解故雖名地水火風遍處實緣可見色也為言寶法師謂色處為所緣緣假四大故之釋泰法師依第四靜慮緣欲界可見色勝解作意緣可見色作假名地水火風觀乃至風及風界或異説故之釋其意亦同之次於光法師所引婆沙論復思青等為何所依知依大種故之文者就今所作行解云觀青等所依大種也遍處是假想觀門故雖非觸處之中實四大種緣假四大種作青等所依實四大種行解也重難云遍處是假想觀門故緣非實四大種顯形二色作青等所依實四大種行解者風即風界無假風名云義意緣顯形二色可作實風大種行解如彼不淨觀緣清淨色作不淨行解也何云有餘師説唯風遍處緣所觸中風界為境哉答雖假想觀門寄相似義邊作其行解也顯形二色之上隨世間想假立地水火風名故寄此義邊緣顯形二色作實地水火風四大種行解也風即風界無假名云義意顯形二色之上全無假立風大種名故緣顯形二色不作實風大種行解也欲界色境之中其體清淨色傍有相似不淨色之義邊故寄此義邊不淨觀緣欲界一切色處作不淨行解也若欲界色處中都無不淨色者不淨觀緣欲界一切色處不可作不淨行解也重難云任蘊不攝無為之理無色四蘊全無假立虛空無為名之義邊何空無邊處遍處緣自地四蘊作虛空無為無邊行解哉答無色四蘊雖無假立虛空無為名虛空無為同是非色法故空無邊處遍處緣自地四蘊作虛空無為無邊行解也問後二遍處為唯緣現在為當緣過未二世歟答不限現在可緣過未二世也兩方若緣過未二世者後二遍處者假想觀門也何可緣過未二世哉是以不淨觀四無量初三解脫八勝處前八遍處唯緣現在不緣過未二世者論家人師之所定也後二遍處例亦可同何況見婆沙論三十二文云於無色界遍處法中非擇滅得漸漸增長文後二遍處非擇滅得漸漸增長豈非唯緣現在故哉若依之爾者婆沙論八十五中云後二遍處俱緣三世文如何答後二遍處不限現在廣緣過未二世云事婆沙論後二遍處俱緣二世之文甚分明也誰可異求之哉但於後二遍處者假想觀門也云難者後二遍處雖是假想觀門所緣既通非色四蘊故少分緣過未二世之類可有也次於不淨觀四無量初三解脫八勝處前八遍處唯緣現在不緣過未二世云例難者彼緣色法勝解作意故唯於現在色法作假想觀門也次於婆沙論於無色界遍處法中等之文者後二遍處雖少分緣過未二世多緣現在故從多分説非擇滅得漸漸增長也重難云寶法師餘處二十二釋不淨觀緣世相云勝解作意唯於現境假相想緣故不緣過未如五識等唯緣現境文此釋意一切勝解作意功德唯緣現在不緣過未二世見若後二遍處唯假想觀門者更不可緣過未二世哉是一次有何故假想觀門緣色法唯限現在緣非色法廣通過未二世哉是二答思後二遍處行相唯可限假想觀門也故光法師解後二遍處如次空識二淨無色為其自性各緣自地四蘊為境之論文云後二但觀空識故以無色為其自性各緣自地四蘊為境假想思惟作無邊空解作無邊識解文婆沙論八十九中釋後二遍處生五心云是假想觀不能引起色界定心文但於寶法師餘處勝解作意唯於現境等之釋者且就緣色法假想觀門云假想緣故不緣過未歟或亦從多分云爾歟次色法現量可知法非色法比量可知法也而現量可知法過未二世非如現在故不淨觀四無量初三解脫八勝處前八遍處唯緣現在不緣過未二世歟如彼眼等五識唯緣現在不緣過未二世也比量可知法三世其相是同故後二遍處雖唯假想觀門廣緣三世歟問勝處遍觀門悉解脫攝歟答非悉解脫攝也兩方若悉解脫攝者三種觀門既各別也何悉解脫攝哉是以今論中判以後後起勝前前故解脫勝處遍處觀門可各別見若依之爾者解脫者目棄背義勝處遍處亦可有此義寧非解脫攝哉何況披今論文云勝處有八種二如初解脫次二如第二後四如第三遍處有十種八如淨解脫後二淨無色述勝處遍處觀門悉解脫攝之旨如何答若據色界解脫勝處遍處云之者觀門勝劣不同行相總別亦異故勝處遍處非解脫也故見今論云應知此中修觀行者從諸解脫入諸勝處從諸勝處入諸遍處以後後起勝前前故文光法師釋此文云由前引後故後勝前故婆沙八十五云此中解脫唯於所緣總取淨相未能分別青黃赤白後四勝處雖能分別青黃赤白而未能作無邊行相前四遍處非唯分別青黃赤白而亦能作無邊行相文加之正理論云此解脫等差別云何唯能棄背名為解脫兼折所緣名為勝處如無邊解得遍處名此三善根漸次修故有餘師説此三善根由下中上故有差別謂能棄捨勝伏所緣行相無邊有劣勝故有餘師説解脫唯因遍處唯果勝處通二文顯宗論四十説全亦同之婆沙論八十五問解脫勝處遍處有何差別答之有多復次義中云復次唯因名解脫唯果名遍處通因果名勝處復次能有棄背名解脫能伏境名勝處能廣所緣名遍處復次唯作勝解名解脫能伏煩惱名勝處於所緣境無二無量名遍處文任此等論判前三解脫八勝處前八遍處勝劣不同行相各別故互不相攝云事甚分明也但於解脫者目棄背義勝遍處亦可有此義云難者前三解脫總緣可見色棄背色貪心及不淨觀心八勝處者約可見色分別多少青黃赤白制伏所緣境前八遍處緣可見色作青黃赤白地水火風無邊行相故八勝處前八遍處雖帶棄背之義非前三解脫攝也故婆沙論百六十七中釋發智論十八初第二第三解脫攝初第二第三解脫世俗智云文云此中前三解脫皆以俱生品五蘊為性故得攝世俗智是初總觀故不攝勝處遍處文次於今論勝處有八種二如初解脫等之文者自性依地所緣境等是同故云爾也非謂八勝處前八遍處即前三解脫攝歟故光法師解八中初二如初解脫次二如第二解脫後四如第三解脫之論文云八勝處中初二勝處自性地等如初解脫是初解脫果故次二勝處自性地等如第二解脫是第二解脫果故後四勝處自性地等如第三解脫是第三解脫果故文今論中釋遍處有十種八如淨解脫之偈頌云十中前八如淨解脫謂八自性皆是無貪若並助伴五蘊為性依第四靜慮緣欲可見色文此等釋意勝處有八種二如初解脫等者談自性依地所緣同邊見次若據無色界解脫遍處論之者四無色解脫各以自地加行善四蘊為其體故空無邊處解脫即攝空無邊處識無邊處解脫即攝識無邊處遍處也故婆沙論百六十七中釋發智論空無邊處解脫攝空無邊處解脫及彼遍處六智三三摩地識無邊處解脫攝識無邊處解脫及彼遍處六智三三摩地云四無色解脫各以自地加行善四蘊為性是故得攝後二遍處及六智三三摩地文慈恩大師瑜伽論略纂十五引俱舍論云後二遍處即彼二解脫亦顯此意也問付前八遍處觀門觀青等四色後觀地等四大種歟答觀青等四色後觀地等四大種也兩方若觀青等四色後觀地等四大種者今論文引十遍處次第云謂周遍觀地水火風青黃赤白文正理八十顯宗四十兩論之説全亦同之明知觀地等四大種後觀青等四色云事若依之爾者光法師所引婆沙論中觀青等四色後觀地等四大種見如何答思前八遍處觀門觀青等四色後觀地等四大種也今論中云應知此中修觀行者從諸解脫入諸勝處從諸勝處入諸遍處以後後起勝前前故者淨解脫次起後四勝處後四勝處次起前四遍處故也若前起地等四遍處者以何可為能引哉故光法師所引婆沙論八十五云此中解脫唯於所緣總取淨相未能分別青黃赤白後四勝處雖能分別青黃赤白而未能作無邊行相前四遍處非唯分別青黃赤白而亦能作無邊行相謂觀青等一一無邊復思青等為何所依知依大種故次觀地等一一無邊文加之勘婆沙論處處之文或八十五云前四遍處以眼識為加行至成滿時緣青黃赤白四色處為境中四遍處以身識為加行至成滿時緣地水火風四觸處為境文或百四十一云十遍處者謂各別觀青黃赤白地水火風即為前八文任此等論判觀青等四色後觀地等四大種之旨炳然也但於今論謂周遍觀地水火風青黃赤白之文者泛爾只述十遍處相更非由觀門次第列之也正理顯宗兩論之説會通之趣亦以同之問麟喻獨覺得滅盡定為加行得為當離染得歟第五卷抄記録之畢問今論意依身在欲天可起前三解脫耶答不起前三解脫也兩方若起前三解脫者今論疏中依身在欲天不起前三解脫見若依之爾者勘正理論八十文述一師意云有説初起唯依人趣要由教力所引起故人中有教天趣中無設有著樂不能初起故人初起退生欲天由宿習力有後起義文設雖今論意何不許此義哉答見今論文偈頌結餘唯人趣起長行判四無色解脫二無色遍處一一通依三界身起餘唯人起由教力故光法師釋此文云四無色解脫二無色遍處非由教力一一通依三界身起餘前三解脫及八勝處前八遍處唯人三洲能起由教力故不通餘處文既表餘唯人起由教力故又亦遮由教力故不通餘處今論意依身在欲天不起前三解脫云事甚分明也但於正理論故人初起退生欲天由宿習力有後起義之説者今論意何可必同正理論有説義哉故正理論初師所餘一切依欲界身唯在人中三洲除北餘慧力劣無聖教故之説可同今論意也重難云今論餘處二十二中明起不淨觀依身偈頌結緣欲色人生長行判唯人趣生三洲除北光法師釋此文引婆沙論四十問何處起此不淨觀耶答唯人三洲能初現起天中無有青瘀等相故六欲天唯能後起有説初後皆唯人趣六欲天中無青瘀等不淨相故都不現起之文畢云俱舍同婆沙後師若據初起或同婆沙前師正理同婆沙前師文準若據初起或同婆沙前師之釋思之今論意何不同初二解脫後起通六欲天之説哉不淨觀初二解脫行相所緣大同故也如何答若據初起或同婆沙論前師之釋何樣得意為疑哉若初起邊同婆沙論前師説云釋得意者全不可為疑若今論唯人趣生之文據初起論之後起通六欲天云釋得意者其疑且似可爾試會之云不淨觀後起通六欲天者婆沙論前師説故會今論唯人趣生之文同彼前師説云釋意可有之初二解脫後起通六欲天云事婆沙論中無分明説正理論文初有此義故何以前論説強可令同後論一説意哉問論中明生上二界起色無色定緣云二由業力爾者寶法師意今此業者為唯限順後業為當通順生業歟答唯限順後業也進云寶法師釋云謂先於欲界或於色界等造順生受及順後受業文付之依寶法師釋披今論所説云二由業力謂先曾造感第二靜慮已上等地生造順後受業文正理論八十顯宗論四十説光法師暉法師釋全同今論文唯舉順後業若爾寶法師解釋寧不背此等定判哉上地生順後受業文泰法師釋此文云二由業力謂先曾速造感答上二界中無有退故生上二界起上地定造順生業之者不可退彼定故無順生業為起定緣之義也論家人師釋中唯舉順後業即存此理故也其釋即如疑難被出但於寶法師造順生受及順後受業之釋者學者會通雖非一準且依相傳義云此釋意非謂以順生業為起定緣且出一類成申釋意者依身在初靜慮已離初靜慮染未離第二靜慮染人造第二靜慮順生業造第三靜慮順後業畢由彼順初生業力從靜慮先生第二靜慮由彼順後業力從第二靜慮將生第三靜慮之時可離第二靜慮染故起第二靜慮煩惱能治道為起定緣云也是則為顯順後業為起定緣之義云出由順生業感第二生許也非釋以此順生業為起定緣歟問頌文云佛正法有二謂教證為體文爾者諸佛正法滅盡釋尊正法滅盡其義同歟答其義聊相替歟兩方若其義同者婆沙論中可不同見若依之爾者正法滅盡者三世道同之軌則也何有不同哉答勘婆沙論百八十三文云或有諸佛未般𣵀槃正法便滅或有諸佛般𣵀槃後經於七日正法便滅然我世尊釋迦牟尼般𣵀槃後乃至千歲正法方滅彼未般𣵀槃及般𣵀槃已經於七日正法滅者依更無有入正性離生説名為滅釋迦如來正法滅者依甘露界斷説名為滅雖天中猶有甘露界在然依人中滅故名滅文思此文意諸佛正法依更不入正性離生名為滅盡釋尊正法依甘露界斷名為滅盡為言而見次上文云空中復有大聲唱言釋迦大仙所有正法從今永滅更無能入正性離生妙甘露門於斯永閉大苦黑暗遍滿世間更無救護將導之者入正性離生加行名甘露門故明知諸佛正法不入正性離生以來為滅盡初釋尊正法不起入正性離生加行以來為滅盡初也若爾根本加行之階級其位雖聊異依不入聖之義邊其趣大相同者歟問論中明正法住時舉二師説爾者初師意如何釋之耶進云今論云聖教總言唯住千載文付之如來聖教流行閻浮遙至像法末法之時何唯限千載哉何況見寶法師解釋云論主造論之時佛𣵀槃後九百年中文定知光法師在世是千載已後也其時寧可聖教滅盡哉答聖教總言唯住千載者如來聖教感行世間唯限千載不過此時云也故婆沙論百八十三云然我世尊釋迦牟尼般𣵀槃後乃至千歲正法方滅文但於如來聖教流行閻浮遙至像法末法之時云難者如來聖教才傳世間雖至像法末法之時彼皆衰微不如千年之時分故以少屬元云唯住千載也次於光法師在世之時代者粗雖有異義大概推之相當一千八百餘年歟想像其時像法之季如來聖教才相殘時歟尋云以何得知光法師在世之時代釋尊入𣵀槃後一千八百餘年歟答演義抄中述製八十華嚴經疏之時代云以今去大師𣵀槃一千八百六十餘年故文光法師在世雖先於此不經幾程歟問論中明正法住時舉二師説爾者第二師意如何釋之耶進云今論云有釋證法唯住千年教法住時復過於此文付之正法千年者經論常途之所談也教法住時何可過千年哉是以見婆沙論百八十三文云然我世尊釋迦牟尼般𣵀槃後乃至千歲正法方滅文若爾教法住時復過於此之説豈不背婆沙論文哉答釋尊入𣵀槃一千年以來無有入聖得果之者故證法住時雖唯限千年千年之後教法獨盛受持正説者便住世間故云教法住時復過於此也今此説意尤叶道理故寶法師判二説正不云今詳兩説後説為正所以得知今時有教有教法故文但於正法千年者經論常途之所談也云難者據教證二正法並住在世間之時云爾也更非遮教法住時猶過千年之義邊歟婆沙論乃至千歲正法方滅之文會通之趣亦以同之問大師世眼久已閉堪為證者多散滅以下六行文為本頌為當長行歟答長行攝非本頌也兩方若本頌者光法師所判中可長行攝見若依之爾者披泰法師解釋云此論一部傍正總有六百七頌上來初有三頌辨造論緣起義當序分次有六百頌明所簡擇漏無漏法義當正宗自下第三有四行頌謙退造論勸求解脫義當流通文加之寶法師云自下有三頌大文第三勸學流通分圓暉法師述且傷歎人有德者頌曰任此等定判明知本頌云事如何答世親菩薩造俱舍論六百行頌遣門人寄往迦濕彌羅國之時無有此文後被請釋論解釋六百行頌之日初製大師世眼久已閉以下六行文故長行攝非本頌也何況廣勘今論一部始末舉六百行本頌之習先標頌曰載之後云論曰釋之而大師世眼久已閉等之文不置頌曰之標言無有論曰之釋文長行攝非本頌云事炳然也故光法師釋迦濕彌羅國毗婆沙師議阿毗達磨理善成立我多依彼釋對法宗少有貶量為我失判法正理唯在世尊及諸如來大聖弟子之論文云就長行中一正釋頌本二傷歎勸學此即正釋頌本二傷歎勸學者指大師世眼久已閉以下六行文故長行攝非本頌之旨此釋亦分明也加之見正理論八十文迦濕彌羅議理成我多依彼釋對法少有貶量為我失判法正理在牟尼之一頌後無有別偈頌若大師世眼久已閉以下六行文是本頌者正理論中何不載之哉但於泰法師解釋者理實而言雖長行攝結七言頌傷歎勸學故立頌名也故光法師云大師世眼久已閉堪為證者多散滅者此下第二傷歎勸學就頌中一傷歎人二勸學法亦立頌名也重按泰法師釋意長行之中結偈頌故指今此頌云傍頌歟寶法師定判圓暉法師釋會通之趣亦以同之寫本云文永二年乙丑八月五日酉時於海住山十輪院抄之畢去夏五月十九日始清書之此秋南呂上旬候遂結集之前後首尾送七十五日之光陰大小新古記七十箇條之論義為之當山居住之思出充之來世得脫之業因三寶諸天哀愍納受殊別吾山本尊觀音薩埵知見此勤八宗擁護春日權現照覽此志草庵風添之暮施引攝於兜率之雲龍華露結之曉開慧解於唯心之月過去二親師範現在同法善友遂再觀於三會之庭談往事於慈尊之前而已右筆華嚴宗末葉法印權大僧都宗性年齡六十四夏臘五十三
