body:
  text: 俱舍論第五卷抄上問題問論文云本論説此名衆同分文光法師釋此文作三解釋爾者第二釋意今此衆同分者有情同分歟問光法師解釋中引正理論云何異熟謂地獄等及卵生等趣生同分等文爾者為證無差別同分體多義引此文歟問從人趣死還生人趣時得捨同分義可有耶問有宗意非情法上可立同分耶問有宗意同分上可立同分耶問依身在欲界可起上二界同分耶問勝論宗意實德業三句外可有和合別句別體耶問勝論宗意異句義可轉德業上耶問論文云誰之異熟謂無想定文爾者光法師意婆沙論多異説中同何師義判耶問光法師釋誰之異熟謂無想定論文引婆沙論多異説爾者除評家義外餘師説悉不正義歟問正理論意於無想天起心品唯限受生命終二剎那歟問尊者妙音意於無想天起心品唯限受生命終二剎那歟問尊者妙音意於無想天染汚心與善及無覆無記心可為等無間緣耶問出無想異熟心可通五部所斷耶問婆沙論中舉出無想異熟心或通五部所斷或唯修所斷云二師説爾者唯修所斷云師意發智論出無想想色界有漏緣隨眠隨增云文如何會釋之耶問從無想天沒生欲界命終心可通善及無覆無記耶問正理論意無想異熟可等無間緣生耶問論中明從無想天沒必生欲界云從彼沒已必生欲界非餘處所先修定行勢力盡故乃至必定應有生天業文爾者今此文舉二師義歟問論文云從彼沒已必生欲界文爾者於今此欲界依身可有入聖義耶問從無想天沒可生北洲耶問光法師解釋中云謂諸外道將修無想或起邪見乃至或起戒取文爾者今此戒禁取者可苦諦所斷耶問光法師意從無想天沒生欲界時由將修無想定加行位造業力不由餘生順後業故如何釋之耶問光法師解釋中將修無想定加行位造欲界順後業文爾者其中善業通後起位造之歟問無想天中多有情可居在耶問論文云如應生彼北俱盧洲必定應有生天之業文爾者今此生天之業者唯限後業歟問論文云如應生彼北俱盧洲文爾者唯從人三洲生北洲歟問論文云如應生彼北俱盧洲必定應有生天之業文爾者生北洲人可造不善順生業耶問出無想天可起眼耳心三識及發表心耶問有宗意無想定可有退失義耶問論文云若起此定後雖退失傳説現身必還能起文爾者今此傳説者傳説婆沙論評家義歟問論文云若起此定後雖退失傳説現身必還能起文爾者今此退失定異熟果可現前耶問光法師所引正理論中舉無想定唯限順生受或通不定受云二説爾者唯限順生受云説為正義歟問光法師所引正理論中述無想定通不定受云義云成此定者亦容得入正性離生文爾者今此師意入聖後受無想定異熟果義可有耶問正理論意內法異生初念無想定義可有耶問無想天可有中有耶
