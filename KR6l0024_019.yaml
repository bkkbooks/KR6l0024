body:
  text: 俱舍論第六卷抄上問題問光法師能作因得名作依主釋云謂能作是親因文今此親因者指能作因中親因歟為當以餘五因名親因歟問論主意可許六因耶問頌文云除自餘能作文能作因除自體故光法師如何釋耶問頌文云俱有互為果文今此互為果義為論主始所立為當有宗古義歟問地大種與地大種可為俱因耶問婆沙論評家意四大種體增義歟問光法師釋十隨轉中一果不取俱生展轉士用果取同時造作得者文爾者餘同時造作得者俱有因造作歟問正理論中釋十隨轉一果云俱攝士用及離繫果文寶法師意今此士用果者可通有為士用果耶問心王與心隨轉上隨相可為俱有因耶問光法師舉八對非俱有因法畢云彼隨相等望本法等橫望而言非能同取一果一異熟及一等流故文爾者竪望之時可取一果等耶問寶法師意隨相與本法同取後一果可名同一果耶問初無漏思以業可為俱有因耶問論中釋無覆無記同類因舉四師説爾者初師意四大意處展轉相望互可為同類因耶問論中釋無覆無記同類因舉四師説爾者光法師意何義為正義耶問光法師釋中十位同類因相初釋意此論當婆沙一師義文爾者此論意後位已生法與前位不生法可為同類因耶問正理論中釋十位同類因相云有餘師言羯剌藍位與能位為同類因文爾者寶法師對此論如何釋之耶問今論中證前生善根與後相似生未生善根為同類因義引發智論何文耶問光法師釋無時非因難引婆沙論七説爾者依評家意如何會此難耶問正理論中通無時非因難舉三因作論六因作論二説爾者寶法師意以何説為正義耶問寶法師釋無時非因難引正理論能為因後無時非因文爾者可云婆沙論評家義耶問光法師所引婆沙論文解非心為因法舉二師説爾者初師意非心為因法者不以心唯為同類因義歟為當不以心為五因義歟問決定當入正性離生初無漏心悉名非心為因法歟問光法師所引婆沙論文解非心為因法舉二説爾者初師意辨有𣵀槃法無𣵀槃法二異生義可有耶問光法師所引婆沙論文解非心為因法舉二師所説爾者第一師意如何釋之耶問婆沙論中解品類足論所説非心為因法舉二師所説爾者寶法師依第二師説時無𣵀槃法名非心為因法歟問舊婆沙論中解品類足論非心為因法舉二師所説爾者第二師意以無𣵀槃法名非心為因法歟問無色界可有非心為因法耶問異熟四相與等流同分可為同類因耶問九上緣惑可為遍行因耶
