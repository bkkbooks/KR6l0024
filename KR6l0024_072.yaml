body:
  text: 俱舍論第二十四卷抄下問題問退雜修靜慮人所退雜修靜慮異熟果可現前耶問雜修靜慮第三剎那無間起無漏心義可有耶問雜修靜慮所雜修有漏唯限真實作意歟問雜修靜慮解脫道位未來可修他心智耶問雜修靜慮解脫道位盡無生智可現起耶問具雜修五品靜慮人直生色究竟天歟問聖者可造牽引業耶問伏第四靜慮何品煩惱生何天耶問十八有學中可列身證不還耶問無色定攝金剛喻定可緣下地能治類智品道耶問無生智可為阿羅漢果體耶問頌文云聖二離八修各二離繫得文爾者聖者以有漏道類下八地修所斷煩惱時所得無漏離繫得以未來所修無漏道為引因歟問光法師所引顯宗論中述以無漏道斷上七地前八品煩惱無間解脫道位上地近分有漏道修不修相作三解釋爾者初釋意如何釋之耶問光法師所引顯宗論中云離第九品方可具二文爾者此釋意為唯第九一品煩惱得有漏無漏二種離繫得為當前八品煩惱得之歟問光法師所引顯宗論中述以無漏道斷上七地前八品煩惱無間解脫道位上地近分有漏道修不修相作三解釋爾者第二第三釋意如何釋之耶問論中舉餘師義云唯得靜慮利果聖道上惑離繫應皆不成文爾者光法師如何釋此文耶問退法種姓人練根作思法種姓斷非想地三四品煩惱後退彼思法種姓時必可退彼三四品煩惱耶問頌文云近分離下染文爾者彼所離地唯限下八地歟問以第三靜慮無漏道斷自地煩惱第九解道位起第四靜慮無漏道義可有耶問靜妙離觀可緣五部法耶問光法師所引正理論中離欲界染解脫道位未來修麁等三行相文爾者今此麁等行相無間道攝歟問非想地可有有漏十六行相耶問光法師所引正理論中述有餘師義云異生聖者離欲無間解脫道中亦修不淨息念慈等文爾者今此九無間前八解脫道位未來所修不淨觀等功德唯限未至地攝歟問光法師所引正理論中離欲界染前八解脫道位未來所修麁等三行相通緣欲界及初靜慮文爾者一念緣之歟問異生斷初第二第三靜慮煩惱九無間前八解脫道位未來可修緣欲界心耶問無色界心緣第四靜慮唯限麁等三行相歟問異生斷第四靜慮煩惱第九解脫道位未來可修近分地攝麁等三行相耶問有漏斷惑道四分定中唯限順住分歟問頌文云不動盡智後必起無生智文爾者第二念所起無生智初盡智所修歟問一切阿羅漢必可起無學正見耶問依無色定得阿羅漢果位可修法智耶問見道位先觀上苦諦後觀下苦諦義可有耶問頌文云或具輻等故文爾者誰人義耶問得預流果唯限加行得歟問依身在色界可起不還果道無漏耶
