body:
  text: 俱舍論第二十六卷抄下問題問今論中釋有貪心離貪心有三師説見爾者論主意以何師義為所存耶問他心智所知法悉以業為因歟問今論文云一實自相為所緣境文爾者今此自所緣境者限有漏他心智耶問除他心智餘無漏心中可有唯緣一法類耶問盡無生智不作空非我二行相故如何釋之耶問不受後有者限悲想有耶問盡智無生智俱具我生已盡等四行相耶問西方師意十六行相外有餘無漏行相云義引何論文證之耶問今論中引本論文云惑故疑故猶豫故文光法師釋此文作三解釋爾者第二解意如何釋之耶問付四諦名言唯名滅諦不名靜等三諦有何故耶問薩婆多宗意有為法體可生滅耶問經部宗意於當別我可起無執耶問今論中述經部師義云執續生我等亦有四種異文爾者此文所等取我當限二我中何耶問薩婆多宗意行相體可限慧心所耶問今論文云慧通能行相行所行餘心心所唯能引文作光法師二釋初釋意此文述論主義釋耶問光法師所引正理論中釋唯依欲界依身起法智舉三故爾者初故如何釋之耶問今論中出總緣非我觀所緣法云謂自體相應俱有法文今此俱有法中可攝法俱得耶問今論意總緣非我觀體不通修慧故如何釋之耶問光法師所引婆沙論中釋聞慧依地舉三師異説爾者第二師意末至地可有聞慧耶問依身在色界可初起總緣非我觀耶問光法師意依身在下地可起上地聞慧耶問欲界聞思所成非我行相唯限加行得歟問外法異生可論總緣非我觀耶問依身在色界所起定心非我觀可緣三界耶問依身無色聖者可成就他心智耶問今論中述遍事現觀相云謂於苦集滅可遍智斷證文爾者於集滅兩現觀邊已有遍斷遍證我故名遍事現觀耶問三類智邊俗智於苦集滅三諦可有遍事現觀耶問三類智位所修俗智為十六行相攝智為當可六行智攝耶問三類智邊俗智唯限不生法耶問三類智邊俗智可有法智繫屬類耶問三類智邊世俗智所依身與見道所依身可同耶問三類智邊世俗智本來可得非擇滅耶問經部宗意無漏法可熏有漏種子耶問下地見道現前可修上地見道耶問無漏法隨所依地上下可有勝劣不同耶問斷欲界煩惱位不修類智斷上二界煩惱位不修苦集法智者可有何過耶問斷上地煩惱無間解脫道位可修下地非對治無漏耶問斷欲界煩惱第九勝進道位可現修他心智耶問阿羅漢果聖者勝進道位初念可現修苦集法智耶問聖者他心通解脫道現前位所現修智唯可限二智耶問偈頌文云勝進道亦然文爾者亦然者光師如何釋之耶問今論意微微心位可有未來修耶問聞思慧無間生無漏智義可有耶問遊觀無漏智現前位現修盡無生智義可有耶問六行智觀事觀現觀中何耶問異生斷惑勝進道可現修他心智耶問已離欲異生依近分地離前勝進道現前位得修他心智耶
