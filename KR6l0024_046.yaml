body:
  text: 俱舍論第十四卷抄問離勤策律儀外可有別正學律儀耶進云今論云離勤策律儀無別正學勤策女律儀文付之勤策者十戒正學者六法也求戒心定可別勤策者對別人受之正學者從僧伽得之受戒緣亦不同離勤策律儀之外可有別正學律儀哉是以光法師釋故因緣別遠離有異之論文云言因別者謂求戒心別言緣別者謂受戒緣別文加之論中離勤策律儀之外可有別近事近住律儀見相例可同如何答離勤策律儀之外無別正學勤策女律儀者律藏通途之所説諸論一同之定判也後學之輩更不可異求之光法師釋今論離勤策律儀無別正學勤策女律儀之文作二解釋初釋云勤策女先受十戒後受六法雖更得六法即同十戒中六戒故所以勤策女十戒及正學六法不異勤策十法文此人意云勤策女先得十戒後於彼十戒中為堅持六法故重對僧衆受勤策女中六法之時先所得勤策女十戒無表之外雖別六法無表生即勤策女十戒中六法無表重生名正學律儀更非別類無表故離勤策律儀之外無別正學勤策女律儀也為言第二釋云又解作正學時非更別得六法但重受教行約令持先受故此六法即是十戒中六故説正學六法勤策女十戒不異勤策十戒文此釋意云於先所得勤策女十戒中為竪持六法故重對僧衆受可堅持不犯之教約許也以之名正學律儀故勤策女十戒之外更非別六法無表重生故離勤策律儀之外無別正學勤策女律儀也為言但於求戒心定可別受戒緣亦不同云難者堅持勤策女十戒中六法名正學律儀故全非求戒心是別亦非受戒緣不同也若爾故因緣別遠離有異之論文何為相違哉次於論中離勤策律儀之外可有別近事近住律儀見云例難者設雖先受勤策律儀後受近事律儀等非重受勤策中五戒故求戒心是別受戒緣相替故離勤策律儀之外有別近事律儀等也由因緣別相望有異之論文其意在之歟彼此義門遙異更不可為例難哉尋云勤策女十戒中何唯堅持此六法不堅持餘四戒哉答此六法其過尤重餘四戒不及之故勤策女十戒中唯制此六法別名正學律儀也問問光法師意近住戒不分男女不同故如何釋之耶進云光法師釋云近住八戒唯一晝夜以時從故不分男女故獨為一文付之設雖時分短促若有男女別者何不分男女不同哉是以正學六法律儀雖為時分長遠不分男女不同世第一法雖唯一剎那亦分男女不同若爾以時役故不分男女之定判難思哉答別解脫戒自本男女戒體是一也其中近住戒是一日一夜戒品時分短役男女衆別不分明故釋以時役故不分男女尤有其謂也餘苾芻等戒是盡形壽戒品男女衆別極分明故分男女不同也但於正學六律儀例難者正學戒自本唯就女身建立故不論男女不同也次於世第一法例難者彼依男身依女身之善根亦各別故更非相例也問苾芻苾芻尼戒體可各別耶進云今論云離苾芻律義無別苾芻尼律儀文付之既云苾芻律儀名苾芻尼律儀體性尤可各別也何況苾芻律儀者二百五十戒苾芻尼律儀者五百戒也其數既異其體豈同哉加之暖等四善根隨男女依身其體既各別也苾芻苾芻尼戒體例亦可同如何答見今論文本頌云初律儀八種實體唯有四形轉名異故各別不相違文長行之中或云離苾芻律儀無別苾芻尼律儀文或云謂轉根位令本苾芻律儀名苾芻尼律儀或苾芻尼律儀名苾芻律儀文或云非轉根位有捨先得得先未得律儀因緣故四律儀非異三體文任此等論文苾芻苾芻尼戒體是同云事分明也但於苾芻苾芻尼律儀多少不同云難者光法師會此疑作三釋初釋云男女不同開遮有異隨緣別故或説二百五十或説五百論其七支戒體皆等文此釋意云由男女緣別遮戒雖有多少不同其遮戒皆本性戒七支之中類攝故本性戒七支體等彼遮戒亦無異云也故泰法師釋云但由男女開遮二百五十戒五百多少不同然其七支性遮戒體無別故也文此釋意同光法師初釋意也第二釋云又解據本七支兩衆戒等若論遮戒多少有異雖遮有異先受戒時兩衆互得所以者何苾芻及尼俱作誓言諸惡皆斷由斯願力互得遮戒雖皆互得由緣別故持犯不同制罪各別文此釋意云男受具足戒之時作諸惡皆斷之誓言故得自他一切遮戒也女受具足戒之時亦以同之故苾芻雖兼得苾芻尼所制之遮戒苾芻所得名苾芻戒苾芻尼雖兼得苾芻所制之遮戒苾芻尼所得名苾芻尼戒為言第三釋云又解論遮戒體多少不同未轉根時若受此類戒即得此類戒於轉根位至彼類中非別得遮雖無遮戒由違教故亦結彼罪文此釋意云男得苾芻戒已轉根為女之時本所得戒之外雖無別得遮戒約本所得戒隨其所應可被云苾芻尼戒之分齊名苾芻尼戒也轉根之時先所得戒之外不新得先未得戒故云離苾芻律儀無別苾芻尼律儀也雖不新得先未得戒恐違教故不化彼罪云也次於暖等四善根例難者別解脫戒非心隨轉色必恆相續起故於轉形位以彼先所得相續戒品即名苾芻及苾芻尼等也暖等善根異之轉形之後先所得善之外亦得異身善根故其體各別也更非相例歟重難云光法師三釋俱不可然先就初釋難思若苾芻苾芻尼二戒其體是同者何判男女不同開遮有異哉就中論其七支戒體皆等云事有疑若唯就性戒七支論之者性戒體同遮戒體別歟若爾不可云苾芻苾芻尼二戒其體全同哉二戒體同者性戒遮戒俱其體可同故也是以泰法師釋云然其七支性遮戒體無別故也文若亦通就性戒遮戒論之者既云或説二百五十或説五百何偏可云論其七支戒體皆等哉何況依男女不同所應離罪有多少不同者能離戒體從彼所離別別可生男女戒體豈無多少不同哉次就第二釋亦不明既云若論遮戒多少有異設雖作諸惡皆斷之誓言唯可得自所制之一切遮戒何可越得他所制之遮戒哉若亦互得他所制之遮戒者寧云持犯不同制罪各別哉何況不飮酒等遮戒男女無替不可有互得之義若爾云據本七支兩衆戒等兩衆同體戒唯於性戒述若論遮戒多少有異雖遮有異先受戒時兩衆互得於遮戒無簡別成兩衆互得之旨其疑難遁哉加之見今論一段之文或云離苾芻律儀無別苾芻尼律儀文或云謂轉根位令本苾芻律儀名苾芻尼律儀或苾芻尼律儀名苾芻律儀文或云非轉根位有捨先得得先未得律儀因緣故四律儀非異三體文此等論文轉形之時以先所得苾芻律儀等即名苾芻尼律儀等云事炳然也先受戒時兩衆互得之釋似招相違於今論文次就第三釋亦有疑遮罪自本由違教結之若離彼遮罪者何不得其遮戒哉雖離所治罪不得能治戒云事豈不違如來制戒之理哉何況設雖轉戒之時先所得苾芻戒等即名苾芻尼戒等苾芻二百五十戒之外有別苾芻尼遮戒苾芻尼五百戒之外有別苾芻遮戒者寧非苾芻苾芻尼戒體各別哉次會暖等善根例難事其差異猶未開若於暖等善根者先所得暖等之外得別類暖等故有男女不同者設雖非心隨轉色先所得律儀之外何無得別類律儀之義故是以雖得勤策不殺生戒等豈非得苾芻不殺生戒等哉答光法師三釋所存旁分依憑各別也初釋意以今論實體唯有四之文為依憑會二戒多少不同也一切遮戒皆是本性戒七支部類故本性戒七支同體無異屬彼之遮戒亦同體無異云也論其七支戒體皆等之釋其意在之泰法師釋其趣同之但二百五十與五百多少不同者男過少女過多故所治過罪雖有多少不同能治戒品其體是同也第二釋意亦以今論實體唯有四之文為依憑會二戒多少不同也男女兩衆受具足戒之時同作諸惡皆斷之誓言故互得自他一切遮戒也苾芻兼得苾芻尼所制之遮戒苾芻尼兼得苾芻所制之遮戒男女兩衆雖互得之苾芻所得名苾芻戒苾芻尼所得名苾芻尼戒若男轉形為女之時本苾芻戒即名苾芻尼戒若女轉形為男之時本苾芻尼戒既名苾芻戒故今論一段之文全非相違但二百五十與五百多少不同者男女依身持犯不同故正所制誡苾芻二百五十非五百苾芻尼五百非二百五十也故就正所制誡論二百五十不同也實是男女兩衆互得之故轉戒之時無別捨得也如彼不飮酒等男女無替之遮戒不可有互得之義就男女相替之遮戒云互得之也然而本性戒七支無濫男女戒體是同故云據本七支兩衆戒等遮戒之中有男女相替之類故指之述先受戒時兩衆互得也非云遮戒皆有互得之義亦無所背也第三釋意以二百五十與五百多少不同為證據會今論文也二百五十與五百多少不同故非苾芻苾芻尼二戒體全同也但今論述實體唯有四等者苾芻轉形為女之時以本苾芻戒即名苾芻尼戒至彼類中先所得戒之外無別得遮戒故云離苾芻律儀無別苾芻尼律儀也男受具足戒之時得本性戒七支并不飮酒等男女無替之遮戒畢轉形為女之後重不可得彼戒亦除彼男女無替之遮戒餘男女相替少分遮戒非可得之作法受戒之習無受彼少分遮戒許之理故也雖不得彼遮戒由先所得戒品之力亦隨教護過之時處中善無表起故由彼等力所化其罪也雖有處中善無表非律儀體故云雖無遮戒由違教故亦結彼罪也次於暖等善根例難其差異猶未開云難者大綱前重成申畢於一具足戒先所得戒之外不得別類戒事作法受得之後彼戒相續起故自本有戒之上作法受得別類戒也勤策苾芻異類戒故先得勤策戒之後得苾芻戒更非相例之疑也問今論意別解脫戒異名有幾種耶進云今論中舉六種異名也付之披婆沙論百十三所説尋別解脫戒異名列一尸羅二妙行三律儀四別解脫五別解脫律儀六業七業道之七種異名若爾今論中何背本論所説列六種異名哉答婆沙論中實如疑難列七種異名今論意云俱得名尸羅妙行業律儀唯初表無表名別解業道舉此六種異名也即案其意六種異名中第四名律儀第五名別解脫故且略不舉婆沙論七種異名中第五別解脫律儀名也故今論中明第五別解脫名之時云亦得名曰別解脫律儀文是則開合不同也更非實義相違歟退勘婆沙論百八十一一處文云此中別解脫戒表及初念無表是尸羅是律儀是妙行是般羅底木叉是般羅底木叉律儀是業是業道列此七種異名也此中是般羅底木叉是般羅底木叉律儀者即當第百十三卷別解脫及別解脫律儀歟問今論中明別解脫戒云異心無心亦恆轉故文爾者今此無心者可通無想滅盡二定耶進云寶法師釋云無心謂滅定文付之論文無置簡別之言無心者何不通無想定哉是以光法師不釋限滅盡定哉答無想定者謂諸外道執無想異熟謂真解脫及真出離所起定也故今論餘處五云又許此定唯異生得非諸聖者以諸聖者於無想定如見深坑不樂入故要執無想為真解脫起出離想故修此定內法異生不謂無想異熟是真解脫及真出離故無想定唯限外道所起也故光法師餘處五釋云謂諸外道將修無想或起邪見謗釋種涅槃或起見取計彼為真或起戒取計彼為道如是等惑為惡趣因文而今論當卷云外道無有所受戒耶雖有不名別解脫戒由彼所受無有功能永脫諸惡依著有故外道依著三有果報故不得別解脫戒定故入無想定位無別解脫戒相續轉義也寶法師釋無心謂滅定尤有其謂也光法師雖不別釋無心之言限滅盡定其意可同寶法師釋也重難云設雖外道初不得別解脫戒內法異生受得別解脫戒之後遇惡緣作外道入無想定之時何無先所得別解脫戒相續轉義哉是一次勘正理論餘處十二文云又許此定通是此法外法異生所得非聖內法異生亦入無想定見若內法異生入無想定者無想定中亦可有別解脫戒相續轉義也答內法異生受得別解脫戒之後遇惡緣作外道時必可故捨先所得別解脫戒也故後時設雖入無想定更不可有別解脫戒相續轉義也次正理論此法異生入無想定云義判一類諸師作此定執非正理論師所存實義見若非正義意者何可及會釋哉重難云元瑜法師正理論述文記中此法異生入無想定云義正理論師所存實義見豈非正義意哉答彼師述文記釋不順正理論文云亦異光法師釋意且不可限用之也此事第五卷抄委細記之可引見之問無色界道望破戒及起破戒煩惱可有厭患對治耶第二十五卷抄記録之畢但問題少相替問離欲界染初無間道隨轉戒於破戒可有捨對治耶答不可有捨對治也兩方若有捨對治者光法師釋捨斷持遠厭五種對治依婆沙論第十七卷説見而披彼第十七卷文云離欲界染初無間道隨轉戒於破戒但為持對治遠分對治不云為捨對治知無此義云事若依之爾者以欲界聞思二慧為加行道以未至地道離欲界染初無間道隨轉戒於破戒可有捨對治也如何答準光法師餘處二十一隨其所應在何道中能捨彼法名拾對治之釋思之初起修慧位於破戒可有捨對治也而離欲界染遠加行道位雖有起聞思二慧之義正引生無間道近加行道位必可起修慧故彼初無間道隨轉戒於破戒不為捨對治也疑難之中被出婆沙論説即存此意也何況重勘婆沙論七十二文云第四靜慮無間順次入空無邊處時彼第四靜慮意空無邊處意識法或無色界繫或不繫所緣法境必可空無邊處以上見明知以色界心為加行道彼無間不起空無邊近分無間道云事若起之者可緣色界繫法故也欲界聞思二慧無間不起未至地初無間道之理以此文何可知之也問寶法師意持對治唯限解脫道歟第二十一卷抄記録之畢問寶法師意無色界道望破戒及起破戒煩惱可有持對治耶第二十一卷抄寶法師意持對治唯限解脫道歟云論義重難之中記録之畢問眼等六根律儀為唯以意識相應正知正念為體為當可通五識相應正知正念耶答唯以意識相應正知正念為體也兩方若通五識相應正知正念者光法師釋眼根律儀以正知正念為體云慧能簡擇念能憶念文而五識是無分別法也豈可有簡擇憶念之義哉若依之爾者集異門足論十五中釋六恆住法云復次有説六識相應緣色聲香味觸法境捨受名捨文而見婆沙論四十四並百九十七文云根律儀以六恆住法為自性文準此兩論文思之眼等六根律儀通以五識相應正知正念可為體也如何答眼等六根律儀唯以意識相應正知正念可為體也其故眼等六根律儀者正知正念防護制伏眼等諸根不令於境起諸過患之義也五識是無分別法也豈可有此義哉是以光法師釋為顯如是二種律儀俱以正知正念為體之論文云所以慧念名律儀者慧能簡擇念能憶念此二力強防護制意及與眼根不令於境起諸過患故名律儀非無表色文何況光法師所引正理論三十六中述眼等六根律儀相云故契經説眼見色已不喜不憂恆安住捨正知正念如是乃至意了法已文既云眼見色已豈非取意識相應正知正念哉準光法師餘處十五釋今論所引契經眼見色已唯受於色不受色貪之文云眼見色謂眼眼見色已謂意識之釋思之眼見色已之今經文唯限意識相應正知正念之旨分明也又云不喜不憂若非意識相應者寧可云不喜不憂哉加之婆沙論三十六中證六恆住法唯意地之義云六恆住法亦唯意地以説眼見色已乃至意知法已不喜不憂心恆住捨具念正知故文而正理論所引説六根律儀之經文其意同之明知眼等六根律儀亦唯以意識相應正知正念為體云事但於集異門足論説者是光法師餘處十所引文也而今此説可不正義見即勘彼論説述恆安住捨之捨體或云行捨名捨或云捨受名捨之二説中行捨名捨云義是正義也故彼論十五云今此義中應知意説心平等性心正直性心無警覺性任運住性行捨名捨文復次有説六識相應等者捨受名捨云不正義意也何可及會通哉就中披婆沙論説根律儀以六恆住法為自性者亦不正義意也評家意不許此義見若爾以集異門足論説六恆住法通六識相應捨受之文為眼等六根律儀可通五識相應正知正念云難旁不落居事歟尋云眼等六根律儀唯以意識相應正知正念為體者為唯限無漏正知正念為當可通有漏正知正念哉答眼等六根律儀唯以無漏正知正念為體也故婆沙論四十四云復次念慧有二種一世間善二出世間善世間善者名念慧出世間善者名根律儀文任此文眼等六根律儀唯以無漏正知正念為體之旨分明也問眼等六根律儀與六恆住法其體可同耶答其體不全同也兩方若其體不同者眼等六根律儀六恆住法俱是無學聖者所起正知正念為自性其體定可同是以光法師所引正理論三十六中説六根律儀云故契經説眼見色已不喜不憂恆安住捨正知正念如是乃至意了法已文見正理論餘處二十九文述六恆住法云謂見色已不喜不憂心恆住捨具念正知廣説乃至知法亦爾文一論前後説六根律儀述六恆住法其文大同其體豈別哉若依之爾者婆沙論四十四評家意不許六根律儀以六恆住法為自性云師説見若六根律儀與六恆住法其體是同者評家意何不許此義哉答六根律儀六恆住法雖同無學聖者所起正知正念為體寬狹既相替其體寧全同哉所謂勘婆沙論處處之文或四十四説根律儀自性云復次念慧有二種一世間善二出世間善世間善者名念慧出世間善者名根律儀復次念慧有二種一學二無學學者名念慧無學者名根律儀復次念慧有二種一鈍根種姓二利根種姓鈍根種姓名念慧利根種姓名根律儀文任此文眼等六根律儀以利根無學聖者所起無漏正知正念為體見或三十六説起六恆住法人云評曰應作是説一切阿羅漢皆有此六云何知然此六恆住皆以漏盡清淨身中念慧為體諸阿羅漢無不成就此念慧故文任此文不簡鈍根利根一切無學聖起六恆住法之旨是炳然也或三十六説六恆住法依地云評曰應作是説通在三界十一地有謂欲界未至靜慮中間四靜慮四無色意識念慧遍諸地故此文既云欲界有頂在六恆住法故六恆住法通有漏正知正念云事亦分明也若爾六根律儀唯限利根無學聖者所起無漏正知正念六恆住法廣通一切無學聖者所起有漏無漏正知正念故寬狹既各別其體非全同也故婆沙論四十四中有餘師意根律儀以六恆住法為自性云説評家不許之云評曰此諸説中初説為善經説念慧能護根故根律儀以正念正知為自性云初説為善云也但於正理論中當卷説六根律儀餘處述六恆住法其文大同其體豈別哉云難者理實而言寬狹不同其體雖別同以無學聖者所起正知正念為體之邊是同故述其大綱許也非云其體實同歟去承久三年窮冬之季別當法印權大僧都定範於當寺東南院被行俱舍論第十四五卷三十講之時宗性按立此論義對貞遍法師疑之講師之答頗不分明下座衆中別當法印定範法印權大僧都賴惠乘信得業樹慶得業信海得業等云此論義疑問甚為珍難勢尤可然之由其評定有之頗為愚身隨分之面目歟問成就過去別解脫戒無表不成就現在別解脫戒無表義可有耶答不可有此義也兩方若有此義者以性相思此事難有此義哉若依之爾者婆沙論百二十三中出成就過去無表戒非現在此類戒句云彼説此中更應作是説及無表戒已滅不失此類戒不現前文如今説者可有此義見如何答住別解無表未捨恆成現者諸論一同之性相故成就過去別解脫戒無表不成就現在別解脫戒無表之義不可有也但於婆沙論文者彼百二十三云諸有欲令若犯戒時現在戒斷過去不失彼説此中更應作是説及無表戒已滅不失此類戒不現前如已受近事戒而毀犯或已受勤策戒苾芻戒而毀犯近事女等説亦爾犯戒之時現在無表戒斷云故是可不正義也次下云諸有欲令若犯戒時現在戒不斷過去亦不失者彼説此中更無餘説無有唯成過去無表戒而非現在此類無表故之説可為正義也重難云前説置應作是説之言何云不正義哉次見光法師餘處一末釋云設有無表唯一剎那相續類故亦名相續如乳如薪故入阿毗達磨上云亦有無表唯一剎那依總種類故説相續文準此釋意思之別解脫戒無表中有唯一剎那之類者彼第二剎那成就過去別解脫戒無表不成就現在別解脫戒無表之義可有哉答今應作是説之言可非評家應作是説依今義意者應作如此説云意也全非評家正義也次光法師餘處云設有無表唯一剎那處中無表中有唯一剎那之類也何必存別解脫戒無表中有此類舉今疑哉問聞慧無間起暖善根義可有耶問未離欲染人修慧無間起暖善根義可有耶第二十三卷抄記録之畢問未得未至地人思慧無間起頂善根義可有耶第二十三卷抄記録之畢問光法師述從思慧初入暖人暖善根初念修不修異類善根義作二解釋爾者初解意如何釋之耶進云光法師釋云從思慧入暖初一剎那亦修異類文付之暖善根初安足位不修異類善根者諸論一同之所談也光法師何釋亦修異類哉何況今此解意釋第二念後唯修同類後念純熟位猶不修異類善根初念未熟位豈可修之哉非只違諸論所説頗似背極成道理就中見顯宗論十九文改恆成就過未之頌文結多恆成過未明知暖善根初念不修異類善根云事如何答光法師二解釋所存相異依憑各別也初釋意依得靜慮律儀恆成就過未之理會要同分者方能修故之文也所謂靜慮律儀是隨心轉法必有三世得無始串習得之甚易故得靜慮律儀初念定還得餘生所失過去靜慮律儀也故見今論文本頌云得靜慮律儀恆成就過未長行述諸有獲得靜慮律儀乃至未捨恆成過未餘生所失過去定律儀今初剎那必還得彼故文既無簡暖善根云恆成就過未故從思慧初入暖人暖善根初念修異類善根云也是即無始所失過去靜慮律儀得之甚易故暖善根初念得之為言但於暖善根初安足位不修異類善根者諸論一同之所談也云難者光法師會之云第二念後唯修同類從多分説不修異類文次於第二念後純熟位猶不修異熟善根初念未熟位豈可修之哉云難者初念已得無始所失異類善根故第二念後唯修同類善根不修異類善根也故初念雖修異類善根第二念後更不修之全無違論説亦不背道理也次於顯宗論文改頌云難者暖善根初念雖還得無始所失異類善根不還得同類善根故為簡之改云多恆成過未也故見顯宗論十九長行文云諸有獲得靜慮律儀乃至未捨來多恆成過未前生所失過去定律儀今初剎那必還得彼故以順決擇分所攝定律儀初剎那中不成過去餘生所得命終時捨今生無容重得彼法為簡彼法故説多言文上標初剎那中不成過去下述其不成就故云餘生所得命終時捨今生無容重得彼法為顯不成過去同類善根置多言之旨長行之文自分明也何為相違哉重難云見光法師初釋云從思慧入暖初一剎那亦修異類故亦得彼無始所失定文此釋意從思慧初入暖人暖善根初念修未曾得異類善根故亦得過去無始所失定見若彼初念所修異類善根即無始所失定者不可云亦修異類故亦得彼無始所失定哉是一次見今論餘處文云曾所得非修文若彼無始所失定者不可云修之哉是二答暖善根是先未曾得種姓故不可修未曾得異類善根明知暖善根初念修異類善根者無始所失未來定也從思慧初入暖人暖善根初念還得無始所失定之中過去起者得而非修未來成者亦名得修也如彼光法師餘處二十六所引婆沙論百五云若過去者名得非修若未來者名為得修也故暖善根初念修無始所失未來定故亦得彼無始所失過去起定為言次於今論餘處二十六曾所得非修之文者光法師解此文作三釋且依初釋者云得勝曾得故亦名未曾得文若爾勝曾得法亦名所修無相違也問光法師解釋中暖善根初念修異類善根文爾者所修異類善根命終捨法歟第二十三卷抄記録之畢問光法師述從思慧初入暖人暖善根初念修不修異類善根義作二解釋爾者第二釋意如何釋之耶進云光法師釋云又解據福分説初得定時必成過未若約決擇分初得定時不成過去文付之依第二釋意見今論現文本頌結得靜慮律儀恆成就過未長行述諸有獲得靜慮律儀乃至未捨恆成過未餘生所失過去定律儀今初剎那必還得彼故若從思慧初入暖人暖善根初念不修異類善根者豈不背恆成就過未之理哉答光法師二解釋所存相異依憑各別也第二釋意依要同分者方能修故之理會得靜慮律儀恆成就過未之文也所謂暖善根是見道近眷屬先未得善根故彼初念不修異類善根也故今論餘處二十三中明暖善根初安足時未來不修餘諦念住云由此種姓先未曾得要同分者方能修故文亦無成過去同類善根之義餘生得命終時捨今生亦無量得義故也故從思慧初入暖人暖善根初念全不成過去靜慮律儀云也但於今論本頌長行之文者光法師會之云據福分説初得定時必成過未若約決擇分初得定時不成過去故正理三十六云諸有獲得靜慮律儀乃至未捨恆成過未前生所失過去定律儀今初剎那必還得彼故此中應作簡別而説以順決擇分所攝定律儀初剎那中不成過去餘生所得命終時捨今生無容重得彼故文此釋意以正理論説為證據會得靜慮律儀恆成就過未之文其意如此也重難云此釋意以正理論説為證據事不可然正理論意述順決擇分善根初念不成過去同類善根之旨也全非彼初念得過去異類善根之義其故上標初剎那中不成過去下述其不成就故云餘生所得命終時捨今生無容重得彼故若非同類善根者不可云命終時捨豈亦無重得彼故之義哉爰知正理論意暖善根初念不成過去同類善根云也是以寶法師釋正理論今文云若暖等俱戒不定成過去捨已不重得故若餘定戒成過去故此應簡別説也文此釋意就同類善根不成過去之旨分明也何依此文證暖善根初念不成過去同類異類善根之義哉答暖善根初念自本不修異類善根故不成過去異類善根事理在絶言不及釋之不成過去同類善根事可有其疑故云餘生所得命終時捨等釋顯之也故光法師第二釋意以正理論今文為其證據述暖善根初念不成過去同類異類善根之義尤有其謂也寶法師釋準而可會也問暖等四善根外餘順決擇分善根福分決擇分中何攝耶答可福分善根攝也兩方若福分善根攝者既是順決擇分善根也何可福分善根攝哉若依之爾者任光法師據福分説初得定時必成過未之解釋暖等四善根之外餘定生善法皆可福分善根攝見如何答光法師釋諸有獲得靜慮律儀乃至未捨恆成過未餘生所失過去定律儀今初剎那必還得彼故之論文作二釋中第二釋意云據福分説初得定時必成過未若約決擇分初得定時不成過去文任今解釋福分決擇分中決擇分善根者唯限暖等四善根餘順決擇分善根等皆可福分善根攝見但於既是順決擇分善根也何可福分善根攝哉云難者四分定中順聖道故雖順決擇分攝順三分善中能感世間可受果故是順福分攝也故見今論餘處十八文明順三分善相云順決擇分者謂近能感聖道果善即暖等四後當廣説出順決擇分善唯舉暖等四善根餘定生善法多屬順福分善也問正理論意從思惠初入暖人暖善根初念可修異類善根耶答可有修不修二意也兩方若修異類善根者見正理論處處之文當卷三十六云此中應作簡別而説以順決擇分所攝定律儀初剎那中不成過去餘生所得命終時捨今生無容重得彼故文光法師引此文為暖善根初念不修異類善根云第二釋證餘處正理六十一明暖善根相云此初安足唯修同分者先未曾得如是種性故於諸諦中行未廣故文任此等文彼論意暖善根初念不修異類善根云事分明也若依之爾者得靜慮律儀恆成就過未者正理論中同所述也而見彼論餘處六十一文述諸有先時未離欲染依思所成惠引暖善根生許從思惠初入暖義若爾從思惠初入暖人暖善根初念不修異類善根者豈不違恆成就過未之理哉答準光法師二解釋意可聊簡正理論意也若依初釋意者正理論意從思惠初入暖人暖善根初念修異類善根可云也彼論意存得靜慮律儀恆成就過未之理故也但於正理論此中應作簡別而説之文者暖善根初念不成過去同類善根之旨顯也上標初剎那中不成過去下述其不成就故云餘生所得命終時捨今生無容重得彼故此旨炳然也若非同類善根者不可云命終時捨豈亦無重得彼故之義哉爰知正理論文明暖善根初念不成過去同類善根之由更非遮成過去異類善根之義也光法師引此文為第二釋證據者此別釋意也何為相違哉次於正理論餘處此初定足唯修同分者等之文者準光法師第二念後唯修同類從多分説不修異類之釋可會通之也若依第二釋意者正理論意暖善根初念不修異類善根可云也彼論意存要同分者方能修故之理故也但於正理論得靜慮律儀恆成就過未之文者準光法師據福分説初得定時必成過未若約決擇分初得定時不成過去之釋可會通之也引正理論此中應作簡別而説以順決擇分所攝定律儀等之文為此釋證據其意可知之如彼起無諍願智等未曾得功德之時過去寧可成自類善根哉明知初剎那中不成過去者全不成過去同類異類靜慮律儀云也其中暖善根初念不得過去異類善根故不成之云事顯然不及釋述之不成過去同類善根事未明其所以故云餘生所得命終時捨今生無容重得彼故也何況暖善根初念設雖不還得過去同類善根若還得過去異類善根者不可背恆成就過未之理顯宗論中何改之結多恆成過未哉思此等道理暖善根初念不成過去同類善根者專順正理論意也問暖等四善根四分定中唯順決擇分攝歟第二十三卷抄記録之畢問論文云謂初剎那必成未來非成過去文爾者今此初剎那者為唯限初苦法忍位為當可通餘位耶答可有二義也兩方若唯限初苦法忍位者得果練根初念必成未來無漏不成過去無漏初剎那言尤可通彼初念是以見正理論三十六文云昔曾未得創得名初文得果練根初念亦容有此義初剎那言何不通彼初念哉若依之爾者寶法師釋此文云唯除最初苦法智忍一剎那中不成過去爾時未有過去道故圓暉法師解此事述謂聖所住無漏律儀於初剎那苦法忍位必成未來不成過去此類聖道先未起故過去既無故不説成就任此等定判初剎那言唯限初苦法忍位云事分明也如何答此事雖有學者異義且可存初剎那言不限初苦法忍位通得果練根初念云義也其故得果練根初念唯成未來無漏律儀不成過去無漏律儀有此類聖道先未起故之義謂初剎那必成未來非成過去此類聖道先未起故之論文可通得果練根初念也故婆沙論百二十三中或釋發智論十二出成就未來及現在戒非過去之類云謂無漏戒初現前之文云此説苦法智忍及得果轉根初剎那現前位文或釋發智出成就現在及未來戒非過去之類云謂無漏戒初現前之文云此説苦法智忍及得果轉根初剎那現前位同舉得果轉根位準婆沙論文思今論意云謂初剎那必成未來非成過去可通得果練根初念也何況見正理論三十六文云初剎那後乃至未捨又成過去文顯宗論十九説全亦同之翻乃至未捨之言思之明可有已捨位不成過去無漏律儀之義見是豈非指得果練根初念哉但於寶法師并圓暉法師釋者就無其濫且出初苦法忍位也就實盡理委論之者得果練根初念成未來無漏律儀非成過去無漏律儀故謂初剎那必成未來非成過去之論文可攝得果練根初念也重難云初得果初練根初念實雖必成未來無漏律儀非成過去無漏律儀退所得果還得先所得果退練根所得種姓還得先所得種姓之時亦可成先所得過去無漏律儀若爾得果練根初念容有其濫故初剎那言不可取彼初念故正理論云昔曾未得創得名初先得已失今創得時亦得過去文顯宗論説全亦同之是一次見寶法師釋云雖除最初苦法智忍自餘聖者乃至未入無餘依前皆成過未文得果練根初念不成過去無漏律儀者何釋自餘聖者皆成過未哉是二答謂初剎那之論文通得果練根初念者就初得果初練根初念論之故還得先所得果還得先所得種姓之時可成先所得過去無漏律儀云難全不可來正理論文亦非相違也次寶法師釋意對初苦法忍位決定無濫不成過去無漏律儀餘位聖者多分成就過去無漏律儀故從多分且云自餘聖者皆成過未歟設雖寶法師意初得果初練根初念豈可云成過去無漏律儀哉任先師聖禪僧都所存之旨一義之趣大概記録之畢又有初剎那言唯限初苦法忍位云義如彼顯愚意可引見之問除現在苦法忍隨轉戒外可有唯一剎那隨轉戒耶第二卷抄記録之畢問住定道律儀者唯限定道律儀現起位歟答不限定道律儀現起位也兩方若唯限定道律儀現起位者光法師所引婆沙論百二十二中云謂生欲界住律儀不得別解脫律儀現有身表文如此文者住律儀者不限定道律儀現起位見若依之爾者頌文云住定道成中唯限定道律儀現起位見如何答住定道律儀者因成就定道律儀位不限定道律儀現起位也如彼住果之言不限果道所攝無漏道現起位也何況光法師所所引婆沙論百二十二中或出成就身無表非此表之句云若生欲界住律儀不得別解脫律儀無身表住律儀者謂住靜慮無漏律儀無身表者謂或眠或醉或闕捨諸加行不求起表故文或舉成就身表亦此無表之句云謂生欲界住律儀不得別解脫律儀現有身表亦得此無表文此等文意無諍住靜慮無漏律儀者不限無漏律儀現起位見但於住定道成中之頌文者此文自本明現在住定道律儀必如次成就現在靜慮無漏律儀故今云住唯指現在住也故長行中釋今頌文云若有現在靜慮彼道如次成現在靜慮道律儀非出觀體有成現在文故置現住之言即為止其濫也加之正理論三十六中疑此住言云理應但説入定道時成現在世定道無表不應言住如住果言唯説果成非果現起今但言住云何得知定道現前非但成就是故彼説猶令生疑不能定顯成現無表故應但説在定道言雖説住言勞而無用今詳彼意前文已説成就去來此句正明成就中世故知説住顯起非成以非唯成證成現故定道無表隨心轉故散心現前必無彼故文住言不限現起之旨此文炳然也問處中無表中非善戒惡戒種類所攝類可有耶答不可有此類也兩方若有此類者思處中無表相善惡二戒種類之中悉可攝之此外何可有餘類哉若依之爾者正理論三十六中明處中無表云若有無表即是善戒或是惡戒種類或非二類可有此類見如何答善惡處中無表是善戒惡戒種類所攝非善惡二戒種類所攝之類不可有也是以今論中明處中無表云若有無表即是善戒或是惡戒種類所攝無出餘類光法師釋此文云善處中無表即是善戒種類所攝惡處中無表即是惡戒種類所攝無表義同種類相似故言種類所攝文任此等論疏定判無諍善惡處中無表悉可善戒惡戒種類所攝見但於正理論或非二類之文者今論所述善戒惡戒種類所攝處中無表之中不殺生等七支種類云善戒種類殺生等七支種類云惡戒種類依禮佛讀經布施等所發無表云或非二類也今論中合屬二類正理論開為三種只是開合不同更非相違定判也問光法師出無覆無記心有三世得類云即是串習威儀工巧通果心也爾者今此串習言可通通果無記心耶答今此串習之言唯限威儀工巧二無記心不通通果無記心也兩方若通果無記心者今論餘處出於無覆無記心有三世得之類云若工巧處及威儀路極數習者得亦許爾文此文無諍論串習義唯限威儀工巧二無記心見若依之爾者披光法師解釋起盡上標即是串習下述威儀工巧通果心也串習之言可通通果無記心見加之光法師餘處二解釋中於天眼天耳二通若串習者有三世得若不串習者無三世得之旨述準彼思之今此串習之言可通果無記心哉答見光法師解釋起盡釋論中述無記表能發心有三世得云若爾有覆無記心等之等之言云等謂等取強無記心即是串習威儀工巧通果心也文故今此通果心者即指意識發業通果心也而意識通果心其性強盛不論串習不串習必有三世得故今此串習之言唯限威儀工巧二無記心串習者有三世得不通通果無記心不串習者亦有三世得云事道理甚炳然也但於光法師餘處釋者彼述生上三靜慮起下地二通三世得有無作三釋中第三釋意也即彼釋意云又解生上三定下地二通或成不成若串習者即成若不串習者不成以不定故不説成也文是則五識通果心勢力微劣故由串習不串習雖論三世得有無意識通果心勢力強盛故不云串習不串習必有三世得也故婆沙論九十云以五識身性羸劣故他地現起勢不堅強若意識中變化心等設生他地勢亦堅強故不現前亦得成就文重難云婆沙論中明生欲界及初靜慮所起眼耳身三識有三世得云諸無記中有串習者亦恆成就如勝威儀工巧通果文今此串習之言可通通果無記心見如何答今此通果者指天眼天耳二通也而於天眼天耳二通由串習不串習論三世得有無事就生上三靜慮所起下地二通云之也今文述生欲界及初靜慮所起眼耳身三識有三世得之旨故串習之言唯限威儀工巧二無記心不可通通果無記心也問頌文云住中劣思作文爾者今此劣思者可通三性思耶答唯限善惡二思也兩方若通三性思者論中釋今頌文云以微劣思造善造惡唯發表業表尚無無表文此文無諍劣思者唯限善惡二思見若依之爾者既云劣思作尤可通無記思也如何答論中述今頌意云唯成就表非無表者謂住非律非不律儀以微劣思造善造惡唯發表業尚無無表況無記思所發表業文光法師釋此文云謂處中人以微劣思造善造惡唯發表業尚無無表況無記思所發表業能發無表舉勝況劣文此釋意云以微劣思造善造惡唯成就表不成無表況無記思所發表業能發無表哉舉勝況劣也故上所舉劣思者唯限微劣善惡二思此外復別舉無記思故劣思之言不通無記思也何況光法師所引婆沙論百二十二中明此句云不得此無表者謂非殷重信非猛利纒雖發身表不得此無表文此文云非殷重信非猛利纒以微劣善惡思發身表不發無表之旨亦分明也但於既云劣思作尤可通無記思云難者泛云之者劣思之言雖可通無記今舉善惡勝劣思況無記劣劣思故上劣思作之言唯限善惡云也問中有位可發表業耶答可發表業也兩方若發表業者光法師所引婆沙論百二十二中出非成就身表亦非此無表句云諸異生類住胎卵中已失前生表無表業現不能起文若中有位發表業者生有位無表業捨緣住胎卵中豈不成就表業哉若依之爾者中有位所起心品萬差也何不發表業哉答中有位可發表業也故見婆沙論處處之文或七十云復有説者此彼中有亦互相礙以相過時此彼展轉有語言故文或百三十五云中有當言誰心所轉耶答當言自心由自心力起表業故文任此等文中有位發表業之旨炳然也但於光法師所引婆沙論文者中有位雖發表業唯發無記表業不發善惡表業故婆沙論住胎卵中非成就表業之文全無相違也問於無想天可發表業耶答可發表業也兩方若發表業者見婆沙論百九十二文云彼無想天有心位必不起不同分心故文若不起不同分心者何可發表業哉若依之爾者以道理思之於無想天尤可發表業也如何答於無想天可有見色聞聲等之義豈不發表業哉故婆沙論百五十四中述從無想天沒定生惡趣云有説求無想者執無想定為真道彼異熟為涅槃乃至生彼天中此執隨逐彼後從無想出將命終時見當生相便作是念定無涅槃若實有者我已證得於今何故生相現前由謗涅槃及聖道故從被處沒生惡趣中文既言見當生相於彼天中借起眼識之旨炳然也若起眼識者寧不借起發表心哉但於婆沙論無想天不同分心云文者今此一段廢立以他界心及無漏心名不同分心也故婆沙論百九十二云若生欲界以欲界為同分心與彼命根衆同分為同分故以色無色界及無漏心為不同分心不與彼命根衆同分為同分故文色無色界不同分心準之可思自界之中起他地心不名不同分心故於無想天借起初靜慮眼耳身三識及發表心更不可背婆沙論文也問成就不善身無表時必可成就不善身表耶答必可成就不善身表也兩方若必成就不善身表者表無表成就不成就其義非一準何必成就之哉如彼遣使殺等雖成就不善身無表不可成就不善身表哉若依之爾者見婆沙論文云如表數量無表亦爾文如此文者成就不善身無表之時必可成就不善身表見如何答勘發智論十二文云若成就不善身表彼成就此無表耶答諸成就不善身無表彼成就此表文成就不善身無表之時必成就不善身表云事甚分明也但於如彼遣使殺等雖成就不善身無表不可成就不善身表云難者是則婆沙論問答也故婆沙論百二十二中問云亦應有成就不善身無表非身表謂遣他殺等是則此中應作四句何故作順後句耶文答此問有作是説意雖作四句許今此義評家意不許此義還通今難云應作是説無有唯成就不善身無表者故此但應作順後句所以者何若能發語遣他殺等由此發得身無表者必亦成就不善身表以必能動身手等故若不爾者前説成就善身無表非此表中亦應作是説若住不律儀及住非律儀非不律儀以善語言遣他施等由此發得善身無表前於善中既無此説故知發言遣他施等由此發得身無表者必亦能動身手等故由此成就善身表業是故二處皆無此説文問論中明十種得戒相爾者自然得戒者唯為限佛為當可通獨覺耶答可通獨覺也兩方若通獨覺者十誦律云世尊自然無師得具足戒雜心論述自起謂佛自然得戒唯限佛不通獨覺見是以辰旦人師次第禪門二解釋中云一自然得戒即佛是其人無師自發文若依之爾者披今論文云一由自然謂佛獨覺自然得戒通佛獨覺之旨分明也如何答麟喻獨覺者最上利根人故同佛可自然得戒故今論并正理三十七顯宗十九等論中云一由自然謂佛獨覺不限佛舉獨覺也但於十誦律并雜心論文者獨覺之中麟喻獨覺雖自然得戒部行獨覺非自然得戒故總見獨覺其義不定故唯舉無濫佛不列獨覺也次第禪門釋準之可會也問論中明十種得戒云一由自然謂佛獨覺文爾者今此獨覺者為唯限麟喻獨覺為當可通部行獨覺耶答唯限麟喻獨覺也兩方若唯限麟喻獨覺者論中雖説謂佛獨覺無置簡別之言何唯限麟喻獨覺哉何況自然得戒者依自然智現前力故得戒之義也而部行獨覺既不由教力盡知現前故尤可自然智豈非自然得戒哉加之餘處中明極七返有聖者相今論二十三云法爾自得苾芻形相正理論六十四述苾芻威儀法爾成就既外現苾芻形相知內得戒品云事若依之爾者部行獨覺智品稍劣不可云自然得戒是以光法師餘處二十三釋逢無佛法時得阿羅漢果之類云剃髮染衣不言得戒文今此人豈非部行獨覺哉答佛及麟喻獨覺最上利根人故初盡智現在前位自然可得戒品部行獨覺根性稍劣故不可有此義也是以今論并正理三十七顯宗十九等論中云一由自然謂佛獨覺文既對佛舉獨覺寧通部行獨覺哉泰法師釋此文云謂佛獨覺本在不淨觀前起欲界善心為近因等起要期發願云盡智時自然得別解脫故文此釋意唯就一坐成覺之類論此義見明知獨覺者唯限麟喻獨覺云事何況十誦律五十八云世尊自然無師得具足戒文雜心論三云所謂自起謂佛文此等文中唯舉佛不出獨覺事麟喻獨覺近佛故雖自然得戒部行獨覺非自然得戒故也次第禪門中云一自然得戒即佛是其人無師自發唯舉佛不出獨覺亦顯此意也加之光法師餘處二十三釋至第七有逢無佛法時彼在居家得阿羅漢果之論文云剃髮染衣不言得戒十種得戒中不言得阿羅漢時而得戒故文部行獨覺非自然得戒云事此釋亦分明也就中部行喻者如聲聞説者婆沙論處處定判也而光法師引婆沙論有阿羅漢以下品心起有表業受諸律儀之文畢云準此文羅漢非自然得戒文聲聞既簡之部行亦可同重勘慈恩大師表無表章三末云問何故許有羅漢沙彌得通無戒不許獨覺亦通無戒皆自然得以利根故文若通部行者豈限利根哉任此等文理部行獨覺非自然得戒云事甚炳然也但於部行獨覺不由教力盡智現前故尤可自然智云難者雖彼不由教力智品劣故不可云自然智亦無自然得戒之義也次於今論餘處二十三法爾自得苾芻形相之文者雖彼不得戒品身成無學法故法爾自然得苾芻形相也正理論文準可思之重難云見今論餘處十七文述善業道與思俱轉相云或依無色盡無生智現在前時得苾芻戒文正理四十二顯宗二十二説其文大同之若自然得戒唯限佛及麟喻獨覺者何可有依無色定盡智現在前時得苾芻戒之義哉是一次淄洲大師了義燈中釋衆出獨覺得戒相云衆出雖至佛所不樂為資不如聲聞樂事於佛所以一向自受非他文慧暉法師釋中云部行獨覺一百六十心得自然菩提即得戒也文任此等定判部行獨覺可自然得戒見是二答部行獨覺非自然得戒云事文理大旨如前重成申但於今論餘處之文者第三羯磨之時依無色定得今盡智之類也非由盡智現前之力得戒全無自然得戒之義也就中云無生智現在前時得苾芻戒非自然得戒云事勿論也次於了義燈釋者彼述大乘所談更非小乘義相歟慧暉法師釋無指依憑者不可依用之尋云別種姓部行獨覺自然得戒歟答別種姓部行獨覺通六種姓故非自然得戒也問論文云一由自然謂佛獨覺文爾者今此自然得戒者由求戒心得之歟答由求戒心得之也兩方若由求戒心得之者既云自然得戒不可由求戒心得之哉若依之爾者自然得戒若不由求戒心得之者所得戒可非等起善哉答佛及喻獨覺不淨觀前由起求戒心得盡智時位自然得具足戒也故見泰法師處處解釋當卷解一由自然謂佛獨覺之論文云謂佛獨覺本在不淨觀前起欲界善心為近因等起要期發願得盡智時自然得別解脫故文餘處十六釋欲無無表離表而生之論文云以佛自然結跏趺坐發願邀期得盡智時當受此戒由欲界加行善心令身結跏趺坐即是欲界善表身業得盡智時從此表業發別解脫文任此等定判自然得戒由求戒心得戒之旨甚分明也但於既云自然得戒不可由求戒心得之云難者佛及麟喻獨覺不淨觀前由起求戒心得盡智位雖得具足戒非作法受得之儀式自然得之故名自然得戒全無相違也問論中明十種得戒相爾者見道得戒者初苦法忍位得戒歟答初苦法忍位得戒也兩方若非初苦法忍位得戒者既名見道得戒初苦法忍位可得之也是以今論云二由得入正性離生謂五苾芻正理論三十七述三由得入正性離生謂五苾芻由證見道得具足戒任此等論文初苦法忍位可得戒見若依之爾者寶法師釋正理論師不許此義故云然彼五苾芻等先時決定有表相續不斷至得果時從彼而發泰法師判正理論師不許此釋故云然彼五比丘等先時決定有表相續不斷至得果時從彼而發別解脫律儀五苾芻得戒可初得果位見何況勘薩婆多毗尼毗婆沙文云見諦戒道未知智現在前得文而未知智者類智舊譯者論家人師定判也明知見道得戒者初得果道類智位得戒也依之天台大師次第禪門第二釋三見諦得戒即物鄰五人佛為轉四諦法輪即悟初果因而發戒妙樂大師弘決四述見諦者初得初果見未曾見諦謂諦理昔未見諦今得見諦見諦發時果戒俱得任此等釋見道得戒者初得果位得戒云事分明也如何答見道得戒者初苦法忍位得戒之旨文理如一方疑難也重勘律藏論藏之説廣伺當處餘處之釋見道得戒者初苦法忍位得戒見所謂十誦律五十八云五比丘得道即得具足戒文舊俱舍論十一云二由入正定聚得大戒如憍陳如等五比丘得苦法智忍時文當處泰法師釋云二由苦忍得入正性離生時謂五比丘亦由入觀前起欲界善心要其發願苦忍時得故文圓暉法師釋云二由證入正性離生謂憍陳如等五比丘見道生時得具足戒文餘處光法師十六釋云衆賢論主不許斯解故作是言然彼得果五苾芻等先加行時必定有表相續乃至得果入道依此表業發別解脫文泰法師十六釋或云謂五比丘未入聖時先有身表結跏趺坐相續不斷得苦忍時從彼身表而發無表文或云衆賢論主不許此釋故云然彼五比丘先加行時必定有表端身正坐相續不斷入見道時發別解脫文加之慈恩大師表無表章法苑林章三中明見諦得戒相或云何故苾芻初入見道有初得戒文或云五人見諦亦無表業初入見諦即得無表文準此等説思之見道得戒者初苦法忍位得戒之旨炳然也但於寶法師釋者至得果時者表相續事至得果位云也從彼而發者從彼相續表初苦法忍時發得無表為言全非云至得果時從彼相續表起無表也泰法師釋準可會通就中泰法師處處解釋中見道得戒者初苦法忍位得戒見自解釋前後豈可致相違哉次於薩婆多毗尼毗婆沙説者律藏異説也不可和會之十種得戒者薩婆多義源出十誦律説餘律藏説何可劬勞哉次於天台妙樂釋者是亦人師異釋也不可會通之重難云正理論餘處四十二中述有餘師意釋欲界無表不依表生云如得果時五苾芻等得別解脫戒文此釋意如得果時者指五苾芻等得戒時見是一次第二重難中所出寶法師等釋即顯此意也上標然彼五苾芻等先時決定有表相續不斷指之次下云至得果時從彼而發文相起盡無諍五苾芻先加行時表相續不斷至得果時從彼表業發得無表見至得果時者乍云指五苾芻初得道時從彼而發者非彼位云事會通之旨甚違現文哉是二次十種得戒者實是薩婆多義也若爾何不依用薩婆多律説哉是以慈恩大師表無表章中引薩婆多論七種得戒畢云此是薩婆多宗與俱舍等同增減數異體性不殊文此釋意此薩婆多論七種得戒與俱舍論等十種得戒七種十種得戒因緣雖異戒品體性得戒位分可同見至見道得戒其位分何可替哉是三答正理論餘處如得果時五苾芻等之文非云五苾芻至得果時得戒品此文意出欲界無表不依表生之類如佛獨覺得果時得戒及五苾芻得戒為言故光法師餘處十六釋此文云於前所説十種得戒中如佛獨覺得果時及五苾芻等得別解脫戒不依表生文次寶法師釋實以難思然而再案之至得果時者指表相續來至分際從彼而發者初苦法忍位非初得果時云事何強為難義哉次薩婆多論雖為薩婆多依憑律十種得戒專依十誦律説故違薩婆多論説強不可為痛歟但於慈恩大師表無表章釋者只令同其大綱許也不必一一得戒位分皆同歟問菩薩入見道位可得別解脫戒耶進云論中云一由自然謂佛獨覺菩薩得盡智位得戒入見道位不得戒也付之菩薩三大僧祇修行圓滿入見道位何不得別解脫戒哉如彼憍陳如等五苾芻三生六十劫修行圓滿入見道位得別解脫戒相例可同如何答菩薩自本欣求佛果菩提願得盡智位得具足戒故入見道位不得別解脫戒也故泰法師釋一由自然謂佛獨覺之論文云謂佛獨覺本在不淨觀前起欲界善心為近因等起要期發願願盡智時自然得別解脫文但於憍陳如等五苾芻例難者佛初成道之時憍陳如等五苾芻最初入見道是人勝事故願入見道位得具足戒故酬彼誓願入見道位得具足戒也故泰法師釋二由得入正性離生之論文云謂五比丘亦由入觀前起欲界善心要其發願苦忍時得故文若爾所願既各別也例難更不可來歟問非自然得戒非見道得戒無漏心現在前位得別解脫戒義可有耶答可有此義也兩方若有此義者論疏中廣雖明十種得戒相未舉自然得戒見道得戒之外無漏心現在前位得別解脫戒之類哉若依之爾者披今論餘處十七文述善業道與思俱轉相云或依無色盡無生智現在前時得苾芻戒文正理顯宗説其文大同之任此等論説可有此義見如何答非自然得戒非見道得戒無漏心現在前位得別解脫戒之義可有也所謂羯磨受戒人第三羯磨位有無漏心現在前義者可有此義也疑難之中被於今論餘處或依無色盡無生智現在前時得苾芻戒之文是其證據也既云依無色定盡無生智現前非佛及麟喻獨覺云事無疑又舉無生智現在前位非自然得戒之旨亦分明也定知聲聞之中羯磨受戒人第三羯磨位盡無生智現前得苾芻戒之類可有也是以寶法師餘處十七釋此文云準此正受戒容得無學文正受戒之言非自然得戒云事亦炳然也自然得戒非正受戒故也但於十種得戒之中不舉此類云難者一類無其人故文顯雖不列之云八由持律為第五人謂於邊國九由十衆謂於中國之中可攝此類也問憍陳如等五苾芻善來得戒人歟進云今論中非善來得戒見付之披毗婆沙善見律文云如來從初得道乃至涅槃善來比丘其數有幾答曰如此比丘其數有一千三百四十一人問曰名字何等其名曰阿若憍陳如等五人文任此文憍陳如等五苾芻者善來得戒人見若爾今論等説豈不背毗婆沙善見律文哉答披律藏論家二部之所説尋憍陳如等五人之得戒是見道得戒非善來得戒見所謂十誦律五十八云五比丘得道即得具足戒佛命善來比丘得具足戒文薩婆多毗尼毗婆沙二云於七種中見諦得戒唯五人得餘更無得者善來得戒三語三歸佛在世得滅得不得見諦得戒五人中憍陳如為上座以先見諦故善來中寶稱為上座以先來故文何況俱舍論云二由得入正性離生謂五苾芻三由佛命善來苾芻謂耶舍等文舊俱舍論十一云二由入正定聚得大戒如憍陳如等五比丘得苦法智忍時三由呼善來比丘得大戒如耶舍等文正理論三十七云二由佛命善來苾芻謂耶舍等由本願力佛威加故三由得入正性離生謂五苾芻由證見道得具足戒文顯宗論文全亦同之雜心論三云超升離生謂五比丘善來謂耶舍等文加之止觀四云如憍陳如見諦故受具足戒如耶舍比丘等善來受具足戒文次第禪門二云三見諦得戒即拘鄰五人佛為轉四諦法輪即悟初果因而發戒七善來得戒道機時熟佛呼善來即得戒文慈恩大師表無章法苑林章三云二見諦得俱舍等云謂入正性離生即五苾芻三善來得俱舍等云佛命善來謂耶舍等唯佛自作非餘所能滿通被故文如此等律藏論家之定判諸宗人師之解釋明見道得戒舉憍陳如等五苾芻述善來得戒出耶舍等苾芻爰知憍陳如等五苾芻者是見道得戒人非善來得戒耶舍等苾芻者是善來得戒人非見道得戒見道善來兩種得戒其類各別云事但於毗婆沙善見律文者是律藏異説也十種得戒者薩婆多宗義以十誦律説為其依憑也故慈恩大師表無表章云一十誦律是薩婆多宗同俱舍第十四律毗婆沙并雜心論及順正理顯宗大毗婆沙文善見律既非薩婆多宗依憑律俱舍論等文背彼律説事更非為痛哉問論文云如是所得別解律儀非必定依表業而發文爾者光法師如何釋之耶進云光法師釋云如是上來所得十種別解脫律儀非必定依表業而發謂初二種不從表生後八表生文付之依光法師釋見婆沙論百二十二文云如表數量無表亦爾文若自然見道二種得戒不從表生者豈不背婆沙論今文哉答自然見道二種得戒聖位得之故根本無表不從表生云也但於婆沙論文者泛爾表無表相對非論數量多少且就身表所發身無表云爾也故見一段文上述然表依身而起有依一分如彈指舉足等一分動轉作善惡業有依具分如禮佛逐怨等舉身運動作善惡業此中隨所依身極微數量表業亦爾畢下云如表數量無表亦爾此旨即分明也問光法師釋今論如是所得別解律儀非必定依表業而發文引下論十六欲無無表離表而生文會其相違作二解釋爾者初釋意如何釋之耶進云光法師釋云下文論主敘餘師義難或可下文通據加行根本兩位必有表故故言欲無無表離表而生文付之先初釋不明正見下論文云欲無無表離表而生者論主能難言也何可云餘師義哉是以光法師餘處十六指當卷非必定依表業而發之論文云前文敘餘師義後文依宗正述文如此釋者餘處欲無無表離表而生之論文為有宗正義見次第二釋亦難思設雖根本位無表有依加行表發無表之義者何可云非必定依表業而發哉何況自然得戒見道得戒加行者是可聖道加行於彼位更不可有別解脫戒表設亦雖彼加行位有表寧可發根本無表哉次見光法師釋云前解同正理餘師文而正理餘師者指餘處四十二有餘師説非於欲界一切無表悉依表生如得果時五苾芻等得別解脫戒不善亦應然之文也此師意不許依加行表發無表之義者對欲無無表離表而生之文豈可會故不相違哉若許依加行表發無表之義者正理論二説有何差異哉答光法師初釋意以當卷非必定依表業而發之論文為本會餘處十六欲無無表離表而生之論文也所謂光法師述謂初二種不從表生後八表生自然見道二種得戒根本無表不從表生云也此初釋中會餘處十六欲無無表離表而生之論文亦作二釋初釋意云下文論主敘餘師義難者當卷論中明十種得戒畢云如是所得別解律儀非必定依表業而發不及異義故以此論文為本義故以餘處欲無無表離表而生之論文為餘師不正義也但於光法師餘處前文敘餘師義後文依宗正述之釋者彼釋者以欲無無表離表而生之論文為本義故以非必定依表業而發之論文云敘餘師義也是即各別釋意也更不可儲會通哉次第二釋意自然見道二種得戒雖依加行表發無表根本位無有表故云非必定依表業而發也為言次自然見道二種得戒定前加行位有表云事何所遮哉二釋意同可許之依此加行表遠生根本無表何亦不許之哉如彼仙人意憤及遣使殺等依加行表生根本無表也次正理論餘處有餘師意自然見道二種得戒根本無表不從加行表生根本位亦無有表故不從根本表生為言然彼先時決定有表之正義意存欲無無表離表而生之義欲界一切無表必從表生隨其所應或從加行表生或從根本表生為言故正理論二説非無差異也然而光法師會通今論前後二文相違之時自然見道二種得戒根本位無有表云義邊是同故以非必定依表業而發之論文對欲無無表離表而生之論文云故不相違亦述前解同正理餘師也非謂云爾故正理論餘師意自然見道二種得戒依加行表生根本無表重意云正理論文一處之中所舉二説故非可和會之今論二文前後之卷相違故作和會釋之時就大旨同云前解同正理餘師也問光法師意三歸受戒人可成就身表耶答可成就身表兩方若成就身表者見光法師解釋云如三歸受戒從語四表業亦發身無表非必定依自類表發文若成就身表者身無表何不從身表生哉若依之爾者婆沙論中出成就善身表亦此無表之句云若住別解脫律儀無簡三歸受戒人明知三歸受戒人成就身表云事如何答三歸受戒人必可成就身表也所謂三歸受戒人必可發敬師等之身表等故也故勘婆沙論百二十二一段文或出成就善身無表非此表之句無舉住別解脫律儀人若三歸受戒人不成就身表者何不舉此類哉或述成就善身表亦此無表之句云若住別解脫律儀無簡三歸受戒人若三歸受戒人不成就身表者寧不簡之哉何況光法師所引婆沙論百二十二中明成就身表亦此無表之句云若住別解脫律儀若住不律儀彼定成就身表無表文任此等論文三歸受戒人必成就身表云事甚炳然也但於光法師釋者三歸受戒人雖成就身表正發得律儀依語表不依身表故云從語四表業亦發身無表也全非云三歸受戒人不成就身表故不限光法師當卷釋見餘處十六定判云若三歸受戒具依語四表正發語四無表兼發身三無表由隨師語而發戒故文光法師云遣使殺等根本成時有何表耶就無能發表論之即此潤色也問光法師釋今論如是所得別解脫律儀非必定依表業而發文引下論欲無無表離表而生文會其相違作二解釋爾者第二釋意如何釋之耶進云光法師釋云此解意説自然見道謂彼先時決定有表相續不斷乃至聖位從彼表發無表律儀文付之定中具微細寂靜位也麁動表業何可相續哉是以今論餘處十六中述無漏異熟非無漏心不與表業為隨轉因定若自然得戒見道位表業相續起者寧不無漏心與表業為隨轉因哉何況披今論餘處十六文云七善業道若從受生必皆具二謂表無表受生尸羅必依表故受生尸羅從表業生見自然見道二種得戒可非受生尸羅更不可云從表業生加之見光法師釋云後解同婆沙前師文而婆沙論前師意存身無表必從身表生之旨何釋非必定依自類表發哉答光法師第二釋意以餘處十六欲無無表離表而生之論文為本會當卷非必定依表業而發之論文也此釋意依加行根本表隨其所應發無表云也其中自然見道二種得戒定前加行表相續不斷乃至初盡智及見道初念發無表為言但於定中是微細寂靜位也麁動表業不可相續云難者未入聖前加行位起身表業結跏跌坐彼威儀不差至聖位故加行表業相續發無表也故泰法師餘處十六釋云衆賢論主不許此釋故云然彼五比丘先加行時必定有表端身正坐相續不斷入見道時發別解脫戒文次於今論餘處無漏異熟非之文者無漏心與表業無力用故雖表業相續不為隨轉因也次於今論餘處受生尸羅必依表故之文者光法師第二解意會此文作二釋云下論據顯且言受生不遮自然見道得戒具二依表或自然見道要期受生故受生類故亦名受生若作此解善順下文次無無表離表而生文文意顯也次於光法師後解同婆沙前師之釋者婆沙論前師意可許如羯磨受戒從身三表業亦發語無表如三歸受戒從語四表業亦發身無表之義故云後解同婆沙前師全無相違也何況光法師第二解以欲無無表離表而生之論文為本義故釋若作此解十種得戒皆依表發如自然見道亦從表業發得無表故同婆沙論百二十二前師意存欲無無表離表而生之義云有作是説此説第二剎那以後彼初剎那亦有表故之師義云事道理尤可然疑難頗無謂歟問光法師釋今論如是所得別解脫律儀非必定依表業而發文引下論欲無無表離表而生文會其相違作二解釋爾者第二釋意欲界無表必從表生歟進云光法師釋云若作此解善順下文無無表離表而生文付之依光法師解釋見今論餘處十六文引本論説述不動身不發語殺生誑語二罪所觸之旨若爾本論中既出欲界無表不從表生之類論主何定欲無無表離表而生致難哉答見今論餘處十六文引此本論説論主敘難云若不動身亦不發語欲無無表離表而生此二如何得成業道於如是難應設劬勞文正理論餘處四十二救此難云然彼先時決定有表餘亦應爾仙如前説布灑他時得妄語者謂不清淨許入僧中坐現威儀或有所説此謂先表餘例應思文光法師十六釋此文云仙如前説義等教他於加行時或由意憤身語必變或由呪詛必動身語若有身表從身表生若有語表從語表起此據加行必有表業非據根本故前論説義等教化布灑他時得誑語者謂不清淨詐入僧中坐現威儀從身表業發語無表或有所説從語表業發語無表此謂先表餘例應思言先表者或由先時有表相續不斷乃至發得無表如得善戒及布灑他等或雖根本無有表業先加行位必有表故如仙意憤及遣殺等文此釋意云仙人意憤根本成時雖無有表從加行表發生無表布灑他時隨其所應或從加行表或從根本表生無表故不背欲無無表離表而生之義為言故光法師結釋云正理論意欲界無表必依表生或於根本必有表業或於加行必有表業隨其所應於兩位中必有表故故説無表必依表生非要根本言定有表若不爾者遣使殺等根本成時即有何表耶若作斯解善順難詞欲無無表離表而生文任此等釋可會今疑也問光法師釋今論如是所得別解律儀非必定依表而發文引下論十六欲無無表離表而生文會其相違作二解釋爾者第二釋意遣使殺根本成時可有表耶答不可有表也兩方若有表者思遣使殺根本成時雖何釋意不可云有表是以光法師餘處十六述第二釋意遣使殺根本成時不可有表見若依之爾者光法師明初釋意云或可下文通據加行根本兩位必有表故故言欲無無表離表而生若不爾者遣使殺等根本成時有何表耶遣使殺根本成時無表之旨釋成果此初釋作第二釋明知第二釋意遣使殺根本成時可有表云事如何答遣使殺根本成時無表云事道理必然故第二釋意不可云有表也故見光法師解釋當卷云後解同正理論意文餘處十六述正理論意云正理論意欲界無表必依表生或於根本必有表業或於加行必有表業隨其所應於兩位中必有表故故説無表必依表生非要根本言定有表若不爾者遣使殺等根本成時即有何表耶文此釋意遣使殺根本成時無表云事甚分明也但於異初釋意作第二釋云難者見光法師解釋前後釋如是所得別解律儀非必定依表業而發之論文標謂初二種不從表生後二表生就自然得戒見道得戒不從表生引下論欲無無表離表而生之文設難故就此二種得戒作二解釋會上下論文也而初釋意云或可下文通據加行根本兩位必有表故故言欲無無表離表而生若不爾者遣使殺等根本成時有何表耶非言自然見道得戒根本無表必依表生故不相違據加行位有表會之第二釋意云此解意説自然見道謂彼先時決定有表相續不斷乃至聖位從彼表發無表律儀據加行位表相續至根本位會之也此二釋併就自然見道二種得戒論之也若就惡戒云之者此二釋意同仙人意憤及遣使殺據加行表云欲無無表離表而生得意也重意云於自然見道二種得戒或云據加行表或云據相續表可有二義勢故作此二釋也遣使殺根本成時無表云事何釋意共許極成道理故以之為例返若不爾者遣使殺等根本成時有何表耶也故光法師餘處述第二釋意之時云或雖根本之有表業先加行位必有表故如仙意憤及遣殺等文若爾於遣使殺等惡戒非作此二釋故異初釋意作第二釋故遣使殺根本成時可有表云疑不可來歟問正理論意仙人意憤成殺業道時可有表耶答不可有表也兩方若有表者見正理論餘處四十二文述仙人意憤義等教他而遣使殺根本成時無表於光法師解釋仙人意憤既例同之根本成時更不可有表哉若依之爾者正理論意存欲無無表離表而生之義若彼根本成時無有表者豈非欲無表而生哉答正理論意仙人意憤成殺業道之時無表可云也遣使殺根本成時無表云事光法師二釋意同可許之歟仙人意憤同之不可有表云事是炳然也但於正理論意存欲無無表離表而生之義云難者仙人意憤成殺業道之時根本究竟位雖無表加行位必有表故不可背欲無無表離表而生之義也重難云光法師作二解釋中云或可下文通據加行根本兩位必有表故故言欲無無表離表而生若不爾者遣使殺等根本成時有何表耶者初釋意也若依後釋意加行表相續不斷至根本時發無表見若爾依後釋意之時仙人意憤加行表相續至根本究竟成殺業道位發無表可云也如何答光法師二釋就自然得戒見道得戒論之也如彼仙人意憤遣使殺等加行時表相續難至根本究竟成殺業道位故據加行時表云欲無無表離表而生也故光法師餘處十六釋云或雖根本無有表業先加行位必有表故如仙意憤及遣殺等正理論意欲界無表必依表生或於根本必有表業或於加行必有表業隨其所應於兩位中必有表故故説無表必依表生非要根本言定有表若不爾者遣使殺等根本成時即有何表耶若作斯解善順難詞欲無無表離表而生文問正理論意自然得戒見道得戒根本成時表業可轉耶進云光法師釋乃至聖位從彼表發無表律儀彼根本成時表業轉云也付之依光法師今解釋披正理論餘處四十二文出自義云然彼先時決定有表述自然見道二種得戒依加行表發生無表之旨根本成時表業相續轉云事彼論中全所不見也光法師何得彼論意釋乃至聖位從彼表發無表律儀哉答今疑之趣甚似難思試回愚按云見正理論一段之文有餘師意明非必定依表業而發之義云非於欲界一切無表悉依表生如得果時五苾芻等得別解脫戒不善亦應然自義意存欲無無表離表而生之理云然彼先時決定有表之文意自然見道二種得戒先加行時決定有表彼加行表相續不斷至根本成時發生無表為言先時有表者還顯後時相續從彼生無表之義也故見光法師處處解釋當卷云然彼已下是正理論師意欲無無表離表而生然彼得果五苾芻等先時決定有表相續不斷乃至聖位從彼表發無表律儀文餘處十六云三述正解衆賢論主不許斯解故作是言然彼得果五苾芻等先加行時必定有表相續乃至得果入道依此表業發別解脫文加之寶法師云正理論師不許此義故云然彼五苾芻等先時決定有表相續不斷至得果時從彼而發文泰法師當卷云正理論師不許此釋故云然彼五比丘等先時決定有表相續不斷至得果時從而發別解脫律儀文餘處十六云衆賢論主不許此釋故云然彼五比丘先加行時必定有表端身正坐相續不斷入見道時發別解脫戒文思諸師一同之釋定有深意歟私云此事日來不審相存之處不慮之外感得貞禪大僧都撰俱舍論第十四卷文義要抄加一見中記録此疑畢云勸修寺三十講貞禪問惠海云云賢患意同歟尚可沈思之問光法師所引婆沙論百二十二中述成就現在身無表不成就現在身表義舉二師説爾者前師意別解脫戒初念不發身表義可有耶答不可有此義見兩方若有此義者見婆沙論文前師意述成就現在身無表不成就現在身表義云此説第二剎那以後彼初剎那必有表故文明知別解脫戒初念必發身表云事若依之爾者光法師作二釋畢云前解同婆沙後師後解同婆沙前師文而後解者非必定依自類表發之義也若爾前師同此解意何無別解脫戒初念不發身表之義哉答婆沙論前師意別解脫戒初念不發身表之義不可有也聊簡婆沙論一段之文上標若住別解脫律儀現無身表就自然得戒見道得戒論之也故就今二種得戒有此二説也所謂前師意自然得戒見道得戒先時有表相續乃至聖位從彼發無表為言云有作是説此説第二剎那以後彼初剎那必有表故即述此意也故光法師此解意説自然見道謂彼先時決定有表相續不斷乃至聖位從彼表發無表律儀云後解同婆沙前師釋尤有其作是説彼初剎那亦是所説即顯此意也故光法師非言自然見道得戒根本無表必依表生故不相違云前解同婆沙後師釋亦有其謂也但於後解者非必定依自類表發之義也前師同此解意何無別解脫戒初念不發身表之義哉云難者非必定依自類表發者身語表無表業雖顯互發之義此解意存欲無無表離表而生之義故別解脫戒初念不發身表之義不可有也如三歸受戒從語四表業發身無表必有敬師等身表故不可為成就現在身無表不成就現在身表之類故於三歸受戒者必有身表之旨不及異説也重難云此論義者去文永五年後正月比於當寺西室被行去年闕分俱舍論第十四五卷三十講之時宗成法師對快圓得業疑之其時講答云三歸受戒之時雖有敬師等身表正發近事戒依唱三歸語表故云非必定依自類表發也然而初念必有敬師等身表故不背欲無無表離表而生之義也云云聖禪僧都云婆沙論二説就自然得戒見道得戒論之也三歸受戒事隨此二説可得意替之旨甚不可然文問寶法師所引婆沙論百二十二中述成就現在身無表不成就現在身表義舉二師説爾者以何師説為正耶進云寶法師釋云此兩説中後説為正文付之依寶法師釋見婆沙論文雖舉二説無判正不寶法師有何深意判後説為正哉依之光法師引今此婆沙論二説釋然無評家如何答寶法師述後説為正之旨云入無心定時無表發故文即見次上釋解婆沙論文云在滅定中得戒者謂耶舍沙彌第三羯磨入滅定等又亦容是上法見諦得戒等也文此釋意云在滅盡定中得具足戒之時無表業故婆沙論後説別解脫律儀初念有成就現在身無表現無身表云義為正判也為言尋云見婆沙論文出住別解脫律儀現無身表之句有二説中述第二師義云及在定中得具足戒文寶法師何乍引此文云在滅定中得具戒故哉是以光法師如婆沙論現文引之如何答寶法師所覽婆沙論本云在滅定中得具戒故歟問寶法師所引婆沙論中述成就現在身無表不成就現在身表義舉二師説爾者第二師意與正理論然彼先時決定有表業同歟答兩方若同者婆沙論第二師説述非必定依表業而發之義正理論然彼先時決定有表文存欲無無表離表而生之旨彼此既各別也不可云其義同哉若依之爾者寶法師破有人義之時婆沙論第二師意可同正理論然彼先時決定有表之義見如何此論義者去承久三年窮冬下旬於當寺東南院被行俱舍論第十四五卷三十講之時藏圓對勝近疑之去文永六年正月下旬於當寺西室被行去年闕分俱舍論第十六七卷三十講之時番講義一番返問顯實對賢惠疑之問之旨趣未分明存知沈思之後可記答詞也俱舍論十四云如是所得別解脫律儀非必定依表業而發文寶十四云論如是所得至表業而發論主制上得戒非定依表發無表也婆沙一百二十二云若住別解脫律儀及住不律儀現無身表有二説一云第二剎那以後彼初剎那必有表故二云彼初剎那亦是所説有現無身表受不律儀故又滅定中得具戒故解云在滅定中得具戒者謂耶舍沙彌第三羯磨入滅定等又亦容是上法見諦得戒等也此兩説中後説為正入無心定時無表發故婆沙云若住別解脫律儀及住不律儀現無身表者此據現無身表依過去加行表發者亦得是現無身表不得定是欲界無表離表而發正理四十二云有餘師説非於欲界一切無表悉依表生如得果時五苾芻等準後師釋前必應云欲界無表定從表生正理通餘師引證云然彼先時決定有表準此論文正理斷取欲界無表定從表生若無根本從加行生然此兩説與婆沙不同婆沙云若住別解脫律儀現無身表一説據後剎那一説初容無有不説從加行生亦得是住律儀無身表業即不得是離表而生有人誤釋謂為同也此論中云如是所得別解脫律儀非必定依表業而發又論云七善業道若從受生必皆具表無表受生尸羅必依表故佛及五苾芻別解脫戒不從受生故不依表論主所存也故言非必定依表業而發正理論師不許此義故云然彼五苾芻等先時決定有表相續不斷至得果時從彼而發又論主亦言非欲界無表離表而生故知論主説佛及五苾芻得別解脫時身亦有表論師此釋前後自違待重撿文會釋不可一論自相矛楯文問論文云重説晝夜為半月等文爾者光法師意今此文通伏難歟進云光法師釋云因明戒時顯時非實文付之依光法師釋思論文起盡上云戒時邊際但有二種一壽命邊際二晝夜邊際畢下述重説晝夜為半月等文相無諍通戒時邊際但有二種者經中説半月一月等受近住戒耶云伏難云爾也何釋顯時非實哉是以寶法師釋此文云此通伏難文泰法師解此文云二會釋經重説晝夜文如何答今此文通伏難云事光法師意亦可許之也故光法師雖引真諦師意解云此通伏難伏難云若戒時邊際但有二種何故經中説半月等受八戒耶為通此難故今釋云經中雖説半月等戒日日須受八戒以受八戒唯有日夜邊際重説晝夜為半月等非是一受八戒經半月等故不違經更無破之明知光法師意可許此釋云事但於進釋者見次下論文云時名是何法謂諸行增語於四洲中光位暗位如其次第立晝夜名一段之中明時相故一義意作因明戒時顯時非實非如外道執時實有會釋經言重説晝夜所以經中説半月等無別有體云釋也然而光法師意既許通伏難云義故寶法師并泰法師釋全非相違也問光法師述經部宗意云許近住戒多日受得文爾者可有教證耶進云光法師釋云雖無教過此晝夜其戒得生不違理故文付之依光法師釋披今論現文云重説晝夜為半月等會經中説半月等受近住戒之文見是以寶法師釋此文云此通伏難難云若唯有二分齊何故經中云或半月或一月受近住戒通云重説晝夜為半月等者此説重重受日夜戒滿半月等名半月等非是一受經半月等也泰法師解此文述二會釋經重説晝夜所以經中説半月等如何答今論中明經部師答云過此戒生不違理故近住戒多日受得者不違理故云故無證文聞若有證文者何不出之哉故光法師釋雖無教證過此晝夜其戒得生不違理故尤叶今論文也泰法師受此文判過此戒生不違理故依其理無教證也其意亦同光法師釋但於今論重説晝夜為半月等之文者準前論義之答趣可會通之歟問論文云重説晝夜為半月等文爾者寶法師意如何釋之耶進云寶法師釋云此通伏難難云若唯有二分齊何故經中云或半月或一月受近住戒通云重説晝夜為半月等者此説重重受日夜戒滿半月等名半月等非是一受經半月等也文付之為叶寶法師釋廣勘契經所説未見半月等受近住戒之文是以論中述毗婆沙師義云曾無契經説過晝夜有別受得近住律儀光法師解經部答釋雖無教説過此晝夜其戒得生不違理故若契經中無此説者指何經文會重説晝夜為半月等哉答疑問之趣實似難思且試回愚推云契經中無説一受近住戒經半月一月等之文故論疏中述經無此文之旨也然而一經中亦有半月一月等受持近住戒見文歟論中指之會重説晝夜為半月等也問光法師釋齋與近住梵語同異作二解釋爾者初釋意如何釋之耶進云光法師釋云文既別説明知不同文付之梵語含多義於塢波婆沙梵語何不翻齋及近住哉是以光法師餘處十五釋婆沙論百二十二殺捃多蟻之文云此云折腳等蟻或云卵蟻名含二義文何況正理論三十六中近住律儀名塢波婆律娑儀光法師釋述準舊論十一文塢波婆娑亦翻為齋故舊論云若爾何別法名優波婆娑以正理舊俱舍兩論文思之於塢波婆娑梵語或翻近住或翻齋云事甚分明也加之見光法師餘處十五解釋云梵名塢波婆娑義翻為齊亦名近住文如何答光法師初釋意存漢名既別故梵語隨可異云道理釋文既別説明知不同也何況披諸論家説尋近住戒名舊俱舍論名優波婆娑戒正理論號塢波婆娑律儀故塢波婆娑者正翻近住不可翻齋云也故光法師釋云梵云塢波婆娑唐言近住文寶法師釋云梵云塢波婆娑唐言近住文但梵語含多義者自本所許也故光法師餘處引婆沙論殺捃多蟻之文釋此云折腳等蟻或云卵蟻全非所痛今釋意塢波婆娑梵語正翻近住云許也若存此意者塢波婆娑正翻為齋云論釋可聞譯者之謬更不可依用之也次於光法師餘處釋者是當卷作釋中且述第二釋意歟或又塢波婆娑翻齋雖非正翻可義翻故云爾歟義翻為齋之釋其意可思之問婆沙論中引契經説云我從今日乃至命終護生歸淨爾者有宗意稱護生歸淨言時得近事戒歟答稱護生歸淨言時不得近事義也兩方若稱護生歸淨言時得近事戒者光法師釋今論所引契經我從今時乃至命終捨生言故之文云餘經復據發戒已後要期自誓故更復言我從今時等文兩論所引是同經文也明知今經文得戒已後自誓之言云事若依之爾者婆沙論中釋此契經文云由此自誓離殺為依五種律儀亦俱時得文此文無諍稱護生歸歸淨言時得近事戒見如何答披今論定判思得戒時分受三歸後起殷淨心發誠諦語自稱我是塢波索迦願尊憶持慈悲護念之時可得近時律儀也故今論云起殷淨心發誠諦語自稱我是塢波索迦願尊憶持慈悲護念爾時即發近事律儀近事等言便發律儀故文光法師釋此文或云引大名經明發戒時至慈悲護念爾時即發近事律儀此即釋經顯發戒時文或云準此經文受三歸已猶未發戒要至慈悲護念方始發戒文寶法師釋此文云説三歸時未得戒自稱近事便發戒也文我從今日乃至命終護生歸淨者引餘經文也此文意述得近事戒之後要期自誓之言也非得戒時故光師法釋今論所引以經復説我從今時乃至命終捨生言故之經文云以餘經中受三歸稱近事等已復自誓言我從今時乃至命終捨生言故此經意説捨殺生等五種惡業略去殺等二字但説捨生即三歸等後復自誓言捨殺生等故於前受三歸等時已得五戒名為近事非但三歸即名近事應知前大名經中刻發戒時故但説言稱近事等餘經復據發戒已後要期自誓故更復言我從今時等文準今此解釋思婆沙論意前得三歸亦得律儀成近事者為令堅牢前所得五學處故後自誓我從今時乃至命終於其中間護生歸淨述由此自誓離殺為依五種律儀亦俱時得五學處中彼為勝故也重意云理實而言得三歸後起殷淨心發誠諦語自稱我是塢波索迦願尊憶持慈悲護念之時雖得近事律儀後自誓言我從今時乃至命終於其中間護生歸淨令堅牢前所得五學處故據此義邊亦云得五學處也故光法師釋彼雖已得近事律儀為令了知所應學處故復為説離殺等五種戒相令識堅持之論文云彼於先時由自誓故雖已得戒仍未了知戒相差別為令了知五戒學處故復為説離殺生等五種戒相令識堅持文重難云勘光法師解釋上云至慈悲護念爾時即發近事律儀起殷淨心發誠諦語自稱我是塢波索迦願尊憶持慈悲護念之時得近事律儀見而至下文云彼於先時由自誓故雖已得戒自誓之時得戒云事前後定判豈不相違哉答彼於前時由自誓故雖已得戒者指起殷淨心發誠諦語自稱我是塢波索迦之時歟非自誓言我從今時乃至命終於其中間護生歸淨之時者何為相違哉問依遣使得善無表義可有耶答可有此義也兩方若有此義者當論疏中廣雖述得善無表相全不明依遣使得善無表之旨以知無此義云事是以披正理論餘處四十二文云何緣遣離殺不得離殺戒文若依遣使得善無表者豈不得離殺戒哉若依之爾者依遣使既得惡無表依彼思之何不得善無表哉何況婆沙論中依遣使得善無表見如何答例遣使得善無表之義可有也故婆沙論百二十二云若住不律儀及住非律儀非不律儀以善語言遣他施等由此發得善身無表文此文意遣使施財寶等之時自得施無表云也但於正理論餘處文者彼具文云何緣遣離殺不得離殺戒但遣他殺生便得殺生罪此例非等非無殺思有遣他殺有無離殺思而遣他離殺義不同故又受持戒於自處強捨犯尸羅於他處勝故於犯戒有遣他犯名自犯若於持戒無遣他持名自持文問答意顯也重難云依遣使得殺無表及施無表者依遣使何不得離殺戒哉其差異難思也何況如彼法授尼豈非依遣使得離殺戒等哉答殺生罪及施行者若自作若教他所作究竟時得彼無表也離殺戒等以離惡義為先得彼無表也而設雖遣使令他得離殺戒等於自身無離殺思故依遣使不得離殺戒等也正理論餘處四十二中以多所以釋其差異大意在之次法授尼得戒自僧衆中遣使轉令彼尼得戒也全非依法授尼遣使自得戒故更異乞疑之趣歟問異生離欲界煩惱最後解脫道位不得根本地攝定共戒類可有耶答不可有此類也兩方若有此類者以道理思之更不可有此類哉若依之爾者見婆沙論十七文出得定俱有戒不得道俱有戒之句中云謂諸異生離欲染最後解脫道不置一切之言離初靜慮染離第二靜慮染云一切最後解脫道同置一切之言爰知離欲界染最後解脫道位不必得根本地攝定共戒云事如何答離下地縛必得上故者性相之所定故異生離欲界煩惱最後解脫道位必可得初靜慮根本地攝定共戒也但於婆沙論文者聊簡彼一段文云異生離初二靜慮煩惱之時以自地根本地為加行道得定共戒以上地近分地為加行道不得定共戒於加行道有此不同故不云一切最後解脫道位或起近分地道或入根本地道皆得定共戒無其濫故云一切也離欲界煩惱加行道位必不得定共戒無其濫故對何道於最後解脫道可置一切之言哉故不云一切最後解脫道也離第三靜慮煩惱最後解脫道位必起第四靜慮根本地道難得定共戒無其所對有相濫道故亦不云一切最後解脫道也問光法師意阿羅漢果聖者非自然得戒引何論何文證之耶進云光法師引婆沙論百十七有阿羅漢以下品心起有表業受諸律儀之文證之也付之此文全不見阿羅漢果聖者初起加行心得具足戒是則未證阿羅漢果之前起下品加行心證果之時自然得戒云也是以見今論餘處二十三文述阿羅漢果聖者相云法爾自得苾芻形相云云此豈非自然得戒哉答見婆沙論文云有阿羅漢以下品心起有表業受諸律儀證阿羅漢果之後初起下品加行心起有表業之旨炳然也故光法師引此文證以準此文羅漢非自然得戒尤有其謂哉但於今論餘處文云至第七有逢無佛法時彼在居家得阿羅漢果既得果已必不住家法爾自得苾芻戒相明七返受生聖者逢無佛世證阿羅漢果相故更非自然得戒義也何況光法師釋此文云剃髮染衣不言得戒十種得戒中不言得阿羅漢時而得戒故文任此釋雖證阿羅漢果不得具足戒故可自然得戒云疑旁所背文理哉問以預流向聖者可為所歸依體耶進云論疏中為所歸依體也付之見道十五心其位速疾無有教誡有情之義何可為所歸依體哉依之以菩薩學位不為所歸依體相例可同如何答預流向聖者是聲聞僧有理和義故立僧寶為所歸依體也故今論云歸依僧者謂通歸依諸能成僧學無學法由得彼故僧成八種補特伽羅不可破故文光法師釋此文云歸依僧者謂通歸依諸能成僧學與無學二無漏法由得彼法故僧成四向四果八種補特伽羅由得證淨理和合僧不可破故文泰法師釋此文云歸依僧者謂通歸依諸能成僧學無學法由得彼故僧成四果四向八種不可破壞理和僧也文加之正理論三十八云歸依僧者謂通歸依四有為沙門果及四果能趣向文顯宗論説全亦同之任此等定判以預流向聖者為所歸依體云事炳然也但於見道十五心其位速疾無有教誡有情之義云難者建立僧寶由理和合義不由教誡有情之義故全非相違次於菩薩學位例難者菩薩專以濟度利生為其意樂學位無此義故不為所歸依體也故光法師所引正理論三十八云菩薩學位不起期心故亦無能教誡他義文顯宗説全亦同之問有宗意以佛生身可為所歸依體耶進云不為所歸依體也付之惡心出血損佛生身成無間罪何不以彼生身為所歸依體哉若唯以無學法為佛體者佛住世俗心之時可非佛歟如何答有宗意以成佛盡智等無學法為所歸依體不取生身為所歸依體也故今論云歸依佛者謂但歸依能成佛無學法由彼勝故身得佛名或由得彼法佛能覺一切何等名為佛無學法謂盡智等及彼隨行非色等身前後等故文正理論三十八云謂盡智等及彼眷屬由得彼法能覺一切以彼勝故身得佛名非色等身前後等故文顯宗論二十説全亦同之婆沙論三十四云謂或有謂歸依佛者歸依如來頭頂腹背及手足等所合成身今顯此身父母生長是有漏法非所歸依所歸依者謂佛無學成菩提法即是法身文任此等論文以佛生身不為所歸依體之旨炳然也但於損佛生身成無間罪云難者今論中釋此疑云毗婆沙者作是釋言壞彼所依彼隨壞故文光法師釋此文云壞彼無學所依生身彼無學法亦隨壞故故損生身成無間罪文正理婆沙兩論之中會通之旨亦以同之次於佛住世俗心之時可非佛歟云難者正理論中會此難云此難不然非所許故謂我不許學無學法唯現在位方成佛僧唯言佛僧得彼法故得於諸位曾無間斷寧住世俗心便非僧非佛設許現在方成佛僧亦無有過以許彼得其體亦是學無學故得一切時常現前故文文意顯也今論意述佛生身為所歸依體之旨正理論中不許此義難答之文甚廣可見之問以獨覺可為所歸依體耶進云光法師所引正理論云非所歸依文付之聲聞既為所歸依獨覺何不爾哉答聲聞有理事和合義成僧衆故彼身中學無學法為所歸依體也故今論云歸依僧者謂通歸依諸能成僧學無學法由得彼故僧成八種補特伽羅不可破故文獨覺無有理事和合義非僧衆故不為所歸依體也加之正理論三十八云謂諸獨覺不能説法教誡諸有情令離生死怖菩薩學位不起期心故亦無能教誡他義故彼身中學無學法不能救護非所歸依有餘師言不和合故不顯了故如其次第獨覺菩薩非所歸依文文意顯也顯宗論二十説全亦同之問今論意能歸依法以何為體耶進云今論云語表為體文付之見婆沙論文述評家義云應作是説是身語業及能起彼心心所法并諸隨行如是善五蘊是能歸依體文若爾今論意何違婆沙論評家義哉答光法師釋今論語表為體之文云此據自性語表為體若并眷屬五蘊為體故正理三十八云此中能歸語表為體自立誓限為自性故若并眷屬五蘊為體以能歸依所有言説由心等起非離於心文但於違婆沙論評家義云難者光法師解今此相違作二釋云論者意異隨樂説故非以婆沙評家為量無勞會釋又解世親論主故述婆沙不正義試後學徒為覺不覺衆賢尊者不覺斯文還依此釋若依正解同婆沙評家文任此二釋意可思之也重難云就第二釋不可然今論意同婆沙論評家義者今論中何不舉此義哉論中舉非所存不正義不載自實義事有其例證哉答問寶法師意正理論文論能歸依體婆沙論五説中可同第二師説耶進云寶法師釋云正理不同婆沙諸師文付之依寶法師釋勘兩論所説正理論云此中能歸語表為體婆沙論三十四第二師述有説是語業若爾正理論文既同婆沙論第二師説寶法師何釋正理不同婆沙諸師哉是以光法師意判此俱舍等當婆沙第二師不正義此釋專順兩論所説哉答寶法師正理不同婆沙諸師之釋意正理論意不同婆沙論第二證為言其故正理論三十八云此中能歸語表為體自立誓限為自性故若并眷屬五蘊為體以能歸依所有言説由心等起非離於心不限語表兼取能發心等為能歸依體見婆沙論第二師云有説是語業同今論云語表為體唯以語表為能歸依體不取能發心等故寶法師引正理婆沙兩論文畢任文相顯且釋俱舍同第二師正理不同婆沙諸師諸師中無取語業及心等為體者也但任現文顯雖一往如此釋理實而言正理論意不可違婆沙論第二師説婆沙論第二師意唯舉語業據自性體正理論文兼取心等出眷屬體故也出自性體論眷屬體豈可為別義哉故寶法師釋云俱舍據顯略不説心等正理具述兼明心等若謂意別令有是非更無是非大意是同據義別也光法師釋此俱舍等當婆沙第二師不正義亦探其實義云爾也問欲界經生聖者可發癡所生語業耶進云光法師所引婆沙論云經生聖者雖不犯從癡所生文付之欲界經生聖者未斷修所斷無明何不發癡所生語業哉何況欲界經生聖者發貪瞋所生語業相例可同如何答光法師所引婆沙論中釋五學處中唯立離虛誑語不立離離間語等餘三云有餘復説若諸聖者經生不犯立近事戒聖者經生必定遠離虛誑語業非餘語業所以者何餘語有三謂從貪瞋癡生經生聖者雖不犯從癡所生癡見品攝故聖者已斷而犯貪瞋所生是故不立文此文意云獨頭無明是見所斷經生聖者已斷之故不犯從癡所生語業云也但於欲界經生聖者未斷修所斷無明云難者修所斷無明隨他力起非自力起故不云修所斷無明發語業也重意云修所斷無明或與貪等本惑相應而起或與忿等隨惑相應而起故云貪等乃至忿等所發語業不云癡所生語業也貪瞋二惑是自力起故欲界經生聖者發貪瞋所生語業云例難自被會通畢寫本云文永十一年甲戌極月二十三日未時於東大寺尊勝院西面學窗抄之畢去七月二十一日始此卷抄今日所終其功也暮秋之候參篭大神宮大般若之轉讀結願卷莚初冬之比寄宿海印寺千手堂之修造土木果營加之或登大原山尋紅葉梢拜見來迎勝林兩院幽間之古砌或回睿嶽麓主青木里戀慕曾祖寂超多年栖息之舊迹意催萬感淚潤雙袖是則老後之遊覽也豈非生前之思出哉然間暫閣稽古知新鑽仰之志久疲經行林中斗藪之路仍記録文義之勤稍雖中絶當卷明思之抄終令結集春日大明神納受此願彌勒大聖尊知見此誠羊僧一期終焉之暮施引攝於內院之秋雲龍華三會説法之曉開慧解於唯心之春風殊別二親九族早離有為世之苦域師無上道之巨益乃至六趣四生三途八難有頂無間鐵圍沙界利益等布濟度普及而已右筆華嚴宗末葉權僧正宗性年齡七十三夏臘六十一
