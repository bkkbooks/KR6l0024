body:
  text: 俱舍論第二十六卷抄下問今論中釋有貪心離貪心有三師説見爾者論主意以何師義為所存耶進云光法師釋云論主第三正解今評經意貪相應故名有貪心貪不相應名離貪心文付之破今論文云是故應許餘師所説為貪所繫名有貪心文此文無諍評取貪所繫名有貪心義見是以婆沙論評家意存貪所繫名有貪對治名離貪心義今論意豈可背評家義哉況貪不相應故名離心者嗔等相應心可名離貪心若爾爭可遁若貪不相應名離貪心者餘惑相應者應得離貪名之餘師難破哉如何答見今論一段前後文初舉貪相應名有貪心貪對治名離貪心云師義破若爾有心非貪對治不染汚性應許此心非有貪心離貪心等次就貪所繫名有貪心云師義加然他心智不染緣貪得亦不可説緣緣心貪寧知他心是有貪等故非貪繫名有貪心之難破畢終述今評經意貪相應故名有貪心貪不相應名離貪等以貪相應名有貪心貪不相應名離貪心云義為論主所存云事一段前後論文實以分明也故光法師釋今評經意至名離貪等者論主第三正解今評經意貪相應故名有貪心貪不相應名離貪心尤叶論意哉但於是故應許餘師所説為貪所繫名有貪心之論文者此師是婆沙正義故皆順婆沙權雖許此義終以第三師為所存也故光法師釋此文云論主此文權難第一立第二師至後文中第二亦破文次於婆沙評家意存貪所繫名有貪心之義今論意何可背評家義哉云難者論主意以理為正非必以婆沙評家為定量也故光法師釋此疑云論主以理為正非以婆沙評家為量初師釋經攝心不盡第二師不得經意故今論主以此文為正文次於此師如何可通如貪不相應名離貪者餘惑相應者應得離貪名云餘師難破哉云難者此師意貪不相應名離貪心之因以餘惑相應心名離貪心更非所痛雖然以彼屬有瞋心有癡心等故且不名離貪心也故論中釋此難云若依此意許亦無違然不説為離貪心者彼屬有瞋有癡等故文重難云論主意會離貪嗔癡心不還墮三有之經文云依離得説故無有失文光法師釋文云論主通經依離三界煩惱得説故言不墮三有受生非唯無漏體不通彼三有所攝彼離得不還墮三有名離貪等我據貪不相應名離貪等各據一義故無有失文任此論文解釋以今經文雖會成不遮離貪心通有漏之義更不云以貪不相應名離貪心若爾貪不相應名離貪心云事偏是論主自義違經文歟設雖論主爭背經文可被成自義哉就中各據一義故無有失之釋有疑離貪嗔癡心不還墮三有者是經文貪不相應名離貪心者是論主自義也何以自義對經文可釋各據一義哉是一次乍成貪不相應名離貪心之義餘惑相應心屬有嗔心等故不名離貪心云事不明凡論主心攝不尤付一對中可論也何依可屬餘對有嗔心等此對之時乍有貪不相應之義可云不名離貪心哉是二答論主意貪相應心名有貪心之時若為順離貪嗔癡心不遂墮三有之經文云對治貪心名離貪心者亦可如初師説豈可道攝心不盡之過哉若又為道攝心不盡之過云貪所繫名有貪心者亦可如第二師説更不可道論文所舉重重難破故探經正意之時貪相應名有貪相心貪不相應名離貪心之義當其實義依之論主探經正意所存此義也已貪不相應名離貪心是經正意故對不遂墮三有之經文釋各據一義故亦無失全無所背也次於餘惑相應心乍有貪不相應義不名離貪心不可然云難者凡見十一對心有貪心等十一種皆是染汚品離貪心等十一種皆是染汚品離貪心等十一種多分是善品少分攝無記雖法師説不同全離貪心等十一種無攝染汚故論主意以貪不相應名離貪心也同義分所當以餘惑相應心名離貪心雖許無違已染汚而餘對之時名有嗔心等故不名離貪心云也問他心智所知法悉以業為因歟答悉以業為因也兩方若悉以業為因者他心智所知法非一準何悉以業可為因哉是以品類足論中出非業為因法能知智舉十智明知他心智所知法中有以業不為因之類云事若依之爾者他心智唯知心心所法而心心所法中更不可有非業為因之類哉如何答他心智所知法者是心心所法也而諸心心所中除初無漏心相應品之外所餘有漏無漏諸心心所法皆自同類因生故皆悉以思業為同類因隨應可在之就初無漏心相應品中除思業餘心心所法以思業為相應因以思業並隨轉身語業為俱有因思心所以隨心轉身語業為俱有因故諸有漏心心所中一法不有以業不為因也若爾他心智所知法悉以業可為因云事道理必然也但於品類足論文者彼論中以初無漏思非業為因法中出之故云非業為因法十智知歟然彼論中以初無漏思非業為因法中出之者且就本論一段之文可了簡也所謂見本論文出業法云謂身語業及思述業為所緣法云謂三識身及相應法準此等文業法中廣取身語二業云事尤分明也而業俱有法並隨業轉法中同置除思之言無取思業以之思之廣論業法之時雖亘三業思是業之本故以思為業伴之門大忌之故業俱有法並隨業轉法中不取思也以之準知業為因法中又不取思也云業為因法之時自法體業不釋以業為因云故其體是業之伴聞故以初無漏思暫云非業為因法也就中已業俱有法中無取思即以思非業俱有法定而俱有法定而俱有因之習有俱有法不為俱有因無非俱有法為俱有因取今論餘處文云諸由俱有因故成因彼必俱有或有俱有非由俱有因故成因文若爾乍云思是非業俱有法如何亦可云思以業為有因哉依此義勢品類足論中暫以初無漏思為非業為因法也雖然以實論之時彼論意已業法亘三業故初無漏思以隨心轉身語業為俱有因之邊更不遮之也問今論文云一實自相為所緣境文爾者今此自相者為唯限有漏他心智為當可通無漏他心智耶答若依光法師意可通漏無漏他心智如依寶法師意作或云通漏無漏他心智或云唯限有漏之二釋也兩方若唯限有漏他心智者見今論文上標諸他心智有決定相廣舉漏無漏他心智畢下述一實自相為所緣境更不可云限有漏他心智哉若依之爾者無漏他智作道等四行相更不作自相行相明知今文所舉自相者唯可限有漏他心智云事如何答若依光法師意並寶法師初釋意一實自相為所緣境者今此自相之言漏無漏二種他心智俱可説之也故光法師釋云自相簡共相以不知共相故如識了別名自相等無漏他心智雖作共相別觀一法不觀多法故亦名自相文寶法師初釋云自相簡共相不緣共相故無漏他心智雖作四行唯緣一法文依此等解釋見今論文起盡上云諸他心智為決定相廣標置漏無漏他心智下述一實自相為所緣境通説漏無漏他心智云事尤分明者哉加之見正理論文七十三云如觀一受體是非常法智生時以共相行相觀一實自相為境極成如是寧不許無漏他心智以共相行相緣一實自相謂知他心是真道等即緣一實是道等相文無漏他心智緣自相為境云事此文又分明也何況婆沙論百云評曰一切他心智一剎那頃但緣一法唯緣實物唯觀自相唯觀現在文依此等文一實自相者通漏無漏他心智釋尤有其謂哉但於無漏他心智作道等四行相云難者雖作道樂行相唯緣一法為其境故以之名自相也雖作共相別觀多法故亦名自相也光法師解釋此意也次依寶法師第二釋意者一實自相者今自相之言唯説有漏他心智也故彼第二釋云或可唯説有漏文此釋意無漏他心智唯作道等四行相故是共相非自相今文自相之言何可説無漏他心智哉故唯限有漏存也但於今論文標句云諸他心智下述一實自相尤可亘漏無漏云難者今文廣明漏無漏他心智決定相故標句廣雖舉漏無漏他心智下所列出之決定相中隨應有通二他心智之句又有限一種之句不可云必每句通二他心智也故今自相者唯可限有漏他心智也仍非相違矣重難云先就光法師解釋並寶法師初釋有疑無漏他心智以道等四行相一一別觀心心所之時設雖觀一法於其道如等理者更無失通諸道諦之謂若爾亦是可云共相別觀何忽可立自相稱哉抑雖為實共相依觀一法之邊強名自相其所詮如何若云為顯唯觀一法之義強名自相者云一實自相之時一一言已顯觀一法之義畢重云自相明無其所詮哉是一是以見今論文述諸智行相之時偈頌云他心智無漏唯四謂緣道屬自相緣俱但緣一事長行云他心智中為無漏者唯有緣道四種行相由此有是道智攝故若有漏者取自所緣心心所法自相境故如境自相行相亦爾故此非前十六所攝如是二種於一切時一念但緣一事為境文此文起盡明無漏作共相有漏作自相如是於行相者漏無漏雖自共異所緣境者俱但緣一事為言漏無漏行相俱自相者何唯有漏云自相又於行相漏無漏俱自相者至所緣之處獨不可置俱言簡別明知無漏行相非自相云事若爾至下結束之時云一實自相為所緣境此自相言更不可云關無漏哉是二次寶法師第二釋又不明論文已上標諸他心智下無簡別云一實自相何向此文可云限有漏哉是一次正理論如是寧不許無漏他心智以共相行相緣一實自相之文如何可消之哉是二答光法師解釋並寶法師初釋意其旨前重委成之畢但於以道等行相別觀一法者只可云共相別觀何忽可名自相哉乍實為共相行相強立自相稱有何所詮哉云難者凡為無漏心唯別觀一法是他心智不共之義相也而顯此智不共一法別觀義之時猶云行相是共相者頗可濫多法通觀之義故對依一法別觀之義門強立自相名也就中漏無漏雖異他心智是一相之廢立也豈可云有漏自相無漏共相哉次於今論偈頌長行之文者出漏無漏他心智所作相行差別之時無漏他心智作緣道四行相有漏他心智隨所緣境各各自相作如境自相之行相云也此則出二他心智所作行相各各相貌也全非論二他心智所作行相自相共相門之時致無漏共相有漏自相之簡別也論彼自相共相門之時至下束漏無漏云一實自相是此意也故上云有漏自相緣下云一實自相其趣異故論文有其通局也若爾上句已出二他心智各各行相差別故對之下句云俱但緣一事俱言簡別又無相違也次寶法師第二釋意且任無漏自相行相之道理且依有漏自相緣等之論文自相者但限有漏釋也但於無簡別述一實自相故可含漏無漏云難者凡上雖標諸他心智下諸句一一非亘二他心智所謂如欲色界繫之言唯關有漏他心智及非所繫之言偏限漏無漏他心智也若爾自相之言何必可云通漏無漏哉次於正理論文者第二釋意正理論之外哉向今論文作別釋歟問除他心智餘無漏心中可有唯緣一法類耶答不可有唯緣一法類也兩方若有唯緣一法類者除他心智餘無漏心中難有唯緣一法類哉是以於他心智述決定相之時雖云一實自相為所緣境於餘無漏智全無諸此義哉若依之爾者婆沙論百六十七中明於他心智攝道智少分云於緣心心所法中有緣一法有緣多法此唯攝緣一法於緣一法中有是他心智有非他心智此唯攝他心智文如此文者除他心智餘無漏心中可有唯緣一法類釋如何答無漏心中於現在境唯別緣一法是他心智不共之義相也除他心智之外有何無漏心可有唯緣一法之類哉凡於他心智立自相名專依唯緣一法之義若爾無漏心中有唯緣一法類者於作共相行相無漏他心智獨立自相稱有何由哉爰知餘無漏心中無唯緣一法之類云事但於婆沙論於緣一法中有是他心智有非他心智之文者上述於他心智攝義道智少分云緣一法中有是他心智有非他心智此唯攝他心智文乘此言便下述道智之時亦如是云也實緣一法道智中不可有非他心智類也例如婆沙論中上出有學八支捨緣之中舉得果捨故乘此言便下出十無學支捨緣之中學得果捨也問盡無生智不作空非我二行相故如何釋之耶進云今論中後得智中作我生已盡等行相故相故盡無生智離空非我行相云也付之盡無生智究竟圓滿果德也何不作空非我行相哉何況設後得智中雖作我生已盡等行相前觀內盡無生智作空非我行相可有何障礙哉觀內出觀時分已異故也加之空非我我所離是實我生已盡者是假我也假實已異也彌不可有妨礙哉是以考智論文云法智類智世俗智苦智盡智無生智無常想苦想無我想相應文如此文者盡無生智作無我行相見如何答我生已盡等四行相者作其行相正雖後得智所作其我生已盡等四義正盡無生智法體上具之故淨影大師釋云大乘義章四智義羅漢辟支所得四智有體有相無學聖慧是其體也盡無生智是無學慧正説此慧為四智體後出觀已世俗心中自緣向前所得聖慧生其四智相彼四智體具足四義而無四緣彼四智相具足四緣而無四義文若爾盡無生智既自體上具我生已盡等義而又作空非我行相者忽可相違故所不作空非我行相也是以今論云由此二智雖勝義攝而涉於世俗故離空非我謂由彼力於出觀時作如是言我生已盡梵行已立所作已辨不受後有文光法師釋此文云由此二智雖勝義攝而涉於世俗我生已盡等故在觀內離空非我此即前因涉於後果謂由觀內盡無生力於出觀時後得智中作如是言我生已盡等故在觀內離空非我以空非我違於我故文但於盡無生智圓滿果德也尤可作空非我行相哉云難者設雖圓滿果德若作空非我者可違我生已盡故不作之也必不可依圓滿果德次於觀內出觀時別故設出觀之時雖作我生已盡行相何觀內不作空非我行相哉云難者作我生已盡行相雖出觀時我生已盡之義即盡無生智體上具之故自體忽不作空非我行相也次於空非我之所離實我我生已盡假我故更不可有妨礙云難者雖假實異我名言已通故自乍具我生已盡之義忽難作無我行相此則於自餘無漏心者更不具我生已盡之義盡無生智獨具此義是秀其餘之德相也若不依我生已盡之義猶作空非我行相者還似無我生已盡之德豈非遍修因行所求之果德哉故為表不共果德殊更不可作空非我行相也次於智論文者僧侃法師釋此文問前云盡無生智不得與空三昧相應此中何故得與無我想相應答此問云此總舉六智與三想相應若據別説不與無我想相應又解云若就性不與無我想相應若就位彼與無我想相應以盡生中有無學等見智故文任此釋可會也尋云出觀後作我生已盡解事唯為限初起位為當復後位現起之位必作此行相歟答問不受後有者限非想有歟答不可限非想有也兩方若限非想有者見光法師所引婆沙論文雖述不受後有者尊者妙音作如是説諸阿羅漢皆無後有故通説為不受後有更不云限非想有哉若依之爾者同婆沙論中我生已盡者限非想生判例可同哉如何答凡案我生已盡等四行相我生已盡者雖限非想生於餘三行相者不可云限非想能治梵行非想諸行滅非想後有也所以然者我生已盡者盡生死之集因之義也而有學位雖盡下八地煩惱未能盡非想地惑障斷盡有類煩惱獨限無學位故至無學位有我生已盡義者盡下地集因也有學位有其功明知今我生已盡者專依盡有於集因也故我生已盡者限有頂生云也次不受後有者永不受後生死果報之義也而有學位雖斷下八地惑於所潤生不得非擇滅也至退所斷惑還有可受下地生之義證無學果之時於有頂以下諸生永不可受之義言故於不受後有義者不限非想有也若爾我生已盡者限非想地生云例難更不可來也次梵行已立者盡智位不限非想地對治修三界見修二惑對治修三界見修二惑對治道故又不限有頂能治梵行也次所作已辨者又盡智位重得三界見修無為故不限非想諸行滅也是以見婆沙論文廣釋我生已盡等四行相之時述我生已盡云或有生名顯非想非非想處四蘊者如此中説我生已盡偏限非想生之旨成之次述梵行已立云梵行已立者謂無漏行已立問為學梵行已立為無學梵行已立耶答學梵行已立非無學梵行所以者何無學梵行今始立故無簡別雖述取學梵行之旨全不云限非想梵行次述所作已辨云所作已辨者一切煩惱皆已斷故一切所作已究竟故一切道路已遮塞故後次法界超生老死皆畢竟盡故名所作辨廣取所作已辨之旨分明也次述不受後有云不受後有者顯無生智尊者妙音作如是説諸阿羅漢皆無後有故通説為不受後有不説無生智為不受後有故不相違文雖舉云顯無生智云通諸羅漢之二説全不受後有者限有頂有也任此婆沙論文我生已盡者限有頂生自餘三行相限有頂云事分明歟問盡智無生智俱具我生已盡等四行相歟答俱可具四行相也兩方若俱具四行相者婆沙百二論中雖舉或云我生已盡是盡智餘三是無生智或云初二是盡智後二是無生智或云初三是盡智不受後有是無生智三師異説無出四行相俱亘二智云義明知非二智俱具四行相云事若依之爾者見今論文云由此二智雖勝義攝而涉於世俗故離空非我謂由彼力於出觀時作如是言我生已盡梵行已立所作已辨不受後有文如此文者二智俱具四行相釋如何答我生已盡等四行相其義無違盡無生二智尤二智俱可具四行相也是以今論文如一方疑難光法師釋此文云由此二智雖勝義攝而涉於世俗我生已盡等故在觀內離空非我此即前因涉於後果謂由觀內盡無生力於出觀時後歸得智中作如是言我生已盡等故在觀內離空非我文此等論判解釋盡智無生智俱具四行相云事分明也就中光法師解釋中廣引婆沙論一百二卷文之時本文於不受後有出或云願無生智或云通説一切阿羅漢之二師説而解釋中唯引通説一切羅漢云尊者妙智説此則於前三行相者婆沙論中二智通局不見故不及簡別也於不受後有者判二智通局也二智之説中順今論故偏引之見次婆沙論中答我生已盡乃至不受後有一一當言是何智觀之問答或云我生已盡是盡智後三是無生智或云初二是盡智後二是無生智或云初三是盡智不受後有是無生智乃至或已我生已盡是集智梵行已立是道智所作已辨是滅智不受後有是苦智等如云多異説此中先舉三師以四行相望二智隨其所應配釋之無四行相俱通二智次以四行相配釋四行相配釋四諦智之師意四諦智皆亘盡無生智若爾四行相無偏頗可通盡無生如先師不可偏判屬存也而解釋中唯引配釋四諦智之所此則此師順今論故也若爾光法師意存四行相俱亘二智之旨云事頗分明者也寶法師引婆沙論一段文全同光法師所引加之見正理論文或云盡無生智除空非我各具有餘十四行相由與出觀心轉相違故在觀中無二行相謂從二智出觀後時必自了知我生盡等此中意説盡無生智雖是勝義而涉世俗我生盡等是世俗故空非我是勝義必涉勝義此觀後決定知空非我故由此二智離空非我文或云本意樂力令此二智後必引生我生盡等非由觀內此行相轉令於後時起此行相我生行相觀內雖無而由不愚自證解脫義言此位必已應背我生盡等行相勢分先時世俗行相故離十四無盡三生此等正理論文盡無生智俱具四行相云事太炳然也加之見淨影大師解釋或云大乘義章十九四智義若依毗曇盡智之中別具四智無生智亦爾文或云同十七賢聖義一念盡智能盡集因名我生盡道行成滿名梵行立證滅窮極名所作辨永捨當苦名不受後無生智中義別亦爾文此釋文明鏡也何況攬婆沙抄釋云盡無生智皆作我生已盡不受後有所作已辨梵行已立四種行相而差別者無生智行相中我生已盡不後受盡乃至梵行已立不後更立無生智行相也文此釋又分明也但於婆沙論中雖舉三師異説無四行相俱亘二智云義云難者已婆沙論中舉以四行相配分四諦智之義是豈非四行相俱通盡無生智云説哉疑難頗不得文意歟但先三師非必相違師歟是暫隨義分相順致一性配釋許也以實論之時不可遮四行相俱亘二智義也重難云婆沙論百二云不受後有者顯無生智文此文明不受後有不通盡智釋是一加之釋光法師所引正理論文問何緣論説無生智中復作是言我已知苦等理但應説不後受知等二行不應俱時轉故若次第轉前與盡智無差別故不應重説答此問難云應知此説意為遣疑恐有生疑如時解脫先起盡智後得無生如是應故不時解脫先起無生後得盡知為顯一切盡智先起故復先説已知等言或先但言我已知等顯時解脫唯有盡智後又重言我已知等顯不時解脫盡智後起無生故雖重言而無有失文任此論文我已知苦等四行相偏限盡智不後受知等是無生智行相見以之思之我生已盡等四行相是當我已知苦等四行相若爾無生智如何可具之哉是二答婆沙論不受後有者顯無生智者一師義也是又一性依義分相順暫顯無生智也非盡理談歟次於正理論文者總而云之時不應受知等者我已知苦等之解一具行相也必我已知苦等之後不知復更等云義也可立故也故總麁論之時不問我已知苦等不復更知之別皆束可云我已知等行相此上細論之時分二重行相差別分也準之思之就我生已盡等行相又可有二重起盡如正理論今可答任細論門者可我生已盡等是盡智行相不復更盡等無生智行相也更不可雜亂若依總相麁論門者我生已盡之言含不復更盡之義總云我生已盡也今論等無生智具我生已盡等者依此門也若爾正理論今論等據一門無相違歟尋云我生已盡等四行相之上有不復更盡等行相歟答我已知苦等解之上更有不復更知等之解準之我生已盡等行相之上何無不復更盡之行相哉故婆沙抄釋此事云無生智行相中我生已盡不復更盡乃至梵行已立不復更立文此釋分明分之也但於不受後有者不簡鈍利一切阿羅漢皆不受後有故更不可有不復更受行相歟於婆沙抄乃至之言者隨其所應可得心也問西方師意十六行相外有餘無漏行相云義引何論文證之耶進云引識身足論中述不繫心了別欲界不繫法出非常等八行相外説有是處有是事言之文證之也付之見識身足論上下起盡上舉八行相下説有是處有是事之言是顯上八行相稱合道理之旨也全非出別行相何以此文可證今義哉依之薩婆多宗意存有是處有是事者結上八行相之旨西方師所釋有何深意哉答西方師意引識身足論文證十六行相之外有餘無漏行相云義非無其謂所謂見識身足論文問頗有不繫心能了別欲界繫法耶答之云四能了別謂非常故苦故空故非我故因故集故生故緣故有是處有是事如理所引了別文此文上舉非常等八行相畢下別云有是處有是事明知八行相外出別行相云事故今論中外國師引此本論文證十六行相外有無漏行相云義也但於有是處有是事者結上八行相之言也更非出別行相云難者此言若可結上者於餘處皆可説有是處有是事言而述釋所斷心了別欲界繫法雖舉我我所斷常無因無作損減尊勝上第一能清淨能解脫能出離惑疑猶預貪嗔慢癡之二十一行相結文無置有是處有是事言若此言必可結上者何於今處不置有是處有是事之結言哉明知此言是出別行相非結言云事是以今論中破此言是結文云迦濕彌羅國師義云此釋不然餘不説故謂若彼論依此意説應於餘處亦説此言然彼餘文但作是説頗有見斷心能了別欲界繫法耶四能了別謂我故我所故乃至慢故癡故不如理所引了別此等亦應説有是處言既無此言故釋非理文文意顯也重難云見所斷心了別欲界繫法之我我所等行相皆是非理之執見也何可置有是處有是事之結言哉若爾以此處無結言不繫心了別欲界繫法之時有是處等之言非結文云了簡太不可然哉答舉如理之行相之時可置有是處等結言者下如理所引了別之結文上行相如理之義畢何更可用有是處等之結言哉同義勢二度結之豈非太無用哉問今論中引本論文云惑故疑故猶預故文光法師釋此文作三解釋爾者第二解意如何釋之耶進云光法師第二釋云又解惑是欲界疑是色界猶豫是無色界文付之見今論所引本論文上問頗有見斷心能了別欲界繫法耶答之曰能了別出其行相之中云惑故疑故猶豫故文定可出見斷心了別欲界繫法也何可舉上二界哉抑今此釋惑是欲界等者云能緣疑煩惱通三界歟為當云所緣境通三界歟如何答光法師惑是欲界疑是色界猶豫是無色界之釋尤難思未知解釋深旨但見解釋一段是一往配釋而非盡理解釋歟所以然者見本論文問頗有見斷心能了別欲界繫法耶答此問云能了別謂我故我所故斷故常故無因故無作故損減故尊故勝故上故第一故能清淨故能解脫故能出離故惑故疑故猶豫故貪故嗔故慢故癡故不如理所引了別文思此文意能緣見所斷心者今所出定可限欲界見所斷心上界見斷心不緣欲界繫法故所緣欲界繫法既定欲界繫故也而光法師釋此文之中釋無因故無作故損減故之文云無因故無作故損減故是邪見或無因故集下邪見無作故道下邪見損減故苦滅下邪見文此中第一釋是盡理釋也或無因故以下第二釋是一往配釋也其故者已舉滅道下邪見而彼邪見無漏緣惑無緣欲界繫法豈此中可出之哉明知此釋是一往釋也次釋尊故勝故上故第一故之文云尊故勝故上故第一故是見取惑尊故苦下見取勝故集下見取上故滅下見取第一故道下見取文此又初釋是其實義第二釋一往配釋也所以然者釋本論十文於四諦下見取各舉尊故勝故上故第一故之四行相若爾何以此尊等四行相如次可配釋四諦所斷見取哉明知是又一往配釋也次釋能清淨故能解脫故能出離故之文云能清淨故能解脫故能出離故是戒禁取惑能清淨欲界能解脫欲界能出離無色界文此又初釋盡理釋第二釋一往配釋也所以然者能解脫色界結出離無色界者出上緣戒禁取歟而今了別欲界繫法心也何可出上緣惑哉明知是又一往配釋也次釋惑故疑故猶豫故之文云惑故疑故猶豫故是疑又解惑是欲界疑是色界文此又初釋是其實義第二釋一往配釋也所以然者疑是色界猶豫是無色界者舉上緣疑煩惱歟豈了別欲界繫法之心中可出之哉明知此又一往配釋也已雖一往配釋其行相品非實義之上者解釋強不可及劬勞也是以寶法師釋今本論文云無因故無作故損減故是邪見並不取勝故上故第一故上故上故第一故是見取非勝計勝故能清淨故能解脫故能出離故是戒取非因計因故惑疑故猶預故是疑文泰法師釋此文云無因故無作故損減故是邪見尊勝上第一是見取能清淨能解脫能出離是惑取惑故疑故猶豫故是疑文此等師偏依其實義門作釋不及一往配釋也次於惑是欲界疑是色界等之釋云能緣疑通三界歟為當所緣歟云尋者是述能緣疑是欲界而所緣通三界之旨也所以然者見上釋釋戒禁取云或能清淨欲界能解脫色界能出離無色界或能清淨煩惱障能解脫業障能出離異熟障文此煩惱障等是舉所緣法體也以之準知戒禁取並疑煩惱之第二釋之處舉三界皆是舉所緣也滅道所斷邪見緣見所斷法歟云疑付光法師無作故道下邪見損減故苦滅下邪見之釋疑也本論尊故勝故等之文光法師第二解如何釋之云疑付尊故等四行相如次配釋四諦下見取之釋疑也而任今了簡者此等之釋皆是一往配釋故非其實義仍疑不為難歟依今了簡可開疑故以次配之矣問付四諦名言唯明滅諦不名靜等三諦有何故耶進云光法師所引婆沙論云滅名不共故立諦名文付之滅名既通非常滅何無相濫之義哉是以見今論餘處二十八文釋重無相三摩地不作滅行相云濫非常滅故文如何答見光法師所引婆沙論一段文述於四諦各有四行相之中唯以苦集滅道四行相為四諦名不以餘行相為四諦名故四諦相望簡其相濫之時滅名不共不濫餘諦靜名濫定妙離濫道故名滅諦不名靜妙離濫道故名滅諦不名靜不名靜妙離諦云也故婆沙論云滅名不共故立諦名滅名唯顯究竟滅故靜名濫定妙離濫道故不名為靜妙離諦文文意顯也但於滅名可濫非常滅云難者光法師餘處二十八解釋問答云緣擇滅時亦應不作彼滅行相濫無常滅故解云擇滅諦收聖心現證雖作滅行尚無有濫不同非擇滅文準此釋可會通也次於今論餘處濫非常滅故之文者重無相三摩地緣無學無相三摩地非擇滅為境故於滅靜妙離四行相不可作妙行相是無記性故不可為離行相非離繫果故云促成滅靜二行相釋之有處説二滅無處説二靜故滅行相有濫靜行相無濫云也義門既別也強非相例歟問薩婆多宗意有為法體可生滅耶答雖有二義暫可存生滅之義也兩方若生滅者薩婆多宗意述三世實有之義若有為法體生滅者何可談三世實有之旨哉是以釋婆沙論處處之文或云二十一我説諸因以作用為果非以實體為果又説諸果以作用為因非以實體為因諸法實體恆無轉變非因果故文或云三十九若依自體變説者應言諸行無有轉變以彼自體無改易故文任此等論文有為法體三世恆有無有生滅轉變之義見加之見光法師餘處解釋或釋是能生長彼作用義之論文云法體先有不可言生俱能生長彼作用義文或五釋法若有此應是有為之論文云此宗諸法體皆本有四相於法但望用説非據體論文寶法師餘處五解釋中云心心所法先有體性由十二處令行世取果名為作用文圓暉法師餘處解釋中云依薩婆多宗法體先有不可言生俱生其用耳文有為法師體不生滅云事此等解釋亦分明也若依之爾者立有為名由法體生滅之義若體不生滅者與無為法有何差異哉是以光法師釋十六行相中非常行相云體生滅故非常文如何答有為法體生滅有無者上古明匠猶為未決下愚末學輒雖難言深思道理廣勘諸文可存為法體生滅云義也其故立有為名由造作遷流之義若法體不生滅者豈名有為哉與無為法有何差異哉是以見婆沙論處處之文或三十九答諸有為法生時為體是生法故生為與生相合故生耶云問云應作是説體是生法故生答諸有為法滅時為體是無常法故滅為與無常相合故滅耶云應作是説體是無常法故滅畢評家指此説云應知此中初説為善文或百八十三釋文發智論諸生何世攝答未來諸滅何世攝答現在之文云復次為止執有為法唯轉變隱顯而體無生滅今説未來生現在滅故即顯有為法非但轉變而實有生滅故作此論文有為法體生滅云事此等論文尤分明也加之見光法師處處解釋當卷釋生滅故非常之論文云體生滅故非常文有為法體生滅云事此文尤分明也餘處之中或釋此有為法亦名世路已行正尤分明也餘處之中或釋此有為法亦名世路已行正行當行性故或為無常所吞食故之論文云無常四相是能吞食諸有為法是所吞食是可破壞故名世是無常所依故名路即世名路持業釋也文若有為法體不生滅者何云諸有為法是所吞食哉或二釋即説彼為此法境界心心所法執彼而起彼於心等名為所緣之論文云又解礙體義邊名所緣有對礙用義邊名境界有對文所緣有對者名心心所詫自所緣境界現起若心心所法體不生滅者寧有礙體之義哉或二十釋若許作用異法體者可有此失然無有異故不可言有此過失之論文云體非常故用亦非常文有為法體生滅之旨此釋實分明也何況圓暉法師餘處五解釋云謂相法體令是有為文若許相法體者豈不已生滅哉準此等文理有為法體滅云事誰可疑之哉但於薩婆多宗意談三世實有之旨云難者是實難義也云法體恆有談其性非常倩案其意尤以難思經部師難許體恆有説性非常如是義言所未之聞有即此意也試會之者有為法體遷流三世之時其性實雖生滅不如其用本無今有有已還無故云三世體恆有也次於婆沙論諸法實體恆無轉變之文者云我説作用以為因果光取今文意所引之言也作用雖為本無今有有已還無於其體者此義故如此云也對我説作用以為因果云諸法實體恆無轉變此旨自炳然也光法師法體先有不可言生之釋此宗諸體皆本有之釋寶法師心心所法先有體性之釋圓暉法師法體先有不可言生之釋會通亦同也有為法體雖遷流三世不如其用本無今有有已還無故諸師同述法體先有之旨也非謂其法體實不生滅見次於婆沙論應言諸行無有轉變之文者有之自性不轉心心之自性不轉有故如此云也以彼自體無改易故之文此旨實分明也重難云見婆沙論處處之文或十七答若未來世無同類因及遍行因過現乃有則應無因而有因亦應無果而有果如是便壞三世有宗之問云許亦無失約位非體以和合作用位果非體果然位與體非即非即非離體雖恆有而位非恆故同類因及遍行因本無今有亦無有失文或三十一釋發智論云何無常滅答諸行散壞破沒已退之文云諸有為法自性恆有由生相有作用起由滅相故無彼作用名為散壞破沒已退文體雖恆有而位非恆之文諸有為法自性恆有之言有為法體不生滅見是一加之南寺護命僧正研神章中舉或云有為法體生滅或云有為法體不生滅之二傳畢自述本義云今述本門不如當用有為法體無生無滅恆在不去是此本義代至像末人失本義不可得悲也文先德決判誰不依用哉是二答有為法體生滅云事道理論文前重成畢重勘諸師解釋嘉祥大師十二門論疏中中或答有為法體是生故生為與生合故生之問曰體是生但由生相顯發如暗中雖有瓶要須燈顯發不説燈生彼亦如是文或答法體本無生滅而假四相生耶之問云法體本有生滅性但假四相發動之耳文凡曉法師起信論問經部宗意於當別我可起無執耶進云可今論中云執當別我有四種異不出無執也付之有情異執非一準設雖當別我何無執無之義哉依之於現當總我者出執無之句例可同哉如何答今論中云執當別我有四種異一執我當別有二執我當決定別有三執我當如是別有四執我當變異別有無舉無執也其故者執別我者於若人若天等中別欣求彼我起堅固愛執故於是不樂滅無故不起無執也但於總我者其執稍寬堅不欣不愛一法故不起無執也但於總我者其執稍寬堅不欣愛一法故愛執稍緩不遮起無執也故光法師釋此事云別執堅固故不言無總執稍寬容計無也文此釋其意分明也問今論中述經部師義云執續生我等亦有四種異文爾者此文所等取造業我者為現我為當可當我耶答隨光法師解釋有或云當我或云現我二意也兩方若現我者見論文云執續生我等亦有四種異一執我亦當有二執我亦當決定有三執我亦當如是有四執我亦當變異有文如此文者當我見若依之爾者既云造業我尤可現我哉是以光法師釋或執造業我起造業時欲今論文云執造業我起造業時欲亦名於現別我起貪文造業我者現我云事此釋分明也如何答光法師釋執續生我等亦有四種異等之論文作三解釋依初釋意者造業我者可當我也故初釋云執續生我等亦有四種異等者等取執造業我釋此四種準前應知準此中文造業時我亦望當來説四種異此釋意任論文之顯相也即見論文上云執續生我等亦有四種異標續生我造業我亦有四種異之旨畢下出其四種異云一執我亦當有二執我亦當決定有三執我亦當如是有四執我亦當變異有文已束出二我四種異之時無簡別置當言明知造業我當我云事準此文中造業時我亦望當來説四種異之解釋專任此文也但於已云造業我尤可現我哉云難者造業我者打任雖可現我又非可遮當來造業時我故任論文顯相釋當我可有何過哉次於光法師起造業時欲亦名於現別我起貪云釋者造業我者打任可現我故如此釋也此則存今第二第三釋意也若爾對初釋不可及和會也次依第二第三釋意先造業我者可現我也凡造業我言雖非可遮當來既現在可在造業時何閣現在造業我途可執當來造業我哉道理頗勿論哉第二第三釋意依此理釋現我也但於今論文者依第二釋意了簡今文者云執續生我等亦有四種異等文面所舉四種異者是續生我四種異也造業我四種異文下含而帶之故文中總亦別亦合有五亦言是皆意亦造業我也所謂非但現在造業我有四種異當來續生我亦有四種異為言故第二釋云又解所言亦者不但造業時我於現在世非有四種異續生時我於當來世亦有四種異文依第三釋了簡今文者第一總亦以續生造業兩我亦當別我也所謂如當別我有四種續生我造業我亦有四種異為言後四別亦以續生我亦造業我也所謂如造業我於現在世有四種異續生我於當來世亦有四種異為言故第三釋云又解前一總亦顯續生造業四種數同前執當別我後四別亦復顯續生時四數同後造業時我但當現不同餘皆相似文此文中後造業時我者續生我四種異也文舉明也造業我四種異文下雖含之未舉顯之故續生我四種異明在前對也以造業我四種異云後歟但當現不同者續生我四種約當來造業我四種約現在故云爾也重難云就第二釋有疑見今論文上述於當別我有四種異畢次云執續生我等亦有四種異文相起盡無諍如當別我有四種異續生我造業我亦有四種異云也何可云以續生我亦造業我哉是一況造業我有四種異云事未上明之何可有續生我四種異亦造業我之義哉是二答凡置亦言或亦前今所舉之法顯同前法之門在也是如常或亦後裏所含之法顯同今所舉法之門在也今第二釋意是也意續生我造業我同可有四種異而舉續生我四種異之時置亦言意喻亦造業我有四種異如是亦畢以今亦言還彼所含法有四種異事顯也今第二釋此意也若爾所來二難自被遮畢問薩婆多宗意行相體可限慧心所耶進云今論云此體唯是慧文付之諸心心所皆有取所緣境類差別之義何悉不名行相哉何況行相唯以慧為體者今論若爾慧應非有行相以慧與慧不相應故之難破如何可會之哉如何答薩婆多宗意慧心所於所緣境相簡擇而轉故名為行相於餘心心所無簡擇之義故不名行相也是以見今論文偈頌云行相實十六此體唯是慧長行云如是行相以慧為體文婆沙論七十九云評曰應作是説言行目者自性是慧文正理論七十四云由此我宗所釋為善謂唯諸慧於境相中簡擇而轉名為行相文但於諸心心所取所明境類差別相起皆可名行相云難者正理論七十四中破今論由此應言諸心心所取境類別皆名行相之義云理未必然應思何等名心心所取境類別若謂境相品類差別一切能像理必不成境有善常等衆相差別故或諸色法亦行相收色法亦能像餘相故若謂能取境差別相則應五識行相不成不能取境差別相故有分別識方能取境青非黃等差別相故然非所評起理不成文任此文可會今難也次於今論若爾慧非有行相以慧與慧不相應故之能破者正理論七十四中會此難作三釋初云非有行相唯慧相應心等皆名有行相者是心心所等於所緣品類相中有能取義若依唯慧得行相名則慧之餘心心所法與行相等名有行相如等漏故得有漏名是與漏體同對治義如是所餘心心所法等與行相行於所緣是俱時行無前後義文意云諸心心所名有行相者非與慧相應故有行相然彼心心所法皆等於所緣境相中有能取義故名行相也若依唯慧名行相之義邊論之時者則慧相應之餘心心所名有行相也為言第二釋云或心心所有行相者多如已知根總名有行相文意云慧體實非有行相心心所是有行相也然以少從多總名有行相也例如已知根者名已重知義而道類智未重知道類忍自性相應俱有法然以道類智名已知根是以少從多立已知根名也為言第三釋云或依無間亦説有名如有所依故無有過謂如心心所皆名有所依意識相應諸心所依識亦俱時生識之所依唯無間滅有行相理應知亦然文意已以心心所名有所依者意識相應諸心所法以同時識為所依故名有所依彼意識以無間滅意為所依故名有所依故總束名有所依如是有行相義亦爾謂慧相應心心所法有同時慧行相故名有行相慧心心所有無間滅慧故名有行相故總諸心心所名有行相為言今正理論文以泰法師第二十六卷解釋之趣了簡之也若依寶法師第四偈解釋其趣異也凡寶泰兩師釋今正理文其趣是人師異釋歟但於寶法師釋者依難思暫任神泰釋所記之也問今論文云慧通行相能行所行餘心心所唯能所行文光法師釋此文作二解釋爾者初釋意今此文述論主義歟答述論主義也兩方若述論主義者見今論文上述論主義云由此應言諸心心所取境類別皆名行相文而今文偏以慧名行相定知非論主義云事若依之爾者光法師釋此文之時第二釋云又解論主前雖難殺今還歸宗明義文以此釋思初釋定述論主義可云也如何答光法師釋今論文云慧是簡擇名為行相能取境故名能行為他緣故是所行所餘心心所能取境故是能行為他緣故是所行非簡擇故不名行相若據通名行相諸心所法皆名行相此據簡擇唯慧非餘又解論主前雖難殺今還歸宗明義文任此解釋起盡初釋意今論慧通行相能行所行餘心心所唯能所行之文且就論主義辨行相能行所行之通局見此則論文起盡一段鉤鎖併就論主義述下釋故也但於論主意諸心心所皆名行相今文唯慧名行相定可非論主義云難者論主意實廣論之時諸心心所皆雖名行相然暫於慧有簡擇義故具行相義專顯也就此篇暫令關行相於慧一往分別其而已是非再往盡理義歟若據通名行相諸心心所法皆名行相此據簡擇唯慧非餘之釋此意也若爾依一往有義問旁雖致此分別全不可違上文也問光法師所引正理論中釋唯依欲界依身起法智舉三故爾者初故如何釋之耶進云光法師等引正理論云入出此智諸有漏心唯欲有故文付之入出法智諸有漏心非一準何唯可限欲界哉是以婆沙論八十九云法界智生二心者謂欲色界修所斷心文法智出心通色界修所斷心云事此文尤分明也何況於有漏入出心者設雖限欲界若依身生色界起類智彼無間生法智者可有何過哉如何答光法師所引正理論文法智但依欲界身起非上二界入出此智諸有漏心唯欲有故者此入出心遠方便心也所謂欲起法智必先加行位起欲界散善其後漸法智又欲出法智終必可出欲界散善也故近生法智近從法智出心設雖亘色界心等最初終後之入出心必可限欲界故起法智所依身唯限欲界也婆沙論百滅道法智能斷色無色界結者唯生欲界非生色無色界所以者何入出法智方便心唯欲界繫生上二界者已捨此心必不起故之文又此意也如此了簡之時所舉之法難更非相違也重案其意五通無間道色界修慧攝道品豈他心通無間道無間非生法智攝他心智哉又雜修靜慮中間有漏心非與法智入出哉若爾論近入出心之時通色界云事更不可疑也彌知入出心唯限欲界云今正理婆沙論文就遠方便心論之云事無子細也問今論中出非總緣非我觀所緣法云謂自體相應俱有法文爾者今此俱有法中可攝法俱得耶答可有或云攝法俱得或云不攝之二意也兩方若攝之者得是非俱有因法望俗智疏遠也何不緣之哉是以雜心論中云亦不緣俱有同一果故俱有言中不攝得見若依之爾者法俱得極相鄰近法也俗智更難緣哉若爾俱有言中尤可攝得也如何答見光法師解釋云今此俱有法作三解釋若依初釋意今此俱有言不可攝得也故初釋云俱有謂俗智同時四相故雜心雜品也亦不緣俱有同一果故文此釋意雜心論文既云同一果故不緣俱有法故於非同一果俱有法者可緣之釋故任雜心文不攝得釋也但於法俱得極相鄰近法云難者法俱得雖同時俱起也非同一果故望所得法是疏遠也故能可緣之例如同時相應法上小相等雖同時俱起可緣之也若依第二第三釋意者今此俱有言可攝得也法俱得既極相鄰近法也俗智何可緣之哉故光法師第二第三釋云或可云此論言俱有法亦攝於得以得亦是極相鄰近故雜心論説同一果者不相應中且據親説或論意各別文但於得非俱有因俗智何不緣之哉云難者雖非俱有因望所得法極相鄰近故不緣之也次於雜心論文三解釋自會之故全非相違也問今論意總緣非我觀體不通修慧故如何釋之耶進云今論云修所成慧地別緣故若異此者應頓離染文付之色界攝修所成慧有總緣諸地之義何可儲地別緣故哉況斷煩惱必依厭下欣上之觀非我觀唯是欣行相也更不可有離染之功能設雖通修慧何可有應頓離染之過哉加之四善根雖作非我行相無斷煩惱之義例可等哉依之婆沙論正理論中通修慧判如何答今論意修所成慧諸地別緣故總緣非我觀更不可通修慧也若又通修慧者修慧如實證境相而如實觀境無我之道理之時豈無頓離染之義哉但於靜慮攝修所成慧有諸地通緣之義云難者此則正理論之能難之意也光法師解釋中俱舍師救今難云修所成慧有能總緣亦非極成我宗不解修總緣故此乃宗別無勞會釋文次於斷煩惱必依欣上厭下之觀非我觀唯欣觀故不可有離染之功云難者必依欣上厭下之六行智觀斷煩惱者是薩婆多宗自許之道理也論主意不必然設雖非欣上厭下之觀其智叶實義者何無斷惑功哉非我觀已能證境相實義若通修慧者尤可有斷惑義也就中非我觀偏欣行相云事未一之十六行相中更非我行相豈可云欣行相哉次於四善根雖作非我行相不斷煩惱云難者十六行相專是無漏智所作行相也有漏智遍雖仰作之其義不明了故不能斷煩惱也故婆沙論中釋此事云設雖學作聖道行相不明了故不斷煩惱如師子子未能容獸文故四善根所作非我行相不能斷煩惱也總緣非我觀非十六行相攝故更非例證也例如六行智中苦行相雖似十六行相中苦行相是非十六行相攝故猶斷煩惱也次於婆沙正理論論文者論意既界別更不可及和會也問光法師所引婆沙論中釋聞慧依地舉三師異説爾者第二師意未至地可有聞慧耶答可有聞慧也兩方若有聞慧者婆沙論中述第二師義云有説在六地謂前五及靜慮中間文論文無諍未至地無聞慧見若依之爾者此師意既許中間禪有聞慧未至地何無聞慧哉答第二師意未至地有聞慧可云也既許中間禪有聞慧未至地何可簡之哉是以光法師所引婆沙論三師異説畢判其正不作二解釋之中第二解云又解若據非我觀等殊勝聞慧唯在五地若據常途起者亦通未至中間若作此解俱容為正文此釋意第二師意未至地可有聞惠見但於婆沙論有説在六地謂前五及靜慮中間之文者此師意散善無近分根本不同故初靜慮聞慧之中攝屬未至地聞慧別不開立中間靜慮自初靜慮根本地勝故彼地聞慧別開之見第三師意修慧既有近分根本不同故從彼聞慧亦可有近分根本不同存在七地云歟問依身在色界可初起總緣非我觀耶答依身色界不可初起非我觀也兩方若依身在色界初起之者婆沙論十中述起非我行相所依身云初起依欲界身文如此文者初起非我行相唯限欲界依身見若依之爾者寶法師依婆沙論意釋云初起者此非我行相依欲色界身初起文依色界身初起云事此釋尤分明也如何答欲界受道最勝處故如此功德多依欲界依身初起故總緣非我觀之初起又唯可依欲界身也是以婆沙論十中述起總緣非我觀所依身云所依者此非我行相依欲色界身初起依欲界身文初起限欲界身云事此文太分明也但於寶法師初起者此非我行相依欲色界身初起之釋者初起者之言依初起是根本先言雖標初起意兼可含後起也故下兼舉加色界依身也若此文實唯限初起者婆沙論本文廣明初起後起所依身而寶法師引彼論意之時何論初起不明後起哉以之知初起者之言暫雖標初起意廣可含後起也故下舉加色界依身兼舉後起依身也問光法師意依身在下地可起上地聞慧耶進云光法師釋云身生下地不起上地聞慧文付之衆生種類萬差心品現起非一準設雖聞慧善心何無他地現起之義哉是以披婆沙論十文述色界聞所成非我行相加行得義云謂若此間於自共相善修習者生彼便得文如此文者依身在欲界修習色界聞所成非我行相見加之婆沙論中明眼識後起分別意識云善及染汚分別意識生自下地容現在前非生上地文晨旦人師引此文云以此文證身在下地亦能起上地聞慧文任此等定判依身在下地起上地聞慧云事分明也如何答異地聞慧起不起者先哲未決古來難義也然而依一義意可存婆沙論中有異地聞慧起不起二師異説光法師成不起一説意云義也依此義聊了簡諸文者釋光法師當卷解釋初引婆沙論十色界聞所成非我相行可言加行得可言生得云何可言加行得謂若此間於自共相善修習者生彼便得若不爾者生彼不得云何可言生得謂雖此間善修習已若未生彼終不能得生彼方得彼聞所成非我行相必依此間所修加行生彼得故之文云婆沙既解色界聞慧非我行相若加行得者生彼便得若生得者亦言生彼方得明知身在下地不得起上聞慧若先已得如何論言生彼便得古德皆言身在欲界修習色界聞慧非我觀生彼即得者不然若言先得何須復言生彼即得文疑難之趣當此古德之義意若言先得何須復言生彼即得者出此古德義之過非而成依身在欲界不起色界聞慧之旨也次引婆沙論十若生初靜慮起初靜慮非我行相不定者亦能緣一切法定者唯緣從初靜慮乃至有頂起上三靜慮非我行相亦唯能緣從初靜慮乃至有頂若生第二靜慮起第二靜慮非我行相不定者能緣一切法定者唯緣從第二靜慮乃至有頂起第三第四靜慮非我行相亦唯能緣從第二靜慮乃至有頂若生第三第四靜慮如理應説之文云婆沙既言身生此地起此地非我觀分定不定若起上地非我觀唯約定心緣自上地不言不定以此故知身生下地不起上地聞慧非我觀聞慧非我觀既不得起所餘聞慧準皆不起文此文成準非我觀聞慧所餘聞慧皆在下地不起上地之旨也而披餘處解釋云身在下地非能起上生得善心不起異地生得善心正理有文如下當引亦不能起異地聞慧此慧由彼生得導引既不能起生得善心故聞慧心亦不能起不起異地聞慧善心婆沙有文亦如下引文不起異地生得善心正理有文如下當引者讓光法師第七卷疏所引正理論二十無容起彼生得善心生在此間不能令彼起現前故之文此慧由彼生得導引者述婆沙論應作是説若於三藏十二分教受持讀誦究竟流布是生得慧依此發生聞所成慧之文意不起異地聞慧善心婆沙論有文亦如下引者指當卷疏所引婆沙論之二文也光法師依婆沙論一師説意成依身在下地不起上地聞慧之旨立理引文其意如此加之泰法師當卷解釋引婆沙論今文云若依此文身生下地不得起上地聞慧若依婆沙文引婆沙論今文證依身在下地不起上地聞慧之旨意同光法師之解釋兩師一同之所判定有深由歟但今泰法師解釋中對亦云若依此文身生下地不得起上地聞慧下述若依婆沙故知婆沙論中亦有依身在下地起上地聞慧云義云事即依婆沙論第七十二三兩卷中説眼識後起分別意識之文其證雖甚多且出一兩文者或云七十二若諸異生即彼若生欲界即彼已離初靜慮染未離第二靜慮染以初靜慮眼見欲界色時於彼色起無覆無記眼識此後於彼復起分別意識不退法者欲界二種初靜慮唯善見初靜慮色時於彼色起無覆無記眼識此後於彼復起分別意識不退法者欲界初靜慮共唯善文或云七十三若諸聖者即彼若生欲界即彼已離初靜慮染未離第二靜慮染以初靜慮眼見欲界色時於彼色起無覆無記眼識此後於彼復起分別意識不退法者欲界二種初靜慮唯善見初靜慮色時於彼色起無覆靜慮記眼識此後於彼復起分別意識欲界唯善初靜慮不退法者唯善文此等文既依身在欲界已離初靜慮染未離第二靜慮染不退法異生聖者以初靜慮眼見欲界及初靜慮色後起初靜慮分別意識故依身欲界起上地聞慧之旨甚分明也今此初靜慮善計度分別意識者可聞所成善心故也遂至下文述善及染汚分別意識生自下地容現在前非生上地依身在起上地聞慧云事誰可疑之哉婆沙抄四末中引此文云此文證身在下地亦能起上地聞慧若準第四十二卷文如納息中金肘定又不許下地起上地聞慧若爾時違此文勘定文此釋意婆沙論中有異地聞慧起不起二師異説見若爾婆沙論文前後相違各述一師説意不可和會歟重難云婆沙論中有異地聞慧起不起二説者光法師可述其旨何唯成不起一説意哉是一次婆沙論説眼識後起分別意識之文可通定善更非起異地聞慧之證據哉是二答婆沙論中雖有異地聞慧起不起二師説今論意存不起異地聞云師義見故勘今論七餘處文明十二心相生云欲界善心無間生九謂自界四色界二心於入定地及續生位如其次第生善染心出欲界善心無間生色界善心位唯舉入定地若起異地聞慧者何唯限入定時哉爰知今論意存依身在下地不起上地聞慧云師義云事故光法師製今論疏之時處處釋成不起異地聞慧之旨餘處十解釋中云必不能起異地散善故不別説亦此意也何況披婆沙論處處之文多順不起異地聞慧之義所謂或云百七然滅道法智能斷色界結者唯生欲界非生色無色界所以者何入出法智方便心唯欲界繫生上界已捨此心必不起故文或云百十三生欲界者若起色界善心及彼地無漏正見俱生心由十善業道俱生思究竟轉若起彼地盡智無生智俱生心由九善業道俱生思究竟轉文若依身在欲界起色界聞慧者入出法智散心寧不通色界哉依身欲界何亦無色界三善業道俱生思究竟轉之義哉此等論文不起異地聞慮見歟故光法師不顯起異地聞慧之一處説當處餘處之中屢依身在下地不起上地聞慧之旨也次婆沙論説眼識後起分別意識之文唯就散心論之也故婆沙論云問此六識身幾有分別幾無分別答前五識身唯無分別第六識身或有分別或無分別且在定者皆無分別不在定者容有分別計度分別遍與不定意識俱故此中且説眼識後起分別意識文正理論云應知此中且辨計度及與不定隨念分別遍諸地故文任此兩論文眼識後起分別意識唯就散心論云事甚分明也重難云光法師假設得起聞慧亦不能生心威儀心不能生加行善心故之釋可起異地聞慧見何云光法師偏成不起異地聞慧之旨哉答此釋顯假令事非許起異地聞慧也問欲界聞思所成非我行相唯限加行得歟答不限加行得也進云光法師所引婆沙論十云欲界聞思所成非我行相唯加行得文付之設雖欲界聞思所成非我行相若有善串習之類者何從上二界沒生欲界之時無得之義哉依之於色界聞所成非我行相者通生得見例可等哉何況初盡智位得聞思二慧者性相之所定也設雖非我觀聞思慧何不得之哉若爾欲界聞思所成非我行相更不可限加行得哉答見光法師所引婆沙論文述色界聞所成非我行相通生得云謂雖此間善修習已若未生彼終不能得生彼方得聞所成非我行相必依此間所修加行生彼得故文既於欲界間依修習欲界聞慧自共相於色界聞所成非我行相有生得定若爾於欲界聞思慧自共相善串習之類從上二界沒生欲界之時可得聞思所成非我行相云事其道理尤必然者哉是以婆沙論十云如是説者外法異生亦得此行相然與內別謂內法者亦加行得亦生得外法異生唯生得文既云外法異生唯生得外法異生所得欲界非我行相可生得云事此文分明哉加之勘光法師餘處七解釋云問界退還時得欲界善心唯得生得亦得加行解云唯得生得善又解加行串習者亦得婆沙有此兩説然無評文文依此釋勘婆沙論處處文或云不善心生善俱起者謂從色無色界沒生欲界以不善心結生時彼心與欲界生得善四蘊諸得俱起有説彼心亦有與一分聞思所成四蘊諸得俱起文或述無色界沒生欲界時云善染汚法曾得之者善謂生得善四蘊有説亦得串習聞思所成四蘊此諸善法先由越界地捨今界地來還故得文準此等定判從上二界沒生欲界之時聞思二慧善串習之類得聞思二慧云事分明也若爾設雖非我觀聞思慧何不得之哉但於婆沙論欲界聞思所成非我行相唯加行得之文者暫就初起非我觀云唯加行得也全不可遮後起通生得也故婆沙抄一末中會此文云又此云異生唯得故文次任唯初盡遍修九地有滿德之理初盡智位可得聞思所成非我行相也但婆沙論中不舉離染得者初盡智位雖得之地地第九解脫道位不得之故暫不舉離染得也故委論之者欲界聞思所成非我行相可通加行得生得離染得也問外法異生可得總緣非我觀耶進云寶法師所引婆沙論十云如是説者外法異生亦得此行相文付之外法異生著我之執見轉深何可得總緣非我觀哉抑聞思修所成之中得何非我觀哉答外法異生得非我觀者未成外法之位起無我行之後由惡友力起我見雖成外法異生依先數習力生時猶得非我觀也是以婆沙抄一末中釋此事云此身在欲界有情起無我行後由惡友力起我見而便命終由先數習力故生時即得或從上界沒生下地時由我見力不得起加行文此身在欲界乃至生時即得者述於依身欲界起聞慧非我行相後遇惡友雖成外法異生命終後生色界之時依先欲界數習力得色界非我行相之旨歟或從上界乃至不得起加行者述依先數習力從上界生下地之時得下地非我行相之旨也但於外法異生著我執深何可得非我觀哉云難者成外法之後雖著我依先數習力得之故全無相違也次三慧中三慧所攝非我觀俱可得之也婆沙論中內法異生外法異生所得非我觀相對分別其差異之時雖述然與內別謂內法者亦加行得亦生得亦得亦在身亦成就亦現在前外法異生唯生得得而不在身成就不現在前於三慧門者不出其差異定知於三慧門者內法外法俱成就之無不同見故也重難云外法異生既捨內法無我觀起外法著我之執見設雖有先數習之義何入外法之後可有得非我觀之義哉是一況婆沙論中欲界聞思所成非我行相唯加行得定若爾外法異生更不可得欲界非我行相哉是二又外法異生所得通修慧者何唯云限生得不云通離染得哉是三答外法異生暫遇惡友雖起我見由先數習力得非我觀何強可遮之哉次於欲界聞思二慧非我行相唯加行得云婆沙論文者彼暫據初起論之也更不可遮後起通生得也次於若通修慧者何不舉離染得云難者略且不舉之也其故者婆沙論中內法外法所得非我觀相對分別其差別之時云謂內法者前加行得亦生得不舉離染得是略不舉此也對之云外法異生唯生得又略不舉離染得也實可出離染得也問依身在色界所起定心非我觀可緣三界耶進云光法師所引婆沙論中依身在上界上地所起非我觀不緣下界下地判也付之既總緣我觀也設依身在色界雖起之尤廣可緣三界法哉是以依身在欲界所起定心非我觀非緣三界法哉何況依身在色界所起散心非我觀緣三界法見例可同哉如何答定心勝品而其性背下地若於已厭離地者不欲別緣彼地重令厭背徒無緣已厭離地非我行相又順斷惑道依身上界地所起非我行相輒難緣已厭離下界地而於定心非我觀者定心之己性已背下地非我行相又順斷惑道故依身上界地所起定心非我觀不緣已厭捨之下界地法也但於依身欲界所起定心非我觀者欲界未已厭捨故猶緣欲界也次於依身色界所起散心非我觀緣三界云例難者散心劣而其性背下地不如定心就中欲界散心非我觀專廣緣三界法故色界散心非我觀順彼欲界散心非我觀故以彼欲界散心為本色界散心又廣緣三界也問依身無色聖者可來成就他心智耶答可成就之也兩方若成就他心智者婆沙論百七十述阿羅漢果聖者極小成就十三等至云即生非想非非想處慧解脫阿羅漢謂七無漏一淨四解脫漏盡通所依不舉他心通所依定明知依身無色聖者不成就他心智云事若依之爾者釋今論文述十智定成就相云如是諸位若已離欲各各增一謂他心智唯除異生生無色界文生無色界聖者成他心智云事此文尤分明也如何答無漏是不繫法故生上地成就下地無漏云事性相所定也若爾依身無色聖者可成就無漏他心智云事文理太必然也但於婆沙論生非想地慧解脫羅漢極小成就十三等至之文者無漏他心通所依定有無間解脫二道之中無間道是有漏故生無色界聖者不成就之故從無間道論之不成就無漏他心通所依定故云生非想非非想處慧解脫阿羅漢極少成就十三等至也退勘今論餘處文述天眼天耳通依四靜慮之義云或云此依通無間道説通無間道依四地故文從無間道不成就無漏他心通所依定云事以此論可為準例也問今論中述遍事觀相云謂於苦集滅可遍智斷證文者爾於集滅兩現觀邊已有遍斷遍證義故為名事現觀為當於未來當位可有遍斷證義故名遍事現觀歟答於未來當位可有遍斷證義故名遍事現觀也兩方若集滅兩現觀邊有遍斷證義故名遍事現觀者彼兩位斷集證滅之義未極何望此位可立遍事現觀之稱哉是以釋今論文云雖集滅邊未遍證證文若依之爾者既於彼兩現觀邊修俗智定知於彼位已有遍事現觀義云事若未來可遍斷證故立遍事現觀稱者於彼遍斷證極位可修俗智何於兩類智位可修之哉是以釋今論文云而於當位斷證已聞文若當位者指未來者何可云斷證已聞哉以已聞之言思之當位者指兩現觀位見依之晨旦人師解釋中釋此事云當自諦下智等皆遍故俱舍云雖集滅邊未遍斷證而於當位斷證已聞文當自諦下智等皆遍之言兩類智邊有遍事現觀之義見如何答住兩現觀邊之時於未來無學果證得位可遍斷遍證故名有遍事現觀也集類智滅類智現前之時未遍斷遍證何望其時可名有遍事現觀哉是以釋論文云雖集滅邊未遍斷證而於當位斷證已聞文若集滅類智現前之位已有遍事現觀之義者何可云雖集滅邊未遍斷證哉以痛雖集滅邊未遍斷證知下而於當位者指未來當位也全非指現在當時也故光法師釋此文云雖集諦邊未斷一切集盡而於當集位斷集已周雖滅諦邊未遍證一切滅盡而於當滅位證滅已周文寶法師釋此文云謂一有情於見道位知一切苦宋斷一切集未證一切滅而於無學位必斷證故文當位名指未來云事此等解釋尤分明也況望當時以有一分斷證義可有遍斷證者豈於道無一分修道義哉何可云無遍事現觀哉故知遍事現觀望未來論之云事但於已兩現觀邊修俗智定知於彼位有遍斷證義云事云難者凡三類智位修俗智從無始來數知苦斷集證滅三現觀邊亦知苦斷集證滅同為一事而此俗智從無始來雖知苦斷集證滅未斷有於苦集今三現觀位正斷有頂故俗智欣慶起得被成修也三現觀位修俗智之由緒如斯就此三現觀位修俗智有二故中舉遍事現觀故之許也非謂云爾遍斷遍證之極位修俗智也故光法師釋三現觀位修俗智云以世俗智云以世俗智從無始來數曾知苦斷集證滅三現觀邊亦復知苦斷集證滅同為事又此俗智從無始來不斷非想今斷非想俗智欣慶起得隨喜文次於今論斷證已周之文者至當位之時斷證已周為言不云現觀之位斷證已周者何可為相違哉此則道現觀邊修道不周故對之殊置已周之言也次於當自諦下智等皆遍之人師釋者於當來自諦集位滅位斷集證滅智皆遍為言更非指現觀位也若爾更非相違哉問三類智邊俗智於苦集滅三諦可有遍事現觀耶答不可有遍事現觀也兩方若有遍事現觀者俗智於有頂三諦無智斷證義何可有遍事現觀哉若依之爾者見今論文述道類智位不修俗智云俗智曾於道無事現觀故又必無於道遍事現觀故文如此文者俗智於道事現觀遍事現觀俱無之故道類智位不修之見以之思之俗智於三諦事現觀遍事現觀俱有之故三類智位修之云事分明也如何答俗智從無始來於有頂苦集滅三諦無知斷證之義何有遍事現觀哉但於今論俗智曾於道無事現觀故又必無於道遍事現觀故之文者遍事現觀者全於所修世俗智非論此義專於結修無漏智上立遍事現觀故也其故者結修無漏智自所作遍盡畢剩可修世俗智故三類智位自所作遍故剩亦修俗智道類智位自所作不遍故不及修他世俗智也故遍事現觀之義專於結修上談之全於所修俗智不可及論遍事現觀之有無若爾又必無於道遍事現觀故者結修上事也何關所修俗智可致可難哉問三類智位所修俗智為十六行相攝智將可六行智攝耶答可十六行相攝智也兩方若十六行相攝智者見光法師解釋述三類智位修俗智所以已以世俗智從智無始來數曾知苦斷集證滅三現邊亦復知苦斷集證滅同為一事文已云有斷集證滅故修之定知六行智觀云事若依之爾者今論中述俗智行相所緣云自諦行相境文十六行相攝智云事更不可疑之哉答見道位先未曾得種性而勢力未廣故不結集餘諦念行設雖三類智邊所修俗智唯修自諦行相智更不可修六行智觀也是以見今論文偈頌云自諦行相境長行云隨於何諦現觀邊修即以此行相緣此諦為境文光法師釋此文引正理論云隨於何諦現觀邊修即以此行相緣此諦為境謂若苦諦現觀邊修即以緣苦四種行相若欲界繫緣欲界若色界繫者緣上界諦見婆沙論云行相者此智總有十二行相謂苦現觀邊所修者作苦四行相集現觀邊所修者作集四行相滅現觀邊所修者作滅四行相文任此等定判彼俗智十六行相攝云事更不可疑之但於光法師以世俗智從無始來數曾知苦斷集證滅之釋者總釋世俗智之時有知苦斷集證滅之義故依與三類智作同事修之云也正三類智所修俗智非云有斷集證滅之義故朴楊大師釋云未曾起據彼同類已前起者名為同也文意云三類智所修俗智未曾起然依為彼俗智同類以前所起六行智觀有斷集證滅之義為所作同之也重難云三類智位依所作事同可修俗智者何不修正有斷集證滅義之六行智觀而修諦觀行相智哉是一是以見淨影大師解釋云凡夫本來曾依等智厭下苦集欣求上滅而不然得復入見道三法智時斷上二界迷諦惑盡適彼所作故能令彼等智增明文如此釋者可修六行智觀見是二加之見朴楊大師解釋云三類智者謂苦集滅三諦類智起此類智現觀復已而能兼修有漏知苦斷集證滅所有俗智文斷集證滅所有俗智也言六行智觀云事分明也是三答俗智從無始來數曾知苦斷集證滅雖然未斷非想惑故集證滅未究竟而三類智位斷有頂故俗智起得隨喜此則以所作事同雖為所修之由見道位難修非諦觀行相故不修六行智也是見道勢力不增廣故不修餘諦念行故也次於淨影大師解釋者凡夫本來依欣上厭下觀厭下苦集雖欣非想滅未得斷證非想集滅至三類智位斷位斷盡上二界迷諦惑之時俗智欣慶令己體增明故彼類智位修俗智為言非謂云爾修六行智觀也次於朴楊大師釋者是又知苦斷集證滅所有俗智者俗智有知苦斷集證滅之義故修之云當釋也非云所修俗智正斷集證滅也問三類智邊俗智唯限不生法歟進云今論云不生自下地文付之俗智從無始以來有知苦斷集證滅之義故三類智位修之見若修曾知苦斷集證滅智者豈非已生類哉是以見晨旦人師解釋述三類智邊俗智相問彼曾起者此時修不答據實亦修以非希奇故論不説此釋無諍三類智邊俗智通已生類見何況婆沙論中三類智邊俗智有法俱得判若限不生者何可有法俱得哉答三類智邊俗智以隨信隨法行依身為所依而見道位雖為見道所依隨行隨法行依身起為俗智所依隨信隨法行依身不起所依已不生故能依俗智又畢竟不生也故今論云此世俗智是不生法於一切時無容起故文光法師釋此文引正理論云此智依身定不生故謂隨信行隨法行身容有為依引此智起在見道位此無容生故此依身住不生法依不生故此必不生文婆沙論云此智與見道現行相違故遇見道位無容起故設見道位中見道須臾不現前者此智便起以見道無剎那斷義是故此智無容現前文但於俗智曾有知苦斷集證滅義故三類智位修之見若爾豈非已生類哉云難者俗智曾有知苦斷集證滅義故現觀邊修俗智之計也非云所修俗智有斷集證滅義故全非相違也次於朴楊大師據實亦修之釋者凡披一段解釋二邊義門所釋也所謂上問此所修智已前起不若無起者云何論云兼修未來現觀俗智若未曾起復如何云與三類智知斷證同故兼修耶答此問難云未曾起據彼同類已前起者名為同也文此一重問答任俱舍論等所定性相釋成之三類智邊俗智限不生之旨全不背有宗義次重問彼曾起者此時修不答之云據實亦修以非希奇故論不説如俱舍抄廣分別之文此一重問答已前曾所起六行智等知苦斷集證滅之智成就法後得起暫名修也善法皆有修習義故也此又過去已起六行智彼三類智位成就之事又不背有宗義若爾兩重問答更非相違也次婆沙論一師意三類智邊俗智有法俱得者凡於有情數法談得之同不簡其可生不生不可有無法俱得存故此智有法俱得云也尋云三類智邊俗智雖畢竟不生許有法俱得者又可有法後歟答不可有法後得也婆沙論中雖舉或云有法前得或云兼有法俱得二師説終無有法後得之説定知無法後得云事此事一箇疑也委細問答如第四卷明思抄問三類智邊俗智可有法智繫屬類耶答可有法智繫屬類耶兩方若有法智繫屬類者既三類智邊所修俗智也更不可有法智繫屬類哉見道法類忍智現前之位各修自類不修他類設雖未來所修俗智更類智現前位不可修法智繫屬類故也何況若有法智繫屬類者尤法智現前位可修之何類智位可修之哉若依之爾者光法師所引正理論中述彼俗智所緣云若欲界繫緣欲界苦若欲界繫緣欲界集若欲界繫緣欲界滅文既三欲界繫俗智緣欲界苦集滅三諦豈非法智繫屬類哉答俗智無始以來有知苦斷集證滅義故三類智邊修之若爾設望欲界法依曾有知苦斷集證滅義可修彼俗智若爾望此義邊被修俗智豈非法智繫屬類哉是以光法師所引正理論云謂若苦諦現觀邊修即以緣苦諦行相若欲界繫緣欲界苦色界繫者緣上苦諦若欲界繫緣欲界集色界繫者緣上集諦若欲界繫緣欲界滅色界繫者緣上滅諦文此文明欲界俗智法智繫攝色界俗智類智繫屬見加之婆沙論中述此智所緣云答別緣謂欲界者隨所應緣欲界三諦色界者隨所應緣色無色界三諦有説總緣謂欲界者隨所應緣三界三諦有界者亦爾評曰前説者好如無漏智法分類分各別緣故文有法智繫屬類云事此文又分明也但於既三類智邊所緣俗智也更不可有法智繫屬類云難者凡見道位法類忍智各修自類者暫就無漏智品論之於世俗智者設雖類智位所修可有法智繫屬類也法類智位或法智繫屬類或類智繫屬類總皆修之故也次於若有法智繫屬類者尤法智現前位可修之云難者法智現前位等未斷有頂類智現前位斷有頂故俗智斷有頂位起得隨喜也仍法智位不修之類智位修之也尋云何故欲界繫俗智中無類智繫屬類哉欲界俗智廣緣上界尤可有類智繫屬類哉欲色界繫俗智中何無法智繫屬類哉儀也見道依色界六地分法類二智差別四善根依色界緣欲界境非有法智繫屬類哉何此俗智不爾哉答此俗智依地既通欲界故欲界繫俗智順欲界緣欲界故繫屬法智色界俗智順上界緣上界故繫屬類智四善根等不依欲界故如次以欲界色界四善根可繫屬法智類智之義無之故於色界善根中又分欲界緣類歟若爾彼俗智與四善根其廢立已異更不可一準歟問三類智邊世俗智所依身與見道所依身可同耶答可各別也兩方若同者俗智與見道有漏有漏無漏既別也彼所依身豈同哉是以光法師所引正理論云此智依身定不生故謂隨信行隨法行容有為依引此智起在見道位此無容生文若此依身與見道同者豈見道位不起哉若依之爾者見寶法師餘處解釋云其勝緣者正理論云謂彼所依身彼所依身與見道同在見道時無容得起出現觀時所依已滅既闕勝緣故不得起文如此釋者三類智邊依智所身與見道所依身可同見如何答三類智邊俗智所依身與見道所依身其體可各別也故婆沙論云問若不現前云何可説此依隨信隨法行身答彼身有二種一是見道所依二是現觀邊世俗智所依見道於見道所依身得亦在身成就亦現前現觀邊世俗智於彼身得而不在身成就不現前現觀邊世俗智於現觀邊世俗智所依身得亦在身成就亦現前見道於彼身得而不在身成就不現前文任此文俗智所依身與見道所依身其體各別云事甚分明也但於寶法師彼所依身與見道同之釋者同隨信行隨法行依身俱三類智容現起故云彼所依身與見道同也非云三類智邊俗智所依身與見道其體是同歟問三類智邊世俗智本來可得非擇滅耶答本來不得非擇滅也兩方若本來得非擇滅者見光法師解釋云三現觀邊得非擇滅文若依之爾者見今論文此世俗智是不生法於一切時無容起故文若本來不生法者何本來不得非擇滅哉是以婆沙論云如三類智邊世俗智等非擇滅法本來有得無有非得以彼本來定不生故文如何答三類智邊世俗智雖本來不生法至見道三類智位勝緣方闕故彼位得非擇滅本來不得之也是以見光法師解釋云問何時得非擇滅解云三現觀邊得非擇滅故正理云謂於爾時起得自在餘緣障故體不現前文此釋意云見道位中不出觀故三類智邊世俗智雖本來不生法三類智位起得自在故其體若容現起者此位容現起故前位勝緣未闕三類智位見道依身現起故與之被障俗智依身永不起故此位俗智勝緣方闕得非擇滅也俗智勝緣者即彼依身也餘緣障故體不現前者見道依身被障俗智依身永不現前為言光法師餘處如現觀邊世俗智等雖復體性畢竟不生於前位中亦不出觀然此三諦現觀後邊勝緣闕故得非擇滅之釋亦此意也但於今論文者三類智邊世俗智本來不生法云事自本所許故全非違文次於婆沙論本來有得無有非得之文者是一師不正義故更不可及劬勞矣問經部宗意無漏法可薰有漏種子可云哉問下地見道現前可修上地見道耶進云論云能修未來自地下地不修上地見道判也付之無漏道不繫法故依地上下不可有勝劣何無下地見道之義哉是以本論中云依未至地入見道人十五心頃成就無漏四靜慮云云取意如此文者下地見道現前修上地見道見如何答設雖無漏法不繫隨依地上下非可無其勝劣況又見道是初得道其勢力不增廣故依下地見道現前不修上地見道也是以光法師引婆沙論云又婆沙第四云問何故六地見道上能修下下不修上答上地法勝現在前時即能修下下地法劣現在前時不能修上如劣朝勝非勝朝劣此亦如是廣如彼釋又婆沙一百六十八云見道依下必不修上以是初得道故無漏依上必修下地以自在不繫故文但於本論文者發智論生欲界梵世色愛盡成就淨無漏四靜慮云文歟於此文者婆沙論中問答此事云問色愛盡依未至定入正性離生十五心頃不成就無漏靜慮至道類智但成就一即彼乃至依第三靜慮入正性離生十六心頃但成就三何故説四耶有説依漸次得果離染者説有説歟彼得果已不久必起勝果道現前修無漏是故於十六心時雖未成就必當可得故亦説成就文重難云婆沙論上地法勝現在前時即能修下下地法劣現在前時不能修上之文難思此難次下疑可釋也問無漏法隨所依地上下可有勝劣不同耶答勝劣不同有無可有二心也兩方若有勝劣不同者無漏不繫法也何隨所依地上下可有勝劣不同哉是以釋今論餘處六文云道展轉九地唯等勝為果文如此文者隨依地上下不可有勝劣不同見若依之爾者光法師所引婆沙論云上地法勝現在前時即能修下下地法劣現在前時不能修上文隨依地上下無漏法有勝劣云事此文尤分明也何況正理論中述九地聖道為同類因相云於依自上有於依下地無文依所依地上下有勝劣云事此文又炳然也如何答無漏法雖不繫由依地上下聊可有勝劣也則光法師所引婆沙論上地法勝現在前時即能修下下地法劣現在前時不能修上如劣朝勝朝劣之文其旨分明也但於無漏不繫法也何由依地上下可有勝劣哉云難者無漏法雖不繫自勝品者依上地劣品者依下地也全非云其體繫屬地故依地有上下其體隨有勝劣只無漏法本有勝劣中勝者自依上地劣者自依下地也非如有漏法也次於道展轉九地唯等勝為果之今論文者上地劣根劣品道為同類因故云爾也非云就同姓同品上地與下地為因也重難云光法師餘處解釋中釋九地聖道同類因相作二解釋中第二釋云若依德光論師解九地各能修九地聖道九九八十一聖道展轉相望皆得為因此亦據同姓同品應依九地修者説故得展轉為因文如此釋者依依地上下不可有勝劣見如何答由依地上下有其勝劣者非妨同類因程之勝劣歟喻如生得善法雖有九品不同互為同類因也故九地所修聖道互為同類因之釋意不可遮依地上下有勝劣也尋云正理論於依自上有等之文依地上下有勝劣云證文歟答若依光法師餘處初釋者是證文也若依又解正理且據一相漸次進修諸地勝法故言上非下因以實而言亦同德光之釋者非證據歟一義云光法師餘處釋九地聖道互為同類因相作二解釋初釋云準正理師意雖等是同姓同品依上地者勝依下地者劣故依上地者不與依下地者為因與依自上地者為因依此釋意者無漏法由依地上下可有勝劣也即一方疑所舉婆沙論並正理論文專其誠證也但於無漏不繫法何由依地上下可有勝劣不同哉云難者無漏法本有勝劣之中勝品者自依上地劣品者自依下地故依地上下有勝劣云也全非如有漏繫屬其地故由地上下判定其法勝劣也重意有漏墮界地故依其依地勝劣定其有漏定勝劣無漏自本不墮界地故非依地定其勝劣只本有勝劣中勝者自依上劣者自依下為言次於今論道展轉九地唯等勝為果之文者暫上地劣姓劣品道與下地勝姓勝品道為同類因類因故九地展轉為同類因云也全非云就同姓同品道上地道與下地道為同類因也第二釋云若依德光論師解九地各能修九地聖道九九八十一聖道展轉相望皆得為因此亦據同姓同品應依九地修者説故得展轉為因文若依此釋者由依地上下不可有勝劣不同也無漏不繫法故也但於婆沙論上地法勝現在前時之文者見道初得道作用不增廣故欲述下地見道現前之時不修上地見道之時剩儲由之時實有漏依地上下有勝劣一往作其勝劣云許也是非盡理之説歟若依地上下實有勝劣者何至修道位下地道現前之時可修上地道哉設雖修道位作用增廣劣品道現前難修勝品道故也次於正理論於依地上有等之文者存此第二釋意之時論意各別故全不可及劬勞或任又解正理且據一相漸次進修諸地勝法故言上非下因以實而言亦同德光之釋者今正理之文全非違文也重難云第二釋意無漏法由依地上下無有勝劣者何下地無漏他心智不知上地無漏心哉是以今論中述他心智相云於勝地根位去來世不知文既以上地云勝地豈非云上地無漏勝哉是一何況寶法師地疏於位之解釋無漏法由依地上下有勝劣不同見是二答他心智者有漏他心智既下地智不知上地心故無漏他心智又下地智不知上地心也漏無漏他心智同一雙之廢立故也是則分地上下不同專以有漏為本故有漏既不緣上故無漏又難緣上地也光法師餘處緣境義別為因義別不可為難之釋此意歟次於今論勝地之言者專以有漏為本故旦以上地云勝地也非云爾謂無漏有勝劣也次於寶法師地疏於位之釋者同光法師初釋意也存第二釋意之內全不可為難也問斷欲界煩惱位不修類智斷上二界煩惱位不修苦集法智者可有何過耶進云光法師所引正理論云若斷欲染不修類智斷上不修苦集二法則漸次得不還果者應無容起類智現前阿羅漢應無起苦集法智先所得者皆已捨故先未得者非所修故文付之設雖斷欲界煩惱位不修類智斷上二界煩惱位不修苦集法智有先同類因等力者何次第證不還後時起類智羅漢果聖者起苦集法智之義無之哉若非前位所修故後時不起之者諸未曾得法不可有現起之義哉如何令未來類智品道引其體現前法體尚依同類因力答今正理論一段之意諸斷惑道現前前之位未來所修法者非悉必同治故修之故斷欲界煩惱位修類智斷上界煩惱位修苦集法智者雖非同治因力相資故修之因力相資者所謂斷欲界煩惱法智品道現前位依同無漏姓類與未來所修類智品道為同類因依此為同類因力令未來類智品道引其體現前法體尚依同類因力令引現前況引起彼上得令修得之依何可為難哉而若欲界能治法智現前位與未來類智雖為同類因此同類因無其力而無修得類智之義者爭此同類因可有引起猶可難法體之功哉既成就同類因猶無引起類智之功者已捨同類因何又可有引起類智之義哉若爾漸次得不還遂不可起類智哉為言羅漢不起苦集法智之義準之可思之正理論一段所存述此意也但於非前位所修之法後時不現起者諸未曾得法不可有現起之義云難者斷欲界煩惱位未來所修類智者專其位可被修法也而乍為可被修之法雖有為同類因義遂不修之者成無因力相資之義若爾其法體遂難起云也未曾得之法自本非先位可被修之法故雖有同類因何可修之哉全非失因力相資義重意云未曾得法為先位可被修之法者有同類因力可修之事雖不可有障礙其品類勝品非先位可被修之物體故依此別緣不修之也全非失因力相資之義也若爾更不可為例難哉問斷上地煩惱無間解脫道位可修下地非對治無漏耶答可修之也兩方若修之者已斷上地煩惱無間解脫道位也爭可修下地非對治無漏哉是以光法師所引顯宗論云謂隨何地有漏無漏加行道等正現前為欲斷除此地煩惱未來修此及下無漏下於上染同能治故文如此文者斷上地煩惱無間解脫道位修下地無漏者唯限同對治見若依之爾者見今論文述斷上七地無間道未來所修智云此上未來皆修七智謂俗法類苦集滅道舉解脫道所修智云此上未來皆修八智謂俗法類四諦他心文此文無所簡既云斷上七地無間道位修苦集法智解脫道位修苦集法智他心智明知斷上地煩惱無間解脫道位可修下地非對治無漏云事如何答斷上地煩惱無間解脫道位可修下地非對治無漏也所謂以下地無漏道斷上地煩惱無間解脫道豈不修所依地苦集法智無漏他心智哉依之今論中斷上七地無間解脫道位修苦集法智他心智云也但於已斷上地煩惱位也何可修下地非對治法哉云難者以下地無間道斷上地煩惱之時所依地非對治無漏與能斷道同治故修之也但斷惑道現起修非對治無漏者因力相資故修之也是以光法師所引正理論中問答此事云四類不能斷欲界染苦集二法非上對治何緣起彼治此智未來修若許兼修非對治者離有頂染等應兼修世俗此難非理唯同對治於未來修非所許故謂亦許有相屬故修如見道中修世俗智或由因力相資故修如斷欲時兼修四類斷上染位修苦集法文次於光法師所引顯宗論下於上染同能治故之文者彼文專述為離此地修之相故舉同對治義也雖然無間解脫道位修非對治無漏不可遮之也尋云斷惑無間解脫道所修非對治無漏若為離此地修為當起此地修歟若為離此地修者已非對治法何可云為離此地修哉若起此地修者已斷惑無間解脫位所修也尤可云為離此修哉是一以有漏道斷上地煩惱無間解脫道位可修下地非對治無漏耶是二以第二禪無漏道斷四禪以上煩惱無間解脫道位可修初禪第三禪非對治無漏耶若修之者初禪第三禪非對治無漏已非同對治亦非能斷道同地如何可修之哉若不修之者無間解脫道位所修定可為離此地修而為離此地修必從所離地下地無漏悉修之若爾何不修之哉是三答斷惑無間解脫道位所修非對治無漏者可非為離此地修歟凡為離此地修必從所離地下地無漏悉修之若爾何不修之哉是三答斷惑無間解脫道位所修非對治無漏者可非為離此地修歟凡為離此地修者現起能治斷此煩惱之時未來同對治道被來修此可為離此地修非對治法也無同治義何可為離此地修哉故顯宗論為欲斷除未來修此及下無漏下於上染同能治故之文專非述此意哉全以斷惑無間解脫道所修不可皆云為離此地修之若云斷惑無間解脫所修皆為離此地修者第九解脫道位所修何可云得此地修哉次以有漏道斷上地煩惱無間解脫道位不可修下地非對治無漏也其故者下地非對治無漏無間治故非為離此地故可修之又起上地有漏斷道之時非起此地故可修此若爾無其由緒何可修之哉次以第二禪無漏道斷四禪以上煩惱之時不可修初靜慮第三禪非對治無漏其故者非同治故不可為離此地修無其由緒不可起此地修凡起此地修者或自地道品以同地由緒修之設雖非自地如依上地練根道之時修下地者模本得果時之上下地道皆於無知有能遮世之義故修之是依有由緒起此地之時修下地也今者已無其由緒依何可修之哉但述起此地修之時修此下無漏者一切起此地修之時非云必修下無漏隨其所應或可有唯修自地之時也仍非相違歟問斷欲界煩惱第九勝進道位可現修他心智耶進云今論云斷欲修斷第九勝進俗四法類隨應現修不舉他心智也付之勝進道是容預位也何不現修他心智哉是以斷上界煩惱勝進道位現修他心智見例可等哉答光法師釋此事云初離欲染猶未容預故非現修上地勝進是容預故所以現修文解釋已儲由釋例難之上者不可及學者劬勞者也問阿羅漢果聖者勝進道初念可現修苦集法智耶答不可限修苦集法智也兩方若現修苦集法智者初唯苦集類者性相所定也而勝進道初念現修苦集法智者豈無多地超緣之過哉若依之爾者釋今論文云勝進九十隨應現修文此文無簡初念勝進道以知勝進道初念可苦集法智現修云事如何答若利根羅漢勝進道初念者即無生智也彼位苦集法智現修者豈不背初唯苦集類之理哉若鈍根阿羅漢勝進道初念苦集法智現修者可有多地超緣之過故無學聖者勝進道初念不可苦集法法智修云事道理必然也但於今論勝進九十隨應現修之文者總於勝進道位現修智故云勝進九十隨應現修也既置隨應之言顯其簡別設雖勝進道初念不現修苦集法智何可為違文哉若堅如疑難執此文者豈利根無學勝進道初念可云有滅智道智世俗智他心智現修之義哉恐簡外了簡也問偈頌文云勝進道亦然文爾者亦然者光法師如何釋之耶進云光法師釋云現修與前解脫道得修數同故言亦然文付之釋偈頌文云無學初剎那修九或修十鈍利根別故勝進道亦然文上舉無學初剎那未來所修智品數了下云勝進道亦然文相起盡無諍令例同勝進道未來所修智品見何可云例同現修智品哉是以見光法師下解釋云頌文窄故但説修未來長行文寬兼説修現在文如此釋者頌文無説現修智品見若爾前後解釋豈不相違哉答光法師今解釋尤似難思試加了簡云今論長行釋云無學初念謂斷有頂第九解脫苦集類盡隨應現修緣有頂故勝進九十隨應現修未來隨應修九修十謂鈍根者唯除無生利根亦修無生智故文釋此文起盡無學初念乃至緣有頂故者釋偈頌無學初剎那句釋勝進九十隨應現修者釋勝進道亦然第四句歟未來隨應修九修十謂鈍根者唯除無生利根亦修無生智故者釋修九或修十鈍利根別故之第二第三句見若未來隨應修九修十以下之文釋第二第三第四之三句者文相起盡專偏順第二第三之句釋也上勝進九十隨應現修之文可云釋何句哉故以此長行文釋偈頌文者勝進道亦然者以勝進道現修智令等初念得修智見故光法師釋此文云論曰至緣有頂故者釋初句勝進九十隨應現修者釋第四句第二念後諸勝進道九智十智隨應現修現修與前解脫道得修數同故言亦然未來隨應至無生智故者釋第二第三句文隨釋泰法師解釋云二釋第四句第二念後諸勝進道九智十智隨應現修勝進道得修與解脫道得修九十數同前云亦然文兩師一同解釋定有深由歟如此了簡之時頌文起盡聊非無其意歟但於光法師頌文窄故但説修未來之釋者今於明修一段之文多分偈頌唯説未來修云爾也不遮少分説現修歟但於光法師今解釋或本云現修與前解脫道異得修數同故言亦然文如此本者全非相違哉任下頌文窄故但説修未來之釋此異本可為證本歟就中釋一段之論文頌文中餘處聊無説現修至今文何獨可説現修哉旁以今本令為指南哉重難云就現修與前解脫道異義本有其疑若得修數同故言亦然者令同勝進道得修智者今此釋段釋現修之釋段也何遮可釋得修事哉是一若如此本者長行未來隨應修九修十以下之文初剎那並勝進道未來所修智一具舉之故定可釋第二三四之三句何光法師可釋未來隨應至無生智故者釋第二第三句哉是二答釋現修之段中置得修數同故亦然之言事初念現修智數與勝進道現修智數定是可不同歟勝進道亦然之言令同彼言現修智歟云所濫可有之故為遣言所濫現修與前解脫道雖異得修數同故就得修云亦然全非令等現修為言次於光法師未來隨應至無生智故者釋第二第三句之釋者實可云釋第二第三第四然今文之文相根本釋第二三句故就為本云釋第二第三句也若實存不釋第四句者何次下云解脫勝進未來隨應修九修十可釋加勝進道未來所修智哉第二第三句中未舉勝進道未來所修故也問聖者他心通解脫道現前位所現修智唯可限二智耶答不可限二智也兩方若限二智者聖者所起他心智亘漏無漏彼解脫道位所現修智何可限二智哉是以今論中述他心通解脫道位所現修智何可限二智哉是以今論中述他心通解脫道位所現修智云他心解脫法類道俗及他心智文若依之爾者釋婆沙論文述他心通解脫道現修及未來修智云一解脫道中未來修以智現在唯修世俗他心智文如此文者唯限二智釋如何答聖者所起他心通亘漏無漏故若有漏他心通解脫道位世俗他心二智現修若無漏他心通解脫道位法智類智之隨一並道智他心智之二智可現修也是以光法師釋今論他心解脫法道俗及他心智之文云他心解脫通有漏無漏若無漏者法類道他心智隨應現修若有漏者俗他心智隨應現修文但於婆沙論現在唯修世俗他心智之文者彼婆沙論一段文述五通解脫道所修智相故與餘通同暫他心通言就有漏他心通出現修智歟故唯舉世俗他心二智也是以次下舉有説義云有説亦修道法道類隨二他心智文此則舉加無漏他心通解脫道現修智也是非相違師前師上更云添之也若爾前師意終不可云限二智也問今論意微微心位可有未來修耶答可有未來修也兩方若有未來修者微微心微劣位也何可有未來修哉若依之爾者微微心既未曾得善心也設雖今論意何不許未來修哉是以釋今論文云無學未來鈍九利十除微微心此於未來唯修俗故文彼位有未來修云事論判尤分明也如何答婆沙論中述微微心唯未曾得微微心是未曾得勝品功德故必可有未來修也故勘婆沙處處文或云百七起入滅盡定微微心時現在唯修世俗智未來亦唯修世俗智文或云微微現在前時法念住現在修未來修三除身念住文任此等文思今論意同可得此旨是以一方疑難所舉今論文其旨尤分明也光法師釋此文云臨入滅定心名微微心羸劣現未唯俗不修無漏文正理論文全同今論説故寶法師釋之此論及正理皆定微微心未來唯修有漏文任此等定判微微心位有未來修云事諸論一同之所判也何獨限今論可疑之哉重難云如來初盡智位悉得所有一功德故微微心定可曾得法豈有未來修哉婆沙論云微微心定未曾得所難思也答如來微微心實雖曾得法勝曾得功德故可有未來修也準光法師得勝曾得名未曾得也釋可思也已如來微微心是勝曾得法可得未曾得名故婆沙論文亦無相違耶重難云若爾光法師論意各別之釋意今論意勝曾得法無未來修釋依此釋意之時今論意如來微微心何可有未來修哉問題標今論意即為疑此釋也答論意各別釋之意今論意實雖曾得法勝曾得法與未曾得名許未來修婆沙論意勝曾得法雖不與未曾得名作曾得法有未來修為言此釋意非謂今論意勝曾得法無未來修歟尋云微微心位許未來修者可修無漏智耶答微微心未曾得故雖有未來修其性羸劣故不修無漏智也故光法師釋云臨入滅定心名微微心此心羸劣現未唯俗不修無漏故婆沙一百五十五云若起微心時若起聞思慧等時於無漏根非捨非得非滅非起準彼婆沙微微及聞思慧等不修無漏文重難云婆沙論於無漏根非捨非得之文微微心位不得不修無漏智之論文哉答婆沙論中或生相名得或現在名得之二門在之而今文就現在名得之門論已也以何知之者婆沙論九十四中明通行得捨云若未離欲染聖者起諸相似無量解脫勝處遍處及不淨觀持息念念住等諸功德時皆無捨得一文今此相似功德者是可欲界聞思慧此功德現前之時已云得一通行是就生相得論之已而今光所引婆沙論文云非捨非得就得現在可論之若此文就生相非捨非得者兩文豈不相違哉故知是就現在論之也欲界散善現前位得無漏智尤云疑準今義可思也問聞慧無間生無漏智義可有耶答可有此義也兩方若有此義者釋光法師所引婆沙論文云若起聞亦慧等時於無漏根非捨非得非滅非起文已云非起定知不生之云事何況釋婆沙論文云欲界唯思所成無間聖道現在前乃至色界唯修所成無間聖道現在前文聞慧無間不生無漏漏智云事此文又分明也加之光法師餘處解釋中引此理婆沙文雖述思慧無間起暖善根之旨不云聞慧無間生暖善根若聞慧無間不生暖善根者爭又可生勝品無漏道哉若依之爾者釋今論餘處文云此中五種作意無間聖道現前除生所得聞慧無間生無漏智見如何答聞慧無間生無漏智云事今論餘處定判分明也即如一方疑難是以光法師餘處解釋中會俱舍婆沙兩論相違云婆沙據鈍根者説此論等通約利根者説又解婆沙約初修次第起者説此論等通約純熟位説故不相違文此釋意俱舍婆沙兩論意同聞慧無間生聖道云事更不可疑之但於光法師所引婆沙論非滅非起之文者聞思二慧無間多分無漏心不現起故從多分云於無漏根非滅非起也今婆沙論一段之文從多分云爾也即如彼五品雜修靜慮相續現起之類第三剎那無漏心之無間雖可有無漏根現起之義云第三剎那時如初剎那説也若今文如文執之者豈可云思慧無間不生無漏智哉次於婆沙論欲界唯思所成無間聖道現在前之文者據鈍根者約初修次第起者説故非相違也次於聞慧無間不生暖善根云例難者彼亦初入暖善根事極難故就初入不云聞慧無間不起暖善根也暖善根純熟之位聞慧無間起事更非所遮也重難云四分定中唯順決擇分無間生無漏住分等無間不生無漏見而聞慧望彼住分定等勝劣遙異也何可生無漏哉答就總亦類釋之住分定等勝聞慧劣事是非必然也但彼不云其品類劣不生無漏四分定之廢立自本就有漏慧分分生無漏名順決擇分順上地順勝進分順自地名順住分順煩惱名順退分故順住分等無間不生無漏云也聞慧是雖散善其中亦有生無漏之類何有所遮哉問遊觀無漏智現前位現修盡無生智義可有耶答不可有此義也兩方若有此義者可論疏中遊觀無漏智現前位不現修盡無生智見若依之爾者設雖遊觀無漏智現前位何不現修盡無生智哉是以釋今論文斷惑解脫勝進道練根解脫勝進道雜修靜慮勝進道修通勝進道位隨其所應現修盡無生智見相例可同何況義辨二無礙解盡無生智為體見彼無礙解現起者豈非遊觀位盡無生智現修哉如何答斷惑練根等解脫勝進道位至所欣求之位有息求義故可現修盡無生智也遊觀位無此義故是釋品攝不現修盡無生智也是以見今論文釋聖起餘功德之偈頌文云若起所餘無漏功德靜慮攝者四法類智隨應現修無色攝者唯四類智隨應現修文此文更不云現修盡無生智光法師釋此文云問盡無生智此中何故不言現修解云此明遊觀無漏功德皆是釋性盡無生智息求非見故此不説文遊觀無漏智現前位不現修盡無生智云事論判解釋尤分明也但於斷惑等之四位現修盡無生智云例難者彼四位解脫道勝進道之中隨其所應有息求之義故現修盡無生智也遊觀不爾故不能現修之也次於盡無生智攝無礙解脫現前豈非遊觀位盡無生智現修哉云難者四礙解體何必可限遊觀功德哉若不限遊觀功德者義辨二無礙解設雖盡無礙智為體何可為違文哉尋云見光法師解釋答盡無生智此中何故不言現修之問作三解釋之中第二釋云又解盡無生智前已論故今者所明云起餘德文此釋意遊觀位盡無生智起不起如何答此釋意遊觀位盡無生智不現起之歟所以然者論上文於盡無生智現修位舉四所謂斷惑解脫道勝進道位是一位練根解脫道勝進道位是二位雜修靜慮勝進道位是三位修通勝進道位是四位盡無生智現修位分不過此四位此四位盡無生智現前位十智現修未來修相已説之故聖起餘功德者説前已説之外功德故此中不云盡無生智現修為言故此釋意不許遊觀位盡無生智現修之義也重難云上説盡無生智者彼二智十智之隨一故述斷惑練根雜修之通之四位被現修得修之相許也全無立盡無生智現起之一箇位而述彼位現未來修之相若爾何聖起餘功德者盡無生智餘功德可心得哉若如此了簡者四諦智法智類智現前位現未來修之相上已顯之了聖起餘功德者可云彼四諦智等外功德哉彼若不爾者是何爾哉答盡無生智雖十智隨一是四諦智法類智所成之一箇功德而不似四諦法類智非餘智所成故彼盡無生智上四位現修旨述畢即盡無生智現前位修智相顯畢此外指餘功德定可盡無生智外於四諦法類智者別非餘智所成一箇功德故餘功德之言不可云四諦法類智外功德也
