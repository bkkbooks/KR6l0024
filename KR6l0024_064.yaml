body:
  text: 俱舍論第二十一卷抄下問光法師依婆沙論評家意忍所得斷名遍知義如何釋之耶進云光法師釋云評家三十四云應作是説忍是智眷屬是智種類亦名為智斷是彼果故名遍知文付之依光法師解釋見婆沙論六十二所説述忍所得斷名遍知義云應作是説忍所得斷金剛喻定現在前時復能證故亦名智果乃至是故此斷亦名遍知文既云應作是説定知評家義云事忍是智眷屬故亦名智此忍所得滅亦名遍知者是一復次義也何以之云評家義哉答見婆沙論第三十四卷一段之文問修所斷斷是智果故可為説遍知見所斷斷既是忍果云何名遍知答此問有多義中舉一義云復有説者見所斷斷是無漏智士用果故亦名遍知金剛喻定現在前時通得三界見修所斷斷為阿羅漢果是故彼斷亦名遍知文難此師説云彼亦不應作如是説見道六遍知應非遍知故文以此難破之文思之第六十二卷云應作是説忍所得斷金剛喻定現在前時復能證故亦名智果是故此斷亦名遍知之義同今復有説者意故不正義云事炳然也次下云應作是説忍是智眷屬是智種族故亦名為智斷是彼果故名遍知知喬答摩種中生者名喬答摩此亦名應爾文既云應作是説亦無難此義明知評家正義云事若爾光法師今解釋尤叶婆沙論第三十四卷説也但於婆沙論第六十二卷文者見所斷斷惑云斷遍知或云理遍知或云捨遍知之三説中斷遍知云義是正義故且置應作是説之言也其斷遍知云義中亦分別邪正之時應作是説忍所得斷金剛喻定現在前時復能證故亦名智果謂金剛喻定是勝義沙門果由此定證得阿羅漢果時總證得三界見修所斷斷是故此斷亦名遍知者不正義也復次忍是智眷屬故亦名智此忍所得滅亦名遍知復次此斷既由智種族得故名遍知如瞿答摩種族所生名喬答摩者是正義也重難云寶法師釋今論或忍與智同一果故之文云同一果者有兩釋一無間解脫同一果故二忍所得者至不還阿羅漢果亦為智果亦為智果故應依後釋正理婆沙皆同有此釋文此釋意存忍所得斷得不還阿羅漢果時為智所證故名遍知義見如何答寶法師釋意或云無間解脫同一果故或云忍所得斷得不還阿羅漢果時為智所證故名同一果之二釋中解脫道不以斷為離繫果故以第二釋為正許也對忍是智眷屬故之義非云應依後釋全無相違也問超越證不還果聖者於五下結中先斷二結類歟答可云爾也兩方若先斷二結之類者超越證不還果聖者凡位斷欲貪嗔恚二結苦類忍位斷身見畢後至道類忍位斷戒禁取疑二結尤可先斷三結之人何云先斷二結之類哉若依之爾者見今論餘處二十四之釋不還果名五下結斷云雖必先斷或二或三然於此時總集斷故文今此或二之類者豈非超越證不還果聖者哉答超越證不還果聖者於五下結中可云先斷二結之類也故光法師餘處二十四解雖必先斷或二或三之論文云若超越人先斷貪嗔二結後斷身見戒取疑三結若次第人先斷身見戒取疑三結後斷貪嗔二結文但於疑難之旨者超越證不還果聖者以凡位所斷為一位以見道位所斷為一位論先斷後斷故可云先斷二結之類也見道是一觀相續速疾斷惑位也於此十五心中不可論先斷後斷故以身見不可屬先斷之類也問舊婆沙論意以九遍知如何分別忍果見道果耶進云光法師釋云良由舊婆沙四十八云幾是忍果答六幾是見道果答七文付之依光法師解釋見舊婆沙論三十三説上述幾是見道果者答曰七畢下云幾是忍果者應説如見道文若爾忍果六見道果七云事豈不背彼論定判哉答舊婆沙論其文雜亂其謬是多如光法師餘處一末云良由舊論時屬火焚遺文雜亂不引會釋也若爾光法師所覽恐非現行流布本歟但就現行本聊簡之者舊婆沙論文上云幾是見道果者答曰七述見道果有七之旨下云幾是法智分果者答曰六幾是比智分果者答曰五欲界見所斷結盡三遍知名法智分果上二界見所斷結盡三遍知名類智分果以見道位六遍知為忍果故取此文意云忍果有六遍知也私云舊譯云法智分果等當新譯云法智品果等也是即攝忍之言也重難云光法師引舊婆沙論云忍果六見道果七之釋背舊婆沙論現文云疑猶未被會通哉問光法師以九遍知分別根本靜慮果引婆沙論六十三二師説爾者今此二師説俱正義歟答前師説可非正義也進云光法師引今此二説畢判各據一義並不相違二説俱可正義見付之依根本地入見道者道類智現在前位必總集遍知故所得五下分結盡遍知也以色無色界見道斷遍知為根本靜慮果云前師説定可非正義是以寶法師以後説為正判如何答光法師所引婆沙論二師説中次第二第四及後三遍知為根本靜慮果云後師説為正義可云也其故依根本地入見道者第十六心證不還果位必總集遍知故得五下分結盡遍知名者諸論一同之決判也故今論中明成就一遍知云或先離欲從道類智未起色盡勝果道前唯成一遍知謂順下分盡述成就二遍知云先離色者從起色盡道至未全離無色愛前成下分盡色愛盡二超越證不還果聖者成就五下分結盡遍知見故光法師釋此文引正理論若依根本入正決定道類智時彼所有斷亦得順下分斷遍知名者寧許根本果唯有五遍知之文寶法師釋此文云準此論云或先離欲從道類智未起色愛盡勝果道前唯成一遍知謂五下分盡故知超越亦得五下分結盡遍知及禪根本果五中見道二修道三為正文何況今論中説捨五遍知云言捨五者謂先離欲後入見諦道類智時得下分盡捨前五故文寶法師釋此文云準上捨二捨五故知二論超越忍果亦得五下分結盡遍知前文言得六者據次第也又準此文俱舍正理皆云捨五或言捨二故知禪根本果見道二修道三為正文婆沙論中舉評家義云應作是説菩薩聖位決定不得色無色界見道所斷法斷遍知及色愛盡遍知總集遍知故無容修彼斷對治故文光法師引此文畢云見道是道諦總集斷故不得第六文寶法師引此文畢云準此評家依根本地得五下分結盡遍知集遍知故此即是婆沙評家以後説為正文引正理論云超越人若依未至捨五得一謂五下分結盡若依根本捨二得一謂五下分結盡畢云準此正理同婆沙評家亦以後説為正文引俱舍得捨中云超越人捨五得一謂五下分結盡遍知正理云應言依未至定捨五得一以依根本捨二得一故畢云準此俱舍評見道及忍果亦得五下分結盡遍知亦以後説為正此即是文憑何文意以前説亦得為正又於此時具二緣故定集遍知不應此時得第六遍知此即是理故知前師全無理趣文加之光法師引婆沙論六十三文明見道果忍果或云前六遍知或云前七遍知之二師説畢判其邪正作四解釋之中第三解云又解説六説七俱可為正説六據體説七亦據其名若次第者據得體説若超越不還雖非具得五下分結盡據得下分名説故亦説第七各據一義並不相違文第四解云又解説六説七俱可為正説六唯據次第説七通據超越文自判四釋邪正云雖有四解後二為勝就後二中後解為勝文既以超越證人見道果中取五下分結盡遍知云第四解為勝故準而思之婆沙論明根本靜慮果二師説中取五下分結盡遍知云後師説可為正義也但於光法師各據一義並不相違之進釋者婆沙論中述根本靜慮果雖有前師除第七遍知後師取第七遍知之二説論文不判正不故且據上會見道果二説相違第三釋意會其相違述前師所以説得第六不説第七據全得彼第六體故後師所以言得第七不言第六據能得彼第七名故且奪第六與第七名五下分中雖於欲界見修所斷不得遍知能斷上界見斷三結總相而言五中得三以少從多得第七名若作此解各據一義並不相違許也強探二説邪正之時以後師可為正義也尋云會見道果二説相違四釋之中第三釋有何過劣於第四釋哉答第三釋意依根本地入見道者就體見之得色無色界見道斷遍知云成故可背婆沙論評家義故劣於第四釋也重尋云會根本靜慮果二説相違之時何不述上第四釋意哉答次第證者無依根本地入見道義故根本靜慮果取色無色界見道斷遍知云前師説據次第證者云釋不可作也故前師云據體得第六遍知後師云據名得第七遍知之釋外不可有別會通故以之為盡理釋不作餘釋也重尋云會見道果二説相違四釋之中第三第四後二解意得第七遍知云義邊其意是同歟答第三第四差異者云説六據體云説六唯據次第許也得第七遍知同據得五下分結盡遍知名之義也故第三釋云若超越不還雖非具得五下分結盡據得下分名説故亦説第七第四釋云據總相説五中得三以少從多名為忍果也爰知見道取五下分結盡遍知之義邊兩釋所存其意是同歟問光法師釋根本靜慮果五遍知引婆沙論二師説爾者何師説耶進云光法師釋云俱舍説五或同婆沙前師或同婆沙後師文付之依光法師釋見今論所説述忍果有六遍知云謂三界繫見斷法斷六種遍知不舉五下分結盡遍知明知今論意同婆沙論前師以第二第四第六後二遍知為根本靜慮果云説云事若爾或同婆沙後師之釋意豈不背今論説哉答見今論文明根本靜慮果有五遍知不云何遍知故光法師釋俱舍説五或同婆沙前師或同婆沙後師文不別顯隨同無失也但於今論中述忍果有六遍知不舉五下分結盡遍知云難者依光法師正釋意者且據次第證者説若通據超越證者忍果取五下分結盡遍知有七可云也何況今論下段云言捨五者謂先離欲後入見諦道類智時得下分盡捨前五故超越證者道類智時得五下分結盡遍知云故同婆沙論後師説之旨分明也故今論前後文或據次第證者忍果不取五下分結盡遍知或據超越證者道類智時得五下分結盡遍知云故且作或同婆沙前師或同婆沙後師之釋也然而今論意遂同婆沙論後師説可得意也問尊者妙音意以五下分結盡遍知為根本靜慮果歟進云今論中述妙音師意云除順下分結盡遍知以五下分結盡遍知不為根本靜慮果也付之妙音師意許根本地道與欲界煩惱為斷對治五下分結盡遍知何非彼果哉是以彼師意許欲界見道三遍知為根本靜慮果五下分結盡遍知相例亦可同加之顯宗論中述彼師義云根本靜慮亦欲斷治故除色無色見道斷遍知道類智時總集遍知故以五下分結盡遍知為根本靜慮果如何答今論中依妙音師意明根本靜慮果中除五下分結盡遍知云除順下分結盡遍知以彼唯是未至果故無容修彼斷對治故文此文意云依根本地入見諦時不修未至地攝欲界修惑斷對治故不得五下分結中為其主欲界修所斷貪瞋二結無為故根本靜慮果中除五下分結盡遍知為言故光法師釋此文云依根本地起見道時無容修彼未至定中欲界修惑斷對治故所以順下分非根本果文正理論云所言八者尊者妙音説根本靜慮亦欲斷治故除順下分結盡遍知以彼唯是未至果故文婆沙論六十二云尊者妙音説此有八謂除第七文雜心論四云尊者瞿沙説有八除五下分結盡斷知是未至依果文此等諸論之説同今論意以五下分結盡遍知非根本靜慮果云也但於妙音師意許根本地道與欲界煩惱為斷對治云難者若未至地道不斷欲界煩惱根本地道可斷之故以根本地道望欲界煩惱容有斷對治功能故彼師意雖許根本地道與欲界煩惱為斷對治實非正斷對治故以五下分結盡遍知不為根本靜慮果也次於彼師意許欲界見道三遍知為根本靜慮果云例難者彼師意許根本地道與欲界煩惱為斷對治故依根本地入見道者未來修未至地斷對治道得欲界見斷三種遍知故以彼三遍知為根本靜慮果云也故今論云諸有先離欲界染者依根本地入見諦時於欲界繫見斷法斷許別道引無漏得故由此亦是彼見道果文光法師釋此文云欲界見斷三種遍知由此亦是彼根本地見道果故文次於顯宗論文者依根本地入見道者第十六心證不還果位捨前所得遍知名總集得五下分結盡遍知名故就名論之除色無色界見道斷遍知得五下分結盡遍知云也重意云今論等意依根本地入見道者第十六心證不還果位不得五下分結中為其主欲界修所斷貪嗔二結無為故根本靜慮果中除五下分結盡遍知顯宗論意據五中得三以少從多得第七名之義故根本靜慮果中取五下分結盡遍知也各據一義並不相違歟故光法師釋婆沙論六十三中云根本靜慮果前師除五下分結盡遍知後師取此之相違云前師所以説得第六不説第七據全得彼第六體故後師所以言得第七不言第六據能得彼第七名故且奪第六與第七名五下分中雖於欲界見修所斷不得遍知能斷上界見斷三結總相而言五中得三以少從多得第七名若作此解各據一義並不相違文任此解釋可會通之重難云今論許別道引無漏得故之文指未來所修未至地斷對治道云事不可然妙音師意許根本地見道與欲界見惑為斷對治若爾現起根本地見道設雖無所依道未來修有所作根本地斷對治見道可得欲界見斷三遍知也雖同根本地見道望現起道以未來所修道名別道也何況指未來所修未至地斷對治道哉答妙音師意以根本地道望欲界煩惱有斷對治者據容有義論之也理實而言根本地道不斷欲界煩惱故未來修未至地斷對治道得欲界見斷三遍知也根本地道既無斷欲界煩惱之義何修之得欲界見斷三遍知哉故勘正理論五十六文妙音師意難根本地果有五遍知云正義云豈不依止根本靜慮入見諦時亦修未來依未至地欲斷治道得斷治故亦應證彼欲見斷法斷無漏離繫得寧説根本唯得五果文以難文思彼師意依根本地入見道者未來修未至地欲界斷對治見道得欲界見斷三遍知云事自被知之也問論文云且由三緣立六忍果文爾者寶法師如何釋此文耶進云寶法師釋云其實忍果亦通第七文付之論文既云且由三緣立六忍果定可限見道位六遍知五下分結盡遍知由四緣立之何可判亦通第七哉是以光法師釋由三緣立見道六忍果泰法師釋亦以同之若爾寶法師今解釋豈不背論文哉答依根本地入見道人第十六心得不還果位得五下分結盡遍知故為顯第七遍知亦通忍果之義釋其實忍果亦通第七非無其謂也但於且由三緣立六忍果之論文者寶法師會之云據次第説故言忍六也次於光法師等釋者彼任論現文故會通同前重難云五下分結盡遍知由四緣立之前三緣外加越界緣也故論文云具由四緣立三智果謂於前三加越界故文若爾由三緣所立遍知中何可舉五下分結盡遍知哉答論文云且由三緣立六忍果述具由四緣立三智果六遍知許云忍果第七遍知偏名智果唯據次第證者論之故為顯超越證人忍果得五下分結盡遍知之義云其實忍果亦通第七也更非遮立五下分結盡遍知亦由越界緣之義也問寶法師意立五下分結盡遍知必可由越界緣耶答必可由越界緣也兩方若必由越界緣者超越證人凡夫位雖越欲界無得遍知立五下分結盡遍知何可由越界緣哉是以寶法師釋且由三緣立六忍果之論文云其實忍果亦通第七文若立五下分結盡遍知必由越界緣者由三緣遍知中寧可舉之哉若依之爾者論中明立後三遍知云具由四緣立三智果謂於前三加越界故文如此文者立五下分結盡遍知必可由越界緣見如何答立五下分結盡遍知必可由越界緣也故今論中或云具由四緣立三智果謂於前三加越界故文或云越界得果故二處集遍知文正理論五十六中或云若越界時四緣方具隨應彼斷得遍知名文或云唯於二處具足二緣謂得果時亦即越界故阿羅漢及不還果集所得斷立一遍知爾時總起一味得故文顯宗論説全亦同之加之婆沙論六十二云離彼第九品染無間道滅解脫道生時名滅雙因先滅八品因今滅第九品因故亦離俱繫先離八品繫今離第九品繫故既得無漏離繫得及缺有頂諸遍行並永度欲界具五緣故彼所斷及前斷名第七遍知謂五順下分結盡遍知文雜心論四云得果及度界二處斷知集文任此等論判立五下分結盡遍知必由越界緣云事炳然也設雖寶法師意可背諸論誠説哉但於超越證人凡夫位雖越欲界無得遍知云難者凡夫位雖有越界緣無得無漏斷得及缺第一有緣故不立遍知也次於寶法師其實忍果亦通第七之釋者忍果遍知不限見道位六遍知若據超越證者亦通第七五下分結盡遍知為言故釋具由三緣立六忍果之論文會其實忍果亦通第七據次第説故言忍六解具由四緣立三智果謂於前三加越界故之論文引婆沙論應作是説菩薩聖位決定不得色無色界見道所斷法斷遍知及色愛盡遍知總集遍知故無容修彼對斷治故之文畢問準此第七亦有忍果因何但言忍果六也答建立門唯據次第故言智果三忍果六也案此等釋意只欲成五下分結盡遍知亦通忍果之義更非謂不由越界緣全無相違重難云若立五下分結盡遍知必由四緣者何故論中難雜心師立離俱繫緣云此離俱繫與雙因及越界緣用無別故哉準而思之立五下分結盡遍知之時滅雙因緣與越界緣用無有別明知立五分結盡遍知不必由四緣云事是以寶法師釋越界緣云修道煩惱不緣此故修道遍知以染不染無為為體雖斷雙因等由有同類煩惱未斷斷相不顯不立遍知文而滅欲界修惑雙因之時於欲界煩惱中無有未斷之類滅雙因外何可立越界緣哉答就欲界論之者滅修惑雙因之時於欲界煩惱中無有未斷之類故滅雙因外立越界緣雖似無其用就色無色界見之者各滅下三地雙因之時未越界故越界緣外立滅雙因也色無色界既如此故欲界之中滅雙因外立越界緣也問苦智已生集智未生位可具得無漏斷得緣耶答可具得無漏斷得緣也兩方若具得無漏斷得緣者披光法師解釋云此先離欲至苦類智集法忍時雖復已得見苦所斷無漏斷得見集所斷無漏斷得猶未成故不立遍知文如此釋者苦智已生集智未生位不具得無漏斷得緣見若依之爾者苦智已生集智未生位於見苦所斷煩惱離繫已得無漏得豈不具得無漏斷得緣哉答苦智已生集智未生位於見苦所斷煩惱離繫已得無漏得故可具得無漏斷得緣云事道理炳然也故見光法師解釋云若聖位中至苦類忍現行以前雖有已得無漏斷得即是次前苦法智時無漏斷得未缺有頂未滅雙因文此釋意云入聖之後至苦類忍現行以前位有苦法智時無漏離繫得故雖有得無漏斷得緣未有頂滅雙因之二緣故不立遍知為言但於光法師此先離欲至苦類智集法忍時等之釋者於所斷煩惱離繫未得無漏得位不具得無漏斷得緣故不立遍知云也重意云先離欲人至苦類智集法忍位於已斷苦諦所斷煩惱離繫雖得無漏得於已斷集諦所斷煩惱離繫未得無漏得故無漏斷得緣闕不立欲界見苦集斷遍知為言欲界見苦集所斷煩惱離繫合立第一遍知故也問婆沙論六十二中云集法智忍滅集法智生時名滅雙因文光法師引此文作二解釋爾者初釋意如何釋之耶進云光法師釋云解云滅謂滅入過去生謂體現在前非生滅相文付之依光法師初釋披婆沙論六十三現文述九遍知得捨云集法智忍滅集法智生時無捨得一乃至道類智忍滅道類智生時若未離欲染入正性離生者亦無捨得一若已離欲染入正性離生者捨五得一文而得捨據得論之定知集法智忍滅集法智生時者集法忍現在前集法智在未來生相位云事如何答今論至苦類智集法忍位雖亦缺有頂猶未滅雙因未滅見集斷諸遍因故之文集法忍現在前位未滅雙因見故光法師以此論文對婆沙論集法智忍滅集法智生時名滅雙因之説解其相違作二釋中初釋意任今論文會婆沙論説集法忍滅入過去云集法智忍滅集法智現在前云集法智生釋也但於疑難之旨者第二釋聊簡之趣也初釋意異之滅者滅入過去生者體現在前得意也生滅之言有二義邊故光法師作二解釋俱有其謂也問婆沙論意集法忍現在前位云第一遍知緣悉具之忍歟答可有二義邊也兩方若悉具之者集法忍現在前位於集法忍所斷煩惱非已斷不成就立第一遍知緣何悉具之哉是以婆沙論中明苦法智忍乃至集法智忍位不成就遍知云四緣五緣俱未具故文如此文者集法忍現在前位立第一遍知緣不悉具之見若依之爾者光法師解今論至苦類智集法忍位雖亦缺有頂猶未滅雙因之文對婆沙論集法智忍滅集法智生時名滅雙因之説作論各別之釋如此釋者婆沙論意集法忍現在前位立第一遍知緣悉可具之見如何答集法忍現在前位立遍知緣不悉具之故不立遍知云事俱舍婆沙兩論一同之義也故今論云至苦類智集法忍位雖亦缺有頂猶未滅雙因未滅見集斷諸遍行因故文婆沙論中明九遍知成就不成就相云不成就者謂苦法智忍乃至集法智忍位此五心頃於見修道九種遍知皆未成就四緣五緣俱未具故文但於光法師論意各別之釋者今論意集法智位雙因煩惱非得現在前彼煩惱不成就時得滅雙因為言婆沙論意集法忍位雙因煩惱非得在生相彼煩惱得不可續起之義決定故滅雙因在生相得滅雙因云也非謂云爾故集法忍位建立遍知歟重難云婆沙論意集法忍位得滅雙因者何云四緣五緣俱未具故不立遍知哉答正具四緣事集法智位也所斷煩惱已斷不成就於彼無為得無漏得現在前時具足諸緣建立第一遍知也集法忍位彼煩惱得現在前未滅雙因故不立遍知也重意云依集法忍力彼煩惱非得生相起故且具滅雙因釋許也實不成就滅雙因故其緣不具不立遍知也重難云俱舍婆沙兩論意同集法忍位不立遍知者何云論意各別哉答集法忍位不立遍知事兩論意雖同今論意彼所斷煩惱已斷不成就位云缺有頂云滅雙因婆沙論意正斷彼煩惱位云缺有頂云滅雙因是其兩論意各別也故光法師釋云又解論意各別俱舍據不成名缺不成名滅婆沙據斷名缺據斷名滅若作此解生謂生相滅謂滅相文文意顯也問論中敘雜心師説云有立離俱繫亦是一緣故立遍知緣總有五種文爾者論主意如何破此義耶進云今論中破此義云此離俱繫與滅雙因及越界緣用無別故文付之滅雙因者廣亙相應俱有離俱繫者只由惑品能繫其義既異何難用無別故哉是以見光法師解釋云能起名因能縛名繫文加之披婆沙論文三緣之外別舉離俱繫緣若爾論主意有何深由背本論所説可難用無別故哉答以離俱繫緣對滅雙因及越界難用無別故之意者理實而言能起名因能持名界能縛名繫故雖三用異以用從體之時煩惱一體有此三義故難用無別故也故光法師釋此文云此離俱繫與滅雙因及越界緣用無別故理實而言用亦有別言無別者以用從體故言無別繫體狹唯是隨眠因體界體寬亦通餘法言因言界亦攝繫故雖復能起名因能持名界能縛名繫三義有異繫無別體而不別説文但於婆沙論中三緣之外別舉離俱繫緣云難者體用別論之時離俱繫緣與滅雙因及越界緣其用異故三緣之外別立離俱繫緣無其過也重難云雖諸越界位皆滅雙因四靜慮及四無色中各滅下三地雙因之時非皆越界故滅雙因外別立越界緣者雖諸越界位皆離俱繫四靜慮及四無色中各離下三地俱繫之時非皆越界故越界緣外何別不立離俱繫緣哉答此離俱繫與滅雙因及越界緣用無別故者離俱繫緣與滅雙因及越界緣相對判其同異之時四靜慮及四無色中各滅下三地雙因之外各離下三地俱繫之義不可有滅第四靜慮雙因越色界滅非想非非想處雙因越無色界之外離第四靜慮俱繫離非想非非想處俱繫之義不可有故滅雙因及越界緣外不可立離俱繫緣云也重意云及越界緣用無別故者就色界越無色界位論之也滅雙因及越界緣取合為一方此外不可有離俱繫之義為言非謂離俱繫與越界緣相對寬狹是同也問正理論意以五下分結盡遍知為根本靜慮果歟答可為根本靜慮果也兩方若為根本靜慮果者披光法師所引正理論五十六文問若依根本入正決定道類智時彼所有斷亦得順下分斷遍知名者寧許根本果唯有五遍知答唯色無色界見斷法斷得彼遍知名故無有失重問何緣唯此亦得彼名答又先俗道所斷下分今聖道力令永不生故彼所得斷假説為此果今實不得欲斷遍知今兩重問答意無諍五下分結盡遍知實非根本靜慮果見若依之爾者婆沙論六十三評家意許菩薩得五下分結盡遍知明知以五下分結盡遍知為根本靜慮果云事若爾正理論意豈可背婆沙論評家義哉答正理論意以五下分結盡遍知為根本靜慮果可云也故寶法師引正理五十六得捨中云超越人若依未至捨五得一謂五下分結盡若依根本捨二得一謂五下分結盡畢云準此正理同婆沙評家亦以後説為正及許見道忍果得五下分結盡遍知也文正理論意以五下分結盡遍知為根本靜慮果之旨此釋炳然也但於光法師所引正理論兩重問答之文者理實而言依根本地入見道人道類智位總集斷故雖得五下分結盡遍知一不得欲界修所斷貪嗔二結無為之為其主二於五下分結盡無漏離繫得不具得故且云今實不得欲斷遍知也故光法師釋唯色無色見斷法斷得彼遍知名故無有失之文云於彼遍知唯得少分上界見斷法斷為下分盡遍知一則不得其主二則得不具足故不説也文重難云勘正理論五十六文雖述先離欲染依未至定入見諦者道類智忍時捨五遍知依根本地入見諦者道類忍時捨二遍知之旨未云得一遍知寶法師加得一之言引為證據事難思哉答今論述捨五遍知云言捨五者謂先離欲後入見諦道類智時得下分盡捨前五故文正理論五十六中難此文云又應簡言依未至定入見諦者若依根本入見諦者於欲界斷不得無漏離繫得故不得欲界見斷法斷三種遍知非先不得可言今捨文此難破意今論云得下分盡捨前五故之處許之可云先離欲染依未至定入見諦者若依根本地入見諦者道類忍時捨二遍知故破事得五下分結盡一遍知之義許之故任決定容有之理寶法師加得一之言引為證據也故光法師難正理論今文云又云應簡言者亦不須簡言捨前五顯依未至若依根本即捨二得一文問於第四靜慮煩惱離繫未得無漏得位可得色受盡遍知耶答不可得色愛盡遍知也兩方若得色愛盡遍知者既於第四靜慮煩惱離繫未得無漏得位也何可得色愛盡遍知哉是以於非想非非想處煩惱離繫未得無漏得位無得一切結盡遍知相例可同若依之爾者光法師所引婆沙論六十三中述已離色染入正性離生者得色愛盡遍知位舉評家義云應作是説彼定從果起勝進道現在前時方乃得此色愛盡遍知文此文意從果起勝進道初得色愛盡遍知見知於第四靜慮煩惱離繫未得無漏得位得之云事如何答以色界一切修所斷煩惱離繫雖為色愛盡遍知體離第四靜慮下下品修所斷煩惱之時於彼色界一切修所斷煩惱離繫立色愛盡遍知名故於第四靜慮煩惱離繫未得無漏得位不可云得色愛盡遍知也故婆沙論六十二中述評家義云應作是説色界一切修所斷結盡皆是色愛盡遍知然斷下下品結時得遍知名先時不立色愛盡遍知名也但於婆沙論文者正得色愛盡遍知名雖斷第四靜慮下下品修惑位以色界一切修所斷煩惱離繫為色愛盡遍知體故舉於色界修所斷煩惱離繫得始無漏得云彼定從果起勝進道現在前時簡道類智時得色愛盡遍知等云異師説也問退位捨遍知唯限起惑退位歟答唯可限起惑退位也兩方若唯限起惑退位者未離色染退法種姓人修練根作思法種姓離色界染之後起無覆無記心退思法種姓之時可捨色愛盡遍知何唯限起惑退位如何答廣勘俱舍正理五十六顯宗二十八婆沙六十三雜心四等諸論説尋遍知捨緣述退位捨遍知唯舉起惑退位定知種姓退時不捨遍知云事但於疑難之旨者未離色染退法種姓聖者修練根作思法種姓離色界染之後起無覆無記心退思法種姓之時可得退法種姓所攝未曾得色界煩惱能治無漏道故於色界修惑離繫得無漏得故不可捨色愛盡遍知也重難云見婆沙論百八十六文云諸未曾得聖道唯勝進時得故得未曾得聖道唯限勝進時何云種姓退時得退法種姓所攝色界煩惱能治無漏道哉答退法種姓所攝色界煩惱能治無漏道望其時體見之實雖未曾得劣種姓所攝無漏道故其分齊不超曾得類故種姓退時得之更無相違也此事委細之旨第二十五卷抄記録之畢可引見之問聲聞乘人證阿羅漢果時捨一種遍知義可有耶答不可有此義也兩方若有此義者當論疏中不見有此義哉若依之爾者婆沙論九十中問若已離第三靜慮染第二靜慮及下三地信勝解練根作見至彼不起後向命終往生第四靜慮以上諸地彼成就何樂根答此問云彼於上地若得自在當練根時亦能修上無漏樂根文此文意於上地得自在人練根之後不起勝果道可有生上界之義見若爾今此人證阿羅漢果之時唯可捨五下分結盡遍知也如何答見今論文云言捨二者謂諸不還從色愛盡起欲纒退及獲得阿羅漢時證阿羅漢果時捨五下分結盡色愛盡二種遍知見故不可有捨一種遍知之義也正理五十六顯宗二十八婆沙六十三雜心四等諸論説其意同之但於婆沙論文者於上地得自在者成就上地果道所攝無漏樂根故不可違定成樂根之説云許也非不許必起勝果道之理歟問正理論意獨覺於凡位所斷下三靜慮惑上必起勝果道云義引何文證之耶進云正理論五十六云説聖者生第四靜慮以上諸地定成樂根及説聖者生於無色定有色貪盡斷遍知得故文付之獨覺無有生上界義何以今文證此義哉答獨覺雖無生上界義聲聞於凡位所斷惑上必起勝果道云事本論中説聖者生第四靜慮以上諸地定成樂根故以之為證也而正理論五十六中云謂聲聞獨覺無自在功力能超間起諸對治道欲證後道必藉前道以為加行方能證故二乘同有欲證後道必藉前道之義故準聲聞於凡位所斷惑上必起勝果道證獨覺亦於凡位所斷惑上必起勝果道之義也問已離第三靜慮染依下地修練根者必可起勝果道耶答可有二義也兩方若必起勝果道者婆沙論九十中已離第三靜慮染依下地修練根者於上地得自在當練根時能修上無漏樂根於上地不得自在得果已必起勝果道修上無漏文取意如此文者於上地得自在者不必起勝果道見若依之爾者寶法師餘處解釋中引婆沙論百二十二百三十二百三十四有漏道證不還果聖者生無色界云不必起勝果道之二説畢自判正不云今詳二説後説為正文準此釋思之已離第三靜慮染依下地修練根者必可起勝果道也如何答此事雖有學者異義且可存必起勝果道云義也其故見光法師所引正理論五十六文云謂聲聞獨覺無自在功力能超間起諸對治道欲證後道必藉前道以為加行方能證故二乘聖者無自在功力欲證後道必藉前道故已離第三靜慮染依下地修練根者必起勝果道可生上界也是以寶法師所引婆沙論六十三中已離第三靜慮染依下地入正性離生道類智時得第三果者必起勝果道生第四靜慮或無色界見準得果思練根其義可同何況疑難之中所被出寶法師餘處今詳二説後説為正之釋亦其潤色也但於婆沙論文者見彼一段問答問若已離第三靜慮染依第二靜慮及下三地信勝解練根作見至彼不起後向命終往生第四靜慮以上諸地彼成就何根答之彼於上地若得自在當練根時又能修上無漏樂根者當練根時得果道攝無漏樂根故不可違本論聖者生遍淨以上決定成就無漏樂根云説云也非謂云爾故不起勝果道有上生義只先顯成就果道攝無漏樂根之義許也設於上地不得自在彼得果已亦必起勝果道修上無漏然後命終者於上地不得自在者練根時得果已亦必起勝果道故不可違本論説為言亦必起勝果道之亦言於上地得自在者起勝果道之旨自所聞也是故聖者生遍淨土決定成就無漏樂根成就喜根準此應知者結釋上義也如此聊簡一段論文之時全無相違也重難云婆沙論百六十九中述聖者生無色界必成就無漏四靜慮云其信勝解練根作見至者有説彼得果已必起勝果道修無漏四靜慮然後命終生無色界有説彼練根時即亦修上無漏靜慮是故無過文此第二有説意同第九十卷文有學聖者依下地修練根時得上地果道無漏四靜慮者雖不起勝果道生無色界見必起勝果道云義豈不背此文哉以此文還思第九十卷説彼於上地若得自在當練根時亦能修上無漏樂根者於上地得自在者當練根時得修上地無漏樂根雖不起勝果道可生第四靜慮以上諸地見會通之旨更不叶文哉答婆沙論二説非相違義第二有説意於上地得自在者當練根時亦得修上地果道攝無漏靜慮之旨顯許也全非遮必起勝果道之理也第九十卷文會通之趣如前成之又有別義如十講抄可引見之問正理論意麟喻獨覺於下三靜慮修惑離繫可得無漏得耶答不可得無漏得也兩方若得無漏得者麟喻獨覺是最上利根人依第四靜慮所起聖道也於下三靜慮修惑離繫何可得無漏得哉若依之爾者披正理論五十六文云諸有先離無所有染入聖道者唯除菩薩餘亦定於二界一切修斷離繫得無漏得彼皆必於二界修斷自果勝道遍現在前文光法師釋此文云謂如先離八地染者隨依何地得不還已必於七地一一品中皆起無間及解脫隨何品道起得彼離繫得文任此等定判麟喻獨覺於下三靜慮修惑離繫得無漏得見如何答二乘無有超越功力欲證後道必藉前道以為加行故麟喻獨覺依第四靜慮於凡位所斷七地修惑一一品中雖起無間解脫二道第四靜慮無漏道非下三靜慮對治道故於下三靜慮修惑離繫不得無漏得也是以婆沙論百五十八云初靜慮見修所斷法無漏離繫得三地攝第二靜慮見修所斷法無漏離繫得四地攝第三靜慮見修所斷法無漏離繫得五地攝文但於正理論文者凡位離無所有處以下煩惱入見道後於色無色界下七地已斷修惑上起勝果道事亘麟喻部行聲聞之三類其中麟喻依第四靜慮起勝果道故下三靜慮修惑離繫雖不得無漏得餘部行及聲聞隨其所應於下三靜慮修惑離繫得無漏得故總見此三類云二界一切修斷離繫得無漏得也光法師必於七地一一品中皆起無間及解脫道隨何品道起得彼離繫得之釋準之可會也非謂麟喻獨覺於下三靜慮修惑離繫得無漏得全無相違也問光法師意麟喻獨覺可得色愛盡遍知耶進云光法師釋云以此準知獨覺亦得色愛盡遍知文付之麟喻獨覺依第四靜慮一生成覺之人也何可起下三靜慮能治道得無漏離繫得哉若不得下三靜慮無漏離繫得者如何亦可得色愛盡遍知哉是以婆沙論中明獨覺學位成就遍知云部行喻者如聲聞説麟角喻者如菩薩説文而菩薩不得色愛盡遍知者婆沙論評家義也明知麟喻獨覺不得色愛盡遍知云事如何答見正理論五十六文云諸有先離無所有染入聖道者唯除菩薩餘亦定於二界一切修斷離繫得無漏得彼皆必於二界修斷自勝果道遍現前故唯除菩薩餘二乘人凡位離無所有處煩惱入見道者於凡位所斷色無色界下七地修惑上必起勝果道云故麟喻獨覺可得色愛盡遍知也故光法師引此文畢云應言獨覺極速疾者一百六十心取果一百五十九是向一心是果向中唯得不還不聞更得餘果以此準知獨覺亦得色愛盡遍知文但於麟喻獨覺依第四靜慮一坐成覺故不可起下三靜慮能治道得無漏離繫得云難者光法師所引正理論中云謂聲聞獨覺無自在功力能超間起諸對治道欲證後道必籍前道以為加行方能證故二乘聖者無自在功力欲證後道必籍前道故先起下三靜慮勝果道為加行可起第四靜慮以上勝果道故依第四靜慮擬擬起下三靜慮勝果道故可得色愛盡遍知也重意云依第四靜慮起之故下三靜慮修惑離繫實雖不得無漏得既起下三靜慮勝果道故有無漏離繫得成得色愛盡遍知云也次於婆沙論麟角喻者如菩薩説之文者麟喻獨覺見道位不得欲界三遍知及色無色界見道斷遍知事同菩薩故徒多分云如菩薩説也見婆沙論處處之文置如言讓之置亦爾言例之就大旨論之常事也始不可疑之歟重難云依第四靜慮起下三靜慮勝果道云事甚難思上地無漏道非下地能治云事性相之所定也何可有此義哉以此理思之彼皆必於二界修斷自勝果道遍現前故者第四靜慮聖道無間起下三靜慮有漏心畢其後從初靜慮次第容起下三靜慮勝果道也麟喻獨覺一百六十心成覺者就無漏心論之也次會婆沙論麟角喻者如菩薩説之文事不可然其義全同之時豈如言也就大旨置如言云事尤以有疑其例證亦在何處哉答上地無漏道非下地能治云事非始所諍性相之所定是必然也今就擬擬道依第四靜慮起下三靜慮勝果道云也例如得果位擬擬修前品無間解脫道也次麟喻獨覺一百六十心中間起有漏心云義不可然婆沙論中外國諸師菩薩學位得滅盡定三十四念中間起滅盡定入出心云義迦濕彌羅國毗婆沙師意破不許之此亦可爾哉次就大旨置如言置亦爾言事其例非一如彼婆沙論九十一中或云眼根滅緣識所增隨眠等無間生十部心緣緣識所增隨眠等無間生十五部心例云信等五根滅緣識及緣緣識所增隨眠亦爾或云成就眼根乃至信等五根斷斷道者諸結所結乃至諸纒所纒亦如前成就意根滅者説等也聖禪僧都今按義云麟角喻者如菩薩説者就前七遍知論之也以何知之者見婆沙論一段之文上云部行喻者如聲聞説麟角喻者如菩薩説畢下初問菩薩聖位決定不得色無色界見道所斷法斷遍知及色愛盡遍知文若菩薩不得色愛盡遍知云事自本定置者何始可發此問哉明知菩薩不得色愛盡遍知云事上未定置也故讓如菩薩説就前七遍知論之也重意云上文若云菩薩不得色愛盡遍知畢讓麟角喻者如菩薩説者此文實為難會而上未述菩薩不得色愛盡遍知之旨故就前七遍知云如菩薩説被得意也重難云麟角喻者如菩薩説者就前七遍知論云事猶未取信見婆沙論文問獨覺學位為成就幾答麟角喻者如菩薩説泛就獨覺學位所成就遍知問答之也何云狹就前七遍知論之哉答麟角喻者如菩薩説者就前七遍知論之故獨覺得不得色愛盡遍知婆沙論中不見故光法師引婆沙論六十三應作是説菩薩聖位決定不得色無色界見道所斷法斷遍知及色愛盡遍知等之文畢問獨覺云何答應如超越聲聞依根本者説也若婆沙論文獨覺得不得色愛盡遍知分明見者何可及光法師私問答哉爰知麟角喻者如菩薩説者就前七遍知論之云事問菩薩可得不還果耶答可有得不得二義邊也兩方若得不還果者菩薩經三祇百劫修行所欣求無上菩提也更不可云得下劣不還果哉是以光法師明獨覺相雖述向中唯得不還全不云菩薩得不還果哉若依之爾者披婆沙論處處之文菩薩可得不還果見如何答思此事可有二義門也若據超越聲聞得不還果之位云之者菩薩道類位得不還果可云也菩薩道類智位總集所得無為得五下分結盡遍知事具越界得果二緣故也其得果緣者豈非得不還果哉是以見婆沙論處處之文或六十三評家意破僧伽筏蘇菩薩道類智位得色愛盡遍知云義云無一念頂得果向故文云其得果是亦不還果也或六十六有餘師意述不還阿羅漢二果名實義果云謂後二果一切聲聞獨覺大覺皆證得故文或百五十三明菩薩名滿學者云此依根滿果滿而説不説定滿斯有何過文此等論文菩薩得不還果云事分明也若據四向四果之階級論之者菩薩是一向一果之人故不可云得不還果故光法師釋麟喻獨覺得色愛盡遍知云應言獨覺極速疾者一百六十心取果一百五十九是向一心是果向中唯得不還不聞更得餘果文麟喻既如是菩薩例可同重意云麟喻獨覺亦一向一果之人故總標向中當超越聲聞得不還果之位故云得不還也菩薩例之一向一果之人故不可云得不還果也大有此二義門故兩方疑難更非相違也問可有捨四種遍知義耶答不可有此義也兩方若有此義者今論中述捨一二五六無此義見若依之爾者披光法師所引婆沙論六十三文云根本靜慮果有二師説中前師意以第二第四第六及後二遍知為根本果以五下分結盡遍知不為根本果見若爾依根本地入見道人離色界染可成就色無色界見苦集斷遍知見滅斷遍知見道斷遍知色愛盡遍知四種今此人證阿羅漢果位可捨四種遍知也如何答設雖何論意不可有捨四種遍知之義也彼依根本地入見道人第十六心證不還果位總集色無色界見苦集斷見滅斷二種遍知得五下分結盡一種遍知故今此人證阿羅漢果位可捨五下分結盡色愛盡二種遍知也故今論云言捨二者謂諸不還從色愛盡起欲纒退及彼獲得阿羅漢時文正理論五十六文顯宗論二十八説全亦同之婆沙論六十三云離非想非非想處第九品染金剛喻定滅初盡智生時捨二得一謂捨五順下分結盡及色愛盡遍知得一切結盡遍知文雜心論四云得阿羅漢果捨二文任此等諸論説證阿羅漢果位捨五下分結盡色愛盡遍知云故不可有捨四種遍知之義云事炳然也但於婆沙論前師意以第六遍知為根本果以五下分結盡遍知不為根本果云難者前師意據得其體論之故根本果取色無色界見道斷遍知不取五下分結盡遍知也若據得其名云之總集色無色界見苦集斷見滅斷二種遍知得五下分結盡遍知名云事自本所許之故全非相違也故光法師會今此二説相違云前師所以説得第六不説第七據全得彼第六體故後師所以言得第七不言第六據能得彼第七名故且奪第六與第七名五下分中雖於欲界見修所斷不得遍知能斷上界見斷三結總相而言五中得三以少從多得第七名若作此解各據一義並不相違文問根本地攝不還果聖者捨五下分結盡遍知唯限得一切結盡遍知位歟答可有二義也兩方若限彼位者捨五下分結盡遍知非一準何可限彼位哉若依之爾者以道理思之尤可限彼位也是以婆沙論中可限彼位見如何答就顯性相云之者根本地攝不還果聖者者是超越證不還故不可有退果之義故捨五下分結盡遍知唯可限得一切結盡遍知位也但退法種姓人預流一來果位修練根作思法種姓之後離欲界染第九解脫道位入根本地證不還果者可名根本地攝不還果聖者若爾今此人退思法種姓之時依退位不得未曾得聖道云義意者退法種姓所斷欲界煩惱能治無漏道其體未曾得種姓退時不可得之故退不還果可捨五下分結盡遍知歟若存此位結構今論義者退位得不得未曾得聖道者古來學者之異義也審定後可會通之歟問已離色染聖者修練根時可捨色愛盡遍知耶答可有二義也兩方若捨色愛盡遍知者已離色染聖者修練根時成就色界修惑離繫何可捨色愛盡遍知哉是以今論等中述遍知得捨之時不云彼位捨色愛盡遍知哉若依之爾者彼位既於色界修惑離繫捨無漏得不還得之定知可捨色愛盡遍知也如何答云此事雖有學者二義且可存不捨色愛盡遍知云義也其故廣勘俱舍正理五十六顯宗二十八婆沙六十三雜心四等諸論説尋遍知捨緣不過起惑退及勝進二位所謂一退煩惱捨無為位退時捨是也二得異名失本名時捨是也而已離色染聖者修練根時非捨無為亦不失本名何可捨色愛盡遍知哉但於彼位既於色界修惑離繫捨無漏不還得之定知可捨色愛盡遍知云難者修練根得勝種姓時於色界修惑繫自本有有漏得故不捨彼離繫雖捨劣種姓無漏得勝進位故有無漏得成不捨色愛盡遍知可云也彼光法師餘處二十四解唯得靜慮利果聖道上惑離繫應皆不成之論文云於八地中下五離繫可言有無漏得上三無色煩惱離繫應皆不成文任捨果勝果道唯得果道故之理於四靜慮煩惱離繫實雖不得無漏得得果道攝無漏故於四靜慮煩惱離繫有無漏得成三下五離繫可言有無漏得也加之光法師餘處述分離有頂地染修練根時於有頂地煩惱離繫雖無有漏無漏得彼地煩惱不成就故引正理論云此二雖無煩惱斷得而勝進故遮惑得生文準此等釋思之已離色染聖者修練根時於色界修惑離繫雖無無漏得勝進位故不捨色愛盡遍知可云也問起已斷煩惱退不還果時必可捨色愛盡遍知耶答不必捨之也兩方若必捨之者婆沙論中不必捨之見若依之爾者既起已斷煩惱退不還果時也必可捨色愛盡遍知是以起已斷煩惱退阿羅漢果時必捨一切結盡遍知見例可同如何答見婆沙論六十一文云問退阿羅漢果位預流果時名退不還一來果不答亦名退彼所以者何住彼下故如人從彼第三層舍隨至于地彼人亦説隨初二層此亦如是文任此文阿羅漢果聖者起欲界修所斷前八品煩惱隨其所應退住預流一來二果時可云退不還果也若爾證阿羅漢果時已捨色愛盡遍知故此時不可云捨色愛盡遍知故起已斷煩惱退不還果時不捨色愛盡遍知之義可有也但於起已斷煩惱退阿羅漢果時必捨一切結盡遍知云例難者起已斷煩惱退阿羅漢果時無先捨一切結盡遍知之義故退阿羅漢果時必捨一切結盡遍知也問光法師所引婆沙論中述有説意依六地道類忍滅道類智生時捨五遍知得五下分結盡遍知文爾者今此有説意同誰人義耶進云光法師釋云前師非正同妙音故文付之依光法師解釋披婆沙論六十三所説述尊者妙音説此有八謂除第七妙音師意根本靜慮果除五下分結盡遍知定知依後五地道類忍滅道類智生時得五下分結盡遍知云有説意不同妙音師義云事如何答妙音師意依後五地見道現在前時修欲界斷對治道得欲界見所斷結盡三遍知定故今論中述妙音師義云所言八者尊者妙音説根本地亦與欲界諸煩惱等為斷對治諸有先離欲界染者依根本地入見諦時於欲界繫見斷法斷許別道引無漏得故由此亦是彼見道果文爰知婆沙論有説意依後五地道類忍滅道類智生時捨五遍知者同妙音師義云事光法師釋前師非正同妙音故後五亦修欲斷對治尤有其謂也但於婆沙論中述尊者妙音説根本靜慮果除五下分結盡遍知云難者依根本地入見道人第十六心位若據得其體云之以色無色界見道斷遍知為其果除五下分結盡遍知若據得其名論之以五下分結盡遍知為其果除色無色界見道斷遍知是據邊邊義門更非相違二説也故光法師會婆沙論二師説云前師所以説得第六不説第七據全得彼第六體故後師所以言得第七不言第六據能得彼第七名故且奪第六與第七名五下分中雖於欲界見修所斷不得遍知能斷上界見斷三結總相而言五中得三以少從多得第七名若作此解各據一義並不相違文正理顯宗兩論雖同一師所造明根本靜慮果之時正理論五十六云除順下分結盡遍知顯宗論二十八云除色無色見道斷遍知非相違義云事以之可知也故婆沙論中述尊者妙音義根本靜慮果除五下分結盡遍知之文且據得其體之門故全非相違也問染汚心不現在前位可有退煩惱義耶答可有二義也兩方若有此義者婆沙論六十一中述評家義云要起煩惱現在前時乃成退失勝功德故見光法師解釋或至現在名退云釋為勝明知染汚心不現在前位不退煩惱云事若依之爾者婆沙論六十四中明異生位無分離染命終義云彼命終心勢力劣故先所斷結已得成就文如此文者離染異生住無覆無記心命終之時豈先所斷結已得成就之義哉答此事雖有學者異義且可存染汚心不現在前位不退煩惱云義也其故見婆沙論文述評家義云要起煩惱現在前時乃成退失勝功德故此説退位文勘光法師處處之釋當卷解言得一者及從無學起色纒退言得二者謂從無學起無色界諸纒退時之論文作或至彼品善得不至生相將現在前名退如得捨門據將説故又解不可皆例齊之二釋畢難初釋成後解云文中既言起纒明知或至現在名退或至生相現在猶成彼品善法何名得退後解為勝文餘處二十三釋退必起過之論文云退必起過起惑退故文任此等定判染汚心不現在前位不退煩惱云事甚分明也但於婆沙論彼命終心勢力劣故等之分者分離染異生住無覆無記心欲命終時由命終心勢力微劣命終心以前位起煩惱退先所斷結故異生位無分離染命終者也重難云會彼命終心勢力劣故等之文事不可然今文意命終心勢力微劣故彼位即退起先所斷結見何云命終心以前位退起之哉是一何況正理論餘處中明異類心所起得云勝無記心現在前故得諸染法文泰法師餘處引此文作二釋第二釋云又解退起欲界身邊二見有覆無記心現在前故得諸染汚不善法此即有覆無記心異不善得文初釋意異之豈非無覆無記心現在前位得染汚法哉是二加之勘婆沙論五文云退者多起煩惱現前文以多言思之少分染汚心不現在前位可有退煩惱義見是三如何答分離染異生欲命終位若住染汚心者命終心位即起煩惱可退先所斷結若住善無覆無記心者命終心以前位必起煩惱可退先所斷結也故異僧伽筏蘇云然命終已結生心時先所斷結必還成就之義意也次於正理論餘處勝無記心現在前故得諸染法之文者若依光法師初釋意者可云無覆無記心也光法師即解此文初釋云據無記心成就染法此即無記心異染汚得文成就染法之言既簡初得故全無相違也次於婆沙論退者多起煩惱現前之文者退功德時雖必起煩惱退種姓位不必起煩惱故置多言也故婆沙論六十一云若退姓者不必要起煩惱現前不退無學位有退姓者故文寫本云文永十一年甲戌四月十六日申時於東大寺尊勝院護摩堂之南庇新學問之間窗抄之畢自去年七月二十八日始此勤至當年來未明孟夏今時終其篇日月徒馳久送二百五十六日之光陰問端數繁多記新古七十五問之論義春日大明神哀愍此微功彌勒慈氏尊知見此誠心兜率雲上速垂往生內院之引攝龍華樹下必施見佛聞法之巨益凡厥父母恩愛之亡者師弟同法之舊友以親為先三界流轉之含識六道輪回之群類至疏無漏滅罪生善離苦得樂出離生死證大菩提回向遠及濟度普利而已右筆華嚴宗末葉權僧正宗性年齡七十三夏臘六十一
