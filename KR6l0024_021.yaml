body:
  text: 俱舍論第六卷抄下問題問正理論意依上地聖道與依下地聖道可為同類因耶問無生智與盡智可為同類因耶問正理論意見修無學三道互可為同類因耶問婆沙論意見修無學三道互可為同類因耶問今論意退無學果後練根成見至類可有耶問婆沙論中見道道法智位有知同類因不知彼所緣等四句不同文爾者知彼所緣不知同類因句體如何釋之耶問婆沙論中相應因遍行因相對作四句時俱非句中可舉無為法耶問等流大種與長養大種可為同類因耶問與自地染汚法可為遍行因耶問論文云一切染汚法見所斷為因文爾者施設足論聖人離欲退最初已起染汚思唯不善為因云文如何會之耶問婆沙論中難一切染汚法見所斷法為因義引離欲退染汚思唯以不善為因云文爾者何論文耶問已斷遍行因可起與果用耶問佛獨覺所起上二界有漏善業於凡身可起異熟因取果用耶問今論意欲界繫身語二業可為引業耶問婆沙論意欲界繫身語二業可為引業耶問正理論意五無間業身語二業為體歟問正理論意感觸處時定感色處歟問寶法師解釋中明十二處定感引婆沙論二師説爾者初師意與今論同歟問光法師釋有一世業三世異熟無三世業一世異熟論文作二解釋爾者第二釋意如何釋之耶問寶法師意相應因取異時士用果義可有耶問頌文云有為增上果文今此有為者標增上果體歟問論文云亦應如是説能作因非定有果故此不説文爾者光法師如何釋之耶問今論意能作因取果用可通過去耶問論中明善同類因取果與果相對四句分別相出與果非取果句云謂續善根時最初所得得文爾者限過去最後所捨一剎那善得歟問無覆無記同類因與果非取果類可有耶
