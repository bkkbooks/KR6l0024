body:
  text: 倶舍論第十三卷抄下問題問一刹那隨心轉戒爲唯一具大種所造爲當多具大種所造歟問語表業可通所長養耶問今論云屬身有執受品類足論云表業無執受文光法師會二論相違作二解釋初釋意如何釋之耶問今論云屬身有執受品類足論云表業無執受文光法師會二論相違作二解釋第二釋意如何釋之耶問品類足論云身表業無執受文寶法師如何釋之耶問品類足論意有執受法唯爲限異熟爲當可通等流長養耶問寶法師意成化人所發語耶問身表業能造大種可通所長養耶問光法師意身表業能造大種可通無執受耶問今論意化語業攝歟問中間禪心可發表業耶問雜心論意上三靜慮所起身語表業隨能發心判性類歟問今論立四種善婆沙論破唯信等五根立自性善義光法師會二論相違作三解釋初釋意如何釋之耶問今論立四種善婆沙論破唯信等五根立自性善義光法師會二論相違作三解釋第二釋意如何釋之耶問今論立四種善婆沙論破唯信等五根立自性善義光法師會二論相遠作三解釋第三釋意如何釋之耶問婆沙論意可立自性等四種善耶問立自性等四種善爲論主始善爲當有宗古義歟問光法師所引婆沙論中破唯信等五根立自性善師義爾者今此能破意擇滅無爲名自性善義可有耶問今論意信等五根可立自性善耶問等起善中非自性相應善所等起類可有耶問疑心續善位善得現起歟問光法師所引正理論云如因靜慮得通果心文所言靜慮者可互根本近分定耶問光法師引正理論勝無記心現在前故得諸染法文作二解釋初釋意勝無記心者指無覆無記心歟問寶法師所引正理論云或復因彼諸得等起即待彼故成善等性文所言彼言指異類心歟問寶法師意勝義自性二無記外可立相應等起二無記耶問正理論意天眼天耳二通解脱道位可有天眼天耳二根倶起義耶問正理論意表業隨轉因唯可限一刹那耶問光法師意以無漏道斷見所斷煩惱時可有九品別斷義耶問今論意有漏定心與表業可爲隨轉因耶問寶法師所引婆沙論中威儀路心爲轉隨轉心通三性文此師意可許工巧處心爲轉隨轉心通三性義耶問頌文云於轉善等性隨轉各容三文爾者婆沙論中可有隨轉各容三義耶問雜心論意轉隨轉因唯可限同性耶
