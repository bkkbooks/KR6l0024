body:
  text: 倶舍論第十三卷抄下問一刹那隨心轉戒爲唯一具大種所造爲當多具大種所造歟答或云唯一具大種所造或云不限一具大種所造之二義可有也兩方若多具大種所造者定心既唯一也隨心轉無表隨唯可一具七支何云多具大種所造哉是以光法師釋云身語七支一四大造所依大種如定心唯一無差別故所以大種造隨心戒亦一四大造文正理論云定生無表七支相望展轉力生同一果故唯從一具四大種生散此相違故依異大文任此等定判唯一具大種所造見何況若有多具七支多具大種造之者隨有隨心轉無表相望不爲倶有因之過例如散七支無表不爲倶有因故各別大種所造也爰知一刹那隨心轉戒唯一具大種所造云事若依之爾者見正理論餘處六十文述入第四靜慮時無毛孔開云彼無漏定所引大種雖生處攝而極微密與彼相似故無有過文泰法師引此文畢云以此文證故知造無漏戒四大隨身大小遍滿身中文一刹那隨心轉戒有多具七支多具大種造之云事此等定判亦分明也如何答一刹那隨心轉戒一具多具大種所造者古來之未決也愚鈍庸才之身雖無所存之旨暫任學者常義一刹那隨心轉戒有多具七支多具大種各各別造云義可存也其故見正理餘處文述入第四靜慮時無毛孔開云何縁但入第四靜慮身無毛孔非餘定耶以彼等持極淳厚故引第四定大種遍身即由此縁尊者世友説入彼定身毛孔合若入世俗第四靜慮身無毛孔其理可然以彼定能引彼地攝微密大種充滿遍身故若入無漏第四定時此身如何亦無毛孔以彼但引隨所生地大種現前造無表故彼無漏定所引大種雖生處攝而極微密與彼相似故無有過文一段論文無諍隨心轉戒能造大種充滿身中見若一具大種所造者豈可云微密大種充滿身故哉是以泰法師引此文畢云以此文證故知造無漏戒四大隨身大小遍滿身中一具四大造七支戒隨大多少各各別造地大不因地大造諸色故道戒既爾定戒亦然文光法師雖引此釋更無破之亦不出自義知許此義云事何況婆沙論云然根本靜慮現在前時色界大種遍身内起若近分定現在前時色界大種唯心邊起有説近分定現在前時色界大種亦遍身起然長養身不如根本文寶法師引此文畢云後解爲勝隨定勝劣皆遍身故文此論文并解釋隨心轉戒能造大種遍滿身中之旨亦分明也若一具大種造之者寧可有大種遍身之義哉加之見婆沙論處處之文或十七述有漏無漏戒多少出評家義云如是説者無漏戒多所以者何且苦法智忍隨轉戒尚多有漏有無量功徳對治彼故況復更有上位餘戒文或百四十釋本論以無間道證預流果時現在未來修八聖道支云文云此則止正語業命不倶者意無貪瞋癡所發無表各有七種倶時起故文婆沙抄釋此文云論云無貪瞋癡所發無表各有七種倶時起故前業蘊中同第二師即第三爲正文或九十六述菩提分法實體云有説爲三正語業外有正命故文任此等論文一刹那隨心轉戒可有多具七支見若有多具七支者多具大種各別造云事亦炳然也但於光法師身語七支一四大造之釋者暫就一具七支論之也多具七支其類別故不可云一四大種所造次於正理論唯從一具四大種生之文者暫約一具七支定散相對云能造大種一具多具差異之時隨心轉七支爲倶有因故一具大種造之散七支不爲倶有因故各別大種造之云也重意云以爲倶有因爲所以一往釋定散一具七支能造大種一具多具差異許也全非遮隨心轉多具七支雖爲倶有因其類別故各別大種所造之義也次於隨心轉戒多七支各別大種所造不可爲倶有因云難者既隨心轉戒故多具七支同可爲倶有因也然而多具七支其類別故各別大種所造不可一具大種造之彼光法師述欲界初後念無表一具大種所造云釋意云以無礙故可言造多由時別故非互果故非倶有因文以之思之不爲倶有因法不必各別大種所造翻而可知爲倶有因法不必一具大種所造也重難云正理論文爲倶有因不爲倶有因爲所由釋成能造大種一具多具之義若多具七支各別大種所造者何可爲倶有因哉定生無表七支相望展轉力生同一果故之釋寧非無用哉是一次倶有因者自他相望論之若有多具七支者一不殺生無表望一不殺生無表之時不可爲倶有因如云地不觀地生所造色以一切法不觀自性及同類體爲他因故也若不殺生等無表自類相望不爲倶有因者寧無隨心轉無表相望不爲倶有因之過哉是二次正理論以彼等持極淳厚故引第四定大種遍身之文何必隨心轉戒能造大種哉第四定極淳淨故入彼定之時長養依身等故長養大種遍身中也更可非隨心轉戒能造大種遍身中哉是以寶法師釋此文云雖長養大種遍一身中何必皆能造無表色文是三次泰法師隨大多少各各別造之釋不可然同第四靜慮隨心轉戒也何依依身大小戒有多少不同哉同一果法寧可相離哉是以寶法師難此義云今詳此釋義不如是隨心轉戒心倶有因身大小不定故或患不患手足等故故知四大多少不定豈得隨彼大種戒少戒多文是四次婆沙論無貪瞋癡無表各有七種倶時起故之文爲證事不可然若爾可有三具七支故可有三具能造大種豈可有大種遍身之義哉是五答問語表業可通所長養耶進云論云應知有表唯是等流不通所長養見付之語表許言聲者性相之所定也而聲境既通所長養語表業何唯限等流性哉答語表業者隨能發心定其性類而能發心無能長養之義故所發語表不通所長養也故光法師釋表業不通所長養云無別勝縁故非所長養文但於聲境通所長養云釋者身中相續不斷聲非語表業者無依別能發心只是心中長養大種所發故通所長養也尋云語表業之外可有等流聲耶答此事難測但寶法師餘處解釋中約色香味觸出等流類唯擧業倶者如解釋者非業倶者非等流性見准此釋思之語表業之外餘聲境非等流性歟尋云等流大種生聲之時唯等流大種相撃歟爲當通異熟長養大種相撃歟答等流大種生聲之時異熟長養等流大種同相撃發聲也雖然正論能造唯限等流大種非餘二大種長養聲雖異熟長養大種所發正論能造亦唯限長養大種非異熟大種也問今論云屬身有執受品類足論十云表業無執受文光法師會二論相違作二解釋初釋意如何釋之耶進云光法師釋云解云論者意異難爲會釋文付之品類足論是有宗之本論六足之隨一也設雖今論意何輒可背本論所説哉何況身表業種類非一准兩論各就一邊可定之哉就中品類足論中自體所攝色處名有執受見身表業豈非自體所攝色處哉加之婆沙論中述品類足論意云有情數九處少分名有執受文而依内起表已顯有情者光法師今解釋也知品類足論意身表業是可有執受也如何答見今論文偈頌云表唯等流性屬身有執受長行云應知有表唯是等流此若屬身是有執受身表業偏屬有執受見品類足論十約五學處諸門分別云幾有見等者一無見四應分別謂若表是有見若無表是無見幾有對等者一切應分別謂若表是有對若無表是無對乃至幾有執受等者一切無執受文身表業無執受之旨此文分明也故任兩論見文作論者意異之釋也光法師餘處二亦非作二解釋初釋意云此論説表屬身有執受論意各別亦同今初釋意也但於今論不可背本論所説云難者論主以理爲宗不必本論爲定量也次於品類足論十七自體所攝色處名有執受之文者彼就大旨論之也設雖自體所攝色處何可遮少分通無執受之義邊哉次於婆沙論百三十八述彼論意有情數九處少分名有執受之文者光法師二解釋源依婆沙論異説歟論者意異初釋意依婆沙論云有説二論説一刹那異熟所攝九處少分名有執受之第四説意也此説意品類足論意異熟所攝九處少分名有執受云故約身表業是等流性若暫起若多時起皆無執受聞故對此若屬身是有執受之論文作論者意異之釋深探此有説意歟婆沙論百三十八中述品類足論十七意或云一刹那九處少分名有執受或云一刹那有情類九處少分名有執受或云一刹那有根所攝九處少分名有執受前三師説意是第二釋之依憑異初釋意故有情數九處少分名有執受云第二有説義初釋意不可劬勞也問今論云屬身有執受品類足論十云表業無執受文光法師會二論相違作二解釋第二釋意如何釋之耶進云光法師釋云又解品類表業據暫起在身猶如客寄心心所法非能執受故云表業是無執受倶舍等論據多時起相續在身心心所法能執受故云表業是有執受各據一義亦不相違文付之凡論有執受無執受事更不可依暫起相續歟就中今論餘處明有執受義云心心所法共所執持攝爲依處名有執受全不云依相續品類足論明無執受相更不見依暫起哉何況若依暫起名無執受者散無表能造大種豈非無執受哉加之婆沙論百三十八中述品類足論意云異熟所攝九處少分名有執受文而表唯等流性者性相之所定也設雖依相續難屬有執受哉答應知有表唯是等流此若屬身是有執受者不限今論所説正理顯宗兩論其文全同之諸論一同之説豈可背品類足論意哉何況婆沙論百三十八云品類足説一刹那九處少分名有執受乃至有説品類足識身論説一刹那有情數九處少分名有執受有説二論説一刹那有根所攝九處少分名有執受文此等説意品類足論意有情數九處少分名有執受見而身表業既有情數所攝故可有執受云事自分明也故對今論文作和會釋之時品類足論云身表業無執受之文據暫起今論等云身表業有執受之文據多時起會也光法師餘處亦作二解釋第二釋意云或可品類據表暫起猶如客寄名無執受此論業品據多時起得與根合名有執受亦同今第二釋意也但據攝暫起云無執受據多時起名有執受事兩論之文雖不見此旨探其實義作和會釋者釋家之常習也何始爲疑哉次於散無表能造大種可無執受云難者彼自本一念無相續之義以有愛心執爲現在内自體故有執受身表業多念相續可被執受故暫起之時猶如客寄是無執受也或又散無表所依大種自身中起望心心所尤親近故有執受身表業依行動長短等色生爲體故望心心所甚疎遠放是無執受也次於婆沙論述諸論意異熟所攝九處少分名有執受云文者光法師二解釋源依婆沙論異説歟兩論和會第二釋意依婆沙論前三師説意也異熟所攝九處少分名有執受云第四有説義是初釋依憑異第二釋意故第二釋意不可劬勞也問品類足論云身表業無執受文寶法師如何釋之耶進云寶法師釋云多是傳家錯耳文付之品類足論十説五學處云一切無執受定可依梵本何輒釋傳家錯哉何況婆沙論百三十八中述品類足論十七意云一刹那異熟所攝九處少分名有執受文而表唯等流性故此文意身表業無執受見若爾寶法師釋傳家錯豈不背婆沙論今文哉答寶法師釋云品類足論云諸表業是無執受者多是傳家錯耳若不爾者婆沙及諸論等即合會釋也文此釋意云本論異末論之時末論中必引其文致會通也而倶舍正理顯宗等諸論中同雖述身表業有執受之旨全無會通品類足論文爰知品類足論十二説五學處云一切無執受是傳家錯也爲言但於婆沙論述彼論意異熟所攝九處少分名有執受云文者且擧異熟所攝有執受也更不遮等流長養通有執受之義歟問品類足論意有執受法唯爲限異熟爲當可通等流長養耶答品類足論可有二意也兩方若唯限異熟者品類足論十七中自體所攝九處名有執受見而自體所攝九處是廣何不通等流長養哉若依之爾者婆沙論百三十八中述品類足論十七意云一刹那異熟所攝九處少分名有執受文如論文者彼論意有執受法唯可限異熟見如何答品類足論文見二邊故婆沙論百三十八中述彼論意不可有二意見若依自體所攝九處名有執受云文者有執受法不限異熟可通等流長養見故婆沙論中述品類足論意或云一刹那九處少分名有執受或云一刹那有情數九處少分名有執受或云一刹那有根所攝九處少分名有執受前三師説意品類足論意有執受法不限異熟通等流長養云也此師意云等流長養法内身所攝與心心所猶被執受故是有執受爲言但此説意會五學處一切無執受之文者據暫起表業云一切無執受也等流長養法實可通有執受也若依五學處一切無執受之文者有執受法唯限異熟不通等流長養見若有執受法通等流者表業何無執受哉若有執受法不通等流者不通長養事又必然也故婆沙論中述品類足論意云一刹那異熟所攝九處少分名有執受文彼説意品類足論意有執受法唯限異熟不通等流長養之旨尤分明也此義意云等流長養法内身所攝望心心所猶是疎遠不被執受故是無執受爲言次此説意會自體所攝九處名有執受之文者彼就自體所攝異熟九處名有執受也非云自體所攝等流長養九處亦有執受歟問寶法師意云成化人所發語耶進云寶法師釋云化人語等既無有得故知非業不成之見付之化人所發語是有情名聲也尤可成就之哉是以婆沙論云有成就欲界繋所造色亦色界繋所造色謂生欲界得色界善心若生色界作欲界化發欲界語此文無諍可成化人所發語見是以光法師餘處引此文畢云以此准知成就化語文何況廣勘婆沙一部之前後未見不成化語之文寶法師解釋依憑在何處哉答寶法師意化語中成即質化語不成離質化語云也故見寶法師處處解釋第一卷疏云問如何得知化聲無得答一准正理論云非執受大種爲因聲與非有情數聲無寛狹故化人同許非執受故故知不成就也二准婆沙評家義三十五及此論下文二十七色界身作欲界化所化香味如莊嚴具尚不成就如何離質化語得成就耶文第二十七卷疏引光法師明知異界化若化自身若化他身色觸二種皆悉成就義准應知若即身化若離身化亦皆成就或可若即身化即成就若離身化即不成就婆沙百三十二言成就者據即身化雖有兩解前解爲勝之釋畢云今詳二釋前解爲非若別作化人有成就得不應道理諸有爲法住現在世有成就得必是有情説別化人爲有情法不應道理故住現在世色觸二境若是有情住散心位無非執受諸非化人語聲應是執受大種所發又婆沙評家云自身化如莊嚴具而不成就況異身化而成就也以此證知前解爲失文成即質化語不成離質化語之旨此等解釋實分明也但於化人所發語是有情名聲也尤可成之云難者化人所發語是有情名聲者就即質化語論之離質化語是非情數法非有情名聲故更不成之也次於婆沙論文者就即質化語成之云也非云成離質化語故寶法師第一卷疏會此文云有人引婆沙一百三十二云有成就欲界繋所造色亦色界繋所造色謂生欲界得色界善心若生色界作欲界化發欲界語准此論文若化語不成就者如何説此成二界色耶破曰此不成證通異解故前引文證化人無得文是決定此文容有兩釋故不成證此説即質化色觸二境及即自身以欲界化心發欲界語故作是説非謂此是離質化人所發語也文次於婆沙一部之前後未見不成化語之文云難者離質化語是非有情數法故不成云事理在絶言云非情數法無有成就之時其義既顯畢故不及別説不成化語也故寶法師第一卷疏會此疑云此不在疑故不別説即是人總不成就無情法中此已説故故不別説如不別説一樹一石等名不成就又如説髮毛爪等非執受者非有情數無得得故此總親於離質化人尚不成就如何離質化語須更別説文問身表業能造大種可通所長養耶答不通所長養也兩方若通所長養者見論文上述散無表所依六種唯等流性之旨畢下明表業能造大種諸門分別云餘義皆與散無表同文如論文者身表業能造大種不通所長養見若依之爾者光法師餘處十四解釋云自然見道謂彼先時決定有表相續不斷乃至聖位從彼表發無表律儀文如解釋者定心現前位身表業能造大種可倶轉見若爾遇定勝縁故可通所長養哉答散無表所依大種唯等流性不通所長養云事解釋之所定也故光法師釋云無別勝縁故非所長養文寶法師釋云非所長養因等起心不能長養能生無表諸大種故文泰法師引正理論云所依大種唯是等流因等起心不能長養能生無表諸大種故文而判餘義皆與散無表同表業能造大種諸門分別例同散無表能造大種故身表業能造大種唯限等流性不通所長養云事亦必然也但於光法師餘處解釋者定心現前位雖身表業及彼能造大種倶轉依定心不生故不通所長養也重意云只是自前心相續表等流性至定心現前位倶起計也定心不能長養彼身表業及能造大種故身表業及彼能造大種更不通所長養也問光法師意身表業能造大種可通無執受耶答可有二意也兩方若通無執受者見論文上述散無表所依大種有執受之旨畢下明表業能造大種諸門分別云餘義皆與散無表同文如論文者身表業能造大種不通無執受見若依之爾者光法師餘處十四解釋云自然見道謂彼先時決定有表相續不斷乃至聖位從彼表發無表律儀文如解釋者定心現前位身表業相續能造大種可倶轉見若爾定中無執受相故可云通無執受哉答光法師餘處二釋現在眼等五根有執受執無執受相作二解釋初釋云現在五根識不依時亦名執受執受類故文第二釋云現在五根識不起時非是執受而言執受據識起時以執受義作用顯故如定道大種雖不離身亦是現在名無執受五根亦爾文准此二釋意思之若依初釋意者定心現前位倶起身表業及彼能造大種可云有執受是有執受身表業及彼能造大種類故也若依第二釋意者定心現前位倶起身表業及彼能造大種可云無執受定心現前位無能執受之義故也而今論云身表業及彼能造大種有執受者可會據能執受識起時也如云而言執受據識起時也問今論意化語業攝歟答可有二意也兩方若非業攝者見今論餘處一文云有情名聲謂語表業文如論文者化語可業攝見若依之爾者化語從無執受大種生何云業攝哉是以論文云餘義皆與散無表同表業隨有執受大種生見而化語既不從有執受大種生知非業攝云事如何答婆沙論百二十二云化語是業非業有二師異説故婆沙論云問諸化語是語業不有作是説彼是語業由心發故有餘師説彼非語業但名語聲以所化身無執受故文而若依光法師今解釋者今論意同婆沙論後師説化語非業攝云也故光法師今解釋云問如婆沙一百二十二説化語有兩説云有作是説彼是語業由心發故有餘師説彼非語業但名語聲以所化身無執受故前師意説雖無執受大種因生由心發故化語是業後師意説化身無執受即顯化語非從執受四大種生既非執受四大種生明知化語非業但非執受大種生者皆非是業若是業者執受大生然無評家化身是業非業雖未見文准化語應有二説此論爲依何説解云此論義當婆沙後師以説表業執受大種生故文光法師餘處一作二解釋之中第二釋意亦同之但此釋意會有情名聲謂語表業之論文者化語似有情名故云有情名聲非實有情名亦非實業也故光法師餘處第二釋意會此文云論言化語是有情名聲者似有情名非實有情名如鏡中火似眞火故而非眞火既非實名亦非成就文化語既無有情名倶起之義者非實業云事亦必然也若依光法師餘處初釋意者今論意同婆沙初師説化語是業攝云也故光法師餘處初釋云婆沙雖無許文且以前師爲正不言有餘師故文但此釋意會餘義皆與散無表同之論文者暫據非化語業云表業能造大種有執受若據化語業亦可無執受大種所造也故光法師餘處初釋意會此文云若作前解釋通後證言同散無表者據非化語業若據化語業即用無執受大種爲因文故任光法師餘處二解釋意今論有化語是業非業之二意可云也問中間禪心可發表業耶答可發表業也兩方若發表業者今論云有尋伺心能發表業文論文無諍有尋有伺心可發表業見品類足論九云無尋唯伺地三界二處攝文若中間禪心發表業者不可限三界二處攝哉若依之爾者中間禪心既與伺相應何不發表業哉答心品之中或與尋伺相應或唯與伺相應之類同可發表業也云云中間禪心既與伺相應何不發表業哉是以論云表色唯在二有伺地謂通欲界初靜慮中非上地中可言有表文光法師釋此文云三性表業皆通欲界初靜慮中若言有尋不攝中定爲攝中間故言有伺文寶法師釋此文云此釋表業唯在二地説有伺者爲顯中間靜慮有表業故文泰法師釋云伺通中間定亦起有表故言有伺若言有尋不通中間故不説也文中間禪心發表業云事此等解釋實分明也但於有尋伺心能發表業之論文者彼云尋伺相應心發表業之中兼可攝唯伺相應心也次於品類足論文者彼暫就善靜慮論之也更不遮有中間禪所攝表業故彼論第六出無尋唯伺地體云謂修靜慮中間得梵大梵及一分無漏法文以此文可思之問雜心論意上三靜慮所起身語表業隨能發心判性類歟答兩方若從能發心判性類者寶法師釋有餘師言上三靜慮亦有無覆無記表業之論文云此是雜心師釋文若隨能發心判身語表業性類者豈可云上三靜慮繋哉若依之爾者判身語表業性類事尤可隨能發心也設雖雜心論意豈不存此道理哉答雜心論意云不隱沒無記身作亦五地如前説隨身地繋上三靜慮亦有無覆無記表業云也故寶法師釋有餘師言上三靜慮亦有無覆無記表業之論文云此是雜心師釋尤叶雜心論意也彼論意約身語表業論其地繋隨所依身亘欲界四靜慮五地判其性類隨能發心唯限無覆無記云也故雜心論意同今論不正義意也問今論立四種善婆沙論破唯信等五根立自性善義光法師會二論相違作三解釋初釋意如何釋之耶進云光法師釋云解云婆沙既以一依等破立五根爲自性善明知説四種善者述異師義文付之信等五根四種善中非自性善一師意以之立自性善故若非自性善信等五根立自性善者何餘同時相應心心所有同一所依等之義非自性善哉破也是則亂四種廢立信等五根立自性善故破此難破也自性善正體立自性善之時更不可有此難破何釋明知説四種善者述異師義哉是以見婆沙論一處五十一及百四十四文一師意立四種善更無破之哉答料簡光法師初釋意雖有學者異義暫存一義意者婆沙既以一依等破立五根爲自性善者婆沙論中以同一所依同一行相同一所縁等爲所申破唯信等五根爲自性善之義故同一所依同一行相同一所縁等法中不可有自性善非自性不同皆可自性善云也明知説四種善者述異師義者今論中立四種善者述尊者異師不正義違婆沙論正義釋也婆沙論第二卷能破意即可破尊者義也但於婆沙論一處百四十四文一師意立四種善更不破之云難者彼第百四十四卷中略不破尊者也實可破之爲言或一義云婆沙既以一依等破立五根爲自性善者婆沙論二中無貪等爲自性善正體不立自性善信等五根非自性善正體立自性善故以同一所依同一行相同一所縁等爲所由破之云也明知説四種善者述異師義者前師述異今論等四種善之別義故破但順妄情不應正理也更不破今論等四種善故非相違釋也明知之言以破信等五根爲自性善之義故知所破四種善者非今論等四種善述異師別義也爲言重難云若爾與第三釋意有何異耶答初釋意婆沙論所破師意唯信等五根其性善故立自性善餘同時相應心品其性非善相雜善故名善云也能破意餘同時相應心品其性可善不可云非善破也今論等四種善四種倶其性善之中分四類不同故不可爲所破釋也第三釋意所破義意存信等五根外非善不云也信等五根四種善中非自性善之物云自性善故破自性善正體立自性善義不可破之故非相違釋也故寶法師釋云婆沙第二與此意別彼異師説五根是世第一法自性是善故餘非世第一法以自性非善與善相應假立善名由此婆沙云但順妄情今此四善即不如是若相應善若等起善皆體性是善非假名善其性善不待他成善相應等起待他成善性故不名自性善文此釋意自順今聊簡之趣歟問今論立四種善婆沙論破唯信等五根立自性善義光法師會二論相違作三解釋第二釋意如何釋之耶進云光法師釋云又安惠菩薩倶舍釋中解據實而言皆是自性善然世親阿闍梨立四種者隨義勝劣建立異名善中最強勝者名勝義善次強者立自性次劣者立相應最劣者名等起不善隨義亦立四種故婆沙一百四十四三性以分別二十二根有一師亦説有四種善不善與此論同然不見破文付之立四種善源出婆沙論所説何判然世親阿闍梨立四種者隨義勝劣建立異名哉次據實而言皆是自性善者擇滅無爲云自性善歟若爾婆沙論中以同一所依等之義破之不云擇滅無爲亦自性善哉答婆沙正理顯宗等諸論中立自性等四種善故立四種善是有宗古義云事更不可疑之但於光法師然世親阿闍梨立四種者之釋者源雖有宗古義世親論主所存之義故云然世親阿闍梨立四種者隨義勝劣建立異名也次據實而言皆是自性善云意擇滅無爲可云自性善也婆沙論能破意述若唯五根是自性善所餘善法自性是何一切善法皆自性善云故也但於以同一所依等之義故破之云難者暫就心品見之信等五根名自性善者餘同時相應心品亦可自性善何云餘相雜故假立善名哉破也問今論立四種善婆沙論破唯信等五根立自性善義光法師會二論相違作三解釋第三釋意如何釋之耶進云光法師釋云又解婆沙前文但破異師立五根爲自性善不破立無貪等爲自性善故彼前後亦不相違文付之婆沙論但順妄情不應正理之能破以同一所依同一行相同一所縁等之義破唯信等五根爲自性善云義設雖無貪等名自性善所餘善法不云自性善者今此能破寧亦不來耶答釋簡光法師第三釋意雖有學者異義暫存一義意者婆沙論所破師意信等五根四種善中非自性之物立自性善故非自性善之物云自性善之程信等五根與所餘法同一所依同一行相同一所縁等也餘同時相應心品同可立自性善而云餘相雜故假立業名但順妄情不應正理破也實爲自性善正體無貪等立自性善之時此難更不可來爲言或一義云婆沙論所破師意唯信等五根其體是善餘同時相應心本其體非善云故破此師義云若唯五根是自性善所餘善法自性是何若謂彼是不善無記雜五根故亦名善者如是五根與彼相雜何故不名不善無記然信等五與所餘法同一所依同一行相同一所縁一住一滅一果同一等流同一異熟而言五根是自性善餘相雜故假立善名但順妄情不應正理也立四種善之時四種倶其體善云義不可破之故婆沙論前後之中第二卷破唯信等五根立自性善之義第百四十四卷不破立四種善之師更非相違云也問婆沙論意可立自性等四種善耶答可有二意也兩方若立之者體性同善品也何可立自性善相應善等哉依之見婆沙論文破唯信等五根立自性善云義云然信等五與所餘法同一所依同一行相同一所縁一起一住一滅一果同一等流同一異熟而言五根是自性善餘相雜故假立善名但順妄情不應正理文如今能破文者總名自性善不可立相應善等見若依之爾者見婆沙論一處文擧尊者義云由四縁故説名爲善一自性故二相應故三等起故四勝義故全無破之知正義家意立自性等四種善云事是以光法師餘處二解釋云此論下文及毘婆沙善不善各説四種文如何答光法師會倶舍婆沙二論相違作三解釋若依初釋意者婆沙論中以同一所依等之義破唯信等五根立自性善云義故婆沙論正義家意不可立自性善等四種善説四種善是異師不正義意也爲言若依第二第三釋意者婆沙論正義家意立自性等四種善可云也其旨准光法師三解釋聊簡之趣可思之問立自性等四種善爲論主始義爲當有宗古義歟答可云有宗古義也兩方若論主始義者顯宗論中明自性善等四種善知可有宗古義云事若依之爾者光法師第二釋云然世親阿闍梨立四種者隨義勝劣建立異名文如解釋者論主始義見如何答立自性等四種善可云有宗古義也故婆沙論云尊者曰由四縁故説名爲善一自性故二相應故三等起故四勝義故文正理論中專立四種善顯宗論不改頌云勝義善解脱自性慚愧根相應彼相應等起色業等翻此名不善勝無記二常文加之寶法師釋云准婆沙一百四十四三性以分別二十二根有一師説有四種善及不善等與此論同正理三十六亦與此論同故知四種善與不善是有部宗舊所禀義非是世親菩薩新立有人引安惠倶舍釋云據實而言皆是自性善然世親阿闍梨立四種者隨義勝劣建立異名善中最勝者名勝義善次強者立自性善次劣者立相應善最劣者名等起善者謬也文立自性等四種善是有宗古義非論主始義云事此等定判實分明也但於光法師第二釋者彼雖有宗古義世親論主所存之義故云然世親阿闍梨立四種者隨義勝劣建立異名也問光法師所引婆沙論中破唯信等五根立自性善師義爾者今此能破意擇滅無爲名自性善義可有耶答可有此義也兩方若有此義者披光法師所引婆沙論文破一聚相雜法中唯信等五根立自性善餘非自性善云義見如文相者就相雜法破之全不許擇滅無爲名自性善之義哉若依之爾者光法師判據實而言皆是自性善擇滅無爲可名自性善見如何答見光法師解釋引婆沙論一段之文對今論立自性等四種善之文據實而言皆是自性善者顯婆沙論意然世親阿闍梨立四種者隨義勝劣建立異名善中最強勝者名勝義善次強者立自性次劣者立相應最劣者名等起者述倶舍論意也既對倶舍論別立四種善之文婆沙論意合皆名自性善云故釋據實而言皆是自性善爲勝義善擇滅無爲亦立自性善云也何況婆沙論能破文云若唯五根是自性善所餘善法自性是何所餘擇滅無爲名自性善見但於婆沙論同一所依同一行相同一所縁等之文者暫就一聚相雜法難之歟問今論意信等五根可立自性善耶進云不立之也付之信等五根是善品之根本衆行之初基也尤可立自性善哉是以信等五根菩提分法中立之如何答今論意云自性善者謂慚愧根以有爲中唯慚與愧及無貪等三種善根不待相應及貪等起體性是善猶如良藥慚愧二根無貪等三根立自性善信等五根不立自性善也光法師釋其故作二解釋云此五根強勝名爲自性餘非強勝不名自性又解無貪等三以翻三不善根慚愧二種以翻大不善地法由所翻法是強勝故能翻五法名自性餘善等法非能翻彼是故不名自性善也文信等五根無強勝之義所治法非自性不善故不立自性善云也寶法師釋其故云無慚無愧有二義故一唯是不善二遍不善心三不善根具其五義一遍五部二遍六識三是隨眠性四斷善根時作牢強加行五能發麁惡身語二業由此五種是自性不善作用劣強自餘心所由此相應成相應不善善翻此故名自性善既自性善以喩良藥故不待餘成善性也文今解釋意當光法師第二釋意歟但於信等五根菩提分法中立之云難者彼有爲衆行之初基之義故菩提分法中立之也義門既各別來不可爲難重難云無貪等三善根過信等五根云強勝方如何答翻所治貪等三不善根故也尋云信等五根倶非自性善云歟答信等五根中慧根可立自性善歟無癡善根慧爲性故云故也問等起善中非自性善相應善所等起類可有耶答可有此類也兩方若有此類者論文云等起善者謂身語業不相應行以是自性及相應善所等起故文如此文者等起善必可自性善相應善所等起見若依之爾者等起善種類非一准何無此類哉彼身語業上得及四相雖是等起善攝全可非自性善相應善所等起哉答等起善之廢立類良藥汁所引生乳故專依自性善相應善所等起事是他體也論疏中即述此旨如一方之疑難也但於身語業上得及四相可非自性善相應善所等起云難者身語業上得及四相成善性事隨所得所相身語故雖非自性善相應善正所等起所得所相身語業成善性事依自性善相應善所等起故彼身語業上得及四相隨身語業成善性亦等起善中所攝屬也問疑心續善位善得現起歟答爾也兩方若善得現起者光法師釋若異類心所起得云何成善此義應思之論文云如疑心續善於染心後能引善得及四相起文寶法師餘處七釋由疑續善及界退還欲界善心爾時名得之論文云疑續善時及界退還爾時染心正現在前時欲界善心得已至生相名之爲得文圓暉法師餘處釋疑心續善相云謂疑心發生正見能續善根也文任此等定判疑心續善位善得在生相未現起見若依之爾者異類心得者就得現起論之見而光法師釋異類心得相擧疑心續善知疑心續善位善得現起云事答疑心續善位善得現起云事文理必然也更不可疑之所謂今論餘處七擧疑心續正見續善之二類畢云爾時善根得還續起善得起故名續善根光法師釋此文云善得初起名續善根畢引正理論四十二云爾時善根成就得還起不成就非得滅名續善根文婆沙論三十五述或住疑心或住正見續善根相畢云爾時善根得還續起善得起故名續善根文識身足論出欲界繋善心捨不成就得成就位云謂善根續時文任此等論判疑心續善位善得現起云事實分明也但於光法師如疑心續善於染心後能引善得之釋者約疑心續善疑無疑有二念有之疑無染心後疑有之時引起善得云也次於寶法師餘處欲界善心得已至生相名之爲得之釋者此亦疑無之時善得至生相疑有之時善得現起云也次下擧界退還位上界命終心位善得至生相續生心位善得現起爲言次於圓暉法師餘處謂疑心發生正見能續善根也之釋者疑心時善得現起即發正見之義也以之名疑心續善之釋意歟重難云婆沙論出善得與不善心倶之中無擧疑心續善光法師釋正理論勝染汚心現在前故得諸善法之文云退勝染心現在前故得諸善法又無擧疑心續善若疑心位善得倶起者此等之文何不擧疑心續善哉答婆沙論文標如不善心若退若生善法得起若退若生不善心起之時善得倶起云故疑心續善非退非生不出之也更非遮疑心之時善得現起之義也次於光法師解釋者釋若異類心所起得等如何成善此義應思之論文之處既擧疑心續善故釋正理論文之時暫出退位一類不擧疑心續善歟問光法師所引正理論云如因靜慮得通果心文所言靜慮者可亙根本近分定耶答唯可限根本定也兩方若唯限根本定者靜慮之言是廣何不通近分定哉何況依未至定斷欲界煩惱第九解脱道位可得初靜慮所攝通果心靜慮之言何不通近分定哉若依之爾者因靜慮得通果心者可指通果心所依定如云如所依定得何可通近分定哉答如因靜慮得通果心者依得所依定之力得通果心事云故靜慮之言唯指所依根本定不可通近分定如今論餘處云如得靜慮化心亦然果與所依倶時得故也若離下地染第九解脱道位若自無色界下生色界位依得所依定之力得通果心故靜慮之言非擧現起心品何可通近分定哉即見正理論一段之文云勝無記心現在前故得諸善法無記心染汚心雖置現前之言云如因靜慮得通果之處不置現前之言即此意也但於依未至定斷欲界煩惱第九解脱道位得初靜慮通果心云難者此位依得所依根本定之力得通果心故指所依根本定云如因靜慮也靜慮之言自本不擧現起心品故不顧彼第九解脱道位未至定現起之邊也問光法師引正理論勝無記心現在前故得諸染法文作二解釋初釋意勝無記者指無覆無記心歟答爾也兩方若指無覆無記心者無覆無記心勢力微劣也何可有得染汚法之義哉是以婆沙論中述評家義云要起煩惱現在前時乃成退失勝功徳故煩惱現前位得染汚法見加之今論餘卷述得心多少判餘皆自可得無覆無記心現前位不得餘心定知無記心現前位得染汚法者非無覆無記心云事若依之爾者光法師第二釋意有覆無記心判以第二釋思初釋意可指無覆無記心被得哉答以第二釋思初釋意勝無記心者可指無覆無記心也何況既云勝無記心豈非無覆無記心哉但於無覆無記心現前位不可得染汚法云難者無覆無記心現前位實雖無初得染汚法之義先已成就煩惱得相續倶起云勝無記心現在前故得諸染法也故光法師釋云據無記心成就染法此即無記心異染汚得文既云據無記心成就染法就無覆無記心倶生染汚法得論之云事解釋實分明也例如婆沙論有學練根解脱道位得通果心云文正理論會云彼論但依得倶生説也重難云等起善者依善心力所引起法也難之擧異類心所引得之中云勝無記心現在前故得諸染法可出依無記心力得染汚法也而倶起染汚得更非依無記心力起豈可爲等起善難哉是一次若就倶起得云之者何不云善心現前位得染汚法無記心現前位得善法哉是二次婆沙論云退者多起煩惱現前文此文意少分不起煩惱可退善法見知無覆無記心現前位亦可得染汚法云事是三次婆沙論述異生分離染位不命終故云彼命終心勢力劣故先所斷結已得成就文無覆無記心命終之人得先所斷結者豈無無覆無記心現前位得染汚法之義哉是四答正理論一段之文實難等起善故就異類心所引起之初得可論之云事是勿論也故云如因靜慮得通果心云勝染汚心現在前故得諸善法皆就初得論之也而無覆無記心現前位無初得染汚法之義故勝無記心之言無覆無記心得靜慮釋前就倶起得論之會也此釋意實不似一段廢立故第二釋云退起欲界身邊二見有覆無記心現在前故得諸染汚不善法此即有覆無記心異不善得也無覆無記心現前位實有初得染汚法之義者何可及異釋哉次無覆無記心現前位無初得染汚法之義故勝記心現在前故得諸染法之文依甚難思就倶起得論之會許也云爾何致一段皆可擧倶起得之疑哉次於婆沙論退者多起煩惱現前之文者非難退者亙功徳退種姓退而婆沙論述評家義云若退姓者不必要起煩惱現前不退無學位有退性者故種姓退位不必煩惱現起故云退者多起煩惱現前也更非云有煩惱不現前退功徳之義也次於婆沙論彼命終心勢力劣故等之文者云此事雖有學者異義暫存一義意者彼命終心勢力微劣被引前位之中起煩惱退已斷煩惱畢之後即命終故異生分離染位不命終云也此文意更不許無覆無記心現前位初得染汚法之義何爲違文哉問寶法師所引正理論云或復因彼諸得等起即待彼故成善等性文所言彼言指異數心歟進云寶法師釋云或因彼異類心諸得及四相起即待異類心得及四相成善等性文付之得及四相成善惡性依所得及所相法全無依異類心何釋即待異類心得及四相成善等性哉答寶法師約此論文作二解釋初釋意云彼言指異類心第二釋意存彼言指所得及所相法也即同光法師泰法師解釋意也見寶法師解釋或因彼異類心諸得及四相起即待異類心得及四相成善等性者初釋也或此得及四相因所得法及所相法起待所得所相法成善等性故得等由等起成善等性異者第二釋也前後置或言作二解釋之旨自分明也而次下自判正不云此二解釋中後解爲勝文是則得及四相成善惡性從所得及所相法不從異類心故初釋成不正釋也若爾既非正釋意何強備疑問哉但初釋意對雖異類心亦爲縁起而成善等非待彼心之文云或復因彼諸得等起即待彼故成善等性故上非待彼心之彼言既指異類心下或復因彼之彼言亦可指異熟心見暫作一往釋歟或一義云寶法師釋或因彼異類心諸得及四相起即待異類心得及四相成善等性異類心上得及四相因異類心成善等性云也此二解中後解爲勝者非自決斷正不正理論中釋等起善或云約法倶得或云通約法前法後得之二説中後解爲勝云也就二義意各有重重之疑向解釋可思之問寶法師意勝義自性二無記外可立相應等起二無記耶答不立之也兩方若立之者寶法師所引正理論中勝義自性二無記外不立相應等起二無記見若依之爾者寶法師釋善及無記諸地皆有以於頌中不別遮故之論文云由自性善及自性無記遍諸地故相應等起隨其所應亦通諸地文如解釋者可立相應等起二無記見如何答無有一心所唯無記性而無記心遍相應之類故寶法師意於心所中別不立自性無記也心所之中既不立自性無記故不可立相應等起二無記云事文理實必然也故寶法師所引正理論云以非擇滅及太虚空更無異門唯無記性是故獨立勝義無記無別自性相應等起無一心所唯無記性與無記心遍相應故設方便立自性等三亦攝不盡無記多故由是無記唯有二種一者勝義二者自性有爲無記是自性攝不待別因成無記故無爲無記是勝義攝以性是常無異門故文但於寶法師相應等起隨其所應亦通諸地之釋者由自性善及自性無記遍諸地故相應善及等起善亦通諸地云也非謂相應等起之言亦通無記全非相違問正理論意天眼天耳二通解脱道位可有天眼天耳二根倶起義耶答不可有此義也兩方若有此義者彼論意天眼天耳二通者名意識相應勝無記慧何可有二根倶起之義哉若依之爾者今論難等起善云或天眼耳應成善性文光法師釋此文難天眼天耳二根云釋爲善判而正理論救此難云以彼二通解脱道心是無記故彼二與道倶時生故文如此文者彼論意天眼天耳二通解脱道位可有二根倶起之義見如何答正理論意云六通皆是解脱道攝眼耳二識是解脱道理不成故破天眼天耳二通解脱道眼耳二識相應慧爲體云義存禪定無間所起意識相應勝無記慧爲體之意故彼二通解脱道位無有見色同聲之義若彼二通解脱道位二根倶起者二根即可彼同分豈不背恒同分無闕之理哉故正理論云應作是説四靜慮中有定相應勝無記慧能引自地大種果此慧現前便引自地天眼天耳令現在前爲所依根發眼耳識故眼耳二識相應慧非通但可説言是通所引文光法師釋此文云淨定爲無間道意識勝無記慧爲解脱道即二通二性能引自地勝大種果造天眼耳爲所依根發眼耳識故眼耳二識相應慧非通但可説言是通所引文此文既云二通所引大種造二根故彼論意天眼天耳二通解脱道位二根不倶起云事亦分明也但於正理論彼二與道倶時生故云文者就前後無間倶論之也例證非可求外光法師釋正理論應作是説四靜慮中有定相應勝無記慧之文云應作是説四靜慮中隨淨定起有勝無記慧與淨定相隣出入名定相應文此釋意有定相應勝無記慧之文約前後相隣釋之故彼二與道倶時生故之文准之可會也何況無間名倶事出處處定判彼如云今論云又於無間亦有倶聲如契經説與慈倶行修念覺支等也問正理論意表業隨轉因唯可限一刹那耶答不可限一刹那也兩方若唯限一刹那者表業既相續隨轉因何唯可限一刹那哉是以因等起心可相續見若依之爾者表業隨轉因若相續者見所斷心及異熟生心何不爲隨轉因哉是以正理論云唯後一念與表倶行表業隨轉因唯可限一刹那見如何答表業既多念相續隨轉因不可限一刹那云事道理既必然也設雖正理論意豈不存此道理哉但於隨轉因相續見所斷心異熟生心可爲隨轉因云難者隨轉因雖多念相續見所斷心内門轉故異熟生心勢力微劣故不爲隨轉因也次於正理論唯後一念與表倶行之文者因等起心有多念之中爲最後一念近因等起心云程心亦爲刹那等起心云也不云刹那等起唯限一念何爲違文哉重意云欲明見所斷心雖爲遠因等起不爲近因等起故亦不爲刹那等起之義爲最後一念近因等起心云程心亦爲刹那等起心故見所斷心不爲刹那等起云也正理論三十六具文云由此故説見所斷心爲因等起發身語業定不能爲刹那等起見所斷識雖能思量而無功能動身發語然於動發一表業中容有多心思量動發唯後一念與表倶行異此表應非刹那性文何況見正理論次文或云以修所斷加行意識能無間引表倶行心亦與表倶行爲刹那等起或云説不能作刹那等起顯不能爲近因等起但有能作近因等起者此必能爲刹那等起故爲最後一念近因等起心云程心亦爲刹那等起心之旨一段論文委所釋成也問光法師意以無漏道斷見所斷煩惱時可有九品別斷義耶答不可有此義也兩方若有此義者頓斷九品見所斷故者性相之所定也設雖光法師意更不可許此義哉若依之爾者光法師釋又明無明不相違故有漏業色非見所斷之論文云明與無明互相違故必無并起可有品別而斷有漏業色與明無明倶不相違故非見斷但可説言縁縛故斷文如解釋者以無漏道斷見所斷煩惱之時可有九品別斷之義見如何答以無漏道斷見所斷煩惱之時無九品別斷之義云事有宗一同之性相諸師共許之施設也纔向一文何致其疑哉是以今論餘處云見道速能治三界故頓斷九品見所斷故非世間道有此堪能故見位中道唯無漏修道有異故通二種文但於光師解釋者明與無明互以相違有品別而斷義之類是可見所斷有漏業色明與無明倶不相違今品別而斷義之法故非見所斷云也非謂見道即有品別而斷之義何爲相違哉重意云品別而斷自性斷法是見所斷非品別而斷縁縛斷法非見所斷云也問今論意有漏定心與表業可爲隨轉因耶進云光法師作二解釋初釋意云不爲隨轉因第二釋意云爲隨轉因也二釋之中暫就第二釋難思隨轉因者外門轉心也有漏定心内門轉與表業不可倶起何可爲隨轉因哉是以見論文述無漏定心不爲隨轉因云唯在定故釋見所斷心不爲隨轉因云於外門心正起業時此無有故文任此等論文有漏定心備唯在定故内門轉故之二義更不可爲隨轉因哉答光法師第三釋意源任今論現文也所謂偈頌云無漏異熟非長行述一切無漏異熟生心非轉隨轉唯述無漏定心不爲轉隨轉因之旨不簡有漏定心故正理論三十六師難之付太減過光法師述倶舍師救作二解釋之中第二釋意任今論見文有漏定心爲隨轉因云也即第二釋云有漏定心雖内門轉性強盛故望業有力何妨能爲隨轉文此釋意云有漏定心性強盛故望相續表業有力能爲隨轉因云也但於唯在定故之文者就無漏定心無力能論之也非簡有漏定心次於外門心正起業時此無有故之文者就初起表業論之也若兼就相續表業云之者雖内門轉心可爲隨轉因也重難云若雖内門轉心與相續表業爲隨轉因者見所斷心及無漏心與相續表業何不爲隨轉因哉答有漏定心其性強盛望相續表業有力能故爲隨轉因也見所斷心其性不強盛故異有漏定心望相續表業無力能故不爲隨轉因也次於無漏心者雖與相續表業倶轉有漏無漏各別望表業之時其以疎遠無力能故不爲隨轉因也或一義云見所斷心與相續表業爲隨轉因文法住寺眞圓僧都云無漏定心與相續表業爲隨轉因云云此等義意可思之問寶法師所引婆沙論百十七中威儀路心爲轉隨轉心通三性文此師意可許工巧處心爲轉隨轉心通三性義耶答寶法師不許此義見兩方若不許此義者威儀工巧同是無覆無記心也云威儀路心爲轉隨轉心通三性之時何不許工巧處心爲轉隨轉心通三性之義哉若依之爾者寶法師解釋中不許此義見如何答寶法師引婆沙論第百十七卷一段之文畢云今婆沙有三師一師自類爲刹那等起二師威儀刹那等起通三餘同前第三師威師工巧刹那等起通三餘同前文此釋意既云婆沙論有三師説故第二師意乍云威儀路心爲轉隨轉心通三性不許工巧處心爲轉隨轉心通三性云也但於同是無覆無記心云難者見婆沙論一段之文者強盛心品轉隨轉心必可同性見如云若善心作能轉即善心作隨轉若染汚心作能轉即染汚心作隨轉也而威儀工巧二心相望之時威儀路心弱工巧處心強也威儀路心與工巧處心爲同類因工巧處心與威儀路心不爲同類因即此意也故第二師意威儀路心其性弱故雖許威儀路心爲轉隨轉心通三性工巧處心其力強故不許工巧處心爲轉隨轉心通三性也尋云光法師意同寶法師意歟答光法師意不同寶法師意也婆沙論中威儀路心工巧處心轉隨轉相二段雖有問答工巧處心爲轉隨轉心通三性云義即上威儀路心爲轉隨轉心通三性之義也爲言問頌文云於轉善等性隨轉各容三文爾者婆沙論中可有隨轉各容三義耶答可有此義也兩方若有此義者見寶法師解釋前後上述今詳婆沙有三師一師自類爲刹那等起二師威儀刹那等起通三性餘同前第三師威儀工巧刹那等起通三餘同前然未見善染刹那等起通三文及異熟生心爲刹那等起文此二義皆婆沙無文畢下云此論於轉善等隨轉通三非婆沙師義乃至太法師云倶舍是婆沙中一師義者非也文一段解釋述自義非他師之時婆沙論中無隨轉各容三之義見若依之爾者世親論主源依婆沙製今論至隨轉各容三之義何不依婆沙論本説哉是以見泰法師并婆沙抄解釋婆沙論中可有隨轉各容三之義見如何答婆沙論中可有隨轉各容三之義也故婆沙論百二十六云聲聞獨覺善心發語善無記心倶得究竟無記心發語無記善心倶得究竟文隨轉各容有三之旨此文實分明也但於寶法師解釋者婆沙論第百十七卷中威儀路心工巧處心發起業時其隨轉心通善染無記三性云義泰法師即當今論隨轉各容三之義得意云倶舍云於轉善等性隨轉各容三有是一師義乃至倶舍但同婆沙一説文寶法師不許此釋威儀工巧心發起業時其隨轉心通善染無記三種云今義不許善染汚心發起業時其隨轉心通善染無記三種故全不同今論隨轉各容三之義見爲破泰法師釋就婆沙論第百十七卷一段之文云皆婆沙無文破泰法師云倶舍是婆沙中一師義者非也寶法師意不遮婆沙論餘卷有隨轉各容三之義一段解釋全無相違尋云以何得知泰法師意存威儀工巧心發起業時其隨轉心通善染無記三種云師義即同今論隨轉各容三之義哉答見泰法師解釋引婆沙論百十七卷一段之文畢云解云雜心云若善轉則善隨轉不善無記亦爾是一師義倶舍云於轉善等性隨轉各容三有是一師義文威儀工巧心發起業時其隨轉心通善染無記三種云婆沙論第三師意即同今論隨轉各容三之義之旨此釋實分明也婆沙抄中釋若依倶舍同第三説工巧中亦同威儀又同泰法師釋意也此等釋意纔見威儀工巧心發起業時其隨轉心通善染無記三種之邊計不顧善染汚心發起業時其隨轉心不通善染無記三種之義邊偏同今論隨轉各容三之義甚不可也問雜心論意轉隨轉因唯可限同性耶答雜心論中可有二師異説也兩方若不限同性者見寶法師解釋云雜心云若善轉即善隨轉不善無記亦爾取初師義文此釋無諍雜心論意同婆沙論初師説轉隨轉因唯可限同性也見若依之爾者雜心論中轉隨轉因不限同性見如何答勘雜心論前後之文可有二師異説見所謂彼論第三卷云彼善轉即善隨轉不善無記亦如是無記者威儀工巧彼威儀心轉即彼隨轉善穢汚心現在前生者不然以速起故如旋火輪工巧心亦如是文此文意轉隨轉因唯限同性見故寶法師引此文同婆沙論初説釋也加之泰法師釋云雜心云若善轉則善隨轉不善無記亦爾是一師義文婆沙抄云若依雜心第三卷同初師説無問而有答如旋火輪非輪爲輪文此等解釋意依雜心論一師説意轉隨轉因唯限同性釋也彼論第九卷云聲聞善心發語或善心究竟或無記心究竟無記心發語或善心究竟或無記心究竟文此文意同今論於轉善等性隨轉各容三之義轉隨轉因不限同性見爰知雜心論中有二師異説云事故泰法師釋云雜心前後同婆沙二説倶舍但同婆沙一説文即准婆沙論前後有二師異説可思雜心論意也何況見雜心論前後之文第三卷述下地無不苦不樂報之旨第十卷明二十心相生云報生威儀八存下地有不苦不樂報之義雜心論前後之文擧二師異説事是亦例證也建長三年四月二十八日酉時於東大寺尊勝院中堂東廊抄之畢倶舍論第十三卷者爲去年倶舍三十講之當處之間爲聽聞加一見之次或訪明師或加愚案爲開初心初學之慧解聊記一問一答之綱要有其謬之處後學必直之焉仰願依此微功答此結縁一期終焉之暮遂往生於都率之秋雲三會説法之曉開慧解於龍華之春梢矣右筆華嚴宗末葉法印權大僧都宗性年齡滿五十夏﨟三十八
