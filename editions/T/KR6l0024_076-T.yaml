body:
  text: 倶舍論第二十六卷抄上問題問八忍不名智所以如何釋之耶問光法師意不共無明相應慧可名見耶問八忍名見所以如何釋之耶問意識相應有漏善慧中可有非見類耶問苦集類智可縁欲界斷道耶問苦智唯知苦聖諦法歟問道法智可縁苦集滅三諦耶問頌文云初唯苦集類文爾者爲唯縁有頂苦集爲當可通縁下地苦集耶問未曾得他心智可知曾得心心所法耶問上地下品無漏他心智可知下地三品心耶問下地上品無漏他心智可知上地下品心耶問見道十五心悉可爲聲聞他心智所縁耶問今論意麟喩獨覺他心智可知麟喩獨覺心耶問今論意麟喩獨覺他心智可知見道四念心耶問我已知苦等四行相即我生已盡等四行相歟問正理論意得非擇滅時無生智轉可云耶問無生智後得智可縁非擇滅耶問光法師意依身欲界依無色界證羅漢果人無生智現前位可縁非擇滅得耶問論文云然説見言乘言便故或於諦理觀照轉故文爾者光法師意今此文爲有部會通爲經部釋歟問無生智與盡智可爲同類因耶問離繋得能證道唯限無間道歟問唯隨能證道判離繋得性類歟問以滅道法智斷上二界修惑時所得無漏離繋得爲法智品攝爲當類智品攝歟問以滅道法智斷上二界修惑時可得無漏離繋得法類二智中何智所知可云耶問遠法師意無漏他心智以道智爲加行云義光法師如何破之耶問有漏他心智無間可生無漏他心智耶問無漏定等無間生有漏他心智歟問無漏他心智可知有漏心耶問論中述有貪心離貪心相出三師説中釋第二師不擧離貪心故光法師作二解釋爾者初釋意如何釋之耶問論中述有貪心離貪心相出三師中釋第二師不擧離貪心故光法師作二解釋爾者第二釋意如何釋之耶問婆沙論評家意離貪心可通有漏無漏耶問論中述有貪心離貪相擧三師説中述初師意云有貪心者唯説第一貪相應心離貪心者謂治貪心文爾者如何破此師義耶問論中釋十一對心中散心云此與散動相應起故文爾者光法師如何釋此文耶問經部宗意聚心可限眠相應耶問有貪心離貪心等爲他心智所縁歟
