body:
  text: 倶舍論第四卷抄上問論文云今應思擇一切有爲如相不同生亦各異爲有諸法決定倶生文光法師釋此文作二解釋爾者初釋意爲一箇問歟答爲一箇問也兩方若爲一箇問者光法師述第二釋意云又解總爲一問文初釋意爲一箇問者與第二釋有何差異哉若依之爾者今文意問有爲諸法決定倶生之義設雖初釋意更不可爲二箇問如何答今文意唯問有爲諸法決定倶生之一事故初釋意不可爲二箇問故論中答此問云有定倶生文以答文思問意唯一箇問無二箇問云事炳然也頗不可及異釋歟但於二釋義意者初釋意云今應思擇一切有爲如相不同生亦各異者總標一切有爲諸法體相不同生時亦各各別異而生之旨爲有諸法決定倶生者正是問言爲言至此處始置爲有之言故也第二釋意云今應思擇以下之文皆爲問言也一切有爲諸法如體相不同其生亦各異於此異體別生有爲法中爲有諸法決定倶生爲言重意云以又解總爲一問之總言思之初釋意有非問言之文云事自問歟故初釋意雖爲一箇問與第二釋其意相替也重難云泰法師釋此文云一問今應思擇一切有爲如體相不同生亦異別生耶爲有諸法決定倶生文此釋意爲二箇問見光法師初釋意可同之歟答泰法師今釋文言雖似爲二箇問彼實可爲一箇問也亦各異別生耶者爲顯有爲諸法決定倶生之言也何可爲別問哉問論文云謂一切法略有五品文爾者今此色心等五品法外可有餘法耶答不可有餘法也兩方若有餘法者今論所説色心等五品法者即七十五種法也此外更有何等法哉若依之爾者見光法師解釋或引正理十一入阿毘達磨婆沙論二十八百九十六百四十三等説畢云准上諸論欣厭定有或引婆沙論處處四十五七十五文畢述准上婆沙文別説有怖若許欣厭及怖心所者今此色心等五品外寧非有餘法哉答披今論文既説謂一切法略有五品一色二心三心所四心不相應五無爲一切之言是廣豈可有所殘餘法哉但於欣厭心所者光法師釋此事云准上諸論欣厭定有然此論中不別説者以非恒起或非竝生故不説爲大善地法文此釋意云准正理入阿毘達磨婆沙等諸論説善心所中欣厭定有然此論文明大善地法唯列信等十法不説欣厭者以非恒起或非竝生故也理實而言即可大善地法所攝爲言次於怖心所者光法師自問答云問准上婆沙文別説有怖何故此論不説解云此論據顯故於不定但説八種不説怖也或可等中亦攝或可論意各別文此三釋中依初二釋意者今論意怖心所是不定地法所攝爲言依第三釋意者今論意總不説怖心所云歟若爾何釋意不定地法外不可有怖心所也次七十五種法外可有餘法即欣厭及怖心所等是也七十五種法者就爲本法論之故此外有餘法全非所痛也問頌文云欲微聚無聲文爾立微聚名爲唯限八事倶生爲當可通九事十事等耶答此事雖爲上古未決且可存唯限八事倶生之義也兩方若唯限八事倶生者見今論文偈頌云欲微聚無聲無根有八事有身根九事十事有餘根文初標微聚名言定可通九事十事若唯限八事者有何相濫可云無聲無根哉長行或説無聲有根諸極微聚此倶生事或九或十諸極微聚之言指九事十事或述於前諸聚若有聲生如次數増九十十一於前諸聚之文通九事十事十一事或云若依體説八九十等便爲太少由諸微聚必有形色有多極微共積集故立微聚名亦亘九事十事等見是以光法師或釋欲微聚無聲等之頌文云微聚是假假必依實實有多少不同文若不通九事十事等者寧可有多少不同哉或破古徳身中遍能發聲其聲微少論説無聲無麁顯聲之義云此解不然微聚據體不論少大文如今能破者可通九事十事等聞何況勘舊倶舍論文云若有根隣虚無聲即九物倶生或十物倶生文舊譯隣虚者新譯微聚也隣虚既通九物十物微聚豈限八事倶生哉若依之爾者今論文云色聚極細立微聚名光法師判言微聚者顯細少聚明知立微聚名唯限八事倶生云事如何答披今論文云色聚極細立微聚名爲顯更無細於此者此在欲界無聲無根八事倶生隨一不減文既述色聚極細立微聚名以九事十事不可云色聚極細又結八事倶生隨一不減唯限八事倶生之旨分明也光法師釋此文或云於欲界中色聚極細無聲無根外山河等猶八倶生隨一不減立微聚名爲顯更無細於此者言微聚者顯細少聚謂色聚中極細少聚名爲微聚即微是聚也非是極微名爲微聚或云應知微有二種一色聚微即極少八事倶生不可減也此論據斯説據色聚微立微聚名唯限八事倶生不通九事十事爲言故雖古來未斷且所存今義也但於欲微聚無聲等之頌文者欲微聚無聲無根有八事訓之時全不可爲難次於今論無聲有根諸極微聚等之文者據極微聚之義九事十事等名爲微聚故就此門云或九或十也諸極微聚之言據極微聚論之云事炳然也於無諸聚若有聲生等之文若依體説八九十等等之説會通之趣准之可思次於光法師微聚是假假必依實等之釋者按解釋前後初標一切諸色略有二種一是極微聚即五根五境二非極微聚即無表色次釋此中且辨極微聚也畢云微聚是假假必依實實有多少不同是即約假聚明有實義也文相起盡無諍據極微聚名爲微聚見其極微聚中有八事九事十事等多少不同故云實有多少不同也非云色聚微中實有多少不同更有何相違哉微聚據體不論小大之釋准此義勢可會通之次於舊倶舍論若有根隣虚無聲即九物倶生等之文者舊譯之習以極微亦云隣虚也故今論餘處十二文云極微字刹那舊倶舍論九中云隣虚字刹那若爾隣虚之言何唯限微聚哉凡舊譯之言於事不定以彼爲證據難取其信歟重難云今論中云色聚極細立微聚名據色聚微立微聚名正理論云此中且辨極微聚色據極微聚立微聚名故光法師釋云應知微有二種一色聚微即極少八事倶生不可減也此論據斯説二極微微即色極少更不可分正理據此説文准此等定判思之今論諸文同據色聚微可立微聚名也而無聲有根諸極微聚等之文據極微聚立微聚名云會通頗似不辨兩論施設哉答今論中專明色法倶生故述極微聚之義云事一段大綱是必然也光法師微聚是假假必依實實有多少不同之釋其意在之但至色聚極細立微聚名等之文説色聚微之廢立云許也故無聲有根極微聚等之文據極微聚立微聚名之會通敢無其過歟問正理論意立微聚名爲唯限八事倶生爲當可通九事十事等耶答雖有學者異端且可存唯限八事倶生之義也兩方若唯限八事倶生者正理論意據極微聚立微聚名九事十事等寧無極微聚之義哉是以寶法師引正理論色之極少更無分故等之文畢云准此論文微是極微聚是八九微等文此釋無諍彼論意立微聚名可通九事十事見若依之爾者披正理論十文云如是衆微展轉和合定不離者説爲微聚文九事十事等更非定不離者明知立微聚名唯限八事倶生云事如何答見正理論十文述如是衆微展轉和合定不離者説爲微聚此在欲界無聲無根八事倶生隨一不減定不離者立微聚名故唯限八事倶生不通九事十事等也身根眼等餘根既非定不離者豈可立微聚名哉但於正理論意據極微聚立微聚名九事十事等寧無極微聚之義哉云難者彼論總標文云有色有二一是極微聚二非極微聚此中且辨極微聚色雖專據極微聚義説其中定不離者立微聚名故唯限八事倶生不通九事十事等也然而據極微聚立微聚名云門通九事十事等之義邊強不可遮之歟於寶法師釋者勘彼師疏作二釋云極微非聚微是七微聚色之中微聚最細此文亦顯色等極微自類聚集成其微聚又釋同正理正理論云色之極少更無分故立極少名如一刹那名時極少更不可折爲半刹那如是衆微展轉和合定不離者説爲微聚准此論文微是極微聚是八九微等二釋之中後釋爲善文初釋意云微聚之微言目微塵即是色等自類七極微聚集名爲微聚爲言若自他極微合論立微聚名者唯限八事倶生可云也第二釋意云同正理論説微聚之微言目極微今此極微聚集名爲微聚之時色等自類極微不限七極微通八九微等爲言若自他極微合論立微聚名者亦唯限八事倶生可云也重意云聚是八九微等者擧自類極微數非指八事九事等之八九微等有何相違哉已上相傳義趣也覺澄阿闍梨云正理論意據極微聚名立微聚名故九事十事等極微之聚故名微聚其義必然也故寶法師引正理論色之極少更無分故立極少名如一刹那名時極少更不可折爲半刹那如是衆微展轉和合定不離者説爲微聚之文畢云准此論文微是極微聚是八九微等文自嘆此釋判二釋之中後釋爲善立微聚名通九事十事等之旨甚分明也但於正理論如是衆微展轉和合定不離者説爲微聚之文者有身根微九事定不相離有餘根聚十事定不相離散定不離者雖名微聚通九事十事等全非所痛也問寶法師意四大種不相撃發聲義可有耶答不可有此義也兩方若有此義者若四大種不相撃者何可發聲哉是以寶法師所引婆沙論中云有相撃者便發生聲文若依之爾者披寶法師餘處一末解釋云造定道戒大種相撃發聲非此所明或可彼大種不自相撃發聲婆沙亦許有四大不相撃發聲文如此釋者四大種不相撃發聲之義可有見如何答四大種發聲不發聲是由相撃不相撃義若不相撃者寧可發聲哉故見寶法師所引婆沙論云應作是説生欲色界有情身中多四大種在一身内有相撃者便發生聲不相撃者即無聲起雖一身中必有聲界非諸身分皆遍發聲文四大種不相撃不發聲云事此文甚分明也但於寶法師餘處釋者作定道二戒能造大種或發聲或不發聲之二釋中第二釋意定道二戒能造大種微細寂靜故不相撃發聲爲言全非云雖不相撃而亦發聲重意云婆沙論亦許有四大不相撃發聲者不相撃不發聲意也即可訓婆沙亦許有四大不相撃發聲也惡讀文點擧此疑歟問光法師解釋中云發智言成據一身中相續不斷文爾者一相續身中等流聲不間斷歟答等流聲可間斷也兩方若不間斷者披光法師餘處二解釋一相續身中等流聲可間斷見若依之爾者等流聲是廣何一相續身中可間斷哉是以一相續身中長養聲無有間斷相例可同如何答見今論餘處十三文定表唯等流性等流聲者語表業也而由能發心發語表業故發不發時別一相續身中可有間斷長養聲者諸支節中輪環不絶故據一相續身論之無有間斷也故光寶師餘處釋云或長養聲雖於一處而有間斷若據一身諸支節中輪環不絶説非異熟其理稍隱故不説之若等流聲有全間斷説非異熟於理稍顯依此明文准餘處定判思當卷解釋據一身中相續不斷者是長養聲非等流聲也問念法師意一相續身中恆成就聲歟進云光法師述念法師意云明知此聲非恒成就文付之念法師意一切四大種不必有聲者顯一切四大種不必發聲之義全無許一相續身中不成就聲之時更不可云非恒成就是以勘發智論文云身色聲觸界欲界色界成就文念法師寧不見此文哉依之披寶法師定判云念法師既講迦延豈不知發智云誰成就聲持答曰欲色界又豈不知無想十入念法師言以非是一切四大恒有聲故不必有聲非謂一身全無聲也文若爾光法師何得念法師意釋明知此聲非恒成就哉答見光法師解釋云問舊婆沙一師云一切四大必不離色聲一切欲界色必不離香味又一師云一切四大不必有色聲一切欲界色不必有香味又於此二説何者爲正此論復同何説念法師解云兩師幷非正義各取少分方可爲正應言一切四大不離色不必有聲一切欲界色必不離香味故雜心云極微在四根十種應當知身根九餘八謂是有香味地念法師意以雜心不説有聲明知此聲非恒成就文推此釋意云念法師一切四大不必有聲之言幽玄彼師所存之旨未顯若一相續身中一切四大種不必發聲故云不必有聲者此即是若一相續身中非恒成就聲故云不必有聲者此即非如引雜心論極微在四根十種應當知身根九餘八謂是有香地之文爲證一相續身中此聲非恒成就釋見爲言是則猶預念法師義顯其是非念法師意存一相續身中非恒成就聲之義不定判也次下念法師解兩師倶是不正各取少分應言一切四大必不離色不必有聲一切欲界色必不離香味此即是若言非恒成就聲此即非以諸論説聲定成就故之釋此趣分明歟既置若言之詞故知設若言非恒成就聲者其義即非也爲言上段之中雖不述許彼師義之邊以下釋思上文必然可有縱許言也一段解釋如此得意之時諸篇難勢皆以被遮者歟或一義云光法師念法師解畢云念法師意以雜心不説有聲明知此聲非恒成就泰法師解云念法師若作此釋此大謬也云云案此釋意云念法師既一切四大必不離色不必有聲引雜心論極微在四根十種應當知身根九餘八謂是有香地之文爲證故一切四大不必有聲者顯一相續身中非恒成就聲之義見故述彼師義判明知此聲非恒成就引泰法師釋爲其潤色也但於發智論身色聲觸界欲色界成就之文者念法師雖見此文背彼所説惡得其意歟或又發智論今文從多分説可會歟如婆沙論九十中云尊者覺天作如是説非欲色界恒成就聲此本論文依多分説也次於寶法師釋者人師異釋也不及和合之重難云雜心論極微在四根十種應當知等之文據身一分不發聲處云爾也如今論中云欲微聚無聲無根有八事等念法師何引雜心論今文證一相續身中非恒成就聲之義哉答今論中上標欲微聚無聲無根有八事下云有身根九事十事有餘根故一相續身中雖恒成就聲據身一分不發聲處述八事九事等倶生云事自明也雜心論文不置無聲之言只云極微在四根十種應當知身根九餘八故總就一相續身明八事九事等倶生見若一相續身中必成就聲不間斷者就一相續身辨色法定倶生之時豈不云有聲哉而念法師爲證一切四大不必有聲之義引雜心論今文光法師釋念法師意以雜心不説有聲明知此聲非恒成就也問泰法師意一相續身中一切四大種皆遍發聲歟答不必發聲也兩方若皆遍發聲者大種合離必生聲界云義婆沙論評家所不許也泰法師意何可存此義哉若依之爾者披泰法師解釋云迦旃延云誰成就聲持答曰欲色界又雜心一云無想衆生十入性故知婆沙初師一切四大必不離色聲一切欲界色必不離香味是正義也文此釋意無諍一相續身中一切四大種皆遍發聲見依之光法師難泰法師今釋云若言初師爲正一切四大必不離色聲此即非只可定不離色何得必不離聲文以能破言思所破義一相續身中一切四大種皆遍發聲云事亦分明也如何答泰法師意存一相續身中一切四大種不必發聲云義也故見泰法師解釋或引正理論十此若有聲即成九事而不説者顯因大種相撃故生非如色等恒時有故之文畢自問答云若言身中常有聲者何故正理論云顯因大種相撃故生非如色等恒時有故答外大常棠觸内大故言大種相撃故生色等四塵不由棠觸相撃任運恒有故別説也文或引婆沙論九十身色聲觸界欲色界成就無色界不成就者問身色觸界可爾聲界云何恒時成就有作是説大種合離必生聲界有情若在欲色界中大種恒有故常發聲評曰彼不應作是説若四大種必恒生聲此所生聲何大種造若即此造應多有對色一四大種生若説餘造餘四大種復必生聲如是展轉有無窮過應作是説生欲色界有情身中多四大種在一身内有相撃者便發生聲不相撃者即無聲起雖一身中必有聲界非諸身分皆遍發聲之文成一相續身中一切四大種不必發聲之旨准此等定判思之泰法師意任正理論文幷婆沙論評家説存一相續身中雖恒成就聲一切四大種不必發聲之義云事炳然也但於泰法師舊婆沙論初師説爲正義云釋幷光法師難此釋之言者泰法師意一切四大必不離聲者顯一相續身中恒成就聲之義一切四大不必有聲者述一相續身中非恒成就之旨得意故念法師云應言一切四大不必有聲破此大謬也引迦延云誰成就聲持答曰欲色界之文幷雜心論無想衆生入十入性除香味入云説爲證故知婆沙初師一切四大必不離色聲一切欲界色必不離香味是正義也釋也是則乍存一相續身中一切四大種不必發聲之理惡得舊婆沙論二師説意初師一切四大必不離色聲之説判爲正義故光法師徵之云泰法師解若言定成就聲此即是若言初師爲正一切四大必不離色聲此即非只可定不離色何得必不離聲也重意云泰法師意存一切四大種不必發聲之理故雖不違婆沙論評家義以舊婆沙論初師一切四大必不離色聲之説判爲正義故前後之釋忽致相違所存之趣頗難審定故光法師徵難之也重難云泰法師意存一相續身中一切四大種不必發聲之義者何以舊婆沙論初師一切四大必不離色聲之説判爲正義哉答泰法師意一相續身内一切四大種中必有發聲之類故云一切四大必不離聲惡得意也故光法師釋云泰法師意説聲既恒成明知一切四大必不離聲文不存一相續身内一一四大種皆遍發聲之義故以此初師説判爲正義歟私云見光法師釋云問舊婆沙一師云一切四大必不離色聲一切欲界色必不離香味又一師云一切四大不必有色聲一切欲界色不必有香味文念此本文頗爲不審之間弘長第三之曆黃鐘中旬之候於海住山十輪院勘訪東大寺尊勝院及當山經藏安置舊婆沙論之處一部六十卷中全無此文第四十五卷之半程説十一切處諸門分別訖當新譯婆沙論第八十五卷其次即明法比等八智作論相當新譯婆沙論第百五卷之末推之現行舊婆沙論中此中間文令脱落歟念法師泰法師寶法師倶引舊婆沙論二師其言全同光法師所引之文定知舊婆沙論中實有此文云事問正理論意四大種體増者爲有多體故名體増爲當體増強故名體増歟答有多體故名體増也兩方若有多體故名體増者多體大種展轉相望如何可造一極微哉若依之爾者與用増義可無差別哉答既云體増有多體故名體増云事必然也若依増強義者只是用増義也自非用者就何物可論増強義哉是以光法師所引正理論云此不相違以酢與水觸微雖等而味不同酢味微多水味微少故酢味勝還由體増於諸聚中有味等物體増強故謂是用増良藥毒等緣起理門有差別故體類如是由此雖少而能伏多非異體類有別用生故執用増是爲邪計文但於多體大種展轉相望如何可造一極微哉云難者地大種多極微與餘三大種多極微爲倶有因可造一極微也更不可自類相望爲倶有因造之故婆沙論十六中述評家義云應作是説四大種體若有偏増若無偏増地爲三倶有因三爲地倶有因所以者何地不觀地生所造色以一切法不觀自性及同類體爲他因故乃至風大種亦爾文問光法師解釋中云正理論師以世親論主造勝義諦論中叙用増家破遂不認此解文爾者爲世親論主破用増義爲當正理論師破用増義歟答世親論主破用増義也兩方若世親論主破用増義者披光法師解釋云今説用増甚爲正計文勝義諦論同爲世親論主所造更不可破用増義哉若依之爾者光法師次下釋引婆沙論四大種體増用増二師説畢云是即用増是自宗義豈不能救便破自宗文以下釋趣思上文意世親論主破用増義見如何答勘正理論餘處文云論主自論有處説言此是彼宗所有過失彼宗謂彼毘婆沙師言諸聚中一切大種體雖等而或有聚作用偏増如心心所又如所覺團中鹽味文元瑜法師釋此文云謂世親論主所造勝義諦論中述薩婆多宗言地等聚四大體均隨其用増唯彼相顯如心心所各一用増又如團中鹽味偏勝便設難言若一切聚四大體均於大柄中水如何有江河水内火於何住既違現量如何體均論主釋言此是彼薩婆多宗所有過失文依此釋意聊簡正理論文云經主自論有處説言者指勝義諦論説此是彼宗所有過失者勝義諦論中述毘婆沙師四大種用増家義破此是彼薩婆多宗所有過失也彼宗謂彼毘婆沙師言諸聚中一切大種體雖等有而或有聚作用偏増如心心所又如所覺團中鹽味者擧所破毘婆沙師用増家義也而光法師取此文意云又難云正理論師以世親論主造勝義諦論中叙用増家破遂不認此解然婆沙一百三十一説四大種或説體増或説用増然無評家倶舍同用増正理同體増是即用増是自宗義豈不能救故便破自宗者世親論主勝義諦論中叙毘婆沙師四大種用増家義破之用増家義既薩婆多宗義故正理論師專可救之然不能救便破自宗義其理豈可然哉難也重意云叙用増家破遂不認此解者世親論主勝義諦論中叙用増家義破之正理論師不能救之遂不認此用増家解爲言但於光法師今説用増甚爲正計之釋者世親論主倶舍論中述用増義故云爾也勝義諦論雖同世親論主所造彼論中破用増家義更非所遮歟問婆沙論中可有四大種用増義耶答可有用増義也兩方若有用増義者披正理論餘五處文云若謂善釋阿毘達磨諸大論師彼無此説彼説大種由體故増文婆沙論中有四大種用増義者何云彼無此説哉若依之爾者見婆沙論文評曰應作是説四大種體若有偏増若無偏増文既云四大種體若無偏増知四大種用増義云事如何答勘婆沙論百三十一文問四大種體有増減不答之或云應言大種體有増減或述有説大種體無増減雖擧四大種體増用増二説無判邪正故光法師釋云然婆沙一百三十一説四大種或説體増或説用増然無評家文寶法師釋云婆沙一百三十一有其兩説一云體増二云用増文任此等定判婆沙論中有四大種用増之説云事分明也但於正理論餘處文者以善釋之言思之婆沙論正義家中無四大種用増義爲言故元瑜法師釋此文云諸善釋者皆説大種由體増故文重意云婆沙論中雖不判四大種體増用増二説邪正正理論師存體増義故婆沙論四大種用増師説非正義得意如此釋歟問寶法師意四大種體増用増義倶盡理説歟進云寶法師釋云然詳體増用増未爲盡理文付之今論之中明用増旨正理論文述體増義兩論師所存定可盡理説寶法師何判體増用増未爲盡理哉答見寶法師釋云然詳體増用増未爲盡理如若干水具有六味如有六人同食此水先覺不同何者體増何者用増故知法性隨緣不定非唯體用文此釋意如彼水中具有六味六人一時同飮此水或先覺甘或先覺辛等不由體増不由用増是則法性爾隨緣不定故也故體増師用増家義尋其實事倶非盡理爲言但於今論之中明用増旨正理論文述體増義之難者各且顯一邊之相何必爲盡理之談哉問水聚中撃發電炎由何法耶進云光法師釋云由極冷故撃於電炎文付之冷炎是水火相翻法也由水聚極冷寧可撃發電炎哉是以見光法師次上釋云如水聚中由極冷故變成凍雪文如何答諸法生起因緣非一法性法爾難思難測如彼極冷井水便暖誰辨其由哉何況任八事倶生隨一不減之理彼水聚中有火大種故雲中水極冷之時因緣令然撃發電炎何強疑之哉故光法師釋云又如將欲下雨空中水聚由極冷故撃出電炎名煖相起又如極冷井水便暖文寶法師釋云如冬水中由極冷故有暖等相及由先觸極冷故後觸次冷覺中暖文泰法師釋云又如水聚中由極冷故有暖相起雖不相離而有冷用増者如雲中水由冷相撃則出電電即火大也文但於光法師如水聚中由極冷故變成凍雪之釋者水聚之中由極冷故雖成凍雪如雲中水由極冷故亦有撃發電炎之義更不可遮之歟問光法師意色界微聚可有五事倶生義耶答可有五事倶生義也兩方若有五事倶生義者披今論文云前説色界香味竝無故彼無聲有六七八文如此文者色界微聚不可有五事倶生義哉若依之爾者光法師餘處解釋中色界微聚可有五事倶生義見如何答見光法師餘處二十七解釋云又如色界眼根八微不相離然有身生欲界得色天眼但得眼根及四大不得身色觸即有相離時何妨欲界香味亦有相離時文任此釋色界微聚有五事倶生義事分明也但於今論故彼無聲有六七八之文者就依身在色界所倶生微聚論之也兩處定判全非相違問光法師引婆沙論説明心所諸地法相爾者大煩惱地法中不説惛沈故如何釋之耶進云光法師釋云順等持故過失輕故文付之等持惛沈善染遥異惛沈何可有順等持之義哉何況若如今故者大不善地法及大有覆無記地法中不可取惛沈加之惛沈順等持故大煩惱地法中不取之者掉擧順惠故大煩惱地法中亦不可取之彼此相例其義可同如何答大煩惱地法者名謂法恒於染汚心有之義故專可取過重心所而惛沈行相闇昧遲鈍順等持故過失輕故婆沙論意大煩惱地法中不立之也光法師又説大煩惱地法十同此論下文開合爲異然婆沙不説惛沈者順等持故過失輕故之釋其意在之但於若如今故者大不善地法及大有覆無記地法中不可取惛沈云難者法門廢立隨時不定或惛沈順等持故不別立之如順上分結及大煩惱地法等也或惛沈掉擧如次障惠障定故倶標顯之如五蓋及大不善地法大有覆無記地法等也各據邊邊義門不必一准定之歟次於掉擧順惠故大煩惱地法中亦不可取之云例難者掉擧麁動非只不順等持亦不順惠故其過尤重不如惛沈順等持故過失稍輕也故今論文述法救釋云有作是言應説在此而不説者順等持故彼謂諸有惛沈行者速發等持非掉擧行文婆沙論中問惛沈掉擧倶通三界倶遍六識倶通五部幷與一切染汚心倶何緣掉擧立順上分非惛沈耶答之云以彼掉擧爲過猛利過重過多故佛立爲順上分結亦由此故立十煩惱大地法中又由此故外國所誦品類足論説云何結法謂九結及順上分結中掉擧又由此故雜蘊已説云何不共無明隨眠云何不共掉擧纒又由此故施設論説異生欲貪隨眠起明有五法起一欲貪隨眠二欲貪隨眠隨生有誦欲貪隨眠増益三無明隨眠四無明隨眠隨生有誦無明隨眠増益五掉擧惛沈不爾故不立爲順上分結復次以掉擧纒行相明利所作捷速擾亂五支四支定惠故佛立爲順上分結惛沈行相闇昧遲鈍與定相似能隨順定故惛沈者能速發定故不立爲順上分結文任此等論説惛沈隨順等持故過輕掉擧擾亂定惠故過重之旨分明也光法師釋順等持故過失輕故既得文理之證能遁相例之難者歟問經部宗中可有計十大地法心所實有義耶問論中明輕安心所云如何可立此爲覺支文爾者於餘覺支可有身心差別耶答可有身心差別也兩方若有身心差別者論疏中唯約輕安覺支問答身心差別以知於餘覺支不可有身心差別云事若依之爾者輕安覺支既有身心差別於餘覺支其義可同何況擇法精進等有與六識相應之類何不論身心差別哉答於餘覺支可有身心差別也故見今論文云復如何説此爲覺支能順覺支故無有失以身輕安能引覺支心輕安故文依能順覺支之義輕安覺支顯示身心差別准例思之於餘覺支寧不論身心差別哉但於論疏中唯約輕安覺支問答身心差別之難者經部宗意異有宗義云輕安風觸故且就輕安覺支問答身心差別也更非遮於餘覺支有身心差別歟問光法師述經部宗義云由入定故身中即有輕安風起能引覺支心輕安故文爾者今此能引所引可同時耶答可非同時也兩方若同時者經部宗意無許同時因果若能引所引同時者豈非許同時因果哉若依之爾者光法師釋此即同時説名能引由斯相順故名覺支能引所引可同時見如何答經部宗意不許同時因果故能引所引可非同時云事必然也但於光法師此即同時説名能引之釋者就無間倶立同時稱也有宗意五識相應身輕安能引意識相應無漏覺支心輕安者先起五識次起生得惠次起聞惠次起思惠次起修惠後方入聖起無漏覺支心輕安故能引五識相應身輕安所引意識相應無漏覺支心輕安中間相隔時分既遠故對此義經部宗意身中輕安風觸能引無漏覺支心輕安者能引身中輕安風觸所引無漏覺支心輕安隣次相生故就無間起且云同時理實而言可有前後也問正理論意以欣厭心所可立大善地法耶答不立大善地法也兩方若立大善地法者欣厭心所無有遍善心義寧可立大善地法哉若依之爾者正理論十一中釋信及不放逸輕安捨慚愧二根及不害勤唯遍善心之頌文云説二及言兼攝欣厭欣厭心所大善地法攝見如何答大善地法者依唯遍善心之義立之故今論中明大善地法云謂法恒於諸善心有文正理十一顯宗五兩論之文全亦同之重見今論文釋大善地法義云如是諸法唯遍善心文光法師釋勤唯遍善心之頌文云今依此論一義廢立大善地法十謂唯遍善心大地法十雖遍善心而非唯善心餘心所法非唯善心亦非遍善心故皆不名大善地法文而欣厭心所不幷起故闕遍善心義設雖正理論意何可立大善地法哉但於正理論説二及言兼攝欣厭之文者以欣厭二法判屬五品心所之時雖缺遍善心義唯與善心相應故攝信及不放逸二根及不害二及言大善地法中且可類攝之爲言若實立大善地法者豈不直表其名言哉故正理論云此二行相更互相違故一心中無容幷起是故此中不正顯説大善地法性不成故文光法師釋云若依正理於善法中更説欣厭彼論意言頌説二及言兼攝欣厭厭謂厭背如緣苦集欣謂欣向如緣滅道此二互起必於一心不得倶生雖唯是善非遍善心故大善地法中不別標顯文問善心現前位必可起欣厭隨一耶答必可起之也兩方若必起之者善心現前位非一准何必可起欣厭隨一哉是以勘元瑜法師處處之釋或云或時直爾無求背心是二種皆非現有或述所以生上不起緣滅道者乘厭生欣由厭無欣亦不起善心現前位不必起欣厭隨一見若依之爾者光法師雖判或非幷生未簡隨一定有哉答善心現前位必可起欣厭隨一也凡案善心相不可離欣善厭惡之二義故必可起欣厭隨一云事道理炳然也故見正理論十一説釋信及不放逸輕安捨慚愧二根及不害勤唯遍善心之頌文云説二及言兼攝欣厭文若不必起欣厭隨一者何可攝二及言哉入阿毘達磨論上云欣謂欣向於還滅品見功徳已令心欣慕隨順修善心有此故欣樂𣵀槃與此相應名欣作意厭謂厭患於流轉品見過失已令心厭離隨順離染心有此故厭惡生死與此相應名厭作意文婆沙論中或二十八云評曰有別法名厭非惠非無貪是心所法與心相應此説在復有所餘如是類諸心所法與心相應然見蘊説苦集忍智名能厭者由彼忍智與厭相應説名能厭非厭自性文或百九十六云評曰應説厭體性異非無貪非惠別有心所法名厭與心相應此即攝在復有所餘心所法中文或百四十三云問欣厭何故不立根耶答於散位中此用雖勝於定善位用不分明根用必於兩位中勝而於定位明了増強故彼二法無有根義文光法師引此等文畢准上諸論欣厭定有然此論中不別説者以非恒起或非幷生故不説爲大善地法文寶法師引此等文畢云然諸小論多不説者以非恒起不遍善心不説以爲大善地法文加之披光法師餘處三解釋或述二十二根廢立云欣厭二法散強定劣非兩位勝又非竝起故不立根文或二十八明十八靜慮支廢立云精進等七恒與心倶尚不別立何況欣厭定不倶起而立爲支文任此等定判雖簡欣厭幷生無遮隨一現起明知善心現前位必可起欣厭隨一云事但於元瑜法師處處之釋者有宗諸論之説無其證據光寶兩師之釋致其相違存欣厭隨一定有之義之時且不可依用之問寶法師意惡作心所爲唯自力起爲當可通隨從起耶答唯自力起不通隨從起也兩方若唯自力起者見寶法師解釋云二惡作善及不共倶起通二不善自力善即共起文既云即共起定知通隨從起云事若依之爾者寶法師出自力起非相應起句之中擧悔心所如何答思惡作心所行相唯自力起不通隨從起可云也故披今論餘處二十一文偈頌結餘及煩惱垢自在故唯修長行述餘嫉慳悔忿覆幷垢自在起唯修所斷正理論五十四文顯宗論二十七説偈頌長行一字無替正理論同卷上文云悔自在起非唯不善文顯宗論説全亦同之雜心論四云悔雖獨立而不離二善不善故婆沙論五十云睡眠惡作雖亦獨立而不離二文光法師釋云第二句自力非隨從有十五法謂小煩惱地十及惡作貪嗔慢疑文泰法師釋云二自力非相應有十五謂少惑十地外愛恚慢疑悔文任此等定判惡作心所唯自力起不通隨從起云事分明也設雖寶法師何可背諸論諸師一同所談哉何況勘寶法師解釋當卷或云有自力起非相應起有十六法謂小惑十不定中六謂貪嗔慢悔睡眠及疑或判惡作一種雖唯修斷唯意地起以非唯與無明相應雖別類起不名爲小餘處二十一釋悔通善惡唯自力起屢成惡作心所唯自力起不通隨從起之旨誰可異求之哉但於寶法師不善自力善即共起之釋者泛寶法師疏今一段有異本不同或一本云即不定中總有四例一貪嗔慢疑唯自力起二惡作善及不共倶起三睡眠有時亦容與一切心品倶起四尋伺定與欲界一切心品倶起文此釋意云不定地法心所之中總有四例一貪嗔慢疑唯自力起二惡作雖亦唯自力起自貪嗔慢疑寛與善心品及不共無明倶起三睡眠自惡作寛有時亦與一切三性心品倶起四尋伺自睡眠寛定與一切三性心品倶起爲言自狹向寛顯有四類不同也或一本二惡作善及不共倶起之下有通二不善自力善即共起之十字聊簡此文云不善心所中與貪等忿等相應爲隨從起非自力起不與貪等忿等相應爲自力起非隨從起而不善惡作不與貪等忿等相應故云不善自力也善心所中雖無如貪等自力起類亦無如無慚等隨從起類然善惡作非如尋伺定與一切善心品相應不與喜樂二根等相應故唯自力起非隨從起雖自力起非隨從起有時遍與善二十二心所倶起故異不善云善即共起也通二者通自力共起二義爲言退檢多本無此十字無此十字之本亦無指論義且以此本可爲正歟重難云就無此十字之本非無其疑若不善惡作與不共無明倶起者不共無明既爲獨頭起惑與彼倶起惡作定可隨從起是一次今論意述不共無明唯限見所斷之旨何云惡作與不共無明倶起哉是二答不善惡作與不共無明倶起之時惡作心所唯自力起非隨從起與彼倶起不共無明是隨從起非自力起可云也次與不善惡作倶起無明以實云之雖非不共無明不與貪等本惑倶起故且與不共名也問寶法師意睡眠心所爲自力起爲當隨從起歟答可隨從起非自力起也兩方若自力起者今論中云睡眠遍不違文若自力起者何可有遍不違之義哉若依之爾者見婆沙論五十文明纒非結云睡眠惡作雖亦獨立而不離二寶法師出自力起非相應起句之中擧睡眠心所如何答睡眠心所是隨從起非自力起云事今論當卷定判餘處二十一解釋正理五十四顯宗二十七之説婆沙三十七雜心四之文次上文論義之答具記其文畢設雖寶法師意寧可背此等論判哉何況勘寶法師處處所判當卷述睡眠心所不立少煩惱地法云睡眠一種雖唯意地闕三義故不名爲少文既云闕各別現行義定知非自力起也餘處中或解二唯不善自在起故謂唯此二兩義具足餘皆不然故唯立二之論文云餘二皆無謂睡眠掉擧惛沈文或二十一釋且十纒中無慚等五通見修斷由此通與二部煩惱相應起故隨與見此諦所斷相應即説名爲見此諦所斷之論文云謂無慚無愧惛沈掉擧睡眠此五通與見修所斷煩惱相應故通見修斷也文任此等釋寶法師意實存睡眠心所隨從起義見但於婆沙論睡眠惡作雖亦獨立而不離二之文者寶法師釋云其睡眠所以是自力起者由於眠位起貪嗔等及諸善心此是貪等善等隨眠而起非是睡眠隨貪等起故婆沙五十云睡眠惡作雖亦獨立而不離二不立結中文此釋意云睡眠位中餘心所隨睡眠起故據此義邊三性睡眠皆名獨立婆沙論文即顯此意寶法師出自力起非相應起句之中擧睡眠心所亦據此門也然而貪等煩惱不隨睡眠力成不善等性故理實而言貪等煩惱是自力起非隨從起睡眠心所是隨從起非自力起可云也寶法師重釋貪等煩惱唯自力起不通隨從故云又雖隨眠起性不隨彼成不善等故不別説文准此釋意推之與唯自力起貪等煩惱相應所起睡眠心所唯隨從起不可通自力起云事道理必然歟問本論所説十大煩惱地法中心亂以何爲體耶進云今論云染汚等持名爲心亂文付之等持是心一境性法也心亂不可以等持爲體是以無明不以惠爲體不信不以信爲體相例可同如何答見今論文引本論所説十大煩惱地法畢云染汚等持名爲心亂文正理論十一云非理作意失念心亂不正知邪勝解前已説在大地法中故此地法中雖有而不説如於大善地法不説無癡善根唯諸染心恒有此六文顯宗論六説其意同之今此兩論中述心亂體前已説爲大地法之旨豈非指三摩地心所哉加之婆沙論四十二云心亂即彼三摩地文任此等論判心亂以染汚等持爲體云事甚分明也但於等持是心一境性法也心亂不可以等持爲體云難者三摩地心所一刹那中雖一境恒住多刹那間於境轉易故刹那相續其義不同一體之上得立等持及與心亂之二名也故光法師餘處二十六釋云如三摩地一刹那中於境恒住有時若與掉擧相應令多刹那於境轉易説名爲亂文次於無明不以惠爲體之例難者三摩地心所多刹那間雖於境散動一刹那中一境恒住不散動故得等持名無明隨眠刹那相續皆無知故不得惠名也故光法師餘處二十六問答此事云問散動定能除散動定爲體智惠遣無明無明惠爲體解云約相續位説定散動若約刹那定亦不散無明不爾相續刹那皆無知故故體非惠文不信不以信爲體之例難准之可會之問本論所説十大煩惱地法中無明望十隨眠中無明時其體可同耶進云寶法師所引正理論中其體不同見付之依恒唯染心之義廢立大煩惱地法以彼中無明望十隨眠中無明其體定可同何判不同哉抑其體不同者以何爲體哉答披正理論十一文釋本論所説十大煩惱地法中不擧惛沈有三師説之中第二師云有言彼論説無明名唯因惛沈相相似故無明法是大遍行故是以地法不説而成文此師意云本論中明大煩惱地法心所擧不信懈怠放逸掉擧無明妄念不正知心亂非理作意邪勝解十種不列惛沈事其中無明者即喚惛沈惛沈行相相似無明故於惛沈與無明名十隨眠中無明是遍行惑與一切染心相應故可爲大煩惱地法之義不可待言故不説而成爲言故寶法師引此文畢云准上論文此云本論十煩惱地説無明者即是惛沈惛沈相似無明所以不説無明者無明與一切染心相應不説而成故文問光法師意依幾義建立小煩惱地法耶進云光法師釋云今依此論一義廢立少煩惱地法十文付之依光法師釋披今論現文云如是類法唯修所斷意識地起無明相應各別現行故名爲小煩惱地法文此文無爭可有多義見是以泰法師釋今依倶舍以三義建立一如是類法唯修所斷二意識地起三無明相應各別現行具斯三義名爲小煩惱地法圓暉法師述一唯修所斷二意識地起與無明相應三各別現行具此三義故獨得名小煩惱地也寶法師判一唯修所斷二唯意識地起三唯無明相應四各別現行若爾光法師釋似背論文如何答伺一段論文尋五品廢立大地法大善地法大煩惱地法大不善地法前四品法皆以一義廢立之至第五小煩惱地法豈以多義廢立之哉故光法師釋云今依此論各以一義廢立大地法等此今論能非開人解西方號爲聰明論也信不虚言文是以今論中云謂法少分染汚心倶唯以一義廢立小煩惱地法見但於今論如是類法唯修所斷等之文者重顯謂法少分染汚心倶之意也故光法師釋云今依此論一義廢立小煩惱地法十謂唯修所斷意癡相應文此釋意云謂法少分染汚心倶者顯唯修所斷意癡相應之一義即依此一義廢立小煩惱地法爲言次於泰法師等釋者人師異釋也不可和會之問寶法師意以大煩惱地法大不善地法心所不立小煩惱地法故如何釋之耶進云寶法師釋云大煩惱地法大不善地雖復唯與無明相應闕三義故不得名少文付之以性相思之大煩惱地法大不善地法心所亦與貪等煩惱相應何判有唯無明相應一義哉可云闕四義故不得名少也如何答寶法師意以唯修所斷唯意識地起唯無明相應各別現行之四義建立小煩惱地法之時大煩惱地法無明放逸懈怠不信惛沈掉擧六法大不善地法無慚無愧二法全無唯修所斷唯意識地起各別現行之三義故就全闕云闕三義故也此等心所時有與獨頭無明相應之義故不闕唯無明相應一義爲言覺澄阿闍梨云大煩惱地法大不善地法有唯無明相應之義者非簡與貪等煩惱相應之門爲顯唯染汚義云雖復唯與無明相應也是以次下文述惡作一種雖唯修所斷唯意地起以非唯與無明相應雖別頭起不名爲少惡作雖不與貪等煩惱相應遍善法故云以非唯與無明相應也若爾大煩惱地法大不善地法有唯無明相應之義之釋無其過歟重難云寶法師釋猶不可然大煩惱地法中無明爭可有唯無明相應之義哉答若依前義會此疑者就除無明餘五大煩惱地法心所有唯無明相應之義云也若依後義會此疑者大煩惱地法大不善地法有唯無明相應之義者顯唯染汚義故於無明可有此義也重難云就前義亦有疑若大煩惱地法中無明無唯無明相應之義者唯修所斷唯意識地起唯無明相應各別現行之四義倶可闕之而寶法師次上釋云尋伺雖遍染心闕四義故不名爲小煩惱地法遍染汚心所闕今此四義之類何唯出尋伺二法不擧無明哉答彼擧遍染汚心所闕今此四義之類故唯出尋伺二法也無明唯染汚心所故次下別釋四義闕具也問貪嗔二惑可倶起耶答不倶起也兩方若倶起者貪嗔二惑行相相違更不可有倶起義哉若依之爾者見圓暉法師解釋明由唯修所斷意識地起與無明相應各別現行三義廢立小煩惱地法云且如受等十大地法癡等六大煩惱法及無慚愧二不定中貪嗔尋伺睡眠此等諸法三義倶闕文若貪嗔二惑不倶起者何闕各別現行之義哉答貪嗔二惑行相相違法故不倶起者性相之所定也始不可疑之故見光法師餘處十六解釋云善法相順故三法竝生惡多相違故貪嗔不幷文但於圓暉法師釋者今各別現行者忿等十惑相望論之故於貪嗔二惑雖是各別現行非忿等十惑各別現行故云三義倶闕歟問小煩惱地法十種心所聖者悉起之歟答悉可起之也兩方若悉起之者光法師餘處二十一所引正理論五十四中解諂誑云傳聞此唯異生所起非諸聖者亦可現行文如此文者諂誑心所聖者不起之見若依之爾者披今論餘處十九文明聖者未斷不起類之中無出小煩惱地法十種心所爰知聖者悉可起之云事如何答小煩惱地法十種心所聖者悉可起之也故見今論餘處十九文明聖者未斷不起類偈頌結慢類等我慢惡作中不善聖者而不起見疑所増故長行述等言爲顯殺等諸纒無有愛全有愛一分此慢類等我慢惡悔是見及疑親所増長雖修所斷而由見疑背已折故聖不能起謂慢類我慢有身見所増殺生等纒邪見所増諸無有愛斷見所増有愛一分常見所増不善惡作是疑所増故聖身中皆定不起無別小煩惱地法十種心所正理論四十七文其意同之顯宗論中擧聖者未斷不起類畢云餘非見疑親所増故聖既成就容可現行文准此等文思之聖者未斷不起類中不出小煩惱地法十種心所故定知餘非見疑親所増故之内可攝忿等十隨煩惱也若爾小煩惱地法十種心所聖者悉可起之云事炳然也但於光法師餘處所引正理論文者就初靜慮諂誑論之也故勘正理論現文云寧知梵世有諂誑耶以大梵王匿己情事現相諂誑惑馬勝苾芻傳聞此唯異生所起非諸聖者亦可現前文此文既案問答初靜慮有諂誑云傳聞此唯異生所起等故就初靜慮諂誑顯聖者不起之旨見依之元瑜法師釋此文云有言唯大梵王忌自稱譽然諸聖者不爲大梵故雖成就而不現行猶成就者地法有故文案此釋意不遮欲界諂誑聖者起之也重難云聖者已斷見惑見惑等流小煩惱地法心所不可起之例如慢類我慢身見所増殺生等纒邪見所増諸無有愛斷見所増有愛一分常見所増不善惡作疑所増故聖者雖未斷不起之如何答見惑等流隨煩惱中親隨順見惑其過重者不起之如不善惡作等也不親順見惑其過輕者聖者起之如惱等也何以見惑等流皆可未斷不起哉問小煩惱地法十種心所北洲悉起之歟答不悉起之歟兩方若悉起之者披正理論餘處文北洲可有不起之類見若依之爾者三洲悉起之北洲相例可同如何答見正理論餘處五十四文云令心不喜説名爲嫉此異於嗔有別法體故有釋嫉不耐他榮謂此於他諸興盛事專求方便破壞爲先令心焦熱故名不善是嗔隨眠等流果故專心爲欲損壞他故正隨憂根而現行故唯欲界繋非色無色欲界諸處皆通現成唯除北洲成而不現文此文意云嫉心所者不耐他榮於他興盛事專求其方便欲損壞他爲其行相而北洲無有自他計著故雖成就嫉心所而不現行爲言若依元瑜法師釋意者不起慳心所可云也故元瑜法師釋此文云問小煩惱地法心所中歡行轉煩惱等流不與歡行轉受相應類可有耶答可有此類也兩方若此類者既歡行轉煩惱等流也何不與歡行轉受相應哉若依之爾者披今論餘處二十一文可有此類見如何答見今論餘處文云餘四見慢與喜相應以歡行轉唯意地故見取是歡行轉煩惱也而今論餘處二十一文偈頌結惱從見取起長行述惱是見取等流光法師當卷釋云惱是見取等流翻見取爲正見寶法師全亦同之依此等定判惱是見取等流故歡行轉煩惱等流也任諸隨煩惱中嫉悔忿及惱害恨憂倶起之理惱與憂根相應慼行轉故不與歡行轉受相應之故小煩惱地法心所中歡行轉煩惱等流不與歡行轉受相應之類者即是惱心所也但於既歡行轉煩惱等流也何不與歡行轉受相應哉云難者勘今論餘處二十一文云惱謂堅執諸有罪事由此不取如理諫誨惱捨如理事堅執不如理事相順見取捨勝執劣爲最勝故雖以惱爲見取等流惱與憂根相應慼行轉故不與歡行轉受相應也問大善地法心所爲自力起爲當隨從起歟進云光法師釋云隨從非自力文付之善心所中無別自力起類對何法可名隨從起哉是以披光法師餘處十三解釋云於心所中無別心所是自性無記由無自性不立相應由不立自性相應亦不立等起文相例可同如何答一聚相應法中以心王爲其主而大善地法心所隨心王起故無別自力起相故光法師釋隨從非自力尤有其謂故見寶法師泰法師釋同述相應起非自力起之旨諸師一同定判誰可疑之哉但於光法師餘處釋者彼於心所中由無自性無記故不立相應無記由不立自性相應無記故亦不立等起無記爲言此大善地法心所隨心王起故無別自力起相故爲隨從起非自力起之類全不可蒙相例之難也重難云勘寶法師釋云非相應起非自力起謂有一法即是心王文泰法師釋其意同之如此等釋者心王非自力起非隨從起見心王若非自力起者何云大善地法心所隨心王起故爲隨起哉何況若由此故者一切心所隨心王起皆可名隨從起也如何答自力起隨從起者於心所分別之心王是其主故望何物可論自力起隨從起相哉寶法師等釋專叶道理但大善地法心所隨心王起故無別自力起相應故雖名隨從起非云心王即自力起貪嗔慢疑惡作及小煩惱地法十心所雖隨心王起獨頭起惑故釋自力起非隨從起也問光法師意睡眠心所爲自力起爲當隨從起歟答可隨從起非自力起也兩方若自力起者見今論文説睡眠遍不違定知隨從起云事若依之爾者婆沙論中明纒非結云睡眠惡作雖亦獨立而不離二文既云獨立寧非自力起哉答睡眠心所其性羸劣隨他力起依他力成善等性故分別自力隨從之時定可隨從起非自力起也故今論中釋睡眠遍不違之本頌云應知睡眠與前所説一切心品皆不相違通善不善無記性故文若自力起者何可有遍不違之義哉何況披今論餘處二十一文偈頌結纒無慚愧眠惛掉見修斷餘及煩惱垢自在故唯修長行述且十纒中無慚等五通見修斷由此通與二部煩惱相應起故隨與見此諦所斷相應即説名爲見此諦所斷餘嫉慳悔忿覆幷垢自在起故唯修所斷唯與修斷他力無明共相應故名自在起睡眠心所等名相應起餘嫉慳悔等稱自在起正理論五十四文顯宗論二十七説其言少異其意大同加之勘正理論餘處五十四文云何故纒中嫉慳二種建立爲結非餘纒耶若立八纒應作是釋二唯不善自力起故謂唯此二兩義具足餘六無一具兩義者無慚無愧雖唯不善非自在起悔自在起非唯不善餘兩皆無文光法師餘處二十一釋餘兩皆無之文云餘睡眠惛沈掉擧兩義皆無文顯宗論文全同正理雜心論四云眠亦與餘使相應故不獨立善不善無記故不離二文婆沙論三十七評家意成夢中善不善業不能引衆同分故云眠時但能造圓滿業非牽引業隨他力轉性昧劣故然得欲界五蘊異熟文泰法師釋云一相應非自力有二十九謂通九除惠善十大或五除無明不善大地二地外尋伺及眠文任此等定判睡眠心所是隨從起非自力起云事甚分明也光法師意豈不存此理哉但於婆抄論睡眠惡作雖亦獨立而不離二之文者光法師當卷會此文作四釋云解云婆沙據睡眠不與貪等忿等相應與善無記心相應名獨立如無明不與貪等忿等相應名不共無明今立四句中睡眠非自力者據無別自力起相如尋伺等故初句攝又解婆沙此師意説一切睡眠皆名獨立此貪等皆名隨從以於睡位起故若作斯解第二句攝又解睡通二種若與貪等相應名隨從若與善無覆無記心相應名自力婆沙但言雖亦獨立不言不通隨從若作斯解即第三句攝又解是餘師義不必須通文第十卷疏釋然諸結生唯煩惱力非由自力現起纒垢之論文云問纒中睡眠爲是自力爲是隨從解云是隨從理實此位亦無睡眠而不別簡者若自力纒垢初結生位定非現起故此別簡其隨從纒即非決定若無慚無愧惛沈掉擧此位相應若睡眠不相應以結生位非睡眠故以隨從纒性不定故文不別簡又解睡眠是自力纒若作斯解即自力纒中已簡故婆沙五十簡纒非結中有一復次云睡眠惡作雖亦獨立而不離二已上論文或説自力或説隨從兩釋無違幷會婆沙如心所中已具分別文第二十一卷疏以婆沙論今文望正理論餘兩皆無之説問准婆沙睡眠亦是自力起何故正理云非自力答之云解云婆沙餘師義非與正理同説八説十既各不同知異説又解睡眠若與餘惑相應非自力起正理據此説若與善無覆心相應是自力起婆沙據此説各據一義幷不相違文光法師處處之解釋中會婆沙論今文作多異釋其旨如此後學之輩深可思之重難云光法師當卷四釋倶有其疑先初釋不可然婆沙論中睡眠惡作雖亦獨立而不離二者明纒非結之所以也而纒結者唯限染汚不通善及無覆無記何釋與善無記心相應名獨立哉次第二釋亦難思貪等煩惱是自力起惑也更不可云隨從起若覺悟位自力起睡眠位隨從起者貪等煩惱可通自力隨從唯自力起非隨從起之句中擧之不及簡別豈非大疑哉次第三釋亦不明今論云睡眠遍不違婆沙論判隨他力轉性昧劣故不限染汚一類廣通三性睡眠論之見今分別若與貪等相應名隨從若與善無覆無記心相應名自力寧不背此等論説哉何況若與善無覆無記心相應名自力者第一第三釋差異頗難辨次第四釋似自由披婆沙論文尋一段前後委述於十纒中唯立嫉慳爲結非餘云所以至睡眠獨立之文輒不可下餘師不正義次光法師第十卷幷第二十一卷二釋相當今四釋中何釋意哉答光法師初釋意云睡眠之中若不與貪等忿等相應與善及無覆無記心相應不隨貪等忿等起故名獨立如無明不與貪等忿等相應名不共無明婆沙論説即據此意若與貪等忿等相應隨彼力起無別自力起相如尋伺等故爲隨從起非自力起今四句分別亦據此門爲言但婆沙論中明彼纒類通善及無覆無記非結既就三性云而不離二於雖亦獨立之義何可簡善及無覆無記哉第二釋意云睡眠位中餘心所起故可有睡眠爲主餘心所爲伴之義門據此義門三性睡眠皆名獨立貪等煩惱皆名隨從婆沙論文即顯此旨也然而論實義者貪等煩惱不依睡眠力起不依睡眠力成不善等性睡眠心所依貪等力起依貪等力成不善等性故貪等煩惱是自力起非隨從起睡眠心所是隨從起非自力起可云也第三釋意云會睡眠獨立之文其趣雖與初釋意同初釋意唯限隨從爲面屬初句攝第三釋意通自力隨從爲面屬第三句攝是其兩釋之差異也但此釋意就實而談之時可存三性睡眠倶名隨從之門故今論睡眠遍不違之文婆沙論隨他力轉性昧劣故之説全非相違也第四釋意云睡眠獨立之義背評家隨他力轉性昧劣故之文故下餘師不正義尤有其謂也次光法師第十卷二釋如次當今第一第二釋意也第二十一卷初釋當今第四釋意彼第二釋當今第一釋或三釋意也問光法師明睡眠心所自力隨從相作四解釋爾者第二釋意睡眠心所與不共無明相應歟答可與不共無明相應也兩方若相應者第二釋意述一切睡眠皆名獨立而不共無明獨頭起惑全無隨他起義何可相應哉若依之爾者見今論文云睡眠遍不違文若睡眠心所不與不共無明相應者豈不背遍不違之理哉答光法師第二釋意睡眠心所與不共無明相應可云也故今論中釋睡眠遍不違之本頌云應知睡眠與前所説一切心品皆不相違通善不善無記性故文若睡眠心所不與不共無明相應者寧可定一切心品皆不相違哉加之勘識身足論五文云於見苦所斷不共無明隨眠相應不善意識有一結一縛一隨眠若覺悟位五隨煩惱纒當言相應若睡眠位増第六眠文後四部所斷其文亦同之睡眠心所與不共無明相應云事此文甚分明也第二釋意更不可違本論説哉但於不共無明獨頭起惑全無隨他起義何可相應哉云難者若如此疑者貪等本惑忿等隨惑自力起睡位總不現起可云歟唯限不共無明一惑被擧此疑未得其意者歟退案此釋意云睡眠位中餘心所起故可有睡眠爲主餘心所爲伴之義門據此義門睡眠心所且云獨立餘貪等惑皆名隨從也然而貪等煩惱不依睡眠力起故設雖此釋意理實而言貪等煩惱是自力起非隨從起睡眠心所是隨從起非自力起故睡眠心所與獨頭起不共無明相應無過也問今論意不共無明唯限見所斷歟進云光法師判此論同婆沙前師不共無明唯限見所斷釋也付之依光法師釋披今論現文問何等名爲不共心品答謂此心品唯有無明無有所餘貪煩惱等若貪煩惱等之等言等餘九隨眠者不共無明何不通修所斷哉何況見正理論十一文偈頌雖結於不善不共見倶唯二十至長行中存不共無明通修所斷之旨准正理説思今論意其義可同加之識身足論四五中處處屢有於修所斷不共無明之言今論意寧可背本論説哉答勘婆沙論三十八文云應作是説如是無明唯見所斷述有作是説不共無明五部皆有擧不共無明或唯限見所斷或亦通修所斷之二師異説其中今論意存唯限見所斷云義也故偈頌云於不善不共見倶唯二十長行述若於不善不共心品必有二十心所倶生謂十大地法六大煩惱地法二大不善地法幷二不定謂尋與伺不善不共無明心品必有二十心所倶生云故不共無明唯限見所斷之旨分明也思其道理自力而起非餘隨眠相應起者名爲不共無明忿等幷惡作相應修所斷無明雖有不與隨眠相應起義由忿等幷惡作力起非自力起故不名不共無明也故光法師引婆沙論二説意畢云此論同婆沙前師正理同婆沙後説各據一義釋不共名幷無違害應知諸論不共無明若説唯見所斷據前師説若言通見修所斷者據後師説文寶法師引婆沙論二説意畢云准此論文第二師釋不與隨眠相應起故名爲不共此中倶起依前師説唯是見道文任此等定判今論意不共無明唯限見所斷云事甚分明也但於今論無有所餘貪煩惱等之等言者可等取餘貪等九隨眠忿等十隨惑惡作也故光法師釋此文云謂此心品唯有無明無有所餘貪等本惑忿等少惑及惡作等故名不共自力起故若作斯解不共無明唯見所斷若貪等忿等惡作相應無明皆是相應不名不共他力起故文次於正理論文者於不善不共見倶唯二十之頌文雖不替今論説彼論意唯二十言屬不善見故不共無明非唯二十與忿等及惡作相應之故以長行文思偈頌意其言雖同其趣大異也故正理論云頌言唯者是簡別義謂唯見倶定有二十表不共品中容有惡作等文次於識身足論於修所斷不共無明之文者見婆沙論説不共無明唯見所斷云師意會此文云彼文應作是説彼是修所斷隨眠不相應無明相應心不應説言彼是修所斷不共無明相應心文今論意准婆沙論文可會通識身足論説也重難云今論意依何文理存不共無明唯見所斷云義哉是一次正理論中初云若於不善不共心品有二十種心所倶生雖與今論所説全同至下文明不共無明與惡作等相應通修所斷之旨今論文言是不異也何定存不共無明唯見所斷云義哉是二答婆沙論不共無明唯見所斷云師意專以發智論二云何不共無明隨眠答諸無明於苦不了於集滅道不了之文爲證據立其道理云修所斷無明容有隨眠不相應者而不名不共所以者何他力起故謂若無明自力而起非餘隨睡相應起者名爲不共修所斷無明雖有不與隨眠相應起者而非自力所起是忿恨等力所起故不名不共文此義既得文理之證定知可正義也故婆沙論中此師義置應作是説之言今論意存不共無明唯見所斷之義依此等文理歟次正理論中初雖述不善不共心品有二十種心所倶生之旨至下文云表不共品中容有惡作等成不共無明與惡作等相應通修所斷之義今論文云必有二十心所倶生非只置必有之言至下段不云不共無明與惡作等相應通修所斷故與正理論意異云事炳然也尋云見識身足論文云於修所斷不共無明隨眠相應不善意識有一結一縛一隨眠若覺悟位五隨煩惱纒當言相應若睡眠位増第六眠文今此五隨煩惱纒者無明惛沈掉擧無慚無愧也何不出忿等隨一哉答修所斷不共無明者雖是忿等及惡作相應無明彼忿等及惡作非定倶起法故不擧之也問光法師所引正理論文云然此惡作通善不善不通無記隨憂行故離欲貪者不成就故文爾者離欲貪者不成就故者釋上隨憂行故歟答不釋上隨憂行故也兩方若釋上隨憂行故者諸無覆無記法離欲貪時不捨之故以離欲貪者不成就故顯惡作不通無記之義也更不可釋上隨憂行故若依之爾者設雖惡作通善不善不隨憂行者何可定離欲捨法哉是以光法師處處解釋中擧離欲捨法唯出憂根明知惡作心所不隨憂行者可非離欲捨法故離欲貪者不成就故者無諍釋上隨憂行故云事如何答見光法師所引正理論文上標然此惡作通善不善不通無記畢下云隨憂行故離欲貪者不成就故置二故字任文相起盡述惡作心所限善不善不通無記之二故見離欲貪者不成就故者非釋上隨憂行故歟但於設雖惡作通善不善不隨憂行者何可定離欲捨法哉云難者惡作心所相似憂根極麁品故是離欲捨也不可關憂根相應故許歟如彼欲界疑煩惱雖與憂根相應非離欲捨也問惡作心所唯與憂根相應歟答不可限憂根相應也兩方若唯與憂根相應者惡作心所種類是廣何無捨根相應之類哉若依之爾者思惡作心所行相等與憂根相似更不可有餘根相應之義是以光法師所引正理論中云然此惡作通善不善不通無記隨憂行故惡作心所唯與憂根相應見如何答惡作心所行相應甚順憂根故初起之時雖必與憂根相應相續斷位亦可與捨根相應也故見今論餘處二十一文述諸隨煩惱中嫉悔忿及惱害恨憂倶起等畢云此上所説諸隨煩惱一切皆與捨受相應相續斷時皆住捨故惡作等諸隨煩惱相續斷時必與捨受相應定准不善惡作推知善惡作相續斷時皆住捨故之理不可替故善不善惡作心所同可有捨根相應之義也但於光法師所引正理論文者就惡作心所初起之時云隨憂行故也全非遮相續斷位亦與捨根相應歟問雜心論意無記惡作與憂根相應歟答不相應也兩方若相應者憂根是強思起法也彼論意設雖存惡作通無記何可與憂根相應哉若依之爾者披泰法師解釋引正理論有執惡作亦通無記憂如喜根非唯有記此相應品便有十三心所倶起之文畢云外方諸師欲令憂通三性故執惡作與無記憂倶然雜心論悔増三品是外國師義文如此釋者彼論意無記惡作與憂根相應見如何答雜心論中於追悔者或云通善不善及無覆無記或云唯限善不善不通無記之二師説有之故雜心論二云悔眠倶即増者心追變名爲悔是善不善無記心品中増悔餘如前説當知悔三種善不善及不隱沒無記非餘自力故毘婆沙者不欲令悔有無記以悔捷利故文大乘義章二三有爲義云依如毘曇悔通善惡白淨無記不通穢汚次以爲狹文毘婆沙説悔唯有二謂善不善不通無記以捷利故文於憂根者唯限善不善不通無記定故雜心論八云憂根一向有報彼善不善有漏故現在方便生故非報生非威儀非工巧非學習法故亦非無漏從煩惱生故文大乘義章四二十二根義云五受根者毘曇法中憂通善惡不通無記論自釋言方便生故非報無記非習學法是故非威儀工巧變化無記餘通三性文准此等定判思之追悔通無覆無記云師意憂根唯限善不善不通無記存故無記追悔不與憂根相應云也加之勘大乘義章處處之文或二三有爲義云依如毘曇無慚無愧嗔忿恨害惱嫉慳覆及與眠數此之十一唯在欲界覺觀諂誑上極初禪高極三禪餘通三界追悔通上二界見或六十纒義云若依毘曇無慚無愧睡掉及悔通在六識餘五在意追悔通與五識相應述此通上二界及與五識相應追悔其性是可無覆無記故不與憂根相應云事亦炳然也何況撿雜心論第八卷文或云欲界四者謂男根女根苦根憂根欲界繋或云憂根未離欲必成就離欲不成就憂根不通上二界判或云謂憂根見斷及修斷或云苦根五識身相應故非見斷從煩惱生故非不斷憂根不與五識相應見若爾通上二界及與五識相應追悔不與憂根相應之理旁勿論也但於泰法師釋者正理論有執惡作亦通無記云意義與雜心論追悔通無覆無記云師説其惡作通無記之邊是同故引合之云然雜心論悔増三品是外國師義也全非謂雜心論意無記追悔與憂根相應歟寫本云弘長四年甲子正月十日申時於海住山十輪院抄之畢去年初秋之末始此抄出今歳孟春之半終其微功居諸推移首尾及二百日論議數多問答餘七十條之間結集之次分爲兩帖方今宗性離本寺而幾許日雖忍南都之夜月住勝地兩三箇年久馴東山之朝雲爲之夢中之歡樂爲之老後之思出仰願當山本尊觀自在尊伏乞佛法擁護春日權現佛神垂哀愍必施臨終正念上生内院之引接宿願得成就速預龍華三會聞法悟解之巨益而已權大僧都宗性六十三夏五十一享祿三年庚寅極月日寫功畢右爲磨諸法鏡書當卷兩帖拙志愚應尊神知見給興定露命三十三
