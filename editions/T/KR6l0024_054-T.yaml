body:
  text: 倶舍論第十八卷抄問題問正理論意五無間業身語二業爲體歟問於五無間等定業異熟果可有非擇滅耶問以斷善邪見可立無間罪耶問寶法師意云不和合性以聖法上非得爲體文爾者今此聖法上非得者異生性外可有別體耶問光法師意不和合性體如何釋之耶問論中云豈成無間文爾者約僧破體致此問歟問欲界善業中可有感一劫異熟果類耶問成劫壞劫可有長短不同耶問頌文云無間一劫熟文爾者今此一劫者何劫耶問提婆達多所造破僧罪於無間地獄一中劫異熟果悉可起取果用耶問光法師所引婆沙論中云如毘奈耶説提婆達多當於人壽四萬歳時來生人中必定當證獨覺菩提文爾者今此獨覺菩提者部行麟喩中何問光法師解釋中云釋迦如來於第九住劫出世文爾者可云禀承實義耶問造多逆罪人初所造無間業必可爲引業耶問成實論意造多逆罪人前後受彼異熟果歟問經部宗意造一逆罪人第三生已後猶可受彼異熟果耶問提婆達多爲先犯出血罪後造破僧罪爲當先造破僧罪後犯出血罪歟問論中釋破異處愚夫頌文擧二師異説爾者初師意愚夫言可通忍世第一法位耶問論文云要八苾芻分爲二衆以爲所破文爾者八人倶隨能破者信邪法歟爲當唯四人可信邪法耶問造破僧罪唯限佛在世歟問正理論中云如是破僧諸佛皆有不爾要有宥破他業文爾有何時宿業耶問殺麟喩獨覺可成逆罪耶問於阿羅漢無阿羅漢想殺時可成逆罪耶問於如來身起殺心不出血成逆罪義可有耶問金剛喩定位唯以有頂修所斷第九品煩惱上擇滅無爲爲離繋果歟問論中明無間同類業擧二師異説爾者初師意無間同類業順次生必感地獄異熟果歟問頌文云將得忍不還無學業爲障文爾者三時障業唯限引業歟問論文云將得忍時感惡趣業皆極爲障文爾者寶法師意今感惡趣業者可通善不善業耶問論中付明三時障業且於人中可熟地獄業者異處熟非異處熟中何耶問光法師解釋中引婆沙論説相異熟業或云唯思所成或云通聞思所成二説爾者通聞思所成云義可爲正義耶問釋迦超劫唯限九劫歟問釋迦彌勒最初發心同時歟問論中明相好業量云有説唯除近佛菩薩所餘一切有情所修富樂果業名一福樂文爾者今此富樂果業中可攝四梵福耶問勝觀佛底沙佛一佛歟問論文云如是讃已便超九劫文爾者釋迦菩薩讃歎底沙佛超九劫百劫中第九十一劫歟問異生所成就通力中除中有位知他三千界義可有耶問光法師釋此刹那善蘊總立以施名頌文作二解釋爾者第二釋意今此刹那者指一刹那歟問已離欲聖者於欲界可造報定時不定業耶問不還果聖者於欲界受時報倶不定業異熟果義可有耶問論中明戒類福業事云一者不爲犯戒所壞犯戒謂前諸不善色文爾者性罪遮罪倶可名犯戒耶問光法師意於梵輔天受四十一中劫壽類可有耶問舍利弗目蓮於佛可爲法供養耶
