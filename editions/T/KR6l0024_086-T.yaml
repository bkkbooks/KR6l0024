body:
  text: 倶舍論第二十八卷抄下問色無色界近分地可有定煩惱耶答無定煩惱也兩方若有定煩惱者披今論文云雖近分心有結生染而遮定染故作是説文此文無諍色無色界近分地無定煩惱見若依之爾者婆沙論四十二中問未得色無色界根本定者亦能起彼増上慢耶答之云若已證得而未起者容起彼慢彼近分地亦有慢等諸煩惱故文如此文者色無色界近分地有定煩惱云事甚分明也何況見今論餘處二十一文明煩惱受相應云以諸隨眠相續斷位勢力衰歇必住捨受文若近分地無定煩惱者依身在欲界起色無色界煩惱之時爭可有必住捨受之義哉答定煩惱者專緣任運容預道生也而八近分地是離染道起艱辛故緣彼不起愛見慢疑等煩惱故諸近分地無定煩惱也故今論云此八近分皆淨定攝皆無有味離染道故雖近分心有結生染而遮定染故作是説文光法師釋此文云皆無有味是離染道起艱辛故不生貪愛以彼味定非離染道生故是容預道生故近分地中雖亦有道非正離染助離染故離染類故非容預故不生貪愛雖近分心有結生染以受生命終捨受相應故必起近分而遮定染故作是説近分無味唯在根本文正理論云此八近分皆淨定攝皆無有味離染道故若爾何緣毘婆沙説諸近分地有結生心非無染心有結生理故應近分有味相應今於此中遮有定染不遮生染故不相違文顯宗論三十九説全亦同之加之婆沙論六十一中明起惑退相云此中若未得根本善靜慮無色定現在前者彼不能起色無色界纒現在前故退但能起欲界纒現在前故退若得根本善靜慮現在前非無色定者彼不能起無色界纒現在前故退但能起欲色界纒現在前故退若得根本善靜慮無色定現在前者彼能起三界纒現在前故退文若近分地有定煩惱者設雖不起根本定何無起彼地煩惱現在前故退之義哉任此等定判色無色界近分地無定煩惱云事甚炳然也但於婆沙論彼近分地亦有慢等諸煩惱故之文者得色無色界根本定未現起者生彼地初受生位起近分地慢等生煩惱爲言全非謂近分地有定煩惱也次於今論餘處勢力衰歇必住捨受之文者述起自地煩惱之時事也起他地煩惱不必住捨受故餘處釋亦無相違歟重難云婆沙論彼近分地亦有慢等諸煩惱故之文起生煩惱之事不可然此文未至地有味定云師意就未至地論之也故婆沙抄三本中釋此文云且如已離欲界染已證得上界根本定而未現起時身在欲界人亦起未至地中煩惱文今會通之趣寧不違此釋哉答披婆沙論文問未得色無色界根本定者亦能起彼増上慢耶廣就色無色界致問答之云應説不定全未得者必不能起未離下染上地煩惱不現前故若已證得而未起者容起彼慢彼近分地亦有慢等諸煩惱故廣依色無色界近分地容起慢等煩惱見故約生煩惱得意也唯就未至地論之云事專皆問答首尾故婆沙抄釋不可依用之何況今論中皆無有味離染道故者是本義也有説未至定亦有味相應者不正義也緣未至定起貪煩惱云説不叶道理豈以之爲正義哉故泰法師述初師意云而定微劣不能起貪故言而遮定染故作是説文而婆沙論文置應説言擧評家義旁思之非未至地有味定云師意也問第四靜慮以上受生命終心爲唯限近分爲當通根本歟答可有二義也兩方若通根本者見今論文云雖近分心有結生染文光法師釋此文云雖近分心有結生染以受生命終捨受相應故必起近分文加之婆沙論百六十五中云命終結生唯住近分不住根本文任此等文不通根本之旨炳然也若依之爾者第四靜慮以上根本心唯與捨受相應寧不爲受生命終心哉是以光法師餘處十所引正理論三十文述由此故説下三靜慮唯近分心有死生理不簡第四靜慮以上根本心哉答此事依難測可存二義也或一義云第四靜慮以上根本心既與捨受相應故可爲受生命終心也故光法師餘處所引正理論云非明利識有死生義以死生時必昧劣故由此故説下三靜慮唯近分心有死生理以根本地無捨受故文此文意以下三靜慮根本地無捨受爲唯近分心有死生故故知根本地有捨受之處受生命終心可通根本云事但於光法師以受生命終捨受相應故必起近分之釋者八地近分心皆唯與捨受相應故乍八地無所簡近分心容受生命終八地根本心或與捨受相應或不與捨受相應其義不定故受生命終心不通八地根本故對根本心不定云必起近分也非一向簡根本心歟次於婆沙論命終結生唯住近分不住根本之文者釋發智論十七淨初靜慮與味相應上三靜慮及四無色爲一増上緣取意之文問亦有等無問緣謂初靜慮善心命終生上地時此中何故不説答之云有説此定蘊中唯説根本善及煩惱命終結生唯住近分不住根本是以不説就初靜慮命終結生心論之也初靜慮結生心雖非今要須爲成初靜慮命終善心唯是近分非根本故初靜慮命終結生心唯住近分不住根本故此中不説之爲言非云上地結生心唯住近分不住根本故無相違也或一義云受生命終心非明利根本心明利故第四靜慮以上受生命終心唯限近分不通根本也光法師以受生命終捨受相應故必起近分之釋婆沙論命終結生唯住近分不住根本之文四靜慮四無色受生受命終心唯限近分不通根本之旨分明也但於第四靜慮以上根本心唯與捨受相應云難者根本心明利不順死生近分心非明利順死生故第四靜慮以上根本心雖唯與捨受相應不爲受生命終心也次於光法師餘處所引正理論文者爲顯捨受相應心非明利有死生義餘受相應心明利無死生義云下三靜慮唯近分心有死生理以根本地無捨受故也非謂云爾故捨受相應心皆非明利第四靜慮以上根本心有死生義根本心雖與捨受相應明利故也問頌文云初亦聖或三文爾者或三者正義歟答可非正義也兩方若正義者長行中述此義云有説未至定亦有味相應文既置有説之言知非正義云事若依之爾者論文不判正不何定非正義哉答未至地有味定云説非正義歟其故婆沙論六十一中明起惑退相云此中若未得根本善靜慮無色定現在前者彼不能起色無色界纒現在前故退但能起欲界纒現在前故退文若未至地有味定者未得根本善靜慮無色定現在前者寧無起色界纒現在前故退之義哉以此文思之未至地有味定云説可非正義也但於論文不判正不云難者今論中設雖不判正不違婆沙論評家説者何爲正義哉何況今論云有説未至定亦有味相應未起根本亦貪此故由此未至具有三種正理論七十八述或有餘師作如是説初近分定亦有定染未起根本亦貪此故由此未至具有三種有餘師説非正義家之旨亦炳然也問未至定有味定云師意今此味定可緣未至定耶答可緣未至定也兩方若緣未至定者今論中擧此師義云有説未至定亦有味相應未起根本亦貪此故文如文相者今此味定可緣根本定見若依之爾者既未至地味定也尤可緣未至定哉答未至定有味定云師意未起勝根本定故緣劣未至定生貪愛故未至定有味定云也故光法師釋此師意上七近分無有味定云上七近分由已曾得下根本故於彼近分不生貪愛故不説有述緣上七近分不生貪愛故無有味定之旨爰知未至定有味定者緣未至定生貪愛故也云事但於今論未起根本亦貪此故之文者未起勝根本定亦貪愛劣未至定故未至定有味定爲言故光法師釋此文云以來起根本亦貪此定故文亦貪此定故者即指未至定也問論文云中間靜慮與諸近分爲無別義爲亦有殊文爾者寶法師如何釋之耶進云寶法師釋云述中間定與未至定有別義也文付之驚寶法師釋思今此問意以中間靜慮對八近分問其同異也何唯釋未至定哉是以光法師幷泰法師釋意可通八近分見如何答披論文前後尋近分通局初問中間靜慮與諸近分爲無別義爲亦有殊謂答義亦有殊謂諸近分爲離下染是入初因中定不然重標復有別義述初本近分尋伺相應上七定中皆無尋伺唯中靜慮有伺無尋故彼勝初未及第二依此義故立中間名由此上無中間靜慮一地昇降無如此故唯此答文案上問意以中間靜慮對八近分問其同異之旨甚炳然也何況與諸近分之諸言既廣不限未至定云事誰可疑之哉但於寶法師述中間定與未至定有別義也之釋者於八近分且立未至名歟問中間靜慮業可感梵輔天異熟果耶答可感梵輔天異熟果也兩方若感梵輔天異熟果者中間靜慮業者無尋唯伺也不可感有尋有伺異熟果是以被發智論文云頗有業感心受非身耶答有謂善無尋業善無尋業不感身受定若中間靜慮業感梵輔天異熟果者善無尋業寧不感身受哉若依之爾者今論中明中間靜慮相云此定能招大梵處果多修習者爲大梵故文光法師釋此文云若多修習爲大梵王不多修習便爲梵輔同一處故文任此等定判中間靜慮業可感梵輔天異熟果云事分明也如何答勘婆沙論文云有三品善引初靜慮無別異衆同分業隨由一品生初靜慮既生彼已隨其所應受彼三品無別異善法異熟果初靜慮下中上三品業共感初靜慮三天無別異善法異熟果故中間靜慮業可感梵輔梵衆二天異熟果也今論多修習者爲大梵故之多言光法師不多修習便爲梵輔之解釋此旨炳然也但於中間靜慮業者無尋唯伺也不可感有尋有伺異熟果云難者中間靜慮業感梵輔梵衆二天異熟果者感色不相應異熟果也不感心心所異熟果故無尋唯伺業不感有尋有伺異熟果也重意云心心所有有尋有伺無尋唯伺等差異色不相應無此義故中間靜慮業雖感梵輔梵衆二天色不相應異熟果不感心心所異熟果也如此得意之時發智論善無尋業不感身受云文亦非相違也重難云見今論餘處文有説意中間靜慮業不感受果云義引本論頗有業感心受異熟非身耶曰有謂善無尋業之文破之今會通之趣豈不同彼所破義哉答彼有説意存中間靜慮業唯感色不相應異熟果全不感受異熟果故引發智論今文破之也此會通之旨無尋唯伺業不可感有尋有伺異熟果故中間靜慮業不感梵輔梵衆二天心心所異熟果云許也感大梵天心心所異熟果之義邊許之故異彼所破義也問依無願三摩地入見道者一相續身中可有空三摩地現起義耶答可有此義也兩方若有此義者披婆沙論百九文云若依無願入正性離生者彼惑依無願無相離三界染盡衆同分空不現前文如此文者一相續身中無空三摩地現起義見若依之爾者依空三摩地入見道者一相續身中必有無願三摩地現起義相例可同如何答依無願三摩地入見道者種類非一准一相續身中可有空三摩地現起義也但於婆沙論盡衆同分空不現前之文者從多分説也以何知之者見婆沙論次上文云若利根者多依空入正性離生若鈍根者多依無願入正性離生文准此文思之利根者多依空三摩地入見道多依空三摩地斷三界煩惱鈍根者多依無願三摩地入見道多依無願無相三摩地斷三界煩惱故空三摩地不現起歟然而依無願三摩地入見道者少亦依空三摩地斷三界煩惱之義可有也既置多言置惑言故知盡衆同分空不現前者一往且談多分相也更非盡理説歟尋云有何故利根者多依空三摩地入見道鈍根者多依無願三摩地入見道哉答著我見者著我所見者依空三摩地入見道我慢増者懈怠増者依無願三摩地入見道也而著我見者著我所見者多是利根我慢増者懈怠増者多是鈍根故利根者多依空三摩地入見道鈍根者多依無願三摩地入見道也問利根聖者以無相及道無願三摩地斷三界煩惱義可有耶答可有此義也兩方若有此義者見婆沙論文述若以無相道無願三摩地盡三界結者唯修二不修無生智定若有利根聖者以無相及道無願三摩地斷三界煩惱之義者何不修無生智哉若依之爾者利根聖者種類非一准寧無依無相及道無願三摩地斷三界煩惱之義哉答利根聖者以無相及道無願三摩地斷三界煩惱之義可有也利根聖者意樂分萬差斷惑道品現起非一准故也但於婆沙論若以無相道無願三摩地盡三界結者唯修二之文者從多分説也以何知之者見婆沙論百九一處説云若利根者多依空入正性離生若鈍根者多依無願入正性離生文准此文思之鈍根聖者多以無相及道無願三摩地斷三界煩惱故從多分述不修無生智之旨也是亦一往談更非盡理説歟尋云有何故利根聖者多以空及苦集無願三摩地斷三界煩惱鈍根聖者多以無相及道無願三摩地斷三界煩惱哉答諸有情類無始以來樂著有漏法敢無厭離心而至聖位以苦集智厭離苦集諸有漏法斷煩惱義專順利根之人觀門也緣勝境界離惑繋縛其義易故以滅道智斷煩惱義屬鈍根類也問空等三三摩地唯限無漏歟進云今論云此通淨無漏通有漏也付之依今論定判見發智論文云空無邊處識無邊處無所有處攝六智三三摩地非想非非想處攝世俗智無攝餘智幷三三摩地明知空等三三摩地唯限無漏云事加之婆沙論百六十八中釋發智論十八成就初靜慮於三三摩地無者謂諸異生之文云彼成就有漏初靜慮非三摩地不得故文此文意空等三三摩地唯限無漏之旨亦分明也如何答披今論文本頌結此通淨無漏無漏三脱門長行述此三各二種謂淨及無漏世出世間等持別故世間攝者通十一地出世攝者唯通九地於中無漏者名三解脱門能與𣵀槃爲入門故空等三三摩地通有漏無漏空等三解脱門唯限無漏定光法師釋此文引正理論七十九説云世間攝者通十一地出世攝者唯通九地上七定邊無勝徳故於中無漏者名三解脱門能與𣵀槃爲入門故非諸有漏法是眞解脱門性住世間違解脱故文顯宗論三十九文全亦同之案此等文意三解脱門者能與𣵀槃爲入門義故唯限無漏三摩地者等持梵語平等持心令趣於境之義不限無漏故三三摩地通有漏也但於發智論中空無邊處等下三無色攝六智三三摩地非想非非想處攝世俗智無攝餘智幷三三摩地云難者准婆沙論百六十七三三摩地雖通有漏此中依解脱門説故唯攝無漏之文可會通之也發智論成就初靜慮異生不成就三三摩地云説會通之趣亦以同之問重空重無願等持可緣未來耶答婆沙論中有緣不緣異説也兩方若緣未來者重空重無願等持者聖道無間起緣過去聖道令彼厭捨之善根也更不可緣未來若依之爾者見婆沙論文云有餘師説重空無願三摩地總緣一切聖道文若總緣一切聖道名者何不緣未來哉答婆沙論百五中明重空重無願等持緣三世相云緣三世者空空及無願無願三摩地若在過去現在緣過去若在未來諸有欲令別緣最後刹那聖道或彼倶生三摩地者彼説正起者緣現在餘未來者緣三世諸有欲令總緣相續聖道或彼倶生三摩地者彼説正起者緣過去現在餘未來者緣三世有餘師説重空無願三摩地緣一切聖道彼説三世皆緣三世文委按此文意總有五異説其中若依前四師説者重空重無願等持不可緣未來其道理如一邊疑難今論等中所説之趣即此意也若依第五有餘師説者云重空無願三摩地總緣一切聖道故可緣未來也彼説三世皆緣三世之文此旨分明歟尋云今論意可許婆沙論有餘師説耶答今論中云空空等持緣前無學空三摩地取彼空相無願無願緣前無學無願等持取非常相重空重無願等持唯緣過去見故不可許婆沙論有餘師説歟問重空重無願等持可緣無相三摩地耶答婆沙論中有緣不緣異説也兩方若緣無相三摩地者以道理思之重空等持緣空三摩地重無願等持可緣無願三摩地也若緣無相三摩地者何立重空重無願等持名哉若依之爾者見婆沙論文云有餘師説重空無願三摩地總緣一切聖道文既述總緣一切聖道知緣無相三摩地云事如何答婆沙論百五中明重空重無願等持緣三世相云緣三世者空空及無願無願三摩地若在過去現在緣過去若在未來諸有欲令別緣最後刹那聖道或彼倶生三摩地者彼説正起者緣現在餘未來者緣三世諸有欲令總緣相續聖道或彼倶生三摩地者彼説正起者緣過去現在餘未來者緣三世有餘師説重空無願三摩地總緣一切聖道彼説三世皆緣三世文委按此文意總有五異説其中若依前四師説者重空等持緣空三摩地重無願等持緣無願三摩地不可緣無相三摩地其道理如一邊疑難今論等中所説之趣即此意也若依第五有餘師説者云重空無願三摩地總緣一切聖道故可緣無相三摩地也但就此師義會若緣無相三摩地者何立重空重無願等持名哉云難者重空等持苦智之中空行相後起復還與空行相相應雖專厭皆空三摩地同品聖道展轉互爲同類因故兼緣無相三摩地重無願等持苦智之中非常行相後起即復還與非常行相相應雖專厭皆無願三摩地同品聖道展轉互爲同類因故兼緣無相三摩地也總緣一切聖道故雖兼緣無相三摩地後其本名重空重無願等持也尋云今論意可許婆沙論有餘師説耶答今論中云空空等持緣前無學空三摩地取彼空相無願無願緣前無學無願等持取非常相重空等持唯緣空三摩地重無願等持唯緣無願三摩地見故不可許婆沙論有餘師説歟問論中明重無相等持緣境相緣無學無相三摩地上非擇滅作靜行相不作滅行相故如何釋之耶進云今論云濫非常滅故文付之常非常滅其義遥異設雖作滅行相更不可濫非常滅是以光法師餘處二十六所引婆沙論七十九中釋立滅諦名云滅名不共故立諦名滅名唯顯究竟滅故全無濫非常滅哉答滅有非常滅故重無相等持緣無學無相三摩地上非擇滅作滅行相可濫非常滅云事諸論同述之道理亦非無故見光法師解釋引婆沙論百五云問何故此定不作滅行相耶答滅有二種一非擇滅二無常滅若作滅行相則不知緣何滅文引顯宗論三十九云非滅行相以非擇滅非永解脱一切苦故又若觀滅濫非常故文正理論説全亦同之雜心論九云以是義故不説滅行以有二種滅謂非數滅無常滅若言滅行者不知何等滅文諸論一同之説定有深由歟但於常非常滅其義遥異云難者常非常滅其義雖異滅名是同故成相濫也次於光法師餘處所引婆沙論滅名不共故立諦名之文者光法師會此疑云擇滅諦收聖心現證雖作滅行而無有濫不同非擇滅文此釋意云擇滅諦攝無漏聖心現證見故雖作滅行相無濫非常滅非擇滅是非諦性法攝無漏聖心無現證見有漏心緣境其義浮不定故若作滅行相可濫非常滅爲言問光法師所引婆沙論百五文云有處説二滅無處説二靜文爾者有處説二滅者爲指擇滅非擇滅爲當指非擇滅無常滅歟答指擇滅非擇滅也兩方若指擇滅非擇滅者披婆沙論前後之文上云滅有二種一非擇滅二無常滅擧非擇滅無常滅二滅畢下引有處説二滅可指上非擇滅無常滅二滅見若依之爾者以擇滅非擇滅名二滅者經論常途之談也有處説二滅之言寧不指擇滅非擇滅哉答經論通途之説以擇滅非擇滅名二滅故有處説二滅者指擇滅非擇滅可云也但於婆沙論前後之文者見婆沙論一段起盡上述重無相等持緣無學無相三摩地上非擇滅作靜行相不作滅行相云滅有二種一非擇滅二無常滅若作滅行相則不知緣何滅文就之問云若爾亦應非靜行相謂靜亦有二種一非擇滅二擇滅若作靜行相則亦不知緣何靜耶文問意可知答此問云有處説二滅無處説二靜故不應例文此答意云文云若作滅行相則不知緣何滅明濫無常滅之旨雖不云濫擇滅准若作靜行相可濫擇滅云難趣思之兼亦作滅行相可濫擇滅云意可有也故爲顯滅有多類旁有相濫靜無多類都無相濫之義有處説擇滅非擇滅二滅無處説擇滅非擇滅二靜爲言婆沙論次下復次云滅義濫多靜義濫少謂滅有三靜唯二故即顯此意也已上相承義趣也愚惟云就若爾亦應非靜行相謂亦有二種一非擇滅二擇滅若作靜行相則亦不知緣何靜耶之問意擇滅非擇滅有處説二滅無處説二靜故作靜行相不濫擇滅答也安貞二年倶舍三十講宗性問智舜問不得邊際定不時解脱阿羅漢可起重三等持耶答可有二義也兩方若起重三等持者正理論七十九中明起重三等持云唯三洲人能起此定通依男女以依女身亦能自在延促壽故文泰法師解此文云以促壽人欲入無餘起此定故作此釋也文如此等定判者不得邊際定不時解脱阿羅漢不起重三等持見若依之爾者今論等中述起重三等持無簡不得邊際定者爰知不得邊際定不時解脱阿羅漢可起重三等持云事如何答此事雖難測且存一義云不得邊際定不時解脱阿羅漢可起重三等持也以何知之者光法師所引正理論七十八云不時解脱諸阿羅漢要得無諍妙願智等邊際定者能起非餘定自在故無煩惱故文顯宗論三十九説全亦同之婆沙論百六十五云於不時解脱中要得願智邊際定等殊勝功徳然後能起文此等論中明修超等至簡不時解脱阿羅漢中不得邊際定之人正理論云此亦非一切唯不時解脱以時解脱愛聖道故文顯宗論説光疏引之全亦同之光法師所引婆沙論百五云不時解脱能起非時解脱所以者何若於定得自在及無煩惱身方能起此三摩地故文此等論中述起重三等持不云要得無諍妙願智等邊際定者明知超等至是難修之觀門故不時解脱中要得邊際定等殊勝功徳之人能修習之重三等持易起之善根故不得邊際定不時解脱阿羅漢亦現起之云事但於正理論文幷泰法師釋者實以難會然而且迴愚推云修促壽邊際定欲入無餘𣵀槃之人專起重三等持厭聖道故從其根本如此釋歟非遮云爾故不修促壽邊際定不時解脱阿羅漢中亦起重三等持也後日亦按云正理論意爲顯女身起重三等持女身亦能起延促壽邊際定況不起重三等持哉爲言非謂唯修促壽邊際之定者許起重三等持而泰法師惡得正理論文意修促壽邊際定者許起重三等持釋歟若爾正理論中出修延壽邊際定者有何要須哉泰法師釋恐難依用之問初靜慮重空重無願等持唯緣初靜慮聖道歟答唯緣初靜慮聖道也兩方若唯緣初靜慮聖道者見婆沙論百九十四文擧起出離尋不思惟出離尋之句中出依未至定初靜慮起空空無願無願時若唯緣初靜慮聖道者何不思惟出離尋哉若依之爾者以道理思之初靜慮重空重無願等持唯可緣初靜慮聖道也如何答初靜慮重空重無願等持唯緣初靜慮聖道也故光法師所引顯宗論三十九云若在欲界從未至攝聖道後起若在有頂無所有處所攝聖道後生餘皆自地聖道後起文正理論七十九説全亦同之婆沙論云欲界重三摩地未至定所攝聖道後現在前非想非非想處重三摩地無所有處所攝聖道後現在前餘地重三摩地皆自地所攝聖道後現在前文雜心論云若欲界三昧禪未來所攝聖道後起若非想非非想地無所有處聖道後起餘者自地次第文任此等論説初靜慮重空重無願等持唯緣初靜慮聖道之旨分明也但於婆沙論擧起出離尋不思惟出離尋之句中出依未至定初靜慮起空空無願無願時之文者全非相違婆沙論中明重空重無願等持所緣云空空及無願無願三摩地有説別緣最後刹那聖道有説別緣最後刹那聖道倶生三摩地有説總緣相續聖道有説總緣相續聖道倶生三摩地文第百九十四卷中亦出二説云即依彼二地未至定初靜慮起空空無願無願無相無相時有説但起無相無相時文唯緣聖道倶生三摩地云師意不緣相應尋故不思惟出離尋之句中出起重空重無願等持時廣緣聖道云師意緣相應尋故不思惟出離尋之句中但擧起重無相等持時不出起重空重無願等持時也第百五卷初説當第百九十四卷第二説第百五卷第二説當第百九十四卷初説也問重三等持可通曾得耶答可通曾得也兩方若通曾得者婆沙論中明重三等持曾得未曾得相云皆唯未曾得文如此文者不通曾得云事炳然也若依之爾者見光法師所引顯宗論三十九文述得重三等持云應得此者皆盡智時由離染得文若由離染得者寧不通曾得哉答不時解脱阿羅漢果聖者初盡智位所得修重三等持後時定容現前故重三等持通曾得之義可有也但於婆沙論皆唯未曾得之文者重三等持異生有學位都不時解脱阿羅漢果聖者初盡智現前位始得之故云唯未曾得也故婆沙論百五云加行得離染得者皆通二得曾得未曾得者皆唯未曾得文思此文意初盡智位得未曾得離染得後時由加行得未曾得加行得爲言更非遮初盡智位所得修重三等持現前時通曾得之義歟問重三等持現前持可有未來修耶答可有未來修也兩方若有未來修者不時解脱阿羅漢初盡智現前位既得修重三等持是曾得法現前位也寧可有未來修哉若依之爾者重三等持者殊勝功徳也現在前時何無未來修哉答重三等持現前時可有未來修也故見婆沙論處處之文或百七述聖者修智相云已離欲染聖者起四無量世俗解脱勝處遍處不淨觀持息念世俗念住世俗無礙解無諍願智邊際定空空無願無願無相無相三摩地入滅定想微細心時現在唯修世俗智未來修八智文或百六十三擧未得非初靜慮世俗智現在前而修無漏初靜慮非淨之句云依第二靜慮起空空無願無願無相無相及増長時文如是之文其證甚多任此等説重三等持現前時有未來修云事分明也但於不時解脱阿羅漢初盡智現前位既得修重三等持云難者不時解脱阿羅漢初盡智現前位不修重三等持盡後由加行未曾得重三等持現前時有未來修頗爲勿論者歟問重三等持順勝進分攝歟答順勝進分攝也兩方若順勝進分攝者婆沙論百六十三中明四分定相云順勝進分者隨順上地順決擇分者隨順聖道此分或作聖行相或作餘行相而向聖道趣於解脱順決擇分作聖行相順勝進分不作聖行相見而重三等持作空非常靜行相知非順勝進分攝云事若依之爾者重三等持者殊勝善根也何非順勝進分攝哉答見光法師所引顯宗論三十九文云就總類説此從法類苦滅四智無間而生此後亦起聖道現前然厭道故非無間起文正理論七十九説全亦同之婆沙論百五中述評家義云評曰應作是説聖道無間此定現前此定無間不起聖道以無用故由此應知前説應理文任此等論説重三等持聖道無間起故不可云順住分攝厭皆聖道不生聖道故亦可非順決擇分攝聖道無間起然不生聖道之義大同順勝進分相故重三等持唯順勝進分攝可云也但於婆沙論中明四分定相之文者一往分別也理實而言順勝進分可作聖行相故無相違也問以無漏道離下三無色染無漏加行道位必可修無色界有漏耶答不必修之也兩方若必修之者婆沙論中不必修之見若依之爾者以無漏道離下三無色染無間解脱道位必修無色界有漏加之以無漏道離色界染無漏加行道位必修色界有漏相例可同如何答若依未至中間四本靜慮無漏離下三無色染無漏加行道位不可修無色界有漏加行道位不修無色界近分地同對治道故也若依下三無色無漏隨其所應離下三無色染無漏加行道位雖不修無色界近分地同對治道依此地故必修自地有漏也故婆沙論百六十云以無漏道離空無邊處乃至無所有染若無漏爲加行諸加行道九無間道九解脱道時彼心與未來所修無色界道諸得倶起此是總説於中若依未至定乃至第四靜慮離下三無色染者除加行道文但於以無漏道離下三無色染無間解脱道位必修無色界有漏云例難者無間解脱道正斷惑道故隨其所應修無色界近分地同對治道故必修無色界有漏也次於以無漏道離色界染無漏加行道位必修色界有漏云例難者離色界染無漏加行道者是色界無漏道故依此地故必修自地有漏也故婆沙論百五十九云以無漏道離初靜慮乃至第三靜慮染時若無漏爲加行諸加行道九無間道九解脱道時彼心與未來所修色界道諸得倶起文非同治故修色界近分地道全不可爲相例之疑歟問未至地業可感初靜慮衆同分果耶答可感初靜慮衆同分果也兩方若感初靜慮衆同分果者婆沙論百六十一中明不入初靜慮生梵世云順後次受業爲異熟因故得生彼文若未至地業感初靜慮衆同分果者何無不入初靜慮人以順生業爲異熟因生彼天義哉是以辰旦人師婆沙抄九釋此文云若順此文諸未至業非能感梵世總異熟但圓滿因也文若依之爾者未至根本是同一繋縛地也未至地業寧不感初靜慮衆同分果哉答未至根本是同一繋縛地故未至地業尤可感初靜慮衆同分果也是以婆沙論百十六中述評家義云如是説者此則不定或近分地或根本地所以者何以一切思同一地故非想非非想處近分地業感彼天八萬劫衆同分果判准知未至地業亦感初靜慮衆同分果云事必然也但於婆沙論順後次受業爲異熟因故得生彼之文者今此一段之廢立以根本地名靜慮故問不起彼定云何生彼無異熟因故不起初靜慮根本定者以何爲異熟因生梵世中哉問也答之云順後次受業爲異熟因故得生彼前生起初靜慮根本定造彼天順後業畢故今生雖不起初靜慮根本定以前生所造順後業爲異熟因故得生梵世中答也未至地業非今所問故以彼爲順生業生梵世中之義置而不論也次於辰旦人師諸未至業非能感梵世總異熟之釋者婆沙抄定判也既背文理故不可依用之文永三年丙寅五月三日酉時罷向聖禪擬講之病室習學此義畢古義云未至地業可感初靜慮衆同分果也其文理如前義但於婆沙論順後次受業爲異熟因故得生彼之文者總而論之未至地業雖感初靜慮衆同分果不起彼地煩惱之前無爲引業故今論餘處十九文云業由隨眠方得長生離隨眠業無感有能文光法師餘處釋云由得上定起上界愛愛上界身故生色界文而不起初靜慮根本定者不可起彼地煩惱故不入初靜慮依未至地造順生業感初靜慮衆同分果之義不可有也故婆沙論文無其相違歟凡此論義頗雖小事學者所存其義是多然而古義之中此義事宜歟就此義未至地定煩惱有無可沙汰之也恐繁不記之問上地下地近分相望時可有相生義耶答無相生義也兩方若有相生義者近分地是勢方微劣也難有相生義哉是以婆沙論中不相生見若依之爾者心品現起隨時不定也何無相生義哉何況披婆沙論百九十一文云從第三靜慮近分起入第二靜慮近分從第二靜慮近分起入初靜慮近分文如此文者上地下地近分相望時有相生義云事分明也如何答近分地是勢力微劣故上地下地相望時無相生義也故婆沙論云謂現前得初靜慮非第二靜慮者決定已離欲界染而上地不定於中若未離初靜慮染彼命終生梵世若依未至定或初靜慮或靜慮中間或第二靜慮近分隨一離初靜慮染最後解脱道及後時不入第二靜慮未離第二靜慮染彼命終生極光淨即彼若依未至初靜慮靜慮中間隨一離第二靜慮染未離上染彼命終生遍淨若即依前三地隨一離第三靜慮染未離上染彼命終生廣果如是乃至若即依前三隨地一離非想非非想處染彼命終無生處已離三界染故文此文意云現前得初靜慮非現前得第二靜慮者依未至定初靜慮靜慮中間第二靜慮近分四地隨一離初靜慮染依未至定初靜慮靜慮中間三地隨一離第二靜慮乃至非想非非想處染爲言若近分地有相生義者現前得初靜慮非現前得第二靜慮者第二靜慮近分無間起第三靜慮近分何不離第二靜慮染哉加之第二靜慮近分無間起第三靜慮近分第三靜慮近分無間起第三靜慮無漏道何不離第三靜慮以上諸地染哉而唯以未至定初靜慮靜慮中間三地隨一離第二靜慮乃至非想非非想處染云故上地下地近分無相生義之旨炳然也但於婆沙論從第三靜慮近分起入第二靜慮近分等之文者正見彼文云西方健駄羅國諸師作如是誦如説世尊入第四靜慮而般𣵀槃世間眼滅此爲在定爲出定耶釋此西方師義之文非迦濕彌羅國正義家意故不可劬勞也重難云見婆沙論百六十一文明不入初靜慮入第二靜慮云謂從未至定或靜慮中間或第二靜慮近分或第二靜慮或第三靜慮近分或第三靜慮或第四靜慮等無間第二靜慮現在前文此文無異説許未至定無間第二靜慮現在前義若未至定無間起第二靜慮根本者寧不起彼近分哉答根本地者定慧均等勢力強勝任運易起近分地者慧多定少勢力微劣稍難起故未至定無間雖起第二靜慮根本不起彼近分也重難云婆沙論百六十一中述不入第二靜慮入第三靜慮云謂從初靜慮或第三靜慮近分或第三靜慮或第四靜慮近分或第四靜慮或空無邊處有説亦從第二靜慮近分等無間第三靜慮現在前文此有説意既云第二靜慮近分無間起第三靜慮根本豈不起彼近分哉答此有説意雖存第二靜慮近分無間起第三靜慮根本不可起彼近分其故同前可准知之問成就淨初靜慮不成就味相應無漏初靜慮爲唯限異生爲當可通聖者耶答可通聖者也兩方若通聖者者發智論十七中擧此類云謂異生生欲界梵世梵世愛盡文此文無諍唯可限異生見若依之爾者已離初靜慮染人依未至定入見道十五心頃成就淨初靜慮不成就味相應無漏初靜慮豈非聖者之中有此類哉答成就淨初靜慮不成就味相應無漏初靜慮不限異生可通聖者也即疑難中被擧之類是也但於發智論謂異生生欲界梵世梵世愛盡之文者依身在欲界初靜慮染異生成就淨初靜慮不成就味相應無漏初靜慮其義炳然故唯擧此類也故婆沙論百六十三中釋此文云以生此地或下地而此地愛盡者必成就此地淨心不成就此地味相應故又以異生故不成就無漏文已離初靜慮染人依未至定入見道十五心頃理實論之雖成就淨初靜慮不成就味相應無漏初靜慮不久速至第十六心位必容成就無漏初靜慮故十五心頃成就無漏初靜慮成不成就無漏初靜慮之類中不擧之歟勘婆沙論百六十九説釋發智論十八頗有成就淨無漏四靜慮非味相應耶答有謂聖者生欲界梵世色愛盡之文云問若色愛盡依未至定入正性離生十五心頃不成就無漏靜慮至道類智但成就一即彼乃至依第三靜慮入正性離生十六心頃但成就三何故説四耶答之云有説彼得果已不久必起勝果道現修上無漏是故於十六心時雖未成就必當得故亦説成就文准此文可思之問得不還果位得無漏初靜慮不得味相應淨初靜慮義可有耶答可有此義也兩方若有此義者發智論十七中出此類云謂依靜慮靜慮中間入正性離生及得阿羅漢果時不擧得不還果位明知得不還果位無此義云事若依之爾者已離欲染人依未至定入見道第十六心得不還果位得無漏初靜慮不得味相應淨初靜慮得不還果位何無此義哉答得不還果位得無漏初靜慮不得味相應淨初靜慮義可有也即疑難中被擧之類是也但於發智論中出此類不擧得不還果位云難者見發智論文云謂依靜慮靜慮中間入正性離生依四靜慮靜慮中間入見道苦法忍位爲得無漏初靜慮不得味相應淨初靜慮之句畢故重不出依未至定入見道之類也委論其義者已離欲染人依未至定入見道第十六心得不還果位可爲得無漏初靜慮不得味相應淨初靜慮之句也已上相傳義也料簡之趣尤有其謂後學之輩不可異求之愚推云已離欲染人依未至定入見道十五心頃實雖不得無漏初靜慮速至第十六心容得無漏初靜慮故十五心頃得無漏初靜慮成第十六心不爲初得無漏初靜慮位也故婆沙論百六十三中釋發智論今文問若爾得學果時及信勝解練根作見至時倶得勝無漏此中何故不説答之云此先是學今所得亦是學是故不説以是故亦不説無學練根文以此文可潤色也私云就此義婆沙論中明得無漏四靜慮三無色之段未述當得故亦名得之旨云難可有也思之問阿羅漢果聖者起初靜慮煩惱退時可有味淨無漏三等至倶時得義耶答可有二意也兩方若有味淨無漏三等至倶時得義者婆沙論百六十二中釋發智論十七頗有得味相應無漏初靜慮非淨耶答無之文問阿羅漢起梵世纒退時但得二種何故言無按此問意阿羅漢果聖者起初靜慮煩惱退時無昧淨無漏三等至倶時得義見若依之爾者以道理思之何無此義哉是以披婆沙論百六十二文解發智論頗有得味相應淨無漏初靜慮耶答無之文問起梵世纒退阿羅漢果時三種倶得何故不説既述三種倶得明知可有此義云事如何答若據少分得名得幷先已成就捨而亦得名得之門者阿羅漢果聖者起初靜慮煩惱退時可有味淨無漏三等至倶時得義得初靜慮退分定及得有學無漏初靜慮故也婆沙論中云三種倶得即此意也若據發智論廢立云之者不可有此義故婆沙論中答但得二種何故言無之問云有説先不成就今成就者名得無漏初靜慮先已成就是故不説有説亦已説無漏是勝功徳於勝進時顯得則順退時顯得則不順是故不説文答三種倶得何故不説之問云爾時淨以少分得故不説無漏如前説文任此等文意阿羅漢果聖者起初靜慮煩惱退時得味相應初靜慮不得淨無漏初靜慮之旨分明也即見發智論十七文云頗有得味相應初靜慮非淨無漏耶答有謂從梵世愛盡退時文此言之中可攝阿羅漢果聖者起初靜慮煩惱退也重難云婆沙論上問云但得二種下問云三種倶得前後問意何相替哉答上問意爲顯無得味相應無漏初靜慮非淨之句阿羅漢果聖者起梵世纒退時得初靜慮退分定以少分得故不得之成云但得二種下問意爲顯無得味相應淨無漏初靜慮之句起梵世纒退阿羅漢果時雖少分得得退分定故云三種倶得也問難之言依要須隨所望雖相替答意同顯阿羅漢果聖者起初靜慮煩惱退時得味相應初靜慮不得淨無漏初靜慮之義也安貞二年倶舍三十講宗性問智舜問捨無漏三無色不捨味相應淨四無色類可有耶答可有此類也兩方若有此類者發智論中云頗有捨餘耶答無無此句判明知無此類云事若依之爾者已離無所有處染未離非想非非想處染聖者練根解脱道位捨無漏三無色不捨味相應淨四無色豈非有此類哉答捨無漏三無色不捨味相應淨四無色之類可有也即疑難中被擧之類是也但於發智論頗有捨餘耶答無之文者今此捨者名捨而不得之義故捨而還得不名爲捨也以何知之者勘婆沙論處處之説解發智論文或百六十二釋無捨無漏初靜慮非味相應淨之句問得果練根及退位皆有唯捨無漏初靜慮非餘此中何故不説答之云有説此中説捨而不得者彼捨還得是故不説文次下載發智論説云如説初靜慮乃至無所有處説亦如是文或百六十九釋無捨無漏四靜慮非味相應非淨之句云此中無第三句唯捨四無漏者以退捨時或非全捨故或彼時還得故或兼捨淨故得果捨時還即得故文或百六十九釋無捨無漏三無色非味相應非淨之句云此中無第三句唯捨三無漏者如靜慮中説文按此等文意捨而還得不名爲捨云事分明也而有學聖者練根解脱道位雖捨劣種姓無漏非味相應非淨得勝種姓無漏故不爲捨無漏四靜慮不捨味相應淨四靜慮之句亦不爲捨無漏三無色不捨味相應淨四無色之句也重難云有學聖者練根解脱道位隨其所應得勝種姓無漏四靜慮果道故云彼捨還得是故不説述得果捨時還即得故不爲捨無漏四靜慮不捨味相應淨四靜慮之句其理尤可然任捨果勝果道唯得果道故之性相已離無所有處染未離非想非非想處染聖者練根解脱道位無得無漏三無色何不爲捨無漏三無色不捨味相應淨四無色之句哉答此事甚難思且試會通云已離無所有處染未離非想非非想處染聖者練根解脱道位雖不得無漏三無色不久必起勝果道可得無漏三無色故彼捨還得之類中可攝之也重難云見婆沙論處處百六十八百六十九之文成就無漏四靜慮三無色之段雖述不久必起勝果道當成就故亦説成就之旨得無漏四靜慮三無色之處未釋不久必起勝果道當得故亦名得之義今會通之趣寧不背婆沙論説哉答文永三年丙寅四月二十三日罷向聖禪擬講之病室相尋此等不審之處同二十六日注送之状云答已離無所有處染人入見道得靜慮攝果道未得勝果道之時修練根捨靜慮攝果道還得彼故於靜慮不出此句今此未得勝果道人修練根之時雖捨果道攝不捨勝果道故捨無色無漏非味非淨句不出之歟問起第二靜慮煩惱退淨初靜慮義可有耶答婆沙論中有此義云也兩方若有此義者起下地煩惱退上地功徳者常途之所談也何可起第二靜慮煩惱退淨初靜慮哉若依之爾者婆沙論中可有此義見如何答起第二靜慮煩惱退淨初靜慮之義可有也所謂阿羅漢所修淨初靜慮及所雜修淨初靜慮等已離第二靜慮染位所修故起第二靜慮煩惱之時即退之也故婆沙論云頗有起第二靜慮纒退淨初靜慮耶答有謂阿羅漢所修淨初靜慮及雜修淨初靜慮等文問非第四靜慮世俗智現前時修淨無漏第四靜慮義可有耶答發智論中無此義見兩方若有此義者發智論十七中不擧此句以知無此義云事若依之爾者已離第三靜慮染聖者依第四靜慮近分地未曾得世俗智現在前時何無修淨無漏第四靜慮之義哉何況見發智論十七文擧未得非初靜慮世俗智現在前而修淨初靜慮及無漏之句第四靜慮相例可同如何答近分地是艱辛道作功用轉故起之稍難其中上七近分地無勝徳故起根本地心之後都不起彼近分地心也故離第三靜慮染第九解脱道位入第四靜慮根本地之後不起第四靜慮近分地心故非第四靜慮世俗智現在前時無修淨無漏第四靜慮之義也但於發智論文擧未得非初靜慮世俗智現在前而修淨初靜慮及無漏之句云例難者初靜慮近分地有勝徳故入初靜慮根本地之後起彼近分地心故有此句也全不可爲相例之疑歟重難云以有漏道離第三靜慮染第九解脱道位必入第四靜慮根本地故離第三靜慮染之後不起第四靜慮近分地心其義且可然以無漏道離第三靜慮染第九解脱道位無入第四靜慮根本地今此人依第四靜慮近分地起未曾得世俗智修淨無漏第四靜慮之義何不許之哉答以無漏道離第三靜慮染第九解脱道位雖不入第四靜慮根本地不久必起彼根本地心故已離第三靜慮染之後依第四靜慮近分地起未曾得世俗智修淨無漏第四靜慮之義無之也婆沙論百六十四中釋發智論十七如説初靜慮第二第三靜慮説亦如是之文云以此諸地於離下地染最後解脱道時皆有入根本地有不入故文思此文意由近分離下染初三後解脱根本或近分上地唯根本之義下三靜慮有此句第四靜慮無此句之旨炳然也問發智論十七中擧已得非第四靜慮世俗智現在前不修淨無漏第四靜慮句爾者今此非第四靜慮世俗智者爲唯限上二界世俗智爲當可通欲界世俗智耶答可通欲界世俗智也兩方若通欲界世俗智者婆沙論百六十四中釋發智論此文云此中餘地以智名説即從未至定除第四靜慮乃至非想非非想處文任婆沙論説唯限上二界世俗智不通欲界世俗智見若依之爾者非第四靜慮世俗智者簡第四靜慮根本地世俗智之言也何不通欲界世俗智哉答已得非第四靜慮世俗智現在前不修淨無漏第四靜慮之句除第四靜慮根本地世俗智之外廣可取餘地世俗智故通欲界世俗智云事道理必然也何況見婆沙論百六十四一段前後述已得非初靜慮世俗智現在前不修淨無漏初靜慮云此中餘地以智名説即從欲界未至定除初靜慮乃至非想非非想處文釋未得非第四靜慮世俗智現在前不修淨無漏第四靜慮云此中亦説餘地名智即從欲界除第四靜慮乃至非想非非想處文此等之句既通欲界世俗智至已得非第四靜慮世俗智現在前不修淨無漏第四靜慮之句豈不通欲界世俗智哉但於婆沙論即從未至定除第四靜慮乃至非想非非想處之文者實雖可通欲界世俗智且略之歟不可有別委曲事也問依身在第二靜慮成就初二靜慮人生得故成就第二靜慮義可有耶答不可有此義也兩方若有此義者婆沙論百六十八中無此義見若依之爾者既生第二靜慮之人也何無生得故成就第二靜慮之義哉何況婆沙論百六十八中依身在初靜慮成就初二靜慮之人生得故成就初靜慮之義可有見相例可同如何答生得故成就第二靜慮者異生從上地沒生第二靜慮之類也從下地沒生第二靜慮之人離初靜慮染時已得第二靜慮故無生得故初得第二靜慮之義也而依身在第二靜慮成就初靜慮者聖者成就無漏初靜慮也聖者不下生故無生得故成就第二靜慮之義也但於婆沙論中依身在初靜慮成就初二靜慮之人生得故成就初靜慮之義可有見云例難者依身在初靜慮成就初二靜慮之人通異生聖者故異生之中有此義也故婆沙論百六十云二者謂梵世愛盡上愛未盡此即異生聖者生欲界梵世及聖者生極光淨若生欲界於初二靜慮唯離染得故成就若生梵世於初靜慮有離染得有生得故成就於第二靜慮唯離染得故成就若生極光淨於初靜慮唯成就無漏非有漏非有漏以越地捨故於第二靜慮唯離染得故成就彼極光淨愛未盡故不成就上二靜慮文問退無漏三無色不退淨四無色類可有耶答可有此類也兩方若有此類者發智論十八中云頗有退餘耶答無無此句判明知無此類云事若依之爾者已離無所有處染未離非想非非想處染思法種姓等聖者不起煩惱退種姓時退無漏三無色不退淨四無色豈非有此類哉答退無漏三無色不退淨四無色之類可有也即疑難中被擧之類是也但於發智論頗有退餘耶答無之文者今此退者名退而不得之義故退而還得不名爲退也以何知之者勘婆沙論百六十九説解發智論十八文上釋無捨無漏四靜慮非味相應非淨之句云此中無第三句唯捨四無漏者以退捨時或非全捨故或彼時還得故或兼捨淨故得果捨時還即得故文下釋無捨無漏三無色非味相應非淨之句云此中無第三句唯捨三無漏者如靜慮中説文按此文意明無唯退捨無漏四靜慮之義云或彼時還起故畢述無唯捨無漏三無色之句讓如靜慮中説故無唯退捨無漏三無色之義亦可由彼時還得故見爰知已離無所有處染未離非想非非想處染思法種姓等聖者不起煩惱退種姓時雖退勝種姓無漏三無色不退淨四無色還得劣種姓無漏三無色故不爲退無漏三無色不退淨四無色之句也重難云見婆沙論百六十九説解發智論文上釋無退無漏四靜慮非味相應非淨之句云此中無第三句唯退無漏四靜慮者或與淨倶退故或不全退故或退時還得彼地故雖出三故下釋無退無漏三無色非味相應非淨之句云此中無第三句唯得無漏三無色者或與淨倶退故或非全退故不擧或退時還得彼地故若無唯退無漏三無色之句由退時還得彼地故者尤可擧此故也何異無唯退無漏四靜慮之故不擧之哉答愚惟云有學聖者退種姓時不必退無漏三無色無學聖者退種姓時必退無漏三無色故無唯退無漏三無色之義專就無學聖者論之也而無學聖者退種姓時必退盡智所修淨四無色故云或與淨倶退故無學聖者退種姓時不爲唯退無漏三無色之句其義既顯訖故重出退時還得彼地故無其詮故不擧之歟然而退時還得彼地故自亦爲無唯退無漏三無色之由更非所遮也婆沙論百六十九中問頗有不起無色纒而退無漏靜慮非淨耶答之云有謂無學練根未至第九解脱道位不起煩惱而退所得無間解脱道時唯出無學聖者退種姓時不擧有學聖者退種姓時容起無色界煩惱退者專爲無學聖者故也以此文可爲今義潤色歟文永三年丙寅四月十九日罷向聖禪擬講之病室相尋此事之處彼擬講義云問或論藏意全退無漏三無色不退有漏四無色類可有耶進云論家釋云此中無第三句唯退無漏三無色者文付之就一論一部之性相思無漏無色之退位已離無所有處染未離非想非非想處染思法種姓等聖者不起煩惱退種姓時退無漏三無色不可退有漏四無色何無此類哉何況全退有漏四無色不退無漏三無色之類有之相例可同如何講答云去嘉祿二年法勝寺御八講宗性對延曆寺陽圓已講用此論義之時證義者法印前權大僧都聖覺云已離無所有處染未離非想非非想處染思法種姓聖者不起煩惱退種姓時可還得退法種姓無漏三無色故猶成就無漏三無色論家判無此句歟云云就此義疑云婆沙論中云無唯退無漏三無色之句不擧退時還得彼地故其疑猶殘之由重難之畢問有學聖者中可有不起無色界煩惱退無漏靜慮不退淨靜慮類耶答可有此類也兩方若有此類者婆沙論百六十九中出此類唯擧無學聖者知有學聖者中無此類云事若依之爾者有學聖者種類非一准何無此類哉答見婆沙論百六十九文云問頗有不起纒而退無漏靜慮非淨耶答有即前所説及學練根未至見至不起煩惱而退所得無間解脱道時擧有學聖者不起三界煩惱退無漏靜慮不退靜慮之類故此人即不起無色界煩惱退無漏靜慮不退淨靜慮云事必然也但於婆沙論中出此類唯擧無學聖者云難者正勘彼論文云問頗有不起無色纒而退無漏靜慮非淨耶答有謂無學練根未至第九解脱道位不起煩惱而退所得無間解脱道時文此文意云問頗有不起無色纒而退無漏靜慮非淨耶起無色界煩惱容退之者不起彼煩惱退無漏靜慮非淨有耶問也而有學聖者中分離無色界煩惱者雖有起無色界煩惱容退之義全未離無色界煩惱者無起無色界煩惱容退之理故有學聖者其義不定故不擧之鈍根無學聖者皆有起無色界煩惱容退之義故就無其濫且出無學練根未至第九解脱道位不起煩惱而退所得無間解脱道時也問有學聖者退種姓時可退練根無間道耶答可退練根無間道也兩方若退練根無間道者有學練根一無間一解脱道也而住無間道無退種姓之義至解脱道已捨無間道畢旁思之何可退練根無間道哉若依之爾者婆沙論百六十九中問頗有不起纒而退無漏靜慮非淨耶答之云及學練根未至見至位不起煩惱而退所得無間解脱道時文此文無諍有學聖者退種姓時可退練根無間道見如何答有學聖者修練根作勝種姓之後退此練根所得種姓之時退住從練根無間道下位故退彼無間道可云也婆沙論中云退所得無間道即此意也但於有學練根一無間一解脱道也云難者有學聖者修練根時實用一無間一解脱道故至解脱道位雖捨無間道退住下位故云退之也故見婆沙論六十一文云問退阿羅漢果住預流果時名退不還一來果不答亦名退彼所以者何住彼下故如人從彼第三層舍墮至于地彼人亦説墮初二層此亦如是問本不成就中間二果今何言退答已不成就復不成就故亦名退文以此文可爲今義潤色也問無漏靜慮與淨靜慮倶時得別捨義爲唯限有學練根爲當可通無學練根耶答可通無學練根也兩方若通無學練根者婆沙論百六十九中出此類云謂得阿羅漢果及依靜慮得不還果幷學者練根時文如此文者唯限有學練根不通無學練根見若依之爾者以道理思之此義何不通無學練根哉答無學聖者修練根第九解脱道位得勝種姓故雖捨初盡智位與淨靜慮倶時所得劣種姓無漏靜慮有漏無漏捨劣得勝之義故不捨淨靜慮云事性相之所定也更不可異求之但於婆沙論中出此類唯擧學者練根時云難者學無學聖者修練根時雖捨無漏靜慮不捨淨靜慮其所不捨淨靜慮者即得阿羅漢果及依靜慮得不還果幷有學聖者修練根時所不捨淨靜慮故重不論之歟問五通所依定可通退分定耶答不通退分定也兩方若通退分定者五通所依定力用殊勝也何可通退分定哉若依之爾者見婆沙論百六十九文味相應四靜慮爲等無間緣等至中擧五通所依定若味定無間有現前義者寧不通退分定哉答思婆沙論百七十慧解脱阿羅漢起味相應初靜慮退時除無學位等所修自地三通所依不捨不得云文意五通所依定不通退分可云也若通退分定者豈無亦得義哉但於婆沙論味相應四靜慮爲等無間緣等至中擧五通所依定之文者味定無間亦起順住分故全無相違也問除從第三靜慮生第四靜慮時餘時中捨一等至無所得義可有耶兩方若有此類者見婆沙論百七十文出捨一等至無所得類云謂遍淨沒生廣果時捨淨第三靜慮而無所得文論文既擧此一位明知餘時無此義云事若依之爾者六十五等至得捨非一准餘時之中何無此義哉答除從第三靜慮生第四靜慮時餘時之中捨一等至無所得義可有也即從初靜慮生第二靜慮之時唯捨淨初靜慮一等至無得餘等至也但於婆沙論謂遍淨沒生廣果時之文者且出一位也非謂餘時亦無此義全不可劬勞之問慧解脱阿羅漢起味相應初靜慮退時淨初靜慮中可有不捨不得類耶答可有此類也兩方若有此類者見婆沙論百七十文述慧解脱阿羅漢起味相應初靜慮退時捨得等至相云二亦捨亦得謂無漏淨初靜慮捨無學及上所修得學及退分故文若有不捨不得之類者寧不擧之哉若依之爾者淨初靜慮種類是廣爾時何無不捨不得之類哉答慧解脱阿羅漢起味相應初靜慮退時淨初靜慮中可有不捨不得之類也即如婆沙論説捨上位所修淨初靜慮得退分攝淨初靜慮故此外非上位所修亦非退分攝淨初靜慮是可不捨不得之類也但於婆沙論中不擧不捨不得之類云難者就定體論之淨初靜慮中實雖有不捨不得之類亦捨之類通盡智等上位所修順住順勝順決擇三分定亦得之類擧順退分定故亦捨亦得之類既亘四分定無一分定而所殘故此外別不擧不捨不得之類也問不還果聖者中於六十五等至極少成就十八等至類可有耶答不可有此類也兩方若有此類者見婆沙論文述不還果聖者極少成就二十五等至之旨明知不可有此類云事若依之爾者依身在欲界已離第二靜慮染未離第三靜慮染聖者修練根時得果道所攝無漏初二靜慮不起勝果道生第三靜慮之類可成就無漏下三靜慮淨第三靜慮味相應後二靜慮四無色三無量五通所依十八等至也何無不還果聖者中極少成就十八等至之類哉答婆沙論中明不還果聖者成就六十五等至相云極少成就二十五謂八味相應淨無漏初靜慮四無量初二解脱前四勝處五通所依或減一二味増一二淨皆亦二十五文若不還果聖者中有成就十八等至之類者寧以成就二十五等至爲極少成就之數哉無成就十八等至之類云事此文炳然也但於被出難之類者不可許之其故設於上地得自在人依下地修練根時雖得上地無漏果道必起勝果道之後生上地也故依身在欲界已離第二靜慮染未離第三靜慮染修練根時得果道所攝無漏初二靜慮之人必起勝果道之後可生第三靜慮故是阿羅漢向聖者成就十八等至也既非不還果聖者故不可爲疑歟重難云勘婆沙論處處之文或九十云問若已離第三靜慮染依第二靜慮及下三地信勝解練根作見至彼不起後向命終往生第四靜慮以上諸地彼成就何樂根答彼於上地若得自在當練根時亦能修上無漏樂根設於上地不得自在彼得果已亦必起勝果道修上無漏然後命終是故聖者生遍淨上決定成就無漏樂根成就喜根准此應説文或百六十九云其信勝解練根作見至者有説彼得果已必起勝果道修無漏四靜慮然後命終生無色界有説彼練根時即亦修上無漏靜慮是故無過文准此兩處之思之第百六十九卷二師説中初師意云已離色界染信勝解依未至定初靜慮靜慮中間修練根作見至得果道無漏靜慮已必起勝果道無漏四靜慮之後生無色界故無聖者生廣果以上不成就樂根過爲言第二師意異之已離色界染信勝解於上地得自在依下地修練根作見至得果道無漏四靜慮故雖不必起勝果道無漏四靜慮生無色界無聖者生廣果以上不成就樂根過云也若此師意依下地修練根得果道無漏四靜慮之人必起勝果道無漏四靜慮生無色界云者與初師義有何差異哉爰知第二師意依下地修練根得果道無漏四靜慮之人不必起勝果道無漏四靜慮生無色界存也而第九十卷文大同此第二師説以此師説可爲正義若爾依下地修練根得上地果道之人必起勝果道之後生上地云事豈不背婆沙論此等之文哉答二乘必有欲證後道必藉前道以爲加行方能證故之理故於上地得自在者依下地修練根時雖得上地果道必起勝果道之後可生上地也何況練根之後不起勝果道生上地者已斷下地煩惱之上不可有無漏離繋得寧非大過哉但於婆沙論第百六十九卷二説差異者初師意云練根之後必起勝果道無漏四靜慮生無色界故無聖者生廣果以上不成就樂根過爲言得上地果道之人成就果道無漏四靜慮之處云殘也第二師意云非只成就勝果道四靜慮於上地得自在者亦成就果道無漏四靜慮云添也非遮練根之後必起勝果道之義故二説意遂不相違也今二説意非相違義故第九十卷中不置有説之言釋顯此二趣也彼於上地若得自在當練根時亦能修上無漏樂根者於上地得自在者依下地修練根時得上地果道無漏樂根故後生第四靜慮以上諸地定成就樂根爲言非謂云爾故不起勝果道無漏樂根生第四靜慮以上諸地也設於上地不得自在彼得果已亦必起勝果道修上無漏然後命終是故聖者生遍淨上決定成就無漏樂根者設於上地不得自在者修練根已必起勝果道無漏樂根故後生第四靜慮以上諸地定成就樂根爲言然後命終以下之文總結二類也問或論藏意不還果聖者於六十五等至中極少成就幾等至判耶進云論家釋云極少成就二十五文付之不還果聖者種類非一准極少成就之類不可及二十五等至是以不還向聖者極少成就之人阿羅漢果聖者極少成就之類更無成就二十五等至彼此相例其義可同如何講答云去安貞二年最勝講宗性對延曆寺信永已講用此論義之志可有成就十八等至之類云事第三重難爲疑問也而證義者興福寺別當法務僧正實尊仰云結座事繁可省重難云云仍彼論場問難意趣不顯而止之間所存之旨今所記錄也問不還果聖者中於六十五等至極多成就四十八等至類可有耶答可有此類也兩方若有此類者婆沙論中述不還向聖者極多成就四十七等至之旨畢云不還果極多如向説文若不還果聖者中有成就四十八等至之類者寧以成就四十七等至爲極多成就之數哉若依之爾者不還果聖者種類非一准何無極多成就四十八等至之類哉答不還果聖者中於六十五等至極多成就四十八等至之類可有也即以性相之所定按之身證不還果聖者依第四靜慮修練根得勝種姓果道未起勝果道之前下成就淨無漏四靜慮淨四無色味相應非想非非想處四無量八解脱八勝處十遍處五通所依四十八等至也但於婆沙論不還果極多如向説之文者今此成就四十八等至之類任捨果勝果道唯得果道故之理雖不還果攝本是阿羅漢向聖者修練根得勝種姓果道未起勝果道之前暫時住不還果道許也不久必起勝果道還速可至阿羅漢向位故不擧此中間暫時住不還果道成就四十八等至之類也勘婆沙論處處之文或百六十八云或此所説道類智時雖不成就二乃至四而從此後不久定成故於爾時亦説成就謂道類智後不久必起勝果道時即修彼故文或百六十八云或彼不久必起勝果道即成就彼故於爾時亦説成就文或百六十九云有説彼得果已不久必起勝果道現前修上無漏是故於十六心時雖未成就必當得故亦説成就文此等文意凡位離上地染依下地入正性離生者不久必起勝果道云事分明也准彼可思之重難云凡位離上地染依下地入正性離生者不久必起勝果道故當容成就説今成就者已離無所有處染依第四靜慮入正性離生者道類智位證不還果之後不久必起勝果道速可至阿羅漢向位何以此暫時住果道之位分爲不還果聖者極多成就四十七等至之類哉答四向四果其位各別也寧依不久必起勝果道故以道類智位屬後果向道哉若爾果向次位豈不雜亂哉甚異所成就功徳當容成就説今成就之廢立也就中今練根類本是阿羅漢向聖者也得勝種姓之後不久必起勝果道還速可至阿羅漢向位故此中間暫時住不還果道之位分沙汰之外事不及探出也不似初證不還果位旁非相例歟婆沙論六十七云頗有身證者不成就無漏無色定耶答有謂身證信勝解練根作見至時文私云身證不還果聖者修練根云事此文分明也婆沙論百七十云不還向極少成就八如前説即漸次者極多成就四十七即已離無所有處染依第四靜慮入正性離生者謂淨無漏四靜慮淨四無色味相應非想非非想處四無量七解脱八勝處十遍處五通所依不還果極多如向説文問阿羅漢向聖者中於六十五等至極少成就十二等至類可有耶答可有此類也兩方若有此類者婆沙論百七十文云阿羅漢向極少成就十三即生非想非非想處不得滅盡解脱者謂無漏四靜慮三無色味相應淨非想非非想處四解脱文若阿羅漢向聖者中有成就十二等至之類者寧以成就十三等至爲極少成就之數哉若依之爾者阿羅漢向聖者種類非一准何無極少成就十二等至之類哉答阿羅漢向聖者中於六十五等至極少成就十二等至之類可有也即生空無邊處未離自地染聖者可成就無漏四靜慮味相應四無色空無邊處淨定無漏定解脱遍處十二等至也但於婆沙論阿羅漢向極少成就十三之文者有漏等生上地中不成下地無漏四靜慮三無色幷下三無色解脱生自上下地必成就之故以今此決定成就等至爲其本論極少成就之數故就生無所有處非想非非想處二地之類顯其相也故婆沙論百七十中重出阿羅漢向聖者極少成就十三等至之類雖述若生無所有處未離自地染者亦成就十三謂増一味減一解脱不擧生識無邊處未離自地染者亦成就十三等至即此意也何不辨此旨出生空無邊處未離自地染者成就十二等至數其疑哉問阿羅漢向聖者中於六十五等至極少成就十三等至唯限無所有處非想非非想處二地依身歟答不限二地依身也兩方若唯限二地依身者阿羅漢向聖者種類非一准極少成就十三等至何不通下地依身哉若依之爾者婆沙論百七十中述阿羅漢向聖者極少成就十三等至唯出生無所有處非想非非想處者論文無諍唯可限二地依身見如何答阿羅漢向聖者極少成就十三等至不限無所有處非想非非想處二地依身可通識無邊處依身也即生識無邊處未離自地染者可成就無漏四靜慮二無色味相應三無色空無邊處解脱識無邊處淨定解脱遍處十三等至也但於婆沙論中唯出生無所有處非想非非想處者云難者有漏等至生上地中不成下地無漏四靜慮三無色幷下三無色解脱生自上下地必成就之故以今此決定成就等至爲其本論極少成就之數故唯擧生無所有處非想非非想處二地之類不出生識無邊處未離自地染者成就十三等至也問生無色界阿羅漢果聖者可成就他心通所依定耶答可成就他心通所依定也兩方若成就他心通所依定者婆沙論百七十中述阿羅漢果聖者極少成就十三等至云即生非想非非想處慧解脱阿羅漢謂七無漏一淨四解脱漏盡通所依不擧他心通所依定明知不成就之云事若成就之者寧不成就十四等至哉若依之爾者披今論餘處文云生無色者時解脱者定成九智謂加盡智不時解脱定成就十謂増無生文此文無諍生無色界阿羅漢果聖者成就他心智見他心通所依定例可同如何答以性相之所定思之無漏是不繋法生上地中成就下地無漏故生無色界阿羅漢果聖者成就無漏他心通所依定云事文理必然也更不可異求之但於婆沙論生非想非非想處慧解脱阿羅漢極少成就十三等至云文者無漏他心通所依定有無間解脱二道之中無間道是有漏故生無色界聖者不成就之故從無間道論之不成就無漏他心通所依定故云生非想非非想處慧解脱阿羅漢極少成就十三等至也退勘今論餘處二十七文述天眼天耳二通依四靜慮之義云或此依通無間道説通無間道依四地故文從無間道不成就無漏他心通所依定云事以此論説可爲准例也問有學聖者修練根可有無漏四靜慮頓得義耶答可有此義也兩方若有此義者發智論十八文云頗有無漏四靜慮頓得耶答有謂依第四靜慮入正性離生若得阿羅漢果不擧有學練根時明知有學聖者修練根時無無漏四靜慮頓得義云事何況有學聖者修練根時無有無漏三無色頓得義相例可同若依之爾者有學聖者修練根時所得聖道既非一准何無無漏四靜慮頓得義哉答已離第三靜慮染有學聖者依第四靜慮修練根時可有無漏四靜慮頓得義云事性相之所定其義必然也但於發智論文者准婆沙論餘處説可會通之也即勘婆沙論第百六十九卷文釋發智論十八頗有得無漏四靜慮非味相應非淨耶答有謂依第四靜慮入正性離生若得阿羅漢果時之文問學練根時亦有於無漏四靜慮皆捨而得何故不説耶答之出三説云應説而不説者當知此義有餘有説此中略擧初後以顯中間故不具説有説彼所捨所得倶是學類非全別類是以不説由此亦不説無學練根文此發智論文明倶時得無漏四靜慮故當無漏四靜慮頓得義也故准婆沙論今問答會通發智論擧無漏四靜慮頓得之類不出有學練根時之文也次於有學聖者修練根時無有無漏三無色頓得義云例難者下三無色無不還果道攝無漏故任捨果勝果道唯得果道故之理有學聖者修練根時不得無漏三無色也尋云婆沙論第百七十一卷中釋發智論十八頗有無漏三無色類頓得耶答有謂得阿羅漢果時之文云無學練根時雖亦頓得而非別類是故不説又彼亦名得阿羅漢果時故不別説文今此二義當第百六十九卷三説中何説哉答無學練根時雖亦頓得而非別類是故不説者當有説彼所捨所得倶是學類非全別類是以不説之説又彼亦名得阿羅漢果時故不別説者當有説此中略擧初後以顯中間故不具説之説也略擧初後之後中可攝無學練根故也由此亦不説無學練根者總結上二説意也文永三年丙寅十月十日酉時於東大寺知足院草庵抄之畢自去孟夏十二日始此卷抄至今初冬上旬候終其微功倶舍婆沙間端餘八十條草按清書光陰及二百日爲委難答之旨趣不顧餘命之徒迫痛哉歎哉不可不悲仰願春日權現哀愍此志伏乞彌勒如來納受此勤終焉之暮垂引攝於兜率之雲龍華之曉勸悟入於唯心之月功徳餘薫迴向非一或父母恩愛之親類或師弟同法之善友慈尊説教之筵三會聽法之砌必遂再會互談往事而已右筆華嚴宗末葉法印權大僧都宗性年齡六十五夏臘五十三定春所持之本令相傳之處去年僧坊囘祿之時此卷幷第十九末合兩帖令燒失畢仍以宗性御自筆清書御本誂他人令書寫之自手令校合畢永正六己巳七月十四日三論宗大法師英憲
