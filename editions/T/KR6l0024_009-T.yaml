body:
  text: 倶舍論第三卷抄問題問雜心論行品中可説二十二根相耶問光法師意扇搋無形人歟問中有末後念必起染汚心歟問寶法師意了自境増上等三行頌誰人義判耶問寶法師意心所依此別等一行頌述有宗義歟問寶法師依正理論意述還滅得體作二解釋爾者第二釋意如何釋之耶問未知當知根及喜覺支通相應根二十二根中有幾根耶問寶法師意二乘聖者第十六心次念必果道相續歟問尊者法救意苦樂憂喜信進念惠八根可有別體耶問已知根可通有漏耶問論文云謂阿羅漢成就神通文爾者今此阿羅漢者可通惠解脱倶解脱耶問論中明留壽行相云時彼能感富異熟業則皆轉招壽異熟果文爾者光法師意今此富異熟業者先世業歟問光法師依婆沙論正義家意可許順現業感衆同分義耶問寶法師意非業非異熟根有幾種耶問經部宗意於無色界起善染汚心時所假立命根爲是異熟法爲當非異熟法歟問光法師意不由邊際定力延命根義可有耶問由定力延一劫壽命義可有耶問雜心論意是異熟喜根無間可生他地心耶問光法師以威工巧心望五受根明相應不相應義作三解釋爾者初釋意如何釋之耶問光法師以變化心望五受根明相應不相應義作二解釋爾者第二釋意如何釋之耶問下三靜慮根本地可有捨受耶問論中明二十二根三性門云唯善後八根文光法師釋本頌先説信等八根故作二解釋爾者第二釋意如何釋之耶問憂根與身邊二見相應歟問歡行轉心所與慼行轉心所相應義可有耶問苦根唯緣不善法歟問憂根可緣上二界耶問經部宗意第四靜慮可有樂受耶問經部宗意可立有尋有伺等三地耶問婆沙論中明二十二根三斷門云如意根亦爾文爾者亦爾言可攝喜樂二根耶問光法師釋正理論遮無染心能續生故文云或經部計異熟心受生文爾者所受生異熟生心可通引滿二果耶問欲界生有初受生位可有初得信等五根義耶問光法師意中有位可有二形類耶問光法師意非劫初時中有位可有無形類耶問欲界歿生上二界時頓命終者可有八根滅義耶問論文云於離繋得能爲引因依自性故文爾者引因道者唯限無間道歟問雜心論意次第證不還果聖者可有喜根證義耶問無學聖者修練根位以喜根爲無間道以捨根爲解脱道義可有耶問樂根證不還果聖者可退所得果耶問喜根證不還果聖者可所得果耶問迦濕彌羅國師意成就憂根人五受根倶過未定成就根歟問成就憂根人可有現在定不成就根耶問光法師意無形人可有入聖義耶問正理論意無形人可有入聖義耶問光法師釋無形人具足戒得不得相作三解釋爾者初釋意如何釋之耶問寶法師意斷善根人不續善前可作二形人耶問婆沙論意斷善根者不續善生地獄時受二形身類可有耶問欲界可有眼根斷道耶問類智現前位必可成就樂根滅耶問未離欲染聖者見修道位可成就喜根斷道耶問依身第二靜慮以上聖者可成就憂根斷道耶問從無想天沒時可有信等五根滅義耶問根爲緣生根非根根非根爲緣生根非根時兩類所生根其數可同耶問根爲緣唯生根非根時所生根唯限九根歟
