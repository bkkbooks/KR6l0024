body:
  text: 倶舍論第十一卷抄問論文云許此三千世界如是安立形量不同文爾者論主可許此義耶答可有二意也兩方若許此義者光法師釋此文云毘婆沙師許此案立文如解釋者論主不許此義見若依之爾者今論者源出自迦濕彌羅之説何不朋毘婆沙師之義哉答此事難測暫可存二義也或於許字者不必標不信之義故論主許此義可云也或又三輪廣厚之量等論主所存異之故爲顯不信之義量許字歟問婆沙論中云三輪廣量擧二師異説爾者寶法師意三輪廣量齊等云義爲正義歟進云寶法師釋云今詳前之二説前説爲善三輪廣量齊等云義爲正義見付之婆沙論中雖擧二師異説全無判正不寶法師何忽判正不哉何況三輪廣量不齊等者今論定判也寶法師解釋豈不背今論所説哉答見婆沙論百三十三文上述風輪相云廣則無數畢次述水輪相云有説廣量與風輪等有言狹小分百倶胝百倶胝輪其量皆等謂徑十二億三千四百半文次述金輪相云有説金輪廣如水量有師復説少廣水輪文寶法師引今一段文畢判正不云今詳前之二説前説爲善既同一雨水以成水輪於中何要分水金別又三輪相依風輪既等大千水金因何即小文此釋意云婆沙論中云水金二輪廣量各擧二師説雖不判正不以道理思之水金二輪者同一雨水凝結不凝結之差異也其廣量不可有差異故水金二輪廣量定可齊等故有説金輪廣如水量云前師説爲善又風水金三輪相依而住其廣量亦不可有差異故水輪廣量與風輪等云前師説爲善云也重意云前之二説前説爲善者風水相對二師説中之前説水金相對二師説中之前説指兩處前説云前説爲善也論家自雖不判正不以道理順違判異説正不事是人師常習也強不可爲疑歟但於背今論文云難者寶法師意今論意實存三輪廣量齊等云義得意也風輪一大三千界總所依器故云其量廣無數各別四天下將成水金二輪即起故從能依四天下暫雖説此水金輪廣徑十二洛叉三千四百半以實論之水金二輪廣量與風輪同可無數也彼今論中述無諍願智四無礙解功徳加行得離染得相云除佛所餘一切聖者所説六種唯加行得非離染得非皆得故唯佛於此亦離染得之文光法師意不同婆沙論有説佛離染得聲聞獨覺加行得云義同評家聲聞獨覺亦有離染得云義得意不依金輪顯文也寶法師意今論意實存三輪廣量齊等之義得意例之可思也重難云見寶法師解釋云准此論釋風水之中取其後説水金之内即取前師文此釋意今論意同婆沙論風水相對二師説中風輪量廣水輪量狹云第二師水金相對二師説中有説金輪廣如水量云前師説云也何云寶法師意今論意實存三輪廣量齊等之義得意哉答疑難之旨尤以可然但寶法師今解釋只任今論顯文云風水之中取其後説水金之内即取前師也全非盡理之釋其故婆沙論云有説金輪廣如水量之義水金二輪廣量同遍一大三千界與風輪廣量等云義也與此水金輪廣徑十二洛叉三千四百半之文其意可異然而暫以水金二輪廣量同云當云水金之内即取前師也以之思之今解釋是隨文一往之釋非就實再論之義歟以實論之今論意存三輪廣量齊等云義可得意也問唯此世界南贍部洲有金剛座歟答爾也兩方若唯此界南贍部洲有金剛座者世界安立彼此可同唯此世界南贍部洲有金剛座哉是以或經中云是則三千界一一界中有百億乃至其四洲中南贍部一一各有金剛座文此文無諍餘世界南贍部洲有金剛座見若依之爾者見今論文述唯此洲中有金剛座唯此世界南贍部洲有金剛座見如何答金剛座者一切菩薩將登正覺所坐之座也而有宗意談十方世界唯有一佛之旨故唯此世界南贍部洲有金剛座也餘世界中既無佛出世何可有爲登正覺座之金剛座哉故今論云唯此洲中有金剛座上窮地際下據金輪一切菩薩將登正覺皆坐此座上起金剛喩定以無餘依及餘處所有堅固力能持此故文光法師釋此文云菩薩最後所依身能持此定及金剛座處能持此定以無餘依身及餘處所有堅固力能持此定此定力大餘依餘處不能持也文餘世界中既無菩薩最後所依身所持金剛喩定何可有持此定之金剛座哉無所持金剛喩定有能持金剛座云事道理豈可然哉但於一經説者是心地觀經説也彼大乘經説十方世界多佛出世之旨故三千大千世界一一四天下中南贍部洲各有金剛座云也既非當部依憑更不可劬勞也問此洲南邊有贍部林樹歟答任今論等文此洲北邊有贍部林樹也兩方若此洲南邊有贍部林樹者今論中此洲北邊有贍部林樹見若依之爾者圓暉法師餘處解釋中云此洲南邊有贍部樹文如何答見今論文云此北九黒山雪香醉山内無熱池縱廣五十踰繕那此洲北邊有無熱池見而次下文云於此池側有贍部林樹形高大其菓甘美依此林故名贍部洲或依此菓以立洲號文正理論文全同今論任此等論判此洲北邊有贍部林樹可云也但於圓暉法師餘處解釋者實似難思暫出二義可會通之或可讀文點所謂可讀此洲南邊有贍部樹也此文釋南贍部洲之名故專顯此洲須彌山南邊之相也或勘清涼大師解釋云若立世阿毘曇云樹在此洲之南文圓暉法師今解釋五依立世阿毘曇論意如此釋歟問光法師所引婆沙論中釋無間地獄名云依異熟果説名無間文爾者無間地獄衆生一一身量各遍二萬踰繕那歟進云光法師釋云非是一一身形皆遍彼處文付之無間地獄者是惡業甚重衆生之生處也隨彼衆生一一身量各遍二萬踰繕那哉是以正見婆沙論文云依異熟果説名無間以諸有情造大惡業生彼地獄得廣大身一一身形悉皆廣大遍彼多處中無間隔故名無間文此文無諍無間地獄衆生一一身量各可遍二萬踰繕那見加之辰旦人師解釋中云五形無間其身充滿八萬由句一人多人同處其中不相障礙皆悉遍滿業不思議也文何況若隨生多少遍彼處所者隨生多少衆生身量亦隨時可有増減如何答衆生依身皆是有對障礙法故無間地獄一一衆生身量各二萬踰繕那者無間地獄之中爭可容受哉故光法師引婆沙論今文畢云遍彼多處者非是一一身形皆遍彼處隨生多少遍彼處所文如此得文意之時婆沙論説全非相違次於辰旦人師解釋者是道暹師涅槃經疏定判也此釋既不叶道理不可依用之次於無間地獄衆生身量隨時可有増減云難者無間地獄之習法爾必然之理隨墮彼衆生多少可遍二萬踰繕那故衆生身量隨時有増減事何強不可爲痛哉問光法師所引婆沙論中釋無間地獄名擧三師異説爾者評家意許前二説歟答可許之也兩方若許之者見光法師所引婆沙論文擧三師異説畢別出評家義知評家意三師説倶不許之云事若依之爾者評家意云生餘地獄多生無間者少唯破第三師説不破前二師説若不許之者尤可破之哉答婆沙論中釋無間地獄名總有三師異説之中初二説云或名無間雖亦有間假説無間有説彼處恒受苦受無喜樂間故名無間文此二師説無指過故評家意可許之也第三師云有説衆多有情造作惡業相續生彼滿彼處所故名無間文此師意生餘地獄有情少生無間地獄有情多云事背道理故評家意唯破此師説也故婆沙論云評曰不應作是説生餘地獄多生無間者少所以者何以造作増長上品身語意惡業者乃至彼處有情造作増長上品惡業生彼處者少造作増長中下品惡業餘地獄者多如造作増長上品善業生有頂者少造作増長中下品善業生餘處者多故應作是説由造作増長増上不善業生彼所得身形廣大一一有情據多處所中無間隙故名無間文第三師意云生無間地獄有情衆多滿彼處所不云生彼有情身形廣大彼處所故唯此師義爲所破也問論中付説捺落迦安立相且八捺落迦爲重累爲當傍布歟進云今論中擧二師説故論云七捺落迦在無間上重累而住乃至有説此七在無間傍文付之二説倶不可然先就重累師説難思述此下過二萬無間深廣同贍部洲下主無間地獄底四萬踰繕那也而於最底二萬踰繕那安立無間地獄於餘二萬踰繕那如何可安立餘七地獄及炎魔王宮哉次就傍布師説不明見論文云唯此洲中有金剛座文而金剛座地獄不相妨者又光法師解釋也地獄設雖近南邊寧可建立十六地獄及十六増等哉答見光法師所引婆沙論文述地獄安立擧重累傍布二師説之中先於重累師亦出二師説初師云有説從此洲下四萬踰繕那至無間地獄底無間地獄縱廣高下各二萬踰繕那次上一萬九千踰繕那中安立餘七地獄乃至此七地獄一一縱廣萬踰繕那文此師意云四萬踰繕那中二萬踰繕那縱廣高下無間地獄之分齊也其上一萬九千踰繕那中安立餘七地獄其縱廣量各一萬踰繕那也雖不説高下量推之各當二千七百十四踰繕那餘歟第二師云有説從此洲下四萬踰繕那至無間地獄此無間地獄縱廣高下各二萬踰繕那次上有三萬五千踰繕那安立餘七地獄一一縱廣高下各五千踰繕那文此師意云六萬踰繕那中二萬踰繕那縱廣高下無間地獄分齊也其上三萬五千踰繕那中安立餘七地獄其縱廣高下量各五千踰繕那也五七三十五其數尤易知也次傍布師云有説無間地獄在於中央餘七地獄周匝圍遶如今聚洛圍遶大城文此師意云無間地獄在其中央餘七地獄周匝圍遶安立之也而任光法師明知金剛座近北諸地獄等在王都下稍近南邊不相妨也之解釋於此洲中金剛座近北邊諸地獄等近南邊故八地獄等雖傍布安立與金剛座不相障礙也重意云第八外海廣量三億二萬二千踰繕那也南北廣量二分之者各十六萬一千踰繕那也其北方設雖有金剛座其南方十六萬一千踰繕那中無間地獄廣量二萬踰繕那餘七地獄廣量各一萬踰繕那合九萬踰繕那地獄竝八寒地獄等可安立之故傍布師義全無相違也問光法師所引婆沙論中述捺落迦安立有三師異説中初有説意上七捺落迦高下量齊等歟答可齊等也兩方若齊等者罪業之果既有輕重高下之量何必齊等哉若依之爾者第二有説意上七捺落迦高下量齊等見初有説意其義可同如何答初有説意可云上七地獄高下量齊等也此師意云無間地獄之上一萬九千踰繕那中安立餘七地獄故餘七地獄高下量各當二千七百十四踰繕那餘也婆沙論中述此師意雖説此七大地獄一一縱廣萬踰繕那不云高下量分齊然而一萬九千踰繕那七分之者各當二千七百十四踰繕那餘也問論中付明十六増名且光法師意有幾師説耶進云光法師意有三師説見付之依光法師解釋見今論文云此是増上被刑害所故説名増本地獄中適被害已重遭害故有説有情從地獄出更遭此苦故説爲増文此文無諍有二師説見是以寶法師釋此文云詳其論意只是兩釋不是三解有人謂是三解誤也文加之泰法師竝遁麟法師解釋中論解増名有二師説見若爾光法師解釋豈不背論文哉答見今論文既結此是増上被刑害所故説名増明知本地獄中適被害已重遭害故者是別師義云事故光法師釋云所言増者第一解云此是増上被刑害所故説名増第二解云本地獄中適被害已重遭害故故名爲増第三解云有説有情從地獄出已數更遭此苦故説爲増此約出本地獄已數數受苦名増故與第二不同文初師意云受苦増盛過本地獄故名爲増第二師意云本地獄中被刑害已亦於彼處重受苦故望本地獄説名爲増第三師意云出本地獄之後經歴十六諸處數數受苦故名爲増爲言正理論文擧四師説之中此十六中受苦増劇過本地獄故説爲増者同當今論初師説也或於此中受種種苦故具多類故説爲増者當今論第三師説也或地獄中適受苦已重遭此苦故説爲増者當今論第二師説也正理論中既置或言爲別師准正理論思今論意云此是増上被刑害所故説名増云本地獄中適被害已重遭害故各別師義云事實分明也光法師解釋深探論實意者歟但於寶法師泰法師竝遁麟法師解釋者淺向論顯文有二師説云歟是既人師意各別不可及會通哉問衆生遇閻魔王斷罪中有位歟答可非中有位也兩方若中有位者衆生遇閻魔王斷罪於彼處始定生處或還本處者於經論竝傳記等説而有宗意當來中有現前之後全無轉生餘趣或還本處之義爰知衆生閻魔王斷罪非中有位云事何況今論云同淨天眼見中有位輒無相見如傳記等説者於閻魔王宮諸人互相見文以此等文理思之中有位已前遇閻魔王斷罪云事若依之爾者過五百踰繕那有閻魔王國者今論定判也若不至彼處者爭可遇閻魔王斷罪哉定知中有位至閻魔王宮遇斷罪云事如何答衆生於何位遇閻魔王斷罪云事今論等中無分明定判故末學輒難測歟但倩案道理粗勘諸文今生本有之終遇閻魔王斷罪歟人受病患將入死門之時五識漸去第六意識獨留是時病人第六意識影像閻魔王前顯現如月宿水面病人之質閻魔王前顯現也其時閻魔王隨罪福之輕重定善惡之生處非業盡死之者自冥途被還者即此時也故衆生遇閻魔王斷罪可云今生本有之終也大乘經等中此旨自所見歟但閻魔王呵嘖罪人名斷罪者是可當生本有位探玄記解釋即述此旨也委細之趣探玄記第六卷抄中記録之畢有宗論説顯明之間併所省略也問寶法師意東洲日沒南洲日中西州日出同時歟答可同時也兩方若同時者寶法師釋今論北洲夜半東洲日沒南洲日中西洲日出之文云非全盡理文如解釋者寶法師意不許此義見若依之爾者從半日沒中日出四洲等者性相之所定也設雖寶法師意何不許此義哉答今論云北洲夜半東洲日沒南洲日中西洲日出此四時等餘例應知文正理論云若倶盧夜半則贍部日中勝身日沒中貨日出若牛貨日中則勝身夜半贍部日沒倶盧日出文設雖寶法師意豈可背此等論判哉但於寶法師非全盡理之解釋者若就日光照用之分齊云之文者南洲日中之時東洲見日沒西洲見日出之義是必然也而今論文若就日輪在所論之者東洲日沒之時日輪可在妙高山東南角南洲日中之時日輪可在妙高山正南方西洲日出之時日輪可在妙高山西南角若爾四洲四時等義其理未盡疑也故寶法師釋云北洲夜半東洲日沒南洲日中西洲日中者此據一時而論非全盡理若不爾者北洲夜半南洲日中理且可然東洲日沒當妙高山東南角南洲日中當妙高山正南西方日出當妙高山西南豈全定也文若就日光照用之分齊論之時北洲夜半東洲日沒南洲日中西洲日出此四時等之義寶法師意自本所許之也問論中云雨際第二月後九夜漸増寒第四亦然夜減盡翻此文爾者晝夜有増減故如何釋之耶進云論云日行此洲向南向北如其次第夜増晝増文付之日輪向南之時去須彌山漸遠日輪行度可久何云夜増哉日輪向北之時去須彌山漸近日輪行度不幾何云盡増哉答南贍部洲北廣南狹日出此洲之後人見日光故日自南路出之時其路近故晝減夜増日自北路出之時其路遠故晝増夜減也如南洲日輪行度有多路餘三洲例之亦可有多路也或抄云自本眼人根可見之分齊有之故日輪向南之時去此洲事漸遠人見日輪行度不久故晝減夜増也日輪向北之時去此洲事漸近人見日輪行度可久故晝増夜減也云云問泰法師意晝夜停等後論晝夜増減云義光法師可許之耶進云光法師意不許此義見付之晝夜停等之後論晝夜増減云事其義既叶道理光法師何不許之哉是以見今論餘處文云此晝夜有時増有時減有時等文光法師釋此文作二解釋之中第二釋意云時長名増時短名減乃至春分秋分晝夜停等晝夜停等之後論晝夜増減見若爾光法師今解釋豈不招自相違哉答泰法師意自八月九日夜漸増晝漸減自二月九日夜漸減晝漸増云故夏至日已去雖夜漸増晝漸減八月九日已前晝猶長於夜故爲之晝増夜減之時冬至日已去雖晝漸増夜漸減二月九日已前夜猶長於晝故爲之夜増晝減之時也而今論云日行此洲向南向北如其次第夜増晝増日行此洲向南之時爲之夜増之時向北之時爲之晝増之時也泰法師意夏至日已去秋分日已前日向南行猶爲晝増之時冬至日已去春分日已前日向北行猶爲夜増之時故違此論文破也故光法師釋云准此論文日向南夜増如何從冬至日已去日向北説夜増准此論文日向北晝増如何從夏至日已去日向南説晝増文加之婆沙論百三十六云至磨伽月白半第八日夜有十八晝十二從此以後夜減晝増各一臘縛乃至至室羅筏拏月白半第八日夜有十二晝十八從此以後晝減夜増各一臘縛文此文意亦夜極長以後説夜減晝増晝極長以後説晝減夜増故泰法師解釋亦背此文也故光法師引婆沙論今文畢云以此文證准知夜極長已去説晝増夜減晝極長已去説夜増晝減若説秋分已去夜増晝減春分已去晝増夜減即與此文相違文故泰法師釋意背倶舍婆沙兩論説故光法師破之不許尤有其謂也但於光法師餘處解釋者此晝夜有時増有時減有時等之論文正明年量之文非專説晝夜増減之段故於此文及兩釋也當卷論文偈頌云雨際第二月後九夜漸増寒第四亦然夜減晝翻此長行述日行此洲向南北如其次第夜増晝増正明晝夜増減事倶舍一部三十軸中只在當卷此文故偏任論文不及異釋也重難云光法師引婆沙論文爲證據破泰法師釋事不可然見婆沙論文云晝夜停位各有十五謂羯栗底迦月白半第八日晝夜各十五牟吽栗多從此以後晝減夜増各一臘縛乃至吠舍佉月白半第八日晝夜各十五從此以後夜減晝増各一臘縛文此文晝夜停等之後説晝夜増減若爾泰法師解釋既順此文何引婆沙論文偏破之哉答見婆沙論文説夜減晝増之時文有二段也至磨伽月白半第八日夜有十八晝十二從此以後夜減晝増各一臘縛者論其時分齊雖夜長晝短夜次第役晝次第延故爲夜減晝増之時也至伏舍佉月白半第八日晝夜各十五從此後夜減晝増各一臘縛者論其時分齊實亦夜短晝長故短而促爲夜減長而延爲晝増也重意云十一月八日以後爲晝増者短而延爲増二月八日以後爲晝増者長而延爲増也爲顯晝増有此二門婆沙論中二段説之夜減二門准之可知全非謂十一月八日以後二月八日以前假爲晝減夜増之時也若如泰法師解釋者五月八日以後八月八日已前可爲夜減晝増之時而見婆沙論次下文云至室羅筏拏月白半第八日夜有十二晝十八從此以後晝減夜増各一臘縛五月八日以後八月八日以前爲晝減夜増之時都不爲夜減晝増之時故泰法師解釋甚背婆沙論今文也晝減夜増二段之文翻之可思也問婆沙論中云復至羯栗底迦月白半第八日晝夜停等文爾者羯栗底迦月者當此方二月歟進云寶法師釋云當此方八月八日西方八月二十三日文附之見婆沙論文云謂佛於迦栗底迦月白半八日中夜而般涅槃文而釋尊二月十五日入涅槃者出諸經論説知羯栗底迦月者當此方二月云事如何答見婆沙論文云謂羯栗底迦月白半第八日晝夜各十五牟呼栗多從此以後晝減夜増各一臘縛文是既當秋分日故寶法師釋此方八月八日尤叶論文也但於婆沙論謂佛於迦栗底迦月白半八日中夜而般涅槃之文者有宗意釋尊八月八日入涅槃云也故婆沙中云羯栗底迦月云迦栗底迦月同當此方八月也寶法師餘處羯迦雖異語是同也故知定是八月八日之解釋即顯此意也若依此意者諸經論中釋尊二月十五日入涅槃云文可會機感有異見聞不同也故淨影大師釋涅槃經二月十五日臨涅槃時之文云依阿含經如來八月八日涅槃此經下文亦有此相故下文言須跋陀羅竟安居已當至我所是故我昔告魔波旬過三月已吾當涅槃今言二月十五日者當是見聞不同故爾文或又依寶法師意者諸經論中錯八月爲二月也故寶法師餘處一釋云錯八月爲二月四月者以迦栗底迦是八月卯星之名二月又是建卯地之月星地詮別卯名同也若知迦栗底迦是酉地之卯翻爲八月若謂迦栗底迦是震地之卯翻爲二月四月由此轉法輪等日有二四八不同般涅槃日八四二月之異詳多教理度五比丘八月爲定會涅槃日如別章釋文涅槃經一云序品二月十五日臨涅槃時以佛神通力出大音聲文義記一本云二月十五日者出聲時也垂滅日臨晨朝出聲後夜當滅去滅不遥故日臨也此説化滅以爲涅槃又復息化歸於眞寂亦名涅槃問曰何故此時涅槃下經自釋依阿含經如來八月八日涅槃此經下文亦有此相故下文言須跋陀羅竟安居已當至我所是故我昔告魔波旬過三月已吾當涅槃今言二月十五日者當是見聞不同故爾文涅槃經二十三云高貴徳王菩薩品亦見香山須跋陀羅竟安居已當至我所是故我告魔王波旬却後三月當般涅槃文義記七末云須跋陀羅竟安居已至我所者過夏安居按此如來秋中涅槃阿含經中説佛八月八日涅槃與此相應而此經中上下多説二月涅槃當是見聞不同故爾文問頌文云近日自影覆故見月輪缺文爾者光法師意今此文説晝夜増減相歟答今此文明月輪圓缺之相也兩方若説晝夜増減相者此文偏説月輪圓缺旨未明晝夜増減之相哉若依之爾者光法師解釋中云後兩行明晝夜増減文旁難思如何答近日自影覆故見月輪缺者正雖説月輪圓缺之相因明晝夜増減之義顯月輪圓缺之相故光法師釋後兩行明晝夜増減全無相違也故見論文起盡上云日行此洲向南向北如其次第夜増晝増畢乘之問何故月輪於黒半末白半初位見有缺耶此旨自分明也問頌文云此上有色天住依空宮殿文爾者夜摩天已上無雲天已下諸天可有雲地耶答可雲地也兩方若有雲地者既是空居天也何有雲地哉是以正理論中釋空居天相有二師説之中述第二師義云有説空中密雲彌布如地爲彼宮殿所依文知初師意夜摩天已上無雲天已下諸天無雲地云事若依之爾者第四靜慮初天既名無雲天已下諸天定可有雲地也如何答夜摩天已上無雲天已下諸天定可有雲地也故光法師餘處所引正理論中釋無雲天名云以下空中天所居地如雲密合故説名雲此上諸天更無雲地在無雲首故説無雲文夜摩天已上無雲已下諸天定可有雲地云事此文實分明也但於正理論當處文者全非相違二説也初云從夜摩天至色究竟所住宮殿皆但依空者只先顯空居天相也次云有説空中密雲彌布如地爲彼宮殿所依者夜摩天已上無雲天已下諸天宮殿雖依空住非是一向無所依住空中密雲彌布如地爲所依住之旨云添許也既非相違二説何強爲疑哉問他化自在天可化聲境耶答可有二意也兩方若化聲境者聲由撃發是間斷法也何可化之哉是以見今論餘處二十七文述化二謂欲色四二外處性化心不化聲境見他化自在天例亦可同若依之爾者集異門足論中説他化自在天相云諸下劣天子化作種種色聲香味觸諸妙欲境令高勝天子於中受用文光法師引此文畢云准集異門聲亦可化文如何答光法師餘處二十七解釋中述化心不化聲境之旨引集異門足論今文擧問難畢自會通之作三解釋云彼由業力令他化作非由化心不可爲例或可從多分説以實而言聲由撃發不可言化以間斷故或聲不離所化色香味觸四種相從説故亦名爲化文若依初釋意者任集異門足論文他化自在天化聲境云也雖聲由撃發間斷法也業力是難思故化之聲由撃發不由能變化心力起故化心不化之爲言若依第二第三釋意者他化自在天亦不化聲境云也第二釋意云集異門足論中云化作種種色聲香味觸諸妙欲境者他化自在天實雖化色香味觸四境不化聲境五境之中從其多分云化作色聲香味觸諸妙欲境也以實云之聲由撃發非由化起不可言化有間斷故爲言第三釋意云此釋意同第二釋意他化自在天不化聲境云也色香味觸四境雖有離聲境之義聲境不離色香味觸四境故他化自在天化作色香味觸四境之時不離彼四境之聲境相從化作之云也爲言重難云就初解釋猶不明聲由撃發故化心不化之者設雖業力難思何可化之哉是以見今論餘處二十七文云餘生得等能變化心通善不善無記性攝如天龍等能變化心彼亦能爲自他身化於十色處化九除聲文如此文者彼天龍等生得化心不化聲境見生得化亦不化聲境者業力化何獨化之哉答聲由撃發故設雖生得設雖業得全不可有能變化心化聲境之義非由化心不可爲例之解釋即顯此意也只由業力不思議不藉能變化心化聲境之義可許之也生得化必有能變化心故生得化化聲境之義無之業力化不必有能變化心故化聲境之義亦可有也尋云准集異門聲亦可化之今解釋對餘處三解釋當何解釋哉答此事有二義或云當餘處初解釋也或云今解釋總述集異門足論之文面也故餘處三解釋中何解釋不可違之尋云二義之中可存何義耶私云後義尤宜可存此義也問論中釋第一樂生相云謂彼安住離生喜樂文爾者今此樂者樂受樂歟進云光法師釋云樂謂輕安文付之初靜慮既有三識相應樂受樂言尤可指彼哉若樂生之樂言名輕安樂者樂生天可通第四靜慮已上哉答三樂生之廢立名有喜受及樂受之處不取第四靜慮已上即此意也故寶法師釋云第四禪已上無樂受故不名樂生文爰知初靜慮爲第一樂生有喜受及三識相應樂受故也是以今論勸思云生靜慮中間都無喜樂應思何故亦號樂生天文正理論會之云大梵既有喜樂現行名樂生天亦無有失文初靜慮有喜受及三識相應樂受故爲第一樂生旨此等論文尤分明也加之集異門足論中釋第一樂生相云樂生者謂此天處長時受安隱樂離苦樂樂受樂故名樂生文第一樂生之樂中可取樂受樂云事此文亦明鏡也但於光法師樂謂輕安之解釋者初靜慮名離生喜樂就禪定論之而定中無三識相應樂受故准法蘊足論文釋樂謂輕安也故法蘊足論中釋離生喜樂之樂言云身輕安性心輕安性文非謂云爾故第一樂生之樂言唯名輕安樂何爲相違重意云樂生之樂言專名喜受及樂受兼取彼有喜受及樂受之處輕安樂樂生天可通第四靜慮已上云疑更不可來也問論中釋色究竟天名擧二師説爾者第二師意無色界可有色法耶答不可有色法也兩方若有色法者無色界無有色法者性相之所定也設雖第二師意更不可云無色界有色法哉若依之爾者論中擧第二師義云有餘師説彼名礙究竟天彼謂礙名目積集色至彼礙盡得究竟名文如此文者無色界可有非積集色見如何答無色界積集非積集色倶無之云事性相之所定也始不可疑之但於今論文者見一段起盡明天器近遠之中擧此二師説初師意云天所居器之中此處最高名色究竟第第二師意云此處積集色最後邊故名礙究竟爲言是即明天器近遠故偏論積集色不云不積集色也可云不積集色之處非不擧之非指疑也光法師餘處所引正理論中釋色究竟天名云有言色者是積集色至彼後邊名色究竟之文准之可思也問非神通力非依他力以欲界身至色界義可有耶答可有此義也兩方若有此義者以道理思之何可有此義哉是以見今論文偈頌云離通力依他下無昇見上長行云三十三天由自通力能從本處昇夜摩天或復依他謂得通者及上天衆接往夜摩天文如此文者非神通力非依他力以欲界身不至色界見若依之爾者見婆沙論文或百三十五述魔王至大梵宮之旨或百三十五云不起神通纔發心時即能擧身至色究竟文任此等文非神通力非依他力以欲界身至色界之義可有見如何答非神通力非依他力以欲界身至色界之義可有也即任一方疑難被出婆沙論兩處之文也勘彼具文或述如是説者出生所得心自身他身倶能化作之證尊者鄔波鞠多化作死等三屍繋魔王頚之時魔王欲脱此難云漸歴六天求欲免脱既不能得往梵宮邊請大梵言唯願哀愍解我頚上仙人所辱文或云佛盡智時得欲界無覆無記未曾得心心所法由此勢力不入靜慮不起神通纔發心時即能擧身至色究竟何況梵世文婆沙抄中釋此文云三藏云威儀無記心也文任此等定判非神通力非依他力以欲界身至色界云事尤分明也但於今論文者談其多分相歟問人於梵天見梵天色唯限天眼歟答唯限天眼也兩方若唯限天眼者婆沙論所引施設足論中述人不見梵天色云除有修有神通或他威力文既云或他威力知非天眼人見梵天色云事若依之爾者見論文云然下眼不能覩上界上地非其境界故如不覺彼觸文如此文者人於梵天見梵天色唯限天眼見如何答上界上地色非下眼境界故人依神通等力雖昇梵天離彼處天眼全不可見梵天色也疑難之中被出之今論文此旨實分明也加之婆沙論云雖有神通或他力引得至彼天若無天眼不能見故云云任此等論文人於梵天見梵天色唯限天眼云事更不可疑之但於施設足論文者婆沙論中會之云彼但應説除有修言而復有餘言者有別意趣謂依他方梵天等説他方梵天等色亦是此方依初靜慮等所引天眼境界然以極遠雖得彼眼不能見之若自有神通或他力所引至彼乃能以天眼見除有修言顯得天眼説後二句顯至彼所説有別意趣文重難云五通勢力彼此其分齊可同故隨其所應神通所到之分齊亦可彼天眼境界而依神通到非天眼境界極遠處云事甚難思哉答且如聲聞天眼以二千界爲其境界神通所到之分齊亦以可同之但一起神通雖不過二千界之分齊再起神通到二千界之外於彼處以天眼可見二千界之外事故依神通極遠處以天眼見彼處色云歟問依身色界人以色界自身可來欲界耶答不來也兩方若來者見論文云是故從上地來下地時非自身要作下地化文如此文者以色界自身不來欲界見若依之爾者光法師餘處解釋中釋生色界作欲界化云若化自身若化他身色觸二種皆悉成就文既云若化自身知以色界自身來欲界云事如何答依身色界人來欲界之時要作欲界化來以色界自身不來也是故從上地來下地時非自身來要作下地化之論文此旨實分明也是即離身化也其中似自身化是自身化似他身化是他身化也但於光法師餘處解釋者依身色界人作欲界化之時若似自身化若似他身化來欲界云也非謂以色界自身來欲界故餘處解釋全非相違也問論中付明空居天依處量且寶法師意有幾師説耶進云寶法師釋云欲界四天有其兩釋初靜慮天有其三釋文付之初靜慮天有其三釋云事不可然見今論文云有餘師言初靜慮地宮殿依處等一四洲第二靜慮等小千界第三靜慮等中千界第四靜慮等大千界有餘師言下三靜慮如次量等小中大千第四靜慮量無邊際文此文無諍色界四靜慮量有二師説見是以光法師云欲界上四天有二師釋色界四定亦有二釋泰法師判欲界上四天有二師釋色界四定亦有二師釋若爾寶法師解釋豈不背論文哉答今論中云色界四靜慮量實擧二説無有三説退勘正理婆沙兩論之説正理論云有餘師言初靜慮地宮殿依處等一四洲第二靜慮等小千界第三靜慮等中千界第四靜慮等大千界有餘師言下三靜慮如次量等小中大千第四靜慮量無邊際文婆沙論云有説從夜摩至他化自在雲地皆等妙高頂量色界雲地下狹上廣謂初二三四靜慮地如次等彼四洲小千中千大千諸世界量有餘師説夜摩天宮雲地倍於妙高山頂乃至他化自在天宮雲地望前展轉相倍初二三定如次等於小千中大千界量第四靜慮其量無邊文此等論判云四靜慮量唯擧二説無有三説光法師等解釋實叶論文者歟寶法師解釋尤似難思但聊成寶法師解釋意者見今論文上説夜摩天已上欲界天依處量云有餘師説此上四天依處量同妙高山頂有餘師説上倍倍増文今此上倍倍増之義可通色界天得意釋初靜慮天有其三釋也重難云正理論云有説此四上倍倍増婆沙論云有餘師説夜摩天宮雲地倍於妙高山頂乃至他化自在天宮雲地望前展轉相倍上倍倍増之義唯限夜摩天已欲界四天見何通色界天得意哉若又通色界天得意者廣可亙四靜慮天何云初靜慮天有其三釋不云上三靜慮有三師説哉答今論云有餘師説上倍倍増不云限欲界四天故今論上倍倍増之義通色界天得意歟若爾與正理婆沙兩論上倍倍増之義可異也次上倍倍増之義雖通色界天唯可限初靜慮也第二靜慮或云等小千界或云等中千界第三靜慮或云等中千界或云等大千界第四靜慮或云等大千界或云量無邊際此二師説之外不可有別異師説故不云上三靜慮有三師説也已上就初靜慮天有其三釋之本會通之旨大概如此或本云初靜慮天有其二釋文唯標初靜慮天雖未得其意不如此本歟問二禪已上三千界攝歟進云光法師所引正理論中二禪已上非三千界攝見付之凡夫二乘通力無過三千界而二禪已上既爲凡夫二乘所起五通之境界尤可云三千界攝若非三千界攝者可有凡夫二乘通力縁三千界外之過哉加之或經中二禪已上三千界攝見如何答見今論文云四大洲日月蘇迷盧欲天梵世各一千名一小千界此小千千倍説名一中千此千倍大千皆同一成壞小千界廢立唯至梵世無取二禪已上而積小千界成中千界積中千界成大千界故二禪已上非三千界攝也故光法師引正理論云此中小千唯擧至梵世故少光等非小千界攝積小千界爲中大千故中大千亦不攝彼又言小者是卑下義以除上故如截角牛積小成餘亦非攝彼文但於凡夫二乘通力無過三千界云難者就傍論之也故光法師餘處釋即此五通於世界境作用廣狹諸聖不同謂大聲聞麟喩大覺不極作意如次能於一二三千諸世界境起行化等自在作用若極作意如次能於二千三千無數世界之論文云二約傍顯作用寛狹文次於或經中二禪已上三千界攝見云難者是華嚴經并最勝王經説也既非當部依憑更不可劬勞也若強會之者以二禪已上望下分齊三千界攝云也非謂二禪已上實三千界攝也故清涼大師會華嚴最勝二經説云且如二禪直語其量等千初禪以千初禪向上取之則有千二禪如是百億初禪向上取之則有百億四禪譬如夏雲普覆九洲若以洲取則有九雲若以郡取則四百餘雲若以縣取千數未多或云一雲普覆萬國或言萬國各有夏雲思之可見文文意顯也問欲界天身量次第一一増歟答多分爾也進云論云欲天倶盧舍四分一一増文付之欲界諸天種類非一准何必次第一一増哉是以婆沙論中欲界天身量不必次第一一増見如何答從多分云之欲界天身量次第倶盧舍之四分一一増也故見今論文偈頌云欲天倶盧舍四分一一増長行述欲界六天最下身量一倶盧舍四分之一如是後後一一分増至第六天身一倶盧舍半即顯此旨也但如此定判云時三十三天身量雖半倶盧舍天帝釋身量獨一倶盧舍故涅槃論百三十六云四大王衆天身長倶盧舍四分之一三十三天身長半倶盧舍天帝釋身長倶盧舍文是則天帝釋者三十三天之主其徳勝餘天故同覩史多天身量一倶盧舍云歟若依此一類者違次第一一増之相也然而倶舍論大談多分義相婆沙論委出一類身量全非相違也問論中付明諸天身量倍倍増相且無雲天減三踰繕那故光法師如何釋之耶進云光法師作三解釋云所以無雲減三喩繕那者從變易受初修不變易受難故減三也又解爲成色究竟天萬六千故所以減三又解法爾故然文付之三解釋倶不可然先就初釋不明論身量大小可任修因感果之道理何以受難易爲感身量大小之故哉何況修不變易受難事專可依彼定體勝若所修定體勝者所感身量亦可倍増而以可爲倍増之道理還爲所感故豈釋家本意哉是以寶法師破此釋云此似倒也既得難之身壽應加文次就第二釋難思論造業感果之義自天可定之何爲順他色究竟天一萬六千踰繕那於無雲天先減三踰繕那哉何況色究竟天身量一萬六千踰繕那者依後後倍増之義也何先定彼身量可減下天身量哉若依此義者尤可減下諸天身量至無雲天初減三踰繕那其意難思哉次就第三釋有疑諸天身量者皆是業力所感也法爾故然者自然法爾減三踰繕那之義也此豈不失因果道理哉何況諸天身量次第倍増之義設云法爾故然別減三踰繕那更可有別故哉如何答光法師三解釋倶非無其謂先初釋意云三禪已下變易受定麁動易起四禪已上不變易受定寂靜難修而若感勝果必依勝因若感劣果必依劣因任此道理之時無雲天身量減三踰繕那能感定因隨亦可減云事是必然則不變易受定寂靜難修故爲令易修故減三踰繕那云也但於寶法師解釋者寶法師解釋之習雖無道理處處故難光法師解釋何始爲痛哉次第二釋意云諸天身量次第倍増無雲天若不減三踰繕那者無雲天身量一百二十八踰繕那福生天身量二百五十六踰繕那廣果天身量五百十二踰繕那無煩天身量一千二十四踰繕那無熱天身量二千四十八踰繕那善現天身量四千九十六踰繕那善見天身量八千一百九十二踰繕那色究竟天身量一萬六千三百八十四踰繕那可當也是即數量非巧可有雜亂之過也無雲天減三踰繕那之時無雲天身量一百二十五踰繕那福生天身量二百五十踰繕那廣果天身量五百踰繕那無煩天身量一千踰繕那無熱天身量二千踰繕那善現天身量四千踰繕那善見天身量八千踰繕那色究竟天身量一萬六千踰繕那故或滿或半之倍増數量巧成無有雜亂之過故擧終釋爲成色究竟天萬六千故所以減三尤有其謂也是以泰法師釋云無雲天倍増應有百二十八以法相道理數恐亂故唯無雲天滅三踰繕那唯有百二十五福愛倍爲二百五十廣果倍爲五百故無量光倍増小光二至四乃至色究竟増滿萬六千文此釋意當光法師第二釋意歟次第三釋意云法爾故然者修因感果法爾必然故無雲天身量減三踰繕那云也更非失因果道理寶法師釋詳其上壽量増減及身量増減欲無色天及無色天色天初定以半劫爲劫及於中間靜慮身量等不同者皆是生死法爾因果如此不可細求所以即述此旨也尋云寶法師釋無雲天身量減三踰繕那云應言下變異受以樂欲心勝由此造業引壽等勝不變異受引欣心劣由此造業引壽等減文此釋豈不違背是生死法爾因果如此不可細求所以之自解釋哉答寶法師解釋兩處實致相違若夫前後各述一意歟人師作多解釋不始于今事歟或又應言下變異受等之釋雖非所存實義剩光法師初解釋意暫仰一一往之釋歟問第四靜慮諸天中福愛天者無雲天異名歟答無雲天異名哉是以泰法師解釋中云唯無雲天減三踰繕那唯有百二十五福愛倍爲二百五十文道暹師所判中云福愛亦名福密身長二百五十由旬壽二百五十文任此等解釋福愛天者是福生天異名非無雲天異名見若依之爾者香象大師解釋中福愛天者無雲天異名見如何答第四靜慮諸天之中福愛天者可云無雲天異名也故雜心論中明諸天身量云福愛天身百二十五由旬福生天身二百五十由旬文述諸天壽量云福愛天一百二十五劫福光天二百五十劫文任此論文福愛天者無雲天異名云事尤分明也香象大師釋又四禪中少密身餘處説名福愛天尤順雜心論説也但於泰法師并道暹法師解釋者既背雜心論文亦違香象定判後學強不可劬勞之問論文云無間地獄壽一中劫文爾者一増一減爲一中劫歟進云光法師釋以佛經中我説一中劫爲一劫如無間果一増一減爲一中劫見付之等活等上六如次以欲天壽爲一晝夜壽量亦同彼者今論定判也而彌勒菩薩住覩史多天盡彼天壽量之間送一増劫全一減劫少分是則當第四號叫地獄一日一夜之分齊設雖盡一増劫全一減劫全無間地獄壽量難及號叫地獄二日二夜哉若爾八大地獄壽量漸次倍増之理寧可成立哉答此事難義之中難義也依之楞嚴院源信僧都經數箇條難義遥訪決於異朝之時就倶舍一宗出三條難義是其隨一也其時知禮和尚猶不通之況於末學哉然而暫成申一義意者一生補處菩薩住覩史多天之間數死數生故經一増劫全一減劫少分也覩史多天一箇四千歳之間非經一増劫全一減劫少分故不可違八大地獄壽量漸次倍増之理也故泰法師引眞諦三藏説云於彼天中經多生死盡彼天壽終不中夭雖經多生總是覩史多天生總言一生也文此釋尤順道理更不可異求歟重難云既名一生所繋菩薩何云數死數生哉是一次若數死數生者寧云一生所繋菩薩無中夭哉是二何況婆沙論中述釋迦菩薩唯生覩史多天故云謂人間經五十六倶胝六十百千歳能化所化善根應熟彼即是覩史多天壽量文思此文意一生所繋菩薩唯經覩史多天四千歳見若數死數生者豈可限人間五十七倶胝六十百千歳哉是三答補處菩薩住覩史多天待下生期之間雖數死數生同是覩史多天生故名一生所繋也次一生所繋菩薩住覩史多天雖數死數生無不受盡彼天壽量之分齊故云無中夭也次於婆沙論文者還可爲答之潤色也其故見婆沙論處處之文或百三十五出留化事之證云曾聞尊者大迦葉波入王舍城最後乞食食已未久登雞足山山有三峯如仰雞足尊者入中結跏趺坐作誠言曰願我此身并納鉢杖久住不壞乃至經於五十七倶胝六十百千歳慈氏如來應正等覺出現世時施作佛事文或百七十八述釋迦菩薩相異熟業今善圓滿從此贍部洲沒生覩史多天不生餘天云有説唯覩史多天壽量與菩薩成佛及贍部洲人見佛業熟時分相稱謂人間經五十七倶胝六十百千歳能化所化善根應熟彼即是覩史多天壽量是故菩薩唯生彼天若生上天壽量未盡善根已熟若生下天壽量已盡善根未熟故不生彼文而釋迦菩薩人壽千二百歳之時上生覩史多天人壽百歳之時下生人間彌勒菩薩人壽百歳之時上生覩史多天人壽八萬歳時下生人間以之思之釋迦菩薩住天時分是短彌勒菩薩住天時分可長然而今文釋迦彌勒二菩薩住天之間同當人間五十七倶胝六十百千歳云故知人間五十七倶胝六十百千歳者可非總定二菩薩住天時分若總定二菩薩住天時分者豈無長短不同哉爰知人間五十七倶胝六十百千歳者只出當覩史多天一箇四千歳之分齊許也以實云之釋迦彌勒二菩薩於覩史多天同可經多四千歳其間於人間同可經多五十七倶胝六十百千歳也重意云婆沙論中釋迦菩薩住天時分人間經五十七倶胝六十百千歳即是覩史多天壽量者顯一生所繋菩薩盡彼天四千歳壽量之儀式也實雖數死數生暫任一生所繋之儀式經四千歳下生之旨述也問論文云無間地獄壽一中劫文爾者一増一減爲一中劫歟答爾也兩方若一増一減爲一中劫者圓暉法師解釋中云無間地獄壽一中劫二十増減爲一中劫也文加之妙樂大師解釋中云倶舍等論多以二十増減爲一中劫文任此等定判二十増減爲一中劫見若依之爾者光法師解釋中云以佛經中或説一中劫爲一劫如無間果文如解釋者一増一減爲一中劫見如何答無間地獄壽一増一減爲一中劫云事不限光法師解釋亦出慈恩大師定判故玄賛六云無間地獄壽一中劫謂如從八萬減至十歳十歳復増至八萬歳名一中劫是無間劫量文劫章頌云無間有情一増減龍王壽報亦同然文加之婆沙論中釋無間地獄一劫壽果云如是説者此是中劫由彼亦有不盡中劫而得脱故如毘奈耶説提婆達多當於人壽四萬歳時來生人中必定當證獨覺菩提舍利子等所不能及文提婆達多感無間壽量既經一増劫全減劫少分無間地獄壽一増一減爲一中劫云事是亦現證也故惠暉法師解釋中述無間中劫全者一増一減爲一中劫之旨畢出提婆達多今事爲證據也但於圓暉法師解釋者楞嚴院源信僧都以之爲誤強不可及會通歟或又依遁麟記意會之者二十増減爲十中劫者住劫有二十増減之中爲一中劫是一増一減也爲言非謂二十増減爲一中劫量也妙樂大師解釋准之可會歟問無想天可有中夭耶答無中夭也兩方若無中夭者無想天者是外道生處也豈勝餘天獨無中夭哉是以今論中云諸處有中夭除北倶盧洲文婆沙論中云一切有情多分中夭唯除人趣北倶盧洲及住覩史多天一生所繋菩薩文此等論文出無中夭之處無擧無想天知彼天可有中夭云事若依之爾者雜心論中無想天無中夭見如何答若依小乘有宗意者無想天無中夭可云也故雜心論云一切三界皆有中夭唯除欝單及兜率天最後身菩薩及無想天文法苑珠林云三界皆有中夭唯欝單越及兜率天最後身并及無想天皆定壽命不説中夭也順正理論此亦皆同文任此等定判無想天無中夭云事尤分明也但於無想天者外道生處也豈勝餘天獨無中夭哉云難者中夭者無不可依異生聖者生處生無想天之者五百劫間愛無心異熟而無心位不命終故無想天無中夭也初生後沒雖有心品彼暫時故不及論中夭有無也次於今論諸處有中夭除北倶盧洲之文者是就八大地獄傍生鬼趣四洲六欲天色界十六天無色界四處論中夭有無也故泰法師釋諸處壽量皆有中夭唯北倶盧定壽千歳此約處説非別有情之論文云諸四十居止處皆有中夭唯北洲定壽千歳此約四十居止處説文而無想天是廣果天所攝不立別天故約三界諸處論中夭有無之時不別出無想天也婆沙論文准之可會也問北洲傍生定壽千歳歟答非定壽千歳也兩方若定壽千歳者見婆沙論文云一切有情多分中夭唯除人趣北倶盧洲文如此文者北洲傍生非定壽千歳見若依之爾者今論中云諸處有中夭除北倶盧洲生北洲之者一切皆定壽千歳無中夭見知彼洲傍生亦定壽千歳云事如何答四洲者是人住處故約三界諸處論中夭有無之時北洲無中夭者就人趣論之也非謂生彼洲傍生亦定壽千歳無中夭也婆沙論一切有情多分中夭唯除人趣北倶盧洲之文此旨既分明也倶舍諸處有中夭除北倶盧洲之文准之可思也問光法師意決定於今生可證無學果聲聞獨覺可有中夭耶答不可有中夭也兩方若有中夭者決定於今生可證無學果聲聞縁覺也何可有中夭哉是以光法師釋最後有菩薩無中夭故云謂依此身定得無學名最後有若未證果必無中夭文聲聞縁覺例亦可同若依之爾者見今論疏文出無中夭類之中不擧之知可有中夭云事如何答決定於今生可證無學果聲聞縁覺不可有中夭云事道理實必然也更不可疑之彼如極七返有聖者第七生并麟喩獨覺入聖依身等也但於今論疏文出無中夭類之中不擧之云難者非一類人其義定故出無中夭類之中不擧之也極七返有聖者第七生雖無中夭餘預流果聖者非無中夭麟喩獨覺入聖依身雖無中夭餘部行獨覺入聖依身亦有中夭故就種類見之其義不定故出無中夭類之中不擧之也問光法師釋倶非害中説慈定滅定等不中夭中不説之作三解釋爾者初釋意如何釋之耶進云光法師釋云解云於不中夭中理亦應説慈定滅盡定無想定以時不定非如見道隨信隨法行定十五刹那乃至故此不説文付之最後有菩薩佛記佛便等雖時不定不中夭中猶説之慈定滅盡定無想定雖時不定不中夭中何不擧之哉答最後有菩薩佛説佛便等雖時不定就別類人體論之故不中夭中出之隨信隨法行其時分定十五刹那此時無中夭故不中夭中亦擧之慈定滅盡定無想定其定中時分不定故幾刹那無中夭云事難定也故實雖無中夭不中夭中不擧之云也問地獄可有中夭耶進云光法師釋那落迦有中夭也付之依猛利惡業感地獄異熟定可受盡彼處異熟果何可有中夭哉是以見今論餘處十七文述地獄無殺生業道故云業盡死故無殺業道文既云業盡死豈可有中夭哉加之光法師解釋中那落迦非倶害見若有中夭者何非倶害哉答見今論文述諸處有中夭除北倶盧洲三界之間四十處中唯除北洲之外皆有中夭見光法師釋此文云諸處壽量皆有中夭唯北倶盧洲定壽千歳文又云那落迦輪王色無色界有中夭文婆沙論云一切有情多分中夭唯除人趣北倶盧洲及住覩史多天一生所繋菩薩文雜心論云一切三界皆有中夭唯除欝單曰及兜率天最後身菩薩及無想天文任此等定判地獄有中夭云事實分明也但於依猛利惡業感地獄果報不可有中夭云難者設雖依猛利惡業感地獄不必可受盡彼處異熟果地獄有情種類萬差可有不受盡彼處壽命分齊而死之類故有中夭云也次於業盡死故無殺業道之論文者依猛利不善業感地獄異熟果故業未受盡之時無有横死之義故云無殺業道也然而依別縁力至業力衰歇之時不受盡彼處異熟果可來生人中等故有中夭云事亦非相違也問造破僧罪墮無間地獄者可有中夭耶答可有中夭也兩方若有中夭者破僧是極重大罪也造彼罪墮無間地獄之者何可有中夭哉是以今論餘卷中云此必無間大地獄中經一中劫受極重苦文婆沙論中因破僧罪生無間地獄之者無中夭見若云彼有中夭者豈不背此等文理哉若依之爾者今論中出無中夭之類不擧造破僧罪墮無間地獄之者知彼亦可有中夭云事何況光法師解釋中云那落迦有中夭未簡無間地獄哉如何答造破僧罪墮無間地獄之者可有中夭也彼提婆達多造破僧罪墮無間地獄不受盡一中劫異熟果來生人中即其類也故婆沙論云如是説者此是中劫由彼亦有不盡中劫而得脱故如毘奈耶説提婆達多當於人壽四萬歳時來生人中必定當證獨覺菩提舍利子等所不能及文當卷論疏中出無中夭之處不擧無間地獄述無中夭之類無列提婆達多當來果報即此意也但於今論餘卷文者造破僧罪必墮無間地獄云許也非謂墮無間地獄之後亦無中夭何爲相違次於婆沙論説者勘婆沙論文兩處述此事第百十九卷中問若因破僧生無間地獄壽命未盡世界便壞者彼中夭不即擧兩方之難畢答若壽量定彼無中夭若壽量不定之者可有中夭云事此文還分明也准此文思之第百三十四卷中云有作是説彼無中夭就壽量定之類無中夭云也若壽量不定之者有中夭事更非所遮歟問光法師釋倶非容中説慈定滅定等不中夭不説之作三解釋爾者第三釋意如何釋之耶進云光法師釋云又解隨其所應等字以攝文付之見光法師第二解釋云那落迦輪王色無色界有中夭餘慈定滅盡定無想定王仙無中夭此中皆在等字中收文若爾者與第二解釋有何差異哉答第二釋意那落迦輪王色無色界雖非倶害有中夭故不中夭中不擧之慈定滅盡定無想定王仙無中夭故此等如應皆無中夭等之言攝之爲言第三釋意自第二釋猶廣等之那落迦輪王色無色界之中若無中夭之類此等如應皆無中夭之等言攝之爲言第二第三解釋以之可爲其差異也問光法師解釋中云釋迦牟尼當住劫第一劫出世文爾者禀承實義歟答云然和上之可禀承實義見也付之寫本云建長八年十月三日未時於東大寺尊勝院中堂東廊抄之畢此間披見倶舍論第十一卷具書之次或訪明師或任愚案爲開初心初學之慧解聊記一問一答之綱要毎有其謬後學直之不顧五旬有餘之暮齡猶勵一部抄出之深志冥衆必垂哀愍善願速得圓滿焉仰願依此稽古之微功答此慇懃之誠心一期終焉之暮遂往生於兜率之秋雲三會下生之曉開惠解於龍華之春風而已右筆花嚴宗末葉法印權大僧都宗性年齡五十五夏臘四十三
