body:
  text: 倶舍論第五卷抄下問微微心位必緣滅盡定歟答不必緣滅盡定也兩方若必緣滅盡定者想心微細心位不必緣滅盡定微微心位例亦可同若依之爾者見婆沙論文云微微現在前時法念住現在修文若不必緣滅盡定者何可限法念住哉加之披光法師餘處解釋云入心緣彼滅定寂靜方能入故故唯有漏出心不必及緣滅定故通二種文此釋無諍微微心位必緣滅盡定見如何答光法師引婆沙論百五十二如是説者隨滅爾所心心所法即有爾所物現前爲此定體之文畢云評家意更有欣厭心所隨其所應與心相應而非起故與前家不同文寶法師引此文畢云此與第三師別者評家兼取欣厭第三唯二十一故不同也文加之勘清涼大師解釋演義抄三上云倶舍頌云滅盡定亦爾爲靜住有頂謂滅盡定以二十二物爲體謂能修定前有二十一心所及心王一故言二十一心所者謂大地十大善地十欣厭隨一爲滅定故有二十二物不相應行替處名爲滅定隨滅爾許心心所法爲定體文任此等釋微微心位欣厭心所隨應現起見其中欣心所現起之時雖緣滅盡定厭心所現起之位緣受想等心所不可緣滅盡定云滅受想定稱即此意也但於婆沙論微微現在前時法念住現在修之文者雖不緣滅盡定總緣受想等心所不別緣一法故云法念住現在修全無相違次於光法師餘處入心緣彼滅定寂靜等之釋者微微心位厭受想等心所欣滅盡定不過此二厭受想等心所之時雖不緣滅盡定此猶欣滅盡定故厭受想等心所也故對出定心廣緣餘法云入心緣彼滅定寂靜等也不遮緣受想等心所厭之之義邊有何所背哉問今論意微微心位未來必修心心所歟答未來必修心心所也兩方若未來必修心心所者微微心位心心所修不修可非一准何未來必修之哉若依之爾者微微心既未曾得善心也設雖今論意寧可有未來不修心心所之義哉答婆沙論百五十三中述微微唯未曾得微微心是未曾得勝品功徳故未來可修心心所也故勘婆沙論處處之文或百七云起入滅盡定微微心時現在唯修世俗智未來亦唯修世俗智文或云微微現在前時法念住現在修未來三除身念住文思今論意同可存此旨是以見今論二十六餘處文云無學未來鈍九利十除微微心此於未來唯修俗故文光法師釋此文云臨入滅定心名微微心此心羸劣現未唯俗不修無漏文正理論餘處文全同今論説故寶法師釋云此論及正理皆言微微心未來唯修有漏文任此等定判微微心位未來必修心心所云事諸論一同之所説也獨限今論何可疑之哉重難云如來初盡智位悉得所有一切功徳故微微心定可曾得法豈有未來修哉婆沙論中云微微唯未曾得所難思也答如來微微心實雖曾得法勝曾得功徳故可有未來修也准光法師餘處二十七得勝曾得名未曾得之釋可思之也如來微微心是勝曾得法可得未曾得名故婆沙論文亦無相違也重難云若爾光法師餘處論意各別之釋意今論意勝曾得法無未來修見依此釋意之時今論意如來微微心何可有未來修哉問題標今論意即爲疑此釋也答論意各別之釋意今論意實雖曾得法勝曾法與未曾得名許未來修婆沙論意勝曾得法雖不與未曾得名乍曾得法有未來修爲言此釋意非謂今論意勝曾得法無未來修歟問光法師所引婆沙論中擧入滅盡定時或滅未來心心所法或通滅未來現在心心所法云二説爾者二説倶正義歟進云光法師釋云前爲正文付之光法師所引婆沙論文雖擧二説無判正不隨亦通未來現在心心所法云義尤叶道理何判前解爲正哉是以光法師餘處十七解釋中明殺生罪引婆沙論百十八或殺未來蘊非過去現在或殺現在未來蘊但非過去云二説畢云然無評家前據體斷名殺後兼斷用亦殺現在義竝無違滅盡定滅心心所法相例可同如何答披婆沙論文思二義正不述初師説云應作是説滅於未來置應作是説之言出第二師義云有説通滅未來現在構有説故二説正不既炳然也故光法師引此二説畢判正不云不解爲正不言有説故文但於光法師餘處然無評家等之釋者殺生罪者能殺之人所殺有情現在相竝有故斷用義殺現在蘊云説是正義也滅盡定者能滅之定所滅心心所現在不相竝故通滅現在心心所法云説非正義也問論文云此滅盡定唯聖者得文爾者異生不起滅盡定故如何釋之耶進云論中釋此事出三故云非異生能起怖畏斷滅故唯聖道力所能起故現法𣵀槃勝解以入故文付之三故倶不可然先初故有疑異生既起斷見及無學有愛等無有怖畏斷滅之義何云怖畏斷滅故不起之哉加之異生於欲色界現修無色定設雖起滅盡定寧可有怖畏斷滅之義哉次第二故難思無想滅盡二定倶是無心定也而無想定不由聖道力得之滅盡定例可亦同何況滅盡定入心是有漏非無漏不可云由聖道力得之哉次第三故不明見光法師餘處定判釋五現法𣵀槃論中第五現法𣵀槃論云能見諸欲尋伺喜入出息皆有過去彼作是念此我清淨解脱出離一切災横謂現安住第四靜慮爾時名得現法𣵀槃文此等執見異生爾所起也豈非作𣵀槃勝解哉答初故靜慮者滅盡定者有非想非非想處彼地之中無有色法若滅心品者應斷滅色心故異生作怖畏不起之云也故光法師釋初故意云此滅盡定在於有頂彼無有色復斷滅心恐成斷滅而生怖畏故不能起文但異生起斷見及無有愛等幷於欲色界現修無色定之時令無斷滅色心之義何可爲疑哉次第二故意者滅盡之得聖道之力起之不得聖道之人更無起之故云唯聖道力所能起故非謂以無漏爲入心也但無想定唯異生所起定故由邪見見取戒禁取等力起之頗不足爲相例之難歟次第三故意者於滅盡定作現法𣵀槃勝解是眞非顛倒豈以五現法𣵀槃論等染汚顛倒見致其疑哉問麟喩獨覺得滅盡定爲加行得爲當離染得歟答可離染得也兩方若加行得者佛得滅盡定既離染得也麟喩獨覺可同之是以勘慈恩大師處處法苑義林章四瑜伽論略纂五解釋佛及麟喩獨覺得滅盡定離染得判若依之爾者披今論文當卷明得滅盡定述聖由加行得成佛得非前世尊之外可加行得見餘處二十九指今説云第八解脱如先已辨以即是前滅盡定故文光法師釋此文云佛唯離染得餘皆加行得文泰法師釋此文云唯佛一人是離染得餘皆加行得文此等定判無諍麟喩獨覺得滅盡定是加行得云事如何答麟喩獨覺是最上利根人故得滅盡定尤可離染得也故婆沙論百七十中明六十五等至極少極多成就相云佛定成就五十七乃至麟角喩者如佛文若麟喩獨覺初盡智位不得滅盡定者何云定成就五十七等至哉加之光法師餘處三解今論如本論説云何苾芻留多壽行謂阿羅漢成就神通之文云二解脱勝成就神通顯倶解脱簡惠解脱文如此釋者不得滅盡定人不可得無諍願智四無礙解見而麟喩獨覺初盡智位無諍願智四無礙解決定可得者也爰知可得滅盡定云事但於今論兩處之文幷光泰師兩釋者麟喩獨覺初盡智位得滅盡定故雖離染得總見二乘之時二乘離染得不定故云佛唯離染得餘皆加行得述唯佛一人是離染得餘皆加行得也故今見論餘處二十七文説無諍願智四無礙解六種功徳云除佛所餘一切聖者所説六種唯加行得非離染得非皆得故文光法師釋此文引合婆沙論中明願智無諍智云如是説者若決定可得者彼離染得盡智時得故之文會其相違云婆沙通據少分故説二乘亦有離染得倶舍以二乘離染得不定故但言加行得文准今定判之趣可會此等之釋也重難云婆沙論中出捨見至名得倶解脱名之類唯擧諸佛若麟喩獨覺初盡智位得滅盡定者捨見至名得倶解脱名之類不可限諸佛哉是一加之婆沙論百四十三中問若如是者三乘無學皆是具知何故世尊獨名爲佛答之云有説若盡智時二障倶斷心得解脱謂煩惱障及解脱障説名爲佛聲聞獨覺或先脱煩惱障後解脱障或先脱解脱障後煩惱障無倶脱者故不名佛文若麟喩獨覺初盡智位得滅盡定者何無二障倶脱之義哉答婆沙論兩處之文同准光法師餘處倶舍以二乘離染得不定故但言加行得之釋可會之也問佛身所起功徳中可有未曾得類耶答無未曾得類也兩方若有未曾得類者披今論文云佛無一徳由加行得乃至故佛衆徳皆離染得文爰知佛身所起功徳中無未曾得類云事若依之爾者見圓暉法師餘處二十六解釋云佛亦於道得修習修倶不盡故文若得修習修不盡者可有未曾得功徳現前義哉何況勘婆沙論處處之文或四十一云謂佛若起無漏心或未曾得世俗心一切有情無能知者或九十九述如來無漏心心所法及未曾得有漏心心所法倶非他心智現法及未曾得有漏心心所法所取境此等論判無諍佛身所起功徳中有未曾得類見如何答諸佛世尊初盡智位頓得所有一切功徳故佛身所起功徳中無未曾得類也故今論云佛無一徳由加行得暫起欲樂現在前時一切圓徳隨樂而起故佛衆徳皆離染得文正理論十二云由菩薩時永離一切煩惱染故令佛身中功徳得起故説如來所有功徳皆離染得文顯宗論七文全亦同之加之婆沙論中或云世尊現起初盡智時已具得修一切功徳今若更修前應未得若爾前位功徳未滿初成佛時應非究竟證得無上正等菩提文或百六十三云則盡智時應不具得一切功徳云何得名所作究竟文任此等文理佛身所起功徳中無未曾得類云事甚分明也但於圓暉法師餘處佛亦於通得修習修倶不盡故之釋者就餘乘功徳論之也次於婆沙論兩處之文者約勝曾得功徳立未曾得名也准光法師餘處二十六得勝曾得名未曾得之釋可會之也問論主意可存菩薩三十四念成覺義耶答可存菩薩三十四念成覺義也兩方若存菩薩三十四念成覺義者見今論文云傳説菩薩三十四念得菩提故文既置傳説之言明知不存此義云事若依之爾者菩薩三十四念成覺者常途之所談也設雖論主意何不存此義哉答論主意就無漏心論之者菩薩三十四念成覺云義可存也但於今論傳説之言者有宗意以菩薩三十四念得菩提故菩薩學位不起滅盡定云故論主意明西方師菩薩三十四念中間從見道出起非想非非想處有漏心入滅盡定云義置傳説之言也故光法師釋若許彼説便順尊者鄔波毱多理目足論如彼論説當言如來起滅定後生盡智之論文云論主意朋西方師説故作斯釋文問正理論意滅盡定出心可通識無邊處耶答不通識無邊處也兩方若通識無邊處者滅盡定出心不通識無邊處者有宗一同之性相也設雖正理論意何可背此理哉若依之爾者正理論十二中解契經出滅定時當解三觸謂不動觸無所有觸及無相觸之文云有餘師説識處空處心相應觸名不動觸文如此文者滅盡定出心可通識無邊處見如何答正理論意滅盡定出心不可通識無邊處見正理論餘處八十文偈頌結由自地淨心及下無漏出長行述從滅定出或起有頂淨定心或即能起無所有處無漏滅盡定出心不通識無邊處定顯宗論四十説全亦同之但於正理論識處空處心相應觸名不動觸之文者泛擧出滅盡定之後逆次所起心品也全非謂滅盡定無間所起出心通識無邊處故正理論十二中釋契經不動無處有無相之三觸畢云從滅定起心通有漏無漏滅定起時或逆次第入諸等至或逆超越入諸等至容有如是起滅定心現在前故文今此不動等三觸者出滅盡定之後或逆次第或逆超越入諸等至所起心品云事此文炳然也何況正理論文既云識處空處心相應觸名不動而滅盡定無間不起空無邊處心品之理勿論也准知擧識無邊處亦非滅盡定無間所起心品云事若執此文致其疑者可疑滅盡定出心通空識二無邊處耶乍此出文唯疑識處之言不疑空處之言疑問之趣頗不落居歟加之婆沙論百五十三中解今此出滅定時不動第三觸相云尊者世友作如是説空無邊處識無邊處是不動觸文此文既同正理論説閣此婆沙論文偏就正理論擧疑問事更無其由哉重難云元瑜法師述文記九釋正理論有餘師説識處空處心相應觸名不動觸之文云又釋此師非正宗是異部師許從滅定入空處等故作是釋文案此釋意正理論今文就滅盡定無間所起出心通識無邊處空無邊處釋見如何答不動等三觸者出滅盡定之後逆次逆超所起心品云事不限正理論滅定起時或逆次第入諸等至或逆超越入諸等至等之文勘婆沙論百五十三説釋今此不動等三觸畢云由此理趣餘五有想定應知亦爾謂空無邊處及四靜慮文此文無諍遠論出心見若爾元瑜法師又釋此師非正宗義等之釋恐難依用歟問身證不還聖者約離染得可有十種不同耶答可有十種不同也兩方若有十種不同者以道理思之難有十種不同哉若依之爾者婆沙論中身證不還果聖者約離染時可有十種不同見如何答婆沙論三十四中説身證不還果聖者種類云或應説九謂離染故即非想非非想處具縛及離一品乃至八品染爲九經有説者此應説十謂即前九加離第九無間道時爲彼第十文案此文意身證不還果聖者中非想地具縛者爲一類離非想地一品乃至八品染者各爲一類離非想地第九品染無間道位爲一類故約離染時有十種不同也問婆沙論百五十二中述如是説者義云此滅盡定有十一種文爾者今此十一種中可擧本得不動種姓所起滅盡定耶答擧之也兩方若擧之者披婆沙論文未擧本得不動種姓所起滅盡定若依之爾者既出練根所得不動種姓所起滅盡定何不擧本得不動種姓所起滅盡定哉答見婆沙論文云如是説者此滅盡定有十一種謂具縛者所起離上上品者所起乃至離下下品者所起時解脱阿羅漢練根得不動者所起文案此文意離下下品者所起之中無學位退法種姓幷思法等四種姓本得練根得二類及第六種姓本得之類皆可有故不擧本得不動種姓所起滅盡定云難不可來也重難云婆沙論文猶似難思具縛者乃至離下中品者所起之中不開本得練根得二類滅盡定者離下下品者所起之中同可合論之何別擧時解脱阿羅漢練根得不動者所起滅盡定哉是一次第六種姓之中本得之外別擧練根得者所起滅盡定者約思法等四種姓本得之外別可出練根得者所起滅盡定有何由思法等四種姓合論之第六種姓別開之哉答有學位二道所得一道所得第六種姓人勝劣不等故具縛幷離前八品者所起滅盡定合論本得練根得二類無學位二道所得一道所得第六種姓人勝劣遙異故離下下品者所起滅盡定別開本得練根得二類也准光法師餘處二十五又於無學二聖所成學乃一凡不可爲例之釋可思之次思法等四種姓是鈍種姓或進趣勝種姓或退住劣種姓或進或退種姓未定故不及別開本得練根得二類第六種姓是利種姓不進不退種姓決定故本得之外別擧時解脱阿羅漢練根得不動者所起滅盡定也愚推云勘婆沙論一段之文約離染不同出滅定種類故或有四種此有二説或有九種或有十種云多有説義有之評家意此外加時解脱阿羅漢縛根得不動之別一類云有十一種也一段施設無別委曲歟若就六種姓等分別之者可有多義門今非其門故強不可劬勞歟問有學位所得滅盡定倶解脱聖者所得滅盡定其體可同耶答其體可別也兩方若其體同者有學無學其位既異所得滅定其體豈同哉是以有學無學位所得無漏道等其體各別也相例可同若依之爾者初盡智位得倶解脱稱之類可有見爰知有學位所得滅盡定倶解脱聖者所得滅盡定其體可同云事如何答婆沙論正義家意有學位所得滅盡定倶解脱聖者所得滅盡定其體各別可云也故婆沙論百五十二中上述如是説者此滅盡定有十一種謂具縛者所起離上上品者所起乃至離下下品者所起時解脱阿羅漢練根得不動者所起畢下云有説此十一種其體各異隨位所起種類別故文但於初盡智位得倶解脱稱之類可有見云難者身證不還果聖者初盡智位證無學果之後未起滅盡定之前由有學位所得滅盡定力得倶解脱稱故指有學位所得滅盡定即名倶解脱聖者所得之義邊不可遮之今就有學位所得滅盡定倶解脱聖者初所得滅盡定論之者其體各別云事頗勿論也問離非想非非想處一品染者於具縛者所起滅盡定可有得亦在身義耶答不可有此義也兩方若有此義者婆沙論中不可有此義見若依之爾者離非想非非想處一品染者成就具縛者所起滅盡定何無得亦在身義哉答此依身所現起之功徳云得亦在身也而離非想非非想處一品染者唯起一品斷所屬滅盡定故以之名得亦在身於具縛者所起滅盡定者雖成就之不現起故被云得而不在身全無得亦在身義也故婆沙論百五十二云有具縛時起滅盡定即彼進斷一品染時復起滅盡定彼於爾者先所起者得而不在身成就不現前今所起者得亦亦在身成就亦現前即彼乃至從時解脱練根得不動彼於爾時前諸位中所起滅盡定得而不在身成就不現前今不動位所起滅定得亦在身成就亦現前由此應知體類各別文但於成就具縛者所起滅盡定何無得亦在身義哉云難者雖成就不現起之功徳名得而不在身故以唯成就義許可有得亦在身義云疑恐似不辨一論廢立歟問聲聞種姓無學聖者所起滅盡定可有九品不同耶答可有九品不同也兩方若有九品不同者披今論餘處二十五文述七聲聞二佛差別由九根於聲聞種姓無學聖者唯限七類彼所起滅盡定何可有九品不同哉若依之爾者婆沙論中聲聞種姓無學聖者所起滅盡定可有九品不同見如何答聲聞種姓無學聖者中有種種差別故分別其品類非一品也若就麁相論之者可有六種姓如云阿羅漢有六謂退至不動若第六種姓中分練根得非練根得兩種者可有七聲聞如云七聲聞二佛差別由九根若委細分別之者前五種姓爲前五類第六種姓中可分四類所謂至無學位練根作第六種姓之者有學位練根作第六種姓後證無學位果之者從異生位作第六種姓後證無學果之者幷波羅蜜多聲聞也以此四類如次中上上下上中上上之四類可有九根不同故於彼所起滅盡定可有九品不同也故婆沙論百五十二中明滅盡定有多差別云無學位中退法種姓所起爲下下乃至始得不動種姓所起爲上下餘本得不動種姓起爲上中波羅蜜多聞聲所起爲上上文重難云婆沙論文云始得不動種姓所起爲上下是可至無學位練根作第六種姓之類何云有學位練根作第六種姓後證無學果之者哉答始得本得之名隨相對可不定對從異生位作第六種姓後證無學果之類以有學位練根作第六種姓後證無學果之者云始得不動種姓有何所背哉問起滅盡定時必伏非想非非想處煩惱歟答必伏非想非非想處煩惱也兩方若必伏非想非非想處煩惱者具縛幷一品斷等位所起滅盡定其體既異不可必伏未斷煩惱是以婆沙論百五十四中出退阿羅漢果非滅定句云及先學位起滅定已得阿羅漢果起上位結退文若起滅盡定時必伏非想非非想處煩惱者起上位結退阿羅漢果位何不退滅盡定哉若依之爾者披正理論餘處文起滅盡定時必可伏非想非非想處煩惱見如何答起滅盡定時必可伏非想非非想處煩惱也故見正理論餘處八十文云謂有頂貪若斷未斷要應總伏方入此定故雖自地而名超越文但於具縛幷一品斷等位所起滅盡定其體既異不可必伏未斷煩惱云離者雖具縛幷一品斷等位所起滅盡定其體各別滅盡定是殊勝功徳故必伏非想非非想處煩惱之後可起之也次於婆沙論起上位結退之文者就正斷惑論之者有學位起滅盡定人得阿羅漢果之後起下位結退果兼退滅盡定起上位結退果不退滅盡定故出退阿羅漢果不退滅盡定之句擧起上位結退之類也起已伏煩惱異實退故總伏非想非非想處煩惱雖入滅盡定起此已伏煩惱之時不退滅盡定也重意云諸聖者有聖道之助故起已伏煩惱之時不退已伏位所起功徳也例如伏欲界煩惱雖得未至定聖者重生欲界起已伏煩惱位不捨未至定也婆沙論第百二十一卷中有可潤色事可見之問光法師釋起無想定處引婆沙論三師説爾者今論意可同第二師説耶進云光法師判於三説中後二無違同第二師説釋見付之披婆沙論説尋第二師義不許第四靜慮起無想定而勘今論餘處八文釋七識住中不取第四靜慮云第四靜慮心恒求出謂諸異生求入無想第四靜慮起無想定見若爾今論意既與第二師説異何釋於三説中後二無違哉答婆沙論百五十二中明起無想定處擧三師異説云有作是説唯欲界起欲界心猛有説力故有餘師説通欲界三靜慮起由念曾修加行勢力亦能現起除無想天勿果與因極相通故彼沒定當生欲界故文而見今論文偈頌結二定依欲色長行述言二定者謂無想定及滅盡定此二倶依欲色二界而得現起依欲色二界起無想定云故婆沙論三師説中與於欲界下三靜慮起云第二師説於欲界四靜慮起云第三師説無違釋尤順倶舍婆沙兩論説也但於今論餘處謂諸異生求入無想之文者光法師釋此文云求入無想謂求入無想天或求入無想定文同第二師説之方可云求入無想天同第三師説之方可云求入無想定也解釋自本存二邊更不可違第二師説歟演祕六云准有宗義順正理論第十二設通欲色起色界之中而有兩釋一云唯下三靜慮非在第四勿因與果極相隣通有説亦在第四靜慮除無想天已生彼天受彼果故倶舍論同婆沙一百五十二有三説別有説唯欲人心猛利有説力故後之二説同順正理色界二義雜心論説同婆沙論初師所明文私云案此釋意引正理論二説畢云倶舍論同引婆沙論三説畢述後之二説同順正理色界二義爰知倶舍論意同婆沙論後二師説云事若爾與光法師於三説中後二無違前説非正如下別破之釋其意是同歟隨管見之所及染筆於龜首之春水迴微功之所積懸志於鶏足之朝雲願任多年慇懃之本望必預三會聽法之巨益耳文永二年乙丑二月二十三日申時於海住山十輪院記記之法印宗性問雜心論意依身在色界可起無想定耶答此事雖難測且不起無想定可云也兩方若起無想定者雜心論中明起無想定云從欲界起非餘此根利故文如此文者依身在色界不起無想定見若依之爾者披發智論十九文出色有有想天非五行句云謂色界有想天住不同分心及住無想滅盡定文倶舍正理十二顯宗論七中同引此文爲依色界身起二無心定之證據若雜心論意依身在色界不起無想定云者豈不背發智論今文哉加之勘泰法師解釋云若依上座部身在色界不得修無想定文雜心論意寧朋上座部義哉答雜心論意存依身在色界不起無想定歟彼論從欲界起非此根利故之文此旨分明故也依之撲揚大師演祕六引婆沙論三師説畢云雜心論説同婆沙論初師所明文而婆沙論初師意云有作是説唯欲界起欲界心猛有説力故不許依身在色界起無想定故雜心論意同存此義云事撲揚定判亦炳然也但於發智論文者雜心論專以阿毘曇心論爲依憑故背發智論説強非所痛歟次於泰法師釋者雖釋上座部意依身在色界不起無想定不云有部之中都無此義何爲相違哉婆沙論初師既云唯欲界起明知有部之中有此別師云事何況光法師判若有自部諸師不許亦依色界起無想定便違發智論所説元瑜法師解正理論文述唯第三説不通色界亦是自部異部有違教過依身在色界不起無想定者有別之中別師説見若非有部之中別師者背發智論文不可爲違教過故也泰法師釋不足爲疑者歟問依身在色界起滅盡定者唯限信解類歟答不限信解類也兩方若唯限信解類者設雖見至人何無此義哉若依之爾者滅定人中者今論定判也見至人寧生色界起滅盡定哉答依身在色界起滅盡定者可通信解見至二類也所謂信解人於人中初起滅盡定畢退起色界惑之後修練根作見至之類生色界可起滅盡定故依身在色界起滅盡定者可通見至類也問論文云尊者世友問論中説文爾者世友者四種薩婆多中世友歟進云光法師釋云經部異師尊者世友所造問論中説文付之既云尊者定可四種薩婆多中世友是以論次下文云尊者妙音説此非理是四種薩婆多中妙音也上所擧尊者世友何云經部世友哉何況披業成就論文云若毘婆沙五百羅漢和合衆中婆修蜜多大徳説言若何等人滅定無心彼得此過我滅三昧是有心故文此文無諍今此婆修蜜多者四種薩婆多中世友見如何答論中答今二定中心久時斷如何於後心復得生之問述尊者世友問論中説若執滅定全無有心可有此過我説滅定猶有細心故無此失尊者世友所造問論意滅定中有細心故心久時斷後心得生無有其過爲言而見婆沙論百五十二文云由此尊者世友説言云何滅盡定謂已離無所有處染止息想作意爲先心心所法滅是名滅盡定四種薩婆多中世友意滅盡定中全滅心心所法無微細心定爰知滅盡定中猶有細心云世友者是經部世友非四種薩婆多中世友云事是以光法師釋此文云經部異師尊者世友所造問論中説乃至印度國名世友者非一此是非婆沙會中世友文寶法師釋此文云叙異計通難也文若四種薩婆多中世友者寧云叙異計哉加之慈恩大師釋云倶舍云尊者世友問論中説此即經部異師文諸師一同之所判定依遍覺三藏之相承歟但於既云尊者世友定可四種薩婆多中世友云難者設雖經部世友其徳尊高者立尊者名有何相違哉次於論次下尊者妙音説此非理之文者擧四種薩婆多中妙音義破經部所造論説立破次第無所背也次於業成就論若毘婆沙五百羅漢等之文者業成就論者是遍覺三藏所譯成業論同本異譯也勘彼成業論文云如尊者世友所造問論中言若執滅定今無有心可有此過我説滅定猶有細心故無此失全無若毘婆沙五百羅漢等之言推之業成就論中譯者自謂婆沙會中世友加此言歟問經部宗意善心現起位受想可倶起耶答可倶起也兩方若倶起者見光法師解釋云識想受三唯無記性思心已去方始通三文明知善心現起位受想不倶起云事若依之爾者設雖經部宗意何不許大地法心所哉若許之者善心現起位受想可倶起也如何答光法師餘處二十解釋中述經部宗義云受想思實有心所法思上假立實無文既許受想思其體實有大地法攝善心現起位受想必可倶起也但於光法師識想受三唯無起性之釋者解正理論十三譬喩論者作如是言滅盡定中唯識受想以定無有無心有情之文作今釋故此明經部本師譬喩論者計非叙二十部中經部宗義也而譬喩論者意立唯心無所之義心王之外不許心所別體故不及論善心現起位受想倶起相無記心王之上立識想受三名三性心王之上立思名爲言若爾此師意善心現起位不立識想受名可云也故光法師釋云彼宗所執唯一心王隨用差別立種種名無別心所但心緣境第一刹那初了名識第二刹那取像名想第三刹那領納名受第四已去造作名思諸餘心所皆思差別文重意云譬喩論者如來滅後一百年中出世量部宗如來滅後四百年中出世出世時代遥隔所立宗義亦異故慈恩大師釋云日出論者即經部本師佛去世後一百年中北天竺刄翅羅國有鳩摩邏多此言童首造九百論亦名譬喩師或爲此師造喩鬘論集諸奇事名譬喩師經部之種族經部以此所説爲宗當時猶未有經部四百年中方出世故文任此釋譬喩諸論者與經部宗各別云事炳然也何依光法師今釋混疑經部宗義哉或一義云經部宗意善心現起位受想必可倶起也但於光法師識想受三唯無記性之釋者約受想可有行前未不同唯無記性者云行受想也行未受想可通三性故與善心可倶起也問論主意可存命根實有義耶答不存命根實有之義也兩方若存命根實有義者光法師釋既爾此壽應業能持隨業所引相續轉故之論文云論主意朋經部故今轉計前後相違文論主意朋經部者何可存命根實有之義哉若依之爾者披今論文云有別實物能持煗識名爲壽體是説爲善文光法師釋此文云論主印取説一切有部文任此等定判論主意存命根實有之義見如何答論主意朋經部謂三界業所引同分住時勢分説爲壽體之説存命根假立之義也此旨不限光法師當卷論主意朋經部故今轉計前後相違之釋論疏餘三卷中處處同述此趣所謂勘今論餘處三文或叙經部説云應如是説彼阿羅漢由此自在三摩地力轉去曾得宿業所生諸根大種住時勢分引取未曾定力所起諸根大種住時勢分故此命根非是異熟所餘一切皆是異熟文光法師釋此文云論主意朋經部故言應如是説文或八難有部義云是則還同心相續難或心心所唯互相依文光法師釋此文云如是所難方便欲明同分命根非實有體文或擧經部義云故經部師説無色界心等相續無別有依文光法師釋此文云引説同已文准此等論疏之釋論主意朋經部命根假立之義云事甚分明也加之正理論餘處二十一中引今論是則還同心相續難或心心所唯互相依之文畢云經主定於阿毘達磨無所承禀謬述此言或由自心増厭對法矯作是説或亂正宗誰有妙通文以正理難思論主意朋經部義之旨亦炳然也但於今論有別實物能持煗識等之文者論主意實雖朋經部命根假立之義結歸本宗故云爾也光法師論主印取説一切有部之釋即顯此意也重難云寶法師引正理論於此但應徵經主意若處無業所引異熟内五色處於彼或時無業所引第六意識處謂於長時起染汚識或善有漏及無漏識相續位中無業所引異熟勢分説何爲壽等之文畢云准上論文正理破經部義論主既下不存經部之義不勞更釋故下文云別有實物是説爲善有人雖作倶舍師釋未爲當理文此釋無諍論主意不朋經部宗存命根實有之義見如何答寶法師今釋實難會通之此疑之爲難義只起自此釋依之學者之中寶法師意異光法師釋論主意存命根實有之義得意之人有之此義叶今釋尤雖似可然廣勘今論處處之文朋經部義存命根假立之旨見故寶法師解釋且顯結歸本宗之義可會通歟問光法師釋今論謂三界業所引同分等文引正理論由業所引六處幷依等文爾者相違二説歟答非相違二説也兩方若相違二説者光法師解兩論今文非相違二説釋見若依之爾者今論云謂三界業所引同分住時勢分説爲壽體於同分上假立命根正理論十三述由業所引六處幷依住時勢分相續決定隨應住時爾所時住故此勢分説爲壽體六處及扶根上假立命根若爾其義既異何非相違二説哉是以撲揚大師演祕二判經部命根而有兩説一正理説依六處立二倶舍説依衆同分相違二説之旨此釋炳然也如何答倶舍正理兩論之文同朋經部命根假立之相定知非相違二説云事但於兩論所載其義既異云難者光法師會其相違云同分無體還依六處及依上立此論據假依假正理據假依實故不相違文但於撲揚大師命根爲有兩説之釋者就兩論現文作一相解釋歟問依身在欲界入滅盡定人過七晝夜後出定時必命終歟答必可命終也兩方若必命終者披光法師解釋云如人應受百年命根至年五十入彼二定設經五十年方始出定不食段食還更受餘五十年命文爰知依身在欲界入滅盡定人過七晝夜後出定時不必命終云事若依之爾者婆沙論中依身在欲界入滅盡定人過七晝夜後出定時必可命終見如何答依身在欲界入滅盡定人過七晝夜後出定時段食盡故必可命終也故見婆沙論百五十三文云欲界有情諸根大種由段食住若久在定即在定時身雖無損後出定時身便散壞故住此定但應少時極久不得過七晝夜段食盡故引曾有苾芻入滅盡定或經三月或經半月後出定時即便命終二箇往時畢結釋云由此故知生於欲界若久在定即在定時身雖無損後出定時身便散壞故住此定但應少時極久不得過七晝夜文此文意云生欲界入滅盡定人過七晝夜後出定時段食勢力盡即可命終故住滅盡定極久不得過七晝夜必當出定爲言但於光法師如人應受百年命根等之釋者依身在欲界入滅盡定人不過七晝夜之前出定之時由滅盡定力入定之間不損命根故出定之後還更應彼所殘餘命根故爲顯此義假令指年數如人應受百年命根至年五十入滅盡定力入定之間不損命根故還更應受所殘餘五十年命根云也非謂實有生欲界人五十年間入滅盡定出入定之後受所殘餘五十年命根之類歟重難云依身在欲界住滅盡定間不過七晝夜必當出定者何有住滅盡定或經三月或經半月後出定時即便命終之類哉答如彼或誓行捷穉時出滅盡定或經三月後初打捷穉或誓大雨止時出滅盡定經半月後其雨方止立別誓願之人中不圖可有過七畫夜後出滅盡定段食盡故即便命終之類也故婆沙論百五十三云曾聞於一僧伽藍中有一苾芻得滅盡定食時將至著衣持鉢詣食堂中是日打捷穉少晩彼苾芻以精勤故便作是念我何爲空過此時不修於善遂不觀後際即立誓願入於滅定乃至打捷穉當出時僧伽藍有難事起諸苾芻等散往他處經於三月難事方解苾芻還集僧伽藍中纔打捷穉彼苾芻從定而出即便命終復有一苾芻得滅盡定而常乞食於日初分著衣持鉢方欲詣村遇天大雨恐壞衣色少時停住即作是念我何爲空過此時不修於善遂不觀後際即立誓願入於滅定乃至雨止當出有説爾時雨經半月有説一月其雨方止彼從定出即便命終文不立如此別誓之人住滅盡定不過七晝夜之前必當出定也故婆沙論百五十三問答云問若有苾芻不立誓願入滅盡定云何當出答法爾應出如有心定又彼苾芻或欲飮食或欲便利以彼在定雖不爲損出即致患故由此因應出定文問論中解發智論十五隨相續轉一起便住文云彼言何義若所依身可損害故壽隨損害乃至是名第二一起便住文爾者寶法師如何釋之耶進云寶法師釋云論主釋發智論或是發智論自釋文付或是發智論自釋之釋有疑依今此解釋案論文起盡上引發智論隨相續轉一起便住之文畢下問彼言何義答若所依身可損害故壽隨損害是名第一隨相續轉若所依身不可損害如起而住是名第二一起便住文相次第明述論主自義見是以光法師釋此文云論主答泰法師解此文判論主釋何況披發智論説全無若所依身可損害故壽隨損害等之文若爾發智論自釋云事甚似難思如何答推寶法師或是發智論自釋之釋意異初釋云論主釋發智論毘婆沙釋發智論文爲言毘婆沙師釋自部本論文故云發智論自釋也非云發智論中正有此釋故發智論中全無此文云難不可來歟退勘婆沙論文云有説色身名爲相續謂生欲界不住無想滅盡等至壽隨色身相續而轉所以者何若身平和壽則無夭若身損壞壽則中夭文此文既述隨身損壞壽有中夭名爲隨相續轉之旨故准此婆沙論有説義思今論若所依身可損害故壽隨損害是名第一隨相續轉等之文意毘婆沙師説非論主自義被得意也寶法師第二釋意若存此趣歟但於光法師泰法師釋者寶法師論主釋發智論之初釋即同此等釋意也今就第二釋問答之二釋自本其意各別也何違初釋意爲疑哉重難云見今論次下文云迦濕彌羅國毘婆沙師言初顯有障後顯無障由此決定有非時死毘婆沙師釋別出之明知若所依身可損害故壽隨損害等之上文是論主自義非毘婆沙師説云事答勘發智論文云若欲界有情不住無想滅盡等至當言隨相續轉若住無想滅盡等至及色無色界有情當言一起便往遮譬喩者不許非時命終之義顯有宗意有非時命終也故婆沙論百五十一中解此文云問何故作此論答欲止他宗顯己義故謂譬喩者不許有非時命終所以者何如契經説壽終不可救由此故知無非時死爲止彼意顯有非時命終故作斯論文由此義故由此決定有非時死之説故云毘婆沙師言也非謂云爾故若所依身可損害故壽隨損害等之次上文非毘婆沙師釋歟問光法師出倶非害類引婆沙論住最後有補特伽羅所作未辨文爾者住最後有補特伽羅者可通異生聖者耶答可通異生聖者也兩方若通異生聖者者既云住最後有補特伽羅所作未辨所作未辨位唯可限異生也若依之爾者婆沙論文光法師釋更無所簡別何不通異生聖者哉答披婆沙論一段之文述不爲自害亦不他害之類上云最後有菩薩擧菩薩最後生畢下云住最後有補特伽羅所作未辨出二乘中依此身定得無學果之類也故見光法師定判釋今論所載倶非害者畢云此且毘標非皆遍擧出今論不擧之類引婆沙論住最後有補特伽羅所作未辨之文而今中既擧最後身菩薩故明知婆沙論住最後有補特伽羅者非是菩薩唯取二乘云事若爾二乘人中依此身定得無學果之類亦通異生聖者推之婆沙論住最後有補特伽羅所作未辨之文定可通異生聖者也但於所作未辨位唯可限異生也云難者依此身定得無學果之人未得無學果之前凡位聖位倶云所作未辨有何所肖哉此難之趣恐不落居歟尋云以二乘名最後有補特伽羅何處見哉答光法師餘處十一及最後有之論文云謂依此身定得無學名最後有若未證果必無中處文此釋意最後有之言通二乘見也問有宗意住異滅三相同時起作用歟答同時起作用也兩方若同時起作用者住異滅三相其體既別何同時起作用哉是以今論中述有宗義云諸説住等用不同時光法師釋此文判用不同時前後別起加之光法師所引婆沙論三十九中三體雖同時用有前後文任此等定判住異滅三相別時起作用見若依之爾者住異滅三相於現在世同時起用者有宗之所定也如何答有宗意住異滅三相同時起作用也故光法師釋云應知此宗生相未來起用住異滅三於現在世同時起用文但於今論諸説住等用不同時之文者於現在世一刹那頃義分住異滅三相作用故云用不同時更非實有前後品類足論七中説非正滅法云謂除現在現前正滅法諸餘現在於現在世分別正滅法非正滅法即顯此意也婆沙論文會通同之退勘光法師餘所七定判解倶有相應於法滅位方興作用由此二因令倶生果有作用故之論文云住異雖亦同時滅相義當在後故偏言滅文先日記錄此趣只守明師之相承今時披見此釋重散愚昧之不審其兩方疑難此一文被會者歟文永二年乙丑後四月三日酉時於海住山十輪院書添之法印宗性問光法師明有爲四相引婆沙論三十九二師説爾者初師意合生相現在名一刹那歟答合生相現在名一刹那也兩方若合生相現在名一刹那者生相現在二世各別何合二世名一刹那哉若依之爾者光法師引婆沙論初師説云體雖同時用有前後一法生滅作用究竟名一刹那文此文無諍合生相現在名一刹那見如何答案光法師解釋起盡述應知此宗生相未來起用住異滅三於現在世同時起用雖復倶依一法上立所望不同作用各別畢就之問時之極促名一刹那用既別世何名刹那答之引婆沙論二師説一説云體雖同時用有先後一法生滅作用究竟名一刹那者生相未來起用住異滅三相現在起用故實雖二念約作用究竟合生相現在二世名一刹那爲言又一説云或生滅位非一刹那然一刹那具有三體故説三相同一刹那者起生滅作用雖非一刹那一刹那間具有其體故約體説生滅同一刹那爲言故光法師引婆沙論二師説畢云前家約用後家約同時具有三體各據一義然無評家文以第二師説還思初師意合生相現在二世名一刹那之旨炳然也但於生相現在二世各別何合二世名一刹那哉云難者今此一刹那者異一念名一刹那之常廢立約一法生滅作用究竟合生相現在二世名一刹那也問光法師明有爲四相引婆沙論二説畢云又足一解文爾者今此一解意異上二師説歟答不異上二師説也兩方若異上二師説者光法師引婆沙論二師説畢云又足一解云文如文相者釋成上二説意非別義見若依之爾者既置又言尤可別義哉答見光法師釋云又足一解云生用起時名一刹那現在三相用復名一刹那此約用起時促解也文此釋意云上所引婆沙論第二師意雖述然一刹那具有三體故説三相同一刹那未顯一刹那之分齊是不足也故今明一刹那之分齊足其不足更非別一解也重意云既云生用起時名一刹那現在三相用時復名一刹那成生相與現在三相各別刹那之旨豈爲釋一刹那頃具有生住異滅四相故之別一解哉爰知非前二師説之外別解云事但於又言者雖非別一解釋繼上義意故置又言有何所背哉已上相承趣也愚推云問今論意二無心定入心起等無間緣取果用可通過去耶答可通過去也兩方若通過去者今論中無説二無心定入心起等無間緣取果用通過去知唯限現在云事何況若於過去起取果用者豈不招三世雜亂過哉若依之爾者光法師餘處解釋中今論意二無心定入心起等無間緣取果用通過去見如何答勘光法師餘處七解釋引正理論十九謂入定心居現在位頓取諸定及出心果亦與最初刹那定果滅入過去隨後諸定及出定心一一生時與果非取先已取故之文幷婆沙論百九十四評曰彼不應作是説所以者何無有等無間緣異時取果異時與果若此時取果即此時與果故之説畢云今倶舍論意同婆沙評家不同正理文任此定判今論意二無心定入心起等無間緣取果用通過去可云也但於今論中無説二無心定入心起等無間緣取果用通過去云難者實以難思然而且存一義云光法師釋之習今論無分明説之時同婆沙論評家義釋也何況光法師餘處七解釋中述婆沙論意等無間緣取果用通過去之道理云若婆沙意過去既得起與果用何故不得起取果用文而今論餘處七文云二因於正生餘二緣相違而興於作用於過去起與果用無所痛名爲作用正理論二十意異之或云非過去時可有作用此言作用意顯功能或述由不共故自果生時作用雖無而於自果與功能上立作用名假不許於過去起作用故知今論意於過去可起取果用被得意也故光法師餘處釋今論意同婆沙論評家漸取漸與之義非無其由歟但於過去起取果用者豈不招三世雜亂過哉云難者光法師餘處會此疑云初取果者過去亦起文重難云披今論餘處七文云二定但由三餘由二緣生無想異熟非等無間緣生見若爾入無想異熟心與出無想異熟心於過去初可起等無間緣取果用若爾初取果者立現在世之會通難成哉答二無心定入心與初刹那所入定於現在必起等無間緣取果用故就之云初取果者立現在世也但無想異熟非等無間緣生云事輒難定之設雖非等無間緣生入無想異熟心於現在必可起因緣等取果用故等無間緣取果用於過去雖初起之更不可有三世雜亂過故寶法師餘處七釋云取果名現在者據因緣等説不據等無間緣等文問論中引有頌云方獸地光言金剛眼天水等文顯何事耶答於方獸地光言金剛眼天水九種義智者立一瞿聲云此文意也付之九種義既別何立一瞿聲哉答論中所引方獸地光言金剛眼天水於斯九種義智者立瞿聲之頌文實以難思然而且推之九種義雖異名義相應故立一瞿聲歟故至相寺大師釋三十要問答下云若名與義相應名既不定義亦應爾西方有以一瞿名目於九義謂言方地光牛金剛眼天水以一瞿名目此九義名與義定相應者天因之時地應隨名與天相應餘亦如是文准此釋可思之問光法師引今論餘處法無礙解通依五地云文作二解釋爾者初釋意名等隨語繋隨身繋中如何釋之耶進云光法師初釋意隨語繋判也付之定法無礙解依地可隨所緣名等繋地若名等隨語繋者法無礙解何可依五地哉是以披今論餘處二十七文云法無礙解通依五地謂欲界四靜慮以於上地無名等故文泰法師釋此文云以於無色上地無名等故文思此等釋意名等隨身繋通有欲界及四靜慮故法無礙解通依五地見何況次下論文云詞無礙解唯依二地謂欲界初靜慮以於上地無尋伺故隨所緣言詞繋地定能緣詞無礙解依地准例法無礙解其義可同加之光法師餘處二十七解釋中引婆沙論法無礙解在二地在五地在七地云三師説畢云初説據名隨語繋故説法無礙解但依二地後二説據名隨身繋説法無礙解通依上地文若爾法無礙解通依五地者名等隨語繋義云初釋意非只背今論説亦相違自定判哉答光法師初釋意能緣法無礙解雖通五地所緣名等隨能發語欲界初靜慮二地所繋爲言據能緣心通於五地理實名等隨語二地之釋即述此意也次於今論餘處以於上地無名等故之文者明法無礙解通依欲界及四靜慮五地無色上地無有名等不能別緣下地名等故法無礙解不依四無無色地云也故光法師釋此文云以於上地無名等故彼不別緣下名等故文非許上三靜慮有名等何可定名等隨身繋義哉泰法師釋會通同之次於詞無礙解例難者緣言詞雖要緣自地言詞爲本故隨所緣言詞繋地定能緣詞無礙解依地也以緣言詞難故要自地心緣之釋其意在之緣名等自緣言詞易故法無礙解依自地無名等上三靜慮別緣下地名等也次於光法師餘處據名隨身繋訖法無礙解通依上地之釋者述當卷第二釋意也既爲各別解釋更不可及會通歟重難云名等言詞是倶起和合法也何約所緣分難易於依他論通局哉何況正理論餘處七十六中釋詞無礙解唯依二地云謂此意言尋詞二法能發語故相不寂靜自性麁動上無此故寂靜微細詞無礙解緣外言詞亦不寂靜兼動類攝是故此解上地中無初靜慮中亦有尋伺故於定内亦有此解由此極成但依二地文如此文者詞無礙解唯依二地全不由緣言詞難故見如何答名等有詮表故緣易言詞無詮表故緣結難也故婆沙論百八十中明四無礙解緣三世相云法辨二無礙解緣三世詞無礙解過去緣過去現在緣現在未來生者緣未來不生者緣三世文思此文意法無礙解緣名等易故通緣三世詞無礙言詞難故唯緣自世云也法詞二無礙解所緣難易以之可知次於正理論文者詞無礙解緣外言不寂靜難故唯依欲界及初靜慮二地爲言非云緣言詞易者有何所背哉問光法師意詞無礙解唯緣自地言詞歟答可緣自下地言詞也進云光法師釋云以緣言詞難故要自地心緣文付之依光法師釋見婆沙論百六十九文緣自地及下地等至中擧詞無礙解所依若爾光法師今解釋豈不違婆沙論所説哉答初靜慮詞無礙解通緣欲界及初靜慮言詞故詞無礙解可緣自地及下地言詞也故婆沙論云七等至緣自地及下地謂法詞二無礙解五通所依文但於光法師以緣言詞難故要自地心緣之釋者緣言詞難要緣自地言詞爲本故有言詞地爲詞無礙解依地第二靜慮以上自地無言詞故詞無礙解不緣彼地爲言光法師餘處二十七解詞無礙解唯依二地謂欲界初靜慮以上地無尋詞故之論文云詞無礙解唯依二地謂依欲界初本靜慮以於上地無尋詞故定無言詞以緣詞難唯自地故其意亦同之同有言詞地中緣自地言詞爲本兼緣下地言詞之義邊更非所遮故光法師全釋不背婆沙論説也問光法師引今論餘處二十七法無礙解通依五地云文作二解釋爾者第二釋意名等隨語繋隨身繋中如何釋之耶進云光法師釋云又解下文言法無礙解通五地者此是隨身繋家文付之法無礙者名無退智緣能詮名等設雖名等隨語繋法無礙解何不依五地哉何況見婆沙論文緣自地及下地等至中擧法無礙解所依若法無礙解緣自下地者寧不云名等隨語繋哉依之寶法師意存法無礙解雖通五地所緣名等隨語繋義如何答光法師第二釋意緣名等難要緣自地名等爲本故隨所緣名等繋地定能緣法無礙解依地也光法師餘處解釋中指婆沙論百八十法無礙解通在五地在七地云二師説云後二説據名隨身繋説法無礙解通依上地以依法難要依自地智緣自地法即述此意釋但於婆沙論緣自地及下地等至中擧法無礙解所依之文者緣名等難故雖要緣自地名等爲本兼緣下地名等故法無礙解所依緣自地及下地云文全非相違也次於寶法師釋者別異釋也不足爲疑歟重難云勘婆沙論文問上三靜慮爲有名不答之云有説無有説有而不可説評曰彼不應作是説寧説無不應説有而不可説以無用故文婆沙論評家意既不許上三靜慮有名等之義何云法無礙解依上三靜慮緣自地名等哉答婆沙論今文名等隨語繋云師義中有説意上三靜慮有名等云故評家破而不許也名等隨身繋云師意上三靜慮有名等勿論也評家更不可破之而光法師第二釋意今論下文法無礙解通依五地者名等隨身繋義判故云法無礙解依上三靜慮緣自地名等不可違婆沙論評家意也問法無礙解唯緣無覆無記法歟答唯緣無覆無記法也兩方若唯緣無覆無記法者法無礙解所緣可廣何唯限無覆無記法哉是以見識身足論十一文欲色界繋縱所斷心唯緣無覆無記法之類中不擧法無礙解相應心若法無礙解唯緣無覆無記法者何不擧之哉若依之爾者法無礙解緣名等明知唯緣無覆無記法云事如何答見今論文餘處二十七云謂無退智緣能詮法名句文身立爲第一法無礙解唯緣名等定當卷述又名身等唯是等流又唯無覆無記性攝名等唯限無覆無記故法無礙解唯緣無覆無記法云事炳然也但於識身足論文者不擧盡也舌身三識身及無相無相三摩地相應心一類唯緣無覆無記法故擧之四無礙解中法無礙解雖唯緣無覆無記法餘三無礙解非唯緣無覆無記法故總見四無礙解一類有此相濫故唯緣無覆無記法之類中且不擧之歟如彼通果無記心中變化心及發業心雖唯緣無覆無記法天眼天耳二通非唯緣無覆無記法故總見通果無記心一類有此相濫故准緣無覆無記法之類中不擧變化心及發業通果心也重難云勘光法師餘處十三解釋述身語表業隨心地繋非隨身地繋云論主評取前家隨心地繋心是親強身是疎弱故諸色業隨心判性若諸色業隨身地繋此色業性應亦隨身身謂命根衆同分等體是無記色業皆應隨身是無記性不通善染便成大過由此故知隨心地繋前説爲善文思此釋意隨彼定繋地者可隨彼判性類見若爾名等隨語繋義爲正云釋意可隨能發語判名等性類而能發語既通善等三性所發名等何唯限無覆無記哉若雖隨能發語定名等繋地不隨能發語判名等性類者此諸色業皆應隨身是無記性不通善染之能破難成爰知名等隨語繋義爲正云釋意隨能發語所發名等可通善等三性也如何答名等隨語繋義爲正云釋意語得業稱必由與名倶生有詮表故語業望名極親近故隨能發語定所發名等繋地也故光法師釋云以語親能發名身等故文初釋意由此道理雖名等隨語繋義爲正能發心專欲發業故隨能發心判所發身語二業性類故身語二業通善等三性即語業中隨能發心成虚誑語不虚難語等故通善不善也能發心不欲發名故不隨能發心判名等性類名等只詮表物體許不成善不善性故唯限無覆無記也准今論餘處十三此作者心本欲起業之人但於光法師餘處解釋者能發心望所發身語二業甚親強故隨能發心定所發身語二業繋地判性類也故隨心此諸色業皆應隨身是無記性不通善染之例難爲不正義也問光法師明發業通果心所緣作二解釋爾者初釋意發業通果心可緣名等及心等耶進云光法師釋云解云既得緣名亦緣心等文付之發業通果心者爲發身語二業也唯可緣所發業何緣名等及心等哉是以變化心唯緣所化四境定何況披今論餘處七文云威儀路等三無覆心色香味觸爲所緣境工巧處等亦緣於聲如是三心唯是意識文此文無諍通果心唯緣色等五境不緣名等及心等見如之婆沙論八十七中出通果心所緣云欲界者唯緣欲界修所斷法色界者唯緣欲色界修所斷法文若通果心緣心等者寧不緣見所斷法哉加之光法師餘處解釋中或十九解無覆無記邪智緣大梵名云應知此是四無記中威儀工巧異熟三心但非通唯緣色故或二十釋欲界無覆無記識緣見苦所攝法述謂異熟生威儀路工巧處非通果心唯緣色故若通果心緣名等及心等者豈不違自定判哉答光法師既得緣名亦緣心等之初釋意立道理依證文也所謂語業者由與名倶生方有詮表離名之聲永不得業名故發業通果心緣化人所發語業之時兼緣名等爲言但是第二通果心能緣化人發語名等者即顯此理也見婆沙論百三十九文明生初靜慮成熟欲界意近行有三師説之中第三師云有説彼成就六謂六捨意近行即通果心倶此心容有總別緣故文此文明述通果心別緣色等六境之旨故發業通果心可緣名等爲言法分別行亦容此故者即指此文也既許緣名等故亦可緣化人所發身語二業同時刹那等起心等得意也既緣名亦緣心等之釋其意在之重意云發業通果心所攝因等起緣化人所發未來身語二業之時緣語業倶生名等及身語二業同時刹那等起心等爲言但於變化心例難者變化心不緣非所化境故唯緣所化四境也次於今論餘處威儀路等三無覆心等之文者通果心之爲本所緣所化事及所發業故緣色等五境云也緣所發業之時兼緣名等及心等之義更非所遮次於婆沙論通果心唯緣欲色界修所斷法云文者發業通果心緣心等云釋意因等起心緣所發未來業之時總緣業同時刹那等起心等云故雖許緣心等不緣見所斷心等也次於光法師餘處十九二十兩處唯緣色故之釋者述當處若發業通果心但緣身語二業之第二釋意也重難云婆沙論第三師意通果心通六捨意近行者通果心總緣色等境故通雜緣法捨意近行云也何以此文爲通果心別緣法境之證據哉就中光法師餘處十判於三説中初説爲正第三師説非正義見豈以不正義爲證據作既得緣名亦緣心等之釋哉答婆沙論第三師既許通果心別緣色等五境寧無別緣法境之義哉何況第二釋會意此文云而言通法分別行者據總緣説故名緣法非緣七種法故名緣法文爰知初釋意通果心通法捨意近行者有別緣法境之類得意取其緣法境之邊爲證據也次光法師判於三説中初説爲正以第三師説爲不正義事不許通果心別緣六境之義故也全非降緣法境之邊重意云不許通果心別緣六境云義故以第三師説雖爲不正義通果心緣法境云事自此第三師説得意出以之爲證據作發業通果心緣名等及心等云釋也爲言尋云勘婆沙論十文云善等者謂善不善無記心各與三種心展轉相緣唯除不善異熟以彼唯在五識身故餘無覆無記心有展轉相緣義文發業通果心緣心等云釋意以此文可爲證據耶答以此文不可爲證據唯除不善異熟者五識決定不緣心等故偏除之也以彼唯在五識身故者即述此意也意識之中雖有不緣心等之類多緣心等故不除之歟何可備發業通果心緣心等之證據哉問光法師明發業通果心所緣作二解釋爾者第二釋意發業通果心緣身語二業時兼緣能造大種及倶起香味等歟答兼可緣之也兩方若兼緣之者光法師述第二釋意云若發業通果心但緣身語二業文此釋無諍不緣能造大種及倶起香味等見若依之爾者能造大種及倶起香味等是極相親近法也發業通果心緣身語二業之時尤兼可緣之哉答發業通果心緣身語二業之時兼可緣能造大種及倶起香味等也故光法師餘處引婆沙論若生初靜慮成就欲界一法捨意近行即果心倶總緣色等爲境起故略言引之之文畢云此初師意説縱緣身語業亦兼緣能造觸或緣身業兼緣香味觸緣語業兼緣色香味觸故但名法捨意近行文光法師意以此師説判正爲故設雖第二釋意業通果心緣身語二業之時兼緣能造大種及倶起香味等可云也但於但緣身語二業之但言者初釋云既得緣名亦緣心等故第二釋異之云不解不緣名等若化心但緣四境若發業通果心但緣身語二業不緣倶起名等刹那等起心等但緣身語二業爲言兼緣能造大種及倶起香味等之義邊更非所遮也問光法師解釋中云非緣七種法故名緣法文爾者今此七種法者唯限法處攝歟答不限法處攝也兩方若唯限法處攝者光法師餘處定判中法分別行所緣不限法處攝見若依之爾者披今論餘處文云即此所説受想行蘊及無表色三種無爲如是七法於處門中立爲法處於界門中立爲法界文准此文思之今此七種法者唯可法處攝也如何答光法師發業通果心緣名等云初釋意以婆沙論百三十九第三師通果心通六捨意近行云文爲證據法分別行亦容此故者即顯此意也而若發業通果心但緣身語二業云第二釋意會之云而言通法分別行者據總緣説故名緣法非緣七種法故名緣法者通果心通法捨意近行者總緣色等境故名法捨意近行是雜緣法捨意近行也非緣眼等六處及法處七種法故名法捨意近行爲言故今此七種法者眼等六處及法處攝不限法處許也但於今論餘處如是七法於處門中立爲法處之文者當卷所擧七種法者是不雜緣法捨意近行所緣七種法也法處中有受想行蘊及無表色三種無爲之七種法非今所論不足爲疑歟問光法師釋異熟同分相會倶舍正理兩論相違云正理據五趣四生異熟同分横望以論此論據引一生總衆同分竪望以説文爾者正理論意竪望所説通中生二有一生總衆同分者趣生同分歟答非趣生同分也兩方若趣生同分者趣生同分其相既別以通中生二有一生總衆同分何云趣生同分哉若依之爾者光法師所引正理論十四中述云何異熟謂地獄及卵生等趣生同分一切異熟同分皆趣生同分攝見爰知通中生二有一生總衆同分者趣生同分攝云事如何答竪望所説通中生二有一生總衆同分者非趣同分中有生有趣非趣異故非生同分中有化生生有胎卵濕異故今此總衆同分者非趣生同分也光法師此論據引一生總衆同分竪望以説故通中生二有非是四生中生也之釋即顯此意也但於光法師所引正理論云何異熟謂地獄等等之文者一切異熟同分不過趣生同分故云爾也通中生二有一生總衆同分者是天同分人同分等非趣生同分故正理論説全無相違也問家家聖者三緣中受生緣生同分異熟同分歟答可異熟同分也兩方若異熟同分者光法師所引正理論十四中釋等流同分云學無學等所有同分文以知等流同分云事若依之爾者彼受生緣者名三二生彼上同分何非異熟同分哉答家家聖者三緣中受生緣者名三二生故彼上同分定可異熟同分是以見光法師所引正理論十四文云云何異熟謂地獄等及卵生等趣生同分無所簡別以生同分名異熟同分也但於正理論學無學等所有同分之文者約有學聖者有多類同分異熟因所生趣生同分是異熟同分捨異生同分得有學同分是等流同分故學無學等所有同分名等流同分者就捨異生同分所得同分論之也非遮三二生等上同分是異熟同分有何所背哉寫本云文永二年乙丑後四月十九日申時於海住山十輪院抄之畢去年窮冬下旬之比始此卷抄今歳孟夏閏月之候終其微功前後一百餘日送春迎夏問端七十三條聚文探義不顧愚鈍之性憖記難答之詞爲之今生涯之思出宛之當來世之勝因當山本尊觀音薩埵知見此勤佛法擁護春日權現哀愍此志施冥助於一期終焉之暮成就上生内院之宿願垂引攝於三會説法之曉證得中道唯心之妙理乃至有緣無緣迴向不限自界他界濟度無漏而已右筆華嚴宗末葉法印權大僧都宗性年齡六十四夏﨟五十二天文二年亥已爲八幡宮毎月五日講問出題問以他筆寫之者也五月十一日三論末學英訓五十八
