body:
  text: 倶舍論第十卷抄上問題問寶法師意明無明十二處攝歟問論中釋無明體擧多異説爾者論主正解意如何釋之耶問論主意可存無明實有義耶問論文云如是惡慧應名無明文爾者擧經部師義歟問光法師釋如何不許諸染汚慧間雜善慧令不清淨説爲能染論文云經部救意文爾者經部宗意善慧種子間雜染汚慧名能染義可有耶問論文云有執煩惱皆是無明文爾者論主意可許此義耶問論中引契經説云諸所有見文爾者寶法師意今此見者如何釋之耶問論文云豈不可説爲餘慢等文爾者寶法師意今此等如何釋之耶問名色者唯限五蘊攝歟問光法師引婆沙論非色即是受等四蘊文爾者爲證今論又類似名義引之歟問光法師述現在意識及現在觸望未來法境爲異義作二解釋爾者第二釋意今此果者増上果攝歟問經部宗意六識界可通彼同分耶問論中釋意近行名擧二師説爾者傳説言可互初二説耶問第三靜慮樂受可立意近行耶問論中述第三靜慮樂受不立意近行擧二故爾者第二故如何釋之耶問不雜縁捨法意近行可斷煩惱邪問斷惑加行道位可有憂意近行現前義耶問憂意近行可縁上二界耶問論中明空無邊處近分地意近行擧四意近行一意近行二説爾者光法師意何説爲止耶問異生離第四靜慮染第九解脱道位可修縁第四靜慮心耶問光法師意無覆無記意近行可縁同界上地耶問正理論意依身在下地起上地無覆無記意近行下縁下地境耶問光法師釋意近行起不起相無記意近行通起上下地者通果心文爾者通果心言可攝天眼天耳二通耶問變化心唯縁現在歟問發業通果心唯縁現在歟問光法師意通果無記心唯與捨受相應歟問正理論中明意近行不通無漏擧三師説爾者第二師意如何釋之耶問光法師所引婆沙論中明生初靜慮成就欲界意近行擧三師説爾者成就色聲法三意近行云説正意歟問光法師所引婆沙論中明生初靜慮成就欲界意近行擧三師説爾者第三師意變化心總縁所化境歟問寶法師依今論意生色界成就欲界色聲法三意近行云説可爲正義耶問寶法師意變化心必總縁所化境歟問寶法師意化事發業通果心外可有餘意識通果耶問論中述有説義云唯雜染者是意近行文爾者光法師如何釋其故耶問論中明六恒住法云謂見色已不喜不憂心恒住捨具念正知廣説乃至知法亦爾文爾者心恒住捨者捨受名捨歟問六恒住法爲唯限意識相應念慧爲當通五識相應慧歟問六恒住法以何爲體耶問阿羅漢果聖者初起善眼識現在前位過去現在可成就恒住耶問六恒住法爲唯限有漏爲當通無漏歟問六恒住法可通四無色地耶問六恒住法眼等六根律儀其體可同耶
