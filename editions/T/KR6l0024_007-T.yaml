body:
  text: 倶舍論第二卷抄下問題問寶法師意三性表業倶生香味觸倶等流性攝歟問一刹那法唯限現在苦法忍歟問上品苦法忍現在前位可得修未來不生下品苦法忍耶問論中明得眼不得識句云謂生欲界漸得眼根文光法師釋不擧生盲及漸捨眼人從欲界歿還生欲界故作三解釋爾者初釋意如何釋之耶問論中明得眼不得識句云謂生欲界漸得眼根文光法師釋不擧生盲及漸捨眼人從欲界歿還生欲界故作三解釋爾者第三釋意如何釋之耶問雜心論意天眼天耳二通威儀無記歟問雜心論意變化心外別許發業通果心歟問光法師意二十心相生唯就意識論之歟問光法師意依身在下地可起上地聞惠耶問正理論意依身在下地可起上地聞惠耶問光法師釋生上三靜慮天眼天耳二通不現前位成就不成就彼二通相作三解釋爾者初釋意如何釋之耶問光法師釋生上三靜慮天眼天耳二通不現前位成就不成就彼二通相作三解釋爾者第二釋意如何釋之耶問光法師釋生上三靜慮天眼天耳二通不現前位成就不成就彼二通相作三解釋爾者第三釋意如何釋之耶問寶法師意天眼二耳二通爲自性無記爲當通果無記歟問光法師引婆沙論説明相續内外相爾者可有離質自身歟問論文云我執依止故似説心爲我文光法師釋此文作三解釋爾者第三釋意我執可通無漏心耶問現在心所以別性意根爲所依歟問正理論中明説心爲我我恒於自境自在行故文爾者光法師引此文如何釋之耶問論中明十八界同分彼同分相爾者立同分稱唯限現在歟問光法師意舊倶舍論中罽賓國師名西方師歟問論中明彼同分眼云西方諸師説有五種謂不生法復開爲二一有識屬二無識屬文爾者光法師如何破之耶問論文云迦濕彌羅國毘婆沙師説彼同分眼但有四種文爾者從婆沙會前有此義歟問一有情眼根見五境時望餘有情可名同分耶問光法師釋香味觸共境相作三解釋爾者第二釋意如何釋之耶問異生性唯限無覆無記有何故耶問異生性若見所斷者可有何過耶問論文云前及此色定非見斷文光法師釋此文作二解釋爾者第二釋意今此前者指不染汚法及非六生法歟問見所斷惑中可有別緣色聲等境類耶問尊者法救意眼見識見二義中存何義耶問尊者妙音意耳識相應惠聞聲歟問光法師答此頌何故但破識耶問作四解釋爾者初釋意今論中唯破識見家歟問無覆無記眼識與幾心所相應耶問光法師意不共無明相應惠不名見故如何釋之耶問論文云及諸餘法非見應知文光法師釋此文作二解釋爾者第二釋意以何法爲諸餘法耶問論中釋見義擧決度反明利觀照二義爾者寶法師意對雜心論所説觀視決定堅受深入四義如何相攝之耶問寶法師引諸師異説明眼見識見等相爾者依犢子部意如何釋之耶問論中明識見家義云毘婆沙中亦作是説若眼所得眼識所受説名所見文光法師釋此文作三解釋爾者初釋意眼識所受文如何釋之耶問論主意眼見識見二師中明何義耶問耳根可取離質聲耶問論中明極微相觸不相觸義擧四師異説爾者光法師依婆沙論意有幾師説判耶問論文云若異此者是諸極微應有間隙文光法師釋此文作四解釋爾者初釋意如何釋之耶問論文云若異此者是諸極微應有間隙文光法師釋此文作四解釋爾者第二釋意如何釋之耶問經部宗意意識可緣現在境耶問依身在初靜慮人以第三靜慮天眼可見上地色耶問下地耳根可聞上地聲耶問眼識後起無覆無記分別意識爲唯限異熟生爲當可通威儀心耶問眼識後起分別意識可通第三生已後耶
