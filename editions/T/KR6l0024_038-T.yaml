body:
  text: 倶舍論十一卷抄問題問論文云許此三千大千世界如是安立形量不同文爾者論主可許此義耶問婆沙論中云三輪廣量擧二師異説爾者寶法師意三輪廣量齊等云義爲正義歟問唯此世界南贍部洲有金剛座歟問此洲南邊有贍部林樹歟問光法師所引婆沙論中釋無間地獄名云依異熟果説名無間文爾者無間地獄衆生一一身量各二萬踰繕那歟問光法師所引婆沙論中釋無間地獄名擧三師異説爾者評家意許前二説歟問論中付説捺落迦安立相且八捺落迦爲重累爲當傍布歟問光法師所引婆沙論中述捺落迦安立有三師異説中初有説意上七捺落迦高下量齊等歟問論中付明十六増名且光法師意有幾師説耶問衆生遇琰魔王斷罪中有位歟問寶法師意東洲日沒南洲日中西洲日出同時歟問論中云雨際第二月後九夜漸増寒第四亦然夜減晝翻此文爾者晝夜有増減故如何釋之耶問泰法師意晝夜停等後論晝夜増減云義光法師可許之耶問婆沙論中云復至羯栗底迦月白半第八日晝夜停等文爾者羯栗底迦月者當此方二月歟問頌文云近日自影覆故見月輪缺文爾者光法師意今此文説晝夜増減相歟問頌文云此上有色天住依空宮殿文爾者夜摩天已上無雲天已下諸天可有雲地耶問他化自在天可化聲境耶問論中釋第一樂生相云謂彼安住離生喜樂文爾者今此樂者樂受樂歟問論中釋色究竟天名擧二師説爾者第二師意無色界可有色法耶問非神通力非依他力以欲界身至色界義可有耶問人於梵天見梵天色唯限天眼歟問依身色界人以色界自身可來欲界耶問論中付明空居天依處量且寶法師意有幾師説耶問二禪已上三千界攝歟問欲界天身量次第一一増歟問論中付明諸天身量倍倍増相且無雲天減三踰繕那故光法師如何釋之耶問第四靜慮諸天中福愛天者無雲天異名歟問論文云無間地獄壽一中劫文爾者一増一減爲一中劫歟問論文云無間地獄壽一中劫文爾者一増一減爲一中劫歟問無想天可有中夭耶問北洲傍生定壽千歳歟問光法師意決定於今生可證無學果聲聞縁覺可有中夭耶問光法師釋倶非容中説慈定滅定等不中夭中不説之作三解釋爾者初釋意如何釋之耶問地獄可有中夭耶問造破僧罪墮無間地獄者可有中夭耶問光法師釋倶非容中説慈定滅定等不中夭中不説之作三解釋爾者第三釋意如何釋之耶問光法師解釋中云釋迦牟尼當住劫第一劫出世文爾者禀承實義歟
