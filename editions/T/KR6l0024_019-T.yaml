body:
  text: 倶舍論第六卷抄上問題問光法師能作因得名作依主釋云謂能作是親因文今此親因者指能作因中親因歟爲當以餘五因名親因歟問論主意可許六因耶問頌文云除自餘能作文能作因除自體故光法師如何釋耶問頌文云倶有互爲果文今此互爲果義爲論主始所立爲當有宗古義歟問地大種與地大種可爲倶因耶問婆沙論評家意四大種體増義歟問光法師釋十隨轉中一果不取倶生展轉士用果取同時造作得者文爾者餘同時造作得者倶有因造作歟問正理論中釋十隨轉一果云倶攝士用及離繋果文寶法師意今此士用果者可通有爲士用果耶問心王與心隨轉上隨相可爲倶有因耶問光法師擧八對非倶有因法畢云彼隨相等望本法等横望而言非能同取一果一異熟及一等流故文爾者竪望之時可取一果等耶問寶法師意隨相與本法同取後一果可名同一果耶問初無漏思以業可爲倶有因耶問論中釋無覆無記同類因擧四師説爾者初師意四大意處展轉相望互可爲同類因耶問論中釋無覆無記同類因擧四師説爾者光法師意何義爲正義耶問光法師釋中十位同類因相初釋意此論當婆沙一師義文爾者此論意後位已生法與前位不生法可爲同類因耶問正理論中釋十位同類因相云有餘師言羯剌藍位與能位爲同類因文爾者寶法師對此論如何釋之耶問今論中證前生善根與後相似生未生善根爲同類因義引發智論何文耶問光法師釋無時非因難引婆沙論七説爾者依評家意如何會此難耶問正理論中通無時非因難擧三因作論六因作論二説爾者寶法師意以何説爲正義耶問寶法師釋無時非因難引正理論能爲因後無時非因文爾者可云婆沙論評家義耶問光法師所引婆沙論文解非心爲因法擧二師説爾者初師意非心爲因法者不以心唯爲同類因義歟爲當不以心爲五因義歟問決定當入正性離生初無漏心悉名非心爲因法歟問光法師所引婆沙論文解非心爲因法擧二説爾者初師意辨有𣵀槃法無𣵀槃法二異生義可有耶問光法師所引婆沙論文解非心爲因法擧二師所説爾者第一師意如何釋之耶問婆沙論中解品類足論所説非心爲因法擧二師所説爾者寶法師依第二師説時無𣵀槃法名非心爲因法歟問舊婆沙論中解品類足論非心爲因法擧二師所説爾者第二師意以無𣵀槃法名非心爲因法歟問無色界可有非心爲因法耶問異熟四相與等流同分可爲同類因耶問九上緣惑可爲遍行因耶
