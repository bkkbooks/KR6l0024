body:
  text: 倶舍論第二卷抄上問論文云十八界中色界有見以可示現此彼差別文爾者言説爲能示現體歟答言説爲能示現體也兩方若言説爲能示現體者光法師釋以可示現此彼差別之論文云謂此色界以可示現在此在彼差別不同有能示現此彼言説故名有見文如此釋者色界爲現示現體言説爲所示現體見若依之爾者言説示現在此在彼差別尤可爲能示現體也如何答正理論并婆沙論二處文釋有見義各擧三師異説其中正理論第二師云二者此色可有示現故名有見可示在此在彼別故如有所緣文婆沙論第七十五卷初師尊者世友作如是説能現所現及可示現在此在彼是有見義與此相違是無見義文婆沙論第百二十八卷第二師云或復見者是能顯示色處相麁可相顯示在此在彼相状差別所顯示色有能顯示故名有見如有名等文正理論并婆沙論二處中所擧此師意與今論説旨趣是同即其意云言説能顯示色界在此在彼相状差別故言説爲能示現體色界爲所示現體言説能示現故名見色界有此言説故名有見爲言故光法師釋云婆沙七十五及一百二十八亦有三説皆同正理第二説以言説爲見能示現故文寶法師引正理論三師異説畢云此論但取第二以可示現此彼差別文但於光法師謂此色界以可示現等之釋者惡讀文點爲疑難歟即見彼釋可讀謂此色界以可示現在此在彼差別不同有能示現此彼言説故名有見此即言説名見准餘無見也如此讀文點之時言説能示現故名見之義既顯與以言説爲見能示現故之釋符合也重難云光法師釋有色義引正理論三師異説之中第二師云有説色者謂能示現在此在彼言此有彼言故名有色此文意色界爲能示現體言説爲所示現體見若爾釋有見義第二師説其意不同如何答此亦惡讀文點爲疑難歟即可讀有説色者謂能示現在此彼言此有彼言故名有色也如此讀文點之時正理論中釋有見有色義第二師説其意是同言説爲能示現體色界爲所示現體之旨分明也問光法師釋有見義引正理論三師異説爾者第二師意以何法名見耶進云光法師釋云以言説爲見文付之見今論并正理論等文明十八界中是見非見門以觀照推度二義名見而言説無此二義何可名見哉答正理論文釋有見義擧三師異説其中第二師云此色可有示現故名有見可示在此在彼別故如有所緣文此師意云言説能顯示色界在此在彼相状差別故能示現故言説名見色界有此言説故名有見爲言故光法師引正理論三師異説畢云第二説以言説爲見能示現故文但於今論并正理論等文以觀照推度二義名見云難者彼以眼根及身見等五染汚見世間有學無學正見名見意也若廣論見義者能示現義順見義故言説名見有何相違哉如彼正理婆沙兩論第三師意以影像名見亦無觀照推度二義也問論中答境界所緣復有何別問云若於彼法此有功能等文光法師釋此文作三解釋爾者初釋意如何釋之耶進云光法師釋云若境界有對據礙取境用若所緣有對據礙取果用文付之論文雖述若於彼法此有功能即説彼爲此法境界未云礙取境用名境界有對何釋若境界有對據礙取境用哉何況彼同分眼無起取境用更不可名境界有對次礙取果用名所緣有對者一切有爲法皆起取果用所緣有對亦不可限心心所哉答見今論文答境界所緣復有何別問云若於彼法此有功能即説彼爲此法境界心心所法執彼而起彼於心等名爲所緣文光法師釋此文作三解釋之中初釋云境界有對若於彼色等境此眼耳等有見聞等取境功能即説彼色等爲此眼等境功能所託名爲境界如人於彼有勝功能便説彼爲我之境界此約有能非要起用故彼同分仍名有對所緣有對謂心心所其性羸劣非境不生猶如羸人非杖不起執所緣境方起至現現謂起彼取果用故彼所緣於心等名爲所緣此約有緣其用得起無緣不起皆名有對非必起者故未來心等亦名有對若境界有對據礙取境用若所緣有對據礙取果用如彼同分眼雖不對境取果之用任運得生然彼眼等非所緣有對故知礙取境用名境界有對礙取果用名所緣有對文此釋意境界有對者若於彼色聲香等境此眼耳等根有見聞等取境功能即説彼色等爲此眼等境其功能所託名爲境界有對此約有功能非要起用故彼同分眼仍名境界有對論文明境界有對云此有功能即此意也所緣有對者謂心心所法其性羸劣不託境無起必執所緣境界現前位起取果用故此心心所法託所緣境起取果用名爲所縁有對論文述所縁有對云執彼而起即此意也此釋大綱其意在之但若境界有對據礙取境用若所縁有對據礙取果用者意云眼等根起同類因等取果用不必對境界故據礙取果用不名境界有對對境界時必起取境用故據礙取境用名爲境界有對心心所法託所縁境方現前位必起取果用故據礙取果用名爲所縁有對爲言如彼同分眼雖不對境取果之用任運得生者意云彼同分眼雖不對境取果用任運起故據礙取果用不名境界有對爲言然彼眼等非所縁有對者意云彼同分眼不對境起取果用非所緣有對故心心所法對境起取果用名爲所緣有對爲言故知礙取境用名境界有對礙取果用名所緣有對者結釋二種有對差異也若如此料簡一段解釋之時彼同分眼不可名境界有對云難并所緣有對不可限心心所法云疑自被會通了問論中答境界所緣復有何別問云若於彼法此有功能等文光法師釋此文作三解釋爾者第二釋意如何釋之耶進云光法師釋云又解礙體義邊名所緣有對礙用義邊名境界有對文付之論文雖述心心所法執彼而起彼於心等名爲所緣未云礙法體現起名所緣有對何釋礙體義邊名所緣有對哉何況見光法師餘處解釋法體先有不可言生但能生長彼作用義文今云礙體豈不違餘處定判哉答見今論文答境界所緣復有何別問云若於彼法此有功能即説彼爲此法境界心心所法執彼而起彼於心等名爲所緣文光法師釋此文作三解釋之中第二釋云又解礙體義邊名所緣有對礙用義邊名境界有對如彼同分眼體雖恒有無見色能不名境界有對以此准知境界約用所緣據體文此釋意云論文述所緣有對云執彼而起心心所法體至現在世必由所緣境力故云礙體義邊名所緣有對也眼等根體至現在世所取境界或有或無不定故據礙體義邊不名境界有對起見色等用必由境界力故云礙用義邊名境界有對也論文明境界有對云此有功能託境界有見色等功能名爲境界有對彼同分眼無見色功能故不名境界有對以此准知礙用義邊名境界有對礙體義邊名所緣有對爲言但於光法師餘處解釋者心心所法體至現在世雖必由所緣境力彼法體自本未來有之故法體先有不可言生之釋何有相違哉重難云見今論文以境界有對望障礙有對作四句分別之中第三倶句擧眼等五根若彼同分眼等根非境界有對者障礙有對非境界有對句中何亦不出之哉答眼根念念相續現起之中耳等餘識方現在前不與眼識爲所依位名彼同分眼無自來未可爲彼同分眼之一類故障礙有對非境界有對句中不擧之也問論中答境界所緣復有何別問云若於彼法此有功能等文光法師釋此文作三解釋爾者第三釋意如何釋之耶進云光法師釋云又解礙取境用名境界有對礙緣境用名所緣有對文付之云取境用名緣境用是只根識行相也前二釋意可許此義何以之爲別解釋哉答光法師釋若於彼法此有功能等之論文作三解釋之中第三釋意云六根六識及心心所法起取境用名境界有對心心所法起緣境用名所緣有對爲言前二釋意未述此旨故以之爲別解釋尤有其理歟尋云此釋意彼同分眼名境界有對歟答問光法師釋若於彼法此有功能等論文作幾解釋耶答作三解釋也進云寶法師釋云有人有四解文付之光法師釋今此論文作三解釋若爾寶法師解釋甚似難思如何答光法師釋今此論文并置又解之言作三解釋云事分明也更不可疑之但寶法師釋意爲難破光法師釋以三解釋分成四解釋也所謂初釋内此約有能非要起用等者彼同分眼有取境功能故名爲境界有對爲言若境界有對據礙取境用等者彼同分眼不起取境用故不名境界有對爲言如此得意有四解云也是只不許光法師釋之上責爲難破之四解釋得意成也寶法師意非謂有人實作四解釋歟問光法師釋有色義引正理論三師異説爾者第二師意如何釋之耶進云光法師所引正理論云有説色者謂能示現在此彼言此有彼言故名有色文付之見正理論次上文釋有見義云二者此色可有示現故名有見可示在此在彼別故如有所緣文若爾有見有色之義豈非相濫哉答有見有色其門各別言有見者唯限色界言有色者雖亙五根五境十界得有色稱專有色界故光法師就第二師義問於十色中色界可説有示現言餘九不爾如何可説有示現言如何言色答之作二解釋之中第二釋云又解餘九相從説故隨色可得説在此在彼文此釋意五根五境雖名有色有色稱之源專就色界論之故釋有見有色之義雖同述有在此在彼言説之旨寛狹既異何可相濫哉如彼心心所中雖具境界所緣二種有對之義所緣有對必託所緣境故限心心所境界有對就取境功能談故通五根色界之中雖具有見有色之義有見之門唯限色界有色之邊可通餘眼等九界也問婆沙論意以狹問寛時可有如是答義耶答不可有如是答義也兩方若有此義者見光法師釋云若以狹問寛順前句答文爰知不可有如是答義云事若依之爾者披發智論文云設成就善不善色彼大種耶答如是文此文無諍以狹問寛之時有如是答義見如何答廣勘發智論文亦伺婆沙論説以狹問寛之時儲順前句答不可有如是答義見故光法師釋云依毘婆沙若以寛問狹順後句答若以狹問寛順前句答若互有寛狹四句分別若寛狹相似如是答文泰法師釋云依毘婆沙若以寛問狹順後句答以狹問寛順前句答若亦有寛狹四句分別若寛狹相似答曰如是文寶法師釋云以寛問狹順後句答若是所緣有對定是境界有對故文順後句答等相諸師定判其義如此且得當卷論疏釋顯其相者若以寛問狹順後句答者如問若法境界有對亦所緣有對耶答謂若所緣有對定是境界有對有雖境界有對而非所緣有對謂眼等五根也若以狹問寛順前句答者如問若意識所依性者亦意識等無間緣耶答謂是意識所依性者定是意識等無間緣有是意識等無間緣非與意識爲所依性謂無間滅心所法界也若互有寛狹四句分別若其相如常若寛狹相似如是答者如問若成就現在大種彼現在所造色耶答如是設成就現在所造色彼現在大種耶答如是也故以狹問寛之時不可有如是答義云事文理甚分明也但於發智論文者全不應疑歟如是答者寛狹相似二法相對互問之時前問答如是後問答如是名之如是答如發智論十三次上文云若成就大種彼無覆無記色耶答如是設成就無覆無記色彼大種耶答如是也而發智論次下文云若成就大種彼善不善色耶者以寛問狹也故答也云有成就大種非善不善色謂處卵㲉若諸異生住胎藏中若生欲界住非律儀非不律儀無善不善身語表設有而失文翻之以狹望寛問設成就善不善色彼大種耶答如是非如是答就以狹望寛之一邊答如是可如是答云疑未得其意就中今問答以寛問狹之中後問答也約此一邊何擧爲疑哉見同卷下文就以狹望寛之一邊答如是事其例稍多皆可疑之歟恐全不辨順前句答順後句答如是答相致此疑問也重難云若成就大種彼善不善色耶者以寛問狹故順後句答可云諸成就善不善色彼定成就大種有成就大種非善不善色也而答之云有成就大種非善不善色等問設成就善不善色彼大種耶答如是尤似難思哉答若所對法唯擧一物以寛問狹之時必儲順後句答故發智論十三次上文云若成就大種彼不善色耶答諸成就不善色彼定成就大種有成就大種非不善色謂處卵㲉及住胎中若生欲界住律義及非律儀非不律儀無律儀不律儀語表設有而失若生色界文婆沙論百二十八中述此文云謂若成就不善色者定在欲界無在欲界不成大種必有身故由此得爲順後句答文若所對法出多種類以寛問狹之時有多義門故先分別之後以狹問寛答如是也故今文中先分別成就大種非善不善色成就大種亦善色非不善色成就大種亦不善色非善色成就大種亦善不善色多義門畢復問設成就善不善色彼大種耶答如是也問論中述經部宗義云是處心欲生他礙令不起應知是有對無對此相違文爾者雜心論文同今此經部宗義歟進云光法師釋云雜心四句文同經部文付之依光法師解釋見雜心論所説明三種有對述四句分別文相大同今論等説光法師指何文釋雜心論四句文同經部耶答見雜心論文説境界有對相云如彼經等説若觀陸則不觀水如是廣説文以此文合今論論中云故施設論作如是言有眼於水有礙非陸如魚等眼擧四句中第一句也即當雜心論若觀陸則不觀水之文而雜心論今文意云不觀水於水有礙故異有部觀水於水有礙之説同經部是處心欲生他礙令不起之義故釋雜心四句文同經部梵本不然譯者謬矣也重難云光法師者震旦人師也定可不見梵本何釋梵本不然譯者謬矣哉答倶舍正理四婆沙七十六雜心等諸論中同引施設足論一文而雜心一論所引施設足論文異今論等諸論中所引施設足論文故知雜心論所引之文譯者謬也問光法師意天眼天耳二根爲自性無記爲當通果無記歟答雖有學者二義且可存通果無記云義也兩方若自性無記者天眼天耳二根是禪定所生法也何非通果無記哉是以婆沙論三十二中出擇滅涅槃是通達果故名通達之例證云如天眼耳是通果故亦名爲通文如此文者天眼天耳二根可通果無記見若依之爾者披光法師解釋以眼等五根香味觸無記八界分別異熟威儀工巧通果自性五種無記云通果者謂香味觸通果無記中無擧天眼天耳二根述自性者謂長養五根香味觸及外香味觸自性無記類總出長養五根而天眼天耳二根既長養攝也定知可自性無記云事如何答天眼天耳二根是禪定所生果天眼天耳二通所依根故可名通果無記也故見光法師餘處二十七定判引婆沙論如天眼耳是通果故亦名爲通之文作三解釋之中第二釋云或是通果所依根故亦名爲通文加之品類足論六中明得作證所應證法云謂一切善法及依定所證無覆無記天眼天耳文婆沙論九十文述得作證者謂諸善法通果無記指天眼天耳二根名通果無記任此等文理天眼天耳二根通果無記云事尤分明也但於光法師解釋者是非盡理釋歟其故變化大種雖所長養攝通果無記也長養觸偏名自性無記未盡其理散無表能造大種雖自性無記等流性攝也自性無記類不出等流觸亦有所殘准之推知通果無記中不擧天眼天耳二根自性無記類總云長養五根同非盡理談歟若盡理言之者威儀工巧者謂香味觸通果者謂天眼天耳二根及香味觸自性者謂除天眼天耳二根餘長養五根香味觸并等流觸及外香味觸可云也而香味觸通威儀工巧通果三類故云威儀工巧通果者謂香味觸略不擧限通果無記一類天眼天耳二根長養五根香味觸及外香味觸同自性無記故述自性者謂長養五根香味觸略不出限觸一類散無表能造大種也如此料簡會通之時光法師解釋全無相違歟尋云變化大種所長養攝者在何處文哉答勘婆沙論百二十七文云問此四大種品類有幾答品類有四謂異熟生長養等流變化有餘師説品類有三謂異熟生長養等流其變化者長養所攝復有説者品類有二謂異熟生及長養變化大種入長養中等流攝入異熟長養評曰於前三説中説爲善有四大種非二攝故文評家意變化大種所長養攝云事此文甚明鏡也尋云散無表能造大種自性無記攝者見何處文哉答雖無分明定判道理必然也委細之旨如別記之問散無表能造大種爲自性無記爲當威儀無記歟答雖有學者二義且可有自性無記云義也兩方若自性無記者見光法師解釋以眼等五根香味觸無記八界分別異熟威儀工巧通果自性五種無記云自性者謂長養五根香味觸及外香味觸自性無記觸唯擧長養類若散無表能造大種自性無記者何不通等流觸哉若依之爾者以道理思之散無表能造大種尤可自性無記也如何答散無表能造大種可自性無記也若威儀無記者初苦法忍隨轉戒能造大種可有一刹那過故也眼等五根色等五境能造大種不與彼爲同類因婆沙論百三十一中云然四大種有十一種謂眼處所依乃至法處所依眼處所依與眼處所依爲因増上與餘處所依但一増上乃至法處所依與法處所故爲因増上與餘所依但一増上十二處中同處能造大種與同處能造大種爲同類因不與別處能造大種爲同類因判故定共戒能造大種不與彼爲同類因初苦法忍隨轉戒能造大種欲界繋故若散無表能造大種威儀無記者不可與彼爲同類因色法勢力微劣威儀無記不與自性無記爲同類因故而婆沙論百三十一中云問同趣同地處所差別展轉相望爲有因不有説無因此不應理應有大種是刹那故謂五淨居所有大種無始生死曾未起故大種有無一刹那類定爰知散無表能造大種初苦法忍隨轉戒能造大種同是自性無記與彼爲同類因云事但於光法師自性者謂長養五根香味觸及外香味觸之釋者是非盡理釋歟其故變化大種雖所長養攝通果無記也長養觸無所簡自性無記類中出之未盡其理准彼思之散無表能造大種雖自性無記自性無記等流性法唯限觸一類故列自性無記類之中略不擧等流觸歟問有情數香味觸可有等流性類耶答可有等流性類也兩方若有等流性類者思有情數香味觸相異熟長養之外更不可有等流性類是以眼等五根異熟長養之外無有等流性類有情數香味觸相例可同加之見光法師解釋出自性無記體云自性者謂長養五根香味觸及外香味觸文若有情數香味觸中有等流性類者何不擧之耶若依之爾者有情數香味觸種類非一處寧無等流性類哉隨披寶法師解釋可有此類見如何答有情數香味觸可有等流性類也故見寶法師解釋云香味觸三有情數者亦有異熟長養無記業倶者是等流性文有情數香味觸有等流性類云事此釋尤分明也加之披光法師定判以眼等五根香味觸無記八界分別異熟威儀工巧通果自性五種無記云異熟者通八種謂異熟五根香味觸威儀工巧通果者謂香味觸自性者謂長養五根香味觸及外香味觸異熟長養香味觸外可有威儀工巧香味觸見今此威儀工巧香味觸者身表業倶生香味觸即等流性攝故有情數香味觸有等流性類云事此釋亦炳然也但於眼等五根例難者眼等五根異熟長養之外無別體故無有等流性類有情數香味觸異熟長養之外有別體故亦有等流性類也次於光法師解釋者無記表業倶生香味觸威儀工巧二無記攝之善惡表業倶生香味觸唯威儀無記攝之行住坐臥表色倶生其體無記故威儀無記攝之也故三性表業倶生香味觸等流性攝隨其所應威儀工巧香味觸攝故出自性無記體之時唯擧長養香味觸不出有情數等流香味觸解釋既有其謂疑難全不可來哉重難云散無表能造大種等流性攝也自性無記類中何不擧等流觸哉答自性無記類中長養互香味觸故一具擧之等流唯限觸境故略不出之歟問光法師意心心所中可許自性無記類耶進云光法師意心心所中無自性無記釋也取意付之心心所法是廣何無自性無記之類哉是以色不相應中可有自性無記之類見相例可同何況依身在上三靜慮泛借起耳識及發語心可自性無記之類不可云異熟無記異熟生心他地不起故不可云威儀無記聲非威儀體故不可云工巧無記工巧上界無故不可云通果無記泛借起類故若非自性無記者可云何無記哉依之寶法師意心心所中許自性無記之類如何答廣勘有部依憑本末諸論定判説廣心相但讀二十心不論自性無記故光法師意任諸論所説心心所中無自性無記釋也故見光法師處處解釋當卷解七心界三性分別云由異熟等攝心盡故所以不通自性文述法界三性分別云於心所中異熟等四攝無記盡故自性無記不攝心所法文餘處十三云於心所中無別心所是自性無記文但於色不相應中有自性無記之類云例難者心心所中無異熟等四無記所不攝者故不許自性無記之類色不相應中有異熟等四無記所不攝者故別出自性無記之類也故光法師擧眼等五界香味觸三界自性無記之類云自性者謂長養五根香味觸及外香味觸文明法界中不相應自性無記之類云自性無記者有十法謂得非得四相名句文同分於不相應中異熟等四所不攝者謂餘無記皆自性攝文釋色聲二界自性無記之類云自性者皆通色聲異熟等四所不攝者皆名自性無記文次於依身在上三靜慮泛借起耳識及發語心可自性無記之類云難者倶是威儀無記可非自性無記即起緣似三類威儀心中可似威儀心攝也故光法師餘處二十八解釋中引泰法師釋畢云今解不然生上三定起下諸識若起下身識唯是威儀心或是緣威儀心或是似威儀心若起下眼識修得者通果攝泛爾起者是威儀心或是緣威儀心或是似威儀心若起下耳識修得者通果攝泛爾起者唯是似威儀心若起下發業心若泛爾發身語業者是威儀心是威儀心尚得通緣十二處能發語業理亦應得文文意顯也次於寶法師意心心所中許自性無記之類云難者彼明徳光論師義心心所中許自性無記之類也如當卷云應言四無記心攝心不盡借識之類非四攝也餘處判此借識心是自性無記是人師異釋也不可和會之問初靜慮攝身識可通善性耶答可通善性也兩方若通善性者見光法師定判釋身識通善云若修行者觀段食等深生厭離心能起善三識文而色界中無有段食初定攝身識豈可通善性哉若依之爾者論中雖述七心界通善之旨未簡初靜慮攝身識爰知初靜慮攝身識通善性云事如何答初靜慮攝身識可通善性也故婆沙論十七中出初靜慮善心無隨轉戒之類云一善眼識二善耳識三善身識四死時善心五起表善心六聞所成惠相應善心文初靜慮攝身識通善性云事此文甚分明也但於光法師解釋者見問答具文云問眼耳意識及與意根皆通三性舌身識不善無記此並可知舌身識起善云何問亙舌身三識通善相故答之云若泛爾起者三識非善若修行者觀段食等深生厭離心能起善三識也若別就初靜慮攝身識論通善相者初靜慮天衆觀衣服等深生厭離心能起善身識可云也問等起善可通表無表業耶答可通表無表業也兩方若通表無表業者光法師明四種善云三等起善謂無表得四相二定文若等起善通表無表業者何唯擧無表哉若依之爾者披今論餘處十三文述等起色業等可通表無表業見如何答善表無表業倶是自性善及相應善所等起法故等起善相應善無表業云事道理必然也是以見今論餘處十三文云等起善者謂身語業不相應行以是自性及相應善所等起故如良藥汁所引生乳文謂身語業之言是廣何不通表無表業哉寶法師釋此文云謂身語表及無表業四相得等由二善所等起故成善性也文等起善通表無表業云事此釋亦分明也但於光法師三等起善謂無表之釋者牒法界若是無貪等性相應等起擇滅名善若貪等性相應等起名爲不善餘名無記記之論文別約法界所攝法中明四種善故唯擧無表不出表業也光法師釋此文云此即別明法界於法界中善有四種即此意也泛明等起善相之時非簡表業今此疑問全非論義歟問光法師依婆沙論意可立自性等四種善耶進云光法師釋云此論下文及毘婆沙善不善各説四種文付之依光法師解釋披婆沙論所説破犢子部意世第一法唯以信等五根爲性問彼若唯五根是自性善所餘善法自性是何若謂彼是不善無記雜五根故亦名善者如是五根與彼相雜何故不名不善無記然信等五與所餘法同一所依同一行相同一所緣一起一住一滅一果同一等流同一異熟而言五根是自性善餘相雜故假立善名但順妄情不應正理文如此能破文者一切善心心所總名自性善不可立相應善等見依之光法師餘處十三解釋中云婆沙既以一依等破立五根爲自性善明知説四種善者述異師義文婆沙論正義家意不立自性等四種善云事此釋分明也若爾光法師今解釋非只背婆沙論所説豈不致相違於自定判哉答勘婆沙論百四十四文云氣尊者曰由四緣故説名爲善一自性故二相應故三等起故四勝義故自性善者有説是慚愧有説是三善根相應善者是彼相應心心所法等起善者是彼所起身語業心不相應行勝義善者謂𣵀槃安穩故名善分別論者作如是言自性善者謂智相應善者謂彼相應識等起善者謂彼所起身語業勝義善者謂𣵀槃由四緣故説名不善一自性故二相應故三等起故四勝義故自性不善者有説是無慚愧以一向不善遍不善心故有説是三不善根以具五義故相應不善者謂彼相應心心所法等起不善者謂彼所起身語業心不相應行勝義不善者謂生死不安穩故名不善分別論者作如是説自性不善者謂癡相應不善者謂彼相應識等起不善者謂彼所起身語業勝義不善者謂生死文一論前後文更不破此義故知正義家意依用此説云事但於婆沙論文者光法師餘處十三釋今論之四種善等之文引此婆沙論説會其相違作三解釋云解云婆沙既以一依等破立五根爲自性善明知説四種善者述異師義又解安惠菩薩倶舍釋中解據實而言皆是自性善然世親阿闍梨立四種者隨義勝劣建立異名善中最強勝者名勝義善次強者立自性次劣者立相應最劣者名等起不善隨義亦立四種故婆沙一百四十四三性以分別二十二根有一師云亦説有四種善不善與此論同然不見破又解婆沙前文但破異師立五根爲自性善不破立無貪等爲自性善故彼前後亦不相違文准此三解釋意可會通婆沙論前後文相違也此三釋中若依第二第三釋意者婆沙論正義家意可立四種善等見故光法師此論下文及毘婆沙善不善各説四種之釋尤所符合也若依初釋意者婆沙論正義家意設雖不立四種善等異師義中既説四種善等故毘婆沙論善不善各説四種之釋全無相違也老眼早覺冬夜未曙之程倩顧宿罪閑忍往事之次此論義者去寛喜二年窮冬之候於東大寺東南院被行倶舍三十講之時聖禪法師對良忠法師疑問之由憶念之間聖禪擬講之許相尋此疑旨趣之處彼注送状云問婆沙論意可立自性善等四種善耶進云光法師釋云毘婆沙善不善各説四種文付之體性同善也何自性善外可立相應善哉是以婆沙論中破唯以信等五根爲自性善之義云然信等五與所餘法同一所依同一行相乃至而言五根是自性善餘相雜故假立善名但順妄情不應正理文如此文者自性善外不立餘善見如何答慚愧等五種所治無慚無愧及貪嗔癡三不善根是自性不善故以能治慚愧及無貪無嗔無癡三善根立自性善也光法師餘處十三此五強勝名爲自性餘非強勝不名自性之釋即此意也但於婆沙論文者光法師餘處十三作三解釋會之初釋意婆沙既以一依等破立五根爲自性善明知説四種善者述異師義文准婆沙論能破文故立四種善者異師義也爲言第二釋意云安惠菩薩倶舍釋中解據實而言皆是自性善然世親阿闍梨立四種者隨義勝劣建立異名如婆沙論能破文雖實皆是自性善隨義勝劣建立四種善爲言第三釋意云婆沙前文但破異師立五根爲自性善不破立無貪等爲自性善故彼前後亦不相違文故諸難勢全非相違云云問無記心所起身語表業可名等起無記耶答不名等起無記也兩方若名等起無記者見今論餘處十三文善心不善心所起身語業雖名等起善等起不善無記心所起身語業未名等起無記明知無記心所起身語表業不名等起無記云事若依之爾者無記心所起身語表業也尤可名等起無記是以光法師釋色界聲界無記云若無記心力等起身語表業是無記文如此釋者無記心所起身語表業名等起無記見如何答披今論餘處十三文述勝義善解脱自性慚愧根相應彼相應等起色業等翻此名不善勝無記二常善及不善雖立勝義自性相應等起四種無記唯限勝義一類不立自性相應等起三種故無記心所起身語表業不名等起無記也但於無記心所起身語表業也尤可名等起無記云難者光法師餘處十三問答此事云問何故善不善有四種無記唯一解云分心所中無別心所是自性無記由無自性不立相應由不立自性相應亦不立等起文此釋意云無心所是自性無記故不立自性無記無自性無記故不立相應無記無自性及相應無記故亦不立等起無記爲言次於光法師若無記心力等起身語表攝是無記之釋者無記心亦能等起身語表業故彼所起身語表業是無記之旨釋許也非謂以之立等起無記何可爲難勢哉問光法師意聲界可通威儀無記耶進云光法師釋云威儀工巧通果自性者皆通色聲文付之聲界者是間斷法更非行住坐臥體何可通威儀無記哉是以見光法師餘處七解釋云以聲非威儀故不緣聲文若爾光法師今解釋非只背道理豈不違自釋哉答凡於聲界有二義門若由威儀心所發故從能發心名威儀無記故見光法師解釋或云異熟威儀工巧者謂七心界或述威儀工巧通果自性者皆通色聲即由此門也若非行住坐臥威儀體故非威儀無記故見今論餘處七文云威儀路等三無覆心色香味觸爲所緣境工巧處等亦緣於聲如是三心唯是意識文光法師釋此文云或云聲非威儀故威儀心不緣或述若威儀路加行不但在意識亦通四識緣四境故以聲非威儀故不緣聲故婆沙一百二十六云眼舌身四識是威儀路加行非起威儀路意識是威儀路加行亦是起威儀路亦由此門也婆沙論百二十六中云威儀路者謂色香味觸四處爲體即此意也今此二門自本各別兩處解釋唯顯一邊實互許之何爲相違哉重勘光法師餘處二十八解釋云又空法師章解威儀五蘊中云色聚有五謂五塵問若起威儀具有五塵何故婆沙倶舍并説唯有四塵除聲解云行住坐臥名威儀聲非威儀正體所以二論説無今據威儀心發聲義所以説有已上文空解光法師雖引空法師今問答全無難破之定知依用之云事若爾會通之旨既出彼定判後學之輩更勿致異論矣問十八界中唯欲界繋法唯限香味二境舌二識歟答唯限此四界也兩方若限此四界者見品類足論十八文云唯欲界繋法欲界一切隨眠隨増文唯欲界繋法唯限此四界者可欲界遍行修所斷隨眠隨増更不可云欲界一切隨眠隨増哉若依之爾者以性相思之唯欲界繋法唯可限此四界也如何答任今論欲界繋十八色界繋十四除香味二識之文十八界中唯欲界繋法唯限香味二境舌二識云事性相之所定也更不可異求之故寶法師釋云欲界繋法被欲界貪等繋縛名欲界繋即舌香味四界全文品類足論十八云唯欲界繋法四界二處非蘊攝文但於品類足論唯欲界繋法界一切隨眠隨増之文者欲界一切隨眠唯欲界法許隨増色無色界繋法不隨増故云爾也全非相違問大衆部意色無色界十八界悉可有耶答悉可有也兩方若悉有者無色界者無色法之稱也設雖大衆部意何云無色界五根五境悉有哉是以見今論餘處二十八文或述彼部義云由彼色微故名無色文若無色界五根五境悉有者豈云由彼色微哉或擧有部能破云身語既無律儀寧有又無大種何有造色文若彼部意許無色界有身語大種者更不可今能破來哉加之重明有部能破云色無色界應有段食彼部意上二界中無有段食見若有香味者寧無段食哉若依之爾者見光法師解釋云若依宗輪論大衆部等色無色界具六識身文既云具六識身定知亦有所依六根所緣六境云事如何答大衆部意色無色界十八界悉可有也即依光法師若依宗輪論大衆部等色無色界具六識身之釋正見宗輪論文述大衆部一説部説出世部鶏胤部本宗同義云色無色界具六識身文慈恩大師釋此文云三界之中許皆有色微細根大於彼得有故無色界具六識身以義准知上界亦有香味二境但少異故略而不擧既爾彼緣自香味境此雖不説上界亦有香味境故有無色界具十八界此中略不言亦有根等故文披泰法師餘處二十八定判釋今論此因不成許有色故之文云大衆部等説六識十八界通三界故文任此等解釋大衆部意色無色界十八界悉有云事分明也但於無色界者無色法之稱云難者今論餘處二十八中述大衆部等意會此疑云由彼色微故名無色文慈恩大師宗輪論述記有細無麁色故名無色界之釋亦此意也次於無色界五根五境悉有者不可云由彼色微云難者大衆部意無色界中五根五境雖悉具之其體是微妙非麁劣根境故云彼界色微也次於身語既無律儀寧有等之文者有部意縱許大衆部計牒破之云彼部意縱無色界唯有身語律儀無餘色云者身語既無律儀寧有又無能造大種何有所造身語律儀哉破也是只一往縱許破之更非謂彼部實義無色界中唯有身語律儀無餘色歟次於色無色界應有段食之文者大衆部意三界之中雖有香味欲界香味麁劣法故是段食性上界香味微妙境故非段食性也如彼有部意欲色界中雖有觸境欲界觸境是段食性色界觸境非段食性也問欲界觸界中可有非段食類耶答可有非段食類也兩方若有非段食類者披今論文當卷云若爾觸界於彼應無如香味境段食性故欲界觸界段食性定餘處十述唯欲界繋香味觸三一切皆爲段食自體加之勘正理論餘處三十文判謂唯欲界香味觸三一切皆爲段食自體顯宗論十五説全亦同之任此等論説欲界觸界中不可有非段食類見若依之爾者欲界觸界中無非段食類者依身在色界作欲界化之時豈無於色界成就段食之過哉答欲界觸中可有非段食類也故見光法師餘處二十七解釋問異界化色觸皆成就不答之云解云皆成就如婆沙一百三十二云引婆沙論一段文畢云婆沙既言若生色界作欲界化發欲界語成就欲界大種及所造色文不別簡明知異界化若化自身若化他身色觸二種皆悉成就文而生色界不成就段食故依身在色界作欲界化之時所成就欲界所化觸界可非段食類也但於今論當卷及餘處文并正理顯宗兩論説者且就欲界非化觸界論之也或任婆沙論百二十九於中三事是段食體即十一觸及香味處之文段食體既通十一種故云一切皆爲段食自體歟尋云欲界非化觸界中可有非段食類耶答元瑜法師作有無二釋歟故述文記三云問色界成身及宮殿許有非摶食性觸欲界成身及居處有非摶食性觸答理亦應有問若觸成身及宮殿觸有非摶食香味成身宮殿香味非摶食答香味必由食受感所以皆摶食觸不必從食所以非摶食如諸根及色聲非食造彼四大亦應非食亦可欲界一切觸皆可呑烟有資身義從食受生皆是食性應更詳審文今此二釋就法界非化觸界論之歟若爾二釋中且可存欲界非化觸界中無非段食類云云後釋也難云見今論餘處文明段食相云可成段別而飮噉故文而欲界非化觸界中衣服宮殿等能造大種既無段別飮噉之義可非段食性何云欲界非化觸界皆段食性哉答今論餘處十可成段別而飮噉故之文從多分説也故見彼次下文云光影炎涼如何成食傳説此語從多爲論又雖非飮噉而能持身亦細食所攝如塗洗等文光法師釋此文云言段食者毘婆沙師傳説此飮噉言從多爲論如藥塗身及洗浴等雖非飮噉而能持身亦細食攝色界雖有能攝益觸以異竟無分段飮噉故非段食文准此釋思之欲界中衣服宮殿等能造大種有外持身之義故可段食攝也問論中述有餘師説云有殊勝觸攝益於身文光法師釋此文作三解釋爾者初釋意如何釋之耶答光法師釋云有殊勝觸即色界大種文付之有漏法者繋地各別也何有色界大種益欲界依身之義哉何況下地身根不能取上地觸境既非受用境豈蒙彼益哉答見今論文起盡明色界無香味有非段食觸云有餘師説住此依彼靜慮等至見色聞聲輕安倶起有殊勝觸攝益於身是故此三生彼靜慮猶相隨逐香味不爾故在彼無文光法師釋此文作三解釋之中初釋云謂住此欲界依彼四靜慮始起等至起天眼見上界色起天耳聞上界聲輕安謂大善地法中輕安定中用勝故別標名觸與輕安同時故言倶起有殊勝觸即色界大種欲界身雖不能取上界觸以觸身中行故能攝益身身在欲界既能見彼地色聞彼地聲起彼地觸是故此三生彼靜慮猶相隨逐香味不爾故在彼無文此釋意云住欲界中依四靜慮現起等至起天眼見色界色起天耳聞色界聲現起等至之時與彼定相應輕安心所倶起色界大種來在心中名殊勝觸欲界身根雖不能取色界觸境以彼色界觸欲界身中行故能攝益欲界依身在欲界中既能見彼色界色聞彼色界聲起彼色界觸故此色聲觸三生彼色界猶相隨逐香味不爾故在彼色界無爲言但於色界大衆不可益欲界依身云疑并下地身根不能取上地觸境云難者光法師欲界身雖不能取上界觸以觸身中行故能攝益身之釋先所會通之也問論中述有餘師説云有殊勝觸攝益於身文光法師釋此文作三解釋爾者第二釋意如何釋之耶進云光法師釋云所引輕安唯是欲界益欲界身故文付之見論文起盡明色界無香味有非段食觸云有餘師説住此彼依靜慮等至見色聞輕倶起有殊勝觸攝益於身是故此三生彼靜慮猶相隨逐香味不爾故在彼無住欲界中依四靜慮現起等至起天眼見色界色起天耳聞色界聲與彼等至倶起色界大種來在身中故此色聲觸三生彼色界猶相隨逐之旨顯也若欲界觸者何可成色界有非段食觸之義哉例如欲界雖有香味色界無之如何答披今論現文尋殊勝觸體上標住此依彼靜慮等至下説有殊勝觸攝益於身思文相次第明有殊勝觸攝益欲界身見而色界觸不能攝益欲界身故云有殊勝觸尤可指欲界觸也故光法師釋此文作三解釋之中第二釋云又解輕安謂身輕安即細滑觸或是輕觸與二通同時故言倶起能攝益身雖色及聲通欲色界所引輕安唯是欲界益欲界身故文元瑜法師述文記三釋正理論四有殊勝觸攝益於身之文其意同之既有同意之定判可知此釋順文理云事但於若欲界觸者不可成色界有非段食觸之義云難者光法師會此疑云以於欲界三種相隨故生色界亦具三種文此釋意云住欲界中欲色界色聲及欲界觸三種相隨故生色界亦具彼界色聲觸三種爲言次於欲界雖有香味色界無之云例難者由依四靜慮現起等至起天眼天耳二通之力無香味攝益欲界身之義故全不可爲相例難問論中明色界有舌二根無香味二境云以六根愛依内身生非依境界而得現起文爾者今此愛者可味定耶答可味定也兩方若味定者味定緣過去淨定今此愛緣依身見所緣既異何云味定哉若依之爾者任光法師由得上定起上界愛之釋今此愛者依身在欲界所起色界愛也豈非味定哉答論中述論主正解云如是説者舌二根於彼非無但無香味以六根愛依内身生非依境界而得現起文光法師釋此文云舌彼有但無香味以六根愛依内身生非依境界而得現起由得上定起上界愛愛上界身故生色界得有舌文任此釋今此愛者依身在欲界所起色界愛故味定云事必然也但於味定縁過去淨定今此愛緣依身云難者今論餘處二十八文説味定相云此無間滅彼味定生緣過去淨深生味者從多分論也故婆沙論百六十一中問愛相應定能緣三世何故唯説緣過去耶答之雖有四師異説初師説云有説此依多分而説謂有情類法爾多緣曾所愛順境生愛味故評家嘆之云評曰應知初説爲善此中入出皆依味定而作論故文准此文味定廣緣三世亦緣味定故緣依身等全非相違也問今論意五識與尋伺恒相應故如何釋之耶進云今論云以行相麁外門轉故文付之外門轉故因不可然欲界及初靜慮内門意識雖非外門轉與尋伺恒相應以外門轉故因何可成五識與尋伺恒相應義哉是以正理論四中難此因云現見意識内門轉時亦常與彼共相應故文爾者外門轉故因有義如何答光法師會正理論難作倶舍師救云一行相麁是通因二外門轉故是別因五識具二内門意識雖無外門轉而有行相麁故有尋伺上地外門意識雖有外門轉而無行相麁故無尋伺文此釋意云以行相麁者廣互五識意識之通因外門轉故者唯限五識之別因故欲界及初靜慮内門意識雖非外門轉有行相麁通因故與尋伺恒相應第二靜慮以上外門意識雖有外門轉無行相麁通因故不與尋伺相應也爲言重意云外門轉故因自本唯限五識之別因非互意識之通因故欲界及初靜慮内門意識與尋伺恒相應第二靜慮以上外門意識不與尋伺相應云難者不可來也問論文云以行相麁外門轉故文爾者寶法師意外門轉故者五識與尋伺恒相應故歟進云寶法師釋云故知外門非是因也文付之依寶法師解釋披今論現文云眼等五識者有尋有伺由與尋伺恒共相應以行相麁外門轉故文文相起盡無諍外門轉故者五識與尋伺恒相應故見是以正理論中難今論外門轉故因云現見意識内門轉時亦常與彼共相應故乃至何用外門爲因簡別文依之光法師述倶舍師救會二外門轉故是別因圓暉法師釋一行相麁二外門轉由此二因故眼等識與尋伺倶若爾寶法師解釋豈不背此等定判哉答寶法師釋以行相麁外門轉故之論文引正理論難倶舍師救畢云評曰有無尋伺即既倶由行相麁何假外門内門外門無尋伺内門有尋伺故故知外門非是因也今詳以五識唯行相麁故恒與尋伺相應唯外門轉顯義決定故説唯言者顯五識唯尋伺相應所以故不至上地文此釋意云以行相麁故可爲五識與尋伺恒相應正因外門轉法不必與尋伺相應故外門轉故非五識與尋伺恒相應正因以外門轉故成行相麁義傳顯五識與尋伺恒相應義決定也爲言寶法師意存正理論難破之趣故作此釋也若如此得意之時今論定判亦無相違但於正理論文者就今論文言欲顯其非者彼論定習故依外門轉故之文且致此難歟次於光法師圓暉法師解釋者人師異釋也不可和會也問中間禪眼等五根并色觸等無尋唯伺地攝歟答可無尋唯伺地攝兩方若無尋唯伺地攝者今論中雖述靜慮中世間無尋唯伺中間禪眼等五根并色觸等未云彼地攝哉何況披今論餘處文云迦濕彌羅國諸大論師皆言色界處但有十六彼謂即於梵輔天處有高臺閣名大梵天一主所居非有別地如尊所座四衆圍繞文光法師釋此文云今此國師二倶不立由無別地故唯十六文若初靜慮地外無別中間禪攝地者中間禪眼等五根并色觸等是有尋伺地攝更不可云無尋唯伺地攝加之見品類足論九文以有尋伺等三地分別十八界十二處五蘊等云無尋唯伺地三界二處五蘊攝九智知除滅智一識識色界遍行及修所斷隨眠隨増文若中間禪眼等五根并色觸等無尋唯伺地攝者寧可云三界二處攝一識識哉若依之爾者既中間禪眼等五根并色觸等定可無尋唯伺地攝例如初靜慮眼等五根并色觸等有尋有伺地攝如何答中間禪眼等五根并色觸等有尋有伺地外別可無尋唯伺地攝也故見婆沙論九十八文大梵依靜慮中間心命終結生文若有散心中間禪攝者何無眼等五根并色觸等無尋唯伺地攝哉加之婆沙論百三十四中釋發智論十三見諦世尊弟子未離欲染所成就色界繋身語業色何大種所造答色界繋之文云此依種類總相而説若別説者應言未至地大種所造文既云有四大種未至地攝例亦可有眼等五根并色觸等無尋唯伺地攝云事必然也故准此等論文思之中間禪眼等五根并色觸等定可無尋唯伺地攝也但於今論餘處一主所居非有別也之文并光法師由無別地故唯十六之釋者設雖大梵天主所居非有別地有尋有伺等三地既異故有眼等五根并色觸等無尋唯伺地攝更不可有相違次於品類足論文者彼論六中明有尋有伺等三地廢立云有尋有伺地云何謂欲界梵世及一分無漏法無尋唯伺地云何謂修靜慮中間得梵大梵及一分無漏法無尋無伺地云何謂一切極光淨一切遍淨一切廣果一切無色及一分無漏法文如文意有尋有伺地及無尋無伺地廣取彼地所有一切法無尋唯伺地唯取中間禪定善見諸門分別之時無尋唯伺地就其定善論之故云三界二處攝一識識色界遍行及修所斷隨眠隨増也以實品類足論意可許眼等五根并色觸等無尋唯伺地攝也重難云品類足論意實許眼等五根并色觸等無尋唯伺地攝者何唯就中間禪定善論之哉答初靜慮及中間禪同一繋縛地色不相應散善無覆無記染汚心等無有勝劣差異故不約此明有尋有伺地無尋唯伺地不同約其定善有尋有伺地無尋唯伺地既有勝劣差異故據其顯相無尋唯伺地體唯取中間禪定善也若就實義具出其體者有尋有伺地之外可有無尋唯伺地攝眼等五根并色觸乃至散善無覆無記見惑等也尋云無尋唯伺地有見惑云事見何處文耶答勘發智論三文云三結乃至九十八隨眠幾有尋有伺幾無尋唯伺幾無尋無伺答三結三種九十八隨眠中欲界三十六有尋有伺色界三十一三種無色界三十一無尋無伺文婆沙論五十二中釋此文云答三結三種謂或有尋有伺或無尋唯伺或無尋無伺云何有尋有伺謂在欲界及初靜慮云何無尋唯伺謂在靜慮中間云何無尋無伺謂在上三靜慮及四無色餘廣説如本論文加之婆沙論八十七云問若諸隨眠無尋唯伺彼於無尋唯伺法爲所緣縛耶答應作四句有諸隨眠無尋唯伺而於無尋唯伺法非所緣縛謂諸隨眠無尋唯伺而已斷設未斷而他界緣惑他地緣惑自界他界緣惑自地餘法緣惑無漏緣有諸隨眠無尋唯伺亦於無尋唯伺法爲所緣縛謂諸隨眠無尋唯伺是有漏緣緣彼未斷文任此等論判無尋唯伺地有見惑云事甚分明也就之會通品類足論文之趣准前可知之問第二靜慮以上定中惠名無分別歟答可有二義門也兩方若名無分別者見今論文述説五無分別由計度隨念唯以五識名無分別明知意識中無無分別類云事若依之爾者以五識名無分別三分別中唯有一種分別故也而第二靜慮以上定中惠三分別中唯與一種分別相應何不名無分別哉答若五識意識相望論之者意識能分別諸境故第二靜慮以上定中惠從總種類可名有分別也故見正理論四文云豈不意識有唯一種分別相應由依意識總類具三説有分別文顯宗論三文全亦同之但於第二靜慮以上定中惠唯與一種分別相應如五識可名無分別云難者五識自本其性羸劣無強分別故從多分名無分別第二靜慮以上定中惠雖唯與隨念一種分別相應分別諸境力用強勝非如五識唯與自性分別相應故可名有分別也若散心定心相望云之者第二靜慮以上定中惠唯與隨念分別相應無有餘二分別故可名無分別也故婆沙論七十二云且在定者皆無分別不在定者容有分別計度分別遍與不定意識倶故文定中意識不與計度分別相應故名無分別云事此文分明也問意識相應散惠悉爲計度分別體歟答悉可爲計度分別體也兩方若悉爲計度分別體者意識相應散惠種類非一准何悉爲計度分別體哉是以婆沙論七十二中明意識通有分別無分別相云且在定者皆無分別不在定者容有分別文既言容有知有非計度分別之類云事若依之爾者披今論文述以意地散惠意識相應惠悉爲計度分別體見如何答意識相應散惠於所緣境如此如是計度而轉似順尋故悉爲計度分別體也故今論云散謂非定意識相應散惠名爲計度分別文正理論四云散言簡定意識相應散惠名爲計度分別定中不能計度境故非定中惠能於所緣如此如是計度而轉故於此中簡定取散文顯宗論三文全亦同之加之婆沙論云三推度分別謂意地不定惠文雜心論云分別思惟者意地不定惠也文任此等論判計度分別體雖簡定中惠意識相應散惠中更無所遮爰知悉爲計度分別體云事何況婆沙論七十二計度分別遍與不定意識倶故之説光法師散惠計度又順尋強之釋意識相應散惠悉爲計度分別體之旨亦分明也但於婆沙論不在定者容有分別之文者今此文意具有三分別名有分別而第二靜慮以上不定意識唯與隨念計度二分別倶無有自性分別故可名無分別也故爲簡之置容有言歟已上相傳義也愚推云對定中意識不與計度分別倶故皆名無分別將成不定意識必與計度分別倶故名有分別之時其不定意識之中或具有三分別或唯有隨念計度二分別若三若二有定故爲顯其不定云容有分別也自性分別有無雖是不定必與隨念計度二分別倶故不定意識悉名有分別也若爲顯不定意識之中有無分別之類置容有言者結文何云計度分別遍與不定意識倶故哉此文意無諍計度分別遍與不定意識倶故不定意識悉名有分別云也重難云就婆沙論計度分別遍與不定意識倶故之文難思若爲顯不定意識名有分別可云隨念計度遍與不定意識倶起何唯擧計度分別不出隨念分別哉答定中亦有隨念分別故爲成不定意識名有分別就唯有散位且擧計度分別歟若盡理云之者可出不定隨念分別也故正理論八中説眼識後起分別意識相云應知此中且辨計度及與不定隨念分別遍諸地故約此二種文問定中惠可名計度分別耶進云今論疏中不名計度分別釋也付之定中惠明了知所緣境何不名計度分別哉何況定中惠推度故名見而計度推度名異義同者光法師定判也既有推度之義定知可名計度分別云事如何答見今論文偈頌云以意地散惠長行述散謂非定意識相應散惠名爲計度分別定中惠不名計度分別云事分明也光法師釋此文云所以計度散非定者婆沙四十二解釋定中惠非計度分別云雖亦有惠而非推度分別若推度時便出定故又正理云定中不能計度境故非定中惠能於所緣如此如是計度而轉故於此中簡定取散文何況次下文重明定中惠不名計度分別擧多重問答云問惠順彼尋尋通定散惠亦應通何故計度唯散非定解云散惠計度又順尋強定伏順尋非強問依定發惠定應順惠如何伏惠令不順尋解云簡擇諦等實定順惠若順尋邊定即制伏問定中尋起定不能伏如何能伏順尋惠耶解云尋是自性分別有體即名分別惠似順他起勢力易除文引婆沙正理兩論所説儲定散相望多重問答成定中惠不名計度分別之旨解釋既爲委悉學者深可沈思加之正理論八云應知此中且辨計度及與不定隨念分別遍諸地故文婆沙論七十二云前五識身唯無分別第六識身或有分別或無分別且在定者皆無分別不在定者容有分別計度分別遍與不定意識倶故文任此等論判定中惠不名計度分別云事亦炳然也但於定中惠明了知所緣境何不名計度分別哉云難者定中惠是現量智明了知所緣境無籌度比知之義故不名計度分別也今疑難之趣未得其意歟於定中惠推度故名見任計度推度名異義同之釋可名計度分別云難者見者推求猛利之義廣通定散計度者分別籌度之稱唯限散位而婆沙論中云欲界五識身唯有一種自性分別雖亦有念而非隨念分別不能憶念故雖亦有惠而非推度分別不能推度故全非由推求猛利之義名推度分別此以計度呼爲推度故光法師引此文對今論説會計度推度名異義同也非謂計度推度之義一切皆同何爲相違哉問隨念分別唯緣過去境歟答廣緣三世境也兩方若唯緣過去境者意識相應念所緣是廣何唯緣過去境哉若依之爾者光法師引婆沙論四十二欲界五識身唯有一種自性分別雖亦有念而非隨念分別不能憶念故之文云准婆沙文隨所更事名爲隨念文如此釋者隨念分別唯緣過去境見如何答今論中述隨念分別相云若定散意識相應諸念名爲隨念分別文正理四顯宗三兩論文全亦同之婆沙論四十二云隨念分別謂意識相應念文雜心論一云隨憶思惟者意地念也文任此等論判若定若散意識相應所念心所皆爲隨念分別體故隨念分別廣緣三世境云事更不可疑之但於光法師准婆沙文隨所更事名爲隨念之釋者立隨念分別稱由隨念曾所更事或隨境念二故故光法師釋云隨念曾更或隨境念名隨念分別文兩婆沙論雖亦有念而非隨念分別不能憶念故之文隨念曾更或隨境念二故之中且由隨念曾更之邊立隨念分別稱爲言非立隨念分別稱唯由此一故隨念分別廣緣三世境全無相違也問散位念名隨念分別爲順尋故爲當順惠故歟答順尋故名隨念分別也兩方若順尋故名隨念分別者披光法師解釋云夫念作用多順於惠散惠用勝名爲分別故念順彼名爲分別文如此釋者散位念順惠故名隨念分別見若依之爾者惠念自性雖非分別順自性分別尋故得分別名也定知散位念順尋故名隨念分別云事例如散位惠順尋故名計度分別如何答散位念順尋故名隨念分別也故光法師問答云問尋性分別此事可然於餘心所何故念惠名爲分別非餘心所解云餘心所法非似順尋唯二似順故不説餘故正理云夫分別者推求行相故説尋爲自性分別簡擇明記行似順尋故分別名亦通惠念云云今此光法師釋正理論文意地散惠名計度分別定散諸念名隨念分別倶順尋故云事甚分明也但於光法師故念順彼名爲分別之釋者見解釋起盡答若爾念於定強應不通散之問夫念作用多順於惠者述念作用多順惠義散惠用勝名爲分別者顯散惠順尋義勝故名爲計度分別云故念順彼名爲分別者散念順散惠順尋勝故名爲隨念分別爲言故散位念名隨念分別遂所歸者順尋義故全非相違歟問能執受心可通第六識耶答可通第六識也兩方若通第六識者見今論文釋有執受義云心心所法共所執持攝爲依處名有執受文而第六識無攝無根爲所依處之義何可爲能執受體哉是以光法師釋眼等五根住現在世名有執受之論文云眼在五根若入無心或起意識即無識執受文此釋無諍能執受心唯可限五識見若依之爾者光法師釋損益展轉更相隨故之論文云謂心心所起憂苦損依處亦損起喜樂益依處亦益文既述起憂喜二受依處有損益之旨明知能執受心通第六識云事如何答能執受心可有親疎若就疎能執受心云之者可通第六識也光法師謂心心所起憂苦損依處亦損起喜樂益依處亦益之釋此旨誠分明也何況勘光法師餘處十三所引正理論文云散地無表所依大種有執受者散心果故以有愛心執爲現在内自體故文此文意能執受心通第六識見加之婆沙論百三十八云若生色界七處少分是有執受三處全七處少分是無執受文色界舌二根無有舌二識爲所依義若執受體嫌第六識者寧可通有執受哉任此等定制能執受心通第六識云事必然也但於第六識無攝五根爲所依處之義云難者第六識雖無攝五根爲所依處之義由第六識力依身有損益故能執受義可通第六識也次於光法師或起意識即無識執受之釋者見今論文云有執受者此言何義心心所法共所執持攝爲依處名有執受就親能執受心以五識爲能執受體故且任論現文第六識現前位無識執受爲言若就實通論者能執受心亦通第六識故釋次下損益展轉更相隨故之論文述能執受體通憂喜二受之旨也問光法師作現在眼等五根識不依時或名有執受或不名有執受云二解釋爾者第二釋意色界舌二根可通有執受耶答可通有執受也兩方若通有執受者第二釋意云而言執受據識起時以執受義作用顯故能依識起位所依五根名有執受見而色界舌二根全無發能依識之義何可通有執受哉若依之爾者婆沙論中色界舌二根可通有執受見如何答見婆沙論百三十八文云若生色界七處少分是有執受三處全七處少分是無執受文色界舌二根通有執受云事此文分明也設雖光法師第二釋意更不可背婆沙論説但於光法師第二釋意能依識起位所依五根名有執受等云難者正見彼釋云又解現在五根五識不起時非是執受而言執受據識起時以執受義作用顯故如定道大種雖不離身亦是現在名無執受五根亦爾文此釋意云以五識爲能執受體之時能依五識不現前位所依五根非有執受爲言然而泛論之者能執受體通第六識故色界舌二根由意識能執受可名有執受也問定道二戒能造大種可名有執受耶進云光法師釋云名無執受付之披今論所説尋有執受相云色香味觸住現在世不離五根名有執受文而定道二戒能造大種既有住現在世不離五根之義何不名有執受哉答定道二戒能造大種名無執受者性相之所定也更不可疑之故見今論餘處十三文偈頌結定生依長養無受無異大長行述定生無表差別有二謂諸靜慮無漏律儀此二倶依定所長養無受無異大種所生定道二戒能造大種是無執受定故光法師釋此文云是無執受故正理三十五云所依大種無執受者定心果故必無愛心執此大種以爲現在内自體故又此大種無有其餘執受相故名無執受文顯宗論十八文全亦同之諸論一同之説誰可異求之哉但於既有住現在世不離五根之義可名有執受云難者定道二戒能造大種雖有住現在世不離五根之義是定心果必無愛心執此大種以爲現在内自體故名無執受也准正理論文可會通之加之光法師當卷釋云如定道大種雖不離身亦是現在名無執受五根亦爾文若作前解通彼文言定道大種入定有出定即無名無執受文此釋意云若依現在五根識不起時非是執受云第二釋意者定道二戒能造大種雖不離心亦是現在名無執受爲其例證若依現在五根識不依時亦名執受執受類故云初釋意者會通可云眼等五根相續不斷心心所法攝爲依處故識不依時執受類故名有執受定道二戒能造大種入定雖有出定即無有間斷義心心所法不爲依處故雖不離身亦是現在異有執受相故名無執受爲言演祕三中云如定道戒能造大種雖不離身亦是現在而無執受五根亦爾前師釋云定道大種在定即有出定即無名無執受五根相續與彼不同之釋其意同之正理論三十五餘處文云又此大種無有其餘執受相故名無執受文即此意歟去弘長元年中夏之候當今於五條大宮新内裏初被行最勝講之時東大寺定緣得業對興福寺之實寛律師述演祕釋疑此論義宗性初參證義者之間親列其座聊加其詞了問過去有情數所造色與現在有情數無執受所造色可爲異熟因耶答若依光法師一釋意者可有此義也兩方若爲異熟因者婆沙論中述過去有情數所造色與現在有情數無執受所造色爲因云因者謂同類因文如此文者不爲異熟因見若依之爾者光法師釋眼等五根住現在世名有執受之論文作二解釋之中第二釋云現在五根識不起時非是執受文若依此釋意之時過去有情數所造色與現在無執受眼等五根豈不爲異熟因哉答見婆沙論處處之文或七十一云復次眼唯有執受色不定文或百四十三云有説若唯是有執受者立根若非及不定者不立文任此等文現在眼等五根唯有執受法故婆沙論百三十七中云謂過去有情數所造色與有執受所造色爲因増上因者二因謂同類異熟欲界身語表無表業及色界身語無表業感現在眼等五根云過去有情數所造色與有執受所造色爲異熟因不云與無執受所造色爲異熟因也但光法師第二釋意云現在眼等五根能依識不起時非有執受故若依此釋意者望彼同分眼等五根雖可有過去有情數所造與現在有情數無執受所造色爲異熟因之義其彼同分眼等五根能依識可依被餘緣障不起許也自未來識不依眼等定類無故婆沙論中不云過去有情數所造色與現在有情數無執受所造色爲異熟因也問品類足論意有執受法爲唯限異熟生爲當可通所長養耶答可通所長養也兩方若唯限異熟生者見品類足論文自體所攝九處名有執受而自體所攝九處是廣何不通所長養哉何況光法師解釋中述品類足論意有執受法可通等流性見若許通等流性者寧可嫌所長養哉若依之爾者婆沙論中明品類足論意云一刹那異熟所攝九處少分名有執受文如此文者彼論意有執受法唯可限異熟生見如何答品類足論意有執受法通不通等流性者依光法師身表業有執受無執受二解釋可定之通所長養云事不可異求之歟其故無異熟生色法離所長養色法住故異熟生眼等九處與心心所法共所執持攝爲依處之時不相離所長養眼等九處與心心所法共所執持攝爲依處之義必然故有執受法不限異熟生亦通所長養云事道理先勿論也故見品類足論十五文云云何有執受謂自體所攝眼處乃至色耳舌香味身觸處亦爾文而自體所攝眼等九處不限異熟生既通所長養故有執受法不限異熟生亦通所長養之旨此文甚分明也但於婆沙論文者一往定判也即彼論百三十八中述品類足論意擧四師説云品類足説一刹那九處少分名有執受識身足説一刹那五蘊少分名有執受有説品類足論身論説一刹那有情數九處少分名有執愛有説二論説一刹那有根所攝九處少分名有執受有説二論説一刹那異熟所攝九處少分名有執受是名差別今此四師説更非相違義各擧一邊門以顯兩論意故一刹那異熟所攝九處少分名有執受云師意全不遮有執受法通所長養也問品類足論意除身表業於餘眼等九處判有執受無執受相與今論意同歟答與今論意同也兩方若與今論意同者婆沙論中述品類足論意云一刹那異熟所攝九處少分名有執受今論意有執受法通所長養思今此寶狹相豈非兩論意異哉若依之爾者披光法師解釋明身表業有執受無執受相以品類足論説對今論文雖作論意各別云釋於眼等九處未云兩論意各別以知兩論意同云事如何答異熟長養眼等五根住現在世并異熟長養色香味觸住現在世不離五根名有執受餘名無執受云事諸論一同之説諸師共許之義故除身表業於餘眼等九處判有執受無執受相品類倶舍兩論意可同也但於婆沙論文者一往定判也即彼論百三十八中述品類足意擧四師説云品類足説一刹那九處少分名執受識身論説一刹那五蘊少分名有執受有説品類足識身論説一刹那有情數九處少分名有執受有説二論説一刹那有根所攝九處少分名有執受有説二論説一刹那異熟所攝九處少分名有執受是名差別今此四師説更非相違義雖且擧一門實可通餘邊故一刹那異熟所攝九處少分名有執受云師意全不遮有執受法通所長養也問有執受法可通五蘊耶答唯限色蘊也兩方若通五蘊者前八界及聲無執受餘二者性相之所定也有執法寧可通五蘊哉若依之爾者披婆沙論百三十八文云此中説内身所攝五蘊名有執受初契經説續衆同分有情數五蘊有執受乃至識身論説一刹那五蘊少分名有執受文此文無諍有執受法通五蘊見如何答有執受法者心心所法共所執持攝爲依處眼等五根扶根四境故唯限色蘊更不可通餘四蘊也故見今論文云眼等五根住現在世名有執受過去未來名無執受色香味觸住現在世不離五根名有執受若住現在非不離根過去未來名無執受文正理論四説顯宗論三文其言雖少異其意全是同加之婆沙論百三十八云若生欲界九處少分是有執受三處全九處少分是無執受三處謂聲處意處法處若生色界七處少分是有執受三處全七處少分是無執受三處如前説文雜心論云餘二者五内界現在是受起斷等知故過去未來是不受心法不住故色香味觸若現在及不離根是受如心心法根中止住彼中亦爾不離根故文任此等文理有執受法唯局色蘊中眼等五根色等四境不通餘受等四蘊事分明也但於婆沙論文者發智論十四云有執受是何義答此増語所顯隨自體法無執受是何義答此増語所顯非隨自體法文隨自體法通内身五蘊故釋此中説内身所攝五蘊名有執受初契經云有執受苦蘊便引生衆苦謂生苦老苦病苦及死苦文有情數五蘊引生生等四苦故釋初契經説續衆同分有情數五蘊名有執受識身足論三云慈緣執受識蘊無量五蘊和合有情數釋識身論説一刹那五蘊少分名有執受也此等經論所説皆合能執受所執受名有執受故有執受法廣通五蘊爲言非謂所執受法通受等四蘊經論之文全無相違也問品類足論説諸表業是無執受今論餘處云表業屬身是有執受光法師會二論相違作二解釋爾者初釋意如何釋之耶進云光法師釋云論意各別文付之品類足論是薩婆多宗本論也今論意何可背本論誠説哉何況見品類足論文云云何有執受謂自體所攝眼處乃至色耳舌香味身觸處亦爾文身表業豈非自體所攝色處哉加之婆沙論中述品類足論意云一刹那有情數九處少分名有執受文而依内起表已顯有情者光法師餘處解釋也定知品類足論意身表業是有執受云事如何答品類足論中明五學處諸門分別云幾有色等者一切是有色幾有見等者一有見四應分別謂若表是有見若無表是無見幾有對等者一切應分別謂若表是有對若無表是無對乃至幾有執受等者一切無執受一切表無表業皆無執受見披今論十三餘處文偈頌云表唯等流性屬身有執受長行述應知有表唯是等流此若屬身是有執受身表業是有執受定故任二論所説相替作論意各別解釋也光法師餘處十三亦作二解釋初釋云解云論者意異難爲會釋即同當卷論意各別初釋意也但於今論意不可背本論誠説云難者論主以理立其宗義不必本論爲定量也次於品類足論自體所攝色處名有執受之文者就不離五根之色處論之身表業依心發故非不離五根之色處故彼論中説無執受也次於婆沙論一刹那有情數九處少分名有執受之文者眼等五根住現在世色香味觸住現在世不離五根一刹那有情數九處少分名有執受爲言雖身表業有情數攝非不離五根之色處故彼論意名無執受也重難云今論意云身表業是有執受者化人所發身表業寧可有執受哉答今論餘處文云屬身有執受據非化身表業論之化人所發身表業無有屬身義更不可名有執受也問品類足説諸表業是無執受今論餘處云表業屬身是有執受光法師會二論相違作二解釋爾者第二釋意如何釋之耶進云光法師釋云或可品類據表暫起猶如客寄名無執受此論業品據多時起得與根合名有執受文付之定有執受無執受相不可據多時起暫時起品類足論十中説五學處一切無執受更不云據暫時起今論餘處十三文述屬身有執受亦不見據多時起何據暫起相續會通二論相違哉何況若據暫起名無執受者散無表能造大種可名無執受也加之婆沙論百三十八中述品類足論意云一刹那異熟所攝九處少分名有執受文思表唯等流性之理設雖多時起身表業不可名有執受見如何答披今論餘處十三文偈頌結表唯等流性屬身有執受長行述應知有表唯是等流此若屬身是有執受身表業是有執受判正理三十五顯宗十八兩論文全亦同之諸論一同之説豈可背品類足論意哉得此道理勘彼論文十五云云何有執受謂自體所攝眼處乃至色耳香舌味身觸處亦爾文身表業既自體所攝色處也定可有執受何況婆沙論百三十八中述品類足論意云一刹那有情數九處少分名有執受文任光法師餘處十三依内起表已顯有情之釋身表業是有情數法故亦可有執受見准此等文理品類足論意存身表業是有執受之義云事炳然也而彼論中説五學處一切無執受文此文甚爲難思依之光法師以此文對今論和會之云品類足論據表暫起説無執受今論業品據表多時起名有執受也據暫起相續會二論相違不局當卷解釋亦出餘處定判故見光法師餘處十三第二釋云又解品類表業據暫起在身猶如客寄心心所法非能執受故云表業是無執受倶舍等論據多時起相續在身心心所法能執受故故云表業是有執受各據一義亦不相違文此釋意云身表業依心發故暫起在身猶如客寄無心心所法共所執持攝爲依處之義故品類足論説無執受多時現起相續在身心心所法共所執持攝爲依處能執受故今論等文名有執受各據一義亦不相違爲言但於若據暫起名無執受者散無表能造大種可名無執受云難者要期受持根本成位現在一念大種能造初後念無表故更無暫起多時起異名有執受身表業中既有暫起多時起不同故暫起名無執受多時起名有執受也次於婆沙論一刹那異熟所攝九處少分名有執受之文者一往定判也彼論中依品類識身兩論意述有執受法體雖有四師説更非相違義故第四有説二論説一刹那異熟所攝九處少分名有執受云師意可許所長養及等流法通有執受故表唯等流性之理全無所背也問品類足論中説諸表業是無執受爾者寶法師可許此説耶答不許之也兩方若不許之者品類足論是薩婆多宗本論也寶法師何不許彼論説哉若依之爾者寶法師餘處十三解釋中不許之見如何答見寶法師餘處十三定判云品類足云諸表業是無執受者多是傳家錯耳若不爾者婆沙及諸論等即應合會釋也文此釋意云本論所説有疑之文末論引之必致會通而婆沙論百三十八中述品類足論意云一刹那有情數九處少分名有執受文身表業既有情數法也定可有執受何況應知有表唯是等流此若屬身是有執受者不限今論所判正理三十五顯宗十八兩論之文全亦同之若有品類足論中説諸表業是無執受之文者此等諸論意存身表業是有執受之時何不引之會通哉爰知品類足論中説五學處一切無執受之文是相傳家錯爲言加之見彼論文十五云云何有執受謂自體所攝眼處乃至色耳香舌味身觸處亦爾文身表業是自體所攝色處也豈不名有執受哉若爾説五學處一切無執受之文是相傳家錯云事自所被推知也重難云品類足中説五學處一切無執受之文定可任梵本何輒釋傳家錯哉次婆家論中述品類足論意云一刹那異熟所攝九處少分名有執受文准表唯等流性之理品類足論意存所表業是無執受見若爾説五學處一切無執受顯彼論實義也更不可云傳家錯哉答問光法師釋心心所法共所執持攝爲依處論文云攝五根爲所依處攝扶根四境爲依處文爾者今此扶根四境者各限自根所攝扶根四境歟答不限自根所攝扶根四境也兩方若各限自根所攝扶根四境者見今論文雖述心心所法共所執持攝爲依處未云限自根所攝扶根四境哉若依之爾者六根六識相望之時所依各別依處亦異攝扶根四境爲依處者可各限自根所攝扶根四境也如何答勘婆沙論二十七文云有作是説若生欲界眼識現在前此識以眼及無間滅意爲依及所依以身根及色香味觸命根衆同分得生老住無常等爲依非所依如眼識耳舌識應知亦爾若身識現在前此識以身及無間滅意爲依及所依以色香味觸命根衆同分得生老住無常等爲依非所依若意識現在前此識心無間滅意爲依及所依爲身根及色香味觸命根衆同分得生老住無常等爲依非所依文此文意眼識現在前位以身根所攝色香味觸等爲依見故知攝扶根四境爲依處者不限自根所攝扶根四境也問論中引入胎經説云彼經復説六觸處故文爾者光法師意取所依六根爲證歟進云光法師釋云此中引意取能依觸非所依處文付之依光法師解釋案論文起盡爲證能造四大種外有所造眼等五根引此經文見若爾任六觸處故之言可云取所依根爲證何釋取能依觸非所依處哉是以泰法師釋此文云彼入胎經復説六根爲六觸故知四大之外別有眼等五根述取所依根爲證之旨若爾光法師釋有疑如何答披論文前後尋所引旨趣云尊者覺天作如是説十種色處唯大種性尊者覺天意存能造四大種外無所造色云義故入胎經中唯説地水火風空識六界名爲士夫之文似順彼師義故論主通之云入胎經中唯説六界爲士夫者爲顯能成士夫本事非唯爾所彼經復説六觸處故又諸心所應非有故文此文意云入胎經中唯説地水火風空識六界爲士夫者爲顯此六初受生時體用強勝能成士夫根本事故實非唯此六界亦可有所造色及心所法彼經雖説六觸亦有餘心所法彼經雖説六界亦可有餘所造色若言彼經説六界即無餘所造色彼經亦説六觸應無餘心所法爲言故光法師釋此文云經雖説六觸然更有餘心所法經雖説六界何妨有餘所造色若言説六界即無餘造色經亦説六觸應無餘心所文此釋意取能依觸心所爲證之旨分明也若取所依根爲證者釋彼經復説六觸處故之文云又諸心所應非有故故文言不連續義理難成立故釋此中引意取能依觸非所依處能順論文始終也泰法師解釋似忘引證本意且不可依用之問論中引入胎經説云彼經復説六觸處故文爾者寶法師意今此六觸處者如何釋之耶進云寶法師釋云彼經亦説色等六觸處故文付之與觸爲所依名之六觸處色等六境非觸所依何可名六觸處哉是以見光法師所引婆沙論文云眼等六處作觸所依義名六觸處文若爾寶法師解釋豈不背婆沙論説哉答尊者覺天意存能造四大種外無所造色云義故入胎經中唯説地水火風空識六界名爲士夫之文似順彼師義故論主通之爲證今此六界之外有所造色及心所法引彼經中説六觸處之文故色等六境中有所造色及心所法故六觸處者名色等六境得意也故寶法師釋此文云彼經説六界者謂四大空識爲成士夫本事士夫非唯爾許亦更有六境及心所故所以得知彼經亦説色等六觸處故文但於色等六境非觸所依何可名六觸處哉云難者色等六境雖非觸所依爲觸所緣境引起彼故名六觸處非無其故歟眼等六根名六觸處云事自本所許更不遮之故光法師所引婆沙論文全非相違也問光法師引婆沙論百三十三有作是説四處能斫四處所斷有餘師説堅性是能斷四處是所斷文對今論説作二解釋爾者第二釋意如何釋之耶進云光法師釋云又解説四能斷據不相離説堅性能斷尅體以論各據一義理并無違文付之今論文云謂唯外四界能斫及所斫婆沙論第二師意説堅性是能斷其義既異何可和會之哉何況見今論文述能燒所稱體偈頌置諍言長行雖擧二説明能斫體唯出一義爰知偏存色等四界爲能斫體之義云事若爾對婆沙論第二師説更不可釋各據一義理并無違如何答光法師能斫所斫體引婆沙論二師異説對今論文作二解釋之中第二釋意述今論説不違婆沙論第二師義之旨和會之趣尤有其謂問難之勢全非深疑凡彼此二文其言雖異探其實義作和會釋者論家人師處處定習也至今此釋何強爲難就中見今論文云能燒所稱有異諍論謂或有説能燒所稱體亦同前唯外四界或復有説唯有火界可名能燒所稱唯重二師所説其旨雖異光法師和會之云能燒所稱有二諍論前約世俗不相離説故言四界後約勝義尅體以論唯火界能燒所稱唯重各據一義理亦無違文准此釋思之今論中云色香味觸成斧薪等此即名爲能斫所斫婆沙論第二師意述堅性是能斷和會之作各據一義理并無違之釋更有何疑哉問論中明能長養緣云飮食資助睡眠等持文爾者寶法師意擧幾緣釋之耶進云寶法師釋云依此論有三一飮食二睡眠三等持文付之論文既云飮食資助睡眠等持定可擧四種緣依之光法師釋此文云一飮食二資助謂塗油等三睡眠四等持謂定文如何答寶法師意論文云飮食資助指飮食即云資助得意故唯擧此三緣歟但於光法師一飮食二資助謂塗油等之釋者任今論現文也既爲別師定判更不可和會之問異熟色根離長養色根住可有耶進云光法師釋云異熟色劣無異熟生離所長養文付之異熟色根其類是廣何無離長養色根住之義哉何況色界有情初受生位不可有能長養四緣定知彼位異熟色根離長養色根住云事如何答異熟色根微劣必與長養色根所護持故無獨住義也故今論云長養相續當能護持異熟相續猶如外廓防援内城文光法師釋此文云異熟色劣無異熟生離所長養故恒長養護持異熟文寶法師釋此文云異熟必有長養文加之正理論五云應知此中長養相續常能護持異熟相續猶如外廓防援内城無異熟生離所長養文婆沙論十三云無異熟生眼離長養眼如人重人如墉重墉長養防護異熟亦爾文任此等定判無異熟色根離長養色根住之義云事甚分明也但於色界有情初受生位不可有能長養四緣云難者有色身位必用資助故色界有情初受生位可有資助緣也故泰法師問答此事云問識支一念身根初起如何得有長養身根答一念根起即有微風鼓撃爲衆具緣故有長養身根而起故下文言外四大爲因故得有聲若初受報無風撃者云何迦延言欲色界衆生定成就聲文重難云見寶法師解釋云依此論有三一飮食二睡眠三等持能長養緣中全無擧資助若依此師意者色界有情初受生位更不可有能長養緣哉答資助一緣可有多類之中飮食者且擧一類也設雖寶法師意飮食之外可有資助緣也問異熟長養眼根可共發一念眼識耶答可共發一念眼識也兩方若共發一念眼識者異熟長養眼根既各別也何可共發一念眼識哉是以光法師餘處解釋中明心心所於所依根有事定云異熟長養等眼別文此釋無諍異熟長養眼根可發各別眼識見若依之爾者見光法師解釋云異熟色劣無異熟生離所長養文若異熟眼根必與長養眼根相雜住者寧不共發一念眼識哉答異熟色根微劣必與長養色根所護持故無異熟眼根離長養眼根住故異熟眼根發眼識時不相離長養眼根必共發之也故今論云長養相續常能護持異熟相續猶如外郭防援内城文光法師釋此文云異熟色劣無異熟生離所長養故恒長養護持長養色勝有離異熟生如無眼耳修得眼耳故婆沙云無異熟生眼離長養眼如人重如人墉重墉長養防護異熟亦爾然有長養眼離異熟生眼如從無眼得天眼者文寶法師釋此文云異熟必有長養自有長養而無異熟如阿那律天眼其阿那律肉眼先失准正理云有所長養離異熟生如修所得天眼天耳准此身在欲界修得天眼耳等皆是唯長養也無同地異熟故文即依今此光寶二師所引正勘婆沙正理兩論現文婆沙論十三云問頗唯有長養眼無異熟生或唯有異熟生眼無長養耶答無異熟生眼離長養眼如人重人如墉重墉長養防護異熟亦爾然有長養眼離異熟生眼如從無眼得天眼者文正理論五云應知此中長養相續常能護持異熟相續猶如外郭防援内城無異熟生離所長養有所長養離異熟生如修所得天眼天耳文任此等定判無異熟眼根離長養眼根住之旨甚分明也若異熟眼根必與長養眼根被防護者共發一念眼識亦必然也故正理論五云異熟生眼離所長養不能爲依發生眼識故生一識是二功能文加之見今論文云眼根極微有時一切皆是同分文正理八顯宗四兩論之文全亦同之若無異熟長養眼根共發一念眼識者何可有有時一切皆是同分之義哉異熟長養眼根共發一念眼識云事旁不可異求之但於光法師餘處異熟長養等眼別之釋者異熟眼根發眼識時長養眼根雖必共發之長養眼根發眼識時異熟眼根不必共發之如彼起天眼通之時生得眼根住彼同分也故婆沙論百五十云問若爾天眼生得眼二倶見色云何不錯亂耶答天眼起時生得眼住彼同分故無有過譬如餘識現在前時雖不見色而眼不斷此亦如是是問何故不倶見耶答以一身中無二識倶起爾時識依天眼不依生得眼故文若爾既有長養眼根獨發眼識故明心心所於所依根有事定云異熟長養等眼別全無相違也問光法師所引婆沙論中明長養眼離異熟生眼云如從無眼得天眼者文爾者無眼人得天眼者可通未至鉢羅奢佉位耶答不通未至鉢羅奢佉位也兩方若通未至鉢羅奢佉位者未至鉢羅奢佉位者是胎中也更不可得殊勝天眼通是以見婆沙論二十四文擧受支位云此位或能令不相似有支相續文若於胎中得天眼通者受支以前位何無不相似有支現起之義哉若依之爾者披發智論十五文出成就此類眼根非此類身根之句云謂生欲界不得眼根設得已失得色界眼文婆沙論百四十九中釋此文云不得眼根者謂未至鉢羅奢佉位等文此文無諍無眼人得天眼者可通未至鉢羅奢佉位見如何答胎中是微劣位無離染義故無眼人得天眼者不可通未至鉢羅奢佉位其旨即如一方疑難何況見婆沙論百二十二文述非成就現在善身表亦非此無表之句云謂處卵㲉及住胎藏中文若於胎中有離染義者豈不成就現在善身無表哉此文意於胎中不離染云事甚分明也但於婆沙論不得眼根者謂未至鉢羅奢佉位等之文者會通此文可有二義或一義云不得眼根者意出未至鉢羅奢佉位及生盲者等言即等生盲者也得色界眼者謂由善習靜慮力故色界眼根依欲界身得而不得彼界身根無成就他界身故者上等言所等生盲者由善習靜慮力故得色界眼根爲言非謂未至鉢羅奢佉位即得天眼何爲相違哉云云或一義云不得眼根者從未至鉢羅奢佉位等不得眼根生盲者也爲言所謂爲異設得已失者謂已得眼根或自然壞或遇緣壞故失之類從未至鉢羅奢佉位等不得眼根生旨者名不得眼根云也是則爲顯受生以來不得眼根之義擧不得眼根之始云未至鉢羅奢佉位等非謂此位即得天眼也云云重難云見光法師餘處九定判釋然此胎子乘宿所爲順後受業所趣難了之論文云然此胎子乘宿所爲順後受於三界五趣所趣難了文泰法師餘處九釋此論文云然此胎子乘宿所爲順後受業三界五趣所趣難了文若胎中死子生上二界者寧無離染義哉是一加之婆沙論百四十四中出無學聖者不成就男女二根之類云及生欲界或本不得或已得而失文若於胎中不得無學果者何可有男女二根本來不得之義哉是二答於胎中不離染云事道理如前重成之也但於光法師餘處於三界五趣所趣難了之釋者正可云欲界五趣所趣難了三界五趣者言總意別也泰法師釋會通同之次於婆沙論及生欲界或本不得之文者有學位中漸命終人失男女二根之後得無學果望今所明無學果云或本不得也非謂胎中得無學果婆沙論今文更非相違哉問非情數法唯限等流性歟答唯限等流性也兩方若唯局等流性者見光法師解釋雖述非情數法不通所長養之旨未云唯限等流性何嫌餘類哉何況光法師所引正理論中非情數法不限等流性見若依之爾者以五類門廣攝諸法盡非情數法唯可限等流性哉答非情數法非前業所感故不可通異熟生非無爲法故不可通有實事同類因生故不可通一刹那云事其義必然不及疑之不通所長養故光寶二師委問答之即光法師釋云問長養通非情不解云不通難云如穀麥等雖無飯食睡眠等持所益而有糞等資助所益如何長養不通非情解云若泛言長養亦通非情糞水等緣能長養故此中言長養者唯是有情勝緣所益外法非情非勝緣益不名長養文寶法師釋云問外無情物何故不説有長養耶如穀麥等答長養對異熟説内有異熟説有長養外無異熟不説長養義力能防異熟故問若有異熟即説長養心心所等亦有異熟因何不説有長養耶答色法可説長瘦令肥心法無形如何長養就別義説亦有長養文任此等解釋亦不通所長養見故非情數法唯限等流性云事文理分明也但於光法師所引正理論説者正見彼論五文云復有餘師此中異説謂一切皆有實事有實相故除無爲法皆一刹那速謝滅故除初無漏心及助伴餘有爲法皆是等流十色少分是所長養十七少分是異熟生由此眼等五内色根各有二種謂所長養及異熟生雖有餘三而無別性義雜亂故所以不説餘皆准此聲界有二五識亦然意意識三色等亦爾法界有四除所長養文以今此有餘師説致其疑歟此師意云雖一切法有實相故皆有實事除無爲法速謝滅故皆一刹那然五類廢立義無雜亂故猶存内五有熟養聲無異熟生等之理眼等五根有所長養異熟生二雖有餘等流性及有實事一刹那三無別體性義雜亂故所以不説有此三類餘法通局相皆准此可思爲言爰知此師意談其義勢許也非謂非情數法實通有實事及一刹那歟問善惡色聲可通所長養耶答不通所長養也兩方若通所長養者披今論餘處文述表唯等流性善惡色聲不通所長養見若依之爾者今論中或云聲有等流及所長養或判餘謂餘四色香味觸皆通三種有異熟生有所長養有等流性廣明色聲通所長養之旨設雖善惡色聲何不通所長養哉答善惡色聲者身語表業也故今論云色界聲界若善不善心力等起身語表攝是善不善餘是無記文而見今論餘處十三文偈頌結表唯等流性長行云應知有表唯是等流身語表業唯限等流性也光法師釋此文述身語表業不通所長養故云無別勝緣故非所長養文此釋意云身語表業偏由能發心力起彼能發心既非能長養故所發身語表業非所長養爲言但於今論色聲通所長養之文者一依身中相續不斷無記色聲非身語表業之類不由別能發心力起只是身中長養大種所發故云色聲有所長養也非謂善惡色聲通所長養何擧今文致疑難哉尋云問論中明聲非異熟云有説聲屬第三傳故文光法師述此師義作二義釋爾者初釋意異熟大種能造聲界歟進云光法師初釋云若相撃時即便生聲異熟大種能造聲界釋也付之聲界既非異熟異熟大種何能造之哉長養等流大種如次可造長養等流聲異熟大種寧造何等聲哉是以論文説聲屬第三傳義云從諸大種緣撃發聲文如次文者異熟大種唯有緣撃發聲義不造聲界見何況光法師述倶舍師破第三傳義云大種造色理實無定此異熟大種所發之聲既非異熟爲是何等若是長養理應用彼長養大造若是等流理應用彼等流大造有何所以異熟大造文如何答論中學聲屬第三傳義故雖由彼生而非異熟謂從諸大種緣撃發聲業爲第一傳從業生大種爲第二傳從業所生大種生聲爲第三傳故光法師初釋意異熟大種能造聲界得意也即釋異熟大種能造聲界云先有異熟大種獨住若相撃時即便生聲不相撃時但有大種文此釋意云先有異熟大種獨住若相撃時此大種便能造聲界爲言異熟大種可有相撃能造二義故也但於聲界既非異熟異熟大種不可造之云難者能造所造其義無定如彼無記大種能造善不善聲有執受大種能造無執受聲等也故正理論五中破第五傳義云此説非理豈不如從無記大種發善惡聲從有執受發無執受從身境界發耳境界如是若從異熟大種發非異熟有何相違是故彼説定爲非理文次於從諸大種緣撃發聲之論文者先有異熟大種獨住若相撃時能造聲界故述異熟大種緣撃發聲之旨也全非簡能造之義何爲相違哉次出倶舍師破第三傳義之釋者論主意存第五傳義破第三傳義故倶舍師致此難破也若存第三傳義之家會通之趣准前可思問論中明聲非異熟云有説聲屬第三傳故文光法師述此師義作二解釋爾者初釋意現在世可有獨住異熟大種耶進云光法師釋云解云先有異熟大種獨住文付之四大種者是能造性現在必可有所造色何判先有異熟大種獨住哉是以披婆沙論處處之文或百三十二云若成就現在大種彼現在所造色耶答如是設成就現在所造色彼現在大種耶答如是以非現在大種無果故亦非現在所造色無因故文或百二十八云若成就大種彼所造色耶答諸成就大種彼成就所造也文任此等文現在世無獨異熟大種見如何答論中擧聲屬第三傳義云有説聲屬第三傳故雖由彼生而非異熟謂從彼業生諸大種從諸大種緣撃發聲文此師意云業爲第一傳從業生大種爲第二傳從業生大種發聲爲第三傳也光法師就此師義作二解釋其中初釋云先有異熟大種獨住若相撃時即便生聲不相撃時但有大種文此釋意云異熟生法無有間斷聲隨欲生有間斷故既有異熟大種獨住若相撃時即發生聲不相撃時但有異熟大種獨住爲言乘此解釋問若爾應有現在大種無所造色答之云許亦無失引正理論第二十卷解四大種所造色非倶有因中云謂有成就諸所造色非四大種或有成就能造大種非所造色之文爲證云准彼論文故知亦有成能造大非所造色文文意顯也但於婆沙論以非現在大種無果故亦非現在所造色無因故之文者光法師即引此文問難之作二解釋會通之初釋云論意各別無勞會釋第二釋云或可亦不相違婆沙從多分説若不爾者如受戒時初念懸造未來世戒豈得成彼未來戒耶也次於婆沙論諸成就大種彼成就所造色之文者無成就大種全不成就所造色之類故云爾也非謂成就大種必成就此大種果所造色故見次下文云有成就所造色非大種謂諸聖者生無色界擧成就所造色全不成就大種之類即此意也重難云見光法師餘處定判釋唯欲界繋初刹那後所有無表從過大生之論文作三解釋之中一具四大造諸念無表即於此時別有一具四大造彼後念諸無表色云第二釋意會婆沙論以非現在大種無果故亦非現在所造色無因故之文云從多分説故據造有對故若言通無表者論説亦非現在所造色無因故豈有第二念現在所造無表有間時能造大因以此故知據有對説文此釋意無諍有對色能造大種無獨住義爲言若爾與今解釋豈不相違也答欲界無表能造大種許有獨住之釋中聲界能造大種獨住有無可有二意也餘處從多分説故之釋同當卷婆沙從多分説之意聲界能造大種許有獨住據造有對故之釋聲界能造大種不許獨住也從多分説故據造有對故者各別解釋也何以據造有對故之釋混雜從多分説之義哉重難云現在有對色能造大種必可有現在所造色有獨住異熟大種云事猶未散疑懷若無分明證據者甚以難信哉答勘泰法師釋云一具四大種唯造一極微故知聲屬第三傳造聲異熟四大更不造餘異熟色香味觸未發聲時此異熟四大任運恒起而無造色故發智云有成就四大不成就色也若言聲異熟四大更生餘四大發聲者便有無窮過若撃長養等流四大別發聲者自屬第四第五傳也文現在世有獨住異熟大種云事此釋尤炳然也光法師初釋源從此起歟觀同意解釋可爲其潤色也重難云泰法師釋還招不審披發智十三文或云或成就大種彼所造色耶答諸成就大種彼定成就所造色有成就所造色非大種謂諸聖者生無色界文或云若成就現在大種非現在所造色耶答如是設成就現在所造色彼現在大種耶答如是文任此等文雖説成就大種定成就造色之旨未見有成就四大不成就造色之文泰法師所引其説在何處哉答泰法師釋實有其疑發智論中全無所引之文何況見光法師釋云撿尋婆沙上下論文全無此説有成就能造大種非所造色文發智論若有此文者婆沙論何無此説哉推之云發智是展轉書寫之謬歟可云正理也問論中明聲非異熟云有説聲屬第三傳故文光法師述此師義作二解釋爾者第二釋意異熟大種能造聲界歟進云光法師第二釋云據緣生邊説聲第三異熟大種不造聲界釋也付之見今論文説聲屬第三傳義云謂從彼業生諸大種從諸大種緣撃發聲業爲第一傳從業生大種爲第二傳從業所生大種生聲爲第三傳爰知異熟大種能造聲界云事若異熟大種不造聲所長養等流大種能造聲界者與第四傳第五傳義有何差異哉答見光法師第二釋云又解云現在無有異熟大種無所造色前引婆沙極分明故既言以非現在大種無果故故知無有現大獨住既言以非現在所造色無因故故知無有現所造色獨住文此釋意云婆沙論百三十三以非現在大種無果故亦非現在所造色無因故之文現在無諸大種獨住云事甚分明也若異熟大種能造聲界者異熟生法無有間斷聲隨欲生有間斷故現在可有異熟大種獨住而現在無諸大種獨住故知異熟大種不造聲界爲言光法師即就此釋自起問難云問若言此聲無先獨住異熟大造是何大種若謂此大種聲有即有聲無即無應異熟色斷已更續有違宗過若謂即以造身根等異熟大造一四大種造二有對色還有違宗若謂造身根等異熟大種爲緣撃發生聲據緣義邊説大第二次復聲起説聲第三以實此聲隨其所應長養等流大種所造若作此解雖無有失何異第四第五傳家既非用彼異熟大種何須別説第三傳耶文思此問難意業爲第一傳從業生造身根等異熟大種爲第二傳從此異熟大種爲緣撃發生聲爲第三傳理實此聲隨其所應長養等流大種所造異熟大種不造之故故無異熟色斷已更續過亦無一四大種造二有對色過云也但於異熟大種不造聲界長養等流大種能造聲界者與第四傳第五傳義有何差異哉云難者光法師何異第四第五傳家之今問難即此意也自答此問云解云異熟大種雖非親能造彼聲界據緣生邊説聲第三亦無有失文此釋意云造身根等異熟大種雖非親能造彼聲界據爲緣撃發生聲之義邊説聲爲第三傳也爲言此釋意專依從諸大種緣撃發聲之論文歟理實此聲長養等流所造之方雖同第四傳第五傳義第四傳第五傳義偏約能造大種生聲論之不談望異熟大種爲緣撃發生聲説聲爲第三傳之旨故據緣生邊説聲第三之釋意異第四傳第五傳義也重難云正理論五中救第三傳義云豈不如從無記大種發善惡聲從有執受發無執受從身境界發耳境界如是若從異熟大種發非異熟有何相違文如此文者第三傳義意異熟大種能造聲界見依之光法師述倶舍師破第三傳義云大種造色理實無定此異熟大種所發之聲既非異熟爲是何等若是長養理應用彼長養大造若是等流理應用彼等流大造有何所以異熟大造所破義意存異熟大種能造聲界定致此難破若所破義意云異熟大種唯有相撃發聲之義不造聲界長養等流大種能造聲界者倶舍師今難破是立已成更不可爲能破哉答大種生聲有撃發能造二義故正理論如是若從異熟大種發非異熟之文可含此二義故光法師二釋意何不可違正理論文也次於倶舍師破第三傳義之釋者且就異熟大種能造聲界云初釋意致此難破故所破能破其義符順也私示據緣生邊説聲第三之釋意未辨其深旨造身根等異熟大種所撃發聲隨其所應長養等流大種所造者其能造長養等流大種於此所造聲亦有撃發義哉如此之事頗爲不審而宗性自去七月上旬之比依相似發心遁栖息於本寺之月忍祖師遺跡卜閑居於當山之風之間未對明師據此愚矇仍以書札相尋聖禪擬講之處彼返状云光法師第二解意不許獨住異熟大種異熟大種相續不斷法故此相續異熟大種可有相撃不相撃二時不同若相撃時雖爲緣生聲無獨住義故不能造聲長養等流大種有間斷故隨其所應與聲倶起可能造之其能造長養等流大種與異熟大種共可相撃發聲其中異熟大種相撃雖爲疎能作因發聲不爲生等五因長養等流大種親撃發聲可爲生等五因也重意云異熟大種不間斷法聲間斷法故若不間斷異熟大種造間斷聲者聲未發時彼異熟大種可獨住故不許獨住異熟大種之釋意造身根等異熟大種相撃雖爲疎緣發聲一四大種不造多有對色故不造聲界云也所存之旨如此而已文弘長二年壬戌中冬十日午時於海住山十輪院記之沙門釋宗性問光法師釋從諸大種緣撃發聲論文作二解釋中第二釋意云據緣生邊説聲第三文爾者異熟大種撃發聲時不相離長養大種共撃發之歟答共撃發之也兩方若共撃發之者異熟長養二類大種既各別也何可共撃發一聲哉若異熟長養大種共撃發一聲者以何故可名異熟大種所撃發生哉何況光法師餘處七解釋中異熟長養眼根可發各別眼識見相例可同若依之爾者異熟長養大種相雜不離異熟大種撃發聲時不相離長養大種豈不共撃發之哉答異熟長養大種相雜住故異熟大種撃發聲時不相離長養大種定可共撃發之如彼異熟眼根發眼識時不相離長養眼根共發此一念眼識但於異熟長養大種共撃發一聲者以何故可名異熟大種所撃發聲哉云難者以實云之異熟長養大種雖共撃發一聲爲成聲屬第三傳義望異熟大種所撃發邊名異熟大種所撃發聲也次於光法師餘處解釋中異熟長養眼根可發各別眼識見云例難者起天眼通之時長養眼根獨發眼識異熟眼根不發眼識故明心心所於所依根有事定云異熟長養等眼別也全非遮異熟眼根發眼識時不相離長養眼根共發此一念眼識故更不可爲相例之難重難云若異熟長養大種共撃發一聲者二類大種相望寧不爲倶有因哉答二法同爲同類等一因之時得一等流等果故所爲倶有因也而異熟長養大種雖共撃發一聲同爲能作因得一増上果故不可爲倶有因若同得一増上果同一果故爲倶有因云者眼等五根色等五境爲所依所緣共發眼等五識之時五根五境豈可爲倶有因哉爰知同一果故爲倶有因者就二法同爲同類等一因得一等流等果論之云事問正理論中明聲非異熟云有餘師説聲非異熟如何異熟大種所生故應許聲屬第四傳或第五傳故非異熟文光法師約此文作二解釋爾者第二釋意如何釋之耶進云光法師釋云又解此師別爲一解文付之聲有等流及所長養者性相之所定也明知長養大種造長養聲等流大種造等流聲云事若爾第五傳師意實亦可許第四傳義何釋別爲一解哉答光法師作二解釋中初釋意即存疑難趣故光法師釋聲屬第五傳義云此師意説長養大種造長養聲等流四大造等流聲故許説有第四第五傳聲非異熟故非異熟大造故不許有第三傳也故正理五述第二師解云有餘師説聲非異熟如何異熟大種所造故應許聲屬第四傳或第五傳故非異熟謂從業生異熟大種從此傳生長養大種此復傳生等流大種長養大種發長養聲等流大種發等流聲文初釋所存其旨如此而第二釋意云見今論文擧聲屬第五傳義云有説聲屬第五傳故雖由彼生而非異熟謂彼業生異熟大種從此傳生長養大種此復傳生等流大種此乃生聲唯述等流大種生聲之理不云長養大種生聲故正理論長養大種發長養聲之文今論説外別爲一解爲言重難云長養聲定可長養大種所造今論所説第五傳義意何不許長養大種生聲哉答第五傳義意聲界非異熟故非異熟大種所造云許也長養大種造長養聲云事光法師二釋意同可許之而第二釋意以實云之長養大種雖造長養聲立第五傳義之日且隱長養大種造長養聲之門顯談等流大種造等流聲之邊也故光法師釋從此傳生長養大種之論文云從此異熟邊復有造身根等長養大種爲第三傳文既造身根等長養大種故非聲界能造之理炳然也加之婆沙論百十八中明聲非異熟云復有説者聲屬第五傳謂初業生異熟大種異熟大種生長養大種長養大種生等流大種從此等流大種生聲聲屬第五故非異熟果文此文亦述等流大種生聲之旨不云長養大種生聲也而正理論中云故應許聲屬第四傳判長養大種發長養聲顯許第四傳義明説長養大種發長養聲故對今論此復傳生等流大種此乃生聲之文釋又解此師別爲一解也重難云光法師第二釋意今論所説第五傳義意實許長養大種造長養聲云者與初釋意有何差異哉答第五傳義意長養大種造長養聲云事光法師二釋意雖同許之而釋意云理亦應許有第四傳而不説者略而不説或可影顯或長養聲雖於一處而有間絶若據一身諸支節中輪環不絶説非異熟其理稍穩故不説之若等流聲有全間斷説非異熟於理稍顯偏約此明論文亦可説有第四傳義爲言第二釋意以實云之長養大種雖造長養聲立第五傳義之家正不顯説第四傳相云也重難云第二釋意今論所説第五傳義意實許長養大種造長養聲云者有何故論文不説此旨哉答立第五傳義之源爲成聲非異熟也而長養聲一依身中相續不斷非異熟義頗以難顯等流聲界一依身中有全間斷非異熟義其相甚明故偏約此説聲非異熟義不云長養大種造聲也寄或長養聲雖於一處而有間絶等之釋意可思之歟問今論文云若爾身受從業所生大種生故應非異熟文爾者光法師意破何師義耶進云光法師釋云此論雖有兩説論主意存後師破初師云文付之依光法師釋披今論現文擧第三傳第五傳二師説畢致此難破明知二師説倶破之云事依之寶法師釋云倶舍破兩師故於第二説後破也文若爾光法師解釋似不順論文如何答見今論能破文云若爾身受從業所生大種生故應非異熟若受如聲便違正理文既以異熟身識相應受緣業所生大種起雖第三傳而是異熟爲所例致難破故思能破意趣破第三傳義之旨甚分明也故光法師釋此云此論雖有兩説論主意存後師破初師云若説此聲從業所生大種生起屬第三傳故非異熟者身識相應受從業所生大種生故謂業爲第一傳異熟大種爲第二傳由此大種生身受爲第三傳身受同聲倶第三傳應非異熟若受如聲非異熟者便違正理以宗説受通異熟故文泰法師釋此文云論主破前第三傳若爾身識相應受緣業所生異熟大種觸入生故身受亦是第三傳故應非異熟若身識相應受如聲非異熟便違薩婆多正理也文兩師定判其意是同定知深探論主所存云事何況正理論五中擧第三傳義云雖由業感而非異熟以聲起在第三傳故謂從彼業生諸大種從諸大種緣撃發聲畢乘之致若爾身受因業所生大種發故應非異熟之難救之云此難不然非諸身受皆因大種及因業生大種所發亦非一切皆是異熟然諸身受亦非業所生大種及非大種而得生故謂身受起要假身觸身識等緣由此亦緣外大種起非要待業所感大生於理無違故通異熟還即成第三傳義故元瑜法師釋正理問難文云身受亦依異熟大種所發屬第三傳應非異熟謂有身受由覺異熟生大種境故發文以正理難答按倶舍能破云第三傳義云事亦炳然也加之光法師引正理論救述倶舍師破畢云初師既破後師還立云云泰法師引正理論全文畢云世親論主破第三傳存第五傳正理論師救第三傳成立第四第五總立聲屬第三第四第五傳云云諸師一同之釋誰可異求之哉但於今論中擧第三傳第五傳二師説畢致此難破云難者一相先擧二師異説還破初師存後師義有何相違哉次於寶法師解釋者既背此等文理存光法師釋之時更不可依用之重難云就今論文有疑異熟眼等五根色香味觸四境業所生大種所造雖第三傳而是異熟以之爲例難可破第三傳義何煩以異熟身識相應受緣業所生大種起爲例難破之哉答元瑜述文記五法師釋正理論若爾身受因業所生大種發故應非異熟之文問答此事云問此中何故不擧眼等爲難解云眼等相續起義非例聲身受間斷故擧爲難文准此釋可思之就中雖可異熟眼等五根色等四境亦爲所例身識相應受以爲所例其難既足何可悉擧之致難破哉問正理論文云豈不如從無記大種發善惡聲等文爾者光法師如何釋之耶進云光法師釋云又正理論救第三傳文付之依光法師解釋披正理論五現文上述聲屬第五傳義云有餘師説聲非異熟如何異熟大種所生乃至長養大種發長養聲等流大種發等流聲下乘此師義難此説非理豈不如從無記大種發善惡聲從有執受發無執受從身境界發耳境界如是若從異熟大種發非異熟有何相違是故彼説定爲非理文相起盡無諍破第五傳義見依之寶法師釋云正理破後師文若爾光法師釋尤似難思如何答第三傳家難成立者異熟大種發非異熟聲之義也故第五傳家不許此義異熟大種不能發聲長養大種發長養聲等流大種發等流聲爲言而正理論中難此義云此説非理豈不如從無記大種發善惡聲從有執受發無執受從身境界發耳境界如是若從異熟大種發非異熟有何相違是故彼説定爲非理述異熟大種發非異熟聲無其相違之旨故還爲成立第三傳義故光法師得此深意云又正理論救第三傳云引豈不如從無記大種發善惡聲等之文也重意云翻光法師既破初師後師還立之釋思之後師既破初師還立故以正理論中破第五傳義之文釋救第三傳尤有其謂歟但於寶法師解釋者正理論今文破第五傳義得其面之旨光法師意自本所存故寶法師釋全非相違也問今論文云若爾身受從業所生大種生故應非異熟文爾者寶法師意破何師義耶進云寶法師釋云倶舍破兩師文付之依寶法師釋思能破文意以異熟身識相應受緣業所生大種起雖第三傳而是異熟爲所例破聲屬第三傳故非異熟之義見何釋兼破第五傳義哉是以光法師釋云此論雖有兩説論主意存後師破初師云文若爾寶法師釋甚以難思如何答見今論文擧第三傳第五傳二師説畢云若爾身受從業所生大種生故應非異熟若受如聲便違正理文既述二師説畢致此難破故任論文相順云倶舍破兩師也故披寶法師解釋或云又詳論意正理破後師倶舍破兩師正理存前師故於前師後破倶舍破兩師故於第二説後破也及身受之難正破前師亦兼後師欲存聲通異熟故文或云又證緣撃發非是造義故知第二師義違婆沙正義由此正理論破而不立第一師義不違婆沙論主意不許故兩師同破許聲是異熟生故文按此等解釋旨趣論主意存聲通異熟故第五傳義兼爲所破爲言然而正破第三傳義故以異熟身識相應受緣業所生大種起雖第三傳而是異熟爲所例致難破全非相違但於光法師解釋者人師異釋也不可和會之重難見今論文偈頌結聲無異熟生長行述聲有等流及所長養無異熟生所以者何隨欲轉故倶無置傳説之言明知論主意即存此義云事寶法師得何證據釋論主意存聲通異熟之義哉答今論中明聲無異熟生義雖不置傳説之言若爾身受等之難第三傳第五傳二師義倶破之得意故論主意存聲通異熟之義准知也若有論主意存聲通異熟之文者光法師何釋此論雖有兩説論主意存後師哉問寶法師依正理論意可許聲屬第四傳第五傳義耶答可許第四傳第五傳義也兩方若許之者見寶法師定判正理破後師文以知不許第四傳第五傳義云事若依之爾者寶法師解釋中述正理論意云異熟長養等流大種皆能發聲非唯異熟文如此釋者可許第四傳第五傳義見如何答正理論意會今論若爾身受從業所生大種生故應非異熟若受如聲便違正理之難存第三傳義故述異熟大種發非異熟聲遁其例難之旨成立第三傳義畢之上可許第四傳第五傳義也故寶法師云然正理論意異熟長養等流大種皆能發聲非唯異熟泰法師釋正理論師救第三傳成立第四第五總立聲屬第三第四第五傳即此意也但於正理破後師之釋者不許第三傳義唯存第四傳第五傳邊之家正理論師今破不許之爲言專存第三傳義之上兼可許第四第五傳邊也問論中明聲非異熟云有説聲屬第五傳故文爾者寶法師依今此第五傳義意可許長養大種造聲界耶答可許長養大種造聲界義也兩方若許此義者論中擧聲屬第五傳義云謂彼業生異熟大種從此傳生長養大種此復傳生等流大種此乃生聲文如此文者長養大種不造聲界見何況寶法師難第五傳義或引婆沙論百二十七評家總説此聲一切身支大種所造乃至現見此等擧身掉動故之文云准此論文既擧身掉動因何異熟長養不掉動耶若亦掉動因何相撃不生聲耶要須傳生等流大種文或引婆沙論九十應作是説生欲色界有情身中四大種在一身内有相撃者便發生聲不相撃者即無聲起雖一身中必有聲界非諸身分皆遍發聲之文云准此因何異熟長養無相撃時要須傳生等流大種文第五傳義意許長養大種造聲界義者豈可致此難哉若依之爾者長養聲定可長養大種所造設雖第五傳義意何不許長養大種造聲界義哉答第五傳義意兼許第四傳邊故可云長養大種造長養聲也故正理論中明聲非異熟云有餘師説聲非異熟如何異熟大種所生故應許聲屬第四傳或第五傳故非異熟謂從業生異熟大種從此傳生長養大種此復傳生等流大種長養大種發長養聲等流大種發等流聲文寶法師意寧可背正理論説哉凡寶法師意聲屬第三傳第五傳者是相撃發聲之義非能造所造之門存也故見寶法師解釋或云然正理論意異熟長養等流大種皆能發聲非唯異熟此是撃發生聲非是造義諸徳多將此論存後師釋及撃發生以爲造者竝不得論意若謂後師爲正因何異熟大種相撃不發於聲唯等流大種撃發生聲文或云又證緣撃發聲非是造義故知第二師義違婆沙正義由此正理論破而不立第一師義不違婆沙論主意不許故兩師同破許聲是異熟生故又諸徳多説聲屬第三傳異熟大種造長養等流聲此亦非理若以造義名爲第三者造餘異熟色等亦是從業生大種大種造色等亦是第三應非異熟又若異熟大種能造聲者此造聲大種若如餘異熟色相續在身即聲無而有大種即違婆沙一百三十二云若成就現在大種彼現在所造色耶答如是設成就現在所造色彼現在大種耶答如是以非現在大種無果故已上論文若聲無而有大種此即大種無其果也若此異熟大種隨聲有無此即如聲間斷應非異熟文按此等解釋意聲屬第三傳第五傳者是相撃發聲之義非能造所造之門故依以非現在大種無果故之文任如聲間斷應非異熟之理第三傳義意者異熟大種不造聲界據撃發邊説聲第三爲言故重結釋云准上道理一切聲皆無異熟大種造也長養大種造等流色道定共戒定長養大造故長養四大造長養聲等流四大造等流聲無文證二互相造故一切業聲皆是等流等流大造非餘造故文既云長養四大造長養聲故第五傳義意許長養大種造聲界義云事必然也但於今論等流大種此乃生聲之文者且顯第五傳相非簡第四傳邊次於寶法師二段解釋者據相撃發聲邊施設第三傳第五傳義得意之時第五傳義意何不許異熟長養大種撃發生聲哉難也非約能造所造之門致此難破疑難之趣不辨釋意歟問寶法師意長養大種能造聲界歟答能造聲界也兩方若能造聲界者寶法師餘處二十二解釋中引正理論六十撃異熟生長養大種引等流性風大種生鼓動齒唇舌腭差別由此勢力引起未來顯名句文造色自性之文云准上論文異熟大種長養大種唯是撃鼓不是造聲唯等流大種造業聲文如此釋者長養大種不造聲界見若依之爾者長養聲定可長養大種所造設雖寶法師意何不存此義哉答聲界既通所長養故長養大種能造長養聲云事道理必然也故正理論中明聲屬第五傳義云長養大種發長養聲等流大種發等流聲文寶法師意寧可背正理論説哉何況見寶法師解釋云長養大種造等流色道定共戒定長養大種造故長養四大造長養聲等流四大造等流聲無文證二互相造故一切業聲皆是等流等流大造非餘造故文寶法師意存長養大種能造聲界之義云事此釋亦分明也但於寶法師餘處解釋者長養大種能造聲界者唯造長養聲無造等流聲而正理論文云發語風者謂有別風是欲爲先展轉所引發語心起所令増盛生從臍處流轉衝撃異熟生長養大種引等流性風大種生述語表業聲是等流性故異熟長養大種雖相撃發不能造之唯等流大種能造此聲之旨故寶法師引此文釋准上論文異熟大種長養大種唯是撃鼓不是造聲唯等流大種造業體也此釋既順文理何浪致其疑哉去仁治元年窮冬之候於東大寺尊勝院被行倶舍三十講之時良忠法師對聖禪法師致此問難此事頗雖非指不審思出往事之次右筆記之而已問寶法師依正理論意無表色能造大種可許獨住義耶答不許獨住義也兩方若許獨住義者寶法師餘處十三解釋中依正理論説無表色能造大種無獨住義之旨釋成若依之爾者披寶法師解釋就有人所引正理論第二十卷謂有成就諸所造色非四大種或有成就能造大種非所造色之文問若成就造無表業大種而不成就無表色者豈非現在大種無果耶答據無對色説不據有對造色説若不爾者即違現在大種必有果也造色必有因四大必有果同世者據有對色如此釋者正理論意無表色能造大種可許獨住義見如何答勘寶法師餘處十三解釋引正理論謂欲界所繋初念無表與能生大種倶時而生此大種生已能爲一切未來自相續無表生因之文爲證述准此即是此前能生初念無表大種能乃一切未來自相續無表色生因無表生因即是造義如光法師初釋成欲界初後念無表一四大種所造之旨故無表色能造大種無所造色獨住之義不許之也但於寶法師此據無對造色説不據有對造色説之釋者欲界初後念無表一四大種所造故以實云之無表色能造大種雖無所造色獨住之義初念無表現在前位以彼能造大種望其所造未來無表見之有成就能造大種非所造色之義故正理論或有成就能造大種非所造色之文據無對造色説會也故光法師餘處十三欲界初後念無表一四大種所造之初釋意會正理論今文云言有成能造非所造色者此據初念造後無表初念定成彼能造大故言有成就能造大種爾時雖造未來無表由未成故故言非所造色文寶法師當卷解釋准之可思也問婆沙論意聲通異熟者可有何過耶進云婆沙論云應離三界染時方斷文付之無色界中無有聲界設雖聲通異熟何有應離三界染時方斷之義哉是以眼等色觸二境雖通異熟全無離三界染時方斷之義如何答見婆沙論文述諸聲非異熟果有九箇異説之中第六有説云復有説者離初靜慮染時語表便斷若是異熟者應離三界染時方斷文此釋意云離初靜慮染時一切語表皆斷盡之於上三靜慮所起語表隨能發心初靜慮攝故離初靜慮染第九無間道位緣縛斷故方斷之也而異熟生法無有生他地容現在前義故聲若道異熟者於上三靜慮所起語表即上三靜慮攝離欲色二界染時應方斷之爲言三界者一點判也可云二界而已是則禪那院珍海已講之義趣也彼婆沙論抄出中被記此旨可引見之寫本云弘長二年壬戌極月五日申時於海住山十輪院抄之了去後七月二十二日始此清書至窮冬天今日今時終其微功論義之數依過百條結集之次分之兩帖少僧宗性不圖離別本寺不期移住當山以降自秋初乃冬季長夜之眠彌深臨老衰添耄氣長日之勤悉怠就中羊腸風冷白雪常降龜首氷結紫毫稍滯然而被引多年餘執記錄倶舍問端捧此所生惠業奉資春日大明神之法樂依此修學善因必遂上生兜率天之願望而已右筆華嚴宗末葉法印權大僧都宗性年齡六十一夏﨟四十九大永二年極月二十六日依爲毎月講脇論義連之書寫功了爲當座闕處據之任愚筆時時染墨間定有訛謬可繁多加後見人爲佛法傳持令直之給每每不厭耻辱畜一札事偏寄微學拙者志也仰者垂哀納給南無三世覺母大聖文殊師利菩薩法師興定生年二十五
