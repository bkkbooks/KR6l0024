body:
  text: 倶舍論第四卷抄上問題問論文云今應思擇一切有爲如相不同生亦各異爲有諸法決定倶生文光法師釋此文作二解釋爾者初釋意爲一箇問歟問論文云謂一切法略有五品文爾者今此色心等五品法外可有餘法歟問頌文云欲微聚無聲文爾者立微聚名爲唯限八事倶生爲當可通九事十事等歟問正理論意立微聚名爲唯限八事倶生爲當可通九事十事等耶問光法師解釋中云發智言成就據一身中相續不斷文爾者一相續身中等流聲不間斷歟問寶法師意四大種不相撃發聲義可有歟問念法師意一相續身中恒成就聲歟問泰法師意一相續身中一切四大種皆遍發聲歟問正理論意四大種體増者爲有多體故名體増爲當増強故名體増歟問光法師解釋中云正理論師以世親論主造勝義諦論中叙用増家破遂不認此解文爾者爲世親論主破用増義爲當正理論師破用増義歟問婆沙論中可有四大種用増義耶問寶法師意四大種體増用増義倶盡理説歟問微聚中撃發電炎由何法耶問光法師意色界微聚可有五事倶生義耶問光法師引婆沙論説明心所諸地法相爾者大煩惱地法中不説惛沈故如何釋之耶問經部宗中可有計十大地法心所實有義耶問論中明輕安心所云如何可立此爲覺支文爾者於餘覺支可有身心差別耶問光法師述經部宗義云由入定故身中即有輕安風起能引覺支心輕安故文爾者今此能引所引可同時歟問正理論意以欣厭心所可立大善地法耶問善心現前位必可起欣厭隨一耶問寶法師意惡作心所爲唯自力起爲當可通隨從起耶問寶法師意睡眠心所爲自力起爲當隨從起歟問本論所説十大煩惱地法中心亂以何爲體耶問本論所説十大煩惱地法中無明望十隨眼中無明時其體可同耶問光法師意依幾義建立少煩惱地法耶問寶法師意以大煩惱地法大不善地法心所不立小煩惱地法故如何釋之耶問貪嗔二惑可倶起耶問小煩惱地法十種心所聖者悉起之歟問小煩惱地法十種心所北州悉起之歟問小煩惱地法心所中歡行轉煩惱等流不與歡行轉受相應類可有耶問大善地法心所爲自力起爲當隨從起歟問光法師意睡眠心所爲自力起爲當隨從起歟問光法師明睡眠心所自力隨從相作四解釋爾者第二釋意睡眠心所與不共無明相應歟問今論意不共無明唯限見所斷歟問光法師所引正理論文云然此惡作通善不善不通無記隨憂行故離欲貪者不成就故文爾者離欲貪者不成就故者釋上隨憂行故歟問惡作心所唯與憂根相應歟問雜心論意無記惡作與憂根相應歟
