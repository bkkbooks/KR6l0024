body:
  text: 倶舍論第二十四卷抄上問題問聖者斷欲界修所斷一二品惑未斷第三品惑前可有死生義耶問斷欲界修所斷六品惑者可名家家聖者耶問利根起定聖者斷欲界修所斷上上品煩惱無間道位於欲界二生可得非擇滅耶問不起定聲聞中斷欲界修所斷煩惱加行道位於三界一切生得非擇滅類可有耶問一來果聖者欲界七生中除二生於餘五生得非擇滅義可有耶問光法師意不受三二生前可名家家聖者耶問異生位可有分離染命終義耶問生無色界聖者可有分離染命終義耶問論中明家家聖者受生縁云以有増進於所受生或少或無或過此故文爾者光法師意斷欲界修所斷三四品惑位受一生半生人或少類歟問論中明家家聖者受生縁云以有増進於所受生或少或無或過此故文爾者寶法師意或過此故者唯限上流聖者歟問論中述聖者斷欲界修所斷煩惱相云以斷第五必斷第六文爾者退不退二類倶可有必斷第六義耶問天家家聖者可有天中得道義耶問寶法師意正理論中三二生家家者説極多家家聖者歟問光法師意可有受一生家家聖者耶問光法師意凡位斷欲界七八品惑人入聖後未起彼能治無漏道時可名不還向聖者耶問寶法師意依根本地入見道人可成欲界修惑能治無漏耶問先離欲染入見道人至第十六心證不還果位可總集欲界修惑無爲耶問從欲界生欲界中有位可有般涅槃類耶問論中明中般涅槃聖者相云謂往色界住中位便般涅槃文光法師釋此文作二解釋爾者初釋意今此涅槃者唯限無餘涅槃歟問中般涅槃聖者可起未至中間聖道耶問正理論意有行般無行般人得涅槃時可有遲速不同耶問半超中唯受二生類可有耶問寶法師所引婆沙論中於生第二靜慮以上上流聖者判全超等有無擧三師異説爾者第三師意全超等三類可攝一切上流聖者耶問寶法師所引婆沙論中於生第二靜慮以上上流聖者判全超等有無擧三師異説爾者爲唯望上地論之爲當兼望上下地論之歟問寶法師所引正理論中云大梵所居非是別處即是第二梵輔天攝文爾者大梵天不梵輔天攝者可有何過耶問雜修靜慮生無雲天人可成彼定耶問光法師意非想地可有上流聖者耶問中般生般生般上流聖者如何相配上中下三根耶問論中付明七善士趣相且上流中可分全超等三類耶問欲界經生聖者可生上界耶問欲界經生聖者起聖道後可有受生義耶
