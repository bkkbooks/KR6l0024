body:
  text: 倶舍論第十卷抄上問寶法師意明無明十二處攝歟答十二處攝也兩方若十二處攝者寶法師釋無明何義謂體非明若爾無明應是眼等等之論文云眼等六根色等六境文如此釋者明無明非眼等六根色等六境攝見若依之爾者以性相思之明無明寧非法處攝哉答明者無漏慧無明者愚痴故十二處中法處攝云事更不可疑之但於寶法師眼等六根色等六境之釋者其體非明非無明法通眼等六根色等六境故若體非明法名無明者眼等六根色等六境應名無明難也更非遮法處一分有明有無明歟何況正勘寶法師解釋云若體非明名曰無明眼等六根色等六境除無漏明竝體非明應名無明文既云眼等六根色等六境除無漏明故無漏明者十二處攝之旨甚分明也何隱一具文致其疑哉問論中釋無明體擧多異説爾者論主正解意如何釋之耶進云今論云明所治無明文付之貪等煩惱皆明所治故以明所治義難顯無明別體哉答泛論之者貪等煩惱雖爲明所治明無明是敵對相翻法以明所治無明爲本故云明所治無明之時能顯無明別體也問論主意可存無明實有義耶答不存無明實有之義也兩方若存無明實有義者論主意專明經部宗義何可許無明別體哉是以光法師解釋中論主意不存無明實有之義見若依之爾者披光法師一段定判釋爲顯有體義不濫餘之論文云前二有過論主正解顯無明有體無非有過解誰復能遮自所分所然異慧類別有無明如食異心此説爲善之論文述論主非經部師許取説一切有部任此等解釋論主意存無明實有之義云事炳然也加之顯宗論十四中難惡慧爲無明體云義引契經無明染慧令不清淨之文畢云經主於此假作救言文論主意若不存無明實有之義者寧可判假作救言哉答論主意明經部宗計不存無明實有之義也故光法師意釋不可説爲餘慢等論文云經部諸師不信無明別有實體論主意明經部故作斯難文但於光法師前二有過論主正解等之釋者云謂體非明云應謂明無云明所治無明之三義中明所治無明之義不蒙若爾無明應是眼等之難及若爾無明體應非有之難故且云論主正解爲顯無明有體無非有過義不濫餘眼等無眼等失也非謂論主意實存此義歟次於光法師論主非經部師等之釋者論主實雖明經部無明假立之義結歸本宗故云評取説一切有部也准今論餘處五有別實物能持煖識名爲壽體是説爲善之文光法師受此文判論主評取説一切有部之釋可思之也次於顯宗論經主於此假作救言之説者論主如何不許諸染汚慧間雜善慧令不清淨説爲能染之救意爲顯不叶經文旨趣降之嘲云假作救言也顯宗論云此救不然文全非論主意實存無明實有之義故云假設救也抑正理論二十八中亦有此文故擧顯宗論説爲疑未得其意哉問論文云如是惡慧應名無明文爾者擧經部師義歟答非經部師義也兩方若經部師義者論中雖擧此異説未云經部師義哉何況顯宗論中亦擧此説知非經部師義云事若依之爾者披論文前後案問答起盡上難此義引契經無明染慧令不清淨之文下救此難云如何不許諸染汚慧間雜善慧令不清淨説爲能染文光法師釋此文云經部救意文此釋無諍惡慧爲無明體者經部師義見如何答經部宗意存無明假立之旨故不云惡慧爲無明體也故光法師釋如是惡慧應名無明之論文云此叙異計文若經部師義者何不云爾哉但於光法師經部救意之釋者論主意明經部宗無明假立之義故或云無明別有體或云惡慧爲無明體之二義倶雖不許之今此二義之中無明別有實體者有部義故專不許之且許惡慧爲無明體云義一往救之也實非存此義例如經部宗意眼見識見和合見三義之中遂存和合見義故雖破眼見識見二義眼見識見二義之中且明識見義也問光法師釋如何不許諸染汚慧間雜善慧令不清淨説爲能染論文云經部救意文爾者經部宗意善慧種子間雜染慧汚名能染義可有耶答不可有此義也兩方若有此義者光法師釋此文雖作多解釋未言善慧種子間雜染慧汚名能染哉知無此義云事若依之爾者種子現行間雜之時何無善慧種子間雜染汚慧名能染義哉答披論文前後案難答起盡如何不許諸染汚慧間雜善慧令不清淨説爲能染者惡慧爲無明體云義救契經無明染慧令不清淨之文也此救意云惡慧無明能染慧者染汚慧種子間雜善慧令不清淨或現行染汚慧前後間雜善慧令不清淨説惡慧無明能染慧爲言文意以能間雜即名能染也若善慧種子間雜染汚慧名能染者善慧種子不可有能染之義若以善慧種子爲能間雜以染汚慧爲能染者亦非能間雜即名能染故無善慧種子及現行爲能間雜亦名能染之義也今此疑問非指論義歟問論文云有執煩惱皆是無明文爾者論主意可許此義耶進云論文云此亦應同前理遮遣不許此義也付之今此所明無明者十二縁起支中無明也通貪等餘煩惱云義既叶道理論主意何不計此義哉答論中正顯此義過非云若諸煩惱皆是無明於結等中不應別説文難破之趣甚炳然也但於今此所明無明者十二縁起支中無明也通貪等餘煩惱云義既叶道理云難者十二縁起支中無明其體唯自無明一惑也見今論餘處九文述傳許約位説從勝立支名於愚惑位無明勝故立無明支名也更非以貪等餘惑名無明例如王行雖有臣從王獨勝故總説王行非謂云爾故於臣從立王名也愚惑位立無明支名其義同之疑難之旨頗不可然哉問論中引契經説云諸所有見文爾者寶法師意今此見者如何釋之耶進云寶法師釋云諸所有見謂五見也文付之依寶法師解釋披今論所引經文前後諸所有見之外別列諸我我所執明知諸所有見者五見中除身見餘四見云事是以光法師釋此文云諸所有見謂五見中除身見是餘四見文如何答諸所有見之言無所簡故寶法師釋謂五見也尤順文相也但於諸所有見之外列諸我我所執云難者寶法師會此疑云正理論云以過重故故重説也文寶法師即次下引正理論然於此中勝者別説我我所執是諸見根故於見中別顯二種之文畢云此諸言流至見所理含攝一切見盡以我我所諸見根本勝故重説之文文意顯也法華經中歎富樓那徳云亦於七佛説法人中而得第一今於我處説法人中亦爲第一之人聊可爲今准例歟次於光法師謂五見中除身見是餘四見之釋者此釋所存如疑難趣也人師意既別不可必一准歟尋云正理論中述重説我我所執之旨者光法師釋寧不背之哉答正理論中正不云重説我我所執只云然於此中勝者別説我我所執是諸見根故於見中別顯二種故光法師我我所執諸見根本故別説之以爲一類非重説之得意能順正理論説也問論文云豈不可説爲餘慢等文爾者寶法師意今此等言如何釋之耶進云寶法師釋云等謂等取疑恚二惑文付之依寶法師解釋案今論文起盡云豈不可説爲餘慢等七慢之中我慢前擧故擧慢等取餘過慢等五慢見是以光法師釋此文云豈不可説爲餘六慢慢等等取過慢等五文加之披正理論二十八文云爲攝疑恚説隨眠言契經隨眠之言既攝疑恚二惑畢慢等等言何可等取疑恚二惑哉答勘寶法師釋始終云貪見我慢以經別説不可説爲貪見我慢餘慢疑恚經既不説寧知不是餘慢等也等謂等取疑恚二惑此是異師意也今詳正理此釋自是一家之別無決定證知如説隨眠如何即知定攝疑恚不攝無明言諸遍流即謂我慢攝餘六餘若謂我慢攝餘慢者應但言慢經不應以我慢標別如説其愛若謂以我慢勝別標我名故知諸我不攝餘慢如我我所見此見言下不攝四見進退推尋不能通釋論主之難文按此釋意云詳正理此釋自是一家之別無決定證不信正理論説自作別釋我慢之言唯限我慢一種隨眠之言攝無明得意故餘慢者指我慢外餘六慢等言等取疑恚二惑豈不爲類性哉爲言故泰法師釋此文云豈不可説爲餘六慢及瞋疑等文但於光法師釋者且任正理論爲攝疑恚説隨眠言之文釋慢等等取過慢等五也兩師定判其意是異各存邊邊道理何可必一准哉次於正理論爲攝疑恚説隨眠言之文者寶法師意自本正理論説之外作別釋故違正理論文更不爲痛也問名色者唯限五蘊攝歟答可通五蘊及無爲法也兩方若唯限五蘊攝者名色種類非一准何唯限五蘊攝哉是以光法師餘處解釋中名色者不限五蘊攝見若依之爾者光法師釋色如先辨今唯辨名之論文云色如先辯謂前界品色蘊中辯今唯辯名前文雖亦辯餘四蘊未説爲名故今分別文如此釋者名色者唯限五蘊攝云事分明也如何答廣論名色體性之時名通非色四蘊及三無爲法也諸法名在非色分中三無爲法同非色法故名爲名也故光法師餘處釋唯邪見一名色處起之論文云色蘊是色餘四蘊及擇滅是名邪見不縁虚空非擇滅此中不説是名所攝言非色法者婆沙云諸法有二分謂色非色名在非色分中故總非説色分爲名文但於光法師釋者今論疏文所談名色者十二支中名色支故唯就五蘊分別其體不云通無爲法尤有其謂也問光法師引婆沙論非色即是受等四蘊文爾者爲證又類似名義引之歟答爾也兩方若爲證又類似名義引之者婆沙論中雖説非色即是受等四蘊未述又類似名之旨何可爲其證據哉若依之爾者光法師釋又類似名之論文引婆沙論此文明知爲證今義引之云事如何答今論中明無色四蘊標立名稱述一解意云又類似名文光法師釋此文云四蘊與名同無色法流類似名故標名稱故婆沙十五解四蘊名名所以云答佛於有爲總立二分謂色非色色是色蘊非色即是受等四蘊非色聚中有能顯了一切法名故非色聚總説爲名文此釋意爲證又類似名之義引婆沙論此文云事炳然也但於婆沙論中未述又類似名之旨云難者又類似名者四蘊與不同無色法流類似名故於四蘊總立名稱爲言婆沙論説其意是同故光法師引合此説顯又類似名之義全非所背也故寶法師解又類似名之論文引婆沙論此文其意亦同之問光法師述現在意識及現在觸望未來法境爲果義作二解釋爾者第二釋意今此果者増上果攝歟進云光法師釋云又解現在意識及現在觸果望未來法境亦是増上果文付之見今論餘處六文明五果相云除前有爲増上果於増上果無果前因後之義定而現在意識及現在觸望未來法境果前因後也何釋亦是増上果哉答光法師第二釋意存得果名不可過五果故以未來法境爲因以現在意識及現在觸爲果可増上果攝爲言但於今論餘處除前有爲法有爲増上果之文者就取果與果増上果云爾也故光法師釋云凡増上果有二一取果與果増上果此必無在因前也二非是取果與果増上果此果容在因前我今據此説也文問經部宗意六識界可通彼同分耶答可通彼同分也兩方若通彼同分者經部宗意談過未無體之旨若爾現在世必可託境何可通彼同分哉若依之爾者光法師解釋中經部宗意六識界可通彼同分見如何答見今論文經部師救有部難云有餘救言非諸眼色皆諸眼識因非諸眼識皆諸眼色果非因果者別説爲三因果所收總立爲觸文光法師釋此文云經部師救據彼同分根境識故別説爲三若據同分根境識三因果所收總立爲觸文泰法師釋此文云有餘經部救言非諸彼同分眼色皆諸眼識因非諸彼同分眼識皆諸眼色果若彼同分根境識非因果者別説爲三若同分根境識因果所收總立爲觸文任此等定判准眼識思餘識經部宗意六識界彼同分云事甚分明也但於經部宗意談過未無體之旨云難者經部宗意雖談過未無實體許曾有當有之義邊故未來當有眼識通彼同分也所謂前念眼根與色境合以之爲所依所縁後念眼識現起名爲同分前念眼根不與色境合後念眼識不起故此未來不生眼識名彼同分爲言耳等餘識准之可思故寶法師釋云今詳此釋若未來實有此義可然若法現在即無斯理雖復有處無識無有識不依處識生必託根境起故此似是未來彼同分不生與根合識也是不正義文問論中釋意近行名擧二師説爾者傳説言可亙初二説耶答可亙初二説也兩方若亘初二説者今論文初師説始置傳説言明知唯限初説云事若依之爾者泰法師引婆沙論三釋畢云此倶舍論但述初二復次所以言傳説也文此釋無諍傳説言可亙初二説見如何答今論中釋意近行名擧二師説云傳説喜等意爲近縁於諸境中數遊行故有説喜等能爲近縁令意於境數遊行故文初説意云喜等以意爲近縁第二説意云喜等與意爲近縁今此二師倶許同時因果之義故論主意不信此二説置傳説言也泰法師釋即存此意歟但於初師説始置傳説言云難者初師説始置傳説言即可貫通第二説也重難云論主意存何義不信今此二説哉是一次勘正理論説云喜等有力能爲近縁令意於境數遊行故若説喜等意爲近縁於境數行名意近則應想等亦得此名與意相應由意行故存今論第二師義難初師説見若爾准正理論説推今論意唯不信初師説置傳説言可云也是二答論主意明今論下段所載有説如是諸意近行毘婆沙師隨義而立唯雜染者與意相牽數行所縁是意近行云義也故光法師釋此文云此下叙異説或是經部師説文寶法師釋此文云第三論主假爲異説破有部也文任此等解釋論主意明下有説義見是故不信上二師説置傳説言也次今論文置傳説言論主意明經部説不信有宗義之時事也正理論中設雖存第二師義難初師説今論傳説之言全不可依彼歟問第三靜慮樂受可立意近行耶進云今論疏中不立意近行也付之第三靜慮樂受既意識相應也何不立意近行哉例如喜憂捨三受立意近行如何答此疑者是今論等問答也故今論云第三靜慮意地樂根意近行中何故不攝傳説初界意識相應無樂根故又無所對苦根所攝意近行故文光法師釋此文云毘婆沙師傳説於三界中若欲界有者上界亦立以初欲界意識相應無樂根故所以上界亦不別立又無樂根所對苦根意近行故所以不立樂意近行文正理論二十九云第三靜慮有意地樂亦應攝在意近行中此責不然初界無故又凝滯故謂欲界中無意地樂第三靜慮雖有不立又彼地樂凝滯於境近行於境數有推移不滯一縁方名行故又無所對苦根所攝意近行故若爾應無捨意近行無所對故不爾憂喜即捨對故第三靜慮意地樂根無自根本地捨地爲對故然無近分等無捨等近行失以於初界中有同地所對故或復容有不容有故謂意捨等容有同地所敵對法意樂定無同地敵對故無有失文顯宗論十五説全亦同之婆沙論百三十九云問第三靜慮有漏樂根唯在意識何故不説答初非分故後亦不立有説彼非全故謂無全地有漏樂根在意識者是故不立有説彼樂受雖與意識相應而非捷利意近行必捷利分別轉故又所對苦非近行故此亦不立文問論中述第三靜慮樂受不立意近行擧二故爾者第二故如何釋之耶進云今論云又無所對苦根所攝意近行故文付之意近行者喜等意爲近縁於諸境中數遊行義也於樂受既有此義設雖無所對苦意近行何不立意近行哉是以正理論中難此解云若爾應無捨意近行無所對故文如何答云意近行名實依喜等意爲近縁於諸境中數遊行故喜等能爲近縁令意於境數遊行故也於樂受雖有此義又無所對苦意近行故不立意近行爲言故光法師釋又無所對苦根所攝意近行故之論文云又無樂根所對苦根意近行故所以不立樂意近行文但於正理論若爾應無捨意近行無所對故之難者又無所對苦根所攝意近行故者是有宗義也故婆沙論百三十九云又所對苦非近行故此亦不立文正理論意即存此義故且雖擧此難遂會之云不爾憂喜即捨對故也問不雜縁捨法意近行可斷煩惱耶答可斷煩惱也兩方若斷煩惱者正理論二十九云唯有雜縁諸捨近行能正離染以意近行但有漏故婆沙論百三十九中問幾意近行能離染耶答一謂雜縁捨法意近行能爲無間道故任此等論判不雜捨法意近行不斷煩惱云事分明也若依之爾者披寶法師解釋不雜縁法念住斷惑見不雜縁捨法意近行相例可同如何答依上三無色近分地斷次下地煩惱之時次下地中無色等五境故不雜縁捨法意近行現前可斷煩惱之理必然也但於正理婆沙兩論之文者依上三無色近分地斷次下地煩惱之時不縁色等五境故以實而言雖不雜縁捨法意近行現前若有色等五境者容雜縁之故雜縁捨法意近行中且攝屬之也婆沙論百六十九中述六十五等至縁自上下地相云十等至唯縁自地謂八味相應及空識無邊處遍處唯縁自地等至之中不擧非想非非想處淨定及解脱若有上地者容縁之故也以之可爲今准例歟問或論藏意雜縁不雜縁法意近行現前位倶可有離染義耶進云論家定判中一類離染一類不離染見付之所治煩惱是萬差能斷道品非一准雜縁不雜縁法意近行現前位倶可有離染義哉是以雜縁法念住現前位同許離染義雜縁不雜縁法證淨現前位倶有離染義見彼此相例其義可同如何去嘉祿元年最勝講宗性對延暦寺宗縁大僧都用此論義乎所存之旨委悉難之講答之趣頗不分明然間證義者園城寺顯尊法印云疑問尤可然會通實難道文問斷惑加行道位可有憂意近行現前義耶答不可有此義也兩方若有此義者斷惑加行道位也何可有憂意近行現前義哉若依之爾者見婆沙論百三十九文問幾意近行能離染耶答一謂雜縁捨法意近行能爲無間道故若解脱道通有雜縁喜法意近行畢云加行勝進亦通所餘文所餘意近行者豈非指憂意近行哉答憂意近行是離欲捨法故斷惑加行道位全不可有現前義也但於婆沙論加行勝進亦通所餘之文者對無間解脱道爲雜縁法意近行加行勝進道通不雜縁法意近行云通所餘意近行也重難云斷下三無色煩惱無間解脱道位不雜縁法意近行現前故指不雜縁法意近行不可云所餘意近行哉答斷下三無色煩惱無間解脱道位實雖不雜縁法意近行現前婆沙論一段之文以斷惑無間解脱道總爲雜縁法意近行故對之加行勝進道通不雜縁法意近行云通所餘意近行也貞禪大僧都云斷惑加行勝進道位容有別縁色等六境之義故不限法意近行亦通所餘色等意近行云也問憂意近行可縁上二界耶第三卷抄記録之畢問論中明空無邊處近分地意近行擧四意近行一意近行二説爾者光法師意何説爲正耶進云光法師判前説爲正四意近行義爲正也付之空無邊處近分地心縁第四靜慮之時尤可總縁之何判別縁色聲觸法四境云義爲正哉是以光法師意婆沙論通果心總縁別縁異説中總縁義爲正判以彼思之其義可同如何答光法師前説爲正之決判源依婆沙論説也故光法師釋云空處近分二説不同前説爲正故婆沙一百三十九云若許別縁下者則有四捨意近行謂色聲觸法若許總縁下者則唯有一則有四捨意近行如是説者應説有四文但於空無邊處近分地心縁第四靜慮之時尤可總縁之云難者無間道位實雖總縁第四靜慮諸有漏法加行道位容有別縁色聲觸法四境之義故四意近行之師説爲正也次於光法師意婆沙論通果心總縁別縁異説中總縁義爲正之例難者通果心依禪定力生或總縁所化色香味觸四境或縁所發身業之時兼縁能造大種及倶起色香味觸或縁所發語業之時兼縁能造大種及倶起色香味觸更不欲別縁之故總縁云師説爲正也彼此義門遥異不可爲相例難歟問異生離第四靜慮染第九解脱道位可修縁第四靜慮心耶答可修之也兩方若修之者現起道既不縁第四靜慮未來亦不可修縁第四靜慮心是以披光法師餘處二十四所引正理論六十六文述離第四靜慮染第九解脱道位未來所修麁等六行相所縁云皆縁空處乃至有頂文如此文者異生離第四靜慮染第九解脱道位不修縁第四靜慮心見若依之爾者異生離第四靜慮染第九解脱道位修空無邊處近分地心者何不修縁第四靜慮心哉依之婆沙論中明離染位得意近行云離第四靜慮染一切無間解脱道時各得空無邊處四文一切無間解脱道言無簡第九解脱道明知彼解脱道時修縁第四靜慮近行云事如何答異生離第四靜慮染第九解脱道位不可修縁第四靜慮心彼第九解脱道位必入空無邊處根本地而任根本善無色不縁下有漏之性相現起道既不縁第四靜慮故未來亦不修縁第四靜慮心也故婆沙論中述異生離第四靜慮染第九解脱道時修念住云法念住現在修未來修三除身念住文若彼位修縁第四靜慮心者寧不修身念住哉但於異生離第四靜慮染第九解脱道位修空無邊處近分地心者何不修縁第四靜慮心哉云難者彼第九解脱道位雖修空無邊處近分地心不修縁下地心也故寶法師餘處二十四引婆沙論問何故最後解脱道中所修未來靜慮所攝麁等行相通縁三界無色所攝麁等行相唯縁無色界耶答靜慮地中有遍縁智能縁自地下地上地無色地中無遍縁智唯縁自上不縁下地之問答畢云故無色不修縁下地行相文例如依根本地入見道人未來雖修未至地聖道根本非欲斷對治故唯修上二界能治道不修欲界能治道也次於婆沙論離第四靜慮染一切無間解脱道時各得空無邊處四云文者案婆沙論一段文意今此得者所現起得在生相得倶名得故第九解脱道時容現起道品得第九無間道時在生相故離次下地染第九無間道時各得次上地根本近分意近行畢故於第九解脱道時不明得靜近行之義也故見婆沙論次上之文始自離欲界染終至離第三靜慮染皆於九無間前八解脱道時述得意近行之義無擧第九解脱道時隣之次下云離第四靜慮染一切無間解脱道時各得空無邊處四亦就九無間前八解脱道時論之也全不可通第九解脱道何以此文離第四靜慮染第九解脱道時得四意近行得意爲疑哉重難云會通婆沙論文之旨猶不可然離第四靜慮染第九無間道時四意近行得在生相者第九解脱道時彼得容現起豈非第九解脱道時修四意近行哉答離第四靜慮染第九無間道時得四意近行者色聲觸三意近行得唯限現起不在生相法意近行得通現起生相故合之云得四意近行也第九解脱道時唯法意近行得容現起故婆沙論文全無相違也問光法師意無覆無記意近行可縁同界上地耶答不縁同界上地也兩方若縁同界上地者無覆無記意近行勢力微劣也設雖同界難縁上地哉是以光法師所引婆沙論無覆無記分別意識唯能縁自下地文若依之爾者初靜慮無覆無記非意近行必縁同界上地相例可同如何答披光法師處處解釋當卷述若無記縁自下非縁上力劣故畢引婆沙論七十三無覆無記分別意識唯能縁自下地之文餘處二十云無記力劣下縁上難故不縁上界上縁下易故能縁下界文任此等定判初靜慮無覆無記意近行不縁同界上地之旨甚分明也但於初靜慮無覆無記非意近行心縁同界上地云例難者依身在第三靜慮之人爲見聞觸自地色等借起初意眼耳身三識之時縁同界上地也光法師餘處二十雖縁上地由同界故所以得縁欲色界別下不縁上之釋其意在之問正理論意依身在下地起上地無覆無記意近行可縁下地境耶答可縁下地境也兩方若縁下地境者光法師今解釋中依正理論意云無記近行身在下地即不能起上地縁下故不別説餘處二十定判述正理不説據身在下不能起上無覆無記縁下見苦所斷各據一義故不相違欲見集斷及修所斷各五識縁准釋應知思此等釋意彼論意依身在下地起上地無覆無記意近行不縁下地境見若依之爾者披光法師餘處二十七所引正理論七十六文云應作是説四意中有定相應勝無記惠能引自地勝大種果此惠現前便引自地天眼天耳令現在前爲所依根發眼耳識故眼耳二識相應慧非通但可説言是通所引天眼天耳二通以意識相應勝記慧爲體定若爾依身在下地起上地無覆無記意近行可縁下地境也如何答正理論意存天眼天耳二通以意識相應勝無記慧爲體故依身在下地起上地天眼天耳二通相應意近行縁下地色聲二境也其旨即如一方疑難之趣但於光法師今解釋者見一段起盡引婆沙論無覆無記分別意識唯能縁自下地之文畢就之問若無記能縁下者何故正理二十九解近行中別標色善能縁欲界不言無記解之云以善近行身在下地身在上地倶能起彼地善縁下欲界是故別説無記近行身在下地即不能起上地縁下故不別説此釋意以正理論初二靜慮唯有十二善縁欲界亦具十二三四靜慮唯六謂捨縁欲界境善亦具六之文對婆沙論無覆無記分別意識唯能縁自下地之説令問答故就婆沙正理兩論一同所談無覆無記意近行云無記近行身在下地即不能起上地縁下故不別説也天眼天耳二通以意識相應勝無記慧爲體者唯正理論説非婆沙論意故今問答中不記之也次於光法師餘處欲見集斷及修所斷各五識縁准釋應知之釋者顯欲界修所斷法同見苦所斷法五識所縁之旨許也不可爲疑難歟問光法師釋意近行起不起相無記意近行通起上下地者通果心文爾者通果心言可攝天眼天耳二通耶答不可攝天眼天耳二通也兩方若攝天眼天耳二通者見光法師解釋不云攝天眼天耳二通知不攝之云事若依之爾者光法師所引正理論説釋意近行相而正理論意天眼天耳二通以意識相應勝無記慧爲體定若爾通果心言可不攝天眼天耳二通哉答見光法師一段解釋引婆沙正理兩論之説問答分別三性意近行縁自上下地并起自上下地相故今此所明意近行者彼兩論一同所談意近行也而天眼天耳二通以意識相應勝無記慧爲體者唯正理論説非婆沙論意故今一段中不論之也重難云披光法師定判云今言無覆無記近行通起上下據意識中所有無覆無記近行説故不相違文既云據意識中所有無覆無記近行説依正理論意之時寧不攝天眼天耳二通相應意近行哉答此亦就婆沙正理兩論一同所談無覆無記意近行置所有言故非指疑歟問變化心唯縁現在歟答唯縁現在也兩方若唯縁現在者披今論餘處文本頌結初多心一化成滿此相違長行述初習業者由多化心方能化生一化事習成滿者由此一化心隨欲化生多少化事若初習業位多變化心化作一所化事者初念變化心豈不縁未來哉若依之爾者見光法師釋云若化心唯縁現事文如何答此事雖有學者異義任光法師若化心唯縁現事之釋且可存變化心唯縁現在云義也退勘光法師餘處二十七解釋引婆沙論百二十二評家義云如是説者諸所化事由道化作亦由化心謂神境通道無間而滅化心與所化倶時而起雖倶時起而能化心唯是道果諸所化事是前道果及化心果文若初習業位變化心與所化事倶時起者寧閣現在所變化事縁未來所變化事哉爰知變化心唯縁現在不縁未來云事但於今論餘處本頌長行之文者初習業位多變化心各化作象馬等一類所化事後成滿位一變化心隨應化作象馬等多類所化事爲言以何知之者見婆沙論百三十五文云若初起通者一心一化若通滿者一心多化文准此婆沙論説聊簡今論文也重難云初多心一化成滿此相違者初習學位多念變化心化作一所化事後成滿位與此相違一念變化心化作多所化事云也若初習業位一念變化心各化作一所變化事者何云成滿此相違哉答初習業位一念變化心化作一化事後成滿位一念變化心化作多所化事故以後成滿位望初習業位論相違義有何所背哉重難云變化心唯縁現在云義意會初多心一化成滿此相違之文或有初習業位變化心於象馬等一類依身分分化作縁之義或有初習業位變化心縁所依木石云義彼等義有何過今存不叶文相之義哉答分分化作之義違婆沙論百三十五謂初起通者一心但能作一類物若通惠滿者一心能作象等四事之文縁所依木石云義背光法師餘處二十二所引泰法師然通果心唯縁自地所變化事之釋故捨彼等義所存此義也變化心縁未來者相承義也然而恐繁重省略之第二十七卷抄可記録之也問發業通果心唯縁現在歟答可縁現在未來也兩方若唯縁現在者光法師雖述若化心唯縁現事不云發業通果心唯縁現在明知發業通果心不唯縁現在云事若依之爾者變化心唯縁現在發業通果心相例可同如何答發身語表業必由因等起心故通果心欲令所化有情發身語表之業之時必先起因等起心故爲因等起發業通果心縁未來身語表業也光法師不云發業通果心唯縁現在即存此旨也何況光法師餘處既得縁名亦縁心等之釋意發業通果心縁未來身語表業刹那等起心爲言元瑜法師述文記六云發業心縁當起業發業通果心縁未來身語表業云事亦分明也但於變化心唯縁現在云例難者所化色香味觸四境無間斷法能變化之稍易故定前心欲化象等入禪定畢後出定時能變化心與所化事倶時而起故變化心縁彼倶時所變化事不縁未來所變化事也身語表業有間斷法能發業心發之尤難故定前心欲令所化有情發身語表業雖入禪定後出定時必先起因等起心發身語表業故爲因等起發業通果心現在前位無有所發身語表業不縁現在縁未來身語表業也問光法師意通果無記心唯與捨受相應歟第三卷抄記録之畢問正理論中明意近行不通無漏擧三師説爾者第二師意如何釋之耶進云正理論二十九云有説近行有情皆有無漏不然故非近行文付之憂受是離欲捨法喜受亦生第三靜慮以上不成就之彼雖無有情皆有之義既立意近行何云無漏受非有情皆有故不立意近行哉答欲界有情無始以來無不成就憂喜二受彼離欲界染位捨憂受生第三靜慮以上之時不成就喜受後時事也非一類全不成就之無漏聖道異之諸有情類無始以來未入正性離生之前不成就之故非諸有情類皆有無漏受故無漏受不立意近行爲言問光法師所引婆沙論百三十九中明生初靜慮成就欲界意近行擧三師説爾者成就色聲法三意近行云説正義歟答非正義也兩方若正義者光法師今解釋中引婆沙論三師説畢云於三説中初説爲正文爰知成就色聲法三意近行云第二師説非正義云事若依之爾者生初靜慮成就欲界色聲法三意近行云師意深存道理何非正義哉是以披光法師餘處五解釋云若化心但縁四境若發業通果心但縁身語二業而言通法分別門者據總縁説故名縁法非縁七種法故名縁法文既云但縁身語二業又述通法分別行准此釋思之成就色聲法三意近行云説可正義見如何答見光法師今解釋引婆沙論三師説畢云於三説中初説爲正一同此論正理二不言有説此即初師意説縱縁身語業亦兼縁能造觸或縁身業兼縁香味觸縁語業兼縁色香味觸故但名法捨意近行文此釋意成初説爲正之道理之時成就色聲法三意近行云第二師説非正義之旨自所顯也但於光法師餘處解釋者初釋意云既得縁名亦縁心等故第二釋意異之成發業通果心不縁名等心等之義云若發業通果心但縁身語二業也全不遮縁身業時兼縁能造大種及倶起香味觸縁語業時兼縁能造大種及倶起色香味觸之義邊也次於而言通法分別行者之通言者初釋意婆沙論第三師通果心色等六意近行倶云義意通果心可縁法境見故以之爲證述發業通果心縁名等之旨法分別行亦容此故者即指此文也非謂此釋意通色聲法三意近行故無相違問光法師所引婆沙論百三十九中明生初靜靜成就欲界意近行擧三師説爾者第三師意變化心必總縁所化境歟答可有別縁所化境義也兩方若必總縁所化境者第三師意云生初靜慮成就欲界六意近行定知變化心中可有別縁所化境義云事若依之爾者所化境者四處二處性也變化心必可總縁之是以見光法師所引婆沙論文述第二師説云若縁所變化事以總縁法故即有縁法捨意近行文第三師意其義可同如何答光法師引婆沙論三師説畢判於三説中初説爲正雖不許第三師説依第三師意變化心中有別縁所化境義也故婆沙論下文明生第三靜慮成就第二靜慮近行述今此第三師説云有説彼成就三謂色觸法捨近行即通果心倶此心容有總別縁故文而第二靜慮無發業心故變化心中有別縁所化境義云事必然也但於所化境者四處二處性也變化心必可總縁之云難者此師意云此心容有總別縁故變化心中有別縁所化色香味觸四境義存也次於婆沙論若縁所變化事以總縁故之文者第二第三師其義既各故何以彼師説難此師義哉重難云勘光法師餘處二十七解釋難泰法師以婆沙論第三師説爲證變化心即化六處之義云今解不然別有通果心發語化心不能發語寛狹如前説法師未委通果心寛變化心狹謂諸通果心皆是化心故作斯釋文准此能破之趣思之第三師意云通果心有別縁義發業心中有此義見爰知此師意變化心中不許別縁所化境義云事如何答婆沙論第三師意變化心中別縁所化境云分明證文前重出之畢何重疑之哉但光法師能破意泰法師婆沙論第三師説惡得意不辨發業通果心發語存變化心化聲爲證故難之別有通果心發語變化心不能發語泰法師未知通果心寛變化心狹謂諸通果心皆變化心作此謬釋破也非謂云爾故別縁色香味觸四境通果心即發業心全無相違也問寶法師依今論意生色界成就欲界色聲法三意近行云説可爲正義耶答可爲正義也兩方若義者見今論文云若生色界唯成欲界一捨法近行謂通果心倶文若今論意成就色聲法三意近行云説爲正義者何唯擧一捨法近行之一説哉若依之爾者寶法師意述婆沙論三師説倶正義之旨設雖今論意成就色聲法三意近行云説寧非正義哉答披寶法師解釋引婆沙論百三十九三師説畢云今詳三解據義各別不相違也第一師據化事心唯法捨近行此心不唯縁一境故第二師説據化事心及發身語業心唯縁色聲故第三師説通六近行通取化事發業及餘通果心亦容別縁六境界故有人云初師爲正初師意發業心亦兼縁能造觸故者非也若能造觸亦心縁起善惡二業例亦應然應同所造通其善惡文此釋既述婆沙論三師説非相違義倶可義之旨畢破光法師初説爲正之釋明知自義意存三師説倶正義云事若爾准婆沙説思今論意生色界成就欲界色聲法三意近行云説可爲正義也但唯擧一捨法近行之一説事據變化心論之也寶法師第一師據化事心唯法捨近行此心不唯縁一境故之釋即顯此趣歟尋云寶法師若能造觸亦心縁起善惡二業例亦應同所造通其善惡之釋其意如何答此釋意難光法師發業通果心縁身語業時亦兼縁能造觸云釋若發業通果心縁能造四大種者能造四大種同善惡二業可通善惡二性若通善惡二性者可違以作者心本欲起業非四大種故不成例之理爲言問寶法師意變化心必總縁所化境歟答可有別縁所化境義也兩方若必總縁所化境者寶法師所引婆沙論百三十九中述第三師説云有説彼成就六謂六捨意近行即通果心倶此心容有總別縁故文定知變化心中可有別縁所化境義云事若依之爾者寶法師釋婆沙論三師説非相違義云第一師據化事心唯法捨近行此心不唯縁一境故判第三師説通六近行通取化事發業及餘通果心等容別縁六境界故變化心必總縁所化境餘通果心有別縁義文如何答寶法師引婆沙論三師説畢云今詳三義據義各別不相違也釋成三師説倶正義之旨而婆沙論下文明生第三靜慮成就第二靜慮意近行述今此第三師説云有説彼成就三謂色觸法捨近行即通果心倶此心容有總別縁故文第二靜慮通果心許別縁義豈非變化心哉故變化心中有別縁所化境義云事必然也但於寶法師解釋者實似難思然而試存一義云變化心中可有二類若據初念正化作所化事心云之者必總縁所化色香味觸四境故唯法意近行也第一師據化事心唯法捨近行此心不唯縁一境故者即顯此意也若據第二念以去與所化事倶心論之者可有別縁所化色香味觸義也以此第二念以去與所化事倶心望初念正化作所化事心且名餘通果心雖釋及餘通果心亦容別縁六境界故理實而言變化心攝故變化心中有別縁所化色香味觸四境義可云也問寶法師意化事發業通果心外可有餘意識通果耶答可有餘意識通果也兩方若有餘意識通果者任性相決判案通果心類化事發業之外何可有餘意識通果哉是以廣披諸論所説尋通果心種類化事發業之外無擧餘意識通果知無此類云事若依之爾者勘寶法師解釋云通取化事發業及餘通果心亦容別縁六境界故文此釋無諍化事發業通果心外可有餘意議通果見如何答理實而言化事發業通果心外不可有餘意識通果其旨即如一方疑難也但於寶法師通取化事發業及餘通果心之釋者實雖難思且任相承義聊簡之者婆沙論百三十九中述生初靜慮成就欲界意近行擧三師説云成就欲界一謂法捨意近行即通果心倶總縁色等爲境起故有説彼成就三謂色聲法捨意近行即通果心倶此心若縁所起身表即有縁色捨意近行此心若縁所起語表即有縁聲捨意近行此心若縁所變化事以總縁故即有縁法捨意近行有説彼成就六謂六捨意近行即通果心倶此心容有總別縁故文寶法師引此文畢云今詳三解據義各別不相違也第一師據化事心唯法捨近行此心不唯縁一境故第二師説據化事心及發身語業心唯縁色聲故第三師説通六近行通取化事發業及餘通果心亦容別縁六境界故文此釋意云婆沙論三師説非相違義初師意唯據變化心論之變化心總縁所化色香味觸四境故云唯成就法意近行第二師意變化心外兼據發業通果心論之發業通果心中發身表業別縁色境發語表業別縁聲境故并變化心總縁所化四境法意近行云成就色聲法三意近行第三師意變化心中初念正化作所化事心必總縁所化色香味觸四境故限法意近行發業通果心別縁所發身語二業故聲二意近行通取化事發業者即指之也及餘通果心者第二念以後與所化事倶心容別縁所化色香味觸四境故并化事發業通果心云成就六意近行也理實而言第二念以後與所化事倶心雖是變化心攝望初念正化作所化事心且云餘通果心也重難云變化心中第二念以後與所化事倶心不正化作所化事故且名餘通果心者發業心中第二念以後與所發業倶心不正發身語業故亦可名餘通果心發業心中何無餘通果心哉是一次婆沙論第三師意成就六意近行云中法意近行者是雜縁法意近行通果心中無別縁法境之類者寧不違亦容別縁六境界故之釋哉是二答發業心中第二念以後與所發業倶心雖不正發身語業與所發業爲刹那等起故混雜云發業心外餘通果心歟次法境非所化事非所發業故通果心不能縁之也故寶法師餘處二十二釋今論唯自上地心之所縁非下地威儀通果心境故之文云借下識起上地威儀通果但縁所發業事及所化事不縁上地風也文此釋意通果心唯縁所化事及所發業見但於亦容別縁六境界故之釋者前五意近行別縁色等五境法意近行所縁法雖不出彼五境之外隨其所應總合縁義異前五意近行別縁五境故亦云別縁全無所背也問論中述有説義云唯雜染者是意近行文爾者光法師如何釋其故耶進云光法師釋云近行唯染與意相牽數行所縁文付之善及無覆無記心亦有與意相牽數行所縁之義今故不明如何答近行唯染與意相牽數行所縁者非光法師私解釋源出今論説故今論云唯雜染者與意相牽數行所縁是意近行文但於善及無覆無記心亦有與意相牽數行所縁之義云難者此師意存唯雜染者名意近行事染汚喜憂捨三受與意相牽染著所縁故名意近行爲言善及無覆無記受雖有與意相牽之義不染著所縁故名意近行也故見今論次下文問云何與意相牽數行答之云或愛或憎或不擇捨爲對治彼説六恒住文光法師釋此文云由喜與愛倶憂與憎倶捨與癡倶捨言癡倶從強多分此三與意相牽數行所縁名意近行此文且據三毒餘惑亦與喜憂捨倶與意相牽數行所縁文問論中明六恒住法云謂見色已不喜不憂心恒住捨具念正知廣説乃至知法亦爾文爾者心恒住捨者捨受名捨歟進云光法師釋云心恒住捨捨謂行捨文付之不喜不憂心恒住捨之文專可捨受名捨見有何深由釋捨謂行捨哉答光法師今解釋源依集異門足論説也故光法師釋云心恒住捨捨謂行捨故集異門足論十五解六恒住中云問此中捨者何所謂耶答心平等性心正直性心無警覺性任運住性應知此中説名爲捨復次有説六識相應縁色聲香味觸法境捨受名捨今此義中應知意説心平等性心正直性心無警覺性任運住捨性行捨名捨已上論文集異門足論中解恒安住捨之文雖有行捨名捨捨受名捨之異説正義意行捨之旨分明也故光法師心恒住捨謂行捨之釋引此文爲證據也退案其意彼論次上文説六恒住相云一眼見色已不喜不憂具念正知恒安住捨文耳鼻舌身意恒住可准知既云具念正知恒安住捨故定可善心所中行捨若捨受名捨者寧云具正念知哉但於不喜不憂心恒住捨之文專可捨受名捨見云難者遮不喜不憂表心恒住捨一往見之雖似捨受行捨離沈掉心平等性心正直性心無警覺性任運住性非偏強喜非偏強憂故於行捨云不喜不憂全無所背也問六恒住法爲唯限意識相應念慧爲當通五識相應念慧歟答唯限意識相應念慧云師説可爲正義也兩方若唯限意識相應念慧者見婆沙論所引施設足論文阿羅漢得盡智已最初起善眼識現在前位現在成就一恒住文若六恒住法唯限意識相應念慧者眼識現在前位寧現在成就一恒住哉加之光法師所引集異門足論中云復次有説六識相應縁色聲香味觸法境捨受名捨文此文無諍六恒住法廣通五識相應念慧見若依之爾者披今論文明六恒住法云謂見色已等定知唯限意識相應念慧云事如何答六恒住法唯限意識相應念慧廣通五識相應念慧云事集異門足論十五并婆沙論三十六中雖有二師異説唯限意識相應念慧云師説可爲正義也其故契經之文諸論之中説六恒住法皆云眼見色已等故唯限意識相應念慧之旨分明也故婆沙論三十六云復有説者六恒住法亦唯意地以説眼見色已乃至意知法已不喜不憂心恒住捨具念正知故文何況不喜不憂之言唯限意識相應念慧云事炳然也若通五識相應念慧者何不云不樂不苦哉加之勘婆沙論次下文明六恒住法依地述評家義云應作是説通在三界十一地有謂欲界未至靜慮中間四靜慮四無色意識念慧遍諸地故文思此文意六恒住依地分別就唯限意識相應念慧云師説論之見明知以此師説爲評家義也但於婆沙論所引施設論阿羅漢善眼識現在前位現在成就一恒住云文者六恒住法唯限意識相應念慧云師意會此文云當知此是恒住加行非恒住體故不相違文次於光法師所引集異門足論復次有説六識相應等之文者彼不正義意也不可劬勞之問六恒住法以何爲體耶進云光法師釋云具念正知六恒住體文付之依光法師釋披今論現文明六恒住法云謂見色已不喜不憂心恒住捨具念正知廣説乃至知法亦爾文文相無諍憂喜是所對法行捨即爲能對治六恒體住見加之集異門足論十五中説六恒住法云今此義中應知意説心平等性心正直性心無警覺性任運住性行捨名捨文如此文者六恒住法行捨爲體之旨分明也如何答六恒住法念慧爲體也故光法師釋今論具念正知之文云具念正知六恒住體故婆沙三十六云問六恒住法以何爲自性答以念慧爲自性若兼取相應倶有則四蘊五蘊爲自性文正勘所引本説云問六恒住法以何爲自性答以念慧爲自性云何知然如契經説諸阿羅漢心善解脱具六恒住云何爲六謂眼見色已乃至意知法已不喜不憂心恒住捨具念正知若兼取相應倶有則四蘊五蘊爲自性文六恒住法念慧爲體云事光法師釋婆沙論説甚炳然也但於今論謂見色已不喜不憂心恒住捨具念正知等之文者縁色等六境已不喜不憂行捨相應正念正知爲六恒住體爲言還是答之證文也何爲疑難之端哉次於集異足論行捨名捨之文者見彼論文解恒安住捨之問阿羅漢果聖者初起善眼識現在前位過去現在可成就恒住耶答婆沙論所引施設足論中有二誦本也兩方若過去現在成就恒住者阿羅漢果聖者初起善眼識現在善位也過去不可成就恒住加之見今論文明六恒住法云謂見色已不喜不憂心恒住捨具念正知廣説乃至知法亦爾文而阿羅漢果聖者初起善眼識現在前位全無眼見色已之義寧現在成就恒住哉若依之爾者披婆沙論所引施設足論文阿羅漢果聖者初起善眼識眼在前位過去現在成就恒住判如何答婆沙論所引施設足論文有二誦本故婆沙論三十六引施設足論云彼阿羅漢得盡智已若最初起善眼識現在前彼成就過去一未來六現在一此滅已不捨若起善耳識現在前彼成就過去二未來六現在一此滅已不捨乃至若起善意識現在前彼成就過去未來六現在一文此誦者意云阿羅漢果聖者初所起盡智并相應正念即爲六恒住法體故初起善眼識在前位成就過去一恒住云也成就現在一恒住者若依六恒住法通五識相應念慧云師意者眼根見肥位同時眼識相應念慧雖爲六恒住體以義次第且云眼見色已等歟若依六恒住法眼意識相應念慧云師意者彼師會此文云當知此是恒住加行非恒住體故不相違文婆沙論次下文云復有誦言若最初起善眼識現在前彼過去無但成就未來六現在一此滅已不捨若起善耳識現在前彼成就過去一未來六現在一此滅已不捨乃至若起善意識現在前彼成就過去五未來六現在一此滅已不捨若復起善意識或餘識現在前彼成就過去未來六現在一文此誦者意云阿羅漢果聖者得盡智後約初起善眼識現在前已來論六恒住法成就不成就相故云彼過去無也二誦者意其趣如此歟問六恒住法爲唯限有漏爲當通無漏歟答可通無漏也兩方若唯限有漏者六恒住法者縁色等六境已不喜不憂心恒住捨其念正知之義也阿羅漢果聖者所起無漏念慧既有此義何不爲六恒住法哉若依之爾者廣披婆沙正理等論説未見六恒住法通無漏文爰知唯限有漏云事如何答見今論文明六恒住法云謂見色已不喜不憂心恒住捨具念正知廣説乃至知法亦爾文此義不可限有漏故六恒住法可通無漏也加之婆沙論三十六中述評家義云應作是説一切阿羅漢皆有此六云何知然此六恒住皆以漏盡清淨身中念慧爲體諸阿羅漢無不成就此念慧故文此文全不簡無漏念慧哉何況婆沙論四十四中釋根律儀體云復次念慧有二種一世間善二出世間善世間善者名念慧出世間善者名根律儀復次念慧有二種一學二無學學者名念慧無學者名根律儀復次念慧有二種一鈍根種姓二利根種姓鈍根種姓名念慧利根種姓名根律儀文此文無諍根律儀通無漏見而根律儀六恒住法同以無學身中正念正知爲體故六恒住法亦通無漏云事炳然也但於廣披婆沙正理等論説未見六恒住法通無漏云文云難者六恒住法通無漏之旨設雖無分別定判以根律儀既通無漏可准知之也問六恒住法可通四無色地耶答可通四無色地也兩方若通四無色地者六恒住法者縁色等六境已不喜不憂心恒住捨具念正知之義也更不可通四無色地若依之爾者婆沙論中六恒住法通四無色地見如何答婆沙論三十六中明六恒住法依地述評家義云應作是説通在三界十一地有謂欲界未至靜慮中間四靜慮四無色意識念慧遍諸地故文六恒住法通四無色地云事此文甚分明也但於六恒住法者縁色等六境已不喜不憂心恒住捨具念正知之義也更不可通四無色地云難者欲會此疑且存二義或一義云依身在欲色二界阿羅漢果聖者以欲色二界心隨其所應縁色等六境已後時所起四無色地心有不喜不憂心恒住捨具念正知之義故六恒住法通四無色地云也重意云四無色地心雖不具縁色等六境欲色二界心縁色等六境已後時所起四無色地不喜不憂行捨相應正念正知名六恒住法爲言或一義云四無色地有意知法已不喜不憂心恒住捨具念正知之第六恒住故六恒住法之隨一在四無色地云六恒住法在四無色地也非謂四無色地具有六恒住法如彼婆沙論評家意述無色界具有十二支云無色界雖無色及五根而有名及意根彼應作是説識縁名名縁意處縁觸是故三界皆具十二六恒住法在四無色地云事以之可爲潤色也問六恒住法眼等六根律儀其體可同耶答其體可同也兩方若其體同者披婆沙論文有餘師説根律儀以六恒住法爲自性云義評家意不許之見若六恒住法眼等六根律儀其體是同者評家意何不許之哉若依之爾者六恒住法眼等六根律儀同以無學身中正念正知爲體定知其體可同云事如何答此事雖難測且可存六恒住法眼等六根律儀其體是同云義也其故披諸論所説尋六恒住體今論云謂見色已不喜不憂心恒住捨具念正知廣説乃至知法亦爾文婆沙論三十六云如尋經説諸阿羅漢心善解脱具六恒住云何爲六謂眼見色已乃至意知法已不喜不憂心恒住捨具念正知文集異門足論十五云六恒住者云何爲六答一眼見色已不喜不憂具念正知恒安住捨二耳聞聲已不喜不憂具念正知恒安住捨三鼻嗅香已不喜不憂具念正知恒安住捨四舌嘗味已不喜不憂具念正知恒安住捨五身覺觸已不喜不憂具念正知恒安住捨六意了法已不喜不憂具念正知恒安住捨文而見光法師餘處十四引正理論文明眼等六根律儀云故契經説眼見色已不喜不憂恒安住捨正知正念如是乃至意了法已文准此等論判任所引經文六恒住法六根律儀所説文言是同所述義道不異故六恒住法六根律儀同以無學聖者身中意識相應有漏無漏正念正知爲體可云也但於婆沙論有餘師説根律儀以六恒住法爲自性云義評家意不許之云釋者婆沙論初師意根律儀以正念正知爲自性者根律儀以無學聖者身中意識相應有漏無漏正念正知爲體云也此師意六恒住法同以無學聖者身中意識相應有漏無漏正念正知爲體存故六恒住法眼等六根律儀其體是同爲言第三有餘師意異之許六恒住法以六識相應念慧爲體根律儀以此六識相應六恒住法爲自性云故評家意不許之云此諸説中初説爲善經説念慧能護根故也寫本云文永五年戊辰二月五日酉時於東大寺知足院草菴抄之畢去年青陽之初月始此卷抄此春時正之良辰終其微功懈怠之至悲而有餘但今日者彌勒慈尊利有縁群生之日遍覺三藏遂兜率上生之朝也依之受持三歸八齋之戒品勤修滅罪生善之良因相當此日結集此抄機縁既純熟感應定速疾者歟然則迴此清淨修學之慧業偏祈宗專法師之得脱逍遥園風前遂再會而談往事龍華樹露底結一縁而尋舊跡而已右筆華嚴宗末葉法印權大僧都宗性年齡六十七夏臘五十五
