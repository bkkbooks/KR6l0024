body:
  text: 倶舍論第二十卷抄問題問過去現在法中可有非已起類耶問現在共相惑中可有具世遍事遍義耶問過去意識相應貪嗔慢可名世遍事遍遍行耶問未來可生意識相應貪嗔慢可名世遍事遍遍行耶問頌文云五可生自世不生亦遍行文爾者不生亦遍行者爲約一一有情論爲當多有情合論歟問一念眼識相應煩惱同時縛三世境義可有耶問發智論中答若於此事有未來愛結繋亦有過去愛結繋耶云問云若前生未斷則繋若前未生設生已斷則不繋文爾者若前未生設生已斷則不繋者可亙九品愛結耶問發智論中答若於此事有未來愛結繋亦有過去愛結繋耶云問云若前生未斷則繋若前未生設生已斷則不繋文爾者若前未生則不繋者唯限一世愛結歟問論文云非果生時有現因在文光法師釋此文作三解釋爾者第二釋意如何釋之耶問頌文云第三約作用立世最爲善文爾者於過未二世可起作用耶問薩婆多宗意有爲法體可生滅耶問經部宗意意識可縁現在境耶問薩婆多宗意能詮名可詮無法耶問光法師依經部宗意以十二處如何分別假實耶問經部宗中可有計十大地法心所實有義耶問經部宗意可許愛心所實有義耶問頌文云此法性甚深文爾者毘婆沙師義歟問苦智唯知苦聖諦法歟問正理論意色界異熟威儀二無記心可縁欲界法耶問正理論意依身在欲界起色界無覆無記心縁欲界修所斷法義可有耶問正理論中述欲界繋見苦所斷法五識所縁云色修所斷善識非餘文爾者善識言中可攝生得善耶問寶法師意色界無覆無記識可縁欲界見苦所斷法耶問依身在初靜慮所起眼耳二識可縁上地耶問光法師所引婆沙論中述無色界加行善識所縁云無漏一切法及虚空文爾者今此虚空者指虚空無爲歟問空無邊處近分地加行善心可縁下地法上擇滅耶問無色界善心可縁下地能治類智品道耶問虚空無爲可有多體耶問寶法師意欲界苦集諦所斷遍行隨眠相應識可縁第三靜慮樂根耶問寶法師意樂根縁識色界滅諦所斷有漏縁無明隨眠可隨増耶問婆沙論中云無色界道諦所斷無漏縁隨眠相應識是樂根縁縁識文爾者縁樂根苦集道類智相應無漏識倶縁之歟問欲界道諦所斷無漏縁隨眠相應識可憂根縁縁識耶問非學非無學法縁識滅諦所斷無爲縁隨眠可隨増耶問眼耳身觸所生愛身縁縁識無色界道諦所斷隨眠可隨増耶問憂根斷道縁識色界他界地縁隨眠可隨増耶問信等五根滅縁識所増隨眠等無間可生三界十五部心耶問已離空無邊處染人可成就唯欲界繋根斷道縁縁識所増隨眠耶問類智現前位必可成就樂根滅耶問不成就憂根滅聖者中可有三結所繋類耶問未離欲染聖者見修道位可成就善根斷道耶問依身第二靜慮以上聖者可成就憂根斷道耶問已斷煩惱相應心由未斷煩惱所縁隨増可名有隨眠心耶問已離欲染位欲界善無記心可名有隨眠心耶問修所斷嗔煩惱可縁他身見惑耶問頌文云非理作意起説惑具因縁文爾者非理作意者染汚作意歟問品類足論中出欲漏體云謂除欲界繋無明諸餘欲界繋結縛隨眠隨煩惱纒是名欲漏文爾者今此隨煩惱者唯限煩惱六垢歟問欲漏體可取煩惱六垢幷不信懈怠放逸耶問品類足論意第二靜慮以上可有諂誑耶問三漏中有漏體可攝纒耶問欲瀑流體唯限不善歟問欲取體中通不善無記類唯限無明一惑歟
