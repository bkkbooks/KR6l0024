body:
  text: 倶舍論第九卷抄上問題問光法師釋當往何趣所起中有形状如何論文作三解釋爾者初釋意如何判之耶問頌文云如當本有形文爾者説中有滿果可云耶問感同分業兼感命根可云耶問論文云欲中有量雖如小兒年五六歳而根明利文爾者明人趣中有可云耶問光法師所引正理論云有餘師説欲界中有皆如本有感年時量文爾者正義可云耶問論文云并中有如感年時文爾者唯限後有中有歟問有宗意夢中所見事者爲顛倒妄想爲眞實境界歟問論中付中有身問趣異趣見不見等義擧二師異説爾者光法師意以何師説爲正義判耶問今論述一切通中業通最疾婆沙論云神境通力行勢通迷文光法師會二論相違作三解釋爾者初釋意如何判之耶問今論述一切通中業通最疾婆沙論云神境通力行勢通述文光法師會二論相違作三解釋爾者第二釋意如何判之耶問今論述一切通中業通最疾婆沙論云神境通力行勢通迷文光法師會二論相違作三解釋爾者第三釋意如何判之耶問於中有位必具眼等五根可云耶問論中明中有位時擧四師異説爾者以何師説爲正義判耶問有宗意中有同分必一業所感可云耶問有宗意於中有形状有可轉義可云耶問於中有位有二形類可云耶問於欲界中有有無形類可云耶問中有鼻根取不至境可云耶問於中有位造異身定業可云耶問於羯刺藍位造異身定業可云耶問住無覆無記心命終人從欲界生欲界時於中有末後念起覆無記心可云耶問光法師解釋中三言結生者結謂結續即不斷義文爾者今此結生者爲指中有初念爲當指生有初念可云耶問頌文云前三種入胎謂輪王二佛文爾者於輪王二佛中有末心及生有初念起倒心可云耶問論中付明四種入胎且輪王知入時所以如何判之耶問論中明四種入胎云順結頌法故逆説四文爾者光法師如何釋之耶問婆沙論意以鈍根羅漢及不還果聖者攝四種入胎可云耶問光法師所引婆沙論中中有説第四入胎是第三阿僧祇耶乃至第一入胎是此前菩薩文爾者正義可云耶問論文云然此胎子乘宿所爲順後受業所趣難了文爾者今此所趣難了言光法師如何釋之耶
