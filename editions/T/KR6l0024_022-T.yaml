body:
  text: 倶舍論第六卷抄下問正理論意依上地聖道與依下地聖道可爲同類因耶答可爲同類因也兩方若爲同類因者同類因名等勝爲果之義依上地聖道與依下地聖道何可爲同類因哉是以見正理論所説述於依自上有於依下地無依上地聖道與依下地聖道不爲同類因見若依之爾者依上地聖道與依下地聖道不爲同類因者依上地證果之人依下地始起未曾得聖道之時可有一刹那之義哉答正理論意依上地聖道與依下地聖道可爲同類因也所謂依上地證不還果之人依下地起未曾得聖道之時上地見道與下地修道可爲同類因依上地證阿羅漢果之人依下地起未曾得聖道之時隨其所應上地見道修道與下地無學道可爲同類因也是以寶法師今解釋云就此依中上地見道與下地修道及無學道爲因故知地疎於位文上地見道與下地修道無學道爲同類因云事今解釋尤分明也哉何況若不許此義者初苦法忍之外豈無一刹那法哉正理論意云唯初無漏五蘊刹那無同類因生起餘有爲法無如是事初苦法忍之外不許一刹那法故也但於於依自上有於依下地無之文者暫就同姓同位依上地所修聖道與依下地所修聖道不爲同類因云也非盡理談何爲相違哉此事婆沙論倶舍論意可同之也問無生智與盡智可爲同類因耶答可爲同類因也兩方若爲同類因者同類因名等勝爲果之義無生智與盡智何可爲同類因哉是以見今論文云諸無生智唯與等類爲同類因更無勝故云云此文無諍無生智與盡智不爲同類因見加之光法師餘處解釋云或彼盡智非無生智爲因故生不名因圓文若依之爾者正理論中見修無學三道互爲同類因見准而思之無生智與盡智何不爲同類因哉答無學勝進道位九智十智隨應現修者出餘卷論疏之定判若爾已生無生智與已生不生盡智尤可爲同類因也故正理論云謂有盡智非無生智爲因故生無無生智不以盡智爲因故起文謂有盡智非無生智爲因故生者指初盡智也翻之思之有盡智以無生智爲因故生云事尤分明也但於可背等勝爲果之義云難者同是第六種姓無學所得盡智無生智也何可有勝劣差異哉次於今論文者暫據一相漸次進修之相云唯與等類爲同類因也以實云之無生智與盡智爲同類因之義可有也次於光法師餘處解釋者無生智必以盡智爲同類因盡智之中有以無生智不爲同類因之類故如此云也問正理論意見修無學三道互可爲同類因耶進云光法師釋云若依正理論意三道展轉爲因文付之同類因名等勝爲果之義若修道與見道爲同類因無學道與見修道爲同類因者豈不背等勝爲果之義哉是以發智論十四中已知根與未知當知根不爲因具知根與未知當知根及已知根不爲因見設雖正理論意豈可背本論所説哉答光法師釋此事云若依正理論意三道展轉爲因如前生鈍修道亦與未來不生利見道爲同類因前生鈍無學道亦與未來不生利見修道爲同類因或從無學退至學位轉根亦與已起利修道爲因言與三二一爲同類因者且據現起次第而説文立理會文之旨解釋實分明也即見正理論文云前生鈍根種姓修道與自相續未來決定不生利根種姓見道爲同類因何理爲據一切有情各別相續法爾安立六種種姓無學望前應知亦爾然有差別謂有前生無學聖道於自相續後生修道爲同類因無學退已於修道中可有轉生利根義故文見修無學三道展轉互爲同類因之旨論文實委悉也道理尤可然哉但於本論所説者正理論會之云此文但説已起作用作相續轉諸無漏根如説有用世第一法文文意顯也問婆沙論意見修無學三道互可爲同類因耶答可有二意也兩方若互爲同類因者同類因名等勝爲果之義若修道與見道爲同類因無學道與見修道爲同類因者豈不背等勝爲果之義哉是以廣披婆沙論處處之文見修無學三道互不可爲同類因見若依之爾者以道理思之鈍根修道無學道與利根見道修道何不爲同類因哉是以正理論意述見修無學三道互爲同類因之旨以正理説思婆沙意尤可許此義哉答光法師述見修無學三道爲因之相以今論對正理論意作或云同或云論意各別之二釋若依今論同正理論之初釋意者婆沙論意實許見修無學三道展轉互爲同類因之義可云也光法師述正理論意云若依正理論意三道展轉爲因如前生鈍修道亦與未來不生利見道爲同類因前生鈍無學道亦與未來不生利見修道爲同類因或從無學退至學位轉根亦與已起利修道爲因文設雖婆沙論意何不存此道理哉可背等勝爲果之理云難亦自被遮畢但於婆沙論處處之文述三道互不爲同類因之旨云難者光法師會今論文云言與三二一爲同類因者且據現起次第而説文准今解釋可會婆沙論處處之文也若依論意各別云第二釋意者婆沙論意全不許見修無學三道展轉互爲同類因之義可云也故發智論十四云已知根與未知當知根爲所縁増上具知根與未知當知根已知根爲所縁増上不云爲因婆沙論百四十六禀之同釋成此旨加之廣檢婆沙論一部之文或百二十五云復次有見道修道無學道此中見道與見道爲因亦與修道無學道爲因修道與修道爲因亦與無學道爲因非見道以彼劣故無學道唯與無學道爲因非見修道以彼劣故文或云頗有業無無學果耶答無文或百五十八云已生盡智與未生盡智爲因亦與後已生未生一切無學道爲因不與一切學道爲因文又百六十五云已知根品與未知當知根品爲二縁除因等無間除因者後生於前生非因故具知根品與未知當知根品及已知根品爲二縁除因等無間文取意此等處處之文見修無學三道互不爲同類因之旨尤分明也故寶法師釋云正理論巨細而論倶舍論等順其本論文若爾源自發智本論説起婆沙論意不許見修無學三道展轉互爲同類因云義也但於鈍根修道無學道與利根見道修道可爲同類因云難者鈍根修道無學道猶勝利根見道修道歟故婆沙抄云問鈍無學道望利學道爲同類因如正理説何故此論云頗有業無學學果耶答無耶解云無學勝學利故論意各異文正理婆沙論意各別之旨此釋亦分明也問今論意退無學果後練根成見至類可有耶答可有此類也兩方若無此義者光法師今解釋中述正理論意云或從無學退至學位轉根亦與已起利修道爲因了下作此論同正理論意云釋知今論意同許此義云事若依之爾者見今論餘卷文述果退中間不命終故云退已須臾必還得故文如此文者退無學果未還得之前不可有練根之義見如何答正理論云謂有前生無學道於自相續後生修道爲同類因無學退已於修道中可有轉生利根義故文光法師述此文意云或從無學退至學位轉根亦與已起利修道爲因畢下作今論同正理論意云釋如解釋者者今論意許此義云事最分明也何況見婆沙論文或第六十二云有作是説退者不定不自在故起諸煩惱或速能斷還復本位或經久時方得本果謂以欲界聞思惠力引起修惠聖道現前轉信勝解或見至根然復起阿羅漢果故彼退已遲速不定文或第六十七云識身論説復云何通如彼説有過去無學心是已了非今了非當了謂時解脱阿羅漢退阿羅漢果作信勝解彼練根作見至已還得阿羅漢果彼時解脱道所攝無學心是已成就非今成就非當成就文此等處處之文退無學果之後練根成見至之類可有云事尤分明也今論意豈可背婆沙論説哉但於退已須臾心還得故之論文者彼述退果之後速疾還得之旨許也更非遮彼中間修練根之義歟重難云婆沙論三十二云信勝解者若決定依信勝解道得無學果於見至道得非擇滅文如此文者退無學果之後練根成見至之類不可有見如何答此文就依信勝解道得無學果決定不退無學果之一類如此云也問婆沙論中見道道法智位有知同類因不知彼所縁等四句不同文爾者知彼所縁不知同類因句體如何釋之耶進云婆沙論云謂知未來四法智品文付之道法智無縁苦集滅三諦何云知苦集滅三法智所縁哉出此句體之時唯可擧未來道法智哉是以出知同類因不知彼所縁句云謂爾時知過去縁苦集滅三法智品擧知同類因亦知彼所縁句云謂知過去道法忍品文如何答道法智現前位過去道法忍與現在道法智爲同類因而過去道法忍縁未來四法智品故以未來四法智品名同類因之所縁而現在道法智縁未來四法智品故知同類因之所縁云也未來無有同類因故不知同類因云也非謂知未來四法智品所縁故更非相違也重難云知彼所縁者知同類因之所縁云事也不知同類因者即不知爲其能縁同類因云事也而知同類因之所縁云同類因云過去道法忍不知同類因云同類因別物指未來四法智品云事難思就中就爲同類因之法論知不知相也未來都無有同類因不及云不知同類因哉答可思之一義勘婆沙抄云論云知彼所縁不知同類因者謂知未來四法智品者謂道法智不知自體故名不知同類因即此道法智縁未來四法忍及法智故名知彼所縁文此釋意云現在道法智縁未來四法智品爲同類因故名同類因此現在道法智縁未來四法智品故以未來四法智品名同類因之所縁而現在道法智縁未來四法智品故知同類因之所縁云也現在道法智與未來四法智品爲同類因故雖名同類因自體不知自體故不知同類因云也重難云道法智位作此四句之時以自體望未來四法智品名同類因爲知彼所縁不知同類因句云事難思哉答可思之別尋云道類智位亦可有此四句何唯出道法智位哉答暫出一位也道類智位實可有此義也准道法智位作此四句易知之問婆沙論中相應因遍行因相對作四句時倶非句中可擧無爲法耶進云婆沙論文不擧之也付之無爲法既非相應因亦非遍行因倶非句中尤可擧之哉是以相應因同類因相對作四句之時倶非句中擧無爲法哉答相應因遍行因相對作四句之時倶非句中可取無爲法事必然也但現文不擧之事實似難思然而倩見一段文上相應因同類因相對作四句之時倶非句中既擧無爲法畢次下相應因遍行因相對作四句之時就有爲法前相應因同類因相對四句所替也分齊許出之其無爲法爲倶非句事同前相應因同類因相對四句故今略不擧之也相應因異熟因相對作四句之時倶非句中不擧無爲法事准之可知也重難云見婆沙論次下文云同類因異熟因相對作四句之時倶非句中擧無爲法若無爲法爲倶非句事同前故不擧之云者今文何亦擧無爲法哉答見彼中間文相應因能作因等相對多作順後句畢始亦同類因異熟因相對之時有四句故倶非句中亦擧無爲法歟問等流大種與長養大種可爲同類因耶答互可爲同類因也兩方若爲同類因者等流長養其性遥異也更不可爲同類因哉是以婆沙論百三十一中異熟大種與長養大種不爲同類因見例可同若依之爾者婆沙論百三十七中有執受大種無執受大種互可爲同類因見如何答婆沙論中法處所攝色能造大種唯與法處所攝色能造大種爲同類因見而若散無表所依大種與初苦法忍隨轉戒能造大種不爲同類因者可有一刹那大種故等流大種與眞養大種可爲同類因事必然也但於等流長養其性相替云難者等流長養其性雖異同是自性無記故等流大種與長養大種可爲同類因也次於異熟長養大種互不爲同類因云例難者彼異熟無記自性無記其性異故互不爲同類因也重難云光法師第二卷疏出自性無記類云自性者謂長養五根香味觸及外香味觸文若散無表所依大種是自性無記者自性無記中何不擧等流觸哉答此釋非是盡理之談自性無記中不擧盡等流香味觸也勘婆沙論百二十七云問此四大種品類有幾答品類有四謂異熟生長養等流變化有餘師説品類有三謂異熟生長養等流其變化者長養所攝復有説者品類有二謂異熟生及長養變化大種入長養中等流攝入異熟長養評曰於前三説中説爲善有四大種非二攝故文如此文者所變化境能造大種通果無記亦長養所攝見若爾長養觸中既非自性無記之類有之而今長養香味觸混云自性無記事亦非盡理之談爰知光法師今解釋只就其大概論之不必盡理之談云事重難云問與自部染汚法可爲遍行因耶答可爲遍行因也付之遍行因者唯可與他部染汚法爲因也若與自部染汚法爲因者與同類因有何差別哉是以發智論中説遍行因相不云與自部染汚法爲遍行因哉依之婆沙論中云於自部非遍行因文如何答遍行因者廣與自地五部染汚法爲因之義故與自部染汚法最可爲遍行因也是以今論云此與染法爲通因故同類因外更別建立亦爲餘部染法因故由此勢力餘部煩惱及彼眷屬亦生長故文光法師釋此文云若同類因唯與自部爲因此遍行因不但與自部染汚法爲因亦爲餘部染汚法爲因故所以同類因外建立遍行因文但於與自部爲遍行因與同類因有何差異云難者光法師所引正理論云唯生自部二因何別無遍行因唯生自部謂遍行法正現前時倶時方有力取五部果文文意遍行因倶時與五部爲因同類因唯與自部爲因故一法同時竝雖起同類遍行二因取果用更無混亂云也次於發智論文者婆沙論會此文有三師説暫於一師義者彼論云謂於自部有遍行因不説自成故不須説若於他部有遍行因其義不成是故説文次於婆沙論所説者彼一師別義也不可及會通矣問論文云一切染汚法見所斷爲因文爾者施設足論聖人離欲退最初已起染汚思唯不善爲因云文如何會之耶進云論云依未斷因密作是説見所斷法雖是此因而由已斷故廢不説文付之既離欲退位也有何未斷法與彼最初已起染汚思可爲未斷因哉何況若夫就未斷因云之設雖非離欲退位可有唯不善爲因之義唯出離欲退最初起染汚思其理亦難思哉答會依未斷因密作是説事不限今論文也正理論云依未斷因密作是説此染汚思因雖具有不善無記而無記因先已永斷聖人退位見所斷惑皆已斷故一切見道必無退故欲界染無記皆見所斷故唯不善因退故成就説爲未斷是故無失文婆沙論云彼依未斷因説故不相違謂彼初起不善思有二種因一已斷二未斷彼論但依未斷因説文但於有何未斷法爲因云難者離欲退最初已起染汚思相應煩惱與彼染汚思可起倶有相應因取果與果用故以倶有相應因可名未斷因也倶有相應因名未斷因云事源出識身足論文故彼論云何等未斷因謂此倶有相應等法文學者最可翫之次於付未斷因云之雖非離欲退位可有唯不善因義云難者婆沙論委問答此事云問聖者先未離欲染時彼染汚思亦以不善爲因何故彼論説後退時答爾時彼思先不成就今得成就先無縛今有縛先死今生是故偏説問後起染汚思亦以不善爲因何故論但説初起答爾時彼得先斷今續先無用今有用先死今生是故偏説文元瑜疏釋此事云爲明諸或已斷始生故説最初實論一切文任此等論家人師定判可思之尋云聖人離欲退位過去所斷煩惱今退成就故最初已起染汚思以彼可爲同類因未斷因何不通同類因哉答今此離欲退位彼所退過去煩惱與此最初已起染汚思不起同類因取果與果用故以彼不可爲未斷因也同類因取果用離染已前過去世已起之畢同類因與果用與生相法起之而煩惱現前位名退故離欲退位又不起與果用也故彼離欲退位今所退得過去煩惱無起同類因取果與果用故未斷因不可通同類因也問婆沙論中難一切染汚法見所斷法爲因義引離欲退染汚思唯以不善爲因云文爾者何論文乎進云婆沙論云識身論説文付之正撿識身足論未見此文所引之文依憑在何哉是以今論幷正理論中云施設足論説引比文哉答施設足論三藏未翻譯今文有無暗以難知然而今論云若爾云何通施設足論説正理論云若爾應違施設足論引此文以知施設足論正有此文云事但於婆沙論文者云識身論説若誦者誤歟可云施設足論也重難云舊婆沙論云復與識身論文相違同引此文若爾新舊兩譯同云識身足論説引此文輒不可云誦者誤哉答問已斷遍行因可起與果用耶答可起之也兩方若起之者其體既已斷也何可有引後果之義哉依之婆沙論云復次前位於自身中能取果與果後位雖亦爲因而於自身中不復能取果與果文如此文者已斷遍行因不起與果用見是以震旦人師云若已斷者無取與能文若依之爾者正理論中已斷遍行因可起與果用見如何答已斷遍行因可起與果用也其故未斷位既起取果用畢其體設雖成已斷彼果至生相之時豈不起與果用哉是以舊婆沙論中或云復次本作因時於自身能取果與果今雖爲因不能取果與果唯除已取果者文此文已取果者已斷之後可起與果用見或云復次本作因時能於自身取依果報果與依果報果今雖爲因不能取依果報果文此文云未斷位取果與果已斷位不取果無簡與果用加之正理論云謂未斷位於自身中能爲遍因取果與果後已斷位雖能爲因不能取果唯除先時已取果者今有與義文已斷遍行因起與果用云事此文亦分明也但於婆沙論文者會之有二義一義云今文論已斷未斷之差異故離未斷位之外已斷許不起取果與果用云也非遮未斷位取果者已斷之後與果之義也一義云未斷位云於自身中能取果與果已斷位云雖亦爲因而於自身中不復能取果與果是則對云未斷因自身起取與用已斷因自身不成就故於自身不起取與用異未斷因云也重意云於自身有取與用起不起之不同爲已斷未斷之差異也非遮自身不成就起與果用之義邊也問佛獨覺所起上二界有漏善業於凡身可起異熟因取果用耶答可起之也兩方若起之者佛獨覺所起善業是殊勝也於凡身難起取果用哉若依之爾者佛獨覺聖身色無色界無之尤於凡身可起異熟因取果用哉答佛獨覺所起上二界有漏善業唯於凡身可起異熟因取果用也全於聖身不可起之其故佛獨覺先時異生位數數生上二界故彼凡身種類多止未來縁闕不生在之佛獨覺聖身唯限欲界更無通上二界故佛獨覺所起上二界有漏善業唯於未來不生凡身可起異熟因取果用更於聖身不可起異熟因取果用也重難云佛獨覺所起上二界有漏善業於凡身起異熟因取果用云者可違婆沙論評家義所謂見婆沙論文述佛獨覺所得現觀邊世俗智受異熟身之中擧凡身聖身之二義了評家破之云評曰彼倶不應作如是説應作是説現觀邊世俗智是有漏有記故説有異熟而無曾受及當受義故不應責受異熟身文若云凡身起異熟因取果用者可同婆沙論不正義意哉答今此文就現觀邊世俗智縁闕不生起取果用之善業論故評家云而無曾受及當受義故不應責受異熟身破凡身受異熟云義也而現在前起取果用佛獨覺所起上二界善業於凡身起異熟因取果用云事評家更不可破之故今婆沙文更非相違也尋云聲聞所起上二界有漏善業於何身起異熟因取果用哉答聲聞可生上二界故於聖身決定可起異熟因取果用亦於上二界縁闕不生凡身在之兼於凡身可起異熟因取果用也問今論意欲界繋身語二業可爲引業耶進云光法師作二釋初釋意云不爲引業第二釋意云爲引業也付之二釋倶有疑先就初釋不可然身語二業既業體也何不爲引業哉是以廣撿今論一部之始末云欲界繋身語二業不爲引業哉何況契經云殺生業道若修若習若多修習生那落迦本論云破僧妄語其罪最大能取無間獄中劫壽異熟此等經説幷論文無諍身語二業可爲引業見加之見今論餘卷文或云四善容倶作引同分唯三倶時業能感三生衆同分見若身語二業不爲引業者何可有倶時業感三生衆同分之義哉加之或云二無心定得不能引餘通不爲引業之類中無擧欲界繋身語二業哉次就第二釋亦不可然欲界繋身語二業勢力微劣也何可爲引業哉是以契經云劣界思所引故文加之身語表業既有衆多極微何可有一極微感命衆同分餘極微不感命衆同分之義哉若同時共感之云者可有有對造色展轉爲倶有因之過若次第感之云者同是一心所起也何各別可引生後命根衆同分哉依之正理論云非心隨轉身語二業定不能引命衆同分文如何答初釋意云此論文無別説意同正理以今論同正理論意也故正理論云非心隨轉身語二業定不能引命衆同分引劣界思所引故之經文爲文證以一心所起身語表業衆多極微難感命根衆同分之道理爲理證欲界繋身語二業不爲引業云也但於契經幷本論所説者正理論會云此説所起顯能起思廉易了故無相違失文次於四善容倶作引同分唯三之論文者光法師會云彼文但顯四業中生後不定容感同分現不能感不言一刹那一時能感三種同分故下論云幾業能引衆同分耶能引唯三除順現受現身同分先業引故文次於二無心定得不能引餘通之論文者光法師又會云言通感者容通感彼不言一切皆悉能感若隨轉身語業即能感若欲界身語業即不能感文若爾諸文會通解釋既委細也私不可劬勞矣第二釋意云又解此論不同正理欲界身語業亦能感命衆同分欲界繋身語二業爲引業云也故婆沙論第百五十六云頗有根非因善根非因不善根非因無記根非無因耶答有謂無縁根即命等八根以色心不相應行爲因此非三性根爲因而以色心不相應行爲三因謂倶有同類異熟文此文無諍欲界繋身語二業爲引業感命根見若爾今論意可同婆沙論意也但於劣界所引故之文者暫付本業云思所引也更非遮身語二業爲引業之義哉次於一心所起身語表業衆多極微感命根衆同分可有過云難者是正理論所付之過也光法師即釋此事云於其業中衆多極微隨其所應或有唯感引果或有唯感滿果或有一分感引一分感滿若言同一心起不許別感引果滿果同一心起何者感色何者感香等雖同一心起即有感色等不同何妨同一心起感引滿前後別文文意顯也次於正理論所説者彼婆沙論等之外別立此義故今論意異彼也故光法師云若作此解與正理論異文寶法師引正理論一段之文云准此論文相婆沙等論文外更立此義文正理論師意既背婆沙論所説違正理論説事更不可爲痛哉問婆沙論意欲界繋身語二業可爲引業耶答彼論意可爲引業也兩方問正理論意五無間業身語二業爲體歟答爾也兩方若身語二業爲體者非心隨轉色業勢力微劣也何爲無間業體哉依之光法師所引正理論云經言劣界思所引故文如解釋者五無間業思業可爲體也若依之爾者見正理論餘處文云此五無間中四身一語業五無間業身語二業爲體見如何答正理論意五無間業身語二業可爲體也品類足論中於定法擧五無間業及學無學法畢三科相攝之時云定法五界四處五蘊攝文五無間業身語二業爲體之旨此文實分明也設雖正理論意更不可背本論説哉何況正見正理論所説第三十四卷中上難經部宗意三業皆思爲體云義云復有理證業不唯思謂纔起思欲爲殺父等則應已得無間罪等故下述自宗義云以對法宗身語二業成無間等要由惡思若無惡思此業不起故身罪業待惡思成乃至又對法宗由因等起思有善等差別性故所起身語善等性成可言必待思差別故身業方成無間罪等文第四十三卷中上問五無間業其體是何次出經部義云且上座言三業爲體身業語業一一獨能招異熟果理難成故畢自難之云今許意業爲無間體便應暫起欲造逆思即成無間下標然我所宗決定義者云此五無間中四身一語業三殺一誑語一殺生加行文此等現文五無間業身語二業爲體之旨尤分明也但至非心隨轉色業勢力微劣云難者身語二業設雖勢力微劣彼思業所作究竟成重罪事依身語二業力唯起思業未及身語二業之時修懺悔等彼業改轉如斷善邪見通不定業也以身語犯其過畢所作究竟更無改轉之義故身語二業正爲無間決定業體也然而此無間業要由能發思力離能發思力無間業不成故能發思正爲引業劣界思所引故之經文又非相違也重難云見正理論文或云造多逆人唯一能引餘助滿故或云如造多逆先引後滿五無間業可通引業見而正理論意定非心隨轉身語二業定不能引命衆同分欲界繋身語二業不爲引業見若爾五無間業既通引業非思業爲體哉答五無間業體雖不取思業彼能發思爲引業云造多逆人唯一能引餘助滿故也逆罪能發思亦名逆罪也問正理論意感觸處時定感色處歟進云正理論中不定感色處見付之感觸處之時定與色處倶可定感色處哉是以見正理論文云若感身處定感四處謂身色處觸處法處感身處之時定感色處見例可同如何答凡十二處定感之廢立依具同性業感體必倶有之一義也而感觸處之時定雖與身處色處倶觸處與身處色處是別業感故感觸處之時不定感身色二處云也故光法師釋此事云雖感觸時定身色倶容別業感故感觸處非定能感彼九處也文九處者眼等五處意處色香味處是也正理論文云若感觸處應知亦爾謂觸與法同存此意見但於彼論意感身處之時定感色處云例難者色處定與身處倶故有體必倶有之義身處是生本故與色處亦有同性業感之邊故感身處之時定感色處云也觸處定與色處倶故雖有體必倶有之義觸處是非生本故與色處無同性業感之義不云感觸處之時定感色處也故光法師釋此事云正理據感身定感色者以色定與身倶通欲色界故云感身時亦定感色若爾感色應亦感身不爾身處是生本故感身亦感色同業感故色非生本故感色非定感身容別業感故文文意顯也問寶法師解釋中明十二處定感引婆沙論二師説爾者初師意與今論同歟答可同也進云寶法師釋云然所録婆沙初説感觸與此論不同文付之披兩論所説見感觸處之文今論云若感意處定感二處謂意與法若感觸處應知亦爾婆沙論初師云得觸處業亦受二處異熟謂觸處法處文若爾兩論所説既同何判婆沙初説感觸與此論不同哉是以光法師釋云倶舍爲正同婆沙初師説故文如何答述十二處定感相婆沙論初師意與今論意其義全同光法師解釋即述其實義也感觸處之文亦更無異即如疑難被出難也但至進釋者寶法師向婆沙論文字脱落之本作此釋也所謂婆沙論正文云得觸處業亦受二處異熟謂觸處法處得身處業受三處異熟謂身處觸處法處文對婆沙論本説見之得觸處業之下受三處異熟之上中間脱落亦受二處異熟謂觸處法處得身處業之十五文字也何況如寶法師所引論文者不述感身處業定感餘處之相是大疑也爰知今十五文字脱落云事更不可疑之若爾暫見此文字脱落之一本釋然所録婆沙初説感觸與此論不同應更詳撿也故上云然所録婆沙下亦云應更詳撿寶法師即自疑之見凡引誤錯之本就脱落之文暫作一往解釋事諸師之常習也至于此釋強不可劬勞者歟問光法師釋有一世業三世異熟無三世業一世異熟論文作二解釋爾者第二釋意如何釋之耶進云光法師釋云又解世約大三世文付之若就大三世云之三生所造業一世感果之義可有之何云無三世業一世異熟哉答光法師世約大三世云釋意就引業論之也所謂一世造順生順後等三引業三生各別感果之義可有故云有一世業三世異熟也無三生所造引業一世感果之義故云無三世業一世異熟也故寶法師釋此文云就大三世明也如一世造業可三世受無三世造業同一世受據引説也文文意顯也問寶法師意相應因取異時士用果義可有耶答不可有此義也兩方若有此義者此論婆沙正理顯宗及光法師等釋意相應因唯取同時士用果見設雖寶法師意更不可有取異時士用果之義哉若依之爾者寶法師今解釋云取等無間縁士用果者皆是相應因是相應者皆同取無間士用果文如解釋者相應因可取異時士用果見如何答相應因唯取同時士用果者性相之所定也更不可疑之即寶法師釋倶有相應得士用果非越士體有別士用即此所得名士用果之論文云相應倶有之法有力用故名爲士用士用之果名士用果非越士體有別士用即此士用所得名士用果文此釋意相應因唯取同時士用果見但於寶法師相應因取無間士用果云釋者等無間縁就心心所立之相應因付心心所論之故取等無間縁士用果之物必取相應因同時士用果取相應因同時士用果之物亦取等無間縁士用果唯有阿羅漢最後心取相應因士用果不取等無間縁士用果云也非謂相應因正取等無間縁士用果更非相違也故寶法師正釋此事云准此論文取等無間縁士用果者皆是相應因是相應者皆同取無間士用果不同倶有因然有無等無間縁士用果得成相應如羅漢後心文釋意此旨分明也問頌文云有爲増上果文今此有爲者標増上果體歟答爾也兩方若標増上果體者長行釋此頌意云謂有爲法除前已生是餘有爲之増上果文文言無諍非標増上果體見若依之爾者上云除前有爲法下標有爲増上果正指増上果體見如何答案頌文意上云除前有爲法嫌前已生有爲諸法非増上果下重云有爲増上果除前已生有爲法之外餘有爲法是増上果體云也故圓暉法師釋此文云重言有爲者是除前外諸餘有爲此餘有爲或與因倶或在因後名増上果文重案其意凡此中專欲顯彼果體故有爲言尤可指増上果體也若有爲言不指果體以因云有爲者未顯果體唯限有爲豈今文之本意哉但於是餘有爲之増上果之論文者是餘有爲之有爲言非指有爲増上果之有爲言委顯増上果相其因有爲有爲之増上果云也委云之以有爲爲因其體有爲是増上果爲言長行標因有爲云有爲之増上果偈頌指果體有爲云有爲増上果也即訓長行文云諸有爲法除前生是餘有爲之増上果文故光法師釋此文云於有爲法中除前已生有爲法以前非後果故是餘若倶若後有爲名増上果文文意顯也問論文云亦應如是説能作因非定有果故此不説文爾者光法師如何釋之耶進云光法師釋云謂無爲法及未來法文付之無爲法無因果故非定有果云事其義可然未來法望未來法之時爲能作因増上果如云未於未果三也何以未來法云非定有果哉是以寶法師云無爲無果所以不説泰法師判然以無爲不能取果非定有果故此不説爾者光法師解釋難思如何答以未來法望未來法之時雖爲能作因爲増上果於未來世不起取果用故云非定有果也重意云今文云五因取果唯於現在定非過去彼已取故亦非未來彼無用故亦應如是説能作因非定有果故此不説就取果用之起不起定其果之有無故未來法雖爲能作因不起取果用云非定有果也故光法師釋云亦應如是説能作因現在取果而不説者以能作因非定有増上果故此頌中不説謂無爲法及未來法雖是能作因而不能取増上果故文就取果用之起不起論其果之有無云事解釋實分明也重難云若爾倶有相應異熟三因雖通未來彼於未來不起取果用可云非定有果乎答倶有相應異熟三因通未來者其法體通未來云也非云於未來正爲因暫出一類顯其意者善不善法可成異熟因以彼善不善法體有未來異熟因宛置未來也然而未來全無前後故非云正爲異熟因異熟果倶有相應二因在未來云事准之可思能作因在未來者於未來世實爲能作因也不障礙之義實在未來故也如云無爲法實爲能作因也故付實因云之於未來世實雖爲能作因不起取果用故云非定有果也倶有相應異熟三因於未來世實不爲因故非相例也問今論意能作因取果用可通過去耶進云光法師引婆沙論能作因有作是説現在取果過去現在與果有餘師説此能作因過去現在取果過去現在與果云二説了此論或同婆沙前師或同婆沙後師云二釋作也付之同婆沙後師云釋不可然能作因是無障礙因取果用能爲彼種之義也若爾法現在前之時有何所障礙於現在世不起取果用遥於過去世可起之哉是以見今論文上表五因取果唯於現在下述亦應如是説能作因非定有果能作因取果用唯限現在之旨論文實分明哉依之正理論云然能作因能取果者定唯現在與通過現文何況光法師餘處七解釋中云其取果用若依正理唯在現在若依婆沙雖亦通過去唯等無間縁無多差別故此不説増上縁取果用唯限現在見能作因其義可同加之第三約作用立世最爲善者今論餘處定判也若能作因取果用通過去者豈無三世雜亂之過哉答云此事雖有異義暫存一義者等無間縁取果用通過去者是婆沙論評家義也而能作因是廣以一切法爲體故等無間縁體即能作因攝之門有之光法師餘處解釋中云婆沙初師約體以明因縁攝五能作攝三即此意也故指彼等無間縁取果用通過去即能作因取果用通過去云也是以泰法師云毘婆沙師有説等無間縁能作因攝故能作因取果與果倶通過現文婆沙抄云等無間縁有能作因故入過去亦取果也文指等無間縁取果用通過去即云能作因取果用通過去之旨此等解釋尤以明鏡也加之見婆沙論文述等無間縁取果用通過去云無有等無間縁異時取果異時與果若此時取果即此時與果故明能作因取果用通過去云此能作因過去現在取果過去現在與果多刹那取果多刹那與果若取果時即能與果兩處論文其言大同爰知指等無間縁取果用通過去即爲能作因取果用通過去云事何況光法師會亦應如是説能作因之論文云言能作因同五因現在取果者從多分説文若夫能作因實於過去數數起取果用者現在起取果用少分過去起取果用多分成豈可云現在起取果用者從多分説哉任此等文理思之實就能作因取果用云之唯可限現在也如此得意之時諸難自被會畢就中光法師餘處解釋中増上縁取果用唯限現在云事還爲答之潤色哉但於正理論文者彼不許等無間縁取果用通過去故能作因取果用唯限現在云也論意各別何備疑難哉重難云六因四縁作用各別者是光法師餘處解釋也何指等無間縁取果用即云能作因取果用哉何況見餘卷論文云因縁五因性云増上即能作等無間縁非能作因攝見是以光法師餘處解釋中此論意同婆沙論等無間縁及所縁縁非因所攝云師義釋若爾指等無間縁取果用通過去即爲能作因取果用通過去云事豈不背此等定判哉加之能作因取果用實限現在者指等無間縁取果用通過去爲能作因取果用通過去事有何要須哉加之正理論中破然毘婆沙有如是説其能作因取果與果倶通過現云師云理不應然法居現在亦如同類遍行二因總取未來爲自果故文此難意實能作因取果用不可通過去如同類遍行二因取果用不通過去云也隨又元瑜疏釋此文云謂顯能作如同類等總取未來非如等無間縁唯以一念爲所引也文此釋亦不通過去云非如等無間縁翻而思之通過去云如等無間縁也若指等無間縁取果用即名能作因取果用者豈可云非如等無間縁哉加之若能作因體攝等無間縁故能作因取果用通過去云者増上縁取果用亦可通過去光法師餘處解釋中云若據法體亦攝前三縁以體相雜故就體云之増上縁亦攝等無間縁故也答凡約四因四縁相攝或有約體以明之門或有據用相似之門若約用以明之時能作因等無間縁作用各別故假不可有能作因取果用通過去云義若約體以論之日能作因體是廣等無間縁亦名能作因之門可有故以等無間縁取果用通過去亦爲能作因取果用通過去事何強可辨之哉但云因縁五因性云増上即能作據用相似以論之光法師若婆沙第二師及此論據用相似以辨相攝云餘卷解釋即此意也故就其文顯此論意同婆沙論第二師等無間縁及所縁縁非因所攝云義釋也以實云之約體明相攝之時能作因體可攝等無間縁故餘卷論文幷光法師解釋更無相違也次於正理論文者有義意以等無間縁取果用通過去雖即名能作因取果用通過去正理論師意設雖何法於過去起取果用云事都不許之故如同類遍行二因必於現在可起取果用破也次於元瑜解釋者若有難思者何必可依用哉次於増上縁取果用可通過去云難者泛論之者能作因體寛攝餘五因増上縁體寛攝餘三縁之門可有之然而諸論中能作因攝餘五因唯是能作因増上縁攝餘三縁唯是増上縁之廢立都無之故以等無間縁取果用通過去即爲増上縁取果用通過去之義用不可有也婆沙論中能作因攝餘三縁之廢立有之故以等無間縁取果用通過去即爲能作因取果用通過去之義邊可許之也彼此遥異更非相例問論中明善同類因取果與果相對四句分別相出與果非取果句云謂續善根時最初所得得文爾者限過去最後所捨一刹那善得歟進云光法師作二釋初釋意云過去最後所捨一刹那善得第二釋意云廣取過去所有善得也付之二釋倶有疑先就初釋不可然續善根時彼果至生相位前位多刹那善得皆起與果用不起取果用何唯限過去最後所捨善得哉是以婆沙論中出此句體云謂續善根時即住過去所捨善得文如此文者廣可取過去所有善得見次就第二釋亦不可然見今論文出此句體云應説爾時續者前得文限斷善根位最後一刹那善得之旨論又實分明也是以正理論難今論述可取前位多刹那善得之旨知今論意唯取過去最後所捨一刹那善得云事如何答初釋意專所任論現文也見今論文前後出取果非與果第一句云謂斷善根時最後所捨得擧與果非取果第二句云謂續善根時最初所得得應説爾時續者前得文文相前後無諍唯可限過去最後所捨一刹那善得見是以正理論難今論云經主於此謬作是言應説爾時續者前得今詳彼説理不應然所以者何非唯斷位最後所捨得與今續時初得等流果以於斷位先已滅得亦與續時得等流故如何前位多刹那得爲同類因皆取今得而於今時但説最後一刹那得與今得果是故應如本文爲善文以正理論難破之趣思今論意唯取過去最後所捨一刹那善得之旨亦分明也故光法師釋云謂續善根時最初所得過去最後所捨得彼得今時果至生相正與彼力名與由昔已取不名取論主恐取續時過去諸初得故今釋言應説爾時續者前得謂前過去最後所捨得文但於過去所有善得皆起與果用不起取果用云難者是正理論難今論之趣也光法師即會之云若作倶舍師救世親論主意説若法從來未與者此中説之過去諸得雖於續時皆悉與果以前諸念皆曾與果倶句攝故是故不説最後所捨一刹那得今續善時最初與果故偏説之又續善時過去餘善亦能與果何獨説得既別説得明知唯取最後一念文文意過去所有諸得望今果見之雖起與果用不起取果用望別別果見之以前念念已起與果用了故以之爲倶句也斷善根位所捨最後一刹那善得從來未起與果用今續善根時初起與果用故以之爲起與果用不起取果用之位也爲言次於婆沙論文者云謂續善根時即住過去所捨善得其言雖似廣其意唯取過去最後所捨一刹那善得也第二釋意云任正理論難今論之道理亦婆沙論廣可取過去所有諸善得見故廣取過去所有善得釋也但於應説爾時續者前得之論文者光法師釋云又解論主云應言爾時續者前得謂前過去所有善得皆名最初所得得誰言唯取最後所捨得此所捨得通於三世非彼一切皆能與果故以前言簡取過去故婆沙十八云有時與果非取果謂相續善根時即住過去所捨善得已上論文文意顯也次於正理論難今論者付應説爾時續者前得之文言難之以實云之今論意自本不限過去最後所捨一刹那善得也問無覆無記同類因與果非取果類可有耶進云論文云謂與果時必亦取果無此義見付之無覆無記同類因種類非一准何無與果非取果之類哉是以有覆無記同類因與果非取果之類有之見例可同如何答寫本云寶治二年二月四日未時於東大寺尊勝院中堂東廊抄之畢倶舍論第六卷者爲去年倶舍三十講之當處之間爲聽聞加一見之次或訪明匠或加愚案爲開初心初學之惠解聊記一問一答之綱要有其謬之處後學必直之焉仰願以此稽古習學之微功必爲彌勒値遇之業因矣右筆尊勝院主權大僧都宗性年齡四十七夏﨟
