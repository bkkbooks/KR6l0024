body:
  text: 倶舍論第十九卷抄下問題問聖者未斷不起隨煩惱唯限不善惡作歟問聖者可起邪慢耶問異生位可有未斷不起類耶問忍善根位可起五見疑煩惱耶問現在五見名一念中除相應倶有法遍縁五部一切法類可有耶問遍行隨眠中可有唯縁一部類耶問修所斷隨眠可縁上界耶問九上縁惑可爲遍行因耶問欲界九上縁惑與無覆無記眼識爲異熟因歟問他界縁遍行隨眠可通無漏縁耶問光法師釋今論此二非見是邪智攝文云言邪智者謂無明相應邪智文爾者寶法師意可許此義耶問疑相應慧可名智耶問光法師意無覆無記心可縁上界耶問寶法師意無覆無記心可縁上界耶問光法師意通果無記心可縁心及名等耶問遍行隨眠相應心王遍行攝歟問已斷遍行因可起與果用耶問婆沙論中引品類足論説云九十八隨眠中三十三是遍行六十五非遍行文爾者三十三是遍行中無明可通相應不共耶問無色界可有他界縁遍行隨眠耶問見滅道所斷有漏縁惑互可相縁耶問色界上縁惑可縁憂根斷道耶問中間禪可有見惑耶問頌文云縁道六九地文爾者滅道法智所證離繋得唯限六地攝歟問道諦所斷無漏隨眠中可有不縁心品唯別縁道共戒得四相類耶問無色界道諦所斷無漏縁隨眠可縁下地能治類智品道耶問光法師意於見修所斷煩惱對治決定對治不定義如何釋之耶問見苦集所斷法中可有唯爲相應隨増不爲所縁隨増類耶問以煩惱倶時四相等望同時煩惱可有繋縛義耶問慢煩惱可爲斷善根牢強加行耶問處中無表可有離染捨耶
