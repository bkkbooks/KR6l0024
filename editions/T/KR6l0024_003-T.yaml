body:
  text: 倶舍論第一卷抄下問題問佛𣵀槃後一千年中造雜心歟問雜心論中釋有漏名云若増諸煩惱是聖説有漏文爾者正義耶問光法師釋虚空但以無礙無性由無障故色於中行論文作二釋爾者第二釋意如何釋之耶問光法師意斷煩惱證擇滅爲離能繋邊得之爲當離所繋邊得之歟問煩惱上四相與同時煩惱可被繋縛耶問光法師意於見所斷惑判同部異品縛強弱作二解釋爾者初釋意如何釋之耶問光法師意於見所斷惑判同異品縛強弱作二解釋爾者第二釋意如何釋之耶問光法師意有漏法中斷同部同品縛位不證擇滅義可有耶問於他身見惑可得縁縛斷無爲耶問光法師釋擇謂簡擇即惠差別論文云無染異染名惠差別爾者今此無染惠者可通有漏惠耶問光法師釋得滅異前名非擇滅論文作二解釋爾者初釋意如何釋之耶問寶法師引婆沙論説云虚空與四大等近増上縁文爾者今此近増上縁者作有力増上縁歟問所依根縁闕時於能依識可得非擇滅耶問光法師意有爲法永不生唯由縁闕歟問所得法得非擇滅時於能得得必得非擇滅歟問寶法師所引正理論中云如契經説言依有三無四無五文爾者今此無四無五者唯就有爲法論之歟問正理論意言依不通無爲云義別品類足論何文證之耶問無爲法遠近二法所攝歟問光法師解釋中明言依相引婆沙論二師異説爾者今論心同何師説耶問光法師依正理論意有漏法名見處故如何釋之耶問譬喩者意意識可縁眼等五根耶問雲煙塵霧影光明闇八色可實有色耶問長短極微可有別體耶問空一顯色二十種色外歟問光法師解釋中云此空一顯色即是彼青黄赤白文爾者離影光明闇外可有別體耶問光法師引正理論一説意唯顯無形句中唯説影光明闇文作二解釋爾者初釋意今此師説可正義耶問婆沙論意空界色可無顯無形色耶問光法師意無執受大種爲因聲中可有有情名聲耶問寶法師引入阿毘達磨論説云化語聲名有情名聲文爾者正義歟問寶法師意能化人可成就離質化人語聲耶問口外語聲可名業耶問雜心論意有執受無執受大種合生聲歟問輕重極微可有別體耶問頌文亂心無心等文爾者光法師依正理論意如何釋亂不亂心相耶問無表中可有唯一刹那類耶問光法師意現在世可有獨住極微耶問過未二世可有獨住極微耶問經部宗意可界處實有耶問光法師答行解行相爲約何者説名能縁問作五解釋爾者初釋意如何釋之耶問尊者法救意可許無表色耶問薩婆多宗意有爲法體生滅耶問頌文云彼體語或名此色行蘊攝文爾者光法師意今此二説其意可同耶問光法師釋八萬四千法蘊量擧三毒等分四人爾者等分言唯限末後一人歟問論中明五解脱處相爾者以幾法名解脱處耶問光法師意六界中識界可攝命根耶問尊者法救意可許心王別體耶問尊者覺天意可許心所別體耶問欲界容三界相攝十八界時可有多少不同耶問心倶生心倶滅法相攝十八界時可有多少不同耶
