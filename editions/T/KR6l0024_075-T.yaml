body:
  text: 倶舍論第二十五卷抄問一道所成思法種姓阿羅漢退住學位時必退思法種姓歟進云論中必退思法種姓釋也付之果退姓退其義既異設雖退阿羅漢果何隨可退思法種姓哉答一道所成思法種姓阿羅漢者退法種姓人證阿羅漢果之後修練根作思法種姓之類也而今此人起煩惱退阿羅漢果還住學位之時不退思法種姓者先在學位爲退法種姓還退住學位之時爲思法種姓者是勝進非退故付應是進非退之過必退思法種姓云也故今論云思法等四退住學位還住退非餘若異此者得勝種姓故應是進非退文光法師釋此文云思法等四退住學位時還住前退姓非餘思等四若異此者先時學位是退種姓今退住學思等四姓得勝種姓故應是進非退文問經部宗意以有漏道可證中間二果耶進云光法師釋云一來不還世俗道得亦容有退文付之經部宗意不許有漏道斷惑之義何以有漏道可證中間二果哉是以見成實論文云世俗道中無斷結故文如何答見論文云經部師説從阿羅漢亦無退義彼説應理文光法師釋此文云經部意説預流阿羅漢唯聖惠斷必無有退一來不還世俗道得亦容有退無漏道斷亦不退也故正理六十八云然經主意作如是言阿羅漢果亦無有退一來不還世俗道得容有退義文圓暉法師釋云依經部宗預流羅漢必無退果聖道證故中間二果許有漏道證故容有退也若超越三二果亦無有退文任此等定判經部宗意以有漏道證中間二果云事甚分明也但於經部宗意不許有漏道斷惑之義云難者有漏道雖非實斷惑道伏煩惱故可證中間二果也故慈恩大師宗輪論述記釋非離聖道有蘊永滅之論文云有漏六行不能斷煩惱但名伏故文加之今論餘處四中述經部宗義云或世間道損所依中煩惱種子亦名爲斷文光法師釋此文云若世間道損伏斷故名斷文泰法師釋此文云或凡夫用世間六行等智道指伏所依身中煩惱種子無近生或功徳亦名爲斷文此等解釋經部宗意許以有漏道伏煩惱之義見故以伏惑道可證中間二果也次於成實論世俗道中無斷結故之文者以有漏道雖伏煩惱現行不斷煩惱種子故云爾歟重難云伏惑道不斷煩惱種子者證中間二果云事其疑猶難體哉答伏彼煩惱可得其果體無漏故以有漏道可證中間二果也若不拔其煩惱根者可退其果故後以無漏道正斷其煩惱種子之後可證阿羅漢果也問經部宗意引何經説證不退阿羅漢果義耶進云論中引不動心解脱無退之經文證此義也付之今所引經文説不動法阿羅漢不退所得果之旨若爾者有宗意亦許此義何引此經文證一切阿羅漢不退所得果之義哉答論中依經部宗意成不退阿羅漢果之義云經言不動心解脱身作證我定説無因縁從此退故文經部宗意存一切阿羅漢不退無漏定之義故不動心解脱之稱亘六種姓也所謂依不爲惑動之義立不動心解脱之名故利鈍阿羅漢同名不動心解脱也故光法師釋此文云不動即是阿羅漢果故知不退文但於疑難之趣者是有宗得彼經文意之旨也有部經部之所存其義自本異也何混難之哉問論中述經部宗意云故於所得現法樂住有退無退故名退不退法如是思等如理應思文光法師釋此文作三解釋爾者第二解意如何釋之耶進云光法師釋云又解有退名第一退法無退名第六不退法思等四種如理應思文付之作多解釋爲顯義道不同也而今此第二解意全無異初釋有何差異爲別解釋哉答第二解意略其言故義勢頗不分明但按一段解釋旨趣於故於所得現法樂住有退無退故名退不退法之文無作三釋於如是思等如理應思之文作三釋也所謂初釋云有退故名思法無退故名第六不退法如是乃至有退故名堪達法無退故名第六不退法以思等四種種姓對第六不退法釋之也第三釋云有思名第二思法無思名不思法即是第六如是乃至有堪達名第五堪達法無堪達名不堪達即是第六是亦以思等四種種法姓對第六不退法釋之也第二釋云又解有退名第一退法無退名第六不退法思等四種如理應思然皆容退現法樂住異此前後釋不對第六不退法只就思等四種種姓如有退名退法有思名思法有護名護法有安住名安住法有堪達名堪達法如理應思皆是容退現法樂住爲言然皆容退現法樂住之釋此旨炳然也問可有本來第六種姓類耶答不可有此類也兩方若有此類者異生位種未定也何可有本來第六種姓類哉是以寶法師餘處解釋中述未遇縁前利鈍不定無此類見若依之爾者見今論文云非練根得名爲不退文豈非本來第六種姓類哉加之披婆沙論處處之文或百七十一云第一入胎是此前菩薩許僧祇以前菩薩或百七十九明得無諍定阿羅漢云先是菩薩種姓談順解脱分以前菩薩是定可本來第六種姓類如何答異生位種姓未定故不可有本來第六種姓類故見寶法師餘處解釋云一切衆生法爾身中具六種姓遇縁不同成利鈍性未遇縁前利鈍不定非是法爾何理相違文此釋意云一切衆生本來具六種姓故利鈍雖不定遇順解脱分等縁成利成鈍其類異也未遇縁前利鈍不定故無本來第六種姓類又不可有本來前五種姓類爲言但於今論非練根得名爲不退之文者非無學位始得不動故云爾也全非云有本來第六種姓類次於婆沙論二處之文者順解脱分以前具六種姓故利鈍雖不定心具慈悲專順菩薩種姓之類且立菩薩種姓名也何以之可定第六種姓哉問喬底迦阿羅漢退法種姓人歟答退法種姓人也兩方若退法種姓人者既以刀自害定知思法種姓人云事若依之爾者披婆沙論所引契經文説喬底迦阿羅漢相云六返退失阿羅漢果文豈非退法種姓人哉答婆沙論六十二中明此事述評家義云應作是説彼是退法文故任婆沙論評家義喬底迦阿羅漢可云退法種姓人也但於既以刀自害定知思法種姓人云難者是即婆沙論問答也評家意答此問云彼厭退故以刀自害若先不退而自害者乃是思法文此文意云思法種姓阿羅漢果聖者懼退失思自害者先未退阿羅漢果懼退失思自害也喬底迦阿羅漢先退阿羅漢果畢懼重還自害者是退法種姓人也爲言問經部宗意喬底迦阿羅漢六返退失者在無學位退之歟進云論中昔在學位退失釋也付之經部宗意許阿羅漢果聖者退現法樂住也有何證據釋在學位退失哉答見婆沙論文云契經中説有阿羅漢名喬底迦是時愛心解脱彼六返退失阿羅漢果已第七返還得阿羅漢果時恐復退失以刀自害文經部宗意存不退阿羅漢果云義故會通此經文之時若於無學位六返退失現法樂住已云六返退失阿羅漢果已令會通者豈此經云第七返還得阿羅漢果哉設雖六返退失現法樂住不可退失阿羅漢果故不可云第七返還得阿羅漢果而此經既云第七返還得阿羅漢果故知六返退失者昔在學位耽味時解脱有漏定六返退已深自厭責欲執刀自害之時由於身命無所戀惜至第七返臨命終時得阿羅漢果云還得阿羅漢果會也重難云經部宗意會今經文之旨猶不可然喬底迦先未得阿羅漢果者何云第七返還得阿羅漢果哉還得之字尤所難思也答問麟喩獨覺順解脱分位可轉向餘乘耶答可轉向餘乘也兩方若轉向餘乘者麟喩獨覺者最上利根人也順解脱分位更不可轉向餘乘是以順決擇分位無轉向餘乘相例可同若依之爾者婆沙論中麟喩獨覺順解脱分位可轉向餘乘見如何答見婆沙論七文云轉獨覺種姓順解脱分起聲聞及佛種姓順解脱分若起佛種姓順解脱分已則不可轉極猛利故文光法師當卷取意引此文任此文麟喩獨覺順解脱分位轉向餘乘佛種姓人順解脱分位不轉向餘乘云事甚分明也但於麟喩獨覺者最上利根人云難者麟喩獨覺者實雖最上利根人也其根不及佛種姓人順解脱分其位是淺故轉向餘乘也次於順決擇分位無轉向餘乘云例難者今論餘處二十三中本頌結麟角佛無轉一座成覺故長行述麟角佛言顯麟角喩及無上覺煗等善根竝無移向餘乘義皆以第四靜慮爲依一座便成自乘覺故麟喩獨覺從煗善根一座成覺故順決擇分位無轉向餘乘之義也此論義者去建暦元年倶舍二十四五卷三十講乘信問圓聽之論義也古來之間未見聞此疑問者旨趣暗雖不存知乘信者爲碩徳疑問所志定有深由歟可思之問論中引契經説云所得不動心解脱身作證我決定説無因縁從此退文爾者不動心解脱可有受用退耶答可有受用退也兩方若無受用退者不動心解脱無有一切時現在前之義何無受用退哉是以論中現法樂住有受用退判相例可同若依之爾者披婆沙論文不動心解脱無受用退見如何答不動心解脱無有一切時現在前之義故可有受用退也故婆沙論六十一云若此經説受用退者不動心解脱亦應有退非一切時現在前故文但於婆沙論不動心解脱無受用退云文者婆沙論六十一中釋契經不動心解脱無退現法樂住有退云文擧多異説如云不動心解脱以成就爲勝若得彼法更無所作故雖不現前而不説爲退四増上心現法樂住以現行爲勝不現前者便説爲退有作是説此契經中説未至定名不動心解脱説根本靜慮名増上心現法樂住世尊多起未至定現在前非根本靜慮等也已下有五異説可見之問以不動心解脱對無生智相應可有四句不同耶答發智論中無四句不同見兩方若有四句不同者發智論中不具四句不同見若依之爾者以時愛心解脱對盡智相應有四句不同相例可同如何答勘發智論文云諸無生智相應皆不動心解脱有不動心解脱非無生智相應謂不動法阿羅漢盡智或無學正見相應心勝解已勝解常勝解四句之中無無生智相應非不動心解脱之句也故婆沙論百二中釋此文云不動心解脱對無生智相應作順後句文但於以時愛心解脱對盡智相應有四句不同云難者盡智相應非時愛心解脱者謂不動法阿羅漢盡智相應心勝解已勝解常勝解故以時愛心解脱對盡智相應有四句不同也故婆沙論云此中時愛心解脱對盡智相應有四句文重難云以無生智相應除勝解餘心所可爲無生智相應非不動心解脱之句體何云無此句哉答見今一段廢立以時愛心解脱不動心解脱體對盡智無生智相應作四句故不出勝解之外餘心所也故盡智相應非時愛心解脱之句體唯出不動法阿羅漢盡智相應勝解心所不擧時解脱阿羅漢盡智相應除勝解餘心所也問如來可有未曾得功徳耶答無未曾得功徳也兩方若有未曾得功徳者今論中述世尊唯有一受用退如來無未得退定若有未曾得功徳者何無未得退哉若依之爾者見婆沙論處處之文或云佛亦於道得修習修倶不盡故或述如來無漏心心所法及未曾得有漏心心所法倶非他心智現所取境任此等文如來有未曾得功徳云事分明也如何答如來無未得退者諸論一同之説故無未曾得功徳云事必然也何況見今論餘處五文云佛無一徳由加行得暫起欲樂現在前時一切圓徳隨樂而起故佛衆徳皆離染得文披正理論餘處七十四説云若曾得現前能修未來者則薄伽梵得盡智時應未具修一切功徳爲具證得應更進修便同二乘功徳不滿文加之勘婆沙論處處之文或云世尊現起初盡智時已具得修一切功徳今若更修前應未得若爾前位功徳未滿初成佛時應非究竟證得無上正等菩提文或百六十三云若已得法現在前復能修未來者則佛般涅槃時現起一切靜慮解脱等持等至爾時亦應更修未來如此則盡智時應不具得一切功徳云何得名所作究竟文或百八十八説佛得盡智時得邊際云依成就故可言得邊際文任此等文如來無未曾得功徳云事更不可異求之但於婆沙論佛亦於道得修習修倶不盡故之文者望二乘道云爾也婆沙抄中釋旨如此次於婆沙論如來未曾得有漏心心所法非他心智現所取境之文者如來初盡智現在前位得一切有漏無漏功徳盡故如來所得功徳一切皆是曾所得法理實雖無未曾得類如盡智所修有漏功徳其體殊勝不似學位所得修習修有漏功徳故立未曾得名也准光法師餘處二十六得勝曾得故亦名未曾得之釋可思之也重難云光法師餘處第二釋意不云得勝曾得故亦名未曾得若依此釋意之時如何可會婆沙論今文哉答彼第二釋意乍名曾得修之爲言更非遮得勝曾得故亦名未曾得之義邊全無相違也尋云未得退者名自種姓功徳未得之歟爲當指勝姓功徳歟答自種姓功徳未得之名未得退亦指勝種姓功徳名未得退也疑云婆沙論中釋佛無未得退云無未得退住諸有情最勝根故釋獨覺有未得退云未得退者未得諸佛最勝根故釋聲聞乘中不時解脱有未得退云未得退者未得諸佛獨覺根故釋時解脱有未得退云未得退者未得三乘不退根故文今論文釋利根阿羅漢獨覺有未得退云亦於勝己殊勝功徳猶未得故文光法師釋此文云亦於勝己不共佛法殊勝功徳猶未得故文准此等釋思之指勝種姓功徳名未得退也自種姓未得之名未得退云事何處見哉答自種姓功徳未得之可名未得退云事道理必然也故正理論七十云除佛世尊餘不動法具有未得及受用退謂於殊勝無諍定等應得功徳未能得故有未得退文此文意自種姓應得功徳未得之名未得退見加之光法師餘處二十三所引正理論六十一中釋天授退頂云由彼曾起近頂善根依未得退密作是説文婆沙論六十一中述此義云謂彼已起煗善根不久當起頂善根中間貪著勝名利故於頂善根有未得退文自種姓功徳未得之名未得退云事此等之文亦炳然也但於婆沙倶舍兩論之文幷光法師釋者且出未得退之本云爾也更非遮自種姓功徳未得之名未得退之義也問修不淨觀修持息念入聖道者倶可有退失耶進云光法師所引正理論云修不淨觀入聖道者容有退失修持息念入聖道者必無退失文付之設雖修不淨觀入聖道者何必可有退失哉彼麟喩獨覺及佛依第四靜慮一生成覺豈非修不淨觀入聖道哉答修不淨觀修持息念入聖道者其類萬差也何可定修不淨觀入聖道者有退失修持息念入聖道者無退失哉是以見今論餘處二十三文明麟角及佛依第四靜慮一座成覺云有餘師説從不淨觀不起于座乃至菩提文婆沙論七中述評家義云如是説者菩薩所有殊勝善根謂從不淨觀乃至無生智皆是生中依第四靜慮一座引起尚非此生餘位何況前生麟角喩獨覺亦爾文明知修不淨觀入聖道者不必入有退失云事但於光法師所引正理論文者不淨觀治貪以無貪爲體持息念治尋以慧爲體故以之一往相配有退無退許也故正理論中述修不淨觀入聖道者容有退失修持息念入聖道者必無退失畢云尊重止觀無貪癡増如次應知有退無退文婆沙論六十二云有無貪増上有無癈増上初人可退後人不可退文此等之文皆是一往決判也全非性相而所定歟以實而言倶可通退失不退失也問於六欲天初入聖道者必可利根耶答正義家意不必利根也兩方若必利根者設雖於六欲天初入聖道者何必可利根哉若依之爾者見婆沙論六十二文云六欲天中初入聖道得聖果者皆是利根文如何答云此事正理婆沙兩論之中有二師説也故寶法師所引正理論七十云六欲天處得聖果者有説利根故無有退以有勝智能制伏心令背妙境入聖道故有説退者由闕資縁或所依身不平等故六欲天處二事竝無雖有鈍根隨信行姓生彼得聖亦無退理文顯宗論三十三説全亦同之准正理論二説思婆沙論意答欲天中何故無退之問云無退具故者當正理論有説退者由闕資縁等之第二師説也云六欲天中初入聖道得聖果者皆是利根諸利根者以不退故者當正理論有説利根故無有退等之初師説也但今此二師説中六欲天中有隨信行云説可爲正義今論幷正理七十顯宗三十三兩論中述隨信行數云若根姓道離染依身相乘合成一億四萬七千八百二十五種者一同之説無異義故也問時解脱阿羅漢退住學位後未還得無學果前修練根作見至類可有耶答可有此類也兩方若有此類者論中述從果退中間不命終故云退已須臾必還得故文既云須臾還得更不可有修練根之義哉若依之爾者聖者意樂非一准何無此類哉是以論文雖判一切從果退必得不命終全不云不修練根哉答時解脱阿羅漢退位住學位之後未還得無學果之前修練根作見至之義可有也故婆沙論六十七中引識身足論云謂時解脱阿羅漢退阿羅漢果作信勝解彼練根作見至已還得阿羅漢果文加之見光法師餘處解釋或六述見修無學三道展轉互爲同類因云或從無學退至學位轉根亦與已起利修道爲因文或十七明無學業以學法爲等流果云或時解脱退已轉根爲見至以過去鈍無學道爲同類因學見至爲等流果文任此等定判時解脱阿羅漢退住學位之後未還得無學果之前修練根作見至云事分明也但於今論退已須臾必還得故之文者於果位者聖者專所欣求故雖退彼果還得之思甚深多分須臾還得故云爾也更非遮少分修練根作見至之類也重難云婆沙論六十二中答諸已退者住經幾時之問或云住經少時乃至未覺或云退者不定不自在故之異説有之其中退者不定不自在故之師意云或經久時方得本果謂以欲果聞思慧力引起修慧聖道現前轉信勝解成見至根然後復起阿羅漢果故彼退已遲速不定許時解脱阿羅漢退住學位之後未還得無學果之前修練根作見至之義住經少時乃至未覺之初意無許此義而今論退已須臾必還得故之文當婆沙論住經少時乃至未覺之初師意故明知今論意不許此義也是一次勘婆沙論三十二文云信勝解者若決定依信勝解道得無學果於見至道得非擇滅文此文無諍不許時解脱阿羅漢退住學位修練根作見至之義見是二答今論退已須臾必還得故之文從多分説故少分亦許退果之後經多時類故今論意可同婆沙論有作是説退者不定不自在故之説也故許時解脱阿羅漢退住學位修練根作見至之義更無相違也次於婆沙論信勝解者得無學果於見至道得非擇滅云文者既云若決定依信勝解道得無學果故且據一類云於見至道得非擇滅也非云信勝解者得無學果一切皆於見至道得非擇滅故亦無所背也問一來果聖者起欲界上上品煩惱退時必可與預流勝果道得倶起耶答不必倶起也兩方若必倶起者設雖一來果聖者起欲界上上品煩惱退時何必與彼勝果道得倶起哉是以不還果聖者起欲界上上品煩惱退時不必與預流勝果道得倶起相例可同若依之爾者婆沙論中一來果聖者起欲界上上品煩惱退時必與預流勝果道得倶起見如何答見婆沙論百五十九文云謂諸聖者已離欲染若起中下乃至上中五品纒退時彼心預流果及勝果道幷善惡作憂根倶生品四蘊諸得倶起若起上上品纒退時猶能護加行者彼心亦與如前善得倶起其有不能護加行者除預流勝果道彼心與餘如前善得倶起文准此文思之一來果聖者起欲界上上品煩惱退時能護加行者彼心與預流果及預流勝果道得倶起不護加行者唯與預流果得倶起不與預流勝果道倶起可云也但於難中被出婆沙論説者全以非疑正被爲疑之説者婆沙論百五十九若一來者前六品纒隨起何退除善惡作憂根倶生品得彼心隨其所應與餘如前善得倶起之文歟若爾此文既置隨其所應之言故知一來果聖者若起欲界中下乃至上中五品煩惱退時彼心與預流果及預流勝果道得倶起若起欲界上上品煩惱退時能護加行者彼心與預流果及預流勝果道得倶起不護加行者唯與預流果得倶起不與預流勝果道得倶起爲言恐繁重故置隨其所應之言讓上之文惡得意爲疑甚不可然事歟護加行不護加行事婆沙論第百五十九幷第百六十卷中處處有之可見之問有漏道證不還果聖者證阿羅漢果後唯起無色界煩惱退阿羅漢果義可有耶答不可有此義也兩方若有此義者既許起無色界煩惱退何可定不起色界煩惱退哉若依之爾者婆沙論中無漏道證不還果聖者證阿羅漢果之後唯起無色界煩惱退阿羅漢果之義可有見相例可同如何答以性相案此事有漏道證不還果聖者證阿羅漢果之後唯起無色界煩惱退阿羅漢果之義不可有也但於無漏道證例難者凡位已斷欲色界煩惱入見道證不還果之人證阿羅漢果之後不可有起色界煩惱退阿羅漢果之義入聖之後必起凡位所斷色界煩惱能治勝果道故世出世道所成堅故永不退起之也准今論餘處二十三由此先離三靜慮染後依下地入見道者彼得果已於現生中必能引生後勝果道之文可思之故今此人唯起無色界煩惱可退阿羅漢果也重難云有漏道證不還果聖者之中未至地心無間起第二靜慮近分地心斷初靜慮煩惱第二靜慮近分地心無間起第三靜慮近分地心斷第二靜慮煩惱第三靜慮近分地心無間起第四靜慮近分地心斷第三靜慮煩惱第四靜慮近分地心無間起空無邊處近分地心斷第四靜慮煩惱都不起四靜慮根本地心證阿羅漢果之人唯起無色界煩惱可退彼果也婆沙論六十一中述不起彼地根本定前不起彼地煩惱退之旨故也答上下地近分地心互不相生故無此義也上下地近分地互不相生云事倶舍論第二十五卷同學抄幷第二十八卷明思抄中委記録之可引見也問無學聖者修練根無間道可通曾得道耶答不可通曾得道也兩方若通曾得道者披婆沙正理兩論所説不通曾得道見若依之爾者識身足論中出現在無學心已了別今了別非當了別句云謂時解脱阿羅漢住得不動無間道中云云無學練根無間道既有已了別義豈非通曾得道哉答有學無學聖者修練根無間解説二道唯限未曾得道不通曾得道也故婆沙論六十八中明有學練根云彼加行道或是曾得或未曾得無間解脱道倶唯未曾得文近無學練根云彼加行道或是曾得或未曾得九無間道九解脱道唯未曾得文正理論七十云學無學位修練根時加行皆通曾未曾得無間解脱唯是未曾文顯宗論説全亦同之任是等論説練根無間道不通曾得道云事分明也但於識身足論文者時解脱聖者修練根作不動第九無間道位成就前八無間道故云已了別今現起故云今了別不可當成就故云非當了別也重意云第九無間道現在前位前八無間道實雖落謝過去同是一種無間道故九無間道合見現在無學心之時第九無間道唯未曾得故雖無已了別義前八無間道已成就故指之云現在無學心已了別也非謂現在第九無間道是已了別全無相違也重難云識身足論文於現在無學心有三句中出已了別今了別非當了別句云謂時解脱阿羅漢住得不動無間道中也第九無間道現在前位前八無間道是過去無學心也何現在無學心中取之哉是一何況見識身足論次上文出現在無學心非已了別今了別非當了別句云謂先不退阿羅漢果住阿羅漢果無間道中得阿羅漢果從阿羅漢果定不當退文此文意先不退者金剛喩定位爲現在學心非已了別句若如今義者金剛喩定位成就前八無間道故可爲現在學心已了別句也是二如何答無學練根九無間道同一種類無間道故現在第九無間道雖無已了別義以前八無間道攝屬現在爲現在無學心已了別句也但於現在學心例難者金剛喩定一切道中獨得金剛名勝諸道故金剛喩定位以前八無間不爲一種類現在學心也故今論中云上界修惑中斷初定一品至有頂八品皆阿羅漢向第九無間道名金剛喩定以金剛喩定別擧之也故金剛喩定現在前位成就前八無間道不爲現在學心已了別句也重難云無學練根皆於應果者光法師解釋也無學練根第九無間道可道同金剛喩定何有不同哉答得金剛喩定稱獨在斷非想地煩惱第九無間道故無學練根第九無間道理實異之也但無學練根皆於應果者道數等同故就大旨云爾也問婆沙論中信勝解不轉根作見至者違識身足論文見爾者違何文耶進云婆沙論云如彼説有過去無學心是已了非今了非當了謂時解脱阿羅漢退阿羅漢果作信勝解彼練根作見至已還得阿羅漢果文付之依婆沙論所引見識身足論十二文出過去無學心已了別非今了別非當了別之句述謂時解脱阿羅漢果入不動時解脱阿羅漢轉根作不動之時有此義云也何違彼論現文引判退住有學位轉根之類哉答見婆沙論文標如彼説引之明知識身足論梵本有此文云事但於現行之本者譯者略之歟何況過去學心已了別非今了別非當了別之義有學練根作見至位雖容有此義論中出此句云謂阿羅漢從阿羅漢果定不當退文准彼思之過去無學心已了別非今了別非當了別之義無學練根作不時解脱位雖容有此義擧退住有學練根作見至後還得阿羅漢果之類尤順一段施設也加之有餘師信勝解不轉根作見至云説意雖會處處違文述彼作是答我不能通識身論文極明了故無會識身足論説識身足論中若無此文者豈不會之哉識身論文極明了故之言彼論中正有此文云事炳然也問無學聖者修練根時用九無間九解脱道有何故耶進云論中云久習故也付之有學練根世出世二道所成也尤可有久習義何不用九無間九解脱道哉何況退法種姓無學聖者修練根作思法重修練根作護法之時彼思法種姓是一道所成無有久習義不可用九無間九解脱道哉答論中釋久習義云彼鈍根姓由久串習非少功力可能令轉學無學道所成堅故文文意云證得聖果種姓決定之後障根無知久障勝種姓鈍根種姓久串習難轉故用九無間九解脱道爲言但於有學練根例難者光法師會此難云無學練根皆於應果有學練根皆於初果又於無學二聖所成學乃一凡不可爲例文文意云有學練根雖世出世二道所成凡位種姓是未決定不同聖位種姓學無學道二聖所成久串習故用一無間一解脱道云也次於無學重練根時所捨種姓無久習義云難者退法種姓無學聖者修練根作思法重修練根作護法之時彼思法種姓雖一道所成護法種姓之障退法之時成就之思法之時成就之故此障是久習之源也成就此障故彼思法種姓可有久習義也尋云久習指鈍根種姓歟爲當云能障無知歟答久習者指鈍根種姓也故論文云彼鈍根姓由久串習光法師釋又於無學二聖所成學乃一凡不可爲例也但久習能障無知故鈍根種姓有久習義也故尋久習之源亦由能障無知故能障無知云久習之義邊可有歟問有學練根解脱道位可修有漏法耶答不修有漏法也兩方若修有漏法者見光法師解釋云有學練根皆於初果文而得初果解脱道位無修有漏法有學練根解脱道其義可同若依之爾者婆沙論中述練根位得通果心云謂轉根作見至不動時文既云轉根作見至時得通果心明知有學練根解脱道位修有漏法云事如何答有學練根解脱道位如得初果解脱道故不修有漏法也故正理論中上云若有學位修練根時加行未來亦通修二無間解脱未來所修亦唯無漏如得初果畢下雖擧彼解脱道位修有漏法云有餘師説遂歎初義云前説爲善文婆沙論百六十三中上擧信勝解練根作見至解脱道位或云不修世俗道或云修世俗道之二説畢下述評家義云如是説者爾時唯修無漏道以同見道得果故文光法師餘處二十六釋有學練根解脱道位不修世俗智見之論文云解脱不修世俗智者如第十六解脱故以學練根如得初果一解脱故文解有餘師言解脱道位亦修世俗之論文云此非正義俗智不能斷有頂見惑故文任此等定判正義家意有學練根解脱道位不修有漏法云事甚分明也但於婆沙論轉根作見至時得通果心云文者正理論中會此文云彼論但依得倶生説如下地道現在前時上地化心亦説爲得謂如已離三靜慮染依初靜慮入見諦者亦説彼得四定化心然理不應由下見道現在前故修上地法彼文但依見道與彼得倶生説此亦應然文論家既會此文末學何可劬勞哉重難云見婆沙論一處百五十九文云已離欲染信勝解練根作見至無漏加行道時有説及解脱道時彼心與隨所應靜慮果欲界通果心品諸得倶起文正理論中引此文會之也何云會第百三十五卷文哉答婆沙論今文既有二師説第二師意已離欲染信勝解練根作見至解脱道時靜慮果欲界通果心品諸得倶起者有學練根解脱道位修有漏法云不正義一師説意也正理論中何可會之哉第百三十五卷文無有異説明知引之會也又尋云正理論中云如下地道現在前時上地化心亦説爲得者何處此文引爲例證哉答問光法師意相應行地修練根時可斷無知耶答不斷無知也兩方若斷無知者斷無知事必可依無漏智力相應行地無起無漏智何可斷無知哉若依之爾者光法師所引婆沙論中明相應行地轉根相云用多加行引一無間一解脱道文若不斷無智者寧用無間解脱道哉答相應行地修練根時不可斷無知不染無知是微細難斷法以凡位智輒不可斷之故也是以光法師所引婆沙論中述評家義云相應地中諸轉根者雖不捨劣得勝品根而得勝時劣品種姓不現行故亦名爲捨文寶法師所引正理論云若聖位中得勝種姓必捨前劣煗等位中修練根者但得勝姓劣姓不行名爲轉根非捨劣得文思此等文意不捨劣品根即不斷不染無知故也若斷不染無知者豈不捨劣品根哉但於光法師所引婆沙論文者彼雖非正斷不染無知爲伏彼無知用一無間一解脱道也去四月下旬之候於當寺八幡宮被行去年闕分倶舍論第二十四五卷三十講之時宗成法師對樹恩法師擧此疑問其時難云相應行地修練根時不斷無知者今此人至聖位之後猶可成劣品種姓根障無知歟若爾聖位豈可有此義哉次不捨劣品種姓者聖位之後思法種姓等人可成退法種姓等歟聖禪僧都其座云退法種姓人於相應行地修練根作思法種姓之後欲入見道之時世第一法位可捨退法種姓攝根障無知也如彼世第一法位頓捨三界九地諸異生性也餘位練根准之可思次聖位以後無漏五蘊爲種姓體望之論六種姓差異故雖成相應行地爲種姓體聞思等善不可云成劣品種姓聖位以後以彼不爲種姓體故也問以生得善可爲六種姓體耶答不爲六種姓體也兩方若爲六種姓體者修練根事爲得未得勝姓也而生得善自本成之何可爲六種姓體哉若依之爾者設雖生得善何不爲六種姓體哉答以生得善不可爲六種姓體其故六種姓者利勝不起鈍鈍劣不起利而生得善九品相望展轉爲因無有勝劣如今論餘處云生得善法九品相望展轉爲因正理論餘處述又生得善亦有九品一切相望展轉爲因容一一後皆現前故也若爾生得善無有利鈍差別何可爲六種姓體哉是以寶法師餘處解釋中判一切衆生法爾身中具六種姓遇縁不同成利鈍性順解脱分位利鈍性可定見而順解脱分者聞思所成善故生得善非六種姓體之旨文理旁炳然也問光法師意定障根障體可通善耶答或唯限無覆無記或通善云二意可有也兩方若通善者定障根障者能障力用強勝也何可通善哉是以見正理論當卷七十之文或云我所承禀諸大論師咸言練根皆爲遮遣見修斷惑力所引發無覆無記無知現行或述謂於所障諸解脱中有劣無知無覆無記性能障解脱是解脱障體依之光法師餘處一引此文畢云正理出解脱障體及根障體故言無記今者總出一切不染無知體性故亦通善文正理論文光法師釋定障根障體唯限無覆無記云事分明也若依之爾者光法師餘處一解釋或釋不染無知通善故云若唯無記無色無學異熟生心不現在前不成就故應名爲佛以此而言故亦通善文准此釋思之若定障根障體唯限無覆無記者生無色界慧解脱阿羅漢及時解脱阿羅漢異熟生心不現前位可有應名倶解脱應名不時解脱過不成就定障根障體故也或二十四云雜修靜慮初二刹那不染無知定障成就得倶滅取意文若不通善者何可云定障成就得倶滅哉答光法師餘處一述不染無知通善之旨畢會正理論今文作二解釋初釋云正理出解脱障體及根障體故言無記今者總出一切不染無知體性故亦通善文依此釋意者定障根障體唯可限無覆無記也但就此釋會應名倶解脱應名不時解脱之例難者述倶由得滅定無學聖者得滅盡定名倶解脱故正無色界慧解脱阿羅漢異熟生心不現前位雖不成就定障不得滅盡定故不可名倶解脱云後不時解脱利根阿羅漢名不時解脱故生無色界時解脱聖者異熟生心不現前位雖不成就根障非利根故不可名不時解脱也何況世尊獨斷二無知不成就之二乘假無此義故設雖暫時有二無知不成就義者可付應名爲佛過也慧解脱阿羅漢有後作倶解脱之義時解脱阿羅漢有後作不時解脱之義故應名倶解脱應名不時解脱過不爲痛也次於光法師餘處雜修靜慮初二刹那不染無知定障成就得倶滅云釋者不染無知通通果無記彼有三世得故云定障成就得倶滅更無相違也第二釋云或無知有二一者是善障法力劣二者無記障法力勝婆沙正理據勝而説故言無記今言通善亦據劣明文依此釋意者定障根障體可通善也但就此釋會定障根障者能障力用強勝云難者定障根障不必障法力強勝通障法力劣有何所背哉次於正理論二文者任光法師婆沙正理據勝而説故言無記之釋可會之也重難云光法師初釋云正理出解脱障體及根障體故言無記者問意任正理論現文定障根障體無覆無記定置致難故且隨難旨定障根障無覆無記置不染無知不限定障根障餘不染無知通善故非相違答許也非謂云爾故定障根障體唯限無覆無記重意云初釋意且就定障根障之外餘不染無知通善之旨釋成第二釋意還就定障根障體亦通善云也二釋各述邊邊義門實不相違歟何云初釋意定障根障體唯限無覆無記哉是一次通果無記心者是禪定所生果也不染無知體寧可取之哉何況不染無知若通通果無記者斷通果無記攝不染無知之時可捨所依定若爾今論餘處明定生心善法捨縁之時何不擧此位哉是二答疑難之趣亦一義意也非強不許之然而初釋意定障根障體唯限無覆無記云義專叶正理論文亦順光法師釋故所存此義也次通果無記慧雖禪定所生果其性微劣闇昧之類故可爲不染無知體也故光法師餘處一釋不染無知體之段雖破第二師義不難不染無知通四無記之邊逑不染無知通善故之時唯約無色無學異熟生心不現前位付應名爲佛過若不染無知不通通果無記者色界威儀心無三世得故依身色界無學聖者異熟威儀二無記心不現在前位不成就不染無知故亦可有應名爲佛過何唯約無色無學付此過哉明知不染無知通通果無記云事何況寶法師餘處一釋不染無知體通局云不染無知無覆無記劣慧爲體通四無記文任此等解釋不染無知通通果無記之旨炳然也但斷通果無記心攝不染無知之時雖捨所依定非全捨淨定故定生善法捨縁之中不擧之也准光法師餘處十五離染非全略而不論之釋可思之也問光法師所引正理論中云故學位中修練根者正爲遮遣見惑所發文爾者可亘三界見惑所發無知耶答可亘三界見惑所發無知也兩方若亘三界見惑所發無知者披光法師所引正理論文云若有學位修練根時道數所修如斷上界見道所斷文如此文者不亘欲界見惑所發無知見若依之爾者文無簡別之言正爲遮遣見惑所發定知可亘三界見惑所發無知云事如何答見光法師所引正理論文云故學位中修練根者正爲遮遣見惑所發有學練根位正遮遣三界見惑所發無知兼遮遣三界修惑所發無知爲言云無學位中修練根者正爲遮遣修惑所發無學練根位正遮遣三界修惑所發無知兼遮遣三界見惑所發無知爲言故引此文畢云學位練根雖亦能遣修惑所發正爲遮遣見惑所發故一無間一解脱道無學練根雖亦能遣見惑所發正爲遮遣修惑所發故九無間九解脱道文明知文故學位中修練根者正爲遮遣見惑所發者亘三界見惑所發無知云事但於光法師所引正理論如斷上界見道所斷之文者爲顯與隣得果時道相似之義且如此云也凡案光法師解釋前後述有學練根相似見道之旨有三界見惑以三界見惑所發無知爲正遮遣以三界修惑所發無知爲兼遮遣當卷引正理論文云故學位中修練根者正爲遮遣見惑所發餘處二十六解今論學位練根諸無間道四法類智隨應現修之文云以學練根斷障根無知正是見惑所引發故如斷見惑四法類智隨應現修故學練根如彼現起未來修六四諦法類以見道中八無間道不別標故即顯此門也或以上二界四諦所斷見惑所發無知爲正遮遣以欲界見惑及三界修惑所發無知爲兼遮遣餘處二十六云或似見道斷非想地四無間道彼地見惑非俗斷故即述此門也惑以非想地道諦所斷見惑所發無知爲正遮遣以下八地見惑幷非想地苦集滅三諦所斷見惑及三界修惑所發無知爲兼遮遣當卷引正理論文云若有學位修練根時道數所修如斷上界見道所斷由彼但與隣得果時道相似故餘處二十六云或似見道斷非想地道諦所斷一無間故以無學練根如得初果一無間故即釋此門也無學練根位正遮遣兼遮遣無知翻之可思也重難云以三界見惑所發無知爲正遮遣云釋當卷所引正理論正爲遮遣見惑所發之文今論餘處四法類智隨應現修之文尤爲依憑以非想地道諦所斷見惑所發無知爲正遮遣云釋當卷所引正理論道數所修如斷上界見道所斷之文亦爲證據以上二界四諦所斷見惑所發無知爲正遮遣云釋依何文理哉是一次當卷所引正理論文云道數所修如斷上界見道所斷廣亘上二界道諦所斷見惑所發無知餘處云或似見道斷非想地道諦所斷一無間故狹限非想地道諦所斷見惑所發無知若爾寛狹既別何云其意是同哉是二答以上二界四諦所斷見惑所發無知爲正遮遣云事雖無指依憑之文所似之法次第狹取之時且作此一釋也次上二界見惑合斷之故廣云道數所修如斷上界見道所斷狹述或似見道斷非想地道諦所斷論其時分同一刹那如得初果一或似見道斷非想地道諦所斷論其時分同一刹那如得初果一無間道有由彼但與隣得果時道相似故之義故當卷所引之文餘處第三之釋其言雖似異其義無相違歟就中餘處之釋欲成不修俗智所以故云斷非想地歟問光法師所引正理論中云無學位中修練根者正爲遮遣修惑所發文爾者可亙三界修惑所發無知耶答可亙三界修惑所發無知也兩方若亙三界修惑所發無知者見今論餘處二十六文述無學練根諸無間道四類二法隨應現修無學練根無間道位苦集法智不現起定若遮遣欲界修惑所發無知者何不許苦集法智現起之義哉若依之爾者文無簡別之言云何正爲遮遣修惑所發定知可亙三界修惑所發無知云事如何答見光法師所引正理論文故學位中修練根者正爲遮遣見惑所發者有學練根位正遮遣三界見惑所發無知兼遮遣三界修惑所發無知爲言無學位中修練根者正爲遮遣修惑所發者無學練根位正遮遣三界修惑所發無知兼遮遣三界見惑所發無知爲言故引此文畢云學位練根雖亦能遣修惑所發正爲遮遣見惑所發故一無間一解脱道無學練根雖亦能遣見惑所發正爲遮遣修惑所發故九無間九解脱道文明知無學位中修練根者正爲遮遣修惑所發者亙三界修惑所發無知云事但於今論餘處文者光法師釋無學練根皆於應果無學練根如斷非想地修惑九無間九解脱道故不許苦集法智現起之義也然而練根道非如斷惑道能治所治決定相宛故以四類二法智遮遣欲界修惑所發無知也重難云見光法師所引正理論七十文云然無學位修練根時道數所修如斷有頂文若遮遣欲界修惑所發無知者何云道數所修如斷有頂哉答任無學練根皆於應果之理故云道數所修如斷有頂也以爲被非想地能治四類二法智遮遣欲界修惑所發無知故全無相違也問寶法師所引正理論七十中明無學練根云雖八解脱漸得勝根文爾者今此勝根者指後種姓根歟答可非後種姓根也兩方若指後種姓根者得後種姓勝根尤可第九解脱道位於前八解脱道位更不可得之若依之爾者漸得勝根之言可指後種姓勝根見如何答雖八解脱漸得勝根者是指自種姓勝根可非後種姓勝根也即見正理論文云雖八解脱漸得勝根而由本心求勝姓故未得勝姓不捨前劣如得後果方捨前向文文意云於前八解脱道位所除障者雖後種姓障非自種姓障依除後種姓障令自種姓勝根漸漸勝進云漸得勝根也既云未得勝姓不得後種姓勝根之旨分明也若如此得意者漸得勝根之言可指後種姓勝根見云疑自被會畢問光法師意於天中不修練根故如何釋之耶進云光法師釋云而無退故文付之設雖天中無退既有六種姓之差別何不修練根哉是以二道所成思法種姓等聖者雖無退失亦修練根見相例可同如何答修練根事恐退失故也六欲天中都無有退故不修練根尤有其謂哉故今謂云依謂身地此所依身唯人三洲餘無退故文光法師釋此文云餘天趣中雖有聖道而無退故不修練根文但於二道所成思法種姓等聖者例難者彼有學位一道所成之時容有退故異六欲天中都無有退故修練根也問斷下三無色煩惱聖者修練根時捨下三無色無漏云云爾者今此人還退練根所得勝種姓時可得先所捨下三無色無漏耶答可得先所捨下三無色無漏也兩方若得先所捨下三無色無漏者於無漏定可有退得歟若依之爾者修練根時既捨之還退練根所得勝種姓時何不得之哉答斷下三無色煩惱聖者修練根時所捨下三無色無漏還退練根所得勝種姓尤可得之也但於無漏定可有退歟云疑未得其意見婆沙論四十五文云或有善法由加行故得亦由餘縁如四沙門果文述由餘縁得四沙門果豈非無漏定有退得哉此論義者去仁安元年倶舍二十四五卷三十講叡會問教寛之論義也問者講師倶爲碩徳定有深由歟可思之問正理論意超越證不還果聖者可修練根耶第二十一卷抄可記録之問已離色染信勝解依下地修練根無間道位可修上地無漏耶答於上地已得自在者可修上地無漏也兩方若修上地無漏者無間道位非容預更不可修上地無漏哉若依之爾者設雖無間道位何不修上地無漏哉是以婆沙論百六十四中依下地雜修靜慮初二念位修上地無漏見相例可同如何答已離色染信勝解於上地得自在依下地修練根無間道位可修上地無漏也故光法師所引婆沙論六十七中述評家義云應作是説若於上地已得自在而依下地學轉根等亦得上地無漏果道文但於無間道位非容預云難者無間道位雖非容預於上地得自在故可修上地無漏也故婆沙論百六十四中出未得非第四靜慮無漏智現在前而修無漏第四靜慮非淨之類云依未至定已離第三靜慮染信勝解練根作見至若無漏爲加行彼加行無間解脱道時依初靜慮已離第三靜慮染信勝解練根作見至若無漏爲加行彼加行無間解脱時靜慮中間如未至定説第二第三靜慮如初靜慮説文准此文思之已離色染信勝解依下地修練根無間道位修上地無漏云事炳然也問退位可得未曾得無漏道耶答可得未曾得無漏道也兩方若得未曾得無漏道者婆沙論中述諸未曾得聖道唯勝進時得故唯勝進位得未曾得聖道定明知退位不得之云事若依之爾者退位既非一准何無得未曾得無漏道之義哉答退位得未曾得無漏道之義可有也所謂退法種姓人練根作思法種姓斷非想地三四品惑之後起無覆無記心退思法種姓之時若不得退法種姓所攝三四品惑上未曾得能治無漏道者豈不退彼三四品惑哉爰知起無覆無記心退思法種姓之時得退法種姓所攝三四品惑上未曾得能治無漏道故不退彼三四品惑云事但於婆沙論文者退法種姓所攝三四品惑上能治無漏道望其體見之實雖未曾得劣種姓所攝無漏道故攝屬曾得類故云退位不得未曾得無漏道歟又有一義如十講抄問有學聖者修練根時可斷未得地根障無知耶答不可斷之也兩方若斷之者未得地根障無知是不成就法也何可斷之哉是以無斷未得地定障煩惱障相例可同若依之爾者有學聖者修練根作利種姓之後得上地時還可作鈍種姓上地根障無知未斷之故也如何答有學聖者修練根時不可斷未得地根障無知未得地無知是不成就法也何可斷之哉但於有學聖者修練根作利種姓之後得上地時還可作鈍種姓云難者作利種姓之後得上地時上地無覆無記心不可名根障無知且就一類顯此義者未離欲染聖者修練根作利種姓之時欲界根障無知所成就法故可斷之上二界根障無知不成就法故雖不斷之今此人修練根作利種姓之時已斷欲界根障無知故後離欲界染所得上界無覆無記心等不可名根障無知已斷欲界根障無知之人所起上界無覆無記心故也故無有學聖者修練根作利種姓之後得上地時還作鈍種姓之過也問無學位不捨未曾捨無知義可有耶答可有此義也兩方若有此義者婆沙論中無學位必捨未曾捨無知見若依之爾者設雖無學位何無不捨未曾捨無知之義哉是以有學位不捨未曾捨無知之義可有見如何答聖禪僧都云推之未曾捨無知者障不動種姓障根無知歟若爾婆沙論三十二中云時解脱者若決定依時解脱道得究竟者於不時解脱道得非擇滅故今此人不捨彼不動種姓障可云也故無學位不捨未曾捨無知之義可有也有學位亦可有此義婆沙論三十二中云信勝解者若決定依信勝解道得無學果於見至道得非擇滅故今此人不捨彼不動種姓障可云也故有學位不捨未曾捨無智之義可有也但於婆沙論中無學位必捨未曾捨無知見云難者未知何卷何文閑可勘之無學位捨未曾捨無知者時解脱阿羅漢修練根作不時解脱之位歟問聲聞阿羅漢可有九根不同耶答可有九根不同也兩方若有九根不同者若就種姓論之者唯可有六種姓設雖分不動不退可限七種何可有九根不同哉是以見今論文述七聲聞二佛差別由九根加佛獨覺分九根不同於聲聞阿羅漢不過七類哉若依之爾者婆沙論百五十二中述聲聞無學所起滅盡定有九品不同云無學位中退法種姓所起爲下下乃至始得不動種姓所起爲上下餘本得不動種姓所起爲上中波羅蜜多聲聞所起爲上上文此文無諍聲聞阿羅漢可有九根不同見如何答於聲聞阿羅漢中委悉細論之時可有九根不同也即一方疑難中被出婆沙論文其旨分明也所謂前五種姓爲前五品根於第六種姓中無學位轉根作不動種姓爲第六品根有學位轉根作第六種姓至無學位爲第七品根始得不動種姓所起爲上下者即此類也自異生位爲第六種姓至無學位爲第八品根本得不動姓所起爲上中者即此類也波羅蜜多聲聞爲上上品根故於聲聞阿羅漢中可有九根不同也但於今論七聲聞二佛差別由九根之文者是麁相分別之談非委悉細論之義故無相違也重難云無學位轉根作第六種姓可名始得不動何云有學位轉根作第六種姓至無學位名始得不動哉答無學位轉根作第六種姓是始得不動之本也全非所諍對自異生位爲第六種姓至無學位名本得不動有學位轉根作第六種姓至無學位亦名主始得不動也故始得不動可有二類也其中無學位轉根作第六種姓爲中上品根故婆沙論云從時解脱練根至不動法成就中上品根文雜心論云因時解脱種姓不動法中上文有學位轉根作第六種姓至無學位爲上下品根故婆沙論云始得不動種姓所起爲上下文尋云雜心論所説始得不動者何類耶答見雜心論文列九無學云或因時解脱得不動或始得不動不擧本得不動故准之或始得不動者即是本得不動也可讀始得不動云文點也若不爾者九無學中何不擧本得不動哉爰知雜心論云始得不動異婆沙論云始得不動種姓所起爲上下之文歟問雜心論意七種聲聞中可有本得不動耶答可有二義也兩方若有本得不動者雜心論五中列七種聲聞云謂前五種及二不動解脱或因時解脱得不動或始得不動文若有本得不動者何不列之哉若依之爾者七種聲聞之中不説本得不動者七種之數難成滿哉是以見今論文云退法等五不動分二後先別故名七聲聞七種聲聞之中列本得不動以今論文思雜心意七種聲聞其體可同如何答思此事雖可有異義且存相承義者雜心論意七種聲聞之中可有本得不動也即彼論文列七種聲聞云或始得不動是本得不動也可讀始得不動云文點也若不爾者七種聲聞之中何不擧本得不動哉何況婆沙論中述評家義云從時解脱練根至不動法成就中上品根本種姓不動法成就上下品根文雜心論五云因時解脱種姓不動法中上初不動解脱上軟文思此二文意雜心論時解脱種姓不動法者當婆沙論從時解脱練根至不動法名言大同之上同成就中上品根故雜心論初不動解脱者當婆沙論本種姓不動法同成就上下品根故也而初不動解脱者是始得不動故始得不動者即本得不動云事亦被推知歟重難云見婆沙論百五十二文明聲聞無學所起滅盡定有九品不同云始得不動種姓所起爲上下餘本得不動種姓所起爲上中始得不動之外列本得不動准婆沙論今文思之始得不動者非本得不動之旨甚炳然也答婆沙雜心兩論所説始得不動名言雖同其義是異歟婆沙據初得義練根所得不動云始得不動雜心據自本得義本得不動亦名始得不動各據一義立名不同歟去四月下旬之候於當寺八幡宮被行去年闕分倶舍論第二十四五卷三十講之時慶實法師對信算法師初擧此疑問畢宗性之結構也問論中明隨信行聖者云離染故成七十三文爾者今此七十三人者就各別人論之歟答就各別人論之也兩方若就各別人論之者婆沙論中煗等善根七十三人者就一人位前後論之見相例可同若依之爾者既云隨信行七十三人定知就各別人論之云事如何答於見道位無有離染之義故隨信行七十三人者就一人位前後如何可分別之哉於各別人可論之也但於煗等善根例難者煗頂忍前三善根位可有離染之義故就一人位前後依離染不同可論七十三人也故婆沙論云謂於欲界染具離有十具縛爲一離一品染乃至離九幷前爲十於初靜慮染離一乃至離九無別具縛即是欲界第十攝故後位亦爾如是乃至於無所有處染離一乃至離九爲九於此諸位所起煗等有七十三種類差別文既云於此諸位所起煗等有七十三種類差別就一人位前後依離染不同於煗等善根分別七十三種類之旨炳然也何況述體雖是一而位有異依位差別故説爾所七十三人所起煗等其體是一見若就各別人論之者豈可其體是一哉有説七十三人所起煗等其體各異云義意猶就一人所起煗等依位前後其體各異云也尋云煗等善根位有離染之義云事何處見哉答婆沙論中明起煗以後離染有無述評家義云如是説者此則不定若彼行者自知有力能生頂者即便起頂若知無力能生頂者則求離染所以者何若得離染當生勝處離下界故文煗等善根位有離染之義云事此文分明也問思法種姓聖者作倶解脱後起非想地煩惱時必可捨滅盡定耶答必可捨滅盡定也兩方若必捨滅盡定者設雖今此倶解脱聖者起非想地煩惱之時何必捨滅盡定哉是以退法種姓聖者作倶解脱之後起非想地煩惱之時不必捨滅盡定倶解脱聖者作思法種姓之後起非想地煩惱之時不必捨滅盡定相例可同若依之爾者思法種姓聖者作倶解脱之後起無所有處煩惱之時必捨滅盡定例亦可同如何答思法種姓聖者作倶解脱之後起非想地煩惱者無學位轉根作思法種姓者也自有學位思法種姓者至無學位二道所成思法種姓故永不起非想地煩惱退也若爾無學位轉根作思法種姓之後所起滅盡定故起非想地煩惱之時必捨之也故婆沙論百五十四中述退滅定亦阿羅漢果之類云及無學位起滅定已起三界結隨一而退文但於退法種姓例難者退法種姓人有學位起滅盡定之後斷非想地煩惱作倶解脱故於有學位起滅盡定之時隨其所斷煩惱若起下位煩惱退時捨滅盡定若起上位煩惱退時不捨滅盡定也次於倶解脱聖者作思法種姓之後起非想地煩惱之時不必捨滅盡定云例難者此亦有學位起滅盡定畢斷非想地煩惱作倶解脱之後轉根作思法種姓故有學位起滅盡定之時隨其所斷煩惱若起下位煩惱退時捨滅盡定若起上位煩惱退時不捨滅盡定也問分離非想地染者起滅盡定後起彼煩惱退時必可退滅盡定耶答必可退滅盡定兩方若不退滅盡定者既起彼煩惱退之尤可退滅盡定也是以無學聖者起滅盡定之後起煩惱退果之時必退滅盡定相例可同若依之爾者婆沙論中述捨一等至而無所得云謂遍淨沒生廣果時捨淨第三靜慮而無所得不擧分離非想地染者起滅盡定之後起彼煩惱退時若此位捨滅盡定者此類之中何不擧之哉答婆沙論百五十二中述評家義云如是説者此滅盡定有十一種謂具縛者所起離上上品者所起乃至離下下品者所起時解脱阿羅漢練根得不動者所起於非想地染離上上品者乃至離下下品者所起滅盡定其體各別見故分離非想地染者起滅盡定之後起彼所離煩惱退時可退離彼煩惱位所起滅盡定云事道理炳然也故婆沙論百五十四中述退滅定亦阿羅漢果云謂先學位起滅定已得阿羅漢果起下位結退及無學位起滅定已起三界結隨一而退隨其所應起下位結退時退上位所起滅盡定云也但於婆沙論中捨一等至而無所得之類不擧此位云難者略不擧之也如彼初靜慮沒生第二靜慮聖者無所有處沒生非想地之時亦雖捨一等至而無所得彼文不擧之可爲例證也問退法種姓阿羅漢果聖者不起煩惱退滅盡定義可有耶答可有二義也兩方若有此義者既不起煩惱何可有退滅盡定之義哉若依之爾者婆沙論中雖述無學聖者不起煩惱退滅盡定之旨更無簡退法種姓者如何答學者云此事所存二義也或一義云退法種姓阿羅漢果聖者不起煩惱退滅盡定之義可有也故婆沙論百五十四中出退滅定非阿羅漢果之類云及無學者退滅定而不起結文論文既無簡別之言設雖退法種姓阿羅漢果聖者何無此義哉即退法種姓阿羅漢果聖者不起煩惱唯起滅盡定障退滅盡定之義可有也或一義云退功徳事不過位退種姓退之二義離今此二義退滅盡定云事極難信也就中滅盡定障云物其體微劣故起無間解脱道無斷之起彼障許退滅盡定云義難有哉但於婆沙論文者且出一類會之者退法種姓阿羅漢果聖者修練根作思法種姓之後得滅盡定不起煩惱退彼思法種姓之時隨可退所得滅盡定故云及無學者退滅定而不起結也非謂退法種姓阿羅漢果聖者之中亦有此義全無相違也問正理論意不動法阿羅漢果聖者可退所得功徳耶答不退所得功徳也兩方若退所得功徳者既是不動法阿羅漢果聖者也何退所得功徳哉是以不動法阿羅漢果聖者不退所得果定所得相例可同若依之爾者正理論七十中述不動不退差異云此中第一但名不動如思法等由練根得仍有退失阿羅漢果此異彼故得不動名然於應果一切勝徳猶可退失不名不退文如此文者不動法阿羅漢果聖者可退所得功徳見如何答不動法阿羅漢果聖者者是第六種姓人故設雖正理論意不可退所得功徳云事道理必然也更不可疑之是以披正理論處處之文當卷云除佛世尊餘不動法具有未得及受用退不云有已得退餘處三十九述若不動法無學倶無無退捨見但於正理論然於應果一切勝徳猶可退失不名不退之文者准今論非練根得名爲不退練根所得名爲不動之文思之不動法阿羅漢果聖者者近作第六種姓之類故爲顯不動不退差異且約容有之義不動退所得功徳云歟理實而言不可退所得功徳也又有一義如十講抄問用樂遲苦速二通行作所作事可亙學無學聖者耶第三卷抄記録之畢問可有用苦遲樂速二通行作所作事類耶答可有二義也兩方若有此類者婆沙論中明用二通行作所作事雖有五種不擧此類知無此義云事若依之爾者見婆沙論文既擧用樂遲苦速二通行作所作事之類准例思之可有用苦遲樂速二通行作所作事之類也如何答此事雖爲學者異端且可存有此類云義也其故以道理思之有學無學聖者修練根時何無未至中間爲無間道初靜慮根本地爲解脱道之類哉若爾可有用苦遲樂速二通行作所作事之類也但於婆沙論中不擧此類云難者既擧用樂遲苦速二通行作所作事之類故影略不擧用苦遲樂速二通行作所作事之類也例如擧用苦遲樂速二通行作所作事之類故影略不擧用樂遲苦遲二通行作所作事之類擧用苦速樂速二通行作所作事之類故影略不擧用樂速苦速二通行作所作事之類影略不擧用樂速苦速二通行作所作事也問欲界善心現在前位得通行義可有耶答可有得不得二義邊也兩方若有得通行義者欲界善心者微劣功徳也何可有得通行之義哉是以見婆沙論文云若起聞思慧等時於無漏根非捨非得文若依之爾者婆沙論中未離欲染聖者起諸相似無量等功徳時得通行見既云相似功徳豈非欲界善心哉答婆沙論中云得功徳有二義門或以彼法得在生相名得故見婆沙論處處之文明九十四通行得捨云世第一法現在前時得一或二未有所捨文述百五十五無漏根得捨云住世第一法時於無漏根非捨而得文或雖彼法得非在生相修彼法故名得故婆沙論百五十五云雜修靜慮初刹那時乃至入滅定想微細等時於無漏根非捨而得文以此二門思之若據彼法得在生相之門論之者欲界善心現在前位得通行可云也聞思二慧無間聖道可現前故也婆沙論九十四中明通行得捨云此未離欲染聖者起諸相似無量解脱勝處遍處及不淨觀持息念念住等諸功徳時皆無捨得一即此意也未離欲染聖者起諸相似功徳者豈非起欲界功徳哉若據修彼法之門云之者欲界善心現在前位不可有得通行之義散善全無未來修故也光法師餘處二十六引婆沙論百五十五若起微微心時若起聞思慧等時於無漏根非捨非得非滅非起之文畢云准彼婆沙微微心及聞思慧等不修無漏文婆沙論中有此二門故處處定判各顯一門更非相違也重難云若聞思二慧無間有聖道現前之義者婆沙論中何云起聞思慧等時於無漏根非起哉答今此婆沙論一段之文從多分説也以何知之者如彼五品雜修靜慮相續現起之類第三刹那無漏心無問雖可有無漏根現起之義云第三刹那時如初刹那説如彼無漏他心通無漏念住無漏解脱無漏無礙等彼無間雖可有有漏心現起之義云若起無漏他心通時若起無漏念住無漏解脱無漏無礙解等時於無漏根非捨而得亦滅亦起也此等之文皆是從多分説也准而思之聞思二慧無間多分無漏心不現起故云於無漏根非起也問已離色染不還果聖者起色界煩惱退時得通行義可有耶兩方若有此義者婆沙論九十四中明通行得捨云若不還者已離色等染起色界等纒退時捨二無得文明知無此義云事若依之爾者退煩惱位是萬差得通行義非一准設雖已離色染不還果聖者起色界煩惱退之時何不得通行哉答已離色染不還果聖者起色界煩惱退之時得通行之義可有也所謂退法種姓不還果聖者離色界染畢練根作思法種姓之後起色界煩惱退之時必捨思法種姓所攝通行可得退法種姓所攝通行也若不還住退法種姓者可違得勝種姓故應是進非退之理故也但於婆沙論文者已離色染退法種姓不還果聖者住自種姓起色界煩惱退之時自種姓所攝自本成之故不得通行云也不及練根作勝種姓之後起色界煩惱退等之委細分別也問到究竟聲聞入見道時唯可依苦通行耶答唯可依苦通行也兩方若唯依苦通行者到究竟聲聞種類非一准入見道時何唯可依苦通行哉是以到究竟聲聞得第四果時不必依苦通行相例可同若依之爾者婆沙論中到究竟聲聞入見道時唯依苦通行見如何答過殑伽沙數如來應正等覺所有到究竟聲聞弟子法爾皆漸次證得四沙門果故必依未至定入見道故唯依苦通行也故婆沙論九十四中述評家義云應作是説一切到究竟聲聞皆決定漸次得四沙門果不以能説故但以法爾故謂過殑伽數如來應正等覺所有到究竟聲聞弟子皆漸次證得四沙門果是故法爾不應爲難文但於得第四果時不必依苦通行云例難者婆沙論中會此離云此二尊者倶是到究竟聲聞故決定漸次得四沙門果是故但依未至定入正性離生而尊者舍利子是毘鉢舍那行故依第四靜慮得阿羅漢果尊者大目連是奢摩他行故依無色定得阿羅漢果文問樂通行中伺相應非隨尋轉心所唯限尋歟答唯可限尋也兩方若唯限尋者本論中出此類不限尋見若依之爾者以性相思之伺相應非隨尋轉心所唯可限尋也是以樂通行中隨尋轉非伺相應心所唯限伺相例可同如何答定樂依本靜慮若依所餘地道依根本四靜慮生名樂通行故樂通行中伺相應非隨尋轉心所者唯可限初靜慮根本地攝尋也故品類足論十一云樂遲通行亦有四句或伺相應非隨尋轉謂樂遲通行所攝尋文但於衆事分中出觀相應非覺隨轉句云謂覺若覺不相應觀相應心心法之文者是謬也既背道理亦違品類足論文故更不可依用之問未知當知根及喜覺支通相應根二十二根中八根歟第三卷抄記録之畢問婆沙論中明三十七菩提分法實體擧三師異説爾者寶法師意以何説同今論耶進云寶法師釋云婆沙九十五有三説一説同此論文付之依寶法師解釋見今論文云如是覺分實事唯十述毘婆沙師説有十一擧云唯十云十一之二説若爾婆沙論三師説中三説同此論可云也是以光法師釋婆沙九十五有三説兩説同此論如何答見今論文偈頌云此實事唯十謂慧勤定信念喜捨輕安及戒尋爲體長行述如是覺分實事唯十即是信等五根力上更加喜捨輕安戒尋實體唯十云義論主存之見下云毘婆沙師説有十一身業語業不相雜故戒分爲二餘九同前實體十一云義是毘婆沙師説非論主所存故寶法師意婆沙論有三師説中實體唯十云一師説同今論云也光法師意今論現文擧云唯十云十一之二説故釋兩説同此論也兩師定判各存邊邊義歟問寶法師意以四聖種不立覺支有何故歟進云寶法師引正理論云覺支通道俗聖種唯道故不立覺也文付之聖種覺支倶可通道俗何如此釋哉答見正理論七十一文問何縁覺分不攝聖種答此問云而不立爲別覺分者以諸覺分在家出家倶能受行及有欣樂聖種唯有諸出家人受行欣樂在家有樂必無受行故不別立文顯宗論三十四説全亦同之寶法師取正理論文意釋覺支通道俗聖種唯道故不立覺也也重難云在家之人將入聖時身器清淨位豈不起四聖種哉正理論在家有樂必無受行之文尤難思哉答四聖種者衣服喜足飮食喜足臥具喜足等之義故出家之人專可受行之也在家人中雖自容有受行之行從多分説云必無受行歟問雜心論意無色界心望欲界時可有厭患對治耶答不可有厭患對治也兩方若有厭患對治者無色界心無縁欲界何可有厭患對治哉若依之爾者光法師所引雜心論八中述阿羅漢雖無不善法及對治而有壞對治持對治遠分對治畢云色無色界亦如是文如此文者無色界心望欲界時可有厭患對治見如何答無色界心不縁欲界故於欲界法不可有厭患對治云事道理必然也更不可疑之故見婆沙論處處之文或十七云無色界於破戒及起破戒煩惱無斷對治亦無厭壞對治是故無戒文或百四十一述無色界有四正斷云無色雖無壞對治而有持及遠分對治文設雖雜心論意何可背此等文理哉但於光法師所引雜心論文者無色界心望欲界時雖無厭患對治以色界心望欲界時有厭患對治故言總云色無色界亦如是歟問論文云有餘師説神即是定文爾者論主意可許此義耶進云論中破之不許此義見付之爲明論主能破之意披今論餘處二十七之文本頌結神體謂等持長行述依毘婆沙所説理趣神名所因唯勝等持神者等持爲體見有餘師説既同餘處論文論主意何不許此義哉答有餘師意云神即是定神名即直因等持爲體爲言而論主意云何縁於定立神定名諸靈妙徳所依止故存神者因諸靈妙徳用故於所依定體直立神名云事違契經説破也故論主破此義云又違經説如契經言吾今爲汝説神足等神謂受用種種神境分一爲多乃至廣説文但以靈妙徳用歸所依定體之時神者等持爲體也故光法師釋云以實而論定爲體性文依此義門之時神名所歸是勝等持故餘處論文全非相違也問論文云有餘師説神即是定足謂欲等文爾者正理論意今此足謂欲等者指欲勤心觀歟答可指欲勤心觀也兩方若指欲勤心觀者正理論七十一中述此師義云彼許等持體即是神亦是神足文此文意足者等持爲體非欲勤心觀見若依之爾者既云足謂欲等尤可指欲勤心觀是以光法師釋此文云足謂欲勤心觀四種文如何答今論中擧有餘師説云足謂欲等者文言無諍足者以欲勤心觀爲體見故論主難此師義云彼應覺分事有十三文正理論師代此師義會今難破云彼所言足謂欲等者爲顯等持有四種故擧因顯果説欲等言文文意云此師意足者持爲體欲等者擧等持因非足即以以欲勤心觀爲體故彼應覺分事有十三之難破不可來會也若爾依正理論釋思此師意足者等持爲體非以欲勤心觀爲體欲等者即欲勤心觀也是擧等持因顯等持中有四種爲言如此得意之時兩方之難自被會通者歟尋云正理論意此師義與婆沙論復有説者三摩地是神亦足欲等四唯足非神之義其意歟問今論意八聖道支可通有漏耶答可通有漏也兩方若通有漏者見今論文偈頌云七覺八道支一向是無漏長行述此中七覺八聖道支唯是無漏唯於修道見道位中方建立故八聖道支不通有漏云事分明也若依之爾者婆沙論中明發智論決定相云若覺支前分別道支則道支通有漏無漏文設雖今論意何可違發智論決定相哉答今論意八聖道支可通有漏也其故勘婆沙論處處之文或九十五云然今於此阿毘達磨發智論中有決定相若覺支後分別道支則道支唯無漏以七覺支唯無漏故若覺支前分別道支則道支通有漏無漏文或九十六云彼契經中唯説無漏菩提分法唯七覺支一向無漏故偏説之餘通有漏故彼不説文或云若覺支前説道支者欲界有頂亦有道支通有漏故文或百四十釋發智論十四若從預流果以世俗道證一來果修彼道時道支現在無之文云雖道支通有漏然覺支後説故亦唯無漏阿毘達磨有如此相文任此等文覺支前分別道支通有漏云事甚炳然也今論意豈不存此義哉但於今論偈頌長行之文者就増位幷覺支後分別道支云唯無漏也所謂道支増位是見道位見道位道支唯無漏故云爾也故正理論七十一云見道位中八道支勝故此一向無漏性攝文或又就覺支後分別道支云唯無漏也故正理論七十一云又諸論者許覺分法覺支後説定是無漏若説在前便通二種既覺支後方説道支故八道支一向無漏文准此正理論文思今論意由増位幷覺支後分別之二義云八聖道支一向無漏也全非遮餘位道支覺支前分別通有漏之義也重難云就發智論決定相難思有何故覺支後分別道支唯限無漏覺支前分別道支通有漏無漏哉是一次今論云世間亦有正見等法而彼不得聖聖道支名正理論七十一述雖正見等亦通有漏然彼不得聖道支名聖道名曰無漏故有漏道品不立聖道支名見若八聖道支有漏者豈不背此等文哉是二次品類足論十中出八聖道支能知智除苦集智若通有漏者寧除苦集智哉是三答覺支唯限無漏故覺支後分別道支亦唯限無漏婆沙論中云若覺支後分別道支則道支唯無漏以七覺支唯無漏故即顯此意也由此義故覺支前分別道支通有漏無漏也次聖位所起有漏道品可立聖道支名也故光法師餘處二十八所引婆沙論百六十二云彼雖學作聖道行相不明了故不斷煩惱如師子子未能害獸文但於今論幷正理論文者就増位幷覺支後分別道支論之故有漏正見等法不得聖支名云也次於品類足論文者此亦就増位幷覺支後分別道支論之故八聖道支能知智除苦集智也問七覺支可通有漏耶答不通有漏也兩方若通有漏者見婆沙論處處之文述七覺支唯限無漏之旨明知不通有漏云事若依之爾者婆沙論三十三中引契經説云十四覺支文非有漏無漏七覺支者何物名十四覺支哉是以辰旦人師婆沙抄二末釋此文云十四覺支者八聖道前有漏七覺支八聖道後無漏七覺支故成十四也文如何答七覺支唯限無漏也故正理論七十一云謂修道位七覺支増隣近菩提謂治有頂故覺支體一向無漏一切覺分皆助菩提唯此獨標覺支名者以最隣近菩提果故由此理趣證七覺支應知但依治有頂説此爲上首類治下地唯於無漏立覺支名文婆沙論中釋發智論十四若從預流果以世俗道證一來果修彼道時覺支現在無之文云此則遮説覺支通有漏有漏不能如實覺故文思此等文意七覺支者以能治有頂道爲上首類取治下地道爲其體亦由如實覺之義立覺支名故有漏道不治有頂地亦無如實覺之義故七覺支不通有漏也故見婆沙論處處之文或述發智論決定相云若覺支後分別道支則道支唯無漏以七覺支唯無漏文或云彼契經中唯説無漏菩提分法唯七覺支一向無漏故偏説之餘通有漏故彼不説文任此等文理七覺支唯限無漏不通有漏云事甚分明也但於婆沙論所引契經十四覺支之文者全非有漏無漏七覺支爲十四覺支故勘雜阿含經説念覺支縁内法外法爲二擇法覺支縁善法不善法爲二精進覺支斷不善法長養善法爲二喜覺支喜處喜處爲二輕安覺支身心輕安爲二定覺支定與定相爲二捨覺支捨善法捨不善法爲二是則無漏七覺支中分爲十四覺支也既非有漏無漏七覺支故婆沙抄釋更不可依用之問光法師意部行獨覺所得有爲無漏法僧寶攝歟答可有二義也兩方若僧寶攝者披光法師處處解釋當卷引婆沙説釋僧證淨云此中僧者謂聲聞身中學無學法餘處引顯宗論二十文解三歸依中僧寶述今所歸者是聲聞僧任此等定判部行獨覺所得有爲無漏法非僧寶攝見若依之爾者光法師明獨覺身中學無學法不名僧寶云獨覺據麟角喩文以知部行獨覺所得有爲無漏法可僧寶攝云事如何答此事雖有學者異義且存一義云於部行獨覺中先聲聞別種姓相分若據先聲聞部行所得有爲無漏法者可僧寶攝同是聲聞種姓人所得故若據別種姓部行所得有爲無漏法者可法寶攝彼獨覺種姓人所得故也但於光法師獨覺據麟角喩之釋者部行獨覺之中多分是先聲聞類所得有爲無漏法僧寶攝故爲簡之云據麟角喩也如彼婆沙論中云以彼多是聲聞種姓也更非遮少分別種姓部行所得有爲無漏法亦法寶攝歟重難云別種姓部行可有衆部相隨之義若有部黨者可有四人已上和合之義彼所得有爲無漏法何非僧寶攝哉答僧寶者名聲聞僧所得有爲無漏法聲聞僧具事和理和之二義故也此二義中雖有自不具事和之類必有理和故名僧衆別種姓部行出無佛世不具説戒羯磨等事和之義亦無理和之義故彼所得有爲無漏法不爲僧寶攝也重難云先聲聞部行出無佛世故不可有説戒羯磨等事和之義彼所得有爲無漏法何爲僧寶攝哉答先聲聞部行者聲聞種姓人故專容有事和之類也而出無佛世雖無説戒羯磨等事和之義有理和故彼所得有爲無漏法爲僧寶攝云重意云僧者以事和爲本故容有事和之類自無事和之時由有理和故成僧衆別種姓部行自本無有事和之義亦闕理和之義故不成僧衆故彼所得有爲無漏法不爲僧寶體也問論文云然所信法略有二種文爾者寶法師意以四諦如何分別總別二法耶進云寶法師釋云三諦唯別道通總別文付之依寶法師解釋見今論文云然所信法略有二種一別二總總通四諦別唯三諦全菩薩獨覺道文若爾三諦唯別之釋寧不違今論文哉答寶法師今解實似違論文但推之云總通四諦之義邊讓論文不釋之就別唯三諦全菩薩獨覺道之論文且釋三諦唯別道通總別歟或又按一義云於苦集滅三諦別法之外無總法體於道諦者別法之外有總法體故云爾歟問光法師意在家聖人所得有爲無漏法僧寶攝歟進云光法師僧寶攝釋也付之在家聖人全無和合之義是不成僧衆彼所得有爲無漏法何爲僧寶攝哉是以菩薩獨覺無和合之義不成僧衆故彼所得有爲無漏法非僧寶攝相例可同如何答在家聖人是聲聞僧專容有事和之類也而彼在居家雖無説戒羯磨等事和之義彼此同證四諦理具理和之義成僧衆故彼所得有爲無漏法爲僧寶攝也故光法師問天中聖人在家聖等不成僧衆何寶所攝答此問出自義云僧有二種一者事和二者理和聖人據理故皆名僧文在家聖人據理和之義成僧衆之旨此釋分明也但於菩薩獨覺例難者菩薩獨覺獨一出世不具事和理和之二義不成僧衆故彼所得有爲無漏法不爲僧寶也更非相例歟問光法師意麟喩獨覺可有理和義耶答無理和之義也兩方若有理和義者光法師出理和僧擧天中聖人在家聖等明知麟喩獨覺無理和之義云事若依之爾者設雖麟獨覺所證理若和合者可有理若和合者可有理和之義也如何答理和者有多類聖人彼此同證理名之理和也而麟喩獨覺獨一出世無彼此同證四諦理故不具理和之義也故見光法師解釋云菩薩獨覺獨一出世不成僧衆身中無漏法中所攝菩薩麟角獨一出世無理和之義不成僧衆故彼所得有爲無漏法是法寶攝非僧寶攝定置問天中聖人在家聖等不成僧衆何寶所攝答此問出自義云僧有二種一者事和二者理和聖人據理故皆名僧文此答意云天中聖人在家聖等異菩薩麟喩具理和之義成僧衆故彼所得有爲無漏法爲僧寶攝爲言如此聊簡之時疑難自被會畢問十無學支捨縁中可有得果捨耶答不可有得果捨也兩方若有得果捨者以道理思之不可有得果捨哉若依之爾者婆沙論中述依有尋有伺定初無學現在前過去十無學支無云設已生滅得果轉根或退捨故文有得果捨云事此文分明也如何答十無學支無得果捨云事道理必然也更不可疑之但於婆沙論文者乘言便云爾也即見次上卷文述依有尋有伺定初學見現在前過去學八支無云設已生滅得果轉根或退捨故文乘此言便擧得果捨也或一義云無學位雖立十無學支名望法體見之從有學位有其體故初得無學果之時有得果捨云歟問有宗意斷離滅三界其體可同耶答其體可同也兩方若其體同者見今論餘處一文云擇滅謂離繋隨繋事各別婆沙論三十七中述擇滅但如有漏法數量故擇滅無爲隨所繋事其體各別判以知斷離滅三界其體各別云事若依之爾者光法師所引正理論中明斷離滅三界云然三界體約假有異若就實事則無差別文此文無諍斷離滅三界其體可同見如何答此事更非指難義歟所謂以實而言一一法上擇滅皆悉名斷界名離界名滅界故斷離滅三界其體可同然而且爲分別三界差異據世俗門云無爲説三界離界唯離貪斷界斷餘結滅界滅彼事也故光法師釋云且據世俗説三界異若約實義體無差別一一擇滅界皆悉名爲斷離滅故正理七十二云然三界體約假有異若就實事則無差別文寶法師釋體一無爲就三義別立三名也畢又引正理論今文加之勘發智論一文云諸斷界是離界耶答如是設離界是斷界耶答如是諸斷界是滅界耶答如是設滅界是斷界耶答如是諸離界是滅界耶答如是設滅界是離界耶答如是文婆沙論二十九中釋此文云前約阿毘達磨依世俗理就近對治辨三界別今隨契經顯此三界體無差別謂有漏法一一斷時皆得一斷此一一斷約差別義説爲三界故此三界義雖有別而體無異文任此等定判斷離滅三界其體是同云事分明也但於今論餘處文幷婆沙論説者論滅體隨所繋事如有漏法雖數量衆多其體各別於一一擇滅上皆悉立斷離滅三界名故云若就實事則無差別全無相違也重難云見泰法師釋問云何名爲約假有異答如一極微上離貪結義邊名爲離界斷餘八結義邊名爲斷界滅界繋事體邊名爲滅界如是釋者一極微上擇滅名斷離滅爲約假有異之義見豈非相違哉答泰法師釋實似難思若背論家定判諸師解釋者更不可依用之但試會之者此釋意云縁一極微貪結上擇滅名離界縁一極微餘八結上擇滅名離界此所縁一極微上擇滅名滅界是約假有異之義也爲言一極微上擇滅名斷離滅三界非謂約假有異之義全無所背也寫本云文永十年癸酉後五月七日午時於東大寺尊勝院護摩堂之南庇新學問之閑窓抄之畢自去三月五日亦始此勤至後五月七日果終其功前後九十日送春迎夏問端六十條訪古記新修學之志佛神垂哀耳捧此所生慧業奉仰春日大明神之冥助以此抄出微功必爲上生兜率天之業因凡厥自父母恩愛之親族師弟同法之善友至三界流轉之含識六道輪迴之群類滅罪生善離苦得樂出離生死頓證菩提迴向無漏濟度普及而已右筆華嚴宗末葉權僧正宗性年齡七十二
