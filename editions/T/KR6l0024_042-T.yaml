body:
  text: 倶舍論第十三卷抄上問以欲天善業名雜業可云耶答云云兩方若云名雜業者凡天中是殊勝處也所起善惡二業相望之時更不可云惡勝善劣如何以彼善業可名雜業耶是以光法師當解釋中釋雜業純業不同或造人等善業微劣煩惱増強數爲煩惱前後雜故名雜造天善業雖衆起或善勝惡劣故得純名云云如解釋者既對入善業以天業名純業非雜業云事分明也若依之爾者見餘處論文欲善業果必定應爲惡業果雜以欲界中惡勝善故述廣以欲界善業言惡勝善劣是以光法師釋此文欲界善業果必定應爲惡業果雜如五趣中造善業及四趣中受異熟言如五趣中造善業言非以欲天善業名雜業哉如何答以欲天善業名雜業云事餘處論文并光法師解釋實分明也更不可及異求者歟但於善勝惡劣故得純名釋者云此事可有異義也一云欲界天中善業思已等四業中雖雜業攝人善業惡最勝善最劣也對彼欲天善業善勝人善惡劣人惡故對人善業邊云善勝惡劣名純業也不同四業中雜業自業哉更無過可答申也重難云以欲天業純淨業者即内外倶淨業歟若爾述或造雜業感内淨外穢指人等業歟所云内淨外穢指何耶加之既云善勝惡劣可善惡相對義何云對人善惡哉答於人趣指劫初及指五趣中有歟内淨者劫初中有依身清妙故也所造惡業亦感外毒刺等故云外穢也答對人善惡事還又可言善惡相對義以異人善惡且爲天善惡劣也故無過歟難云天惡業尤可感共毒刺等何云内外倶淨耶答付同趣論淨穢故不云外穢也一云判雜業純業之時欲天同人趣故不論之以上界天趣對人趣顯業不同歟但不云欲天事濫上界天趣故且偏就無濫人趣明雜業也天實雜業故以欲天果云内淨外穢也故非相違歟難云善勝惡劣若指色天者述色無色除惡上界無惡何可云善勝惡劣耶況對人趣等云造天善業何可除欲天耶若云天偏上界者如四業中可欲界上界相對也而既不然人趣天趣相對尤天中可攝欲天哉答色無色除惡者指不善云惡也今善勝惡劣者指有覆無記云惡也其旨婆沙論百四十文分明也以人趣天趣云意指欲界上界義也意云内外倶穢等付五趣別別有其不同欲界云時總爲一故別云不同不顯故付五趣論雜業純業廣顯内穢外淨内淨外穢内外倶穢内外倶淨等義也故無過歟問頌文思即是意業云云爾者限意識相應可云耶答可云通六識相應也若云限意識相應者既云思即是意業尤可通六識相應若限意識相應者五識相應思豈非三業攝耶是以婆沙論中通六識相應見若依之爾者光法師當解釋中釋意業或意謂意識業即謂思或思是意業思是能作能等起身語是所作所等起云云限意識相應云事分明也如何答開當論疏文案二業二業相以一切業或立二業爲思業思已業或立三業爲身語意業而若限意識相應者二業三業中豈不攝五識相應思哉其旨可任一方所難婆沙論文云若在意地若在五識皆名思判更無疑哉但於意謂意識等釋者識體雖通六識相應意業中作身語能等起是其也付其本且云意謂意識業即謂思也更非云限意識相應哉無過答申也重難云既云意謂意識業即謂思判思是意業思是能作能等起限意識相應旨分明也今此二業三業中取五識相應云事全不見哉答寶法師所引正理論中難經部義且必不攝依眼觸等所起諸思等判釋此文寶法師唯此五識相應之思是意業云云明知身語意三業中無所漏業云事但於解釋者如前重答申也更無過歟尋云五識相應思如何可名意業耶答判六識轉爲意五識名意根故也問光法師意約所依可云立意業耶答約所依不立意業可云也兩方若云約所依立意業者見論文若約所依應唯一業以一切業並依身故云云如此文者約所依立身業立意業事不約所依見若依之爾者光法師所引正理論文此業依意復與意倶等起身語故名意業云云既云此業依意尤約所依處云立意業哉如何答如自本答申立意業事約所依起不約所依云事如其次第由上三箇論文光法師由等起故立意業解釋分明也若以意爲所依故名意業者豈不濫約所依立身業義哉爰知身業約所依語業約自性約等起云事但於此業依意復與意倶正理文者依又與意倶故立意業云也此即同時意所等起故名意重意者依等起言雖廣通身語二業同時意所意業時不簡身語二業意業獨依等起旨釋更非約所依立意業名義是以辰旦人師神泰判身可依意不必與意倶無心時亦有業故不名意業等即非顯此意哉無過可答申也重難云若同雖等起非同時等起故簡身語業者同雖所依非同時所依故尤可簡身語業何約所依不立意業可云哉答於意業者雖有以意爲所依以意爲能等起二義於身業者偏以身爲所依以身不爲能等起故依具所依一邊偏以身業約所依云也於意業者雖有以意爲所依能等起二義所依義關身業偏依等起立意業判也全無過歟問薩婆多宗意以定境界色可云無見無對色耶答非無見無對色可云也付之定境界色非眼所取又非對礙法尤可云無見無對色哉如何答依正理論意薩婆多宗意定境界色有見有對色可云非無見無對色也見正理説前八遍處等現前之時非成滿時雖縁世間本有色至成滿位由定力微細青黄赤白色現前也此色定中現前故非自身眼根境微細故非他人眼境雖然青黄赤白等色故可云可見有對色也如何問有宗意證無表實有義引八證見爾者法處色證光法師如何釋之耶進云光法師所引經中不言無色故證有色義釋也付之設雖無無色言何可證有色義耶若不言無色故證有色者不言有色故又可證無色義哉如何答契經中對有見有對無見有對以法處云無見無對不云無色故證有法處無見無對無表色也但不云有色事有非色故也若色全無何不云無色耶如何問於色界可有表所發無表耶進云色界必無依表發無表判也付之色界聞慧發表業者光法師餘處解釋也縱雖色界生得善心所發表不發無表勝色界聞慧所發表何不發無表耶況見餘處論文色界聞慧雖生聖道欲界生得善心不生聖道云云唯今此文色界聞慧力用勝欲界生得善云事分明也而欲界生得所發表發無表云云勝色界聞慧所發表豈不發無表耶加之光法師所引婆沙論中述色界生得善所發表不發無表全不簡聞慧耶如何答於色界無表所發無表云事色界必無依表發無表文其旨實分明也但於聖道生不生者色界聞慧定地攝故順定勝於散劣也欲界生得散地攝故於發表無表勝順定劣也故其義邊所望不同也何可勞之哉次不簡聞慧事彼且先擧二界生得總顯示二界無表發不發義也何可云不簡聞慧哉無過可答申也問光法師意色界聞慧可發表業耶答色界聞慧發表業可云也兩方若云發表業者定地散慧定勢力可劣如何可發表業耶是以光法師所引婆沙論中述色界生得發表全不云聞慧發表耶加之色界聞慧發表者定可發無表如何可云色界必無依表發無表耶何況婆沙論中述無隨轉戒善心起表善心聞慧善心云云既聞慧之外出起表善心明知色界聞慧不發表業云事若依之爾者光法師餘處解釋中破古師義何妨聞慧不發業者説聞慧心能發業者亦發業心攝云云色界聞慧發表業云事無疑耶如何答聞慧勝品慧也縱雖色界聞慧何不發表業哉其旨如一方所難也但於婆沙論文者光法師何妨聞慧不發業者説聞慧心能發業者衆發業心攝判其旨分明也次不云聞慧發表事且付生得示其相故不云聞慧也更非簡之哉次聞慧發表可發無表云事色界聞慧順定勝散劣故雖生聖道不發無表也無過可答申如何問頌文欲後念無表依過大種生云云爾者今此後念發表能造大種者即爲初念無表能造將別類大種可云耶答或云初念無表能造或云別類大種光法師二解釋也二解釋倶不明先云初念無表能造釋不可然凡一四大種尤可造一色如何可造多色哉況一具大種所造爲倶有因者諸論所説分明也若云初後念無表一具大造者寧初後念無表可爲倶有因耶是以見正理論説有成能造大種不成所造色義云云如此文者初念無表能造之外非有後念能造哉次云別類大種造釋又不明凡能造大種尤與所造色可倶起何可云別類大種造耶就中見婆沙論説問成現在大種成現在造色耶爲如是答了以非現在大種無果故判若夫別類大種造如何成現在大種之時可成所造色耶如何答初釋意後念無表造者即初念無表能造云事專依以非現在大種無果故文也但於一具大種不可造多色云難者光法師一四大種可不能造多有對色造無礙色多亦無間判於無表色者無礙故一四大種造多色可云也次於可爲但有因云難者光法師以無礙故可言造多由時別故非互爲果故非倶有因述雖一具大造時別故非倶有因云也次於正理文者光法師此據初念造後無表會通也以別類大種造後念無表云事據正理或有成就能造大種非所造色文於現在有獨住大種云釋也但於以非現在大種無果故文者光法師會從多分説故據造有對故也故無過可答申也問光法師意於有對色成能造大種不成所造色義有可云耶答可有此義也兩方若云有此義者見婆沙論所説述成現在能造必成所造色事以非現在大種無果故亦非現在所造色無因故云云光法師釋今此文付有對色能造説之釋知不可有此義云事若依之云爾者能造所造之義非一唯何無此義耶如何答如自本答申成能造不成所造義可有也即光法師解釋中於聲之能造大種有獨住判故也但於據有對説釋當處釋釋無表能造故無表能造雖有獨住婆沙論以非現在大種無果故文釋據有對説也餘處釋當處釋其心別合可云二釋也尋云當處從多分説釋意於聲之能造有獨住存歟將無獨住存歟答云此事可有二義也或據有對説釋上加無表能造從多分説判故於有對色能造無獨住云義可有也或從多分説釋意於有對色能造有獨住存故也問中間禪所攝隨轉戒即彼地大種所造也可云耶答彼地大種所造可云也兩方若云非彼地大種所造者凡有漏自地依者今論定判也設雖中間禪所攝隨轉戒何不云彼地大種所造耶若依之爾者中間禪是與初靜慮同一地所繋也尤可云初靜慮大種所造哉如何答中間禪所攝隨轉戒即彼地大種所造可云也有漏自地依判故也難云若爾者品類足論中無尋唯伺地十八界中三界十二處中二處攝云云若彼地有大種者何不云觸界觸處攝耶答云此事雖有學者異義且存申一義者初靜慮中間禪同一繋縛地也其中有尋有伺地外立無尋唯伺地事於定靜慮尋相應麁不相應細也爲顯此勝劣不同有尋有伺地外立無尋唯伺地處也而於大種五根隨眠等者同一繋縛無勝劣不同故出無尋唯伺地體之時別不出之也以實云時中間禪所攝大種色眼等五根三十一隨眠可有也問有是刹那謂初無漏云云爾者今此初無漏者可云限現行苦法忍耶答可云限現行苦法忍也兩方若云限現行者當光法師解釋中不云限現行苦法忍知廣可取未來苦法忍云事苦依之爾者光法師餘處解釋中可限現行苦法忍見如何答如自本答申一刹那者可限現行苦法忍也是以光法師餘處解釋中苦忍名一刹那由具二義一者現行二非等流如不生下忍雖非等流而闕現行判意者於未來下品苦忍雖於上下忍現行時非等流若下忍現行時非非等流故不名一刹那故一刹那義限現行苦忍也問散無表能造大種與定無表能造大種爲同類因義可有耶答散無表能造大種與定無表能造大種爲同類因義可有之兩方若云有此義者云散依等流性定生依長養者當論所判也既等流長養各別大種也如何可爲同類因哉若依之云爾者定散無表能造雖異是無記性攝也寧不爲同類因哉答以性相案之初無漏心隨轉戒能造大種前無有無漏戒能造大種可爲同類因又有漏隨轉戒能造有漏自地依色界大種也初無漏戒能造無漏隨生處欲界大種也若以散無表能造不爲同類因者以何大種爲同類因哉若非同類因所生者可有大種一刹那而婆沙論中簡之明知散無表能造與定無表能造可爲同類因云事但於等流長養別者五類門雖異同自性無記故可爲同類因也故無過可答申也難云光第二卷釋中自性者謂長養五根香味觸及外香味觸判内香味觸中無等流自性無記見散無表能造自性無記者豈不出之哉答光第二卷釋不擧盡之也何可劬之哉問寶法師今解釋中引正理論説雜對別異有情相續發多無貪所生無表云云爾者今此衆多無表者一具大種所造可云耶答一具大種造可云也兩方若云一具大種所造者凡今此衆多無表既非倶有因如何可云一具大種所造耶是以寶法師餘處解釋中非倶有因無表者各別大種所造也見若依之爾者寶法師今解釋中一具大種所造色也見如何答凡別發家意衆多不殺生戒一具大種造可云也正理文及寶法師解釋分明故也就中彼此體類各別同是不殺生戒故尤可云一具大造也以所生果類無別故正理所判此旨分明也但於寶法師餘處解釋者破別發發家義之時寶法師實義非倶有因故可非一具大種造云也無過可答申也文永四年之暦中冬臘月之候於東大寺別院知足院菴室以善俊房已講聖禪之草本書寫之了爲當年倶舍三十講折講師也沙門釋慶實
