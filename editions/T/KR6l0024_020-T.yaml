body:
  text: 倶舍論第六卷本義抄上問光法師能作因得名作依主釋云謂能作是親因文今此親因者指能作因中親因歟爲當以餘五因名親因歟答以餘五因名親因也兩方若指餘五因者既釋能作因得名云謂能作因是親因何可就餘五因論之哉若依之爾者餘五因既親因能作是親因尤可指彼哉答光法師於能作因得名作依主釋之時云謂能作是親因尤可指餘五因也此釋意云能作之號名餘五親因於此親因有不障礙疎義故能作之因名能作因云也若指能作因之中親因云能作是親因者於能作親因難有依主釋義哉此釋意約一切能作因有依主釋云也彼遍行因得名不作依主釋云事與遍行惑爲因之時二分雖有依主釋義亦與非遍行惑爲因故偏難名遍行之因云也故光法師即釋此事云遍與五部染法爲因故名遍行行行即因名遍行因持業釋不得言遍行之因以亦通與非遍爲因故云云准之思之能作因得名作依主釋之時唯約一類能作疎因不可作依主釋也重難云光法師第七卷疏云又解能作中既有親疎而得説言能作之因増上之中亦有親疎亦可説言増上之緣云云此釋無諍於能作因中論親因疎因見如何答此釋意云於能作因就親因疎因作依主釋如於増上緣約親緣疎緣可作依主釋爲言非謂能作因中分親因更非相違也一義云述謂能作是親因餘不障者是疎因約能作因中分親因疎因也此釋意云於能作因得名作持業釋是本義也此上約疎能作因一類亦可有依主釋云也光法師第七卷疏釋即此義證據也但此義意會遍行因不作依主釋者遍行隨眠中一類與非遍行隨眠不爲因之類故混難云遍行之因也能作因中約疎能作因一類可云能作之因故就此類作依主釋也問論主意可許六因耶答不許也兩方若云許之者頌文云許因唯六種長行述對法諸師許因唯有如是六種偈頌長行同置許言豈非顯不信之義哉若依之爾者披論文前後未見破六因之文哉是以寶法師引此亦有餘同類因等是故倶有因義得成之論文云論主許有部倶有因義也云云倶有因既許之餘因何不許之哉何況六因正出大乘論説論主尤可許之哉如何答六因是非經説故論主意不許之也故見本論文偈頌云許因唯六種長行述對法諸師許因唯有如是六種偈頌長行同置許言是顯不信之義也是以光法師釋此文云許因唯六簡異諸宗寶法師釋此文云此以四緣有經文説六因無經文故故云對法諸師許因唯有六種此明無増減也云云圓暉法師釋云經部等宗不許六因無經説故許有四緣有經説故然有部宗中迦多演尼子大阿羅漢靜室思惟言有六因經是諸天傳來非餘部許故論示對法諸師許因唯有如是六種文論主意不許六因云事此等定判最分明哉何況當卷論文云而諸世間種等芽等極成因果相生事中未見如斯同時因果餘卷論文云仁難許爾契經中不許此二互爲因果論主意不許同時因果見若不許同時因果者不可有倶有相應二因事亦必然也不立倶有相應二因者餘因亦不許之哉加之廣勘諸論説婆沙論云然此六因非契經説但説有四緣性謂因緣性廣説乃至増上緣性今欲以因分別緣故説此六因云云寶法師引正理論如是六因非佛所説如何本論自立此名定無大師所不説義阿毘達磨輒有所説經中現無由隱沒故自相可得有之文畢云准此論文六因四緣是小乘義四緣有文六因無文以無正經文故言對法諸師許因唯有如是六種文任此等定判全無一經明説六因之説歟故論主意朋經部宗義不許六因也但於寶法師論主許有部倶有因義也之解釋者論主意實雖不許倶有因本宗義故一往亦許倶有因之門有之寶法師解釋即顯此意也次於大乘論中亦説六因之難更寶法師雖釋大乘對法論亦有六因能作因有二十因未委釋其相退撿對法論文第四卷未次第釋能作因倶有因相應因同類因遍行因異熟因相其名雖同倶舍等説其義全異有宗所談彼論依憑又不知何經説故寶法師釋云未知大乘十因六因及四緣義出何經文若爾論主意何必可依用哉何況彼述大乘義門既非小乘所談故疑難之旨旁無其過歟重難云婆沙正理一説意述六因諸經處處散説之旨設雖散説若出經説者論主意何不許之哉次今論之許言若顯不信之義者顯宗論何不改頌云許因唯六種哉答見婆沙正理所引經文未正列六因之名薩婆多師設雖備六因證據餘部不可必依用之彼是名見爲根信證智相應之文何必説相應因哉眼及色爲緣生眼識三和合故觸倶起受想思之文何必説倶有因哉餘因證文准之可思故以此等經文爲六因證據事甚以𮤀𮤁也論主意不可依用之歟次於顯宗論頌可改許言云難者論主爲顯不信之義雖置許言泛爾之許言亙自他共強不違何之言顯宗論頌不改許言也非如傳説言偏顯不信之義故非強疑歟問頌文云除自餘能作文能作因除自體故光法師如何釋之耶進云光法師釋云自於自體恒爲障礙故自望自非能作因文付之一切諸法恒不失自性若自體障自體者何可有可生之義哉何況諸法自性恒不失其性更不可云障自體哉答自於自體恒爲障礙之理實似難思元瑜疏云即自於自恒爲障礙謂彼自體障礙自體不令改轉故即障因惠暉疏云以自體恒障自體如一念眼識現在第二眼識同時如何得生以相障故自體不爲自體爲能作因也文兩師同雖述自體障自體之旨難得其意暫任常談思此事刀自不切刀指自不觸指等之理是自體障自體之義也故元瑜疏釋正理論謂無障義是能作因自於自體恒爲障礙之文云又解如刀能割爲用若有障礙便不能割更不自割明知自礙割他之障或有或無割自之障曾無暫捨如是諸法自於自體無成因用故言恒障之正理論云有餘師説自於自體不見有用故非因縁猶如指端刀刄眼等文婆沙論云復次若自性於自性爲能作因便違世間諸現見事謂指端不自觸眼不自見刀不自割諸有力人不能自負如是一切云云准此等説又可思其意也私云述自體望自體非能作因事正理論擧四異説婆沙論有八復次可引見之問頌文云倶有互爲果文今此互爲果義爲論主始所立爲當有宗古義歟答可云有宗古義也兩方若云論主始所立者光法師釋法與隨相非互爲果然法與隨相爲倶有因之論文云論主出説一切有部師過文圓暉法師解釋同之若爾互爲果義是有宗古義云事解釋最分明哉若依之爾者婆沙論中以同一果義釋倶有因未正擧互爲果義知非有宗義云事是以正理論中互爲果義付過失遂在同一果義見顯宗論中改頌結倶有一果法互爲果義若有宗古義者何正理論難之顯宗論改頌哉加之見光法師解釋前後上擧倶舍師救非同一果義成互爲果義下引入阿毘達磨論諸有爲法更互爲果或同一果名倶有因之文云述倶舍師釋云彼論後造言互爲果學我世親阿闍梨也文一段解釋無諍互爲果義可論主始成立見如何答以互爲果義釋倶有因云事可云有宗古義也其故凡六因者獨出有部一宗義設雖互爲果義何非有宗古義哉是以論文云法與隨相非互爲果然法與隨相爲倶有因非隨相於法文光法師釋此文云論主出説一切有部師過文圓暉法師釋此文云此文是論主出有宗以互爲果釋倶有因有過也文此等解釋無諍互爲果義是有宗古義見何況寶法師解釋中擧互爲果同一果二義畢云順正理師以違婆沙故從一果入阿毘達磨將不違理遍擧二因此論略故但擧其一文此論略故但擧其一之言無諍互爲果同一果二義倶有宗本義見加之正理顯宗兩論中雙擧互爲果同一果二義若非有宗義者何二義倶可擧之哉就中正理論明相應倶有二因差別有餘師説由互爲果義立倶有因文若論主始所立者可云經主義更不可云有餘師説哉顯宗論述相應倶有二因差別不置有餘師説之言云由互爲果立倶有因云云若非有宗古義者彼論直載之哉加之雜心論中偈頌云當知共有因展轉爲因果長行云若一時起展轉爲果是共有因或云有對造色非展轉果故非共有因文倶舍以前論藏中更擧互爲果義非論主始所立云事誰可疑之哉但於婆沙論中不擧互爲果云難者設雖有宗古義何必婆沙論中可擧盡之哉有宗古義中婆沙論文不擧之事例證非無歟次於正理論破互爲果義顯宗論改頌云難者設雖有宗古義非所存義之時正理論破之顯宗論改頌亦有何疑哉雖有宗古義顯宗論改頌事彼如云三界染心中得六六二種色善二學三二無餘自得述此上十七處名色界於中初二二三三第四靜慮八等也次於光法師一段解釋者有宗二義之中倶舍論偏明互爲果一義故付之倶舍師偏成互爲果義亦述學我世親阿闍梨也也云爾故非謂互爲果義論主始案立也重難云以互爲果義釋倶有因者有宗古義云事暫可許之但以光法師圓暉法師釋爲證據事不可然彼凡論主不許同時因果故論主於有宗所立倶有因出過云事也差別互爲果同一果二義非謂互爲果義付過何爲證據哉答此事實爾也只備一往證據也問地大種與地大種可爲倶有因耶答不可爲倶有因也兩方若爲倶有因者婆沙論幷正理論中地大種與地大種不爲倶有因見若依之爾者多種地大種極微造一所造色之時地大種何不爲倶有因乎答婆沙論十六云應作是説四大種體若有偏増若無偏増地爲三倶有因三爲地倶有因所以者何地不觀地生所造色以一切法不知自性及同類體爲他因故乃至風大種亦爾文正理論十五云如四大種更互相望爲倶有因雖有體増體不増者而更一一更互爲因自體不應待自體故亦不應待自類體故一一大種唯待餘三要四大種異類種集方有功能生造色故文此等文意云地大種藉餘三大種力餘三大種藉地大種力造一所造色四大種相望互爲倶有因云也如堅等物有同時設雖有多種地大種極微造之無有地大種極微藉地大種極微力造一所造色之義故地大種極微望地大種極微之時闕同一果之義故不爲倶有因云也餘三大種自類相望不可爲倶有因事准之可知若如此得意之時難勢自被遮乎問婆沙論評家意存四大種體増義歟答婆沙論中有四大種體増用増二説不擧評家義也兩方若云存體増義者婆沙論中雖擧四大種體増用増二説未判正否哉若依之爾者光法師今解釋中引婆沙論評家義云四大種體若有偏増文如解釋者婆沙論評家意存四大種體増義見如何答見婆沙論文云應言大種體有増減云有説大種體無増減雖體増用増二説更無判正不是以光法師餘處四解釋中云然婆沙一百三十一説四大種或説體増或説用増然無評家倶舍同用増正理同體増文但於光法師今所引文者正見婆沙論十六文云評曰應作是説四大種體若有偏増若無偏増地爲三倶有因三爲地倶有因文若有偏増者當體増義若無偏増者當用増義也若如是得意之時評家意非唯存用増義也一義云見婆沙論次上文云有欲令四大種體有偏増者彼作是説地大種與四大種爲倶有因四大種與地大種爲倶有因所以者何地大種有多體於中一與多爲倶有因多與一爲倶有因故乃至風大種亦爾許地大種與地大種爲倶有因之義評家破比師義設四大種體若有偏増若無偏増地大種與地大種不可爲倶有因云也若爾若有偏増若無偏増之言遂指前二師説也不自義云若有偏増若無偏増更非疑也問光法師釋十隨轉中一果不取倶生展轉士用果取餘同時造作得者文爾者餘同時造作得者倶有因造作歟答可通倶有因造作也兩方若云非倶有因造作者更釋倶有因相明知心隨轉義之中一果所取同時造作得者也尤可云倶有因造作哉若依之爾者光法師解釋中上擧倶有相應因同時造作展轉士用果畢下云餘同時造作得者文言起盡無諍非倶有因造作見如何答光法師釋取餘同時造作得者事述隨轉法同時取一果之義也故若倶有因造作若餘能作因造作同時取一果之時可云同時造作得者也但於光法師解釋者上不説倶有相應因同時展轉士用果者只是除互爲果義也不自體以自體爲果故無同一果義故也若除自體受想等心所以思等心所同爲一果見之時尤可有同一果義若有倶時同取一果之義者又可云同時造作得者也故云所餘同時造作得者可通倶有因造作也重意云倶有因所造之中互爲果之邊一果之言不可取之今此十隨轉中言一果者不説倶生展轉士用果以自非自體士用果故非一果義者即述此意也同一果之邊一果之言可取之取餘同時造作得者者即顯此意也故取餘同時造作得者者倶有因所造歟亦全非倶有因所造歟云疑答之時通倶有因造作可答也但此外非倶有因所造亦有餘同時造作得者事更非所遮也故惠暉疏云及餘同時造作得者即是同時心心所造作得散無表色同時心王心所共取無表色果文此釋意云以散無表色望彼刹那等起心心所名同時造作得者也故云取餘同時造作得者亦通能作因造作事可許之也重難云就惠暉疏釋難思以散無表色望刹那等起心心所之時刹那等起心心所更無有力用寧可云同時造作得可用果哉述異心無心亦恒轉故散無表現起之時有入無心定之義見若必依心心所勢力散無表色轉者豈可有入無心定之義哉爰知散無表色不必以心心所爲隨轉所依云事若爾以散無表色望刹那等起心心所之時難云同時造作得者哉答惠暉疏釋實以難思然而以刹那等起心心所望散無表色之時聊有其力用故云有同時造作之義歟尋云元瑜疏出同時造作得者體如四大種所造有對色等文此釋甚難思四大種是非心隨轉法釋心隨轉義之一果之言豈可攝之哉答元瑜釋意釋心隨轉義之中一果之言不攝四大種爲顯同時造作得者相如四大種共生一所造色云餘同時造作得者爲言是則出此類許也非指其體置如言即顯此意也問正理論十五中釋十隨轉中一果云但攝士用及離繋果文寶法師意今此士用果者可通有爲士用果耶答以實義云之可含有爲士用果但文面不取之也兩方若攝有爲士用果者寶法師解釋中引光法師正理論所説士用果言攝一果士用果盡云義畢云今許正理説士用果者以離繋果不攝不生士用果盡非是欲攝餘有爲法無間隔越士用果也文如解釋者今士用果定唯攝不生士用果不攝有爲士用果見若依之爾者見正理論所説今此士用果言雖簡倶有相應因同時展轉士用果可攝餘倶生無間等士用果見如何答以實義云之正理論釋十隨轉中一果云但攝士用及離繋果之中士用果内廣可含有爲士用果也即倶生士用果中取除倶生展轉士用果之外餘同時造作因者無間士用果中取除同性無間之外餘異性無間隔越士用果中取除異熟果之外餘隔越遠士用果及取不生擇滅士用果也其道理光法師解釋也但於寶法師定判者准婆沙文得正理意也所謂婆沙論中云一果者謂離繋果一果之中不取士用果事恐濫倶生展轉士用果故一果之中唯擧離繋果也准之正理論意一果之中擧士用果唯限無爲士用果不取有濫之有爲士用果爲言是則付文面所擧也又如此得意故不用光法師釋也以實云之婆沙論意一果之中遂可含有爲士用果故正理意准彼可思之也問心王與心隨轉法上隨相可爲倶有因耶答不可爲倶有因也兩方若云爲倶有因者見論文心王極少與五十八法爲倶有因文而五十八法中無擧心隨轉法隨相知心王與彼不爲倶有因云事若依之爾者見論文出八對非倶有因法云隨心轉法隨相於心雖述心隨轉法上隨相與心王不爲倶有因未云心王與彼不爲倶有因哉若互爲不爲倶有因者可云隨心轉法隨相心王展轉相對哉答論文云此中心王極少猶與五十八法爲倶有因心王與心髓轉法上隨相不爲倶有因云事尤分明也光法師即釋其故云心王望九十八法極少猶與五十八法爲倶有因謂大地法及彼四十本相心八本隨名五十八法除大地法上四十隨相以隔遠故力不及彼非倶有因文但於隨心轉法隨相於心之論文者上云謂諸隨相各於本法隨相與彼本法不爲倶有因之旨明畢此上隨心轉法上隨相與心王不爲倶有因云添也許心王與心隨轉法上隨相爲倶有因之義邊非云隨心轉法隨相於心也有人云心王之上四本相名心隨轉法而心王與彼上隨相爲倶有因故云隨心轉法隨相於心不云各互相對也難云心王望心王上相之重謂諸隨相各於本法之句更顯畢重難云隨心轉法隨相於心之時更不可有心王望心王之上隨相論之云義也問光法師擧八對非倶有因法畢云彼隨相等望本法等横望而言非能同取一果一異熟一等流故文爾者竪望之時可取一果等耶答同可取一果一異熟及等流也兩方若不取之者解釋更意置簡別言述横望而言明知竪望之時可取一果等云事若依之爾者案八對非倶有因法相設雖竪望更不可取一果等哉答横望而言者如本法之上竝安之四隨相等以此四隨相望本法幷此四隨相各互相望等云横望而言也如此見之時不能同取一果一異熟及一等流故云横而言非能同取一果一異熟及一等流故也於餘非倶有因法論横望之義准之可知之翻之思之以本法之上小生望彼大生以心隨轉法上小生望彼大生以有對無對造色各望彼上四相等可云竪望也如此見之時同可取一果一異熟及一等流故爲簡此義邊故横望之時不取一果等也問寶法師意隨相與本法同取後一果可名同一果耶進云寶法師不名同一果釋也付之隨相與本法同取後一果尤可名同一果哉是以光法師難異時同一果云如本法與大相同得後一果更爾隨相望於本法應名倶有因文如此釋者隨相與本法同取後一果可名同一果見如何答寶法師八對非倶有因法縱横望縱竪望都無同一果義得意故前四對法彼此相望亦無同一果義爲言故隨相與本法同取後一果非同一果義釋也其意云彼此之法雖同取後一果互不與力取之不名同一果猶兩人共證擇滅無爲其果雖是一物不名同一果云也但光法師意問初無漏思以業可爲倶有因耶答可爲倶有因也兩方若不爲倶有因者以性相思之初無漏思以隨轉身語二業可爲倶有因也若依之爾者品類足論於非業爲因法之中擧初無漏思如何答心隨轉法展轉相望互爲倶有因者諸論一同之性相也故初無漏思以隨心轉身語二業爲倶有因云事道理必然也更不可疑之但於品類足論文者暫出本論一段之文可料簡之所謂見本論文出業法云謂身語業及思廣擧三業述業爲所縁法云謂三識身及相應法出三識身等准此等文業法中廣取身語二業云事尤分明也但業倶有法幷隨業轉法中同置除思之言無取思業以之思之廣論業法之時雖亘三業思是業本故以思爲業之伴之門大忌之也故業倶有法幷隨業轉法中不取思也准知自法體業不見以業爲因之法中不取思也自法體業不見以業爲因之時其體是業之伴聞故以初無漏思云非業爲因法也自本非遮出業類之時兼取身語二業之義邊故一段論文全非相違也一義云發智論中廣述倶有因相不云隨心轉身業語業與心爲倶有因婆沙論第十六會之有三師説寶法師所引正理論十五會之出多故所詮會通之趣無由發智論之文面不云隨心轉身業語業與心爲倶有因也准此發智論文思彼品類足論意實雖初無漏思以隨心轉身語二業爲倶有因文而不云故以初無漏思云非業爲因法也私云此義雖似有所據實非文意説二義之中可存前義也就前義猶有深意也所謂品類足論意思是業之本故同時相望之時以思見業之伴之門大忌也故業倶有法中無取思即以思是非業倶有法定而倶有因之習有倶有法不爲倶有因無非倶有法爲倶有因故今論云諸由倶有因故成因彼必倶有或有倶有非由倶有因故成因故文若爾乍云思是非業倶有法如何亦可云思以業爲倶有因哉此條道理實不可得也故品類足論今文尤有深意也問論中釋無覆無記同類因擧四師説爾者初師意四大意處展轉相望互可爲同類因耶答互不爲同類因也兩方若云互爲同類因者四大意處其性疎遠也設雖初師意不可云互爲同類因哉若依之爾者光法師引婆沙論四大意處展轉相望不言有同類因之文爲證據以第四説爲正判若初師意不云四大意處展轉相望互爲同類因者何可成初師不正義之旨哉答四大與意處其性甚疎遠故初師意不可云互爲同類因也但於光法師解釋者婆沙論不云四大意處展轉相望有同類因故以之准例無記色蘊與無記四蘊展轉相望不爲同類因云義是正證也故光法師釋云無記四蘊大既望意處展轉相望不言有同類因以此准知無記色蘊望無記四蘊展轉相望非同類因者爲正文云爾故非謂初師意四大意處展轉相望爲同類因也重難云寶法師述初師爲正之旨不云一切無記色蘊爲無記四蘊展轉相望爲同類因無記心品發無記色業之時能發心品所發色業展轉爲同類因云也若爾光法師引婆沙論不云四大意處展轉相望爲同類因之文爲證成初師不正義之旨猶以難思哉答問論中釋無覆無記同類因擧四師説爾者光法師意何義爲正耶進云光法師第四説爲正釋也付之善染汚五蘊各展轉相望爲同類因定准而思之無記五蘊展轉相望爲同類因云初師義尤可爲正義哉何況見論文初師無置有説之言至第四説置有餘師説之言何以有説爲正義以本義爲不正義哉加之婆沙論中四大望法處中四相爲同類因見若爾無記色蘊望無記行蘊之時爲同類因云事婆沙論説既分明也寧以無記四蘊與無記四蘊展轉相望不爲同類因云第四説爲正判哉是以寶法師釋述初師爲正之義如何答光法師釋第四説爲正事源依婆沙論文所謂婆沙論中實意處展轉相望不言有同類因故無記色蘊與無記四蘊展轉相望不爲同類因云事爲正釋也次光法師引婆沙論此文畢云無記四大既望意處展轉相望不言有同類因以此准知無記色蘊望無記四蘊展轉相望非同類因者爲正但於以善染汚五蘊各展轉相望爲同類因作例難者無覆無記勢力劣故異類相望不爲同類因善染汚五蘊勢力強盛故展轉相望互爲同類因也更非相例次於第四説置有餘師説之言云難者正義置有餘師説之言其例非一如云餘説下亦有由中招異熟等也次於婆沙論四大望四相爲同類因之文者光法師會此文作二釋云此論中云無記色蘊望無記四蘊展轉相望非同類因者望心心所説非望四相以色蘊望行蘊中四相展轉相望定爲同類因此在不疑又解從多分説雖無記色蘊望無記行蘊中四相得作同類因若無記受想識三及行蘊中除四相餘法即非同類因從多分説故言無記色蘊望無記四蘊非同類因此中總望四蘊作法文文意顯也次於寶法師解釋者人師解釋不必一准不可劬勞也問光法師釋中十位同類因相初釋意此論當婆沙一師不正義文爾者此論意後位已生法與前位不生法可爲同類因耶答可爲同類因也兩方若爲同類因者後位已生法與前位不生法爲同類因者婆沙評家義也而今論更同婆沙不正義意何不許此義哉若依之爾者以道理思之後位已生法與前不生法何不爲同類因哉答光法師初釋意今論意後位已生法與前位不生法可爲同類因也其道理必然也何不許此義哉但與婆沙評家義異事者此論及婆沙一師意前位不生法不取此身分故述此身因相之時不論與彼爲同類因之義邊也婆沙評家前位不生法取此身分故明與彼爲同類因之義邊也重意云前位不生法取不取此身分事二論意異也與彼爲同類因云義邊彼此全同也故寶法師釋云此論與婆沙不同者此論此身唯據生説婆沙此身兼不生説文准此釋可思之也問正理論中釋十位同類因相云有餘師言羯剌藍位能與十位爲同類因文爾者寶法師對此論如何釋之耶進云寶法師與此論前説義同類也付之正理論今説此身頞部曇等九位一一皆與此身及餘未來身羯剌藍等前位不可爲同類因見而今論述若對餘身同類十位一一皆與十位爲因此身頞部曇等九位與未來身羯剌藍等前位爲同類因見彼此所存其義既異何判此師與此論前説義同哉次今論無有二説前説後説云事亦難思哉答寶法師解釋甚以難思然而暫任愚案先料簡此論次料簡正理文先料簡此論者准正理文此論有二説得意也又一身中羯剌藍位能與十位爲同類因頞部曇等九位一一皆除前位與餘爲因者是前師説也此師意此身頞部曇等位乃至老位爲同類因亦與餘身羯剌藍位乃至老位爲同類因云也即當婆沙論第五有説或復有説色法雖有同類因在此身亦在餘身相似爲因亦不相似而與此身前位非因如此身羯剌藍位與此身羯剌藍位乃至老位爲同類因亦與餘身羯剌藍位乃至老位爲同類因此身頞部曇位與此身頞部曇位乃至老位爲同類因亦與餘身羯剌藍位乃至老位爲同類因與此身羯剌藍位作縁非因乃至此身老位與此身老位爲同類因亦與餘身羯剌藍位乃至老位爲同類因與此身前諸位作縁非因云義也若對餘身同類十位一一皆與十位爲因者是第二師説也此師意云此身對餘過去身過去十位與此身及餘未來身十位爲同類因此身對餘未來身此身十位與此身及餘未來身十位爲同類因云也即當婆沙評家應作是説餘身十位一一皆與餘身十位及此身十位爲同類因此身十位一一皆與此身十位及餘身十位爲同類因後位已生法與前位不生法亦爲同類因故云義也故寶法師釋若對餘身等之文云異身者謂過去身同類者謂根境同類一一與十位爲因者謂後位生法與前位不生爲因婆沙十八評家云應作是説餘身十位一一皆與餘身十位及此身十位爲同類因此身十位一一皆與此身十位及餘身十位爲同類因後位已生法與前位不生法亦爲同類因故此論與婆沙不同者此論此身唯據生説婆沙此身兼不生説云云此論與婆沙不同者此論前師與婆沙評家相對如是云也次料簡正理論者若就位説有餘師言羯剌藍位能與十位爲同類因頞部曇等九位一一皆除前位與餘爲同類因後位望前但有縁義者是前師説也此師意云頞部曇等九位一一與此身及餘未來身羯剌藍等前位不爲同類因云也故正理論自難此師義云若爾最初羯剌藍色應無有因最後老色應無有果故理不然文即當婆沙論第四有説復有説者色法雖有同類因在此身亦在餘身相似爲因亦不相似而與前位非同類因如此身羯剌藍位與此身羯剌藍位乃至老位爲同類因亦與餘身羯剌藍位乃至老位爲同類因此身頞部曇位與此身頞部曇位乃至老位爲同類因亦與餘身頞部曇位乃至老位爲同類因與羯剌藍位作縁非因乃至此身老位與此身老位爲同類因亦與餘身老位爲同類因與前諸位作縁非因云義也若爾者今論初師與正理論初師其意實異而寶法師釋此師與此論前説義同事寶法師自餘正理論難此師之文云就一身中據生者説何得疑難前位無因後位無果文若如此得意之時與今論前説可同之也後有師言前生十位一一皆與後生十位各同自類色爲同類因者是第二師説也其意即同今論若對餘身等之文又云當婆沙評家義也故寶法師引此文畢云同此論後説文若爾寶法師解釋強無其過歟重難云此論有二師説云事猶不可然若對餘身等之文此身頞部曇等九位若對餘身未來身一一與十位爲同類因云也故光法師釋此文云若對餘未來身同類十位一一皆與十位爲因文此釋順論文哉次正理師此身頞部曇等後位與餘身羯剌藍等前位不爲同類因云事分明也即今婆沙論第四有説意何會之強判此師與論前説義同哉次寶法師此論與婆沙不同者此論此身唯據生説婆沙此身兼不生説之解釋此論前師説與婆沙評家義會爾歟如何答寶法師解釋實似不順文言不如光法師釋歟然而料簡之趣如前但此論與婆沙不同者此論此身唯據生説婆沙此身兼不生説之解釋此論前師與婆沙評家非會合之此論此身取生不取不生婆沙此身取生不生故不同云也問今論中證前生善根與後相似生未生善根爲同類因義引發智論何文耶進云論云如發智論説云何同類因謂前生善根與後生善根及彼相應法身界同類因故成因如是過去與餘二世過去現在與未來等皆應廣説文付之上云過去善根與未來現在二世善根爲同類因之時過去善根與未來善根爲同類因之邊更聞畢下云過去現在善根與未來善根爲同類因重擧過去善根豈非重言無用哉唯可云現在善根與未來善根爲同類因也是以正見發智論文云云何同類因答前生善根與彼生自界善根及相應法爲同類因過去善根與未來現在自界善根及相應法爲同類因現在善根與未來自界善根及相應法爲同類因文依之婆沙論中如本論文牒之正理論一六云若如前説通攝本論所説前生與後生法及説過去爲現未因現在但爲未來因義重無擧過去善根若爾倶舍論所説引之文非只有重言無用之過亦違本論現文哉答今論所引之文尤似難思案其實義即可如發智論現文婆沙論牒之正理論引之實無替發智論現文也但今論引彼論文重置過去之言事聊有其由歟其故上云過去善根與未來現在善根爲同類因之時現在爲同類因之法過去落謝如此歟聞實於過去起同類因與果用之義未聞故現在善根與未來善根爲同類因之時過去善根其時與生相法起同類因與果用之義顯本論文之外重添過去之言云過去現在與未來等也問光法師釋無時非因難引婆沙論七説爾者依評家意如何會此難耶進云光法師釋云未來雖無而彼意説能爲因彼無時非因或約正生位定能爲因依此密説無時非因文付之初釋難思正見婆沙論評家義云依最後位密作是答謂若法於此位定能作同類因或遍行因從是以後無時非因故作是説唯約正生位會此難見即當今論有謂未來正生位法定能與彼爲同類因是故彼文依最後位密作是答無時非因之義意若爾能爲因後無時非因之初會通豈不背婆沙論評家之會通哉次今此二釋其差異如何答婆沙論評家義實唯約正生位會之光法師能爲因後無時非因之初釋尤似難思但正理論中六因作論師意會此難未來雖無而此意説能爲因後無時非因又此未來亦定應有謂有爲法於正生時定能爲因殄諸障故依此密説無時非因文光法師二釋即依正理論二説作之也非無依憑歟但於二釋差異者初釋意云正生現在爲同類因之後無時非同類因故云無時非因爲言第二釋意云至未來正生位定入現在可爲同類因之義決定故約生相位亦有同類因成即云無時非因爲言云爾故非謂未來正生位正爲同類因是其二釋差異也泰法師述正理論二師差異云前釋約未來一切時能現在爲因後無時非因今釋重於正生時定能至現在前爲因故與前釋異文其意即同今義之趣歟問正理論十六中通無時非因難擧三因作論六因作論二説爾者寶法師意以何説爲正義耶進云寶法師釋正理自釋與此論同皆取婆沙第三説爲正三因作論師義爲正判也付之三因作論密説是今論義六因作論師説專婆沙評家義也而正理論師故違此論定可存六因作論義何以三因密説爲正義判哉依之見正理論説雖擧二説未判正不寶法師得何文理判三因作因義爲正哉答見正理論一段之文釋無時非因難先云此依倶有相應異熟通三世因密意説故初述三因作論師義次云有餘師釋雖此通依六因作論而無有失後擧六因作論義置有餘師釋之言三因作論説爲本義之旨論文實分明也何況婆沙論評家意正爲同類因雖入現在畢後依定能爲因云義自生相位強設同類因義而正理論師意於未來世假施設同類因事更不許之見故就六因作論説雖會世親論主所付之難其難遂難遁故正理論師本意存三因作論義爲正義釋也故寶法師引正理論一段之文畢云准上正理雖有此救未能遁難在未來時因縁二義倶未來故何得獨因答云無時非因正理自釋與此論同皆取婆沙第三説爲正云云文意顯也問寶法師釋無時非因難引正理論能爲因後無時非因文爾者可云婆沙論評家義耶答寶法師解釋尤似難思然而暫存一義者今文非婆沙評家義可云也兩方若非評家義者正理論能爲因後無時非因之文是六因作論義也尤可云婆沙論評家義哉是以寶法師引婆沙論六因作論説自判此説爲正畢云謂已作因無時非不作因故如正理釋云能爲因後無時非因故文若爾正理論今文述婆沙論評家義云事一段解釋尤分明哉若依之爾者寶法師釋今論有謂未來正生位法定能與彼爲同類因是故彼文依最後位密作是答無時非因之文云叙婆沙異説也云云爰知於正生時定能爲因之義是婆沙論評家義能爲因後無時非因之説非婆沙論評家義云事加之寶法師引正理論能爲因後無時非因之文畢准下正理云是餘師釋非是評家之義文如今解釋者正理論今文非婆沙論評家義云事分明也如何答正理論師述六因作論師義之中幷擧云能爲因後無時非因云於正生時定能爲因之二義故正理論云有餘師釋雖此通依六因作論而無有失未來更無同類遍行如何可説無時非因未來雖無而此意説能爲因彼無時非因又此未來亦定應有謂有爲法於正生時定能爲因殄諸障故依此密説無時非因文而婆沙論評家意會此難云依最後位密作是答謂若法於此位定能作同類因或遍行因從是以後無時非因故作是説同正理論後義於正生時定能爲因云文以之思之正理論今二説雖倶六因作論師之中異義能爲因後無時非因之義是正理論師自義於正生時定能爲因之義是婆沙論評定義也故元瑜疏釋此文之時能爲因後無時非因之義云此是論主意於正生時定能爲因之義云此是婆沙釋文寶法師准下正理云是餘師釋非是評家之義之解釋即述此意也但於寶法師述婆沙論評家意引合正理論今文者六因作論之義邊是同故自釋謂已作因無時非因故亦引合正理論能爲因後無時非因之文也重難云婆沙論不正義中更無能爲因後無時非因之義寶法師何判是餘師釋哉答此難尤難會通但愚案云能爲因後無時非因之文次下所引正理論文云有餘師釋之下有之故正理論餘師釋非婆沙論評家義云也准下正理云是餘師釋此旨自明也非云婆沙論中餘師釋何致劬勞哉尋云寶法師釋有謂未來正生位法之論文云叙婆沙異説也此叙婆沙論中異説歟答對倶舍婆沙云異説也非謂婆沙論中異説若就婆沙論云之即當評家義也故光法師釋此文云或當正義家六因作論文准此釋可思之重難云正理論所存義名評家義事非常廢立此義頗信用哉答可思之又案云正理論師依婆沙評家云從是以後無時非因之文作能爲因後無時非因之失也若爾正理論今文可婆沙論評家義也難云婆沙論評家云從是以後無時非因者就未來生相位論之云於最後位密作是答就未來最後生相位明此義故也而正理論云能爲因後無時非因者約現在實爲同類因論之若爾其言雖相似其義實各別以正理論今文實同婆沙論評家義事甚以難信用哉何況若以正理論今文實同婆沙論評家義者亦可背元瑜法師解釋哉答可思之問光法師所引婆沙論文解非心爲因法擧二師所説爾者初師意非心爲因法者不以心唯爲同類因義歟爲當不以心爲五因義歟答不以心爲五因故名非心爲因法也兩方若不唯爲同類因義者因言更無簡別何可限同類一因哉是以光法師釋染汚眼識難之因言云因謂因縁文若依之爾者光法師正解婆沙論云前解心因因是因縁即同類因無餘四因文如何答非心爲因法者不限不以心爲同類因不以心爲因之義也本論一段之文就四縁各分別之故非心爲因法者非以心爲因縁云事也而因縁者五因爲性不限同類因云事更不可疑之何況品類足論中解非心爲因法云三蘊攝之爲言若唯就同類因論心爲因非心爲因者苦法忍只五蘊皆可非心因爲因法何云三蘊攝哉但於即同類因無餘四因之解釋者婆沙前師意云彼唯説畢竟非心爲因法雖彼未入正性離生者諸無漏心皆非心爲因然彼若入正性離生唯有初無漏心是非心爲因法餘心無不以爲因除初無漏心是心爲因法爲言今此心爲因者即限同類因無餘四因非標非心爲因云即同類因無餘四因何爲疑哉重意云今難未來可有同類因大所疑者非云初無漏心心非心爲因法之文是疑除未來初無漏心餘未來無漏心云心爲因之處也故就此所疑之文釋前解心因因是因縁即同類因無餘四因尤有深意也問決定當入正性離生初無漏心悉名非心爲因法歟答唯限可生一類可名非心爲因法也兩方若悉名非心爲因法者未來初無漏心是廣何悉可名非心以因法哉是以五類門時論一刹那法唯限現在一念見例可同若依之爾者見本論所説無簡別言決定當入正性離生初無漏心名非心爲因法文知悉可名非心因爲法云事答未來約無漏心種類是廣之中唯取可生一類可名非心爲因法其不生之類以現起初無漏心可爲同類因故可名心爲因法也婆沙論中釋本論今文云彼唯説畢竟非心爲因法文不生之類遂有心爲因之義豈取之可名畢竟非心爲因法哉重意云初無漏心在遠未來之時何類可生何類不生云事是雖不定一類可生餘皆不生之事是定故其可生一類是非心爲因法所定置也但於品類足論文無簡別之言云難者文實雖無簡別之言意限可生一類也所謂諸餘異生定當入正性離生者未來初無漏心非心爲因法者唯取可生一類初無漏心名非心爲因法云諸餘心心爲因之中可攝未來不生初無漏心也問光法師所引婆沙論文解非心爲因法擧二師所説爾者初師意辨有涅槃法無涅槃法二種異生義可有耶答可有二義也兩方若有此義者第二師意既辨二種異生初師意亦辨二種異生者前後兩師豈無差異哉若依之爾者見正理論所説述彼師義云彼文亦辨同類因義文亦言無諍辨二種異生之義可有見如何答婆沙論初師意云彼唯説畢竟非心爲因法雖彼未入正性離生者諸無漏心皆非心爲因然彼若入正性離生唯有初無漏心是非心爲因法餘心無不以心爲因心爲因非心爲因只就同類因論之更不可有辨二種異生之義也但於正理論云彼文亦辨同類因義亦言者同意就同類因難之初師意會云不約同類因外心爲因而非心爲因而第二師意如問定置亦約同類因外心爲因非心爲因無相違會也此義意亦言可問定也元瑜疏中雖有釋其旨甚有煩不知今料簡歟問光法師所引婆沙論文解非心爲因法擧二師所説爾者第二師意如何釋之耶進云婆沙論云彼文不辨同類因義何者唯辨二種異生文付之依今第二師意正見品類足論文述心爲因法除已入當入二類初無漏心於非心爲因法擧已入當入二類初無漏心明知無漏聖道之中以心爲同類因名心爲因法不以心爲同類因名非心爲因法云事何判彼文不辨同類因義哉次辨二種異生云事亦不明見第二師説云即無涅槃法名非心爲因文而品類足論文已入當入二類初無漏心名非心爲因法何背本論所説云無涅槃法名非心爲因哉答品類足論文決定當入正性離生者未來初無漏心名非心爲因法諸餘未來無漏心名非心爲因法事就同類因論之云事論文必然也第二師意何不存此理哉但彼文不辨同類因義者就同類因論之時未來無漏法皆可名非心爲因法而今不依此門爲顯有決定當入正性離生者如已入之類初無漏心名非心爲因諸餘無漏心名心爲因云也云有決定當入正性離生者之時又有決定不入正性離生者云事自顯故辨二種異生云也但此義意心爲因非心爲因本含同類因義幷與涅槃爲證得了因之二義故本論文之外約證得了因之義邊有涅槃法名心爲因無涅槃法非心爲因云添也問婆沙論中解品類足論所説非心爲因法擧二師所説爾者寶法師依第二師説時無槃涅槃法名非心爲因法歟進云寶法師有涅槃法名非心爲因法釋也付之依寶法師解釋披婆沙論第二師説云即無涅槃法名非心爲因文若爾寶法師解釋豈不背婆沙論所説哉答見品類足論文云已入當入二類初無漏心名非心爲因法故有般涅槃法名非心爲因云事本論文更分明也第二師意豈可背本論説哉是以正理論中述此師義之時全不云涅槃法是非心爲因法寶法師存此等文理引正理論文畢云准上論文有涅槃法名非心爲因決定當入正性離生名有涅槃法故亦名非心爲因法故文但於婆沙論即無涅槃法名非心爲因之文者自會之云今評此文應是抄寫者誤應云有涅槃法名非心爲因法若作此文即與舊婆沙同亦順上論文云云寶法師解釋大概在之重意云婆沙論第二師意本論除決定當入正性離生者初無漏心之外諸餘未來無漏心是心爲因法云文極難會故爲顯有決定當入正性離生者如已入正性離生之類初無漏心云非心爲因法諸餘無漏心云心爲因法會許也云爾故全非有涅槃法無涅槃法二類如次充心爲因非心爲因得心也如此得意之時所詮婆沙論即無涅槃法名非心爲因之文極難會通故是抄寫誤釋也若爾寶法師解釋之旨亦有其謂者歟問舊婆沙中解品類足論非心爲因法擧二師所説爾者第二師意以無般涅槃法名非心爲因法歟答以無般涅槃法名非心爲因法也兩方若以無般涅槃法名非心爲因法者寶法師引正理論所説釋有般涅槃法名非心爲因法畢云若作此解文即舊婆沙同文如解釋者舊婆沙意以有般涅槃法名非心爲因法見若依之爾者正披舊婆沙論文以無般涅槃法名非心爲因法文如何答舊婆沙論解非心爲因法第二師意云此中説不能得涅槃者言是非心因以無般涅槃法名非心爲因法云事文言分明也更不可疑之但於寶法師文即舊婆沙同之解釋者寶法師意成有般涅槃法名非心爲因法之旨畢新婆沙即無涅槃法名非心爲因之文會抄寫者誤之時釋成其誤所以與舊婆沙此中説不能得涅槃者言是非心因之文同故新婆沙即無涅槃法名非心爲因法之文誤知證之重意云舊婆沙文其誤是多而新婆沙今文與舊婆沙所説同故誤知云也次下文云亦順上論文成新婆沙抄寫者誤之旨也次上文即舊婆沙同之釋其意可同之問無色界可有非心爲因法耶答可有也兩方若有者見光法師解釋以無記四蘊望無記色蘊爲不爲同類因事云諸論中有四説見未云無記四蘊相望不爲同類因而無色界唯有四蘊展轉相望之時皆可爲同類因何可有非心爲因法哉若依之爾者見品類足論文出非心爲因法所隨増隨眠云三界遍行及修所斷隨眠隨増文如論文者無色界可有非心爲因法見如何答品類足論中出非心爲因法所隨増隨眠之時更云三界遍行及修所斷隨眠隨増取無色界隨眠故彼界有非心爲因法云事論文尤分明也更不可疑之出其體者無色界法上等流同分及非得幷彼上得四相等是可非心爲因法也以何知之者婆沙論云頗有根非因善根非因不善根非因無記根彼根非無因耶答有謂無縁根即命等八根以色不相應行爲因此非三性根爲因而以色心不相應行爲三因謂倶有同類異熟文准此文異熟生心心所與命根不爲同類因見加之婆沙論百四十六二十二根四縁分別之時以諸有所縁根望命根唯擧異熟一因無擧同類因准命根思之等流同分等以異熟生心心所不爲同類因云事自明也故任此等文理知無色界有非心爲因法也於無記四蘊展轉相望互爲同類因云難者無記四蘊展轉相望之時雖互爲同類因不云悉皆爲同類因有何相違哉問異熟四相與等流同分可爲同類因耶答不可爲同類因也兩方若爲同類因者異熟等流既別四相同分是異也更不可爲同類因哉是以婆沙論百三十一中異熟長養大種互不爲同類因見若依之爾者同是無記法倶行蘊攝也何不爲同類因哉依之見論文異熟四相與等流四相爲同類因文如何答婆沙論處處中異熟生心心所望命根不爲同類因見准之思之異熟四相與等流同分不爲同類因可云也思其道理心心所及四相等其力是強雖不似色不相應法無記之類其力猶劣故與異熟法不爲同類因歟但於論中説異熟四相與等流四相爲同類因云難者論中云無覆無記總有四種謂異熟生威儀路工巧處化心倶品隨其次第能與四三二一爲因異熟無記與威儀無記等爲同類因云文指歟此論議之意趣遂疑無色界非心爲因法事歟若爾准彼論義答可思之也問九上縁惑可爲遍行因耶答可爲遍行因也兩方若不爲遍行因者更遍行隨眠也何不爲遍行因哉是以餘卷論云於中除二見餘九能上縁十一遍行隨眠中除二種餘九種名九上縁惑尤可爲遍行因哉若依之爾者識身足論中於過去不善眼識及過去欲界繋見苦所斷心爲因非所隨増等四句分別之時出倶非句中云若所餘縁若他隨眠若不同界遍行隨眠文而若不同界遍行隨眠謂自地九上縁隨眠者是光法師今解釋也明知九上縁惑不爲遍行因云事何況彼論文出第四句體云謂諸隨眠在此心後同類遍行即彼隨眠若不縁此設縁已斷文光法師釋此文云若餘心後同類遍行不縁及縁已斷此等已攝同類遍行因盡知次下文所擧不同界遍行隨眠者是非遍行因云事加之九上縁惑爲遍行因者兩單句中何不擧之哉答九上縁惑可爲遍行因也是既遍行隨眠也何不爲遍行因哉是以婆沙論及今論中遍行隨眠對遍行因四句分別之時遍行隨眠非遍行因之句云謂未來遍行隨眠遍行隨眠亦遍行因之句謂過去現在遍行隨眠文加之婆沙論中或出遍行因體引發智論前生見苦所斷遍行隨眠等之文或問遍行因以何爲自性答一切過去現在遍行隨眠及彼相應倶有諸法此等文中豈可簡九上縁惑哉何況識身足論中於不善眼識十五種隨眠爲因爲縁文九上縁惑云爲遍行因事此等所説尤分明也但於識身足論文者付心後九上縁惑論之也即上在此心後之言可貫通下若不同界遍行隨眠之處也次於光法師此等已攝同類遍行因盡之解釋者暫就自界縁惑論之也次於九上縁惑爲遍行因單句可攝之云難者心前九上縁惑實爲因非所隨増之第一句中可攝之然而自本兩單倶三句暫就自界縁惑施設之故心前九上縁惑第一句中文正不列之也重難云在此心後之言貫通若所餘縁若他隨眠之處歟答在此心後之言不可貫通若所餘縁若他隨眠之處所増故也上所標置之言隨其所應就其要須有貫通之不同強有何相違如事例證非一歟寫本云寶治二年二月四日未時於東大寺尊勝院中堂東廊抄此卷之問答畢而依爲大帖分爲兩帖後覽之輩可察其志而已右筆尊勝院院主權大僧宗都宗性年齡四十七夏﨟三十五應永三十二年七月十七日書寫畢大法師延海
