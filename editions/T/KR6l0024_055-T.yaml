body:
  text: 倶舍論第十八卷抄問正理論意五無間業身語二業爲體歟問於五無間等定業異熟果可有非擇滅耶答可有非擇滅也兩方若有非擇滅者定業異熟果是決定可生法也何可有非擇滅哉若依之爾者非擇滅如有爲法數量者性相之所定也於定業異熟果何無非擇滅哉答光法師餘處一引婆沙論評家義云非擇滅如有爲法數量擇滅但如有漏法數量文故於五無間等定業異熟果可有非擇滅云事道理實必然也但於定業異熟果是決定可生法故不可有非擇滅云難者若造五無間等定業畢彼異熟果必雖可生若有違縁不造彼五無間等定業者彼異熟果永不可生故彼異熟果可得非擇滅也故於五無間等定業異熟果有非擇滅云事更無所背也問以斷善邪見可立無間罪耶進云諸論中以斷善邪見不立無間罪也付之斷善邪見者極重大罪也尤可立無間罪哉是以光法師餘處十七所引正理論四十二中云斷善邪見破僧妄語當知定招無間異熟文斷善邪見定招無間異熟果者何不立無間罪哉答無間罪者名順次生必感地獄異熟果之義也故今論餘卷十七云約異熟果決定更無餘業餘生能爲間隔故此唯目無間隔義文正理論餘處云此無間業於無間生必受果故無餘生果業能隔故文婆沙論百十九云遮現後者此五但是順次生受非順現法受及順後次受故名無間文無間罪者名順次生必感地獄異熟果之旨此等論文尤分明也而起斷善邪見之人現身之中若不續善者順次生必雖受無間地獄一中劫異熟果現身之中若續善根之類能起順決擇分善根入正性離生乃至證得阿羅漢果不受無間地獄一中劫異熟果故不立無間罪也故婆沙論中擧一箇問云若現法中續善根者彼現身能入正性離生不文評家答此問云應作是説彼能引起順決擇分亦復能入正性離生乃至能得阿羅漢果文文意顯也重思其理身語業罪起加行果究竟畢其異熟果已定故後時設雖懺悔之不能入聖得果必感其異熟果也意業罪設雖最大罪無起加行果究竟之義故後時能懺悔之乃至入聖得果不感彼異熟果也雖判斷善邪見破僧妄語當知定招無間異熟破僧罪即立無間業斷善邪見不立無間罪其意在之重難云婆沙論中依施設足論云彼於現法中不能續善決定於地獄中生時或死時方能續善文如此論説者起斷善邪見之無現身續善之義見若爾以斷善邪見何不立無間罪哉答婆沙論中即通施設足論説云彼説現法不能續者即是所説有斷善根亦造無間或由因力斷善根等文任此會通施設足論意非謂起斷善邪見之人一切皆無現身續善之義更無相違也問空法師意云不和合性以聖法上非得爲體文爾者今此聖法上非得者異生性外可有別體耶答可有別體也兩方若別體者空法師意同許不和合性以聖道非得爲體異生性外何可有別體哉若依之爾者光法師解釋中述空法師義云不和合性以聖法上非得爲體由此起故不得入聖雖異生性先於聖法亦有非得容得入聖文如今解釋者異生性外可有別體見如何答空法師意釋僧破體云不和合性以聖法上非得爲體者異生性外可有別體也異生性者本來聖法之上所有非得也雖有此非得近容得入聖故増上忍位初捨之爲僧破體不和合性者隨邪師信邪法之時初所起聖法之非得也此非得起故遠障入聖故不得入聖云歟重難云若爾一法之上可有二非得歟若爾所不得法一彼上非得有二類云事道理甚不可然哉答問光法師意不和合性體如何釋之耶進云光法師釋云今解云不和合性以和合上非得爲體文付之依光法師解釋披倶舍論所説述僧破體是不和合性無覆無記心不相應行蘊所攝不云和合上非得爲體光法師今解釋證據在何處哉是以泰法師解釋中不和合性非得不爲體見如何答光法師不和合性以和合上非得爲體之解釋尤可深意所謂見婆沙論處處之文或百十六云問僧破以何爲自性答以不和合無覆無記不相應行爲自性是不相應行蘊所攝即餘處説復有所餘如是種類不相應行文或六十云問退以何法爲自性耶乃至評曰退自性者是不成就無覆無記即是非得心不相應行蘊所攝即在復有所餘如是類法心不相應中攝文聊簡今此兩處之文出不和合性體出非得體倶指復有所餘如是種類不相應行之文而見品類足論文出心不相應行擧得無想定滅定無想事命根衆同分生老住無常性名身句身文身十三種心不相應行畢云復有所餘如是類法與心不相應總名心不相應行文此文無諍云復有所餘如是類法與心不相應可指非得見故光法師餘處解釋中述品類足論意云不説非得即是復有所餘不相應攝即是此論非得所收文准此等諸文思之不和合性非得爲體云事自分明也故寶法師引婆沙論第百十六卷幷第六十卷兩處今文畢云准此論説退即在復有所餘如是類法心不相應中攝與僧破同退既無別法即是非得故知僧破不和合性即是同欲同忍非得無別體性文不和合性非得爲體之旨寶法師今解釋尤委悉也光法師意准之可思也但於泰法師解釋者既是人師異釋也異光法師等解釋意者強不可劬勞歟重難云品類足論復有所餘如是類法與心不相應之文唯指非得一種不可得意也若唯指非得一種者無類品可云非得不可云所餘如是類法與心不相應哉何況見品類足論次上文擧受想等心所畢云復有所餘如是類法與心相應指欣厭等心所也准之思之擧得等十三種心不相應行畢云復有所餘如是類法與心不相應可指非得幷不和合性也故泰法師釋云十四不相應行攝不相應不盡故亦有所餘言其僧不和合性非十四攝是所餘不相應行今毘婆沙師存此義也正理論師亦存此義列十四不相應後頌中言等長行釋云等者是不和合性文此釋既順文理何不依用之哉答泰法師釋意實亦非無其謂歟然而光法師寶法師解釋亦能順文理其旨如前成之存今此兩師解釋之時泰法師釋不可依用之歟所詮人師異釋也取捨可思之問論中云豈成無間文爾者約僧破體致此問歟答爾也兩方若約僧破體致此問者僧破體是無覆無記也有何疑可致此問哉若依之爾者思論文起盡約僧破體致此問見如何答見論文起盡述僧破體是不和合性無覆無記心不相應行蘊所攝畢問豈成無間約僧破體致此問云事文相甚分明也即問意云經論之中云破僧無間業故僧破體是無覆無記者豈成無間業哉問也問難意趣尤有其謂何及疑問哉論中答此問云如是僧破因誑語生故説破僧是無間果文此答意云如是僧破無覆無記不和合性因虚誑語生故虚誑語無間業因立僧破果名名破僧無間業云也問欲界善業中可有感一劫異熟果類耶進云光法師釋云欲界善劣非受一劫文付之彌勒菩薩第九住劫人壽百歳之時生覩史多天第十住劫初減八萬歳之時下生人中者出起世經等説而思其住天時分當一増劫全一減劫少分若爾豈非受一劫異熟果哉何況見婆沙論文云欲界善業極増上者亦有能感一劫異熟文加之今論餘卷中云我善修行四神足故欲住一劫或一劫餘文若無受一劫異熟果之類者寧可感一劫等衆同分哉答欲界是善劣惡勝之處故善業之中全無感一劫異熟果之類也光法師欲界善劣非受一劫欲界惡強受一中劫之解釋深存此理也故婆沙論二十云欲界中不善業有一劫異熟果善業不爾文正理論四十四云豈不前説欲界無有善業能招一劫異熟無一善業猶如不善唯一刹那能招劫壽依如是理故作是説然於一事發起多思次第能招劫量天樂謂於彼死復於中生故劫樂言無違前失文寶法師引此文畢云准上論文欲界善業亦不招一中劫壽也文欲界善業之中無感一劫異熟果之類云事此等定判實分明也但於彌勒菩薩住天時分當一増劫全一減劫少分云難者彌勒菩薩住覩史多天數死數生送一増劫全一減劫少分故更非一期壽量經一中劫也故泰法師餘處解釋中云眞諦云於彼天中經多生死盡彼天壽終不中夭雖經多生總是覩史多天生總言一生也文次於婆沙論文者今此可感一劫異熟果之善業者阿羅漢果位所得故已離染位善業實無引一劫衆同分異熟果之義故不違欲界善劣非受一劫之理也故婆沙論二十次下文云如是善業要離非想非非想處第九品得已離染業定不能引衆同分果是故欲界無善能受一劫異熟文次於今論餘卷文者於人趣中實雖無經一劫等之義若有一劫等衆同分者於定得自在故可有留一劫等壽命之義云也是則假説之談更非就實之義也故婆沙論百四十一云如契經説若有苾芻苾芻尼等於四神足若習若修若多修習彼若希求住壽一劫或一劫餘隨意自在由此故説神足爲壽文彼若希求之言述假説事之旨自分明哉問成劫壞劫可有長短不同耶答成劫壞劫時分長短不同有無可有二義門也兩方若有長短不同者成壞壞已空時皆等住劫者今論餘處十二定判也何可有長短不同哉若依之爾者光法師所引婆沙論百十六中釋破僧罪能取一劫壽果云或有説者是成劫復有説者是壞劫文若成劫壞劫無長短不同者二説差異難辨哉答立成住壞空四劫之時四劫各經二十中劫之時分故成劫壞劫時分齊等也成壞壞已空時皆等住劫者即此意也故依立成住壞空四劫之門者成劫壞劫更不可有長短不同也但於光法師所引婆沙論文者或有説者是成劫者指二十中劫之分齊復有説者是壞劫者壞劫之言兼攝空劫指四十中劫之分齊也以何知之者光法師餘處十一釋上所説劫其量云何爲壞爲成爲中爲大之論文云爲以壞攝空四十壞劫名爲一劫爲二十成劫爲一劫文准此解釋思婆沙論二説或有説者是成劫者指二十中劫之分齊復有説者是壞劫者指四十中劫之分齊得意也故依壞劫之言兼攝空劫之門者成劫壞劫亦可有長短不同也故於成劫壞劫時節分齊可有此二義門歟問頌文云無間一劫熟文爾者今此一劫者何劫耶進云光法師所引婆沙論云如是説者此是中劫文付之依婆沙論定判披今論餘處十一文云等活等上六如次以欲天壽爲一晝夜壽量亦同彼極熱半中劫無間中劫全地獄壽量漸次倍増見而一生補處菩薩生覩史多天盡彼天壽量之間送一増劫全一減劫少分是則當第四地獄一日一夜之分齊設雖盡一増劫全一減劫全無間地獄壽量難及第四地獄二日二夜哉若無間地獄壽量定一中劫者豈不背八大地獄壽量漸次倍増之理哉答此事不限婆沙論定判見今論餘卷十一文述無間中劫全故無間地獄壽量一中劫云事更不可疑之但於背八大地獄壽量漸次倍増之理云難者難義之中難義也輒雖難會通暫存申一義意者一生補處菩薩住覩史多天數死數生送一増劫全一減劫少分也覩史多天一箇四千歳之間非經一増劫全一減劫少分故全非相違故泰法師餘處解釋中云眞諦云於彼天中經多生死盡彼天壽終不中夭雖經多生總是覩史多天生總言一生也文問提婆達多所造破僧罪於無間地獄一中劫異熟果悉可起取果用耶答云此事雖有學者異義暫可存於無間地獄一中劫異熟果悉起取果用云義也兩方若悉起取果用者破僧罪是決定應受業也尤可受盡所感異熟果若於一中劫異熟悉起取果用者何不受盡一中劫異熟果哉而提婆達多既不受盡一中劫異熟果知於一中劫異熟果不悉起取果用云事何況見今論餘處十七文釋地獄無殺生業道云業盡死故無殺業道文此文無諍於地獄可受盡所感異熟果見若依之爾者破僧罪是最重猛利大罪也於一中劫異熟果悉可起取果用哉是以今論中云破僧虚誑語於罪中最大文既最大猛利重罪也於一中劫異熟果何不悉起取果用哉答古來二義之中暫存提婆達多所造破僧罪於無間地獄一中劫異熟果悉起取果用云義者破僧罪是最重猛利大罪也於一中劫異熟果悉可起取果用云事道理先必然也何況今論云此必無間大地獄中經一中劫受極重苦文婆沙論百十六云謂能起破僧虚誑語此不善根能取無間地獄一劫壽果文任此等論文於一中劫異熟果悉可起取果用云事亦分明也就中提婆達多是造三逆亦斷善根之人也所造破僧罪於一中劫異熟果悉可起取果用也若提婆達多所造破僧罪於一中劫異熟果不悉起取果用者何人所造破僧罪於一中劫異熟果悉可起取果用哉加之今論餘處十一中出無中夭之處云諸處有中夭除北倶盧洲擧無中夭之人全無列提婆達多爰知提婆達多於一中劫異熟果雖悉起取果用依別縁力不受盡一中劫異熟果故有中夭云事但於決定應受業故可受盡所感異熟果云難者決定應受業者時定異熟定之義也於所感異熟果非必受盡之也次於業盡死故無殺業道之論文者依猛利不善業受地獄異熟果故業未盡位無有横死之義故如此云也然而依別縁力雖業未盡位至業力衰歇之時不受盡彼地獄異熟果來生人中等之義可有也故餘處論文全無相違重難云決定應受業者時定異熟定之義也若不受盡所感異熟果者寧可有異熟定之義哉是一次業盡死故者業未盡位不命終之義也若雖業未盡位有命終之義者何云無殺業道非自他害哉是二次提婆達多是造三逆亦斷善根墮無間地獄之者也何可有中夭哉是以正理論中釋造多逆罪感地獄生之相云或無中夭受苦多時文婆沙論百十九中述造破僧罪生無間地獄之者無中夭之旨若評業未盡位有命終之義者何云無中夭哉是三次今論餘處中云諸有地獄定受業者業力引置他方獄中文此文意造地獄決定應受業之者必可受盡彼異熟果見是四次寶法師餘處十二釋遍淨天六十四劫壽云此天劫初成時最初生容受六十四劫於後生者皆不得也若有定業應移餘界文此釋意造決定應受業之者必可受盡彼異熟果見是五答提婆達多所造破僧罪於無間地獄一中劫異熟果悉可起取果用之旨文理如前重成之也但於不受盡所感異熟果者不可有異熟定之義云難者異熟定者必受彼異熟果之義也其所感異熟果中自雖有不受盡之類更不可背異熟定之義也次業盡死故者彼地獄業未盡之時無有横死離自他害之義也至業力衰歇之時不受盡彼地獄異熟果來生人中等之義更非所遮也次於正理論或無中夭受苦多時之文者見正理論一段之文上云隨彼罪増苦還増劇謂由多逆感地獄中大柔軟身多猛苦具受二三四五倍重苦總述造多逆罪感地獄生之相也下云或無中夭受苦多時造其多逆感地獄生之類中暫出一類相也置或言其意在之非謂造多逆罪感地獄生之類一切皆無中夭更非相違婆沙論文會通亦同之即見婆沙論文云若壽量定彼無中夭文若壽量不定之者可有中夭之旨還分明也次於今論諸有地獄定受業者等之文者壞劫之時有情不生此三千界故有決定應受業之者生他三千界地獄之中云也非謂已墮地獄之者遇壞劫時爲受盡彼異熟果引置他三千界地獄之中亦非相違次於寶法師若有定業應移餘界之釋者此亦壞劫之時有情不生此三千界遍淨天故有定業之者移往他三千界遍淨天云也何來可爲難哉問光法師所引婆沙論中云如毘奈耶説提婆達多當於人壽四萬歳時來生人中必定當證獨覺菩提文爾者今此獨覺菩提者部行麟喩中何耶答云此事雖有學者異義暫可存部行獨覺云義也兩方若云部行獨覺者提婆達多是最上利根人也所證獨覺菩提定可麟喩獨覺是以婆沙論中云必定當證獨覺菩提舍利子等所不能及文而部行獨覺種姓不定如聲聞説者亦出婆沙論説若部行獨覺者何可勝舍利子等哉何況部行獨覺先是聲聞者今論餘處十二定判也提婆達多未證聖果豈可先是聲聞之類哉若依之爾者麟喩獨覺從煗善根一座成覺之人也而提婆達多得煗善根之後造三逆罪亦斷善根所證獨覺菩提更不可云麟喩獨覺哉答古來二義之中暫存提婆達多當來所證獨覺菩提部行獨覺云義者麟喩獨覺是最上利根依第四靜慮從煗善根一座成覺之人也而提婆達多退煗善根造三逆罪亦斷善根所證獨覺菩提定可非麟喩獨覺亦不可云昔起聲聞煗善根畢轉成麟喩獨覺婆沙論中提婆達多得煗善根者是今生事非前生事見故也即見婆沙論處處之文或六云提婆達多已修得煗不久得頂著名利故還退失煗復斷善根於頂應得而不得故説名頂墮非已得退文此文意提婆達多於斷善依身由著名利故退失煗善根見或三十六云問三惡趣非擇滅爲一時得爲別得耶有作是説必一時得問若爾天授如何已得二惡趣非擇滅非地獄耶答彼於地獄唯除一生餘一切生與二惡趣皆顯得非擇滅問既除一生豈非別得有餘師説施戒聞等若於惡趣得非擇滅或別或總順決擇分得必總得問天授豈不得順決擇分耶評曰應作是説忍位總得前位不定文此文意提婆達多唯除地獄一生於餘一切惡趣生得非擇滅可依順決擇分善根力見若今生不起煗善根者得惡趣生非擇滅豈可依順決擇分善根力哉加之若第十住劫減至四萬歳之時證麟喩菩提者提婆達多是可百大劫修行已滿之人何墮在無間地獄哉以此等文理思之提婆達多當來所證獨覺菩提定非麟喩獨覺云事實分明也但今此部行獨覺者是別種姓部行獨覺非無聲聞部行獨覺故婆沙論舍利子等所不能及之説今論部行獨覺先是聲聞之文更非相違也問光法師解釋中云釋迦如來於第九住劫出生文爾者可云禀承實義耶答可非禀承實義也兩方若非禀承實義者凡定釋尊出世時劫可任經論常途所説也而釋迦如來於第九住劫出世者出立世阿毘曇論等説何非禀承實義耶是以光法師餘處十二解釋中引立世阿毘曇論八小劫已過十一小劫未來第九一劫現在未盡之文畢准立世文故知釋迦牟尼佛當第九劫出世文加之勘慈恩大師處處解釋劫章頌云二十劫中第九劫六萬四萬二萬時拘留那含迦葉興百歳劫釋迦牟尼出文玄贊云佛出世者如賢劫千佛今第九住劫已四佛出文上生經疏云五濁經云今當賢劫第九住劫已有四佛文金剛般若經賛述云第九劫中人壽百歳時釋迦牟尼佛出世文同經會釋亦述此旨任此等定判釋迦如來於第九住劫出世者可云禀承實義耶若依之爾者光法師餘處十一解釋中云然和上云釋迦牟尼當住劫第一劫出世於此劫中已有四佛出世文既云釋迦如來於第一住劫出世者是和上義定知可爲禀承實義云事如何答任光法師餘處定判釋迦如來於第一住劫出世者是和上義也見光法師意以此義專可禀承實義也故慈恩大師瑜伽論略纂十一云今住劫中第九劫也二十住劫中前五無佛後十無佛第六劫佛方出世故已有四佛釋迦當第九劫也今説不然賢劫者即二十住劫合爲賢劫非經成壞多時由名賢劫即住劫中今當第一住劫已有四佛餘劫餘佛出世此西方傳釋文此釋既以今住劫中第九劫也云義破今説不然以今當第一住劫云釋嘆此西方傳釋爰知釋迦如來於第一住劫出世者三藏相承之實義大乘了義之所談云事是以大集經云是人已於賢劫之初迦羅鳩孫陀佛所發大誓願文悲華經云賢劫之初人壽四萬歳時於千佛中最初成阿耨多羅三貌三菩提號拘留孫如來文今二經中既云賢劫之初定知釋迦如來於第一住劫出世云事但於立世阿毘曇論説隨機設教者大聖方便也故對一機暫説此旨也是則對機隨情小乘一相之談也何爲了義實説耶依之興法師會此文云於大無妨正是小乘故文次於光法師餘處解釋者光法師禀遍覺三藏之相承雖存第一住劫出世之義向倶舍論製疏之時引立世阿毘曇論説釋述第九住劫出世之旨許也以此説全不存禀承實義也次於慈恩大師處處解釋者是亦任經論見文只暫作一相解釋計也全不載相承本説亦非述所存實義也瑜伽論略纂中既判二釋正不畢處處解釋以之可思也就中上生經疏所引五濁經是僞經也不可爲依憑本説故太賢法師釋云其五濁經僞經非證文尋云釋迦如來於第一住劫出世者證據在何文哉答因明大疏云成功之初有外道出名劫比羅此云黄赤色仙人文明燈抄釋此文云傳法六人其第六人名自在黒造金七十論文而金七十論是如來滅後一千年北天竺健陀羅國如意論師與一百人外道論義之時外道作七十行偈獻超日王王賜黄金欲彰己譽彼名金七十論如意論師弟子天親菩薩作七十行偈對破彼宗此名勝義七十論以之思之自成劫之初至如來滅後數論宗中傳法師資纔經六代時節不幾若釋迦如來於第九住劫出世者數論宗中傳法師資豈可唯限六代是一次相傳説云數論外道變身盤石遥至釋尊滅後一千年中爰陳那菩薩出興于世作六千偈頌立三支比量所變盤石忽碎數論宗義永絶云云准此説思之數論出世與釋尊滅後時節不幾歟爰知釋迦如來於第一住劫出世云事是二次成劫之末有外道出名鵂鶹仙人此仙人經多歳修得五通悟入六句經無量歳之間待具七徳之者遂遇般遮尸棄方傳六句法門其後即入無餘涅槃而彼仙人在拘留孫佛前隔八百歳見故弘決釋鵂鶹仙人相云其人在佛前八百年出世文准此釋思之勝論出世與拘留孫佛出世中間相隔不及一千年測知拘留孫佛第四佛於第一住劫出世云事是三次勘律藏説云劫初祖父以來嫡嫡相次至淨飯王總有八萬四千二百一十王其中十人是轉輪王云云若釋尊出世非第一住劫者劫初以來輪王出世其數何可甚少耶是四准此等誠證思之釋迦如來於第一住劫出世者能順文理也故興法師釋云又婆羅門傳云今此中劫雖小乘宗名第九劫而依大乘即二十住劫之初劫故拘留孫等四佛皆出劫初所餘諸佛出後十九劫文法住記云劫有諍有説住中第九有師住初劫第九劫説立世等初説依和上西方相傳文此等解釋意釋迦如來於第一住劫出世者大乘了義之實説三藏相承之正義云事尤分明也問造多逆罪人初所造無間業必可爲引業耶答不可必爲引業也兩方若必爲引業者造業感果之義非一准何可定初所造無間業必爲引業耶若依之爾者光法師解釋中云造多逆中初是引業後是滿業故正理云造多逆人唯一能引餘助滿故又正理云如造多逆先引後滿文如今解釋幷正引正理文者造多逆罪之人初所造無間業必可爲引業見如何答造多逆罪之人初所造無間業不可必爲引業也引業滿業前後可隨造業者意樂何可定初是引業後是滿業耶是以光法師餘處引婆沙論云問諸造業者爲先造引衆同分業爲先造滿衆同分業耶如是説者此則不定或有先造引業後造滿業或有先造滿業後造引業隨造業者意樂起故文何況先造非逆罪決定引業之人後造多逆罪初所造無間業豈可爲引業耶准此等文理思之造多逆罪之人初所造無間業不可必爲引業也但於光法師解釋幷正理論者從多分論之也所謂五無間業是最重罪故初所造業多爲引業後所造業多爲滿業也然而其中自亦可有初所造業爲滿業後所造爲引業之類也問成實論八意造多逆罪人前後受彼異熟果歟進云光法師解釋意同時受彼異熟果見付之成實論意既許造多逆罪之人多劫受報之義定知前後受彼異熟果云事是以正見成實論文釋造多逆罪受彼報相云是罪多故久受重苦於是中死還生是中文此文無諍前後可受彼異熟果見依之淨影大師大乘義章中云若依毘曇具五逆者五劫受報不在一時成實亦然故彼論言是罪重故久受重苦於是中死還是中生若此劫盡生於他方阿鼻獄中文今此定判尤順成實論文光法師解釋甚以難思如何答成實論意同經部宗義許一業感多身多業感一身之義故造多逆罪之人多劫同受彼異熟果云也故光法師釋云若依成實論若造一逆一劫受果若造二逆二劫同受如是乃至若造五逆五劫同受餘後四劫從初爲名同名生報業成實多依經部宗一業感多身亦多業感一身文寶法師釋云若依成實論若造一逆一劫受苦乃至若造五逆五劫同受餘後四劫從初爲名同名生報多同經部一業感多身多業感一身文泰法師釋云若如成實論若在一逆一劫受報乃至若造五逆五劫受報成實論多依經部宗一業感多身亦多業感一身故若造五逆同受生報同初劫受感生亦能感後故五五業同受後四劫報然從初爲名同名生報業文諸師一同之解釋定探成實論深意歟但於成實論文者造多逆罪之人多劫之間同受重苦故云是罪多故久受重苦於是中死還生是中也今此論文全非相違次於大乘義章解釋者是亦人師異釋也今解釋意雖非無其謂異光法師等解釋意者強不可劬勞歟重難云見泰法師解釋云經部祖師名鳩摩羅多於經部中最尊最上號爲上坐上坐於此作如是釋或於地獄死已更生無餘趣間雖五劫受皆名無間竝名生受若依此釋成實論云若造五逆各受一劫故五劫受報於是中死還生是中無餘趣間名無間業皆名生報更受餘趣方名復後報故成實論云若造五逆五劫受報於是中死還生是中故名無間生報業也講成實論諸師言雖於是中死還生是中於臨終時無妄愛間故名無間者不然若無妄愛何得受生以無有愛生故上坐釋言無天世間故名無間文此釋意同大乘義章解釋成實論意造多逆罪之人各別可受彼一劫異熟果見如何答此依經部祖師鳩摩羅多意別作一釋也云若依此釋此旨自分明歟問經部宗意造一逆罪人第三生已後猶可受彼異熟果耶答第三生已後猶可受彼異熟果也兩方若猶受彼異熟果者見光法師解釋上述若依成實論若造一逆一劫受果畢下云成實多依經部宗文如今解釋者經部宗意造一逆罪之人第三生已後不受彼異熟果見若依之爾者一業感多身多業感一身者經部宗盛所談也造一逆罪之人第三生已後猶可受彼異熟果哉答經部宗意許一業感多身之義故順現業必感生報順生業必感後報云故造一逆罪感順生異熟果畢必亦可感順後異熟果也故今論餘處十五中出經部宗義云有餘師説順現法受業餘生亦得熟隨初熟位建立業名爲順現等勿強力業異熟果少文光法師十五釋此文云依經部宗許有一業能感多生若順現法受業其力最強必受生後若順生受業其力稍劣不受現受此即劣現必受後受此即勝後若順後次受業其力最劣不受現生故劣前二唯受後受文經部宗意順現業必感生報後報順生業必感後報之旨今論疏定判實分明也故造一逆罪之人第三生已後猶可受彼異熟果也但於光法師當處解釋者成實論意多依經部宗義故許一業感多身多業感一身之義云許也非謂經部宗意造一逆罪之人唯順生一劫受盡彼異熟果歟問提婆達多爲先犯出血罪後造破僧罪爲當先造破僧罪後犯出血罪歟答依薩婆多宗意者可云先造破僧罪後犯出血罪也兩方若先犯出血罪後造破僧罪者苾芻見淨行者今論定判也論文無諍先造破僧罪後犯出血罪見若依之爾者淨影大師大乘義章中上標四分律中先明出血後明破僧畢下正述其相云提婆達多先教世王殺害其父自欲殺佛望爲新王新佛化世故先害佛以害佛故惡名流布利養斷絶五人相將家家乞食因即起於破僧之心遂便破僧故知破僧定在其後文如今解釋者四分律意先犯出血罪後造破僧罪見如何答提婆達多犯破僧出血二罪之先後者古來難義也輒雖難定之暫任愚案存一義者依薩婆多宗意者可云先造破僧罪後犯出血罪也故見今論文偈頌云苾芻見淨行長行云住淨行人非犯戒者以犯戒者言無威故文正理論四十三云要住淨行方能破僧以犯戒人無威徳故即由此證造餘逆後不能破僧以造餘逆及受彼果處無定故文顯宗論二十三文全同此説婆沙論百十九云若先造餘無間業彼後不能破僧文雜心論云餘無間業後不能壞僧文任此等論文薩婆多宗意先造破僧罪後犯出血罪云事實分明也但於四分律説者四分律是法藏部依憑律藏非薩婆多部依憑律藏故薩婆多宗義違四分律説更非所痛也故慈恩大師法苑義林章云一十誦律是薩婆多宗乃至二四分律是法藏部文任此解釋薩婆多宗意以十誦律可爲依憑律藏也問論中釋破異處愚夫頌文擧二師異説爾者初師意愚夫言可通忍世第一法位耶答可通忍世第一法位也兩方若通忍世第一法位者忍世第一法位是見道近方便也更不可爲所破何可通彼位哉若依之爾者見論文初師無置簡別之言知愚夫之言可通忍世第一法位云事如何答見論文初師釋今頌文云唯破異生非破聖者以諸聖者證法性故文此師意愚夫之言廣可取異生諸位見何況論中擧第二師義云有説得忍亦不可破文既異初師擧此有説定知初師意愚夫之言可通忍世第一法位云事但於忍世第一法位是見道近方便不可爲所破云難者得忍善根之後不可有隨邪師信邪教之義云事二師所存更無替也其中初師意愚夫者即指異生之言故愚夫之言廣可通忍世第一法位此異生諸位之中有隨邪師信邪教之類亦有不隨邪師不信邪教之位爲言第二師意今愚夫者唯取隨邪師信邪教之類故得忍善根之後永無此義故今愚夫之言不可通忍世第一法位云也故正理論云有説得忍亦不可破由決定忍佛所説故文二師所存其趣如此也問論文云要八苾芻分爲二衆以爲所破文爾者八人倶隨能破者信邪法歟爲當唯四人可信邪法耶答八人之中唯邪衆四人可信邪法也兩方若八人倶信邪法者八人僧衆之中四人留隨如來四人歸信調達於隨如來之四人者更不可信邪法哉是以見婆沙論文或云於正衆中極少四人於邪衆中極少五人文或云要一界内有二部僧別在異忍方名破僧文任此等論文不可云八人倶信邪法哉若依之爾者見今論文起盡上云要所破僧忍師異佛忍異佛説有餘聖道畢下云要八苾芻分爲二衆以爲所破能破第九文文相前後無諍八人倶可信邪法見加之淨影大師大乘義章中云正衆四人是其所破邪衆五人是其能破故須九也文既云正衆爲所破寧不信邪法哉抑正衆四人成不和合性歟答要八苾芻分爲二衆以爲所破之文意雖述八人倶名所破之義門正信邪法唯限隨提婆達多之四人更不可通正衆四人也其故以道理思之提婆達多破法輪僧之時正衆之中必可有如來雙賢弟子彼人豈可信邪法哉何況見婆沙論一段之文或云於正衆中極少四人於邪衆中極少五人如是極少下至九人則法輪僧壞文既名正衆更不可信邪法或引施設足論云提婆達多自爲第五皆共受籌文若八人倶信邪法者受籌之類豈可唯限五人哉或云要一界内有二部僧別住異忍方名破僧文別住異忍之言忍異師異道之類可信邪法見以此等文理思之留隨如來之四人全不可信邪法也但於今論文起盡者凡於所破僧可有二義門也或一和合僧分爲二衆之時正衆四人邪衆四人倶名所破僧也要八苾芻分爲二衆以爲所破第九之論文即述此意也或信八支聖道之者名和合僧捨之隨邪師信邪法之類名所破僧也要所破僧忍師異佛忍異佛説有餘聖道應説僧破在如是時之論文亦述此意也前後論文各顯一門不可以彼難此哉次於大乘義章解釋者一和合僧分爲二衆之起由邪衆隨提婆達多信邪法也故以正衆四人名所破僧以邪衆四人名能破者也此釋意全不云正衆四人亦信邪法何可爲違文哉次正衆四人成不和合性歟云事尤雖有所可思暫存一義意者正衆設雖不信邪法可成不和合性也一和合僧分爲二衆倶被云所破僧之門八人倶可捨和合性何不成不和合性哉若正衆四人不成不和合性者假名所僧破之義門難有故也重難云正衆四人不信邪法者何可有名所破僧之義門哉以此理思之要八苾芻分爲二衆以爲所破者八人分爲二衆之中隨邪師信邪法之四人爲所破僧云文意也要所破僧忍師異佛忍異佛説有餘聖道應説僧破在如是時之論文忍異師異道之類名所破僧之旨實分明也要八苾芻分爲二衆以爲所破之論文其意可同之何云前後論文各顯一門哉是一次正衆四人成不和合性云事亦不可然設雖八人分爲二衆於正衆者未捨四人已上和合信聖道等之義故猶可成和合何云成不和合性哉是以光法師釋非能破者成此僧破但是所破僧衆所成之論文云非是天授能破者成此僧破體但是所破愚僧所成文此釋意無諍不和合性唯邪衆愚僧所成正衆不成之見是二答正衆四人雖不信邪法一和合僧分爲二衆之寺正衆四人亦名所破僧之義門可有也要八苾芻分爲二衆以爲所破之論文八人倶名所破僧之旨實分明也何及異義哉但要所破僧忍師異佛忍異佛説有餘聖道應説僧破在如是時之論文具明能破所破相故亦述隨邪師信邪法之類名所破僧之義門也一論前後之文述不相違之二義門論家常習也何強疑之哉次正衆四人成不和合性云事亦有其謂八苾芻衆初共和合後亦分爲二衆之時正衆四人邪衆四人倶可捨和合性何不成不和合性哉若正衆四人不成不和合性者何可有名所破僧之義門哉既許正衆四人名所破僧之義門可成不和合性云事道理實必然也但於光法師此僧破體但是所破愚僧所成之釋者論文自本有二義門之中所破僧所成者述隨邪師信邪法之類名所破僧之義門故光法師任論文作解釋許也全非遮八人倶名所破僧之義門正衆四人亦成不和合性云事也問造破僧罪唯限佛在世歟進云見諸論文造破僧罪唯限佛在世云也付之設雖非佛在世何不造破僧罪哉是以見婆沙論處處之文或百十九云若因破僧生無間地獄壽命未盡世界便壞者彼中夭不文或百三十四云若諸有情於劫將壞餘半劫在破和合僧墮無間獄有中夭不文此等論文既云劫欲壞時造破僧罪知造破僧罪不限佛在世云事如何答初後皰雙前佛滅未結界於如是六位無破法輪僧者諸論一同之定判也造破僧罪唯限佛在世云事更不可疑之即述佛滅後不造破僧罪故今論云佛滅後時無眞大師爲敵對故文正理論四十三云佛滅後時他不信受無有眞佛爲敵對故文顯宗論文全同此説婆沙論百十六云非於大師涅槃後者若於大師涅槃後作如是言我是大師非如來者咸共責言大師在世汝何不言我是大師今涅槃後乃作是言文雜心論云亦非大師般涅槃後無異師故文任此等論文造破僧罪唯限佛在世之旨實分明也但於婆沙論處處之文者彼述假設之事更非盡理之談歟問正理論中云如是破僧諸佛皆有不爾要有宿破他業文爾者何時宿業耶進云正理論云於此賢劫迦葉波佛時釋迦牟尼曾破他衆故文付之釋迦菩薩於迦葉佛出世之時者百劫修行滿足預補處記別於彼時分何可破他眷屬哉是以光法師所引婆沙論中云即自觀見昔我無量無數劫前曾破壞他仙人眷屬彼業異熟今現在前文既云無量無數劫前知非迦葉佛出世之時云事如何答釋迦菩薩先得八定之後於菩提樹下猶退起三惡覺見況百劫修行滿足至迦葉佛出世之時遇惡縁有破他眷屬之義何強癡之哉正理論文定有依憑本説歟但於光法師所引婆沙論文者可有二會通也或釋迦菩薩無量無數劫前破他仙人眷屬此賢劫迦葉佛出世之時亦破眷屬歟彼兩度業異熟果今現在前故有破僧也故光法師釋此事云婆沙正理各引一事所以不同文寶法師有兩事二論各引一證之初解釋其意亦同之或婆沙論中云無量無數劫前就日月歳數小劫論之故與正理論説非各別事也寶法師又釋婆沙日月劫故云無量無數劫之第二解釋即述此旨也問殺麟喩獨覺可成逆罪耶答可有二義也兩方若成逆罪者論中釋徳田相無擧麟喩獨覺爰知殺麟喩獨覺不成逆罪云事若依之爾者殺聲聞劣品猶成逆罪殺麟喩獨覺最上利根何不成逆罪哉答思此事可有二議也或一義云殺麟喩獨覺不可成逆罪也其故麟喩獨覺實雖最上利根之人無有説法教化希望令他有情生勝功徳之義邊自聲聞劣故殺之不成逆罪也是以今論云徳田謂餘阿羅漢等具諸勝徳及能生故壞徳所依故成逆罪文光法師釋此文云徳田謂餘阿羅漢僧及如來具諸勝功徳及能生他勝功徳故壞彼勝徳所依止身故成逆罪文任此等定判徳田之中雖出阿羅漢及如來無擧麟喩獨覺爰知殺麟角獨覺不成逆罪云事何況光法師餘處所引正理論中釋所歸依體不取獨覺菩提云謂諸獨覺不能説法教誡諸有情令離生死怖文准此論説思之麟喩獨覺無有説法教化之義故殺之不成逆罪歟但於聲聞例難者聲聞實雖根性劣品説法教化令他有情生勝功徳之義邊自麟喩獨覺勝故殺之亦成逆罪也或一義云問於阿羅漢無阿羅漢想殺時可成逆罪耶重云論云亦成逆罪文付之於阿羅漢無阿羅漢想殺之是可誤殺何成逆罪哉是以於父母無父母想殺之不成逆罪見答於阿羅漢無阿羅漢想殺之最可成逆罪也其故不可殺阿羅漢云事一切有情不必思之有悟之者雖知阿羅漢恩深愚癡之類不辨其恩甚重故殺一人僧之時無是阿羅漢歟非阿羅漢歟云簡別之思殺之故是非誤殺亦成逆罪也故今論云若害阿羅漢無阿羅漢想於彼依止起定殺心無簡別故亦成逆罪文正理論四十三云有於阿羅漢無阿羅漢想亦無決定解此非阿羅漢無簡別故容成逆罪文顯宗論文全同此説婆沙論百十九云問彼不了知是阿羅漢何故得無間罪答不以知故得罪以壞徳田故得罪彼於苾芻衆中起無簡擇等殺意樂由此極惡之心害及阿羅漢是故得無間罪文任此等論文於阿羅漢無阿羅漢想殺之亦成逆罪之旨實分明也但於父母例難者一切有情皆知父母恩深故自本同存不可殺父母之理故於父母無父母想殺之皆誤殺不成逆罪也故正理論中會此例難云非於父母全與此同以易識知而不識者雖行殺害無乘恩心阿羅漢人無別標相既難識是亦難知非故慢心殺亦成無間文尋云於阿羅漢無阿羅漢想殺之不成逆罪之類可有哉答可有此類也所謂或於餘人起殺加行於阿羅漢無阿羅漢想果究竟之類不可成逆罪也或亦自本有不可殺阿羅漢云簡別之思之人於阿羅漢無阿羅漢無阿羅漢想殺之亦不可成逆罪也問於如來身起殺心不出血成逆罪義可有耶答可有此義也兩方若有此義者於如來身雖起殺心若不出血者何可成逆罪哉是以光法師釋要以殺心方成逆罪之論文云要以殺心出佛身血方成逆罪文如今解釋者於如來身雖起殺心不出血者不成逆罪見若依之爾者寶法師所引婆沙論百十九中可有此義見如何答於如來身起殺心打之血雖不出皮外令血移本處亦可成逆罪也故婆沙論云有起惡心不至出血而得無間罪謂起欲殺心乃至令血移處文寶法師引婆沙論云有不出血成逆謂以殺心打佛令血處成二分而不出皮文但於光法師解釋者於如來身起殺心打之血雖不出皮外令血移本處成二分畢與血出皮上其罪是同出佛身血罪所攝故亦名出血之義門可有也要以殺心出佛身血方成逆罪之言中可攝此類故婆沙論文光法師釋更非相違也問金剛喩定位唯以有頂修所斷第九品煩惱上擇滅無爲爲離繋果歟答爾也兩方若唯以有頂修所斷第九品煩惱上擇滅無爲爲離繋果者見今論文云據離繋果則金剛喩定相應思能得大果者諸結永斷爲此果故文如此文者金剛喩定位廣以三界九地見修所斷一切煩惱上擇滅無爲可爲離繋果見若依之爾者以性相思之金剛諭定位唯以有頂修所斷第九品煩惱上擇滅無爲可爲離繋果也答重證之位擇滅無爲非初離煩惱繋縛所證故唯士用果非離繋果也故金剛喩定位唯以有頂修所斷第九品煩惱上擇滅無爲可爲離繋果也故光法師餘處六引正理論十八云若無間道斷諸隨眠所證擇滅如是擇滅名離繋果及士用果若無間道不斷隨眠重證本時所證擇滅如是擇滅非離繋果唯士用果文婆沙論百二十一云離繋果者謂無間道斷諸煩惱此無間道以煩惱等斷爲離繋果及士用果若無間道以能於先來諸煩惱斷集得作證此無間道以彼煩惱斷但爲士用果此則總説若別説者金剛喩定以等九品隨眠等斷爲離繋果及士用果以三界見所斷及下八地修所斷幷非想非非想處修所斷前八品隨眠等斷集得作證此金剛喩定以彼諸斷爲士用果文任此等論文金剛喩定位唯以有頂修所斷第九品煩惱上擇滅無爲爲離繋果及士用果以先所斷三界九地見修所斷一切煩惱上擇滅無爲唯爲士用果云事尤分明也但於今論文者金剛喩定有能容斷三界九地見修所斷一切煩惱之功能故云諸結永斷爲此果故也若先位不斷之者金剛喩定容頓斷三界九地見修所斷一切煩惱故以三界九地見修所斷一切煩惱上擇滅無爲容爲離繋果之義勢亦可有之也故今論餘處中釋金剛喩定相云一切隨眠皆能破故先已破故不破一切實有能破一切功能諸斷惑無間道中此定相應最爲勝故文諸結永斷爲此果故之論文則談此義勢也問論中明無間同類業擧二師異説爾説初師意無間同類業順次生必感地獄異熟果歟答順次生不可必感地獄異熟果也兩方若順次生必感地獄異熟果者何不立無間業哉既云無間同類業順次生不必感地獄異熟果聞若依之爾者見今論文云諸無間同類亦定生彼有餘師説非無間生文初師意可異有餘師説非無間生之義意定知順次生必感地獄異熟果云事如何答無間同類業順次生必感地獄異熟果者與五無間業既無有差異何不立無間業哉順次生不必感地獄異熟果云事道理實必然也設雖初師意豈不存此理哉但於今論文者二師所説更非相違之義也初師意顯無間同類業必感地獄異熟果之旨有餘師意述順次生不必感地獄異熟果之旨也二師各顯一邊之相更非相違之義也故正理論云諸無間同類亦定生彼非定無間生非無間業故文不置有餘師説之言即顯非相違二説之旨也問頌文云將得忍不還無學業爲障文爾者三時障業唯限障業歟答不可限引業也兩方若唯限引業者設雖滿業何不爲障礙哉是以今論疏中雖明三時障業相更無分別引滿二業爰知三時障業可通引滿二業云事若依之爾者婆沙論中説三時障業相云引衆同分定應熟業極作障礙文如此論文者三時障業唯可限引業見如何答滿業之中順生業順後業幷不定業中異熟定異處熟者可爲障礙故三時障業不限引業可通滿業云事道理實必然也故今論疏幷正理論等中廣雖明三時障業相全無有引業滿業之簡別若唯限引業不通滿業者論疏等中何不述此旨哉爰知三時障業可通引滿二業云事但於婆沙論文者引業是爲感生之本故暫擧之許也更非遮滿業亦爲障礙之義何爲違文哉問論文云將得忍時感惡趣業皆極爲障文爾者寶法師意今此感惡趣業者可通善不善業耶答可通善不善業也兩方若通善不善業者見寶法師解釋上釋將得忍時爲障之業畢下述將得不還果時爲障之業云此中通二性業文如今解釋者將得忍時爲障之事不通善不善二性業見若依之爾者感惡趣業是廣何不通善不善業哉答善業之中決定可感傍生鬼趣異熟果之類將得忍時尤可爲障故云將得忍時感惡趣業皆極爲障文不限不善業亦可通善業也但於寶法師解釋者三惡趣中感地獄異熟果之業唯限不善業感傍生鬼趣異熟之業中引業唯限不善業滿業多分爲不善業其中自亦雖有善業從多分論之感惡趣業是不善業故將得忍時爲障之業偏屬不善業將得不還果時爲障之業故云通二性業也委悉論之將得忍時爲障之業亦可通善不善二性業也問論中付明三時障業且於人中可熟地獄業者異處熟非異處熟中何耶答可云非異處熟業也兩方若非異處熟業者既於人中可熟地獄業也尤可云異處熟業依何義立非異處熟稱哉若於人中可熟地獄業是非異處熟業者於人中可熟人業可云異處熟業歟若爾於人中將得第三果之時豈可有爲障之義哉若依之爾者定異處熟非異處熟業尤可依爲障不爲障之義而見婆沙論文述阿羅漢果聖者於人中寄受地獄異熟果之旨若爾將得忍善根之時不可爲障何云異處熟者皆能爲障哉答於人中可熟地獄業者可云非異處熟業也凡分別異處熟非異處熟業源出正理論説故光法師引正理論然於此中除順現受及順不定受異熟不定業幷異熟定中非異處熟者之文畢云以此准知順生受業順後受業及順不定受業中異熟定異處熟者皆能爲障文今云此異處熟非異處熟業雖有學者異義暫存一義意者正理論中釋三時障業有此廢立故推之望得忍善根得不還果得阿羅漢果之處立異處稱也故於人中將得忍善根將得不還果將得阿羅漢果之時於人中可熟地獄業故可云非異處熟業也故云非異處熟業不爲障尤有其謂也但至於人中可熟人業可云異處熟業云難者既於人中可熟人業也何立異處熟業哉是亦非異處熟業故不爲障也重難云於南洲得忍善根之後於東西二洲得阿羅漢果畢寄受地獄異熟果之時可有異處熟業亦不爲障之義何云異處熟者皆能爲障哉是一次於人中得不還果之時於人中可熟人報定時不定引業可云非異處熟業豈不爲障哉是二答會初難云將得忍善根之時別對惡趣設雖四洲異總於人中可熟之業皆名非異處熟故於南洲得忍善根之後於東西二洲得阿羅漢果畢寄受地獄異熟果是非異處熟之義也何云異處熟業哉重意云將得忍善根之時別對惡趣故於人中可熟五趣業皆名非異處熟業將得不還果之時於欲界中別於何處得不還果之處可熟之業可名非異處熟業也故將得忍善根將得不還果之時異處熟非異處熟之廢立所望少異歟會次難云將得不還果之時欲界報定時不定引業必可爲障故不及分別異處熟非異處熟故婆沙論五十三云聖者將離欲界染時欲界所有引衆同分定應熟業極作障礙義言汝若證不還果決定不復受欲界生我於誰身當受異熟由此於彼極作障礙文於滿業者於非異處可熟之業不爲障故分別異處熟非異處熟也故異處熟非異處熟之廢立唯就滿業論之今以引業爲疑未得其意也問光法師解釋中引婆沙論説相異熟業或云唯思所成或云通聞思所成二説爾者通聞思所成云義可爲正義耶答可非正義也兩方若爲正義者光法師解釋中引婆沙論二説畢云婆沙既無評家諸論既同前師即以前師爲正文如今解釋者通聞思所成云義非正義見若依之爾者光法師餘處一解釋中引婆沙論相異熟業通聞思所成云義畢云以此文證故知聞思能發身語文此師若非正義者何引之證聞思二惠能發身語二業之義哉答廣披倶舍正理顯宗雜心等諸論説尋相異熟業聞思所成之通局今論中偈頌云佛思思所成長行云是思所成非聞修類文正理論云感妙相業唯思所成非修所成不定界故所感異熟此所繋故非聞所成彼羸劣故亦非生得加行起故文顯宗論二十四文全同此説雜心論十一云問相報業爲何等性答身業口業増上意業又是思惠性非聞惠以劣故非修惠欲界不定故文此等諸論之中述相異熟業唯限思所成之旨故以之思之婆沙論第二師相異熟業通聞思所成云義可非正義也故光法師引婆沙論二説畢判婆沙雖無評家諸論説同前師即以前師爲正相相異熟業唯思所成云初師説爲正義釋尤有其謂也但於光法師餘處解釋者見婆沙論一段之文上云相異熟業身語意三業爲自性畢下述三惠所成相一説意云相異熟業通聞思所成故引此文證聞思二惠能發身語二業之旨許也相異熟業通劣品聞所成云當不生義更不可痛之也問釋迦超劫唯限九劫歟答百劫之間唯可超九劫也兩方若唯限九劫者釋迦菩薩精進勇猛過諸菩薩超劫更不可限九劫哉是以涅槃經十三中説爲聞半偈棄捨身命之因縁云便得超越足十二劫在彌勒前成阿耨多羅三貌三菩提文増一阿含經中云彌勒菩薩三十劫當成無上正眞等正覺我以精進之力超越成佛文此等經文無諍釋迦超劫不限九劫見若依之爾者今論疏中釋迦超劫唯可限九劫見如何答廣披倶舍正理婆沙雜心等諸論説尋釋迦超劫之時分百劫之間唯超九劫見所謂今論云唯餘百劫造修非多諸佛因中法應如是唯薄伽梵釋迦牟尼精進熾然能超九劫九十一劫妙相業成文正理論四十四云唯餘百劫造修非多諸佛因中法應如是唯薄伽梵釋迦牟尼精進滿時能超九劫九十一劫妙相業成文婆沙論云問此相異熟業經於幾時修習圓滿答多分經百大劫唯除釋迦菩薩以釋迦菩薩極精進故超九大劫但經九十一劫修習圓滿便得無上正等菩提文雜心論十一云於百劫中種相報業除釋迦牟尼菩薩精進故除九劫餘九十一劫文任此等諸論之文釋迦菩薩百劫之間唯超九劫九十一劫妙相業成之旨尤分明也有宗依憑論藏幷人師解釋中未見餘時亦有超劫之文故依有宗意釋迦菩薩百劫之間唯超九劫可云也但於涅槃經文者彼述大乘實義更非有宗依憑所説法門自本相違至于此事何必會之心地觀經中總可有四十超劫見如此大小乘異説皆是機見不同歟故章安大師釋涅槃經十三卷今文云超越十二劫者出曜佛藏等經皆云超九劫或云根縁不同佛爲増減説之文増一阿含經文雖述小乘義門亦是機見不同也准之可思之問釋迦彌勒最初發心同時歟答不同時歟兩方若同時者成佛既有先後發心何爲同時哉是以辰旦人師解釋中釋迦彌勒最初發心不同時見若依之爾者智論第四中説二聖發心云如釋迦文尼佛與彌勒等諸菩薩同時發心釋迦文尼佛精進力故能超九劫文任此論説釋迦彌勒最初發心同時云事尤分明也答釋迦彌勒二聖最初發心同時先後凡慮雖非所可測思暫依一義意者彌勒先發心釋迦後發心歟其故釋迦超九大劫第九住劫成佛彌勒無有超劫第十住劫成佛以超劫幷成佛之時分思之彌勒先發心釋迦後發心云事必然也何況廣披大小諸經説尋二聖發心先後彌勒先發心釋迦後發心見所謂寶積經云然彼彌勒修菩薩行經曰四十劫我時乃發阿耨多羅三藐三菩提心由我勇猛精進力故便超九劫於賢劫中得阿耨多羅三藐三菩提文佛藏經云彌勒發心四十劫已我乃發心無勝佛所初種善根我於千歳一切樂具供養是佛文佛本行集經第一云彌勒菩薩在於我前幷四十餘劫發菩提心而我然後始發道心種諸善根求阿耨多羅三藐三菩提文増一阿含經中或十一云彌勒菩薩經三十劫應當作佛至眞等正覺我以精進力勇猛之心使彌勒在後文或三十六云彌勒菩薩應三十劫當成無上正眞等正覺我以精進之力超越成佛文任此等大小諸經説或云四十劫或云三十劫其先時分雖有異説彌勒先發心釋迦後發心云事諸經一同更無異説仰可信之何再疑之哉但於智論文者暫就一時一位發心論之非云二聖最初發心亦同時也慈恩大師上生經疏上中引佛本行集經昔有如來號曰善思彌勒菩薩於彼佛所最初發心取意引之云文畢云此中皆説後時發心彌勒發心因彌勒佛釋迦發心因釋迦佛故彼非初文智論中述釋迦彌勒同時發心之旨准此釋可會之也問論中明相好業量云有説唯除近佛菩薩所餘一切有情所修富樂果業名一福量文爾者今此富樂果業中可攝四梵福耶答可有二意也兩方若攝之者梵福量是廣大也何可攝之哉是以見今論下文云毘婆沙師作如是説即於分別妙相業中所辨福業此即同彼文如此文者一一梵福量既同一一相好業量所餘一切有情所修富樂果業之中更不可攝四梵福哉若依之爾者既云唯除近佛菩薩明知所餘有情所修富樂果之中可攝四梵福云事如何答見今論前後之文上明相好業量擧三師異説下述梵福量出二師異説其中上明相好業量有説唯除近佛菩薩所餘一切有情所修富樂果業名一福量云初師義與下述梵福量毘婆沙師作如是説即於分別妙相業中所辨福量此即同彼云第二師義何必是一師義得意哉若以之存別師義者今疑問頗可成無用也其故述梵福量先軌範師作如是説隨福能感一劫生天受諸快樂是一福量云初師意其梵福樂不幾所餘一切有情所修富樂果業之中攝四梵福全無相違也設亦以之屬一師義者唯除近佛菩薩之言中可除四梵福也此師意梵福量與相好業量同云故除近佛菩薩之言中亦可除四梵福之理爲必然故也問勝觀佛底沙佛一佛歟答或云一佛或云別佛二義可有也兩方若一佛者廣勘倶舍婆沙正理顯宗等諸論之文釋迦菩薩第三阿僧祇滿所逢事佛名勝觀百劫位中誦一偈所讃歎佛號底沙若爾三祇百劫時分既異勝觀底沙名號亦別定可別佛何云一佛哉若依之爾者慈恩大師解釋中勝觀佛底沙佛可一佛見如何答勝觀佛底沙佛同體異體雖輒難定且依一義意者可云一佛異名也其故見慈恩大師處處解釋法華玄賛云第三劫滿百劫修相好業初逢勝觀佛即毘婆尸由翹足讃歎底沙超於九劫所以經中往往言過去九十一劫有毘婆尸佛文般若會釋云三大劫滿百劫修相好業初逢毘婆尸佛此言勝觀但由翹足超九劫故所以經言九十一劫毘婆尸佛文此等釋意勝觀佛即毘婆尸佛毘婆尸佛即底佛見淄洲大師最勝疏六云第三祇滿修相報初逢勝觀佛亦云弗沙翹足讃歎超九劫文此釋意勝觀佛即弗沙佛弗沙佛即底沙佛見讃歎底沙佛超九劫者今論等説分明故也加之香象大師五教章云又由以一偈歎弗沙佛即超九劫但九十一劫即成佛也文樸楊大師攝釋中牒玄賛由翹足讃歎底沙超於九劫之文云疏百劫修相好歎弗沙佛者文智論第四云是釋迦牟尼菩薩作外道仙人上山採藥見弗沙佛坐寶窟中入火定放光明見已心歡喜信敬翹一脚立叉手向佛一心而觀目未曾眴七日七夜以一偈讃佛文婆沙論中説釋迦菩薩超劫相云如契經説過去有佛號曰底沙或云補砂文補砂者寧非指弗沙哉准此等大小乘論家定判自他宗人師解釋思之毘婆尸佛即勝觀佛勝觀佛即弗沙佛弗沙佛即底沙佛同是一佛異名可云也但於三祇百劫時分既異云難者前位成滿後位最初所逢事佛即一佛故三僧祇滿逢勝觀佛百大劫初事底沙佛云文還爲勝觀底沙是可一佛云證據全非相違如彼婆沙論中云釋迦菩薩初阿僧祇劫滿第二阿僧祇劫初同逢寶髻佛第二阿僧祇劫滿第三阿僧祇劫初同逢燃燈佛取意也次於勝觀底沙名號亦別云難者今論等中隨其事相替引各別契經任彼經文列其名號故一論前後一段上下雖或名勝觀或號底沙論其體者實可一佛也重難云見華嚴經文毘婆尸佛提舍佛各別列之而毘婆尸佛即勝觀佛者神泰清涼惠苑慈恩等諸師釋分明也提舍亦云底沙文刊定記釋此文云提舍者正云底沙文任此兩師定判勝觀佛底沙佛定可別佛是一加之披佛本行集經説第四云我念往昔有一如來出現於世號曰帝沙乃至彼佛告侍者言是人過於九十五劫當得作佛號釋迦牟尼我念往昔有一如來出現於世號毘婆尸乃至彼佛告侍者言是人過於九十一劫當得作佛號釋迦牟尼文此文無諍勝觀佛底沙佛是非一佛見是二答釋迦菩薩三僧祇滿百大劫初所逢事毘婆尸佛即勝觀佛亦名底沙佛諸師解釋述此意也華嚴經中提舍佛亦名底沙佛同名異體別底沙佛歟次佛本行集經説會通之趣准之可思或又彼賢聖集經也廣集諸教異説以爲一部經典故隨其名異各別列之歟或一義云勝觀佛底沙佛可非一佛也其故見今論文上謂於第三無數劫滿所逢事佛名爲勝觀文下云若時菩薩勇猛精進因行遇見底沙如來乃至以妙伽他讃彼佛曰乃至如是讃已便超九劫文正理論中上云謂於第三無數劫滿所逢事佛名爲勝觀文下云若時菩薩勇猛精進讃歎底沙便超九劫文顯宗論文大同此説婆沙論中或百七十七云如契經説過去有佛號曰底沙或云補砂文或百七十八云第三劫阿僧祇耶逢事七萬七千佛最初即燃燈最後名勝觀文此等諸論之中一段前後勝觀底沙各別列其名號非一佛云事實分明也何況舊倶舍論中勝觀佛名毘婆尸佛是以泰法師釋云謂於第三劫末佛名毘婆尸此云勝觀佛文此等釋意勝觀佛毘婆尸佛是可一佛見而華嚴經中毘婆尸提舍各別列之提舍亦云底沙者即出清涼大師解釋故任此等文勝觀佛底沙佛是各別佛云事亦分明也但於慈恩大師解釋者如此異説諸教是多皆是見聞不同也不及和會之歟問論文云如是讃已便超九劫文爾者釋迦菩薩讃歎底沙佛超九劫百劫中第九十一劫歟答百劫之中初劫也兩方若第九十一劫者慈恩大師般若會釋中云三大劫滿百劫修相好業初逢毘婆尸佛此言勝觀倶由翹足超九劫故所以經中九十一劫毘婆尸佛文如今解釋者百劫之中初劫見若依之爾者見辰旦人師解釋云釋迦菩薩至第九十一劫遇底沙佛故相業圓滿即超後九劫於彌勒前成佛文此解釋無諍百劫之中第九十一劫見如何答若存勝觀佛底沙佛其體是一非各別佛云義之時讃歎底沙佛超九劫百劫之中初劫云事是必然也百劫之中初逢勝觀佛者婆沙論文幷慈恩大師處處解釋尤分明故也何況撲楊大師攝釋中釋此事述一釋意云此即百劫之中初逢也文百劫之中初劫云事此釋亦明鏡哉但於辰旦人師解釋者是婆沙抄定判歟此釋若背文理者更不可依用之也問異生所成就通力中除中有位知他三千界義可有耶答不可有此義也兩方若有此義者今論餘處二十七中述聲聞麟喩佛二三千無數二乘通力不知他三千界見二乘猶不知之異生豈可有此義哉若依之爾者光法師釋逝宮天處十方無之頌文云謂不但此三千大千世界中無餘十方世界中亦無文如今解釋者異生所成就通力中除中有位知他三千界之義可有見如何答異生所成就通力之中除中有位知他三千界之義不可有云事性相之所定也更不可疑之但於光法師解釋者異生通力雖實不知他三千界爲顯佛徳深廣十方世界無與佛等之者如此云也重難云婆沙論中出一師義云有餘復言梵王先起自地天眼傍見餘界大梵天王梵輔梵衆恭敬圍遶文此師意無諍異生所成就通力之中除中有位知他三千界之義可有見如何答常義云彼劫初時故異常義相也例如彼論次下文述劫初成時彼亦有退云劫初之時色界有退也聊迴愚推云大梵王唯以一小千界爲所領分齊如云千世界有一梵王梵王通爲千世界主也若爾婆沙論傍見餘界大梵天王梵輔梵衆恭敬圍遶之文可指一大千界之中餘世界何以此文劫初大梵王天眼見他三千界得意哉疑難之旨頗難定量哉問光法師釋此刹那善蘊總立以施名頌文作二解釋爾者第二釋意今此刹那者指一刹那歟答可指一刹那也兩方若指一刹那者論中引今頌文爲證能發思爲施體之義也若刹那之言指一刹那者寧可爲此證據哉若依之爾者見光法師述初釋意云此言刹那非一刹那文第二釋異之定知刹那之言可指一刹那云事如何答光法師第二釋意任刹那之言一刹那得意也故第二釋云又解此頌據刹那等起故言此刹那善五蘊總立以施名文此釋意云身語二業能等起心心所法有因等起刹那等起二類之中今頌文據刹那等起故刹那善五蘊總立施名也爲言問已離欲聖者於欲界可造報定時不定業耶答可造報定時不定業也兩方若造之者論中出行施不爲益自他之類云若彼聖者已離欲貪奉施制多除順現受文已離欲聖者若於欲界造報定時不定業者何不云除報定時不定業哉若依之爾者光法師餘處解釋中已離欲聖者於欲界可造報定時不定業見如何答已離欲聖者於欲界可造報定時不定業也彼業即於現身必感其果也是以今論餘處十五中出業定受現法果之類云或生此地永離此地染於此地中諸善不善業於異熟定位不定者此業必能招現法果文光法師釋此文云謂阿羅漢及不還果隨生此地永離此地染於此地中隨其所應未離染時造善不善業及離染已造諸善業於異熟定時不定者由永離染故於此地中不重生故此業必能招現法果皆於此身受故名現法果文正理論四十云或有餘業亦得現果謂生此地永離此地染於此地中諸善不善業必應現受不重生故如阿羅漢及不還者未離染時已造彼業今離染故成現法受彼是何業謂異熟定應知此中所説業者是異熟定非時定業文顯宗論文全同此説任此等定判已離欲聖者於欲界造報定時不定業云事實分明也但於今論文者已離欲聖者於欲界造報定時不定業即於現身必感其果故除順現受之言中可攝之也如云及定招異熟得永離地業定招現法果也問不還果聖者於欲界受時報倶不定業異熟果義可有耶答不可有此義也兩方若有此義者論中出行施不爲益自他之類云若彼聖者已離欲貪奉施制多除順現受文不還果聖者若於欲界受時報倶不定業異熟果之義有之者何不云除時報倶不定業哉若依之爾者婆沙論中上述不受順現法受業異熟而受順次生受業及順後次受業異熟耶等問答分別畢下云唯阿羅漢有勝定惠熏修身故有如是能有學異生無如是事文思此文意阿羅漢果聖者依勝定惠熏修之力不受彼異熟果者可時報倶不定業異熟果也而云有學異生無如是事知不還果聖者於欲界受時報倶不定業異熟果之義可有云事如何答不還果聖者永超欲界異熟果地畢時報倶不定業不感其異熟果正無障礙故不還果聖者於欲界永不受時報倶不定業異熟果也故今論餘處十五中上述於永離染地異熟定位不定業必招現法果之旨畢下云若於異熟亦不定者永離染故不受異熟文光法師釋此文云若於時不定於異熟亦不定者由永離染故必不受異熟文任此等文理不還果聖者於欲界永不受時報倶不定業異熟果云事實分明也但於婆沙論文者阿羅漢果聖者有勝定惠熏修之力故時報倶不定業異熟果轉之永不受報定時不定業異熟果引之現身受有學異生無此自在轉之不受引之寄受之義故云有學異生無如是事也非謂不還果聖者於欲界受時報倶不定業異熟果全非相違也問論中明戒類福業事云一者不爲犯戒所壞犯戒謂前諸不善色文爾者性罪遮罪倶可名犯戒耶答此文意唯以性罪可名犯戒也兩方若唯以性罪名犯戒者犯戒所壞之言是廣何不亙性罪遮罪哉是以論中云離性及遮倶説名戒文若爾犯戒亦可亙性罪遮罪也若依之爾者見論次上文云諸不善色名爲犯戒此中性罪立犯戒名文指此文云犯戒謂前諸不善色唯以性罪可名犯戒見如何答一者不爲犯戒所壞犯戒謂前諸不善色之論文唯以性罪可名犯戒也受戒之後故犯遮罪亦雖名犯戒今一段文意爲簡異性罪故遮罪但名遮罪不名犯戒也故論中具釋此事云諸不善色名爲犯戒此中性罪立犯戒名遮謂所遮非時食等雖非性罪而佛爲護法及有情別意遮止受戒者犯名犯戒簡性罪故但立遮名文頌文云離犯戒及遮唯以性罪名犯戒以遮罪別擧之不名犯戒即此意也故寶法師釋云性罪遮罪倶名犯戒然頌於性罪立犯戒名遮罪名遮不名犯戒文但於離性及遮倶説名戒之論文者於遮罪自本許受戒者犯亦名犯戒之義邊故離性及遮倶説名戒之論文全非相違也重意云於戒者雖有性戒遮戒之不同同戒類故只立戒名不及分別性遮差異於罪者性罪根本其過尤重故受戒者犯非受戒者犯同名犯戒遮戒枝葉其過稍輕故雖受戒者犯亦名犯戒非受戒者犯但名遮罪不名犯戒故爲顯性罪遮之不同唯於性罪立犯戒名於遮罪者不名犯戒云許也就實通論本末合説之時亦有遮罪兼名犯戒之義門故一段論文更無違害也問光法師意於梵輔天受四十一中劫壽類可有耶答可有此類也兩方若有此類者光法師解釋中釋梵福量云一梵福量同梵輔天四十中劫爲一劫量名一福量文如今解釋者不可有此類見若依之爾者光法師餘處五解釋中可有此義見如何答光法師意於梵輔天受四十一中劫壽之類可有也其故光法師餘處五釋欲界有情入無想定滅盡定名一起便住之義云又解二定不損壽命是故別説如人應受百年命根至年五十入彼二定設經千年方始出定不食段食還更受餘五十年命餘即損命故不別説文准此釋意思之於梵輔天入滅盡定經一中劫之類可受四十一中劫壽也但於光法師今解釋者就梵輔天本壽量云四十中劫也不足爲疑歟問舍利弗目連於佛可爲法供養耶答不爲法供養也兩方若爲法供養者婆沙論中出利弗目連於獨覺不爲法供養見佛例可同哉若依之爾者婆沙論中弟子於師爲法供養見若弟子於師爲法供養者舍利弗目連於佛何不爲法供養哉加之婆沙論中述法供養相云或在衆中論議決擇文若爾舍利弗目連於佛前豈不爲論議決擇哉答佛於諸法已得究竟不復從他受學法故一切有情於佛不爲法供養也故婆沙論三十云佛於一切有情能設財法二供養彼隨所應能受一切有情於佛隨應能設財供養非法供養無能爲佛説者故及不能生佛未曾有善巧覺惠故文又云然佛世尊定不於他受法供養法身功徳極圓滿故生身必待衣食等資故有於他受財供養文任此等論文舍利弗目連於佛不爲法供養云事道理實炳然也故婆沙論中正釋此事云舍利子除佛獨覺於一切有情能設財法二供養彼隨所應能受一切有情於舍利子隨應能設財供養非法供養大目乾連除佛獨覺及舍利子於一切有情能設財法二供養彼隨所應能受一切有情於大目乾連隨應能設財供養非法供養文但於婆沙論中弟子於師爲法供養見云難者福徳多聞智惠明利之弟子與師説法令師生未曾有善巧覺惠故弟子於師爲法供養云也故婆沙論云如出家者或有弟子福徳多聞雖於其師能設種種財法供養而恃此事遂於師所不生恭敬此等供養則妨恭敬文此文不云佛弟子於佛爲法供養何爲相違哉次於婆沙論或在衆中論議決擇之文者是於衆中論議決擇令他生未曾有善巧覺惠故於衆中論議決擇云法供養也於佛前雖論議決擇全無令佛生未曾有善巧覺惠之義故望佛不可名法供養也寫本云建長六年九月八日酉時於東大寺尊勝院中堂東廊抄之畢倶舍論十八卷者爲去年倶舍三十講之宛文之間依有其便宜披見彼論疏之次或訪明師或任愚按爲開初心初學之慧解聊記一問一答之綱要後學之輩必其謬不顧五旬有餘之慕齡猶勵一部抄出之深志冥衆必垂哀愍善願速得圓滿焉仰願依此稽古之微功答此慇懃之誠心一期終焉之暮遂往生於兜率之秋雲三會下生之曉開慧解於龍華之春風而已右筆華嚴宗末葉法印權大僧都宗性年齡五十二夏﨟四十二
