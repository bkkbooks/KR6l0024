body:
  text: 倶舍論第七卷抄下問色界喜根等無間生欲界染汚捨倶心義可有歟答不可有此義也兩方若有此義者以道理思之難有此義哉若依之爾者婆沙論中雖述色界喜根等無間不生欲界染汚喜倶心未云不生染汚捨倶心哉答色界心等無間生欲界染汚心事唯限自色界沒還生欲界之位也而定死生唯捨受故色界喜根等無間生欲界染汚心之義全無之也故設雖染汚捨倶心更不可生之但於論文唯簡欲界染汚喜倶心云難者暫就喜根論之歟住喜根唯能引自地煩惱故之論文色界喜根等無間不生欲界染汚捨倶心云事亦分明也尋云婆沙論云此中有説色界喜根等無間生欲界善無記心欲界喜根等無間不生色界善無記心要欲界捨根等無間能生色界心等故文此文述別師義歟答云此事有二義先明一義意者可云別師義也前師意雖不遮色界喜根等無間生欲界善無記心且付染汚心爲論爲言後師意廣付三性心通論之也雖云別師強非相違之二義歟問正理論意前三解脱可通眞實作意歟答不可通眞實作意也兩方若通眞實作意者見正理論今文擧勝解作意之中出有色解脱知前三解脱不通眞實作意云事若依之爾者披餘卷定判尋前三解脱相正理論云觀未成滿但得名爲勝解作意後成滿時離染果故引聖道故亦得名爲眞實作意文顯宗論云縁少思多名假勝解引聖道故亦名眞實文任此等論文前三解脱可通眞實作意見如何答正理論意前三解脱唯可限勝解作意也故光法師釋今論三勝解作意謂不淨觀及四無量有色解脱勝處遍處如是等觀相應作意之文云解脱之中通其假實言有色解脱標前三解脱唯假相故無色解脱通於假實故言有色文而正理論云云何名爲勝解作意謂不淨觀及四無量有色解脱勝處遍處如是等觀相應作意標有色解脱全同今論文爰知正理論意前三解脱唯限勝解作意云事加之見正理論下卷八十文云此於所縁既如實轉如何説是勝解作意由勝解力此於境生故説此爲勝解作意即由此故得解脱名勝解解脱義相隣故或於少事由勝解力漸漸増益觀名勝解作意文此文亦前三解脱唯限勝解作意之旨分明也但於亦得名爲眞實作意之論文者前三解脱實雖限勝解作意依離染果故引聖道故之義亦可與眞實作意之稱云一義門也非云其體實通眞實作意歟顯宗論引聖道故亦名眞實之文會通同之問今論意持息念可通勝解作意耶進云光法師作二釋云持息念有二一假相謂加行二眞實謂根本此論據根本婆沙據加行各據一義竝不相違又解論意各別此論加行根本皆是眞實婆沙及此論餘師加行通假根本是實文付之二釋倶有疑先就初釋不可然見今論下文廣破餘師義成持息念眞實作意之旨何云加行通勝解作意哉次就第二釋亦不可然見婆沙論文勝解作意中擧持息念何云加行根本皆是眞實乎答當卷論文勝解作意中不擧持息念今論下文説持息念相偈頌云二得眞外無長行述唯與眞實作意相應正理論下文擧二説云此唯眞實作意相應有説亦通勝解作意文婆沙論文擧勝解作意中出持息念光法師會此相違處處作二釋當卷初釋餘卷第二釋其意同之當卷初釋如上抄之餘卷第二釋云又解前師唯據根本故唯眞實後師據加行故通勝解文但此釋意此論餘師云有餘師説息出極遠乃至風輪或吠嵐婆持息念根本亦唯勝解作意云故論主破之云此不應理此念眞實作意倶故也當卷第二釋餘卷初釋其意同之當卷第二釋如上抄之餘卷初釋云此論同正理前師雜心婆沙同正理後説此即意各別也文但此釋意此論餘師意根本唯雖眞實作意加行亦通勝解作意云故論主破之爲言故光法師釋此不應理此念眞實作意倶故之論文會論主破餘師此念眞實作意倶故非是假想何能遠至風輪等耶謂以此故知眞實爲正正理論云經主於此斥彼師言此念眞實作意倶起不應念息至風輪等彼言息念根本雖與眞實作意倶中間有餘勝解作意相應起者爲令眞實作意速成故於中間起斯假想雖爾無有出息念失以息念加行意樂不歇故倶舍師云此念加行亦眞實故諸論中言通假想皆非正義文文意顯也重難云就光法師當卷初釋餘卷第二釋猶不明正理論述此論餘師義云彼言息念根本雖與眞實作意倶文如此文者餘師意持息念根本唯眞實作意見何云餘師意根本亦唯勝解作意云故論主破之哉依之光法師釋今論能破之文云此念加行亦眞實故破餘師云加行通假是處見如何答當卷解釋依初釋意無述餘師所破尤以難思而依此釋意之時餘師意根本亦唯勝解作意云故論主破之可得意也不然者此論能破難成哉但於正理論文者餘師意雖存根本亦唯勝解作意正理論師寄自義替彼師救論主難故述根本眞實作意之旨歟次於光法師解釋者釋能破論文之時暫述論意各別之一義意歟尋云光法師二解釋中何釋爲正哉答既作二釋無判是非故正不難定也或義云此論加行根本皆是眞實云上四卷第二釋可爲正也餘卷釋能破論文云謂以此故知眞實爲正述倶舍師釋云此念加行亦眞實故諸論中言通假想皆非正義文此等解釋意此師加行根本皆是眞實云釋爲正見如何問婆沙論七十二評家意欲界善心與未至定初靜慮相生文如來所起欲界心品相生同之歟答可同之也兩方若同之者如來所起欲界心品勢力強盛也何唯與未至定初靜慮可相生哉是以婆沙論第百九十一云佛將入涅槃時第四靜慮無間欲界善心現在前云云明知如來所起欲界善心相生不限未至定初靜慮云事若依之爾者婆沙論述欲界善心與色界善心相生雖有四師之異説無分三乘之差異明知如來所起欲界心品相生亦同之云事如何答婆沙論評家意欲界善心與未至定初靜慮相生者如來所起欲界心品相生亦可同之也是以婆沙論第百六十五云問何故不能超入第四答過殑伽沙數諸佛世尊及聖弟子超入諸定法皆如是故不應問文以之思之如來所起心品相生更不替二乘也但於婆沙論佛將入涅槃時第四靜慮無間欲界善心現在前云文者彼述妙音異説非評家正義故不可及會通也重難云見婆沙論文第七十二卷雖述尊者妙音作如是説欲界善心無間有未至定或初靜慮或靜慮中間或第二靜慮現在前彼四無間欲界善心現在前第百九十一卷云尊者妙音説曰佛將入涅槃時第四靜慮無間欲界善心現在前如來所起欲界心品相生不限未至定初靜慮靜慮中間第二靜慮四地見以之思之評家意云應作是説欲界善心無間有未至定或初靜慮現在前彼二無間欲界善心現在前彼無間勢力唯能至此故唯就二乘論之也如來所起欲界心品相生不可限未至定初靜慮也答評家意欲界善心與未至定初靜慮相生者亘三乘同論之也但第七十二卷出妙音異説之時略未擧如來欲界第四靜慮相生歟以之評家意欲界善心與未至定初靜慮相生者唯就二乘論之不可云也問上地下地近分地心互可相生耶答互可相生也兩方若互相生者近分地心是微劣也上地下地互難相生哉是以婆沙論中出不入第二靜慮離第二靜慮染之依地唯擧未至定初靜慮靜慮中間三地若有上地下地近分地心互相生之義者第二靜慮近分地心無間生第三靜慮近分地心離第二靜慮染之義何無之哉若依之爾者婆沙論中上地近分地心無間生下地近分地心見若許此義者何無相生之義乎答上地下地近分地心互相生之義可有也是以婆沙論云有説佛將般涅槃時從第四靜慮起入第三靜慮近分從第三靜慮近分起入第二靜慮近分從第二靜慮近分起入初靜慮近分從初靜慮近分起欲界善心現在前欲界善心無間欲界無覆無記心現在前即住此心而般涅槃文此文雖述如來事心品相生三乘不可替故二乘等上地近分地心無間生下地近分地心之義可有也若許此義者下地近分地心無間生上地近分地心事亦必然也何況見婆沙論文一師意第二靜慮以上近分地心無間次上地根本地心現前之義許之難起根本地心猶起之易起分地心何不起之哉爰知下地近分地心起次上地根本地心事難故雖有起不起之異説下地近分地心生次上地近分地心事易故不可及異説事也但於婆沙論文者雖有第二靜慮近分地心無間生第三靜慮近分地心之義彼第二靜慮根本地心現前之後可生之也不起第二靜慮根本地心之前第二靜慮近分地心無間不生第三靜慮近分地故不入第二靜慮之人離第二靜慮染之依地不擧第三靜慮近分地也一段廢立深可思之問依二禪已上入見道人聖道無間起共相作意義可有乎答不可有此義也兩方若有此義者今論中難共入共出之師義云非於彼地已有曾得共相作意異於曾得順決擇分今文無諍不許此義見若依之爾者異生位廣可起四善根之外餘順決擇分善根若爾今此人聖道無間何不起彼曾得順決擇分所攝共相作意哉是以依未至等三地入見道人聖道無間起共相作意之義可有見如何答依二禪以上入見道人聖道無間起其相作意之義不可有也是以今論難共入共出之師義云若依第二第三第四靜慮證入正性離生聖道無間起何作意非起欲界共相作意以極遠故非於彼地已有曾得共相作意異於曾得順決擇分非諸聖者順決擇分可復現前非得果已可重發生加行道故文正理論説其意同之光法師釋此文云若依第二第三第四遠故非能起欲共相如是共相作意若是定地即是決擇分收得聖果已無容起彼決擇分善若非定地欲界所收依二定等既不能起欲界共相理即起餘二種作意雖於彼地過去曾修共相作意殊勝善根經生捨故今生起者決擇分收文任此等定判依二禪已上入見道人聖道無間不起共相作意云事尤分明也但於異生位廣起四善根之外餘順決擇分善根云難者異生位雖起四善根之外餘順決擇分善根非聖道加行之類皆非共相作意作共相觀門之善又是聖道加行入聖道已後重不起之故更非相違也次於未至等三地之例難者彼聖道無間起欲界共相作意故亦無其疑也論疏之釋其旨分明哉一義云依二禪已上入見道人聖道無間生共相作意之義可有也以何知之者婆沙論云初靜慮沒生第二靜慮第二靜慮沒生初靜慮者於初靜慮順勝進分順決擇分往沒時捨還生時不得云云取意是既依身初靜慮人所起順決擇分善根故可非聖道加行是亦順決擇分善根故可通共相作意也第二靜慮等其義同之也若爾依身於第二靜慮已上起非聖道加行順決擇分善根之人還生欲界入見道之後聖道出心何不起彼非聖道加行曾得順決擇分所攝共相作意哉但於今論文者一師義必定共入共出故若於二禪已上不起非聖道加行順決擇分善根之人聖道出心可無難也重意云一師意必定共入共出故暫就不起共相作意之一類致此難也依二禪已上入見道人之中聖道無間起共相作意之類自有之事更非所遮也問聖道出心唯限曾得善根歟答泛云之可通曾得未曾得也兩方若限曾得者聖道出心是廣何不通未曾得哉是以見餘卷論文云勝進九十隨應現修未來隨應修九修十無學第二念後諸勝進道起世俗智之時可有未來修見知聖道出心不限曾得善根云事若依之爾者披當卷論疏定判聖道出心唯可限曾得善根見如何答若就初入聖道出心云之起易起之善根故唯可限曾得善根也故論文難共入共出之師義云非於彼地已有曾得共相意異於曾得順決擇分文寶法師釋云夫出聖道於曾得心出不於未曾得心出也於欲界有曾得共相作意可從彼出於色界中無異四善別有曾得共相作意出聖道也此等定判就初入聖道出心論之故唯可曾得善根之旨釋成也若就修道無學道出心云之其位容預故可通未曾得善根也故第二十六卷論疏之文還爲此義之潤色也存此通局之時諸文更非相違也問正理論中明聖道入出作意擧三入三出共入三出共入共出三師義爾者共入三出第二師義爲正歟答三入三出云初師義可爲正也若就見道云之共入三出云第二師義亦可爲正也兩方若第二師義爲正者初師義既當婆沙論評家義以彼義尤可爲正也是以見正理論所説未見第二師義爲正之文哉若依之爾者寶法師釋云正理論中取第二者出見道心故文如解釋者正理論意共入三出云第二師義爲正見如何答婆沙論中述評家義云謂三種無間聖道現在前聖道無間三種現在前文三入三出云初師義既當婆沙論評家義倶舍正理同以此義可爲正也故光法師釋云此論三説初師爲正當婆沙十一評家義故第二師義據見道共入三出亦可爲正然於修道無學道中唯言共入三出故亦非善然此論文但破第三師唯共相出文但於寶法師解釋者據見道云之共入三出之義亦可爲正云也故彼疏釋云婆沙十一評家評取初師義者通説一切聖道若取初入亦唯共相正理論中取第二者出見道心故文文意顯也重難云故云正理論中取第二者其意猶難思乎答正理論中付共入三出之師義會不淨觀倶行修念等覺分之經文云由不淨觀調伏心已方能引生共相作意從此無間聖道現前依此展轉密意而説故無有過文既云故無有過故正理論中取第二説云歟問異生所起順決擇分善根唯可限煖等四善根乎答不可限煖等四善根也兩方若不限煖等四善根者順決擇分之稱專名順聖道尤可限煖等四善根哉是以今論難共入共出之師義云非於彼地已有曾得共相作意異於曾得順決擇分文光法師釋此文云雖於彼地過去曾修共相作意殊勝善根經生捨故今生起者決擇分收文任此等定判異生所起順決擇分善根唯可限煖等四善根見若依之爾者異生所起順決擇分善根種類可非一准何唯限煖等四善根哉是以廣披論疏定判不可限煖等四善根見如何答異生所起順決擇分善根種類實可廣何唯限煖等四善根哉是以婆沙論云初靜慮沒生第二靜慮第二靜慮沒生初靜慮者於初靜慮順勝進分順決擇分往沒時捨還生時不得云云取意依身於色界所成順決擇分善根者非煖等四善根云事是炳然也加之光法師餘處解釋云今准此論及正理論唯煖等四順決擇分名殊勝善根命終捨餘順決擇分非是殊勝命終不捨文異生所起順決擇分善根不限慮等四善根云事今此定判亦分明也但於當卷論疏之文者異生慮等四善根之前雖起餘順決擇分善根入聖依身唯從煖善根起之不起餘順決擇分善根故就今生所成就順決擇分善根今文煖等四善根之外無餘曾得順決擇分善根云事故光法師問答此事云問於彼地中何不能成煖前諸位共相作意解云今生入聖此身唯起煖等入聖不起前位共相作意設有起者加行攝故亦不能起文問共相作意唯限順決擇分善根歟答隨共相作意之觀門可有通局二義邊也兩方若不限順決擇分善根者共相作意專順聖道之加行相也尤可限順決擇分善根哉是以今論難共入共出之師義云非於彼地已有曾得共相作意異於曾得順決擇分文此釋無諍共相作意唯可限順決擇分善根見若依之爾者婆沙論云問若初靜慮沒生第二靜慮第二靜慮沒生初靜慮彼得初靜慮非我行相不答若先善根習者得不爾者不得生餘地亦爾文此文既云第二靜慮沒生初靜慮之時得總縁非我行相而還生時不得順勝進分順決擇分者亦出婆沙論所説依此等論文思之共相作意不限順決擇分善根云事亦分明也如何答約共相作意其類非一若約十六行相云之唯可限順決擇分善根也其故十六行相是順聖道之觀門輒不作之故唯限順決擇分善根不通餘三分定也是以婆沙論述四分定相唯約順決擇分云此分或作聖行相或作餘行相而向聖通趣於解脱約餘三分定作聖行相不云也當卷論疏之釋述唯順決擇分作共相作意之旨亦此意也若約總縁非我行相等云之可通順住分也然而聖道無間不起順住分故當卷論疏之文不論彼總縁非我行相等相也重見今論定判云若謂有別共相作意順決擇分倶時已修由繁屬彼是彼類故如觀諸行皆是非常觀一切法皆是非我涅槃寂靜聖道無間引彼現前如觀一切法皆是非我故云別共相作意故次上文云非於彼地有曾得共相作意異於曾得順決擇分就十六行相作意論之云事自分明也尋云總縁非我行相不可限順住分廣可通順勝進分順決擇分若許爾者亦可爲聖道出心今文何云無曾得共相作意可爲聖道出心之類哉答尋云光法師云煖前諸位共相作意者十六行相共相作意歟爲當總縁共相作意歟若如前者總相念住位云彼居法念位總觀四所縁修非常及苦空非我行相故云煖前諸位共相作意可指彼總縁共相作意哉若如後者任餘處正理論所説光法師解釋總相念住前加行位聞思二慧作十六行相見若爾煖善根已前諸位中修慧作十六行相之類何無之哉問依初靜慮證阿羅漢果人出觀心可通欲界乎進云今論云後出觀心唯自非餘地不通欲界心見付之依初靜慮證阿羅漢果之人於定不自在之類出觀心何不通欲界哉是以依未至定證阿羅漢果之人出觀心通欲界見可同如何答今論云若依未至定得阿羅漢果後出觀心或即彼地或是欲界依無所有處得阿羅漢果後出觀心或即彼地或是有頂若依餘地得阿羅漢果後出觀心唯自非餘地文婆沙論云若依未至定得阿羅漢果彼或以欲界心出聖道或以未至定心出聖道若依無所有處得阿羅漢果彼或以無處有處心出聖道或以非想非非想處心出聖道若依餘地得阿羅漢果彼唯以自地心出聖道文倶舍婆沙二論所説無諍依初靜慮證阿羅漢果之人出觀心唯可限自地見但於定不得自在之人出觀心可通欲界云難者依初靜慮證阿羅漢果之人出觀心起初靜慮甚易起欲界心還可難故設定不得自在之人初靜慮心出不欲界心出也不如未至地欲界總相隣近故依彼地證阿羅漢果之人定不得自在之類欲界心出也或又依初靜慮證阿羅漢果之人皆定得自在故出觀心唯限自地不通餘地也故光法師釋云若依中間餘地得阿羅漢果後出觀心唯起自地非餘地心皆於彼地得自在故所以即彼地心出無異地心出文文意顯也重難云光法師釋云問若依第二定等得阿羅漢果後出觀心何故不或即彼地或起下地解云若欲界散心是強衆生無始多生其中數數串習起時即易有依未至定不得自在者容起欲界觀散心上二界定及與散心有情無始不多生彼初無學後異地相生起時即難當地即易故依二定等得無學果後出觀心唯依自地不依下地定及散心文今此解釋越問第二定等不問初定知依初靜慮證阿羅漢果之人出觀心通欲界之類可有云事如何答依初靜慮證阿羅漢果之人出觀心雖唯限自地依未至定證阿羅漢果之人出觀心通欲界之類有之故初靜慮中以有此濫故暫置不及問答之依第二靜慮乃至識無邊處證阿羅漢果之人出觀心無其濫唯限自地故不問初靜慮越付第二靜慮等問之歟問婆沙論意聞惠無間生無漏道義可有乎答可有此義也兩方若有此義者見婆沙論文云欲界唯思所成無間聖道現在前乃至色界唯修所成無間聖道現在前文此文無諍聞惠無間不生無漏道見加之光法師餘處解釋中引正理婆沙文雖述思無間起煖善根之旨未云聞慧無間生煖善根若聞慧無間不生煖善根者爭又可生勝品無漏道哉若依之爾者倶舍論文云此中五種作意無間聖道現在除生所得聞慧無間可生無漏道見婆沙論意可同如何答光法師會倶舍婆沙二論相違云婆沙據鈍根者説此論等通約利根者説又解婆沙約初修次第起者説此論等通約純熟位説故不相違文任今此解釋婆沙論意依利根者約純熟位云之聞慧無間生無漏道之義可有也但於唯思所成無間聖道現在前之文者據鈍根者約初修次第起者説故更非相違也次於聞慧無間不生煖善根云例難者彼亦初入煖善根事極難故勝品思慧無間可入煖善根故不云聞慧無間起煖善根也純熟位聞慧無間起事更非所遮也重難云四分定中唯順決擇分無間生無漏住分定等無間不生無漏見而聞慧望彼住分定等勝劣遥異也何可生無漏哉答就總品類見之住分定等勝聞慧劣事是必然也但彼不云其品類劣不生無漏四分定之廢立自本就有漏修慧分之生無漏名順決擇分順上地名順勝進分順自地名順住分順下地名進分故順住分等無間不生無漏云也聞慧是雖散善其中亦有生無漏之類有何所遮哉問上地染汚心無間生下地無覆無記心義可有乎答可有此義也兩方若有此義者論疏中述諸心相生未云有此義乎若依之爾者婆沙正理兩論中可有此義見如何答生二禪已上未離自地煩惱之人彼染汚心無間借起初禪三識身故上地染汚心無間生下地無覆無記心之義可有也故正理論二十云若生第二靜慮以上起初靜慮三識身時諸有未離自地染者彼從自地善染無記作意無間三識現前三識無間還生自地三種作意諸有已離自地染者除染作意唯善無記作意無間三識現前三識無間亦唯起此二種作意文婆沙論十一云問若生第二第三第四靜慮起初靜慮諸識身時幾心無間入幾心出耶答隨所生地若未離染者三種心無間彼諸識身現在前後諸識身無間三種心現在前謂善染汚無覆無記若已離染者二種心無間彼諸識身現在前彼諸識身無間二種心現在前謂除染汚文上地染汚心無間生下地無覆無記心之旨正理幷婆沙兩論所説實以分明哉但於論疏中述諸心相生未明此義云難者論中云色界有覆無記無間生九自界五心除通果心文故色界有覆無記心無間生自界威儀心云事分明也何云諸心相生未明此義乎問論中釋欲界染汚心現前位得善心云由疑續善及界退還文寶法師意得至現在名得歟答寶法師意欲界染汚心現前位善得至現在名得也進云寶法師釋云欲界善心得已至生相名之爲得文付之十二心得心多少者約現在得論之何云生相得哉是以光法師釋云先不成就今得成就説名爲得文寶法師解釋難思如何答凡十二心得心多少者約現在得論之也若就生相得論之者色界善心現前位得學心有學心現前位得無學心可云也何云色界善三學四乎是以光法師釋云此中意説於十二心中先不成就今得成就説名爲得文寶法師釋云此言得者謂先不成今得成文圓暉法師釋云此言得者今時成就名爲得也文十二心得心多少就現在得論之云事此等解釋亦分明也就中界退還位得欲界善心者生得善得至現在名得事是必然也准之思之一具文所説列疑心續善者疑心現前位生得善得至現在名得之旨自所顯也但於寶法師解釋者實思難者然而暫存一義者法體倶時得至生相云也法前得至生相位也重意云寶法師釋由疑續善及界退還之論文作欲界善心得已至生相名之爲得之釋與界退還位得欲界善心者就現在得論之必定者約疑心續善位獨付生相得論之哉爰知今解釋亘疑心讀善幷界退還兩位就與所得法體倶時得論之云事重難云寶法師解釋無諍就法前得論之見何論與所得法倶時得起位哉爰知疑心續善位善得在生相云事何況光法師餘處釋若異類心所起得等云何成善此義應思之論文云如疑心續善於染心後能引善得及四相起文既云於染心後能引善得知疑心現在前位善得不至現在云事答疑心現前位善得不至現在者既無續善之義何名疑心續善哉疑心之後正見現前位善得至現在者與正見續善有何差異哉以之思之寶法師解釋設雖難遁只任前重之趣可會通之也但於光法師於善心後能引善得之釋者述若異類心所起得等之難意疑心續善之後所起善得及四相依疑心起故云何成善爲言云爾故全非云無同時善得也一義云於疑心續善有二位疑無之時善得至生相疑有之時善得至現在也寶法師今解釋付疑無之位述欲界善得已至生相云義有之一義云寶法師意就十二心得心多少唯於疑心續善位約生相得論之餘位皆就現在得論之云義有之就此等異義可有重重之難答別紙抄之可見之問他地心無間退煩惱義可有乎答不可有此義也兩方若無此義者煩惱之退縁分千品心品之現起非一准何無他地心無間退煩惱之義乎是以見婆沙論説出色界意根等無間生欲界五部心云如續生或退等時文如論文者他地心無間可退煩惱見若依之爾者光法師所引婆沙論中唯自地心無間可退煩惱見如何答他地心無間不退起煩惱者性相之所定也故光法師引婆沙論第六十一云何等心無間起煩惱現在前者若畢竟離非想非非想處染起彼地纒現前故退者即彼地善心無間起煩惱現在前若未畢竟離非想非非想處染起彼地纒現在前故退者即彼地或善心或染汚心無間起煩惱現在前乃至初靜慮應知亦爾若畢竟離欲界染起欲界纒故退者即欲界或善心或無覆無記心無間起煩惱現在前若未畢竟離欲界染起欲界纒故退者即欲界或善心或染汚心或無覆無記心無間起煩惱現在前文唯自地心無間退起煩惱云事此文實分明也但於如續生或退等時之文者尤以難思會此事雖有多義暫存一義意者未離色界染色界意根等無間具生欲界五部心續生時擧退時事欲退欲界時先起欲界修斷心故生修所斷一部心事也無等無間生色界五部心之類擧續生退等之二時准之可思之重難云既出色界意根等無間縁生欲界五部心之類云或退等時何云擧生修所斷一部心之類乎若如此義者可擧通果心也而未離色界染色界意根等無間生欲界五部心之類云或退等時擧退時無擧通果心已離色界染色界意根等無間生欲界修所斷一部心之類云謂欲界修所斷心即通果心等擧通果心無擧退時知退時實生五部心云事答未離色界染色界意根等無間生欲界五部心之類中擧續生時實可生五部心出退時事欲界擧盡生欲界心之種類故生修所斷一部心之位擧流也但於可擧通果云斷者或退等時之等言即可等通果心也已離色界染色界意根等無間生欲界修所斷心之類云通果心等可等退時也若如此得意之時前後之文全非相違矣問今論意明心多少付決定可得心論之歟答付決定可得心論之也兩方若付決定可得心論之者頌文述色善三學四色界善心及有學心現前位得欲界無覆無記心文而於欲界威儀工巧若有三世得不可得之若無三世得可得之故非決定可得心云事炳然哉若依之爾者欲界染汚心現前位不得欲界無覆無記心事不定也若爾者依決定可得心可論之見如何答今論意明得心多少就決定可得心論之也其故光法師解釋云此論據不心串習者説或從多分説故言不成就欲界無覆今論意雖存威儀工巧心串習之類有三世得之旨後廢立偏付不串習之一類論得心多少見付其不串習之一類見之色善三學四之理都無不定之義故就決定可得心論之云事必然也重意云若合威儀工巧心串習不串習之二類論得心多少者色善三學四之義實可不定而今唯就不串習之一類明得心多少故色善三學四之義全無不定之事云事問以無漏道欲斷第四靜慮煩惱加行道位得修無色界善心義可有乎答不可有此義也兩方若有此義者九無間道前八解脱道位猶難得修無色界善心加行道位何可有得修之義乎若依之爾者婆沙論第百六十中謂諸聖者以世俗道離第四靜慮染若空無邊處近分爲加行文若空無邊處近分有第四靜慮能治加行道者今此位何無得修無色界善心之義乎答光法師今解釋中上表若以聖道離色界染得無色界善心了下自問何時得彼無色界善心答之作二解釋初釋意云若以聖道離第四定染第九解脱道時得無色界善心第二釋意云若以聖道離第四定染初無間道時即得無色空處近分善心雖作云第九解脱道時云初無間道時之二釋不云加行道位得無色界善心知加行道位無此義云事加之見婆沙論第百六十文或云謂無漏道離第四靜慮染九無間九解脱道時彼心與未來所修無色界道諸得倶起不云彼加行道位無色界道諸得倶起或云若依未至定乃至第四靜慮離下三無色染者除加行道依色界六地無漏離下三無色染之人無色界道諸得倶起位除加行道明知無漏加行道位不得修上地近分善心云事但於空處近分可有第四靜慮能治加行道云難者空處近分雖有欲斷第四靜慮煩惱加行道有漏法繋地堅牢未離下地染之時輒不修之故無漏加行道位不得修上地近分有漏道也問正理論意以無漏道離上七地染九無間前八解脱道位可修上邊有漏道乎答可有修不修二義也兩方若不修之者上地近分地既有同治有漏道何不修上哉是以見正理論今文釋學心現前位得無色界善心云若以聖道離色界染得無色善此中離言非究竟離以於色染未全離時無色善心已可得故文如此文者九無間前入解脱道位可修上邊有漏道見若依之爾者撿正理論餘處七十四文云雖下聖道斷煩惱時諸上地邊有能同治然由有漏繋地堅牢未離下時未能修彼文此文無諍九無間前八解脱道位不修上邊有漏道見如何答見顯宗論處處之文第三十二卷作二解云以無漏道離上七地前八品時不修上邊世俗道故唯有無漏一離繋得離第九品方可具二或應許得離繋道而修或應斷染時許依下修上文第三十六卷擧二説云雖下聖道斷煩惱時諸上地邊有能同治然由有漏繋地堅牢未離下染未能修彼有説亦修彼起彼斷得故文委論之有三解大云之出二説也以顯宗思正理應可有此二意當處論文當顯宗後説餘卷論文當顯宗前説也當處餘處正理之文各述一義何爲相違哉重難云先法師餘處會正理論第七十四卷文云正理論説自是彼計非所許故無勞會釋文如此釋者正理論意偏可存離第九品方可具二之一義意見今何云以於色界染未全離時無色善心已可得故哉答顯宗論既作三解故正理論同可有三意云事是必然也但於正理論説自是彼計之釋者第七十四卷文唯述一義故暫就之如此云也尋云正理論今文云有説全離色界染時得無色界根本地善文此有説意當離第九品方可具二之義歟答離第九品方可具二者以無漏道離第九品染解脱道位修上地近分能治道云也此有説意就得根本地善心位論之故異離第九品方可具二之義故即爲破之義也故正理論自破此義云若爾應説亦得學心離欲染時亦得色善是則應説學心得五文尋云顯宗論已有三解光法師今何云顯宗亦有兩解哉答云三解云兩説開合不同強非相違也況彼論第三十六卷擧二説故今云顯宗亦有兩解可指彼文也是以光法師餘處解釋中指彼文云顯宗亦有兩説也問今論意色界無覆無記心現在前時可有自可得義乎進云論文云餘皆自可得可有此義見付之得色界善染汚心之時先得色界無覆無記心故彼體現在前位更無自新得之義何云自可得之類哉是以正理論難今論云色無覆心正現前位都無所得前已得故不應説言皆自可得文如何答今論意色界無覆無記心現在前位實雖無自新得之義無兼得他之義故自可得之類中攝之云餘皆自可得也重意云今論意不顧自新得義之有無只以無兼得他之義總云自可得也正理論意如疑難之趣無自新得之義故難色無覆心正現前位都無所得前已得故不應説言皆自可得也故元瑜疏釋正理論今文云此即論主彈經主過頌中説餘皆自可得既有皆言即一切得既非一切故知言失文既云言失明知二論旨趣實無相違也問顯宗論意欲界無覆無記心可有自可得義乎答不可有此義也兩方若無此義者正理論中欲界無覆無記心可有自可得之義見若依之爾者光法師引顯宗論云二謂欲色無覆無記此二心中都無所得如何答見顯宗論文偈頌云三界染如次得七六二種長行述界退還時得自界四自上界沒還生欲界之時先得欲界無覆無記心故欲界無覆無記心現前位無自新得之義無自可得之義云也故彼論中偈頌云二無餘自得長行述二謂欲心無覆無記此二心中都無所得欲色界無覆無記心無自可得之義云也但於正理論所説者欲界無覆無記心自可得有無依威儀工巧心串習不串習之義故暫如倶舍論置之色界無覆無記心無自可得之義事必然故先擧之歟尋云倶舍論云餘皆自可得顯宗論云二無餘自得其意遥異寶法師何判此亦大意同倶舍然別標二無記爲異哉次光法師釋云正理二十雖不改頌長行意同識身文若爾正理長行中何不述欲界無覆無記心非自可得之旨乎答倶舍論顯無兼得他之義故云餘皆自可得顯宗論正理論論得心有無故云二無餘自得云然別標二無記爲異也然而倶舍論意不云色界無覆無記心實有自可得之義故云此亦大意同倶舍也問光法師解釋中付明得心多少且正理論意同識身足論事如何釋之乎進云光法師釋云正理二十雖不改頌長行意同識身文付之見正理論長行之文未見同識身足論之文何云長行意同識身哉答見春日幷醍醐移渡正理論文偈頌如倶舍論雖述三界染心中得六六二種色善三學四餘皆自可得至長行述欲界染心現前位得六心了云理亦應言得自無覆以本論説成不善心欲無覆心定成就故文述色界善心現前位得三心了云理實不得欲無覆心以於先時定成就故文述有學心現前位得四心了云理亦不得欲無覆心義如先辨文此等長行之文自上界沒還生欲界之時得欲界無覆無記心云故正理論意可同識身足論見故光法師依今本釋正理二十雖不改頌長行意同識身專順正理論文也問今論意欲界威儀工巧心不串習類可有三世得乎進云光法師釋若非串習殊勝者即不成就無三世得云也付之威儀工巧心是勢力強盛心加行所生法也設雖不串習之類何無三世得哉是以見識身足論文或問若成就不善心亦成就欲界繋無覆無記心耶答若成就不善心定成就欲界繋無覆無記心或成就不善心時定成就心有四心之中可取欲界無覆無記心見如此等論文者不論串習不串習皆可有三世得見若今論意不串習之類無三世得云者豈不違本論完成就之説乎答光法師今解釋中會此相違作三解釋初釋云論意各別無勞會釋豈以本文破我倶舍論主非以本論爲量文第二釋云彼此二論亦不相違多有情中威儀工巧有串習者有不串習者識身等論據串習勝者説故言定成欲界無覆此論據不串習者説或從多分説故言不成就欲界無覆各據一邊竝不違害文第三釋云二論亦不相違一一有情各有衆多威儀工巧於衆多中若串習者即成就故不串習者不成就識身足論文據串習者故言定成欲界無覆此論據不串習者故言不成欲界無覆文准今此三解釋可會其相違也重難云光法師三解釋倶有疑先就初釋不可然識身足論是有宗根本之論藏也設雖今論意輒不可違彼論説哉何況光法師今解釋中述顯宗正理意同識身足之旨而顯宗正理兩論意威儀工巧心不串習之類無三世得見若爾識身足論意不串習之類不可有三世得何云論意各別乎答初釋意倶舍論意以理爲宗故不如依用本論所説云也豈以本文破我倶舍論主非以本論爲量之釋即此意也但光法師顯宗正理意同識身云事彼論意唯就串習之一類論得心多少故以此義邊分同識身故顯宗正理意同識身云也非云識身足論意威儀工巧心不串習之類無三世得也次就第二釋不可然若識身足論意不串習之類無三世得云者豈可云定成就乎答唯就串習之一類論之故云定成就無其失也次就第三釋不可然不串習之人界退還位得欲界無覆無記心者何云色善三學四哉答就人云之實雖不串習之人界退還位得欲界無覆無記心就其威儀工巧心體見之不串習心體色界善心幷有學心現前位有先不成就今得成就之義故云色善三學四全無其過也尋云光法師第四卷疏中何唯作二釋不作三釋乎答見第四卷釋問難意云若威儀路工巧處不串習者無前後得者何識身足論云成就欲界善心不善心定成就欲界無覆無記心哉問若付心體論串習不串習者豈可違定成就之説哉故知就人體設問之旨分明也隨問設答故彼處不作就心體論串習不串習今第三釋也問光法師釋欲界威儀工巧心三世得有無倶舍識身相對作三解釋爾者論意各別釋意識身足論意欲界一切威儀工巧心皆可有三世得乎答皆可有三世得也兩方若皆有三世得者披餘處正理論文約威儀工巧心分串習不串習之二類論三世得有無見而光法師今解釋云正理論同識身文知識身足論意不串習之類無三世得云事若依之爾者思論意各別之釋意識身足論意欲界一切威儀工巧心皆有三世得可云也如何答光法師今釋述論意各別之釋意云若識身足論意以威儀工巧雖是無記勢力強故定成三世文既云勢力強故知欲界一切威儀工巧心皆可有三世得也是以元瑜疏云識身文一切威儀及工巧處心皆有三世得故生欲界此心定成文此釋亦彼論意欲界一切威儀工巧心悉有三世得見何況論意各別之釋意述此論意云若此論等意威儀如佛世尊馬勝苾芻及餘善習者工巧如毘濕傳羯磨天及餘善習者即定成就若非串習殊勝者即不成就文若識身足論意不串習之類無三世得云者何可有論意各別之義哉加之見餘處解釋問中述不串習者無三世得可違識身足論之旨答之云論意各別難爲會釋文彼論意不串習之類亦有三世得云事今問答意亦分別也但於光法師正理意同識身云釋者正理論約威儀工巧心分串習不串習之二類不串習之類無三世得云義邊雖同今論不同識身足論得心多少之時唯約串習之一類自上界沒還生欲界之時得欲界無覆無記心云故以此義邊分同識身故云正理意同識身也更非謂識身足論意約威儀工巧心分串習不串習之二類不串習之類無三世得也問正理論中付明欲界染汚心現前位得心相且界退還位必可得欲界無覆無記心乎答不必得之也兩方若必得之者威儀工巧心不串習者界退還位何可得之事是以光法師餘處解釋云此論正理婆沙雜心亦據不串習者所以有不成就正理論意威儀工巧心不串習之類無三世得見若依之爾者光法師今解釋云顯宗十一亦同識身乃至正理二十雖不改頌長行意同識身文正理論意若同識身足論者界退還位必可得欲界無覆無記心乎答正理論意自上界沒還生欲界之時約威儀工巧心善串習者可得之不串習者不可得之故見餘處正理論文云又威儀路四蘊之得多分世斷及刹那斷唯除諸佛佛馬勝苾芻及餘善習威儀路者若工巧處四蘊之得亦多世斷及刹那斷除毘濕傳羯磨天神及餘善習工巧處者文顯宗論説全同此文爰知正理顯宗兩論意威儀工巧心不串習之類無三世得云事是以光法師餘處解釋云此論正理婆沙雜心亦據不串習者所以有不成就正理論意同今論也但於光法師顯宗十一亦同識身乃至正理二十雖不改頌長行意同識身之釋者正理顯宗兩論意威儀工巧心不串習之類無三世得云事雖同今論不同識身明十二心得心多少之時唯約串習之一類論之故顯宗論改頌云三界染如次得七六二種色善二學三二無餘自得正理論或一本云理亦應言得自無覆以本論説成不善心欲無覆心定成就故也就其串習之一類見之界退還位得欲界無覆無記心云義邊分同識身故光法師云顯宗正理論意同識身也非云正理論意論威儀工巧心三世得有無全同識身也重意云識身足論意云欲界一切威儀工巧心不簡串習不串習悉有三世得正理顯宗兩論意欲界威儀工巧心有串習不串習之二類不串習之類無三世得云故以此義邊見之正理顯宗兩論意同今論不同識身也光法師餘處云此論正理婆沙雜心亦據不串習者所以有不成就之釋即此意也而顯宗正理兩論中論得心多少之時唯就串習之一類界退還位得欲界無覆無記心云義邊分同識身故光法師當卷云顯宗十一亦同識身乃至正理二十雖不改頌長行意同識身之釋即此意也尋云當卷論意各別之釋意正理顯宗屬此論之方歟爲當屬識身之方歟答云此事有二義先存一義意者正理顯宗可屬此論之方也其故見餘處解釋云此論正理婆沙雜心亦據不串習者所以有不成就正理既屬此論之方畢至當卷解釋豈以正理顯宗屬識身之方哉何況當卷作論意各別之釋之時云若識身論意識身之方無置等言云若此論等意此論之方置等言可等取正理顯宗等見也疑云當處論意各別之釋意正理顯宗屬識身之方云事不可然見光法師解釋前後問難之言既云顯宗十一亦同識身乃至正理二十雖不改頌長行意同識身此論既違識身等文如何會釋正理顯宗屬識身之方乎答之作論意各別之釋正理顯宗屬識身之方云事甚分明也何況見正理論文云理亦應言得自無覆以本論説成不善心欲無覆心定成就故專以識身足論定成就之文爲證據見答爾正理識身必可一方也而正理顯宗與識身論意各別云事三方不可然乎答光法師餘解釋實以難思但試會之者正理顯宗意唯就威儀工巧心串習之一類論得心多少故界退還位得欲界無覆無記心云事分同識身故問難之時顯宗正理暫同識身也然而就實通論作論意各別之釋之日識身意云一切威儀工巧心有三世得正理顯宗意約威儀工巧心分串習不串習之二類不串習之類無三世得云故正理顯宗亦同此論之方也次元瑜疏云今意二解後代論師於識身文不善思擇代習此解相傳不改便爲指定不更推求是故法勝尊者法上所師世親菩薩衆賢論主皆依此釋識身文一切威儀及工巧處心皆有三世得故生欲界此心定成於欲界還位欲染心中應言定得欲界無覆文此釋意雜心倶舍正理同可一方見也次於正理論引識身之文爲證之難者正理論意威儀工巧心串習之類有三世得云邊分同識身意故引彼論文爲證計也非云一切同識身也故元瑜疏云問威儀路工巧處四蘊一分有三世得是正義不若是頌中何不説若非此中何不破解云此是正義故識身足論云成就欲界善心不善隱沒無記心皆云定成就欲界不隱沒無記心若生欲界等入上定二無記心無法前得云何定成耶頌中不云説者含故彼得心中當更分別文此釋意爲證一分威儀工巧心有三世得之義引識身足論定成就之文也正理論引本論文爲證事准之可思也一義云當卷論意各別之釋意正理顯宗可屬識身之方也其文理如今難勢之趣也但倶舍正理論意各別云意約威儀工巧心分串習不串習之二類不串習之類無三世得云事倶舍正理其意雖同倶舍唯付不串習之一類論得心多少正理顯宗唯付串習之一類論得心多少故倶舍正理論意各別正理顯宗屬識身之方也爲言難云若爾餘處釋中何云此論正理婆沙雜心亦據不串習者所以有不成就正理屬此論之方哉次當卷解釋識身之方不置等言此論之方置等言事亦難思乎答第四卷處倶舍正理兩論意同竝論威儀工巧心串習不串習之二類故正理屬此論之方也第七卷處倶舍唯約不串習之一類正理顯宗唯約串習之一類故論意各別正理顯宗屬識身之方也兩處解釋之相違其意在之次當卷解釋置不置等言事如此之文體可隨時宜強非一定之證哉何況問難之言既云此論既違識身等文如何會釋識身之下置等言等取顯宗正理故答中識身足方略不置等言也婆沙雜心同此論意故若此論等意之等言可等取婆沙雜心也何況作第一釋之時云識身等論據串習勝者説故言定成欲界無覆識身足方置等言此意非等取顯宗正理哉第二釋意正理顯宗屬識身之方初釋意其義可同也一義云正理論意實存欲界一切威儀工巧心皆有三世得云義故界退還位必可得欲界無覆無記心也是以顯宗論改頌云三界染如次得六六二種色善三學一二無餘自得理論或一本云理亦應言得自無覆以本論説成不善心欲無覆心定成就故述界退還位必得欲界無覆無記心之旨故欲界一切威儀工巧心不論串習不串習悉有三世得見故光法師釋顯宗十一亦同識身乃至正理二十雖不改頌長行意同識身顯宗正理兩論意實同識身足論之旨尤分明也故當處論意各別之釋意顯宗正理可屬識身之方也但於光法師餘處此論正理婆沙雜心亦據不串習者之釋者是隨文一往之釋也餘卷正理論文云又威儀路四蘊之得多分世斷及刹那斷唯除諸佛馬勝苾芻及餘善習威儀路者若工巧處四蘊之得亦多世斷及刹那斷除毘濕傳羯磨天神及餘善習工巧處者約威儀工巧心分串習不串習之二類論三世得有無事非述衆賢論師之自義引載倶舍婆沙之義也顯宗論文其意同之雖非衆賢論師之自義就其現文釋此論正理雜心亦據不串習者所以有不成就也如此得意之諸文更非相違重難云餘處正理論文述衆賢之自義見何云引載倶舍婆沙之義哉是以元瑜疏云此是正義文何況顯宗論中何可載非所存之義哉答正理論中雖非衆賢之自義先擧倶舍婆沙常途之義事何強疑之哉是以彼論述得心多少之時先如倶舍論述之了別加理亦應言得自無覆等之言爰知彼論意強非破倶舍婆沙等之常義只任識身足論所説暫存別義計也故餘處正理論文先述倶舍婆沙等之常義事何可疑之哉元瑜師依爲倶舍婆沙等之常義云此是正義也次顯宗論中他部之義猶擧之如云然譬喩者説唯有心無別心所心想倶時行相差別不可得故乃至又於心所多諍論故謂或有説心所唯三或復有説心所唯四或説有十或説十四故唯有識隨位而流説有多種心心所別也況擧自部之中非所存之義事何亦疑之哉問婆沙論中欲界威儀工巧心悉有三世得義可有哉答不可有此義也兩方若有此義者光法師餘處解釋云此論正理婆沙雜心亦據不串習者所以有不成就文如解釋者婆沙論意不串習之類無三世得見爰知彼論中欲界威儀工巧心悉有三世得云義無之云事若依之爾者婆沙論中一師意欲界命終生初靜慮之時捨無記五蘊文此師意欲界威儀工巧心悉有三世得見如何答見婆沙論處處之文大有二師説一師意云欲界威儀工巧心串習不串習者倶無三世得故界退還位倶不得之一師意云欲界威儀工巧心不串習者無三世得故界退還位不得之串習者有三世得故界退還位得之也更無不串習者有三世得界退還位得之云義也退檢婆沙論一部前後之文即此旨見所謂彼論第百五十七云此中欲界無覆無記一切色蘊異熟生四蘊及威儀工巧處多分四蘊彼得世不雜刹那不雜若在過去得亦過去若在未來得亦未來若在現在得亦現在威儀路四蘊中善串習者如佛馬勝及餘有情所善串習幷工巧處四蘊中善串習者如佛妙業天子及餘有情所善串習彼得亦皆世雜刹那雜謂在三世各有三世得故文此文意不串習者無三世得串習者有三世得云事分明也即同倶舍正理顯宗雜心説也同論第百五十九云不善心生無記得起者謂非想非非想處沒生欲界以不善心結生時彼心與七地見修所斷及欲界見所斷無記四蘊修所斷無記色行二蘊諸得倶起有説亦與欲界修所斷無記心心所諸得倶起謂善串習威儀路工巧處四蘊文初師意串習不串習者倶無三世得故界退還位同不得之云義也是倶舍等之解義也第二師意不串習者無三世得故界退還位不得之串習者有三世得故界退還位得之云義也即同倶舍等意也同論第百八十六中就發智論文云無色界沒生欲界時善染汚法曾得得異熟法未曾得得不擧威儀路工巧處有一箇問答云問威儀路工巧處四蘊串習者亦應得何故不説答應説而不説者當知此義有餘有説無覆無記法中多分不得謂異熟生通果全及餘少分故雖少得而亦不説有餘師説串習者亦不得以羸劣故文初師第二師意同不串習者無三世得故界退還位不得之串習者有三世得故界退還位得之云義也即同倶舍等意也第三師意串習不串習者倶無三世得故界退還位同不得之云義也是倶舍等之外義也婆沙論中若有不串習者有三世得界退還位得之云義者何須致串習者亦應得何故不説之問哉爰知婆沙論中都無不串習者有三世得界退還位得之云義也處處之文如此得意之上彼論第百九十三卷中欲界命終生初靜慮之時捨無記二蘊云師意串習不串習者倶無三世得云義也捨無記五蘊云師意串習者有三世得云義也非云不串習者捨無記五蘊也即見同卷次下文云色界命終生欲界者竝無色界命終生欲界者所得蘊數初師云得無記二蘊第二師云得無記五蘊之文有之是則初師意串習不串習者倶無三世得故界退還位全不得之云義也是倶舍等之外義也第二師意不串習者無三世得故起退還位雖不得之串習者有三世得故退還位得之云也即同倶舍等意也准上可思之問雜心論意色界染汚心現前位得欲色界無覆無記心可限界退還位乎答可限界退還位也兩方若不限界退還位者今論意色界染汚心現在前位得欲色界無覆無記唯限界退還位見雜心論意其意可同之若依之爾者正見雜心論文云界及地來還時欲色界得七心界退還位之外地退還位可有得心之義見如何答十二心得心多少門者先全不成今初得之名得也故光法師釋云此中意説於十二心中先不成就今得成就説名爲得後雖新得自種類心不名爲得先已得故文以之思之色界染汚心現前位得欲色界無覆無記心可限界退還位也地退還位自本成就欲色界無覆無記心故不可云得之故也是以今論云由界退還得欲界一無覆無記及色界三色界染汚心現前位得欲色界無覆無記心唯限界退還位見今論雜心得心之廢立據重據單之義門聊雖相替全不成就初得名得事其義無異故知雜心論意色界染汚心現前位得欲色界無覆無記心唯可限界退還位也何況正見雜心論文長行雖述界及地來還時欲色界得七心子注云上界沒還生色界時得欲界化無記心及色界三心不云地退還位得欲色界無覆無記心也但於界及地來還時之文者實以難思但存一義者界退還位得心之外實雖不可有地退還位得心之義乘阿毘曇心論界及地來還時之文勢置及言也非別物置及言事人師釋中有可別云也重難云阿毘曇心論偈頌云穢汚心得十長行述界及地來還時三界善穢汚及無記此心一切得染汚心現前位得無色界善心云故界退還位之外出地退還位其義尤可爾雜心論意不云染汚心現前位得無色界善心故與阿毘曇心論其義遥異也而雜心論乍改阿毘曇心論染汚心現前位得無色界善心之義猶云界及地來還時欲色界得七心地退還位有得心之義云事猶依用阿毘曇心論説見如何答古譯經論之習其文勢甚雜亂故雜心論意實雖阿毘曇心論意不云染汚心現前位得無色界善心亦不云地退還位得欲色界無覆無記心等然而譯者乘阿毘曇心論之文勢猥置界及地來還時之言也問世親論主難雜心師善心中得六義云於善心中應言得七文正理論師如何救之乎進云正理論云然學無學同無漏故總説一心言六無失文付之雜心論中立十二心學無學心各別列之何如此判哉答法勝阿毘曇心論中云十一心欲界善不善隱沒無記不隱沒無記色界三除不善無色界三亦如是及無漏合學無學心只列無漏心立十一心了述善心必得六其六心中擧欲界善心而雜心論主開學無學心乍立十二心移法勝阿毘曇心論文頌云善心得六種然亦除欲界善心開學無學心爲六種心故世親論主致於善心中應言得七之難也故正理論師救此難就其本宗義會然學無學同無漏故總説一心言六無失尤似有其由來故泰法師釋云倶舍云有餘於此總説頌言者餘説有十一心師總説此頌雜心論主以此頌云十二心故世親論主言於善心中應言得七正理論云如經主難應言得七然學無學同無漏故總説一心言六無失解云餘師心有十一言六無失雜心論主心有十二言六有失文元瑜疏釋此事云然此實是無漏所造本意應約十一心説然毘曇中誤作十二心解世親尊者意亦如是由見有妨彈爲失自今時論主還取本宗約十一心釋便無過故先述意方列頌文文此等解釋其旨分明也問世親論主難雜心師善心中得六義云於善心中應言得七文光法師意正理論救如何釋之乎進云光法師釋云正理救云理亦應得欲界善心謂以正見續諸善本雖加欲善除無覆心經主不應難令得七文付之依光法師解釋見正理論所説云然學無學同無漏故總説一心言六無失文依之泰法師寶法師如正理論文引之如何答正理論有異本不同故諸師所覽各有不同歟泰法師寶法師所引幷元瑜疏所牒之本如見行本有然學無學同無漏故總説一心言六無失之文光法師所説本有理亦應得欲界善心謂以正見續諸善本雖加欲善除無覆心經主不應難令得七之文歟是以或抄云檢近來所傳來大宋國正理本正如光法師所引之文也云云可檢之問雜心論意可説正見續善乎答不説之也兩方若説之者披雜心論所説尋得心多少述善心得六種全不擧正見續善哉若依之爾者世親論主難雜心師善心中得六之義云於善心中應言得七謂由正見續善根時欲界善心起位名得文光法師所引正理論文救今此難云理亦應得欲界善心謂以正見續諸善本雖加欲善除無覆心經主不應難令得七文以正理救思雜心意説正見續善云事尤分明也答雜心論中述得心多少偈頌云善心得六種長行云善心中得六心欲界不隱沒無記色界善不隱沒無記無色界善及學無學不説正見續善云事論文實分明也但於光法師所引正理論文者就正理論自義救世親論主之難也雜心論中不擧正見續善出欲界無覆無記心然而正理論師任自義替雜心師意救世親論主之難故加正見續善除欲界無覆無記心可云善心中得六會也非云雜心論中擧正見續善除欲界無覆無記心全非相違也問雜心論意欲界威儀工巧心悉可有三世得乎答不必有三世得也兩方若悉有三世得者光法師餘處解釋云此論正理婆沙雜心亦據不串習者所以有不成就文如解釋者雜心論意不串習之類無三世得見若依之爾者世親論主難雜心師善心中得六之義云於善心中應言得七文正理論師救此難云雖加欲善除無覆心經主不應難令得七文光法師釋此文云彼論同識身離欲染不得欲界無覆文如解釋者雜心論同識身足論見若同識身者欲界威儀工巧心悉可有三世得哉答雜心論意欲界威儀工巧心不串習之類不有三世得串習之類可有三世得也故雜心論云威儀四陰多以世斷及刹那斷若彼善修者三世得工巧亦如是文加之彼論中述得心多少云善心得六種者善心中得六心欲界不隱沒無記色界善不隱沒無記無色界善及學無學此亦通説非一時得文此文又善心現前位得欲界無覆無記心云故自上界沒還生欲界之時不得欲界無覆無記心見任此等論文不串習之類無三世得云事分明也是以光法師餘處解釋云此論正理婆沙雜心亦據不串習者所以有不成就文泰法師餘處解釋云若依雜心及倶舍從上界沒生欲界時皆不得欲界不隱沒無記心與識身論於違善作論主者立義別也亦可雜心倶舍據欲界不極數習威儀工巧者命終生上界後退生欲界初心不得欲界不隱沒無記心也文元瑜疏云今意二解後代論師於識身文不善思擇代習此解相傳不改便爲指定不更推求是故法勝尊者法上所師世親菩薩衆賢論主皆作此釋識身文一切威儀及工巧處心皆有三世得故生欲界此心定成文此等諸師解釋亦雜心論意不串習之類無三世得云事分明也故知雜心論意同今論正理婆沙不同識身也但於光法師彼論同識身離欲染不得欲界無覆之釋者約威儀工巧心串習之一類論得心多少之時分可同識身故如此云也或又彼論者指正理論云一義意可有也
