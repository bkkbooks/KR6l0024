body:
  text: 倶舍論第二十七卷抄下問今論意麟喩獨覺及三州利根無學聖者初盡智位得無諍願智四無礙解可云耶答得之可云也兩方若得之者凡二乘聖者者雖纔斷染汚無知未得斷不染無知如餘處論判中述聲聞獨覺雖滅諸冥非染無知畢竟斷故非一切種而於無諍願智等六種之功徳者是最勝究極之智品故不除定障根障等之無知更無得之設雖麟喩獨覺及三州利根無學聖者於初盡智位何可有得之義哉依之勘今論處處之定判當處偈頌結六依邊際得邊際六後定遍順至究竟佛餘加行得長行云除佛所餘一切聖者所説六種唯加行得非離染得非皆得故文餘處明滅盡定之相偈結滅盡定亦然爲靜住有頂乃至聖由加行得長行述此滅盡定唯聖者得乃至要由加行方證得故顯非離染得之者或定品偈頌之中説第八解脱之相云滅定如前辨文豈非指根品之前文哉亘有學無學通利根鈍根之滅盡定猶限加行得不通離染之得見限無學不通有學限利根不通鈍根之六種功徳寧可云初盡智位得之哉若依之爾者婆沙論中述正義家之義云如是説者若決定可得者彼離染得盡智時得故文而麟喩獨覺反三州利根無學聖者可得無諍願智四無礙解云事其義決定設雖今論意何可云以彼六種功徳非離染得哉是以彼論中明六十五等至成就不成就之相云佛定成就五十七部行者如欲界聲聞麟角喩者如佛文麟喩獨覺若初盡智位不得無諍願智四無礙解者寧可云如佛定成就五十七等至哉麟喩既爾也利根聲聞相例可同如何答凡二乘聖者者雖不能悉斷不染無知得分除之如光法師餘處解釋之中述不染無知若菩薩三無數劫隨位漸斷至金剛喩定方總斷盡若二乘等雖有分斷而非斷盡其於所除不染無知之中何無定障根障解脱障等之類哉若於定障根障等之中有分斷之義者於定根解脱等可有分得之義云事炳然也況麟喩獨覺是三乘中之中根聲聞利根是六種姓中之第六也何況於斷二輪之惑障證無學之應果哉就中如十八不共法自本非二乘境界故設麟喩獨覺設利根聲聞不可得之如無諍願智等既許爲共聖之功徳若部行獨覺若鈍根聲聞雖不得之於麟喩獨覺及三州利根無學者可得之云事必然也若許得之者須初盡智之位得之何至後時始得之哉彼婆沙論中述若決定可得者彼離染得盡智時得故則所顯此等之道理也今論意寧可違本論婆沙之説哉如此得意之時二乘聖者纔斷染汚無知未斷不染無知云難更不可來者歟次於今論餘處以染無知畢竟斷故非一切種之文者是分斷非全斷故云非一切種也全非不許分斷何來爲難勢哉如此成之時亦不除定障根障等難得無諍願智云難自被遮畢但於當處偈頌長行之説者光法師正引合婆沙論如是説者若決定可得者彼離染得盡智時得故之文於今論意其相違云解云婆沙通據少分故説二乘亦有離染倶舍以二乘離染得不定故但言加行得文文意云婆沙論意離染位得無諍願智等六種功徳之類是少分得之類是多然以少分被多云二乘聖者離染時得彼功徳倶舍論意麟喩獨覺三州利根無學聖者離染時得彼六種功徳雖是決定部行獨覺幷三州鈍根無學及餘天中利鈍一切無學不限離染時後時亦不得之既總見二乘之時得不得不定故處二乘於劣是異佛以云加行得不名離染得爲言豈不爾哉次於滅盡定之例難者婆沙論中既述佛定成就五十七乃至麟角喩者如佛而滅定亦爲五十七等至之隨一麟喩獨覺離染時可得之云事必然也若爾會倶舍婆沙之相違之者准光法師之解釋可思之但於第八解脱者不限利根亦通鈍根不限無學亦通有學不限人趣亦通天中不限欲界亦通色界不限處通異熟處而成熟然鈍根有學等之諸類是加行得非離染得故倶舍約多分名加行得之義可有之也重難云光法師會兩論之相違述婆沙通據少分故説等判倶舍以二乘離染得不定故等頗無其謂所以然者倶舍論正標除佛所餘一切聖者則結唯加行得非離染得標句之中遮除佛表一切聖者結句之中表唯加行得遮非離染得一文之上下一段之廢立設雖麟喩獨覺設雖三州利根無學於初盡智位不得彼六種功徳云事實以明鏡也況於一切之語哉何況於唯之言哉因明理門論中釋唯之言云以簡持爲功云云取意何可輒改簡持之義哉加之次下文云唯佛於此亦離染得諸佛功徳初盡智時由離染故乃至於一切法自在轉故文此亦置唯之言簡二乘有離染得之義顯佛有離染得之義其旨彌炳然也何況上文中明四無礙解加行擧二師異説之中説論主正解云理實一切無礙解生唯學佛語能爲加行文二乘聖者若初盡智時四無礙解者至後位欲起之時更不可用加行若於二乘聖者者有未得退故現起必用未簡得者宜就定心獨覺用下加行聲聞用下加行或中加行何可同薄地底下之凡夫用爲生得善所作之教學爲其加行哉既以教學爲加行還知初盡智時不得四無礙解云事無礙解既爾也無諍願智亦可爾若爾倶舍論意以彼六種功徳望二乘時是加行得非離染得云事頗勿論者歟次婆沙論既云若決定可得者彼離染得盡智時後故故於麟喩幷三州利根無學者爲決定可得之類故盡智位得六種功徳云事無疑宜作論意各別之釋何可假及和會之釋哉就中婆沙論雖云若決定可得者彼離染得未云聲聞獨覺盡智位得六種功徳何可判二乘亦有離染得哉況雖有以少從多立名之談未見以多從少立名之談如何次就滅盡定重披光法師處處之解釋第五卷疏釋此亦如前是非離染得之論文判明此滅定如前無想非離染得第二十九卷疏述滅定如先辨之頌意云第八解脱如先根品已辨此中解脱滅盡定故佛唯離染得餘皆加行得文今論意滅盡定亦限加行得不通離染得云事處處之定判頗炳然也何可對婆沙論佛定成就五十七乃至麟角喩者如佛之文設和會釋哉隨而粗見彼解釋未和會之哉於學者之會通也更不可用之抑光法師會兩説得倶舍論意之時宜云倶舍二乘得不得雖不定暫以不得爲本故不得六種功徳得婆沙論意之時須云婆沙二乘得不得雖不定暫以得爲本故得六種功徳何爲會婆沙少分離染時得六種功徳故云二乘離染得倶舍二乘離染得不定故云加行得哉若依倶舍意時離染得雖不定加行得是決定故云加行得者二乘中離染時不得彼功徳後時修加行之時始得彼功徳之類誰人耶又不待加行離染時得彼功徳之類誰人耶若離染時得之類後時修加行起之後時修加行起之類離染時得之者離染加行二得更不相違何可判倶舍以二乘離染得不定故但言加行得哉次答中二乘得不得不定故處二乘於劣是異佛以但言加行得之旨成之頗背解釋之文相如何答於光法師之解釋極有深意所謂婆沙論意不以二乘對佛只於二乘中判離染加行二得有無故若獨覺若聲聞初盡智位得六種功徳之類有之者欲嘆之稱離染得而麟喩及三州利根無學決定可得之類故盡智得之然約一切二乘是九牛之一毛也然而爲二乘勝事故以少省多總云二乘離染得爲言倶舍論意以二乘對世尊論二得有無之時佛一切功徳不借加行隨樂而起故非加行得云事決定是離染得云事亦決定於二乘中麟喩及三州利根無學初盡智時可得彼功徳之理有之歟然而正起六種功徳之時隨應起下加行中加行借邊際定力故加行得之義無疑既現起之時用加行故還知於離染時者不得之歟被得故二乘加行得是決定離染得是不定也此則讃如來毀二乘之意也爲言故光法師云水火相反兩論之文述婆沙通據少分故説二乘亦有離染得倶舍以二乘離染得不定故但言加行得誠以玄妙者歟如此成之時婆沙論意以多從少立名之疑還自被遮了但於今論一切聖者之一切之言者是少分之一切非全分之一切何爲違文哉次於唯加行得之唯之言者誠雖難思約一切二乘校六種功徳之時多分不得之少分亦得之就得之類尋二得之時加行得是決定離染得似不定爲顯此二門可云唯凡念唯之言義門非一餘處婆沙論中云唯於増時輪王出世文今此唯之言約多分所置之也所謂輪王之出世通増減兩位也増劫者後十九劫中上至八萬之時減劫者初一劫中八萬以上之時然云唯於増時是非約多分哉又慈恩因明疏中有其證恐繁之如十二卷抄致引之以唯佛於此亦離染得之論文可會之也次於明四無礙解加行之論文者雖難思二乘聖者自本於功徳不得自在故設雖離染時得四無礙解至後位彼正起之時借教力修加行何爲強相違哉例如離欲第九解脱道位雖得五通後位起之時必入根本定除通障發之餘處正理論中述謂聲聞獨覺無自在功力是准知者歟況婆沙論意雖正述彼離染得盡智時得故與今論同述如是説四無礙解皆以習佛語爲加行等何至今論可疑之哉次於以今論對婆沙宜作論意各別之釋云難者此論出於彼論何可輒違本論之誠説哉彼如判非以婆沙評家爲量兩論及異端之時就難和會所來也何思彼釋恣可致此難哉次於彼論中未云二乘聖者離染時得六種功徳云難者既云若決定可得者豈非指麟喩獨覺幷三州利根無學聖者云爾哉若爾聲聞獨覺離染時得無諍願智等云事理在絶言何可異求之哉次於滅盡定之例難者會通只如前論文幷光法師解釋誠雖分明光法師既會無諍願智等之相違述婆沙通據少分故倶舍以二乘離染得不定故之釋者准彼可思之但彼正和會此未和會云難尤可然如此之解釋不必以難學者以此文爲證得彼義意常軌則也何爲強疑哉次就光法師之會通被擧種種難勢者是例難非實難況先已委光法師解釋意趣之時此等之疑悉開畢何可設劬勞會之哉尋云四無礙解者是説法智也而麟喩所説法何得之耶答麟喩今雖不説法若説法者以四無礙力可説法故得之也例如婆沙一師意云麟喩得知麟喩心云他心智也思之問婆沙論意麟喩獨覺及三州利根無學聖者初盡智位不得無諍願智四無礙解可云耶准以前論義可知之仍第二重以下略之問以詞無礙解爲邊際智攝可云耶答不爲邊際智攝可云也兩方若爲邊際智攝者邊際智者以第四靜慮爲依地詞無礙解者以欲界初定爲所依所依地既別也能依智豈同哉若依之爾者披今論之前後明共聖徳上標謂無諍願智無礙解等畢下結六依邊際得邊際六後定明知無諍願智四無礙解之六種功徳爲邊際智之攝云事如何答無諍願智四無礙解六種功徳以第四邊際靜慮爲加行爲能引所起之智品也故所依邊際定唯限第四靜慮不通餘地能依六種徳隨應在諸地所謂無諍智幷願智之殊勝與初起在第四靜慮非殊勝與後起之願在下三靜慮及欲界法無礙解之少分在第四靜慮多分在下三靜慮及欲界辭無礙解在欲界與初靜慮義辨二無礙倶通在九地此中四無礙解一類之功徳故依第四靜慮得一無礙之時諸地四無礙同時得之但得必具四者則此意也若爾辭無礙解依第四靜慮力而得之地繋不同故非邊際智之攝也然論邊際定體亦有六種所謂無諍願智三無礙解除辭無礙解加延促壽故成六種也故頌中云六依邊際得者明得無諍願智四無礙解之方便云邊際六後定者明邊際靜慮之體也故長行中述之云無諍願智之四無礙解六種皆依邊際定得邊際靜慮體有六種前六除詞加餘邊際辭無礙解詞無礙解雖依彼得而體非彼靜慮所收文光法師釋此文云論曰至邊際定得者釋初句此明六種依邊際得邊際力引發故邊際靜慮至靜慮所收者釋第二句邊際六總而言之邊際靜慮體有六種於前六中除辭無礙以在欲界及初定故取五少分以五有通非邊際故故取少分加餘邊際即延促等文又云願智若依殊勝及初起但依第四若依非勝及依後起亦通下地乃至欲界文如此成之時更非論義者歟恐繁不引餘文委可見光法師之解釋也問頌文云邊際六後定文爾者爲四禪究竟處故得邊際名爲當遍順至究竟故得邊際名可云耶答此事難測暫遍順至究竟故得邊際名云義可存也兩方若勝下三靜慮故得邊際名者不淨觀四善根見道修道無學及練根道品乃至無量解脱勝處邊處幷雜修靜慮等專以第四靜慮爲規模之中未立邊際之名明知非四禪究竟處之所以云事若夫四禪究竟處故以第四定名邊際者明此等功徳之中何不説邊際之稱哉若依之爾者正見論文云邊際名但依第四靜慮故文如此文者四禪究竟處故以第四定名邊際靜慮被得如何答此事雖有所可思暫任論判解釋之顯遍順至究竟之所以立邊際之名云義所成之也則彼論文之前後述此一切地遍所隨順故増至究竟故得邊際名以二所以立邊際之名見故光法師釋此文云釋第三句總開三章一此一切地遍所隨順二増至究竟故三得邊際名文既於釋遍順至究竟頌文者長行開所以立其名唯可疑之哉至下以釋三章恐繁不引之後學必悉之若夫對下三靜慮以第四靜慮直名邊際者何可立遍所隨順増至究竟之二所以哉但於邊際名但依第四靜慮故之論文者顯得邊際名之地也文意云得邊際名之地在第四禪不在餘地爲言故光法師解今文云釋後定文後定者牒邊際六後定之後定也不可有相違一義云依二所以於第四靜慮立邊際名也准上可思也問當處付明六通相且以漏盡通爲共聖徳可云耶進云披論疏文共凡徳中烈漏盡通見付之凡漏盡通者六通之最極無學之所得也尤可以之備共聖徳何可共凡徳中烈之哉若夫以漏盡通攝共凡徳者異生怱爲斷三界見修二惑證有餘無餘二𣵀槃豈非成違教理之大過哉答以漏盡通尤可共聖徳中擧之共凡徳中不烈也然共聖徳中不擧之者上所擧之共聖徳是三州利根無學之所得非自餘聖者之所得而於漏盡通者三界二趣利根鈍無學之所得故大異無諍願智四無礙解等之相故上所云之功徳中不烈之也今共凡徳中烈之者可有二所以一六通中前五是共凡徳後一是共聖徳也然從多分名共凡徳以烈此中也二六通是一類功徳故不可離之故見之一種之時亦通聖亦通凡故烈之共凡徳中也是以光法師解釋中云於六通中第六唯聖前五通凡從多據總言共異生文如此成之時難勢更不爲重矣問今論意於五通立勝進道可云耶答可立之也兩方若立之者見今論之前後於加行無間解脱三道者其義自所見也於勝進道者未得其證者哉是以雖述解脱道言顯出障義全不言有勝進道依之勘正理論之文云勝進道中亦容有故文豈非顯故違此論之義哉若依之爾者光法師解釋中今論意於五通可有勝進道之旨釋成如何答凡斷通障得五通故可有加行無間解脱三道云事其旨理在絶言而五通既不限一念亦通多念初念已爲解脱道第二念以後豈非勝進哉是以光法師釋如是六通解脱道攝慧爲自性如沙門果解脱道言顯出障義之論文云且言解脱顯出障初理實亦容勝進道起文此亦非不得依憑於今論所謂餘卷偈頌中明十智未來修之相云雜修通無間學七應八九餘道學修八應九或一切文長行中釋餘道學修八之句云宿住神境二解脱道五加行道現修俗智他心解脱法類道俗及他心智一切勝進幷苦集滅道隨應現修此上未來皆修八智文釋餘道應九或一切之頌云解脱加行現修如學未來所修鈍九利十諸勝進道與練根同文於五通立勝進道云事論文實炳然也故光法師釋今此二段文云宿住神境至皆修八智者釋第三句解脱加行至與練根同者釋餘道應九或一切文於五道立勝進道文明鏡也仍可致於勝進道者未得其證云難哉但於雖述解脱道言顯出障義全不云有勝進道云難者雖以難思粗推之對煩惱繋縛專立解脱名故就斷惑道所談之也對通障立解脱事微隱故故今所述解脱道言顯出障義也況明六通之四行偈頌中不説餘三道名只結解脱道慧攝豈無深由哉是以正見論文云如是六通解脱道攝慧爲自性如沙門果解脱道言顯出障義文可思之次於正理論文者設雖含故違此論之意趣若有所同此論者宜引爲證故光法師爲顯此論説勝進道之義云故正理七十六云引解脱道言顯出障義勝進道中亦容有故之文也不可有相違重難云就五通於神境他心宿住三通者且擱之天眼天耳二通勝進道其相如何凡解脱道者目最初一念以第二以後名勝進道而二通倶皆以眼耳二識相應慧爲體於彼寧可得分二道差異哉就中勝進道解脱道之謂也是顯彼道轉増之義宜就善品立勝進之名何可關無記通哉是以光法師餘卷疏中述五通現修未來之相云天眼天耳二解脱道無記性故不名爲修文准此釋設雖二通經百念千念其間於第二念以後不立勝進名歟被得然以初念名解脱者目解脱通障之義故爾也如何答二通體是慧故雖無記得道之名後念亦爾也初念如得果初念故得解脱之名後念如得果後念故可名勝進云事道理必然也但於不可有初後不同云難者不可然初念是出障之最前故名之解脱第二念以去次第轉勝彌明朗故得勝之名其理彌極成疑是悟之津故就難勢其義猶分明也次於光法師之釋者解脱道唯限一念故決定是無記不可有未來之旨顯也勝進道通多念故任如從門入還從門出之軌則止通之時幷入定是猶可勝進道之所屬此定若曾得者唯可得現修之稱若未曾得者兼可有未來修故今不云勝進道也依之見次上文云五勝進道俗他心二隨應現修此上未來一切皆修俗他心二文今論四行頌中唯唱解脱道之名者擧一道顯三道也如此得意之時疑難彌被遮者也問論中答何緣此五不依無色問云初三別緣色爲境故乃至故此五通不依無色文爾者光法師如何牒釋之耶進云光法師釋云初三別緣至無如是能者總答諸有欲修至能如實知者此下別明修五通加行此則明修他心通加行諸有欲修至自相續起者別明修宿住通加行修神境等至不依無色者次明修餘三通加行文付之依解釋見論文答何緣此五不依無色之間大擧二解初解意云五通中前三通直緣色法爲境界後二通緣色法爲入門而無色界無色法故無五通之旨成之或五通加行皆緣色法無色心不緣色故無五通爲言第二解云五通以止觀均等地爲所依而無色定多慧少也近分中間慧多定少故不爲所依爲言若爾釋此文之時尤可云此下有二解此則初解也何不云爾如此可科文哉若強如此牒釋者牒結文云修神境等至不依無色者明修餘三通加行之時豈不違故此五通不依無色之論文哉爰知今此故此五通不依無色之論文總廣結上諸文云事依之光法師牒釋以下又諸無色觀減止増五通必依止觀均地未至等地由此已遮之論文云又諸無色至由此已遮者第二解文然者今科釋牒文之次第非只背論文之前後深亦違自解釋之起盡者哉答此疑尤爲珍重所未曾見及也仍文義倶如向壁更無所畜併可如難勢得其意全不可加別料簡者也但所可促會通者不云此下有二解此別初解事歟此是略故爾也或見次文之時方云第二解故述前文之時雖不云初解其義自聞者歟故不云爾或以下影顯也次於一段文開重重之科者於今一段或有總明五通之不可在無色界之所以文或有別明他心通之不可在彼界之所以之文或有別明宿住通之不可在彼界之所以文或有別明神境等三通之不可在彼界之所以之文故別所分小科也既不背大科何爲強苦哉次於故此五通不依無色之結文者難勢彌可然但此文既前文之所屬也何別科之哉故明神境等三通之文中科加之也如此之例太是多豈爲難勢之規模哉次牒釋觀減止増等之文之時故云第二解者於初三別緣色爲境故等之前文者其理故不云初師若至第二文不云第二解者有二解云事其義忽可唐捐仍牒釋此文之時故判第二解也不可有相違者歟尋云第二解之論文云未至等地文未至者廣指八近分歟唯指初禪近分歟答雖可有二義暫指八近分可云也此疑者雖非指事論文既及一紙解釋亦餘一打半又明五通之總別辨色無色之不同故法門多籠器量之仁可翫之於文段論義者爲當卷之仲美矣問從無色界沒生欲色界人依自相續初起宿住通義可有耶答不可有此義也兩方若有此義者正見論文云從無色沒來生此者依他相續初起此通所餘亦依自相續起文如此文者不可有此義見若依之爾者凡起宿住通者爲專知自相續前生事也設雖從無色界沒生欲色界之人何可有依他相續初起宿住通之義哉何況宿住通必緣曾所更事而起者論判之所定也他相續身若非曾所更事者宿住通爭可緣彼爲所緣境哉設雖緣他相續爲所緣境何可知自相續事哉加之設雖依自下地爲境之理不緣前生無色身何不得知無色以前欲界之身哉答此事未存知粗推論意趣凡自相續他相續現世所攝中生二有之諸法是今生所屬之法故非宿住事始自次前生死有之一念乃至無量生中生二有之法是其可宿住事於其事中宿住通唯緣曾所更事不緣非曾所更事若爾於自相續前生身者是無色界身故依四靜慮之通力不可知之設雖他相續身在欲色界而爲曾所更事者何無由此初起宿住通之義哉又初起是不自在故更不可有超劫知前生之義故今知無色已前生之義不可有之也故論云諸有欲修宿住通者先自審察次前滅心漸後逆觀此生分位前前差別至結生心乃至能憶知中有前一念名自宿住加行已成爲憶念他加行亦爾此通初起唯次第知串習成時亦能超憶諸所憶事要曾領受乃至從無色沒來生此者依他相續初起此通所餘亦依自相續起文如此成之時諸難悉被遮者歟問從上三靜慮沒生下三靜慮等人依自相續初起宿住通義可有耶答可有二意也兩方若有此義者見光法師之解釋上述若彼自身從無色沒來生欲色者依自相續修加行滿依他相續初起此通畢下云若依下地起宿住通從上地沒來生下者類此應知文如解釋者不可有此義被得若依之云爾者正披今論文云從無色沒來生此者依他相續初起此通所餘亦依自相續起文准此説依他相續初起宿住通者唯限從無色界沒生欲色之人不通餘見若夫從上三靜慮沒生下三靜慮等之人亦依他相續初起宿住通者寧可判所餘亦依自相續起哉答任五依四靜慮自下地爲境之理故從上三靜慮沒生下三靜慮等之人若以下地爲所依者依自相續初起宿住通之義不可有之所以然者今此人之相只如從無色界沒生欲色界之人之相故也其旨如一方疑難所致出之光法師定判又如前疑之答中委成之但於斥難之論文者就欲色界中從自地沒還生自地及從下地沒生上地之人依自相續初起宿住通故對云從無色沒來生此者依他相續初起此通云所餘亦依自相續起也故光法師釋所餘亦依自相續起之論文云若從所餘欲色界沒還生欲色界者亦依自相續初起此通文若爾者今此論文更非違文何備難勢哉若此人以上地爲所依者可有此義也思而可知重難云以難勢所擧之光法師解釋爲證成從上三靜慮沒生下三靜慮等之人依他相續初起宿住通云義頗不可然難勢暫略其中間之文引之何不改之以爲證哉則見次上之釋云若從所餘欲色界沒還生欲色界者亦依自相續初起此通文因之次下述若依下地起宿住通從上地沒來生下者類此應知而次上之釋既云亦依自相續初起此通畢隣後結類此應知豈非顯從上三靜慮沒生下三靜慮等人依下地初起宿住通之時依自相續之義哉次若以上地爲所依者依自相續之義可有之云事其義暫可然仍略難勢也答如前重成之爲難勢料簡光法師解釋其旨順道理故所讓文段料簡曰第二重一方之難也則光法師初云若彼自身從無色沒來生欲色者依自相續修加行滿依他相續初起此通之釋論從無色沒來生此者依他相續初起此通文也次若從所餘欲色界沒還生欲色界者亦依自相續初起此通者釋論所餘亦依自相續起之文也後云若依下地起宿住通從上地沒來生下者類此應知者論文之外光法師勘出此評如此釋也此是不類問文還類上文也若夫類問文不類上文之光法師之勘出豈非無用哉可思之問異生所起天眼通緣五淨居天事可云耶答雖有學者異義暫可存緣彼云義也兩方若緣之者凡五淨居天者唯聖非凡之境界也異生所起天眼通如何可緣彼事哉是以今論中述宿住通之相云諸所憶事要曾領受憶淨居者昔曾聞故文婆沙論中云曾所更事亦有二種一者曾見二者曾聞雖未曾見五淨居事而曾聞故亦能憶知文若夫異生所起天眼通緣淨居天事者何可會曾見云曾聞哉若依之爾者異生既成就第四靜慮生廣果以下三天設雖不生五淨居天何不云以同一繋縛地之所以緣彼事哉答異生所起天眼通可緣五淨居天事云事道理頗炳然也其旨如一方之難勢重成其旨趣者如初禪三天色相大小雖悉各別王徒補佐雖亦絶異依同一繋縛地梵補梵衆同敬大梵初二天衆亦禮梵王又如欲界六天三十三天等五天往摩天等五天之專一見彼色相是爲同一繋縛地之所以也准彼等思此等廣果以下三天乘自生得通隨應昇無煩等上五天見彼有情及器界事又上五天衆隨應自下下三天中之時亦三天衆見五天衆又下三天衆隨餘得通人往上五天等之義可有之然教中下天不見上天者約地別界別門云爾也以何知者餘處論中云三十三天由自通力能從本處昇夜摩天或復依他謂得通者及上天衆昇往夜摩所餘諸天昇上例爾若來若至下見上天然下眼不能觀上界上地非其境界故如不覺彼觸是故從上地來下地時非自身來要化下地他文其旨炳然也生得通之勢用猶如此況於修得天眼之勢力強盛哉廣果以下三天及餘地異生以第四靜慮爲所依定所起之天眼通隨應可見五淨居天内外一切之色法應事理在絶言者歟但於彼天唯聖非凡之境界云難者無雜修之業不感彼天異熟故爾也何可遮異生乘通力至彼而彼衆交雜以生得通修得通見彼色等之義哉就中凡之不及聖聖之隔於凡者約心品觀解等所論也於色等諸法者只如福生天之勝無雲天廣果天之勝福生天可無煩天勝廣果天也以何知者無雲天身量是一百二十五踰繕那彼天壽量亦一百二十五大劫也福生天身壽二量倶於無雲天同増一倍所謂身量二百五十踰繕那壽量二百五十大劫也廣果天身壽二量倶於福生天亦同増一倍所謂身量五百踰繕那壽量五百大劫也無煩天身壽二量倶於廣果天亦同増一倍所謂身量一千踰繕那壽量一千大劫也上四天之勝無煩天等准例可知若爾聖者所成就色不相應等未必勝異生所成就色不相應等歟被得次於倶舍婆沙兩論之説者異生肉眼及下地天眼未見天色故約此門以云爾歟若非盡理之説者非強苦也重難云兩論意若實許異生所起天眼緣五淨居天事者宜擧答中所致成之義相作曾見之門既不爾則無曾見之義云事治定也以曾聞之義成憶知之旨故倶舍婆沙意必定致異生所起天眼不見五淨居天事云義被得況退案道理無雜修有漏善業之所感與有雜修有漏善業之所感相望之時豈無麁細之不同哉是以品類足論中出不共異生法體之時擧五淨居天蘊處界尤有深所以者哉答重難勢之趣尤可然但於兩論之所致者爲顯淨居天之隔凡界雜修力之勝餘定之義云爾歟被得若夫強云聖身障凡見凡見隔聖身者設雖於廣果以下諸天乃至人中離往可不能異生見聖身既感見之何可至淨居身始隔凡見哉次於有雜修無雜修之所成元異者雖似有其謂有雜修無雜修者只是樂定樂慧之不同也所感異熟者凡身聖身倶是有漏業之所招也何可由此分見不見之域哉次於品類足論之所説者異生不成淨居天蘊處界故名之不共異生法也更非謂彼蘊處界不爲異生之所見何來爲難勢哉尋云倶舍婆沙中云曾聞不云曾見有何意耶答雖不並見淨居天事由聞教知彼天事云意也問當處付明六通相且正理論意神境等五通勝漏盡一通劣可云耶答爾也兩方若五通勝漏盡通劣者神境等五通之有學異生漏盡之一通唯限無學所得設雖正理意何可云五通勝漏盡劣哉若依之爾者光法師所引正理論中云若爾何緣有漏盡通樂苦遲速地皆能盡漏故五是別修殊勝功徳要殊勝地方能發起文准此文五通勝漏盡劣也被得如何答任正理之一文似五通勝漏盡仍前重所成其旨也倩案之依邊邊義門勝劣互可具之也所謂若以有學異生所得之五通望漏盡通論勝劣者漏盡通勝五神通劣可云也所以然者如頌文判漏盡通如力一説意以無學十智悉爲漏盡通體見其十智中則攝無學所得五通故漏盡通可勝有學異生五通云事炳然也若無學五通與漏盡通互所相攝而論勝劣者五通以四靜慮爲所依除通障得之故是勝漏盡通未必以四靜慮爲所依未必除無知得之故是劣可云也況後五通亦離煩惱繋縛其旨彌必然也正理論述五是別修殊勝功徳要殊勝地方能發起顯此門歟被得如此得意時兩方之難勢還爲答之潤色何及設會通哉重難云以有學異生之五通望無學五通所不攝之漏盡通判勝劣事如何有學異生之五通隨應雖被煩惱繋縛依四靜慮除通障而得之無學五通所不攝之漏盡通不必依四靜慮不必除無知而得之准知有學異生所得之五通猶勝漏盡通被得何可限無學五通哉次無學五通勝五通所不攝之漏盡通云事如何若以無諍願智四無礙解等勝功徳望漏盡通者豈不云五通所不攝之漏盡智勝無學五通哉答有學異生之五通雖依四靜慮除通障而得者帶惑障故是可劣無學五通所不攝之漏盡通離惑障故猶可勝以何知者論中説三明之體上述通六謂神境天眼天耳他心宿住漏盡通解脱道慧攝畢下云第五二六明治三際愚故後眞二假説學有闇非明文可思之次六通亘一切無學成就之無諍願智四無礙解等唯限三州利根無學不通餘何可以之備疑之端哉問天眼天耳二通緣上地境可云耶答緣上地境可云也兩方若緣上地境者五依四靜慮自下地爲境者偈頌之所定也而二通既爲五通之所攝何可有緣上地以爲境之義哉是以於神境等三通者無緣上地境之義見相例可同若依之云爾者披今論前後當處述天眼天耳無記性攝許此二體是眼耳識相應慧故餘處云生上三靜慮起三識表心皆初靜慮攝文天眼天耳二通若有緣二禪以上色聲二境者豈不緣上地境哉答凡自下地爲境者以五通之所緣境對五通之所依定之自上下三地之時若在自地若在下地更不在上地爲言若爾敢勿以自下地爲境之法疑二通之緣境凡二通既以眼耳二識相應慧爲體故論其地繋是限初靜慮地不通上三禪地若緣二禪以上色聲之時以上地爲境云事更不可疑之其旨如一方之難勢但於神境他心宿住三通之例難者定天眼耳無記餘四通唯善故彼三通即與所依定相應更不分異地故所無下地三通緣上地境之義也此二通與所依定分善無記故能依在下地所依在上地之謂有之豈無緣上境之義哉仍不足爲相例者歟問天眼天耳二通者爲唯限初禪繋爲當通上三禪繋可云耶答唯限初禪繋不通上三禪繋可云也兩方若限初禪繋者披今論文偈頌結五依四靜慮長行云前之五通依四靜慮文如文相者天眼天耳二通可通上三禪繋歟被得例如神境等三通之不限初禪繋加之勘餘處論文云有餘師言上靜慮亦有無覆無記表業文若於上三靜慮許有發表心之義者何於上靜慮不許有眼耳二識之義哉若依之云爾者生上三靜慮起三識表心皆初靜慮攝唯無覆無記者餘處論判之所定也明知天眼天耳二通者唯限初禪繋云事如何答天眼天耳無記性攝許此二體是眼耳識相應慧故者今論之定判五識唯尋伺者餘處之偈頌也而定品結下有尋伺中唯伺上無界品云若在欲界初靜慮中有尋有伺若在靜慮中間無尋唯伺若在第二靜慮以上乃至有頂無尋無伺文天眼天耳二通唯限初禪繋不通上三禪繋云事誰可疑之哉但於當處偈頌長行之説者五通無間道在四根本靜慮除通障而是得之故云爾也或眼耳二通之所依根在四靜慮故云爾也是以正見今論文上述天眼天耳無記性攝此二體是眼耳識相應慧故畢下擧一箇之問云若爾寧説依四靜慮文答之云隨根説故亦無有失謂所依止眼耳二根由四靜慮力所引起則彼地攝故依四地通依根故説依四言或此依通無間道説通無間道依四地故文何爲相違哉次於神境等三通之例難者彼善性也此無記也彼與靜慮識相應此與五識相應何足爲相例哉次於餘處論文者彼既爲有餘師之説存生上靜慮起三識表心皆初靜慮攝之正義之日更不可依用之況彼師之説是餘論之意也故光法師餘處解釋中釋彼文云此是雜心師釋文問二乘聖者及異生所起神境等三通同緣現在三千界境可云耶答不同緣三千界之境也兩方若不同緣之者凡五通是共凡之徳故未必分二乘異生差異設雖神境等三通何不同緣三千界之境哉是以於二乘聖者所起宿住死生之二通者同緣過未八萬劫事更無遠近之不同見相例可同若依之云爾者見今論文云即此五通於世界境作用廣狹諸聖不同謂大聲聞麟喩大覺不極作意如次能於一二三千諸世界境起行化等自在作用若極作意如次能於二千三千無數世界文准今此説於聲聞獨覺所起之三通者悉可有廣狹之不同被得凡夫所起之三通例而可知者哉答此事難義之中之難義不審之中之不審也仍年來之間思案之未得其意今驚此疑始迴愚推云於神境通有行住二門亦就行門有意勢勝解運身三通意勢通唯限佛故今不論之就餘二通且運身之相者或運三肘半及四肘身或運八射身或運十六射等之身若陵百踰繕那之空若陵千踰繕那之空若陵萬踰繕那等之空豈非極難之事哉天眼見被障細遠色天耳聞被障細遠聲其能取二根所取二境皆悉障礙有對法也況根不往境不來而隔四寶金鐵之九山土石瓦礫之説山等成無擁之通體誠是難思之至極也而於二乘凡夫之三人者利鈍有階級無知有厚薄獨覺最利根無知是薄神通最勝故是遍三通於三千界之間聲聞其根稍鈍無知深厚神通非勝故是施三通於二千界之内凡夫其機至下無知異深神通最劣故只起三通於一千界之分若爾以凡夫聲聞麟喩之通力配小千中千大千之世界尤有其謂更不可疑之是以惠暉法師之疏中云現在鐵圍山障隔故凡夫二乘知境利文但於宿住死生二通緣境之例難者過去八萬劫未來八萬劫之中無分在此在彼別別方處亦無立一劫二劫之時體故二乘凡夫同知八萬劫事故不論遠近不同也故惠暉釋中云過未無山障隔故凡夫二乘同知八萬文重意云神境等三通與宿住死生二通行相遙異也混而不可致難勢歟重難云凡以現在能測過未以過未還知現在者三世實有之宗之所習也而於現在既有在此在彼之別亦有前後相生之理設雖過未二世何無二千三千等之不同哉何無一劫二劫等之差異哉若爾於過未八萬劫之境分二乘凡夫等之通准例尤可足仍於現在與過未可替三通與二通哉次惠暉法師之釋未足爲指南云有周匝一千界之鐵圍山云有周匝二千界之鐵圍山云有周匝三千界之鐵圍山之依憑有宗所依經論之中有之耶如何若無其證者何可云鐵圍山障隔故凡夫二乘知境別哉若以一四天下之中之第九山云爾者毎四天下有之何可以之分二乘凡夫之差異哉加之若鐵圍山能障通力者天眼天耳二通之勢用不可越一四下之分齊何可有一二三千之不同哉若凡夫二乘之通力可限一二三千之分齊者設雖無彼鐵圍山不可及二三千無數之世界者哉次於過未者自本無方處何可論鐵圍山之有無哉設雖於過未有鐵圍山者更不可障宿住死生之二通法可説過未無山之由哉抑云二乘凡夫二通之所及之時同以八萬劫爲窮極云彼三通之愜量之時唯以一千界爲定限豈無其疑耶答於現在色法者有作用故衆微衆集故有説山等之別亦有在此在彼之別於過未色法者無作用故衆微散故無諸山等之別無在此在彼之別也未知三世實有之談故致如此之難歟若爾於過未無一千界二千界等之不同也又於未來者總不可有前後不同於過去法者約現在雖付前後之効望法法之時實無前後不同也此是法之外無時別體故也重意云於過未法者無作用故不能假立時於現在法者有作用故得能假立方有宗之學者能能可審察之次於惠暉之釋者誠有疑然而大意無相違故引而成之於文言者宜助成之所謂如緣現在境之神境等三通於周匝一千界周匝二千界周匝三千界之鐵圍山者宜如次凡夫聲聞獨覺所起之神通於其分齊施其作用不及二千三千無數世界爲言故云現在鐵圍山障隔故凡夫二乘知境別也又如緣過未境之宿住死生二通無於過未八萬劫之間有如鐵圍山之物之分時劫之法故凡夫二乘所起之通力同遍八萬劫不出其解爲言故云過未無山障隔故凡夫二乘同知八萬也全非謂現在有三重鐵圍山並隔凡夫二乘三通故不及二千三千無數又非謂過未無三重鐵圍山故始凡夫二乘之通力是同何來爲難勢哉但於三重鐵圍山之有無者誠有疑大乘經之中自有小鐵圍山大鐵圍山等云文則准彼爲定凡夫二乘通力之分齊暫成有三重鐵圍山之旨歟於小乘經之説者未勘得之可尋之退案之乘迷盧七金山以立鐵圍山若爾於三千界分齊者更難建立之哉爰知只數居一風輪之上萬億九山八海至一千名之小千界至十億名之中千界至萬億名之大千界被事或惠暉意一四天下以輪圍爲邊際小千中千大千之邊際亦爾云義存之故云爾不如依別誠證歟次於過未者八萬劫爲窮極於現在者一千界爲愜量者誠以不辨其所以又古不疑之古不明者仍只如向壁然而今驚此尋乍憚成數寄之一義者三界中以有頂爲極三千中以大梵爲主而凡聖倶生有頂知一期八萬劫事是生得等慧力更非通力於下界者以知八萬劫事爲神通異生之大梵緣領一千界是亦大梵生得果報力全非神通力於下界者以異生之知一千界事爲神通故二乘凡夫以同知八萬劫爲極異生以唯知一千界爲極也重意云八萬劫亘二乘凡夫一千界唯限凡夫也誠有其所以者哉尋云凡夫通力遍一千界云事有其證耶答聲聞既不極作意之時以一千界爲所至准知凡夫不極作意之時不及一千界極作意之時豈不及千世界哉且以之爲證矣難云梵補以下異生設雖以一千界爲極二禪以上異生以一千界爲極哉答問於他心通宿住通境有三千世界不同可云耶答不可有此不同也兩方若有三千世界不同者凡論三千世界之不同者約現在色法之積集九山八海等之器界而他心通以心心所爲境宿住通以過去事爲境於過去未來無表無色等之法無方處者餘處論判之所定也何於彼二通之境可論三千界之不同哉若依之云爾者正見今論文云即此五通於世界境作用廣陝諸聖不同謂大聲聞麟喩大覺不極作意如次能於一二三千諸世界境起行化等自在作用若極作意如次能於二千三千無數世界文如此文者於他心宿住二通之境可有三千世界之不同見如何答於他心通宿住通之境不可有三千世界之不同云事道理頗炳然也其旨如一方之難勢但於論文之起盡者就神境天眼天耳三通判爾也全非約宿住他心二通云爾者哉然而即此五通者是言總意別之施設也何爲難勢之端哉或於他心宿住二通之根本者緣心心所及過去法故雖無三千界之不同彼加行位有緣自他色法之義故云爾也以何知者上論文云諸有欲修他心通者先審觀己身心相由此加行漸次得成成已不觀自心諸色於他心等能如實知文光法師釋此文云此即明修他心通加行文又論云諸有欲修宿住通者先自審察次前滅心漸復逆觀此生分位前前差別至結生心乃至憶知中有前一念名自宿住加行已成爲憶念他加行亦爾乃至從無色沒來生此者依他相續初起此通所餘亦依自相續起文光法師又釋云別明修宿住通加行文重難云從他三千界沒生自三千界人起宿住通憶在他三千界之昔此是可緣他三千界之宿住通從自三千界沒生自三千界之人起宿住通憶在自三千界之昔此是可緣自三千界之宿住通何於宿住通境無自界他界之不同哉答宿住通加行之初位緣自相續他相續色身等故緣自三千界境可云也若加行若根本設自相續設他相續屬過去生者更不可論自界他界之不同於過未法無方處故也不辨此理致強難之條太不可然先年於當時東南院被行當處倶舍三十講之時故賢乘擬講評定云論文既云即此五通於世界境等故於宿住通境可有三千界之不同云事勿論也然二乘凡夫之通力不及他三千界故從他三千界沒生自三千界之人起宿住通憶在他三千界之昔之義不可有也云云此義頗不可也問麟喩獨覺得知麟喩獨覺心他心智可云耶此事十二卷抄中已被記之畢仍略之問麟喩獨覺於十方世界中有並出義可云耶答雖古成不並出之義暫任今案之旨可存並出云義也兩方若有並出之義者麟喩獨覺是最上利根之人也設雖約十方世界何可有並出之義哉是以於大覺世尊者無並出之義見相例可等依之光法師餘處所引婆沙論中云麟角喩者根極勝故樂獨出故當知如佛必無有二並出世間文若依之云爾者今論中述聲聞麟喩佛二三千無數他三千界非麟喩之境界見約十方世界之時何可遮並出之義哉是以答凡論三乘輪王等之並不並者須據行化等勢用之及不及也彼於十方世界論佛之並出不並出者雖當部他部之諍有宗之意立勿薄伽梵功能有礙唯一世尊普於十方能教化故之道理遂成不並出之義此是無一切所有世界之非佛境界之故也准例思之麟喩之勢用若及他三千界者宜自界他界合論談獨出之義彼勢用若不及他世界者獨出之義可唯限自界不通餘界而麟喩之行化既限自界不亘餘界自他兩界合論之時豈無並出之義哉是以婆沙論中云餘世界中有麟喩獨覺出世無理遮故文但於麟喩獨覺是最上利根之人也云難者於二乘凡夫之中者雖最上利根對大覺世尊之時者下中下二根何爲難勢之規模哉次於光法師餘處所引婆沙論文者以三千世界比十方世界以麟喩獨覺類大覺世尊云爾也明知麟喩之三千界與如來之十方界相對云如佛云事若夫以十方比十方以獨覺類大覺者十方與十方雖同獨覺與大覺是異也於所例有一分不齊之過豈得云如佛哉是以披餘處之論判述輪王並出之相偈頌結一二三四州逆次獨如佛長行云如説如來輪王亦爾文是則以一四天下類十方世界以轉輪聖王比無上大覺以云如佛也若如難勢者雖云一二三四州輪王猶於十方世界獨出云義可成之歟其理豈可爾哉重難云會前婆沙論文之旨猶不順文相況見結文云如舍利子尚無並出況麟角喩勝彼多倍文文意云劣於麟喩之身子尚於無數世界而猶無出況於勝於身子之麟喩哉爲言或云劣於麟喩之身子三千界而獨出勝於身子之麟喩於十方界而獨出爲言若爾麟喩獨覺於十方無量之世界不並出云事一段之論文實分明也何只妄設會通哉次重披光法師餘處解釋云又婆沙九十九云問佛得緣佛他心智不有説不得所以者何無二如來倶出世故復有説者得此説能緣不説現起問獨覺得緣獨覺他心智不答麟角喩者准佛應知又一説云有作是説麟角喩獨覺亦定得緣麟喩獨覺他心智亦説能緣亦説現起餘世界中有麟角喩獨覺出世無理遮故雖有二説然無評家前説不言有説且以前説爲正又同婆沙前文文光法師於麟喩他心智之二説判正不之時云前説爲正而前師不云他三千界同獨覺出世後師云他三千界同獨覺出世明知於十方世界麟喩不並出云師是正非邪並出云師是邪非正云事若爾今義意既同第二師之説豈不違光法師之正不哉又以此師之説爲證彌不足信用者歟況又同婆沙前文云結釋無諍指同麟角喩者根極勝故樂獨出故當知如佛必無有二並出世間之文見明知今前師之説與前婆沙文其意是同云事會前文約一大三千界論無並出之義之旨成之彌以違光法師之定判加之婆沙抄中釋上婆沙文云麟角獨覺亦有二説前説爲勝在他界中亦無獨覺故文其意全同光法師之解釋如何答於如舍利子尚無並出況麟角喩勝彼多倍之文加二料簡以爲難勢太不可然先就初之料簡身子雖利根約三乘之時是聲聞也則是下根也故云其起行化等者纔滿二千界不及三千界以此分齊爭於無數世界獨出云義可成之哉頗不足言之難勢之歟就後料簡今擧劣之身子以況勝之麟喩也而論身子與麟喩之勝劣身子於二千界得自在麟喩於三千界得自在其勝劣只是一千界増減之分齊也何乍成身子一三千界中獨出之義至麟喩忽與佛同於無數世界獨出之義可成之哉論如來與麟喩之不同者螢燭與日光尚足相對迷盧與芥子可及校量大覺與獨覺更非所敵況尚之字與況之字於一界之間顯二千三千之差異見文意云於二千界得自在之身子尚三千界中不並出況於三千界得自在之麟喩此界中得並出哉爲言故尚況之二字就今文尤爲肝要而後料簡中不用彼二字頗爲無念者歟次於麟喩他心智二説之正不者凡他三千界非麟喩之境故設雖於他三千界有麟喩出世他心智加行不可緣彼故不可起知麟喩心之他心智云事必然也故初師意或云總不得之或云雖得而不現起是正義非不正義後師意於決定不起之智品云亦説能緣亦説現起故是不正義非正義也若爾光法師之正不尤殊勝也會通之趣何可致相違哉就中全非簡他三千界有麟喩出世云義何不得引彼爲今義之證哉又初師更不云他三千界無麟喩出世之義何爲違文哉次婆沙抄之釋准前可會之也尋云婆沙抄上文云問佛得緣佛他心智不有説不得無二如來倶出世故有説得緣此説能緣不説現起雖無評家前説爲善文光法師意同此釋耶答光法師意不同彼也難云於獨覺之二説判正不者是同也今何異哉答獨覺之初師中含云不得與云得而不起之二師之義故云准佛應知故是正義也後師云亦説能緣亦説現起故是不正義也而開獨覺之初師意顯如來之二師説故述如來他心智之二師倶是正義也然無評文故光法師不判正不示倶正之旨爰淨達法師不辨深致無左右判正不恐不足爲指南矣又難云婆沙論中於有頂無上緣惑無上地有説有上緣惑説能緣不説現起云云取意然評家破第二師見准例思之今云得而不起之第二師豈非不正義哉若爾淨達師之正不尤有其謂如何答於功徳者未來藏中雖有過恒沙之法體不串習之故或云不得之或云不起之皆有其謂於惑品生無始以來極串習之法故無乍有不得之無乍有不起之而第二師於煩惱説能緣不説現起之旨存之故評家破之也染淨之廢立粗必一准混而不可難之此是相承之實義也後學敢云可忽諸矣此事第十二卷抄中雖被記之今存別義之間故錄之問二乘聖者及異生於離染時得未曾得五通可云耶答二乘聖者得之異生不定也可云歟兩方若得之者凡五通是難起難得功徳故別除通障所起得之也何於離染時可輒得未曾得之類哉是以正見偈頌之文云未曾由加行曾修離染得文若依之爾者二乘異生之種類分萬差未曾修習之五通非一准設雖離染時豈無得之義哉依之廣勘性相之決判可得之歟被得如何答次第證之人斷欲界煩惱之第九解脱得不還果之時兼得未曾得五通可云也若不爾者聖者之乍斷欲界煩惱可不成自乘所得五通寧得有是處哉若唯還得異生所得之五通者彼是可無始所受之五通何可云自乘所得哉例如離欲者第十六心得無漏他心智又二乘聖者初盡智位必可得無學所得之五通豈非未曾得之類哉若不爾者亦無有是處准前可思之以何知者餘卷偈頌中或結無學初刹那修九或修十鈍利根別故或云無學鈍利根定成九成十文若猶殘疑者於無學初念寧可得他心智哉何況無諍願智四無礙解等之爲極難思議之功徳猶於麟喩獨覺及三州利根無學之聖者者初盡智位得之況爲共凡徳之五通設雖未曾得之類何不云金剛心無間得之哉又於異生中後有菩薩在菩提樹下著金剛座上預以六行智之觀門斷下八地之煩惱之時至欲界第九解脱道豈不得未曾得之五通哉若不爾者更無有是處亦准前可思之故光法師所引正理論中云三乘聖者後有異生通得曾得未曾得者所餘異生唯得曾得文但於五通是難起難得之功徳也云難者二乘既爲斷惑證果之聖人異生亦爲三祇百劫極滿之大士何以得之爲難哉故於離染時兼得未曾得五通也次於未曾由加行曾修離染得之頌文者是大綱之説非盡理之談所以然者雖未曾得之類離染時亦得之雖曾得之類現起必依加行故故如是五通若有殊勝勢用猛利未曾得者由加行得若過去世已曾串習無殊勝勢用及未來世是彼種類由離染得二乘異生隨其所應若加行得若離染得若起現前皆由加行文未曾得之離染得雖不見今文准上可思之問凡夫二乘起曾得五通現前時用加行可云耶答可用加行也兩方若用加行者凡起五通之時用加行者爲引起無間道令斷通障也而曾得之通先已得之故不可有除通障之義寧可有用加行之義哉若夫強成起曾得通之時用加行之旨者與未曾得何差異可有之哉是以於大覺世尊者初盡智時得一切功徳故後時起之時不用加行釋相例可同若依之爾者光法師解釋之中云二乘異生隨其所應若加行得若離染得若起現前皆由加行文如此文者設雖起曾得通現前之時可用加行被得如何答凡夫二乘起曾得五通耶否事未治定者歟然者無左右起之云事如何然而准佛世尊及例後有菩薩之解之餘異生暫成二乘異生起之云義者必借加行起之云義可存之也所以然者如來爲上根之上酬三祇百劫之修因於一切功徳得自在故初盡智時悉得之更無所不得無所不得故正起之時全不借加行彼餘異生所得唯限曾得不通未曾得故唯起曾得不起未曾得雖然是薄地底下之類故總不得功徳自在故正起之時必用加行也得與起相望之時得是易起是難故也二乘雖或是中根或是下根由三生六十四生百劫之修因不限曾得兼得未曾得也是猶不得功徳自在故正起之時不限未曾得之類於曾得之通亦用加行也通餘異生可思之後有異生在樹下離欲惑之後起五通耶不起耶事亦未治定假令起之者曾得耶未曾得耶事亦未治設雖起曾得之通准二乘及餘異生必可起加行也於諸功徳不借加行者就果位論之故光法師上標二乘異生下結若起現前皆由加行其旨實炳然也如此成之時難勢自被遮畢但於起曾得之時用加行者與未曾得可有何差異哉云難者未曾得之通是勝品也曾得之通是劣也設雖同用加行何可其不同哉尋云光法師今解釋中述若加行得若離染得若起現前皆由加行之釋之起盡未得其意若以加行得名加行者宜招繁重過若以離染得名加行者名言既相違如何答於此文可有多料簡一以若加行得若離染得之句屬上二乘異生隨其所應之文故無相違也二以今句屬下若起現前皆由加行之文其所以者若加行得者云若未曾得之意也若離染得者云若是曾得之意也如云未曾由加行曾修離染得何招疑哉三上云若加行得若離染得者是約得以論下云若起現前皆由加行者是約起以談何爲相違哉重意云設雖加行得之通設雖離染得之通正起之時必由加行爲言歟問今論意宿住通唯限法念住可云耶答可通四念住也兩方若限法念住者正見今論文偈頌結念住初三身他心三餘四長行云宿住漏盡四念住攝通緣五蘊一切境故文宿住通不限法念住廣通四念住云事今論文實分明也若依之爾者光法師所引婆沙論中云念住者唯是雜緣法念住尊者妙音作如是説通四念住如契經説我念過去受樂受苦既知樂苦即是受念住評曰應作是説念過去世諸樂苦具名受樂苦非但緣受故彼非證然宿住隨念智總觀前生分位差別唯是雜緣法念住攝文設雖今論意何可違婆沙之評家哉加之披正理論説云而實宿住法念住攝雖契經説念曾領受苦樂等事是憶前生樂等受所領衆具即是雜緣法念住攝文如何答凡於宿住之事可有總別不同其中若總緣自他分位等之時設雖隨應是雜緣法念住攝若別緣五根五境無表色等者是身念住若緣五受三受等者是可受念住若緣五識六識等者是可心念住若緣自餘心品及不相應行者是可法念住寧可云不通四念通哉若無宿住通緣別法之義者不得願智之無學聖者及離欲之凡聖終可不得知過去別事豈可爾哉世親論主深得此意判宿住漏盡四念住攝通緣五蘊一切境故歟何況以無學所得之宿住通名宿住智證明治過去際之愚見定知無學聖者緣過去總別二事云事若夫緣總不緣別者設雖知總事不知別事如何得治過去之愚哉若不得治過去之愚者爭可得三明具足之稱哉第五二六明治三際愚故之偈頌頗炳然者哉則苻念住初三身他心三餘四之今頌彌以爲四念住之龜鏡但於婆沙評家之説者尤爲違文然而光法師既不作和會之釋直述我以理爲正非以婆沙評家爲量雖同妙音亦無有過經分明故不應異釋學者何可致劬勞次於正理論之文者正理論師故違此論者出光法師處處之解釋何以違彼論爲痛哉況既不以違婆沙之評家爲苦寧可勞正理之文何況倶舍師亦救之云我許宿住亦有別緣故通四念文彌以非難矣重難云見上論文述宿住隨念智力之時偈頌長行之中同不云通四念住還知是顯限法念住之旨云事依之光法師釋彼文之時引婆沙論宿住隨念智力唯法念住之文畢云宿住隨念智力通緣過去五蘊爲境亦唯法念住文明知今論意同婆沙之評家亦存唯法念住之義云事若爾光法師釋今文之時尤可作和會之釋何無左右可設論意各別之釋哉次正理論意既同婆沙之評家何可以故違此論之意會之哉次光法師今解釋之中云經分明故文還知今論意不存理云事若爾我以理爲正之釋豈不招相違哉答於明處非處等十力之上論文者偈頌長行倶述十智與依地及依身等之相未致念住等之細釋隨而光法師向彼文之時牒釋述宿住死生智依靜慮餘通贍部男佛身之三句偈頌之長行云已辨自性至男子佛身者釋第七第八第九句第八宿住隨念智力第九死生智力五通性故依四本定餘八通依十一地俗智寬故依身可知文光法師釋此文之時全不云唯法念住何可疑論文疑解釋哉次引婆沙加自釋者論文之解別爲顯才學勘餘論之説也故次下云又約念住分別者如婆沙三十四云念住者宿住隨念智唯法念住解云宿住隨念智力通緣過去五蘊爲境亦唯法念住文既向婆沙論判亦唯法念住故更非相違次今就他心三餘四之偈頌並宿住漏盡四念住攝之長行不作和會之釋者婆沙既上擧云限法念住云通四念住之二師之異説畢下述評曰應作是説念過去世乃至然宿住隨念智總觀若生分位差別唯是雜緣法念住攝故今論云通四念住之文分明也婆沙云限法念住之旨必然也誰敢得融會哉若爾今論前後更不致相違婆沙首尾亦能苻合光法師釋分兩論之所説唯作論意各別之釋實足爲指南者歟次經分明故者理之上設證彌成通四念住之義也何可還難我以理爲正之釋哉又難云就十力之解釋疑難猶不開所謂明十力之論文中雖明十智門依地門依身門名力之所以等之諸義未明念住門之相故引婆沙釋加之見故云又約念住分別者如婆沙三十四云等文又之言如之言其旨頗炳然也若欲別顯婆沙意者尤可云若依婆沙等歟既不爾明知引彼論於此論故爾也云事就中又約念住分別者者釋此論如婆沙三十四云等者讓此論意於婆沙論也如何答此難尤可然若強會之者又者顯別題目故爾也不云亦而云又其意在斯如者是指事之如非譬喩之如可思之問神境通者唯限善性可云耶答雖有所可思限善性可云也兩方若限善住者凡於通果無記意識五識相分之中意識通果者變化心發業心是也其化事發業之二類既爲神境通之所攝是以見下頌文云神體謂等持境二謂行化乃至能化心十四定果二至五如所依定得從淨自生二化事由自地語通由自下文若爾神境通不限善性亦通無記云事文理實分明也若依之爾者今論頌中致六通之三性分別云天眼耳無記餘四通唯善文如此文者唯限善性不通無記見如何答於神境通可有根本眷屬之二類也其根本者正緣行化二事以爲境之定中之慧可是被云餘四通唯善之隨一之通故其眷屬者從彼定已後所起之變化心從彼定已後所起之發業心可是被云神境通果能變化心力能化生一切化事乃至化所發言通由自下謂欲初定化所發言此言必由自地心起上地起語由初定心之通故若爾約根本神境通判三性之時云善性約眷屬神境通判三性之時云無記也然今云餘四通唯善者以根本攝四通中以所云爾也全非遮神境通之稱亘眷屬之邊例如於死生智通有根本眷屬之不同其根本唯緣現在緣色處而是無記其眷屬者緣未來緣色處聲處法處等而是善性也彼根本是天眼通彼眷屬是根本之流類也故光法師釋云謂天眼通於現在世見有情類死此生彼其死生智復知有情死此生彼流類相似故由彼引是彼眷屬名天眼通如變化心是神境智證通攝彼通能作運身等用彼變化身能變化事流類相似故在彼攝若説天眼通名死生智從果爲名若説死生智名天眼通就因爲名文如此得意之時兩方之難勢還爲講答之誠證仍不及設會通重難云天眼天耳二通亦神境通之果也何不名神境通哉若不以眼耳二通名神境者化事發業二通亦不可得神境通之名如何答光法師釋此事云餘通雖亦依定此通相顯偏標神名文問頌文云天眼耳無記文爾者異熟等諸無記中何可云耶進云光法師釋云是通果無記文付之凡天眼天耳者其體是通也何可立通果之稱哉既非通果寧可得無記之名哉是以披光法師餘處定判述雜心論意云天眼天耳是威儀無記文何況勘寶法師處處解釋或問生上三定起下眼耳二通是何無記答應言四無記心攝心不盡借識之類非四攝也或問既四無記攝無記心不盡未知借識是何無記答此借識心是自性無記若爾者是通果無記之解釋非只背道理亦似違論家定判及自他之兩釋如何答凡天眼天耳二識無擁遠見遠聞故名通然以定爲因而生故名果通即果故名通果此通果非善染故無記也豈非通果無記哉故光法師釋云問既是無記四無記中是何無記解云是通果無記問既天眼耳相應慧名通如何名通果解云即通名果故名通果無擁故名通從定生名果文其旨明鏡也何足爲疑哉如此成之時難勢亦被遮畢但於光法師餘處之定判者古徳惡得雜心論意故擧彼邪義述雜心論主達磨多羅造對法藏中説天眼天耳是威儀無記更非爲自義云爾也故至下引彼論廣心相生之説備證據以破古徳之釋見若夫約雜心論意者光法師如何可破之哉何況光法師餘處解釋中述彼論意云雜心説異生性應知即是非得少分如變化心是通果少分雜心略擧一邊非爲盡理文誰可疑之哉次於寶法師之解釋者雖有學者之異義暫成一義意者彼師意有四無記心外別有自性無記心心所之義之曰爲證彼義所判爾也其猶不云二通正是自性無記汎借起二識是自性無記之旨顯之也是以勘寶法師處處解釋或釋威儀路等三無覆心色香味觸爲所緣境工巧處等亦緣於聲如是三心唯是意識之論文七云此説通果心唯意識據化心説文若不許五識通果者寧可會據化心説哉或引正理論若生第二靜慮以上起初靜慮三識身時諸有未離自地染者彼從自地善無記作意無間三識現前三識無間還生自地三種作意諸有已離自地染者除染作意唯善無記作意無間三識現前三識無間亦唯起此二種作意之文者准此諸識非通果也文上三靜慮所起眼耳身三識中可有通果無記之旨還自被知者歟抑寶法師作如此解釋者爲顯汎借起耳識之爲自性無記也故或述應言四無記心攝心不盡借識之類非四攝也耳識非威儀上地無工巧變化唯應識故或云此借識身是自性無記耳識非威儀非威儀無記上地無工巧非工巧無記變化唯在意非變化無記異熟非異地起非異熟無記以此故知唯是自性文汎借起眼識猶非自性無記況於定所生眼耳二識哉明知二禪以上所起眼耳二通是通果無記云事准知欲界初靜慮所起二通亦爾也不可有相違此事二卷抄中委細旨已被記之了仍綱概注之論義之作樣與上不同也後學能可思合之問依身在初靜慮所起天眼天耳二通通善可云耶答不可通善也兩方若通善者凡天眼天耳無記性攝許此二體是眼耳識相應慧故者今論之定判也設雖依身在初靜慮所起之二通何可有通善之義哉若依之爾者光法師解釋之中述二通三性分別之相云言非善者五識是生得善者不得異地起故文准今此釋於依身在上地所起之二通者設雖限無記依身在自地所起之二通可通善歟被得依之勘品類足論之説問通云何答謂善慧若夫眼耳二通終不通善者何可總答謂善慧哉其善慧二通者則在自地所起之眼耳二通云事炳然也如何答凡天眼天耳二通唯限無記不通善性者有宗一家之性相諸論一同之定判也何可假及問端哉是以披今論餘處之文偈頌結無記得倶起除二通變化長行云謂眼耳通慧及能變化心勢力強故加行差別所成辨故雖是無覆無記性攝而有前後及倶起得若工巧處及威儀路極數習者得亦許爾文當處偈頌結天眼耳無記餘四通唯善長行云天眼天耳無記性攝許此二體是眼耳識相應慧故文婆沙雜心正理顯宗等之説更不及異端仍不引之依之光法師今解釋之中牒釋今論文云此六通中至相應慧故者此下釋後兩句三性分別眼耳二通是無記性許是二識相應慧故文寶師神泰圓暉法師等之解釋亦不設異釋故不引之設雖依身在初靜慮所起之二通若有通善之義者諸論中何不明其相哉諸師釋何不述其義哉但於光法師五識是生得善不得異地故之解釋者尤有深意所謂於初靜慮所繋之眼耳二通有上地所起與自地所起之二類其中爲顯上地所起二通之限無記之所以述五識是生得善不得異地起故爲顯自地所起二通之限無記之所以云或色界生得善不能生定心以後二通唯定相生故文其旨思而可知若爾光法師既顯於上地自地所起之二通倶限無記不通善性之旨何可及疑哉就中五識是生得善不得異地相起故者顯土地所起二通之限無記之旨何以之爲難可成自地所起二通通善之義哉況上已云眼耳二通是無記性等畢有此釋何爲疑之端哉次於品類足論之説者論中正會之云彼據多分或就勝説文文意顯也然光法師就此文作多釋恐繁略之後學必悉之重難云光法師或色界生得善不能生定心等云未盡理若初靜慮生得善眼耳二通之攝者宜與自地定相生其色界生得善不與定相生者約汎爾生得善云爾也更不可遮二通所攝生得善之與定相生之義例如光法師餘處解釋中答若説成下即不應言生上三定眼識現起方言得識若不成下與彼化心同是通果同是無記何故成下化心不成二通之問作三釋之中初釋意云解云生上三定成下二通是通果故如成化心論不説成據汎借説則禪那院珍海已講明眼抄中成依雜心論意天眼天耳二通是威儀無記云義之時會通果無記與定相生威儀無記不與定相生二通若威儀無記者不可與定相生云難云威儀心不與定相生者據汎爾起威儀心而作説若存以二通爲威儀無記之義者宜存威儀心與定相生云義例如光法師第二卷疏中成生上三靜慮所起之二通有三世得之旨之時會論中不云生上三靜慮成下二通云論不説成據汎借説云云取意如何答生得善者生便得故之法也眼耳二通者加行所得之法或離染所得之法也三得既各別也混而不可生疑但於光法師論不説成據汎借説之釋之例難者生上三靜慮所起之眼耳二識者若汎借起若定生同五識所攝也同初禪所繋也同無覆無記也其體宜混亂然欲分其差異之時尤約汎借起與定所生可顯其相而汎借起之類是劣故不可有前後二得定所生之類是勝故須可有前後二得也爲顯此意會論中不云以前後二得成下眼耳二識之日述論不説成據汎借説尤有其謂何以之爲例則可成初靜慮所起之二通通善云義哉次於珍海已講依雜心論意天眼天耳二通是威儀無記云義成之時引論不説成據汎借説之釋云例難者此事爲面白之題目仍末學之所依憑也然而雜心論意以二通爲威儀無記云事是大之謬也仍所被思寄雖爲珍重根本之義既非正所例何爲指南哉問正理論意天眼天耳二通以眼耳二識相應慧爲體可云耶進云光法師所引正理論中以意識相應勝無記慧爲體見付之既云眼耳二通何可關意識相應慧哉是以今論中云天眼天耳無記性攝許此二體是眼耳識相應慧故文設雖正理論意何不有此等之文理哉何況意識相應勝無記慧不能遠見遠聞寧可得通果之稱哉加之二通是禪定所生法也若從勝無記慧而生者更不可云通果無記豈不背諸論一同之説哉抑爲見色聞聲乍起禪定不引發眼耳二識令現起意識相應慧有何深由耶答凡以六通爲解脱道攝者有宗一家之性相諸論一同之定判也故正理顯宗兩論中無改今論解脱道慧攝之頌文故知衆賢論師意天眼天耳二通爲解脱道攝云義存之云事而得果練根等解脱道是意識非五識設雖六通解脱道何可有通五識之義哉之道理立之然存通果無記之義故無間道無間建立意識相應勝無記慧以爲解脱道則以之爲正通體從此引起眼耳二根及彼二識遠見遠聞爲言故光法師所引正理論中破今論天眼天耳無記性攝許此二體是眼耳識相應慧故之説云此釋不然六通皆是解脱道攝眼耳二識是解脱道理不成故應作是説四靜慮中有定相應勝無記慧能引自地勝大種果此慧現前便引自地天眼天耳令現在前爲所依根發眼耳識故眼耳二識相應慧非通倶可説言是通所引文光法師釋此文云正理論意六通解脱皆是意識眼耳二識是五識攝非解脱道應作是説四靜慮中從淨定起有勝無記慧與淨定相隣出入名定相應淨定爲無間道意地勝無記慧爲解脱道即二通自性能引自地勝大種果造天眼天耳爲所依根發眼耳識故眼耳二識相應慧非通但可説言是通所引意地勝無記慧體非眼耳能引天眼天耳從果爲名故名天眼天耳通二識相應慧體非是通而言通者通所引故從因爲名言通果者若眼耳二識相應慧果非通言通果者通之果故從因爲名依主釋也若意地勝無記慧是通非果或亦是果定所引故名果無擁故名通即通名果持業釋也文論判解釋立理兼會難故今之疑皆悉被遮畢重難云光法師解釋中述倶舍師救云本起二通爲遠見聞得遠見聞即顯無障眼耳二識名解脱道何理能遮如他心通等解脱道中知他心等斷惑解脱可唯意識無擁解脱何妨通五若説意地勝無記慧名爲通體能見聞耶若不見聞然名通者起通何用若謂引大種及引眼耳本起二通欲遠見聞非引大種等又復自有勝善定引何須無記劣慧引耶又彼所言有定相應勝無記慧何處有定是無記耶而言相應若謂別有勝無記慧與定前後出入相順名定相應應言相順何謂相應此即言失又諸經論皆言天眼天耳二通不言意識勝無記慧名爲通體非但與理相違亦無文可證由此理敎二識相應慧定是通體言通果者定所引故名果無擁故名通即通名果持業釋也文安慧菩薩能通難還加破衆賢論師如何亦可加難設釋哉答尋云衆賢論師意天眼天耳二根定無間歟勝無記慧倶生歟答任今文相幷准恒同分無闕之道理者彼無記慧與眼耳二識倶生可云也此尋者第三卷抄中成之畢仍略之又尋云光法師釋云或同正理無勞異釋文爾者今論意許以彼勝無記慧爲二通體云義歟答問當處付説三明相且於六通中以何通爲死生智明體判耶進云頌文判第五二六明以天眼通爲其體見付之凡天眼通唯緣色處不緣聲等唯緣現在不緣未來而死生智通廣緣三業亦緣未來二通之行相遙異也何以天眼通爲死生智通之體可云哉答凡死生智明者是天眼通之眷屬非天眼通之當體所謂先起天眼通觀見五趣有情等然後起死生智通緣當來三業等事也故論中問若爾何緣説死生智知有情類由現身中成身語意識惡行等答非天眼通能知此事有別勝智是通眷屬依聖身起能如是知是天眼通力所引故與通合立死生智名光法師釋答文云非天眼通能知語意以天眼但知色處有別勝智是通眷屬依聖身起能如是知此眷屬智是天眼通力所引故所以與通合立死生智名問何故死生智是天眼通所引眷屬答解云謂天眼通於現在世見有情類死此生彼其死生智復知有情死此生彼流類相似故由彼引是彼眷屬名天眼通如變化心是神境智證通攝彼通能作運身等用彼變化心能變化事流類相似故在彼攝若説天眼通名死生智從果爲名説死生智名天眼通就因爲名問若説死生智名天眼通何故婆沙七十六云死生智觀未來事解云彼據眷屬對宿住説言觀未來又問若死生智能緣未來何故婆沙三十云死生智力過去緣過去現在緣現在未來生法緣未來若不生法緣三世解云彼據根本不言緣未來或據眷屬眷屬有二一緣未來二緣現在此據緣現在又問若死生智通緣三業何故婆沙三十云死生智力緣色處解云彼據根本言緣色處若據眷屬通緣三業或據眷屬眷屬有二一緣色處二緣三業彼據緣色處説文論長行既會偈頌光法師亦致問答其旨已委悉也不可及學者之劬勞者歟尋云通緣三業者爲總依爲當別緣歟答可有二意初後別故可思之問死生智明善無記二性中何可云耶答可云善性也兩方若善性者偈頌中結第五二六明死生明以天眼通爲其體見而天眼通既爲無記性死生智寧可善性哉若依之爾者光法師所引婆沙論中云十力唯善文定知死生智力非無記云事十力之中死生智力既爲善性三明之中死生智明其義可同如何答死生智明是善性非無記云事更不可疑之其旨如一方之難勢重見光法師之解釋云彼據眷屬説死生智力唯是善性若據根本天眼通説唯是無記若據現起緣境寬狹應知天眼通狹唯緣現在色處死生智寬緣五蘊或緣現在或緣未來文但於偈頌文者主伴因果合立故爾也若離論之者宜云天眼通是無記死生智是善性也故論長行中云與通合立死生智名文以此論文合光法師釋可思之不可有相違尋云光法師何故論善無記差異之時兼明緣境寬狹耶答天眼通限五識故唯緣現在死生智限意識故通緣現未又天眼通限眼識故唯緣色處死生智限意識故廣緣五蘊之義顯之也此則還成天眼通是無記死生智是善性之不同也問光法師解釋中付明天眼通與死生智差別相且死生智明唯緣未來可云耶答可有二意也兩方若唯緣未來者光法師解釋中有緣現在之義見若依之爾者正見論文云死生智通治後際愚文測知唯緣未來云事若夫強有緣現在之義者與漏盡智明何差異可有之哉何況於天眼通亦似致混亂以何可分主伴因果之不同哉答天眼通與死生智相對論緣境不同之時於死生智緣境可有二意也所謂死生智是意識改或唯緣未來之類有之或通緣現未之類有之其唯緣未來之類者於現在境者根本天眼通已緣之故眷屬死生智不重緣之故彼所不緣今始緣之由尤有其謂者歟其通緣現未之類者此眷屬通乘彼根本通而起之故初念能緣天眼通所緣境流類故唯緣現在境後念任所樂故兼緣未來也豈不爾哉例如死生智中有唯緣色處通緣三業之二類也故光法師解釋中云又問若死生智能緣未來何故婆沙三十云死生智力過去緣過去現在緣現在未來生法緣未來若不生法緣三世解云彼據根本不言緣未來或據眷屬眷屬有二一緣未來二緣現在此據緣現在問若死生智通緣三業何故婆沙三十云死生智力緣色處解云彼據根本言緣色處若據眷屬通緣三業或據眷屬眷屬有二一緣色處二緣三業彼據緣色處説如此成之時兩方之疑難還爲二義之潤色何爲相違哉但於若緣現在者可違死生智明治後際愚之論文云難者設雖緣現在何無治後際之義哉例如不淨觀緣現在而伏未來煩惱是不現前也況緣現在者爲緣未來之方便何爲難勢之端哉次於與漏盡通可相濫云難者緣現在之功徳是多何可必致混亂哉況漏盡智明以六智或十智爲體死生智明唯以俗智爲體何可爲疑哉尋云死生智緣色處者限身表業歟通非業色處歟答又尋云死生智緣三業者唯限三業歟通業倶有法及餘非業諸法歟答問論文云是天眼通力所引故與通合立死生智明文爾者爲天眼通無間起死生智爲當餘心間隔可云耶答兩方若無間起之者天眼通是無記也死生智是善性也天眼通在五識死生智在意識天眼通緣現在死生智緣未來天眼通緣色處死生智緣三業既三性六識三世六境是別也何可有天眼通無間起死生智之義哉尤可云餘心間隔哉例如天眼通無間不起宿住通也加之變化通果心無間不起發業通果心見相例可同是以論中述通果心必與定心相生之義云如從門入還從門出文若夫天眼通無間起死生智者豈不違此等文理哉若依之爾者以死生智爲天眼通之眷屬者今論疏之所定也定知天眼通無間起死生智云事若非無間相生者寧可有爲主伴之義哉答驚今疑案此事雖未審定暫可致天眼通無間起死生智云義也所謂論疏中同以天眼通爲主爲因以死生智爲伴爲果亦合立死生智名明知彼此相生故爾也云事故論中云非天眼通能知此事有別勝智是通眷屬依聖身起能如是知是天眼通力所引故與通合立死生智名文光法師釋此文云非天眼通能知語意以天眼通但知色處有別勝智是通眷屬依聖身起能如是知此眷屬是天眼智力所引故所以與通合立死生智名若説天眼通名死生智從果爲名若説死生智名天眼通就因爲名文若夫天眼通無間起餘心然後起死生智者天眼通所見之有情與死生智所知之有情時分既間絶忽爲異類有情何爲知未來有情死此生彼身語意等起天眼通知現在有情死此生彼等事之義可有之哉既爲知未來事兼緣現在事明知天眼通無間起死生智云事其旨實必然也更不可疑之但於善無記不同云難者善無記之相始不可疑之如通果心豈非與定相生哉次於五識意識之不同之難者此亦常事也更非疑之端者歟次於現未之不同者五識前念起唯緣現在意識無間起廣緣三世何爲怪哉次於六境之不同者此亦准前可思之次於天眼通無間不起宿通云例難者宿住通非天眼通之流類何爲相例哉次於變化通果心無間所起發業通果心云難者能變化心與發業心行相頗異也亦所變化事與所發業其相大替故不能變化心無間直起發業心中間亦入定然彼起發業心也故非相例次於如從門入還從門出之論文者彼就化事發業二種通果及天耳通並異生有學二人所起通心亦死生智與無學所起天眼通云爾之旨成之者更不可爲相違況死生智亦必與定心倶生故設雖生死生智之天眼通何可違如從門入還從門出之論判哉問以他心通攝三明可云耶進云頌文結第五二六明不攝之見付之五通中天眼宿住二通既爲三明之攝他心通豈不爾哉何況他心通既爲唯緣現在之智是治中際之愚何不攝之可云哉答凡以漏盡通爲一明不以他心通爲一明者漏盡通能知𣵀槃常住實樂故還除世間無常假樂故立之爲漏盡智明他心通唯知有爲法不知無爲法既不知無爲法何得除有爲樂哉故不攝之明中也彼宿住死生二智之知過去事則以之爲明者此亦非以知過未直爲明是破不知過未之盡故也治中際之明准例可知者歟若爾結第五二六明治三際愚故之時不以他心智爲明之義已必然也何足爲疑哉如此得意難勢悉被遮者歟重難云若爾宜唯以世法類𣵀槃盡無生六智爲漏盡智明之體隨應悉緣𣵀槃故於苦集道三智及他心智者不緣𣵀槃故不可爲漏盡智明之體然今論上文云盡六或十智文如何答准正理論意成上義若依今論意者以知三世法爲三明以不知爲三際愚而宿住通知過去死生智知未來故爲之前後兩際之能治漏盡通知現在諸法故爲之中際之能治非謂云爾故漏盡通不緣過未境以過未已開宿住死生二智故不云漏盡通遣前後兩際愚也如此之例證頗是多不遑勘之故光法師釋云於中最後漏盡智明或六智性或十智性文若漏盡通唯緣漏盡者尤可限六智何可通十智哉但不以他心智爲中際之能治者唯知心心所不知色不相應等知法少故爾也世法類盡無生五智雖有緣無爲多緣有爲故起之滅智雖唯緣無爲是二智少故不簡之約多分而設説故也次於不以約盡一通爲三明者准之雖似有其疑今乘六通就六通建立之故爾也誰可疑之哉次願智亦准前可思之也一義云今論意兼亦致正理意也問正理論意漏盡智明治中際愚可云耶答治中際愚可云也兩方若治之者正見光法師所引正理論之文云起漏盡通觀𣵀槃樂文而於𣵀槃者無有三世相何可有觀𣵀槃樂治中愚之義哉若依之爾者衆賢論師無改今論治三際愚故之偈頌明知漏盡智明治中際愚云義存之云事如何答憶念自他過去事除忘失前際之愚昧之智名之宿住智證明觀察他身未來事除不知彼際之愚昧之智名之天眼智證明知見𣵀槃眞實樂除愛著現在之愚昧名之漏盡智證明也故光法師所引正理論云宿住智通憶念前際自他苦事死生智通觀察後際他身苦事由此厭背生死衆苦起漏盡通觀𣵀槃樂文良以不知𣵀槃常住眞樂異生愛著現在無常似樂緣漏盡智豈不除中際愚哉如此得意之時起漏盡通觀𣵀槃樂之文已爲講答之誠證何還備疑難之潤色哉尋云羅漢果聖者起三明時自他倶中遣何愚耶答既爲羅漢果聖者故更不可云遣自身愚宜云除迷三際之有情愚昧也問不以他心通攝三示導中可云耶進云偈頌中云第一四六導攝之見付之不以他心通攝三明中見例可爾如何答三示導者偏是説法化導之功徳也故以他心通其功徳中攝之誠以若不知他心者爭得化他哉他若不信能化者其化導不可成故也能化知所化心品之時所化則信能化導此時得成豈不爾哉故光法師釋云記心能令信受文但於三明之例難者彼廢立者若我不除三際愚者爭得知三際法哉若我不知三際法者何得令他治三際愚哉故我先除三際愚知三際法然後可令他治三際愚令他知三際法也而他心通雖纔知他現在心心所中隨一法不得兼知餘法故所不以他心通攝三明中也義門遙異也混不可難之問當處付明神境通相且正理論意於勝解通無遠行義可云耶答有遠行義可云也進云光法師所引正理論中云本無來去何謂遠行此實不行文付之依正理論之所説披倶舍論之定判偈頌結行三意勢佛運身勝解運通長行云二者勝解謂極遠方作近思惟便能速至文光法師釋此處云由勝解力極遠速至文論判解釋深叶道理設雖衆賢論師意尤可致有遠行義之旨何可判此實不行哉答此事實以難思仍會之可有多料簡然而存略成一義者本無來去何謂遠行此實不行者意云於此處而生之法則於此處當滅於彼處而生之法則於彼處而滅更無有於彼處而滅來此而滅之義爲言例如餘處論判中述諸有爲法纔得自體從此無間必滅無若此處生即此處滅無容從此轉至餘方故不可言動名身表然由勝解力於從此處至彼處之中間聚集諸色無間相續次第轉生速疾故之釋有行處也爲言故次下文云但由近解行極速故得勝解名文如此得意之時更不可爲相違重難云若依此義意者不限勝解通於運身意勢二通亦可作此釋何不爾唯限勝解如此判哉答於運身勝解意勢三通各皆可有眞實假相二門其眞實門之時三通倶無行動假相門之前二通同有行動然影略故如此判也可思之就此疑猶可義勢恐繁故略也問當處付神境通相且今論意於意勢通有中間間斷義可云耶答不可許之也兩方若有此義者凡行者自從此至彼之時於中間無間斷之義若於中間有間絶者何可論行之義哉是以見今論之文偈頌結行三意勢佛運身勝解通長行云於此三中意勢唯佛乃至謂我世尊神通迅速隨方遠近擧心即至文今論意不許中間間絶之義云事此等之定判分明者歟何況於意勢通有間斷之義者於死此生彼之中間更不可許中有若夫於中生二有之中間不許有者忽同大衆部之計若同彼部計者非只背道理豈不招違宗之過哉若依之爾者光法師今解釋中引正理論如日舒光蘊流亦爾能頓至遠故説爲行若謂不然此沒彼出中間既斷行義應無或佛威神不思議故擧心即至不可測量故意勢行唯世尊有之文了云正理論解一即擧喩以顯二即讃不思議然意不許中間間斷文論判解釋無諍對今論意許間斷之義若此判被得如何答凡於色蘊有行動於四蘊無行動者性相之所定也此則色法有方處非色無方處之故也彼於欲色界者有方處故死此生彼之中間立中有於無色界者無方處故死此生彼之中間不立中有其意在斯如餘處論判中述以無色界無有方所過去未來無表無色不住方所理決然故云謂於是處得彼定者命終即於是處生故復從彼沒生欲色時即於是處中有起故爰知依身欲色界有情之名死此生彼若從此往彼或乘神通力或乘業通力必相續運轉無中間間斷云事若不爾者忽同大衆部之不立中有之計餘處之問答決疑有何所表哉若爾今論意於意勢通行度不可有中間間絶之義云事更不可疑之何假爲怪哉何況正見論文之起盡述意勢通之相云擧心緣時身即能至云隨方遠近擧心即至又述行三意勢佛述行復三種至之言行之言豈非顯不間斷之義哉若有間斷之義者行至之言方爲無用詞微理明之論説頗似虚捐者歟但於正理論之説光法師之釋者意勢通之至他三千界等近方近極速疾而無間斷之義顯之故或約喩或約法談之時其義往復運重故云若謂不然也更非對今論云爾者哉若對今論者宜置經至等之言而破之既不爾何足爲怪哉光法師隨而顯彼論意云然意不許中間間斷也若正理論師破此論者光法師何不替倶舍師設會通之哉恐今疑勿論勿論不足言者歟問光法師定判中答若非間斷如至極遠度一極微經一刹那如何擧心身即至彼問作三解釋爾者初釋意如何述之耶進云光法師釋云解云此讃極速言擧心緣身即至然於中間亦經多念身微妙故非餘所見大而不停故能速至文付之凡今解釋雖致度一極微經一刹那之道理未救如何擧心身即至彼之難破豈作解釋之本意哉加之阿毘達磨依法相説者餘處論判之所定也何以讃嘆爲所以隱經多念之法相何判擧心緣時心即能至哉若夫爲論家致如此之決判者誰可用性相之施設哉若據此釋意者設雖運身勝解之二通宜云心即能至豈不失三通之差異哉何況此釋意既於中間經歴多念何可設大而不停之所以哉就中依大身論相速者彼兩釋意也頗似設剩釋如何答凡然於中間亦經多念者致度一極微經一刹那之理此讃極速言擧心緣者會如何擧心身即至彼之難何無其謂哉況言同別意趣阿毘達磨依法相説者是約大都談經論差異也非謂云爾故經中不談法相論中不用方便若強執彼説致經無眞實論無方便者經論還非指南渡海似失船筏論主或結無厭及經故或結其量廣無數如何可會之哉若爾於論家定判何無實雖經多念方便判即至之義更不足爲疑者歟況論中或云謂我世尊神通迅速或云由此世尊作如是説此等之所説皆依經文見明知亦經多念者顯論藏之説身即能至者示經説之旨云事如此得意之時解釋之旨趣慥開重重之難勢被遮者歟但於大而不停之句者爲異運身勝解顯意勢速疾此釋意兼所約大身也誠以談意勢通之日若非大身者爭可顯勝運身勝解之義哉重意云於中間經多念云義此釋大意也然爲不混初二通兼説大身更非剩之釋者哉可思之問光法師定判中答若非間斷如至極遠度一極微經一刹那如何擧心身即至彼問作三解釋爾者第二釋意如何述之耶進云光法師釋云又解第一刹那擧心緣時第二刹那隨方遠近現一大身中間續起第三刹那方至彼處文付之設雖意勢通力是速疾何忽忘度一極微經一刹那之道理於一刹那之間度無量無邊之極微可云哉況云中間續起現一大身之句豈非剩之釋哉就中現一大身者第三釋意也寧可致混亂哉若夫無相濫者第二第三兩釋其差異如何答凡第二第三兩釋之意者以隨方遠近擧心即至之説爲本會度一極微經一刹那之難破也其中第二釋意云起意勢迅之時初念擧心緣所至處第二念是居本處與所至處之中間第三念則至所至處既三刹那之間至遠方意勢極疾之所顯實炳然也亦頓現大身何可背度一極微經一刹那之道理哉良以以小身往遠方之時必有度一極微經一刹那之義故宜送多時現大身之時以大身同時度多極微故三刹那之間至遠方尤有其謂者歟於續起之言者初念以小身住本處第二念以大身居中間第三念亦以小身現遠方既三念三身如次相續現前故云續起也或於中間大身無間斷故云續起也爲言可思之如此得意時第二釋意能成立疑難自被遮者歟次第三釋意云此亦以隨方遠近歟心即至之文爲本會度一極微經一刹那之道理也但於擧心緣遠方之刹那唯現一大身故是一念一身非三念三身爲言是則彼兩釋之差異也不可有相違重意云不離本處之釋其旨分明可思之重難云若一念現一大身則現身於他方者其身唯限一念不可通多念何云應持菩薩常見佛身哉應持菩薩因位眼識一念不可緣於彼佛身故次彼大身者是生身大歟爲當化身歟若生身者彼生身者是異熟法也何可有隨轉之義哉若化身者本體之生身在何處耶又遠方衆生難解如此之大身如何答大身初念則至遠方故云爾也大身若通多念者應持菩薩何無礙見廣大佛身之義哉次彼大身者是化身非生身其旨如一方之難勢況今就神境通有此釋何足爲疑哉但生身在本處可云也彼如運身勝解二通是生身非化身可云歟若爾不可例彼爲疑次爲他方衆生還亦可現小身歟可思之恐繁不引光法師解釋之全文能能可見彼也問婆沙論中以運身勝解意勢三通約聲聞獨覺世尊三乘明成就不成就相擧二師異説見爾者光法師以何師説爲正判耶進云光法師釋云第二師爲正文付之依光法師之正不見婆沙論之所説雖擧二師説全無有評文以何爲明據忽可判第二師爲正哉況初師意於聲聞獨覺世尊如次成一二三之旨顯之尤順道理被得如何答披光法師之解釋引婆沙論有説聲聞成一謂運身獨覺成二除意勢唯佛世尊成三種有説異生成一謂運身二乘成二除意勢乃至佛具成三之文云婆沙雖無評家此論正理顯宗等皆同第二説即以第二師爲正文既以諸論一同之所以設彼師爲正之決定何重可尋其所由哉況初師意不以運身通關異生見若爾此師爲致異生不成神境通云義而離欲異生成五通者性相之所定也是以調達對闍王施身上出火身下出水或現大身或現小身等之神變豈不致相違哉若爾判第二師爲正顯初師不正義之旨尤有其謂者歟重難云見第二師所説一具之文云然聲聞運身所顯獨覺勝解所顯佛具成三意勢所顯文而倶舍等諸論中未見此説何以諸論一同之説爲由致第二師爲正之定判哉答彼第二師之説既同今論於此三中意勢唯佛運身勝解亦通餘乘乃至故意勢行唯世尊有勝解兼餘聖運身幷異生之文何可疑之哉但於然聲聞運身所顯等之下文者重以三通相配三乘也所謂異生自本唯成運身一通故不及異端於三乘聖人次第有勝劣故以三通勝劣顯現起也則聲聞雖成運身勝解二通專以運身爲所行獨覺亦雖成彼二通專以勝解爲所行世尊同雖成三通專以意勢爲所行之旨成立也今論中雖不述此旨其義必然也重意云婆沙論之然之言尤有所可思今論中云故意勢行唯世尊有其旨顯也次云勝解兼餘聖顯世尊與獨覺後云運身幷異生顯三乘與異生其旨能能可思之問論中擧依身在色界作欲界化時或云化香味二境或云不化之二師異説爾者光法師以何説爲正判耶進云光法師釋云前説爲正文付之初師意雖在欲微聚無聲無根有八事大綱猶於所化境招成就不成就不齊之過第二師能致香味離食無別受用之道理唯化色觸故限成就門遁不成就之失況後師意如欲界八微不相離者據非化者説非只成自義還破初師證何況色界眼根雖八事倶生依身在欲界得天眼之時唯得彼界眼根及四大種不得身色觸見既於色界眼根有五事倶生之義何於欲界色法無六事倶生之義哉若爾前説爲正之決判恐似背此等之道理如何答論中擧彼二師之説云若生在色作欲界化如何不有成香味失如衣嚴具作而不成有説在色唯化二處文光法師釋云問於二説中何者爲正解云前説爲正故婆沙一百三十五云如是説者雖化香味無成就失如人衣服嚴具花香雖復在身而不成就文今論初師之説既同婆沙評家之説豈不以初説爲正義哉但於難勢者凡非心境不顯非境心不生故心境相對所建立之也是以欲界有舌二識故有香味二境有香味二境故有舌二識色界無舌二識故無香味二境無香味二境故無舌二識彼餘處偈頌欲界繋十八色界繋十四除香味二識之文蓋顯此意者歟況又餘處論文云色聚極細立微聚名爲顯更無細於此者此在欲界無聲無根八事倶生隨一不成文設雖依身色界人之所化境若爲欲界繋法者更不可有闕香味二境之理何況於化二謂欲色四二外處性之今偈頌哉若爾初師除存此等之文理故云兼化香味二境第二師不辨如此之義理故云不化彼二境何爲疑哉次於欲界所化天眼之例難者天眼爲色界繋法爲來在欲界依身故離身色觸三事有五事倶生之義也今所化境是欲界繋法故無離香味二境有六事倶生之義也重意云若令色界繋境來在欲界依身者可爲例難歟既不爾寧可致混亂哉抑今此難勢之趣者光法師述第二師意之趣也若存初師意之時如此可設會通者歟可思之就此疑雖可有重難恐繁故略之學者能能加案立也問光法師意自身化他身化即身化離身化所攝色觸二處悉成就之可云耶答可悉成就之也兩方若悉成就之者凡自身他身即身離身四化所攝之色觸二處種類非一准何悉成就之可云哉是以設雖成就自身化即身化所攝之色觸二處更難成就他身化離身化所攝之色觸二處哉何況設雖自身化若爲離身法者全不可成之設雖即身化若爲化身法者亦不可成之依之披餘處之論判云非他相續無有成就他身法故非非相續無有成就非情法故文寶法師存此等文理故不成就他身化離身化所攝色觸二處之旨釋成若依之爾者光法師今解釋中云若自身化若他身化色觸二種皆悉成就義准應知若即身化若離身化亦皆成就文如何答凡有情非情者是有心無心之謂也又業用樂欲之親所引發名之有情數法業用樂欲之非親所引發名之非情數法又於諸法有有情數之攝有非情數之攝思而可知亦可有明據宜考之今恐繁故略之而彼如離心化雖離自身是業用樂欲之親所引發故名之有情數法寧可云無得哉若有得者可成就之云事炳然也彼諸行相或得之或之言豈不攝離身化哉或有情數之攝也其義以同前次自業用樂欲之親所引發名之自相續法他業用樂欲之親所引發名之他相續法故如他身化是相似他而化作故雖立他身化之名實是自業用樂欲之親所引發故爲之自相續法豈無得哉有得故成就之也彼得非得唯於自相續二滅之自相續之中可攝他身化也或自相續之攝亦例前可思之若爾光法師若化自身若化他身色觸二種皆悉成就義准應知若即身化若離身化亦皆成就之定判深存此等文理何足爲疑哉如此成之時餘處非他相續無有成就等之文還爲今義之潤色何備疑難之證據哉次於寶法師之解釋者背此等之道理故還有疑何云爲難勢之端哉或光法師作云若自身化若他身化色觸二種皆悉成就等云若即身化即成就若離身化即不成就之二見畢述雖有兩解前解爲勝故寶法師爲故違光法師之意破前解取後解也退見光法師初解釋依憑之婆沙文或云有成就欲界繋大種亦色界繋大種若生色界作欲界化發欲界語文或云有成就欲界繋大種亦色界繋所造色若生色界作欲界化發欲界語文或云有成就欲界繋所造色亦色界繋大種若生色界作欲界化發欲界語文或云有成就欲界繋所造色亦色界繋所造色若生色界作欲界化發欲界語文既明依身在色界成欲界繋能造所造之時於欲界化欲界語之中全非簡離身化他身化取即身化自身化總之成就之明知色觸二處及聲處悉成就之云事何況見此文成離身化云事其理必然也所以然者披餘處論文云然下眼不能覩上界上地非其境界故如不覺彼觸是故從上地來下地時非自身來要化下地化文准此文依身在色界作欲界化者色離身化非即身化故也故光法師引此等諸文畢述既言若生色界作欲界化發欲界語成就欲界大種及所造色又不別簡明知異界化若化自身若化他身色觸二種皆悉成就義准應知若即身化若離身化亦皆成就之解釋起盡云依憑云道理其旨實明鏡也寶法師云難破更所不寄來也況寶法師云意同光法師第二釋若爾寶法師宜以同光法師第二見爲佳何還破初釋哉蓋是酌流忘源居木影折枝也殆不可及會通者歟重難云婆沙論文云如是説者離所化身所發化語文若爾寶法師意同評家説歟被得如何答光法師引此文畢則會之云必由麁四大種相撃起故文意云所化身無獨發語必待化主語所發之也爲言其麁四大種者化主身四大種其細四大種者所化身四大種也然即身化四大種不離化主故別而不言之離身化四大種離化主故別而論之也非謂云爾故離身化總不發語歟此事可有委細之沙汰然而恐繁略之問今論意於所化境立通果名可云耶答可有二意也兩方若立通果名者凡通果者是定果也定果是能化心非所化境所化境是化心果非定果寧得於所化事立通果之稱哉是以見今論之文偈頌結能化心十四定果二至五乃至化事由自地長行云神境通果能變化心力能化生一切化事乃至諸所化事由自地心無異地化心起餘地化故文若是定果非化心果者尤可云化事由自上何可判化事由自地哉若依之爾者非定化事不得生入定化事方得生明知得通果之稱云事依之婆沙評家意於所化事立通果之名見今論意豈不爾哉答凡於所化事有二種因一化心是親因也二淨定是疎因也又於淨定有二種果一化心是親果也二化事是疎果也今論中不以化事名通果者不與淨定爲親果故也以化心爲通果者與淨定爲親果故也評家意以化心化事同名通果者不簡親因疎因皆以名因故對彼不擇親果疎果悉以名果者也若今論意對疎因立疎果者宜於化事立通果之名也或於因果各有同時異時二門倶舍唯據同時因果故以化心爲因以化事爲果故於化事不立通果之名也婆沙通據同時異時二門故於化事兼立通果之名也故光法師所引婆沙論中云如是説者諸所化事由通化作亦由化心謂神境道無間而滅化心與所化倶時而起雖倶時起而能化心唯是通果諸化事是前通果及化心果文倶舍論文如一方之難勢仍不引之故光法師解釋上文云論四至一切化事者釋初句中能化心神境通後起果化心力能化生一切化事此據同時能起化事故説化心不言通化若據前後通亦名化故婆沙百二十二一説言諸所化事由神境通道化作一説言諸所化事由化心化作第三評家云文倶舍同婆沙第二師之説不同評家之説然而若設會通者宜准上思之若爾論意各別而和會之釋之二意可有之也不可有相違重難云答中親疎二種因果與同異二時因果之二門被成之中同時異時之門其證在光法師之解釋親疎因果之門全不見光法師之定判豈非胸憶之會通哉答化事若不以化心爲親因者宜不發化心直成化事既不爾依定力發化心依化心成化事明知以淨定望化事之時是疎因以化心望化事之時是親因云事可思之又難云若化心之後生化事者尤可有親因疎因親果疎果之不同既化心與化事同時而生何以化心與化事望淨定之時可有親疎之不同哉答化主之本意欲生化事不樂化心而非化心化事不生故爲生化事方發化心明知以定爲疎因以化心爲親因云事例如以加行心與定心望定戒之時加行心爲疎因定心爲親因也可思之尋云化人所發語是通果耶非通果耶答准化事可思之又尋云已得通果名即是通果無記耶答爾也問頌文云化事由自地文爾者自地者指所依定可云耶進云論疏中指能化心見付之所變化事既是通果無記之體也尤指所依定可云也何指能化心可云耶答長行中述云諸所化事由自地心無異地化心起餘地化故文光法師釋云顯事及心必同地化文但於難勢者所變化事親由能變化心而發非親由定心而發故以化事望定心之時不論自他地之不同以化事望化心論自他地之不同則判化事由自地也由此道理故今論中雖以化心名通果不以化事名通果見然而廣論通果無記之時雖非正通果無記是可通果無記之攝歟被得不可有相違問今論意化人所發語唯由自地心發可云耶答可有二意也兩方若唯由自地心發者偈頌結語通由自下長行云化所發言通由自下文若依之爾者隨能發心判身語二業性類者有宗一家之性相也設雖化人所發語更不可違此道理而發表心唯限欲界初靜慮無通二禪以上明知欲界所繋之語由欲界心而發初禪所繋之語由初禪心而發云事若爾設雖二禪以上所起之語能發所發皆是初禪所攝也豈非唯由自地心而發哉是以見餘處之偈頌云生上三靜慮起三識表心皆初靜慮攝唯無覆無記文何況所化境與能化心必是同地更非異地見准例思之所發語與能發心必可同地被得如何答凡所化人所發語論同地異地有二門一望彼語於能發心論自他地門此是唯限自地不通他地其旨如一方之難勢二望彼語於化人論自地他地門此是不限自地亦通下地此亦如一方之疑難其語通由自下者以化人所發語望彼化人論同地異地之時欲界化人發欲界語初靜慮化人發初靜慮語故是自地也二禪以上化人發初靜慮語故是下地也爲顯此意結語通由自下也但於所化境與能化心必是同地也云例難者自本云化事由自地而云語通由自下其門既各別也混不可難之重難云所化境與所發語同由能化心與能發心故其廢立宜齊等何以化事望化心云由自地以語業望化云由自下哉答能發心與所發語可同一地能化心與所化境可非異地云事理在絶言然爲顯門門之不同以化事望化心云一地以語業望化人云自下也可有何苦哉或影略互顯故可云爾所謂云化事由自上語唯由自地之義可有之也能能可思之委細之旨在光法師之解釋可見彼也問光法師意變化心化聲處可云耶進云光法師釋云以化心不能化聲處故文付之變化心廣化色香味觸之四處設雖聲處何不化之哉是以舊鞞婆沙中述欲界化六入色界化四入新婆沙論中云若生初靜慮成就欲界一謂法捨意近行即通果心倶有説彼成就三謂色聲法捨意近行即通果心倶有説彼成就六謂六捨意近行即通果倶文依之泰法師意存變化心化聲處云義見光法師何背此等之文理不許化聲處之義哉答凡化事者翻先願由化心任運恒時相續現起之法聲處者雖有願雖起心大種緣不相繋不生大種緣得相繋得生之法也況於化事無間斷聲處有間斷其相遥異哉而色香味觸順先願順化心故化心化之聲處不順先願不順化心故化心不化之也若就變化發業二種通果論之者變化心只是四處二處境住現在更不及動身發語之門發業心於先時所化身始是發身語二業之表能化能發之心行相分水火所化所發之體作用替雲泥何可混二通於一致哉若爾設雖非業之聲設雖語業聲變化心不化之云事此等道理實炳然者歟是以披今論文述變化通果之相偈頌結化二謂欲色四二外處性此各有二種謂似自他身乃至化事由自他長行云化復二種謂欲色界若欲界化外四處除聲若色界化唯二謂色觸以色界中無香味故此二界化各有二種謂屬自身他身別故身在欲界化有四種在色亦然故總成八乃至諸所化事由自地心無異地化心起餘地化故文述發業通果之相偈頌結語通由自下乃至先立願留身後起餘心語長行云化所發言通由自下謂欲初定化所發言必由自地心起上化起語由初定心上地自無起表心故乃至由先願力留所化身彼起餘心發語表業故雖化語二心不倶而依化身亦得發語文變化心與發語心是異也所化境與所發語亦別也云事論文既炳然也釋家豈生謬也況正見光法師之定判或述應知通果心寬變化狹離化心外別有一類通果心能發表業非能發表或云由先願力留不化身後起餘通果心發語表業故雖變化通果發語通果心二心不倶而依化身亦得發語應知通果心寬化心發語心皆名通果以此故知發語心非是化心別有一類通果心能發語業以化心不能化聲處故文變化心不化聲處云事此等之解釋誠明鏡也何爲疑之端哉如此成之時色香味觸之例難更不可來者歟但於舊鞞婆沙之説者光法師會之云未審此論定是何部引來爲證設是當部從多分説如品類足言通云何謂善慧或相從説或非正義違諸論故文次於婆沙論意近行三師之文者光法師餘處解釋之中引此文畢則判正不云於三説中初説爲正一同此論正理二不言有説此初師意説縱緣身語業亦兼緣能造觸或緣身業兼緣香味觸或緣語業兼緣色香味觸故但名法捨意近行文釋家既設委細之會通學者何及縱注之劬勞哉次於泰法師之解釋者光法師引彼釋而破之云法師未委通果心寬變化心狹謂諸通果心皆是化心故作斯見文何以所破之師義可難能破之正旨哉尋云光法師許變化心兼緣四處二處上四相發業心兼緣身語二業上四相及語業倶生名句文等歟若許之者所破義中談此旨知不許之云事若不許之者隨應緣倶起香味觸等見豈不許緣倶有法等耶答光法師五卷疏述發業通心之相或云既得緣名亦緣心等或云但緣身語二業云二釋作之十卷疏就意近行述婆沙二師中初説爲正之義云或緣身業兼緣香味觸或緣語業兼緣色香味觸文任此等之解釋發業通果狹唯緣身語業寬兼緣能造大種幷名句文及心心所然不緣四相見又婆沙論文明通果心緣境之相云欲界者緣欲界修所斷法色界者緣欲色界修所斷法文光法師五卷釋中會婆沙文云而言通法分別行者據總緣説等文准今此論釋變化通果心四處二處外別緣法境之義無之釋若爾變化心發心倶不緣四相被得但予倩案此事光法師既許緣能造大種及名等心等之義何不許緣此等諸法上四相之旨哉疎法猶緣之況親法哉非倶有法既緣之倶有法何不緣之哉光法師不云緣之者理在絶言之所以歟可思之重意云是總緣非別緣可云也此事在五卷抄幷十卷抄中可見彼也問他化自在天化聲境可云耶答不化之可云也兩方若化之者聲是間斷之法也設雖他化自在天之化力如何可化之哉光法師解釋之中不化之旨釋成若依之爾者集異門足論中云謂他化自在天造作増長如是類業彼由此業與諸他化自在天雖同一類身同一趣同一生同一進趣而有高下勝劣差別諸下劣天子化作種種色聲香味觸諸妙欲境令高勝天子於中受用文如論判者可化聲境被得如何答聲境是間斷之法不同化境故設雖他化自在天之化力更不可化之是以定力之不思議猶不得化之況自餘之力用哉但於集異門足論之説者光法師會之作多釋故彼釋云彼由業力令他化作非由化心不可爲例或可從多分説以實而言聲由撃發不可言化以間斷故或聲不離所化色香味觸四種相從説故亦名爲化文不可有相違重難云付光法師意二釋彼二釋其旨炳然也付初釋有疑所謂雖顯修得化心不化聲之義於業得化心者可化之被得而今疑自本標他化自在天之上者更不簡業得生得等何可云不化之哉若強不化之者初釋招疑如何答疑尤可然初釋是一往之施設也所以然者上成修得化心之不化聲塵之旨之時自引集異門足論之説難之今會之作三釋之中先初釋意爲顯修得化心之不化聲塵之間所遣彼文於業力也若以實言之時設雖業得化心設雖生得化心不化之可云也以何知者第二釋之中云以實而言聲由撃發不可爲例文第二釋之中既置實之言宜知初釋是假釋者歟是以下解釋之中云如天龍等能變化心彼亦能爲自他身化於十色處化九除聲文他化自在天不化聲境云事此釋亦明鏡也問生得業得化心化五根可云耶答可有二意也兩方若化之者凡五根者有情之生本欲色之總體也設雖生得業得之化心何可輒化之哉是以於修得化心者不化之見相例可同若依之爾者正披今論之所説云餘生得等能變化心通善不善無記性攝如天龍等能變化心彼亦能爲自他身化於十色處化九除聲文論判無爭可化五根被得如何答凡五根者雖有長養之類專以異熟爲本故不可云類色香味觸以化之者歟然而一往言之者不離五根化色香味觸現大身等之時以五根相從四境名化五根之義強不可遮之天龍等以三性生得業得通現大身小身等則其證也故聖教中多此説所釋也故今一方疑難之中所被出之論文所顯此旨也若據此門者宜云生得業得化心化五根也然約實義論之時唯化四境不化五根故更不可云化之故次下論文云理實無能化爲根者然所化境不離根故言化九處亦無有失文如此得意之時兩方疑難還爲答之潤色何及設會通哉尋云離身化及現小身時其相如何答離身化自本不化五根云事勿論也現小身之時五根是不可見法故化人不可見之故現小身之時令色香味觸小也豈不爾哉又尋云若據如此之義者設雖修得化心何不云化五根耶答修得化境離根故不云爾也故光法師釋云若修得化不轉本形但化四處以離根故不説化根文此事恐繁故不引全文委可見光法師之解釋也問變化心緣未來境可云耶答雖有學者之異義暫不緣未來境云義可存之也兩方若緣之者光法師釋今論神境通果能變化心力能化生一切化事云文云神境通後起果化心力能化生一切化事此據同時能起化事故説化心不言通化文變化心唯緣現在不緣未來云事解釋實分明也若依之爾者偈頌結初多心一化成滿此相違長行云初習業者由多化心方能化生一所化事習成滿者由一化心隨欲化生多少化事文既云多心一化明知有緣未來之義云事如何答凡定慧均等根本靜慮能熟爲無間道除通障之無間所現前之變化心必與所變事可同時云事其理實必然也所以然者入定發通之志偏爲成化事非爲發化心然發化心者非化心化事不成之所以也若化心非生化事不生者此化心只是通加行可非通根本寧可云無擁故得通之名酬無間道得通果之稱出障故得解脱道之號哉既能化心與所化境同時也緣現在境云事必然也若緣現在境者於此位不可緣未來云事亦必然也若爾初念既爾也後念亦爾也念念既與所化境倶時緣現境設雖經千萬念亦復如此其證則如一方之難勢中被出之但於論文之偈頌長行者初習業位毎念是一心一化無一心多化之義故云初多心一化也更非謂多念經歴唯生一化何來爲難勢哉重意云彼成滿時毎念是一心多化非一心一化之相故云成滿此相違也若爾翻後思初者歟若夫多念相續唯生一化者彼成滿時一念化心生多念化事可云歟如何此理既不可也還知初習業位多心生一化者毎念念生一化後成滿時一心生多化者毎念念生多化云事故結初多心一化成滿此相違也可思之問發業通果心緣現在境可云耶答可緣之也兩方若緣之者凡依因等起心發表業者性相之所定也設雖通果心何不依因等起心發表業之義可有之哉若爾發業通果心尤可緣未來境何可有緣現在之義哉若依之爾者變化通果心及五識通果心同緣現在境見相例可同如何答於發業通果心可有二類一因等起心則可緣當起業緣未來之類是也二刹那等起心則可緣現業緣現在之類是也如云於轉善等性隨轉各容三但非汎爾起故不通善染諸餘之義門只如常所用之身語二表良以若無動身思者如何造作種種身表哉若無發語思者如何造作種種語表哉若無刹那等起心者總不可得起身語二業如云思即是意業所作謂身語云等起有二種因及彼刹那又不可云依定前心是遠因等起非近因等起故彼應言如縛心表成善等性然非如彼見斷轉心修斷轉心爲間隔故之説亦可是又不可云刹那等起心緣所餘諸法此心與此業親故亦是無用故若爾因等起心緣未來業刹那等起心緣現在業云事炳然者歟於之可有明證今不遑聿筆故不考之但於變化心及眼耳二通之例難者其相遥異也所謂變化心與發業心其相不同也化事與身語亦異也意識與五識豈等哉心所變之色聲與本所倶之色聲寧混哉可思之問正理論意於天眼天耳二根有彼同分類可云耶答不可有彼同分時也兩方若有彼同分之時者恒同分無缺者性相之所定也設雖正理論意何可云有此時哉若依之爾者彼論意以意識相應勝無記慧爲解脱道不以眼耳二識爲通體定若爾出障位分所現前之眼耳二根豈非彼同分哉答此事上已祿之畢仍不委之思而可知問天眼天耳二通者爲唯限色界繋爲當通欲界繋可云耶答雖難測衵可存限色界繋云義也兩方若限色界繋者變化發業二種通果之在意識猶欲界繋天眼天耳二種通果之在五識豈限色界繋哉加之依身欲界人爲緣自地被障細遠等色聲所起之二通豈非欲界繋哉若起初定二通者自地二識起他地二識尤似爲無用是以依身初靜慮人爲緣欲界初定色聲所起之眼識二識唯限自地見相例可同加之依身初靜慮人依上三靜慮遠見遠聞之時起自地二通見例亦可等加之依身在上三靜慮依自上地遠見遠聞之時起下地二通見依身在初靜慮依自地遠見遠聞之時何不起下地哉依之餘處論判中明十八界依地分別之相結色識非上眼如眼耳亦然雖簡色界眼識界不在上於眼界未遮彼二界不在下於眼界明知眼耳二通中有欲界繋類云事何況天眼天耳之稱未限色界亦通欲界被得若依之爾者天眼天耳謂根定地淨色者今論之定判也所依二根既爲定地之所攝能依二通豈通散地之所繋哉答此事雖爲年來之不審依無次不及記之今驚疑迴愚案云凡天眼天耳二通者是只眼耳二識也彼二識是彼二根之親所發故於所依二根之依地所建立能依二通也而彼二根亦所依定之親所發故於四靜慮建立之故於二根之依地建立二通故二通唯限靜慮地不通欲界繋也例如所變化事親依能變化心而生故隨變化心之依地建立之欲界四靜慮五地又化人所發身語業親依能發心而發故隨彼心之依地建立之欲界初靜慮二地也退勘餘處之論判述色識非上眼之頌文云色識望眼等下非上下眼不能見上色故文述如眼耳亦然之頌文云聲識非上耳文光法師餘處解釋中釋上文云色識望眼或等或下必非在上下眼不能見上色色非眼上上識不依下地眼根下地眼根自有識故故識非眼上文釋下文云類顯可知文准此等文欲界眼根必發欲界眼識非餘初定眼根必發初定眼識非餘故名之或等上三定眼根必發初定眼識非餘故名之或下也色與眼之或等或下非今所用故不消之若爾天眼天耳二通唯限色界繋不通欲界繋云事甚炳然也如此得意之時諸難悉被遮畢但於變化心發業心通欲界繋云例難者今此二心親所化事所發業故隨事業在欲界眼耳二通疎色聲二境故不隨色聲在欲界也仍非相例次於天眼天耳言總通欲界云難者論中説此事云如是眼耳何故名天體即是天定地攝故然天眼耳種類有三一修得天即如前説二者生得謂生天中三者似天謂生餘趣由勝業之所引生故能遠見聞似天眼耳文光法師釋云生得謂生欲色天中餘文可知文准今此論文天之名本在定地被得若爾難勢更不可來者歟就此疑雖可有重難恐繁略之問論中以修得生得等六義釋五通云除修皆三性文爾者於生得業得中非善非不善通者爲異熟無記爲當如何答兩方若異熟無記者凡五通是勢力強盛之法異熱是勢力微劣之法也其相既相翻寧可異熟無記哉若依之爾者於生得業之五通無有威儀工巧通果自性四無記之相也故知是異熟無記云事如何答觀應二年辛卯二月二十九日午時於東大寺藏輪院之草菴終結集之微功畢凡記五十條之問端挑未來際之法燈當卷法門廣博之間有之爲兩帖是則爲下帖本末合九十五條也纔錄論光之綱紀不及自餘之問答爲明婆沙正理之施設歟勘寶師神泰之釋義者無左右難終功仍取詮取要緣文緣義所草之也抑捧今此微功奉資三所和光之法樂若然者圓範無病長壽傳持倶舍之慧命息災安隱流通性相之智水而已右筆權律師出世御後見圓範六十四五十﨟永享十二年戊午五月四日於北室密乘坊爲每日講勸他筆令書寫畢三論宗英祐傳領英憲
