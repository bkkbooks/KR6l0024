body:
  text: 倶舍論第二十九卷抄問題問凡夫二乘所起四無量可緣他三千界有情耶問慈無量以何爲體耶問悲無量以何爲體耶問正理論意喜無量喜受爲體義如何破之耶問正理論意引何經文破喜無量喜受爲體義耶問正理論中明喜無量體云諸古師説喜即喜受文爾者今此師意劣喜名欣歟問品類足論中出喜無量體云謂喜及喜相應受想行識文爾者今此喜者喜受歟問四無量眷屬體中可攝得耶問四無量可緣見所斷法耶問未來四無量可緣自相續耶問四無量可通順勝進分耶問斷欲界煩惱九無間前八解脱道位可修喜無量耶問正理論中明喜無量體擧喜即喜受喜異喜受二義爾者今此二義意分別聞思修所成時可有不同耶問正理論中明喜無量體擧三師説爾者以欣爲體云義意依上三靜慮近分地可起喜無量耶問慈無量可感第四靜慮異熟果耶問慈無量可感五淨居天異熟果耶問四無量唯感色界異熟果歟問悲無量可依下三靜慮耶問除後有異生所餘異生所起四無量可通未曾得耶問無佛世時除近佛地菩薩可起上三靜慮無量耶問未離欲染聖者起相似四無量時可得通行耶問以初靜慮無漏斷初靜慮煩惱九無間九解脱道位可修自地四無量耶問四無量緣欲界有情時具可有緣緣無緣等四句耶問勝解作意無間可生他地心耶問初二解脱爲唯治顯色貪爲當治形色貪歟問初二解脱爲唯緣顯色爲當緣形色歟問初二解脱爲唯治眼識所引貪爲當治耳等四識所引貪歟問依第二靜慮近分地可起初二解脱耶問未離第三靜慮染聖者可成就淨解脱耶問欲界可有相似四無色解脱滅受想解脱耶問論文云彼散善者如命終心文爾者無色界起散善唯限命終心歟問論文云近分解脱道亦得解脱名文爾者彼前八解脱道位未來所修麁等三行相可爲四無色解脱體耶問今論意異生無色解脱現前位未來修身念住義可有耶問論中明無色解脱相云近分解脱道亦得解脱名文爾者寶法師意今此近分解脱道者可通四無色近分地解脱道耶問今論意以近分地加行道可爲四無色解脱體耶問婆沙論意異生無色解脱現前位可修身念住耶問論中釋滅盡定得解脱名擧二師説爾者初師意解脱定障故名滅受想解脱歟問論文云有説由此解脱定障文爾者寶法師意今此文明滅盡定得解脱名歟問論中明滅受想解脱云微微心後此定現前文爾者寶法師意微微心位可有欣心所現起義耶問正理論意滅盡定出心可通識無邊處耶問微微心位必緣滅盡定歟問光法師解釋中云入心緣彼滅定寂靜方能入故故唯有漏文爾者今此入心者可通想微細微微三心耶問想微細微微三心位可斷滅盡定障耶問滅盡定障爲唯限無覆無記爲當通染汚歟問初二解脱對治何地貪耶問正理論意前三解脱爲唯限勝解作意爲當通眞實作意歟問四無色解脱可緣下地法上擇滅耶問四無色解脱可緣下地能治類智品道耶問虚空無爲可有多體耶問四無色解脱可通退分定耶問非想非非想處解脱唯緣自地歟問今論意第三靜慮不立解脱故如何釋之耶問以盡無生智可爲前三無色解脱體耶問第二第三解脱可緣自相續耶問淨解脱可通曾得耶問外法異生可起淨解脱耶問起滅盡定時必伏非想非非想處煩惱歟問有學聖者所起滅盡定可受無色界等流果耶問前八遍處倶緣可見色歟問後二遍處爲唯緣現在爲當緣過未二世歟問勝處遍處觀門悉解脱攝歟問付前八遍處觀門觀青等四色後觀地等四大種歟問麟喩獨覺得滅盡定爲加行得爲當離染得歟問今論意依身在欲天可起前三解脱耶問論中明生上二界起色無色定緣云二由業力文爾者寶法師意今此業者爲唯限順後業爲當通順生業歟問頌文云佛正法有二謂教證爲體文爾者諸佛正法滅盡釋尊正法滅盡其義同歟問論中明正法住時擧二師説爾者初師意如何釋之耶問論中明正法住時擧二師説爾者第二師意如何釋之耶問大師世眼久已閉堪爲證者多散滅以下六行文爲本頌爲當長行歟
