body:
  text: 倶舍論第十卷抄下問題問以有漏道離下三靜慮染九無間前八解脱道位可修縁欲界心耶問論中引三十六師句經説證何義耶問不成就欲界善意近行人可有成就欲界出離依意近行義耶問斷善根時可有捨無覆無記意近行義耶問見所斷意近行中可有別縁色等五境義耶問論中明生有唯染義云由何煩惱自地諸惑文爾者光法師意如何釋諸惑言耶問欲界疑煩惱瞋煩惱非相續斷位可有捨受相應義耶問結生位自力起纒垢可現起耶問光法師意睡眠心所爲自力起爲當隨從起歟問欲界觸境中可有非段食類耶問思食唯限意識相應思歟問意業唯限意識相應思歟問識食可通五識耶問鈍根阿羅漢起結生結可得永對治斷耶問非中有位起結現前非生有位生結現前義可有耶問生有唯限一念歟問無色界生般有行般無行般聖者可有已斷起結未斷生結義耶問中般涅槃聖者起結少分可得永不行斷耶問據永不行斷可有已斷起結已斷生結義耶問於觸思識三食斷遍知時兼所斷遍知法三食相望其數可同耶問論中證思食益現身引集異門足論説爾者如何引之耶問論中明思識二食能引起當有云思食引已從業所熏識種子力後有得起文光法師釋此文約有部經部義作二解釋爾者何釋爲正耶問論中解契經所説贍部林異生擧四師説爾者論主意何説爲正耶問論文云由後世尊除彼異生還將外道對預流向文爾者離欲外道并預流向聖者倶居贍部林歟問下三靜慮根本地可有捨受耶問命終位唯起自他心歟問論文云非在定心有死生義界地別故加行生故能攝益故文爾者光法師意能攝益故者簡命終受生二位歟問光法師意可起異地散善耶問論中明阿羅漢入涅槃心擧欲界捨受異熟有無二説爾者光法師意何説爲正耶問無覆無記命終心唯限異熟威儀二心歟問論中述已得順解脱分者非正定聚云彼後或隨邪定聚故等文爾者寶法師意此文有幾釋判耶問中忍位可有命終受生義耶問斷善邪見可立邪定聚耶問邪定聚唯限一趣依身歟問無爲法正定聚等三聚中何攝耶問寶法師意世第一法位可捨見邪性耶
