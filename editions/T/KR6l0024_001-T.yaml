body:
  text: 倶舍論第一卷抄上問題問眞諦三藏所譯俱舍論中有幾謬耶問佛𣵀槃後六百年造婆沙論歟問造婆沙論五百羅漢可通六種姓耶問大毘婆沙論梵本唯有十萬頌歟問今論中唯明諸法無我義歟問光法師意今論造頌時可有破我品耶問頌文云對法藏論我當説文爾者寶法師歸敬發起二序中如何釋之耶問阿毘曇心論中可有發起序耶問雜心論中可有歸敬序耶問阿毘曇心論中可歸敬佛三德耶問光法師意今論中不歸敬僧寶故如何釋之耶問論文諸言所表謂佛世尊文爾者光法師意今此佛世尊者爲唯限釋迦一佛爲當可通一切諸佛耶問寶法師意不染無知可緣虛空非擇滅耶問寶法師心不染無知可緣滅道二諦耶問光法師所引今論餘處文云斷圓德有四種文爾者其中一切定障斷者爲唯限定障斷爲當可通根障等斷耶問光法師釋畢竟斷相云通得擇滅及非擇滅文爾者今此非擇滅者爲唯限定障上非擇滅爲當可通煩惱障上非擇滅耶問光法師意幷習斷可有別體耶問光法師意非兼正通論義意斷德通非擇滅義可有耶問不染無知可通見所斷耶問染汚無知體唯限無明一惑歟問光法師釋不染無知體引十一師異說爾者第十古師意如何釋之耶問光法師意以未成佛位一切有漏無染惠悉可爲不染無知體耶問寶法師意習氣不通相續身云義引正理論何文證之耶問光法師意不染無知唯限無覆無記歟問光法師意邪行相智可通善耶問佛果位可成就不染無知耶問菩薩斷不染無知得非擇滅爲唯限金剛心位爲當可通前位耶問三類智邊世俗智本來可得非擇滅耶問三類智邊世俗智所依身與見道所依身可同耶問二乘通力可緣他三千界事耶問離如來敎力出離生死類可有耶問寶法師意隨行對法唯限爲俱有因法歟問光法師意隨行對法攝得之釋寶法師如何破之耶問光法師作隨行對法攝不攝得云二解釋爾者不攝得云釋可正釋耶問光法師意隨行對法中可攝淨惠耶問婆沙論中釋喜無量體云欲界者四蘊爲自性色界者五蘊爲自性文爾者寶法師心隨轉中可攝喜受耶問隨行對法中可攝心王耶問光法師意別相念住總相念住可通生得惠耶問光法師述煖等四善根修惠總別念住思惠五停心觀聞惠畢云且依一相文爾者今此一相者爲依觀門一相爲當依未離欲染一相歟問聞惠無間可起煖善根耶問光法師所引正理論中云律儀先捨後斷善根文爾者今此律儀者卽後斷善根所發歟問光法師所引婆沙論中明相異熟業或云唯思所成云通聞思所成二說爾者通聞思所成云說正義歟問光法師意色界聞惠可發表業耶問光法師意發智品類兩論相望時造時前後如何釋之耶問佛𣵀槃後二百年中造品類足論歟問光法師意能對所對俱可名對法耶問寶法師引眞諦三藏說明以無漏惠望𣵀槃果爲趣向至得對非如實相知對等四句分別爾者趣向至得對限無間道耶問寶法師引眞諦三藏說明以無漏惠望𣵀槃果爲趣向至得對非如實相知對等四句分別爾者四諦智中各可有此四句耶問寶法師所引婆沙論中明一刹那頃於隨眠滅身作證惠不見彼滅惠見彼滅身不作證等四句分別爾者得不還果時可有此四句耶問以無漏惠根可名甚深阿毘達磨耶問以滅盡定退可名甚深阿毘達磨耶問頌文云因此傳佛說對法文爾者今此傳言表不信義歟
