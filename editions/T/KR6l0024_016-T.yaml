body:
  text: 倶舍論第五卷抄上問論文云本論説此名衆同分文光法師釋此文作三解釋爾者第二釋意今此衆同分者有情同分歟答可法同分也兩方若有情同分者第二釋意判又解衆多法相似因名衆同分定知可法同分云事若依之爾者案論文前後述謂諸有情展轉類等畢云本論説此名衆同分文言無諍指有情同分名衆同分見何況次下段云復有法同分謂隨蘊處界別擧法同分哉答本論説此名衆同分之言汎可含有情同分及法同分同分之言既亘有情同分及法同分衆同分者同分異名故也何況思光法師或可頌文亦攝法同分言有情者簡異非情之釋意同分有情等之頌文可攝法同分見准知謂諸有情展轉類等之長行文亦可攝法同分故指之云本論説此名衆同分何可簡法同分哉但於復有法同分謂隨蘊處界之文者凡明同分有總釋別釋之二段謂諸有情展轉類等本論説此名衆同分者是總釋段也此同分言可含有情同分及法同分復有法同分謂隨蘊處界者是別釋段也全不遮總釋之段説法分故本論説此名衆同分之言含有情同分及法同分得意之上作三解釋隨應分別之也初釋云多體類等名爲衆同分是別義者通有情同分及法同分當上云即分同故名同分持業釋也之釋意也第二釋云又解衆多法相似因名衆同分者約法同分論之當上云同之分故名爲同分依主釋也之釋意也第三釋云又解衆多有情展轉同因名衆同分者約有情同分釋之同當同之分故名爲同分依主釋也之釋意也若第二釋約有情同分論之得意者第二第三釋有何差異哉爰知第二釋約法同分解之第三釋約有情同分明之也論衆一段之文如此聊簡之時何解釋意不違論説也已上相承義趣也愚推云問光法師解釋中引正理論十四云何異熟謂地獄等及卵生等趣生同分等文爾者爲證無差別同分體多義引此文歟答非爲證無差別同分體多之義引此文也兩方若爲證無差別同分體多義引此文者正理論今文説趣生等有差別同分相何引此文證無差別同分體多之義哉若依之爾者披光法師解釋述或體各多如所依法畢引此文任文相起盡爲證無差別同分體多之義引之見是以撲楊大師演祕二作無差別同分體一體多之二釋畢判後説有憑前無文也引此文爲體多之釋證據如何答見光法師所引正理論文云云何異熟謂地獄等及卵生等趣生同分云何等流謂界地處種姓族類沙門梵志學無學等所有同分有餘師説諸同分中先業所引生是異熟同分現在加行起是等流同分專説異熟等流等有差別同分相故非爲證無差別同分體多之義引此文云事勿論也但於述或體各多如所依法畢引此文云難者今論中無差別同分體一體多之相分明不見故光法師雖作或云體一或云體多之二釋何釋之下無引證據也引正理論今文事泛爲顯諸同分中異熟等流等種類是多非爲證上義引之若爲證上義引之者可云故正理云而云又正理十四云置又言上釋之外顯別義之旨炳然也次於撲楊大師後説有憑前無文也之釋者光法師作無差別同分體一體多之二釋體一之釋下無引論説體多之釋下引正理論今文故文相連續似引體多之釋證據故撲楊大師竊指光法師疏釋後説有憑前無文也歟聖光法師意云之者非爲證無差別同分體多之義引此文可云也問從人趣死還生人趣時得捨同分義可有耶答可有此義也兩方若有此義者今論中於有死生不捨不得同分句云謂是處死還生是處擧有死生亦捨亦得同文句述謂是趣死生餘趣等婆沙論文於死此生彼不得衆同分句云如地獄死還生地獄乃至夭死還生天等擧死此生彼亦捨亦得衆同分句述謂地獄等死生異趣等任此等論説從人趣死還生人趣之時不得捨同分見若依之爾者以道理思之從人趣死還生人趣中有初念何無得捨同分之義哉答今論中明有差別同分云謂諸有情界地趣生文光法師釋此文云謂諸有情中三界九地五趣四生文解正理論云何異熟謂地獄等及卵生等趣生同分之文云若論五趣及胎卵濕生皆不攝中有文准此等釋趣同分及胎卵濕三生同分中不攝中有同分故知從人趣死還生人趣中有初念捨趣同分得中有同分隨其所應捨胎卵濕三生同分得化生同分云事但於今論中出有死生不捨不得同分句云謂是處死還生是處之文者從人趣死還生人趣之時不得捨人趣同分故云爾也故泰法師釋此文云第一句者謂是人趣處生死還人趣處是有死有生不捨不得人趣同分也文婆沙論文會通同之餘趣之中於是處生是處之時得捨不捨同分之相准之可思問有宗意非情法上可立同分耶進云論疏中不立之也付之非情法上既有自類互相似義何不立同分哉是以契經中非情法上可立同分見如何答有宗意非情法上不立同分也故光法師釋今論同分有情等之頌文或云有情簡異非情擧所依法也文或云或可頌文亦攝法同分言有情者簡異非情文但疑問之趣是今論非情同分難意也故今論云又何因不許有無情同分諸穀麥豆金鐵菴羅半娜婆等亦有自類互相似故文光法師所引正理論中救此難云由彼草等無有展轉業用樂欲互相似故於彼不説別有同分文此文意云有情有展轉業用樂欲互相似義故立同分非情無此義故不立同分爲言重意云有情非只有彼此同類展轉互相似義亦有展轉業用樂欲互相似義故立同分非情唯有彼此同類展轉互相似義闕無展轉業用樂欲互相似義故展轉相似之義疎遠不如有情故非情法上不立同分爲言但契經中非情法上立同分者是何契經説哉任正理論如是同分世尊唯依諸有情説非草木等故契經言此天同分此人同分乃至廣説之契經中説唯依有情立同文見若爾契經中非情法上立同分云文頗難有歟設有此文者非情法上有彼此同類展轉互相似義故且立同分云歟理實論之可説非情法上不立同分也問有宗意同分上可立同分耶進云論疏中不立之也付之能同同分相望其體各異若同分上不立同分者何可起無別覺施設哉例如得上立小得相上立小相如何答若同分上更有同分者展轉應有無窮過故同分之上不立同分也但疑問之趣是今論別有同分難意也故今論云又諸同分展轉差別如何於彼更無同分而起無別覺施設耶文光法師所引正理論十二中救此難云由諸同分是同類事等因性故即爲同類展轉相似覺施設因如眼耳等由大種造方成色性大種雖無餘大種造而色性成文此文意云同分令同諸法等因性故同分之上雖不立同分於同分起無別能緣覺惠起無別施設名言如彼大種造眼耳等色能造法故大種之上雖不立大種大種即色性成爲言但於得上立小得相上立小相云難者成有情專由能得之得成有爲偏由能相之相離此之外無成有情成有爲之義故大得之上立小得大相之上立小相也問依身在欲界可起上二界同分耶答可起上二界同分也兩方若起上二界同分者是三界有情總報也更不可有他界現起之義是以非得同分判性類無有他界現起之義同分例可若依之爾者光法師餘處七解釋中明不相應行不立等無間緣云同分三界可倶現前文如解釋者依身在欲界可起上二界同分見如何答依身在欲界可起上二界法同分也即起所同上二界法之時可起能同法同分故也光法師餘處解釋中或云同分三界可倶現前或判同分亦有多體出三界中可倶現前即顯此意也但於同分者是三界有情總報也更不可有他界現起之義云難者依身在欲界起上二界同分者是法同分非有情同分故此難不可來次於非得隨同分判性類無有他界現起之義云難者非得隨同分判性類者隨所依有情同分判性類故亦無他界現起之義也故光法師餘處四所引婆沙論百五十八中述判非得性類云但依命根衆同分轉故隨所依性類差別文尋生無色界可起色界法同分耶答生無色界不起所同色界法故不起能同法同分也疑云生無色界起無漏四靜慮之時豈不起彼能同法同分哉答同分唯是有漏法故不可隨所同無漏法定地繋如云有漏自地依無漏隨生處可隨生處定地繋故生無色界起無漏四靜慮之時彼能同法同分可無色界繋問勝論宗意實徳業三句外可有和合句別體耶答無和合句別體也兩方若無和合句別體者勝論宗意立六句法門若實徳業三句之外無和合句別體者六句法門難成立哉是以慈恩大師因明大疏下述復有一常能和合性光法師釋六句唯論有體之法任此等定判實徳業三句之外可有和合句別體見若依之爾者勝論宗意和合句義非能有所有實徳業三句之外何可有別體哉答勝論宗意和合句義以所和合實徳業三爲其體故三句之外無別體也故淄洲大師略纂云和合句者無別名體圓測法師判和合句者能令實等不離相屬即用此法爲其自性明知實徳業三句之外無和合句別體云事但於若實徳業三句之外無和合句別體者六句法門難成立哉云難者和合句義與所和合實徳業三句不即不離也所謂能所別故不即也體性一故不離也既有能所別論之門故六句法門何不成立哉次於慈恩大師復有一常能和合性之釋者能所別論之時計有一常和合句別體故非相違次於光法師六句唯論有體之法之釋者和合句義與所和合法不即不離異十句中無説句義全無體故云有體之法也委細之旨如子嶋二卷私記下幷明本抄第十一可見之和合句別體有無事子嶋記云今云先徳二義之中且可存三句外無別體云傳略纂和合句義無別名體釋西明即用此法爲其自性釋以爲證矣此意云實徳業三句和合不相離之功能以爲其體更非有別實法能和合彼問若爾何立別句乎答實法上可談之功能必開立別名是内外宗義也大乘不相應等皆此類也經部觸數三和成觸故雖無別體猶依佛語開爲一心所別名觸門假爲能和合法勝宗和合句亦爾所以可云不即不離如子嶋釋問勝宗須屬法體之物實爲別體三句不無爲大有等也和合句何非別性哉答於三句有總別二種性所謂有性及同異性也此外豈又有餘性乎故不爲別體歟問既云一常和合性實等爲體可多如大乘生住等隨法異又徳等無常也所依既不一向常無常上假即可無常而既云常知有別體云事答三句及九實等雖別體和合不離之義總是一性也故不各別如大有性不隨實等多又既總性也豈隨法常無常相分哉已上明本鈔十二問答也問勝論宗意異句義可轉徳業上耶進云光法師釋唯在實上令實別異不轉徳業上見付之徳句義中有色香味觸等不同業句義中有取捨屈申等差別異句義何不轉彼上哉是以同句義通轉實徳業上見相例可同何況光法師明六句十句相攝述十句中第五異句義六句中第五同異句攝之旨而六句中同異句既亘實徳業上十句義寧不轉徳業上哉答問論文云誰之異熟謂無想定文爾者光法師意婆沙論多異説中同何師義判耶進云光法師釋云此論同婆沙評家文付之依光法師解釋披婆沙論百二十八現文有五異説之中第四有説之外皆述無想異熟唯無想定感之旨若爾以何得知今論意唯同婆沙論評家義云事依之寶法師判此論云誰之異熟謂無想定准此論文唯與第四説別前三師説及評家義皆説無想是無想定果唯第四説通有心果今論意同婆沙論前三師説及評家義釋見如何答光法師今解釋尤可見深意所謂勘婆沙論文初師云或有説者無想定感無想及色異熟命根衆同分是彼有心靜慮異熟所餘諸蘊是倶異熟文今論不云無想定感色異熟故不可同此説第二師云復有説者無想定感無想及色異熟命根是彼有心靜慮異熟所餘諸蘊是倶異熟文今論中當卷不云無想定感色異熟餘處述二無心定雖有異熟而無勢力引衆同分以與諸業非倶有故無想定不感衆同分定故不可同此説第三師云復有説者無想定滅無想異熟所餘諸蘊是倶異熟文此師意爾許無想定感衆同分故今論意不可同此説第四師云復有説者若有心時亦感無心諸蘊異熟若無心時亦感有心諸蘊異熟文今論意無想異熟唯無想定感不通有心定感衆同分唯有心定感不通無想定感云故不可同此説而當卷誰之異熟謂無想定之文餘處二無心定得不能引餘通之説不違婆沙論評家應作是説無想異熟唯無想定感一切命根及衆同分眼等色根皆業所感餘蘊倶感之義故光法師釋此論同婆沙評家深探倶舍婆沙兩論之玄旨者歟但於寶法師唯與第四説別之釋者且對誰之異熟謂無想定之一文作一往釋歟問光法師釋誰之異熟謂無想定論文引婆沙論多異説爾者除評家義外餘師説悉不正義歟答悉不正義也兩方若悉不正義者披泰法師解釋云若依婆沙評家五説之中許取第二説今倶舍論問誰之異熟答謂無想定同婆沙第二師説評家所存文如此釋者餘師説中可有正義見若依之爾者婆沙論習除評家義之外餘師説悉不正義也如何答勘婆沙論百十八文問無想定感何異熟答此問上擧四有説畢下別出評家義其四師説皆與評家義異也明知前四師説悉不正義云事但於泰法師若依婆沙評家五説之中評取第二説之釋者難思婆沙論評家意云應作是説無想異熟唯無想定感一切命根及衆同分眼等色根皆業所感餘蘊倶感一切命根及衆同分眼等五根皆唯業所感定而第二師意云復有説者無想定感無想及色異熟命根是彼有心静慮異熟所餘諸蘊是倶異熟衆同分通無想定所感見其義既與評家意異寧判五説之中評取第二説哉就中命根若有心定果者衆同分何通無想定所感哉旁思其道理第二師説定可不正義也若爾泰法師釋頗難依用歟問正理論意於無想天起心品唯限受生命終二刹那歟答不限受生命終二刹那也兩方若唯限受生命終二刹那者於無想天談多時有想之旨源出婆沙論百五十四説專爲有宗本義正理論意何不存此義哉是以正理論中於無想天起心品不限受生命終二刹那見若依之爾者披正理論餘處二十一文釋本有不名中有云謂或容有生有無間死有現前非起本有文光法師餘處七引此文云正理所説即妙音義也文而婆沙論百五十四中尊者妙音意於無想天起心品唯限受生命終二刹那判正理論意既同彼師説明知唯限彼二刹那云事如何答見正理論十二一段之文或云以生無想有情天中多時有心謂入無想前及出無想後然無心位時極長故名無想天文或云彼以宿業等無間緣爲任持食謂由宿業引衆同分及命根等由續生心及無間入無想果也牽引資助文顯宗論兩處之文全亦同之任此等文於無想天起心品不限受生命終二刹那云事分明也但於正理論餘處文幷光法師餘處釋者正理論意雖存於無想天多時有想之旨一處之文成中有名不濫本有云謂或容有生無間死有現前非起本有且述尊者妙音義也爲言非擧自義者寧爲相違哉重難云於無想天起心品設雖唯限受生命終二刹那五百大劫之間受無想異熟果是本有也何云非起本有哉答非起本有者不起本有心爲言不遮五百大劫之間受無想異熟果注本有位也問尊者妙音意於無想天起心品唯限受生命終二刹那歟答唯限受生命終二刹那也兩方若唯限受生命終二刹那者披婆沙論文述尊者妙音亦作是説彼謗𣵀槃及聖者故從彼命終定生惡趣無想天命終心位起無漏緣惑見而出無想想色界有漏緣隨眠隨増者出發智論説明知出無想心之後命終心起云事若爾於無想天起心品不可限受生命終二刹那哉若依之爾者婆沙論中尊者妙音意於無想天起心品唯限受生命終二刹那判如何答尊者妙音意於無想天起心品唯可限受生命終二刹那也故婆沙論百五十四云頗有處唯二刹那有心謂結生及命終時耶答應説無尊者妙音説有謂即無想天頗有處結生心爲等無間緣命終心起耶答應説無尊者妙音説有謂即無想天文光法師餘處七引正理論或容有生有無間死有現前非起本有之文畢云正理所説即妙音義也文任婆沙論文准光法師釋尊者妙音意於無想天起心品唯限受生命終二刹那之旨分明也但於婆沙論尊者妙音亦作是説等之文者從無想天沒定生惡趣中云事同次上有説義故云尊者妙音亦作是説依身在欲界將修無想定加行位起謗滅道欲界邪見造惡趣業故云彼謗𣵀槃及聖者故由彼業力從無想天沒定生惡趣中故云從彼命終定生惡趣也如光法師釋謂諸外道將修無想或起邪見謗釋種𣵀槃或起見取計彼爲或起戒取計彼爲道如是等或爲惡趣因也重思其理依身在上界地不起下界地或者性相之所定也設雖尊者妙音意何云無想天命終心位起謗滅道欲界邪見造惡趣業起從無想天沒定生惡趣中哉故推之彼謗𣵀槃及聖者故者述依身在欲界將修無想定加行位事可得意也何況見婆沙論百五十四文云頗有處結生心爲四緣命終心起耶答應説無尊者妙音説有謂即無想天文此文出尊者妙音義云無想天命終心結生心爲所緣緣故無想天命終心位不起無漏緣惑云事亦炳然也若彼命終心位不起無漏緣惑者云出無想心即命終心更不可違發智論出無想想色界有漏緣隨眠隨増云文也重難云披婆沙論百五十四一段之文上云有説