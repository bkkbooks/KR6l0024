一處擧三義云應説而不説者當知此義有餘復次此中但説出無想滅定心加行功用力所引故出無想異熟心非加行功用力所引起故此不説復次此中但説唯是善心出無想異熟心或善或染或無記故此不説文百五十四一處出一説云彼文應言過去法爲等無間生六心謂色界五無色界一而不作是説者有何意耶當知彼文但依二無心定出心而説不説無想所以者何二無心定加行功用作意而起無想不爾文問婆沙論中擧出無想異熟心或通五部所斷或唯修所斷云二師説爾者唯修所斷云師意發智論十五出無想想色界有漏緣隨眠隨増云文如何會之耶進云婆沙論百五十四中會此文云彼有命終時心通於五部非但説出無想心文付之依婆沙論會通披發智論現文既云出無想想色界有漏緣隨眠隨増何會兼説命終心哉是以見婆沙論八十九一處文出無想異熟心唯修所斷云師意會此文云然遮無漏緣故説有漏緣隨眠隨増文若爾自説豈不相違哉答發智論中雖述出無想想色界有漏緣隨眠隨増彼命終心是出無想異熟心之眷屬故兼説命終時心通於五部會也故婆沙論云此文應言彼想色界遍行及修所斷隨眠隨増而不作是説者有何意耶當知此中兼説和合彼有命終時心通於五部非但説出無想心以命終心是前眷屬故此兼説文會通之趣非無其謂歟但於婆沙論然遮無漏緣故説有漏緣隨眠隨増之文者出無想異熟心唯修所斷云一師説中會發智論出無想想色界有漏緣隨眠隨増云文有二義也何可爲相違問從無想天沒生欲界命終心可通善及無覆無記耶答可通善及無覆無記也兩方若通善及無覆無記者生無想天之有情執無想異熟是眞解脱𣵀槃心想還生位於所執𣵀槃可起撥無見若爾彼命終心唯限染汚不可通善及無覆無記哉若依之爾者從無想天沒生欲界之類非一准彼命終心何不通善及無覆無記哉答從無想天沒生欲界命終心可通善及無覆無記也故見婆沙論處處之文或八十九出無想異熟心通色界五部所斷之師意發智論六過去法等無間生二心云文云復次此中但説唯是善心出無想異熟心或善或染或無記故此不説文或百五十四釋發智論十五彼想當言善爲無記耶答或善或無記之文云善謂生得善無記謂有覆無記無覆無記文依之光法師釋云又准婆沙評家出無想心通生得善有覆無記無覆無記通五部所斷文出無想異熟心既通善及染汚無覆無記彼命終心豈唯限染汚哉何況披婆沙論文釋發智論十五生無想天幾根滅答八之文致問答云問此説從何處生無想天耶答此説從無想中有生無想生有問爾時亦有信等五根現在前滅何故不説答此文應作是説或八或十三中有最後心無記者八善者十三而不作是説者應知此義有餘有作是説此中但依滅位生位皆有者説信等五根唯滅位有非生位有是故不説文此文既述生無想天中有末後心通善之旨准知從無想天沒生欲界中有末後心亦可通善及無覆無記也若爾從無想天沒生欲界命終心寧不通善及無覆無記哉但於生無想天之有情執無想異熟是眞解脱𣵀槃心想還生位於所執𣵀槃可起撥無見云難者出無想異熟心後有心位分多念相續非一一念偏可起撥無見彼命終心通善及無覆無記有何所遮哉問正理論意無想異熟可等無間緣生耶答可等無間緣生也兩方若等無間緣生者無想異熟是異熟因所生法也定可非等無間緣生是以勘品類足論六文出心爲等無間法不擧無想異熟明非心爲等無間法述除心爲等無間不相應行諸餘心不相應行婆沙論十一中釋此文云無想異熟是異熟因力所引起任運而轉非入彼心勢力所引故不名心等無間法文既云非入彼心勢力所引非等無間緣生云事炳焉也正理論意寧可違自宗本論説哉加之光法師釋正理論彼以宿業等無間緣爲任持食之文云其無想事雖不從彼等無間緣生文此文無諍無想異熟非等無間緣生見若依之爾者光法師餘處解釋中正理論意無想異熟等無間緣生判如何答正理論意無想異熟可等無間緣生也故光法師餘處七解釋中引正理論豈不無想亦三緣生是心心所等無間故亦應説爲心等無間緣但非心等加行引生故於此中廢而不説或此無想但聲所顯非如二定相對立故之文畢云正理既説無想異熟同二無心是等無間文但於無想異熟是因所生法也定可非等無間緣生云難者設雖異熟因所生法何可遮等無間緣生義哉例如異熟心心所法等無間緣生也次於品類足論文者可任婆沙論無想異熟是異熟因力所引起任運而轉非入彼心勢力所引故不名心等無間法之會通也此文意之理實而言無想異熟雖是等無間緣生不限心等加行引生由異熟因力所引起故不説心等無間法爲言正理論但非心等加行引生故於此中廢而不説之文其意亦同之次於光法師其無想事雖不從彼等無間緣生之釋者正理論彼以宿業等無間緣爲任持食之文意云入無想異熟心與出無想異熟心爲等無間緣不云入無想異熟心與無想異熟爲等無間緣故光法師述此文意無想異熟雖不從等無間緣生然由彼入無想異熟心爲牽引資助無想異熟體方得起爲言全不遮無想異熟實等無間緣生義邊若實非等無間緣生者何以下文云然由彼力牽引資助體方得起哉重意云見婆沙論文云等無間緣食者謂入無想觸意思識爲等無間緣能引無想出心心所令必當起不永斷故文准此婆沙論説思正理論彼以宿業等無間緣爲任持食之文意入無想異熟心與出無想異熟心爲等無間緣爲言故得此文意釋其無想事雖不從彼等無間緣生也非不存無想異熟實等無間緣生義邊更無相違也重難云正理論餘處亦應説爲心等無間但非心等加行引生故於此中廢而不説之文意無想異熟非等無間緣生見何云正理論意無想異熟等無間緣生哉答正理論今文意云以實言之雖應説無想異熟等無間緣生不限心等加行引生由異熟因力所引起故於此中廢而不説等無間緣生爲言標亦應説爲心等無間緣故於此中廢而不説即顯無想異熟等無間緣生之旨也若此文意存無想異熟非等無間緣生者光法師豈引此文畢釋正理既説無想異熟同二無心是等無間哉問論中從無想天沒必生欲界云從彼沒已必生欲界非餘處所先修定行勢力盡故乃至必定有生天之業文爾者今此文擧二師義歟答擧二師義也兩方若擧二師義者論文不置有説之言何云擧二師義哉若依之爾者光法師並寶法師解釋中擧二師義見如何答披婆沙論文述從無想天沒定生欲界故有多異師説之中初師云由異熟因勢力爾故隨異熟因所有勢力唯令如是異熟起故文第三師云有説若造無想天順次生受業者法爾亦造欲界順後次受業如造北倶蘆洲順次生業者法爾亦造欲界天順後次受業文准此婆沙文思今倶舍意先修定行勢力盡故於彼不能更修定故如箭射空力盡便墮者初師説也故光法師釋此文云初師解文若諸有情應生彼處必有欲界順後受業如應生彼北倶蘆洲必定應有生天之業者第二師説也故寶法師釋此文云第二釋也文但於論文不置有説之言云難者今論現文雖無有説之言云先修定行勢力盡故判必有欲界順後受業其義旨趣相替之上婆沙論中既爲別師義故今論文隨彼擧別師義得意更有何疑哉問論文云從彼沒已必生欲界文爾者於今此欲界依身可有入聖義耶答可有入聖義也兩方若有入聖義者見光法師解釋云謂諸外道將修無想或起邪見謗釋種𣵀槃或起見取計彼爲眞或起戒取計彼爲道文如此釋者生無想天之類是諸外道也從彼天沒生欲界之後於彼依身爭可有入聖義哉若依之爾者從無想天沒生欲界之人種類是廣於彼依身何無入聖義哉是以從北洲沒生欲天之者於彼依身無遮入聖義相例可同如何答從無想天沒生欲界之人於今此欲界依身可有入聖義也故光法師餘處十七釋此三障中煩惱與業二障皆重以有此者第二生内又不可治之論文云若異熟障此生受已生第二生容可入聖可救療故故名爲輕文但於光法師謂諸外道將修無想等之釋者將修無想定加行位是外法異生雖起謗滅邪見等從無想天沒生欲界之後迴心作内法異生可有入聖義故光法師釋更非相違也問從無想天沒可生北洲耶答可生北洲也兩方若生北洲者披光法師解釋判謂外道將修無相外法異生生無想天見若外法異生生無想天者如何修無我觀可生北洲哉若依之爾者今論中云從彼沒已必生欲界無簡北洲如何答從無想天沒可生北洲也故婆沙論百五十四中擧評家義云如是説者定生欲界處所不定或生惡趣或天或人文光法師述五趣不定之旨引此文爲證據若爾人趣之中既無所簡定知從無想天可生北洲云事但於光法師謂諸外道將修無想之釋者内法異生位修無我觀造北洲順後業畢後遇邪師聞説邪教作外法異生修無想定生無想天之類由先所造順後業力從無想天沒生北洲事有何所遮哉重難云任光法師餘生雖有順後受業加行中造勢力強故乘彼受生之釋由將修無想定加行位造業可生欲界也而將修無想定加行位是外法異生可非内法異生如何修無我觀造北洲順後業哉答内法異生位修無我觀造北洲順後業之人後作外法異生將修無想定加行位亦造或起生得或聞或思之善業故由彼此業可生北洲也由引滿多類業可受北洲一生異熟果何唯限無我觀一業哉問光法解釋中云謂諸外道將修無想或起邪見乃至或起戒取文爾者今此戒禁取者可苦諦所斷耶答苦諦所斷也兩方若苦諦所斷者見光法師解釋云或起戒取計彼爲道文既非道計道戒禁取也寧非道諦所斷哉若依之爾者今此戒禁取迷麁果處起之定可苦諦所斷如何答今此戒禁取者執無想定爲出離道專迷麁顯果相起故尤可苦諦所斷也故寶法師釋云又起戒取非因計因執無想定能得𣵀槃文何況光法師餘處十九所引婆沙論百九十九云二執謗道諦邪見等爲道此親違道於因果相不別迷執故見道時方能永斷執謗道諦邪見等爲道之戒禁取道諦所斷釋而執無想定爲出離道之戒禁取無執謗道諦邪見等爲道之義非道諦所斷云事亦炳然也但於光法師或起戒取計彼爲道之釋者非道計道戒禁取中迷麁顯果相起之類是苦諦所斷也故光法師餘處十九所引婆沙論百九十九中釋非道非計道戒禁取云一執有漏戒等爲道此迷麁顯果相起故見苦諦時便能永斷文若爾依或起戒取計彼爲道之釋何疑可道諦所斷哉重難云勘婆沙論五十二文云復次此戒禁取唯有二種謂内外道所起差別内道起者見苦所斷外道起者見道所斷復次此戒禁取唯有二種謂非因計因及非道計道非因計因者見苦所斷非道計道者見道所斷文而令此戒禁取者是外道所起亦非道計道之類也任外道起者見道所斷乃至非道計道者見道所斷之文定可道諦所斷如何答此文一往相配也更非盡理之談歟問光法師意從無想天沒生欲界時由將修無想定加行位造業力不由餘生順後業故如何釋之耶進云光法師釋云餘生雖有順後受業加行中造勢力強故乘彼受生文付之順後業者名決定應受業若有餘生順後業者由彼業力可受欲界生設雖彼加行位造業力強勝寧可轉餘生所造順後業哉若有順後業中不感果之類者何不許時定報不定業哉答光法師今解釋任若諸有情應生彼處必有欲界順後受業之論文也無想天有情從彼沒已必生欲界者將修無想定加行位必造欲界順後業乘彼業力必受欲界生故云必有欲界順後受業餘生所造欲界順後業中設雖有此生容感果之類彼順業有無不定不必有故不可云必有故必有欲界順後受業之論文指將修無想定加行位所造欲界順後業爲言重意云餘生所造欲界順後業中此生容感果之類與將修無想定加行中造業同於此生雖必感果彼順後業有無不定故非以彼爲本定從彼沒已必生欲界將修無想定加行位必造欲界順後業故乘彼勢力強盛業力必受欲界生云也問光法師解釋中將修無想定加行位造欲界順後業文爾者其中善業通後起位起之歟進云光法師釋云或善亦通後起位造文付之業由隨眠方得生長離隨眠業無感有能者今論餘處十九所定也而後起位是離染時也既無煩惱助潤何可造欲界善順後業哉是以見正理論四十五餘處文云雖離染者亦造善業而無勢力能招後有文如何答光法師或善亦通後起位造之釋意修無想定後起位造欲界第三生善滿業故從無想天沒定受欲界滿果爲言離染位所造業故雖滿業非引業勢力強盛故專乘彼業力受欲界生也但於今論餘處業由隨眠方得生長等之文正理論餘處雖離染者亦造善業等之釋者就引果談也故寶法師引正理論今文畢云上言有者竝據引果文非云離染位所造業總不感異熟果全無相違問無想天中多有情可居在耶答唯一有情可居住也兩方若多有情居在者寶法師餘處八解釋中述色界立十六天爲正云梵王無想皆唯一故地無別故文如此釋者無想天中唯一有情可居在見若依之爾者修無想定之人種類非一准無想天中多有情可居在也是以今論文云若諸有情應生彼處光法師判謂諸外道將修無想既置諸言知有多類云事如何答無想天中唯一有情可居在也其故披今論文云無想有情居在何處居在廣果謂廣果天中有高勝處如中間靜慮名無想天廣果天中有高勝處名無想天如梵輔天中有高勝處名大梵天故同大梵天中梵王一人居在無相天中唯一有情居在可云也寶法師餘處梵王無想皆唯一故地無別故之釋此旨實分明也但於修無想定之人種類非一准云難者或前後生無想天或容生他界無想天故修無想定之人有多種類全無所背次於今論若諸有情應生彼處之釋光法師謂諸外道將修無想之釋者此亦約前後生就自他界置諸言無其過也例如諸經論中云諸大梵王何爲相違哉問論文云如應生彼北倶盧洲必定應有生天之業文爾者今此生天之業者唯限順後業歟答唯限順後業也兩方若唯限順後業者衆生造業非一准何唯限順後業哉是以元瑜法師述文記九釋正理論十二今文云或即於彼起順生業文若依之爾者述如應生彼此倶盧洲置應生之言例必定應有生天之業唯限順後業見如何答就兩方疑難案一段論文上云若諸有情應生彼處必有欲界順後受業成諸有情應生無想天必有欲界順後業之旨畢下出其例證述如應生彼北倶盧洲必定應有生天之業如將生北洲必有生天之業云故唯限順後業云事分明也既云如應生彼北倶盧洲未生北洲之時事也爭可有生天順生業哉故光法師釋此文云如生北洲必有生天順後受業文泰法師釋此文云如應生彼北倶盧洲必定應有生六欲天後報之業文婆沙論百五十四云如造北倶廬洲順次生業者法爾亦造欲界天順後次受業文任此等文理必定應有生天之業者唯限順後業之義必然也但於元瑜法師或即於彼起順生業之釋者若背論文旨趣者不可依用之若強會通之者指順後業云必定應有生天之業論文本旨也更不可諍之此上從北洲沒定生欲天故於北洲必造欲天順生業生天以前所造業故被云必定應有生天之業之義勢可有云也是即論文之外作別剩釋歟故勘元瑜法師解釋云北倶盧洲定生天故有生天業或先所造順後受業順後業爲本畢云或即於彼起順生業定有業義同非順後相似顯別義門見也問論文云如應生彼北倶盧洲爾者唯從人三洲生北洲歟答不限人三洲也兩方若唯從人三洲生北洲者衆生造業感果其相可不定豈無從餘處生北洲之類哉若依之爾者光法師釋生北洲業因云亦於人中修無我觀文如此釋者唯從人三洲可生北洲見如何答思生北洲業因不限順生業可通順後及不定業也若爾於人三洲修無我觀造北洲順後或不定業畢生餘處所之後由彼順後或不定業力生北洲事有何所遮哉出光法師亦於人中修無我觀之釋擧唯從人三洲可生北洲云疑其趣未落居歟何況以無我觀定生北洲業因者於欲天中修無我觀從彼沒已生北洲事寧不許之哉問論文云如應生彼北倶盧洲必定應有生天之業文爾者生北洲人可造不善順生業耶答可造不善順生業也兩方若造不善順生業者既云必定應有生天之業何可造不善順生業哉是以見光法師解釋當卷消今此文云將生北洲業純淨故彼沒生天文餘處十三明生天業云若諸天等造純淨業故所感果内外倶妙文任此等定判生天業是純淨業也不可通不善業加之婆沙論中述五趣造業相云北狗盧洲能造四種善業三種不善業除順次生受文若依之爾者於欲天中容受不善業異熟果生北洲人豈不造不善順生業哉答披今論餘處十六文云欲善業果必定應爲惡業果雜以欲界中惡勝善故受欲界善業異熟果之時不善業異熟果必所雜受也而定北洲命盡生欲界天從北洲沒生欲界天受善順後業引果之時不善順生業滿果寧不雜受哉故今論餘處十五中判諸處造四種地獄善除現不簡生北洲人造不善順生業也但於今論必定應有生天之業之文者造北洲業之人法爾必造欲界天順後業故雖述如應生彼北倶盧洲必定應有生天之業於欲天中容受不善滿業異熟果故生北洲人造不善順生滿業有何所遮哉次於光法師當卷將生北洲業純淨故之釋餘處若諸天等造純淨業之釋者以天上業對人等業之日天上是善勝惡劣之處故天上業且名純淨業也光法師餘處造天善業雖亦起惑善勝惡劣故得純名之釋即顯此意也次於婆沙論除順次生受之文者生北洲人所造業中不善順後不定二業通五趣業故隨其所應引業滿業倶造之不善順生業是欲天業故唯造滿業不造引業爲表此義云除順次生受也非云不造不善順生滿業婆沙論文全無相違重難云生北洲人不造不善順生引業故除順次生受云者何云造順現業哉順現業唯限滿業不通引業故也答順生順後不定三業通引業滿業之中生北洲人於不善順後不定二業者引業滿業倶造之於不善順正業者唯造滿業不造引業故混云造不善順生業者可有造引業歟云疑故云除順次生受也順現業自本唯限滿業不通引業無相濫云造順現業也問於無想天可起眼耳身三識及發表心耶答可起之也兩方若起之者見婆沙論百九十一文云彼無想天有心位必不起不同分心故文若起眼耳身三識及發心者寧云不起不同分心哉若依之爾者光法師釋能招無想有情天中五蘊異熟之論文云初生後沒有心心所故具五蘊文若爾初生後沒多時有想位何不起眼耳身三識及發表心哉答今論中云生死位中多時有想言無想者由彼有情中間長時想不起故光法師解此文述衆生於彼生死位中多時有想然言無想者由彼有情生後死前中間五百大劫長時想不起故從多分説故名無想於無想天初生之後將死之前多時之間既有心想尤可起眼耳身三識及發表心也若不起之者如何生彼能見聞觸及起表業哉故可起三識身及發表心云事道理實必然也但於婆沙論必不起不同分心故之文者見一段上文以他界心及無漏心名不同分心也故婆沙論云若生欲界以欲界心爲同分心與彼命根衆同分爲同分故以色無色及無漏心爲不同分心不與彼命根衆同分爲同分故若生色界以色界心爲同分心以欲無色界及無漏心爲不同分心若生無色界以無色界心爲同分心以無漏心爲不同分心文此文明起自界心爲同分心起他界心爲不同分心故起一界中下地眼耳身三識及發表心屬同分心不可名不同分心故於無想天雖起三識身及發表心更不可違不起不同心之文也重難云勘婆沙論一段下文釋發智論頗有有五行耶答有謂欲界有情及色界有想天住同分心若無想天不得無想之文云彼必有自地現在五行故文此文既云無想天有情不得無想異熟位必有自地現在五行明知於無想天不起自界中他地心云事答於無想天起眼耳身三識及發表心位有色有五行故有自界五行位總云有自地現在五行也重意云起他界心爲不同分心之時起同分心雖他地心名自地心也問有宗意無想定可有退失義耶答可有退失義也兩方若有退失義者於無想定唯順生受非順現後及不定受者諸論一同之説也若有退失義者何不通順後及不定受哉是以婆沙論百五十二中問此無想定有退轉不答此無退轉雜心論九文述無想正受者乃至不退轉文若依之爾者披今論説判若起此定後雖退失於無想定許退失義如何答無想定者唯是異生所起定也而異生位種姓未定第六種姓猶有起惑退禪定修無想定之人何無起惑退此定之義哉是以今論云若起此定後雖退失傳説現身必還能起文以傳説言思退失文擧有宗義云事炳然也但於若有退失義者何不通順後及不定受哉云難者修無想定之人雖有起惑暫退之義此定勢力猛利現身必還起之順次定生無想天故唯限順生受不通順後及不定受也唯順生受非順現後及不定受若起此定後雖退失傳説現身必還能起當生無想有情天中故得此定必不能入正性離生之論文其意如此次於婆沙論此無退轉之文者起無想定之後極厭此定入聖得果類不現行應言退失無想定也故婆沙論百五十二云聖雖成就而不現行彼依現行名異生定是故尊者妙音説曰得此定補特伽羅有能入正性離生者應言退失此定於彼極厭不現行故文而於無想定者雖有起惑暫退之義此定勢力猛利必還起之不能入聖得果不通不定受故云此無退轉也婆沙論百五十二非順不定受者不可退轉故之文即顯此意也雜心論不退之説會通之趣亦可同之重難云有宗意許無想定有退失義者與婆沙論百五十二所載譬喩者説有何差異哉答有宗意無想定有退失義者唯是暫退更非永退譬喩者意許修無想定之人入聖得果通不定受有永退義故與有宗意非義遥果也重難云正理論十二中無想定通不定受見若爾有宗意寧非許永退義哉答正理論中無想定通不定受者是一師不正義意也全非彼論所存正義故光法師釋之又一説云一類諸師作此定執謂順生受及不定受文此釋意一類諸師作此定執之言屬此師説故是一師不正義意非彼論所存正義云事炳然也問論文云若起此定後雖退失傳説現身必還能起文爾者今此傳説者傳説婆沙論評家義歟答傳説婆沙論評家義也兩方若傳説婆沙論評家義者今論中云若起此定後雖退失婆沙論百五十二評家意判此無退轉其義既各別何可傳説婆沙論評家義哉若依之爾者今論幷婆沙論百五十二評家意同述記無想定後不能入見道之旨明知今論傳説之言傳説婆沙論評家義也如何答論主意起無想定爲順生受畢設雖起惑暫退之必還得此定故不能入見道不通不定受順次定生無想天中云也不信現身必還能起云義故置傳説之言也故今論傳説之言傳説婆沙論評家退無想定之人現身必還能起云義可云也但於今論中云若起此定後雖退失婆沙論評家意判此無退轉其義既各別何可傳説婆沙論評家義哉云難者婆沙論中云此無退轉偏簡起無想定之人能入見道云義也非遮起惑暫退之義於無想定有起惑暫退之義云事婆沙論評家意自本許之論主意隨亦信之故其義無異也若起此定後雖退失之處不置傳説之言現身必還能起之文首始安傳説之言其意在之歟重難云婆沙論中何處見退無想定之人現身必還能起之旨哉答婆沙論中釋無想定名異生定云聖雖成就而不現行彼依現行名異生定文若無退無想定之人現身必還能起之義者入聖之後何必成就無想定哉故退無想定之人現身必還能起云事此文自所見也覺澄阿闍梨云見元瑜釋云倶舍論中經主不取如是正釋於前師解起不信心言此定退傳説必起得此定者必不入聖於此不信可謂聰明文准此釋思之今論意存無想定通不定受云義不信婆沙論唯順生受之説置傳説之言也問論文云若起此定後雖退失傳説現身必還能起文爾者今此退失定異熟果可現前耶答可現前也兩方若現前者既退失定也彼異熟果何可現前哉若依之爾者今此退失定還起之者彼異熟果定可現前也如何答今論中釋無想定述唯順生受非順現後及不定受若起此定後雖退失傳説現身必還能起當生無想有情天中故得此定必不能入正性離生修無想定之人雖有起惑暫退之此定勢力猛利現身必還起之順次生定受無想天異熟果云故彼退失定異熟果可現前之事炳然也若彼退失定異熟果不現前者何可定唯順生受哉但於既退失定也彼異熟果何可現前哉云難者設雖退即定還得之者彼異熟寧不現前哉今疑難之趣頗不得其意者歟問光法師所引正理論中擧無想定唯限順生受惑通不定受云二説爾者唯限順生受云説爲正義歟答爾也兩方若唯限順生受云説爲正義者披正理論文云又許此定通此法外法異生所得非聖文若許内法異生修無想定者何無入聖得果通不定受之義哉是以彼論中上雖擧今二説下對滅盡定判其不同云前無想定能順生受及不定受今滅盡定通順生後及不定受文以下一文思上二説無想定通不定受云説爲正義之旨分明也若依之爾者唯順生受之説本頌既載之定知正義云事如何答顯宗論七中不改頌云善唯順生受文光法師引正理論又云一説云一類諸師作此定執謂順生受及不定受一類諸師作此定執之言開通不定受云説故唯限順生受云説是正義通不定受云説一類諸師不正義云事炳然也但於正理論又許此定通是此法等之文者述無想定通不定受云不正義一説意也唯限順生受云正義意内法異生不起無想定所定也何擧別師説致其疑哉次於正理論前無想定能順生受及不定受之文者無想定通不定受云説雖不正義一類師説既有此義故含攝彼説云及不定受也不云依正義意通不定受亦非相違哉重難云見正理論十二文云唯順生受非順現後及不定受一類諸師作此定執理順生受及不定受所以者何成此定者亦容得入正性離生入已必無現起此定由約現行説無想定名異生定非約成就文案此文意指唯順生受非順現後及不定受之説結一類諸師作此定執次云理順生受及不定受通不定受云説爲盡理義爰知彼論意通不定受之説爲所存實義云事是以元瑜法師釋此文云一類諸師言唯生受我如理釋通生不定謂諸外道得此定已迴心入聖聖通生已必不更起約非聖所行名異生定非據成就若入聖道必不受果故通不定文此釋意無諍通不定受云説爲彼論正義見如何答一類諸師作此定執者是標下義之言也更可非結上説之文故光師所引能順彼論文體何況思道理唯順生受非順現後及不定受之義源出婆沙論百五十二説專爲有宗本義不可降一類諸師説故一類諸師作此定執之言開理順生受及不定之尤叶文理也但於理順生受及不定受之理言者彼一類師謂盡理義故依彼師意置理言歟何被拘此一字忽可定正義哉就中光法師所引本云謂順生受及不定受無有理字若以彼本爲正者此疑頗無用也次於元瑜法師釋者別師異釋也存此等道理之時且不可依用之問光法師所引正理論中述無想定通不定受云義云成此定者亦容得入正性離生文爾者今此師意入聖後受無想定異熟果義可有耶答不可有此義也兩方若有此義者無想定既名異生定入聖之後何可有受彼異熟果之義哉若依之爾者今此師意許入聖之後成就無想定可受彼異熟果也是以披婆沙論説云是故尊者妙音説曰得此定補特伽羅有能入正性離生者應言退失此定於彼厭不現行故命終生於第四靜慮於彼處所有容受故文如此文者無想定通不定受云義意入聖之後受無想定異熟果之義可有見准婆沙論今説思之正理論此師意其義可同如何答修無想定於無想天受五蘊異熟果者諸論一同之談也而聖者不生無想天故設雖無想定通不定受云義意入聖之後不可受無想定異熟果云事必然也即見正理論文述此師義云一類諸師作此定執理順生受及不定受所以者何成此定者亦容得入正性離生入已必無現起此定由約現行説無想定名異生定非約成就文此文意云修無想定之人迴心入聖之後永不受無想定異熟果故無想定通時報倶不受爲言故元瑜法師釋此文云我如理釋通生不定謂諸外道將此定已迴心入聖聖道生已必不更起約非聖所行名異生定非據成就若入聖道必不受果故通不定文若入聖道必不受果故通不定之言此旨甚分明也但於今此師意許入聖之後成就無想定可受彼異熟果也云難者無想定通不定受故入聖之後雖成就之聖者無起無想定不生無想天故永不受彼異熟果也次於婆沙論命終生於第四靜慮於彼處所有容受故之文者尊者妙音意成得無想定補特伽羅有入正性離生者應言退失無想定之道理若不退失無想定者入聖之後命終生第四靜慮容受無想定異熟果故亦應退失無想定也爲言重意云修無想定之人雖迴心入聖猶不退失無想定者命終生第四靜慮容受無想定異熟果之過可有云事也而今此人必應退失無想定故入聖之後永不受無想定異熟果也問正理論意内法異生初起無想定義可有耶答不可有此義也兩方若有此義者内法異生無執無想異熟是眞解脱𣵀槃由何初起無想定之義可有哉若依之爾者見正理論文云又許此定通是此法外法異生所得非聖文既許内法異生得無想定寧無初起彼定之義哉答彼正理論文偈頌結後意求脱長行判彼執無想是眞解脱執無想定爲出離道爲證無想而修此定外法異生之中執無想異熟是眞解脱𣵀槃無想定是眞出離道之人爲證彼解脱𣵀槃初起此無想定也而内法異生不執無想異熟是眞解脱𣵀槃無想定是眞出離道故初起無想定之義難有歟但於正理論又許此定通是此法等之文者述無想定通不定受云義意也此義意許修無想定之人迴心入聖得果故迴心爲内法異生之時起無想定云此法異生得無想定也重意云外法異生位執無想異熟是眞解脱𣵀槃無想定是眞出離道初起無想定之人迴心爲内法異生之後雖不作如前之執由串習力亦起無想定此法異生起無想定爲言非云内法異生初起無想定也問無想天可有中夭耶寫本云文永二年乙丑後四月十五日酉時於海住山十輪院抄之畢去年窮冬下旬之候始此卷抄今歲孟夏閏月之半終其微功問端過七十條白餘一百枚之間結集之次分爲兩帖方今宗性忘寢忘食勵修學於觀音寺之朝風聚文義探淳粹於罽賓國之夜月觀自在菩薩知見懇誠春日大明神哀愍此深志兜率雲上垂引攝於内院之砌龍華露底開惠解唯心之理而已右筆華嚴宗末葉法印權大僧都宗性年齡六十四夏﨟五十二
