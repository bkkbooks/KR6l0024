body:
  text: 倶舍論第十三卷抄上問題問以欲天善業名雜業可云耶問頌文思即是意業云云爾者限意識相應可云耶問光法師意約所依可云立意業耶問薩婆多宗意以定境界色可云無見無對色耶問有宗意證無表實有義引八證見爾者法處色證光法師如何釋之耶問於色界可有表所發無表耶問光法師意色界聞慧可發表業耶問頌文欲後念無表依邊大種生云云爾者今此後念無表能造大種者即爲初念無表能造將別類大種可云耶問光法師意於有對色成能造大種不成所造色義有可云耶問中間禪所攝隨轉戒即彼地大種所造也可云耶問有是刹那謂初無漏云云爾者今此初無漏者可云限現前苦法忍耶問散無表能造大種與定無表能造大種爲同類因義可有耶問寶法師今解釋中引正理論説雜對別異有情相續發多無貪所生無表云云爾者今此衆多無表者一具大種所造可云耶
