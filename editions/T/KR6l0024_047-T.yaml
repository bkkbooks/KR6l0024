body:
  text: 倶舍論第十五卷抄承久三年十一月二十五日於東大寺中院始之問眼根成就聖者九結中成六結之人於十隨眠所繋可有多少不同耶答可有也兩方若云有不同者於三結成就人者無此不同若依之爾者婆沙論中可有多少之不同見如何答可有多少不同也異離欲人入見道苦類智未生位九結中除悉嫉慳餘六結成就之類也於十隨眠中除嗔九隨眠成就之類也預流一來果聖者九結中除見取疑餘六結成就之類也於十隨眠中唯成修斷四惑也故有多少不同矣答於他身見惑得縁縛斷無爲事可云斷修惑第九品之位也其故者自身修惑可縁他身見惑故於自身修惑之盡處可得他身見惑縁縛斷無爲也難云自身修惑縁他身見惑者可云見惑更不可云修惑例如重縁惑見所斷如何答若自身修惑縁自身見惑者誠可有見修雜亂之過他身見惑是疎遠故自身修惑雖縁彼更不可有見修雜亂之過也答云堅於離染地述不退姓名堅可限第六種姓也其故披婆沙論之所説已離自地染退法異生於上地造順生業説若夫亘六種姓不退云不退法亘六種姓退云退法者何於上地可造順生業耶而婆沙論全文大旨同今論心以婆沙思此論其義可同也何況見餘處光法師解釋致若異生位第六種姓容有退者之問引今此文答此問解云但言不退異生於離染地不造生業非全第六種姓皆定不退或據天中據言不退云云初釋意於第六種姓有退不退之中就不退者云堅於離染地也第六種姓悉定不退非云堅於離染地等釋也第二解心今此文付天中第六種姓人論之云也凡以實論之者於天中六種姓悉雖無退今此問答之起盡釋第六種姓故且付天中第六種姓都無退論之也矣答一義云上品忍現前之時可得修未來下品忍也難云若得修者未來下品忍上得現前爲彼未來忍可爲同類因也光法師何云非等流歟答論等流非等流事可依彼心品也更不云得爲同類因之義也私云光法師縁同時得云釋前會不知同類因云婆沙十八卷之文此潤色也此愚惟也有其憚矣承久三年倶舍三十講光慶問辨寛其時下座之談議也答於勝道沙門等四種沙門云不攝凡夫持戒人光法師第四釋心者引以世尊説准陀當知等之經文以犯戒沙門汚道沙門云事證了文更無第五之詞全非經文犯戒沙門則是汚道沙門故更不可有第五相似沙門有部證詞也今此四種沙門之外非云無餘沙門也故以持戒凡夫非今此四種沙門所攝云事不可有其過若夫更無第五之詞經文今此四種沙門之外不可有餘沙門故今此解意以更無第五之詞釋有部之證言也答以預流向聖者所歸依體云事論文光法師等之解釋分明也凡立僧寶事全不依説法利生之義本自於聲聞者趣自調自度之道無大慈大悲之心故也故依理和合義邊立僧寶之故預流向聖者曾無出觀之義雖隔利生之思立僧寶爲所歸依體也理和合僧不可破故光法師解釋述此心也但於菩薩者濟度利生爲本説法教化爲望而菩薩學位無出觀之義故不爲所歸依體也菩薩聲聞所望是異故不可爲相例次於獨覺者獨一出世之人無理和事和之義背僧義故不爲所歸依體也但以諸獨覺不能説法之釋心於獨覺者不可爲僧寶故非所歸依體事理在絶言之上重又述此故也更不可有其過耳答正理論意於無漏法捨縁不云練根捨云事可有其故於退失既攝果退姓退於得果何不攝得果練根以退思得其義可同之故也問論文異心無心亦恒轉故文爾者無心者亘二無心定歟進云寶法師無心者滅定文付之得別解脱戒之人不遇於縁有爲外道之義者無心之言何不亘無想定歟乘信得業如此疑之云云尋云正理論意於退失攝果退姓退云事何處見歟答乘信云於北州不造不善順生業者凡北州人成生欲天決定業故成天決定業之後不可有造天不善順生滿業之義歟設於餘三州者次生可生天成決定業之人不可造不善順生業也既成天決定業故此後都不造不善順生滿業也於北州者次生可生天之義決定故都不可造不善順生滿業也引業自先成之不造之故總不造不善順生業也問今論正理等中出不成過去道共戒唯擧初苦法忍事非無其故凡於得果練根初位尤可有其藍初得果時誠雖不成過去道共戒還得位可成過去道共戒之故也於苦法忍者既無此藍故述聖初除過去唯簡之也婆沙論中答薩婆多宗意於順現業不可有轉義也既是定業也如何轉之其道理更不可疑之但於轉福感壽等釋心者一義云羅漢果聖者起無貪相應思修布施行之後入邊際定之後起定了發願兩前生留不定業不受彼乘今生所起無貪相應思力感現在命根也兩前生留不定業云轉福異熟業也實非云福業轉感壽果壽業轉感福果也答光法師意於佛果位可成不染無知也其故光法師意不染無知許通善而於善法捨縁不擧成佛位故猶可云成之也但於佛果位不可成不染無知云難者於佛果位雖成不染無知聚不現行故可云斷也是則不成不生二斷中不生斷也故無過歟定範法印之義也一義云設雖不染無知通善云意於佛果位更不可成之也未成佛來所有一切有漏不染劣惠爲體之所判則此意也但於善法捨縁不擧佛果位云難者此別縁力故不擧之也例如善法捨縁不擧入無餘位凡如此別縁之事更不可有其過也頼惠法印之義也答頂善根隨轉戒於破戒可有捨對治也婆沙論第七卷一段云問答未得未至地人思惠無間始可有起頂善根之義見亦爾之言其旨分明也若有許此義者有捨對治云事又不可疑之也但於不擧捨對治云難者就善根次第起之類論之故不擧捨對治也更不遮始起頂善根之人有捨對治事也答見非見所等四句不同限身念住不可亘餘二念住也但於衆事分説者凡於彼衆事分者其誤是多也更不可依用之矣或又正理論等中一師意意識相應有漏善心中有非見之類云云若衆事分當彼師之義歟答於北州造不善三業事有多義一義云就引業論造業故北州之人云不造不善順生業也善業可感欲天果報之故若夫造北州業加行位唯造欲天滿業之類可有故於善順生業造之也一義云任婆沙抄解釋於北州不造不善順現業也其故北州者四州之中勝處惡業不増減故彼處所造不善業其性微劣不感順現之果報也感順現果報之業其力可強減之故云云一義云於北州不造不善順生業事六欲天者殊勝之果報北倶盧者惡業微劣之所故於北州所造不善業不可有感欲天順生果之義也云云答今時未滿千年之光法師解釋可云製本疏之時也其故法蜜部心正法滅時云捨戒之義破了引下論二説了若依前説今時未滿千年等者法蜜部心與此文引合如之法蜜部正法滅時捨戒者今時説戒羯磨未止思故未滿千年云文心也今此文正非破法蜜部之執只總顯正法住時也以實論之時今時可過千年也故寶師破今時未滿之釋也若依後説教法住時過千年説故又依此説作容過千年等之釋也第二十九卷寶師釋中以有釋證法等之後釋爲正判相叶當所破光法師之釋也故兩卷引合能能可令得心之也答生聖者不發癡所生色業者癡是見所斷聖者斷之故也但於修所斷癡可色業云難者凡修所斷癡者隨他起非自力起故修所斷癡不云發色業也則或從貪嗔慢而起或從忿等而起故云貪嗔慢乃至忿等所發色業不云癡所生色業也耳答苦法忍相應思爲非業爲因法事凡披品類足論之一段廣出業法之時雖擧身語業及思正就業論諸門分別事唯以思爲業也故苦忍相應思以思無爲因之義故出非業爲因法也則彼論中以身語業云隨業轉法其潤色也耳答於無色界有非心爲因法云事品類足論所説分明也於非心爲因法云三界遍行修所斷隨眠隨増之故也則出其體者等流同分并彼界法上非得是也倶舍論中於無覆無記同類因有四説之中以第四説光法師爲正判而於不相應中除四相之外以心不爲因見故彼等非心爲因體云事更不可疑之答薩婆多宗意犯重人現身不入聖得果云事光法師之今解釋分明也其故犯重必可爲地獄定業故不入聖得果也於四極重感墮罪中之論文則此意也但於斷善邪見者是意業故若發露懺悔續善者乃至可證羅漢果也婆沙三十五卷中此旨分明也答有餘師説順現法受業餘生亦得熟之文則可云下譬喩者之義也其故光法師以今此義有餘經部師説釋而云譬喩者豈非經部之義耶依之正理論中但置譬喩者之詞婆沙論中以餘生亦得熟之義云譬喩者以八業家之義説復有餘師説其則兩師其義同之故也答有漏道證一來果人於胎中過去道共無表成不成事可有二義歟其故婆沙等論中有漏道證不還果人於無漏勝果道有起不起之二説寶法師雖有正否論文并光法師等更無正否之故以彼例之有成不成二義所成申也答得近事近住勤策三戒之時可云不得不雜穢業道也其故凡於今此三戒者本自製身三語得今此戒之時何可得不制不雜穢業道耶但於虚誑語業道之時必兼雜穢語云難者成虚誑語之時正不成虚誑語體語表極微雖爲雜穢語所攝虚誑語體即不云雜穢語凡光法師等意破念法師即雜穢語之義虚誑語雜穢語其體各別之故得近事等戒之時不可得不雜穢業道也答離欲染第九無間道位自相續九品煩惱相望不可有縁縛斷之義也其故於品之無間道位斷同部同品縛用之故得自性斷無爲不可得縁縛斷也自相續中等之論文則此心也但於自相續煩惱互縁之云難者設雖有同部異品縛用既斷同部同品強縛故自性斷非縁縛斷也凡立五品之不同論能縛之強弱事光法師解釋誠以委細也事是廣博難成者歟答於北州不造不善順生義云事一兩義次上注之但於諸處造四種等之文者想於五趣論造業之時於地獄想不造善順現業故別遮之也於北州者誠雖不造不善順生業想於人趣者具造善不善四業故不遮之也於人趣想不造不善順生業者誠以例難可然彼地獄全也是人趣少分也更不可爲相例若於一趣委論之時如婆沙論可云不造不善順生業也答受苾芻戒之人除雜穢語犯餘三語之時兼可犯不雜穢業道也餘處論中於處雜語業必兼雜穢語云故也問聖者以世俗道斷欲界修所斷下下品惑之時於見所斷下下品法不得無漏離繋得判凡聖者以世俗道斷欲界修所斷下下品惑位者即不還果證得之時也尤於見所斷法可得無漏離繋得歟答成就近事勤策苾芻三戒之人犯身三語一戒之時倶可云犯三戒也問有論藏中付明退捨相且退法種姓聖者非起或退有捨道共戒之義判凡退法種姓聖者非起或退難捨道共戒耶是以退法種姓聖者非起或退更無捨道共戒之義耶婆沙百六十九也維摩會講問可疑之也答意識相應邪見倶生法無惡行不善根倶句也其故惡行非不善根者邪見及不善思也不善根惡行者癡是也故不可有倶句但於五識例難者貪不善根嗔不善根可爲倶句故非相例矣於邪見者唯在意地故於意識相應煩惱倶生法中無第三句也婆沙百十二委細也可見之矣三惡行者身惡行身三語惡行語四意惡行貪欲嗔恚邪見三不善根者貪也欲界五部嗔也欲界五部癡也欲界五部問有論藏意分離色界染人不證聖果判凡披一論前後之文案四果證得之相分離色界染人尤可證之耶是以分離色染人可證聖果見相例可同如何正理論維摩會講問可疑之也問論中付明斷善捨相且寶法師意中有位受斷善異熟果者至生有時可云有續善之義耶答兩方若云有續善之義者凡斷善邪見者既亡九品之善根久受一劫之異熟於中有位受彼異熟果者忽至生有時難有續善之義耶若依之爾者寶法師餘處解釋中可有此義見如何問或論藏意羅漢善眼識初現起時成一恒住可云耶付之既眼識初現起位也如何可成一恒住耶問欲界所繋苦集現觀邊所修世俗智可云縁色界耶進云不縁文付之色界所繋苦集現觀邊所修俗智縁無色界耶如何答於同分者三界互可現前也其故見餘處論文於不相應行不立等無間縁之故釋不相應行三界及不繋可倶現前故云云光法師釋此文同分亦有多體於三界中可倶現前云云解釋無論可有此義見出其體者先依身欲界起色界心品之時彼心上同分此色界繋也起無色界心之時彼心上同分又無色界繋也依身色界之人准此可知也尋云今此同分者何同分耶答彼心品之上能同法同分也難云於非得并非擇滅得者隨依身判姓類云同分何不然耶答答修練根之時以近分地爲無間道以根本地爲解脱道之義可有也但於婆沙論中不擧之云難者一義云既擧用樂遲通行及苦速通行作所作事故相從不擧用苦遲通行及樂速通行作所作事之類也凡見一段婆沙論之文擧苦遲樂遲不擧樂遲苦遲擧苦速樂速不擧樂速苦速是則其潤色也耳私云用二有五類初類苦遲樂遲第二苦遲苦速第三樂遲苦速第四樂遲樂速第五苦速樂速也婆沙九十三也一義云修練根之時以近分地爲無間道以根本地爲解脱道之義不可有也其故起根本地事難故以近分地爲無漏道之後以根本地不爲解脱道也起近分地事易故以根本地爲無漏道之後以近分地又爲解脱道也云云問論中付明退捨相且不動種姓羅漢果聖者可云退所得功徳耶兩方若云退者凡不動種姓羅漢果聖者悉斷鈍性之無知既得不動之稱豈於所得之功徳可有退失之義耶是以光法師今解釋中引正理論説若不動法無學倶無述無退失之義定若依之爾者披正理論餘處所説餘處正理論中破世親論主非練根得亦無退理之文不動種姓羅漢果聖者退所得功徳見如何以知衆賢論師意不動種姓問付明異熟果相且縁力斷善人於中有位可云受斷善異熟果耶兩方若不受者凡斷善邪見者既亡九品之善根久受一劫之異熟設雖縁力斷善人也何於中有位不受彼異熟果耶是以因力斷善人者於中有位受斷善異熟果見相例可同若依之爾者婆沙論中縁力斷善人於中有位不云受斷善異熟果耶如何答今此二類之外更不可有處中無表也其故今論所説分明也但於正理論之文者處中善不善其性是廣故於有無表處中善不善者雖爲善惡戒種類所攝也於無無表處中善不善并無記者云非善戒惡戒之所攝也云爾非云有處中無表非善惡戒所攝之類歟云云此義不可用也別紙委細注之此義有難歟問付明定道二戒退捨相且非起或退非種姓退可有捨道共戒不捨定共戒之義耶兩方若云有此義者退捨之種類雖廣更不可過今此之二類耶若依之爾者婆沙論百六十九中可有此義見如何同有論藏意答於處中無表不可有離染捨之義也論疏中不擧之故但於善憂根既爲處中能發能發既離染捨也所發無表可同云難者所發無表稍劣故離染之前可捨之也例如生得善所發處中無表能發後捨所發加行位捨之也答卒爾命終事珍海云抄第六末論十八云論問頗有順法受者此下第二頗設問答初師爲正第二師是妙音不正義此宗不許一期生中造現受業而彼果在未來故准下知是妙音義也答空無邊處近分加行心不縁下地法上擇滅云事婆沙論九十二卷前後之文分明也識身論中色界心縁下地法唯擧麁等三行以知空處近分心縁下地事可限麁等行相也若限麁等行相者不縁下地擇滅事其理顯然也但於空處近分心通四念住云難者斷惑加行道等位所起麁等三行相可別縁下地色等歟次於非擇滅例難者婆沙論中空處近分心於下地類智品道上非擇滅有縁不縁之二説一處釋中以縁云義不正義述故不可有相違歟答色界繋無覆無記心以已斷未斷爲因之義不可有也其故已斷無覆無記心以已斷爲因未斷無覆無記心以未斷爲因之故也無色界無覆無記心其義可同也但於色界繋有覆無記心例難者聖者所起上二界修所斷惑已斷見所斷惑爲因并未斷修惑可爲因故可有已斷未斷爲因之義也次於欲界繋無覆無記心者預流果一來果人所起見所斷惑所感欲界無覆無記異熟心心所法以已斷見斷惑爲異熟因以未斷當地無覆無記心可爲同類因也上界煩惱無感異熟果之義故無相例可答申也答非果法者虚空非擇滅故唯可云世俗智知也無果法者亘三無爲故除苦集道他心四智可云六智知也故可有一智六智之不同也答一刹那定道戒者可有多具七支也其旨第二十二卷神泰法師之解釋見歟但於唯從一具四大種生等之文者一七支各一具四大種所造云故更不可有相違有多具七支者隨又可有多具能造大種也次於倶有因難者多具七支并多具大種同一果故爲倶有因更無其過一具七支爲一具大種各爲倶有因總論之時尤可爲倶有因也答以聲界云心倶生法不云心倶滅法云事一義云判聲隨欲生故非異熟聲隨心起云心倶生法聲間斷法非如色根等乃至命終不相離之故於聲者雖有心倶滅之位有間斷之義不云心倶滅法也委旨如第十九卷隨見抄也此義無謂歟答於發表通果心者不可云唯縁現在也其旨光法師第十卷疏見重案道理於發表通果心必可有因等起心故因等起心品現起之時可縁未來所發表也但於他心例難者他心不可有因等起心品之故非相例難也初他心一化者初全一心各一化云文心也答四靜慮者靜慮之稱唯限善故可隨増遍行修所斷隨眠隨増也於無色者無色之稱廣亘三性故可隨増一切隨眠隨増也答依第二靜慮證不還果之人證第四果之時必可捨喜根相應不還果所攝無漏隨轉戒也依第四靜慮捨之根事不同也但於第三禪例難者依第三禪證不還果之後依未至地修練根了則依此地證羅漢果之時不可捨樂根相應無漏隨轉戒也本自不成利根所攝不還果體之故也若諸不還依下練根不得果之心也尋云依未至地修練根之後何不起勝果道耶答彼非不還果道非疑也答集智相應非無願三摩地相應法者唯可限無願三摩地一種也其故可知但於無願三摩地相應非集智相應者道下四行相苦下苦無常二行相并集法類忍位也故不可限一種次於苦智相應非空解脱門相應者苦下苦無常二行相故不限一種無過也答法處中不可有受相應非隨心轉之句也心王者非法處攝故隨心轉非受相應者受心所并心王上得四相等也倶句餘除受餘心所也但於例難者法處中隨尋轉非伺相應者伺也伺相應非隨尋轉者尋也倶句者同時心心所也故無過也尋云無色界等流同分并非得何以異熟心心所法不爲同類因耶答婆沙論中非三性根爲因又非無因之根出擧命等八根如解釋者命等八根以異熟無記心心所不爲同類因見以之例之無色界等流同分并非得以異熟無記心心所不爲同類因歟可思也答今此一段以無間道名證也故超越證不還果見道類忍現前位唯可修無願解脱門也見道不修異類故證一來果之時准之可思也羅漢果證得之位所修是廣之故非相例矣答以等無間縁果望彼縁之時可有爲異熟果之義也如彼無想異熟者以善入心望無記出心之時可有爲異熟果之義也又等無間所起心品故望入心之時出心又可爲私無間縁之故也光五可見之也答一念眼識流至三世之時現在未來相對於所縁不可有不同也凡判五下生自世五識可生未來唯縁未來現在唯縁現在之故也但於識身文者彼衆同分現在非刹那現在之故於現在所縁擧答云動業取果用起不起事一義云於五趣倶可起取果用也既是動業之故於五趣倶可起之也但隨其縁起與果用事可限一處也云云別解脱能發心所發戒捨縁不同事婆沙百九十六道類智次念果道云事婆沙十八在之問論疏中付説異熟果相且尊者妙音意聖果證得之後無想定所成果報現起之義可云有耶兩方若云有此義者凡正理論一師無想定通不定業云義意者是同妙音義而彼論一師意述無想定通不定業不云聖果證得之後彼果現起以知妙音意不許此義云事若依之爾者妙音意許無想定通不定業者設雖聖果證得之後也何無彼果現起之義耶旁難思如何問付判諸業相且斷善邪見必可云爲牽引業耶兩方若云不必牽引業者凡斷善邪見者忽斷九品之善根久感一劫之異熟既猛利業也尤可限牽引業耶若依之爾者尋斷之縁廣亘因力縁力忽感果之力可通引業滿業也如何答羅漢向聖者成極外十三等至判不擧依身空無邊處未離空無邊處人事凡今此一段之廢立非論暫時也得果位有此義廣取諸論之故無相違答於順解脱分善根隨心轉戒有無可有二義也一義云於命善根不可有隨轉戒也其故頌文結聞思成三業長行述傳説如是順解脱分唯聞思所成通三業爲體光法師釋此文毘婆沙師傳説如是順解脱分唯聞思所成非生得善以彼劣故非修所成唯欲界故云云准此等之解釋不可有隨心轉戒也但於定地所攝不淨觀者是可云順決擇分善根也故不可有相違耳一義云定地所攝不淨觀并持息念等可云順解脱分善根也順解脱分善根廣故可有隨心轉戒之類也但於聞思成三業等之文者彼暫據初殖順解脱分論之故不可有相違矣是則先徳禪那院義也尤可依用之矣動業取果用料簡之天等可熟業於人趣感果之時於天起取果用雖然由別縁力於人趣可起與果用也付取果用云𪜈天業由別縁感人果也業望果之時同是一果故於一果可起取果與果用不可來無取果與果之過也是果於天趣雖可受之別縁力於人趣受之則被云人果也故不可來五趣雜亂之過耶於一果倶雖取果與果用依縁力轉之於人趣受之也故望果之時倶可有取果與果之用也又此業是報定時不定業也凡時報倶不定業都云不感果也若有感果之義者不可云報定之故也又是異處熟業也於羅漢寄受業者是又報定時不定業也但羅漢依勝定薫修力事凡三有輪轉之間自然或天業於人趣受之或人業於天趣受之也故不依勝定薫修力也於羅漢者盡煩惱都不可受地獄生故彼地業報定時不定業依勝定力彼地獄果於人趣受之也於動業者流轉之間自然受之故不可爲相例凡動業者於天起取果用之時望天果起之依別縁力於人趣受之時則被云人果也是則別縁力也寄受業乍被云地獄業於人趣受之故彼此又各別也果其體雖一依別縁力或云天果或云人果其果體一故於一果可起取果與果之用也苾芻及尼戒體事光法師初釋心不論遮戒互得不得只先望七支成戒體一義也次二釋以下論遮戒得不得之義也凡光法師解釋常習先總釋之下別委釋之也第二釋心互得遮戒云第三釋心互云不得之也三釋其意如此云云自然得戒限佛麟喩獨覺云事律中有之薩婆多毘尼毘婆沙七種得戒在之十誦律十種得戒在之云云五十八答道類智唯加行得者凡稱道類智名事次第相生第十六心是也故唯加行得非餘縁得於預流果例難者道類智預流果其體雖同其名有異也其故道類智第二念等現起之後若在斷惑道若在非對治道云預流果不與道類智名也正得道類智稱事第十六心之位也第二念以去雖成就之成就之時云預流果不云道類智也故自上果退又種姓退云退住預流果不可云退住道類智也第十六心次念得果道名又道類智名也依名有此不同論體無其差異也已上乘信義也答具縛異生得未至地彼命終位可捨未至地功徳也但於命終捨法唯出煗等四善根者彼決定故出之未至地功徳者若生初禪不捨之若當地還生時捨之其義不定故不云命終捨法也然而實論其捨時之時則可云命終位也已上乘信義也私云爾者可云何捨耶或義云可云自地捨也彼既未至地善心也自欲界生欲界故可云自地捨也答異離欲異生於離染地可造順後業也但於三分別段之文者離染之後入聖得果都不還生之類云故無過也元瑜之釋此旨見云云承久三年十二月之比隨聞抄之了右筆華嚴宗末學大法師宗性春秋二十夏臈八廻
