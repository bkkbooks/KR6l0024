body:
  text: 倶舍論第二十三卷抄下問題問婆沙論意依男身初起煗善根位可得修依女身所起煗善根耶問光法師釋煗等四善根爲因相得會正理婆沙兩論相違作四解釋爾者初釋意如何釋之耶問婆沙論意依男身世第一法現在前位可得修女身所起世第一法耶問一道家意可許三女男得二義耶問一道家意可許第四女身亦得二種義耶問光法師釋煗等四善根爲因相得會正理婆沙兩論相違作四解釋爾者第二釋意如何釋之耶問光法師釋煗等四善根爲因相得會正理婆沙兩論相違作四解釋爾者第三釋意如何釋之耶問光法師釋煗等四善根爲因相得會正理婆沙兩論相違作四解釋爾者第四釋意如何釋之耶問寶法師意依女身世第一法現在前位可得修依男身所起世第一法耶問寶法師意依婆沙論意依男女身所起聖道互爲同類因歟問寶法師意依婆沙論意依男女身所起聖道互得之歟問論中明煗等四善根捨縁云異生由命終文爾者命終心位可有起染汚心義耶問煗善根初念所修異類善根命終捨法歟問煗等四善根上得命終捨法歟問中忍位可有命終捨耶問世第一法位可有命終捨耶問除煗等四善根外餘定生善法中可有命終捨類耶問聞思所成順解脱分善根可有命終捨類耶問論中明煗等四善根捨縁云初二亦退捨文爾者煩惱現前位名退捨歟問退起上地煩惱時可有捨下地煗等善根義耶問正理論意依根本地起煗等善根人現身必得涅槃歟問正理論意依中間禪起煗等善根人現身必入見道歟問依初靜慮起煗等善根人後依未至定靜慮中間入見道義可有耶問世第一法位可得惡趣非擇滅耶問光法師依婆沙論意得忍善根人可受二形身耶問尊者妙音意得忍善根人可生無想天耶問増上忍位於色無色界一處二生可得非擇滅耶問論中明世第一法位云已得異生非擇滅故文爾者光法師如何釋之耶問世第一法以苦法忍爲果義可有耶問聲聞種姓外可有別種姓部行獨覺耶問起部行獨覺忍善根人可有轉向餘乘義耶問麟喩獨覺初發心可由教力耶問獨覺依身可通上二界耶問起菩薩種姓順解脱分善根人可有轉向餘乘義耶問論文云第二生起順決擇分文爾者唯限三生得脱類歟問婆沙論意三生得脱者第二生起順決擇分善根歟問正理論意三生得脱者可亘人天二趣耶問光法師意佛乘修行極速疾類如何釋之耶問菩薩三祇百劫修行可有間斷時耶問光法師意三生得脱聲聞四生得脱獨覺約利鈍根如何釋之耶問寶法師依今論意聲聞乘人入聖依身初起煗等善根義可有耶問聲聞乘中可有一座成覺類耶問論中明順解脱分善根云聞思成三業文爾者論主可許此義耶問得作證所應證法唯限善性歟問論主通外人難云然道類智必不退者任持見道所斷斷故文外人難之云即由此故應見道攝文爾者論主如何破之耶問光法師意預流果位可有人天等受一生類耶問部行獨覺自然得戒類歟問異生位成就不共異生法義可有耶倶舍論第二十三卷抄下問婆沙論意依男身初起煗善根位可得修依女身所起煗善根耶答可得修之也兩方若得修之者依男身所起煗善根勝依女身所起煗善根劣也依男身初起煗善根位何可得修依女身所起煗善根哉若依之爾者光法師所引婆沙論中依男身初起煗善根位可得修依女身所起煗善根見如何答婆沙論意依男身初起煗善根位可得修依女身所起煗善根也故光法師所引婆沙論七云女身於女身所起煗亦得亦在身亦成就亦現在前於男身所起煗得而不在身成就不現在前如説煗説頂忍亦爾男身於男身所起煗亦在身亦成就亦現在前於女身所起煗得而不在身成就不現在前如説煗説頂忍亦爾文但於依男身所起煗善根勝依女身所起煗善根劣云難者依男身所起煗善根勝依女身所起煗善根劣故依男身所起善根不與依女身所起煗善根爲同類因也然而未來得修之事更非所遮也重難云婆沙論四中述世第一法唯修自地不修他地故云世第一法非因長養諸地不能互爲因故文如此文者未至等六地世第一法不互爲因故不得修之見若爾依男身所起煗善根不與依女身所起煗善根爲同類因何可得修之哉答煗頂忍前三善根位有男轉形爲女可得之義故彼未來依女身所起前三善根繋屬今男身之義有之故依男身起煗頂忍前三善根位未來得修依女身所起前三善根也彼未來依女身所起前三善根劣故雖不與彼爲同類因有繋屬之義故得修之也但於婆沙論文者有漏功徳繋地堅牢故無互爲同類因之義不得修之云也然而委論之者雖無互爲同類因之義有繋屬之義自亦得修之事強不遮歟問光法師釋煗等四善根爲因相得會正理婆沙兩論相違作四解釋爾者初釋意如何釋之耶進云光法師釋云解云正理婆沙論意各別正理依一道義前三善根依身雖復男女不同或轉男爲女或轉女爲男而煗等一約依身別分爲男女如一戒體於轉形位容依苾芻及苾芻尼由形不同説爲二戒可言苾芻及苾芻尼倶得二戒故前三善根應知亦爾言爲因者前三善根男女互得爲同類因第四善根女可爲男故女得二與二爲因男不爲女故男不得女唯一爲因婆沙依多道義謂有多類煗等依身各別言得者前三男女通得二種一亦得亦在身亦成就亦現行一得不在身成就不現行故知各別第四善根女可成男故女得男男不可成女故男不得女言爲因者依女身中善根劣故與二爲因依男身中善根勝故唯一爲因上來雖説一道多道多道當婆沙評家義一道當婆沙不正義文付之正理論意在男女依身雖有勝劣不同能依善根其體是一者設雖増上忍位已得女身非擇滅何依男身所起世第一法不與依女身所起世第一法爲同類因哉何況勘正理論餘處十六文云前生鈍根種姓修道與自相續未來決定不生利根種姓見道爲同類因何理爲礙信勝解道與隨法行道爲同類因見若依所依身得非擇滅不與依彼身善根爲同類因者寧信勝解道與隨法行道爲同類因哉抑此釋意今論意於正理婆沙兩論中同何論説哉答光法師第一釋意述正理依一道義故男轉形爲女者可有依女身所起世第一法而増上忍後男不轉形爲女故未來不可有依女身所起世第一法故依男身所起世第一法不與依女身所起世第一法爲同類因云也但於正理論信勝解道與隨法行道爲同類因之文者有轉鈍爲利可得彼道之義故未來可有隨法行道故信勝解道與隨法行道爲同類因也自本一道家多道家者就依男女身道論之不約利鈍道分別何爲例難哉次此釋意今論意同婆沙論多道家義可云也第二釋意述正理婆沙倶依多道義畢云倶舍或同正理或同婆沙皆無有妨故正理論意依一道家義云釋意今論意同婆沙論多道家義可得意也重難云設雖一道家意依男身起世第一法位未來何無依女身所起世第一法哉依男身起煗頂忍前三善根位有可爲女身之義故未來有依女身所起世第一法事必然也彼人至起世第一法位彼未來所有依女身所起世第一法寧可失哉答依男身起世第一法之人雖無爲女身之義未來有依女身所起世第一法者豈一道家本意哉一道家意煗頂忍前三善根位有男女互轉形可爲女男之義故未來所有世第一法依男女身其義不定故雖有屬女身之分若依男身起世第一法畢都無可爲女身之義故未來所有世第一法悉屬男身全無依女身所起世第一法也問婆沙論意依男身世第一法現在前位可得修依女身所起世第一法耶答光法師異釋也若依初釋意者不可得修之若依第三釋意者可得修之也付初釋不可然依男身世第一法現在前位設雖已得女身非擇滅何不得修依女身所起世第一法哉是以見婆沙論文述依上二界身修道於欲界身中得而不在身成就不現在前畢云二乘無學道亦准此應知文如此文者依欲界身無學道現在前位得修依上二界身無學道見豈非於其依身雖得非擇滅得修依彼身聖道哉加之婆沙論三十六中見道位於現觀邊世俗智所依身雖得非擇滅現觀邊世俗智可有得而不在身成就不現在前之義見相例可同如何答婆沙論中雖不説世第一法爲因相得按光法師初釋意云有漏功徳繋屬堅固故得非擇滅依身所起善根不可得修之而増上忍時已得女身非擇滅故依男身起世第一法位不得修依女身所起世第一法也故見光法師初釋依婆沙論意云第四善根女可成男故女得男男不可成女故男不得女文但於婆沙論二乘無學道亦准此應知之文者聖道是不繋法故得非擇滅依身所起道品亦得修之故非相違次於現觀邊世俗智例難者彼雖有漏功徳見道位得修之既聖位所得功徳故異凡位所起善根歟重難云婆沙論中述依女身聖道於男身中不得不在身不成就不現在前故云以依男身得聖道後必無更受女身義故文此文意於聖道得非擇滅依身所起道品不得修之見如何答問一道家意可許三女男得二義耶答可許之也兩方若許之者光法師依婆沙論意成多道家義云前三男女通得二種一亦得亦在身亦成就亦現行一得不在身成就不現行故知各別文如此釋者一道家意不許三女男得二之義見若依之爾者見寶法師解釋述准正理倶舍皆云第四女身亦得二種故知即是多道家也引第四女身亦得二種之文雖證多道家義不引三女男得二之文證之明知一道家意許三女男得二之義云事如何答一道家意可許三女男得二之義也一道家意依男女身所起煗等善根品類是同無有勝劣若依男身起之名男身所起煗等善根若依女身起之名女身所起煗等善根云也而煗頂忍前三善根位有男女互轉形可爲女男之義故未來屬男身之分屬女身之分非不許之故一道家意談三女男得二之旨也何況光法師初釋意述正理依一道義而見正理論六十一文偈頌云三女男得二長行述前三男女倶通得二一道家意談三女男得二之義云事誰可疑之哉即光法師初釋意依正理論文意釋三女男得二之義云前三善根依身雖復男女不同或轉男爲女或轉女爲男而煗等一約依身別分爲男女如一戒體於轉形位容依苾芻及苾芻尼由形不同説爲二戒可言苾芻及苾芻尼倶得二戒故前三善根應知亦爾文一道家意談三女男得二之義其旨如此但於光法師依婆沙論意成多道家義之釋者彼顯多道家意談三女男得二之相也非謂云爾故一道家意不談三女男得二之旨何爲相違哉尋云説前三男女倶通得二云第四女身亦得二釋其義可同寶法師引第四女身亦得二種之文雖證多道家義不引前三男女倶通得二之文證之有何故哉答思今二文意其義大可同歟但煗頂忍前三善根位有男女互轉形可爲女男之義故云前三男女倶通得二強不可背一道家意世第一法位無男女互轉形可爲女男之義而依女身起世第一法位得依男身所起世第一法云事專順多道家意故寶法師引第四女身亦得二種之文證多道家義也即釋其故云若一道家其道是一依男身故名依男身道依女身故名依女身道依女身所得世第一法唯得依女身不容依男身如何得名依男身道既言得二故知與婆沙同是非一道也文問一道家意可許第四女身亦得二種義耶答可許之也兩方若許之者見寶法師解釋云准正理倶舍皆云第四女身亦得二種故知即是多道家也文如此釋者一道家意不許第四女身亦得二種之義見若依之爾者設雖一道家意何不許第四女