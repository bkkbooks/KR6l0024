釋無諍婆沙論意依男女身所起聖道互得修之見如何答見寶法師解釋上標今依婆沙論釋云今得亦爾與得道異故非擇滅即不得也文此釋意云有漏功徳繋屬堅固故得非擇滅依身所起善根不得修之故也故依男身世第一法現在前位不得修依女身所起世第一法聖道是不繋法故依男身聖道現在前位雖已得女身非擇滅得修依女身所起聖道云也但於婆沙論文者依男身起聖道之後必不爲女身故暫云依女身聖道於男身中不得不在身不成就不現在前也以實論之依男身聖道現在前位可得修依女身所起聖道也光法師釋煗等四善根爲因相得會正理婆沙兩論相違作四解釋之中第三釋云得世第一必不爲女故言不得理實而言未來女身雖得非擇滅依彼第一亦得修也文准此解釋可會婆沙論文也去嘉祿三年閏三月之候於當寺慈恩院被行倶舍三十講之時聖禪法師初按立此論義對宗性疑之其時當座講答其趣如此思出彼往事以爲此答端而已問論中明煗等四善根捨縁云異生由命終文爾者命終心位可有起染汚心義耶答不可有此義也兩方若有此義者命終心位起染汚心之人煗等善根前念可被捨之何可有命終捨之義哉若依之爾者見今論文云退必起過失不必然文光法師釋此文云失謂命終或是易地不必起過以命終心通三性故文此釋無諍命終心位可有起染汚心之義見如何答得捨門者據將談故煗等善根命終捨者命終心位煗等善根非得至生相故名命終捨也而設於何地已斷彼地煩惱起煗等善根之人命終心位可退起先已斷地煩惱者彼命終心次前念位彼已斷煩惱位所起煗等善根非得至生相故煗等善根由根起已斷煩惱被捨畢命終心位彼煗等善根非得至現在成已捨故不可有命終捨之義命終心位煗等善根非得至生相名命終捨故也故煗等善根命終捨者就命終心位起善及無覆無記心之類可論之也但於今論文并光法師解釋者總明命終捨相也如別解脱戒命終捨者命終心位可起三性心故也問煗善根初念所修異類善根命終捨法歟答非命終捨法也兩方若命終捨法者見今論文説異生由命終雖述煗等善根由命終捨之旨不云所餘定生善法之中有命終捨之類知彼所修異類善根非命終捨法云事若依之爾者能修煗善根既命終捨法也所修異類善根亦可同哉答能修煗善根是見道近加行殊勝善根故由捨衆同分故必捨之所修異類善根非殊勝善根故不由捨衆同分故捨之也若已離欲染未離初靜慮染依初靜慮起起煗善根畢命終生初靜慮之人命終心位雖由捨衆同分故捨煗善根不可捨彼所修異類善根無捨縁故也若具縛異生伏欲界煩惱依未至定起煗善根畢命終還生欲界之人命終心位雖捨能修煗善根所修異類善根煗善根由捨衆同分故捨之所修異類善根由中有初念先所伏欲界煩惱可現前故由退捨之也若已離初靜慮染未離第二靜慮染依初靜慮起煗善根畢命終生第二靜慮之人命終心位雖捨能修煗善根所修異類善根煗善根由捨衆同分故捨之所修異類善根由中有初念第二靜慮煩惱可現前故由易地捨之也但於能修煗善根既命終捨法所修異類善根亦可同云難者能修所修善根捨縁不必一同捨時亦有前後如彼雖捨能修見道不捨所修三類智邊世俗智等也何定一准爲相例難哉問煗等四善根上得命終捨法歟答命終捨法也兩方若命終捨法者見今論餘處十五文明定生善法捨縁出命終捨法唯擧煗等四善根而煗等四善根上得非煗等體知彼得非命終捨法云事若依之爾者所得煗等四善根既命終捨法也能得得何非命終捨法哉答捨所得法者捨能得得故捨之煗等四善根上得同所得煗等命終捨法云事必然也但於煗等四善根上得非煗等體云難者煗等四善根是見道近加行故付入聖之後可重現前之過其體除得許也定煗等四善根命終捨法之時彼能得得隨亦命終捨法云事頗勿論也問中忍位可有命終捨耶答可有命終捨也兩方若有命終捨者既至減縁減行位何可有命終捨哉若依之爾者中忍位既廣何無命終捨哉答中忍位廣故可有命終捨也若中忍位無命終捨者天中得道之人生天中之後可初起中忍而正理論中唯於人趣初起中忍見故中忍受無量生文勘寶法師餘處十五解釋云然四善根雖皆殊勝然唯前三有命終捨世第一法及増上忍無命終捨定入聖故文此等定判中忍位有命終捨云事亦分明也加之光法師餘處十解釋中云至下中忍雖不墮邪定聚彼得涅槃時未定故如預流者極七返有等至増上忍世第一法雖得菩薩時有定限以彼未能捨異熟生邪所依性故不名正定文若中忍位無命終捨者得涅槃之時分何無定限哉以知此釋意中忍位有命終捨云事但於既至減縁減行意不可有命終捨云難者作減縁減行觀門其位猶廣故有命終命終捨更非所遮歟問世第一法位可有命終捨耶答不可有命終捨也兩方若有命終捨者増上忍現前之後入聖之前既無命終何可有命終捨哉若依之爾者見光法師解釋云忍及世第一異生亦無退命終失地隨應捨故文此釋意唯簡退捨知可有命終失地二捨云事如何答世第一法無間必入見道故世第一法位無命終捨云事道理必然也更不可疑之故見今論文云得世第一法雖位異生位而能趣入正性離生頌雖不言離命終捨既無間入正性離生義准已成無命終捨文光法師釋此文云得世第一法雖住異生有斯一失於前忍位加能趣入正性離生及至此位無命終捨文加之寶法師釋忍及世第一異生亦無退之論文云此亦應言世第一法異生亦無命終捨也文但於光法師解釋者忍善根及世第一法位永無退失故一向簡之故論文云忍及世第一異生亦無退也於命終失地二捨者其義可不定下忍中忍位有命終捨入聖之後有失地捨増上忍世第一法位無命終捨入聖之後有失地捨故云命終失地隨應捨故也隨應之言顯其不定歟或一義云起忍善根之後永無退失位不退故云忍及世第一異生亦無退也増上忍及世第一法現前之後入聖之前若有命終之義者由捨衆同分故可捨増上忍及世第一法然無命終之義故不捨之異起忍善根之後是位不退永無退捨故云命終失地隨應捨故也問除煗等四善根外餘定生善法中可有命終捨類耶答不可有此類也兩方若有此類者見今論文説異生由命終雖述煗等善根由命終捨之旨不云餘定生善法中有命終捨之類知無此義云事若依之爾者具縛異生起未至定命終欲還生欲界命終心位定可捨彼先所得定豈非命終捨之類哉答命終捨法者設生何地由捨衆同分故捨之故光法師餘處釋煗等善根命終捨相云殊勝善根謂煗等四異生命終捨衆同分若生欲界若生上地定捨彼故文而除煗等四善根之外餘定生善法非殊勝善根故無由捨衆同分故捨之之義非命終捨法也若已離欲染未離初靜慮染生初靜慮之人命終心位不捨未至定初靜慮靜慮中間淨定若已離初靜慮染未離第二靜慮染生第二靜慮之人命終心位捨未至定初靜慮靜慮中間淨定如此未至定等隨當生處命終心位捨不捨是不定無由捨衆同分故捨之之義非命終捨法也是以見今論餘處十五文釋捨定生善法由易地退等之等言云等言爲顯捨衆同分亦捨少分殊勝善根文光法師釋此文云今准此論及正理論唯煗等四順決擇分名殊勝善根命終捨餘順決擇分非是殊勝命終不捨一正理但云煗等二倶舍以色二縁例同無色若餘決擇亦命終捨無色亦有順決擇分何故不説命終捨耶三正理但以色界三縁例同無色不言命終以此故知餘順決擇非是殊勝非命終捨唯煗等四名殊勝善根唯説異生命終捨故文但於具縛異生起未至定命終欲還生欲界命終心位定可捨彼先所得定云難者卵胎中異生唯成就身不成就身業故命終心位捨先所得定事必然也然而彼由退捨非命終捨其故具縛異生起未至定必伏欲界煩惱起之也而彼異生命終還生欲界中有初念定可起先所伏欲界煩惱故命終心位彼未至定非得至生相故由退起已伏煩惱捨彼未至定也既非由捨衆同分故捨之何云命終捨哉重難云六欲天中具縛異生伏欲界煩惱得未至定命終欲還生欲界命終心位捨彼未至定豈云退捨哉天中無退故加之得忍善根具縛異生命終欲還生欲界命終心位捨餘未至定寧云退捨哉忍善根位亦無退故如何答天中并忍善根位無退者無退起已斷煩惱之義故云爾也起先所伏煩惱捨已伏位所得功徳事是退捨所攝非實退捨故天中并忍善根位有此事更非所遮歟重難云起先所伏煩惱捨已伏位所得功徳乍假名退捨而天中并忍善根位有此義云事甚以難思哉答又難云見婆沙論百二十一文云謂諸聖者若生欲界若已得無色界善心未離色界染彼成就欲界繋二業色界繋三業無色界繋二業不繋學業彼命終亦生色界若諸聖者生色界若已得無色界善心未離色界染彼成就欲界繋一業色界繋三業無色界繋二業不繋學業彼命終亦生色界文思此文意聖者生欲界色得空無邊處善心命終生第四靜慮不捨空無邊處善心見而伏第四靜慮煩惱可得空無邊處善心此人命終生第四靜慮中有初念必可起先所伏煩惱第四靜慮煩惱明知雖起先所伏煩惱不捨已伏位所得善心云事何云具縛異生伏欲界煩惱得未至定由起先所伏欲界煩惱捨未至定哉答聖者有聖道之助故雖起先所伏煩惱不捨已伏位所得功徳異生無聖道之助故由起先所伏煩惱必捨已伏位所得功徳也問聞思所成順解脱分善根可有命終捨類耶答不可有此類也兩方若有此類者見今論文述異生由命終雖明煗等善根由命終捨之旨不云聞思所成順解脱分善根有命終捨之類知無此義云事若依之爾者婆沙論七中述評家義云異生命終定捨於忍善根劣故異生依此地起此類善根若有命終還生此地捨同分故尚決定捨況此善根是色界法經欲界生而當不捨文如此文者自欲界還生欲界之人命終位捨欲界善心見若爾聞思所成順解脱分善根豈無命終捨之類哉答見今論餘處十五文偈頌結捨欲非色善由根斷上生長行述欲界一切非色善法捨由二縁一斷善根二生上界捨欲界非色善法唯由斷善上生之二縁見正理論三十九評彈之云應言少分亦離染捨如憂根等非色善法文倶舍師救之云斷善上生全捨別説離染非全略而不論云云然而不云欲界非色善法有命終捨之類加之識身足論十二中出欲界繋諸染汚心現在前故所有善根不捨不得之類云謂不斷善根從欲界沒還生欲界如是名爲不捨不得文此文亦欲界善心無命終捨之類見任此等定判聞思所成順解脱分善根無命終捨之類云事是炳然也但於婆沙論文者成忍善根定命終捨之義異生依初靜慮等起忍善根命終還生初靜慮等捨衆同分故尚決定捨忍善根況此忍善根是色界法經欲界生而當不捨之哉爲言起此類善根者指忍根善也何擧欲界善心得意爲疑哉重難云婆沙論百二十四中出業是自業此業不成就之句云若欲界繋善不善思已現在前已牽異熟此有四種謂順現法受等如前説果正現前此業已失謂若善者由斷善根或由捨衆同分等故文此文意欲界非色善法有命終捨之類見知聞思所成順解脱分有命終捨之類云事答此文云或由捨衆同分等故擧易地捨也若實命終捨者外何不出易地捨哉既不擧易地捨知或由捨衆同分等故捨者擧易地捨云事問論中明煗等四善根捨縁云初二亦退捨文爾者煩惱現前位名退捨歟答煩惱至生相位名退捨也兩方若煩惱現前位名退捨者寶法師解釋中煩惱至生相位名退捨見若依之爾者今論中云退必起過失不必然煩惱現前位名退捨婆沙論六十一中述評家義云要起煩惱現在前時乃成退失勝功徳故煩惱現前位退功徳見如何答得捨門者據將談故將退已斷煩惱彼煩惱至生相所得功徳得住現在非得至生相位名退捨也故見光法師餘處二十一解釋云如得捨門據將説故文初二亦退捨者即此義也設於何地已斷彼地煩惱起煗頂二善根之人將退已斷煩惱彼煩惱至生相煗頂二善根得經現在非得至生相位初二善根由退捨云也故寶法師釋由死退捨唯異生非聖由失地捨唯聖非異生之論文云捨得既據生相時説此中説捨皆是同時謂正命終等非得生至生相故文但於今論退必起過之文者自本退功徳者退起已斷煩惱至現在位名退也婆沙論要起煩惱現在前時乃成退失勝功徳故之文其旨實分明也退亦起過者即此意也由將退其功徳已斷煩惱至生相位名退捨也重意云退者已斷煩惱至現在前位退捨者已斷煩惱至生相位也云退云退捨其位雖異由退捨故指其退時云退必起過也其退捨位已斷煩惱未現前也問退起七地煩惱時可有捨下地煗等善根義耶答可有此義也兩方若有此義者既退起上地煩惱之時也何可有捨下地煗等善根之義哉若依之爾者婆沙論中可有此義見如何答退起上地煩惱之時可有捨下地煗等善根之義也暫出其一類者已離色染人依下三靜慮起煗等善根畢後退起第四靜慮煩惱之時可退捨已離色染位所起下三靜慮煗等善根也離染之位所起煗等善根退彼地染之時必退捨之故也故婆沙論七云離欲界一品染者於離欲界一品染者所起煗等亦在身亦成就亦現在前於具縛者所起煗等得而不在身成就不現在前於餘所起不得不在身不成就不現在前於餘所起不得不在身不成就不現在前廣説乃至離無所有處第九品染者於自所起煗等亦得亦在身亦成就亦現在前於餘所起煗等得而不在身成就不現在前云云准此文可思之也但退起上地煩惱之時有捨下地煗等善根之義者唯於煗頂二善根可論此義忍世第一法無退捨故不可有此義也問正理論意依根本地起煗等善根人現身必得涅槃歟答不必得涅槃也兩方若必得涅槃者見正理論文述依本必見諦不云現身必得涅槃哉若依之爾者正理論中破今論第二生起順決擇分之義云或彼應許極速二生謂第二生依根本地起煗等者彼於現生必入聖道得解脱故文如此文者依根本地起煗等善根之人現身必得涅槃見如何答見正理論文正義意依根本地起煗等善根之人現身必得入見道不必得涅槃云有餘師意必得涅槃云也故光法師所引正理論云依根本地起煗等善根彼於此生必定得見諦以根利故厭有深故依未至中間起煗等者於此生不必得入見諦有餘師言依根本定起煗等者此生必定得至涅槃厭有深故文任此文正義意依根本地起煗等善根之人現身不必得涅槃云事炳然也但於正理論下文者三生得脱者就第三生入聖乃至得涅槃之類論之故於今論第二生起順決擇分之義付可有極速二生得脱之類云難之時暫出依根本地起煗等善根之人現身入聖道乃至得涅槃之類致疑也非謂依根本地起煗等善根之人皆悉現身必得涅槃歟問正理論意依中間禪起煗等善根人現身必入見道歟答現身不必入見道也兩方若現身必入見道者見正理論文雖述依本必見諦未云依中間禪起煗等善根者現身必入見道知現身不必入見道云事若依之爾者光法師餘處二十一解釋中引正理論依根本地起煗等善根彼於此生必定得見諦以利根故厭有深故之文畢云准正理後文故知前文越次起者皆是利根文如此釋者依中間禪起煗等善根之人現身必可入見道見如何答見光法師所引正理論文云依根本地起煗等善根彼於此生必定得見諦以根利故厭有深故依未至中間起煗等者於此生不必得入見諦文依中間禪起煗等善根之人現身不必入見道云事此文甚分明也誰可異求哉但於光法師餘處解釋者正理論依根本地起煗等善根彼於此生必定得見諦以根利故厭有深故之文依根本地起煗等善根之者利根之類見故引合彼論五十六若依越次通有漏得則世俗道八地染中隨離少多入聖道者彼得離繋隨其所應有具六時乃至唯一以利根故除練根時之文從多分云越次起者皆是利根也依中間禪起煗等善根之者雖超越證之類無以根利故厭有深故之義故現身不必入見道也正理論中述作依未至中間起煗等者於此生不必得入見諦不云以根利故厭有深故此旨自明也故寶法師引正理論今文畢云由止觀不均厭有不深止觀不均心又不利也文泰法師釋云若依正理論依根本地起煗等者以根利故厭有深故必得見諦若依未至及定中間根通利鈍厭有不深故不定也文任此等定判正理論意依中間禪起煗等善根之者雖超越證之類無以根利故厭有深故之義故現身不必入見道爲言相承義云正理論意依中間禪起煗等善根之者超越證之類故可有以根利故厭有深故之義也故光法師餘處解釋中引正理論依根本地起煗等善根彼於此生必定得見諦以根利故厭有深故之文畢云准正理後文故知前文越次起者皆是利根文既依正理論今文證超越證者皆是利根云義故依中間禪起煗等善根之者同超越證之類可有以根利故厭有深故之義云事必然也但於中間禪起煗等善根之者雖有以根利故厭有深故之義苦道引聖道難故現身不必入見道也現身不必入見道之上以根利故厭有深故之義不立其要故寶法師泰法師不具以根利故厭有深故之義釋也以實論之可具此義也云云問依初靜慮起煗等善根人後依未至定靜慮中間入見道義可有耶答不可有此義歟兩方若有此義者根本地樂道任運道也未至中間苦道艱辛道也更不可有此義耶若依之爾者聖者意樂萬差道品現起不定也何強可遮此義哉答依初靜慮起煗等善根之人閣聖道易起根本地樂道依聖道難起未至中間苦道入見道事道理豈可然哉是以見婆沙論文問若依此地起順決擇分即依此地入正性離生耶評家答之云如是説者此則不定或即依此地或復依餘地文即出其或復依餘地之類雖擧依未至定起煗等善根後初靜慮乃至第四靜慮入正性離生之者全不出依初靜慮等起煗等善根後依未至定靜慮中間入正性離生之類准此文思之明知無此義云事問世第一法位可得惡趣非擇滅耶答不得之也兩方若得之者見今論文判謂於下忍得惡趣不生下忍位已得惡趣非擇滅世第一法位更不可得之若依之爾者婆沙論百八十六中云如或以施或以戒或以聞或以思或以不淨觀持息念念住或以煗頂忍世第一法等故令惡趣等法得非擇滅文如此文者世第一法位可得惡趣非擇滅見如何答忍不墮惡趣者性相之所定故述謂於下忍得惡趣不生道理尤可爾故世第一法位不得惡趣非擇滅云事文理必然也更不可疑之但於婆沙論文者得非擇滅位廣擧施戒聞思不淨觀持息念念住煗頂忍世第一法等諸位得非擇滅法亦出惡趣等法故此諸位中於彼惡趣等法隨其所應可得非擇滅也故下忍位可得惡趣非擇滅也非謂世第一法位正得惡趣非擇滅全非論義也問光法師依婆沙論意得忍善根人可受二形身耶答光法師作二解釋若依忍不受彼類顯増上忍云初釋意者得忍善根之人可受二形身若依論意各別云第二釋意者得忍善根之人不可受二形身也付初釋不可然依光法師解釋見婆沙論定判答起順決擇分善根已更可受扇搋半擇迦無形二形身不之問云更可受唯煗頂非餘所以者何若得忍已便違惡趣彼扇搋等身形鄙陋是人中惡趣若得忍等殊勝善根必更不受彼類身故文此文無諍得忍善根之人不受二形身見若爾光法師初解釋豈不背婆沙論説哉答見光法師初解釋云婆沙云忍不受彼類顯増上忍據總相説與惡趣同於忍位中得不生故若別分別惡趣下忍得不生扇搋等身至上忍位方得不生文此釋意云以實論之別亦云之増上忍位雖得扇搋半擇迦無形二形身非擇滅總相見之於忍位中得惡趣非擇滅得扇搋等身非擇滅故言總雖述若得忍已便違惡趣彼扇搋等身形鄙陋是人中惡趣意別下忍位得惡趣非擇滅増上忍位得扇搋等身非擇滅爲言若得忍已等之文言總意別得意也問尊者妙音意得忍善根人可生無想天耶答不生無想天也兩方若生無想天者尊者妙音意存生無想天之者定生惡趣云義若爾得善根之人寧可生無想天哉若依之爾者見今論文述所餘不生至上忍方得増上忍位得無想天非擇滅云事更無異説知尊者妙音意下中二忍位可生無想天云事如何答勘婆沙論百五十四文云尊者妙音亦作是説彼謗涅槃及聖者故從彼命終定生惡趣尊者妙音意存從無想天沒定生惡趣中云義而婆沙論百二十中云尊者妙音説曰由此善根増上力故令彼行者意樂殊勝於般涅槃心常隨順趣向臨入欲樂忍可希求敬愛由此因縁不造惡業是故雖捨不墮惡趣彼師意同正義意存忍不墮惡趣之旨見由此二文思彼師意得忍善根之人不生無想天可云也但於増上忍位得無想天非擇滅云事無異説云難者暫依正義意如此定歟或又尊者妙音意雖自下忍位不生無想天至増上忍位勝縁闕故得無想天非擇滅云歟問増上忍位於色無色界一處二生可得非擇滅耶答可得之也兩方若得之者見今論文雖述増上忍位於欲界第八有得非擇滅之旨不云於色無色界一處二生得非擇滅知不得之云事若依之爾者入聖之後無有色無色界一處重生之義増上忍位於色無色界一處二生可得非擇滅也如何答入聖之後不受欲界第八有亦無有色無色界一處重生之義故増上忍位唯除欲界人天七生色無色界一一處各一生於餘一切生皆得非擇滅也故婆沙論三十二云増上忍時唯除欲界人天七生色無色界一一處各一生於餘一切生皆得非擇滅文問論中明世第一法位云已得異生非擇滅故文爾者光法師如何釋之耶進云光法師釋云増上忍時除世第一法一刹那異生性餘一切異生性皆得非擇滅至第一法故言已得異生非擇滅故文付之世第一法異生最極位故此位可頓得一切異生性非擇滅何云増上忍時除世第一法一刹那異生性餘一切異生性皆得非擇滅哉是以婆沙論中述世第一法位云爾時頓得三界九地諸異生性非擇滅故文若爾光法師解釋豈不違婆沙論文哉答光法師解釋實雖難思暫依相承義聊簡之者光法師意論文既有已得之言故就事究竟増上忍時除至生相世第一法一刹那異生性餘一切異生性皆得非擇滅爲言婆沙論意世第一法異生最極位故此位頓得一切異生性非擇滅爲言倶舍婆沙兩論之文各據一義竝不相違歟問世第一法以苦法忍爲果義可有耶答可有此義也兩方若有此義者有漏無漏遥異也何可有此義哉是以品類足論六中出有果法云謂有漏法及世俗道所證結斷無擧苦法忍若有世第一法以苦法忍爲果之義者出有漏果法之時何不擧苦法忍哉若依之爾者見光法師所引婆沙論文云苦法智忍雖未已生以在正生名等無間世第一法爾時爲彼等無間縁故名爲入文若世第一法與苦法忍爲等無間縁者何不以彼爲士用果哉答若就等無間縁士用果論之者世第一法以苦法忍爲果之義可有也是以品類足論中出心果法云謂一切有爲法及擇滅不簡苦法忍相應心擧非心果法云謂虚空非擇滅無取苦法忍相應心明知苦法忍相應心是心果法云事若世第一法以苦法忍相應心不爲士用果者苦法忍相應心寧可有心果法之義哉但於品類足論中出有果法不擧苦法忍之文者彼就同類因等流果論之故以苦法忍不爲世第一法果歟重難云品類足論果非果等一段廢立其義可同而云心果法之時就等無間縁士用果論之故以苦法忍相應心即名心果法云有果法之時就同類因等流果論之故以苦法忍不名有果法云事既爲參差尤以難思哉答問聲聞種姓外可有別種姓部行獨覺耶問起部行獨覺忍善根人可有轉向餘乘義耶答可有二義也兩方若有此義者既起忍善根故不可轉向佛乘忍善根位不退故不可轉向聲聞乘若爾起部行獨覺忍善根之人寧可轉向餘乘之義哉若依之爾者光法師釋有餘獨覺麟角喩起彼種姓初一善根轉向餘乘理無遮礙之論文云亦應説忍略而不論文如解釋者可有此義見如何答起部行獨覺忍善根之人不可有轉向餘乘之義其旨即如疑難之趣也故婆沙論七云非轉聲聞獨覺種姓忍能起佛種姓忍所以者何忍違惡趣菩薩發願生惡趣故亦非轉獨覺種姓忍能起聲聞種姓忍所以者何忍不退故文但於光法師亦應説忍略而不論之文者起部行獨覺忍善根之人雖無轉向餘乘之義自乘之中可轉向麟喩獨覺故爲顯有此義云略而不論也相承義云起部行獨覺忍善根之人可有轉向聲聞乘之義也部行獨覺種姓不定如聲聞故起忍善根之後轉向聲聞乘全不背位不退之義也光法師亦應説忍略而不論之釋即顯此意也故婆沙論七云亦非轉獨覺種姓忍能起聲聞種姓忍所以者何忍不退故有説轉聲聞種姓煗頂忍能起獨覺種姓煗頂忍若起獨覺種姓煗頂亦不能起餘乘煗頂所以者何獨覺善根始從不淨觀乃至無生智一座得故評曰彼不應作是説所以者何麟角喩獨覺種姓善根雖一座得部行獨覺種姓不定如聲聞説故文此評家意非只破第二有説若起獨覺種姓煗頂亦不能起餘乘煗頂云義兼可破初師亦非轉獨覺種姓忍能起聲聞種姓忍云義也問麟喩獨覺初發心可由教力耶問獨覺依身可通上二界耶答不通上二界也兩方若通上二界者出無佛世離教力證自乘極果名之獨覺此義全不可通上二界哉若依之爾者婆沙論二十五中述依欲界身修道於欲界身中亦得亦在身亦成就亦現在前依上二界身修道於欲界身中得而不在身成就不現在前畢云二乘無學道亦准應知文如此文者獨覺依身可通上二界見如何答麟喩獨覺者如佛一侳成覺之人故彼依身不通上二界云事必然也部行獨覺者極七返有聖者之中出無佛世證第四果之類故彼依身亦不通上二界也故婆沙論百七十中明三乘聖者成就六十五等至多少相云佛定成就五十七獨覺中部行者如欲界聲聞麟角喩者如佛文此文無諍獨覺依身不通上二界見但於婆沙論二乘無學道亦准此應知之文者見次上文云依贍部洲身見道於贍部洲身中亦得亦在身亦成就亦現在前依餘八處身見道於贍部洲身中亦得而不在身成就不現在前文今此義可通獨覺故隨其所應云二乘無學道亦准此應知也准此應知之言即顯可准知之義彼此義門不必全同歟重難云先在欲界證聲聞前三果畢後生上二界證第四果之時既不由教力獨證得之豈不名先聲聞獨哉覺是一是以勘妙樂大師解釋疏記四云若上流者縱至無色及無色般竝有起欲界化來見佛者若不見佛亦可容得有餘般時亦名獨覺故云二果三果例然文此釋意獨覺依身可通上二界見是二如何答上二界天衆來下佛邊聽聞教法故上二界中非無教法故生上二界證第四果之時猶藉教力故不名獨覺也次於妙樂大師解釋者若上流者縱至無色及無色般竝有起欲界化來見佛者者出上流聖者起欲界化來下見佛之類若不見佛亦可容得有餘般時亦名獨覺者顯生欲界不還果聖者不遇佛出世證阿羅漢果亦名獨覺之義也非謂依身在上二界證獨覺菩提歟去嘉祿三年閏三月之候於當寺慈恩院被行倶舍三十講之時聖禪法師對宗性疑之問起菩薩種姓順解脱分善根人可有轉向餘乘義耶進云光法師所引婆沙論云若起佛姓順解脱分已即不可轉極猛利故文付之異生位種姓未定也設雖起菩薩種姓順解脱分善根之人何無轉向餘乘之義哉是以光法師餘處十九解釋中菩薩先得八禪定後於菩提樹下退起三惡覺見若許起惑退者寧無種姓退哉加之婆沙論百七十九中説得無諍定阿羅漢云先是菩薩種姓文退菩薩種姓作聲聞云事此文尤分明也如何答菩薩種姓是最極猛利故起順解脱分善根之後更不可有轉向餘乘之義其旨光法師所引婆沙論文尤分明也但於光法師餘處菩薩於菩提樹下退起三惡覺云釋者異生位種姓未定故雖有暫退已斷煩惱之義菩薩種姓最極猛利故起順解脱分善根之後必定不退自乘種姓也故光法師餘處十九釋云言定不退不退自乘種姓非言決定不退起惑文次於婆沙論得無諍定阿羅漢先是菩薩種姓云文者今此菩薩者未起順解脱分善根之前未入僧祇位菩薩故退作聲聞也故婆沙論百七十一中以四種入胎相配菩薩位分云此四種入胎皆謂菩薩於中有説第四入胎是第三阿僧祇耶菩薩第三入胎是第二阿僧祇耶菩薩第二入胎是初阿僧祇耶菩薩第一入胎是此前菩薩文既云是此前菩薩有未入僧祇菩薩云事必然也此未入僧祇菩薩者法爾身中具六種姓亦有三乘種姓故雖不決定菩薩種姓根性猛利慈悲遍増遥超二乘分齊不似餘異生類故暫名菩薩種姓然而自本具三乘種姓故未起順解脱分善根之前遇縁退作聲聞故云先是菩薩種姓也非起菩薩種姓順解脱分善根之後退作聲聞何爲相違哉重難云寶法師釋今論言一座者從煗善根乃至菩提不起于座有餘師説從不淨觀不起于座乃至菩提之文云准此一座已後説不可轉與婆沙不同是論意別文此初釋意今論意於菩薩種姓一座已前可有可轉之義見如何答寶法師初解釋實以難思暫會通云披解釋前後思可轉不可轉相上云聲聞若不轉即經六十劫定得涅槃若轉者即不定也獨覺不轉者百劫定得涅槃若轉者即不定以自乘修行間斷不間斷名可轉不可轉見准此解釋思下是論意別之初釋意婆沙論意云菩薩起順解脱分善根之後修行不間斷今論意云一座已後修行不間斷是論意各別爲言非謂菩薩起順解脱分善根之後轉向不轉向餘乘事論意各別歟重難云麟角佛無轉一座成覺故者偏顯無轉向餘乘之義寶法師何述自乘修行間斷不間斷名可轉不可轉之旨哉答疑難實可然會通頗難成倩推之或是婆沙前文以是利根一義故不可轉此中兼一座二義不轉非是欲許前位轉也之第二釋可爲盡理定判是論意別之初釋只是一往解釋歟但就初釋意會今難云麟角喩佛無轉一座成覺故者實雖顯無轉向餘乘之義寶法師兼述自乘修行間斷名可轉不可轉之旨歟問論文云第二生起順決擇分文爾者唯限三生得脱類歟答不可限三生得脱之類也兩方若唯限三生得脱類者設雖非三生得脱之類何無第二生起順決擇分之義哉若依之爾者見論文出三生得脱之類云第二生起順決擇分文知唯限三生得脱之類云事如何答見今論文述極速三生方得解脱謂初生起順解脱分第二生起順決擇分第三生入聖乃至得解脱第三生入聖乃至得涅槃之者名三生得脱之類也若爾初生起順解脱分善根第二生起順決擇分善根第三生入聖證預流果畢經生之後證阿羅漢果之者雖非三生得脱之類可有第二生起順決擇分之義也故第二生起順決擇分之義不可限三生得脱之類歟尋云設雖非三生得脱之類第三生入聖之人第二生必起順決擇分善根云事有何故哉答光法師若依根本起煗等者必於前生已起煗等之釋意設其三生得脱之類設非三生得脱之者入聖次前生必可起順決擇分善根見准此釋意思之第三生入聖證預流果畢經生之後證阿羅漢果之類第二生必可起順決擇分善根也又尋云四生得脱之類爲第二生起順決擇分善根爲當第三生起之歟答第四生得脱之類第三生必可起順決擇分善根也其故光法師釋説煗善根勝利云若無障礙去見諦近之論文云若無障礙去見道近或由二生或但一生能入見道文若四生得脱之類第二生起順決擇分善根者豈不云或由三生等哉准此釋思之第四生入聖乃至得涅槃之類第三生必可起順決擇分善根也問婆沙論意三生得脱者第二生起順決擇分善根歟答今論正理論得婆沙論文其意異歟兩方若起順決擇分善根者正理論中專破今論第二生起順決擇分之義婆沙論意若存此義者正理論師何可破之哉若依之爾者今論中存第二生起順決擇分之義源可依婆沙論説也如何答婆沙論處處之文述三生得脱相云或七云若極速者要經三生謂初生中種此種子第二生中令其成熟第三生中即能解脱餘則不定文或二十五云謂依佛法極速三生方得解脱第一生中種解脱分第二生中修令成熟第三生中既成熟已引起聖道能證解脱文或百一云狹小道者謂若極速第一生中種善根第二生中令成熟第三生中得解脱餘不決定文今此第二生中成熟云事明不云成熟何善根故倶舍正理兩論所存相異也今論意令其成熟者成熟順決擇分善根得意云譬如下種苗成結實三位不同身入法性成熟解脱三位亦爾也光法師釋此文云第二生成熟即成熟順決擇分善根文正理論意令其成熟者成熟順解脱分善根得意破今論第二生起順決擇分之義付或彼應許極速二生之過也問正理論意三生得脱者可亙人天二趣耶答正義意不亙人天二趣也兩方若亙人天二趣者思彼論意難亙人天二趣哉若依之爾者正理論中不云三生得脱之者不亙人天二趣知可亙云事如何答見正理論文云極速三生方得解脱謂初生殖順解脱分次生成熟第三生起順決擇分即入聖道三生得脱之者入聖依身初起煗等善根定而彼論正義意云除増上忍世第一法餘三善根三洲初起後生天處亦續現前所除亦依天處初起唯入三洲初起煗善根云故三生得脱之者唯限人三洲也但依彼論有餘師説若於先時曾已修治此四加行彼於天處皆得初起云義意者三生得脱之者可亙人天二趣歟寶法師引今有餘師説畢雖判然無許也既云有餘師説定非正義歟何況准今論前三善根三洲初起後生天處亦續現前第四善根天處亦起此無初後一刹那故之文任婆沙論七天中雖能起而後起非初謂先人中起已後退生欲天中由先習力續復能起之説初起煗頂忍前三善根唯限人三洲云事尤分明也若爾正理論有餘師説尤可不正義也問光法師意佛乘修行極速疾類如何釋之耶問菩薩三祇百劫修行可有間斷時耶答可有間斷時也兩方若有間斷時者見今論餘處二十七文述菩薩無間修相云刹那刹那修無疲故文知不可有間斷時云事若依之爾者光法師解釋中述三乘修行時分相畢云此據修者餘即不定文如此釋者菩薩三祇百劫修行可有間斷時見如何答菩薩修行設雖精進勇猛一切時分不可修習六度等行如彼隨三惡趣生上二界之時者豈可修習六度等行哉以此理推之菩薩三祇百劫修行不必相續歟故光法師釋云此據聲聞極疾三生修加行極遲六十劫修加行若據獨覺極疾四生修加行極遲百劫修加行若據佛乘極疾三無數劫及餘九十一劫修加行若極遲者三無數劫及餘百劫修加行此據修者餘即不定或有殖已經一劫或無量劫不能入聖文此釋無諍於菩薩三祇百劫修行可有間斷時見但於今論餘處刹那修無廢故之文者於菩薩修行之時顯精進勇猛之相也不遮有間斷不修之時歟尋云以何得知百劫之間有間斷時哉答見今論餘處十八文釋生善趣貴家之本趣云生善趣者謂生人天趣妙可稱故名善趣文此文既述百劫之間生天上之旨於天上寧可修習六度等行哉故知百劫之間有斷時也問光法師意三生得脱聲聞四生得脱獨覺約利鈍根如何釋之耶進云光法師釋云聲聞三生獨覺四生非要利根亦通鈍根文付之依光法師解釋見婆沙論百一定判云依狹小道而得解脱故名時解脱狹小道者謂若極速第一生中種善根第二生中令成就第三生中得解脱文如此文者三生得脱聲聞唯限鈍根見四生得脱獨覺其義例亦可同何可通利根哉設雖自亦通利根多分定可鈍根若爾可云非要鈍根亦通利根述非要利根亦通鈍根甚以難思如何答隨修行時分長短其根利鈍相分也如彼佛最極利根經三無數大劫修行麟喩獨覺極利根經百大劫修行身子等聲聞極利根經六十劫修行等也准彼思之三生得脱聲聞四生得脱獨覺修行時分甚短促故多分可鈍根也婆沙論中出時解脱者擧三生得脱之類即就甚多分相論之也不遮其中自亦有利根之類歟但於可云非要鈍根亦通利根云難者或一義云非要利根亦通鈍根者三生得脱聲聞四生得脱獨覺定置鈍根之類如此釋也即具文云佛時長故其根最利聲聞三生獨覺四生非要利根亦通鈍根若極利者要經六十要經百劫故婆沙三十一云非如聲聞極利根者唯經百劫文文意云佛修行時分長遠故其根最極利聲聞有三生得脱之類獨覺有四生得脱之類多是鈍根故聲聞獨覺異佛亦通鈍根云也是則出聲聞獨覺鈍根之證擧三生四生之類也非指三生得脱聲聞四生得脱獨覺云非要利根故可云非要鈍根亦通利根云疑更不可來也或一義云三生得脱聲聞四生得脱獨覺倶可通利鈍也其旨如前義但於光法師非要利根亦通鈍根之釋者三生四生速疾修行專順利根相故利根爲面云非要利根亦通鈍根也問寶法師依今論意聲聞乘人入聖依身初起煗等善根義可有耶答不可有此義也兩方若有此義者見今論文述三生得脱聲聞相云謂初生起順解脱分第二生起順決擇分第三生入聖乃至得解脱文如此文者不可有此義見若依之爾者見寶法師解釋會正理論六十一或彼應許極速二生謂第二生依根本地起煗等者彼於現生必入聖道得解脱故之難云依根本地起煗等者必於前生已起煗等或可第四生者方能依根本起文既無必於前生已起煗等之義別作或可第四生者方能依根本起之釋明知四生已上得脱聲聞之中入聖依身初起煗等善根之義可有云事答寶法師意頗依難測學者云此事粗雖及異義聊任相承旨暫存一義意者必於前生已起煗等者今論大綱見故聲聞乘人入聖依身初起煗等善根之義不可有也故光法師餘處二十七釋解中釋求度人相云彼昔亦曾起順決擇分善故於今生入聖獲果文此釋意聲聞乘人入聖依身初起順決擇分善根之義不許之見設雖寶法師意豈不存此理哉但於或可第四生者方能依根本起之釋者此釋意聲聞乘人入聖依身初起煗等善根之義不許之也文意云若有三生得脱聲聞依根本地起煗等善根之義者或彼應許極速二生之疑假可來故不知三生得脱聲聞依根本地起煗等善根之義全不許之四生已上得脱聲聞之中依根本地起煗等善根之類可有故應許極速二生得脱之類云難更不可來爲言今此四生已上得脱聲聞之中依根本地起煗等善根之類必於前生已起煗等善根也重難云聲聞乘人入聖依身初起煗等善根之義無之者自本光法師所定也故餘處彼昔亦曾起順決擇分善故於今生入聖獲果之釋更非所諍今所疑者寶法師意許此義歟云事也付之料簡或可第四生者方能依根本起之釋事甚以難思若三生得脱聲聞若四聖已上得脱聲聞入聖依身初起煗等善根之義無之必於前生已起之者有何故三生得脱聲聞依根本地起煗等善根之義無之四生已上得脱聲聞依根本地起煗等善根之類許之哉全無其故尤似自由是一何況勘寶法師餘處解釋云餘一類聲聞等於七方便亦容見修惑不生文此釋意聲聞乘中可有一坐成覺之類見若有一坐成覺之類者何無入聖依身初起煗等善根之義哉是二准此等文理思之或可第四生者方能依根本起者三生得脱聲聞修行時分速疾根機未調練輒難起根本地道故前生依未至地起煗等善根之者今生依根本地雖起煗等善根入聖依身依根本地初起煗等善根之義無之四生已上得脱聲聞修行時分稍久根機能調練無煩起根本地道故入聖依身依根本地初起煗等善根之義可有也爲言是三如何答問聲聞乘中可有一坐成覺類耶答可有此類也兩方若有此類者見今論文明極速得脱相云謂初生起順解脱分第二生起順決擇分第三生入聖乃至得解脱文既以三生得脱爲極速知不可有一坐成覺之類云事若依之爾者辰旦人師解釋中可有此類見如何答行者根姓分萬差得脱遲速非一准聲聞乘中何無一坐成覺之類哉隨勘寶法師餘處一本解釋云菩薩麟角於七方便見修煩惱皆得不生餘一類聲聞等於七方便亦容見修惑不生其相不顯故不述也文婆沙抄一本中釋部行獨覺善根不定如聲聞説之論文云光法師云若説聲聞雖無文説於一座得而無文遮彼一座不得故許一座得亦無失也文任此等定判聲聞乘中可有一座成覺之類見但於今論文者更無相違聲聞乘中有一座成覺之類者前生已起煗等善根之者今生重起煗等善根一座成覺云也非謂入聖依身初起煗等善根一座成覺説三生得解脱之論文何爲疑難哉問論中明順解脱分善根云聞思成三業文爾者論主可許此義耶答光法師意不許之寶法師意可許之歟付光法師解釋難思順解脱分善根唯聞思所成者道理既必然也論主何不許之哉依之寶法師意以傳説如是之言屬三生得脱之上段見如何答今論傳説如是之言傳説何事云事暗以難測也故光寶兩師及異釋歟但見論文云傳説如是順解脱分唯聞思所成通三業爲體文以傳説如是之言屬順解脱分之下段文句能連續言便亦符順也故光法師釋傳説如是至順解脱分者釋第三句明體毘婆沙師傳説如是順解脱分唯聞思所成非生得善以彼劣故非修所成唯欲界故尤叶論文也何況不限光法師解釋又泰法師釋云傳聞婆沙師説如是順解脱分唯聞思所成加行起故非修所成文若爾寶法師解釋還有其疑歟問得作證所應證法唯限善性歟答不限善性也兩方若唯限善性者見品類足論文云得作證所應證法十二界六處攝文知不限善性云事若依之爾者光法師所引婆沙論中云依得作證説諸善法皆應作證文此文無諍得作證所應證法唯限善性見如何答見品類足論文云得作證所應證法云何謂一切善法及依定所證無覆無記天眼天耳文此文意云一切善法由功用得之天眼天耳二根由定力得之故名得作證所應證法也故十八界中眼耳意色聲法六識十二界攝十二處中眼耳意色聲法六處攝也但於光法師所引婆沙論文者一切善法皆是得作證所應證法故從多分唯擧善法也非遮通無覆無記天眼天耳二根歟問論主通外人難云然道類智必不退者任持見道所斷斷故文外人難之云即由此故應見道攝文爾者論主如何破之耶重云光法師釋云一來果等亦能任持見斷亦應見攝文付之外人今難尤有其謂論主可可破之哉何況論主自釋道類智不退故云任持見道所斷斷故文若如今能破者外人返難可云若道類智任持見道所斷無爲故不退者一來果等亦任持見道所斷無爲故應不退若救云一來果等任持見修二道所斷無爲故通退不退者外人亦難可云道類智唯任持見道所斷無爲故應見道攝一來果等任持見修二道所斷無爲故非見道攝也若爾一來果等亦能任持見斷法斷亦應見攝之能破還可蒙外人難勢哉答外人若云道類智任持見道所斷無爲故應見道攝者一來果等亦能任持見道所斷無爲故亦應見道攝若救云一來果等既能任持見修二道所斷無爲故應見修二道攝云難遂不遁也外人意一來果等不名見道故也論主自義意道類智唯任持見道所斷無爲故不退也一來果等亦能任持見修二道所斷無爲故通退不退也述今論二十五事相浮僞無定可依斷迷彼惑有失念退修所斷惑易退起故也故有人即由此故應見道攝之難遂不遁疑論主任持見道所斷斷故之故能所成立也問光法師意預流果位可有人天等受一生類耶進云光法師釋云不遮極少亦受一生可有此類見付之依光法師解釋披婆沙論四十六定判云然有預流人天生別謂天七人六或人七天六天六人五或人六天五或天五人四或人五天四或天四人三或人四天三或天三人二或人三天二或天二人一或人二天一文此文無諍預流果位無人天等受一生之類見加之涅槃經云是須陀洹凡有二種一者利根二者鈍根鈍根之人人天七返是鈍根人復有五種或有六返五四三二文成實論云又法應七有有須陀洹今世入涅槃有第二第三極至第七是名須陀洹文若預流果位有等受一生之類者今此經論之中何不擧此類哉依之泰法師引此等經論説畢或云故知無有一生須陀洹也或判以此而推住果之人但有七生六生也如何答見今論文述極七返有聖者相云極言爲顯受生最多非諸預流皆受七返文此文意預流果位可有等受六生乃至一生之類見故光法師引泰法師一段解釋畢云今解不然住預流果有受七生乃至七一生論文既説極言爲顯受生最多非諸預流皆受七返以此故知不遮極少亦受一生文但於婆沙論文者光法師會云婆沙不言人一天一各一生者且據乘前綺互多少不言各一以實而言亦容各受一生若以不説即言無者彼亦不説天六人六等應無人天各六生等故知略而不論或影略互顯有何道理許天二人一人二天一等而不許彼各受一生文次於涅槃經説并成實論文者光法師釋云又引涅槃成實以爲證者非是當部如何爲證涅槃經説皆有佛性成實論説有諸種子此豈同彼不可爲證文次於泰法師解釋者住預流果無受一生乃至一來向中亦無受一生者若有一生業不可轉令不受餘悉可轉者彼人先斷六品惑方受一生若先斷六品惑已此人即是一來人後受一生時即是一來果上受一生非是向中受也光記引彼疏釋之言云事甚無道理故光法師破之不許末學更不可依用之問部行獨覺自然得戒類歟答非自然得戒之類也兩方若自然得戒類者佛及麟喩獨覺殊勝智品現前故可自然得戒部行獨覺此義難有哉若依之爾者見今論文釋極七返有聖者出無佛世證阿羅漢果相云法爾自得苾芻形相文内不具戒品功徳者外寧得苾芻形相哉答見今論餘處文明十種得戒相述一由自然謂佛獨覺自然得戒者唯限佛及麟喩獨覺也故泰法師釋此文云謂佛獨覺本在不淨觀前起欲界善心爲因等起要期發願願盡智時自然得別解脱故文但於今論法爾自得苾芻形相之文者外雖得苾芻形相内不具戒品功徳也故光法師釋此文云前師意説逢無佛法得阿羅漢已必不住家法爾自得苾芻形相剃髮染衣不言得戒十種得戒中不言得阿羅漢時而得戒故問異生位成就不共異生位法義可有耶答不可有此義也兩方若有此義者既異生位也何可成就不共異生法哉若依之爾者品類足論九中出不共異生法能知智云十智知通滅智知見而異生位既證得擇滅無爲豈非成就不共異生法哉答異生位全不可成就不共異生法若成就之者與共異生法有何差異哉是以品類足論中出不共異生法體云謂四通行四無礙解四沙門果無諍願智邊際定大悲滅定空空無願無願無相無相雜修靜慮現觀邊世俗智淨居天蘊界處及生彼業是名不共異生法文異生既無成就此等功徳故不成就不共異生法云事文理實分明也但於異生位證得擇滅無爲云難者見品類足論六文異生法法非異生法法共異生法不共異生法之廢立就有爲法論之也不共異生法體中取四沙門果故四沙門果體通擇滅無爲不共異生法能知智中取滅智也非一類擧擇滅非擇滅等無爲故異生位設雖證得擇滅無爲更不可云成就不共異生法也寫本云正嘉二年戊午九月十五日未時於東大寺知足院別所草庵抄之畢自去夏初披見倶舍論第二十三卷具書至此秋終記録大小新古論義之難答畢問端既滿九十修光陰亦及二百日訪明師迴愚推鑚仰之微功頻積初草案後清書身心之苦勞幾許後學之輩可察其志以此勤泰資春日大明神之法樂依此善必結大聖慈氏尊之芳縁矣抑先師前權僧正覺遍告生死之別以降今日相當四十六日居諸易移雖溺懷舊之涙修學難捨𢟻勵稽古之勤爲是爲非可哀可悲而已右筆華嚴宗末葉法印權大僧都宗性年齡五十七夏臘四十五
