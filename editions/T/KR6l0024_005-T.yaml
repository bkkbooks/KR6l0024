body:
  text: 倶舍論第二卷抄上問題問論文云十八界中色界有見以可示現此彼差別文爾者言説爲能示現體歟問光法師釋有見義引正理論三師異説爾者第二師意以何法名見耶問論中答境界所緣復有何別問云若於彼法此有功能等文光法師釋此文作三解釋爾者初釋意如何釋之耶問論中答境界所緣復有何別問云若於彼法此有功能等文光法師釋此文作三解釋爾者第二釋意如何釋之耶問論中答境界所緣復有何別問云若於彼法此有功能等文光法師釋此文作三解釋爾者第三釋意如何釋之耶問光法師釋若於彼法此有功能等論文作幾解釋耶問光法師釋有色義引正理論三師異説爾者第二師意如何釋之耶問婆沙論意以狹問寛可有如是答義耶問論中述經部宗義云是處心欲生他礙令不起應知是有對無對此相違文爾者雜心論文同今此經部宗義歟問光法師意天眼天耳二根爲自性無記爲當通果無記歟問散無表能造大種爲自性無記爲當威儀無記歟問有情數香味觸可有等流性類歟問光法師意心心所中可通自性無記類歟問初靜慮攝身識可通善性歟問等起善可通表無表業歟問光法師依婆沙論意可立自性等四種善歟問無記心所起身語表業可名等起無記歟問光法師意聲界可通威儀無記歟問十八界中唯欲界繋法唯限香味二境舌二識歟問大衆部意色無色界十八界悉可有歟問欲界觸界中可有非段食類歟問論中述有餘師説云有殊勝觸攝益於身文光法師釋此文作三解釋爾者初釋意如何釋之歟問論中述有餘師説云有殊勝觸攝益於身文光法師釋此文作三解釋爾者第二釋意如何釋之耶問論中明色界有舌二根無香味二境云以六根愛依内身生非依境界而得現起文爾者今此愛者可味定耶問今論意五識與尋伺恒相應故如何釋之耶問論文云以行相庶外門轉故文爾者寶法師意外門轉故者五識與尋伺相應故歟問中間禪眼等五根并色觸等無尋唯伺地攝歟問第二靜慮以上定中惠名無分別歟問意識相應散惠悉爲計度分別體歟問定中惠可名計度分別耶問隨念分別唯緣過去境歟問散位念名隨念分別爲順尋故爲當順惠故歟問能執受心可通第六識耶問光法師作現在眼等五根識不依時或名有執受或不名有執受之二解釋爾者第二釋意色界舌二根可通有執受耶問定道二戒能造大種可名有執受耶問過去有情數所造色與現在有情數無執受所造色可爲異熟因耶問品類足論意有執受法爲唯限異熟生當當可通所長養耶問品類足論意除身表業於餘眼等九處判則有執受無執受相與今論意同歟問有執受法可通五蘊耶問品類足論説諸表業是無執受今論餘處處表業屬身是有執受光法師會二論相違作二解釋爾者初釋意如何釋之耶問品類足論説諸表業是無執受今論餘處處表業屬身是有執受光法師會二論相違作二解釋爾者第二釋意如何釋之耶問品類足論中説諸表業是無執受爾者寶法師可許此説耶問光法師釋心心所法共所執持攝爲依處論文之攝五根爲所依處攝扶根四境爲依處文爾者今此扶根四境者各限自根所攝扶根四境歟問論中引入胎經説云彼經復説六觸處故文爾者光法師意所依六根爲證歟問論中引入胎經説云彼經復説六觸處故文爾者寶法師意今此六觸處者如何釋之歟問光法師引婆沙論有作是説四處能斷四處所斷有餘師説堅性是能斷四處是所斷文對今論説作二解釋爾者第二釋意如何釋之耶問論中明能長養緣云飮食資助睡眠等持文爾者寶法師意擧幾緣釋耶問異熟色根離長養色根住可有耶問異熟長養眼根可共發一念眼識耶問光法師所引婆沙論中明長養眼離異熟生眼云如從無眼得天眼者文爾者無眼人得天眼者可通未至鉢羅奢佉位耶問非情數法唯限等流性歟問善惡色聲可通所長養耶問論中明聲非異熟云有説聲屬第三傳故文光法師述此師義作二解釋爾者初釋意異熟大種能造聲界歟問論中明聲非異熟云有説聲屬第三傳故文光法師述此師義作二解釋爾者初釋意現在世可有獨住異熟大種耶問論中明聲非異熟云有説聲屬第三傳故文光法師述此師義作二解釋爾者第二釋意異熟大種能造聲界歟問光法師釋從諸大種緣撃發聲論文作二解釋中第二釋意云據緣生邊説聲第三文爾者異熟大種撃發聲時不相離長養大種非撃發之歟問正理論中明聲非異熟云有餘師説聲非異熟如何異熟大種所生故應許聲屬第四傳或第五傳故非異熟文光法師約此文作二解釋爾者第二釋意如何釋之耶問今論文云若爾身受從業所生大種生故應非異熟文爾者光法師意破何師義耶問正理論文云豈不如從無記大種發善惡聲等文爾者光法師如何釋之耶問今論文云若爾身受從業所生大種生故應非異熟文爾者寶法師意破何師義耶問寶法師依正理論意可許聲屬第四傳第五傳義耶問論中明聲非異熟云有説聲屬第五傳故文爾者寶法師依今此第五傳義意可許長養大種造聲界義耶問寶法師意長養大種能造聲界歟問寶法師依正理論意無表色能造大種可許獨住義耶問婆沙論意聲通異熟者可有何過耶
