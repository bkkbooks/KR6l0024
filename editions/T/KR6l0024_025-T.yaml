body:
  text: 倶舍論第七卷抄下問題問色界喜根等無間生欲界染汚捨倶心義可有乎問正理論意前三解脱可通眞實作意乎問今論意持息念可通勝解作意乎問婆沙論評家意欲界善心與未至定初靜慮相生文如來所起欲界心品相生同之歟問上地下地近分地心互可相生乎問依二禪已上入見道人聖道無間起共相作意義可有乎問聖道出心唯限曾得善根歟問正理論中明聖道入出作意擧三入三出共入三出共入共出三師義爾者共入三出第二師義爲正歟問異生所起順決擇分善根唯可限煗等四善根乎問共相作意唯限順決擇分善根乎問依初靜慮證阿羅漢果人出觀心可通欲界乎問婆沙論意聞慧無間生無漏道義可有乎問上地染汚心無間生下地無覆無記心義可有乎問論中釋欲界染汚心現前位得善心云由疑續善及界退還文寶法師意得至現在名得歟問他地心無間退煩惱義可有乎問今論意明得心多少付決定可得心論之歟問以無漏道欲斷第四靜慮煩惱加行道位得修無色界善心義可有耶問正理論意以無漏道離上七地染九無間前八解脱道位可修上邊有漏道乎問今論意色界無覆無記心現在前時可有自可得義乎問顯宗論意欲界無覆無記心可有自可得義乎問光法師解釋中付明得心多少且正理論意同識身足論事如何釋之乎問今論意欲界威儀工巧心不串習類可有三世得歟問光法師釋欲界威儀工巧心三世得有無倶舍識身相對作三解釋爾者論意各別釋意識身足論意欲界一切威儀工巧心皆可有三世得歟問正理論中付明欲界染汚心現前位得心相且界退還位必可得欲界無覆無記心乎問婆沙論中欲界威儀工巧心悉有三世得義可有乎問雜心論意色界染汚心現前位得欲色界無覆無記心可限界退還位乎問世親論主難雜心師善心中得六義云於善心中應言得七文正理論師如何救之乎問世親論主難雜心師善心中得六義云於善心中應言得七文光法師意正理論救如何釋之歟問論心論意可説正見讀善乎問雜心論意欲界威儀工巧心悉可有三世得歟
