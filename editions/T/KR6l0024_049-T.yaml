body:
  text: 倶舍論第十六卷抄下問題問今論前師云十惡業道互爲加行後起後師云互不爲加行後起正理論前師云互不爲加行後起後師云互爲加行後起云云取意爾者光法師兩論二師正不如何判之耶問殺生等自作六業道根本成時必具表業可云耶問今論意遣使殺等根本成時必可具表業可云耶問論文云七善業道若從受生必皆具二謂表無表受生尸羅必依表故文爾者攝自然見道二種得戒可云耶問七善業道受生無表不以大種爲所依可云耶問靜慮無漏二種律儀依表業生可云耶問定生無表非大種所造可云耶問有漏業道加行位必發無表可云耶問不善業道根本後起從三不善根生可云哉問頌文云殺麁語嗔恚究竟皆由嗔盜邪行及貪皆由貪究竟邪見癡究竟許所餘由三文爾者光法師意初刹那等起論業道究竟可云耶問殺生業道依貪究竟義可有耶問盜業道由嗔究竟義可有耶問光法師意以擇滅爲名色體可云耶問光法師意麁惡語表業必依名等起可云耶問殺生等加行究竟時必成彼根本業道可云耶問所殺人住死有時能殺人成業道可云耶問頌文云殺生由故思他想一誤殺文爾者寶法師如何釋耶問盜業道者爲必於現人成之爲當於過去人成之義可有耶問婆沙評家意盜現在率都物者於何處結罪耶問論中述虚誑語業道解義縁云善言義者無迷亂縁耳識已生名爲能解文光法師述此文作之耳識能解意識能解二釋爾者以何釋爲正判耶問仙人意憤成殺業時有表業可云耶問頌文云染心壞他語説名離間語文爾者寶法師具幾縁判耶問頌文云諸染雜穢語餘説異三染文爾者初師意雜穢語表業者虚誑語等表業其體同可云耶問今論意雜穢語業道具解義縁可云耶問於雜穢語立不誤縁可云耶問以欲界五部貪悉名業道可云耶問聖者起癡所引離間等三語可云耶問依身無色有學聖者必成過去律儀可云耶
