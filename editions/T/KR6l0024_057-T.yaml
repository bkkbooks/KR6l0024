body:
  text: 倶舍論第十九卷抄上問論文云離隨眠業無感有能文爾者今此文爲論造業時爲當指感果時歟答論造業時可云也兩方若論造業時者既云無感有能尤可指感果時也是以見今論餘處十五文述退不退法異生於離染地造業之旨明知離隨眠業無感有能者非造業時云事何況披寶法師釋云若據資助故業結當生有即通有學由此三乘無學不受後有文資助故業結當生有寧非指感果時哉若依之爾者釋業由隨眠方得生長畢云離隨眠業無感有能文相起盡無諍可指造業時見如何答凡案一論大網釋果因縁生起次第前言世別皆由業生者果生必由業云也業由隨眠方得生長離隨眠業無感有能者造業之時必由隨眠縁力爲言更不可及感果之時所謂業由隨眠方得生長者上明造業必由隨眠縁力之旨離隨眠業無感有能者不由隨眠縁力之業不施感有功能云也是即返顯上造業必由隨眠縁力意也指造業時云事更不可疑之故光法師釋此文云謂由隨眠能發諸業復由諸業能感有果由此隨眠是諸三有根本故業離此隨眠無感有果功能故十二支初説隨眠文何況正理論四十五中述隨眠爲諸有本或云能發業有發起能招後有業故文或云雖離染者亦造善業而無勢力能招後有文顯宗論二十五中明此義或云以諸隨眠是諸有本要此所發業方有感有能文或云故離染者雖造善業而無勢力招後有果文加之見今論餘處十文釋及如糠裹米義云或得裹業能感餘生非獨能感文正理論二十九餘處中明此義云煩惱裹業能感有非獨能感文顯宗論十五説全亦同之准此等定判思之離隨眠業無感有能者指造業時云事分明也但於既云無感有能尤可指感果時云難者離隨眠力造業之時無感引果能云事雖造業時談此義有何所背哉次於今論餘處文者此中云業由隨眠云無感有能據引業引果論之也寶法師上言有者竝據引果之釋即顯此意也而婆沙論二十云已離染業定不能引衆同分果正理論四十五云然見世間有離染者雖亦造善身語意業而無功能招後有果離染地造業者是滿業非引業故今論餘處十五文云堅於離染地異生不造生等明滿業感果相故全非相違次於寶法師釋者見解釋起盡上引正理論雖離染者亦造善業等之文畢上言有者竝據引果若據引業感有即唯異生者由隨眠力造引業感有事唯限異生云也若據資助故業結當生有即通有學者雖非今正所説未離染位故造滿業助故業令感有果之義通有學云也由此三乘無學不受後有者已離染位故無造引業感有果之義無造滿業助故業感有果之義故三乘無學不受後有云也故寶法師釋亦無相違也重難云勘惠暉法師釋五云離隨眠業無感有能者如無學有故業不能感三有果也文若論造業時者何可指凡時故業哉答惠暉法師今釋會通之旨只如寶法師釋離隨眠業無感有能者雖望造業時論此義指無學已離染位業彼位業無感有能爲言於有學位未離染故有造滿業助故業感有果義爲簡此義無學位雖有故業不感有果名離隨眠業無感有能釋也故今此釋亦非違文然而廣論之時不遮感果之位必由隨眠力之義也問論中明煩惱現起能爲十事云五發業有文爾者今此發業有者可通善業耶答可通善也兩方若通善業者是既隨眠所發業也唯可限不善業哉若依之爾者隨眠諸有本者性相之所定也設雖隨眠所發業何不通善業哉答論中云業由隨眠方得生長離隨眠業無感有能若善業不善業感後有總衆同分業必由隨眠力發故今此由隨眠力所發業者泛可通善不善業也故正理論四十四云九能發業有發起能招後有業故文能招後有之業豈不通善不善業哉問聖者可造牽引業耶第二十四卷抄記録之畢問五見疑中可有迷事類耶答不可有迷事類也兩方若有迷事類者五見疑是見惑也何可有迷事類哉是以披光法師解釋五見疑無迷事類見若依之爾者五見疑中有縁親迷理惑之類者可有迷事義也如何答五見疑是唯見所斷惑故不可有迷事類也故勘光法師處處解釋當卷云邪見見取疑前一後一縁四諦故中一見取若果因處起者見苦集斷若總相縁不推因果是見滅道斷此三竝非迷事起非修道斷文餘卷二云八十八惑迷理起故是見所斷非是迷事等故非通修斷文任此等定判見所斷惑無迷事義云事分明也但於五見疑中有縁親迷理惑之類者可有迷事義云難者身見邊見邪見疑唯縁諦理故不可縁親迷理惑見取戒禁取雖縁親迷理惑是名疎迷理惑不云迷事惑也重意云迷理惑中之有親迷理疎迷理二類所謂身見邊見邪見疑不共無明親迷諦理惑也見取戒禁取縁親迷諦理惑故疎迷理惑也此親迷理疎迷理惑倶名迷理惑不名迷事惑是見所斷非修所斷也迷事相境名迷事惑是云修所斷惑也問論中擧一箇問云此中何相見苦所斷乃至何相是修所斷文爾者光法師意問十隨眠五斷相歟進云光法師意問十隨眠五斷相釋也付之依光法師釋披論文起盡上述餘貪等四各通五部謂見四諦及修所斷畢隣之問此中何相見苦所斷乃至何相是修所斷文相起盡無諍唯就貪等四隨眠問五斷相也何況既云乃至何相是修所斷寧可通十隨眠哉加之次下論文答此問云若縁見此所斷爲境名見此所斷餘名修所斷文此文意答貪等重縁四惑五斷相見若此文答十隨眠五斷相者正理論四十六能破如何可消之哉依之寶法師釋此文云辨貪等四惑五斷相也文圓暉法師引此釋畢寶解爲善釋如何答光法師解今文釋問十隨眠五斷相尤順論文也所謂見今論文起盡上云如是已顯十隨眠中薩迦耶見唯在一部謂見苦所斷邊執見亦爾戒禁取通在二部謂見苦見道所斷邪見通四部謂見苦集滅道所斷見取疑亦爾餘貪等四各通五部謂見四諦及修所斷廣明十隨眠五部通局畢隣之問此中何相見苦所斷等無諍問十隨眠五斷相見上同分別五斷通局十隨眠中有何簡別至今問五斷相可不通十隨眠哉就中若今問唯限貪等四隨眠者寧於五見疑不顯五斷相哉論文一段就十隨眠問五斷相云事炳然也但於乃至何相是修所斷之文者就十隨眠問五斷相之時五見及疑雖限見所斷貪等四隨眠通修所斷故隨其所應問乃至何相是修所斷更無相違也次於若縁見此所斷爲境等之答文者此文之中含二類也故光法師釋云如苦集下五見疑及彼相應不共無明滅道下無漏縁惑隨其所應是若縁見此諦所斷爲境名見此諦所斷如苦集下貪嗔慢及彼相應無明滅道下有漏縁惑隨其所應是若縁見此諦所斷爲境名見此諦所斷餘貪嗔慢及彼相應無明不縁見此諦爲境亦不縁見此諦所斷爲境但迷事生名修所斷文十隨眠五斷相此釋頗分明也既含親迷疎迷二類云若縁見此所斷爲境名見此所斷故此文唯明貪等重縁四惑五斷相不可得意也即可訓若縁見此所斷爲境名見此所斷也次於正理論難破者正理論師意故欲違此論故就若縁見此所斷爲境之文言謬解唯明貪等重縁四惑五斷相恣加難故全非爲痛也故光法師叙倶舍師救云正理論師謬解我文謂唯縁此諦所斷爲境名見此諦所斷故以他部縁及無漏縁爲難應作是言若縁見此諦爲境若縁見此諦所斷爲境名見此諦所斷他部縁惑及無漏縁應知即是若縁見此諦爲境所攝以縁諦故又自解釋非異我説文文意顯也次於寶法師幷圓暉法師釋者存疑難之趣歟人師異釋也不及致劬勞重難云光法師釋猶不可然見論文上雖述十隨眠五部通局於五見疑親迷惑故分別四諦所斷之時其相易知故不及問之貪等四隨眠非親迷惑故五斷相甚難辨故偏問貪等四隨眠五斷相深有其由也其一次若縁見此所斷爲境名見此所斷之論文貪等重縁四隨眠縁親迷惑爲所縁境起故隨親迷惑分明四諦所斷云也縁見此諦與縁見此諦所斷二重得意分事似不叶文相哉是二次正理論師任今論現文得其意難破之何輒捨之哉是三答五見疑雖親迷惑不云若縁見此諦爲境名見此諦所斷者如何可知四諦所斷相哉次於若縁見此所斷爲境之論文分別縁見此諦與縁見此諦所斷相配親迷疎惑解釋尤巧也今論餘處十六中於殺生由故思他想不誤殺之頌文分別他有情與他有情想爲二縁豈非此潤色哉次於正理論師難破者非私捨之任倶舍師釋也問論中擧一箇問云此中何相見苦所斷乃至何相是修所斷文爾者寶法師意問十隨眠五斷相歟進云寶法師釋云辨貪等四惑五斷相也文付之依寶法師釋披論文起盡上述十隨眠五部通局畢隣之問此中何相見苦所斷等無諍問十隨眠五斷相見就中若今問唯限貪等四惑者有何由不顯五見疑四斷相哉依之光法師意問十隨眠五斷相釋如何答寶法師意依若縁見此所斷爲境名見此所斷餘名修所斷之答文就貪等四惑問答之釋也故寶法師釋云今詳正理妄彈斥者倶舍此中辨五斷相者欲界貪嗔慢及此相應無明五斷相也此四煩惱若修道斷通縁別事若見道斷四諦皆雖重縁惑起即從所縁分其四斷由此論云若縁見此所斷爲境名見此所斷餘名修所斷正理論師誤解倶舍遂妄彈斥文文意顯也就中隣餘貪等四各通五部謂見四諦及修所斷之文尤問貪等四惑五斷相可云也但於背論文起盡云難者論上文雖述十隨眠五部通局五見疑是親迷惑故分別四諦之時其相自顯故彼四斷相不及問之貪等四惑非親迷惑故其五斷相甚不分明故唯就貪等四惑問五斷相也今此解釋順論文故圓暉法師釋云寶法師云此論前文將五見疑配四諦竟後言餘貪等四各通五部即有此問故知此中此貪等四中寶解爲善也文次於光法師釋者人師異釋也不可和會之何況寶法師難之云今詳此釋未爲遣難釋云謬解我文詳其所解正理依文此釋加字豈加字爲是依文爲謬文重難云滅諦所斷見取道諦所斷見取戒禁取非親迷惑故可云縁見此所斷爲境就中寶法師自解釋中云有兼二種謂見戒取等見取戒禁取通縁諦重縁見若爾若縁見此所斷爲境之類何唯限貪等四惑故答婆沙論百九十九中説道諦所斷戒禁取云二執謗道諦邪見等爲道此親違道於因果相不別迷執故見道時方能永斷文明四諦所斷見取云見取所執無所待對但執爲勝諸邪見後皆得現前故通四部文任此等文見取戒禁取雖重縁惑有親違滅道之義故不似貪等四惑也問修所斷隨眠可縁他身見惑耶第二十卷抄記録之畢問論文云若縁見此所斷爲境名見此所斷文光法師釋此文作三解釋爾者第三釋意可攝他界縁惑耶進云光法師釋云又解此文亦約他界縁惑説文付之欲界他界縁惑者縁上界苦集無縁欲界苦集何云若縁見此諦爲境名見此諦所斷哉是以見今論餘處二十一文云二由斷彼能縁故斷謂見苦集斷他界縁以自界縁能縁於彼能縁若斷彼隨斷故以他界縁惑縁故斷全不爲遍知所縁故斷哉答光法師第三釋意實似難思然而推此釋意云所縁是上界苦集所斷即欲界惑故雖無縁見欲界苦集諦斷迷欲界苦集諦惑之義上下二界同是苦集諦故縁見苦集諦斷名見此諦所斷云言中可攝他界縁惑爲言但於今論餘處以他界縁惑云斷彼能縁故斷不爲遍知所縁故斷云難者遍知所縁故斷彼能縁故斷彼所縁故對治起故斷者能縁所縁正令相對顯斷惑相是其實義也縁見欲界苦集斷迷欲界苦集惑正斷惑相也故光法師初釋意即存此旨若縁見此諦爲境名見此諦所斷之文不攝他界縁惑釋也而第三釋意異之欲界上界雖異同是苦集諦故縁見苦集諦斷迷苦集諦惑云言中可攝他界縁惑云一意存也光法師又解此文亦約他界縁惑説縁他界時亦縁苦集故今此文中通據三界五斷總説之釋其意在此歟問寶法師意身邊二見唯縁諦理歟答唯縁諦理也兩方若唯縁諦理者披寶法師解釋以貪等十隨眠分別唯縁諦唯重縁等四句之中出唯縁諦句云謂邪見疑獨頭無明文如此釋者身邊二見非唯縁諦理之類見若依之爾者以道理思之身邊二見唯縁諦理可云也如何答身邊二見作我我所斷常計違非我非常諦理故親迷惑唯縁諦理云事道理必然也但於寶法師釋者身邊二見雖唯縁諦理且出互四諦所斷唯縁諦理之類故唯限邪見疑獨頭無明不擧身邊二見歟委論之者唯縁諦理之句中亦可擧身邊二見也退勘彼解釋唯重縁句兼二種句中無擧身邊二見爰知唯縁諦理之句中實可取身邊二見云事問頌文云餘通見修斷文爾者唯限忍所容隨眠歟答唯可限忍所容隨眠也兩方若唯限忍所容隨眠者婆沙論五十一中出最初前行見修不定句云異生身中五部聖者身中四部文如此文者見修不定句不限忍所容隨眠見若依之爾者聖者斷見所斷異生斷修所斷名餘通見修斷明知唯限忍所容隨眠也是以披今論疏文餘通見修斷者唯限忍所容隨眠見如何答前四部煩惱若聖者法類忍位斷唯見所斷若異生斷唯修所斷故今論文云餘通見修斷婆沙論中名見修不定句故唯限忍所容隨眠云事炳然也今論中云餘八地攝通見修斷謂聖者斷唯見非修法類智忍如應斷故若異生斷唯修非見數習世俗智所斷故文正理論文顯宗論説全亦同之婆沙論中出畢竟前行見修不定句云謂前四部貪不善根即見苦乃至見道所斷文任此等論文餘通見修斷者唯限忍所容隨眠云事炳然也但於婆沙論異生身中五部之文者正論見修不定句體雖唯限前四部煩惱異生斷惑五部合斷故斷前四部煩惱之時修所斷煩惱同被斷故據同時被斷之義云異生身中五部也故見婆沙論文明畢竟前行問有異生身中修所斷貪不善根此中何故不説答此問有三義中第二復次云異生修道現在前時總斷五部以諸異生不能分別五部差別唯能總斷説異生斷修所斷言即已説彼故不別説文准此文思之異生斷惑五部合斷故發智論中述畢竟前行見修不定句云若異生斷修所斷言中攝異生身中修所斷貪不善根者明最初前行見修不定句云若異生斷修所斷言中可攝異生身中修所斷有漏無明漏故云異生身中五部也非謂云爾故以異生所斷修所斷煩惱正爲見修不定句體全無相違重難云異生斷惑雖五部合斷其中修所斷煩惱都無忍所容義何以之爲見修不定句哉爲見修不定句不可由所斷同時是以婆沙論中出畢竟前行見修不定句云謂前四部貪不善根即見苦乃至見道所斷彼異生斷以修所斷聖者斷以見道斷文畢竟前行見修不定句既限前四部貪不善根最初前行見修不定句何取異生身中修所斷有漏無明漏哉次以婆沙論第二復次義爲潤色事難思第二復次意云説異生斷修所斷言即已説彼故不別説異生身中修所斷貪不善根見修不定句中取之爲言乍出此釋異生身中修所斷煩惱不爲見修不定句體云事其義豈可符順哉答異生身中修所斷煩惱雖無忍所容義異生斷惑五部合斷故斷前四部煩惱之時修所斷煩惱同時被斷故異生身中修所斷貪不善根見修不定句中類攝之爲言第二復次即存此意也若依此義者最初前行見修不定句中可攝異生身中修所斷有漏無明漏故異生身中五部之文亦存此義云也但謂前四部貪不善根之文就見修不定句刻性體論之故更無所背也問婆沙論意有漏無明漏可立畢竟前行耶進云婆沙論中有漏無明漏立最初前行不立畢竟前行也付之唯修所斷句先立先答名之畢竟前行有漏無明漏既有唯修所斷句何不立畢竟前行哉答畢竟前行者唯欲界繋通五部所斷煩惱有唯修所斷見修不定二句中聖者所斷修所斷貪不善根唯修所斷其義決定故先立先答名畢竟前行也是即五部中最後所斷故名畢竟前行故寶法師述婆沙論意云以五部門可是最後故名畢竟前行文前四部貪不善根若異生斷修所斷若聖者斷見所斷故名見修不定句也但於有漏無明漏既有唯修所斷句可立畢竟前行云難者有漏通八地無明漏通九地同通五部所斷故有漏無明漏非想非非想處繋隨信隨法行現觀邊諸忍斷是見所斷其義決定故爲唯修所斷句此唯見所斷唯修所斷二句相望之時唯見所斷句先斷故先答名最初前行也無所有處以下有漏無明漏若異生斷修所斷若聖者斷見所斷故名見修不定句也故有漏無明漏無唯修所斷句先立先答之義故不立畢竟前行也又有一義別紙記之畢可引見之問婆沙論中明最初前行中見修不定句約異生聖者判五部通局爾者如何釋之耶進云婆沙論五十一云謂從初靜慮乃至無所有處有漏從欲界乃至無所有處無明漏異生身中五部聖者身中四部文付之異生斷修所斷聖者斷見所斷名之見修不定句而異生身中修所斷有漏無明漏全無見所斷義見修不定句中何可取之哉是以婆沙論中釋畢竟前行中見修不定句云謂前四部貪不善根無取異生身中修所斷貪不善根相例可同如何答婆沙論中出最初前行中見修不定句云異生身中五部聖者身中四部尤有深意也所謂異生身中修所斷貪不善根雖無見所斷義異生斷煩惱時五部合斷故修所斷煩惱同時必被斷故云異生身中五部也以何知之者見婆沙論五十一次上段文釋發智論三明畢竟前行唯修所斷句云若貪不善根學見迹諸智斷是修所斷見修不定句云餘若異生斷修所斷世尊弟子斷見所斷之文擧問難云問此中所説若貪不善根學見迹諸智斷是修所斷者顯聖者身中修所斷貪不善根餘若異生斷修所斷世尊弟子斷見所斷者顯異生聖者身中見所斷貪不善根餘有異生身中修所斷貪不善根此中何故不説文答此問難有三義中第二義云復次彼已説在前所説中所以者以部差別建立煩惱不以在身諸煩惱部有五無六聖者見道現在前時斷見所斷後若修道現在前時斷修所斷異生修道現在前時總斷五部以諸異生不能分別五部差別唯能總斷説異生斷修所斷言即已説彼故不別説文以此答文思之次下斷釋最初前行見修不定句云異生身中五部聖者身中四部當此復次義意也但於畢竟前行中見修不定句云謂前四部貪不善根之文者且就顯先出前四部貪不善根也若依此復次義意者此亦可云意生身中五部聖者身中四部貪不善根也問異生身中有漏無明漏中非唯見所斷唯修所斷見修不定三句所攝類可有耶答可有此類也兩方若有此類者煩惱種類雖廣不可過今此三類是以聖者身中有漏無明漏中非唯見所斷唯修所斷見修不定三句所攝之類無之異生身中欲漏中非唯修所斷見修不定二句所攝之類無之相例可同若依之爾者婆沙論中可有此類見如何答見婆沙論五十一文明三種前行於有漏無明漏有唯見所斷唯修所斷見修不定三句之中唯見所斷句先立先答名最初前行也所謂聖者身中見所斷非想非非想處有漏無明漏無修所斷義故爲唯見所斷句聖者身中修所斷八地有漏九地無明漏無見所斷義故爲唯修所斷句無所有處以下異生身中五部有漏無明漏聖者身中前四部有漏無明漏若異生斷修所斷若聖者斷見所斷故爲見修不定句今此唯見所斷唯修所斷見修不定三句廢立約異生聖者身中所斷煩惱分別之故異生身中非想非非想處五部有漏無明漏非異生所斷故非三句攝也加之於有身見戒禁取疑三結有唯見所斷見修不定二句之中唯見所斷句先立先答名共前行也所謂聖者身中非想非非想處有身見戒禁取疑無修所斷義故爲唯見所斷句無所有處以下異生聖者身中有身見戒禁取疑若異生斷修所斷若聖者斷見所斷故爲見修不定句之時異生身中非想非非想處有身見戒禁取疑亦非異生所斷故非二句攝也准例可思之但於例難者聖者身中有漏無明漏中無非聖者所斷之類故悉此三句所攝也異生身中欲斷異生悉斷之故亦此二句所攝也相例之難甚爲易會問論文云有餘師説外道諸仙不能伏斷見所斷惑文爾者光法師意引婆沙論何文證此義耶進云光法師引婆沙論謂譬喩者作如是説異生不能斷諸煩惱之文證此義也付之依光法師解釋披婆沙論所説云異生不能斷諸煩惱廣不斷見修所斷諸煩惱見今論文述不能伏斷見所斷惑唯限見所斷惑若爾兩論所説其義既異何引合之爲其證據哉答光法師釋今論文云外道諸仙不能伏斷見所斷惑修所斷惑但能暫伏而得上生文有餘師説如此得意故引婆沙論第五十一卷謂譬喩者作如是説異生不能斷諸煩惱之文同論第九十卷或復有執異生不能斷見所斷隨眠有餘復執異生不能斷諸隨眠唯能制伏之説畢釋見所斷惑不能伏不能斷若修所斷伏而非斷能符順倶舍婆沙兩論説也但於今論文限云不能伏斷見所斷惑婆沙論廣述異生不能斷諸煩惱云難者有餘師意諸異生見所斷惑不能伏不能斷修所斷惑伏而非斷云故其不斷邊互見修所斷故兩論之文不相違故引爲證據全無其過也問光法師釋六十二見中四遍常論云謂由天眼見諸有情死時生時諸蘊相續文爾者今此諸蘊相續者指未來蘊歟答可有二義也兩方若指未來蘊者光法師依婆沙論百九十九意明六十二見相述前際分別見中四遍常論云謂由天眼見諸有情等既前際分別見也何云縁未來蘊哉是以光法師所引婆沙論百九十九中云此中依過去起分別見名前際分別見文若依之爾者死生智知未來者論家人師處處定判也明知死時生時諸蘊相續者指未來蘊云事如何答此事雖有學者異義且存一義云天眼通縁現在世者經論常途之所談故謂由天眼見諸有情死時生時諸蘊相續者以天眼通見現在世死時生時諸蘊相續云也但於光法師依婆沙論意述前際分別見中四遍常論計故可指過去蘊云難者以現在望未來名前際分別見也故光法師所引婆沙論百九十九云若依現在起分別見此則不定或名前際分別見或名後際分別見以現在世是未來前過去後故或未來因過去果故文聖禪僧都云天眼通爲本攝死生智天眼通知未來死生智爲本攝天眼通死生智知現在也而今天眼通爲本攝死生智之門云謂由天眼見諸有情死時生時諸蘊相續知未來蘊可云也但以之名前際分別見事會通之趣准前可思也文問異生可得死生智耶答可得死生智也兩方若死生智者披今論餘處二十七文云非天眼通力所引故與通合立死生智名文依聖身起之言異生不得死生智云事分別也若依之爾者光法師解釋中述六十二見相或云謂由天眼見諸有情死時生時諸蘊相續由斯便執我及世間倶是常住文或云或當生無想或當悶絶等文任此等解釋異生得死生智見如何答異生得死生智云事不限光法師解婆沙論處處中所見也所謂或百問以宿住智憶知前際宿住事已無間即能起死生智觀察後際死生事耶答此問云佛能非餘諸佛功徳不作加行能現前故獨覺聲聞諸外道等要作加行方能起故文或明宿住隨念智及死生智相云學者及異生身中即前二智唯有通義無餘三種文或百四十述祁境天耳他心宿住死生智通相云由此五種皆依四靜慮異生聖者倶能起故文任此等論文異生得死生智云事分明也但於今論餘處依聖身起之文者異生所起死生智唯縁色境無縁語業意業今就知身語意三業死生智云依聖身起也故見今論餘處文問若爾何縁説死生智知有情類由現身中成身語意諸惡行等答此問云非天眼通能知此事有別勝智是通眷屬依聖身起能如是知是天眼通力所引故與通合立死生智名縁未來身語意三業死生智云依聖身起也故光法師釋此文云非天眼通能知語意以天眼通但知色處有別勝智是通眷屬依聖身起能如是知此眷屬智是天眼通力所引故所以與通合立死生智名文泰法師釋此文云非天眼通能知此語意事有別勝智是眷屬依勝身起能如是知是天眼通力所引故與通合立死生智名文按此等釋意死生智是天眼通眷屬故同天眼通縁色處易故異生亦起之異天眼通縁非色處語業意業難故必依聖者勝身能起之也問菩薩可退自乘種姓耶進云光法師釋云言定不退不退自乘種姓文付之異生位種姓未定利鈍不定也設雖菩薩種姓遇縁時何不退自乘種姓哉是以光法師解釋中菩薩先得八定後於菩提樹下退起三惡覺見既云有起惑退寧不許種姓退哉何況見婆沙論文説得無諍定阿羅漢云先是菩薩種姓文退菩薩種姓作聲聞云事此文尤分明也如何答菩薩種姓是最極猛利故起順解脱分善根之後更不可有轉向餘乘之義故婆沙論七云若起佛種姓順解脱分已即不可轉極猛利故文但於光法師菩薩先得八定後於菩提樹下退起三惡覺云釋者光法師即會此疑云言定不退不退自乘種姓非言決定不退起惑文文意云菩薩種姓極猛利故起順解脱分善根之後雖決定不退異生位種姓未定故於已斷煩惱有暫退義云也次於婆沙論得無諍定阿羅漢先是菩薩種姓云文者今此菩薩者未起順解脱分善根之前未入阿僧祇耶位菩薩故退作聲聞也以何知之者婆沙論百七十一中以四種入胎相配菩薩位分云此四種入胎皆謂菩薩於中有説第四入胎是第三阿僧祇耶菩薩第三入胎是第二阿僧祇耶菩薩第二入胎是初阿僧祇耶菩薩第一入胎是此前菩薩文既云是此前菩薩有未入阿僧祇耶菩薩云事炳然也此未入阿僧祇耶菩薩者法爾身中具六種姓亦有三乘種姓故菩薩種姓雖不決定根姓猛利慈悲偏増遥超二乘分齊不似餘異生類故且名菩薩種姓然而自本身中具三乘種姓故未起順解脱分善根之前遇縁作聲聞故云先是菩薩種姓也非謂云爾故起菩薩種姓順解脱分善根之後退作聲聞故全無相違也重難云寶法師餘處二十三釋今論言一坐者從煗善根乃至菩提不起于座有餘師説從不淨觀不起于座乃至菩提之文云准此一坐已後説不可轉與婆沙不同是論意別文如此釋者今論意菩薩起順解脱分善根之後於一坐已前可有可轉之義見若有可轉之義者豈不退自乘種姓哉答寶法師餘處釋實以難思且存一義云披解釋前後尋轉不轉義上云然從頂位等已前可轉者聲聞若不轉即經六十劫定得涅槃若轉者即不定也獨覺不轉者百劫定得涅槃若轉者即不定以修行間斷不間斷名可轉不可轉見准此釋思下是論意別之釋意婆沙論意云菩薩起順解脱分善根之後修行不間斷今論意云一坐已後修行不間斷是其意別爲言更非云轉向餘乘之義兩論意別若非轉向餘乘之義者全不可爲疑難哉重難云麟角佛無轉等者專就轉向餘乘之義論之也何云修行不間斷義哉答麟角佛無轉等者實雖顯轉向餘乘之義兼亦論修行不間斷義也問光法師引今論十五業品不退姓名堅文云或據天中故言不退文爾者今此釋意爲唯限第六種姓爲當可通前五種姓耶答唯可限第六種姓也兩方若唯限第六種姓者於天中六種姓倶無有退何不通前五種姓哉若不通前五種姓者或據天中故言不退之釋豈非無用哉若依之爾者既云不退姓名堅唯可限第六種姓也是以見光法師解釋前後上云利根異生亦不可退畢下述或據天中故言不退唯限第六種姓云事分明也答見今論業品文本頌云堅於離染地異生不造生長行述不退姓名堅唯限第六種姓之旨炳然也故光法師引此文畢問准此利根異生亦不可退云何乃言天授菩薩雖是利根由是異生可説退耶此問意不退姓名堅之文定第六種姓問之也答此問作二釋解云但言不退異生於離染地不造生業非全第六種姓皆定不退者初釋也此釋意云異生位種姓未定故第六種姓不必皆不退故就第六種姓之中不退之類云不退姓名堅釋也或據天中故言不退者第二釋也此釋意云天中第六種姓全皆是不退故異非全第六種姓皆定不退之釋天中第六種姓全名不退姓名堅釋也前五種姓自本文外之事也非今所問故天中六種姓倶雖不退或據天中故言不退之言中不可攝天中前五種姓也重難云光法師二釋倶不可然先就初釋有疑退法不退法者相配鈍利事常途之所談也前五種姓無所簡名退法者第六種姓全亦可名不退法者何云第六種姓之中撰出不退者名不退姓哉何況婆沙論百十四文有二説中初師意云已離欲界染未離初靜慮染退法異生能造初靜慮順生業文取意如此文者前五種姓之中不退之類名退法者見准而思之第六種姓之中退類可名不退法者也若第六種姓之中撰出不退者名不退法者前五種姓之中撰出可名退法者若爾豈不背婆沙論已離欲界染未離初靜慮染退法異生造初靜慮順生業云文哉凡思道理退法不退法之中可攝一切類盡若如今義者前五種姓之中不退者第六種姓之中退者今此退法不退法中不攝之歟如何次第二釋亦難思今論餘處不退種姓名堅之文第六種姓全名不退姓者前五種姓全可名退法者若前五種姓之中有不退類者寧不違婆沙論第二師已離欲界染未離初靜慮染退法者不造初靜慮順生業云文哉次婆沙論中云不退法者就天中第六種姓論之歟若云爾者婆沙論意廣亘人中天上可論退法不退法者何除人中第六種姓哉若婆沙論意亘人中天上者倶舍婆娑兩論所説退法不退法之廢立可異歟若云其廢立異者誰可信用之哉次天上處不退故一切異生皆不退也唯限第六種姓名不退法者甚似無其詮哉問欲界繋有漏法中可有非邪見所縁類耶答不可有此類也兩方若有非邪見所縁類者以道理思之何可有今此類哉若依之爾者披婆沙論文虚空非擇滅名非邪見所縁見如何答邪見是共相縁惑廣縁一切法故欲界繋有漏法中不可有非邪見所縁之類也但於婆沙論中虚空非擇滅名非邪見所縁見云難者此難頗僻事也即勘婆沙論九云問撥無虚空非擇滅者爲縁何法答即縁虚空非擇滅名所以者何撥無彼者無深重心如謗雜染清淨事故問此是何智答此是欲界修所斷中無覆無記邪行相智文此文意云邪見不縁虚空非擇滅故無撥無虚空非擇滅之義撥無虚空非擇滅之心者是欲界修所斷中無覆無記邪行相智也彼縁虚空非擇滅名撥無虚空非擇滅非深重執心故無覆無記邪行相智云許也邪見廣撥無有漏因果之時寄因果門可縁虚空非擇滅名也重意云邪見別縁虚空非擇滅名無撥無虚空非擇滅之義爲言非云總不縁虚空非擇滅名婆沙論文不足爲難也問上界無覆無記心可縁虚空非擇滅名耶答可縁之也兩方若縁之者光法師所引婆沙論中於縁虚空非擇滅名之心云此是欲界修所斷中無覆無記邪行相智文如此文者上界無覆無記心不縁虚空非擇滅名見若依之爾者設雖上界無覆無記心何不縁虚空非擇滅名哉答上界無覆無記心可縁虚空非擇滅名也欲界無覆無記心既縁之上界無覆無記心何不爾哉但於光法師所引婆沙論文者上界是定地故所有無覆無記心中欲撥無虚空非擇滅不及其體縁彼名之義無之也故欲撥無虚空非擇滅不及其體縁彼名之心是欲界修所斷中無覆無記邪行相智也爲言全非遮上界無覆無記心泛爾縁虚空非擇滅名之義婆沙論文更無相違也問光法師意邪行相智可通善耶第一卷抄記録之畢問戒禁取可通集滅二諦所斷耶進云今論中云戒禁取通在二部謂見苦見道所斷不通集滅二諦所斷也付之外道執見分萬差煩惱種類非一准設雖戒禁取何不通集滅二諦所斷哉何況戒禁取者非因計因非道計道其非因計因者既迷因執見也定可集諦所斷加之以集滅所斷邪見計如理覺戒禁取可通集滅二諦所斷例如以苦道所斷邪見計道戒禁取通苦道二諦所斷以集滅所斷邪見計勝見取通集滅二諦所斷也就中非道計道戒禁取通道諦所斷者非滅計滅戒禁取亦可滅諦所斷哉答戒禁取者唯限見苦見道二諦所斷不通見滅二諦所斷云事倶舍婆沙五十二百九十九正理四十七顯宗二十五諸論一同之定判也更不可異求之但於外道執見分萬差煩惱種類非一准云難者設雖煩惱迷執區分所治能治敵對相翻故隨煩惱迷執定能治道品之時戒禁取唯限苦道二諦所斷不通集滅二諦所斷也次於非因計因戒禁取者既迷因執見也定可集諦所斷云難者是則今論問答也論中即答此問或云於大自在等非因妄執因從常我倒生故唯見苦斷或述迷苦諦故光法師釋於大自在等非因妄執因等之文云是顯非因計因戒禁取從常我生麁果處起故見苦斷非於集因妄計我常方起因執故非因計因非見集斷文文意云果麁顯易見故縁麁果處起因執見苦諦時斷之也雖於非因起因執所迷之境麁果處故苦諦所斷非集斷所斷爲言解迷苦諦故之文云雖非從彼常我倒生迷苦諦故見苦所斷應知頌文且據戒禁從常我生見苦所斷以實而言亦有不從常我生者故婆沙一百九十九云前來所説諸戒禁取皆見苦所斷者依我常倒起於果處轉故雖非因計因而見苦所斷謂戒禁取總有二類一非因計因二非道計道非因計因復有二類一迷所執我常法起二迷宿作苦行等起前依我常倒亦於果處轉故隨二倒見苦所斷後唯於果處轉果相麁顯易可見故計因爲因非全邪故既迷果相故亦云見苦所斷文文意云非因計因戒禁取中雖有非從彼常我倒生迷苦諦故見苦所斷也故婆沙論中非因計因戒禁取復有二類一迷所執我常法起於果處轉故隨我常二倒見苦所斷二迷宿作苦行等起唯於果處轉果相麁顯易可見故亦見苦所斷云也次於以集滅所斷邪見計如理覺戒禁取可通集滅二諦所斷云難者邪見現前撥無集滅之時既無所斷所證法執道無用故無執彼邪見爲道之義故戒禁取不通集滅二諦所斷也故婆沙論百九十九云謗集滅時既撥所斷所證法相若執爲道便爲無用定依所斷及所證法而立道故文設又後時雖有以集滅邪見爲通戒禁取現起之義迷果處起故苦諦所斷非集滅二諦所斷也故婆沙論百九十九云又彼所撥與道相異必無彼無間執彼爲道者若於後時執彼爲道定於果處而起道執見苦諦時此見便斷故無戒禁取見集滅所斷文次於以苦道所斷邪見計道戒禁取通苦道二諦所斷云例難者於道有多類故以謗苦邪見計道戒禁取迷麁果處起故苦諦所斷也以謗道邪見計道戒禁取道諦所斷也集滅異此更非相例次於以集滅所斷邪見計勝見取通集滅二諦所斷云例難者婆沙論百九十九中會此疑云見取所執無所待對但執爲勝諸邪見後皆得現前故通四部文文意云戒禁取待所斷所證容起道執故不通集滅二諦所斷見取無此義故通四諦所斷爲言次於非滅計滅戒禁取可滅諦所斷云難者凡戒禁取不過非因計因非道計道二類非滅計滅是見取行相非戒禁取故亦無相違也重難云既云非因計因戒禁取何唯限苦諦所斷哉是以寶法師解釋中非集爲集不限苦諦所斷見是一次非因計因戒禁取以果執因故苦諦所斷者何無以因執果戒禁取集諦所斷哉是二次婆沙論中云計因爲因非全邪故其意如何是三次前非集滅計集滅後起邪見撥無眞集滅之時寧無執彼集滅所斷邪見爲道戒禁取哉若有此類者尤可集滅二諦所斷依之前非道計道後起邪見撥無眞道之時執彼邪見爲道道諦所斷戒禁取可有見相例可同是四次婆沙論百九十九中縁集滅所斷邪見爲道戒禁取可有見若有執彼邪見爲道戒禁取現起之義者亦可集滅二諦所斷例如彼非因計因戒禁取從常我倒生故苦諦所斷也是五次寶法師解釋中執非滅爲滅撥無眞滅之時以彼邪見爲如理覺之義可有見若許此義者可不許戒禁取通滅諦所斷哉以彼邪見謂如理覺可爲戒禁取故也是六次於因執非勝計勝見取既集諦所斷也豈無於因執非道計道戒禁取集諦所斷哉是七答非因計因戒禁取唯限苦諦所斷之旨大概前重成申畢重勘正理論四十七文述但計麁果爲彼因故非因計因戒禁取偏迷麁果處起故唯限苦諦所斷不通集諦所斷云事亦分明也但於寶法師釋中非集爲集不限苦諦所斷見云難者正見彼解釋云若將非集而名集者此是邪智非戒取攝不同淨因名戒取也何得將此名爲戒取故救無理文若非戒禁取者更不可爲疑哉次於非因計因戒禁取以果執因故苦諦所斷者何無以因執果戒禁取集諦所斷哉云難者果相麁顯易可見故者婆沙論所説也果相麁顯易見故見果雖起因執因相微細難見故見因不起果執也次婆沙論中計因爲因非全邪故者以惡因等爲善因等事其義雖邪因義是同故云非全邪故也不似以果爲因是全邪歟但於因有善惡中非以因爲因之義以惡爲善之邊是見取攝非戒禁取也次於前非集滅計集滅後起邪見撥無眞集滅之時寧無執彼集滅所斷邪見爲道戒禁取哉云難者正理論四十七中會此疑云是故有於八支聖道能謗邪見謂如理覺無於謗滅謂如理解以戒禁等自體行相與聖道殊無謂涅槃常寂體相有差別者是故無滅與道同義文寶法師釋此文云此以計能證道有多故謗於正道執餘邪道爲清淨因謂此邪見爲如理道内外二道同計涅槃是常是寂若撥滅無即不別計得滅之道由此不執謗滅邪見爲如理覺集諦亦爾内外諸道欲斷苦因而修斷道若謗因無必不更計有餘斷道由此不執謗集邪見爲清淨因此集滅所斷無戒取也文文意云前雖執餘涅槃起邪見撥無所證常寂涅槃之時所證常寂義同故撥無之所證義即失也故無所證無能證故執彼邪見不爲道也又雖執餘集起邪見撥無所斷集之時所斷義同故撥無之所斷義即失也故無所斷無能斷故執彼邪見不爲道也但於道有多類故雖撥無正道尚執彼邪見爲道也正理論中道有多類於理無失者即顯此意也次於婆沙論中縁集滅所斷邪見爲道戒禁取可有見若有執彼邪見爲道戒禁取現起之義者亦可集滅二諦所斷云難者苦諦所斷戒禁取縁五部故縁集滅所斷邪見可起也雖縁集滅所斷邪見而起迷麁果處起故苦諦所斷也故婆沙論云若於後時執彼爲道定於果處而起道執見苦諦時此見便斷故無戒禁取見集滅所斷文但非因戒禁取異此義勢彼同迷麁果處起故苦諦所斷也次於寶法師解釋中執非滅爲滅撥無眞滅之時以彼邪見爲如理覺之義可有云難者執非滅爲滅撥無眞滅之時以彼邪見爲如理覺者是見取攝非戒禁取也故寶法師釋別計非滅以爲眞滅撥涅槃者此是見取若將邪見爲如理覺此順見取何得名道婆沙論云見取所執無所待對但執爲勝諸邪見後皆得現前故通四部也次於於因執非勝計勝見取既集諦所斷也豈無於因執非道計道戒禁取集諦所斷哉云難者戒禁取必待對所斷所證起非道計道執故起時是難也而果相麁顯易見故縁果雖起非道計道執因相微細難見故縁因不起非道計道執見取無待對義起時非難故縁因起非勝計勝執也委細之旨讓聖禪僧都三季講抄略之畢後學之輩可引見之問外道所起戒禁取可通苦諦所斷耶答可通苦諦所斷也兩方若通苦諦所斷者披婆沙論五十二文云此戒禁取唯有二種謂内外道所起差別内道起者見苦所斷外道起者見道所斷文如此文者外道所起戒禁取不通苦諦所斷見若依之爾者戒禁取中於果處轉是苦諦所斷也若爾外道豈不起於果處轉戒禁取哉答外道所起戒禁取中可有於果處轉之類故可通苦諦所斷云事炳然也但於婆沙論文者一往定判從多分説也所謂外道多執謗道諦邪見等爲道此戒禁取是道諦所斷故云外道起者見道所斷也故婆沙論云二執謗道諦邪見等爲道此親違道於因果相不別迷執故見道時方能永斷文何況以例思之見婆沙論五十二次下文云此戒禁取唯有二種謂非因計因及非道計道非因計因者見苦所斷非道計道者見道所斷是亦一往定判從多分説也以何知之者光法師所引婆沙論百九十九中云非道計道亦有二類一執有漏戒樂爲道此迷麁顯果相起故見苦諦時便能永斷非道計道戒禁取實亦通苦諦所斷故也問樂淨倒外可有見苦所斷見取耶答樂淨倒外不可有見苦所斷見取也兩方若見苦所斷見取者光法師述見取雖亦通餘三諦非増勝故不立爲倒唯簡餘部見取明知樂淨倒外不可有見苦所斷見取云事若依之爾者披雜心論八文云見取中立樂淨見是倒非餘計惡爲好劣爲勝如是一切文如此文者樂淨倒外可有見苦所斷見取見如何答樂淨倒外不可有見苦所斷見取其故婆沙論百四中述五部十二見作論義云此以見苦所斷二見半爲自性謂有身見見取全及邊執見中常見文正理論四十七文云然毘婆沙決定義者約部分別十二見中唯二見半是顛倒體謂有身見苦見取全邊執見中取計常分餘部見取非増勝故文顯宗論二十五説全亦同之任此等論説見苦所斷見取全爲顛倒體所簡唯是餘部見取也樂淨倒外不可有見苦所斷見取云事甚分明也故光法師或釋見取雖亦通餘三諦非増勝故不立爲倒或述集滅道下見取亦應別簡略而不論故正理云餘部見取非増勝故專叶婆沙正理兩論説也明知今論云諸見取中取計樂淨爲樂淨倒見苦所斷見取悉爲樂淨倒體云也但於雜心論文者彼論中云見取中立樂淨見是倒見苦所斷見取計樂淨是樂淨倒體爲言標非餘擧計惡爲好劣爲勝如是一切簡餘部見取非顛倒體也非簡見苦所斷見取中有非顛倒類全無相違也重難云今論初師意三見各一分爲顛倒體見若爾見苦所斷見取中可有非顛倒類哉是一次勘泰法師釋云諸見取中唯取樂淨爲樂淨倒不取計好爲惡計劣爲勝文今此釋同雜心論説見中計惡爲好計劣爲勝之類不爲顛倒體見若爾見苦所斷見取中豈無計惡爲好計劣爲勝之類哉是二答今論二師説者初師意我倒體不攝我所見第二師意我倒體攝我所見云差異許也初師意約五見出體故見苦所斷見取全雖立樂淨倒餘部見取不立樂淨倒故云三見各一分爲顛倒體也故光法師此師義引婆沙論百四云見取中見苦所斷執樂淨見是樂淨顛倒自性非餘見取文常樂淨倒二師所存全不異故光法師釋云有説我倒攝身見全者此是第二師常樂淨倒同前説我倒異説故別叙也文次光法師釋有漏法中非眞樂淨妄計樂淨故得説爲非勝計勝見苦所斷見取計劣爲勝爲樂淨倒體也故發智論云若苦樂見何見攝何見所斷答取劣法爲勝見取攝見苦所斷若不淨淨見於五見何見所斷答取劣法爲勝見取攝見苦所斷文故見苦所斷見取計苦爲樂計不淨爲淨同是見取行相爲樂淨倒體也但於雜心論文泰法師釋者簡餘三諦見取計惡爲好計劣爲勝也總非簡計惡爲好計劣爲勝見取亦無所背也問論文云有身見中唯取我見以爲我倒文爾者此師意我所見可有一向倒義耶進云光法師釋云非一向倒文付之我見既有一向倒義我所見何不然哉答光法師釋此疑云其我所見異執不同故不別簡若依初師我所見非倒應作是言我所見雖推度性及妄増益非一向倒亦於少分實處轉故如計實法是我所有非無體故所以非倒文此釋意云我所見者計我所有有實體也而於實法計有實體之義邊叶實義故非一向倒云也但於我見倒難者諸法之中有實我者應非一向倒都無有實我體計我故是一向倒也問論文云有説我倒攝身見全文爾者光法師意今此有説意五見十二見二義中如何釋之耶進云光法師釋云此論婆沙正理皆約五部十二見出體文付之依光法師釋披今論現文雖述有説我倒攝身見全未云正約十二見作論何忽釋皆約五部十二見出體哉何況光法師釋此文云常樂淨倒同前説我倒異説故別叙也云云思此釋意五見作論義二説雖是同我所見攝不攝兩師意各別云也加之今此説雖述攝身見全無釋取見取全云身見見取全其意尤難思就中光法師所引婆沙論百四中問五見中幾見爲自性答二見半爲自性二見半非顛倒自性若約十二見作論者豈可云二見半非顛倒自性哉答凡論四顛倒體或云五部十二見中二見半爲自性或云五見中三見各一分爲自性二義有之而今論中既云有説我倒攝身見全以身見全爲我倒體故非三見各一分義云事炳然也婆沙論百四中述此師義云此以見苦所斷二見半爲自性謂有身見見取全及邊執見中常見文若非十二見作論者豈云見取全義正理論四十七中擧此師義云然毘婆沙決定義者約部分別十二見中唯二見半是顛倒謂有身見苦見取全邊執見中取計常分文顯宗論二十五説全亦同之正云約部分別十二見中雖可疑之哉故光法師釋此論婆沙正理皆約五部十二見出體故言身見見取全邊見一分專叶此論婆沙正理之本説也但於光法師常樂淨倒同前説之釋者五見十二見作論兩師所存雖各別常樂淨倒體二義全不異故云前説更無相違也次於今此説雖述攝身見全無釋取見取全云難者婆沙論云謂有身見見取全正理論云謂有身見苦見取全故光法師任此等論説釋身見見取全非無依憑也就中正理論苦見取全之文十二見作論之旨分明哉次於光法師所引婆沙論中二見半非顛倒自性云文者苦諦所斷五見之有顛倒非顛倒之差異故雖十二見作論之門且約苦諦所斷五見云二見半爲顛倒自性二見半非顛倒自性也餘部之見一向非顛倒自性故不及致此簡別也若云婆沙論文五見作論者見取一分可非顛倒自性哉疑難之中豈非有相違哉重難云泰法師釋有説我倒攝身見全之師義云依此師釋身見全二見半是倒邪見戒取全二見半非倒文既云身見全二見半是倒明知約五見作論云事若約十二見作論者可云身見見取全邊見半是倒故也答泰法師釋實以難思且不可依用歟問論文云有説我倒攝身見全文爾者今論意以此説可爲正義耶答以此説可爲正義也兩方若以此説爲正義者見今論文云謂邊見中唯取常見以爲常倒諸見取中取計樂淨爲樂淨倒有身見中唯取我見以爲我倒有説我倒攝身見全五見中三見各一分説爲本義十二見中二見半義置有説言明知今論意以此説不爲正義云事若依之爾者光法師解釋中今論意以此説爲正義見如何答見婆沙論百四文云此以見苦所斷二見半爲自性謂有身見見取全及邊執見中常見二見半非顛倒自性謂邪見戒禁取全及邊執見中斷見有作是説此四顛倒於五見中三見各一分以爲自性以十二見中二見半説爲本義於五見中三見各一分義置有作是説之言正理論四十七中云謂邊見中唯取常見以爲常倒諸見取中取計樂淨爲樂淨倒有身見中唯取我見以爲我倒如是所説是一師宗然毘婆沙決定義者約部分別十二見中唯二見半是顛倒體顯宗論二十五説全亦同之五見中三見各一分説降如是所説是一師宗十二見中唯二見半義歎然毘婆沙決定義者故今論有説我倒攝身見全之説爲有宗正義之旨炳然也故光法師釋云此論兩説雖無評文婆沙正理意以此論後師爲正婆沙不言有説正理復言決定義故文寶法師釋有説我倒攝身見全之文云婆沙正義引正理論今文判准此論文後説爲正任此等解釋今論意以十二見中二見半義爲正義云事分明也但於今論中此師義置有説言云難者雖爲正義置有説言事諸論之中處處常習也疑難之趣何強爲痛哉問論文云要具三因勝者成倒文爾者今此勝者者三因外別因歟答可有二義也兩方若三因外別因者既云要具三因勝者成倒明知具三因即云勝者非因云事若依之爾者寶法師釋此文云具其三因及中勝者如解釋者勝者之言三因之外別因見如何答思此事人師異釋歟若依光法師意者要具三因即云勝者三因之外非因也故婆沙論百四云以三事故建立顛倒一推度性故二妄増益故三一向倒故文正理論四十七云何謂倒相謂具三因何謂三因一向倒故推度性故妄増益故文顯宗論二十五説全亦同之此等論説同述具三因立四倒之旨此外更無別由故光法師意今論云要具三因勝者成倒具三因即云勝者非三因外別故得意也故光法師釋云集滅道下見取亦應別簡略而不論故正理四十七云餘部見取非増勝故文若勝者言簡餘部見取者豈可云略而不論哉若依寶法師意者具三因中爲増勝者立名顛倒雖具三因非増勝者不立顛倒如餘部見取雖具三因非増勝故不立顛倒爲言故勝者言三因之外別簡餘部見取之言云也故寶法師釋云諸煩惱中且立三因於中取勝爲顛倒體具其三因及中勝者諸煩惱中唯二見半具其三因謂一向倒推度性故妄増益故及體増勝所言勝者簡餘三諦所斷見取正理論云餘部見取非増勝故文重難云就光法師釋有疑具三因中有非顛倒類者依三因立四倒之義豈非理不盡哉答光法師意要具三因勝者成倒者要具三因爲顛倒體簡不具三因全非顛倒體也具其三因之中自有非顛倒類更不顧之也故正理論中重委簡之云餘部見取非増勝故也爲言問於有漏法計樂淨見取可有一向倒義耶進云既立顛倒故可有一向倒義也付之見取計樂受爲樂計善法爲淨亦於少分實處轉故可非一向倒何立顛倒哉如非道計道戒禁取於少分實處轉故非一向倒如何答今此疑問之趣即光法師問難意也即答此問云彼執有漏同涅槃樂同涅槃淨於有漏中無少樂淨同彼涅槃一向倒故所以名倒其戒禁取非道計樂即有分同無漏聖道證淨涅槃故不成倒文文意顯也問以戒禁取可立顛倒耶進云今論疏中不立顛倒也付之戒禁取非因計因非道計道其過既重何不立顛倒哉倒如見取中取計樂淨立樂淨倒如何答見今論文述要具三因勝者成倒具一向倒故推度性故妄益故之二義闕無一向倒故之一義故不立顛倒也故今論云謂戒禁取非一向倒縁少淨故文正理論四十七云謂戒禁取非一向倒所計容有能離欲染等故少分別時得清淨故文顯宗論二十五説大亦同之婆沙論云戒禁取雖是推度性及妄増益而非一向倒亦於少分實處轉故謂有色界道能淨欲界有無色界道能淨色界有上地道能淨下地與無漏道離染證滅義相似故文雜心論八云戒取雖決斷及妄置不一向倒謂少實於少處起故文演義鈔十二上中述倶舍論意云謂戒禁取非一向倒執有漏道得淨涅槃雖非究竟斷惑證滅而能暫時離染證滅縁少淨故文任此等定判思之戒禁取非因計因非道計道其過雖重無有一向倒故之義故不爲顛倒體也但於見取計樂淨倒云例難者光法師釋此疑云彼執有漏同涅槃樂淨於有漏中無少樂淨同彼涅槃一向到故所以名倒其戒禁取非道計道即有分同無漏聖道證淨涅槃故不成倒文問正理論四十七中云於五取蘊執我我所心便高擧名爲我慢文爾者今此我慢者可通見修所斷耶答可通見修所斷也兩方若通見修所斷者見正理論次下文云由此證知於未缺減有身見位可言有我想心二倒非缺減時證我想心二倒見苦所斷之旨以下文思上説今此我慢者唯可限見所斷也若依之爾者今文廣釋我慢相何不通見修所斷哉答正理論今文廣釋七慢中我慢相故可通見修所斷云事道理炳然也故見今論文上云於五取蘊執我我所令心高擧名爲我慢下問如是七慢何所斷耶答一切皆通見修所斷今此我慢通見修所斷之旨分明也而正理論文大同今論説上云於五取蘊執我我所心便高擧名爲我慢下問如是七慢何所斷耶答有餘師言我慢邪慢唯見所斷餘通見修理實應言七皆通二正義意成七慢同通見修所斷之旨明知今此我慢者通見修所斷云事但於次下文者今此我慢恃我起故聖者未斷不起類也我想心二倒與我極相親近法故可唯見苦所斷證也非謂云爾故今此我慢唯限見所斷更無相違也問我生已盡等四徳所生増上慢倶可縁所執有漏道行耶答倶可縁所執有漏道行也兩方若倶縁所執有漏道行者見發智論文明我生已盡所生増上慢云此即縁生述不受後有所生増上慢云此即縁有如此文者我生已盡不受後有二徳所生増上慢不縁所執有漏道行見若依之爾者同是我生已盡等四徳所生増上慢也倶可縁所執有漏道行例如梵行已立所作已辨二徳所生増上慢倶縁所執有漏道行如何答我生已盡梵行已立所作已辨不受後有四徳所生増上慢者計我依此道此行已遍知苦已永斷集已證滅已修道於未證四徳成已證思起増上慢故尤可縁所執有漏道行也但於發智論此即縁生之文者婆沙論四十三問答也問此増上慢亦應能縁慢者所執有漏道行何故但説縁所盡生答此問述多説云亦應説彼而不説者應知此中是有餘説復次縁道行者唯修所斷緑所盡生通五部慢此中但説能遍縁者復次有漏道行亦是生攝故説縁生有餘師説所執道行説名爲生能生慢故此慢但縁能盡生道彼説非理能依梵行已立等慢不説縁生故此慢縁所盡生不違理故文寶法師此云准上論文縁道及所盡生文婆沙抄中釋此文云問何故所起慢但縁所盡生不縁能盡道及行非解云縁而本論云但縁生者起慢而言我生已盡故文任此等定判我生已盡所生増上慢縁所執有漏道行之旨分明也發智論此即縁有之文會通之趣准而可思故婆沙論四十三中釋此文云此即縁有者此増上慢即縁所不受有此中問答如前應知以有與生義相似故有本説縁心心所法顯不受後有即是滅道故問我生已盡何故不然答彼亦應爾但得互説問預流果聖者於預流向可起増上慢耶答可有二義也兩方若起増上慢者一來果聖者各於一來向不還向無起増上慢准例思之預流果聖者於預流向不可起増上慢是以婆沙論中預流果聖者於預流向不起増上慢見若依之爾者預流果聖者於預流果起増上慢於預流向何不起之哉答此事雖有學者異義且存一義云預流果聖者於預流向不可起増上慢其故今論云於未證得殊勝徳中謂已證得名増上慢婆沙論述増上慢者於勝功徳未得謂得未獲謂獲未觸謂觸未證謂證由此起慢廣説如前増上慢者名未得謂得等之慢也而預流果聖者於預流向是已得法也於此更不可起増上慢故婆沙論中叙有説意云異生起九種増上慢謂於勝品有漏善根及於無漏四向四果預流果起七除前二一來向起六除前三一來果起五除前四不還向起四除前五不還果起三除前六阿羅漢向起二除前七阿羅漢果無増上慢預流向無起増上慢義評家破之云聖者亦於勝有漏善起増上慢故六聖者如前所起各復増一文思此評家意聖者亦於勝有漏善起増上慢之義雖異有説意預流果聖者於預流向不起増上慢云事同有説義故正義意預流果聖者於預流向不起増上慢之旨炳然也何況婆沙論四十三中一來果聖者於一來向不起増上慢不還果聖者於不還向不起増上慢見尤可爲例證也但於預流果聖者於預流果起増上慢云例難者婆沙論中會此疑云於勝根性起増上慢文此釋意云劣種姓預流果聖者於勝種姓預流果起増上慢故雖自果不肖未得謂得等之義也重難云預流果聖者於勝種姓預流果起増上慢者於勝種姓預流向何不起増上慢哉是一加之婆沙論中釋有無處起増上慢云預流果於預流果及有漏善起増上慢依有處起預流向乃至阿羅漢果起増上慢依無處起文此文無諍預流果聖者於預流向起増上慢見如何可會之哉是二答四向四果之階級者勝劣遥別故預流果聖者於預流向雖勝種姓不起増上慢也次於婆沙論文者爲明預流果聖者有處無處云於預流向乃至阿羅漢果起増上慢依無處起也非謂預流果聖者實於預流向起増上慢也如彼光法師餘處爲顯足上頭歸下之義云且如色究竟天上四天王天中無妨頭下足上等也有一義云預流果聖者於勝種姓預流向可起増上慢也此義意准難勢之趣可思之又如舊草抄可引見之問九慢類中我勝慢類從何慢出耶進云今論云初三如次即過慢慢卑慢我勝慢類從過慢出云也付之勝言既廣何唯從過慢一種出哉若對劣境謂己勝可從慢出若對等境謂己勝可從過慢出若對勝境謂己勝可從慢過慢出也是以品類足論意我勝慢類從慢過慢慢過慢三慢出見如何答今論中云初三如次即過慢慢卑慢我勝慢類從過慢出云事源依發智論説也故今論云如是且依發智論釋文依今此文勘發智論云我勝者是依見起過慢文婆沙論百九十九中釋此文云我勝者彼於等謂己勝是依見起過慢者是依有身見所起過慢文任此本釋二論之文我勝慢類從過慢出之旨分明也若爾今論説既有依憑文何強疑之哉但於勝言既廣可從慢過慢慢過慢三慢出云難者發智論意對等境謂己勝名我勝慢類故唯從過慢出也故光法師釋云我勝慢類謂我勝彼於等謂己勝即是過慢文次於品類足論説者彼廣觀所對境從慢過慢慢過慢出云也故今論云依品類足釋慢類者且我勝慢從三慢出謂慢過慢慢過慢三由觀劣等勝境別故文婆沙論云依品類足論我勝慢類中攝三種慢若於劣謂己勝即是慢若於等謂己勝即是過慢若於勝謂己勝即是慢過慢文是則顯義道多途述廣略定判也故寶法師釋云今評二釋發智論略品類足廣文若爾發智品類兩論各別明略廣一門實意更不相違歟尋云勘品類足論一部始末未見倶舍婆沙二論所引之文依憑在何處哉答問九慢類可通見修所斷耶答可通見修所斷也兩方若通見修所斷者見今論文問如是七慢何所斷耶唯答一切皆通見修所斷不云九慢類通見修所斷以知不通見修所斷云事是以辰旦人師解釋中九慢類不通見修所斷見若依之爾者今論中述慢七九從三皆通見修斷九慢類通見修所斷之旨分明也如何答今論云謂從前慢過慢卑慢如是三慢若依見生行次有殊成三三類如是且依發智論二十釋婆沙論百九十九述此九慢類即七慢中三慢所攝謂慢過慢卑慢依此本論所釋如是發智論意於七慢中三慢及過慢卑慢依我見生行解次第有殊故成九慢類非從七慢生別有九慢類體故九慢類通見修所斷云事炳然也故婆沙論百九十九云此九皆通見修所斷文但於不云九慢類通見修所斷云難者述慢七九從三皆通見所斷豈非云九慢類通見修所斷哉若夫長行中正不釋九慢類通見修所斷云疑歟若爾從七慢中三慢開立九慢類三慢之外無別體故問如是七慢何所斷耶答一切皆通見修所斷時九慢類通見修所斷云事既聞故不及重云九慢類通見所斷也次於辰旦人師解釋者是元瑜法師釋也彼師意云若許有計見所斷法以爲我者即縁我我慢類皆通見修九慢類通見修所斷見以何釋爲疑哉重難云元瑜法師釋若縁所計我爲勝等縁事我故唯修所斷若作此釋即九慢類唯縁所計我故唯修所斷九慢類唯限修所斷見以此釋爲疑也答元瑜釋意身見現起初念縁事法計我次念縁能執見計我所其後若縁所計事我起慢修所斷也縁能迷見起慢見所斷也爲言圓暉法師釋皆通見修斷之頌文云七慢九慢皆見修斷縁見所斷起者名見所斷縁事起者名修所斷其意大同元瑜解釋若爾縁所計事我所起慢類釋唯修所斷有何所背哉故次下結釋及九慢類皆通見修非謂縁見所斷法所起慢類亦修所斷非見所斷元瑜解釋全無相違也問無色界七慢倶可現起耶答七慢倶可現起也兩方若七慢倶現起者無色界中無有校量自他種姓色力財位智等之義七慢倶不可現起是以披今論餘處四文述此中意説縁補特伽羅者故欲色有無色界無無色界縁補特伽羅愛敬不現起見相例可同若依之爾者光法師釋應知七慢皆通三界如何答任光法師應知七慢皆通三界之釋無色界七慢倶可現起也但於無色界中無有校量自他種姓色力財位智等之義云釋者是婆沙論問答也故婆沙論四十三中問彼無校量種姓等義寧有卑慢答此問雖有多義述評家意云評曰應作是説非卑慢等要比度他勝劣而起無始時來數習力故雖生上界亦有現行是故三界皆具七慢文光寶兩師同引此文證色無色界亦有七慢之旨也次於今論餘處無色界縁補特伽羅愛敬不現起云文者善心非如煩惱無始串習故無色界中縁補特伽羅愛敬不現起云也善及染汚心所既異全不可爲相例之難也重難云光法師餘處四問慢皆方他以不答方他之言從多分説引婆沙論四十三評曰應作是説非一切慢要方他起無始時來數習力故依自相續慢亦現行之文畢解云慢過慢慢過慢卑慢此四方他我慢増上慢邪慢依自相續起文如此釋者無色界中方他四慢如何可現起哉答無始時來數習力故依自相續慢亦現行者理實而言可通七慢也但於光法師餘處釋者據其顯相亦從多分且致一往分別故更非相違也寫本云文永十一年甲戌六月二十六日酉時於東大寺尊勝院護摩堂之南庇新學問之閑窓抄之畢去四月十七日始此勤同夏林鐘今日終其篇日月徒馳久染翰墨於三伏之水問端數多屡勵微功於九夏之風抑捧此所生慧業奉資春日大明神之法樂依此修學勤勞必遂往生兜率天之宿望殊別二親九族速離有爲界之苦域舊友故人早預無上道之巨益鐵圍砂界之群類自界他方之含識迴向遠及濟度普利而已右筆華嚴宗末葉權僧正宗性年齡七十三夏臘六十一
