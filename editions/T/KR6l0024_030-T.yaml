body:
  text: 倶舍論第八卷抄下問論中明身異想異識住云如人一分天文爾者一分天者唯限欲界天歟進云今論云一分天者謂欲界天及初靜慮除劫初起文付之爲叶今論文披婆沙論説或百三十七云一分天謂欲界天或百七十三述初識住唯欲界繋故但依未至定滅任此等文一分天者唯限欲界天之旨分明也加之見品類足論九文云初識住七智以知除煩滅道智文若一分天言通色界天者初識住能智中何可除類智哉答廣披諸論説尋第二識住相品類足論七云謂有色有情身異想一如梵衆天劫初時是第二識住文婆沙論百三十七云有色有情身異想一如梵衆天謂彼初起是第二識住文此等本論中明第二識住但取初靜慮劫初起時故初靜慮除劫初起後時可初識住云事自明也故今論中述初識住云一分天者謂欲界天及初靜慮除劫初起道理尤可然也正理論文顯宗論説全亦同之諸論一同之説誰可疑之哉但於婆沙論一分天謂欲界天之文者光法師會之云一分天言理通初定以初定天一分初識住攝一分第二識住攝以不定故是故不言欲界六天全初識住以決定故故彼論説即彼論解第二識住但取初定劫初起時不取後時故不相違文次於婆沙論初識住唯欲界繋故但依未至定滅之文者光法師會之云又言初識住未至定滅者據全分説初定一分以與第二識住合斷非全分故故略不言文次於品類足論初識住七智知除類滅道智之文者光法師會之云品類足文初識住亦應言類智品還據全説不約小分文此等處處違文光法師悉會通之後學更不可致劬勞歟問論中明身異想一識住如梵衆天謂劫初起是第二識住文爾者初靜慮三天相望論身異義歟答當處相望論身異義也兩方若三天相望論身異義者第二靜慮三天相望其身可異何云身一哉是以光法師述梵輔梵衆當處相望身亦有異初靜慮中當處相望論身異義判若依之爾者論中明第二識住身異義云大梵王身其量高廣容貌威徳言語光明衣冠等事一一皆與梵衆不同故名身異文如此文者初靜慮三天相望論身異義見如何答於初靜慮明身異義當處相望論其相也故光法師釋有色有情身一想異如極光淨天是第三識住之論文云言身一者無異因感其身是同故言身一若望同地三天上下相望其身亦異而言身一當處相望故正理二十二云彼天中無有表業等爲因所感差別身形故言身一即形顯等同處諸天相無別義文第二靜慮名爲身一既是當處相望論之准彼思之於初靜慮名爲身異當處相望論之云事必然也但於今論大梵王身其量高廣等之文者光法師會此文云言身異者梵王梵衆其身各異故名身異此文且以大梵對梵衆明身異梵輔梵衆當處相望身亦有異故顯宗十二云言身異者初靜慮中有表無表尋伺多識爲因感身有差別故文重難云自本當處相望論身一異者設雖一往何論中以大梵王望梵衆明身異義哉是以於第二靜慮第三靜慮異天相望假不論身一異哉答梵王梵衆王臣相雜一處而住故異天相望旦論身異義也第二靜慮第三靜慮全無此義故假不明三天相望論身一異之義也故惠暉法師釋之以梵輔與大梵同一地攝臣主相依勝劣有殊故言身異二定三定各別地無背臣主自地論之即各不別也問論中答梵衆何處曾見梵王問擧三師説爾者論主正義意如何釋之耶進云今論云是故梵衆即住自天憶念此生前所受事文付之披今論所引契經文云我等曾見如是有情長壽久住乃至起願如何當令諸餘有情生我同分於彼正起此心願時我等便生彼同分内文任此經文梵衆未下生前曾見梵王知其心願見是以正理論中述此義意云復能了達衆下生前獨有梵王及心所願文如何答正理論中委明此義意云應説梵衆即住自天曾見梵王極光淨沒初受生時曾見彼故謂諸梵衆初下生時見大梵王威光赫烈雖懷敬慕欲往親承威神所逼未果前詣於茲荏苒還致多時後勵專誠預近瞻仰到已皆作是念言我等曾見乃至廣説謂彼近見大梵王時便能憶知先所見事復能了達衆下生前獨有梵王及心所願文此文意謂諸梵衆從極光淨天沒初生梵衆天之時見大梵王威光赫烈雖懷敬慕欲往親承威神所逼不果其志遂經多時後勵專誠親近瞻仰之時便能憶知初受生時先所見事契經中説曾見梵王了後起宿住通了達梵衆事下生前大梵王獨居起當令諸有情生我同分内内心願爲言非謂在極光淨天之時曾見梵王了達心願故契經我等曾見如是有情長壽久住乃至起願之文正理論復能了達衆下生前獨有梵王及心所願之説全無相違也重難云見圓暉法師釋云謂大梵王於劫初時獨一而住更無侍衞遂發願言云何當令諸餘有情生我同分時極光淨天見已悲愍從彼處沒生爲梵衆文此釋無爭在極光淨天曾見梵王知其所願見如何答諸梵衆極光淨天之時見大梵王獨一而住知起當令諸餘有情生我同分内内心願更非所疑今所論者契經中云梵衆曾見梵王知起此心願者指住自天見知之也爲言故圓暉法師釋更無所背也問正理論中明身一想異識住解契經極光天中有時諸天同共集會其身有異光明竝同文擧二師説爾者第二師意如何釋之耶進云正理論二十二有説梵衆名極光天文付之極光淨天者第二靜慮天云事經論通滿之説大小常途之談也何云梵衆名極光淨哉答以極光淨天名身一想異識住者諸經諸論之説是同大乘小乘之義無替故正理論二十二云有色有情身一想異如極光淨天是第三識住彼天中無有表業等所感差別身形故言身一即形顯等同處諸天相無別義文而契經云極光天中其身有異之文致相違故會之有二説中第二師有説梵衆名極光淨天有妙光明勝下天故文此師意云既説其身有異故當初靜慮天可非第二靜慮極光淨天爰知初靜慮梵衆天中有妙光明勝下欲界諸天光明故且與極光淨名爲言問以識蘊可爲七識住體耶答可爲七識住體付之識所樂住名七識住而以識望識之時不可有樂住之義何可以識蘊爲七識住體哉是以今論中云四識住當知四蘊任當知四蘊唯自地云以識蘊不爲四識住體見如何答今論中明七識住相云謂彼所繋五蘊四蘊如其所應是名識住文光法師釋此文云若欲色所繋五蘊爲體若無色所繋四蘊爲體如其所應有情數法識於其中樂住著故是名識住文寶法師釋此文云謂欲色界繋五蘊爲所住三無色中四蘊爲識所住此中説識於處總樂住故兼取識也非如四識住唯四蘊也文正理論二十二云謂彼所繋五蘊四蘊識於其中未住著故文顯宗論十二文全亦同之加之婆沙論百三十七中釋初識住相識住謂彼所繋色受想行識文解無色界識住相云識住者謂彼所繋受想行識文雜心論云方便思惟空入空正受故説空處入空處入成就者得成就彼地四蘊是名第五識住文任此等定判以識蘊爲七識住體云事甚分明也但於以識望識之時不可有樂住之義之難者於生處所攝異熟五蘊不別分析總生喜染之時縁五蘊義邊名七識住故識樂住識之義可有也故光法師釋雖有是説而於生處所攝五蘊中不別分析總生喜染之論文云於契經中雖有此説而於生處所攝五蘊中不別分析總生喜染縁識義邊名識食縁五蘊義邊名七識住文次於以識住蘊不爲四識住體之例難者立七識住由與識爲因爲果展轉相資識隨樂住之義前後念識相望之時有此義故以識立爲七識住體立四識住由與識倶行親近和合能爲助伴之義以識望識無此義故以識不爲四住體也故光法師解又法與識可倶時生爲識良田可立識住識蘊不爾故非識住論文釋四蘊與識可倶時生爲識良田可立識住無識與識倶時而生故識望識非是識住畢引婆沙論百七十七云謂若有法識所乘御與識倶行親近和合立四識住識望於識無如是事故不立在四識住中若法與識爲因爲果展轉相資立七識住識望於識有如是事是故立在七識住中文正理論二十二云若法與識互爲因果識樂隨轉立七識住若法與識可倶時生能爲助伴立四識住故所承師咸作是説由所化者稟性不同故説七四識住差別文顯宗論十二説其意同也問論中述第四靜慮不立識住云謂諸異生求入無想文爾者今此説可爲正義耶答可爲正義也兩方若爲正義者寶法師釋此文云准此論文豈可第四靜慮三天異生皆悉愛慕無想異熟處耶應非正義文如此釋者可不正義見若衣之爾者此義既叶道理何可爲不正義哉答第四靜慮心恒求出謂諸異生求入無想者不限今論説正理二十二顯宗十二兩論之文全亦同之加之婆沙論百三十七云第四靜慮樂遷動故識不安住謂諸異生或樂入無色或樂入無想文雜心論八云餘第四禪或求無色或求淨居或求無想故識不樂住文此等諸論之中同述第四靜慮異生求入無想之旨豈併爲不正義哉何況案道理第四靜慮外法異生豈無求入無想之義哉旁思此事以今此謂諸異生求入無想之説可爲正義也但於寶法師應非正義之釋者第四靜慮内法異生不可進樂無想異熟故就彼類且作一往釋歟問寶法師所引正理論二十二中述上代師資相承説云若處具有見修所斷及無漏識立識住名文此義意會以有頂天例欲界人天應名識住之難作二解釋爾者初釋意如何釋之耶進云正理論云欲界無定可就所依説有無漏然有頂天是定地攝應依自性説彼有無由自性無故非識住文付之於欲界中雖無無漏識有起無漏識之所依身故立識住者北洲有情無起無漏識不可立識住哉答北洲有情不起無漏識故於彼洲中雖無起無漏識之所依身同是人趣攝故以少從多立爲識住也問寶法師所引正理論二十二中述上代師資相承説云若處具有見修所斷及無漏識立識住名文此義意會以有頂天例欲界人天應名識住之難作二解釋爾者第二釋意如何釋之耶進云正理論云或非有頂補特伽羅一所依中具三種識欲界善處補特伽羅一所依中容具三識故不應以有頂爲例文付之一所依身中不具見修所斷及無漏三種識故於有頂天不立識住者於下三靜慮亦不可立識住異生不具無漏識聖者不具見所斷識故也如何答此師意若處具有見修所斷及無漏識立識住名之時下三靜慮互有見修所斷及無漏三種識故可立識住之義必然也今就欲界無無漏識難豈不欲界人及六天無無漏識應非識住若言能作無漏所依則有頂天應名識住之時答此難以欲界人天望有頂天明其差異有頂天有情一所依身中都無具見修所斷及無漏三種識之類故不立識住欲界人天有情一所依身中容有具此三種識之類故立爲識住也爲言重意云就其地中無無漏識之處具此三種識之時所依身有無沙汰所出來也下三靜慮自本其處有此三種識故不足爲疑也問寶法師意九有情居可經説耶進云寶法師釋云九有情居非經所説文付之七識住既是經説也九有情居何非經説哉是以見婆沙論百三十七文云九有情居者如契經説文若爾者九有情居非經所説之釋豈不違此文哉答披今論前後文上明七識住云契經中説有色有情身異想異如人一分天是第一識住述契經中説七識住畢云如是分別七識住已因茲復説九有情居因契經中説七識住論家加有頂無想二天有情爲九有情居見下解四識住云前所引經説七識住復有餘經説四識住亦顯四識住餘契經所説明知九有情居非契經説云事加之正理論二十二中明七識住云此七生處是識住體若廣分別應隨契經述九有情居云如是解釋七識住已因茲復辨九有情居解四識住云因七識住已辨有情居餘契經中復説四識住文顯宗論十二文全亦同之此等論判其意大同今論所説故寶法師九有情居非經所説因釋經中説七識住故便釋也之釋非無依憑歟但於婆沙論九有情居者如契經説之文者寶法師定判向今論文所釋也非謂契經中總不説九有情居全無相違也或人會婆沙論九有情居者如契經説之文云契經中雖不別説九有情居七識住既契經説故因七識住所釋出九有情居亦云契經説歟私難此義云勘婆沙論百三十九説云謂契經説四識住七識住九有情居文如此文者契經中七識住外別説九有情居見文永五年戊辰中冬一日申時於東大寺知足院草菴勘大乘義章第八云九衆生居如經中説文存寶法師定判之日會此解釋准前趣可思之問論中述立四識住云識所依著名識住故文爾者以與識同時受想二蘊爲所著義可有耶答不可有此義也兩方若有此義者與識同時受想二蘊是極相隣近法也何可有爲所著義哉若依之爾者光法師釋立四識住云此自地自身有漏四蘊是識所依是識所著文如此釋者以與識同時受想二蘊爲所著義可有見如何答披今論餘處二十六文云俗智除自品總縁一切法心品現起之時不縁同時相應法故以與識同時受想二蘊爲所著義全不可有也但於光法師釋者由所依所著之義總以色等四蘊立四識住之時所依之義廣亙同時色等四蘊所著之義狹限同時色行二蘊故引合之云此自地自身有漏四蘊是識所依是識所著也非謂以與識同時受想二蘊爲所著境也問立四識住必由同時相望歟答必由同時相望也兩方若必由同時相望者光法師釋由所依所著義立四識住云所著謂識所著境通倶不倶引識起故文此釋無爭立四識住不必由同時相望見若依之爾者勘泰法師釋云四識住據同時相依住文如何答與識同時色等四蘊與識親近和合由藉能爲助伴立四識住故必由同時相望云事道理必然也若通由前後相望者何不以識立識住哉故今論云又法與識可倶時生爲識良田可立識住識蘊不爾故非識住文光法師解此文釋四蘊與識可倶時生爲識良田可立識住無識與識倶時而生故識望識非是識住了引婆沙論百三十七謂若有法識所乘御與識倶行親近和合立四識住識望於識無如是事故不立在四識住中之文成立四識住必由同時相望之旨寶法師釋此文云明四種法必倶時也識與識無倶時理故非識住文泰法師釋此文云以此文證四識住據同時相依住七識住據前後相縁住也文加之見正理論三十二一段之文或云現在色等附近於識與識倶生名識隨住定無有識倶生故不應言識隨識住文或云我所稟宗作如是説若法與識可倶時生識所乘御如人船理此法可説識住非餘文或云若法與識可倶時生能爲助伴立四識住文顯宗論説大亦同之任此等定判立四識住必由同時相望之旨甚分明也但於光法師所著謂識所著境通倶不倶之釋者立四識住專雖由與識倶行親近和合之義識所著境與識爲助伴令引識起通三世故爲顯此義云通倶不倶也非謂立四識住通由異時相望歟重難云立四識住必由同時相望云事猶難思勘正理論二十七文云今謂世尊所説識住唯色等四不言識者由但色等於三時中與續有識爲助伴故謂唯色等與識倶生過未亦能爲識助伴令續有識生死馳流識則不爾故非識住且眼等根及倶色等與倶生識爲所依依已滅未生但爲識境是故色蘊於三時中望續有識能爲助伴現在受等與識倶生爲倶有因一分與識同縁一境有助伴用已滅未生但爲識境是故受等亦於三時望續有識能爲助伴文顯宗論十二説全亦同之此文意過未色等四蘊與現在識爲所縁境故望現在識名四識住見如何答此文意述立四識住之門色等四蘊名爲識住識蘊不名識住之由現在色蘊與倶生識爲所依依有助伴用現在受等三蘊與倶生識爲倶有因助伴用過未色等四蘊與現在識爲所縁境有助伴用故色等四蘊於過去現在未來三時中望續有識能爲助伴過未識蘊爲現在識境故望續有識雖少有助伴用二識不倶起故於現在中全無助伴用故色等四蘊立爲識住識蘊不立爲識住也爲言故正理論二十二次下文云識雖過未望續有識少有助伴而倶生中全無助力不倶起故色等望識具二助能識唯去來故非識住文顯宗論十二説全亦同之此等文意非謂過未色等四蘊望現在識名四識住何爲立四識住不必由同時相望云難哉重難云若爾由何故過未色等四蘊名四識住哉答過未色等四蘊與現在色等四蘊由種類同故亦名四識住也故正理論二十二云自身色等雖在未來與識疎遠而於現在與續有識極相親近由種類同亦名識住如現在世異心無心兩位自身色行二蘊文顯宗論十二説全以同之問入無相滅盡二定位色行二蘊可爲識住體歟答可爲識住體也兩方若爲識住體者二無心定位識無現起彼位色行二蘊何可爲識住體哉若依之爾者見光法師解釋云或無心時現在二蘊亦名識住文如何答入無想滅盡二定位被障彼二定力雖識不現起若二定不現起者識起可住故彼位色行二蘊同識住相故可爲識住體故光法師釋云設起異地心或無心時現在二蘊亦名識住同識住相故謂同分識餘縁闕故不生非此不能生也文此釋亦非無其依憑正理論二十二云謂如現起不同分心及無心位色行二蘊雖非現在同分識依而不失於二識住相住彼相故設於爾時起同分識定能爲住餘縁礙故識暫不生非彼爾時無識住相文婆沙論百三十七云問生欲界起色無色無漏心現在前現在二蘊是識住不答應言是識住問無同分識於中心住云何名識住答得識住相故謂同分識餘縁故不生非此不能生故亦名識住如泉池側置象馬魚師子等口以爲注道水不行時非此爲障水若行者爲作所依雖水不行亦名注道彼亦如是文問今論意由所依所著義立四識住爾者正理論意許此意歟進云正理論中不許此義見付之今論中由所依所著義立四識住既存深理趣正理論意何不許此義哉何況正理論意由所依依義立識住見與所依所著義有何差異哉答今論意由所依義立四識住者識與色等四蘊親由藉義也即以色等四蘊爲識所依之義故正理論師破之受等三蘊心識可爲所依識以受等三蘊不可爲所依云也故正理論二十二云非於倶起受等蘊中有識所依彼依識故住若所依識不依彼如何可説彼爲識住文寶法師釋此文云若以所依義釋識住者識不依彼受等法故如何受等是識住耶文由所著義立四識住者爲識所縁之義也即爲識所縁境令引識起之義故正理論師破之與識倶生受等三蘊非識所縁由所著義不可立四識住云也故正理論二十二云又非所縁同一境故倶生受等非所取故文寶法師釋此文云二所縁義以受等法復非所縁如此中破文正理論中破今論説之趣頗雖委細大概如此但正理論意由所依之義立識住者就初識住云爾也所謂隨色住者色蘊之中眼等五根爲所依色等五境但爲依故合之云所依依也故正理論二十二云且眼等根及倶色等與倶生識爲所依依文與今論所依義其意遥別也問論文云餘契經言於識食中有喜有染有喜染故識住其中識所乘御文爾者唯縁識蘊生喜染義可有耶進云論文云不別分析總生喜染無此義見付之意識廣縁總別諸境可有唯縁識蘊別生喜染之義何釋不別分析總生喜染哉答契經中説於識食中有喜染故識住識食中又説七識住五蘊爲體之意於生處所攝異熟五蘊中不別分析總生喜染之時縁識義邊名爲識食縁五蘊義邊名七識住也爲言故光法師釋雖有是説而於生處所攝蘊中不別分析總生喜染之論文於契經中雖有是説而於生處所攝五蘊中不別分析總生喜染縁識義邊名識食縁五蘊義邊名七識住文但於意識廣縁總別諸境可有唯縁識蘊別生喜染之義之難者且就契經中説識住識食中并説七識住五蘊爲體之廢立云不別分析總生喜染也總而云之意識廣縁總別諸境故唯縁過未識蘊別生喜染之義邊更非所遮故疑難之趣亦無相違也重難云論中非只述總生喜染即亦簡非獨説識光法師釋此文云非獨説識別生喜染名爲所住文任此定判不可有唯縁識蘊別生喜染之義見如何答此文就契經説相如此釋也理實云之意識唯縁過未識蘊別生喜染之類可有也又尋云意識唯縁過未識蘊別生喜染之類七識住中可攝之耶答契經中明七識住雖説意識總縁生處所攝異熟五蘊樂住之旨盡理談之意識唯縁過未識蘊別生喜染之類七識住中可攝之也問七識住中可攝中有耶答不攝中有也兩方若攝中有者中有無有樂住之義七識住中不可攝之若依之爾者今論中以七識住望四識住作四句時出四識住非七識住之句云謂諸惡處第四靜慮及有頂中除識餘蘊無擧中有若七識住中不攝中有者今此句中何不擧中有哉答今論中明七識住相云復説若處餘處有情心樂來止若至於此不更求出説名識住文正理二十二顯宗十二兩論之説全同今論文加之婆沙論百三十七云有説若處識所樂住立爲識住文雜心論八云若識於彼樂住故説識住文中有是生方便故諸有情無心樂住又至中有速樂生有心恒求出故七識住中不攝中有也是以光法師所引婆沙論百三十七中以七識住望九有情居明相攝云九攝七九有情居攝七識住判而見光法師所引正理論二十二文既言生已名有情居知有情居不攝中有又諸中有非久所居故諸有情不樂安住又必應爾由本論説爲顯生處立有情居九有情居不攝中有定若七識住中攝中有者豈無七識住非九有情居之類哉但於今論中出四識住非七識住之句無擧中有之難者今論等中於七識住四識住不論中有攝不攝故且就現文所擧七識住四識住體作四句故四識住非七識住之句中不擧中有也是則非盡理之談歟重難云光法師引婆沙論百二十四生自性唯限異熟亦通長養之二説了云婆沙二説前説爲正以四生五趣相攝中云四生攝五趣非五趣攝四生不攝者何所謂中有若不爾者應更説言不攝長養若言五趣亦通長養無斯過者此救不然婆沙正義五趣體性唯是異熟文若如此相攝之文者非盡理之談者何以今此四生五趣相攝之文爲證據四生自性唯限異熟不通長養之説判爲正哉答明五趣體述有情非中有之旨者諸論一同之説實盡理之談故以今論所引施設足論四生攝五趣非五趣攝四生不攝者何所謂中有云文爲證據四生自性唯限異熟不通長養之説判爲正也今論等中釋七識住四識住相不論中有攝不攝故以七識住望四識住作四句之文非盡理之談云也問四識住中可攝中有耶答可攝中有也兩方若攝中有者見光法師所引正理論二十二文云既言生已名有情居故知有情居不攝中有九有情居不攝中有定而婆沙論百三十七中以四識住望九有情居作四句時出四識住非九有情居之句云謂地獄傍生鬼界無想天所不攝廣果色受想行無擧中有四蘊光法師釋其意同之若四識住中攝中有者今此句中何不擧中有哉若依之爾者今論中述四識住當知四蘊唯自他無簡中有以知可攝之云事如何答今論中明四識住相云謂隨次第有漏四蘊又此唯在自地非餘識所依著名識住故由識所依所著之義立四識住而以中有四蘊望識蘊之時既有所依所著之義故四識住中尤可攝中有四蘊也故光法師所引正理論二十二中云又自地中唯有情數唯自相續立爲識住非非情數他相續中識隨樂住如自相續釋四識住體委悉簡法之中不出中有四蘊也但於婆沙論中出四識住非九有情居之句無擧中有四蘊之難者婆沙論中於四識住七識住九有情居不論中有攝不攝故且就現文所擧四識住九有情居體作四句故四識住非九有情居之句中不擧中有四蘊也是則非盡理之談歟重難云婆沙論中實於四識住七識住九有情居不論中有攝不攝故今會通之趣且可許之光法師引正理論説述九有情居不攝中有之旨了四識住非九有情居之句中何不擧中有四蘊哉答光法師且任婆沙論文以九有情居望四識住作四句故四識住非九有情居之句中不擧中有四蘊也尋云見圓暉法師釋以七識住望四識住作四句時出四識住非七識住之句云謂三惡趣第四靜慮及有頂天中有受等四蘊以四蘊故是四識住惡趣等故非七識住文如此釋者四識住非七識住之句中擧中有四蘊見如何答及有頂天中有受等四蘊者移今論及有頂中除識餘蘊之文故可訓及有頂天中有受等四蘊也中有不可得意論文無擧中有移之圓暉釋不可擧中有故也問胎卵等四生人倶可入聖耶進云光法師所引正理論二十二云此四生人皆可得聖文付之卵濕生類性多愚癡也何可入聖哉是以見婆沙論百八十六説正性定聚二生少分謂胎生化生文若四生人倶入聖者正定聚寧不通卵濕二生哉答光法師所引正理論二十二云此四生人皆可得聖得聖無受卵濕二生以聖皆欣殊勝智見卵濕生類性多愚癡文顯宗論十二説全亦同之婆沙論百二十云四生有情皆受生已容得聖法得聖法已必更不受卵濕二生文任此等論判四生之人倶可入聖云事甚分明也但於卵濕生類性多愚癡也之難者卵濕二生專是傍生類所受生故性多愚癡者從彼而説也人趣之中希受卵濕二生是非分事其性聰慧非愚癡故可入聖也故寶法師引正理論此四生人皆可得聖等之文了云今詳人卵濕生不多愚癡作金輪王及能得聖此從多分文次於婆沙論正性定聚二生少分謂胎生化生之文者入聖之後不受卵濕二生故云爾也更非相違問寶法師意卵生人可作輪王耶進云寶法師釋云作金輪王文付之見今論等文不云卵生人作輪王寶法師得何證據釋卵生人作金輪王哉何況今論餘處九中明入胎等知不知相述及卵恒無知卵生之者入胎等三位皆恒無正知定而准前三種入胎謂輪王二佛之理輪王是入位正知人也若許卵生人作金輪王者何判及卵恒無知哉答寶法師引正理論二十二此四生人皆可得聖得聖無受卵濕二生以聖皆欣殊勝智見卵濕生類性多愚癡之文了云今詳人卵濕生不多愚癡作金輪王及能得聖此從多分文卵生人作金輪王云事此釋甚分明也凡案道理卵濕二生專是傍生類所受生故雖性多愚癡人趣之中希受卵濕二生是非分事其性聰慧非愚癡故諸論之中許入聖義至作輪王何可疑之哉何況曼馱多王雖爲濕生作金輪王卵生人作金輪王准彼可知之但於今論餘處及卵恒無知之文者就性多愚癡傍生類所受卵生云爾也非遮人趣所受卵生之中有入胎正知之類歟問光法師意鬼趣不受卵濕二生故如何釋之耶進云光法師釋之云卵濕生類性多愚癡鬼多黠慧故非卵濕文付之世羅鄔波世羅雖卵生證阿羅漢果曼馱多王雖濕生爲金輪王此等之類其性非愚癡何釋卵濕生類性多愚癡哉答卵濕二生等是傍生類所受生故性多愚癡也鬼多黠惠非愚癡故不受卵濕二生釋尤有其謂恐非指疑歟但於世羅鄔波世羅雖卵生證阿羅漢果曼馱多王雖濕生爲金輪王云難者人趣之中希受卵濕二生是非分事故還聰慧非愚癡也何等傍生類性多愚癡爲疑難哉問正理論意一具四大種所造色必可爲倶有因耶答不必爲倶有因也兩方若必爲倶有因者披光法師所引正理論二十二文云毘婆沙師説化生者造色多故死無遺形大種多者死非頓滅即由此義可以證知一四大種生多造色文若許一具四大種生多有對造色者彼有對造色不可爲倶有因哉若依之爾者光法師餘處二十二所引正理論中述七支相望展轉力生同一果故唯從一具四大種生散此相違故依異大散無表七支相望不爲倶有因故非一具四大種所造見爰知一具四大種所造色必可爲倶有因云事如何答正理論意一具四大種所造色不必爲倶有因也光法師餘處別解脱戒初後念無表一具四大種所造云釋意由時別故雖不爲倶有因其性無礙不殺生戒等同一種類無表故一具四大種所造也故光法師餘處十三釋之云以無礙故可言造多由時別故非互果故非倶有因文正理論意何不存此義哉何況見正理論餘處三十五文云唯欲界繋初刹那後所有無表從過大生謂欲界所繋初念無表與能生大種倶時而生此大種生已能爲一切未來自相續無表生因此與初刹那無表倶滅已第二念等無表生時一切皆是前過去大所造此過大種爲後後念無表所依能引發故專順別解脱戒初後念無表一具四大種所造云釋故寶法師餘處十三引此文了云准此即是此前能生初念無表大種能爲一切未來自相續無表色生因無表生因即是造義文故正理論意一具四大種所造無表色中有不爲倶有因之類云事炳然也但於光法師餘處所引正理論七支相望展轉力生同一果故等之文者定生無表雖七支各別同一果法爲倶有因故一具四大種所造也散無表非只七支各別不爲倶有因故非一具四大種所造爲言全不遮不殺生戒等同一種類無表雖不爲倶有因一具四大種所造歟抑於光法師所引正理論一四大種生多造色之文者且述婆沙論不正義意也以實云之正理論意不存此義歟重難云光法師引正理論此文云正理論雖作此説非婆沙正義故婆沙一百二十七云引合婆沙一段之文畢云婆沙評家既取前師一四大種但造一色故知造色多者死無遺形是不正義文寶法師引正理婆沙兩論之文了云今詳正理不以婆沙評家爲正若作倶舍師破汝難此釋違婆沙正義也文任此等解釋正理論意存一具四大種造多有對色之義見如何答一具四大種造多有對色者所造有對色何不爲倶有因哉若許爲倶有因者便可違對法宗義故雖正理論意實不可許此義也但於光寶兩師之釋者且就正理論現文云爾歟已上相承義也問光法師所引正理論中判四生多少擧二師異説爾者初師意如何釋之耶進云光法師所引正理論云有説濕生現見多故文付之五趣之中三趣少分及二趣全一切中有皆是化生也於四生内論其多少之時尤可云化生多也是以披今論文云於四生内何者最多唯化生文婆娑論百二十中述評家義云如是説者化生最廣文此等之説既叶道理濕生最多之師義豈不背文理哉答見光法師所引正理論二十二初師説云有説濕生現見多故設有肉等聚廣無邊下越三輪上過五淨容遍其量頓變爲蟲是故濕生多餘三種文此師意就四生本有論其多少之時以肉聚無邊頓變爲蟲之義且云濕生多也若合中有云之者此師意可云化生多本有濕生之者中有化生故也若爾與今論説并婆娑論評家義遂無相違歟故寶法師會正理論二説云今評若通中有即化生多若説本有即濕生多兩説無違文問大衆部意可許中有耶答本宗末計其義相替歟兩方若許中有者光法師釋有餘部説從死至生處容間絶故無中有之論文云准宗輪論大衆部等説無中有文寶法師圓暉法師解此文同大衆部等計之旨明知大衆部意不許中有云事若依之爾者光法師釋有説趣體亦通善染之論文云大衆部等説文而論中難此義云若爾中有亦應是趣有説意通此難云不爾趣義不相應故趣謂所往不可説中有是所往即於死處而受生故文准此難答思之大衆部意可許中有見如何答於大衆部中本末宗義其意相替歟若就本宗同義云之者不可許中有故宗輪論中明大衆部一説部説出世部鷄胤部本宗同義云都無中有文慈恩大師釋此文云設遠時處死此生彼既無中間隔前滅後即生故今不説別有中有文故光寶圓暉等諸師當卷之内處處之中數述大衆部等説無中有之旨最叶宗輪論説也若就末宗異義論之者可有許中有之義故宗輪論中擧此四部末宗異義了云諸如是等末宗所執展轉差別有無量門文末宗中有無量異義見其異義中豈無許中有之類哉故淄洲大師破要集大衆等四部都無中有釋云其大衆等論文不説定無中有而云菩薩入胎作白象形准此即似立於中有故要集説無其准定文准此解釋推今論説云趣謂所往不可説言中有是所往即於死處而受生故依末宗義致此會通歟若爾當卷上下之文述大衆部本末宗義故非相違也問上座部意可許中有耶答本宗末計其義相替也兩方若許中有者泰法師釋有餘部説從死至生處容間絶故無中有之論文云有餘上座部師等説從死至生處容間絶故無中有文此釋無諍上座部意不許中有見若依之爾者宗輪論中述本上座部本宗同義擧謂諸菩薩猶是異生等八義畢云餘所執多同説一切有部文而有部意既談中有同彼上座部豈不許中有哉答慈恩大師釋唯識論七有義生時亦有轉識彼中有必起潤生煩惱故之文云上座部勘有無中有無云何得説言中有必起潤生煩惱耶本計無云中有末計有云故文而遍覺三藏普遇諸部之學者研其宗義慈恩大師親入三藏之門室禀其相傳解釋之所定誰不爲指南哉定知泰法師述上座部意不許中有之旨就彼部本計云爾也但於宗輪論餘所執多同説一切有部之文者聊簡彼論一段之文上明説一切有部本宗同義云唯欲色界定有中有了下判末宗異義其類無邊其末宗異義無邊之中定可有不許中有之義而次下文擧雪山部本宗同義八義之外同説一切有部本末宗義故中末宗不許中有之義哉故宗輪論文全無相違也此事爲法相宗論義可見彼抄也尋云有部之中有不許中有之義云事有正所見哉答問論主意可存像色實有義耶進云今論云像實有不成不存像色實有之義也付之像色是眼根所見眼識所縁也何非實有哉若非實有者五識豈縁非現量法哉若亦像色非實有故還見本質色者本質色非眼根所對眼識所縁如何可還見之哉答見今論文本頌結像實有不成長行以鏡像同處二像同處影光同處近遠別見之四故破像色實有之義也所謂云於一處鏡色及像竝見現前二色不應同處竝有依異大故者第一約鏡像同處破之又陜水上兩岸色形同處一時倶現二像居兩岸者互見分明曾無一處竝見二色不應謂此二色倶生者第二約二像同處破之又影與光未嘗同處然曾見鏡懸置影中光像顯然現於鏡面不應於此謂二竝生者第三約影光同處破之或言一處無二竝者鏡面月像謂之爲二近遠別見如觀井水若有竝生如何別見者第四約近遠別見破之也以此四故破實有像色體依鏡等縁從本質生云義了結成故知諸像於理實無論主意不存像色實有之義云事甚分明也故光法師釋云於此頌中既破像實明知論主以經部義破雖復意破異部無中有亦兼顯説一切有部像色非實文泰法師釋云今論主依大乘及經部破二色不應同處竝有依異大因故果色不并有但有鏡色無像色也文但於像色是眼根所見眼識所縁也云難者眼根正所見眼識正所縁是本質色非像色故不可違眼識縁現量境之理故今論中述經部義云然諸因縁和合勢力令如是見以諸法性功能差別難可思議此文意云本質鏡等因縁和合之勢力故雖謂有像色現令如是見像色是非有似有現故非實見之實見之時還見本質以諸法性功能差別難思議故雖向像色還見本量也爲言問有宗意可存像色實有義耶進云顯宗論像既可見故知實有文付之由本質鏡等同縁和合勢力於鏡面等非有似有像色現也何云實有色哉若云像色實有者論主所付鏡像同處二像同處影光同處近遠別見之四難如何可會之哉何況見正理論餘處三十四文述故像定應唯顯爲體像色唯顯色攝非形色攝定若像色實有者寧非形色攝哉加之勘寶法師餘處一末解釋云像色非二十種攝文既非二十種色攝知假立色云事如何答像色是眼根所見眼識所縁現量境界故有宗意存實有色也故顯宗論十三中問復如何知像體實有答之云由像不越實有相故謂若不越眼等識境皆是實有後當成立像既可見故知實有又像有時而可得故此若無者應一切時定不可得或時常可得若謂有時可不可得由所得縁合不合者是則應如餘有爲法於縁合位實有義成又像能遮餘色生故謂像能礙餘像色生於自所居障餘生故又無分別識所縁故謂五識身所縁境界實有極成然像既通眼識所得故知實有若法隨具如前相者當知彼法實有極成此像既然故知實有文婆沙論中問水鏡等中所有影像爲是實有非實有耶答之云阿毘達磨諸論師言此是實有是眼所見眼識所縁色處攝故如是縁水鏡等及人面等有影像生非不實有所生影像能爲所縁生覺念故文任此等文理有宗意存像色實有之義云事甚分明也但於論主所付之四難者顯宗論十三中一一會之先會鏡像同處之難云此非定因同處壁光倶可取故雖壁光色異大爲依而於一時同處可取不可亦撥在壁光無由此例知鏡像倶有故彼所説非遣像因文此文意云雖壁與光色異大種爲依於一時中同處可取倶實有也雖鏡與像色同處倶有不可云像色是非實有爲言又云又鏡像色倶有對故必不同處如何乃説一處鏡像竝見現前若言處異不可得者如壁光色處雖不同而可同取謂彼像色極清妙故不能掩蔽所餘諸色由鏡與像最極相隣起増上慢謂同處取如雲母等與所隔色若極相隣便謂同處又如光壁雖處有殊以極相隣謂爲同處文此文意云鏡與像色倶有對法故必非同處而像色極清妙不能掩蔽所餘諸色故鏡與像色極相隣近使謂同處實非同處爲言次會二像同處之難云此亦非是證像無因縁和合差別如是見故謂一水上非一像生清妙處隣不相掩蔽見縁合者則能見之若闕見縁則不能見若都無像所見是何應同餘處都無見理如於一處籌畫爲文向光背光有見不見豈不同見則無有體文此文意云水上像色極清妙故雖處隣近不相掩蔽見縁合者同時能見之不見縁合則不能見之極隣近故謂爲同處實非同處爲言次會影光同處之難云此亦非理非所許故謂懸二鏡置影光中所現二像非實光影如色彼觸不可得故若爾明了所見是何謂隨壁等光影二質於二鏡面有不相違光影像起非光影色如有情像體非有情故光影像體非光影雖同處現而不相違文此文意云鏡中所現光影二像非實光影故雖同處現而不相違爲言次會近遠別見之難云亦非證因二像生故所以者何空界月像同依鏡等而發生故謂空界色與彼月輪次第安布近遠差別是見依像處差別因空界與月輪於鏡等上各能生像由所生像與質相同故見與依處似差別文此文意云空界色與月輪同於鏡色現影像時彼所現影像與本質相同故本質遠者影像遠見本質近者影像近見也爲言彼論頌中云由謂如是得遮上二難云非光二像生遮下二難也正理論等述其意雖同之彼論文廣顯宗論説約故抄之略彼也次於正理論餘處故像定應唯顯爲體之文者眼根所見故可顯色攝觸不能了非形色攝也次於寶法師餘處像色非二十種攝之釋者二十種色者就本質色論之故云爾也設雖非二十種色攝何定非實有色哉如彼空一顯色非二十種色攝是實有色也重難云勘寶法師餘處釋云或即彼本色攝青等像即入青等攝不可將其本色難於像色障光生等釋影色故形顯分者差別説像色即是顯收若從本質亦通形攝此明像故不可以本形爲難文如此釋者像色可通形色攝見豈不違正理論説哉答若以影像色從本質色者可二十種色攝即可云顯色顯像顯色攝形色影像形色攝也寶法師若從本質亦通形攝之釋述此意也若本質色與影像色別説之時亦影像色是顯色攝非形色攝故不可違正理論説故寶法師餘處釋云正理有文言顯色者像本別説文問初靜慮上中下三品善業通感三品異熟果歟答通感三品異熟果也兩方若通感三品異熟果者上三靜慮上中下三品善業如次感三品異熟果無有通感之義初靜慮上中下三品善業准例可同何況披光法師解釋云或造上品因生大梵處或造中品因生梵輔處或造下品因生梵衆處文寶法師所引正理論二十一中云即梵輔天上品繋業招大梵果文任此等定判初靜慮上中下三品善業如次感三品異熟果不許通感之義見若依之爾者勘婆沙論説述初靜慮上中下三品善業通感三品異熟果之旨如何答初靜慮善業感無別異異熟果故上中下三品善業通感三品異熟果也故婆沙論二十云復次有三品善引初靜慮無別異衆同分業隨由一品生初靜慮既生彼已隨其所應受彼三品無別異善法異熟果文今論餘處二十八中明中間靜慮云此定能招大梵處果多修習者爲大梵故文光法師釋此文云若多修習爲大梵王不多修習便爲梵輔同一處故文泰法師釋此文云此定能招大梵王果多修習者爲大梵王若不多修便爲梵輔文此等釋意初靜慮上品善業感梵輔天異熟果見故初靜慮三品善業通感三品異熟果云事必然也但於上三靜慮上中下三品善業如次感三品異熟果無有通感之義云例難者上三靜慮善業感有別異異熟果故上中下三品善業如次感三品異熟果全無通感之義也故婆沙論二十中問答此事云問何故初靜慮三品善業受無別異異熟果上三靜慮三品善業受有別異異熟果耶答初靜慮中有衆有主雜亂而住上三靜慮無此事故有餘師説初靜慮中有尋有伺有諸識身及起自他身語表業上三靜慮無此事故文此文意顯也次於光法師解釋者以初靜慮上中下三品善業一相配釋三品異熟果也理實論之上中下三品善業通感三品異熟果可云也寶法師所引正理論文准之可會歟重尋云初靜慮上中下三品善業通感三品異熟果者通引滿二果歟答可通引滿二果也故見婆沙論二十文云有三品善引初靜慮無別異衆同分業隨由一品生初靜慮者初靜慮上中下三品引業中由隨一引業生初靜慮三天中何天受彼引果爲言故引業感無別異異熟果之旨分明也下云既生彼已隨其所應受彼三品無別異善法異熟果者由上中下三品中隨一引業生初靜慮三天中何天已竝受三品何果云也故初靜慮上中下三品善業通感三品異熟果者通引滿二果論之也問今論所引嗢柁南伽他中云總集衆聖賢四靜慮各十文爾者光法師意今此十賢聖中可擧現般聖者耶進云光法師意擧現般聖者也付之現般聖者之依身在欲界不可云四靜慮攝又得八禪定由何可分地地不同哉是以寶法師意今此十賢聖中不擧現般聖者如何答光法師意於四靜慮十賢聖中擧現般聖者實雖難思且推其意云已離欲染未離初靜慮染證不還果之人生初靜慮中有等位容般涅槃之者在欲界未生初靜慮之時隨其所應可云初靜慮攝中般生般無行般有行般上流般聖者也准而思之現身容般涅槃之者已離欲染未離初靜慮染位可云初靜慮攝現般聖者也乃至第四靜慮亦以如此已離第三靜慮染未離第四靜慮證不還果之人生第四靜慮中有等位容般涅槃之者在欲界未至第四靜慮之時隨其所應可云第四靜慮攝中般生般無行般有行般上流般聖者也准而思之現身容般涅槃之者已離第三靜慮染未離第四靜慮染位可云第四靜慮攝現般聖者也故現般聖者雖依身在欲界又得八禪定隨證不還果之時離染不同可云初靜慮攝乃至第四靜慮攝也光法師釋其趣在之泰法師圓暉法師釋其旨同歟但於寶法師釋者彼云生上界者聖有八人謂七善士趣及阿羅漢就其依身論四靜慮攝之義故不擧現般聖者也是則光寶兩師定判其意各別也問今論所引嗢柁南伽陀中云總集衆聖賢四靜慮各十文爾者光法師意今此十賢聖中可擧阿羅漢果聖者耶進云光法師意不擧阿羅漢果聖者也付之阿羅漢者是聖者極果也十賢聖中何不擧之哉是以寶法師意今此十賢聖中擧阿羅漢果聖者如何答光法師意於四靜慮各有十賢聖者賢聖之中得彼地定未離彼地染人云彼地攝賢聖也而阿羅漢果聖者之中無未離彼地染之義故不取之也泰法師圓暉法師釋今此十賢聖中不擧阿羅漢果聖者其意同之歟但於寶法師釋者彼云生上界者聖有八人謂七善士趣及阿羅漢就其依身論之故生初靜慮證阿羅漢果云初靜慮攝乃至生第四靜慮證阿羅漢果云第四靜慮攝也是則光寶兩師定判其意各別歟問光法師依宗輪論意經部出世時代如何釋之耶進云光法師釋云異部宗輪論意云佛滅後至第四百年初從説一切有部中復流出一部名經量部亦名説轉部文付之婆沙論二中釋發智論有作是説若五根爲等無間入正性離生是謂世第一法之文云或説此是經部所説謂經部師亦爲遮遣分別論者如前所執故作是言世第一法五根爲性非唯爾所文而見光法師餘處一解釋云至三百年末迦多衍尼子造發智論二萬五千頌文若爾三百年中所造發智論已載經部師説明知經部宗出世非第四百年初云事如何答定諸部出世之時代專可任宗輪論説而披宗輪論文云佛薄伽梵般涅槃後至第四百年初從説一切有部復出一部名經量部亦名説轉部文光法師所引之文既無背本説誰可疑之哉何況寶法師釋云佛涅槃後一百年爲初四百年爲後本末分成二十部廣如宗輪論説文述四百年爲後寧非指經部宗出世哉但於婆沙論或説此是經部所説等之文者如來般涅槃後至第三百年末迦多衍尼子造發智論之時經部宗雖未出世至第四百年初經部宗出世爲遮遣分別論者信等五根唯是無漏一切異生悉不成就之執故説世第一法信等五根爲性之旨相當發智論有作是説之義故四百年中五百阿羅漢造婆沙論之日指發智論今説云經部所説也三百年末迦多衍尼子造發智論之時非經部宗已出世歟又愚案云三百年末經部宗義漸出世歟故見嘉祥大師處處之釋或云佛二月十五日涅槃四月十五日結集三藏界内有千人名上座部界外萬餘人名大衆部爾時但有二部名字以執義未異故至一百十六年分爲二部乃至三百年有二十部文或云三百年中從薩婆多部又出一部名説經部謂五陰從此世度至後世得治道乃滅亦名説經部謂唯經藏爲正餘二皆成經耳文任此等解釋三百年末所造發智論中載經部師説全非相違歟但於宗輪論至第四百年初從説一切有部復出一部名經量部之文者就經部宗義具調云爾歟又愚案云至四百年中迦多衍尼子造發智論歟故見嘉祥大師處處之釋或云佛滅後三百五十年迦旃延解佛毘曇作八犍度文或云三者佛滅度後三百餘年有三明六通大阿羅漢姓迦旃延造八犍度凡二十卷傳來此土文准此定判發智論中載四百年初出世經部師説更無所背歟但於光法師餘處至三百年末迦多衍尼子造發智論之釋者三百年末迦多衍尼子造始發智論故云爾歟雖有此等愚推之旨初答之趣是相承義也可存之寫本云文永六年己巳正月九日午時於東大寺知足院草菴抄之畢去春三月五日始此卷抄今年青陽初月終其微功問端雖爲六十三條光陰徒移三百箇日懈怠之至悲而有餘但去年中春暮春之候被召後鳥羽後白川兩院聖忌御八講同五月上旬下旬之比參勤仙洞禁闕兩最勝講證義之間此勤暫雖中絶其志今已遂之以仰春日權現之冥助以憑彌勒慈尊之引攝殊別宗專法師離苦得脱祈願不空遷生處於鵝王九品之蓮宿縁無朽契再會於龍花三會之月乃至法界衆生平等利益而已右筆華嚴宗末葉法印權大僧都宗性年齡六十八夏臈五十六弘治二年丙辰五月五日爲來三十講當處條八幡宮十日毎月講用意寫置之一交畢興定處命五十九
