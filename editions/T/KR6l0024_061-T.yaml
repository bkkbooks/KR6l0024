body:
  text: 倶舍論第二十卷抄問過去現在法中可有非已起類耶答不可有此類也兩方若有此類者既是過去現在法也何可有非已起之類哉若依之爾者頌文云過現若已起文若言無諍可有非已起之類見如何答過去現在法中不可有非已起之類云事道理實必然也更不可疑之故品類足論云已生法云何謂過去現在法文但於過現若已起之頌文者云若於此事中未斷貪嗔慢過現若已起過去現在貪嗔慢中若縁此事起即繋此事若縁餘事起即不繋此事故就縁此事起置若言也彼如發智論四中答若於此事有未來愛結繋亦有過去耶云問云若前生未斷則繋若前未生設生已斷則不繋也非謂縁彼此事總有不已起之類故全非論義歟問現在共相或中可有具世遍事遍義耶答可有此義也兩方若有此義者設雖共相惑一刹那間難遍縁五部一切法何可具事遍之義哉是以見今論餘卷十九文云不説頓縁自界地一切然説有力能頓縁五部文如此文者不可有此義見若依之爾者光法師解釋中云現縁共惑雖亦有具二種遍行有不具者以不定故不言遍行文此釋無諍可有具世遍事遍之義見如何答問過去意識相應貪嗔慢可名世遍事遍遍行耶進云論疏中不名世遍事遍遍行見付之過去意識相應貪嗔慢種類無邊也何不名世遍事遍遍行哉是以未來可生意識相應貪嗔慢名世遍事遍遍行若未來可生意識相應貪嗔慢有世遍事遍之義者過去意識相應貪嗔慢寧不具世遍事遍之義哉加之過去見疑無明名世遍事遍遍行例亦可同何況見寶法師解釋述未來意識相應貪嗔慢具世遍事遍之義畢云過現不定文如解釋者過去意識相應貪嗔慢可有具世遍事遍之類見如何答世遍事遍遍行因者遍繋三世名之世遍遍繋自境名之事遍也而過去意識相應貪嗔慢雖有世遍之義不具事遍之義故不名世遍事遍遍行也故光法師釋云過去意識貪嗔慢三雖亦遍繋三世非遍繋自境故於此中不説遍行與五合説文但於過去意識相應貪嗔慢種類無邊故可具事遍之義云難者歴一一有情悉有遍繋自境之義名爲事遍也而過去意識相應貪嗔慢望一類有情之時雖有遍繋自境之義非一一有情悉有遍繋自境之義故以其義不定故不具事遍之義云也故今論云若此事中有貪嗔慢於過去世已生未斷現在已生能繋此事以貪嗔慢是自相惑非諸有情定遍起故文光法師釋此文云若於此事中有貪嗔慢於過去世已生未斷現在已生能繋此事以貪嗔慢是自相惑縁別事生非諸有情定遍三世諸事起故文非諸有情定遍三世諸事起故之言此旨實分明也次於未來可生意識相應貪慢名世遍事遍遍行難者未來意識相應貪嗔慢種類無邊故可生之類歴一一有情悉具事遍之義也故今論云若未來世意識相應貪嗔慢三遍於三世乃至未斷皆能繋縛文光法師釋此文云若未來世意識相應貪嗔慢三遍繋三世雖於此事或生不生乃至未斷皆能繋縛文次於過去見疑無明名世遍事遍遍行云難者彼共相惑故歴一一有情悉具事遍之義也故今論云所餘一切見疑無明去來未斷遍縛三世由此三種是共相惑一切有情倶遍縛故文光法師釋此文云除前三種所餘一切見疑無明過去未來未斷遍縛彼三世諸事由此三種見疑無明是共相惑一切有情倶遍縛彼三世事故文次於寶法師過現不定之釋者過去現在意識相應貪嗔慢若縁此事即繋若不縁此事即不繋故云過現不定也如婆沙論云若前生未斷則繋若前未生則不繋也非云遍行非遍行之義不定何爲違文哉重難云見寶法師解釋或云要因見聞方能現起故於三世非定遍行文或云不見聞境不爲一切過去現在貪等繋縛文此等釋意意識相應貪嗔慢必縁曾所見聞之境不縁都不見聞之境故過去意識相應貪嗔慢望一類有情不具事遍之義釋成見若爾望一類有情之時可有遍繋自境之義云事寧不背此等解釋哉答以道理思之不可云一境定有不可見聞之境案寶法師解釋意貪等只縁曾所見聞之境云許也其不見聞之境隨人隨時可不定故不必具遍繋自境之義爲言非有一切有情定不見聞之境故過去意識相應貪嗔慢望一類有情之時可有遍繋自境之義云事更不違此等解釋也尋云非諸有情定遍三世諸事起故者於諸有情有遍繋自境不遍繋自境之類云歟爲當全無遍繋自境之類云歟答此事前已成之畢過去意識相應貪嗔慢是自相惑縁別事生故或有情雖具遍繋自境之義或有情不具遍繋自境之義故遍繋自境不遍繋自境其類不定非一切有情悉具遍繋自境之義不名遍行云也光法師云現縁共惑雖亦有具二種遍行有不具者以不定故不言遍行現在身見邊見邪見疑無明之中雖有遍繋自境之類亦有不遍繋自境之類故其義不定不名遍行云也今云非諸有情定遍三世諸事起故准此釋可思之也問未來可生意識相應貪嗔慢可名世遍事遍行耶進云頌文云未來意遍行文付之自相惑者不遍縁一切事何可名世遍事遍遍行哉是以過去意識相應貪嗔慢幷未來可生五識相應貪嗔不名世遍事遍遍行例可同哉答未來可生意識相應貪嗔慢雖自相惑未來種類無邊故可生之類所縁分齊是廣於一一有情雖何境界無不繋縛故具事遍之義故名世遍事遍遍行也故光法師釋云遍行有二一遍繋三世二遍繋自境未來若生不生意識貪嗔慢三未來不生五識貪嗔及餘過未見疑無明隨其所應皆具二遍立遍行名文但於過去意識相應貪嗔慢不名世遍事遍遍行云難者光法師釋非諸有情定遍三世諸事起故非一一有情悉具遍繋自境之義故以事遍之義不定故不名世遍事遍遍行也次於未來可生五識相應貪嗔不名世遍事遍遍行云難者未來可生五識相應貪嗔唯繋未來一世故不具世遍之義故不名世遍事遍遍行也故今論云未來五識相應貪嗔若未斷可生唯繋未來世文光法師釋此文云未來五識相應貪嗔若未斷可生境必倶故唯繋未來文問頌文云五可生自世不生亦遍行文爾者不生亦遍行者爲約一一有情論爲當多有情合論歟答約一一有情論也兩方若約一一有情論者一有情善眼識現在前縁青色之時餘染汚眼識相應貪嗔不可有縁此青色之類若爾染汚眼識相應貪嗔既無縁善眼識所縁青色之義寧可名遍行哉爰知多有情合論有遍行之義云事若依之爾者論中云非諸有情定遍起文約一一有情論遍行之義見如何答以道理思之約一一有情可論遍行之義也若多有情合論談此義者過去意識相應貪嗔慢何不具事遍之義哉光法師非諸有情定遍三世諸事起故之釋意非一一有情各別身中貪嗔慢悉有遍繋自境之義故不名遍行見爰知於一一有情必具世遍事遍之義名遍行云事但於善眼識所縁青色可非染汚眼識相應貪嗔所繋云難者於一青色體可爲善染汚無記眼識所縁之義有之而其中善眼識現在前雖縁青色可縁彼青色染汚眼識留未來猶繋之故約一一有情云不生亦遍行也問一念眼識相應煩惱同時縛三世境義可有耶答不可有此義也兩方若有此義者五識唯縁現在者性相之所定也何可有同時縛三世境之義哉若依之爾者圓暉法師釋未來五識相應貪嗔未斷不生亦名遍行之義云或有同時參差三世文如此釋者可有此義見如何答五識是唯縁現在法故一念眼識所縁境更不可亙三世處事刹那自本定故一念眼識所縁境過去皆過去現在皆現在未來皆未來不可有分散三世之義故彼相應煩惱同時縛三世境之義亦不可有也但於圓暉法師解釋者頌疏中釋此事作二解釋彼全文可料簡之即彼疏云不生亦遍行者未來五識相應貪嗔若未斷不生亦遍繋三世及一切自所縁事謂所縁境或在未來或流至現在或謝過去識雖未來縁闕不生由未斷故性能繋彼三世境也或有同時參差三世文初釋意云就一眼識所縁境流至三世之時或在未來或流至現在或落謝過去云也第二釋意云就多眼識所縁境落謝過去事同時故云或有同時參差三世也雖多類眼識同在未來故云未來不生眼識也重難云見頌疏第二釋具文云或有同時參差三世如有眼識定縁青黄赤色三境而起隨闕一境識即不生其所闕境或一未來或一現在或一過去故説五識遍縛三世文此釋意云一眼識此刹那可縁青黄赤三種色起其刹那彼眼識留未來不生彼青黄赤三種色中一種色在未來一種色流至現在一種色落謝過去之義可有故指此時分云或有同時參差三世見今料簡之趣不順解釋意哉答問發智論四中答若於此事有未來愛結繋亦有過去愛結繋耶云若前生未斷則繋若前未生設生已斷則不繋文爾者若前未生設生已斷則不繋者可亙九品愛結耶進云婆沙論中述迦濕彌羅國諸論師義云若前未生則不繋者説後三品結設生已斷則不繋者説前六品結文付之若前未生則不繋設主已斷則不繋兩類何不亙九品愛結哉例如前生未斷則繋亙九品愛結也何況若強論其差別者如外國諸師説以若前生未斷則繋若前未生則不繋設生已斷則不繋三類可配九品之中各三品愛結迦濕彌羅國諸師存何深意如此相配哉答委悉分別之者若前未生則不繋者可有亙九品愛結之義邊於未來愛結繋法過去九品愛結倶不縁之者同不可繋此事故也故寶法師釋云愛有於此一色事中容有三品愛不縁此一色事生縁餘事生縁餘事起此三品愛皆不繋此一色事若前不生不繋理合通於三品文設生已斷則不繋者不可亙九品愛結云事道理必然也於未來愛結繋法論過去愛結不繋之義故若過去九品愛結同已斷者不可有未來愛結繋之義故也寶法師云前生已斷不繋此於三品中或是中品或上中合説必非下品已説未來繋故斷或必三世同斷故若過去世下品斷者未來三品皆斷不生可言有未來愛結繋故理定如上文婆沙論中暫就欲界前六品愛結巳斷後三品愛結未斷之一位顯若前未生則不繋設生已斷則不繋之義也非謂餘位亦無此義故寶法師釋云若前不生則不繋及生者已斷則不繋皆據斷六品説即當一來果此據有繋故非不還果等此以餘處生名不繋故非是已斷斷故非具縛若前未生則不繋者説後三品據一來説設生已斷則不繋者説前六品亦是一來應更思之文但於外國諸師説者前生未斷則繋之義應可亙九品愛結何唯限中三品愛結哉而云若前生未斷則繋者説中三品結不叶道理故迦濕彌羅國諸論師義改此説也問發智論四中答若於此事有未來愛結繋亦有過去愛結繋耶云問云若前生未斷則繋若前未生設生已斷則不繋文爾者若前未生則不繋者唯限一世愛結歟答唯限一世愛結也兩方若唯限一世愛結者以道理思之何唯限一世愛結哉是以人師解釋中不限一世愛結見若依之爾者婆沙論五十八中釋此文云後三品愛結雖未斷而未生故在未來爲繋非過去文如此文者唯限過去一世愛結見如何答於未來愛結繋法論過去愛結不繋之義云若前未生則不繋故指過去一世愛結云事文理必然也更不可疑之而以道理思之何唯限一世愛結哉云疑未得其意也人師解釋者何人師解釋哉可尋明之問論文云非果生時有現因在文光法師釋此文作三解釋爾者第二釋意如何釋之耶進云光法師釋云又解非未來果生時有現因在以異熟果非因無間故文付之依解釋定判見論文起盡云謂若實無過去體者善惡二業當果應無非果生時有現因在文此文意果定置有體業若無體者果亦可無體成也而經部宗意許未來與過去同無體何未來定有過去屬無哉若過未同無體者業果倶可無體可成也何云謂若實無過去體者善惡二業當果應無哉答論文意以業必量過去無體者業即可無體業無體者果亦可無體成也不必以果定量有體歟果設雖未來設雖現在果生之時業必可過去故業無體者果亦可無體成也何況未來果設雖無體現在果必可有體故果定量有體亦無失也第二釋意可存現果生時故旁非相違歟問頌文云第三約作用立世最爲善云云爾者於過未二世可起作用耶答於過去可起作用也兩方若起作用者今論中釋此頌文云故此中第三最善以約作用位有差別由位不同立世有異彼謂諸法作用未有名爲未來有作用時名爲現在作用已滅名爲過去非體有殊文若於過未二世起作用者豈無三世雜亂之過哉若依之爾者光法師餘處七解釋中引婆沙論評家義云無有等無間縁異時取果異時與果文如此文者二無心定入心於過去可起等無間縁取果用見如何答若依婆沙論評家義幷今論意者二無心定入心於過去可起等無間縁取果用也故婆沙論百九十六中解等無間縁中云此中有説若前法未至已生位不與後法作等無間若至便作問若然者有心位可爾無心位云何可爾答此中説有心位不説餘位有説設依無心位説亦無有過謂入定心現在前時頓取諸定及出心果亦興最初刹那定果後諸定刹那及出定心生時與果非取先已取故評曰彼不應作是説所以者何無有等無間縁異時取果異時與果若此時取果即此時與果故文光法師餘處七引此文畢云若婆沙意過去既得起與果用何故不得起取果用乃至今倶舍論意同婆沙評家不同正理文婆沙論評家義幷今論意二無心定入心於過去起等無間縁取果用云事今解釋實分明也但於可有三世雜亂之過云難者光法師會云初取果者立現在世後取果者過去亦起文重難云見婆沙論文云無想異熟是異熟因力所引起任運而轉非入彼心勢力所引故不名心等無間法無想異熟非等無間縁生故無想異熟入心與彼出心於過去可初起等無間縁取果用若爾初取果者立現在世之會通猶有疑哉答無想異熟入心與彼出心於過去雖初起等無間縁取果用彼入心現在前時必起因縁等取果用故更不可有三世雜亂之過故寶法師餘處述婆沙論意理長之旨畢云取果名現在者據因縁等説不據等無間縁取果用論之初果者必於現在起之故不可有三世雜亂之過云許也無想異熟入心與彼出心於過去初起等無間縁取果用亦不可有三世雜亂之過也問薩婆多宗意有爲法體可生滅耶答雖有二義暫可存生滅云義也兩方若生滅者薩婆多宗意述三世實有之義若有爲法體生滅者何可談三世實有之旨哉是以見婆沙論處處文或二十一云我説諸因以作用爲果非以實體爲果又説諸果以作用爲因非以實體爲因諸法實體恒無轉變非因果故文或三十九云若依自體轉變説者應言諸行無有轉變以彼自體無改易故文任此等論文有爲法體三世恒有無有生滅轉變之義見加之見光法師餘處解釋或一釋是能生長彼作用義云之論文云法體先有不可言生但能生長彼作用義文或五釋法若有此應是有爲之論文云此宗諸法體皆本有四相於法但望用説非據體論文寶法師餘處二解釋中云心心所法先有體性由十二處令行世取果名爲作用文圓暉法師餘處解釋中云依薩婆多宗法體先有不可言生但生其用耳文有爲法體不生滅云事此等解釋亦分明也若依之爾者立有爲名由法體生滅之義若法體不生滅者與無爲法有何差異哉是以光法師解釋中云體非常故用亦非常文如何答有爲法體生滅有無者上古明匠猶爲未決下愚末學輒雖難定深思道理廣勘諸文可存有爲法體生滅云義也其故立有爲名由造作遷流之義若法體不生滅者豈名有爲哉與無爲法有何差異哉是以見婆沙論處處之文或三十九答諸有爲法生時爲體是生法故生爲與生相合故生耶云問云應作是説體是生法故生答諸有爲法滅時爲體是無常法故滅爲與無常相合故滅耶云問云應作是説體是無常法故滅畢評家指此説云應知此中初説爲善文或百八十三釋發智論諸生何世攝答未來諸滅何世攝答現在之文云復次爲止執有爲法唯轉變隱顯而體無生滅今説未來生現在滅故即顯有爲法非但轉變而實有生滅故作斯論文有爲法體生滅云事此等論文尤分明也加之見光法師處處解釋當卷釋若許作用異法體者可有此失然無有異故不應言有此過失之論文云體非常故用亦非常文有爲法體生滅云事此釋亦分明也餘處之中或一釋此有爲法亦名世路已行正行當行性故或爲無常所呑食故之論文云無常四相是能呑食諸有爲法是所呑食法此所呑食是可破壞故名世是無常所依故名路即世名路持業釋也文若有爲法體不生滅者何云諸有爲法是所呑食哉或二釋若於彼法此有功能即説彼爲此法境界心心所法執彼而起彼於心等名爲所縁之論文云又解礙體義邊名所縁有對礙用義邊名境界有對文所縁有對者名心心所託自所縁境界現起若心心所法體不生滅者寧有礙體之義哉何況圓暉法師餘處五解釋中云謂相法體令是有爲文若許相法體者豈不云生滅哉准此等文理有爲法體生滅云事誰可疑之哉但於薩婆多宗意談三世實有之旨云難者是實難義也云法體恒有談其性非常倩案其意尤以難思經部師難許體恒有説性非常如是義言所未曾有即此意也試會之者有爲法體遷流三世之時其性實雖生滅不如其用本無今有有已還無故云三世體恒有也次於婆沙論諸法實體恒無轉變之文者云我説作用以爲因果光取今文意所引之言也作用雖爲本無今有有已還無於其體者無此義故如此云也對我説作用以爲因果云者法實體恒無轉變此旨自炳然也光法師體先有不可言生之釋此宗諸法體皆本有之釋寶法師心心所法先有體性之釋圓暉法師法體先有不可言生之釋會通亦同之有爲法體雖遷流三世不如其用本無今有有已還無故諸師同述法體先有之旨也非謂其法體實不生滅歟次於婆沙論應言諸行無有轉變之文者色色自性不轉心心心自性不轉色故如此云也以彼自體無改易故之文此旨實分明也重難云見婆沙論處處之文或十七答若未來世無同類因及遍行因過現乃有則應無因而有因亦應無果而有果如是便壞三世有宗云問云若許亦無失約位非體以和合作用位果非體果然位與體非即非離體雖恒有而位非恒故同類因及遍行因本無今有亦無有失文或三十一釋發智論云何無常滅答諸行散壞破歿已退之文云諸有爲法自性恒有由生相故有作用起由滅相故無復作用名爲散壞破沒已退文體雖恒有而位非恒之文諸有爲法自性恒有之言有爲法體不生滅見是一加之南寺護命僧正研神章第三中擧或云有爲法體生滅或云有爲法體不生滅之二傳畢自述本義云今述本聞不如當用有爲法體無生無滅恒在不斷是此本義代至像末人失本義不可得悲也文先徳決判誰不依用哉是二答有爲法體生滅云事道理證文前重成之畢重勘諸師解釋嘉祥大師十二門論疏中或答有爲法體是生故生爲與生合故生之問云體是生但要由生相顯發如闇中雖有瓶要須燈顯發不説燈生彼亦如是文或答法體本無生滅而假四相生耶之問云法體本有生滅性但假四相發動之耳文元瑜法師起信論問經部宗意意識可縁現在境耶答意識可縁現在境也兩方若意識縁現在境者經部宗意不許同時因果意識若縁現在境者豈不爲同時因果哉是以光法師餘處二解釋中云若依經部五識唯縁過去故正理第八云有執五識境唯過去文五識既不縁現在境意識例可同哉加之見今論餘卷十文述經部宗義或云前根境縁能發後識或述根境爲先次有識起任此等論文經部宗意六識同不縁現在境見若依之爾者意識是廣縁法也設雖經部宗意何不縁現在境哉答經部宗意意識可縁現在境也意識是廣縁識也豈不縁現在境哉意識若不縁現在境者現在境都非識所縁可云歟現在境可爲識所縁之道理是必然故意識定可縁現在境也是以今論中述經部宗義或云若法但能爲所縁境我説過未亦是所縁文別現在境意識所縁過未亦意識所縁也成見或云非憶過去色受等時如現分明觀彼爲有但追憶彼曾有之相逆觀未來當有亦爾文意識分明縁現在境云事此文亦炳然也或云若有少分體差別者本無今有其理自成故識通縁有非有境文云意識縁有境豈非現在境哉任此等論文經部宗意意識縁現在境云事實分明也加之妙樂大師解釋弘決五中云若依經部大乘法相等同時意識縁現五塵及落謝塵幷法入所收少分屬色少分屬心文經部宗意意識縁現在境云事此釋亦明鏡也但於意識縁現在境者可爲同時因果云難者意識其力強盛不必藉所縁境力起如縁龜毛等無法起也故光法師釋云經部許有縁無生心文意識現起既不藉所縁境力故雖縁現在境不爲因果故無許同時因果之過也次於五識例難者五識其力微劣必藉所縁境力故若縁現在境者可爲同時因果故五識唯縁過去境不縁現在境云也次於今論餘卷文者就五識論之也次故寶法師釋前根境縁能發後識之文云五識依根亦許前後文非就意識論之全無相違也尋云經部宗意許五識縁過去境者亦縁龜毛等無法歟答五識縁色等五塵現量境故雖縁過去曾有之法不縁龜毛等都無之法也故光法師釋云據曾當有擬對而縁故作是言如成所縁曾當有故不同龜毛無實體故不同現在文准此解釋可思之也尋云寶法師餘處二釋云經部師説五識亦縁過去境故如正理第八破文亦縁過去境故之亦言亦縁何法哉答問薩婆多宗意能詮名可詮無法耶答不可詮無法也兩方若詮無法者薩婆多宗意不縁無法生心見准之思之能詮名不可詮無法哉若依之爾者見今論文有部難經部云若體全無是所縁者第十三處應是所縁文經部反難有部云諸有違無第十三處此能縁識爲何所縁若謂即縁彼名爲境是則應撥彼名爲無文如此文者可有第十三處名見知能詮名可詮無法云事如何答薩婆多宗意能詮名不可詮無法也故婆沙論十五云問一切名皆能顯義耶答一切皆能顯義文但於第十三處名可詮無法云難者第十三處是無體故名不可詮之名詮思第十三處之想心所云第十三處名也故婆沙論云問若以此名顯斷常第二頭第三手第六蘊第十三處第十九界等此名何所顯耶答此名即顯斷常等想文婆沙抄中釋此文云解云所詮無故却詮過去能發名等想文重難云若爾思第十三處之想心所縁無法歟答縁兎角者或時縁兎或時縁牛角故彼此取合思有兎角也准之思之縁第十三處者彼此處取合思有第十三處也問光法師依經部宗意以十二處如何分別假實哉進云光法師釋云現十二處八處實有四處少分實有少分實有少分實無文付之光法師餘處一解釋中述經部宗義云蘊處是假唯界是實文若爾兩處解釋何致相違哉答光法師當處餘處解釋義門是異廢立各別也當卷釋意就十二處法體論其假實餘處釋意就十二處廢立皆云假立也所謂十八界廢立各別關立色心自體故是實門也十二處廢立合十八界施設之五蘊廢立合十八界十二處施設之故是假門也爲言兩處解釋各述一門更非相違也問經部宗中可有計十大地法心所實有義耶答可有此義也兩方若有此義者見光法師處處定判今解釋中述經部宗義云受想思實有餘心所法思上假立實無文餘處四解釋中釋傳説如是所列十法諸心刹那和合遍有之論文云論主意明經部非信十法皆有別體故言傳説文任此等解釋經部宗中無計十大地法心所實有之義見若依之爾者辰旦人師解釋中引正理論或説有十之文經部師義釋見如何答經部宗中可有計大地法心所實有之義也故撲揚大師演祕一本釋云若經部師自有二釋一譬喩師唯心無所同覺天計二有心所四釋不同故順正理第十一云謂執別有心所論者於心所中多興諍論或唯説有三大地法或唯説四或説有十或説十四解云如次説受想思説四加觸説十即是十大地法十四加貪及嗔癡慢文任此解釋經部宗中有計十大地法心所實有之義云事尤分明也但於光法師處處解釋者經部宗中本宗末計其類相分其義雖異本宗同義意述唯受想思三心所實有之旨故就本義意如此釋也更非不許末宗異義之中有計十大地法心所實有之類全無相違重難云元瑜法師釋正理論或説有十之文云毘婆沙師計有十種如前所列文如此釋者或説有十之文非出經部宗中異義見若爾演祕祕解釋誰可依用哉答見正理論一段之文云或説唯有三大地法云或説有四倶是經部宗義云事必然也隣之次下云或説有十定亦可經部宗義撲揚解釋非無其謂但於元瑜法師解釋者正理論或説有十之文釋毘婆沙師義許也非謂經部宗中都無計十大地法心所實有之義何爲相違哉或亦人師異釋也不可及會通歟尋云就元瑜法師解釋難思毘婆沙師意談四十六心所皆有別體之旨有計唯十大地法心所心實有之義云事證據有何處哉答此事強不可劬勞歟但婆沙論中述滅盡定體云有説此定十一物爲體十大地法及心滅故文此有説意存心所之中唯十大地法實有之義見此有説義可爲其證據歟問經部宗意可許愛心所實有義耶答經部宗本義不許此義也進云爾也光法師釋受想思實有餘心所法思上假立實無不許受心所實有之義見付之見今論餘處二十二文云契經唯説愛爲集故經部宗意以愛心所爲集諦見若無實體者豈可爲集聖諦哉是以大乘師對經部師立量云觸別有體六六法中心所性故如受愛等文經部宗意若不許愛心所實有之義者豈可以愛心所爲共許同體哉答經部宗中本宗末計其類相分其義雖異本宗同義意定受想思實有餘心所法思上假立實無不許愛心所實有之義也故見正理論餘處文雖經部宗内等淨支無別實體云義也此等皆是心所攝故如受想思別有實體文經部宗意唯許受想思三心所實體不許餘心所實體之旨此文尤分明也但於經部宗意以愛心所爲集諦云難者經部宗意以愛心所思分位假立故從思心所亦可有愛心所有實體云義邊故以愛心所爲集聖諦也觸別有體之比量以愛心所爲同喩即此意也故慈恩大師唯識本疏三末中釋此事云經部計愛亦是實有思分位故不同假觸文以愛心所思分位假立之時以思心所即名愛心所故非如根境識三和合假立觸名故云不同假觸也故演祕中承此文云雖不同觸多法成文問頌文云此法性甚深文爾者毘婆沙師義歟答爾也兩方若毘婆沙師義者見婆沙論者文雖述三世實有之旨未云法性甚深知非毘婆沙師義云事若依之爾者見今論文可毘婆沙師義見如何答見今論文云毘婆沙師作如是説如現實有過去未來所有於中不能通釋諸自愛者應如是知法性甚深非尋思境豈不能釋便撥爲無文光法師釋云毘婆沙師作如是言此法性甚深文正理論五十二中述然彼經主於此義中迷執情深復廣興難謂廣論者不能善通矯爲我宗依理窮釋畢云此法性甚深文任此等定判此法性甚深者毘婆沙師義云事實分明也但於婆沙論中不述法性甚深之旨云難者毘婆沙師爲經部宗被難三世實有之義儲此通釋也婆沙論中無述有部經部之難破故不及法性甚深之會通歟問苦智唯知苦聖諦法歟答唯知苦聖諦法也兩方唯知苦聖諦法者苦集一物因果義分者性相之所定也苦智何唯知苦聖諦法哉是以衆事分十二中云即苦諦所攝法非智知文此文無諍苦智兼知集聖諦法見加之品類足論中云唯苦聖諦所攝法非隨眠隨増文以隨眠隨増思智品所知其義可同哉若依之爾者以道理思之苦智唯知苦聖諦法可云也如何答苦集滅道四智作各別行相深悟四諦各別之理故苦智作非常苦空非我行相唯觀苦聖諦理不知集聖諦法集智作因集生縁行相唯觀集聖諦理不知苦聖諦法也故品類足論云唯苦聖諦所攝法一智知謂苦智唯集聖諦所攝法一智知謂集智文前後之文取意抄之苦智唯知苦聖諦法唯智集知集聖諦法云事此文實分明也但於苦集一物因果義分之理者有漏法必具爲因爲果之義故苦集二諦其體雖一物無漏智品明差別因果義邊觀之故無苦智兼知集聖諦法集智兼知苦聖諦法之義也次於衆事分即苦諦所攝法非智知云文者是舊譯也既背品類足論文更不可依用之次於品類足論唯苦聖諦所攝法非隨眠隨増云文者煩惱於相應所縁法隨増之時只縛彼法體無差別因果之義故設雖非遍行隨眠同於苦集二諦法隨増故云唯苦聖諦所攝法非隨眠増也非如無漏智品明觀諦理故全非相例歟重難云見品類足論九文云苦集諦十八界十二處五蘊攝八智知除滅道智文如此文者苦集聖諦法各八智知除滅道二智見若爾豈非苦智亦知集聖諦法集智亦知苦聖諦法哉是一加之見婆沙論文云謂苦智集智行相無雜所縁有雜滅智道智行相無雜所縁無雜文此文意苦智行非常苦空非我行相集智作因集生縁行相故彼行相雖無雜亂所縁苦集二諦其體一物故混雜互縁之見若苦智唯知苦聖諦法集智唯知集聖諦法者苦集二智所縁無雜寧云所縁有雜哉是二答品類足論文實雖難思暫會之者苦集二諦各別論者苦聖諦七智知除集滅道智集聖諦七智知除苦滅道智可云也而今合論苦集二諦故云八智知除滅道智歟次於婆沙論文者由苦集二諦其體一物之邊云所縁有雜歟故婆沙論百四十七中釋苦集二智行相無雜所縁有雜之相云離苦無集離集無苦故謂一一有漏事果義名苦因義名集即於一一有漏事中苦智作苦等四行相轉名苦智苦智作集等四行相轉名集智故苦集智行相無雜所縁有雜文問正理論意色界異熟儀二無記心可縁欲界法耶答可縁欲界法也兩方若縁欲界法者光法師會婆沙論中云色界無覆無記識縁欲界五部法正理論中述欲界繋見苦所斷法五識所縁云色修所斷善識非餘之相違云婆沙論文極理分明正理不説有違宗過文如此釋者正理論意色界異熟威儀二無記心不縁欲界法見若依之爾者無記力劣下縁上難故不縁上界上縁下易故能縁下界者光法師解釋也設雖正理論意何不存此道理哉答見正理論餘處八文云若諸異生生在欲界已離欲界貪未離初定貪以初靜慮眼見欲界色時此色唯是無覆無記眼識所識於此復起初靜慮地二種分別謂除染汚已離初定貪未離二定貪以二靜慮眼見欲界色時此色唯是無覆無記眼識所識於此復起初定分別若退法者則有二種謂除染汚不退法者則唯有善於此復起二靜慮地二種分別謂除染汚文色界異熟威儀二無記心縁欲界法云事今一段論文實以分明也但於光法師初解釋者總論之者正理論意色界異熟威儀二無記心縁欲界法云事自本雖許之暫就色修所斷善識非餘之論文作正理不説有違宗過之解釋歟問正理論意依身在欲界起色界無覆無記心縁欲界修所斷法義可有耶答可有此義也兩方若有此義者光法師會婆沙論中云色界無覆無識縁欲界五部法正理論中述欲界繋見苦所斷法五識所縁云色修所斷善識非餘之相違云婆沙言縁據身在上能縁下地正理不説據身在下不能起上無覆無記縁下見苦所斷各據一義故不相違欲見集斷及修所斷各五識縁准釋應知文如此釋者依身在欲界起色界無覆無記心縁欲界修所斷法之義不可有見若依之爾者正理論意述天眼天耳二通以意識相應勝無記惠爲體之旨若爾依身在欲界起色界天眼天耳二通縁欲界修所斷之義可有哉答正理論意依身在欲界起色界天眼天耳二通可縁欲界色聲二境故依身在欲界起色界無覆無記心縁欲界修所斷法之義可有也但於光法師第二解釋者見解釋起盡上問若無覆識亦能縁下見苦所斷何故正理五十三解欲見苦斷五色縁中但云色修所斷善識非餘准彼論文不言無記縁下見苦所斷婆沙言縁豈不相違唯就異熟威儀二無記心致問故答中至及修所斷各五識縁准釋應知云處不及通果無記心沙汰也私云就天眼天耳二通致此疑者就婆沙論意可有其疑婆沙論意依身在欲界起色界天眼天耳二通可縁欲界色聲二境故依身在欲界起色界無覆無記心縁欲界修所斷法之義可有故也全不可依天眼天耳二通體云眼耳二識相應惠云意識相應惠之異義設雖天眼天耳二通二識相應惠爲體云義意何無其疑哉今偏就正理論意被擧此疑未得其意也問正理論中述欲界繋見苦所斷法五識所縁云色界修所斷善識非餘文爾者善識言中可攝生得善耶答可攝生得善也兩方若攝生得善者光法師會婆沙論中云色界無覆無記識縁欲界五部法正理論中述欲界繋見苦所斷法五識所縁云色修所斷善識非餘之相違云婆沙言縁據身在上能縁下地正理不説據身在下不能起上無覆無記縁下見苦所斷各據一義故不相違文而依身在下地無起上地生得善善識言中何可攝生得善哉若依之爾者善識之言無所簡尤可攝生得善也如何答色界生得善縁欲界五部所斷法者性相之所定也故光法師所引婆沙論八十七云問生得善識能縁何法答欲色界者能縁三界及無漏一切法文准婆沙論文思正理論意色修所斷善識非餘之言中何不攝生得善哉但於光法師第二解釋者善心之中加行善心依身在下地起上地心縁下地見苦所斷法之義可有之無覆無記心不説據身在下不能起上無覆無記縁下見苦所斷也不遮其善心中自有依身在下地不起上地心之類何爲疑哉問寶法師意色界無覆無記識可縁欲界見苦所斷法耶答可縁之也兩方若縁之者寶法師解釋中擧欲界見苦所斷法能縁識云若色界修所斷善心文如解釋者色界無覆無記心不縁欲界見苦所斷法見若依之爾者婆沙論中色界無覆無記識可縁欲界見苦所斷法見如何答見婆沙論八十七文述欲界見苦所斷法十六識内五識所縁云四色界修所斷善及無覆無記識文加之彼論八十七中出異熟無記識所縁云色界者縁自下地一切有漏法文出威儀無記識所縁云色界者唯縁欲色界五部法文光法師引此等論文畢云若無覆識亦能縁下見苦所斷述婆沙論文極理分明設雖寶法師意何可違婆沙論説哉但於寶法師解釋者略而不擧無覆無記識也十六識縁境就十五部及無漏識論之故雖擧色界無覆無識十六識内非能縁識可増故略之也例如欲界識中云見苦集遍行不擧見苦所斷非遍行隨眠相應識云修道有漏善心不出無覆無記識也問依身在初靜慮所起眼耳二識可縁上地耶答可縁上地也兩方若縁上地者依身在初靜慮所起眼耳二識縁上地者無覆無記意識何不縁上地哉若依之爾者光法師解釋中云雖縁上地由同界故所以得縁文文既無置簡別之言知依身在初靜慮所起眼耳二識可縁上地云事如何答依身在初靜慮起上三靜慮果天眼天耳二通隨其所應可縁上三靜慮色聲故依身在初靜慮所起眼耳二識縁上地之義可有也但於無覆無記意識可縁上地云難者異熟威儀二無記心勢力劣故不縁上地通果無記心縁自地所變化事幷所發業故不縁上地也天眼天耳二通是禪定所生果勢力強故縁上地也就中就其自性云之雖初靜慮所繋望所依定論之上三靜慮故隨其所應縁上三靜慮色聲無過也重難云天眼天耳二通縁上地者豈不違自下地爲境之性相哉答自下地爲境者望所依定論之不就天眼天耳二通繋地論之何爲相違也問光法師所引婆沙論中述無色界加行善識所縁云無漏一切法及虚空文爾者今此虚空者指虚空無爲歟答可指虚空無爲也兩方若指虚空無爲者見婆沙論文無漏一切法之外別擧虚空無爲者豈不充滿一切法之言攝之哉若依之爾者既云虚空定可指虚空無爲哉答見婆沙論八十七文問加行善識能縁何法答之云無色界者能自上地有漏無漏一切法及虚空幷次下地有漏法文既次下地有漏法之外別出虚空明知虚空無爲非空界色云事但於無漏一切法之外別擧虚空云難者無漏一切法者就有多體無漏法論之也虚空無爲其體一物非如擇滅非擇滅等有多體故別出之歟問空無邊地處近分地加行善心可縁下地法上擇滅耶進云光法師述無色界心縁境相云擇滅唯縁自上地有漏法上擇滅不縁下地法上擇滅見付之空無邊處近分加行善心既縁次下地有漏法何不縁彼法上擇滅哉何況空無邊處近分地加行善心縁下地類智品上非擇滅見例可同哉答婆沙論八十七中問加行善識能縁何法答之云無色界者能縁自上地有漏無漏一切法及虚空幷次下地有漏法文光法師引此文畢解云婆沙言無漏一切法者少分一切隨其所應謂自上地有漏法上擇滅非擇滅及一切類智品道幷一切類智品上非擇滅故婆沙八十四云第四解脱縁四無色及彼因彼滅一切類智品若四無色及類智品非擇滅乃至准婆沙文擇滅唯縁自上地有漏法上擇滅若非擇滅通自縁上下地類智品上非擇滅文任此等定判空無邊處近分地加行善心不縁下地法上擇滅云事尤分明也加之見婆沙論處處之文或九十一云眼根滅縁識欲色界二部及遍行隨眠隨増文若空無邊處近分地加行善心縁下地法上擇滅者何眼滅縁識無色界遍行及修處斷隨眠不隨増哉或九十一云眼根滅縁識所増隨眠有爲所縁縛非相應縛謂欲色界遍行修所斷及見滅所斷有爲縁隨眼有爲相應縛非所縁縛謂欲色界見滅所斷無爲縁隨眠有爲所縁縛亦相應縛者無也眼根滅縁識所増隨眠非所縁縛亦非相應縛者無也若非此所増隨眠而於此非所縁縛亦非相應縛者謂欲色界見道所斷一切見苦集所斷不遍行及無色界一切隨眠文眼根滅縁識無色界隨眠不隨増云事此文亦分明也或九十一云眼根滅縁識所増隨眠等無間生十心文若空無邊處近分地加行善心縁下地法上擇滅者眼根滅縁識所増隨眠等無間何唯生十部心哉或九十一云眼根滅縁識欲色界及聖者生無色界成就異生生無色界不成就文若空無邊處近分地加行善心縁下地法上擇滅者異生生無色界何不成就眼根滅縁識哉或九十一云眼根滅縁識所増隨眠未離色界染成就已離色界染不成就文若空無邊處近分地加行善心縁下地法上擇滅者已離色界染人何不成就眼根滅縁識所増隨眠哉或九十二云眼根滅縁識得遍知時色愛盡異生三十一隨眠得遍知無結盡聖者三隨眠得遍知無結盡文或九十二云眼根滅縁識所増隨眠得遍知時色愛盡異生三十一隨眠得遍知無結盡聖者三隨眠得遍知無盡結文或云眼根滅縁識滅作證時色愛盡異生三十一隨眠滅作證無結盡聖者三隨眠滅作證無結盡至阿羅漢九十八隨眠滅作證九結盡文或云眼根滅縁識所増隨眠滅作證時色愛盡異生三十一隨眠滅作證無結盡聖者三隨眠滅作證無結盡至阿羅漢九十八隨眠滅作證九結盡文若空無邊處近分地加行善心縁下地法上擇滅者色愛盡時何可有眼根滅縁識及彼縁識所増隨眠得遍知及滅作證之義哉任此等論文空無邊處近分地加行善心不縁下地法上擇滅云事亦分明也但於空無邊處近分地加行善心縁次下地有漏法可縁彼法上擇滅云難者空無邊處近分地加行善心縁次下地有漏法唯限麁苦障三行相也故識身足論中出諸無色界繋善心能了別色界繋法云謂苦麁苦苦苦障苦如理所引了別文任此文空無邊處近分地加行善心縁第四靜慮有漏法唯限麁苦障三行相故擇滅無爲非麁苦障法故不縁彼有漏法上擇滅也次於空無邊處近分地加行善心縁下地類智品上非擇滅云難者類智品道九地展轉爲同類因故無色界心縁下地類智品道故縁彼法上非擇滅也全非相例歟重難云見倶舍論餘卷文云空處近分唯有四種謂捨但縁色聲觸法縁第四靜慮亦具有四種此就許有別縁者説若執彼地唯總縁下但有雜縁法意近行文光法師釋此文云空處近分二説不同前説爲正故婆沙一百三十九云若許別縁下者則有四捨意近行謂色聲觸法若許總縁下者則唯有一法捨意近行如是説者應説有四文任此等定判空無邊處近分地加行善心縁第四靜慮有色聲觸法四意近行見若空無邊處近分地加行善心縁第四靜慮唯限麁苦障三行相者麁苦障是共相行相可總縁故唯是雜縁法捨意近行更不可有色聲觸法四意近行哉是一何況婆沙論百三十九中説三十六師句縁境云空無邊處近分若説有五者三唯縁色界繋一通縁無色界繋及不繋一通縁色無色界繋及不繋若説有二者一通縁無色界繋及不繋一通縁色無色界繋及不繋四無色根本及上三近分各有二中二倶通縁無色界繋及不繋文任此文空無邊處近分地加行善心縁不繋法見若有縁不繋法之類者何不縁下地法上擇滅哉是二加之辰旦人師解釋中云空處近分善心縁色界眼根滅故修所斷貪等於眼根滅縁縁識也文是三如何答無色界中無遍縁智故空無邊處近分地加行善心縁第四靜慮唯限麁苦障三行相也但於倶舍婆沙兩論之中彼近分地有色聲觸法四意近行云文者將斷第四靜慮煩惱依空無邊處近分地起加行道之時有作麁苦障三行相別縁色聲觸法之類故彼近分地有色聲觸法四意近行云文全非相違次於婆沙論中空無邊處近分地心縁不繋法云文者無色界中無遍縁智故彼近分地麁苦障三行相之外無別下地縁行相故空無邊處近分地加行善心不縁下地法上擇滅云也泛論之者空無邊處近分地加行善心之中以自相行相縁滅道等之類更非所遮故此文亦非相違次於辰旦人師解釋者婆沙抄定判也是謬釋也不可依用之其故婆沙論中云眼根滅縁縁識無色界修所斷隨眠隨増者未至中間四本靜慮所攝滅類智相應心是眼滅縁識也無色界修所斷善心縁彼滅類智相應心故是眼根滅縁識也無色界修所斷隨眠隨増云也而婆沙抄中不辨此旨釋空處近分善心縁色界眼根滅故修所斷貪等於眼根滅縁縁識也故甚謬也問無色界善心可縁下地能治類智品道耶答可縁之也兩方若縁之者無色界善心微劣也何可縁下地能治類智品道哉是以見婆沙論文處處之文或百六十五述無漏初靜慮與淨無色爲所縁故云以初靜慮類智品是無色對治故與淨無色亦爲所縁文或釋淨無漏無色但縁下地類智品道不縁法智品道故云法智品道彼非地對治故文任此等論文無色界善心不縁下地能治類智品道見若依之爾者光法師所引婆沙論中云第四解脱縁一切類智品文一切之言既無簡別知縁下地能治類智品道云事如何答無色界善心可縁下地能治類智品道也類智品道可爲無色界能治之法故設雖下地能治亦縁之也故婆沙論九十一中擧樂根斷道縁識爲所縁縛非相應縛隨眠隨眠之中出無色界修所斷隨眠畢喜根斷道縁識及縁縁識所増隨眠亦爾文既云喜根斷道縁識無色界修所斷隨眠爲所縁縛明知無色界善心縁下地能治類智品道云事但於婆沙論兩處之文者類智品道是無色界能治道也法智品道非無色界能治道故無色界善心縁可爲自界能治道之法云許也其類智品道中兼縁下地能治道品更非所遮也重難云婆沙論中喜根斷道縁識無色界修所斷隨眠爲所縁縛云文全非證據無色界善心縁喜根斷道者是縁見道也見道合斷色無色界見惑故被云喜根斷道亦被云無色界能治斷道也故此文非無色界善心縁下地能治類智品道云證文歟此外有分明證文哉重勘婆沙論處處之文或九十一云眼根斷道縁識及縁縁識所増隨眠未離無色界染成就已離無色界染不成就耳鼻舌身命意樂喜捨信等五根斷道縁識及縁縁識所増隨眠亦爾文若無色界善心不縁下地能治類智品道者已離識無邊處染人不可成就眼根斷道縁識所増隨眠而既云眼根斷道縁識所増隨眠未離無色界染成就明知無所有處非想非非想處有漏善心之中有縁眼根斷道之類云事或九十二云眼根斷道縁識及縁縁識得遍知時無色愛盡三隨眠得遍知三結盡耳鼻舌身命意樂喜捨信等五根斷道縁識及縁縁識得遍知時亦爾文或九十二云眼根斷道縁識及縁縁識所増隨眠得遍知時無色愛盡三隨眠得遍知三結盡耳鼻舌身命意樂喜捨信等五根斷道縁識及縁縁識所増隨眠得遍知時亦爾文或九十二云眼根斷道縁識及縁縁識滅作證時得阿羅漢果九十八隨眠滅作證九結盡耳鼻舌身命意樂喜捨信等五根斷道縁識及縁縁識滅作證時亦爾文或九十二云眼根斷道縁識及縁縁識所増隨眠滅作證時得阿羅漢果九十八隨眠滅作證九結盡耳鼻舌身命意樂喜捨信等五根斷道縁識及縁縁識所増隨眠滅作證時亦爾文准此等論文無所有處非想非非想處有漏善心之中有縁眼根斷道之類見若無所有處非想非非想處有漏善心不縁下地能治類智品道者何云眼根斷道縁識及彼縁識所増隨眠得遍知時無色愛盡滅作證時得阿羅漢果哉若爾無色界善心縁下地能治類智品道云事此等論文亦分明也准之思之喜根斷道縁識無色界修所斷隨眠爲所縁縛云文無色界界善心縁喜根斷道故彼修所斷隨眠爲所縁縛也全非云縁見道之邊歟又難云見大乘義章處處解釋或九云問曰無色得縁下地無漏道不釋言有得有不得義下地道中治下地者無色不縁治於自地及上地者無色縁之空處如是識無所有次第漸滅推之可知毘曇如是文或十三云若依毘曇一切無漏望色界中無漏定心悉爲縁縁彼廣縁故望無色界無漏之心有是有非是非如何無色無漏唯縁自地及上地中對治無漏以爲境界彼所縁者是其縁縁彼不縁者則非縁縁何故不縁下地對治無色心微不能縁下有漏法故亦不縁下有漏對治文任此等解釋無色界無漏心不縁下地能治類智品見如何答見大乘義章金剛三昧義一段解釋述金剛喩定開合辨相土云或復開分爲五十二如雜心論引雜心論無色界金剛喩定縁下地能治類智品道云義故雜心論十中述此義云空處二十八自地苦集八行四空滅諦十六行九地道四行於上滅漸少故隨處滅四識處二十四無所有處二十以無色無法智法智縁欲界故非無色下地行滅縁下地苦非境界故下地對治縁展轉因故文次云或分八十如雜心説引雜心論無色界金剛喩定不縁下地能治類智品道云義故雜心論十中述此義意云空處四十識處三十二無所有處二十四文淨影大師意於雜心論今二説中以無色界金剛喩定不縁下地能治類智品道云義爲所存義故大乘義章九中引今二説畢問問曰無色得縁下地無漏道不答釋言有得有不得義下地道中治下地者無色不縁治於自地及上地者無色縁之空處如是識無所有次第漸滅推之可知毘曇如是也而今此雜心論第二有説當倶舍論第二有説意此義既非正義故不可及會通也故光法師餘處解釋中於倶舍之説判正不云於三説中第三爲正故婆沙二十八評家云如是説者依未至定有百六十四金剛喩定文問虚空無爲可有多體耶答不可有多體也兩方若有多體者見今論餘卷一文云擇滅謂離繋隨繋事各別畢竟礙當生別得非擇滅光法師餘處所引婆沙論三十二中云非擇滅如有爲法數量擇滅但如有漏法數量雖述擇滅非擇滅有多體不云虚空無爲有多體知虚空無爲無多體云事若依之爾者光法師所引婆沙論中述第四解脱所縁云幷虚空若謂一物若謂多物一切皆縁文即云若謂多物知有多體云事加之淨影大師解釋大乘義章三中云虚空最多無一切法文此釋意虚空無爲可有多體見如何答虚空無爲以無障礙爲自性故其體一物無有多體也故見今論餘處一文云於略所説三無爲中虚空但以無礙爲性由無障故色於中行文光法師釋此文引正理論虚空容受色等有爲之文畢云雖言容受而不可説虚空體性在此在彼無方所故如眼識等文光法師餘處二十一所引正理論五十五中云且虚空體適一切處相無礙故説名爲近文虚空無爲無有多體云事此等定判尤分明也但於光法師所引婆沙論若謂多物之文者虚空無爲其體無礙雖無多物諸色等法於中行故其相別異似有多物故就其相云若謂多物也故淨影大師解釋大乘義章三中云但此虚空有體有相體即周遍相則隨色彼此別異故地論言因彼色故種種差別雖約色像彼此別異而不可見故經説爲不可見相文次於淨影大師虚空最多無一切法之釋者虚空無爲無障無礙周遍法界無有邊際故云虚空最多其體一物無有多體故云無一切法也重難云慈恩大師唯識本疏二末中云三無爲法爲體是一爲體是多薩婆多師此有二説一云是一一云是多故今倶破如婆沙第十虚空有二説文如此釋者婆沙論一師意存虚空無爲有多體之義見如何答見婆沙論第十卷文述空無邊處非我行相所縁云幷一切虚空無爲或欲令是一物或欲令是多物此行相盡能縁文此文似述二師異説故釋如婆沙第十虚空有二説歟以實論之或欲令是一物者就體論之或欲令是多物者就相論之更非相違二義也問寶法師意欲界苦集諦所斷遍行隨眠相應識可縁第三靜慮樂根耶答可縁之也兩方若縁之者寶法師解釋中釋有漏樂根五識相應此是欲界苦集諦攝故通苦集所斷識縁不云欲界依之爾者設雖寶法師意何不縁之哉是以寶法師解釋中欲界道諦所斷無漏縁隨眠相應識縁第三靜慮樂根見如何答欲界苦集諦所斷他界遍行隨眠相應識可縁第三靜慮樂根云事性相之所定文理是必然也故婆沙論九十一中出樂根縁識爲相應縛非所縁縛之類云謂三界見道所斷無漏縁及縁樂根欲色界他界地縁遍行隨眠文欲界苦集諦所斷他界縁遍行隨眠相應識縁第三靜慮樂根云事此文實分明也設雖寶法師意豈可違婆沙論説哉但於寶法師解釋者釋樂根縁識十六識内有十二識欲界苦集諦所斷遍行隨眠相應識縁欲界樂根縁識之旨述也云欲界苦集諦所斷遍行隨眠相應識縁欲界樂根樂根縁識之義已聞故不及云其中他界縁遍行隨眠相應識縁第三靜慮樂根歟依欲界苦集諦所斷他界縁遍行隨眠相應識縁第三靜慮樂根十六識内非能縁識可増故也問寶法師意樂根縁識色界滅諦所斷有漏縁無明隨眠可隨増耶答可隨増也兩方若隨増者寶法師解釋中出樂根縁識所増隨眠云色界有爲縁除見滅斷三謂邪見疑無明總二十八隨眠也文如解釋者樂根縁識色界滅諦所斷有漏縁無明隨増不隨増見若依之爾者以道理思此事何無隨増之義哉答第三靜慮滅諦所斷有漏縁無明隨眠相應識縁無爲縁隨眠相應樂根及自類相縁之時可縁有漏縁隨眠相應樂根故是樂根縁識也故望自品相應識可有相應隨増之義望自類相縁門可有所縁隨増之義故樂根縁識色界滅諦所斷有漏縁無明隨眠可隨増云事道理實必然也更不可疑之故婆沙論九十一中出樂根縁識縁識爲所縁縛亦相應縛之類云諸欲界遍行修所斷及色界有漏縁隨眠文既云色界有漏縁隨眠何可簡第三靜慮識滅諦所斷有漏縁無明隨眠哉但於寶法師解釋者暫就不共無明論之歟相應無明從彼所相應隨眠別不論之也問婆沙論中云無色界道諦所斷無漏縁隨眠相應識是樂根縁縁識文爾者縁樂根苦集道類智相應無漏識倶縁之歟答倶可縁之也兩方若倶縁之者婆沙論八十七中述無色界道諦所斷無漏縁隨眠相應識樂根縁縁識相云縁縁樂根道類智品無漏識故文既不云縁縁樂根苦集類智品無漏識故知唯縁道類智不縁苦集類智云事若依之爾者以道理思之無色界道諦所斷無漏縁隨眠相應識縁樂根苦集道類智相應無漏識倶可縁之哉答無色界道諦所斷無漏縁隨眠相應識縁樂根苦集道類智相應無漏識倶可縁之云事道理實必然例證亦在傍故見婆沙論次下之文述無色界道諦所斷無漏縁隨眠相應識喜根縁縁識相云縁縁喜根苦集道類智品相應識故文取意以喜根思樂根其義尤可同哉但於婆