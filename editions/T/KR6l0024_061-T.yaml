雖他身何可縁見惑哉若依之爾者見今論文云於他所起違己見中情不能忍必憎嫌故有餘師説於自見解取捨位中起憎嫌故見諦所斷貪等生時縁自相續見爲境故文寶法師釋此文云若生見斷嗔應如餘師説通生修道嗔亦縁他相續文如此等定判者前師意修所斷嗔煩惱可縁他身見惑見如何答或云修所斷煩惱他身見惑或云修所斷煩惱不縁他身見惑者古來學者之異義也輒難定之但於今論文幷寶法師解釋者非謂修所斷嗔煩惱縁他身所起染汚見今論文意縁他身所起正見違也染汚見起嗔煩惱云也以何知之者正理論五十三中釋此事云於他所起違見生嗔必執我徒憎無我見文顯宗論二十七文全亦同之縁也身所起正見生嗔煩惱之旨此文分明也准之思之寶法師通生修道嗔亦縁他相續之釋修所斷嗔煩惱縁他相續正見生爲言若爾此等定判全非謂修所斷嗔煩惱縁他身所起染汚見也重意云今論非相違二説前師就修所斷嗔煩惱論之後師就見所斷嗔煩惱論之寶法師解釋和會二説之旨炳然也何況正理顯宗兩論之中云或於已見取捨位中必應起嗔憎嫌所捨不置有餘師説之言非別師義云事亦分明歟問頌文云非理作意起説或具因縁文爾者非理作意者染汚作意歟答非染汚作意也兩方若染汚作意者論中由非理作意力煩惱現起見若染汚作意者彼亦可有加行豈無無窮之過哉若依之爾者論中云或有唯託境界力生如退法根阿羅漢等阿羅漢果聖者不起今非理作意見若非染汚作意者阿羅漢果聖者何不起之哉答若泛論之者非理作意之稱可亘染汚不染汚作意故婆沙論九云邪智有二種一染汚二不染汚染汚者無明相應不染汚者無明不相應如於杭起人想等文若就起惑三因之中非理作意云之者是無覆無記作意可非染汚作意既是起惑加行非理作意也何云染汚作意哉是以見今論文云且如將起欲貪纒時未斷未遍知欲貪隨眠故順欲貪境現在前故縁彼非理作意起故由此力故則起欲貪此三因縁如其次第即因境界加行三力餘煩惱起類此應知文光師釋此文云三縁彼非理作意起故即起或前邪相倶行非理作意是能引義乃至既言加行明知前起文既言即起或前邪相倶行非理作意又述既言加行明知前起起或前加行無覆無記邪相倶行非理作意云事此等定判實分明也但於阿羅漢果聖者可起此非理作意云難者爲起惑前加行非理作意故雖其性無覆無記煩惱已斷依身不起之也問品類足論中出欲漏體云謂除欲界繋無明諸餘欲界繋結縛隨眠隨煩惱纒是名欲漏文爾者今此隨煩惱唯限煩惱六垢歟答不限煩惱六垢也兩方若唯限煩惱六垢者隨煩惱言既廣何唯限煩惱六垢哉若依之爾者光法師所引婆沙論中釋此文云隨煩惱者即煩惱垢文如此文者隨煩惱者唯限煩惱六垢見如何答品類足論中欲漏體所取隨煩惱者可通煩惱六垢幷不信懈怠放逸也光法師釋彼論中有漏體所取隨煩惱云各有八隨煩惱謂大煩惱地中除無明取餘五種小煩惱地中取諂誑憍足前爲八文准彼思之欲漏體所取隨煩惱者可通煩惱六垢幷不信懈怠放逸也何況婆沙論中述正義家意云應作是説煩惱垢麁不堅住故不説漏等不信懈怠放逸亦由過輕微故不説漏等文有作是説意異之引品類足論今文爲證欲漏體廣取諸隨煩惱定知不限煩惱六垢亦通不信懈怠放逸云事但於婆沙論隨煩惱者即煩惱垢之文者見婆沙論前後之文問諸煩惱垢何故不説爲漏等耶問難之中唯擧煩惱故答亦隨之云隨煩惱者即煩惱垢也更非遮欲漏體中取不信懈怠放逸歟問欲漏體可取煩惱六垢幷不信懈怠放逸耶進云論疏中不取之見付之煩惱六垢等是既隨煩惱也欲漏體何不取之哉是以品類足論中出欲漏體云謂除欲界繋無明諸餘欲界縛結縛隨眠隨煩惱纒是名欲漏文如此文者欲漏體可取煩惱六垢幷不信懈怠放逸見如何答見本論文云欲界煩惱幷纒除癡四十一物總名欲漏謂欲界繋根本煩惱三十一幷十纒文正理顯宗兩論之文全以同之加之見婆沙論處處之文或釋發智論三漏謂欲漏有漏無明漏之文云謂欲漏以欲界四十一事爲自性即貪五嗔五慢五見十二疑四纒十文或釋發智論三漏中欲漏攝三十一之文云謂攝欲界三十六隨眠中除五無明餘三十一文何況光法師所引婆沙論文有二師異説之中正義家意釋欲漏體不取煩惱六垢幷不信懈怠放逸故云應作是説煩惱垢麁不堅住故不説漏等不信懈怠放逸亦由過輕微故不説漏等文任此等論文欲漏體不取煩惱六垢幷不信懈怠放逸云事尤分明也但於品類足論文者彼論意廣以除無明諸餘欲界有所結縛隨眠隨煩惱纒爲欲漏體不簡性不堅住幷其過輕微之類也故婆沙論有作是説意以之爲證欲漏體廣取煩惱六垢幷不信懈怠放逸也應作是説意異之煩惱六垢麁不堅住幷不信懈怠放逸其過輕微故簡之不爲欲漏體也彼此其意各別也何可和會哉問品類足論意第二靜慮以上可有諂誑耶答不可有諂誑也兩方若有諂誑者第二靜慮以上無諂誑者諸論一同之決判也設雖品類足論意何不存此義哉若依之爾者光法師釋品類足論有漏體中取色無色繋隨煩惱之文意云各有八隨煩惱謂大煩惱地中除無明取餘五種小煩惱地中取諂誑憍足前爲八文如解釋者品類足論意第二靜慮以上可有諂誑見如何答諂誑欲初定者實是性相之所定也設雖品類足論意第二靜慮以上無諂誑可云也但於光法師解釋者爲顯有漏體是色無色界今論之義依八隨煩惱隨其所應通色無色界之意置各言也非謂色界有八隨煩惱無色界有八隨煩惱歟問三漏中有漏體可攝纒耶答可攝纒也兩方若攝纒者見本論文云迦濕彌羅國毘婆沙師言彼界纒少不自在故文婆沙論中云應作是説上界纒少不自在故不説爲有漏乃至我語取文任此等論文有漏體不攝纒見若依之爾者欲漏體既攝纒有漏例可同哉是以品類足論中出有漏體云謂除色無色界繋無明諸餘色無色界繋結縛隨眠隨煩惱纒是名有漏文此文無諍有漏體攝纒見如何答上二界既有惛沈掉擧二纒廣論有漏體之時何不取彼二纒哉是以發智論云有漏色無色界一切隨眠隨増文婆沙論中釋此文云有漏色無色界一切隨眠隨増者謂三漏中有漏通色無色界八地五部有漏無漏縁故有餘所隨眠隨増文若有漏體不攝纒者色無色界滅道不斷邪見疑隨眠何可有漏隨増哉有漏體中攝纒云事此文實分明也但於今論幷婆沙論文者會發智論中出有漏體不擧纒之文上界纒少故不自在故出有漏體之中不擧纒釋也非謂有漏體中遂簡纒故全無相違重意云發智論云有漏攝五十二文婆沙論中釋此文云有漏攝五十二者謂攝色無色界六十二隨眠中除十無明餘五十二文故源自發智論文起有漏體中不擧纒也依之婆沙論中釋發智論三漏謂欲漏有漏無明漏之文云有漏以色無色界五十二事爲自性即貪十慢十見二十四疑八文就之自擧問難云問何故欲漏瀑流軛取亦攝諸纒有漏等中全不攝彼文此問意云以實云之欲漏體取纒有漏體取纒而出其體之時欲漏擧纒有漏不擧纒哉問也欲漏體取纒有漏體不取纒哉不問也故評家答此問云上界纒少不自在故不説爲有漏乃至我語取者上界纒少故不自在故不爲總數出有漏體之中不擧之云也非謂有漏體中實不取纒次下文述出欲漏體本惑五部別説纒五部不別説故云欲界雖多而見所斷不具足故不自在故但總説十纒不別説五部文是亦欲漏體中取五部纒事爲地體見所斷纒不具足故不自在故不別説之爲言如此云故豈欲漏體中不取見所斷纒得意哉准之思之有漏體中取纒事爲地體上界纒少故不自在故有漏體中不擧云也重難云婆沙論文一段聊簡實雖可然猶以難思爲應作是説意有漏體中攝纒云者與初師云有漏乃至我語取中亦攝諸漏品類足論説云何有漏謂色無色界除無明諸餘結縛隨眠隨煩惱纒是名有漏之義有何差異哉答以實云之有漏體中攝纒之意兩師所存全無差異但初師意有漏體中實雖攝纒出有漏體之時暫取勝物不擧少及不自在物之意不顧只無風情云攝諸纒引品類足論文爲證故與正義意異也應作是説意無會初師所證據品類足論文故有漏體中攝纒云事亦分明也問欲瀑流體唯限不善歟答不限不善也兩方若唯限不善者欲漏體既不限不善欲瀑流體例可同哉若依之爾者見發智論文云四瀑流中欲瀑流攝十九文婆沙論中釋此文云謂攝欲界五部貪嗔慢及四部疑文如此等論文者欲瀑流體唯限不善見如何答見本論文云如是已顯二十九物名欲瀑流謂貪嗔慢各有五種疑四纒十文正理顯宗兩論之文全亦同之加之婆沙論中釋發智論四瀑流謂欲瀑流有瀑流見瀑流無明瀑流之文云謂欲瀑流以欲界二十九事爲自性即貪五嗔五慢五疑四纒十文任此等論文欲瀑流體既取十纒故身邊二見相應惛沈睡眠掉擧三類其性亦可有覆無記故欲瀑流體不限不善也故婆沙論中釋發智論謂欲瀑流或不善或無記慚無愧及彼相應是不善餘是無記之文云餘是無記謂欲瀑流中與有身見邊執見相應惛沈睡眠掉擧少分無慚無愧不相應故皆是無記文欲瀑流體通不善及有覆無記云事此文亦分明也但於發智論四瀑流中欲瀑流攝十九之文者此文就勝論之欲瀑流體唯擧本惑之意也就實通論之門欲瀑流體無取十纒事更非所遮故諸論文全非相違也問欲取體中通不善無記類唯限無明一惑歟答不限無明一惑也兩方若唯限無明一惑者欲取體是可廣通不善無記之類何唯限無明一惑哉若依之爾者見發智論文云四取中欲取攝二十四文婆沙論中釋此文云謂攝欲界五部貪嗔慢無明及四部疑文如此等論文者欲取體中通不善無記之類唯限無明一惑見如何答見今論文云即前欲軛幷無明三十四物總名欲取謂貪嗔慢無明各五疑有四幷十纒文正理顯宗兩論之文全亦同之加之婆沙論中釋發智論四取謂欲取見取戒禁取我語取之文云謂欲取以欲界三十四事爲自性即貪五嗔五慢五無明五疑四纒十文任此等論文欲取體中既取十纒故身邊二見相應惛沈睡眠掉擧三類其性亦可有覆無記故欲取體中通不善無記之類總可有惛沈睡眠掉擧二明四類也故婆沙論中釋發智論謂欲取或不善或無記無慚無愧及彼相應是不善餘是無記之文云餘是無記謂欲取中與有身見邊執見相應惛沈睡眠掉擧無明少分無慚無愧不相應故皆是無記文欲取體中通不善無記之類有惛沈睡眠掉擧無明四類云事此文亦分明也但於發智論四取中欲取攝二十四之文者此文就勝論之欲取體唯擧本惑之意也就實通論之門欲取體中兼取十纒事更非所遮故諸論之文全非相違也寫本云康元二年正月十六日酉時於東大寺尊勝院護摩堂南面抄之畢此間披見倶舍第二十卷具書之次或訪明師或任愚案爲開初心初學之慧解聊記一問一答之綱要後學披覽之時必可直其謬也不顧五旬有餘之暮齡猶一部抄出之深志冥衆必垂哀愍善願速得圓滿仰願依此稽古之微功答此慇懃之誠心也一期終焉之暮必遂往生於兜率之秋雲三會説法之曉速開覺悟於龍華之春風而已右筆華嚴宗末葉法印權大僧都宗性年齡五十九夏臘四十七
