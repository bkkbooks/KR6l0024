body:
  text: 倶舍論第二十七卷抄上問論文云如是已辨諸智差別智所成徳今當顯示文爾者能成智與所成徳其體同可云耶答同不同二門可有之也兩方若同者既稱能成智云所成徳明知其體不同云事若夫其體同者何可分能所簡智徳哉若依之爾者凡智所成之徳者不共佛法及共聖共凡之徳是也而論中説不共佛法之徳或結力處非處十業八除滅道定根解界九遍趣九或十宿住死生俗盡六或十智或述四無畏如次初十二七力或判三念住念慧或云大悲唯俗智文擧共聖共凡二徳云謂無諍願智無礙解等徳無爭世俗智乃至願智能遍縁餘如無諍説無礙解有四謂法義詞辨法詞唯俗智義十六辨九乃至通六謂神境天眼耳他心宿住漏盡通解脱道惠攝四俗他心五漏盡通如力文若爾能成之智所成之徳其體同云事偈頌之施設明鏡者歟答凡今宗意談智品不過十智以一切智攝在十智中而能成所成同以智爲體故倶以十智可爲其體也約此門之時所成能成其體同云義可有之也然前後念念不同刹那體體各別也何不云其體是異哉何況餘卷明十智之體故云明諸智差別當卷明十智之用故云明智所成徳然體不必具用故偏説智用必具體故兼説智若爾辨智體之邊是同辨智用之邊是異也故於能成所成有同異二門也其體者世法類四諦他心盡無生是也然末云有共不共等之徳用其用者於彼十智之上有共不共等之徳用之旨成之是當處兩卷之不同也如此得意之時兩方之疑難還爲二義之潤色者歟重難云披餘卷之論判或以十智約四道三道之門判之或以十智就斷惑練根之相談之或以十智望雜修五通之義論之皆是用門更非體門何餘卷唯明體不明用之旨成之哉當卷雖明用門以十智爲本於其上説諸徳故其相不異餘卷之説抑餘卷以體爲正當卷以用爲正之文在何耶又體用之不同如何答餘卷之説相偏明智體更不欲明智用彼於四道三道等之施設者明十智成就不成就及未來修之多少等之時非斷惑練根等之不同者其相難顯故兼明之全非正宗也當卷之所説唯明智用更不欲明智體彼於法類等之施設者爲明用以明體也故是而非正混而不可致難勢次於餘卷明體當卷明用之文者餘卷之初標聖慧忍非智盡無生非見餘二有漏慧皆智六見性當卷標十八不共法謂佛十力等誰上擧用下烈體可云哉自餘廣之委之其旨必然也雖凡體者目自性用者目功能所謂暫十智之體性廣亘三乘無學全不限如來一人而十八不共法唯限佛果不通餘乘如無諍願智四無礙解唯限利根無學不通鈍根無學如漏盡一通唯限三乘無學不通一切有學如五通唯限離欲不通未離凡聖若爾於體用有差異云事必然也何可疑之哉又難云如來成就十智者其體是最勝也獨覺成就十智者其體是漸劣也聲聞成就十智者其體是最劣也故於三乘所成就之功徳有其勝劣何以體性亘三乘以功能分三乘哉准今此道理用勝劣必依體勝劣如云用不離體體不離用若爾體用既一致也何以體爲能成以用爲所成可云哉答此難尤可然但法門之廢立非一准或約實義而談之或約假説而論之則難勢之趣約實義論之故非今談答之趣約假説論之也其假設門者如來所得功徳者隨應一切悉超二乘凡夫之所得如圓暉法師判雖佛功徳超過一切然依類同故説爲共故無諍願智四無礙解等全非三乘共得之功徳勝劣大各別故況於異生所得之五通哉然而以三乘及異生所得功徳隨應名共聖共凡之徳以三乘所得之功徳名共聖之徳此則約實義之時佛所得之無諍願智等不共二乘麟喩所得之無諍願智等不共聲聞聲聞所得之五通等不共凡夫故也爰以名相之同爲由以五通等名共凡之徳以無諍願智四無礙解三明一通等名共聖之徳此則假施之分齊也准之思之約實義考十智體性三乘及凡夫之所得是體體各別雖勝劣不同假施設之時三乘凡夫所應之十智名相皆同故宜云共徳之智故餘卷中約四道三道等明十智成就不成就述彼修不修之時雖十智互相望論其不同更無於一智之上判三乘之差異爰知餘卷之廢立者佛所得俗智與乃至異生所得俗智是同佛所得法智與乃至聲聞所得法智是同乃至佛所得盡智與二乘所得盡智是同佛所得無生智與麟喩及利根聲聞所得無生智是同之旨顯之也此則顯以十智爲體之義故也當卷之廢立者十智體三乘凡夫隨應雖是同於其用者非無差異所謂於十智體之上各暫分三品功用一者上品不共佛法是也二者中品共聖徳是也三者下品共凡徳是也若爾以十智爲能成體以不共佛法等爲所成徳云事炳然也又難云體本無差別用始有差別者是以實相爲體以諸法爲用之宗之所談也今宗體用倶各各別別也何成今義哉答凡雖談三世實有之旨於過未者有體無用於現在者體用倶有也若爾於過未雖有體既無用故如無差別於現在有用故於體亦有差別以之思之何不許體無差別用有差別之義哉況當部宗談四大種之時有體増用増二家之中用増家是其正義也而用増家意於體者雖無増減於用者有増減之旨存之豈不爲今例證哉一義云當處兩卷雖同明十智體用餘卷明因位十智故顯體隱用體順因用順果故當卷明果位十智故顯用隱體用順果體順因故以之爲兩卷之異然用是徳也徳是果也又因是能成果是所成也其旨炳然也可思之尋云只云徳與云功徳差異如何答只云徳者指果用之當相云功徳者借因體之名置果用之上云爾也所以然者爲欲顯此果用酬因依體之理也功者力也可思之一義云以事爲體爲因爲結成瓶衣爲用爲果爲所成以之爲例可測智徳兩法也重意云於智徳二法之上各自分體用因果之義非無之然而今智徳相對論之故非疑況以總合爲所成以別離爲結成可思之加之立名既異也是其證也雖有衆義以後義爲勝但前之義不可遮之問頌文云贍部男佛身文爾者光法師如何釋之耶進云光法師釋之以一句依處依身文付之後有菩薩生贍部州受男身著金剛座成正覺者出處處之論判是以或結從修妙相業菩薩得定名生善趣貴家具男念堅因文或云唯此州中有金剛座上窮地際下據金輪一切菩薩將登正覺皆座此座上起金剛定以無餘依及餘處所有堅固力能持此故文取要之偈頌中何可煩置贍部男之言哉就中云謂佛十力等之時十力以佛身爲所依云事已明也寧可重安佛身之語哉何況上問起之中唯云旦佛十力相別云何唯問功徳體相不問依處依身見如何答粗案六百行之偈頌未見佛果依身在南州之文幷彼依身爲男身之文設雖爲取要之偈頌何不説之哉彼於唯此州中有金剛座等文者是長行之説故全不足爲病於生善趣貴家具界念堅固之偈頌者述因位百大劫間之相貌故爾也何爲違文哉若爾今説不共法之時頌贍部男何足爲疑哉次於謂佛十力等之佛之言者是顯果位非指依身更不可指繁重之難次於且佛十力相別云何之問者設雖問外轉勢頌之更不可有苦諸經論中有其例故又設雖問意廣含依處依身故頌答中明之旨成之可有何相違哉相別云何之言未限一事故可思之問當處付明佛十力相旦初處非處智力一種與後業異熟智力等九種彼此相望時爲開合爲異爲當作用各別可云耶答開合差異可云也兩方若開合差異者凡如來之衆徳皆對諸境施功能設雖十力何不對十種境施十種徳哉是以如四無畏酬答梵士沙門等之四種外難如三念住縁順違倶三種有情住正念正知見相例可同何況若強以開合爲異者宜立初一種不立餘九種或可開餘九種不用初一種十力之廢立量非無用哉若依之爾者光法師所引顯宗論中以開合爲異立十力功徳見如何答凡十力者是十智之體非十智所成之身語二業等故十力中悉所案智之稱也而初處非處智力正以十智爲體而知一切法之上處非處之道理故則得其名若爾業異熟智力等九種皆攝在第一智力中故處非處智力之外有餘業異熟智力等之作用之義全不可有之然開出餘九種智力者只云處非處智之時其相不顯了故爲令其相分明也故光法師所引顯宗論第三十六云知一切法自性功能理定是有名爲處智知一切法自性功能理定非有名非處智此智通縁情非情境與一切智皆不相違恐於略説少功難悟故復此中折出餘九文文意顯也但於如來衆徳對諸境施功能云難者云處非處智力之時總於一切法顯能縁智之功能云業異熟智力之時唯於業果法顯能縁智之功能乃至云漏盡智力之時唯於漏盡及漏盡身顯能縁智之功能若爾縁總別境之諸智各各對總別境顯自功能何於十種智力可有從然之類哉次於四無畏之例難者如來擧無滯語言説諸法覺知之相暢漏盡證明之旨杜煩惱障難之義唱修道出苦之理是皆智所成之徳全非能成智之體何爲相例哉或初正等覺無畏與後漏永盡無畏等亦是開合爲異云正等覺無畏之時攝漏永盡等無畏故然約無畏之外立後三無畏者從初一開後三故也所以然者云能發智之時述初十二七力正等覺無畏以處非處智力爲體乃至説出苦道無畏以遍行智力爲體見能發智既爾也所發語豈不爾哉次於三念住之例難者彼縁順違倶之三境故能縁智亦各別也更不可准例一義云處非處智力唯縁一切法之上處非處之道理不縁彼事餘九種智力各各隨應縁彼事相不縁其道理故第一與餘九作用全各別也但於顯宗論之説者彼爲遣今論之説相故故云故復此中折出餘九也難云處非處智力若不縁諸法事相者何於各各諸法知處非處之理哉答加行縁事根本縁理何相違可有之哉又難云佛不用加行云何答佛不用加行者約大都亦曾二乘之意也依法用加行之義可有之也所謂欲入滅定之時豈不用想心微細心及微微心直入滅定哉問論中明如來身力相擧三師異説爾者以何説爲正判耶進云論中述於所説中唯多應理以第三大徳法救之説爲正見付之披倶舍一部之始末勘大徳法救之所説多是爲不正義是以論心所多少之時存三大地法之義無表及命根假實之時同述假立之旨談中有住時之時説生縁未合中有恒存明三世相之時成轉變之義同數論之計何今至論如來身力之門忽可以彼説關正義哉何況以初二之説擧偈頌之中結身那羅延力或節節皆然於法救之説者全無頌之三師之正不其旨炳然者歟如何答凡至如大徳之集如來所説之苦無常頌以與衆生除樂常見之病苦空無我頌與衆生除我我所之病願行殆等菩薩之化道法救之稱號誰輕之哉就中爲四種薩婆多之第一備大毘婆沙會之證誠有部之爲有部何非彼法基哉爰談如來身力之時論中擧三師異説第一師云佛生身力等那羅延文則釋身那羅延力之頌第二師之有餘師言佛身支節一一皆具那羅延力文則釋或節節皆然之頌今此二師之説倶存於如來身力有邊量之義全不違道理第三之大徳法救説諸如來身力無邊猶如心力若異此者則諸佛身應不能持無邊心力文既存道理尤足爲正義故光法師釋云於所説中唯多應理者上來總有三種説如來身力論主評取法救所説故言於三説中唯多應理正理顯宗亦同此説文但於今論處處説者爲顯義多途尊者法救於婆沙會中擧違有宗本義之説今論隨而爲立正義故引彼擧之以邪義少相父爲由勿疑正義次於偈頌中不擧之云難者初二師之説爲有宗之本義故偈頌中擧之法救之説非本義故偈頌中不擧之可云也豈無其謂哉例如餘處論中以互爲果釋倶有因者有宗之古義故偈頌中擧之以同一果釋倶有因者非有宗之古義故不擧之偈頌中然論主以同一果釋倶有因是順理之旨顯之也重難云佛者覺也覺者在心非身而十力等是心品非身體心力設雖無邊身力何可無邊哉答欲色二界人者以色身爲所依能發起心品所依色身若劣之時能依心品隨而是劣也例如以肉眼爲所依之眼識不能縁被障細遠色以天眼爲所依之眼識能縁被障細遠色加之餘處論中云唯此州中有金剛座上窮地際下據金輪一切菩薩將登正覺皆座此座上起金剛喩定以無餘依及餘處所有堅固力能此故文准例可思之尋云唯多道理之多言如何答顯無量無邊義也問論中明身力體擧二師異説爾者初師意如何釋之耶進云論中出初師之説云如是身力觸處爲性謂所觸中大種差別文付之今此師意云有一類勝大種得力之稱也凡建立大種者爲造所造色也而有不造所造色之一類大種云事豈不違極成之道理哉是以婆沙論中云以非現在大種無果故文如何答凡身力者欲色界有情之所成就也故是色法非非色被得於色法中非五根四境及無表色云事亦理在絶言若爾以觸處爲身力體云事必然故所結此觸處爲性也而於觸處能造所造相分其今此初師意云以能造大種爲身力體然五根四境及輕重滑澁冷飢渇等之能造大種各各皆造所造色故其力羸劣也不可以之爲身力體故別建立不造所造色之一類勝大種則以之爲身力體爲言故光法師釋云此中多説一説是所觸中大種差別若大種勝即名爲力異餘大種故名差別文但於爲造所造色建立大種云難者誠雖難知倩案此師意一身倶生大種無量無邊中多方造所造色少分不造所造色之類有之可有何失哉爲言例如光法師餘處解釋中述等流既容現在獨住異熟容有何理能遮於現在既有等流異熟二類大種獨住之義爲身力之大種於現在有獨住之義有何理可遮之哉次於婆沙論文者從多分説之義可成之也所以然者光法師餘處解釋中於別解脱初念倶生大種作一具二具多具之三解之中之有二具大種云第二釋意會今此婆沙文云從多分説故云據造有對故之二釋亦作之其中以從多分説故之會通憑誠證故也重難云今會婆沙文之趣雖順光法師餘處從多分説故之釋違據造有對故之釋如何答從多分説故據造有對故已及二釋若爾存從多分説故之釋之日何以違據造有對故之釋爲病哉尋云此師意何以所造觸不爲身力體耶答滑澁冷飢渇之非身力體其理必然也諸論諸師不云以五種爲身力體輕亦爾也於重者雖有異説不同大種之是強故不存爲身力體歟問論中明身力體擧二師異説爾者第二師意如何釋之耶進云論中出第二師之説云有説是造觸離七外別有文付之披餘處論判或結觸十一爲性或云觸界中有二文明知輕重滑澁冷飢渇七種觸之外無所造觸云事離外別有云説豈不殘疑哉若夫強有其體者爲是大種所造爲非大種所造若是大種所造者有何大種造之哉若非大種所造者何得云所造觸哉況婆沙論亦非現在所造色無因故之文如何可消之哉若又輕重能造大種兼造之者所造觸互可爲倶有因豈不招有對造色展轉爲倶有因之過哉答光法師釋今此第二師之説云有説力是所造觸離七別有力觸此非正義文既爲不正義何足立義通難哉問光法師釋如是身力觸處爲性謂所觸中大種差別論文作或云有宗義或云經部義二解釋爾者以何釋爲正判耶進云光法師釋云論主意朋經部故叙彼宗此解似勝文付之依解釋案論文述此觸處爲性之頌文長行中擧二師之説而於觸處中能造所造相分初師簡所造取能造第二師簡能造取所造此則大種造觸對望互取捨之見明知二師説倶有宗義云事若夫初師之説是經部義非有宗義者宜偈頌之外設別義既爲釋偈頌之一説寧可關經部之義哉何況正見光法師所引婆沙論之文解身力體總擧五師異説而今論初師同婆沙初説此論第二師説同彼論第四説見明知取彼初説置此初師云事若爾光法師以今論初師存經部宗義豈不違此等文理哉答偈頌中或云此上十七處或云像實有不成或云感劫生天等或云後色起從心等此皆擧經部宗之義者正出圓暉法師之所判若爾此觸處爲性之頌文設雖直擧經部義之旨成之何強病之哉況向頌文之時更不云擧經部義至長行擧二師異説之中先成初見是爲有宗之義旨畢剩設釋之時以初師亦爲經部義之由成之何可背道理哉就中彼部意以能造觸許實有以所造觸存假立而初師既云謂所觸中大種差別豈不關經部之義哉但於故叙彼宗此解似勝之正不者雖文無簡別採論主意判爾歟被得何爲強疑哉次於今此初師當婆沙論初師之説云難者光法師初釋意則存此意故彼釋云倶舍初説當婆沙初説文至第二釋始作是經部義云釋可有何失哉問光法師釋根上下智力根言作二解釋爾者第二釋意云何釋之耶進云光法師第二釋云或目意等文付之凡根上下智力者目如來之知衆生利鈍之智品尤可目信等五根也何可目意根等哉是以初釋意及顯宗論之説以根之言目信等五根見如何答云根上下智力之時根之言專順信等五根故顯宗論則顯此意述此中根名爲目何法謂目信等光法師以此文爲依憑作初釋云知信等根上下差別名根上下智力文然而根之言未限信等亦通意喜樂捨三無漏等故兼作此釋歟然於此等諸根非上下差別何爲強疑哉問於死生智力根本攝天耳通可云耶進云光法師所引顯宗論中述神境天耳設在佛身亦無大用故不名力不攝之見付之天眼通雖唯縁現在不縁未來引起縁未來之眷屬通故名之死生智力准例思之天耳通設雖縁現在不縁未來若引起能縁未來之眷屬通者何不立死生智之稱哉依之廣考諸經之所説或説若佛不出世間一切有情受大苦即無人天雖惡趣但聞種種苦音聲或云八百眼功徳千二百耳功徳文准此等之金言天耳通猶勝天眼通被得而以天眼通號勝立死生智力以天耳通稱劣不立死生智力豈不違此等文理哉答此事雖非捨疑誠所可思有之歟所謂眼根之見色是方明故後起意識隨而明了也耳根之聞聲是暗昧故後起意識隨而昧劣也天眼天耳之見色聞聲准例而可知者歟如外書中云千聞不如一見良以天眼通前起照善根惡趣死此生彼之有情眷屬通後起知隨業所感勝劣醜好之異熟此是雖不聞聲見道了之天耳通雖聞聲不見色故爲此之相不分明故無別建立眷屬通仍所不立力也但於一經之説者雖不分明宜亦云但見種種苦邪相然不云者略故爾也或影略之次於一經之説者是他宗所依之經文非當部所宗之經説何足會之哉鼻舌身三根取被障細遠之香味觸三境之旨談之豈性相之所談哉問以天眼他心宿住漏盡四通爲十力攝可云耶答可爲十力攝也兩方於爲十力攝者凡十力者不共佛法之隨一也而彼天眼等四通者爲共聖共凡之徳體寧可得相攝哉是以披今論文云十八不共法謂佛力等乃至復有餘佛法共餘聖異生乃至通六謂神境天眼耳他心宿住漏盡通文若依之爾者光法師所引顯宗論中云此後三力即是三通以六通中此三殊勝在無學位立爲三明在如來身亦名爲力乃至然不別説他心力者義已攝在根等力中以他根等中有心心所故文如此文者十力中攝天眼等四通見如何答此事誠以難知暫迴暗推十力中前七力自元不共二乘凡夫故得不共之稱故不足爲疑於後三力及他心通者雖爲六通之攝任圓暉法師雖佛功徳超過一切然依類同故説爲共之解釋佛所得六通既非二乘凡夫之境界以何知者運身勝解之二通猶及他三千界超二乘等之分域況於意勢通哉故神境一通宜云不共於天眼天耳二通者横見聞無量世界其旨同前他心通等於二乘等者有上故不知上心有二千三千之堺畔故不知三千無數之人心於如來者無上故無不知上心二千三千堺畔故知無數世界之人心於宿住死生之二通者二乘等者竪知過未八萬劫事如來者知過未無量劫事於横竪既超二乘分齊豈不得不共之稱哉強攝之爲十力之攝者不共法中未明三世及他心了達之智故攝之十力以所爲不共法之體也又強攝之力者爲滿大數也或約多分以爲不共之義可有之也但於今此四通爲共聖共凡之徳云難者六通之時雖爲共聖共凡之徳既約用之無礙改名於十力之上者更不可致此難勢次於論文之前後者併顯上所成之意故宜云誠證何爲違文哉問宿住隨念智力通四念住可云耶此事至下帖可悉之仍第二重等略之問死生智力通四念住可云耶進云光法師所引婆沙論中云死生智力唯身念住文付之死生智力縁一切有情未來善惡二趣苦樂等事豈不通四念住哉若夫強限身念住者寧可縁未來有情同分命根苦樂憂喜等之事哉若不縁云者何得爲衆生説未來事令生欣厭心哉答此事誠難測然而暫可存通四念住之義也其旨則如難勢但於進釋者死生智力以天眼通爲本而引起縁未來之眷屬通以立其名故眷屬通別縁四境之義有之故雖通四念住根本通唯縁現在有情諸色故約本以限身念住之旨成之也故今論中云非天眼通能知此事有別勝智是通眷屬依聖身起能如是知是天眼通力所引故與通合立死生智名文何可爲相違哉問論文云如舍利子捨求度人不能觀知鷹所逐鴿前後二際生多少等文爾者知過去八萬劫事者爲宿住通力爲當願智力可云耶答雖有所可思暫可存願智力之義也兩方若宿住通力者凡宿住通者唯縁曾所領受之境不縁未曾領受之境如今論述諸所憶事要曾領受憶淨居者昔曾聞故婆沙論云雖未曾見五淨居事而曾聞故亦能憶知而彼過去八萬劫鴿鳥之事者全非身子尊曾所領受之境寧可云宿住通之所知哉尤可云願智之所知也是以知未來八萬劫鴿事者由願智之力見若依之爾者光法師所引智論中釋此事云舍利弗即時入宿命智三昧觀見此鴿從鴿中來如是一二三世乃至八萬大劫常作鴿身過是已往不能復見文如何答見今論當卷之下文偈頌結願智能遍縁長行云以願爲先引妙智起如願而了故名願智文舊倶舍論第二十卷云願智亦如此但縁一切境文雜心論第六云妙願知亦在第四禪是有漏依三方不動者得如願而知故説願智欲知而知是其事也成實論第二十四云願知者於諸法中無障礙知名爲願知文攝論十四云論曰無功用無著無礙恒寂靜釋曰此中偈時願知於三世一切事欲知爲願於三世境如量能知文准此等自部他部大小二論之所説願知能知爲無爲漏無漏過現當曾所受未曾受自他身情非情色非色心無心蘊處界自共相等之境都無所不知被得然身子生三洲爲第六種姓波羅蜜多之聲聞無諍願智四無礙解邊際定等之功徳悉成就之而彼鴿鳥事既非曾所領受之境尤起願智可知之也若非願智者以何智可知之哉然則知未來之時用願智知過去之時用宿命智豈可然哉其旨且如一方之難勢但於大智度論之説者誠以難知倩案之靜測之只是於知過去事之願智之上立宿命智之名被得所以然者知過去之願知與宿住通其相頗相似故也是以披婆沙論百七十九卷宿住隨念智與縁過去之願智相對以顯其差異他心智與縁現在之願智相對以顯其差異亦繁故不引之全文後學必悉之若爾智論文非強相違者歟重難云若於知過去之願智之上立宿住隨念智之名者宜於知未來之願智之上立死生智之名既不爾以知過去之智名宿命智以知未來之智名願智明知宿住通直知過去鴿鳥事云事如何答死生智是天眼通之眷屬非六通之攝既非根本通故不以死生智之名立願智之上歟可思之問論文云如舍利子捨求度人不能觀知鷹所逐鴿前後二際生多少等文爾者知未來八萬劫事者爲死生智力爲當願智力可云耶答是願智之力非死生智之力可云也兩方若死生智之力者光法師所引智度論中云舍利弗即入願智三昧觀見此鴿一二三世乃至八萬大劫未脱鴿身過是已往亦不能知文如此文者是願智之力非死生智之力見若依之爾者身子既爲無學聖者具足三明死生智明除未來際之愚尤以死生智可知未來八萬之鴿事何可借願智之力哉若夫強以願智知之者成就死生智豈非無用哉答此事極有委曲所謂死生智通與天眼通合立故必前起天眼通見被障細遠等有情色身然後起死生智以觀諸有情修因感果善惡二趣死此生彼等事也故若不起天眼通者更不可起死生智之義其旨必然也而今身子親以肉眼見鴿鳥故全不及起天眼故欲知此鴿鳥未來事之時直入邊際定終起願智照鴿鳥死此生彼之相也故智度論入願智三昧觀見此鴿一二三世乃至八萬之決判存此道理尤是爲指南者歟如此成之時難勢更不可來也問於聲聞乘人有二生得脱類可云耶答不可有此類也兩方若有此義者披餘處之論判偈頌結前順解脱分速三生解脱長行云極速三生方得解脱謂初生起順解脱分第二生起順決擇分第三生入聖乃至得解脱文無二生得脱之義之事誰可疑之哉若依之爾者聲聞之種類分萬差修行之長短非一准何無此類可云哉是以初生起順解脱分第二生斷欲界煩惱依根本地順決擇分之人今生何無入聖得果之義哉若許此義者可有二生得脱之類云事其旨實炳然也依之光法師今解釋中釋如舍利子捨求度人之論文上述舍利子等觀知此人八萬劫來未種解脱分善後佛來見度令出家説法獲果佛告彼曰定光如來臨欲命終欲稱彼佛名號忘而不憶乃云南無城中欲所迎者即名種順解脱分善文准今釋無央數劫之前以稱南無爲順解脱分善根今遇釋尊起順決擇分入聖得果被得若爾何不云聲聞乘中二生得脱之類哉答凡極速三生極遲六十劫者聲聞善根成就圓滿之時量法爾必然不増不滅之道理也故光法師餘處解釋中云聲聞三生獨覺四生非要利根亦通鈍根若極利者要經六十要經百劫文更不可疑之但於聲聞之種類非一准等之難者上窮六十劫下在三生是其施設也中間多少亦而可知者歟次於初生起解脱分第二生依根本地趣決擇分等之難者此則正理論餘處文救云若依根本起煗等者必於前生已起煗等故不與前文相違亦復無有減三生失文文意顯也何及再釋哉次於光法師今解釋者此亦光法師自問難之趣也故彼釋彼亦曾起順決分善故於今生入聖獲果文可有何相違哉重難云此人昔奉遇定光如來唱南無之生是解脱分一生也今奉値釋迦如來得聖果之生是得脱之一生也若爾初後合論只是二生更非三生光法師何會之云彼昔亦曾起順決擇分善哉如何答昔初得順解脱分之生與今入聖獲果之生其中間既過八萬劫及無量劫故其昔何不起順決擇分哉云推釋歟尤難審定可尋之尋云既云聲聞極遲六十劫何初得順解脱分之後經無央數劫入聖得果耶答此亦光法師之問答也故疏主問聲聞極疾三生極遲六十劫如何八萬劫不入聖耶解云三生六十據相續修若有間斷無妨多劫文問今論意判四無畏以何爲體耶進云頌文判四無畏如次初十二七力正等覺無畏以十智爲體漏永盡無畏以六智或十智爲體説障法無畏以八智爲體説出苦道無畏以九智或十智爲體見付之凡四無畏者如來對梵士沙門等不怯懼他摧破外難之功徳也尤可以如來無滯之言説爲其體何以諸法類四諦等諸智爲體可云哉若夫強以智爲體者爲言説之能發故宜以俗智爲體更不可關無漏智者哉依之披長行之説云理實無畏是智所成不應説言體即是智文如何答偈頌雖擧唯以智爲體云師之説至長行出二師之説初師則與偈頌是同則可有宗之本義第二師則論主之正説也難勢所擧之文是也故光法師釋此文云理實無畏至體即是智者論主解理實無畏是智所成智即是因無畏即是果不應説言實體即是智文文意顯也何及再論哉若爾進之釋既爲別師之説勿以論主之正解意難之若以初師意通難勢者無漏智與無畏言説爲遠因等故俗智與彼言説爲遠因等起故十智皆因等起之體也然於因之上立果之名故也以智爲無畏之體爲言歟例如餘處論中云應言如轉心表成善等性然非如彼見斷轉心修斷轉心爲有漏也重難云餘處頌文云無漏異熟非文無漏智豈遠因等起之攝哉答雖簡近因等起不簡遠因等起可云也問光法師解理實無畏是智所成不應説言體即是智之論文作二解釋爾者第二釋意如何判之耶進云又解論主叙經部解離智有無畏體性是何正理若言離智別有其體是何文付之今此論主之解意對上述故無畏名目諸智體唯以智爲無畏體之師以顯以智所成之言説爲無畏體云義也尤是有宗之義可非經部之説若夫強成經部宗之義者彼部意存表業以思爲體之旨何可還簡智取語哉若如此者與初師無有差異寧云爲二説之不同哉答問諸佛利他益必同可云耶進云論中述三由利他等究竟故必同見付之於諸佛壽量既有多少不同利益他隨而可不同何可判等究竟故哉答預諸佛化導聞聖教説者必隨應證得三乘菩提更無空其益者名之等究竟歟被得故光法師釋云三由利他所化有情等究竟故文退見下論文云如薄伽梵自説頌曰若於佛福田能殖少分善初獲勝善趣後必得涅槃文若爾勿就有情多少致難勢矣問諸佛因位必修百大劫行可云耶答必修之可云也兩方若必修之者見今論文答諸佛相望法皆等不之問偈頌結由資糧法身利他佛相似長行云由三事故諸佛皆等一由資糧等圓滿故文光法師釋之云由三事等一由三無數劫福徳智慧二種資糧等圓滿故文如解釋者雖必修三祇行不必修百劫行見若夫必修之者何不與三祇修行同擧之哉答於百大劫修行者雖自他部異論也有宗一家意與相好圓滿必修之見是以披餘處論文云從修妙相業菩薩得定名生善趣貴家具界念堅固贍部男對佛佛思思所成餘百劫方修各百福嚴飾文若夫有不修之菩薩者於果位可有相好不圓滿之佛豈圓滿徳本意哉何況披同論判述釋迦菩薩超劫之相云諸佛因中法應如是唯薄伽梵精進熾盛能超九劫九十一劫妙相業成文諸佛因中法應如是者一切菩薩三祇修行之後修百大劫行爲相好業是法不改之軌則也爲言餘文可知但於光法師今解釋者三祇之行與百劫行相望之時三祇是其本百劫是其末也所以然者佛果者目智斷恩之三徳以其智徳斷徳爲自利之徳以其恩徳爲利他徳若無智慧者自利徳何得成乎若無福徳者利他徳寧可具乎而三祇之間專行福徳智慧二種資糧豈非菩薩根本之要路哉餘處論判中述菩薩要經三劫無數修大福徳智慧資糧六波羅蜜多百千苦行方證無上正等菩提則此意也於相好者雖生儀智凡情之愛樂遂施見者無厭之功用更非自行化他之直道何比之福智之二門哉故今擧爲本之三祇修因不云百大劫之行也或於三祇修行者諸佛因中必終其功更不滅也於相好業者諸佛多分雖滿百大劫釋迦菩薩一人超九劫行九十一劫滿不滿不齊故云由資糧法身利他佛相似之時不擧相好業也或云由資糧法身云一由資糧之時云資糧者自本指三祇之行不指百劫之行何足爲疑哉尋云六度行者限三祇歟通百劫歟答自初發心至最後身修之如餘處論文問論文云如來三種圓徳文爾者如何烈之耶進云論中云一因圓徳二果圓徳三恩圓徳文付之於第二第三兩種圓徳者尤可謂如來之所具於初因圓徳者是菩薩之妙行非果位之具徳何乍表如來二徳忽可烈因位之所行哉若夫強烈之者豈不招因果雜亂之過哉答此事誠以難思暫迴愚推云凡圓徳者源目佛果之功徳如餘處論判中云佛無一徳由加行得暫起欲樂現在前時一切圓滿隨樂而起故佛衆徳皆離染得然以無餘長時等之四修名圓徳者於因之上立果之名也故以菩薩所行之四修名因圓徳而今擧如來所具三種圓徳之中烈因圓徳者遵更取因體備果徳也所以然者若不修因行者不可得果徳有果徳者依因行故也重意云圓徳之因故因之上立果之名以名因圓徳是一重依主釋也又因之圓徳故果之上立因之名以名因圓徳是第二重依主釋也例如法之對故淨慧之上立法之名以名對法是一重依主釋也又對之法故四諦涅槃之上立對之名以名對法是第二重依主釋也如此得意之時義通結成難勢亦被遮問光法師釋智圓徳中一切智一切種智不同作三解釋爾者第二釋意如何釋之耶進云解釋中云或一切智知諸法自相一切種智知諸法共相文付之一切智形理一切種智形事者大小常途之施設也尤可云一切智知諸法共相一切種智知諸法自相也是以於初後兩釋者存此旨見加之緣一切法之無差別共相故只云一切智不云一切種智緣一切法之差別自相故名一切種智不名一切智被得例如不知見修所斷諸境名諸冥不知微細差別一切法名一切種冥則可謂斷諸冥得一切智斷一切種冥得一切種智者哉答凡體順理用順事故初釋意以體用分二智第三釋意正約理事以顯其差異是則約多分就大都如此判也第二釋意異前後兩釋以自共二相如次分一切智一切種智此是設雖一切智何隔事哉設雖一切種智豈忘理哉爲言是以光法師餘處解釋中云迷自相迷共相是染汚無知文染汚無知既迷事不染無知豈知理哉然則見所斷中重迷惑再修所斷惑皆緣自相法見諸冥既迷自共一切種冥何不爾哉諸冥一切種冥既爾也一切智一切種智相翻而可知如此得意之時第二釋意斯顯諸難勢悉被會者歟問論文云斷圓徳有四種一一切煩惱斷二一切定障斷三畢竟斷四幷習斷文爾者光法師意一切煩惱斷者爲唯限自性斷爲當通緣縛斷可云耶答可通自性緣縛二斷也兩方若限自性斷者一切煩惱斷之言是廣何限自性斷可云哉是以披光法師當解釋述今此四斷文之時於後三斷者擧非擇滅爲其體更無出緣縛斷還知初一切煩惱斷攝自性緣縛二斷云事若夫不以緣縛斷攝初一切煩惱斷者何不彼攝後三斷哉若依之爾者光法師餘處解釋之中引今此四斷之文釋斷徳相之時作三解釋之中第二第三多釋之意同後三斷中皆唯擧擇滅不擧非擇滅定是初一斷唯攝自性斷無爲後三斷兼攝緣縛斷無爲歟被得如何答既言一切煩惱斷定是自性緣縛二斷倶可攝之被得若夫唯限自性斷不通緣縛斷者一切之言如何可得之哉是以光法師今解釋中於斷圓徳開四種之時以擇滅爲一切煩惱斷之體以非擇滅爲一切定障斷等之體餘處解釋中初釋意總以一切擇滅非擇滅爲斷徳之體明知兩處所云也擇滅者不限自性斷無爲兼取緣縛無爲云事若今此擇滅中唯攝自性斷不攝緣縛斷者於如來斷圓徳可有闕減之義若有闕減之義者圓之言豈非無用哉故當卷之解釋云二斷圓徳復四種一一切煩惱障斷得擇滅二一切定障不染無知斷得非擇滅三即前二障斷已不退名畢竟斷簡異鈍根四不但斷煩惱幷煩惱習氣亦斷簡異二乘文餘處之初釋云斷徳從強擇滅爲體若據其兼通非擇滅故不相違文然當卷之一段與餘處之初釋是開合之異也則當卷開餘處之斷徳以爲四斷餘處合當處之四斷以爲斷徳所以有開合者當處對開餘處之智徳以爲四智故開餘處之斷徳以爲四斷也餘處對合當處之四智以爲智徳故合當處之四斷以爲斷徳也又所以當處加圓之字餘處略圓之字者當處顯擧衆徳而具之義故云圓餘處只談三徳不論衆德故不云圓也次於餘處第二第三之兩釋者其意異當處之一段與餘處之初釋所謂不染無知障智徳染汚無知障斷徳故斷不染無知則得智徳斷染汚無知則得斷徳也然云其二無知之斷其體不同也不染無知斷以非擇滅爲體染汚無知斷以擇滅爲體爰以斷徳唯以擇滅爲體不以非擇滅爲體云事此則依第一卷之論文會第二十七之文也故餘處第二第三之釋云又解斷徳唯以擇滅爲體然有定障等擇滅不顯定障等若無擇滅即顯能顯斷故名斷圓徳又解彼文四斷皆是擇滅若煩惱斷是自性斷緣縛斷若定障斷再習斷是緣縛斷若畢竟斷通自性斷緣縛斷第二釋意云非只不染無知及習氣障定根解脱等功徳染汚無知緣縛亦障定根解脱等功徳故菩薩金剛心位非只斷不染無知兼斷染汚無知故初盡智位佛得勝定勝根勝解脱等之功徳也其中不染無知斷非擇滅之體染汚無知斷是斷徳體爲言第三釋意云前斷徳分爲二斷一自性斷二緣縛斷也二十七卷開四斷顯二斷具不具也爲言重意云第二釋意雖顯斷徳唯以擇滅爲體之義未分自生緣縛二斷第三釋意顯斷徳唯以擇滅爲體之上顯二斷不同示四斷通局也如此成之時當處餘處之廢立悉顯兩方邊邊之難勢皆被會乎重難云就當處餘處之釋疑端是多然而大都被會之仍擱之但不審之所未開者若於一切煩惱斷悉攝自性緣縛二斷者於後三斷更不可攝緣縛斷若於後三斷攝緣縛斷者於初一斷不可攝緣縛斷云事必然也雖然有定障等擇滅不顯定障等若無擇滅即顯之釋甚難思定障等是不染無知之所攝非染汚無知之所攝何據定障等有無可論擇滅顯不顯哉次以煩惱縛用名定障根障等之事甚不可然煩惱縛用是煩惱障非定障等又是染汚無知非不染無知若以煩惱縛用爲定障等者煩惱障定障等而致混亂染汚無知不染無知方爲一致豈非亂一宗之性相哉答緣縛斷之種類非一准或在自相續他相續或在色不相應行或在善無記法或在心心所法其中以不染無知之上緣縛斷及習氣之上緣縛斷隨應後三斷中攝之以其餘緣縛斷總悉初一斷中攝之何爲強疑哉次以煩惱體名煩惱障以此之上擇滅名自性斷例之思之以煩惱用之縛勝定勝根勝解脱等名定障根障解脱障等以斷此障所得之擇滅名緣縛斷云義何無之哉然此用是數習煩惱之氣分也豈不得云習氣哉若爾就有定障等擇滅不顯定障等若無擇滅即顯之釋何無其謂哉或以不染無知之上緣縛斷無爲爲一切定障斷體以習氣之上緣縛斷無爲爲幷習斷體又以煩惱之上自性斷無爲與定障根障等之上緣縛斷無爲爲畢竟斷以習氣之上緣縛斷無爲爲幷習斷之義可有之也次煩惱體不縛定根等彼用能縛之故名之定障等斷之得擇滅也不染無知與習氣不縛定根等不隱定根等故雖不斷之得擇滅雖斷之不得擇滅之義有之名雖同義是異也何可致混亂哉又能順餘處第二釋之文相者哉此事重能能可案之問論文云斷圓徳有四種一一切煩惱斷二一切定障斷文爾者今此定障體光法師如何釋之耶進云光法師釋云不染無知文付之依光法師今解釋考餘處之定判云不染無知劣慧爲體文准例思之定障宜以劣定爲體被得何可判不染無知哉依之正見下解釋云此中亦應別説斷根障等言斷定障影顯可知以類同故或略不説文若爾今解釋非只背道理專違自定判如何答凡慧心所可知諸境之法也然劣慧不知之故名之無知其體非煩惱故名不染故總名之不染無知也故圓暉釋云不染無知劣慧爲體三性門中善無記攝體非煩惱故名不染於境不悟稱曰無知文此是光法師餘處之定判之意也故不染無知是勝慧之障也名勝慧於覺覺是佛果也所以菩薩金剛心位斷不染無知初盡智位成佛果也以之思之定障者以劣慧爲體能障勝定根障者以劣慧爲體能障勝定信進念慧如此乃至劣勝解障勝勝解名之解脱障及有心劣定障滅盡定慧名之解脱障如此一切也准例而可知如此一切之劣心心所總以名習氣故習氣是廣不染無知是狹所障之勝慧是功徳之最長能障之不染無知是習氣中之最長也故今擧習氣之最長故云不染無知實非定障之體也定障與不染無知其相相似類同故云定障不染無知也則是擧二類更非擧一類故光法師下解釋爲顯此意判此中亦應別説斷根障等言斷定障影顯可知以類同故或略不説也若爾難勢還爲答之潤色者歟問論文云斷圓徳有四種乃至二一切定障斷文爾者今此斷體光法師如何釋之耶進云解釋中云非擇滅文付之設雖定障設雖不染無知宜帶緣縛斷無爲尤以擇滅爲體可云哉是以光法師餘處所引正理論中云不染無知雖復三乘同斷緣縛文依之光法師同釋斷徳體之時引當處四斷之文作三解釋之中第二第三之釋意以緣縛斷無爲爲斷徳體見云非擇滅之釋非只背文理似違自定判如何答光法師當處釋斷圓徳四種之一段與餘處釋斷徳體之初釋同以擇滅非擇滅爲其體故當處四斷之體隨應或是擇滅或是非擇滅也其中云佛之斷定障不染無知等之時約非擇滅談之不約緣縛斷論之所以然者約緣縛斷論之時三乘皆斷之故佛徳未顯約非擇滅云之時如來獨得非擇滅故佛徳斯顯故今明斷圓徳四種之時出一切定障斷體用非擇滅尤有其謂者歟如此得意之時光法師餘處所引正理論文自被會者歟彼二乘中於金剛心位於不染無知少分得非擇之類雖有之是少分非全分故餘處解釋中云不染無知右菩薩三無數劫隨位漸斷至金剛喩定方總斷盡若二乘等雖有分斷而非斷盡文但於光法師餘處第二第三之釋者自本異當處之一段與餘處之初釋成四斷體唯限擇滅不通非擇滅之旨故云爾也何不辨解釋之不同混而可致難勢哉問論文云斷圓徳有四種乃至四幷習斷文爾者光法師意於習氣有別體可云耶答可有別體也兩方若有別體者光法師今解釋中述幷習斷之相云惑之習氣無有別體文如今此釋者無別體被得若依之爾者披光法師餘處之解釋云正理意説不染無知劣慧爲體無知狹習氣寬然解習氣二解不同一解劣慧倶生心心所法總名習氣一解習氣不但通心心所法亦通相續身文如何答於習氣可有別體云事如一方之難勢重披同下文云或名習氣故正理云此不染無知即説名習氣言習氣者習謂數習氣謂氣分有諸煩惱及劣智等數習氣分故名習氣習之氣分故名習氣依主釋也又解即習名氣有諸煩惱等所習氣持業釋也文誰可疑之哉但於當處之解釋者定障根障解脱障不染無知等習氣皆悉第二斷之中擧之盡故云第四斷之時上所云之定障根障等之外別可擧之習氣之體無之爲言更非謂總於習氣無其體何來爲難勢哉重難云總合第一一切煩惱斷與第二一切定障斷爲第三畢竟斷全不云無別體而明第四斷之中習氣之時始云無有別體明知於習氣者總無別體之義存之云事答總以煩惱障之上之非擇滅爲第三畢竟斷體之中定障之上之非擇滅第二斷定障非擇滅之外雖無其體初煩惱障之上之非擇滅始爲之畢竟斷體故第一一切煩惱斷之擇滅體之外有別體故類之擧第三斷故不云無有別體也何無其謂哉故光法師明第三斷之相云三即前二障斷已不退名畢竟斷文於第四幷習斷者其相更不超第二斷之分齊故釋無有別體何無其謂哉問論文云斷圓徳有四種乃至四幷習斷文爾者光法師意於今此斷有別體可云耶答可有別體也兩方若有別體者光法師今解釋中明幷習斷之相云但習無時説名爲斷斷無別體文文相云起盡無爭無別體被得若依之爾者以擇滅攝斷圓徳者光法師當處之定判餘處之解釋之所顯也設雖習氣之上之非擇滅何不得爲斷圓徳之體哉答於幷習斷可有別體云事更不可及異論其旨如一方之疑難但於光法師之解釋者於之可有二意也所謂習氣上之非擇滅第二斷之中攝之畢故第二斷非擇滅之外無別體爲言或煩惱無之時必擇滅顯故以彼擇滅則爲斷之體也而擇滅雖與煩惱爲所覆不與習氣爲所覆故習氣無之時無擇滅顯故云但習無時説名爲斷斷無別體也然非擇滅非習無之時始顯習氣緣闕之時得之也是以菩薩自煗善根初念或不淨觀雖不起習氣無得非擇滅至金剛心位彼緣闕故始得之也或佛果位雖無習氣及習氣得無有替處之擇滅故述但緣習無時説名爲斷斷無別體也是無其謂哉問光法師當解釋中云又准此中所明斷徳通於二滅或正斷徳唯是擇滅若據兼説通非擇滅此文斷徳據正及兼故通二滅前明斷徳據正以論故唯擇滅文爾者於今此文中爲有二釋爲當如何答有二釋可云也兩方若有二釋者云又准此中等云或正斷徳等述若據兼説等述前明斷徳等各皆顯別意趣見若爾有四釋歟被得或判又准此中等或或正斷徳等云前明斷徳等故有三釋見或以又准此中等之文爲標以或正斷徳之下文爲釋前明斷徳等文別指餘處之第二第三釋歟被得若依之爾者以又准此中等文爲第一釋以或正斷徳以下文爲第二釋前明斷徳等文爲第二釋之攝而會違文歟被得如何答今此解釋之一段誠不分明然而一方之難勢順文相歟仍可存有二釋云義也所謂以又准此中等之文爲初釋意云今此四斷之文無兼正之不同以擇滅非擇滅總爲斷圓徳之體爲言以或正斷徳以下文爲第二釋意云以擇滅爲正以非擇滅爲兼而爲之四斷之體爲言前明斷徳等之文爲第二釋之攝而會其違文也所謂今第二釋以擇滅爲正以非擇滅爲兼以爲斷圓徳之體云義存之而釋一一切煩惱斷之論文上已述一一切煩惱障斷得擇滅唯取擇滅故宜會之也則以擇滅爲一切煩惱斷體者約正以論之爲言如此得意之時一段之解釋更非相違若如一方之難勢得其意者皆背文相悉違道理就中前明斷徳之文不指第一卷三釋之中之第二第三之兩釋可云也彼此是別釋故又非當段之別釋不言又不云或故況正之言忽爲無用又上兩釋大都亦同餘處之初釋當處與彼初釋同故又不能一一返難恐繁故可思之問論中明威勢圓徳開二箇四種爾者初四種中第二圓徳光法師如何釋之耶進云光法師釋云二於壽量或促至八十或劫延三月自在威勢付之凡延促壽者是邊際定之功力非佛世尊威勢何可以之備如來之圓徳哉是以披餘處之論文述延促壽之相云謂阿羅漢成就神通得心自在乃至即入第四邊際靜慮文光法師釋此文云顯倶解脱簡慧解脱文聲聞既行留捨二門明知是法力非人力亦共徳非不共云事如何答准正理論雖佛身中一切功徳行相清淨殊勝自在與聲聞等功徳有殊勝然依類同故説爲共定判設雖定力實有所勝二乘者何不爲圓徳之攝哉是以如第三於空障極遠小大相入自在威勢雖是神境通之攝以勝二乘等爲佛徳之體被得何況勘餘處之論判云世尊擧意遍知諸法非比非占此説爲善如世尊説諸佛徳用不可思議文如此文者諸佛神力未必簡定散設雖留捨之行何可強借邊際定之力哉如一處之論文述佛無一徳由加行得暫起欲樂現在前時一切圓徳隨樂而起故佛衆徳皆離染得若爾如結六依邊際得邊際六後定兼順至究竟約二乘論之被得歟何可致是定力非佛力亦法力非人力等云難哉況佛者專目智品何可簡定哉人者還目諸法豈別體哉彼於謂阿羅漢成就神通之文及顯倶解脱簡慧解脱之釋者爲今義之潤色何還可備難勢哉重難云答之趣雖端多取要擧難若如今義者定散亂或漏無漏失體豈談性相之本意哉退勘婆沙論之説云佛定成就五十七部行者如欲界聲聞麟角喩者如佛文佛既除八味定成就餘五十七等至見六十五等之成就不成就以如此又今論餘處中云毘婆沙師作如是釋此顯佛意若不樂散心即於四威儀能成在之然於餘位非無威儀及異熟生通果心起文散心亦如此背此等之明文何恣改義哉答前重以邊邊之由成圓徳之相了今難勢之趣則攝在其中何重爲難哉但所來之難勢者就諸佛徳用諸佛境界不可思議文意擧之歟凡三祇百大劫之間漸漸除不染無知金剛心位總斷之故於初盡智位成就圓滿一切圓徳故於三世十方自身他身有情非情大小多少事理麁細之境不漏刹那極微等覺知之如見掌故擧心緣法利他益物之化儀更非二乘凡夫之所測何例纔斷煩惱障之二乘分齊可測二無知永斷之諸佛境界哉故於諸佛之上分別漏無漏定散善無記等者約二乘凡夫之境界以准例之也今諸論諸師之論釋中明之説之者如大海之一渧九牛之一毛故餘處述諸佛徳用諸佛境界不可思議今論文云總説如來圓徳如是若別分折則無邊唯佛世尊能知能説要留命行經多大劫阿僧祇耶説乃可盡文非謂如此成故亂漏無漏失定散破善無記今顯延促壽是爲佛力之旨故設雖爲散心何無留捨之義哉遠借邊際靜慮力者約功徳不自在之二乘論之故云意也豈無其謂哉問論文云後恩圓徳亦有四種謂令永解脱三惡趣生死或能安置善趣三乘文爾者於今此文開四種方光法師如何釋之耶進云光法師釋云謂令永解脱三惡趣爲三令安置三乘爲三故名爲四文付之若開上三惡趣爲三者須開下三乘爲三若開下三乘爲三者宜開上三惡趣爲三若爾方成六種非四種若合上三惡趣爲一者亦合下三乘可爲一若合下三乘爲一者同合上三惡趣可爲一若爾忽成二種非四種而今爲成四種於上下之文各開三一之不同尤可謂八種豈不違後恩圓徳亦有四種之標句哉就中上論文之中無有善趣之言設雖以三惡趣爲三無處于以善趣爲一令永解脱善趣生死爲一之釋依憑在何處哉抑見論文前後明智斷威勢等之圓徳之時記標烈數至恩圓徳何不如標烈之耶答倩案論文之起盡於恩圓徳開兩重四種也例如於威勢圓徳烈二箇四種所謂令永解脱三惡趣生死者一重四種也一永解脱地獄趣二永解脱傍生趣三永解脱鬼趣四永解脱人天趣也上文之中云生死者即指善趣也雖不表善趣其理必然也或能案置善趣三乘者一受生於人天善趣二證聲聞果三證獨覺果四證菩薩果也如此得意之時難勢更不可來何足爲疑哉重意云上文中不置善趣之言者讓下善趣之言或以下影顯上也問論中引薄伽梵所説頌云若於佛福田能殖少分善初獲勝善趣後必得𣵀槃文爾者今此少分善者指解脱分善根可云耶答然也兩方若順解脱分善根者既云初獲勝善趣定知是順福分善根云事又結後必得𣵀槃豈不關煗善根哉何況光法師餘處所引正理論文述初殖順解脱分之相云有佛出世若無佛時倶能種殖順解脱分文寶法師解釋中云或親見佛或遇教法便名種殖順解脱分文而今文云若於佛福田正指見佛之時見若爾非解脱分善根被得若依之爾者見次上論文云諸有智者聞説如斯生信重心徹於骨髓彼由一念極信重心乃至攝受殊勝人天𣵀槃故説如來出現於世等文文相之起盡無爭述初殖順解脱分之相見依之披餘處之論文或判遇佛出世殖此善根或云若有聞説生死有過諸法無我𣵀槃有徳身毛爲竪直信墮渡當知彼已殖順解脱分善文如何答今此頌顯順解脱分善根可云也既説若於佛福田能殖少分善乃至後必得𣵀槃其旨實炳然也則如一方之難勢是以重見今論餘處文云又施一食持一戒等深樂解脱迴求𣵀槃願力所持便名種殖順解脱分文尤符合今文者歟但於初獲勝善趣之句者設雖順解脱分善根是有漏而善也何遮近感人天善趣哉若不生人天者爭得亦解脱分善増長哉爰知雖遠得𣵀槃果近感善趣果云事例如順決擇分善根正雖感聖道果善有兼亦受色界滿果次於後必得𣵀槃之句者依得𣵀槃之果受解脱分之稱何足爲疑哉但疑云肝要在必之言歟煗善根不久必得𣵀槃解脱分雖久遂得𣵀槃也必之言更不可爲相違若於解脱分無必之義者得名豈非無用哉誰可亦幾之哉次於光法師餘處所引正理論文者彼若無佛時者顯遇獨覺起解脱分善之類也此則當今論中云有餘師説或遇獨覺之師歟若爾既爲不正義何足會之哉或顯逢遺教起解脱文類歟如寶法師之解釋此等亦可爲別師之義更非病之限者也問無諍智以第四靜慮爲所依所以論家如何判之耶進云論中云樂通行中最爲勝故文付之凡無諍世俗智者今偈頌之所定也而通行者是聖道之異名也是以光法師餘處解釋中或述通謂通達行謂行迹能正通達名通趣向𣵀槃名行或云依本靜慮止觀均平所有聖道起時任運名樂通行文無諍智更不趣向𣵀槃亦作聖道之體寧可改樂通行中最爲勝故之所以哉答此事誠似難思不限論文光法師亦述第四靜慮爲其所依四樂通行中最勝故定有深所以歟夫通行者聖道聖道之依地者未至中四本靜慮下三無色是也其中四根本靜慮定慧均平起時任運故名之樂未至中間兩地慧多定少下三無色定多慧少倶起時難事故靜慮名樂通行依未至中間三無色名苦通行如餘處頌文云通行有四種樂依本靜慮苦依所餘地遲速鈍利根爰四靜慮下地次第劣也上地次第勝也故第四靜慮聖道是最勝也又如餘處論文云第四靜慮是不傾動最極明利三摩地故堪爲麟角喩無上覺所依以之故知今云樂通行中最爲勝故者以無漏第四靜慮之最勝證有漏第四靜慮之最勝也所謂第四靜慮之無漏定既是最上也第四靜慮有漏是豈非最上哉爲言故論文述第四靜慮爲其所依樂通行中最爲勝故光法師云第四靜慮爲其所依四樂通行中最爲勝故文如此得意之時文義能成立疑難還被遮也問無諍智所緣惑者唯限有事惑可云耶答爾也兩方若限有事惑者凡以煩惱名諍者未必限有事惑兼通無事惑見是以光法師所引正理論中云煩惱諍謂百八煩惱文明知不限有事惑可通無事惑云事若依之爾者正見今論文偈頌結三洲緣未生欲界有事惑長行云緣欲未來有事煩惱勿他煩惱緣己生故諸無事惑不可遮防内起隨應總緣境故文如何答凡無諍智以他身所起之煩惱爲所緣者爲遮防彼惑也而過去現在煩惱設雖有緣三洲利根無學聖者是已生法故不能緣彼而遮防色無色界煩惱曾無緣欲界見所斷迷理惑不緣他身事法彼重迷惑緣見惑故亦不緣彼身故無諍智無緣此等諸惑唯緣欲界未來修所斷有事惑以爲境界也其旨如一方疑難之中所出之論文光法師釋此事云謂緣欲界有事修斷煩惱勿他煩惱緣己生故諸見所斷無事煩惱不可遮防迷理生内起隨應總緣境故文但於煩惱名諍者未必限有事惑云等之難勢者煩惱諍之廣中唯緣欲界修斷未來之事惑以遮防之依之立名稱無諍智可有何苦哉此則言總意別之謂也何足爲疑哉次於正理論文者會通之趣如前況見一具上文標然一切諍總有三種次擧蘊諍言諍煩惱諍之三種釋也終結之云由此俗智力能止息煩惱諍故得無諍名文還知煩惱諍謂百八煩惱者廣總擧百八煩惱由此俗智力能止息煩惱諍故者隨唯指欲界修所斷未來有事惑云事言總意別也誠證何可如之哉重難云光法師釋未來有事修所斷煩惱判諸見所斷無事煩惱尤殘疑所謂見惑中見取戒禁取雖疎迷理惑正取身見邊見邪見疑爲境貪嗔慢重迷惑故緣五見疑等惑爲境此等皆緣事故可有事惑云事炳然也況如邪見依道共戒戒取以有漏戒爲出離想因親迷理疎迷理同緣事法寧可云無事惑哉若爾論中述諸無事惑不可遮防内起隨應總緣境故彌招疑者歟答凡以見惑名迷理惑以修惑名迷事惑者是二論之大綱二斷之總相也所以然者修惑總不緣理故不及論之見惑雖有疎迷重迷等之不同以親迷理惑爲本建立之故以身見邊見邪見疑無明正名親迷理惑如見取之取身見等爲勝戒取之取之爲道則名之疎迷理惑如貪嗔慢等之緣五見疑無明等生愛生恚等亦名之重迷理惑今此見取戒取貪嗔慢等之煩惱雖緣惑體事法而起緣迷理惑親迷理惑故皆從迷理惑爲迷理惑之所攝全不名迷事惑也故寶法師餘處釋之中判苦集貪嗔慢等雖不親迷諦理之上而起然所緣境是苦集故苦集忍起緣苦集諦彼即斷故此則餘處偈頌之中結遍知所緣故斷彼能緣故斷彼所緣故之意也故以見惑名無事惑以修惑名有事惑誰可疑之哉次於色法別緣之類者是爲一個之疑設雖有此類既是爲少分何依之可亂法之大綱哉況邪見戒取等若兼緣心心所及得四相等之義有之者寧可遣總緣境故之文哉尋云無諍智唯緣貪嗔等之惑體歟又兼緣相應倶有法等歟答雖不分明可兼緣相應倶有等諸法歟問無諍智所依定通下地可云耶答不通下地可云也兩方若通下地者披今論之文偈頌結無諍世俗智後靜慮不動長行述第四靜慮爲其所依樂行中最爲勝故不通下地見若依之爾者願智能遍緣餘如無諍説者今偈頌之所定也而光法師下解釋中云願智若依殊勝及依初起但依第四若依非勝及依後起亦通下地乃至欲界文願智之依地既通下地無諍智之所依豈不爾哉答凡無諍智者令他身所起煩惱止息之功徳故難得之中之難得法難起之中之難起法也誠是定力不思議之至極第四果利根之所作者歟是以論述不動應果能起非餘餘尚不能自防起惑況能止息他身煩惱光法師云第六種姓不動應果能起非餘五種姓及有學人能起餘尚不能自防起惑況能止息他身煩惱文故以第四靜慮爲今智所依不依下地之旨大都如一邊之難勢但於願智之例難者以殊勝及初起之願智例無諍智也全非以非勝及後起之願智比無諍智何爲強相違哉重意云無諍智之唯緣未來有惑之邊雖劣於願智令他相續惑止息之邊還勝於願智故以自身智知諸法相是易故非勝與後起通下地令他身惑止息遮防是難故初後皆依第四不依下地也尤有其謂者哉問願智知無色界法可云耶答可知之也兩方若知之者凡案三界九地之廢立上界上地次第勝下界下地次第劣也故無色法細於色界法色界法麁於無色法設雖願智之力是殊勝既以第四靜慮爲所依爭得知無色界法哉是以下論中明五通之依緣云五依四靜慮自下地爲境文相例可同依之倶舍婆沙兩論中各擧一師之説云願智是比量智非現量智云云取意若依之爾者願智既與定心相應無色界法豈非現量境哉答凡以五識相應慧幷定心相應慧名現量智者大小常途之施設也而願智既以第四禪定爲所依所起之勝智也設雖無色界法是極微細何無知之義哉例如下地無漏心知上地無漏法也若夫願智不知無色界法者如來猶不可知無色界法況於二乘等哉説法化導更不可有其實如理師言顯利他徳能方便説如理聖教從生死泥拔衆生出之明文頗爲虚説者歟若願智不知之者以何智可知之哉就中無色界之果報者纔有漏四無色定之業感也設雖建立無漏是聲聞之分齊非獨覺之所屬三洲利根羅漢豈不知彼哉況於大覺世尊哉其能知之智者則是可願智若非願智者彼界四蘊二處三界之漏無漏爲無爲三性因果凡聖利鈍乃至自相共相之無量體用義理都不可知之二乘之斷三界九地得無漏九地非強之勝能如來之具一切智備一切種智豈非無用哉何況願智者目欲知而知如願而了之義若此智唯知欲色界法不知無色界法者願之言豈非虚稱哉是以廣考諸論之定判今論中偈頌結願智能遍緣長行云以願爲先引妙智起如願而了故名願智乃至以一切法爲所緣故文又云如先願力引正智起於所求境皆如實知文舊倶舍論云願智亦如此但緣一切境文雜心論云如願而知故説願智欲知而知是其事文加之光法師所引婆沙論中云問云何願智知無色界有説由觀等流及行差別如觀行路之人知所從至有説若爾願智應是比量智非現量智應作是説此願智不觀因而知果不觀果而知因故此願智是現量智非比量智文此外可勘文有之然亦繁不引之准此等之論説願智爲現量智直知無色界法云事明鏡也但於上地次第勝下地次第劣也云難者若唯就定一種論之者非無其義若約慧門談之者未必如此餘處論判中云樂定那含生無色樂慧那含生色究竟豈無其旨哉就中於定地有三種不同一定多慧少如四無色根本雖寂靜闕審慮二慧多定少如八近分及中間禪三定惠均等如四根本靜慮寂靜審慮相兼靜慮之名言偏在斯餘處論中述諸靜慮中有遍緣智無色根本必不下緣故二所修所緣有別則顯此意者歟其靜慮地中第四靜慮既爲最勝依彼之願智豈不勝諸地智品哉故願智之知無色法勿依上下差異生疑次於五依四靜慮自下地爲境之説者五通自本專緣色法以爲加行故以欲色界五蘊隨應爲所緣境其爲所緣境之欲界四靜慮下地次第麁上地次第細也又五通以四根本靜慮爲依地此亦上地次第勝下地次第劣也故如此判也全不可例願智之知無色者歟次於倶舍婆沙兩論中所擧之一師説者彼是不正義也何以遣彼爲病哉故光法師釋今論毘婆沙者作如是言願智不能證知無色乃至如田夫類之文云毘婆沙者至如田夫類者有作是言願智不能證知無色觀彼將入無色因行寂靜相別即能比知無色界果乃至此非正義文於婆沙論之説者既擧三師異説之中初二師云有説三師云應作是説正不既顯然也何及細論哉尋云光法師意依身下地願智知無色界法歟答此事難測暫可存不知之云義也可思之問願智知未來事可云耶此事准前論義可知之也又上就鴿鳥事粗記之了仍第二重以下略之問當處付明法無礙解所緣境且文身不詮義可云耶答可有二意也兩方若詮之者光法師所引正理論中述名句文三身之相云趣所詮義説之爲名即是表白法自性義辨所詮義説之爲句即是辨法差別義不待義聲能獨爲覺生所依託説之爲文乃至理應有覺不待義聲此覺不應無所緣境此所緣境説之爲文文如此説者名句二身雖詮義於文身者不詮義見若依之爾者以諸法體爲所詮義以詮之名句文爲能詮體者諸論一同之定判也設雖正理論意何可云文身不詮義哉依之見下説云此三能持諸所詮義及軌生解故名爲法文如何答如前重成之可有二意也所謂文身近顯能詮名句遠顯所詮義故以文身望所詮義之時近不詮之故正理一文云不待義聲獨能爲覺生所依託遠能詮之故彼一文云此三能持諸所詮義及軌生解以是邊邊之門也兩處之説更非相違退案名句文之廢立名身詮義之自性句身詮義之差別文身近詮前名句二身遠詮義之自性差別也所以然者一經一論始中終之語聲無非文身故總名之文身其中別詮義之性名之名身如云色云聲等別詮義之差別名之句身如云色可見爲性云聲可聞爲性等自性差別豈無其不同哉名句二身其是如此一一之字爲之文身之體一字未必詮自性一字未必詮差別故非無文身之體況其不詮自性不詮差別之字者詮自性詮差別之字之外如云之云異云也等之字可見雖非名句二身之體然借名句二身之力有顯義之功故雖無直詮義之能而終顯義之由豈非文身之體哉就中字之總説爲文身故名句二身必攝在文身中故若分出名句之時其餘之字正是爲文身之體未分名句之時一一之字總爲文身又句中有名故名還攝在句中准前可知然此三種有實體故名身亦有三種不同則名名句名文名也句身有二種句句文句也知之名覺其覺中暫緣名名想故以想釋名也章與句其義相隣故以章釋句字之遍在一部一卷名之總説故以字總説釋文也故今論餘處中偈頌結名身等所謂想章字總説長行云等者等取句身文身應知此中名謂作想如説色聲香味等想句者謂章詮義究竟如説諸行無常等章文者謂字如説𧙃阿壹伊等字文光法師釋云梵言那去聲摩唐言名是隨義歸義赴義召義謂隨音聲歸赴於境召呼色等名能詮義然非義合聲非詮義亦非義合梵云鉢陀唐言迹如一象身有四足迹亦如一頌總四句成故今就義翻之爲句句能詮義究竟梵云薄迦吉何反唐言章還是詮義究竟如説諸行無常等章以章釋句章即句之異目以字釋文梵云便膳那唐言文是能彰顯義近顯名句遠顯於義西國風俗呼扇鹽酢等亦名便膳那亦是能顯義扇能顯風鹽酢等能顯食中味也舊譯爲味譯者誤也梵言惡刹羅唐言字是不流轉義謂不隨方流轉改易亦是能彰顯義能彰名句遠顯義也故以字用釋其文字即文異稱也是則𧙃阿等字是不相應行攝非同此方墨書等字也又字無詮表有詮表者即是名句即是名句所依能顯彼二體無詮表文當解釋中引正理論云趣所詮義説之爲名即是表召法自性義辨所詮義説之爲句即是辨法之差別義不待義聲獨能爲覺生所依託説之爲文即是迦遮吒多波等理應有覺不待義聲此覺不應無所緣境此所緣境説之爲文文謂不能親目於義但與名句爲詮義依此三能持諸所詮義及軌生解故名爲法即三自性説之爲身自性體身名差別故三與聲義極相隣雜爲境生覺別相難知故説身言顯有別體文准此等諸文可思合上義也又案之一一語聲之上悉名句文三身可倶轉若不爾者三身一體還可似立豈順一宗之本意哉此意定可見于諸論師之所判然依不遑因不考之光法師之解釋九牛之一毛引之後學必悉之如此得意之時兩方之難勢還爲二意之潤色何爲疑之端哉問今論意法無礙解者爲唯緣自他名等爲當緣下地名等義可有耶答可有二意也兩方若唯緣自地名等者正見今論文偈頌結法詞唯俗智五二地爲依長行云法無礙解通依五地謂欲界四靜慮若爾於欲界初靜慮法無礙解者設雖緣自地名等於上三靜慮法無礙解者尤可云緣下地名等哉依之光法師餘處解釋中引正理論名等隨身隨語二師異説畢云問二師中何者爲正答隨語爲正問何故此論下文言法無礙解通五地耶答據能緣心通於五地理實名等隨語二地若依之爾者光法師擇以於上地無名等故之論文述以於上地無名等故彼不別緣下名等故畢引明法無礙解依地之婆沙三師之解云初説據名隨語繋故説法無礙解但依二地後二説據名隨身繋説法無礙解通依上地以緣法難要依自他智緣自他法此論正理顯宗竝同婆沙第二説以五地爲正文解釋之起盡無爭法無礙解緣自地名等被得如何答光法師當處餘處誠以水火相返今論之深致難取證於一邊然而任光法師之解釋今論意存以名等或云爲隨身繋或云爲隨語繋之二邊可得意隨而自下地緣事宜依彼也所以然者披當處之論文述法無礙解通依五地謂欲界四靜慮之時隨身隨語之二繋未聞故自下地緣事隨而是不定也而次下述法無礙解之依地唯限欲界四靜慮不通無色之所以云以於上地無名等故文爰知今論意存名等是隨身繋非隨語繋云事若不爾者何可顯無色地無名等故非法無礙解依地之旨哉因茲法無礙解亦唯緣自地名等緣下地名等之義自能成者歟故光法師今解釋中當論文云法無礙解通依五地謂依欲界四本靜慮以於上地無名等故彼不別緣下地名等故又婆沙一百八十云後二説據名隨身繋説法無礙解通依上地以緣法難要自地智緣自地法此論乃至同婆沙第二説以五地爲正文見餘處之論文偈頌結欲界有情攝長行述之云此名身等唯是欲色二界所繋有説亦通無色界繋然不可説文此文中雖簡無色界有名等之説於欲界四靜慮之中未分別之故隨身隨語之二義未聞況於自下地緣之意哉故光法師餘處解釋之中釋今此文之時則判此論二説後説爲正畢引婆沙評家之説證也次下云就前説中復有二説一説名隨語二地繋一説名隨身五地繋文此是就云唯是欲色二界所繋之前師正義家光法師自或約此論之始終或准餘論之説相開隨身隨語之二義也次下云婆沙正理倶有二説茲無評文文次引正理文畢云問二説之中何者爲正解云隨語應正以語親能發名等故又經部等説名等即是語故問何故此論下文言法無礙解通五地耶解云據能緣心通於五地理實名等隨語二地文是則餘處之論文不分明故引婆沙正理之二説今論亦有二意之旨成也而尋正不之時答之作三釋今難勢所出之文是初釋意也雖無明證以以語親能發名等故之道理最前作隨語應正之釋也彼釋與當處之釋相望之時誠雖爲難義至次下會當處之文云又解言法無礙解通五地者此是隨身繋家無身之釋文何足設會通哉次下云又解即准彼文隨身繋者應可爲正文當處之論文既爲正義若有顯隨語繋之文者暫可顯不正義意何及會通哉次於光法師餘處之初釋者餘處之論文不分明故暫就彼一往釋之旨可成之或自本各別之釋故敢不可知會重意云餘處之論文不分明故及三釋當處之論文是分明故不及異釋也重難云凡名句文三身與語聲倶轉與語聲倶生者諸論一同之定判諸師一際之釋義也是併雖有語離名而生全無名離語而生之謂也故以名等云隨語繋義順道理云隨身繋遠背實義若夫強成隨身繋之義者其道理如何若名等離語聲而生之義有之耶若有此義者其文理如何若無其義者隨身繋頗難立者歟依之勘諸論諸師之定判遍雖有見隨身繋文未見成其道理之説爰知一師不正義意不顯邊道理存此義云事是一論主若朋經部義故顯隨身繋之旨者不然經部存名語一體之義故尤可云隨語繋何可云隨身繋哉若強云爾者爲有名之離語而生豈順彼宗計哉是二何況當處論中云謂欲界四靜慮以於上地無名等故與餘處論中云此名身等唯是欲色二界所繋其意全是同彼文云名等在欲色界此説云名等不在無色只是表裏之二門更非別義之所顯也若餘處之文非顯隨身繋者當處之文不遮隨語繋之條勿論也何云今文分明説隨身繋彼説二繋不分明哉良以今云謂欲界四靜慮同彼云唯是欲色二界所繋今云以於上地無名等故破彼第二師云無色界有名等也如何是三抑今解釋之中述以緣法難要依自地智緣自地法豈不違餘處據能緣心通於五地理實名等隨語二地之釋意哉答凡名等與語聲不離倶生之義更非疑設雖不離倶生法以一法屬上地以一法屬下地何爲強難勢哉例如依身在欲界起六地無漏之時道戒與大種倶生之中所造定地之所屬能造散地之所繋名等隨身隨語相例可同次於隨自繋之道理者誠以難思然而試案一兩義云或名實雖與語聲倶生世情思名在所詮法之上語在能發人之口故約世情以名云隨身繋以語聲云口業被得或論主朋經部意故以隨身繋義爲所存歟所謂彼部意存名語一體之旨而語必是隨身繋也名豈不爾哉若以名爲隨語繋者忽爲名語各別何順彼宗之本意哉故論主顯隨身繋之義也若爾約經部意可云隨語繋之難更不可來者歟次於當處餘處論文之同異者彼直論名等之界繋故設雖初靜慮之名等宜爲色界之攝正明法無礙之依地故先不可全同之條勿論也況云謂色界四靜慮以於上地無名等故故自色界至第四靜慮可有名等被得何可必例同之哉次於當處以緣法難要依自他智緣自地法之釋者就隨身繋之義設此由何合彼隨語爲正之初釋可難之哉尋云以於上地無名等故者法無礙解依地之限五地之所以歟不通無色之所以歟答於之有深意思而可知之問論中明詞無礙解相云緣方言詞立爲第三文爾者光法師如何釋之耶進云光法師釋云緣諸方域種種言詞立爲第三詞無礙解文付之凡方者方隅域者城域也詞無礙解何可必緣方城域之言詞哉是以於法無礙解者未必緣方隅城域之名等見相例可同如何答凡方者方隅方角方者四方六方八方十方是也隅角准之可思言者言詞言者一言二言多言乃至無量無邊之言説詞者世間出世間等乃至千差萬別之詞語也則是自劫初從衆生之情量所立來之言詞也非如限方限隅非必限城限域則呼一切之言説詞語故云種種言詞云諸方域也例如金陵大師作三論釋之中云方言有三種文學者傳方言兩字之時有兩三之義其中一傳意云約衆生之方域所設之言説名之方言云傳意也不可有相違也問論文云詞無礙解唯依二地謂色界初靜慮文爾者光法師依二地所以如何釋之耶進云光法師釋云以緣詞難唯自地故文付之凡言詞者以語聲爲體也有對質礙色故是麁顯易了之法也利根無學所起之無退智何可以之爲難知之境哉彼名句文之爲不相應行爲微細難了之法猶與他地法無礙爲所緣之義有之見設雖詞無礙解建立上三靜慮何不緣欲界初靜慮之言詞哉答光法師今解釋誠其意趣難測然而試案一義云詞無礙解親緣言詞故其觀解之行相只如言詞能發心故此智必可與尋伺倶也是以論述詞無礙解依地不通上三靜慮之所以云以於上地無尋伺故兼顯此意也然其言詞之難緣者與語倶生之中法無礙解既分取名等緣之故詞無礙解唯取語聲緣之以之爲難若通緣名語之時語助名名助語故其相顯了而易緣既不如此法無礙解簡倶生之語聲而緣其上之名等詞無礙解遮倶起名等而緣其下之語聲豈倶是易哉故光法師釋法無礙解之時述以緣法難唯依自地智述詞無礙解之時云以緣詞難唯自地故文尤有其謂者歟餘處解釋中亦述詞無礙解之相云以緣言詞難要自地心緣文其意是同但於語聲是麁色也何難緣哉云難者或自本不與名倶之外器非情之聲或雖與名倶強總緣之聲此等皆易知之境故全不可例詞無礙解之語者歟若爾設雖利根無學所起之無退智何強是易緣哉次上地法無礙解緣下地名等者此是光法師餘處作三解釋之中初釋云據能緣心通於五地理實名等隨語二地之文意歟彼自本別解意故更來不可爲難勢若依彼釋意者全不可云以緣法難唯依自地智者也重難云答之趣頗以難思先論以於上地無尋伺故者二禪以上無尋伺故無語無語故無詞無礙解爲言何顯詞無礙解與尋伺相應之所以可知哉是一次光法師以緣詞難之釋意者言詞難緣法故以自地心緣之不以他地心緣之爲言何約名語之離不離論之可云哉是二次若分名語故爲難知者他地之名等彌以可難緣設雖餘處之初釋意何可許上地法無礙解緣下地名等之義哉是三答三難勢之中初二准前可會之委尋之只如答之料簡何重可疑之哉次於後難者雖分語之名雖下地之名既爲利根無學所起之上地無退智能知之故更非難故云據能緣心通於五地理實名等隨語二地也豈不爾哉問論中付明四無礙解相且辨無礙解依地如何判之耶進言論中云義十六辨九皆依一切地文付之凡辨無礙解以説道爲所緣境而言説既限色界初靜慮無通餘地能緣無礙解何可通二禪以上哉是以披當論疏之定判法詞二無礙如次緣自地名語故以五地二地爲所依地見相例可同如何答凡辨無礙解之所緣不限言説亦通定惠道其道不限色界初靜慮定慧廣通二禪以上諸地定惠而於辨無礙解之中緣説道隨一之智起之時九地辨無礙解悉起得爲所修故雖緣言説之智限欲界初靜慮不通上地緣定慧之智是九地故所判皆依一切地也此是但得必具四之道理之所至極也更不可疑之故論中上述此二通依一切地起謂依色界乃至有頂畢下云辨無礙解於諸道中許隨緣一皆得起故文問頌文云義十六辨九皆依一切地文爾者一切地者爲指八近分八根本及中間欲界爲當除上八地近分及中間禪指於餘地可言耶答難測暫除上八地近分及中間禪於八根本及欲界之九地云一切可云也兩方若於八近分人根本及中間欲界者光法師解釋中出法無礙解之依地述法無礙解通依五地謂依欲界四本靜慮擧詞無礙解之依地云詞無礙解唯依二地謂欲界初本靜慮文乘之云義辨二無礙解依地之時述皆依一切地明知除上八地近分及中間禪指餘地云事若夫兼取上八地近分及中間禪者云法辭二無礙解依地之時何不取四靜慮之近分及中間禪哉若依之爾者既云皆依一切地一切之言中何可渉上八地近分及中間禪哉答凡如此之勝功徳之依地多限八根本及欲界不通近分中間等之邊地故指八根本及欲界云一切也是以光法師今解釋中擧一個問難云言説唯在欲一切定中辨無礙解如何通歟文答之云辨無礙解於説及道許隨緣一皆得起故故通九地文問答之起盡無爭以八根本地及欲界爲辨無礙之依地被得若爾皆依一切地之一切者唯限八根本及欲界之九地不通八近分幷中間禪云事炳然也但於一切之言中何可渉上八地近分幷中間禪哉云難者是小分之一切非全分之一切也或八近分及中間禪自本可非爲此之依地故全非其所論故是全分之一切非少分之一切之義可有之也重難云光法師所引婆沙論中出法無礙解之依地或云二地或云五地或云七地云云取意其七地者欲界四靜慮之上加未至中間也若爾辨無礙解之依地豈不通近分中間哉答於法無礙解之依地雖有三師之異説以五地之説可爲正也若爾辨無礙解依地可通未至中間云難更不可來者哉問當處付明四無礙解相且辨無礙解緣何境判耶進云論中云緣應正理無滯礙説及緣自在定惠二道文付之案四無礙解之相尤可各各以別別境爲所緣被得是以於前三無礙解者皆以各別法爲所緣境見而第四辨無礙解若以言説爲所緣者豈不混第三之解無礙解哉次云緣説道之時之道者定是可指言説之能發心而彼能發心者是欲界初靜慮之繋更非上地之所屬何可通二禪以上之心哉就中思心所是言説之能發全非定慧二法發彼寧可以定慧望言説立道之稱哉若夫緣言説之定慧能與言説爲道者欲色二界之定慧設雖緣言説故得道之名無色界之定慧不緣言説故更難成道之號若雖不緣言説定慧二法與言説爲道者其所以如何抑今此定慧者漏無漏之中何可言耶答凡欲開今此疑問者須作無礙次第也所謂四無礙者是説法化導之智徳也故先緣能詮名句文可明其體則法無礙解起而知之次緣所詮法可知其體則義無礙解起而解其次緣語聲體可得其相則詞無礙解起而了之次緣無滯語及定慧二道可起心説法門則辨無礙解起而強用故今論所引施設足論云緣名句文此所詮義即此一二多男女等言別此無滯説及所依道無退轉智如次建立法義詞辨無礙解名由此顯成四種次第文第三無礙緣汎爾言説第四無礙緣無滯言説何無辭辨二無礙之不同哉況辭無礙解唯緣言説辨無礙解兼緣説道其差異彌炳然者歟次定慧窮微盡念照之又分滅斷空解之故説之外兼緣道也於道之稱者欲界初靜慮意識相應發慧與近因等起發語思相應故與言説爲直道初禪以上定中之慧與言説遠因等起思相應故與言説爲遠道例如修惑相應思與表業爲近因等起見惑相應思爲遠因等起然言説此等之定慧而立故以名道豈不爾哉次今以定慧名道者是限有漏非通無漏則如云無漏道不與表業爲轉因隨轉因也問施設足論意名等離語聲獨起可云耶答不可獨起也兩方若獨起者凡名等依語聲而轉非語聲不轉者有宗一家之性相諸論一同之施設也設雖施設足論意何可存離語聲獨起之義哉如圓暉法師餘處解釋中云謂名身等依聲而起非是心力故唯無記聲是心力親能發起通三性也若依之爾者光法師釋今論所引施設足論中明四無礙解次第云文云先起能詮次方取義更取義已方乃有言説無滯礙由此先後顯四次第文如此釋者名等前起語聲後起被得如何答名等離語聲而不獨起云事頗勿論也更不足爲疑其旨如一方之難勢但於光法師所釋旋設足論之文者是顯爲能緣之無礙智之次第非述爲所緣之多等境之次第何來爲難勢哉所謂先起能詮先起緣能詮名等之法無礙解云意也乃至更取義已方乃有言者更起緣義之義無礙解已方有緣言之詞無礙解爲言餘文可知以何知者正見今論所引施設足論之文云緣名句文此所詮義等文緣名句文者明法無礙解此所詮義等者明義無礙解等故也更無有起之字何爲違文哉設雖有起之字最初既置緣之言定知是顯能緣智非顯所緣境云事問論中明四無礙解加行擧二師異説爾者彼正不光法師如何判之耶進云光法師解釋中以云傳説此四無礙生等之前師判此非正義以云理實一切無礙解生等之後師判論主述正義也付之以串習名句文爲法無礙加行以串習佛語解諸法義爲義無礙解加行以串習聲明論爲詞無礙解加行以串習因明論爲辨無礙解加行云初師之意非無其謂何可判此非正義哉次云唯學佛語能爲加行之第二師之意尤招疑所謂麟喩大覺倶成四無礙解如前論中云佛定成就五十七部行者如欲界聲聞麟喩以前如佛而無二佛並出之義故不可聞佛語具自然智無師智故不可案教隨欲現前故不可借加行據何如來所起之無礙解可以學佛語爲加行哉麟喩獨覺出無佛世離教力如何以學佛語爲加行可云哉若除佛麟喩云爾者唯之言豈非無用哉就中今第二師者婆沙論評家之説也故光法師釋云故婆沙一百八十評家云如是説者四無礙解皆以習佛語爲加行文若爾論主述正義之決判傍似背文理如何答光法師以初師判此非正義者違婆沙之評家故也所謂評家意四無礙解悉以學佛語爲加行之旨存之而初師意唯限義無礙解以學佛語爲加行云故判此非正義也次第二師意聲聞中三洲利根無學聖者之起四無礙之時必學佛語以爲加行故云爾也於佛獨覺者自本不案教故非今所論何來爲難勢哉唯之言且約此門故非相違者歟重難云凡三乘賢聖學佛語者就順解脱分位及入聖依身之初隨應而所談也如餘處偈頌中結將趣見諦道應住戒勤修聞思修所成謂名倶義境而於入聖以後者不限有漏定兼得無漏定故於事理二法得照了明眼況於利根無學哉而至四無礙解始學佛語爲其加行云事更不能信用如何答見道已前學三惠習名等者是斷惑證果菩提𣵀槃之方便非説法化導利他濟物之善巧此是染不染無知別所得之功徳故至無學始習學之尤以佛語爲指南所成之智品者歟若爾彼師意豈非存道理哉又難云婆沙論中云如是説者若決定可得者彼離染得盡時始得故文而三洲利根無學聖者決定可得四無礙解故初盡智位必可得四無礙解何後時學佛語始得之可云哉答此事倶舍婆沙兩論之異説也別可論之問光法師釋但得必具四論文引正理論有餘師云有不具得無理得一必令得四説爾者正義可云耶答非正義可云也兩方若不正義者凡但得必具四者諸論一同之定判有部一家之性相也而今此師意既無得一無礙之時得餘無礙之義之旨成之明知非正義云事若依之爾者四無礙解雖是一類功徳其相既各別也何得一之時必得餘之義可成之哉是以如四無量未必一時成之見相例可同若爾今師意寧可非正義哉答凡第六種姓三洲無學聖者所得一類之功徳故尤得隨一之時必兼得餘可云也例如論中述辨無礙解之相云於説道中許隨緣一皆得起故此是但得必具四云道理之令然之所以也或如無諍願智四無礙解之六種功徳同依邊際定得之故婆沙論中云若決定可得者彼離染得盡智時得故或如聖者之得飮食喜足聖種衣服喜足聖種臥具喜足聖種樂斷樂修聖種是一時也如是成之時其相各別也何得一之時兼得餘哉云難勢更不可來者歟次於四無量之例難者今論意述喜喜捨無貪喜無量以喜受爲體云義存之故重緣喜初二靜慮餘六或五十生第三第四靜慮之人雖成慈悲捨三無量不成喜無量云也故至下明現起之依身與成就之依身三人起定成三文其定成三者則指生後二靜慮之人云爾也彼此相例不等何混可致難哉倶舍論第二十七卷抄上觀應元年庚寅六月十八日未時於東大寺藏輪院之草庵終四十五條結集之微功畢夫身雖泛末法一萬歳之濁波志猶思在世四十五年之給仕良以倦筆拙書之少量操文綴義也微望何不送五九之年序乎宛如勝軍論師之經四十餘年立云諸大乘應是佛説兩倶極成非諸佛語所不攝故如増一等阿笈摩經之比量矣抑今日者歷劫仕佛之大士閣淨土之聖衆救穢國之群萠之良辰也仍捧當卷上帖草案之微思奉資慈悲施無畏者之法味必授福智二財於貧愚之衆生兼奉飾垂迹和光神宮皇居之威光常施擁灌哀悲於鑚仰之學宗迴功徳之餘薰遂往詣知是之望達世親解見之願乃至法界平等利益而已右筆仁和寺傳法會學頭權律師圓範年齡六十三夏臘四十九于時永享十年戊午於東大寺北室密乘坊四月上旬比始筆同五月二日卯時八幡宮談義坊微功畢抑此卷世希也然此夏中於案坊撰出三百條分毎日講可被行由聞賢聖等者三百條内雖簡此卷不有仍借得次本末兩帖分悉寫之畢至惡筆雖兩其源依事闕書斗也依此功者二世願望圓滿大小性相如思成就而已三論宗英祐生年二十二南無八幡大菩薩知見照明給傳領三論沙門英憲之
