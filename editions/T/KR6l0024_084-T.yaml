body:
  text: 倶舍論第二十八卷抄上問題問論中擧經部難云若爾即心專一境位依之建立三摩地名不應別有餘心所法文爾者唯心無所義歟問經部宗意計受想思心所實有時等持心所爲心王上假立爲當思上假立歟問論文云則於相應等持無用文爾者寶法師如何釋之耶問等持唯限一刹那歟問大衆部意色無色界眼等五根色等五境悉可有耶問論中破大衆部等意無色界中許有色法義云又彼定中亦遮有故文光法師釋此文作二釋解爾者初釋意如何釋之耶問頌文云後色起從心文爾者爲擧經部義爲當述有宗義歟問作識無邊觀時可緣善染汚無覆無記識耶問味定者唯限愛相應定歟問淨定無間所生味定爲唯緣過去一世爲當可緣三世耶問論中明味定相云緣過去淨深生味著文爾者可緣過去多刹那淨定耶問味定可緣勝進順決擇二分耶問味定與味定可爲相應倶有二因耶問第四靜慮名清淨爲唯限無漏爲當通有漏歟問光法師釋心王不立靜慮支引婆沙論二説爾者初説意如何釋之耶問光法師釋心王不立靜慮支引婆沙論説爾者第二説意如何釋之耶問光法師所引正理論文云有餘師説受於離染雖是増上而淨品作饒益事亦有功能文爾者今此受者可通無漏定耶問光法師意大善地法心所中輕安行捨立靜慮支故如何釋之耶問經部宗定中可起身識耶問經部宗意現在身識可緣現在輕安風觸耶問論中擧有部難云勿所立支少分有漏少分無漏成達理失文光法師釋此文作二解釋爾者初二釋意少分有漏者唯限輕安風觸歟問經部宗意前十五界唯名有漏歟問經部宗意無漏定現前位輕安風觸可倶起耶問經部宗意於靜慮支可有十八耶問寶法師意欣厭心與與定相應歟問染汚第二靜慮可立喜支耶問頌文云餘説無安捨文爾者此師意染汚第二靜慮可云内淨支耶問生靜慮可有近分根本不同耶問寶法師意依身在上三靜慮所起借識類悉自性無記攝歟問依身在初靜慮依第二靜慮以上眼起初靜慮眼識爲唯限無覆無記爲當通善性歟問超緣者爲唯超一地爲當可有超多地義耶問順自地勝徳爲名順勝進分爲當名順住分歟問順住分無間可生無漏定耶問生非想非非想處阿羅漢果聖者可起順決擇分耶問煗等四善根四分定中唯順決擇分攝歟問無漏定無間可生順住分耶問阿羅漢果聖者散善無間退煩惱義可有耶問未離自地染者順住分無間起煩惱義可有耶問今論意順決擇分無間可生順勝進分耶問初靜慮味定與順勝進分爲幾緣耶問有漏斷惑道爲唯限順住分爲當通順勝進順決擇二分歟問勝解作意無間可修超等至耶問無色界善心可緣下地能治類智品道耶問空無邊處近分地加行善心可緣下地法上擇滅耶問虚空無爲可有多體耶倶舍論第二十八卷抄上問論中擧經部難云若爾即心專一境位依之建立三摩地名不應別有餘心所法文爾者唯心無所義歟答非唯心無所義也兩方若唯心無所義者受想思實有者經部宗本義也今論所載經部計可非唯心無所義哉若依之爾者光法師釋此文云經部依心假立定故文而受想思實有義餘心所法思上假立定明知心王上假立定心所者唯心無所義云事何況泰法師釋今論下段心分位殊亦得名心所之文云經部師釋心分位殊假立受想亦得名心所文若非唯心無所義者何述心分位假立想受之旨哉答今論所載經部師説者是受想思實有計非唯心無所義也故光法師釋今論文由此故三摩地成寧不即由斯心於一境轉之文云又由此餘心心所故三摩地成寧不即由斯餘心所法故心於一境轉何用等持令心一境文此釋既許餘心所法非唯心無所義云事炳然也寶法師引正理論七十七論若心體即三摩地令心作等亦應無別差別因縁不可得故之文畢云述曰經部令心作等即許別有思等心所令心一境因何不許文此釋無諍思等心所別有實體云經部師義見加之正理論七十八中破經部師計内淨支無實體云非唯尋伺靜息爲體此等皆是心所攝故如受想思別有實體文以能破文推所破義若非受想思實有義者寧例難如受想思別有實體哉准此等定判意思當卷上下文上云若爾即心專一境位依之建立三摩地名不應別有餘心所法下述有餘師言此内等淨等持尋伺皆無別體倶是受想思實有師説更非唯心無所義意也但於光法師經部依心假立定故之釋者受想思實有義雖計餘心所法思上假立亦許心分位假立心所之義邊故今此解釋全無相違也次於泰法師心分位殊假立想受亦得名心所釋者且不可依用之問經部宗意計受想思心所實有時等持心所爲心王上假立爲當思上假立歟答可有二義邊也兩方若心王上假立者光法師餘處解釋中明經部宗義或二十云受想思實有餘心所法思上假立實無或四釋若依經部許有心輕安而無別體即思差別受想思外餘心所思上假立見爰知等持心所思上假立云事若依之爾者今論中經部難有部云若爾即心專一境位依之建立三摩地名不應別有餘心所法文光法師釋此文云經部依心假立定故文加之重披今論文擧經部師義云有餘師言此内等淨等持尋伺皆無別體文有部難此義云若無別體心所應不成經部答此難會心分位殊亦得名心所光法師釋此文云於心分位殊假建立故亦得名心所文任此等定判等持心王上假立之旨分明也何況勘正理論餘處説經部師義云故唯有識隨位而流説有多種心心所引文如何答經部宗意計受想思心所實有之時等持心所或云心王上假立或云思上假立之二義邊可有也所謂心是王故以心所隨彼爲會聖教説爲同本宗義假爲心分位之門可許之思又造作爲能行蘊生故等持等餘心所皆以思爲體云意可有之兩方疑難各顯一邊理實而言倶無相違也此事專爲法相宗論義委細之趣如唯識論第四卷尋思抄等可見之文永三年丙寅十月三日午時於東大寺尊勝院對面興福寺賢恩擬講之次相尋此題之處彼擬講云經部宗意談受想思心所實有之時貪信等餘心所心之分位思之差別云義當世學者殊所翫也所謂心王爲貪信等心所心王之外無別體故假爲心之分位也心王爲貪信等心所亦依思造作力故被云思之差別也有此二邊之義門故處處解釋非相違歟問論文云則於相應等持無用文爾者寶法師如何釋之耶進云寶法師釋云後心相應等持何用文付之依寶法師釋披今論現文經部牒有部救云若謂令心於第二念不散亂故須有等持畢難則於相應等持無用文相次第無諍於初刹那相應心王等持無用云也是以光法師意即述此旨寶法師釋尤似難思如何答爲曉兩師解釋之旨趣委見一段論文之起盡經部難有部云豈不諸心刹那滅故皆一境轉何用等持文有部設救此難云若謂令心於第二念不散亂故須有等持者難則於相應等持無用也寶法師釋此文云若謂前念等持令心於第二念亦同前心緣一境轉此即前心令其後心同一境轉後心相應等持何用文此釋意云初念心相應等持令第二念心不散亂一境轉者第二念心相應等持可無用爲言若依此釋意云則於相應等持無用可訓也光法師釋此文云若謂等持令彼心王於第二念不散亂故須有等持則於刹那相應心王等持無用文此釋意云初念心相應等持令第二念心不散亂一境轉者初念心相應等持與第二念心可有力用與初刹那相應心可無用爲言若依此釋意者則於相應等持無用可訓也兩師定判各叶論文後學不可是彼此歟問等持唯限一刹那歟答不限一刹那也兩方若唯限一刹那者等持者是定心所也何可限一刹那哉是以等至無限一刹那相例可同若依之爾者婆沙論百六十二中明等持等至差異云等持一刹那等至相續文如何答等持等至者同定心所爲體等至既通相續等持豈唯限一刹那哉但於婆沙論文者等持劣等至勝故爲顯其差異且云等持一刹那等至相續也是則一往之釋更非盡理之談歟問大衆部意色無色界眼等五根色等五境悉可有耶第二卷抄記錄之畢問論中破大衆部等意無色界中許有色法義云又彼定中亦遮有故文光法師釋此文作二解釋爾者初釋意如何釋之耶進云光法師釋云又彼定中不但遮彼無漏律儀亦遮有彼有漏律儀文付之依光法師解釋見今論文起盡上破身語既無律儀寧有雖述無有漏律儀之旨不遮無無漏律儀尤可云不但遮彼有漏律儀亦遮有彼無漏律儀哉是以寶法師釋此文云又我宗亦遮無色界有無漏律儀故文如何答光法師初釋意實似難思然而再披論文重思此事上云若彼唯有身語律儀無色界中唯有有漏身語律儀遮無無漏身語律儀見故光法師釋此文云若言彼界雖無餘色唯有身語律儀文既云無餘色故遮無無漏律儀之旨自所聞也故破此計釋非但遮彼無漏律儀亦遮有彼有漏律儀符順論文起盡也但於寶法師釋者隣若謂如有無漏律儀不爾無漏依有漏大種故之文云又彼定中亦遮有故故釋亦遮無色界有無漏律儀故亦非無其謂兩師解釋倶叶論文各存深旨不可一准歟問頌文云後色起從心文爾者爲擧經部義爲當述有宗義歟答擧經部義也兩方若擧經部義者披一部始末尋八品前後本頌專結有宗義長行多明經部説定知後色起從心之頌文述有宗義云事何況傳説傳許之言悟入尊者猶奇之本頌直擧經部義者迦濕彌羅國人豈可謂弘我宗哉加之顥宗論三十八中無改此頌若非有宗義者彼論中寧載之哉若依之爾者見光法師定判云論主以經部義答文如何答後色起從心之義有宗經部雖同許之思今論長行此從心生非從色起謂昔所起色異熟因熏習在心功能今熟是故今色從彼心生之文意今此頌文擧經部義見故光法師釋此文云論主以經部義答正釋頌文後色起從心此色從心生非從色起謂昔所起感色果因熏習在心功能今熟是故今時欲色界色從彼無色界心中色種生文寶法師釋此文云經部答也謂從色異熟因功能種子而生文泰法師釋此文云次依經部答從心生不同薩婆多從昔欲色界色起經部師説謂昔所起愛樂色故爲異熟因熏習在心功能今熟是故欲色界色從無色界心色種子生文圓暉法師釋此頌云此是論主依經部釋也文任此等解釋本頌後色起從心之文擧經部義云事分明也但於本頌專結有宗義云難者標迦濕彌羅國議理成我多依彼釋對法本頌雖多結有宗義述少有貶量爲我失判法正理在牟尼亦擧經部義也次於本頌直擧經部義者迦濕彌羅國人豈可謂弘我宗哉云難者探論主本意實雖擧經部義有宗意同亦許其義勢之事本頌之中直陳其言悟入尊者全無奇之迦濕彌羅國人謂弘我宗也如彼餘處八本頌云此上十七處也次於顯宗論中無改此頌云難者有宗意從無色界沒時將下生時由無色界中順色生心勢力引欲色界色生云故後色起從心之旨有宗自本所存之義故顯宗論中不改此頌也故顯宗論三十八云後歿生下色從心生現見世間色非色法亦有展轉相依起故謂心異故色差別生色根有別識生便異故從無色將生下時順色生心相續而住由彼勢力引下色生文正理論七十七説全亦同之重意云後色起從心之理有宗經部之中雖不違何義以長行謂昔所起色異熟因等之文見之今論云後色起從心擧經部義釋許也光法師論主以經部義答正釋頌文後色起從心之釋即顯此意也非謂云爾故後色起從心之義經部獨存之顯宗論中不改此頌更有何疑哉問作識無邊觀時可緣善染汚無覆無記識耶答可緣善染汚無覆無記識也兩方若緣善染汚無覆無記識者光法師所引正理論中述作識無邊觀云謂於純淨六種識身能了別中善取相已文此文無諍作識無邊觀之時唯緣善識見若依之爾者既作識無邊觀之時也善染汚無覆無記無所殘可緣之哉答作識無邊觀之時廣可緣善染汚無覆無記也故見婆沙論八十五文或云後二遍處緣善無記文或云後二遍處緣見修所斷文任此等文作識無邊觀之時緣善染汚無覆無記云事分明也但於光法師所引正理論謂於純淨六種識身之文者無邊觀是假想觀門故緣善染汚無覆無記識作純淨行相也如彼第三解脱假想觀門故緣淨不淨色作淨光鮮行相也故光法師所引正理論七十七云若由勝解思惟無邊識加行所成名識無邊處謂於純淨六種識身能了別中善取相已安住勝解由假想力思惟觀察無邊識相文若由勝解之文由假想力之言假想觀門之旨炳然也問味定者唯限愛相應定歟答唯限愛相應定也兩方若唯限愛相應定者味者是染汚義也何可限愛相應定哉是以婆沙論百六十五中述味相應初靜慮等無間淨初靜慮現在前云如愛見慢疑上靜慮者煩惱等無間淨定現在前文此文無諍味定者不限愛相應定見若依之爾者披今論文云味謂愛相應文唯限愛相應定之旨炳然也如何答味者味著之義唯是限愛之稱故味定者唯限愛相應定不通餘惑相應定也故發智論十七云諸味相應初靜慮皆有覆無記有有覆無記初靜慮非味相應謂除愛餘煩惱現前文今論中本頌結味謂愛相應長行云初味等至謂愛相應愛能味著故名爲味彼相應故此得味名文正理論七十七文顯宗論三十八説本頌長行全亦同之光法師釋此文云初味等至謂愛相應愛能味著淨定故名爲味等至與彼相應故此等至得味名引婆沙論百六十一問何故但説與愛相應非餘煩惱有説此中説相似者謂愛與定相似非餘煩惱所以者何定於所緣流注相續愛亦如是之文寶法師釋此文云此謂等持與愛相應愛能味著定亦名味畢問何故餘惑相應不名爲定答之引正理論七十七於所緣境專注不移方名爲定愛相應定亦專一境故得定名餘惑相應則不如是謂餘煩惱於自所緣不能令心專注如愛故三摩地若與愛倶專注一緣與善相似之文泰法師判初味等至謂愛相應愛能味著淨定故名爲味等至與彼味相應故此等至得味名圓暉法師述愛名爲味定與愛相應故名味定加之雜心論中解味則愛相應之頌文云問何故愛相應説禪非餘煩惱耶答相似故一向動著緣是三昧餘煩惱無有著緣如彼愛者文大乘義章十三八禪義述毘曇意云二簡強異弱諸煩惱中愛著境強偏説爲味定義同前又愛著境相似禪定故説爲定文任此等文理味定者唯限愛相應定云事分明也但於味者是染汚義也何可限愛相應定哉云難者味者專其是愛著別名全非染汚廣義故味定者唯限愛相應定不通餘或相應定也次於婆沙論如愛見慢疑上靜慮者之文者爲顯味定無間淨定現前之義引愛見慢疑上靜慮之事也其中取愛上靜慮之處以爲其證見慢疑上靜慮之邊同文故來也非今要須之歟重難云於味定可有通別二門若就通相云之者可通餘或相應定也故大乘義章十三八禪定義中依毘曇意釋味定相云一通相具論上二界中一切煩惱有著境義悉名爲味定地法故説之爲定文若爾婆沙論如愛見慢疑上靜慮者之文就通相味定論之也何云見慢疑上靜慮之邊同文故來非今要須哉次婆沙論百六十一中問何故但説與愛相應非餘煩惱答之云有説亦應説餘煩惱而不作是説者應知此義有餘文按此説意愛相應定名味定者云殘餘惑相應也理實而言可通餘惑相應定見答婆沙論等中所明味定者是別門味定非通相味定故爲顯味定無間淨定現前之義云如愛見慢疑上靜慮者其見慢疑上靜慮之邊同文故來非今要須云事道理尤可然何強疑之哉次婆沙論一説意此義有餘者論外之事也論正所述味定者雖唯限愛相應定此廢立外兼通餘惑相應定之説可有云也此全非指論正所談之義門頗足爲難勢之端歟問淨定無間所生味定爲唯緣過去一世爲當可緣三世耶答可緣三世也兩方若唯緣過去一世者味定廣緣自地諸法何可限過去一世哉是以今論中雖述味定緣自繋無簡現在未來爰知淨定無間所生味定可緣三世云事若依之爾者見今論文云此無間滅彼味定生緣過去淨深生味著文光法師釋此文云此淨定無間滅彼味定生緣過去淨定深生味著不緣現在以必不觀自性等故不緣未來未曾領故過去曾領故偏説過去文寶法師釋此文云就緣淨中唯緣過去近淨定也不緣現在及未來也現在無淨定未來淨未曾領受也文加之正理論七十七中云此能味愛現在前時緣過去境不緣現在自性相應及倶有法以必不觀自性等故不緣未來未曾領故文顯宗論三十八説全亦同之此等定判無諍定無間所生味定唯緣過去一世見如何答按味定緣自繋之理味定廣可緣自地三世諸法也故勘婆沙論處處之文或百六十一云愛相應定能緣三世文或百六十五述味相應初靜慮等無間淨初靜慮現在前云如愛見慢疑上靜慮者煩惱等無間淨定現在前文任此等文味定所緣不限過去一世云事分明也設雖淨定無間所生味定何不緣現在未來哉但於今論緣過去淨深生味者文者從多分説也以何知之者披發智論十七文云味相應初靜慮入當言味耶出當言味耶答於能味當言入於所味當言出以前念爲所味以後念爲能味味定唯緣過去見思其義勢同今論説而婆沙論百六十一中釋發智論文間愛相應定能緣三世何故唯説緣過去耶答之云有説此依多分而説謂有情類法爾多緣曾所愛順境生愛味故以前刹那爲所緣以後刹那爲能緣者依多分説會准婆沙論會通之旨推今論緣過去淨之文意也光寶兩師不緣現在等之釋且成味定緣過去淨定云當如此判也理實論之淨定無間所生味定廣緣現在未來之義更非所遮歟正理論文顯宗論説同以此趣可會其疑也問論中明味定相云緣過去淨深生味著文爾者可緣過去多刹那淨定耶答可緣過去多刹那淨定也兩方若緣過去多刹那淨定者披今論文云此無間滅彼味定生緣過去淨深生味著文如文相者味定唯緣無間滅淨定見是以寶法師釋此文云就緣淨中唯緣過去近淨定也文若緣過去多刹那淨定者寧云緣過去近淨定哉若依之爾者味定緣過去淨定之時無所簡可緣多刹那淨定也何況婆沙論百五十三中出滅定心緣過去多刹那滅定見相例可同如何答淨定無間所生味定緣多刹那淨定可生味著也唯味著無間滅淨定云事非只背道理亦無其證據者歟但於今論此無間滅彼味定生等之文者顯淨定無間所生味定緣過去淨定深生味著之義許也何致味定唯緣無間滅淨定見云疑哉次於寶法師唯緣過去近淨定也之釋者此有異本不同或本云唯緣過去退淨定也文若依此本者不可成疑若依近淨定也之本者且就能生味定之淨定云爾也全非遮緣過去多刹那淨定之義歟可會也重難云勘寶法師餘處解釋引婆沙論評曰應作是説此出定心緣過去定而不可説緣何刹那不緣何刹那以過去定有多刹那相雜住故之文畢云准上論文既相雜住不可別説即是總緣過未定也然味定即緣次前淨定以味定是貪相應心緣別相惑所以別緣次前定心而起出二定心是善心故總緣前定不別取也文此釋無諍味定唯緣次前刹那淨定見如何答滅盡定者無心定故出滅定心不可定緣何刹那不緣何刹那故總緣過去多刹那滅盡定也味定是貪相應定緣別相故異出滅定心有唯緣最後刹那淨定之義云許也更非遮緣過去多刹那淨定之邊者此釋亦無相違也問味定可緣順勝進順決擇二分耶答可緣順勝進順決擇二分也兩方若緣順勝進順決擇二分者披寶法師解釋云此説容生味定非一切生唯退分定及住中一分以退生故境亦如是文如此釋者味定唯緣順退順住二分不緣順勝進順決擇二分見若依之爾者婆沙論百六十一中云愛相應定能緣三世味定廣緣三世淨定之時寧不緣順勝進順決擇二分哉答今論中云味定但緣自地有漏味定無所簡廣緣自地諸有漏法見故不限順退順住二分可緣順勝進順決擇二分也但於寶法師解釋者披今論文云此無間滅彼味定生緣過去淨深生味著述味定緣無間滅淨定之旨而光法師所引婆沙論中云淨定等無間煩惱現在前者當知此從順退分或順住分起與味定爲等無間緣淨定唯是順退順住二分故依此義邊云唯退分定及住中一分以退生故境亦如是也此説容生味定非一切生之釋此趣炳然歟泛論味定所緣之時更可遮順勝進順決擇二分也問味定與味定可爲相應倶有二因耶答可爲相應倶有二因也兩方若爲相應倶有二因者味定者愛相應定也自體與自體何可爲相應倶有二因哉若依之爾者婆沙論中味定與味之可爲相應倶有二因見如何答味定與味定可爲相應倶有二因也故婆沙論百六十五中釋發智論十七味相應初靜慮與自地味相應爲因等無間所緣増上之文云因者三因即相應倶有同類因文但於於味定者愛相應定也自體與自體何可爲相應倶有二因哉云難者味定判性體雖唯限愛相應定論眷屬體者廣通五蘊故味定與味定爲相應倶有二因全無所背也婆沙論淨初靜慮與淨初靜慮爲相應倶有二因無漏初靜慮與無漏初靜靜爲相應倶有二因云文准之可知問第四靜慮名清淨者爲唯限無漏爲當通有漏歟答可通有漏也兩方若通有漏者光法師所引婆沙論八十一中問下地亦有無漏捨念何故但説第四靜慮捨念清淨思此問意對第四靜慮無漏捨念名爲清淨致此疑見隨答此問云或有捨念離諸煩惱及隨煩惱謂第四靜慮無漏捨念文此答意亦第四靜慮捨念名清淨者唯限無漏云事分明也若依之爾者見今論文云第四靜慮唯有四支一行捨清淨二念清淨全不簡有漏哉答第四靜慮有漏無漏捨念同離苦樂憂喜入息出息尋伺八擾亂事故倶名清淨也但於光法師所引婆沙論之問言者問下地亦有無漏捨念何故但説第四靜慮捨念清淨對第四靜慮有漏捨念倶名清淨取出下三靜慮無漏捨念疑之也答此問有多復次之中初説云第四靜慮捨念但離八擾亂事故名清淨苦樂憂喜入息出息尋伺名爲八擾亂事此中皆無獨名清淨第四靜慮有漏無漏捨念倶名清淨之旨炳然也次於婆沙論或有捨念離諸煩惱及隨煩惱謂第四靜慮無漏捨念之文者問難之言取出下三靜慮無漏捨念疑之故答中且擧第四靜慮無漏捨念答之也更不遮第四靜慮有漏捨念亦名清淨之義邊歟問光法師釋心王不立靜慮支引婆沙論二説爾者初説意如何釋之耶進云光法師釋云婆沙八十云心順流轉定順還滅故心不立爲靜慮支文付之心王通三性勢用倶増上若有順淨品之義者何偏云順流轉哉是以受心所於雜染清淨分中勢用倶勝立靜慮支心王相例其義可同加之二十二根中以心王立爲根靜慮支中寧可簡之哉答心順流轉者爲結生心引後有能專在心王故十二緣起支中立爲識支故云心順流轉也但於受心所立靜慮支云例難者受心所於雜染清淨分中勢用倶勝流轉緣起分中立爲受支還滅清淨分中立爲覺支故非如心王順流轉故據順淨邊立靜慮支也故光法師釋云受於雜染清淨分中勢用倶勝是故倶立用此流轉緣起分中次於二十二根中以心王立爲根云例難者三性心王竝有増上用故立爲根也故光法師餘處依婆沙論意釋云第二心法是内亦是所依通三性心竝有増上故立爲根文問光法師釋心王不立靜慮支引婆沙論二説爾者第二説意如何釋之耶進云光法師釋云婆沙八十云復次心勝如王諸心所法皆如臣佐定是心所故心不立爲靜慮支如諸國王不事臣任文付之設雖心王勝有助定之義者何不立靜慮支哉例如隨行對法中攝心王及相應善中攝心王如何答心王勝如王心所劣如臣而靜慮者是定心所不可心王與彼心所爲助伴故心王不立爲靜慮支云事道理尤可然也但於隨行對法中攝心王及相應善中攝心王云例難者任淨惠及眷屬皆名隨行彼此展轉互隨行故之理隨行對法中攝心王由以心心所要與慚愧善根相應方成善性之義相應善中攝心王也彼此廢立義門既別更不可爲相例之疑哉問光法師所引正理論文云有餘師説受於雜染雖是増上而與淨品作饒益事亦有功能文爾者今此受者可通無漏受耶答可通無漏受也兩方若通無漏受者既云於雜染増上可限有漏受也若依之爾者受言是廣何不通無漏受哉答見光法師所引正理論七十一文云有餘師説受於雜染雖是増上而與淨品作饒益事亦有功能如旃荼羅性雖鄙劣能與豪族作饒益事故於靜慮爲饒益事菩提分中立覺支號廣明受心所爲靜慮支立覺支號之旨故今此受者通無漏受云事必然也但於既云於雜染増上可限有漏受也云難者無漏受亦於雜染品有増上義也故婆沙論百四十二云問無漏受云何雜染品増上耶答初起加行及趣入時亦於雜染品増上謂觀行者求彼受時亦須追求衣食等物由此勢力亦生染故文問光法師意大善地法心所中輕安行捨立靜慮支故如何釋之耶進云光法師釋云無始時來惛掉亂心不能得定輕安治惛沈行捨治掉擧由此得定文付之依光法師解釋見今論餘處二十一文云惛沈睡眠能障慧蘊掉擧惡作能障定蘊文今定判寧不違餘處論説哉答光法師釋大善地法心所中輕安行捨立靜慮支云無始時來惛掉亂心不能得定輕安治惛沈行捨治掉擧由此得定或掉擧定障行捨能治惛沈是慧障輕安能治此二能治定慧重障是故別立文此二釋中第二釋意順今論餘處文初釋意實雖難思且試會云惛沈正障慧雖非障定定相應慧力用勝故依障彼定相應慧云不能得定也非謂惛沈正障定故不可違今論餘處惛沈睡眠能障慧蘊掉擧惡作能障定蘊之文歟問經部宗意定中可起身識耶答定中不可起身識歟兩方若定中起身識者五識行相是麁動也定中何可起之哉若依之爾者今論中述經部宗義云若言定中寧有身識有亦無失許在定中有輕安風勝定所起順生樂受遍觸身故文光法師釋此文云我經部宗許在定中有輕安風觸從勝定所起順生身識相應樂受遍觸身根故文任今此定判定中起身識之旨分明也如何答定中微細身識麁動故設雖經部宗意定中難起身識歟故見今論文經部答有部如何無漏靜慮現前少支有漏少支無漏之難云起不倶時斯有何失文光法師釋此文云於前後位起不倶時或説有漏或説無漏斯有何失文寶法師釋此文云起身識時不起喜受起喜受時不起身受斯有何失准此不説身識及輕安是眞無漏也文但於今論若言定中寧有身識有亦無失等之文光法師我經部宗許在定中有輕安風觸等之釋者由勝定力次念有輕安風觸起次念引生身識相應樂受還能順起意識相應三摩地故名爲定中實是定後定前中間有輕安風觸起引生身識相應樂受也故今論中經部牒有部難破云若謂外散故應失壞定者無如是失此輕安風從勝定生引内身樂還能順起三摩地故若謂起身識應名出定者此難不然由前因故文光法師釋此文云汝若謂起身識是外散故應失壞定者破云無如是失此輕安風觸從勝定生引内身識相應樂受還能順起意識相應三摩地故不失壞定汝若謂起身識應名出定者破云此難不然由前因故前因即是此輕安風從勝定生引内身樂還能順起三摩地故不名出定或可因是所以義由前相順所以不名出定文問經部宗意現在身識可緣現在輕安風觸耶答不緣現在輕安風動也兩方若緣現在輕安風觸者經部宗意無許同時因果若現在身識緣現在輕安風觸者寧不爲同時因果哉若依之爾者光法師述經部宗義云許在定中有輕安風觸從勝定所起順生身識相應樂受遍觸身根故文如此釋者現在身識可緣現在輕安風觸見如何答經部宗意不許同時因果故五識唯緣過去境不緣現在境若緣現在境者可爲同時因果故也故光法師餘處解釋中云若依經部五識唯緣過去故正理第八云有執五識境唯過去文但於光法師許在定中有輕安風觸等之釋者由勝定力有性輕安風觸起次念引生身識相應樂受緣前念輕安風觸爲言故今解釋全無相違也問論中擧有部難云勿所立支少分有漏少分無漏成違理失文光法師釋此文作三解釋爾者初二釋意少分有漏者唯限輕安風觸歟重云光法師初釋云勿所立輕安支少分輕安風觸是有漏少分意識相應輕安心所是無漏成違理失第二釋云或勿所立支輕安風觸少分是有漏意識相應少分是無漏成違理失初二釋意少分有漏者唯限輕安風觸也付之依光法師初二釋見今論文有部難經部標若爾正在無漏定中觸及身識應成無漏畢述其難意云勿所立支少分有漏少分無漏成違理失文相起盡無諍少分有漏者指上所標觸及身識見加之次下文有部重難經部云如何無漏靜慮現前少支有漏少支無漏文光法師釋此文云如何無漏靜慮現前觸及身識樂少支有漏意識相應少支無漏此約體難文若爾光法師初二釋意非只背論文前後亦致相違於自釋哉答光法師初二釋意非無其由論文既云勿所立支少分有漏少分無漏於所立支論少分有漏少分無漏之義而就有部自義見之輕安是靜慮支故少分有漏者當輕安風觸身識非靜慮支故不擧之也第三釋如疑難之趣得意釋或勿所立支輕安風觸及身識樂少分是有漏意識相應少分是無漏成違理失也但於光法師次下觸及身識樂少支有漏之釋者上三解釋中且述第三釋意歟重難云有宗不論輕安風觸經部雖許輕安風觸不立靜慮支所立支輕安風觸云事就何義意難思哉答准有宗輕安心所立靜慮支之義勢經部云定中有輕安風觸故以輕安名同有部難經部押云所立支輕安風觸也問經部宗意前十五界唯名有漏歟進云今論疏中通無漏釋也付之經部宗意以經説爲定量而見今論文云如契經言諸所有眼乃至廣説此經中説十五界全皆有漏故文經部宗意豈不違此經説哉加之有宗對經部立量云餘十五界唯名有漏道諦無爲所不攝故如諸煩惱文此量付何過可成前十五界通無漏之義哉答披今論現文尋經部宗義云若謂順彼故説覺支無漏亦應許如是説文光法師釋此文云汝若謂身輕安實非覺支順彼覺支名覺支無漏亦應許如是説觸及身識順無漏故名爲無漏無少分有漏少分無漏失文任今此定判經部宗意無漏定中輕安風觸及與身識相應樂受名爲無漏故前十五界通無漏云也但於今論所引契經説者今論中即會之云無違經過此約餘觸及餘身識密意説故文光法師釋此文云無違經過此經意約餘散位觸及餘散位身識密意説彼十五界全皆是有漏不約定位非理盡説故言密意文寶法師釋此文云此就餘觸及餘身識唯名有漏准此論意經部以輕安風及身識順無漏故假名無漏文次於有宗所立比量者問經部宗意無漏定現前位輕安風觸可倶起耶答不倶起也兩方若倶起者輕安風觸其體有漏也無漏定現前位何可倶起哉若依之爾者披光法師餘處四解釋或釋今論以身輕安能引覺支心輕安故之文云由入定故身中即有輕安風起能引覺支心輕安故此即同時説名能引由斯相順故名覺支文或代倶舍師救正理論以能隨順覺支體故亦名覺支謂身輕安能引覺支心輕安故之文云我説身輕安觸與入定心輕安同時能引能順望彼有力可得相從説名覺支文任此等解釋無漏定現前位輕安風觸可倶起見如何答經部宗意輕安風觸其體實是有漏法故無漏定現前位全不可倶起故今論中經部答有部如何無漏靜慮現前少支有漏少支無漏之難云起不倶時斯有何失文光法師釋此文云於前後位起不倶時或説有漏或説無漏斯有何失文寶法師釋此文云起身識時不起喜受起喜受時不起身受斯有何失准此不説身識及輕安是眞無漏也文但於光法師餘處此即同時説名能引之釋倶舍師我説身輕安觸與入定心輕安同時之救者前念後念相順續起名爲同時更非一念同時倶起也問經部宗意於靜慮支可有十八耶答可有十八也兩方若有十八者今論中明經部宗義云由此可説依初五支減二三四立第二等即由此理初説五支擬漸離前建立後故無漸減故不説想等文如此文者經部宗意於靜慮支不可有十八見是以泰法師述依上座部立十一支畢引今文爲證若依之爾者於靜慮支有十八者於契經説經部宗意豈可背契經説哉答經部宗意契經所説以爲定量而契經中既説靜慮支有十八故經部宗意尤可守其説也但於今論由此可説依初五支等之文者全非相違此文意云於初靜慮五支之中減尋伺二立第二靜慮内淨喜樂定四支減尋伺喜三立第三靜慮捨念惠樂定五支減尋伺喜樂四立第四靜慮捨念中受定四支爲言故光法師釋此文云經部依宗自釋由此可説依初五支減尋伺二立第二定減尋伺喜三立第三定減尋伺喜樂四立第四定即由此道理初定説五支擬漸離前支建立後定故無漸減故所以不説想等爲支文寶法師釋其意同之任此等定判就初靜慮五支論漸減義之旨分明也次於泰法師釋者上座部意設雖存靜慮支有十一引今文爲其證云事恐難依用歟重難云内淨支既無漸減義第二靜慮中何可立之哉依之見泰法師解釋云依初定五支減尋伺二立第二定喜樂一心三支文如何答經部宗意第二靜慮立内淨支也故今論中答應審思擇應説何法名内等淨之問擧經部師義云此定遠離尋思鼓動相續清淨轉名爲内等淨文光法師釋此文云經部師答此第二定能遠離彼尋伺鼓動定體相續清淨寂靜轉名爲内等淨文寶法師釋此文云經部釋也即是此第二定遠離尋伺鼓動相續清淨名内等淨也文准此等解釋經部宗意第二靜慮立内清淨支云事炳然也但於内淨支既無漸減義云難者漸減義自本就初靜慮五支論之故不可爲疑歟次於泰法師釋者叙上座部計非經部宗義故全非相違也問寶法師意欣厭心所與定相應歟答可與定相應也兩方若與定相應者披寶法師解釋擧大善地法十尋伺心王二十三法畢云自餘心所與定不相應故不立支也文如此釋者欣厭心所不與定相應見若依之爾者設雖寶法師意何不許欣厭心所與定相應哉是以光法師意欣厭心所與定相應見如何答寶法師意欣厭心所與定相應可云也故見婆沙論處處之文或二十八云評曰有別法名厭非惠非無貪是心所法與心相應此説在復有所餘如是類諸心所法與心相應然見蘊説苦集忍智名能厭者由彼忍智與厭相應説名能厭非厭自性文或百九十六云評曰應説厭體性異非無貪非惠別有心所法名厭與心相應此即攝在復有所餘心所法中文寶法師餘處四引此二文畢云此厭唯善通漏無漏文加之婆沙論百四十三中述欣厭不立根云於散位中此用雖勝於定善位用不分明根用必於兩位中勝而於定位明了増強故彼二法無有根義文寶法師餘處四指此文云又婆沙一百四十三亦別立欣厭文任此等定判欣厭心所其體通有漏無漏與散心定心相應云事分明也但於寶法師自餘心所與定不相應之釋者可有二會通或就四十六心所廢立論之故不可攝欣厭上擧大地法十大善地法十不定地法之中尋伺二十二心所畢下云自餘心所指大煩惱地法六大不善地法二小煩惱地法十不定地法之中除尋伺餘六此二十四心所云與定不相應也或亦設雖加欣厭心所欣厭心所不竝生故有時定心與欣相應有時定心與厭相應非恒相應故云與定不相應歟問染汚第二靜慮可立喜支耶進云光法師判有喜定二立喜支釋也付之見光法師所引正理論七十八文明染汚初靜慮不立喜支云爲顯喜支唯是善性故薄伽梵與樂合説文而於第二靜慮述定生喜樂與樂合説准例思之染汚第二靜慮不可立喜支也如何答染汚第二靜慮可立喜支也故今論云第二染中無内等淨彼爲煩惱所擾濁故文光法師釋此文云此明二定染無内等淨樂同初定故不別簡有喜定二故正理七十八云第二染中無内等淨彼爲煩惱所擾濁故雖諸世間説有染信而不信攝故不立支樂是輕安唯善性攝例同初定故不重遮故此染支唯有二種文顯宗論三十八全亦同之加之婆沙論百六十中釋發智論十七一切第二靜慮皆有四支耶答不染汚有四染汚無四無何等答無内等淨之文問内等淨是信信通染汚不染汚何故於染靜慮不説支耶答之有二有説之中第二説云有説染信名不信此於染中雖有無支相故不立爲支若作是説不染第二靜慮具四支染第二靜慮唯有二支文此第二有説當今論初師説也任此等定判染汚第二靜慮立喜支云事分明也但於光法師所引正理論故薄伽梵與樂合説之文者染汚初靜慮不立喜支染汚第二靜慮立喜支事以離生言之有無爲正證也故正理論次下文問第二染定許有喜支初染中無以何爲證答以初定喜説從離生第二中無離生善言故此旨炳然也初靜慮説離生喜樂有離生言之上喜示合説顯喜同樂善性之義云也第二靜慮説定生喜樂定名通善染汚故其性通善染汚之喜於善染汚靜慮同立支其性限善之樂唯於善靜慮立支也非以與樂合説爲染汚初靜慮不立喜支之證第二靜慮喜樂合説染汚第二靜慮不可立喜支云難更非所痛也問頌文云餘説無安捨文爾者此師意染汚第二靜慮可立内淨支耶答可立内淨支也兩方若立内淨支者内淨支是大善地法攝也染汚靜慮支中寧可立之哉是以勘泰法師解釋述此師義云應言第二亦無内淨信根亦是善地攝故而不説者以信但是一地中無是故不説文此釋無諍第二師意染汚第二靜慮不立内淨支見若依之爾者既云餘説無安捨染汚靜慮支中雖簡輕安行捨無簡餘支若染汚第二靜慮不立内淨支者何不簡之哉答今論第二師意染汚第二靜慮可立内淨支也今論云有餘師説初二染中但無輕安後二染中但無行捨大善攝故文光法師釋此文云有餘師説初二染中但無輕安初染有四支第二染有三支後二染中但無行捨第三染有四支第四染有三支以輕安行捨大善地攝故内等淨是信信通染不染故第二染説有三支正理七十八云有餘師説初二染定但無輕安後二染中但無行捨大善攝故彼説染中喜信念惠皆是支攝皆通染故文顯宗論三十八説全亦同之加之婆沙論百六十中釋發智論十七一切第二靜慮皆有四支耶答不染汚有四染汚無四無何等答無内等淨之文問内等淨是信信通染汚不染汚何故於染靜慮不説支耶答之有二有説之中初説云有説此文應説無樂以輕安樂染中無故若作是説不染第二靜慮具四支染第二靜慮有三支文此初有説當今論第二師説也任此等定判今論第二師意染汚第二靜慮立内淨支云事分明也但於内淨支是大善地法攝也染汚靜慮支中寧可立之哉云難者信通染汚故染汚第二靜慮立内淨支也次於泰法師應言第二亦無内淨之釋者論文之外以別義勢染汚第二靜慮不可立内淨支釋也是既論外之釋故不及致會通也問生靜慮可有近分根本不同耶答無近分根本不同也兩方若有近分根本不同者生靜慮者如世間品中云三靜慮各三第四靜慮八是也寧有近分根本不同哉是以今論疏中生靜慮無近分根本不同見若依之爾者定靜慮既有近分根本不同生靜慮例亦可然何況生靜慮中論喜樂捨受差別豈非有近分根本不同哉加之廣披諸論説尋生靜慮相今論云雖近分心有結生染而遮定染故作是説文光法師餘處十所引正理論三十文判由此故説下三靜慮唯近分心有死生理以根本地無捨受故婆沙論百六十五中述命終結生唯住近分不住根本任此等論説生靜慮有近分根本不同云事分明也如何答生靜慮無近分根本不同可云也其故見今論前後文或云生靜慮體世品已説謂第四八前三各三指世間品三靜慮各三第四靜慮八之文於色界十七天等豈有近分根本不同哉或問如定靜慮所有諸受生亦爾不答不爾徵如何釋生靜慮從初有喜樂捨受及喜捨樂捨唯捨受如次結是謂定生受有差別若生靜慮如定靜慮有近分根本不同者於下三靜慮可云根本喜受樂受近分捨受而不云如是述生靜慮從初有喜樂捨受等望定靜慮判受有差別故生靜慮無近分根本不同之旨炳然也加之婆沙論中出捨初靜慮地心得第二靜慮地心初靜慮地心滅第二靜慮地心起句云謂初靜慮沒生第二靜慮地文若生靜慮有近分根本不同者今此第三句尤就根本可論之寧擧命終位哉此文既於命終結生心立初靜慮第二靜慮名爲初靜慮地心滅第二靜慮地心起句故生靜慮中云初靜慮第二靜慮之時不論近分根本不同見故准此等論判生靜慮無近分根本不同云義所存也但於定靜慮既有近分根本不同云例難者定靜慮中勝品禪定名根本地劣品禪定名近分地故有此不同生靜慮者除定靜慮定煩惱外三性色心心所心不相應屬地地生法更無勝劣差異故無近分根本不同也次於生靜慮中論喜樂捨受差別云難者生靜慮中雖有喜樂捨受差別無近分根本不同故非如定靜慮所有諸受也次於今論雖近分心有結生染之文者定靜慮所分別近分根本中通有生靜慮故捨受云近分喜受捨樂受名根本也非謂云爾故生靜慮廢立門近分根本不同光法師餘處所引正理論下三靜慮唯近分心有死生理之釋婆沙論命終結生唯住近分不住根本之文會通之趣亦以同之問寶法師意依身在上三靜慮所起借識類悉自性無記攝歟第二卷抄記錄之畢問依身在初靜慮依第二靜慮以上眼起初靜慮眼識爲唯限無覆無記爲當通善性歟答唯限無覆無記也兩方若唯限無覆無記者依身在初靜慮所起眼識也何唯限無覆無記哉是以依身在初靜慮依初靜慮眼起初靜慮眼識不限無覆無記相例可同若依之爾者依身在第二靜慮已上起初靜慮眼識唯限無覆無記例亦可同如何答依身在初靜慮依第二靜慮以上眼起初靜慮眼識即是天眼通故唯限無覆無記其理必然也故婆沙論七十三云若諸異生生初靜慮即彼以第二靜慮眼見欲界色時於彼色起無覆無記眼識見初靜慮色時於彼色起無覆無記眼識見第二靜慮色時於彼色起無覆無記眼識文今此人以第三靜慮眼見四地色以第四靜慮眼見五地色時起初靜慮眼識唯限無覆無記准之可思但於依身在初靜慮依初意眼起初意眼識不限無覆無記云例難者依身在初靜慮依自地眼起自地眼識通泛爾起故隨其所應可通善染汚無覆無記也故婆沙論七十三云此中眼識依自地眼緣下地色容有二種謂除染汚緣自地色容有三種若依上地眼唯無覆無記文問起緣者爲唯超一地爲當可有超多地義耶答可有超多地義也兩方若有超多地義者見今論文云類智無間能生無色法智不然依緣下故文超緣若有超多地之義者法智無間何不生無色等至哉是以光法師釋此文述超有二種一者起定二者超緣此二種超倶至第三不至第四畢引婆沙論百六十五於中唯能超緣一地之文明知超緣者唯超一地云事何況光法師所引婆沙論中云如不能越二地所緣超定亦爾故不入第四文而勘婆沙論百六十五説問何故不能超入第四答之云過殑伽沙數諸佛世尊及聖弟子超入諸定法皆如是故不應問於超定者唯超一地定同之超緣寧超多地哉若依之爾者金剛喩定廣通道法智初起盡智唯緣有頂苦集豈無超緣多地之義哉答披今論餘處文或云二十四金剛喩定説有多種滅道法智各有四行相應有八滅類智緣八地滅道類智緣八地道或二十六述金剛喩定境同此耶緣苦集同緣滅道異金剛喩定緣九地滅道之中緣欲界四靜慮空無邊處六地滅道金剛喩定無間生初盡智之時所生盡智唯緣有頂苦集者性相之所定故可有超緣多地之義云事必然也但於今論法智不然依緣下故之文者法智唯緣欲界境無色等至唯緣無色界境故法智無間生無色等至者須超色界四地必可背不念作意超緣相故法智無間不生無色等至也故光法師釋此文云以法智緣欲界境無色等至緣無色境不可頓超色界四地故法智無間不生無色文滅道法智無間生緣有頂苦集初盡智事總見盡智或緣初靜慮或緣第二靜慮盡智法智無間現起之時不背不念作意超縁相故法智無間生盡智也其中念作意時法智無間生緣有頂苦集初盡智無其過也緣四靜慮空無邊滅道類智無間生緣有頂苦集初盡智准之可思也次於光法師此二種超倶至第三不至第四之釋幷婆沙論於中唯能超緣一地之文者據不念作意論之也故婆沙論云有説如所緣緣故唯超一謂觀行者不念作意於所緣緣唯能超一問云何觀行者於所緣超答彼由不念作意以初靜慮於九地境一一別緣於中唯能超緣一地文雜心論九云超越三摩提上下至第三及不念思惟於緣超亦然文彼論子注云不念思惟者率爾能緣超至三也文任此等論判超緣唯超一地者就不念作意説之云事分明也次於光法師所引婆沙論如不能越二地所緣超定亦爾之文者以不念作意超緣望超定時一地義是同故云超定亦爾也全非遮念作意時超緣多地之義歟重難云見婆沙論百六十五文云有説法智品但緣欲界及彼滅道緣欲界及彼滅道無間不得即緣無色地境以極微遠故由此法智品非無色等無間緣文如此文者滅道法智無間爭可生緣有頂苦集初盡智哉答念作意時超緣多地云義意不許法智無間生無色等至故此文更非疑也若法智無間生無色等至者必可背不念作意超緣相故如此云也滅道法智無間生盡智中有不背不念作意超緣相之類故念作意時自亦滅道法智無間生緣有頂苦集初盡智有何相違哉問順自地勝徳爲名順勝進分爲當名順住分歟答名順勝進分也兩方若名順勝進分者今論中擧四分定畢云地各有四有頂唯三由彼更無上地可趣故彼地無有順勝進分攝文若順自地勝徳名順勝進分者有頂地何無順勝進分哉若依之爾者光法師所引正理論中述順自地勝名順勝進分之旨如何答順自地勝徳可名順勝進分也故光法師所引正理論云然勝進分總有二種一者自地殊勝功徳二者上地殊勝功徳若能牽引彼名順勝進分文婆沙論第百二十四卷中或云若初靜慮順退分順勝進分順決擇分等業已現在前已牽異熟如是乃至非想非非想處順退分等業廣説應知文或云若諸靜慮無色順退分順住分順勝進分順決擇分等業已現在前已牽異熟文第百二十五卷多有如此之文此等文意有頂地有順勝進分見故順自地勝徳名順勝進分云事炳然也光法師問若爾何故婆沙業蘊説有頂地有四分耶即指此等説也但於今論有頂唯三之文者光法師會此相違云此論及婆沙十一據有頂地更無上地可欣趣故故説彼地無勝進分婆沙業蘊據當地中更有勝徳可欣趣故言有勝進故正理七十八云然勝進分總有二種一者自地殊勝功徳二者上地殊勝功徳若能牽引彼名順勝進分已上論文故説有頂或有或無各據一義文文意顯也按此釋意今論云地各有四有頂唯三由彼更無上地可趣故彼地無有順勝進分攝婆沙論第十一云淨初靜慮復有四種謂順退分順住分順勝進分順決擇分如是乃至無所有處皆有四種非想非非想處唯有三種除順勝進分就地論之順自地名順住分順上地名順住分順上地名順勝進分之談前於有頂地更無上地可欣趣故云無順勝進分也婆沙論業蘊等説於當地中更有勝徳可欣趣故有頂地亦有順勝進分爲言各述一門遂不相違歟問順住分無間可生無漏定耶進云今論中云唯第四分能生無漏順住分無間不生無漏釋也付之依今論定判思順住分相既修所成攝也何不生無漏定哉彼聞思散善無間尚生無漏定勝品順住分無間寧不生之哉是以見婆沙論百六十七文明有漏他心智相攝四分定云此唯攝順住分文而光法師餘處二十六破遠法師義云本論既言有學八智展轉相望皆容得作等無間緣成有學八智互爲等無間緣之旨婆沙論百七中釋發智論九他心智與苦集智爲四緣之文述若有漏他心智與苦集智爲所緣者定非因緣有漏不與無漏爲因緣故可爲等無間緣見爰知有漏他心智攝順住分無間生無漏定云事如何答任淨定有四種謂即順退分順住順勝進順決擇分攝如次順煩惱自上地無漏之性相順住分能順自地不順無漏故彼無間不生無漏定也故今論云於此四中唯第四分能生無漏所以者何由此四種有如是相順退分能順煩惱順住分能順自地順勝進分能順上地順決擇分能順無漏故諸無漏唯從此生文光法師釋此文云若依婆沙一百六十五淨生無漏中云此但從順決擇分有説亦從順勝進分雖無評家以前解爲正故正理七十八云應知此中決定義者謂諸聖道必此無間生非此無間必能生聖道若異此者是則應説唯世第一法名順決擇分已上論文又諸論皆言順決擇分能生聖道文寶法師釋此文云述四分定中唯順決擇分能生無漏非餘三也以四分定各有別相既唯順決擇分能順無漏故知唯順決擇分能生無漏文顯宗論説全同光法師所引正理論文准此等文理順住分無間不生無漏定云事炳然也但於聞思散善無間尚生無漏定云難者定散相望之時雖定善勝散善劣品定善之中能順煩惱能順自地能順上地能順無漏四分別故唯順決擇分無間生無漏定也非謂餘三分自聞思散善劣品故彼無間不生無漏定聞思散善其性雖劣加行所起力用殊勝故彼無間生無漏定也次於婆沙論此唯攝順住分之文者五通等功徳多是順住分攝故從多分云唯攝順住分也不遮通順決擇分之義邊故發智論幷婆沙論中有漏他心智與無漏智爲等無間緣見文還爲此義之潤色也重難云有漏他心智通順決擇分云會通不可然見婆沙論一段之文明他心智攝世俗智少分云世俗智在十八地謂欲界靜慮中間四靜慮四無色及彼近分此唯攝四靜慮於四靜慮中有善染汚無覆無記此唯攝善於善中有生得聞所成修所成此唯攝修所成於修所成中有加行無間解脱勝進道此唯攝勝進道於勝進道中有順退分順住分順勝進分順決擇分此唯攝順住分文此文既自麁向細述有漏他心智相擧四分定畢云此唯攝順住分唯限順住分之旨分明也豈輒會從多分説哉是一何況有漏他心智無間生無漏智云事其義未決定光法師餘處本論既言有學八智展轉相望皆容得作等無間緣之釋總見他心智之時無漏他心智與無漏智爲等無間緣故云爾也婆沙論若有漏他心智與苦集智爲所緣者定非因緣等之文有漏他心智雖不與苦集智爲等無間緣無漏他心智與苦集智爲等無間緣故且簡殘等無間緣也勘婆沙論次下文云與滅智爲三緣除所緣者彼緣無爲故以有漏他心智望滅智無簡因緣若以不簡爲其證者寧云有漏他心智爲滅智爲因緣哉若爾此等定判猶不明證何定有漏他心智無間生無漏智會婆沙論此唯攝順住分之文從多分説哉是二答從多分置唯言者論家人師之常習也如慈恩大師因明大疏中釋入正理論能立與能破及以唯悟他之文云故此頌中據其多分皆悟證者言唯悟他不言自悟等也婆沙論此唯攝順住分之文從多分説云會通無背自麁向細一段起盡也次光法師餘處本論既言有學八智展轉相望等之釋有漏無漏他心智與無漏智爲等無間緣爲言唯就無漏他心智論之云事不叶今論文也本論説意如下記之次就婆沙論文疑難之趣甚無其謂見發智論文標他心智與苦集智爲四緣畢若與彼爲因非所緣者指無漏他心智若與彼爲所緣非因者指有漏他心智也故婆沙論中釋此文云與苦集智爲四緣等者謂無漏他心智與苦集智爲一類因者定非所緣彼緣有漏故若有漏他心智與苦集智爲所緣者定非因緣有漏不與無漏爲因緣故文是即就有漏無漏一類他心智見之無與苦集智爲因爲所緣故有此分別也何云簡殘等無間緣哉就中云若有漏他心智與苦集智爲所緣者定非因緣別述有漏他心智與苦集智爲所緣非因寄事於無漏他心智與苦集智爲等無間緣有漏他心智望苦集智簡殘等無間緣云難勢頗文外聊簡也但於以有漏他心智望滅智無簡因緣云難者全非相例云他心智與苦集智爲四緣時無漏他心智與苦集智爲因非所緣有漏他心智與苦集智爲所緣非因故有此分別云他心智與滅智爲三緣時無漏他心智與滅智爲因等無間増上三緣故無可分別也無漏他心智與滅智無所闕爲三緣之上有漏他心智不與滅智爲因緣不及簡之也疑難之旨恐不辨發智婆沙兩論深意歟問生非想非非想處阿羅漢果聖者可起順決擇分耶答可起順決擇分也兩方若起順決擇分者見今論文云順決擇分能順無漏文而非想非非想處無有無漏生彼阿羅漢果聖者難起順決擇分哉若依之爾者順決擇分者殊勝善根也生非想非非想處阿羅漢果聖者何不起之哉答非想非非想處既有順決擇分生彼阿羅漢果聖者寧不起自地殊勝功徳哉何況婆沙論百八十五中述生非想非非想處聖者起無所有處聖道斷自地煩惱云然彼聖道由因力強非加行力暫起現前斷餘煩惱得阿羅漢果已設更住壽經八萬劫終不重起以無用故文准此文思之生非想非非想處阿羅漢果聖者無所有處聖道無間生自地淨定時尤可起順決擇分也但於非想非非想處無有無漏云難者非想非非想處雖無有無漏起無所有處無漏故可起順彼無漏善根也問煗等四善根四分定中唯順決擇分攝歟答唯順決擇分攝也兩方若唯順決擇分攝者披婆沙論五文云煗頂二善根具順退順住順勝三分或頂善根具順退順勝二分忍善根具順住順勝二分世第一法唯順勝分文如此文者煗等四善根通順退住順勝進分見若依之爾者煗等四善根是見道近加行也何可通退分定等哉答煗等四善根是見道近加行殊勝善根故四分定中唯順決擇分攝也故光法師所引正理論七十八中述順決擇分無間生諸聖道云應知此中決定義者謂諸聖道必此無間生非此無間必能生聖道若異此者是則應説唯世第一法名順決擇分文顯宗論三十九説全亦同之此文無諍煗等四善根四分定中唯順決擇分攝見加之正理論七十八云順決擇分者如煗頂忍世第一法文顯宗論三十九説全亦同之婆沙論百六十三云順決擇分者即煗頂忍世第一法等文光法師餘處十五釋云今准此論及正理論唯煗等四順決擇分名殊勝善根命終捨餘順決擇分非是殊勝命終不捨文任此等定判煗等四善根四分定中唯順決擇分攝之旨分明也何況若煗等善根通退分定者豈無離染拾義哉旁思之煗等四善根不通退分定等云事炳然也但於婆沙論中以煗等四善根分別順退分定等之文者彼於順決擇分隨義門相順一往分別順退順住順勝三分也非謂通四分定中退分定等若盡理談者寧除順決擇分哉既除順決擇分明知本爲順決擇分之上一往分別餘三分云事故婆沙論五中問此中三分一切皆是順決擇分善根所攝與後定蘊所説四分有何差別答之云所依各異謂此但依隨順見道總立一種順決擇分於中義別復開三種後定蘊中總依有漏修所成善建立四分若順退者名順退分若順住者名順住分若順昇進者名順勝進分若順聖道者名順決擇分是故此彼所依各異文尋云婆沙論文云所依各異者其意如何答問無漏定無間可生順住分耶進云光法師釋生後二分不生順住分見付之依光法師解釋披婆沙論百六十五現文述無漏初靜慮與淨初第二第三靜慮爲等無間緣擧或云除順退分與餘三分爲等無間緣或云唯與後二分爲等無間緣之二説云於上地淨亦爾畢後出評家義云如是説者漸次入時亦與勝進分爲等無間超越入時唯與順決擇分爲等無間文如文相起盡者評家意不遮無漏定無間生自地順住分哉答見光法師解釋問無漏復能生幾分耶解之云生後二分故正理七十八云無漏無間何分現前有説通三除順退分理實唯二謂後二種文顯宗論三十九説全亦同之任此等定判無漏定無間不生順住分云事分明也但於婆沙論文者披彼論前後文述無漏初靜慮與淨初第二第三靜慮爲等無間緣云此中於自地淨有説除順退分與三分爲等無間有説唯與後二分爲等無間於上地淨亦爾者無漏初靜慮與自地後二分爲等無間緣云初師意與第二第三靜慮後三分亦爲等無間緣云無漏初靜慮與自地後二分爲等無間緣云第二師意與第二第三靜慮後二分亦爲等無間緣云也而評家意總而言之雖同無漏初靜慮與後二分爲等無間緣云第二師説改無簡別無漏初靜慮與第二第三靜慮後二分爲等無間緣云處漸次入時通與後二分爲等無間緣超越入時唯與順決擇分爲等無間緣爲言全非許無漏初靜慮與自地順住分爲等無間緣之義也問阿羅漢果聖者散善無間退煩惱義可有耶答散善無間退煩惱義可有也兩方若有此義者光法師所引正理論七十八中云若順煩惱名順退分諸阿羅漢寧有退理非彼猶有順退分定可令現行離染捨故雖有此難而實無違謂順住中有順退者亦得建立順退分名從彼有退如先已説文如此文者阿羅漢果聖者住分定無間退煩惱散善無間不退之見若依之爾者阿羅漢果聖者種類非一准設雖散善無間何無退煩惱義哉答唯自地心無間起煩惱退者性相之所定也故阿羅漢果聖者起欲界煩惱退之時散善無間退之云事其理必然也但於光法師所引正理論文者就阿羅漢果聖者起色無色界煩惱退致問答故述住分定無間退起之旨全非疑也問未離自地染者順住分無間起煩惱義可有耶答可有此義也兩方若有此義者未離自地染者無捨退分定閣退分定順住分無間不可起煩惱是以光法師所引婆沙論百六十五中述淨定等無間煩惱現在前云當知此從順退分或順住分起由已離未離自地染者起自地煩惱有差別故文如此文者未離自地染者順住分無間不起煩惱見若依之爾者既許順住分無間煩惱現在前設雖未離自地染者何無此義哉答見光法師解釋云問味定生淨定四分之中生何分耶解云若味生自淨婆沙百六十五云有説味相應等至無間唯起順退分現在前有説亦起順住分然無評家許味定無間起順住分之義婆沙論百六十九中云若等至以味相應初靜慮爲等無間而不以彼爲因者有十六謂淨初靜慮四無量初二解脱前四勝處五通所依當卷次下幷第百七十卷之中多有此趣述味定無間起五通所依定之旨而按婆沙論百七十惠解脱阿羅漢起味相應初靜慮退時除無學位等所修自地三通所依不捨不得云文意五通所依定不通退分定見若通退分定者可有亦得義故也故味定無間所起五通所依定者當順住分任此等定判味定無間起順住分云事分明也若有味定無間閣退分定起順住分者准而思之未離自地染者閣退分定順住分無間起煩惱義亦必然也何況勘婆沙論八十九文云他心智生六心者謂色界五部及欲界修所斷五通等無間不能引起無色界心他心智無間生色界五部心判爰知未離自地染者順住分無間起煩惱義可有也但於未離自地染者無捨退分定云難者未離自地染者雖不捨退分定隨宜順住分無間亦起煩惱義何不許之哉次於婆沙論由已離未離自地染者起自地煩惱有差別故之文者已離自地染者起定地煩惱退時必順住分無間起煩惱未離自地染者多退分定無間起煩惱故云爾也更非遮未離自地染者中自有順住分無間起煩惱義歟問今論意順決擇分無間可生順勝進分耶進云今論中云生二三三一順決擇分無間不生順勝進分云也付之心品相生隨時不定也順決擇分無間何不生順勝進分哉是以順住分無間生順退分順勝進分無間生順勝進分見加之披婆沙論十一説云順決擇分無間二種現在前謂順決擇分及順勝進分文如何答本論中本頌結生二三三一長行述第四生一謂自非餘順決擇分無間不生順勝進分云也但於順住分無間生順退分順勝進分無間生順住分云例難者光法師自問答也即答此問云決擇欣無漏不生次前住與勝進非欣無漏容次生前或勝進相欣求上法性非止息故決擇分不生勝進住退二分性有止息可從勝進生住住生退分文初釋意云順決擇分欣無漏故不生順勝進分順住分順勝進分不欣無漏故住分無間生退分勝進分無間生住分云也第二釋意云順勝進分欣求上法故專欣生順決擇分更不欲止息自分故從勝決擇分還住自勝進分之義甚非所欣故決擇分無間不生勝進分順退分順住分具止息自分之相故住分無間生退分勝進分無間生住分也爲言次於正理顯宗兩論説者彼論有兩説中一説意也故光法師釋云正理顯宗皆有兩説一説同此論又一説云有説亦生順勝進分然無評家後家意説如住勝進能生前一順決擇分亦生前一文既別師義也更非難端歟次於婆沙論順決擇分無間二種現在前之文者此第十一卷説同正理論後師也若依一百六十五卷評家義者順決擇分無間亦順住分現在前云也故光法師釋云若依婆沙十一同正理後師若依婆沙一百六十五云順決擇分與順住分有説但爲所緣増上以順決擇分無間順住分不現前故如是説者亦現在前是故與彼爲三緣除因緣與順勝進分亦爾前説同正理後師能生二分後正義家能生三分文此亦別師義也全不可劬勞之問初靜慮味定與順勝進分爲幾緣耶進云光法師所引婆沙論中爲二緣見付之設雖初靜慮味定何不與順勝進分爲三緣哉是以第二靜慮味定與順勝進分爲三緣初二靜慮相例可同如何答見光法師解釋云若味生自淨婆沙云有説味相應等無間唯起順退分現在前有説亦起順住分然無評家味定無間不生自地順勝進分故初靜慮味定與順勝進分唯爲所緣増上二縁不爲因等無間二緣也故婆沙論百六十五中釋發智論十七味相應初靜慮與自地淨爲等無間所緣増上之文云等無間者此中有説味相應等無間唯順退分現在前有説亦起順住分文但於第二靜慮味定與順勝進分爲三緣云例難者見光法師解釋云若味生下淨婆沙云有説起順住分以易起故有説起順勝進分防護上地故然無評家上地味定無間生下地順勝進分故第二靜慮味定與初靜慮順勝進分爲等無間緣故第二靜慮味定與順勝進分爲等無間所緣増上三緣唯不爲因緣也故婆沙論百六十二中釋發智論十七味相應第二靜慮與淨初二靜慮爲等無間所緣増上之文云此中與淨初靜慮爲等無間者問彼起何等淨初靜慮有説起順住分以易起故有説起順勝進分防護上地故文問有漏斷惑道爲唯限順住分爲當通順勝進順決擇二分歟答可通順勝進順決擇二分也兩方若通順勝進順決擇二分者有漏斷惑道觀下地爲麁苦障觀自地爲靜妙離而婆沙論百六十三中唯順住分作此行相見以知不通順勝進順決擇二分云事若依之爾者有漏斷惑道者殊勝善根也何不通順勝進順決擇二分哉答有漏斷惑道不限順住分可通順勝進順決擇二分也故披今論餘處二十六文云斷欲加行有欲勝進俗四法類隨應現修斷欲修斷第九勝進斷上八地諸加行道俗四法類隨應現修斷上七地有頂八品諸勝進道俗四法類及他心智隨應現修文光法師釋此文云有欲言顯斷惑未盡即前八勝進道俗智四諦智法智類智隨應現修文任今此定判斷惑諸勝進道位無漏智品隨應現修見若爾有漏解脱道無間起無漏勝進道之時彼解脱道通順決擇分云事必然也若通順決擇分者寧可簡順勝進分哉以此等文理思之有漏斷惑道通不限順住分通順勝進順決擇二分可云也但於婆沙論中唯順住分作下地麁苦障自地靜妙離行相見云難者全非相違正勘彼論文云順住分者能觀下地爲麁苦障而生厭皆能觀自地爲靜妙離而樂安住順勝進分者能觀自地爲麁苦障而生厭背能觀上地爲靜妙離而生欣樂順決擇分者隨順聖道此分或作聖行相或作餘行相而向聖道趣於解脱文案文意爲顯四分定相且致一往分別也理實而言順勝進順決擇二分亦可作下地麁苦障自地靜妙離行相故更無所背也問順勝進分無間可修超等至耶答不修超等至也兩方若修超等至者光法師所引婆沙論中順勝進分無間不修超等至見若依之爾者披婆沙論百六十五文明淨初靜慮與淨第三靜慮爲等無間緣云當知從順勝進分入上淨非餘文既許初靜慮順勝進分無間入淨第三靜慮豈非順勝進分無間修超等至哉答修超等至者第唯有猛威堅固有漏善根與無漏道互爲等無間緣能相引發故唯順決擇分無間修之也故正理論云諸有修習超等至唯順決擇最堅勝故文顯宗論三十九説全亦同之光法師所引婆沙論百六十五中問何故超越入時唯順決擇分與無漏道互爲等無間緣餘時不爾答之云於超越時唯有猛盛堅固善根能相引發順決擇分猛盛堅固餘分不爾文任此等文理順勝進分無間不修超等至云事分明也但於婆沙論當知從順勝進分入上淨非餘之文者是超定前方便非超定成滿故全不可爲相違故見今論文上云謂觀行者修超定時先於有漏八地等至順逆均次現前數習次於無漏七地等至順逆均次現前數習次於有漏無漏等至順逆間次現前數習次於有漏順逆均超現前數習次於無漏順逆均超現前數習是名修習超加行滿此五種觀門是超定加行非超定成滿下述後於有漏無漏等至至順逆間超名超定成有漏無漏等至互爲等無間緣順逆間超名爲超定成滿故光法師釋此文云總有六種前五加行後一超成文寶法師釋其意同之正理七十八顯宗三十九及婆沙百六十五等諸論之中亦顯此旨准此等定判思之淨初靜慮無間起淨第三靜慮既名超定加行非正超定成滿故初靜慮順勝進分無間入淨第三靜慮云文更非論義也重難云婆沙論百六十五中明初靜慮順勝進分與淨第三靜慮爲等無間緣云於第三順超入故文此文寧非許超等至義哉答有漏無漏等至互爲等無間緣順逆間超名超定成滿之而光法師意婆沙論二師説中順勝進分無間不生無漏云義判爲正故順勝進分無間不修超等至云事炳然也但於婆沙論於第三順超入故之文者超定加行故且云順超入故也問勝解作意無間可修超等至耶進云光法師所引正理論中不修超等至釋也付之不時解脱聖者於定得自在設雖勝解作意無間何不修超等至哉是以光法師餘處二十四所引婆沙論百七十五中述評家義雜修靜慮所雜修有漏功徳通無量解脱勝處等勝解作意見相例可同如何答勝解作意功徳勢力微劣故彼無間不修超等至也故光法師所引正理論七十八云勝解作意不能無間修超等至勢力劣故文顯宗論十八説全亦同之婆沙論百六十五云無量解脱勝處遍處諸通等善根無間皆不能超定唯無常等行相善根無間能超所以者何要猛利増上善根能超定故文任此等文理勝解作意無間不修超等至之旨分明也但於雜修靜慮所雜修功徳通勝解作意見云例難者超等至者有漏無漏定超一地間起其相極難故不時解脱中要得願智邊際定等殊勝功徳之人修之雜修靜慮者一地有漏無漏定中前後二刹那無漏中間一刹那有漏雜修其義非難故通有學無學亙鈍根利根起之彼此難易以之可思故勝解作意無間不修超等至雜修靜慮中間有漏功徳通勝解作意也問無色界善心可緣下地能治類智品道耶問空無邊處近分地加行善心可緣下地法上擇滅耶問慮空無爲可有多體耶第二十卷抄記錄之畢寫本云文永三年丙寅九月五日午時於東大寺知足院草庵抄之畢自去孟夏十二日始此勤至今暮秋上旬候終其功愚昧老耄依計會寫文記義彌緩怠然而被引志之至深不顧性之甚拙爲後學錄難答願末代令轉通捧此微功奉仰春日權現之冥助以此善根必爲値遇慈尊之業因功徳餘薫廻向非一或父母恩愛之親類或師弟同法之善友六道輪廻之鄕雖受四生而令離散三會説法之庭必遂再會而談往事而已右筆華嚴末葉法印權大僧都宗性年齡六十五夏臘五十三
