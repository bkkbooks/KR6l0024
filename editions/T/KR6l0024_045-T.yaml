body:
  text: 倶舍論第十四卷抄問題問離勤策律儀外可有別正學律儀耶問光法師意近住戒不分男女不同故如何釋之耶問苾芻苾芻尼戒體可各別耶問今論意別解脱戒異名有幾種耶問論中明別解脱戒云異心無心亦恒轉故文爾者今此無心者可通無想滅盡二定耶問無色界道望破戒及起破戒煩惱可有厭患對治耶問離欲界染初無間道隨轉戒於破戒可有捨對治耶問寶法師意持對治唯限解脱道歟問寶法師意無色界道望破戒及起破戒煩惱可有持對治耶問眼等六根律儀爲唯以意識相應正知正念爲體爲當可通五識相應正知正念耶問眼等六根律儀與六恒住法其體可同耶問成就過去別解脱戒無表不成就現在別解脱戒無表義可有耶問聞慧無間起煗善根義可有耶問未離欲染人修慧無間起煗善根義可有耶問未得未至地人思慧無間起頂善根義可有耶問光法師述從思慧初入煗人煗善根初念修不修異類善根義作二解釋爾者初解意如何釋之耶問光法師解釋中煗善根初念修異類善根文爾者所修異類善根命終捨法歟問光法師述從思慧初入煗善根初念修不修異類善根義作二解釋爾者第二釋意如何釋之耶問煗等四善根外餘順決擇分善根福分決擇分何攝耶問正理論意從思慧初入煗人煗善根初念可修異類善根耶問煗等四善根四分定中唯順決擇分攝歟問論文云謂初刹那必成未來非成過去文爾者今此初刹那者唯限初苦法忍位爲當可通餘位耶問除現在苦法忍隨轉戒外可有唯一刹那隨轉戒耶問住定道律儀者唯限定道律儀現起位歟問處中無表中非善戒惡戒種類所攝可有耶問光法師出無覆無記心有三世得類云即是串習威儀工巧通果心也文爾者今此串習言可通通果無記心耶問頌文云住中劣思作文爾者今此劣思者可通三性思耶問中有位可發表業耶問於無想天可發表業耶問成就不善身無表時必可成就不善身表耶問論中明十種得戒相爾者自然得戒者爲唯限佛爲當可通獨覺耶問論中明十種得戒云一由自然謂佛獨覺文爾者今此獨覺者唯限麟喩獨覺爲當可通部行獨覺耶問論文云一由自然謂佛獨覺文爾者今此自然得戒者由求戒心得之歟問論中明十種得戒相爾者見道得戒者初苦法忍位得戒歟問菩薩入見道位可得別解脱戒耶問非自然得戒非見道得戒無漏心現在前位得別解脱戒義可有耶問憍陳如等五苾芻善來得戒人歟問論文云如是所得別解律儀非必定依表業而發文爾者光法師如何釋之耶問光法師釋今論如是所得別解律儀非必定依表業而發文引下論欲無無表離表而生文會其相違作二解釋爾者初釋意如何釋之耶問光法師意三歸受戒人可成就身表耶問光法師釋今論如是所得別解律儀非必定依表業而發文引下論欲無無表離表而生文會其相違作二解釋爾者第二釋意如何釋之耶問光法師釋今論如是所得別解律儀非必定依表業而發文引下論欲無無表離表而生文會其相違作二解釋爾者第二釋意欲界無表必從表生歟問光法師釋今論如是所得別解律儀非必定依表業而發文引下論欲無無表離表而生文會其相違作二解釋爾者第二釋意遣使殺根本成時可有表耶問正理論意仙人意憤成殺業道時可有表耶問正理論意自然得戒見道得戒根本成時表業可轉耶問光法師所引婆沙論中述成就現在身無表不成就現在身表義擧二師説爾者前師意別解脱戒初念不發身表義可有耶問寶法師所引婆沙論中述成就現在身無表不成就現在身表義擧二師説爾者以何師説爲正耶問寶法師所引婆沙論中述成就現在身無表不成就現在身表義擧二師説爾者第二師意與正理論然彼先時決定有表義同歟問論文云重説晝夜爲半月等文爾者光法師意今此文通伏難歟問光法師述經部宗意云許近住戒多日受得文爾者可有教證耶問論文云重説晝夜爲半月等文爾者寶法師意如何釋之耶問光法師釋齋與近住梵語同異作二解釋爾者初釋如何釋之耶問婆沙論中引契經説云我從今日乃至命終護生歸淨文爾者有宗意稱護生歸淨言時得近事戒歟問依遣使得善無表義可有耶問異生離欲界煩惱最後解脱道位不得根本地攝定共戒類可有耶問光法師意阿羅漢果聖者非自然得戒引何論何文證之耶問以預流向聖者可爲所歸依體耶問有宗意以佛生身可爲所歸依體耶問以獨覺可爲所歸依體耶問今論意能歸依法以何爲體耶問寶法師意正理論文論能歸依體婆沙論五説中可同第二師説耶問欲界經生聖者可發癡所生語業耶
