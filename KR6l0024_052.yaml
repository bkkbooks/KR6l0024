body:
  text: 俱舍論第十七卷抄下問題問自作殺盜一時成業道義可有耶問光法師述依不異心所作究竟故作如是決判應知論文作二解釋爾者初釋意於殺業道論異心究竟不異心究竟究竟二門可云耶問光法師述依不異心所作究竟故作如是決判應知論文作二解釋爾者第二釋意不異心究竟相如何釋之耶問光法師解釋中述會法師意云即前三語義説雜穢名即雜穢文爾者如何破之耶問不善業道思俱轉中説不律儀可云耶問聲聞乘人初盡智位得具足戒義可云耶問無學聖者初盡智現前時所得別解脫戒者為唯限苾芻一戒為當通勤策等三戒可云耶問聖者於五八十具四戒作法受得義可有耶問頌文云不善地獄中麁雜嗔通二貪邪見成就文爾者無殺業道所以如何判之耶問頌文云北洲成後三雜語通現成文爾者今此雜穢語者業道攝可云耶問於欲天邪見業道現可云耶問依身無色有學聖者必成過去律儀可云耶問傍生鬼趣中於律儀攝業道有成就現行義可云耶問依身北洲人於處中所攝前七善業道有成就現行義可云耶問於初靜慮起處中所攝前七業道義可有耶問論中明業道三果相云皆能招異熟等流增上果文爾者等流果者為約相似門目之為當就真實義説之可云耶問殺生業道感人中短壽異熟可云耶問頌文云皆能招異熟等流增上果此令他受苦斷命壞威故文爾者今此三果者為一念業所感為當多念業所感可云耶問殺生業道根本後起感異熟果可云耶問當處付明三邪行相且邪命者為唯限貪所生身語二業為當通嗔癡所生身語二業可云耶問光法師解釋中云即無間道能引斷得至生相時説名能證文爾者以無間道名能證道者為望所得離繫立其名為當望能得得立其名可云耶問論文云道能證斷及能斷惑文爾者能證道者為唯限無間道為當通解脫道可云耶問光法師所引正理論中云增上果者有如是説謂離自性餘有為法唯除前生有作是言斷亦應是道增上果文爾者以何師為正判耶問以非擇滅為心果法可云耶問不善無記二業相對互為等流果義可有耶問未來業以現在法為果義可有耶問雜心論意以離繫為地法可云耶問頌文云同地有四果異地二或三文爾者下地無漏法與上地無漏業為等流果義可有耶問今論意利學法與鈍無學業為等流果義可有耶問見所斷業感色法異熟可云耶問光法師意許一業感多生多業感一生義可云耶問論中付明引滿二因且二無心定及得不感引果所以如何判之耶問婆沙論中以命根衆同分引滿二果中如何判之耶問異熟障説大梵天可云耶
