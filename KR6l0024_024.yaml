body:
  text: 俱舍論第七卷抄上問光法師意六因四緣作用可別耶進云光法師釋云六因四緣作用各別文付之俱有等五因望因緣其用是同能作因望增上緣其義亦同等無間緣所緣緣望有力能作因差別難辨何云六因四緣作用各別哉是以今論云因緣五因性述增上即能作婆沙論十六説謂前五因是因緣能作因是餘三緣六因四緣作用無別見加之寶法師判作用既一故知無異六因四緣作用無別之旨釋成如何答因是親生之用緣亦疏助之義故六因門中歷法取能生用四緣門時隨應顯生長義義門既異作用各別也故正理論云是故不見等無間緣及所緣緣有因攝義此與因別理不待言唯初後二緣應辨與因別此既有別餘之二緣緣義等故亦應有別故有總辨緣因異言謂因能生緣能長養猶如生長二母差別文顯宗論十一云且等無間及所緣緣既非因攝故知餘二義亦有殊緣義等故與因皆別故有總辨因緣異言因謂能生緣能長養猶如生長二母差別乃至此總意顯因親緣疏故因緣中親疏數廣文良以一法現前對望多果之時乃有無量無邊作用故各有因用緣用親疏之差降也故光法師六因四緣作用各別之解釋尤盡文理哉但於今論文者光法師會云若謂六因四緣作用各別互不相攝然説因緣攝五因增上緣攝能作因者據用相似以明相攝也其等無間及所緣緣不似因故故因不攝文次於婆沙論文者光法師釋云婆沙初師約體以明因緣攝五能作攝三若據能作體寬實攝四緣增上體寬能攝六因所以但言能作攝三增上攝一者此師意説六因四緣相對明攝且據一相體悉即結故説因緣攝五能作攝三為能作因外有餘五因增上緣外有餘三緣明其相攝故不別説能作攝四增上攝六文次寶法師解釋者人師異釋其義非一存光法師解釋意之時不可及會釋也問光法師意生等五因相攝四緣時作因緣攝增上緣攝二釋爾者何釋為正耶進云光法師釋云又解前解為正文付之依解釋見論文俱舍論云因緣五因性云增上即能作婆沙論云謂前五因是因緣能作因是餘三緣文而生等五因既能作因所攝也尤可云增上緣攝哉答見光法師解釋前後上作生等五因是因緣攝云釋了解云生等五因是因緣攝故婆沙十七通無時非因難正義家云應説彼依六因作論因名所表通六因故解云彼文據因緣為問答既正義解因緣具説六因明知因緣亦攝能作因中生等五因又婆沙一百三十一云大種與所造色為幾緣答因增上因謂生因依因立因持因養因增上謂不礙生及唯無障解云彼文據四緣為問答因者即是四緣中因緣以此明知生等五因因緣攝文下判正不之處云問前解生等五因是因緣攝後解是增上緣攝何者為正解云婆沙五事既無評文兩説不同誰能輒定又解前解為正婆沙釋造色中前解即言應作是説後解即云有餘師言又通無時非因難中正義家云應説彼依六因作論以此故知前解為正文重見下文釋大於所造能為五因之論文云生等五因名因緣兩釋如前或四緣中因緣攝婆沙且説十因為因緣準此文非是增上緣古德解大望所造因增上者或言因者是俱有因或説同類因或説俱有同類因亦不應理婆沙及此論皆説生等五因是因緣又發智據四緣作論故因是因緣舊人不悟生等五因是因緣攝所以種種異解文生等五因是因緣攝之旨引證據立道理之趣三處定判既為委悉不及學者聊簡歟但於俱舍婆沙兩論所説者光法師釋云問若據此解因緣亦攝能作少分能作亦攝因緣少分何故此論婆沙明相攝中不説解云理實亦攝而不説者以非全攝略而不説文任今問答可會通之也問無漏戒能造大種與所造戒可為因緣耶答不可為因緣也兩方若為因緣者有漏無漏法其性既別也何可為因緣哉若依之爾者生等五因是因緣攝者是光法師今解釋也而無漏戒能造大種望所造戒之時既具生等五因尤可為因緣也如何答有漏無漏法其性各別故全不可為因緣云事文理必然也故品類足論六云有漏為因法云何謂有漏法有漏為因法中唯出有漏法無舉無漏法婆沙論述諍初靜慮與無漏初靜慮不為因緣有漏法非無漏因故文此等論文有漏法與無漏法不為因緣之旨亦分明也故無漏戒能造大種與所造戒不為因緣之事更不可疑之但於無漏戒能造大種與所造戒具生等五因云難者光法師生等五因是因緣攝云釋意能造大種望有漏色法為生等五因是因緣攝云也無漏戒能造大種望所造戒為生等五因是可增上緣攝也故元瑜疏云三藏意解四大望聲得為因緣如婆沙四大蘊中釋因者五因西方釋者應有四大望無漏色為因緣過便言因者望同性造色非異性是即於能作因中四大望同性造色生等因是因緣義文問通果心所依定與通果心可為因緣耶答不為因緣也兩方若為因緣者通果心所依定望通果心之時五因俱無之何可為因緣哉若依之爾者識身足論出無記意識無記為因非善為因非不善為因之類唯舉威儀路工巧處意識無出通果心加之婆沙論出法是初靜慮果彼法非初靜慮為因之類雖舉初靜慮果欲界通果心品無出初靜慮果初靜慮通果心品如此等論判通果心所依定與通果心可為因緣見如何答通果心所依定望通果心之時五因既無之何可為因緣哉光法師一解意雖述生等五因是因緣攝之旨彼以能造大種望所造色論之未見心心所立生等五因之文以此等道理思之通果心所依定望通果心之時不為因緣云事是必然也但於識身足論並婆沙論文者略不舉之歟問初靜慮三天中俱可有等無間緣非等無間緣法耶答俱有之兩方若三天俱有此類者今彼論文出等無間非等無間緣唯舉阿羅漢最後一剎那心心所法若爾者大梵天難有此類哉若依之爾者見品類足論文初靜慮無所簡可有等無間非等無間緣法見如何答若就位論之未來現前正起心心所法是等無間非等無間緣法故亘初靜慮三天俱可有此類也是以品類足論出初靜慮中是等無間非等無間緣之類云謂未來現前正起心心所法文此文無所簡亘初靜慮三天俱可有此類云事是必然也若就畢竟等無間非等無間緣法論之阿羅漢最後一剎那心心所法即此類故初靜慮三天中除大梵天餘二處可有此類也今論已生心心所法中出等無間非等無間緣之類故唯舉阿羅漢最後一剎那心心所法也若爾者兩論所説更非相違尋云見品類足論四無色地中等無間非等無間緣法中舉阿羅漢最後心心所法四靜慮中等無間非等無間緣法中不舉阿羅漢最後心心所有何故哉答品類足論之習四靜慮唯取善故其中等無間非等無間緣之句唯取未來現正起心心所法不出過去現在阿羅漢命終時心心所四無色體廣取善無記故其中等無間非等無間緣之句不限未來現前正起心心所法兼舉過去現在阿羅漢命終時心心所法也易知之問眼識無間生眼識義可有耶答可有此義也兩方若有此義者淨影大師大乘義章第五依毗曇意云五識一念無思量性文婆沙抄第七末云若古德文備法師等依雜心第一卷五識唯一念文加之八犍度論第二十一云苦根彼苦根因增上無緣無次第文任此等人師解釋論家定判眼識無間生眼識之義不可有見若依之爾者光法師今解釋中眼識無間可生眼識見如何答眼識無間生眼識之義可有也故光法師釋云問六識展轉相望皆得作等無間不答皆得故五事論云眼識無間非定起意識於六識身容隨起一種若眼識無間定起意識者則苦根不應為苦根等無間苦根唯在五識身故若爾便違根蘊處説如説苦根與苦根為因等無間增上然一眼識了別色已無間引起分別意識故作是言眼識先識眼受已意識隨識文加之婆沙論百三十一云此中眼識與眼識為因等無間增上非所緣等無間者謂眼識等無間眼識現在前文重舉一箇問答云問眼等五識展轉無間現在前不答諸瑜伽師説眼等五識展轉無間不現在前皆從意識無間生故阿毗達磨諸論師言眼等五識展轉皆得無間而起若不爾者違根蘊説如彼説苦根與苦根為因等無間增上非所緣文即撿發智論根蘊文云苦根與苦根為因等無間增上非所緣文眼識無間生眼識之旨此等定判實分明也但於大乘義章釋者五識唯緣現在境故多念相續重緣一境之義無之故五識無悔云也泛非云五識無多念相續之義全非相違也次於婆沙抄釋者解釋背實義者不必依用之次於八犍度論文者既違同本異譯發智論文者是譯者謬歟問除命根外可有一體不相應行耶答可有此義也兩方若有此類者約十四不相應行思體一體多相除命根外難有體一之類哉若依之爾者光法師解釋中體一不相應行與體一不相應行俱起文知除命根外可有體一不相應行云事如何答除命根之外可有體一不相應行也光法師今疏釋不相應行不立等無間緣云或有體一唯一界起不通多界與一俱起與多俱起皆成雜亂相望非等故不可立等無間緣文或有體一唯一界起不通多界者指命根也與一俱起者與名句文身俱起云也名句文身有多體者約多化人一時發語云也故光法師釋云名句文身亦有多體隨其所應於一界中可俱起現前如多化人一時發語文其外名句文身是可體一故命根與名句文身俱起云或有體一唯一界起不通多界與一俱起也故除命根之外有體一不相應行云事其義必然也問經部意如來可有散心耶進云光法師作二解釋初釋意云如來無不定心第二釋意云亦許如來有散心文付初釋不可然如來備衆德何無散心哉是以正理論述如世尊説諸佛德用不可思議同今論説哉何況宗輪論出經部宗計之中未云如來散心耶如何答今論述世尊知未來世此法無間此法應生之所以云故如經部諸師所言世尊舉意遍知諸法非比非占此説為善如世尊説諸佛德用諸佛境界不可思議文光法師釋此文云此論云舉意遍知者經部有兩解一云如來無不定心舉意遍知者皆由定故能知文此釋意舉意遍知者世尊唯以定心遍知諸法云也世尊無有散心唯以定心遍知諸法以之還可為如來德用也但於正理論文者文言雖同今論其意可別也所謂今論意述如來唯以定心遍知諸法之所以云如世尊説諸佛德用諸佛境界不可思議正理論意述如來以散心遍知諸法無謬之所以云如世尊説諸佛德用諸佛境界不可思議也故光法師釋云若依説一切有部宗佛亦有散心即是散心遍知無謬文次於宗輪論文不説此旨云難者宗輪論中述諸部大綱非一一之義悉舉盡之何為疑難哉問今論意二無心定入心起等無間緣取果用可通過去耶進云光法師釋今俱舍論意同婆沙評家不同正理起取果用通過去釋也付之撿今論文未見二無心定入心起等無間緣取果用通過去云文何釋同婆沙評家意哉何況若於過去起取果用者豈不招三世雜亂過哉答如疑難未見今論意二無心定入心起等無間緣取果用通過去云文但推此事聊得潤色所謂光法師成婆沙論意起等無間緣取果用通過去云道理云若婆沙意過去既得起與果用何故不得起取果用於過去既起與果用故於過去亦可起取果用成也而俱舍論意云二因於正滅三因於正生餘二緣相違而興於作用於過去起與果用名作用故於過去亦起取果作用之義可許之聞也故今論意同婆沙論評家意二無心定入心起等無間緣取果用可通過去云也正理論意於過去起取果用云事全不許之故於過去起與果用只名功能不名作用故正理論中或云非過去時可有作用此意言作用意顯功能或云由不共故自果生時作用雖無而於自果功能上立作用名假於過去起作用云事不許之也今論意異之於過去起與果用咸名作用故於過去起取果作用可許之聞故今論意同婆沙評家漸取漸與之義釋也但於過去起取果用可有三世雜亂之難者光法師會之云初取果者立現在世後取果者過去亦起文何況二無心定入心現起既起因緣等取果用故設雖等無間緣取果用於過去起之更不可有三世雜亂過也故寶法師釋云取果名現在者據因緣等説不據無間緣等文問異熟長養眼各別發識歟答異熟眼必共長養眼發識長養眼離異熟眼獨發識之義可有也兩方若各別發者光法師餘處二解釋云異熟色劣無異熟生離所長養文若爾異熟長養眼何可有各別發識之義哉若依之爾者光法師今解釋中釋眼識所依事定相云就處定中復有男女天人等眼不同或異熟長養等眼別文如解釋者異熟長養眼各別可發識見如何答光法師餘處二解釋云異熟色劣無異熟生離所長養故恆長養護持異熟長養色勝有離異熟生如無眼耳修得眼耳故婆沙十三云無異熟生眼離長養眼如人重人如壚重壚長養防護異熟亦爾然有長養眼離異熟生眼如從無眼得天眼者文以此釋意思之無異熟眼離長養眼故異熟眼發識之時長養眼必共發之不可有異熟獨發識之義依此義邊必共發之云意可有也故正理論第五云又言不見二所依者應見為依發生眼識及相應法是二所依不應唯説異熟生眼為識生依非所長養勿彼天眼不能為依發生眼識成過失故異熟生眼離所長養不能為依發生眼識故生一識是二功能文異熟眼獨不發識云事此文實分明也若依無眼者得天眼之類者長養眼離異熟眼獨發識之義有之故依此義邊各別發之云門可有也光法師異熟長養等眼別之今解釋即述此意也各談邊邊之義門更非相違也問光法師意眼根與多眼識為通因事引今論第一卷何文證之耶進云光法師引如眼與意專一色時等之文證之也付之眼根與眼識專一色時緣餘色聲香味觸等五識身等住未來世畢竟不生云時未見眼根通與多眼識為所依之義何引今文證此義哉答根境識三剎那剎那一具一具次第現前云者眼根見色境之時應無眼識得非擇滅之義而今文既云眼根與眼識專一色時餘色境等過去落謝可緣彼色境眼識得非擇滅故眼根通與多眼識為所依之義顯然也重意云眼識與色境能緣所緣其義決定眼根通與多眼識可為所依之義有之故其中一類眼識現起緣此色境畢此眼根可取餘色過去落謝此眼根為所依可緣彼色境眼識住未來世畢竟不生得非擇滅云故眼根通與多眼識可為所依云事此文實分明也故光法師釋云又此論第一説如眼與意專一色時餘色聲香味觸等謝緣彼境界五識身等住未來世畢竟不生不能緣過去境緣不具故得非擇滅以此故知一剎那眼容與多識為依若言根境識三剎那剎那一具有現前眼見色時於此時中應無眼識得非擇滅即與前文相違文問眼等五根望色等五境可具處事剎那三定耶答可具之也兩方若具之者光法師今解釋云一剎那眼根通與多眼識為所依文若爾一剎那眼根所見色境其類既衆多也豈可具事定剎那定哉若依之爾者有宗意一切諸法性相各定五根取五境之時尤可具處事剎那三定也是以意根取法境既具三定眼等五識緣色等五境亦具三定哉例可同如何答眼等五根望色等五境可具處事剎那三定也所謂眼根唯取色處不取聲處等是名處定就色處中欲界眼根唯取欲界色處不取色界色處初靜慮眼根唯取欲界初靜慮色處不取二禪已上色處是名事定於事定中剎那剎那名別取之其義決定若應於此剎那起則起若其緣闕永即不起是名剎那定也若如此得意之時設雖一剎那眼根通與多眼識為所依眼根望色境之時可具處事剎那三定也重難云若如今義者第四靜慮眼根爭可有事定之義哉答第四靜慮眼根廣雖取欲界四靜慮色處第三靜慮已下眼根各隨其所應不取上地色處故第四靜慮眼根異之亦具事定之義邊可有也例如異熟眼根發識之時長養必雖共發識長養眼根獨發識之義有之故異熟長養眼根各別發識名事定等也問一念眼根唯發一眼識非多眼識所依者可有何過耶進云光法師釋云即有眼長命短過也付之設雖有衆多眼根所感命根時分現起餘眼根住未來不生得非擇滅者何可有眼長命短過哉答感十年命根十年眼根之人一命根一眼根剎那剎那次第可現起而眼根有衆多種類一念眼根唯發一眼識不與多眼識為所依者若於房內十年緣會此眼根即十年見房內色假令若於房外十年緣會彼眼根即十年亦可見房外色若爾可有眼長命短過也問光法師意意識所依剎那定可通生相已前耶進云光法師釋云至生相已去方名剎那定文付之五識所依剎那定既通生相已前意識所依剎那定何限生相已去哉何況意識所依處事二定亦通生相已前至剎那定寧不通生相以前哉加之婆沙論中明心心所所依定義會品類足論云何有俱有法答一切有漏法及有漏俱生無漏法之文之時所依剎那定義不簡生相已前哉答五識所依雖有二類就別依五根論之時眼等五識與眼等五根能依所依剎那剎那其義決定於未來世前後雖未定能依所依之義同時異時其體既定故五識所依剎那定通生相已前也意識以前念意根為所依而生相以前前後未定通與多種識可為所依之義有之故意識所依剎那定不通生相已前也故光法師釋云應知此中五識及相應法於所依所緣三定皆通三世若意識及相應法於所緣三定及於所依處事二定皆通三世於所緣剎那定至生相已去方名剎那定文但於意識所依處事二定通生相已前云難者意識定以意處為所依不以眼根等為所依名之處定三界三性三學等意識各別此心之後可生彼心等云事定故以此意處定為所依不定餘意處為所依名之事定此義自生相已前既定故意識所依處事二定通生相已前也意識至生相以現在意根為所依以後所依剎那定之義顯故意識所依剎那定不通生相已前也次於婆沙論文者未論生相已去之通局疑難之旨強不可為痛何況意識所依剎那定雖限生相已去五識所依三定並意識所依處事二定廣通遠未來故文無所簡尤有其謂哉重難云自遠未來世第一法無間定生苦法忍乃至金剛喻定無間定生盡智云事既定此等豈非意識所依剎那定之義哉答自遠未來雖世第一法無間可生苦法忍云事既定其所依世第一法有無量種類能依苦法忍有無量種類在遠未來之時何世第一為所依何苦法忍可起云事不定故生相已前無所依剎那定之義也故婆沙論十一云未來無有等無間緣問若爾者何故世第一法無間唯生苦法忍不生乃至盡無生智耶答此名數定非事相定所以者何苦法忍在六地未知何地者當生三根相應未知何根相應者當生有四行相當生無量剎那未知何剎那當生故乃至住增上忍時苦法智忍唯於三事定謂地定根定行相定於二事皆定文文意顯也光法師至生相已去方名剎那定之釋尤順此婆沙論文哉問寶法師意世第一法苦法忍相望所依剎那定義約何位論之耶進云寶法師釋云至增上忍方剎那定文付之意識所依剎那定約生相已去論之而增上忍現在前位所依世第一法雖至生相能依苦法忍未至生相何可有剎那定之義哉答寶法師至增上忍方剎那定之釋意能依苦法忍猶在生相已前其體雖未定所依世第一法既至生相其體既定故約所依心品定位論意識所依剎那定也故寶法師釋云如世第一法與苦法忍忍位已前是事相定非剎那定有多苦法忍未定前後至增上忍方剎那定此顯世第一法定在一切苦法忍前以至生相世第一法決定在前故文又云意根處定者謂唯依意不依餘根事定者謂世第一法唯與苦法忍為依金剛喻定唯與盡智為依剎那定者謂多剎那世第一法於忍位前無剎那定至增上忍有剎那定文此等釋意云增上忍現在前位能依苦法忍猶在生相已前其體雖未定所依世第一法既至生相與苦法忍可為所依之義定畢故約此位論意識所依剎那定相也但至生相已去方名剎那定者光法師解釋意也所依意根至現在能依意識至生相已去所依能依其體既定故約此位已去論意識所依剎那定相也寶法師意又可許此義邊也重難云見婆沙論十一文云乃至住增上忍時苦法智忍唯於三事定謂地定根定行相定於二事猶不定謂剎那不定等無間緣不定若住世第一法時於五事皆定文如此文者增上忍位於苦法忍無剎那定之義見如何答婆沙論今文約能依所依心品決定位論剎那定之義故於增上忍位苦法忍體性不定名剎那不定也寶法師意自本非存此義門但至增上忍方剎那定之釋意今明所依剎那定之義故不顧能依心品其體不定之邊只約所依心品定位論所依剎那定之義云有也問婆沙論意心心所如所緣有三定於所依有三定者引品類足論何文難之耶進云婆沙論十二中引品類足論云何有俱有法答一切有漏法及有漏法俱生無漏法云文難之也付之品類足論中雖有此文全無違心心所所依定之義何引此文難心心所所依定之義哉答於心心所有所依定者約二世有所依定之義也而品類足論中出有漏俱生法云有漏法俱生無漏法唯出現在無漏法以命根衆同分等為所依不出過去未來無漏法故過去未來無漏法以命根衆同分等不為所依見故引此文心心所可無所依定之義難也重意云現在無漏法以命根衆同分等為所依雖非心心所所依定之門此文意過去未來都無所依之義見故心心所有所依定者可違此文云也故婆沙抄云難意既云俱生無漏法故知但取現在無漏不取過未一切無漏故知三世中有時有依如現在世有時無依如過未故知心等所依不定文今解釋此旨實分明也加之婆沙抄中會此文有二説之中初師云彼文應作是説云何有俱有法答一切有為法而不作是説者此文顯示聖道不説無用聖道故不相違文有漏法俱生無漏法者唯説現在無漏法云事今論文亦分明也問論文云俱有諸法未嘗為所緣文今此不為所緣俱有法中可攝隨轉色並同時得耶答定心俱有法必可攝隨轉色於同時得可有攝不攝二意也兩方若不攝之者隨轉色並同時得是心心所極相鄰近也俱有法中何不攝之哉若依之爾者光法師餘處解釋中總緣非我觀不為所緣俱有法中不舉隨轉色及同時得哉答心心所不緣自隨轉色事必然故出定心俱有法之時必可取隨轉色也故婆沙論云問何等名為俱有諸法答此隨轉色及此隨轉不相應行文但於光法師餘處解釋俱有法中不舉隨轉色云難者今論意云唯聞思所成總緣非我觀不通修惠云故出聞思非我觀俱有法故不舉隨轉色也故婆沙論云問欲色二界非我行相何者緣法多耶答色界非我行相若不定者所緣法與欲界等若定者則所緣法少於欲界謂不能緣自隨轉色欲界非我行相無隨轉色故能緣一切色故有説言有身念住緣一切色無有受心法念住緣一切受心法文次俱有法中同時得攝不攝事光法師餘處作二釋初釋意云俱有法唯攝四相第二釋意云亦攝同時得也故光法師釋云俱有謂俗智同時四相故雜心雜品云亦不緣共有同一果故或可此論言俱有法亦攝於得以得亦是極相鄰近故雜心論説同一果者不相應中且據雜説或論意各別文初釋意以雜心論為證據不攝同時得也第二釋意以極相鄰近為道理亦攝同時得云也但初釋意雜心論第九云亦不緣共有同一果故第十一卷亦述此旨故俱有法中不攝同時得云許也非云心心所緣同時得也重難云不為所緣俱有法中不攝同時得云初釋意以同時得猶不為所緣云事難思若爾俗智除自品之言豈無不簡盡之過哉答同時得極相鄰近法故不緣之云事二釋意俱可存之但初釋意雜心論文俱有法取同一果法見故俱有法中不取同時得云許也云爾故非云緣之論疏中不緣俱有法者就大旨述之歟實非俱有法中與同時心心所不為所緣法可有也問光法師意起增上緣與果用唯限增上果生相位耶進云光法師釋云唯增上緣通生滅位興與果用文付之增上緣是名名於生不障礙之義唯與生相法可起與果用也若通滅法起與果用者豈無於一法再起與果用之過哉答增上緣是依無障礙之義立之故通與果用生滅法起與果用也故論云唯增上緣於一切位皆無障住故彼作用隨無障位一切無遮文光法師釋此文云四緣之中唯增上緣通生滅位興與果用故言於一切位皆無障住故其增上緣通生滅位興與果法生滅位皆無障住故彼作用隨無障住一切無遮文增上緣通與生滅法起與果用之旨論疏文實分明也重思其意同類遍行異熟三因與正生法起與果用之時依無障之義與彼法亦可起增上緣與果用相應俱有二因正滅法起與果用之時依無障礙之義與彼法亦可起增上緣與果用故增上緣通與生滅法起與果用云也非與一法再於生滅二位起與果用故與一法再可起與果用之疑全不可來也問正理論意無想異熟等無間緣生歟答等無間緣生也兩方若等無間緣生者無想異熟是異熟因力所引起也何云等無間緣生哉是以光法師餘處解中述正理論意云其無想事雖不從彼等無間緣生文如解釋者無想異熟不等無間緣生見若依之爾者正見光法師所引正理論文云或此無想但聲所顯非如二定相對立故文如何答正理論意無想異熟是心心所等無間緣起故等無間緣生云也是以光法師引正理論豈不無想亦三緣生是心心所等無間故亦應説為心等無間但非心等加行引生故於此中廢而不説或此無想但聲所顯非如二定相對立故云文畢云正理既説無想異熟同二無心是等無間準知彼體亦有多物文正理論現文云光法師定判彼論意無想異熟等無間緣生之旨分明也但於其無想異熟事雖不從彼等無間緣生之釋者無想異熟實雖等無間緣生非心等加行引生故云二定但由三餘由二緣生文面顯不云無想異熟等無間緣生也而正理論文云彼以宿業等無間緣為任持食文面顯云無想異熟等無間緣歟聞之處會從無想異熟雖非等無間緣生宿業並續生心及入無想果心牽引資助無想異熟方得故以彼宿業並續心及入無想果心為任持食無想有情住云也為遮實為等無間緣生之義非云其無想事雖不從彼等無間緣生也重難云正理論亦應説為心等無間但非心等加行引生故於此中廢而不説之初師意無想異熟非等無間緣生見何云正理論意無想異熟等無間緣生哉答正理論初師云無想異熟實為等無間緣生故雖可説無想異熟等無間緣生非心等加行引生故廢不説等無間緣生為言廢而不説云言許實為等無間緣生義邊之旨分明也故正理論二師俱云無想異熟等無間緣生也尋云餘處正理論云彼以宿業等無間緣為任持食者不何法與何法為等無間緣云哉答彼文意云續生心與入無想果心為等無間緣或入無想果心與出無想果心為等無間緣為任持食無想有情住云也此旨見元瑜釋故彼疏云外云謂續生心等無間力引生彼地無想前心名等無間緣以彼為食若無彼者不生彼天無想之體無容得起亦可以彼出無想心等無間緣為食資助力故文此釋意云等無間等緣云相有二釋見也問光法師意生等五因因緣增上緣中何攝耶進云光法師釋云生等五因名因緣兩釋如前或四緣中因緣攝文付之見疏上文作生等五因或云因緣攝或云增上緣攝之二釋何兩釋如前之外或四緣中因緣攝哉答兩釋如前者指上生等五因或云因緣攝或云增上緣攝之二釋此外云或四緣中因緣攝者上問前解生等五因是因緣攝後解是增上緣攝何者為正又解意斷前解為正云文指也故上指兩釋如前之外雖非別釋指重斷正不之處文云或四緣中因緣攝也問防定方便心者唯上地染汚無間生下地善心歟答多分上地染汚心無間生下地善心也兩方若唯上地染汚心無間生下地善心者心品相生其義不定也何唯上地染汚心無間生下地善心哉若依之爾者見光法師今解釋防定方便心者唯上地染汚心無間生下地善心見如何答防定方便心者為自地煩惱所逼惱之時答先願力上地染汚心無間生下地善心名也故隨多分任大網云之者上地染汚心無間生下地善心也是以今論述色界染汚心無間生欲界善心云彼染汚定所逼惱時從彼染心生於下善為依下善防彼退故文光法師釋此文云問身在下界起上染心復起下善心能防上定未知身在下界起上幾惑答云若據從或起定心隨其所應從上界惑後入下界善心色界三十一皆入欲界善心無色界三十一皆容入色界善心文圓暉法師釋云二色界染心生欲界善謂入定者作如是願我寧起下地善心不起上地染汚由此願故彼染汚定所逼惱時從彼染定生於下善心為防退故是則色染生欲界善也文加之光法師釋防定方便心相云二防定方便心者四心能作防定加行心謂色無色界二染汚心隨其所應能生下地善心即欲界加行善生得善色界加行善無色界加行善應知唯防定心上染汚心後生下善心餘必不生文寶法師釋防定方便心相云四防定心者欲界生得加行善從色染心後生色界防定加行善心從無色染後生文正理論釋色界染汚心無間生欲界善心云彼初靜慮染定惱時從彼染心生於欲善求依下善為防退文或云若爾者染心不應無間生加行善染著境界違背善故勢力劣故無斯過失厭患煩惱數數現前作是思惟設何方便令無義聚止息不行便如實知起過失境能生功德脫我當起煩惱現前尋復覺知起善防護由斯願力能起加行無始時來數習染故勢力不劣故染無間生加行善文顯宗論十一文兩處全同也雜心論第十述色界染汚心無間生欲界善心云穢汚者謂初禪地煩惱所惱即依欲界善心防護故何況餘卷論文云從染等至生自淨染並生次下一地淨定謂為自地煩惱所逼於下淨定亦生尊重故有從染生次下淨若於染淨能正了知可能從染轉生下淨非諸染汚能正了知如何彼能從染生淨先願力故謂先願言寧得下淨不須上染先願勢力隨相續轉故後從染生下淨定如先立願方趣睡眠至所期時便能覺寤文正理第七十八説云若於染淨能正了知可能從染轉生下淨是則此淨還從淨生以正了知是淨攝故非諸染汚能正了知如何彼能從染生淨先願力故謂先願言寧得下淨不須上染先願勢力隨相續轉故後從染生下淨定如先立願方趣睡眠至所期時能便覺悟文顯宗論第三十九説全同此義也婆沙論第百六十五釋味相應第二靜慮與淨初靜慮為等無間緣云此中與淨初靜慮為等無間者謂瑜伽師第二靜慮淨定無間起諸煩惱其心熱惱如為火燒遂即歸投淨初靜慮故契經説寧起厭作意俱初靜慮不起劣作意俱第二靜慮文此等論家人師之釋併防定方便心者上地染汚心無間可生下地善心見故論家之説人師之釋現文所述唯上地染汚心無間生下地善名防定方便心也然泛論此義上地善心無間生下地善心亦名防定方便心事強不可遮之也故淨影大師大乘義章第二云三於下法防過次第如依上地方便善心及穢汚心起下地中生得善等文此釋意上地加行善心無間生下地善心亦名防定方便心之旨分明歟一義云防定方便心者唯上地染汚心無間可生下地善心也其文理如前也此義意上地善心無間生下地善心都不名防定方便心云也即不依用淨影大師解釋也問正理論意受生心與命終心為等無間緣義可有耶答不可有此義也兩方若不許此義者光法師今解釋中引正理論所説云謂或容有生有無間死有現前非起本有文論文無諍可有此義見若依之爾者受生有事為續本有也何可有不起本有死有現起之義哉是以婆沙論評家意不許此義見如何答正理論意受生心與命終心為等無間緣義不可許之也見婆沙論文評家意不許此義妙音師意無想天有此義文而見正理論文十二云由續生心及無間入無想果心無情天受生命終二心之外可有餘心見明知彼意受生心與命終心為等無間緣之義不許之云事但於生有無間死有現前之論文者光法師會之云正理所説即妙音義也無勞會釋文此釋意彼正理論師暫依妙音師義會本有可名中有云例難謂或容有生有無間死有現前非起本有也正理論師自義非云有生有無間死有現前義故更非相違也問尊者妙音意無想天唯可有二剎那心也答爾也兩方若唯有二剎那心者婆沙論中出有説意述無想有情將命終時由謗涅槃及聖道故從彼處沒生惡趣中之旨乎云尊者妙音亦作是説彼謗涅槃及聖者故從彼命終定生惡趣文而出無想異熟心色界有漏緣隨眠隨增者出發智論所説設雖妙音師意更不可背發智所説知出無想異熟心之後別有命終位起謗滅道諦無漏緣邪見云事若爾無想天唯不可限結生命終二剎那心哉答妙音師意無想天唯有結生命終二剎那心可云也故光法師引婆沙論百五十四云頗有處唯二剎那有心謂結生及命終時耶答應言無尊者妙音説有謂即無想天文彼師意無想天唯有結生命終二剎那心云事婆沙論今文實分明也但於婆沙論彼謗涅槃及聖者故之文者妙音師意非云無想有情命終心位起此謗滅道諦無漏緣邪見欲入無想定前加行位起此撥無滅道諦邪見故以彼為因無想有情必生惡趣云也彼如謂諸外道將修無想或起邪見謗釋種涅槃或起見取計彼為真或起戒取計彼為道如是等或為惡趣因也重意云依彼撥無滅道諦邪見力生惡趣云事尊者妙音亦是説也非云起彼邪見之時分亦同有説意所謂有説意存無想天多時有想之旨故出無想異熟心之後起此邪見以之為近增上緣生惡趣云也妙音師意將修無想定前加行位起此邪見以彼為業因定生惡趣云也何況婆沙論云頗有處結生心為四緣命終心起耶答應説無尊者妙音説有謂即無想天文如此文者無想有情命終心以結生心為所緣緣見若爾者彼命終位不起撥無滅道諦無漏緣邪見云事此文亦分明也以此等文理思之將修無想定前加行位起此撥無滅道諦邪見云事必然也問初靜慮不共無明無間起欲界善心義可有耶答可有此義也兩方若有此義者初靜慮不共無明無間轍難生欲界善心哉若依之爾者論疏中述初靜慮染汚心無間生欲界善心之旨未嫌不共無明哉答光法師問未知身在下界起上界惑答之引婆沙論五十三云住欲界不死不生若異生色無色界六十二隨眠隨一現在前若聖者色無色界修所斷六隨眠隨一現在前取意之文畢云準彼論文身在下界凡聖皆起上惑起上惑時皆與定心相出入若據從惑起防定心隨其所應從上界惑後入下界善心色界三十一皆入欲界善心無色界三十一皆容入色界善心此文不言無明者以必有故不説而成文此釋既無所簡云色界三十一皆入欲界善心故初靜慮不共無明無間生欲界善心云義可有也重難云不共無明是行相遲鈍也難生欲界善心哉何況光法師釋婆沙論愛見疑慢上靜慮者之文云此文不言無明者以必有故不説而成文如此釋者色無色界三十一隨眠中唯取相應無明不取不共無明見如何答問光法師意二十心相生唯就意識論之歟答廣亘意識五識論之也兩方若亘意識五識論之者見今論文云威儀路等三無記處心色香味觸為所緣境工巧處等亦緣於聲如是三心唯是意識文論文無諍二十心相生唯就意識論之見若依之爾者就三界諸心廣明相生之時何唯約意識論之哉答云此事光寶兩師其意是異也若依光法師意者二十心相生廣亘意識五識論之云也以道理思之廣約三界諸心明其相生之時普歷意識五識可分別之故也是以見光法師處處解釋第二卷疏破雜心論主天眼耳通是威儀無記云義云此解不然違理教故如下論云色界威儀心二十心中從五心生謂自界五除通果心能生七心謂自界四除加行通果欲界二染汚無色界一染汚若言二通威儀心者應生加行善心如變化心由定引起與定相生不與餘心相生二通亦爾既由定引起還應與定相生不生餘心若説威儀能生定此即不然違論文故威儀定不能生加行文此能破意二十心相生兼就五識就之云事分明也第二十八卷疏難泰法師意眼耳身識化心無記類云義云泰法師若將修得天眼天耳二識是化心類同名通果容有此理若將泛爾起眼身識名通果心良理不然準諸論二十心中之通果心唯與定心相生豈有起下三識皆入定耶文若二十心相生唯就意識論之者豈可有此能破哉但於如是三心唯是意識之論文者光法師會之云此中且據變化心及發業果心起威儀路心起工巧處心説故云唯意識也文取意問光法師意聲境可通威儀無記耶答可有二義邊也兩方若通威儀無記者光法師今解釋云聲非威儀故威儀心不緣文若依之爾者光法師餘處解釋威儀工巧通果自性者皆通色聲文如何答光法師意於聲境或不名威儀無記或名威儀無記之二邊義門可有也若依行住座臥名為威儀之門色香味觸為所緣境工巧處等亦緣於聲如是三心唯是異識文婆沙論第百十六云威儀路者謂色香味觸四處為體文聲境非威儀正體云事此等論判實分明也是以光法師或云聲非威儀故威儀心不緣或云若威儀路加行不但在意識亦通四識緣四境故以聲非威儀故不緣聲故婆沙一百二十六云眼鼻舌身四識是威儀路加行非起威儀路意識是威儀路加行亦是起威儀路文此等定判依行住坐臥名為威儀之義邊故聲境不通威儀無記云也若依威儀心發語業之門以所發語業從能發心名威儀無記也故光法師餘處第二卷解釋中或云威儀工巧通果自性者皆通色聲文或第二十八卷云若泛爾發身語業者是威儀心威儀心尚得通緣十二處能發語業理亦應得又空法師章解威儀五蘊中云色聚有五謂五塵問若説威儀具有五塵何故婆沙俱舍並説唯有四塵除聲解云行住座臥名威儀聲非威儀正體所以二論説無今據威儀心發聲義所以説有文此等解釋威儀心所發語業名威儀無記故聲境通威儀無記云也問光法師今解釋中釋工巧處心工巧之處故名工巧處工巧處之心故名工巧處心云釋意約意識可有工巧處加行緣工巧處起工巧處四義耶答可具四義也兩方若具四義者光法師述工巧之處故名工巧處之心故名工巧處心云釋意云意識是工巧處加行能起工巧處緣工巧處名工巧處心文如解釋者不具今四義見若依之爾者以道理思之尤可具今四義哉是以光法師威儀之路故名威儀路威儀路之心故名威儀路心云釋意約意識可具威儀路加行緣威儀緣威儀路起威儀路之四義見例可同如何答光法師釋威儀路心之得名述威儀之路故名威儀路威儀路之心故名威儀路心云釋意云意識是威儀路加行及緣威儀緣威儀路能起威儀路名威儀路心文準此釋思之工巧之處故名工巧處工巧處之心故名工巧處心云釋意約意識可具工巧處加行緣工巧緣工巧處起工巧處之四義也但今解釋不舉緣工巧事略不舉之歟以實云之四義俱可具之也問無覆無記心望三性心時不相緣心可有多種耶答可有多種也兩方若有多種者婆沙論中唯可有一種見若依之爾者以道理思之化事發業通果心並天眼天耳二通五識異熟威儀工巧心望三性之時無相緣之義故可有多種哉是以光法師今解釋中可有多種見如何答無覆無記心望三性心之時不相緣心實可有多種即如被出疑難化事發業通果心天眼天耳二通五識異熟威儀工巧心等望三性心之時全無相緣之義故可有多種云事是必然也但於婆沙論中唯舉一種云難者婆沙論云唯除不善異熟之文歟具出彼文致會通者彼論云善等者謂善不善無記心各與三種心展轉相緣唯緣不善異熟以彼唯在五識身故全無覆無記心有展轉相緣義文此文正所除唯雖舉不善異熟述除不善異熟故云以彼唯在五識身故故以此故思之天眼天耳二通五識威儀工巧可除之云事自顯畢餘無覆無記心有展轉相緣義者餘意識無覆無記心中可有展轉相緣之類云也非云餘無覆無記心悉有展轉相緣之義彼中攝化事發業通果心更非疑也問寶法師意生上三靜慮若起借識類悉自性無記歟答非自性無記之類可有也兩方若悉自性無記者設雖寶法師意何云借識之類悉自性無記哉彼天眼天耳二通是可通果無記泛爾起三識身等可通威儀無記哉若依之爾者披寶法師餘處定判或云應言四無記心攝心不盡借識之類非四攝也或述此借識心是自性無記此等解釋無諍借識之類悉自性無記見如何答寶法師意生上三靜慮所起借識之類中天眼天耳二通是可通果無記泛爾起眼識並發身表心可通威儀無記也先天眼天耳二通是通果無記云意者既禪定所生果也尤可名通果無記也是以婆沙論九十五中出五識相應惠無覆無記之類舉通果心俱生惠設雖寶法師意豈不存此等文理哉何況寶法師釋威儀路等三無覆心色香味觸為所緣境工巧處等亦緣於聲如是三心唯是意識之論文云此説通果心唯意識據化心説文若不許五識通果心者何可會據化心説哉但於寶法師餘卷兩處之釋者為成泛爾起耳識並發語表心非威儀無記之義云借識之類非四攝也述此借識心是自性無記也故見具文專成耳識非威儀無記之旨所謂第二卷疏云應言四無記心攝心不盡借識之類非四攝也耳識非威儀上地無工巧變化唯意識故文第二十八卷疏云問生上三定起下眼耳二通是何無記有人云唯是威儀心或是緣威儀心或似威儀心皆謂不然耳識不可是威儀心發語表業亦不可説是威儀心違多論故乃至以此知四無記心攝心不盡既無記色攝色不盡何妨四無記亦攝心不盡問既言四無記攝心不盡未知借識是何無記答此借識心是自性無記耳識非威儀非威儀無記上地無工巧非工巧無記變化唯在意非變化無記異熟非異地起非異熟無記以此故知唯是自性文此等解釋專所成只是耳識並發語表心非威儀無記之義也非云天眼天耳二通是自性無記也若如此得意之時泛借起眼識身識並發身表心可通威儀無記也何況寶法師釋唯自上地心之所緣非下地威儀通果心境故之論文云準此論文身生上地唯得起下地威儀通果心然此威儀説是意識不説三識説觀息故借下識起上地威儀通果但緣所發業事及所化事等不緣上地風也無覆無記心總不緣上地息文彼師意借識之類悉自性無記云者豈可有生上地起下地威儀心之義哉爰知借識之義有威儀無記之類云事分明也若爾借識之類非四攝也之釋此借識心是自性無記之文不可如言而執也重難云第二卷疏問生上三定起下眼耳二通是何無記先舉雜心論主天眼天耳通是威儀無記之義重重破之畢遂出自義云應言四無記心攝心不盡借識之類非可四攝也文第二十八卷問生上三定起下眼耳二通是何無記先舉有人威儀無記云義重重破之畢重問既言四無記攝無記心不盡未知借識是何無記答之云此借識心是自性無記文兩處解釋既所問生上三靜慮所起天眼天耳二通體性也答之云應言四無記心攝心不盡述此借識心是自性無記天眼天耳二通是自性無記云事解釋實分明也何況第二卷其通果心唯是意識不通五識故此論廣心云欲界無覆無記分為四心乃至威儀路等三無覆心色香味觸為所緣境工巧處等亦緣於聲如是三心唯是意識既言唯是意識故知定遮五識婆沙亦同應撿文不許五識通果之旨此釋實分明也加之第二十八卷疏上述此借識是自性無記畢下出非四無記攝之由云變化唯在意非變化無記文若二通是通果無記所餘借識是自性無記非四無記云者何舉五識通果不簡之哉於二通是五識攝故以唯在意識之道理更不可簡二通爰知通果無記唯限意識借識之類不攝二通悉自性無記云事今文不簡五識通果事甚以難思哉答兩處解釋問詞實雖舉所借起天眼天耳二通其意舉二通威儀無記之義破之歟為成耳識非威儀無記之義致此問也就中今此問詞唯雖舉天眼天耳二通意廣問借識之類見其故答此問舉有人意威儀無記之義若問意偏問天眼天耳二通者答中豈可出有人泛借起三識身威儀無記之義哉何況寶法師難此義出發語心成非威儀無記之義明知今問廣問借識之類云事答之出四無記心攝心不盡之旨作此借識心是自性無記之釋只偏為成耳識非威儀無記之義也成耳識非威儀無記之義畢四無記心攝心不盡之義即顯故也但於其通果心唯是意識不通五識之釋者彼就化心論之也以何知之者次下引此論廣心中云威儀路等三無覆心乃至如是三心唯是意識之文為證而此文寶法師自會據化心説故也次於述變化唯在意非變化無記不簡五識通果云難者暫舉意識通果之一類簡之不必簡盡之歟尋云泛借起眼識身識中可有自性無起之類耶答成四無記心攝心不盡之旨畢泛借起眼識身識中有自性無記之類事更非所遮也尋云發身表心中可有自性無記之類耶答問二十心相生唯依下地有捨受異熟一説意論之歟答爾也兩方若唯依彼一説意者二十心相生俱舍婆沙正理雜心等論説其旨異而正理雜心兩論專述下地無捨受異熟之旨若爾今此相生不可唯依彼一説意哉若依之爾者光法師餘處解釋中二十心相生唯依下地有捨受異熟云一説意論也見如何答廣披諸論説尋二十心相生相俱舍正理兩論云異熟威儀無間生八謂自界六除加行善與通果心及色無色有覆無覆婆沙論云欲界威儀路心無間生八心謂欲界六除加行善及通果心色無色界各一有覆無記乃至如欲界威儀路心欲界異熟生心亦爾文雜心論第十云報生威儀八者欲界報生及威儀次第生八心自界六除方便善心及變化心色無色界穢汚心文此等諸論同述欲界異熟生心無間生色無色界有覆無記心之旨若下地無捨受異熟者豈可有此義耶是以光法師餘處解釋中釋此事云於二説中初説為正如二十心相生中欲界異熟生心能生上二界染汚心即是欲界異熟生心捨受相應命終於上二界染心受生以受生命終心定捨受故以此明知欲界定有捨受異熟又此論下云有説下亦有由中招異熟又許此三業非前後熟故又婆沙異熟因中亦有文説下地有捨異熟不能具引以此故知三定已下有捨受異熟為正文但於正理雜心二論專述下地無捨受異熟之旨云難者正理論第三十云若説欲界有捨受異熟入涅槃心通二無記若説欲界無捨異熟入涅槃心但威儀路文雜心論第九云有説欲界下地有不苦不樂者彼説欲界乃至第四禪報生及威儀心般涅槃無色界唯報生非威儀色非分故有説欲令下地無不苦不樂報者彼説欲界乃至第三禪唯住威儀心般涅槃餘如上説文正理雜心二論同舉下地捨受異熟有無之二説未判正不何云彼兩論唯存下地無捨受異熟之義哉若爾彼兩論亦依下地有捨受異熟之義意辨二十心相生更有何疑哉重難云正理論中破此論所引又許此三業非前後熟故意豈非下地無捨受異熟之旨哉次光法師云又雜心業品云問下地何故無不苦不樂報耶答有説下地麁而彼受細故下地不寂靜而彼受寂靜故雜心意同二説雜心論意存下地無捨受異熟之義判爰知正理雜心兩論意偏存下地無捨受異熟之義云事答正理論師故欲違俱舍論故引本論説三界業俱時受果之文雖破今論所引三受業俱時受果之證未云正存下地無捨受異熟之義哉何況彼論亦依下地有捨受異熟之義意通品類足論文云無違彼失無定言故謂彼不言唯順樂受然下雖有順非二業而由少故彼文不顯文爰知彼論意付下地捨受異熟有無之二説各會違文許也非偏存下地無捨受異熟之義也次於光法師所引雜心者彼雜心論業品暫舉下地無捨受異熟之説意故光法師引之判雜心意同二説也非云彼論意偏存下地無捨受異熟之義也
