body:
  text: 俱舍論第十卷抄下問以有漏道離下三靜慮染九無間前八解脫道位可修緣欲界心耶答可修緣欲界心也兩方若修緣欲界心者離下三靜慮染九無間前八解脫道位可修同對治道何修緣欲界心哉是以披光法師餘處所引正理論文云離初定染九無間道未來所修麁等三行緣初靜慮八解脫道未來所修麁等三行緣初二定靜等三行緣第二定離二靜慮三靜慮染隨其所應皆準前説文顯宗論三十二説全同此文婆沙論中亦述此旨任此等文離下三靜慮染九無間前八解脫道位不修緣欲界心見若依之爾者婆沙論中離下三靜慮染九無間前八解脫道位得六意近行判若不修緣欲界心者何可得香味意近行哉答以有漏道離下三靜慮染九無間前八解脫道位可修緣欲界心也故勘婆沙論百三十九文云離初靜慮染前八無間解脫道時各得第二靜慮近分六第九無間道時得第二靜慮及彼近分離第二靜慮染前八無間解脫道時各得第三靜慮近分六第九無間道時得第三靜慮及彼近分六離第三靜慮染前八無間解脫道時各得第四靜慮起分六第九無間道時得第四靜慮及彼起分六文此文既云離下三靜慮染九無間前八解脫道位得香味意近行修緣欲界心云事甚分明也但於離下三靜慮染九無間前八解脫道位可修同對治道何修緣欲界心哉云難者以有漏道離下三靜慮染九無間前八解脫道位專雖修同對治道傍亦修緣欲界心非同對治道也次於光法師餘處所引正理論等文者以有漏道離下三靜慮染九無間前八解脫道位修緣欲界心者非麁等六行相攝亦非非常等十六行相攝修不被云何行相心品緣欲界境也自本不云以麁等行相緣欲界故光法師餘處所引正理論等説全無相違也重難云以有漏道離下三靜慮染九無間前八解脫道位有何故修緣欲界心非同對治道哉依之勘光法師餘處所引正理論六十六文云此中異生離欲界染凡無間道麁等三行隨一現前各未來修麁等三行八解脫道靜等三行隨一現前各未來修麁等六行如是乃至離無所有染無間解脫所修應知若諸聖者以世俗道離初定染九無間道麁等三行隨一現前各於未來修十九行謂麁等三及唯無漏十六聖行八解脫道靜等三行隨一現前各未來修二十二行謂前十九加靜等三如是乃至離無所有染無間解脫道所修應知文顯宗論三十二説全亦同之加之婆沙論六十四云諸異生者離欲染時九無間中修三行相謂苦麁障八解脫道中修六行相謂苦麁及靜妙離如是乃至離無所有處染隨其所應當知亦爾即諸聖者離初靜慮染時九無間道中修十九行相謂麁等三靜等三及唯無漏十六聖行相如是乃至離無所有處染其所應當知亦爾文此等文無諍異生聖者離下三靜慮染九無間前八解脫道位唯修同對治道不修非同對治道見如何答異生聖者依上三靜慮近分地離下三靜慮染九無間前八解脫道位相繫屬故各修自近分地諸功德中有緣欲界心故雖非同對治道亦修之也但於光法師餘處所引正理論等文者就麁等六行相及非常等十六行相顯其現在未來所修分齊也非麁等六行相攝亦非非常等十六行相攝心品緣欲界境相繫屬故傍亦修之更非所遮也此論義雖有相承之旨恐繁省略之別可記録也問論中引三十六師句經説證何義耶進云光法師釋云復證近行唯是雜染文付之依光法師釋披今論現文引三十六師句經説雖明耽嗜依出離依差別全無述意近行唯雜染義光法師何釋為證近行唯雜染義引此文哉何況見正理論説雖破意近行唯雜染義猶引三十六師句經説加之婆沙論百三十九并顯宗論十五中雖同引今經亦談意近行通三性之旨若爾光法師定判尤似難思如何答就論文起盡案所引旨趣上述唯雜染者與意相牽數行所緣是意近行之師義畢先引六恆住經説為證次引三十六師句經説之志彼經中辨耽嗜依出離依差別明所對治能對治不同故為證意近行唯染義引此經文見也故光法師釋今論又即喜等為三十六師句謂為耽嗜出離依別此句差別大師説故之文云復證近行唯是雜染又即喜憂捨世尊説為三十六師句謂為耽嗜依有十八此是近行是所對治出離依有十八此非近行是能對治二種不同成三十六既二別説故知唯染是意近行此句差別是佛大師所説法故名為師句文寶法師釋論又即喜等至謂諸善受引證其意同之歟但於今論中引三十六師句經説雖明耽嗜依出離依差別全無述意近行唯雜染義云難者今論中實雖無意近行唯雜染之文言就嗜依差別之經説耽嗜依十八是所對治即意近行出離依十八是能對治非意近行得意為意近行唯雜染證也次於正理論等説者彼正理顯宗婆沙等諸論中引三十六師句經説初十八意近行由耽嗜依出離依差別施設三十六意近行專順彼經文亦叶其實義也今論中引彼經文證出離依十八非意近行之義雖似難思光法師解釋中亦非無其由也問不成就欲界善意近行人可有成就欲界出離依意近行義耶答可有此義也兩方若有此義者見光法師解釋云出離依者謂諸善受受與出離善法為依故文而既不成就欲界善意近行何可有成就欲界出離依意近行義哉若依之爾者婆沙論中不成就欲界善意近行人可有成就欲界出離依意近行義見如何答婆沙論百三十九中述成就耽嗜依出離依意近行云生初靜慮成就六謂六出離依捨有説成就三謂色聲法出離依捨有説成就六謂六出離依捨文任此文不成就欲界善意近行人成就欲界出離依意近行云事分明也但於既不成就欲界善意近行何可有成就欲界出離依意近行義哉云難者光法師所引婆沙論百三十九中云順善品者出離依攝無覆無記受中順善品者名出離依意近行故生初靜慮所成就欲界通果無記心俱意近行順所依禪定故名出離依靜慮近行也生初靜慮人故雖不成就欲界善意近行成就欲界通果心俱無覆無記出離依意近行也生上三靜慮成就欲界通果心俱無覆無記出離依意近行準之可思也問斷善根時可有捨無覆無記意近行義耶答不可有此義也兩方若有此義者既云斷善根何可有捨無覆無記意近行義哉若依之爾者婆沙論百三十九中述成就耽嗜依出離依意近行云生欲界若斷善根彼成就欲界十八斷善根人成就欲界耽嗜依十八意近行定而見光法師所引婆沙論文無覆無記意近行中順善品者出離依攝判若斷善根時不捨順善品無覆無記意近行者寧不成就欲界出離依意近行哉答斷善根時唯捨欲界善法者諸論一同之所談故不可有捨無覆無記意近行義云事必然也但於婆沙論生欲界若斷善根彼成就欲界十八之文者成就順善品無覆無記出離依意近行者成就彼所順善意近行之上事也斷善根者不成就彼所順為出離依本善意近行故成就順彼善品串習威儀工巧六相應出離依意近行之義邊不論之也問見所斷意近行中有別緣色等五境義耶答可有此義也兩方若有此義者見所斷意近行迷共相理全不可別緣色等五境是以披今論餘處二十七文述無諍智不緣見所斷惑云諸無事惑不可遮防內起隨應總緣境故文既云總緣境故知不別緣色等五境云事若依之爾者見所斷意近行非一準何無別緣色等五境之義哉隨勘正理婆沙等論説可有此義見如何答見所斷意近行中可有別緣色等五境之義也故正理論二十九中明三十六意近行緣界地云欲境具三十六緣色界境唯二十四除緣香味二依各六文顯宗論十五説全亦同之婆沙論百三十九云欲界三十六中十二唯緣欲界繫十八通緣欲色界繫文任此等文欲界染汚喜憂捨色聲觸意近行緣色界境之旨分明也而欲界染汚喜憂捨色聲觸意近行緣色界境者是九上緣惑相應意近行故見所斷意近行中有別緣色聲觸三境之義云事亦必然也若有別緣色聲觸三境之義者別緣香味二境可準知之但於見所斷意近行迷共相理全不可別緣色等五境云難者見所斷惑迷非常苦空非我等共相理作常樂淨我等執故尤可總緣苦諦等之惑也故多分雖總緣苦諦等其中自有別緣色等五境之義更非所遮歟次於今論餘處內起隨應總緣境故之文者從多分説也重難云正理顯宗婆沙等諸論中欲界染汚喜憂捨色聲觸意近行緣色界境者未來世中容有此義故説能緣不説現起也如彼未來不生見道通四念住以何得知欲界現在染汚喜憂捨色聲觸意近行中有色界境之類哉答染汚心者無始串習故未來世中能緣用之程物無不現起也故勘婆沙論處處之文或有緣一極微起薩迦耶見云有餘師意會此應是正見非薩迦耶見之難云此約所緣故説有非約現起故説有評家破之云彼説非理所以者何如何此見能住所緣而不能起是故前説於理為勝文或十八無色界亦有他界緣遍行隨眠云有説意云然能緣定非現起定評家破之云彼不應作是説既無上界可緣如何有能緣定是故説無於理為善文準此等之文思之品類足論云緣無所緣法一切隨眠隨增婆沙論百三十六述如本論説緣無緣法是一切隨眠隨增道諦所斷無漏緣隨眠中可有別緣得及四相道共戒等之義見現起隨眠中有此類可得意也但於未來不生見道通四念住云難者無漏道等非無始串習法故不足為例難歟問論中明生有唯染義云由何煩惱自地諸惑文爾者光法師意如何釋諸惑言耶進云光法師釋云諸惑顯是本惑文付之結生位本惑隨惑俱起之諸惑之言何唯限本惑哉是以見論文云非由自力現起纒垢雖簡自力起纒垢全無遮隨惑何況光法師自釋無慚無愧惛沈掉舉隨惑亦潤生有之旨一段前後之定判寧不致相違哉答結生位雖身心昧劣諸本惑由數習現行力勝故任運現起諸隨惑由數習現行力劣非不思擇而得現前故不能起之也故正理論三十云諸煩惱中無一煩惱於結生位無潤功能然諸結生唯煩惱力非由纒垢所以者何以自力行悔覆纒等要由思擇方現起故然此位中身心昧劣要任運惑方可現行唯有隨眠數習力勝故諸煩惱能數現行於結生時任運現起諸纒及垢數習力劣非不思擇而得現前是故結生非諸纒垢文顯宗論十五説全亦同之光法師諸惑顯是本惑謂此地本惑皆容現起染汚生有之釋即顯此意也但於結生位本惑隨惑俱起之云難者結生位所起隨惑者無慚無愧惛沈掉舉也此四本惑相應隨惑故結生位本惑現起被引起非自力起故云諸惑顯是本惑之時相應隨惑亦能助潤之義所顯也論中述非由自力現起纒垢雖簡自力起纒垢不遮隨從纒其意在之光法師然諸結生唯本惑力并無慚無愧惛沈掉舉以是本惑相應纒故亦能助潤之釋此旨分明也何以此釋還為其疑哉問欲界疑煩惱瞋煩惱非相續斷位可有捨受相應義耶答可有此義也兩方若可有此義者今此二煩惱其性戚行轉也非相續斷位不可有捨受相應義是以今論餘處二十一中明欲界諸煩惱五受根相應義云以諸隨眠相續斷位勢力衰歇必住捨受文如此釋者欲界疑煩惱非相續斷位更不可有捨受相應義見若依之爾者披寶法師解釋云若生欲界即三十六色無色界各三十一皆能結生不簡上緣無漏緣等文準此釋思之從欲界生欲界中有未後念起善及無覆無記心人生有位起疑煩惱瞋煩惱者非相續斷位可有捨受相應義哉加之從上界生欲界中有初念起疑惱瞋煩惱者此亦非相續斷位可有捨受相應義也如何答欲界疑煩惱瞋煩惱非相續斷位可有捨受相應義也其旨即如一方疑難之趣但於今此二煩惱其性戚行轉也非相續斷位不可有捨受相應義云難者疑煩惱瞋煩惱與捨受相應位雖亦戚行轉微劣行相隨順中容非如與憂受相應位戚行轉故乍戚行轉與捨受相應全無所背也次於今論餘處勢力衰歇必住捨受之文者彼述一切捨相應之理就通相談之也故彼其文云就通相説受相應者一切皆與捨受相應以諸隨眠相續斷位勢力衰歇必住捨受文非遮生有等位所起疑煩惱瞋煩惱雖無相續斷義亦與捨受相應更無相違也問結生位自力起纒垢可現起耶進云今論云非由自力現起纒垢文付之結生位諸煩惱施潤生能自力起纒垢何不現起哉是以見婆沙論文云行緣識亦有二種一與悔俱二不與悔俱文既云識支與悔俱明知結生位自力起纒垢現起云事如何答結生位身心昧劣故自力起纒垢不現起也故今論云故對法者咸作是言諸煩惱中無一煩惱於結生位無潤功能然諸結生唯煩惱力非由自力現起纒垢文光法師釋此文云非由自力纒垢可能現起性羸劣故要由思擇方現在前初結生位身心昧劣故非現起自力纒者謂慳嫉忿覆悔自力垢者謂六垢文泰法師引正理論諸煩惱中無一煩惱於結生位無潤功能然諸結生唯煩惱力非由纒垢所以者何以自力行悔覆纒等要由思擇方現起故然此位中身心昧劣要任運惑方可現行唯有隨眠數習力勝故諸煩惱能數現行於結生時任運現起諸纒及垢數習力劣非不思擇而得現前是故結生非諸纒垢之文畢云雖此生有位中心身昧劣一由前身數起二若數起惑前身將命終時近起現行引發力故至生有時煩惱現起文顯宗論説如正理文任此等定判結生位自力起纒垢不現起之旨分明也但於婆沙論識支與悔俱云文者中有位方便識支攝故彼位悔心所現起故云爾也故婆沙抄二本中釋此文云若中有總名識支與悔俱者悔是纒垢中有中起無慚無愧沈掉等若準此文識支有二一方便識支二正識支文問光法師意睡眠心所為自力起為當隨從起歟第四卷抄記録之畢問欲界觸境中可有非段食類耶第二卷抄記録之畢問思食唯限意識相應思歟答唯限意識相應思也兩方若唯限意識相應思者見今論文出思食體云思謂意業文而意業不限意識相應思明知思食廣通六識相應思云事何況觸食廣通六識相應觸思食例亦可同若依之爾者正理論中思食唯限意識相應思判如何答有漏思心所分別籌度要屬希聖順愛現行如見懸砂囊而得存濟名為思食體唯限意識相應思也故正理論云非一切思皆是思食要屬希聖順愛現行意識相應乃名為食故飢饉世愚癡小兒懸砂囊而得存濟又世現見由有希望力便增長希望若絶力便衰微所為退敗然契經説意思食者顯此唯與意識相應文寶法師指此文云又正理説思食唯與意識相應文任此等定判思食體唯限意識相應思云事甚分明也但於今論思謂意業之文者思食意識相應意業為體故云思謂意業也非謂一切意業為體全無相違次觸食廣通六識相應觸云例難者根境識三所生有漏諸觸於心心所能為資益故名觸食而六識相應觸同有此義故觸食體廣通六識相應觸云事見何處為例難哉尋云觸食廣通六識相應觸云事見何處為例難哉答勘今論處處之文或述色非食云有時見色生喜樂者緣色觸生是食非色眼識相應觸名觸食故光法師釋此文云此是觸食非色是食文或出觸食體云觸謂三和所生諸觸無所簡別故觸食體廣通六識相應觸見故依此等文意為例難也問意業唯限意識相應思歟答可通六識相應思也兩方若唯限意識相應思者五識相應思亦有造作義何不名意業哉是以婆沙論中意業通六識相應思見若依之爾者披今論文出思食體云思謂意業文而思食唯限意識相應思明知意業不通五識相應思云事何況光法師餘處釋意業相云由等起立意業意謂意識業即謂思文意業唯限意識相應思之旨此釋分明也如何答六識相應思同有造作義故意業體可通六識相應思也故寶法師餘處十三引正理論三十四且必不攝依眼觸等所起諸思以彼諸思非前所説思惟作事二思攝故之文畢云準此五識相應思是意業此五識相應思非是起思惟思亦非動作思故云云作其轉計略而不述文婆沙論四十二中述評家義云應作是説此中總説一切意業若能牽引衆同分者若能圓滿衆同分者若有漏者若無漏者若在意地若在五識皆説名思一切皆有造作相故文加之勘品類足論文或云業法云何謂身語業及思非業法云何謂除身語業諸餘色除思諸餘行蘊身三蘊全并無為法文此文無諍思中無非意業之類見或云業相應法云何謂若法與思相應此復云何謂一切心心所法除思業不相應法云何謂若法思不相應此復云何謂色及思心不相應行無為文此文出業相應法取除思諸餘一切心心所法無簡五識業不相應法中不舉五識若五識相應思非意業者以五識何不名業不相應法哉任此等文理意業體通六識相應思云事炳然也但於今論思謂意業之文者意業廣通六識相應思中無相違次於光法師餘處意謂意識業即謂思之釋者論文一段明意業為能等起身語業所為等起之旨故據與身語業為能等起意業云意謂意識也不與身語業為能等起意業通五識相應思更非所遮也問識食可通五識耶答可通五識也兩方若通五識者思食唯限意識相應思識食何可通五識哉若依之爾者今論中出識食體云識謂識蘊無簡五識爰知識食廣通五識云事如何答有漏心王了別境界能任持身故名識食而了別境義不限意識欲識食體廣通五識也故正理論中釋識食體云識謂了境無所簡別廣取六識見顯宗論十五説全亦同之加之品類足論九云識食七界一處一蘊攝文婆沙論百二十九中明四食三科相攝云蘊界處攝者是十一界五處三蘊少分所攝十一界者謂七心界及香味觸法界文此等之文出識食體所七心界故識食體廣通六識云事甚分明也但於思食唯限意識相應思云例難者如見懸砂囊而得存濟名思食故唯限意識相應思也義門既各別更不可相例歟問鈍根阿羅漢起結生結生可得永對治斷耶答可得永對治斷也兩方若得永對治斷者光法師釋得永對治斷云得擇滅不退名永文而鈍根阿羅漢退起所斷惑更不可云得永對治斷哉若依之爾者今論中出已斷起結已斷生結第三句體云諸阿羅漢文諸阿羅漢之言可通鈍根阿羅漢見如何答鈍根阿羅漢起結生可得永對治斷也起結者潤中有及感中有業之惑生結者潤生有及感生有業之惑也而任一切從果退必得不命終之理鈍根阿羅漢雖退起所斷惑不可潤中有及感中有業不可潤生有及感生有業故於起結生結可得永對治斷也故今論中出已斷起結已斷生結第三句體云諸阿羅漢無簡鈍根之類光法師釋此文云已斷起結已斷生結謂阿羅漢斷三界貪不受中有故起結已斷不受生有故生結已斷此中言斷據永治説文此釋意一切阿羅漢據永對治斷已斷起結已斷生結云事亦分明也但於光法師得擇滅不退名永之釋者鈍根阿羅漢所退起或不名起結生結故於起結生結得永對治斷全無相違也重難云光法師初釋意云潤中有惑名起結潤生有惑名生結生結者不限潤生有一念之惑見若爾鈍根阿羅漢所退起惑既潤本有何不名生結哉答光法師初釋意起結生結不限潤中有生有初念之惑者起潤彼初念惑之上可通後念云也而證阿羅漢果之後不起潤中有生有初念惑故鈍根阿羅漢所退起惑不名起結生結也重難云鈍根阿羅漢退起惑之時設雖現起惑不名起結生結退得過未起結生結之義必然也寧云鈍根阿羅漢起結生結得擇滅不退哉答鈍根阿羅漢退起惑之時雖退得過未起結生結永不起起結生結故云起結得永對治斷更無所背也問非中有位起結現前非生有位生結現前義可有耶答可有此義也兩方若有此義者既名起結生結定知中有生有位可現前也是以披光法師解釋云潤中有惑名起結潤生有惑名生結述潤中有初念惑名起結潤生有初念惑名生結加之光法師明已斷起結已斷生結之義云不受中有故起結已斷不受生有故生結已斷文此釋意中有生有位所起之惑如次名為起結生結之旨分明也若依之爾者勘正理論餘處文非中有生有位起結生結現前之義可有見如何答見正理論餘處文云若第二斷唯是生結於欲色界未離貪者二時容有起結現前謂住本有發滿業時及住中有續中有時文思此文意住本有位造惑中有滿業之時能潤之惑并住中有位潤中有惑名起結故住本有位起結現前之義可有也但於既名起結生結定知中有生有位可現前也云難者雖本有位現前之惑潤感中有業故名起結也次於光法師解釋者云潤中有惑名起結述潤中有初念惑名起結判不受中有故起結已斷皆是潤中有惑名起結云許也非謂唯中有位現前之惑名為起結全無相違歟非生有位生結現前之義準之可知問生有唯限一念歟答唯限一念也兩方若唯限一念者披光法師釋云潤生有初念惑名生結文如此釋者生有可通多念見若依之爾者生有唯限一念者諸論一同之説性相必然之理也如何答生有唯限一念者實是性相之所定也更不可異求之故今論餘處九云二者生有謂於諸趣結生剎那文正理論三十中或云食持生有故説令安意顯生有唯一念故文或云於前所説中等四有死生二有唯一剎那文但於光法師潤生有初念惑名生結之釋者初釋意潤生有惑名生結者且就生有之言合通本有之一廢立兼潤本有惑名生結為言如彼往色無色界生已不久般涅槃者名為生般第二釋意異之云潤生有初念惑名生結也非謂建立四有之時生有通多念全不違性相也問無色界生般有行般無行般聖者可有已斷起結未斷生結義耶答可有此義也兩方若有此義者今論云離二界貪諸上流者為第一句光法師釋已斷起結未斷生結謂離欲色二界貪諸無色上流者若無色界生般有行般無行般聖者有已斷起結未斷生結之義者何唯舉無色界上流聖者哉若依之爾者以道理思之無色界生般有行般無行般聖者尤可有已斷起結未斷生結之義也如何答無色界中無有中有故無色界生般有行般無行般聖者可有已斷起結未斷生結之義云事其理必然也更不可疑之但於論疏中出此類唯舉無色上流聖者云難者上流聖者經多生死已斷起結未斷生結之義甚顯故且舉之也理實而言已斷起結未斷生結之類中可舉無色界生般有行般無行般聖者也問中般涅槃聖者起結少分可得永不行斷耶答可得永不行斷也兩方若得永不行斷者見正理論餘處二十一文云此中初斷謂起結全生結少分於色界貪得永離故於無色貪未永斷故永離色界貪之聖者雖述起結全生結少分得永對治斷之旨不云中般涅槃聖者起結少分得永不行斷知不得之云事若依之爾者中般涅槃聖者雖起所應生地結定不可起色界餘地及欲界起結少分何不得永不行斷哉答中般涅槃聖者色界之中所不應生地之起結并欲界起結永不可起之故起結少分尤可得永不行斷也但於正理論餘處文不云中般涅槃聖者起結少分得永不行斷云難者諸上流聖者永離欲色二界貪之時於起結全得永對治斷隨於其地生結亦得永對治斷故云起結全生結少分得永對治斷也中般涅槃聖者於生結得永不行斷者不至生有位之前入般涅槃故也被引生結得永不行斷非於起結得永不行斷故不云生結全起結少分得永不行斷也問據永不行斷可有已斷起結已斷生結義耶進云光法師解釋中可有此義見付之付光法師釋披今論現文述諸阿羅漢為第三句已斷起結已斷生結之第三句據永對治斷論之據永不行斷可有此義云事豈不背論文哉答光法師釋今論諸阿羅漢為第三句之文云第三句已斷起結已斷生結謂阿羅漢斷三界貪不受中有故起結已斷不受生有故生結已斷此中言斷據永治説雖有於此身定成無學者約不現行生起二結亦名為斷此中且據永對治説文此釋意云以理思之如彼極七返有聖者第七生等今生必可證無學果之類據永不行斷雖可有已斷起結已斷生結之義論文中出此第三句且據永對治斷説為言自本論文之外別顯此義何致背論文云疑哉問於觸思識三食斷遍知時兼所斷遍知法三食相望其數可同耶進云正理論中二食斷遍知時兼所斷遍知法舉三類一食斷遍知時兼所斷遍知法舉二類也付之以觸思識三食有漏通三界之性相思之於觸思識三食斷遍知時者斷非想非非想處第九品惑位也其時兼所斷遍知法其數可同何有二類三類之不同哉答此事不限正理論説婆沙論中有此廢立然而且就進見正理論文云若於觸食斷遍知時亦斷遍知樂等三受若於思食斷遍知時亦斷遍知欲等三愛若於識食斷遍知時亦斷遍知名色二有於觸思二食斷遍知時兼所斷遍知法如其次第舉樂等三受欲等三愛於識食斷遍知時兼所斷遍知法舉名色二有故為今進歟思此文意若於觸食斷遍知時亦斷遍知樂等三受者觸能引受受是觸所領果以觸為緣生故也正理論三十云觸能引受是所領故文婆沙論百三十云若於觸食已斷遍知者便於三受亦斷遍知諸受以觸為緣生故如經言觸緣受文若於思食斷遍知時亦斷遍知欲等三愛者若依正理論意由思業力令欲等三愛增廣故也故正理論云希望思力令愛增廣由思欣樂虛妄樂故文若依正理論意由欲等三愛力引起思業故也如云業由隨眠眼方得生長故婆沙論云若於思食已斷遍知者便於三愛亦斷遍知以彼三愛是起因故如契經説業為因故生愛為因起故文若於識食斷遍知時亦斷遍知名色二有者識支結生生長名色支故也故正理論云識能生起名色有牙名色由識而生長故文婆沙論云若於識食已斷遍知者則於名色亦斷遍知以識是彼名色緣故如契經説識緣名色文但於疑難之趣者理實而言於觸思識三食斷遍知時者斷非想非非想處第九品惑位故此等諸法一念同時雖皆斷盡且隨相順法假作一往釋歟問論中證思食益現身引集異門足論説爾者如何引之耶進云今論云集異門足説大海中有大衆生登岸生卵埋於砂內還入海中母若常思卵便不壞如其失念卵即敗亡文付之為曉今論所引之説正見集異門足論八文云若彼諸卵思母不忘便不腐壞若彼諸卵不思念母即便腐壞文婆沙論百三十中引集異門足論説云彼在卵㲉憶念母故身不爛壞謂憶念母先孚燸時所有觸故若忘其母身便爛壞文若爾今論所引之言非只背集異門足論本説亦相違婆沙論所引之文哉答集異門足論中有異本不同歟今論所引之文是謬之本也故即難之云此不應然違食義故豈他思食能持自身理實應言卵常思母得不爛壞忘則命終文寶法師釋此文云此是論主正本文也文而釋意上所引集異門足論文違本説背道理故下能破言云論主本文也婆沙論百三十中破有餘師説若母憶念卵中子者卵則不壞母若忘之彼卵便壞云義云此不應理所以者何勿以他食能持自命是故前説於理為善其能破意亦同今論故以集異門足論現文可為實義今論所引之文并婆沙論有餘師説依謬本故既為所破義不可劬勞之尋云集異門足論梵本有異本不同歟答集異門足論梵本雖無異本不同誦者之中有謬誦故今論文載彼説歟如彼此國尊者誦三十三是遍行六十五非遍行西方尊者誦二十七是遍行六十五非遍行六應分別述阿羅漢行盡智已最初起善眼識現在前位成就六恆住法或誦成就過去一未來六現在一或誦過去無但成就未來六現在一等也問論中明二思識二食能引起當有云思食引已從業所熏識種子力後有得起文光法師釋此文約有部經部義作二解釋爾者何釋為正耶進云光法師釋云又解述經部釋此解似勝文付之今文更無違有宗義何判述經部釋此解似勝哉何況見顯宗論十五文云業既引已受潤識種能令當有名色身起文準顯宗説思今論意述有宗義云事炳然也如何答今論思食引已從業所熏識種子力後有得起之文雖強不違有宗之義熏之文字種子之言專順經部義故初釋痛之會熏之言資釋識起取果功能名為種子不如又解意直得論文故判述經部釋此解似勝思食引已從業所熏識種子力後有得起或從業所熏識種子力識得現行後有得起也泰法師解此文云此就經部釋其意亦同之但於顯宗論文者全非相違今論中雖載經部義其現文不違有宗意故顯宗論説大同今論有何所背哉問論中解契經所説贍部林異生舉四師説爾者論主意何説為正耶進云論主意以後身菩薩名贍部林異生云説為正判也付之後身菩薩今生必證佛果施福定可無量對離欲外仙何説勝彼百倍哉是以論中破近佛菩薩名贍部林異生之義云理亦不然施彼獲福勝施俱胝阿羅漢故文後身菩薩名贍部林異生之義寧不蒙此難破哉何況婆沙論百三十中引契經説以贍部林異生對預流果明施福多少云此獲施福果大於彼文若後身菩薩名贍部林異生者施後身菩薩福豈劣於施預流果聖者福哉答最後身菩薩決定在贍部洲故名贍部林異生道理尤可然故今論云後身菩薩居贍部林名彼異生此説應理爾時菩薩同離欲仙故對彼仙校量歎勝文光法師釋此文云論主自釋住最後身釋迦菩薩居贍部林名彼異生此説應理文泰法師并寶法師釋其意同之但於後身菩薩今生必證佛果施福定可無量對離欲外仙何説勝彼百倍哉云難者今論中會之云雖施菩薩福勝無邊乘前校量且言勝百理亦應爾文次於今論理亦不然施彼獲福勝施俱胝阿羅漢故之難破者近佛地菩薩非必在贍部洲故全無可名贍部林異生之義故如此破也最後身菩薩決定在贍部洲故專有可名贍部林異生之理故會乘前校量且言勝百也寶法師論主自評取此釋與第二釋近佛菩薩有何別者近佛菩薩非決定在贍部洲中後身菩薩決定即在贍部洲中然前有難彼獲施福勝施俱胝阿羅漢故之解釋即遮此例難也次於婆沙論此獲施福果大於彼之文者依今論意云之婆沙論所引契經中對預流果校量施福勝劣贍部林異生者是贍部林中對修道諸異生類或離欲外道非後身菩薩故施贍部林異生福劣施預流果聖者福勝也故光法師解此疑云贍部林中有餘修道諸異生類非唯菩薩名為異生婆沙引經言異生者非是菩薩是餘異生雖復同解一處經文引校量經即有不同又解婆沙引經將贍部林中異生對預流果者即是林中離欲外道以彼外道是異生故非是菩薩異生兩論引經雖復對預流向對果不同外道異生而無差別重難云光法師二解釋俱不可然先就初釋難思贍部林中有餘修道諸異生類者順決擇分異生歟為當非順決擇分餘異生歟若順決擇分異生者今此二解釋俱以婆沙論所引契經文會同論主後身菩薩名贍部林異生云義也而論主意不許順決擇分異生居贍部林中何以順決擇分異生名贍部林異生哉何況今論中順決擇分異生名贍部林異生之義光法師釋當婆沙一百三十評家義今論意以此贍部林異生不對預流向定婆沙論所引契經文以贍部林異生對預流果校量施福勝劣見若對順流果贍部林異生云順決擇分異生者豈不致相違哉若順決擇分餘異生者婆沙論評家意順決擇分異生名贍部林異生寧可非順決擇分餘異生哉次就第二釋亦有疑婆沙評家意順決擇分異生名贍部林異生不云外道名彼異生離欲外仙名彼異生者不正義意也釋即是林中離欲外道背評家義當不正義意也哉答今此二釋之旨趣者今論意後身菩薩名贍部林異生之時婆沙論所引契經中以贍部林異生對預流果校量施福勝劣彼異生劣預流果勝云文致相違故依今論意會婆沙論所引契經文也非依婆沙論意釋之不可定順決擇分異生對預流果校量施福勝劣之時劣於預流果之程異生也即與離欲外仙齊等異生也自本不依婆沙論意背評家義當不正義意更非所痛也又尋云今論所引契經與婆沙論所引契經一經歟為當各別經歟答兩論同引校量經故可云一經歟雖同一經梵語貪多義故造論之人於梵本經得其意各別引其文不同也故光法師釋云雖復同解一處經文引校量經即有不同文重難云今論云由彼世尊除彼異生還將外道對預流向校量勝劣文婆沙論百三十云此經復言若以飮食布施贍部林中異生復以飮食施一預流此獲施福果大於彼文兩論所引經文既別何云一經哉是以光法師釋云既有兩種不同明知引經各異非是一文文寶法師釋云婆沙一百三十引經與此即有小異引經雖別大意皆同然釋贍部洲異生有異文泰法師釋云彼所引經還持異生對預流果校量勝劣此所引經除彼異生還將外道對預流向校量勝劣故知此論所引經非婆沙所引經也文任此等釋兩論所引契經之文非一經説見如何答理實而言兩論雖同引校量經隨造論人意引替一經文故兩論所引經文相替更非可疑也光法師釋非是一文寶法師判引經雖別其意在之歟泰法師釋準之可會也或又泰法師故知此論所引經非婆沙所引經也之釋其言既分明也兩論所引各別經文得意歟又疑云準寶法師近佛菩薩非決定在贍部洲中之難意思之修道諸異生類不必在贍部林中何名贍部林異生哉答泛論修道諸異生類雖不必在贍部林中指云贍部林中有餘修道諸異生類故無有其難近佛地菩薩廣在餘處不云贍部林中近佛菩薩故蒙近佛菩薩非決定在贍部洲中之難破也又尋云光法師非唯菩薩名為異生之釋婆沙論所引契經意許後身菩薩亦名贍部林異生之義歟答此釋意依今論意會婆沙論所引經文之時對預流果校量施福勝劣贍部林異生者贍部林中有餘修道諸異生類今論所引經文非唯後有菩薩名為贍部林異生為言若婆沙論所引經意兼許後有菩薩名贍部林異生之義者豈劣於預流果聖者哉又尋云婆沙論評家意順決擇分異生名贍部林異生之時可會今論所引除贍部林異生還將外道對預流向校量施福勝劣之經文哉答婆沙是本論故今論意可會婆沙論所引經文今論是末論故婆沙論意不可會今論所引經文歟問論文云由後世尊除彼異生還將外道對預流向文爾者離欲外道并預流向聖者俱居贍部林歟答離欲外道可居贍部林預流向聖者不可必居贍部林也兩方若俱居贍部林者校量福勝劣更不可依同處哉若依之爾者披光法師解釋離欲外道居贍部林見對彼預流向聖者例亦可同如何答離欲外道與後身菩薩其德懸隔雖非可校量施福勝劣同在贍部林故今論所引契經之中彼此相對校量之也故今論云爾時菩薩同離欲仙故對彼仙校量歎勝文光法師解此文釋爾時菩薩同離欲仙居贍部林也云爾故對離欲外道校量施福勝劣預流向聖者同居贍部林不可得意也問下三靜慮根本地可有捨受耶第三卷抄記録之畢問命終位唯起自地心歟進云光法師釋云夫死生心必起當地文付之依光法師解釋披識身足論文出現在欲界繫無覆無記心已了別今了別非當了別之句云謂欲界色界生長趣無色界諸不還者住最後無覆無記心文如此文者依身在色界不還果聖者命終位起欲界無覆無記心見如何答若命終位起他界地心者是他界地命終可非自地命終故唯起自地心不起他界他心也故今論云非在定心有死生義界地別故文光法師釋此文云非在定心有死生義一界地別故夫死生心必起當地若起異界地有死生者便是他界地死生非是自界地死生文寶法師釋此文云界地別者謂身在欲界等入上界地定等不可異地心而命終受生文泰法師釋此文云非在定心有死生義一界地別故若異界地心有死生者便是他地死生非自地也文正理論云雖説在意識得有死生而非在定心有死生理非界地別有死生故文顯宗論説全亦同之任此等文理命終位唯起自地心不起他界他心云事炳然也但於識身足論文者尤為難會且推之誦者謬誦添色界二字歟若又展轉書寫之間謬書添色界二字歟理實可云謂欲界生長趣無色界諸不還者住最後無覆無記心也以何知之者勘識身足論下文或出現在色界繫善心已了別今了別非當了別之句云謂色界生長趣無色界諸不還者住最後善心文或出現在色界繫無覆無記心已了別今了別非當了別之句云謂色界生長趣無色界諸不還者住最後無覆無記心文若識身足論意許命終位起他界地心之義者此等文何不舉欲界生長之類哉明知上文出現在欲界繫無覆無記心已了別今了別非當了別之句舉色界生長之類色界二字謬剩云事尋云識身足論今一段中文字謬剩事有例證哉答識身足論上文出過去欲界繫善心已了別今了別非當了別之句云謂欲界生長趣色無色界諸不還者住最後善心文命終位設雖起無覆無記心過去欲界繫善心已了別今了別非當了別而云善心善字謬剩也以之可為今例證歟或一義云色界之言乘言便歟上文出過去欲界繫無覆無記心已了別今了別非當了別之句云謂欲界色界生長趣無色界諸不還者住最後心文乘此言便下文出現在欲界繫無覆無記心已了別今了別非當了別之句云謂欲界色界生長趣無色界諸不還者歟例如婆沙論中十無學支捨緣舉得果位未知當知根及喜覺支通相應句云謂餘八根也重難云見識身足論文過去欲界繫無覆無記心分別已了別今了別等義畢次舉欲界繫未曾得無覆無記心分別已了別等義其後舉現在欲界繫無覆無記心分別已別等義既隔未曾得無覆無記心何云乘過去欲界繫無覆無記心已了別今了別非當了別之言便現在欲界繫無覆無記心已了別今了別非當了別之句置色界之言哉答乘言便之習不必依鄰次歟問論文云非在定心有死生義界地別故加行生故能攝益故文爾者光法師意能攝益故者簡命終受生二位歟進云光法師釋意簡命終受生二位見付之受生位者攝益時也以能攝益故何由可簡受生位哉是以正理論中云又在定心能攝益故必由損害方有命終諸在定心非染汚故必由染汚方得受生以能攝益故唯簡命終位如何答見今論文述非在定心有死生義舉界地別故加行生故能攝益故之三故文相起盡三故俱簡命終受生二位之旨炳然也初二故既簡命終受生二位至第三故寧唯簡命終一位哉故光法師釋此文三能攝益故夫死生心是微劣故不能攝益文寶法師釋此文別以三因證在定心無死生也文任此等定判能攝益故簡命終受生二位云事亦分明也但於受生位者攝益事也云難者受生位微劣故無攝益義也次於正理論文者就實通論受生位無能攝益義故以能攝益故雖可簡命終受生二位別舉非染汚故簡受生位故且以能攝益故簡命終位云也問光法師意可起異地散善耶第二卷抄記録之畢問論中明阿羅漢入涅槃心舉欲界捨受異熟有無二説爾者光法師意何説為正耶進云光法師判於二説中初説為正欲界有捨受異熟云義為正也付之依光法師正不披今論上下文當卷雖舉二説無判正不餘處十五本頌結餘説下亦有由中招異熟長行述有餘師説下諸地中亦有第三順非二業由中定業招異熟故下地有捨受異熟云義為有餘師説明知非正義云事加之婆沙論中引發智論説云云何順不苦不樂受業謂廣果繫善業及無色界繫善業文見品類足論文或云順不苦不樂受業云何謂第四悉地繫善業及無色界繫善業文或云順不苦不樂業一界一處二蘊攝七智知除法滅道智一識識色無色界遍行及修行所斷隨眠隨增文任此等定判下地無捨受異熟之旨甚分明也光法師何以違本論文之師説為正義哉答廣披有宗依憑諸論所説委尋下地捨受異熟有無今論餘處七明二十心相生云異熟威儀無間生八謂自界六除加行善與通果心及色無色有覆無記文正理顯宗兩論之文全亦同之婆沙論云欲界威儀路心無間生八心謂欲界六除加行善及通果心色無色界各有覆無記心如欲界威儀路心欲界異熟生心亦爾文雜心論云報生威儀八者欲界報生及威儀次第生八心自界六除方便善心及變化心色無色界穢汚心文此等諸論中同述欲界異熟生心無間生色無色界有覆無記心是則欲界命終心生色無色界結生心也而任死生唯捨受之理欲界有捨受異熟云事必然也加之婆沙論云但由不善引衆同分業生傍生鬼趣中既生彼已受善不善法異熟色心心所法不相應行善法異熟色者四處謂色香味觸心心所法者樂喜捨受及相應法但由善引衆同分業生欲界人天中既生彼已受善不善法異熟色心心所法不相應行善法異熟色者九處除聲心心所法者樂喜捨受及相應法文此文亦欲界有捨受異熟之旨不可異求之故勘光法師處處解釋當卷云於二説中初説為正如二十心相生中欲界異熟生心能生上二界染汚心即是欲界異熟生心捨受相應命終於上二界染心受生以受生命終心定捨受故以此明知欲界定有捨受異熟又此論下文云有説下亦有由中招異熟又許此三業非前後熟故又婆沙異熟因中又有文説下地有捨異熟不能具引以此故知三定已下有捨異熟為正文下地有捨受異熟師義為正之趣此等定判頗以委悉者歟但於今論餘處餘説下亦有由中招異熟之文者中間定業可感捨受異熟云事文理炳然之上亦順諸論所説二十心相生之文故雖有餘師説判為正義也次於婆沙論所引發智論説者婆沙論中即會此文云此中但顯順不苦不樂受業異熟最後邊際謂第四靜慮是有色地邊無色界是三界邊復有説者此中但顯此受異熟不共田器誰是此受異熟不共田器謂第四靜慮及無色界復有説者下地雖有此受異熟然為餘受所覆相不明了不久相續徒廣異上更無餘受唯有此受明了相續是故遍説文次於品類足論文者正理論中會此文云然下雖有順非二業而由少故彼文不顯文問無覆無記命終心唯限異熟威儀二心歟答唯限異熟威儀二心也兩方若唯限異熟威儀二心者披識身足論文出現在欲界繫無覆無記心已了別今了別非當了別之句云謂欲界色界生長趣無色界諸不還者住最後無覆無記心文如此文者依身在色界不還果聖者命終位趣欲界通果無記心見若依之爾者今論疏中述入涅槃心唯限異熟威儀二無記心之旨無覆無記命終心其義可同加之光法師餘處解釋中無覆無記命終心唯舉異熟威儀二心如何答工巧通果二無記心勢力強盛法命終勝劣位不現起故無覆無記命終心唯限異熟威儀二心也故光法師餘處釋云十二心能作命終心謂欲界生得善不善有覆威儀異熟色界生得善有覆威儀異熟無色界生得善有覆異熟文任今此定判無覆無記命終心唯限異熟威儀二心云事分明也但於識身足論文者尤為難會然而以二義致會通之趣如次上論義之處記之問論中述已得順解脫分者非正定聚云彼後或墮邪定聚故等文爾者寶法師意此文有幾釋判耶進云寶法師釋云此有四釋云云付之依寶法師釋披今論現文云彼後或墮邪定聚故又得涅槃時未定故非如預流者極七返有等又彼未能捨邪性故不名正定文此文無諍可有三釋見是以光法師意成此旨哉答寶法師意以又得涅槃時未定故非如預流者極七返有等之文為二釋也故寶法師釋云二得涅槃時未定故三非如預流極七返有等文此釋旨趣雖不分明推之又得涅槃時未定故者述順解脫分之遠時非正定聚之旨非如預流者極七返有等者明暖頂以上之近時非正定聚之義得意為二釋歟但於光法師釋者非如預流者極七返有等者頌又得涅槃時未定故之義非別故存也故光法師釋云至下中忍雖不墮邪定聚彼得涅槃時未定故非如預流者極七返有等文論文之中置三故字光法師釋專順文相歟兩師定判各有所存其趣自本各別也不可以彼難之問中忍位可有命終受生義耶答可有命終受生義也兩方若有命終受生義者中忍位既作減行減緣之行相速可至增上忍世第一法位更不可有命終受生義若依之爾者光法師釋忍世第一法不名正宗聚云至下中忍雖不墮邪定聚彼得涅槃時未定故非如預流者極七返有等至增上忍世第一法雖得涅槃時有定限以彼未能捨異生邪所依性故不名正定文若中忍位無命終受生義者得涅槃時何無定限哉答中忍位可有命終受生義也若無此義者中忍以後得涅槃時可有定限光法師寧釋至下中忍雖不墮邪定聚彼得涅槃時未定故非如預流者極七返有等哉何況寶法師餘處釋今論等言為顯捨衆同分亦捨少分殊勝善根之文云然四善根雖皆殊勝然唯前三有命終捨世第一法及增上忍無命終捨定入聖故文泰法師餘處釋今論餘位亦有極七返生然非決定是故不説之文云乃至中忍受無量生是故不説文任此等定判中忍位有命終受生義云事亦分明也但於中忍位既作減行減緣之行相速可至增上忍世第一法位云難者中忍位實雖減行相減所緣壽命長短甚不定故其中間有命終受生義全無所背也問斷善邪見可立邪定聚耶進云論疏中不立邪定聚也付之斷善邪見者最重惑障也何不立邪定聚哉是以光法師餘處所引正理論中云斷善邪見破僧妄語當知定招無間異熟文既云定招無間異熟尤可立邪定聚也例如破僧妄語立邪定聚如何答見今論文云正邪不定聚聖造無間餘五無間業立邪定聚也長行即述其故云定謂無間造無間者必墮地獄故名邪定文正理論中明趣業見三邪性體云即是惡趣五無間業五不正見如次為體文顯宗論説全亦同之婆沙論云邪性定聚謂威熟五無間業文雜心論云無間業説邪定定趣地獄故文思此等文意五無間業順次生必感地獄異熟果故立邪定聚斷善邪見現身之中若不續善根順次生雖必感無間地獄異熟果若續善根引起順決擇分善根亦入正性離性乃至證得阿羅漢果之人不感無間地獄異熟果故不立邪定聚也以何知之者婆沙論中問若現法中續善根者彼現身能入正性離生不評家意答此問云應作是説彼能引起順決擇分亦後能入正性離生乃至能得阿羅漢果如唱羯吒婆羅門等斷善根已尊者舍利子為其説法令續善根漸得見諦乃至究竟如毗奈耶中廣説文斷善根人續善根後入聖得果有不感無間地獄異熟果之類云事此文炳然也但於斷善邪見者最重惑障也何不立邪定聚哉云難者斷善邪見實雖最重惑障無必墮地獄之義故不立邪定聚也次於光法師餘處所引正理論文者斷善根人不續善根入聖得果必感無間地獄異熟果與破僧妄語其義同故云斷善邪見破僧妄語當知定招無間異熟也非遮續善根者入聖得果不感無間地獄異熟果義全無相違也重難云勘婆沙論文云且依施設足論説彼於現法中不能續善根決定於地獄中生時感死時方能續善如彼論説若蟻卵無悔心應説是人斷三界善彼於現法不能續善根定於地獄中生時或死時方能續善文如此文者斷善根人於現身中無續善義見若爾斷善邪見順次生必可感無間地獄異熟果何不立邪定聚哉是一次斷善根人中有不感地獄異熟果之類者造五無間業人中亦可有此義哉是二次斷善根邪見通不定受者亦通順後受歟是三答婆沙論中即通施設足論説云彼説現法不能續者即是所説有斷善根亦造無間惑由因力斷善根等文任婆沙論會通案施設足論意非謂斷善根人一切皆於現身之中無續善義更無所背也次斷善邪見意識相應惑障其罪最雖甚重無起加行果究竟義故續善根入聖得果可有不感無間地獄異熟果義也五無間業身語罪障起加行果究竟畢成決定業故後時雖起追悔善心現身不能入得果必感地獄異熟果也次斷善邪見通不定受者時報俱不定永不感彼異熟果也感無間地獄異熟果之程順次生必感之故不通順後受也如彼正理論一師意云無想定雖通不定受不通順後受準例彼可思之問邪定聚唯限一趣依身歟答婆沙論所引本論中有限一趣依身通二趣依身云異義也兩方若唯限一趣依身者邪定聚義門非一準何唯限一趣依身哉是以正定聚不限一趣依身相例可同若依之爾者婆沙論文邪定聚唯限一趣依身判如何答婆沙論中依集異門足論説成就五無間業名邪定聚故唯限人趣依身依施設足論説五無間業若彼因彼果彼等流彼異熟及成就彼法補特伽羅名邪定聚故亦通人及地獄二趣依身也故婆沙論云邪性定聚謂成就五無間業趣者邪性定聚一趣少分謂人此依集異門説若依施設邪性定聚語五無間業若彼因彼果彼等流彼異熟及成就彼法補特伽羅趣者邪性定聚二趣少分謂地獄及人文正勘集異門足論説云云何邪性定聚答五無間業文此集異門足論施設足論二説相替故有邪定聚唯限一趣依身亦通二趣依身之二意也存此二邊義門之時兩方疑難自被會通者歟問無為法正定聚等三聚中何攝耶進云光法師所引集異門足論明不定聚中舉無為法也付之不定聚者名待善緣成正定聚待惡緣成邪定聚諸無為法既無此義何可名不定聚哉答得無漏聖道者定得涅槃故名正定聚造五無間業者如墮地獄故名邪定聚諸無為法無有定得涅槃之義亦無必墮地獄之義故名不定聚也故光法師所引集異門足論第四云云何不定聚答除五無間業餘有漏法及無為文婆沙論云不定聚謂唯成熟餘有漏法及無為文但於諸無為法無待善緣成正定聚待惡緣成邪定聚之義云難者諸無為法雖無待善惡二緣成正成邪之義亦無正定被云正定聚邪定被云邪定聚之義故名不定聚也故品類足論中云定法云何謂五無間業及學無學法非定法云何謂除五無間業諸餘有漏及無為法以無為法名非定法即存此意歟問寶法師意世第一法位可捨見邪性耶答可有捨不捨二義邊也兩方若捨見邪性者披寶法師解釋云住增上忍及第一時時少不説及未捨見邪性故文此釋無諍世第一法位不捨見邪性見若依之爾者婆沙論中世第一法位捨業趣見三邪性判如何答若就正捨云之者世第一法位異生性不成就得在生相為見邪性所依異生性捨之故能依見邪性亦捨之可云也故婆沙論中釋發智論世第一法捨邪性之文云捨邪性者謂此心心所法能捨三種邪性一業邪性二趣邪性三見邪性由三緣故此位名捨一由不作故名捨謂業邪性二由不往故名捨謂趣邪性三由不行故名捨謂見邪性問增上忍時三緣巳具何故此位乃説捨耶答今破彼依故説捨彼問何謂彼依答無覆無記異生性是謂諸涅槃依異生性言諸有情令於生死受諸苦故如師子王依止無覆無記窟穴能容種種傍生等類世第一法能捨彼依異生性故説名捨彼文世第一法位捨彼所依異生性故捨能依見邪性云事此文分明也若就已捨論之者世第一法位異生性成就得現在前為見邪性所依異生性猶成就之故能依見邪性不捨之可云也故光法師釋云至增上忍世第一法雖得涅槃時有定限以彼未能捨異生邪所依性故不名正定文泰法師釋云世第一法時雖決定由成就異生邪所依性以彼未能不成就捨邪定故不名正定文此等釋意世第一法位猶成就見邪性所依異生性故不名正聚云故不捨能依見邪性為言寶法師住增上忍及第一時時少不説及未捨見邪性故之釋即述此趣歟若依此等釋意者苦法忍位異生性不成就得現在前初不成就彼所依異生性時捨能依見邪性可云也若爾婆沙論文寶法師釋名顯一邊義門更非相違定判歟寫本云文永五年戊辰二月十日午時於東大寺知足院草菴抄之畢自去年正月十七日始此卷抄至今年二月十日朝終其微功問端才為七十六帖光陰久送四百七日緩怠之至難而有餘但去年七月八日之侯止住高山寺聖迹傳受解脫門義一部同九月上旬中旬之頃參篭御裳濯靈地轉讀大般若經六百卷之間此勤雖中絶其志今遂之以仰春日權現之冥助以憑彌勒慈尊之引攝殊別宗專法師離苦得脫期再會於龍華之月乃至法界衆生平等利益施濟度於憋龜海之浪而已右筆華嚴宗末葉法印權大僧都宗性年齡六十七夏臘五十五
