body:
  text: 俱舍論第二十二卷抄問頌文云説煩惱斷由見諦修故文爾者已説者指斷遍知有九頌歟答爾也兩方若指彼頌者正理論五十七中指欲見苦等斷十七七八四之頌見若依之爾者論文起盡可指斷遍知有九之頌也如何答見今論文云如是已説煩惱等斷於九勝位得遍知名指斷遍知有九之文云事尤分明也正理論五十七中云如是已辨隨眠等性雖有無量總建立為三界五部隨眠等斷隨所繫事雖亦無量就勝位立九種遍知其意亦同今論之文指斷遍知有九之文云事亦必然也但於正理論中指欲見苦等斷十七七八四之文云難者彼別事也已説煩惱斷由見諦修故者先述諸煩惱有見所斷修所斷之二斷之旨畢次下文云然諸論中開二為五即五所斷如先已説先何處説謂先頌言欲見苦等斷十七七八四之文也此文全非釋已説煩惱斷由見諦修故之已説之言疑難之趣未得其意也問付四諦名言唯名滅諦不名靜等三諦有何故耶進云寶法師所引婆沙論七十九云滅名不共故立諦名文付之滅名既通非常滅何無相濫之義哉是以見今論餘處文釋重無相三摩地不作滅行相云濫非常滅故文如何答見寶法師所引婆沙論一段之文述於四諦各有四行相之中唯以苦集滅道四行相為四諦名不以餘行相為四諦名故四諦相望簡其相濫之時滅名不共不濫餘諦靜名濫定妙離濫道故名滅諦不名靜妙離諦云也故婆沙論云滅名不共故立諦名滅名唯顯究竟滅故靜名濫定妙離濫道故不名為靜妙離諦文文意顯也但於滅名可濫非常滅云難者光法師餘處自問答云問緣擇滅時亦應不作彼滅行相濫無常滅故解云擇滅諦收聖心現證雖作滅行尚無有濫不同非擇滅文準此解釋可會通之次於今論餘處濫非常滅故之文者重無相三摩地緣無學無相三摩地非擇滅為境故於滅靜妙離四行相中不可作妙行相是無記性故不可作證離行相非離繫果故故設成滅靜二行相見之有處説二滅無處説二靜故滅行相有濫靜行相無濫云也義門既別也強非相例歟問道諦可行苦攝耶進云論云道諦非苦文付之道諦是有為法備三世遷流之義何非行苦攝哉是以今論所引契經中云若非常即是苦文如何答此疑之趣即今論道諦亦應是行苦攝有為性故之問意也即論答此問云道諦非苦違逆聖心是行苦相非聖道起違逆聖心由此能引衆苦盡故文此文意云具其性非常違逆聖心二義之法為行苦性故道諦雖為其性非常能引衆苦盡故由闕違逆聖心之義非行苦攝為言故今論云由性非常違聖心故具此二義名行苦判也何況正理論云有餘師言聖道非苦以能違逆是苦相故非聖道起違逆聖心由此能令衆苦盡故有餘師言諸有漏法其性樂住無常通時違其所樂是故生名苦聖道不然故非苦攝去來世法是現種類同現説苦理亦無失文初有説義同今論意第二有説意亦以別故成道諦非苦之旨也加之婆沙論云傷痛逼迫如荷重擔違逆聖心故名為苦文此文亦云違逆聖心之法名苦故道諦既不違逆聖心非行苦攝云事尤分明也但於今論所引契經文者就有為有漏法云苦非常即是苦也問論中述經部宗義云有謂樂受是苦因故諸聖亦觀彼為苦者文爾者薩婆多宗意如何破之耶進云論云又諸聖者生無色緣彼如何有苦想轉非彼諸蘊為苦受因付之見成實論六文云苦樂在身隨所得身乃至四禪文淨影大師大乘義章四述成實論意云苦樂隨身至於四禪文而成實多依經部宗者光法師餘處解釋也知經部宗意色界有苦受云事若爾今此能破豈可符順所破之義哉答見光法師餘處三解釋云若依經部苦樂隨身至四定憂喜隨心至有頂彼宗意説有身即有苦樂有心即有憂喜文任此解釋經部宗意色界有苦受云事尤分明也但於今論能破之文者如此能難能破之習以自義意開彼師義難之破之者立破常事也學者強不可劬勞歟問經部宗意無色界可有樂受耶答不可有樂受也兩方若有樂受者見成實論六文云苦樂在身隨所得身乃至四禪文淨影大師述成實論意云苦樂隨身至於四禪文成實多依經部宗者光法師餘處十八解釋也知經部宗意無色界無樂受云事若依之爾者今論中破經部宗有謂樂受是苦因故諸聖亦觀彼為苦者云義云又諸聖者生色無色緣彼如何有苦想轉非彼諸蘊為苦受因文以能破之文思所破之義無色界有樂受見如何答見光法師餘處三解釋云若依經部苦樂隨身至四定憂喜隨心至有頂彼宗意説有身即有苦樂有心即有憂喜文今論餘處二十八中述經部宗義云由此可説依初五支滅二三四立第二等即由此理初説五支擬漸離前建立後故無漸滅故不説想等文光法師釋此文云由此可説依初五支滅尋伺二立第二定滅尋伺喜三立第三定滅尋伺喜樂四立第四定即由此道理初定説五支擬漸離前支建立後定故無漸滅故所以不説想等為支文任此等定判經部宗意無色界無樂受云事尤分明也但於今論能破之文者無色界無樂受故聖者生無色界雖無緣樂苦想轉既有緣捨苦想轉故此文全非相違也光法師以彼部計苦名苦諦樂捨生苦亦名苦諦故作此徴之解釋即述此意也或亦經部宗意判憂喜隨心至有頂無色界有喜受見而今論一段之文三受門廢立喜樂合説名樂受故無色界有樂受見文就喜受論之得意亦無相違也問論中引有頌云諸佛正遍覺知諸行無常及有為變壞故説受皆苦文爾者苦苦行苦中説何苦耶問經部宗意可許愛心所實有義耶問苦集滅道四諦俱可通世俗勝義耶進云光法師引婆沙論評家義云四諦皆通世俗勝義文付之苦集二諦是世間有漏法也不可通勝義諦滅道二諦是出世無漏法也何通世俗諦哉答苦諦之中有苦非常空非我理集諦之中有因集生緣理故苦集二諦通勝義諦云也故婆沙論云苦諦中有勝義諦者謂苦非常非我理集諦中有勝義諦者謂因集生緣理文滅諦之中有似園林等為安隱處之義道諦之中有似船筏等備運載用之義故滅道二諦通世俗諦云也故婆沙論云滅諦中有世俗諦者佛説滅諦如園如林如彼岸等乃至道諦中有世俗諦者謂佛説道如船筏如石山如梯蹬如臺觀如花如水文故婆沙論評家意云四諦皆有世俗勝義尤有其謂也問光法師所引婆沙論中釋聞惠依地舉三師異説爾者第二師意未至地可有聞惠耶答可有聞惠也兩方若有聞惠者婆沙論四十二中述第二師義云有説在六地謂前五及靜慮中間文論文無諍未至地無聞惠見若依之爾者此師意既許中間禪有聞惠未至地何無聞惠哉答第二師意未至地有聞惠可云也既許中間禪有聞惠未至地例可然哉何況光法師餘處引婆沙論三師異説畢判其正不作二解釋之中第二解云又解若據非我觀等殊勝聞惠唯在五地若據常途起者亦通未至中間若作此解俱容為正文此釋意第二師意未至地可有聞惠見但於婆沙論有説在六地謂前五及靜慮中間之文者此師意散善無近分根本不同故初靜慮聞惠之中攝屬未至地聞惠別不開之中間靜慮自初掙慮根本地勝故彼地聞惠別開之歟第三師意修惠既有近分根本不同故從彼聞惠亦可有近分根本不同存在七地云歟問光法師所引婆沙論中明聞思修三惠加行得離染得生得相舉三師異説爾者初師意聞惠離染得唯限離有頂染位歟答爾也兩方若唯限離有頂染位者離下地縛必得上故者性相之所定也離下地染位何不得上地聞惠哉若依之爾者婆沙論四十二中述初師義云聞思所成惠離染得者離有頂染時得故文如此文者聞惠離染得唯限離有頂染位見如何答婆沙論何師意聖惠離染得唯限離有頂染第九解脫道位也於離染得有其二類一離下地染位得上地功德二離有頂染第九解脫道位得九地中有漏功德也而聞惠是勝品智惠加行修習可得之法故離下地染位不得上地聞惠也由唯初盡修九地有漏德之理故離有頂染第九解脫道位得修下地聞惠也婆沙論聞思所成惠離染得者離有頂染時得故之文即述此意也後二説意雖存此理讓初師説別不述聞思二惠離染得相也問光法師所引婆沙論中明聞思修三惠加行得離染得生得相舉三師異説爾者初師意修惠可通生得耶答可通生得也兩方若通生得者婆沙論四十二中述初師義云此三惠皆通加行得離染得非生得文如此文者修惠不通生得見若依之爾者從上地沒生下地之時可得退分定住分定設雖初師意修惠何不通生得哉答婆沙論百六十三中初靜慮沒生第二靜慮第二靜慮沒生初靜慮者還生時得順退分順住分文故修惠通生得云事更不可疑之但於婆沙論文者初師意云此三惠皆通加行得離染得非生得通三惠論三得相故修惠雖有生得聞思二惠無生得故非亘三惠有生得故從多分云非生得也重難云欲界退還位可得聞思二惠何云聞思二惠無生得哉是以光法師餘處解釋云問界退還時得欲善心唯得生得亦得加行解云唯得生得善又解加行數習者亦得婆沙有此兩説然無評文文依今解釋勘婆沙論處處之文或云百五十九不善心生善得起者謂從色無色界沒生欲界以不善心結生時彼心與欲界生得善四蘊諸得俱起有説彼心亦有與一分聞思所成四蘊諸得俱起文或百八十六述無色界沒生欲界時云善染汚法曾得得者善謂生得善四蘊有説亦得數習聞思所成四蘊此諸善法先由越界地故捨今界地來還故得文此等之文無諍從上二界沒生欲界之時得聞思二惠見如何答婆沙論初師意就聞思二惠不串習之類論之故云聞思二惠無生得歟或一義云婆沙論初師意聞思修三惠非生得善故云此三惠皆通加行得離染得非生得也從上二界沒生欲界之時聞思二惠善串習之類得聞思二惠之義更不可遮之例如他心智是住分定攝故從無色界沒生色界及色界中從上地沒生下地之時雖必得之婆沙論百六中云加行得離染得生得者世俗智通三種餘智通加行離染得不云他心智通生得也問光法師所引婆沙論中明聞思修三惠加行得離染得生得相舉三師異説爾者第二師意聞思修三惠可通離染得耶答可通離染得也兩方若通離染得者婆沙論四十二中述第二師義云有説三惠雖加行得而亦可言生得從上地沒生下地時亦有得故文如此文者聞思修三惠不通離染得見若依之爾者以性相思之設雖第二師意聞思修三惠何不通離染得哉答離有頂染第九解脫道位得聞思修三惠并離下地染位得上地修惠云事性相之所定故第二師意雖存此理讓初師説別不述聞思修三惠離染得相也初師意不云聞思修三惠有生得故初師不云之處許云添云有説三惠雖加行得而亦可言生得從上地沒生下地時亦有得故也重意云常途之習加行得法非生得故今為顯加行得法亦有生得之義故云雖加行得而亦可言生得也實可云亦有離染得也問光法師所引婆沙論中明聞思修三惠加行得離染得生得相舉三師異説爾者第三師意從上地生下地時可得色界聞惠耶答不得之也兩方若得之者聞惠是加行善根也從上地沒生下地之時何可得之哉是以婆沙論中初靜慮沒生第二靜慮第二靜慮沒生初靜慮者還生時不得聞惠見若依之爾者婆沙論中述第二師義云有説三惠雖加行得而亦可言生得從上地沒生下地時亦有得故文如此文者從上地沒生下地之時可得色界聞惠如何答從上地沒生下地之時得聞惠者就串習聞惠論之也而於散心分別串習不串習事唯於欲界論之於上二界不論此義故從上地沒生下地之時全不可得色界聞惠也是以光法師餘處七解釋中明界退還時得欲界善心雖述加行串習者亦得聞思善根之旨未見界退還并地退還時得色界聞惠云釋加之勘婆沙論處處之文雖述從上二界沒生欲界時亦得串習聞思所成四蘊之旨全無從無色界沒生色界時得聞惠之文何況光法師餘處解釋中明色界威儀路四蘊無三世得云又婆沙解色界中云一切有覆無記無覆無記色蘊及威儀路異熟四蘊彼得世不雜剎那不雜隨在彼世即唯有彼世得故準婆沙文於欲界中即別簡威儀工巧極串習者有三世得於色界中即不別簡威儀有三世得明知色界威儀四蘊無三世得文此釋意色界威儀心不論串習不串習見色界聞惠例亦可同準此等定判從上地沒生下地之時不得色界聞惠云事實分明也但於婆沙論文者從無色界沒生色界并色界中從上地沒生下地之時得順退分順住分攝修惠從上二界沒生欲界之時聞思二惠善串習之類得聞思二惠故云從上地沒生下地時得聞思修三惠也非云從上地沒生下地時得色界聞惠何為疑難哉問光法師所引婆沙論中明聞思修三惠加行得離染得生得相舉三師異説爾者第三師意欲界聞惠并思惠可通生得耶答可通生得也兩方若通生得者婆沙論中述第三師義云聞所成惠在欲界者唯加行得乃至思所成惠唯加行得文如此文者欲界聞惠并思惠不通生得見若依之爾者從上二界沒生欲界之時聞思二惠善串習之類可得聞思二惠設雖第三師意欽界聞惠并思惠何不通生得哉答從上二界沒生欲界之時聞思二惠善串習之類可得聞思二惠故設雖第三師意欲界聞惠并思惠可通生得也故勘光法師餘處解釋云問界退還時得欲善心唯得生得亦得加行解云唯得生得善又解加行串習者亦得婆沙有此兩説然無評家文依今解釋勘婆沙論處處之文或百五十九云不善心生善得起者謂從色無色界沒生欲界以不善心結生時彼心與欲界生得善四蘊諸得俱起有説彼心亦有與一分聞思所成四蘊諸得俱起文或百八十六述無色界沒生欲界時云善染汚法曾得得者善謂生得善四蘊有説亦得串習聞思所成四蘊此諸善法先由越界地故捨今界地來還故得文準此等定判從上二界沒生欲界之時聞思二惠善串習之類得聞思二惠云事尤分明也第三師意豈不存此義哉但於婆沙論文者第三師意雖存欲界聞惠并思惠通生得云義讓第二師説別不述其相也雖在欲界加行修習欲界聞惠未生色界不得色界聞惠要生色界方得色界聞惠故色界聞惠名生得事初第二師未述此旨故初第二師不云之處色界聞惠通生得云事許第三師云添也問光法師所引婆沙論中明聞思修三惠加行得集染得生得相舉三師異説爾者第三師意色界聞惠中可有唯加行得非生得類耶答可有此類也兩方若有此類者婆沙論中述第三師義於一色界聞惠施設加行得生得之義見若爾寧可有唯加行得非生得之類哉若依之爾者設雖色界聞惠何無唯加行得非生得之類哉是以欲界聞惠之中可有此類見如何答於婆沙論全文可聊簡之即婆沙論第三師意述色界聞惠加行得生得相云可言是加行得者謂在欲界加行修習聞所成惠觀察諸法自相共相極純熱者從欲界沒生色界時乃可得故可言是生得者雖在欲界加行修習聞所成惠觀察諸法自相共相若未生彼猶未能得生色界方得彼故文此文意云先在欲界加行修習欲界聞惠畢後生色界乃得色界聞惠名色界聞惠加行得雖在欲界加行修習欲界聞惠未生色界不得色界聞惠要生色界方得色界聞惠名色界聞惠生得故於一色界聞惠有被云加行得彼云生得之義邊故色界聞惠通加行得生得為言此類之外亦在欲界不加行修習欲界聞惠之者生色界位不得色界聞惠後時加行得色界聞惠之類何不許之哉若許之者色界聞惠之中可有唯加行得非生得之類也重難云婆沙論第三師意於一色界聞惠施設加行得生得之義者色界聞惠之中何可有唯加行得非生得之類哉故婆沙抄中釋此師義云一惠兩望加功修得故名加行得生彼得故名為生得文此釋意色界聞惠之中無唯加行得非生得之類見如何答色界有情一衆同分之中必可起聞惠也若有不起聞惠之類者光法師餘處或色界生得善不能生定心云釋意色界有情已離自地染位何心無間可入定哉爰知先於欲界不加行修習欲界聞惠生色界位不得色界聞惠之類後時必加行可起色界聞惠也但於婆沙抄釋者暫出一類相也更不可過論文聊簡歟問色界有情一衆同分中必可起聞惠耶答必可起之也兩方若必起之者色界有情種類非一準一衆同分中何必起聞惠哉是以婆沙論中初靜慮沒生第二靜慮第二意沒生初靜慮者往沒時所捨法中不舉聞惠若色界有情一衆同分中必起聞惠者初靜慮沒生第二靜慮之時必可捨聞惠哉若依之爾者色界既有聞惠彼界有情一衆同分中必可起聞惠哉答色界有情一衆同分中必可起聞惠也色界之中既有聞惠有何障礙不起之哉何況色界生得善生不生定心事光法師異釋也第七卷疏作二解釋之中第二釋云色界生得善不能入定文第二十七卷疏唯作一釋云或色界生得善不能生定心文存此釋意之時若有色界有情一衆同分中不起聞惠之類者彼人已離自地染位何心無間可入定哉爰知色界有情一衆同分中必可起聞惠云事但於婆沙論文者初靜慮沒生第二靜慮沒生初靜慮者往沒時雖必捨聞惠略暫不舉之歟問光法師所引婆沙論中明聞思修三惠加行得離染得生得相舉三師異説爾者第三師意聞思二惠可通離染得耶答可通離染得也兩方若通離染得者婆沙論四十二中述第三師義云聞所成惠在欲界者唯加行得在色界者可言是加行得可言是生得乃至思所成惠唯加行得文如此文者聞思二惠不通離染得見若依之爾者離有頂染第九解脫道位得聞思二惠者性相之所定也設雖第三師意聞思何不通離染得哉答離有頂染第九解脫道位得聞思二惠云事性相之所定故第三師意雖存此理讓初師説別不述聞思二惠離染得相也就離下地染得上地功德離染得論之故雖述修惠通離染得不云聞思二惠通離染得也問聞思二惠現在前時可有未來修耶答無未來修也兩方若未來修者聞思二惠是散善勢力微劣也何可有未來修哉若依之爾者婆沙論四十二中云有餘師説聞思二惠串習勝者現在前時亦修未來自類善法文此文無諍聞思二惠現在前時可有未來修見如何答聞思二惠是散善勢力微劣故無未來修云事性相之所定也更不可疑之故見婆沙論處處之文或四十二云聞思二惠不依定生勢力下劣現在前時唯修自類即習修故説名為修不修未來自類文或百八十八云此中聞思剎那現前時以習修故名修非修未來以勢力劣故即以此故唯修自不修他文光法師餘處二十六解釋中云問聞思二惠能修未來不解云不能修故婆沙一百八十八云引此文為其證準此等定判聞思二惠現在前時無未來修云事尤分明也但於婆沙論亦修未來自類善法之文者聞思二惠串習勝者聞思二惠現在前時聞思二惠法前得起成彼名修為言非如由現起未曾得修慧力始得未來未曾得善法名修故次下文云彼説成就非如前説也重意云修慧有未來修者由現起未曾得道力始得未來未曾得善法之義也是其常未來修相也而今云亦修未來自類善法者聞思二惠串習勝者聞思二惠現在前時由串習勝力未來自類聞思二惠法前得起云修未來自類善法也是更非由現起聞思二惠力強彼未來自類聞思二惠法前得起偏是聞思二惠串習勝故未來自類聞思二惠法前得起也彼前説意不云聞思二惠串習勝故未來自類聞思二惠法前得起故云彼説成就非如前説也尋云聞思二惠串習勝者未來自類聞思二惠法前得起者曾得未來聞思二惠法前得歟為當未曾得未來聞思二惠法前得歟答無始生死聞思二惠串習勝故未來自類聞思二惠法前得起者多分是可曾得未來聞思二惠法前得也自亦未曾得未來聞思二惠法前得起事更不可遮之歟問四聖種中前三聖種唯限有漏歟進云光法師所引婆沙論中云界者皆墮三界及不墮界通無漏見付之無漏觀門不緣衣服等前三聖種何通無漏哉答泰法師所引婆沙論中述四聖種諸門分別云地者有漏在十一地無漏在九地乃至智者皆八智或十智乃至欲界繫等者皆三界繫及不繫緣亦爾乃至學等者皆通三種緣三種見所斷等者皆修所斷及不斷緣三種文任婆沙論一段之文前三聖種通無漏云事實分明也但於無漏觀門不緣衣服等云難者光法師所引正理論中會此疑云由彼增上所生聖道彼所引故從彼為名故言聖種皆通無漏不作是言緣衣服等所有喜足皆通無漏少欲無漏準此應釋謂彼增上所生聖道彼所引故從彼為名非聖道生緣衣服境文此文意云雖非聖道生緣衣服等境由於衣服等生喜足心引聖道生故聖道果上立緣衣服等因名前三聖種通無漏云也故寶法師引此文畢云述曰名聖道為喜足等者以喜足等所引生故上界具四應準此釋文問以生得善心所發無表可為聖種體耶答不可為聖種體也兩方若為聖種體者婆沙論中生得善非聖種體見知彼善心所發無表非聖種體云事若依之爾者見婆沙論文述別解脫律義為聖種體雖簡表無簡無表若爾生得善心所發無表不為聖種體哉答正理論中云或聞思修所成諸善皆是聖種解脫依故唯以聞思修所成諸善為聖種體泰法師所引婆沙論中述評家義云若生得善亦是聖種者蟻卵蚊蛾等亦成就聖種耶是故聖種不攝生得善簡生得善非聖種體準此等論文思之生得善心所發無表亦可非聖種體也但於婆沙論中述聖種體簡表不簡無表云難者表一向非聖種體故簡之無表之中生得善心所發無表雖非聖種體加行善心所發無表為聖種體故聖種體中不簡無表尤有其謂全非論義歟問四聖種中得前三聖種時必可得第四聖種耶答必可得之也兩方若必得之者行者意樂是萬差也得前三聖種之時何必得第四聖種哉若依之爾者得第四聖種之時必得前三聖種見相例可同如何答見婆沙論百八十一文云要具四種方名住聖種者然得一聖種時必具得四如無礙解得一必具四文任此文得前三聖種之時必可得第四聖種也問不淨觀可觀大海耶答可觀大海也兩方若觀大海者見今論文云廣至海復略不觀大海見若依之爾者觀廣緣欲界一切色處何不觀大海哉答光法師所引正理論中云此不淨觀力能遍緣欲界所攝一切色處文泰法師所引婆沙論四十中説不淨觀相云此緣欲界一切色處文準此等論文不淨觀廣緣欲界一切色處之時何不觀大海哉但於廣至海復略之論文者云為通治四貪且辨觀骨鎖廣至海復略於不淨觀之中修骨鎖觀之時不觀大海云也非謂修餘青瘀等觀之時不觀大海全非相違也尋云修骨鎖觀之時何不觀大海哉答大海之德不留死尸故修骨鎖觀之時不觀大海也故演義鈔一上中釋大海十德引十地經云二不宿死尸文問不淨觀於外色處可有別緣義耶答可有別緣之義也兩方若有此義者婆沙論百六十七中云不淨想是初修總觀與初二解脫相似故攝勝處是後起別觀故不相攝文若不淨觀於外色處有別緣之義者何不攝前四勝處哉若依之爾者光法師解釋中云頌中所説據觀初成成重觀時亦容觀廣故無有失文既許作意已熟位觀至海際知於外色處有別緣之義云事如何答今論中云除足至頚半名為已熟修繫心在眉間名超作意位不淨觀於內色處有別緣之義見設雖外色處何可必總緣哉即如疑難之中被出光法師頌中所説據觀初成成重觀時亦容觀廣故無有失之解釋不淨觀作意已熟位於內外色處可有總別緣之義見但於婆沙論文者以初修總觀名不淨想故不淨想不攝前四勝處云也不淨觀不限初修總觀故後起重觀位於外色處亦有別緣之義也不知不淨想不淨觀有其差異何以不淨想是初修想觀之文押定不淨觀為難哉重難云不淨想者其體可廣何唯限初修總觀哉是以婆沙論百六十六中説不淨想云乃至最後觀髑髏骨捨髑髏骨繫念眉間文如此文者不淨想有繫念眉間之義見豈非許別緣之義哉答不淨想緣內外色處之中於內色處有別緣之義故婆沙論不淨想有繫念眉間之義云文全非相違於外色處唯有總緣不別緣故婆沙論中述不淨想是初修總觀不攝前四勝處云也重意云以初習業已熟修超作意初返一重觀門名不淨想故於內色處雖有別緣之義於外色處亦總緣也不淨想不攝前四勝處即此意也不淨觀兼取後起重觀位故於外色處亦有別緣之義也問光法師解釋中明起不淨觀依身引婆沙論二師異説爾者今論意同何師説耶進云光法師釋云俱舍同婆沙後師若據初起或同婆沙前師文付之若據初起或同婆沙前師之釋不可然見今論文偈頌云緣欲色界人生長行述唯人趣生三洲除北尚非餘趣況餘界生起不淨觀依身唯限人三洲見定知今論意可同婆沙論有説初後皆唯人趣六欲天中無青瘀等不淨想故都不現起云後師説光法師何釋或同婆沙前師哉是以寶法師釋此事云此論同後師文如何答光法師俱舍同婆沙後師之釋意即如疑難之趣也但於若據初起或同婆沙前師之釋者料簡此釋雖有異義暫存一義云今論唯人趣生三洲除北之文就初起論之後起通六欲天得意者同婆沙論前師説為言重難云光法師釋起持息念依身云俱舍同前師述今論意同婆沙論唯依欲界非色無色界云前師説之旨更無作異釋若如此義者今論依欲身起唯人天趣除北俱盧之文就初起論之後起通色界然初起時必依欲界云後師説云釋哉答若依若據初起或同婆沙前師之釋意者亦可作今論意起持息念依身同婆沙論後師説云釋也然而略暫不作此釋歟或一義云若據初起或同婆沙前師者若論初起一分者同婆沙論前師説之義邊可有也為言就此義重難答準前義勢亦可思之問不淨觀唯緣現在境故寶法師如何釋之耶進云寶法師釋云勝解作意唯於現境假想緣故不緣過未文付之設雖勝解作意功德何唯緣現在境哉是以婆沙論中述後二遍處俱緣三世後二遍處雖唯勝解觀門緣三世境見如何答勝解作意功德之中緣可見色法之類唯緣現在境也而不淨觀既唯勝解觀門緣可見色法故唯緣現在境不緣過未境為言但於婆沙論後二遍處俱緣三世之文者後二遍處雖唯勝解觀門緣無色四蘊故廣緣三世境也尋云有何故勝解觀門之中緣可見色法之類唯緣現在境緣非色四蘊之類廣緣三世境哉答緣可見色法作勝解觀門尤易故勝解觀門之中淺近之類緣可見色法故唯緣現在境緣非色四蘊作勝解觀門甚難故勝解觀門之中深細之類非色四蘊故廣緣三世境也問正理論意不淨觀可通真實作意耶答不通也兩方若通真實作意者今論中説不淨觀云此唯勝解作意攝故文正理論意亦可同哉若依之爾者正理論中云此不淨觀總有二種一依自實二依勝解依自實者謂由作意相應惠力如實觀察自內身支所有不淨若形若顯差別諸色文如此文者不淨觀可通真實作意見如之見正理論餘處八十文説前三解脫云觀未成滿但得名為勝解作意後成滿時離染果故引聖道故亦得名為真實作意文不淨觀可同如何答正理論意不淨觀唯限勝解觀門也不淨觀者設非不淨法由勝解觀門作不淨行相廣緣欲界一切色處故諸論一同之説不淨觀不通真實作意云也故見婆沙論處處十一八十二之文舉勝解作意之中出不淨觀今論餘處七中舉勝觀作意云謂不淨觀及四無量有色解脫勝處如是等觀相應作意文光法師釋此文云不淨無量勝處遍處唯是假想解脫之中通其假實言有色解脫標前三解脫唯假想故無色解脫通於假實故言有色文正理論二十文亦同婆沙俱舍兩論之説舉勝解作意之中出不淨觀如彼論意不淨觀唯限勝解觀門不通真實作意云事何況見正理論文云此不淨觀既是勝解作意所攝文不淨觀不通真實作意云事此文亦分明也但於正理論一依自實等之文者不淨觀不必觀不淨法作不淨行相由勝解觀門廣緣欲界一切色處作不淨行相之時緣內身中三十六物等不淨法作不淨行相之邊能緣行相符所緣法體一分如實觀察境故云一依自實等也非謂不淨觀實通真實作意歟次於正理論餘處説前三解脫之文者前三解脫至成滿位實亦雖唯勝解觀門由離染果故引聖道故之義邊地體是唯勝解觀門之上傍亦暫名真實作意也非謂云爾故實通真實作意也去嘉祿三年閏三月之候於當寺慈恩院被行俱舍三十講之時宗性初按之此論義對聖禪法師疑之其時講答雖存或云唯限勝解觀門或云兼通真實作意之二義唯限勝解觀門云義聊叶愚意所存之間暫記彼一義之趣以省其繁重之煩矣問除後有異生所餘異生所起不淨觀可通未曾得耶答可有一義也兩方若通未曾得者光法師所引婆沙論四十中説不淨觀曾得未曾得相云聖者菩薩後有異生通曾得未曾得餘異生唯曾得文寶法師所引正理論五十九中述此事云此中一切聖最後有異生皆通未曾餘唯曾得文任此等論文不通未曾得見若依之爾者除後有異生所餘異生類非一準彼所起不淨觀何不通未曾得哉是以婆沙論百六十三中異生依未至定等起不淨觀時有未來修見既依未至定等起不淨觀何云後有異生哉亦述有未來修知未曾得不淨觀云事如何答見婆沙論處處之文或八十一述四無量曾得未曾得相云一切聖者及住後有異生皆通二種諸餘異生唯是曾得有作是説一切聖者及住內法異生皆通二種外法異生唯是曾得文或百釋宿住隨念智曾得未曾得相云一切聖者及內法異生皆通曾得未曾得外法異生唯是曾得有作是説最後有異生及諸聖者通曾得未曾得諸餘異生唯是曾得文以此等文思之云諸功德曾得未曾得相婆沙論中總可有二師異説也一説意云一切聖者及後有異生皆通曾得及未曾得所餘異生唯是曾得一説意云一切聖者及內法異生皆通曾得及未曾得外法異生唯是曾得也而婆沙正理兩論之中述不淨觀曾得未曾得相唯舉聖者菩薩後有異生通曾得未曾得餘異生唯曾得云一師説唯不載一切聖者及內法異生皆通曾得及未曾得外法異生唯是曾得云一師説委悉論之亦可出此師義也即見婆沙論處處文述八解脫八十四八勝處八十五十遍所八十五地心智九十九曾得未曾得相唯舉一切聖者及內法異生皆通曾得及未曾得外法異生唯是曾得云一切師説不載一切聖者及後有異生皆通曾得及未曾得所餘異生唯是曾得云一師説明五通曾得未曾得相百四十一唯舉若諸聖者及後有異生通得曾習未曾習餘唯得曾習云一師説不載一切聖者及內法異生皆通曾得及未曾得外法異生唯是曾得云一師説是皆省繁影略互顯委悉論之盡理云之處處之中同可舉此二師異説也述不淨觀曾得未曾得相唯舉一師説準彼等之文可思之也其中料簡聖者菩薩後有異生通曾得未曾得餘異生唯曾得云師意雖有異義暫存一義云此師意除後有異生所餘異生劣故所起不淨觀實唯限曾得不通未曾得云也故寶法師引婆沙論今文畢云菩薩異生與聖人同自餘異生唯曾得也文但依此義意會婆沙論異生依未至定等起不淨觀時有未來修云文者後有異生一座成覺之前依未至定等可起未曾得不淨故全非相違也或一義云此師意除後有異生所餘異生所起不淨觀實可通未曾得也婆沙論百六十三中出未得非初靜慮世俗智現在前而修淨初靜慮非無漏之類云即異生已離欲染依未至定起三無量初二解説前四勝處不淨觀持息念念住三義觀時乃至即異生依靜慮中間起三無量初二解脫前四勝處不淨觀持息念念住三義觀時文後有異生唯依第四靜慮可起不淨觀故今云異生依未至定等起不淨觀定可非後有異生而既云未得非初靜慮世俗智現在前修淨初靜慮非曾得不淨觀云事亦勿論也但於婆沙正理兩論之文者除後有異生所餘異生所起不淨觀中實雖有未曾得之類先已曾得同品類種類不勝品故曾得之中類攝之也翻光法師餘處二十六得勝曾得故亦名未曾得之釋思之不勝品未曾得法亦名曾得之義邊可有也問離自地染位可得自地不淨觀耶答可得之也兩方若得之者離染得者名離下地縛必得上故之義離自地染位何可得自地不淨觀哉是以婆沙論四十文述不淨觀離染得相之時未云有此義哉若依之爾者婆沙論八十一中釋四無量離染得相云或離自地上地染時修得無量文不淨觀例可同如何答見今論餘處二十六文云為離此言通二四道離染之言廣亘加行無間解脫勝進四道故若就離自地染無間道九解脫道位云之者不可得自地不淨觀彼九無間道九解脫道位輒不得修非同對治之法故不得修不淨觀也故婆沙論百六十三中出未得無漏初靜慮現在前而不修淨初靜慮之類云聖者依初靜慮離初靜慮乃至無所有處染九無間道九解脫道時及離非想非非想處染九無間道八解脫道時文光法師餘處二十六引此文畢云婆沙既言依初定離初定染不修初定淨明知有無漏依此地不修此地有漏又準此文依初定起無漏解脫道中不修當地有漏他心智前言修者據無漏他心智説文任此等定判離自地染九無問道九解脫道位不修自地有漏功德云事尤分明也若就離自地染加行道勝進位云之者可得自地不淨觀彼加行道勝進道位亦可得修非同對治之法故可得修不淨觀也婆沙論或離自地上地染時修得無量之文是其例證也何況見婆沙論處處之文或九十九説他心智離染得相云或離自地上地染時亦容修得文或百述宿住隨念智離染得相云或離自地上地染時亦容修得文此等之文亦為例證是皆就加行道勝進道位論之可得意也但於婆沙論中明不淨觀離染得相之時未出此義云難者婆沙論中明不淨觀離染得相云離染得者謂離染時而修得故文言頗不委悉是則就常途離染相唯舉離下地染位得上上地不淨觀也例如婆沙論中明八解脫八十四八勝處八十五七遍處八十五離染得相唯舉離下地染位得上地解脫勝處遍處不出離自地染位等也重難云婆沙論百四十一中述五通加行得離染得相云又隨離染解脫道時位所修得者皆離染得若於餘時而修得者皆加行得文如此文者前八解脫道位於五通可有離染得之義見又云若於餘時而修得者皆加行得除解脫道之外餘加行道等位得之是加行得非離染得見答問不淨觀可與聖道相生耶答可相生也兩方若相生者不淨觀是假想觀門勢力微劣也何可與聖道相生哉若依之爾者光法師餘處所引婆沙論中舉雜修靜慮所雜修功德出無量解脫勝處若無量解脫勝處與聖道相生者不淨觀例可同哉答無量解脫勝處等無間生無漏定無漏定無間生無量解脫勝處等云事出婆沙論處處之文例彼思之不淨觀與聖道相生亦必然也何況見今論餘處七文云如是三種作意無間聖道現前聖道無間亦能具起三種作意若作是説便順此言不淨觀俱行修念等覺分文光法師釋此文云此中俱聲顯無間義前後俱也此文且證勝解作意能入聖道文寶法師釋此文云不淨觀是勝解作意而與無漏覺支前後俱行是相續義準此故知勝解作意能入聖道文泰法師釋此文云以不淨觀是勝解作意能入聖道前後俱也文不淨觀無間生聖道云事此等定判既分明也聖道無間生不淨觀云事例亦可知加之見雜心論文云此不淨觀復有四種謂退分住分勝分決定分文如此文者既許不淨觀通順決定擇分順決擇分攝不淨觀與聖道相生道理亦炳然也故不淨觀雖唯假想觀門勢力微劣與聖道相生云事更有何疑哉問不淨觀可攝初二解脫耶答不攝之也兩方若攝之者不淨觀廣依十地初二解脫唯依初靜慮依地既別也何可攝之哉答不淨觀總對治欲界貪初二解脫別對治欲界初靜慮中眼識所引顯色貪不淨觀廣緣欲界內外一切色處初脫多分緣欲界外色處不淨觀廣依四靜慮及四近分中間欲界十地初二解脫唯依初二靜慮并彼近分中及中間禪五地故不淨觀初二解脫同雖作不淨行相所依地等既相替故互不相攝之也問斷初靜慮煩惱九無間道位修第二靜慮近分地攝不淨觀義可有耶答斷初靜慮煩惱九無間道位輒不修非同對治之道故不可修第二靜慮近分地攝不淨觀也故婆沙論六十四中云即諸聖者離初靜慮染時九無間道中修十九行相謂麁等三及唯無漏十六聖行相不修不淨觀定但於婆沙論離初靜慮染九無間道位得第二靜慮近分六意近行云文者彼位未來所修心品之中可有作自相行相緣欲界法之類故得香味位近行云也都無麁等乃至不淨觀等一類功德緣欲界法之類故婆沙論處處之文全非相違次於婆沙論離欲界染九無間道位修未至地攝不淨觀云文者此有作是説意也此師意述離欲界染九無間道位修麁等三慈悲喜捨不淨觀持息念及有漏無漏十六行相二十五行相離初靜慮染九無間道位修麁等三及唯無漏十六行相十九行相之所以云初靜慮近分有種種善根故能修此類種種行相上地近分諸善根少故不能修種種行相復次欲界煩惱有種種相還修種種善根對治上地煩惱無種種相故彼不修種種善根對治上地煩惱無種種相故彼不修種種對治文論文先遮此例難末學更不可劬勞哉重難云婆沙論百九十四中離欲界乃至第三靜慮染九解脫道位修不淨想見彼前八解脫道位修不淨想者九無間道位何不修之哉答此亦婆沙論一師説也故婆沙論中出修不淨觀想不思惟不淨想之句云若以滅道智離欲界乃至第三靜慮染若以身愛心念住及緣餘法法念住為加行彼一切加行道最後解脫道時有説一切解脫道時文今此有説何必正義哉設依此師義會今例難九無間道正斷或道故不修不淨想等非同對治之道前八解脫道是容預位故兼修不淨想等非同對治之道也或一義云婆沙論百三十九中云離初靜慮染前八無間解脫道時各得第二靜慮近分六第九無間道時得第二靜慮及彼近分十二之文當上卷六十四離欲染時九無間道中修麁等三慈悲喜捨不淨觀持息念及有漏無漏十六行相二十五行相云有作是説意也此師意離初靜慮染九無間道位實修慈悲喜捨不淨觀持息念等云也但至下問答文者非同治修而得修之為言不遮非同治修兼修慈悲喜捨不淨觀持息念等之義也問今論意依身在色界可起持息念耶進云今論疏中不起之見付之初起設雖限欲界依身後起何不通色界依身哉依之今論中述等流非下緣入出息非下地心所緣見知依身在色界起持息念云事何況正理論中云此念初依欲界身起唯人天趣除此俱盧後起可通色界依身見如何答見今論文偈頌云緣風依欲身長行述依欲身起唯人天趣除北俱盧依身在色界不起持息念見即案其道理起持息念專由教力色界之中無教力故不起之也故今論中述外道不起持息念故云外道無有無説者故文離教力不起持息念之旨此文尤分明也故後起猶不通色界依身也但於等流非下緣之文者只述入出息唯自上地心所緣非下地心所緣之旨非論持息念觀門之相全非相違次於正理論文者俱舍正理兩論之意自本各別也齊不可為歎故光法師引婆沙論所依者唯依欲界非色無色界有餘師説依欲色界非無色界然初起時必依欲界之文畢云俱舍同前師正理同後師文泰法師引婆沙論今文畢云俱舍同初師正理同後師文問衆賢論師意持息念可通離染得耶答可通離染得也兩方若通離染得者正理論中破今論云唯加行得非離染得未離染者定由加行現在前故非離染得地所攝故已説皆是近分地攝非根本故又此念唯是勝加行引故不應説此有離染得文如此文者持息念不通離染得見若依之爾者顯宗論中無改二得實外無之頌知衆賢論師意持息念通離染得云事如何答於離染得有其二類一離下地染之時得上地功德二盡智初念得九地中有漏功德也若依盡智初念離染得云之者三乘聖者盡智初念修九地中有漏功德者性相之所定諸論同所許故衆賢論師意持息念可通離染得顯宗論中不改二得實外無之頌即存此意也若依離下地染之時得上地功德離染得論之者持息念是勝品微細之觀門唯內道起之功德專由勝加行可得之故離下地染之時無得上地持息念正理論中云唯加行得非離染得即述此旨也即正理論中未離染者定由加行現在前故非離染得地所攝故者云欲界持息念唯加行得已説皆是近分地攝非根本故者明下三靜慮近分地攝持息念唯加行得又此念唯是勝加行引故者述中間禪持息念唯加行得不應説此有離染得者總結五地持息念唯加行得也重意云持息念是由勝加行可得之法今論中混云通離染得及加行得不述由勝加行可得之旨故正理論中破之云唯加行得非離染得也非遮盡智初念修持息念故通離染得之義邊故偈頌結二得實外無長行述唯加行得非離染得全非相違也重難云中間禪既離染地攝也離欲界染之時何不得彼持息念哉答根本地攝功德不必離染得持息念專由勝加行可得之故離欲界染之時不得中間禪持息念也是則正理論意異俱舍論意也或一義云泰法師引正理論文畢云解云如前滅盡定中云佛無一德非離染得又中間定是離染得地所攝俱舍據佛及中間故通離染得正理據二乘異生欲界三近分故唯加行得文任此會通之釋思之正理論文唯就欲界下三靜慮近分地攝持息念云唯加行得非離染得中間禪持息念可通離染得也云云問今論意持息念可通勝解觀門耶答可有二意也兩方若通勝解觀門者見今論文或云唯與真實作意相應或破餘師意出極遠乃至風輪或吠嵐婆云此不應理此念真實作意俱故文任此等論文持息念不通勝解觀門見若依之爾者婆沙論中舉勝解作意功德出持息念正理論中云有説亦通勝解作意文今論意可同之哉答見光法師處處解釋當卷釋唯與真實作意相應之論文引合正理論此唯真實作意相應有説亦通勝解作意之文作二解釋云此論同正理前師雜心婆沙同正理後説此即意各別也又解前師唯據根本故唯真實後師亦據加行故通勝解云云餘處七釋三勝解作意謂不淨觀及四無量有色解脫勝處遍處如是等觀相應作意之論文儲一箇問答云問婆沙勝解作意中亦説持息念此論何故不説又此論下文説持息念是真實作意故下論云有餘師説息出極遠乃至風輪或吠嵐婆此不應理此念真實作意俱故論既不同如何會釋解云持息念有二種一假相謂加行二真實謂根本此論據根本婆沙據加行各據一義並不相違又解論意各別此論加行根本皆是真實婆沙及此論餘師加行通假根本是實文若依當卷初釋餘處第二釋意者今論意持息念加行根本同唯與真實作意相應可云也即可異婆沙論并正理論有説意也若依當卷第二釋餘處初釋意者今論意持息念加行通勝解觀門根本唯與真實作意相應可云也即今論云唯與真實作意相應據根本論之婆沙論并正理論後説云通勝解作意據加行論之故不相違會也重難云就光法師當卷第二釋餘處初釋有疑今論餘師云息出極遠乃至風輪或吠嵐婆就持息念加行論之此師意云根本唯與真實作意相應也以何知之者正理論中述此師意云彼言息念根本雖與真實作意俱中間有餘勝解作意相應起者為令真實作意速成故於中間起斯假想雖爾無有出息念失以息念加行意樂不歇故文光法師餘處解釋中云婆沙及此論餘師加行通假根本是實文任此等定判今論餘師意持息念加行通勝解觀門根本唯與真實作意相應云事尤分明也若爾與正義有何所替破此師義哉答依光法師和會釋意者今論餘師意持息念根本亦通勝解觀門云故今論破之可得意也但於正理論文者故今論能破之時入自義救之非餘師即云持息念根本唯與真實作意相應也例如雜心師意述善心中得六雖舉欲界無覆無記心不説正見續善正理論師述雜心師救入自義云理亦應得欲界善心謂以正見續諸善本雖加欲界善除無覆心經主不應難令得七也次於光法師餘處解釋者彼述論意各別釋意故全非難也問雜心論意持息念可通勝解觀門耶進云光法師解釋中彼論意持息念通勝解觀門見付之廣勘雜心論一部始末不見持息念通勝解觀門云文解釋之所定依憑在何所哉答廣披諸師解釋尋雜心論持息念勝解真實之相光法師引正理論此唯真實作意相應有説亦通勝解作意之文畢云此論同正理前師雜心婆沙同正理後説同此即意各別也文寶法師引正理論今文畢云正理後説同婆沙雜心前説同此論文泰法師引正理論今文畢云雜心婆沙同後師説文任此等解釋雜心論意同婆沙論并正理論後説意持息念加行通勝解觀門根本唯與真實作意相應可云也但於雜心論中不見持息念通勝解觀門之文云難者實披彼論一部前後雖未勘分明之證據是既諸師一同之定判也定有依憑之本説歟仰而可信何強疑之哉就中見雜心論文云彼修行者於出入息作一想觀身如竹筒觀息如穿珠出入息不動於身不發身識是名安般念成文此文意持息念通勝解觀門見諸師解釋若依此文歟重難云今論意雖述持息念唯與真實作意相應之旨明六種相中止相云觀息住身如珠中縷文若爾以觀身如竹筒觀息如穿珠之文難為持息念通勝解觀門之證歟答去建保七年正月九日當寺別當法印權大僧都定範於東南院被行俱舍問題講之時被出此題講師宗性法師問者貞實法師問答之其時先達之中義海得業云見法勝阿毗曇心論三文上述阿那波那念相云始於身一分行者係自心深縛於識足為殺智慧怨不置真實之言下明四念處相云此方便於身真實相決定諸受及自心法亦隨順觀始安真實之詞以之思之持息念是勝解觀門四念處是真實作意見若爾雜心論中雖無分別之證據雜心之本論此旨既見故諸師依雜心論意持息念通勝解作意釋歟例如雜心論中雖明十二心法勝阿毗曇心論中唯説十一心故正理論師述雜心師救云然學無學同無漏故總説一心言六無失也問婆沙論意持息念可通真實作意耶答可通也兩方若通真實作意者見婆沙論處處十一八十二之文舉勝解作意功德出持息念知不通真實作意云事何況廣勘婆沙論一部始末不見持息念通真實作意之文哉若依之爾者持息念加行設雖作勝解觀門根本成位何不與真實作意相應哉答婆沙論意持息念可通真實作意也故見光法師處處解釋當卷引正理論此唯真實作意相應有説亦通勝解作意之文畢云此論同正理前師雜心婆沙同正理後説此即意各別也文餘處儲一箇問答云問婆沙勝解作意中亦説持息念此論何故不説下此論下文説持息念是真實作意故下論云有餘師説息出極遠乃至風輪或吠嵐婆此不應理此念真實作意俱故論既不同如何會釋解云持息念有二一假相謂加行二相真實謂根本此論據根本婆沙據加行各據一義並不相違又解論意各別此論加行根本皆是真實婆沙及此論餘師加行通假根本是實文加之寶法師引正理論文畢云正理後説同婆沙雜心前説同此論文泰法師引正理論文畢云雜心婆沙同後師説文任此等解釋婆沙論意同正理論後説意持息念加行通勝解觀門根本唯與真實作意相應可云也但於婆沙論中舉勝解作意功德出持息念云難者取持息念加行之中與勝解作意相應之類勝解作意功德之中出之也非遮與真實作意相應之義邊何為相違哉光法師餘處釋婆沙論中舉勝解作意功德但云解脫不云有色云解云婆沙言解脫者是解脫中假想解説不言解脫皆是假想文準此解釋可思之也次於婆沙論中不見持息念通真實作意之文云難者此事雖未勘分明之證據見彼論一處文釋契經説持息念通四念住之文云以持息念增益法想是空觀本由此速能引四念住是故偏説若不淨觀增有情想如説此骨為女為男障礙空觀不能速疾引四念住是故不説文此文既述持息念是空觀本異不淨觀之旨故可與真實作意相應見歟問持息念可緣非相續法耶答可緣非相續法也兩方若緣非相續法者見婆沙論文云唯緣自相續文如此文者不緣非相續法見若依之爾者今論中云隨所至方念恆隨逐婆沙論中述乃至廣説隨根勢力息去近遠心皆隨逐持息念緣離身之息見若爾離身之息豈非非相續法哉答若依以非情屬非相續法之意者持息念可緣非相續法也寶法師釋息有情數攝有情身分故之論文云準此出身非出入息非有情故文任今解釋離身之息可非情攝見而今論云若念息出離身為至一磔一尋隨所至方念恆隨逐婆沙論述心復隨息從內出外半麻一麻半麥一麥半指節一指節半指一指半𭢠手一𭢠手半肘半尋一尋乃至廣説隨根勢力息去近遠心皆隨逐持息念緣離身之息見故持息念緣非相續法可云也但於婆沙論唯緣自相續之文者見婆沙論處處之文多分以無為法名非相續法見若爾持息念不緣他相續及無為法故云唯緣自相續歟身內有情數息為緣所起離身之息刻體見之雖非常情法既以身內有情數息為緣起故暫屬自相續法歟例彼不淨觀云此緣欲界一切色處故雖可緣非情數色婆沙論述不淨觀所緣云緣自他相續文婆沙抄中釋婆沙論無漏空三摩地及無願三摩地唯緣自他相續之文云亦攝非情杓唯虛空等非相續故文此等定判皆以非情法屬自他相續之意也婆沙論持息念唯緣自相續云文準彼可思之也問欲界所繫入出息離欲界染第九無間道位悉滅歟進云泰法師所引婆沙論中有滅不滅二類見付之同是欲界所繫入出息也彼第九無間道位何可有滅不滅不同哉是以第三靜慮所繫入出息離第三靜慮染第九無間道位全無滅不滅不同見例可同哉如何答婆沙論評家意云應作是説此入出息隨身地繫是身分故定入出息是隨身地繫法故離欲界染第九無間道位欲界所繫入出息不可滅也但於進文者欲界所繫入出息隨欲界心轉者滅隨初靜慮心轉者不滅云也故婆沙論中述入出息隨身地繫云師意會施設足論云欲界入出息離欲界染時最後無間道滅之文云欲界入出息有隨欲界心轉有隨初靜慮心轉隨欲界心轉者爾時滅道隨初靜慮心轉者爾時現在前文就此論判會例難者依第四靜慮近分地離第三靜慮染第九無間道位入出息不轉故無滅不滅不同云也重難云以自下地無漏離第三靜慮染第九無間道位入出息可轉何無滅不滅不同哉答以自下地無漏離第三靜慮染第九無間道位入出息現在前不可滅故亦無滅不滅不同也問論文云謂要身中有諸孔隙入出息也心正現前文爾者寶法師意有緣幾耶進云寶法師釋云述具二緣息方轉也文付之今文意具入出息所依身風道通毛孔開入出息地麁心現前之四緣入出息轉之旨述也何釋具二緣哉是以光法師釋此文云要具四緣息方得轉文如何答由具四緣入出息轉云事出婆沙正理兩論之説故婆沙論云謂入出息由四事轉一有息所依身二風道通三毛孔開四入出麁地麁心現前必具此四入出息轉文正理論云言四緣者一入出息所依身二毛孔開三風道通四入出息地麁心現前於此四中隨有所闕息便不轉文準此兩論説思今論文意謂要身中者舉入出息所依身有諸孔隙者出風道通毛孔開之二緣入出息地心正現前者即是入出息地麁心現前也設雖寶法師意何不存此旨哉但於述具二緣息方轉也之釋者見今論文偈頌云依二差別轉長行述此入出息轉依身心差別畢云謂要身中有諸孔隙入出息地心正現前息於爾時方得轉故文任文之起盡思之謂要身中有諸孔隙者顯依身差別轉之相入出息地心正現前者述依心差別轉之旨見故寶法師就其大綱云述具二緣息方轉也也委悉細論之時依其身差別轉之中有風道通毛孔開之二緣自本非所遮故寶法師解釋全無相違也問下三靜慮無漏心現前位入出息可轉耶答入出息可轉也兩方若入出息轉者無漏心是寂靜微細也設雖下三靜慮無漏心現在前位何入出息可轉哉何況見婆沙正理等論説述入出息轉之義云麁心現前文知無漏心現前位入出息不轉云事若依之爾者論疏中述入出息不轉之義未舉下三靜慮無漏心現前位哉答設雖有漏心設雖無漏心下三靜慮心現在前位可為入出息地麁心現前之類故下三靜慮無漏心現前位入出息可轉也但於無漏心寂靜微細故下三靜慮無漏心現前位入出息不可轉云難者有漏無漏相對之時實雖有漏心麁淺無漏心寂靜上地下地相望之日下三靜慮未離八災患第四靜慮已離八災患故第四靜慮有漏心現前位入出息不轉下三靜慮無漏心現前位入出息可轉也重難云光法師所引正理論中云若入世俗第四靜慮身無毛孔其理可然以彼定能引彼地攝微密大種充滿身故有漏戒多具七支無表能造大種充滿身中故毛孔不開入出息不轉見而婆沙論中述有漏戒多少舉評家義云如是説者無漏戒多所以者何且苦法智忍隨轉戒尚多有漏有無量功德對治彼故況復更有上界位餘戒文若爾下三靜慮無漏心現前位無漏戒多具七支無表能造大種多自第四靜慮有漏戒能造大種充滿身中毛孔不可開何入出息可轉哉答下三靜慮無漏心現前位無漏戒多具七支無表能造大種充滿身中更非所諍故寶法師餘處解釋中云隨定勝劣皆遍身故文然而彼下三靜慮無漏戒能造大種非微密故毛孔猶開入出息可轉也問光法師意於羯刺藍等四位息轉四緣中闕幾緣耶進云光法師釋云於此四位雖有一事麁心現前闕餘三事文付之設雖今此位何唯具一緣哉是以圓暉法師解釋中云若羯刺藍頞部曇閉尸鍵南四位唯有麁心及息地闕餘二緣文如何答婆沙論中問答此事云問何故羯刺藍位息不轉耶答彼稀薄故若息轉者彼應流動問何故頞部曇閉尸鍵南諸根未滿未熟位息不轉耶答彼身爾時風道未通毛孔未開若息轉者身應散壞然在卵㲉及母胎中從羯刺藍乃至諸根未滿未熟爾時未有息所依身風道未通毛孔未開唯有息地麁心現前雖有一事而闕三事故息不轉文於羯刺藍等四位唯有麁心現前一事闕餘三事云事此文實分明也故光法師云於此四位雖有一事麁心現前闕餘三事云事此文實分明也故光法師云於此四位雖有一事麁心現前闕餘三事息皆不轉故婆沙云引今文為其證也加之泰法師引婆沙論今文畢云解云既言從羯刺藍乃至鍵南諸根未滿未熟爾時未有息所依身風道未通毛孔未開雖有一事而闕三事故息不轉文寶法師引正理論處卵胎中羯刺藍等毛孔未開風道未通故息不轉若處卵胎羯刺藍位入出息轉則應躁動身微薄故便應散壞之文畢云此中應説無出入息所依身也文此等定判亦於羯刺藍等四位唯有麁心現前一時闕餘三事見若爾光法師今解釋既順婆沙正理二論之文亦同神泰法寶兩師之釋末學仰而可信何強疑之哉但於圓暉法師解釋者彼立息轉四緣之時云息所依地不云息所依身故於羯刺藍等四位有息所依地緣云也問一剎那定心隨轉戒為唯限一具七支為當有多具七支歟答此事雖有學者異義暫可存有多具七支云義也兩方若唯限一具七支者光法師所引正理論中釋入第四靜慮身無毛孔開云以彼等持極淳厚故引第四定大種遍身文若唯限一具七支者於彼能造大種寧可有遍身之義哉若依之爾者見今論餘處十三文述隨轉七支一具大種所造云所依大種如心唯一無差別故文所依大種如定心唯一者何可有多具七支耶答依當處餘處之定判任上古中古之常義暫可存一剎那定心有多具七支云義也其故見光法師所引正理論文云何緣但入第四靜慮身無毛孔非餘定耶以彼等持極淳厚故引第四定大種遍身即由此緣尊者世友説入彼定心身毛孔合畢問若入世俗第四靜慮身無毛孔其理可然以彼定能引彼地攝微密大種充滿身故若入無漏第四定時此身如何亦無毛孔以彼但引隨所生地大種現前造無表故此問意入有漏第四靜慮之時第四靜慮大種遍身云事既分明也云以彼定能引彼地攝微密大種充滿身故故也入無漏第四靜慮之時云以彼但引隨所生地大種現前造無表故故上所述大種遍身者定心隨轉無表能造大種云事又炳然也答此問云彼無漏定所引大種雖生處攝而極微密與彼相似故無有過文此文意雖無漏無表能造隨所生地大種微密遍身云事亦明鏡也若一剎那定心隨轉戒唯限一具七支者豈可有多具能造大種遍身之義哉爰知一剎那定心隨轉戒有多具七支故多具大種各各別造云事是以泰法師引此文畢云以此文證故知造無漏戒四大隨身大小遍滿身中一具四大造七支戒隨大多少各各別造地大不因地大造諸色故道戒既爾定戒亦然文光法師雖引此文釋更不破之明知此釋叶論文故即依用之云事加之見寶法師餘處十三解釋問身在下地起上定時用下地身中上地大造上地多色其四大種為在何處此問意既許身在下地起上地定之時用上地大種造上地多色無諍一剎那定共戒有多具七支見若唯限一具七支者豈可云造上地多色哉答此問引婆沙論一百三十四文云然根本靜慮現在前時色界大種遍身內起若近分定現在前時色界大種唯心邊起有説近分定現在前時色界大種亦遍身起然長養身不如根本如有二人俱詣池浴一在池側掬水浴身一入池中沒身而洗二人用水雖俱遍身然長養身入池者勝文此文云色界大種遍身內起定可定共戒能造大種不可云依身等欲界長養大種既云色界大種故也又不可云空界色能造大種若空界色能造大種者依根本近分豈可有遍身不遍身不同哉何況今此問答就定共戒能造大種釋有漏自地依之義也更不可云餘色能造大種哉準此等定判一剎那定心隨轉戒有多具七支云事實分明也但於今論餘處所依大種如心唯一無差別故之文者於一具七支能造大種定散相對釋一具多具不同之時定心隨轉戒七支無表一具大種所造之旨述也就各別七支論之時更非遮各別大種所造之義也重難云定心既一也隨轉戒何可有多具七支哉一剎那定心隨轉戒有多具七支云事道理甚難思哉是一次一剎那定心隨轉戒有多具七支多具大種各各別造云事不可然見正理論餘處三十五文云定生無表七支相望展轉力生同一果故唯從一具四大種生散此相違故依異大文此文意為俱有因七支一具大種造之不為俱有因七支各別大種造之見而一剎那定心隨轉戒設雖有多具七支定可為俱有因何非一具大種所造哉雖為俱有因多具大種所造者定生無表七支相望展轉力生同一具故唯從一具四大種生之定判豈非唐捐哉是二次準寶法師豈得隨彼大種戒少戒多之釋其義難思入第四靜慮欲界依身三洲六欲天大小不同也於六欲天依身相容大種於三洲依身如何可相容哉定知三洲六欲天相容大種可有多少不同若能造大種有多少不同者所造七支隨可有多少不同若爾豈不背由時果善等之理哉是三次若云一剎那定心隨轉無表能造大種遍身中者寧不違寶法師雖長養大遍一身中何必皆能造無表色之釋哉是四次婆沙論中述具有因相云地不觀地生所造色以一切法不觀自性及同類體為他因故自類他類相望論俱有因見而一剎那定心隨轉戒有多具七支者以一不殺生戒望餘不殺生戒可為俱有因歟若許為俱有因者豈不背以一切法不觀自性及同類體為他因故之理哉是五次婆沙論中釋發智論以無問道證預流果時現在未來修八聖道支云文云此則止正語業命不俱者意無貪嗔癡無表各有七種俱時起故文婆沙抄中釋此文云論無貪嗔癡所發無表各有七種俱時起故前業蘊中同第二師即第三為正文準此文一剎那定心隨轉戒唯有無貪嗔癡所生三具七支見若爾隨可有三具能造大種何云多具大種遍身中哉是六答一剎那定心隨轉戒有多具七支云事非無其道理定心雖是一微細寂靜防非止惡之德甚多故有多具七支也故婆沙論中明有漏無漏戒多少出評家義云如是説者無漏戒多所以者何且苦法智忍隨轉戒尚多有漏有無量功德對治彼故況復更有上位餘戒文是則同雖定心隨轉戒無漏防非止惡之德殊勝故隨轉七支其數甚多無漏戒尚多有漏戒即此意也次於正理論餘處定生無表七支相望展轉力生同一果故等之文者就一具七支定散無表相對能造大種一具多具不同之由釋也定心隨轉多具七支雖為俱有因多具七支其類別故非一具大種所造也例如光法師餘處第一釋意別解脫戒初後念一支雖一具大種所造於七支者其類別故各別大種所造也何況若執七支相望展轉力生等之文為具有因七支必一具大種所造不為俱有因七支必各別大種所造云者別解脫戒初後念一支既非俱有因光法師一釋意如何可定一具大種所造哉以之思之七支相望展轉力故生等之文就一具七支定散無表相對能造大種一具多具不同之由釋許也以此文為定量一切為俱有因七支必一具大種所造一切不為俱有因七支必各別大種所造不可定事也次於寶法師豈得隨彼大種戒少戒多之釋者就泰法師以此文證故知造無漏戒四大隨身大小遍滿身中一具四大造七支戒隨大多少各各別造之釋一往致此難破也以實義論之者泰法師釋意寶法師釋意不可云隨依身大小定心隨轉七支并彼能造大種有多少不同也由時果善等者性相之所定故也但實事雖可然其義猶難思暫存一義云婆沙論中述色界大種來入欲界依身云欲界大種麁色界大種細細入麁隙如油入沙文準此文思之三洲六欲天依身雖大小不同定心隨轉戒能造大種遍身中事更不可有多少不同也其故三洲依身雖小極虛麁也六欲天依身雖大稍微細也故色界細大種來入三洲依身之時三洲依身雖小虛麁故麁隙多彼大種相容身中來入六欲天依身之時六欲天依身雖大微細故麁隙少彼大種遍在身中也設雖下三靜慮依身入第四靜慮之時彼第四靜慮隨轉戒能造大種必可遍身中若不遍身中者豈無毛孔開哉以是思之欲界依身雖小虛麁隙多第四靜慮定心隨轉戒能造衆多大種相容身中下三靜慮依身雖大甚細故麁隙少第四靜慮定心隨轉戒能造衆多大種遍在身中也若爾以三洲六欲天依身大小不同何始可為痛哉次於寶法師雖長養大遍一身中何必皆能造無表色之釋者泰法師任正理論文作隨大多少各各別造之釋故寶法師意實雖許此釋兼為顯起第四靜慮定心之時彼地空界色能造長養大種來入身中之義暫致此能破也次於婆沙論地不觀地生所造色等之文者以地大種望地大種之時自體同類更不借力故自體并如此不相由之同類法一切皆不為俱有因故云以一切法不觀自性及同類體為他因故也然而設雖同類法互令相由有同一果之義者何不為俱有因哉是以光法師餘處一釋意心王上大生等與大地法十心所上大生等為俱有因文此豈非同類法為俱有因哉準之思之一剎那定心隨轉戒有多具七支之中以一不剎生戒望餘不殺生戒為俱有因云事更不背文理也次於婆沙論無貪嗔癡無表各有七種俱時起故之文者於一剎那定心隨轉戒總而論之雖有無貪嗔癡所生三類七支別細云之無貪嗔癡所生三類七之中各有衆多七支故一剎那定心隨轉戒有多具七支云事全不違此文也重難云泰法師造無漏戒四大隨身大小遍滿身中一具四大造七支戒隨大多少各各別造之釋意無諍隨依身大小定心隨轉戒能造大種實有多少不同是依之寶法師引此釋畢破豈得隨彼大種戒少戒多也泰法師意若不許隨依身大小定心隨轉戒能造大種有多少不同者寶法師何可破之哉是一次寶法師雖長養大遍一身中何必皆能造無表色之釋意不許定心隨轉戒能造大種遍身之義見何云寶法師意實許此義哉是二答隨依身大小定心隨轉戒能造大種不可有多少不同云事道理實必然故泰法師意可存此旨也但於隨大多少各各別造之釋者彼隨轉戒七支與能造大種必一具一具各別能造所造定之旨釋成也文意隨彼能造大種之數所造七支各各別造為言更非釋隨依身大小彼隨轉戒能造大種有多少不同也寶法師意雖許此義就隨大多少各各別造之言暫破豈得隨彼大種戒少戒多也次定心隨轉戒能造大種遍身云事正理論一段之文甚分明故泰法師承之釋隨身大小遍滿身中既叶實義寶法師意何不許之哉何況寶法師餘處引婆沙論然根本靜慮現在前時色界大種遍身內起若近分定現在前時色界大種唯心邊起有説近分定現在前時色界大種亦遍身起然長養身不如根本如有二人俱詣池浴一在池側掬水浴身一入池中沒身而洗二人用水雖俱偏身然長養身入池者勝之文畢云後解為勝隨定勝劣皆遍身故文定心隨轉戒能造大種遍身云事今解釋亦分明也但於雖長養大遍一身中何必皆能造無表色之釋者正理論中引第四定大種遍身等文述定心隨轉戒能造大種遍身之旨故泰法師釋雖無其過總而論之依身在下地起第四靜慮定心之時彼地空界色能造長養大種來入身中故論文之外亦顯此義也問光法師意依身在第四靜慮約息轉四緣闕具作二解釋爾者第二釋意如何釋之耶進云光法師釋云又解生第四靜慮定有二闕二文付之見婆沙論文云有説生彼雖有風界而無前説四種事故不名為息文此文無諍依身在第四靜慮息轉四緣俱闕見若爾光法師今解釋豈不違婆沙論文哉答光法師第二釋意專任道理必然依正理論文成之也所謂依身在第四靜慮之人既有口鼻故可有風道通能依下地威儀通果二無記心故可有入出息地麁心現前得意也何況正理論中云若生彼地身無毛孔如何生彼能發語言雖述身無毛孔不遮有風道通是亦其證據也故第二釋具文云言有二者一風道通既有口鼻能發語言明知有風道通又正理六十云若生彼地身無毛孔如何生彼能發語言非發語言要由毛孔但由頷動亦得發聲如機關聲豈由毛孔準彼論文不遮風道通二入出息地麁心現前以能起下威儀通果言關二者一非入出息所依身彼息不轉心微細故二毛孔不開縱起散心毛孔亦閉身密合故文但於婆沙論文者光法師即會之云婆沙有説無四事者非是正義文問光法師意第二靜慮以上可有起威儀心耶答不可有起威儀心也兩方若有起威儀心者第二靜慮以上無起表心何可有起威儀心哉是以光法師解釋中引泰法師釋云若生二定以上起初定威儀心發上地威儀業文此釋無諍第二靜慮以上不可有起威儀心見若依之爾者婆沙論百十五中述阿羅漢入涅槃心第二靜慮以上可有威儀心見若許有威儀心者何無起威儀心哉答生二定以上起初定威儀心發上地威儀業云事不限光法師所引泰法師解釋亦出諸師定判所謂寶法師解釋云借下識起上地威儀通果但緣所發業事及所化事等不緣上地息風也文光法師餘處解釋云如起異地通果心及生二定已下起下初定威儀意識文此等解釋意第二靜慮以上不可有起威儀心云事亦分明也何況光法師餘處解釋中釋行住坐臥名威儀以長短等表色為性以身表業為威儀體故起身表心即起威儀心故第二靜慮以上不可有起威儀心云事道理實炳然也故光法師餘處三解釋中云若據起威儀工巧心六識之中唯意識四受之中唯喜捨不通苦樂以苦樂受不能發業如前釋文若第二靜慮以上有起威儀心者何不起威儀心與第三靜慮樂根相應哉既述起威儀心不通苦樂之所以云以苦樂受不能發業起身表心即起威儀心云事此釋又明鏡也而見今論餘處二十八文云上生三地起三識身及發表心皆初定繫生上起下如起化心故能見聞觸及發表此四唯是無覆無記不起下染已離染故不起下業善以下劣故第二靜慮以上無起表心者性相之所定也若無起表心者不可有起威儀云事亦勿論也但於婆沙論第二靜慮已上有威儀心云文者就似威儀心論之也不云有起威儀心者何為相違哉問婆沙論文明持息念十七種觀中覺心行者緣想思心所歟答不緣想思心所也兩方若緣想思心所者泰法師解釋中引古師依婆沙論覺心行者法念住觀緣想思故云義破之知覺心行者不緣想思心所云事若依之爾者心行之稱專名想思覺心行者可緣想思心所也是以見婆沙論文云覺心行者觀想及思文如何答正理論六十中舉持息念十七種觀畢云此十七中初是總觀後十六種是差別觀約四念住如次應知各有四門成十六種文而其十六種觀之中覺喜覺樂覺心行止心行之四種是受念住觀故覺心行者可緣受心所也但於心行之稱專名想思云難者正理論中問答此事云如何覺心行可受念住攝因受果名故無有過非此中説心行謂思應知此中受名心行謂由耽著樂受味故便於彼彼境界或生思造作心名為心行受是思因故名心行無失或但能覺受自體者義準亦於思等自體次第能覺生住壞相如嘗大海一渧水鹹則亦遍知大海水味故唯覺受名覺心行文緣受心所名覺心行之旨此文實委悉也故泰法師引今文畢云解云自古論師皆言依毗婆沙覺心行除心行是法念住觀以緣總思故者謬也今依正理論釋四念住各有四故成十六想思亦是受念住觀如前會釋文次於婆沙論覺心行者觀想及思之文者想是受果故於因上立果名緣受心所云觀想及思也準正理論會通之旨可思之也去嘉祿三年閏三月之候於當寺慈恩院被行俱舍三十講之時宗性初按立此論義對聖禪法師疑之其時講答之趣大概如此思出往事記録之畢大乘義章十六有釋可見之寫本云正嘉元年十一月二十七日申時於東大寺尊勝院護摩堂南面抄之畢去九夏三伏之天蕤賓林鐘之候初企此卷抄出其功過半之處俄被召承明門院御前僧之間此勤中絶畢而玄冬雪降金池氷結之今冷手振右筆不輒然而被催其志其深憖記此卷問答畢聊有所存之旨併奉資春日大明神法樂焉願依學佛教之微功願答敬神明之誠心一期終焉之暮必遂往生於兜率之秋雲三會説法之曉速開覺悟於龍華之春風而已右筆華嚴宗末葉法印權大僧都宗性年齡五十六夏臘四十四
