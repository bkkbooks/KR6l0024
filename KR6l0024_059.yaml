body:
  text: 俱舍論第十九卷抄下問聖者未斷不起隨煩惱唯限不善惡作歟答唯限不善惡作也兩方若唯限不善惡作者隨煩惱種類非一準聖者未斷不起之類何唯限不善惡作哉彼惱是見取等流諂是諸見等流也聖者更不可起之何況光法師餘處二十一引正理論五十四明諂誑相云傳聞此唯異生所起非諸聖者亦可現行文任此等文理聖者未斷不起隨煩惱不可限不善惡作哉若依之爾者今論中明聖者未斷不起相云慢類等我慢惡作中不善聖者而不起見疑所增故隨煩惱中唯舉不善惡作如何答今論中明聖者未斷不起相云此慢類等我慢惡悔是見及疑親所增長雖修所斷而由見疑皆已折故聖不能起文正理論四十七云此慢類等我慢惡悔聖雖未斷而定不行又此見疑親所增故見疑已斷故不復行文顯宗論二十五説全亦同之任此等論説聖者未斷不起隨煩惱唯限不善惡作云事炳然也何況顯宗論二十五云不善惡作是疑所增故聖身中雖有未斷而由皆析皆定不行餘非見疑親所增故聖既成就容可現行文不善惡作之外餘隨煩惱非見疑所增故聖者可現起之旨此文又分明也但於惱是見取等流諂是諸見等流也聖者更不可起之云難者行相相似故雖説惱是見取等流諂是諸見等流異不善惡作疑親所增長之義邊故聖位猶可現起惱諂等隨煩惱也次於光法師餘處所引正理論文者正勘正理論一段之文釋初定有諂誑問寧知梵世有諂誑耶答此問云以大梵王匿己情事現相誑惑馬勝苾芻傳聞此唯異生所起非諸聖者亦可現行文此文意初定諂誑專是大梵王所起故云異生所起也非遮聖者起欲界諂誑故全非相違也問聖者可起邪慢耶答可起邪慢也兩方若起邪慢者邪慢者邪見所增也聖者更不可起之是以婆沙論四十三中述增上慢邪慢差別云增上慢異生聖者俱起邪慢唯異生起文如此文者聖者不起邪慢見若依之爾者今論中出聖者未斷不起之類云慢類等我慢惡作中不善無舉邪慢明知聖者可起之云事如何答明聖者未斷不起之類不舉邪慢事不限今論説正理顯宗兩論同之何況光法師釋謂有修所斷而聖定不行之論文云於七慢中或有修所斷於未斷位聖容現行謂除慢類及與我慢所餘諸慢於此慢中或有修所斷於未斷位而聖定不行謂慢類我慢述聖位容現行之慢慢類我慢之外云所餘諸慢其中定可攝邪慢出聖位不現行之慢云謂慢類我慢無舉邪慢聖者起邪慢云事此釋尤分明也但於邪慢者邪見所增也聖者更不可起之云難者見今論文云於無德中謂己有德名為邪慢全不云邪見所增聖者何不起之哉次於婆沙論邪慢唯異生起之文者此顯增上慢邪慢差異一往定判也更非盡理之談歟何況見次上復次義云增上慢內外道俱起邪慢唯外道起文彼身見戒禁取及疑為唯見所斷忍善根位猶現起之邪慢通修所斷內法異生寧不起之哉以此道理案之邪慢唯外道起者無諍是一往定判也準知邪慢唯異生起之文亦可一往定判也若就實通論之時聖者亦起邪慢可云也加之以例思之婆沙論八十四中明八解脫曾得未曾得相云想受滅解脫唯未曾得餘七解脫通曾得未曾得謂諸聖者及內法異生皆通曾得及未曾得外法異生唯是曾得雖述外法異生得前七解脫之旨述第二第三解脫差異一復次意云謂第二解脫通依內外道相續淨解脫唯依內道相續外法異生不起淨解脫見是亦一往定判也如此潤色處處非一歟問異生位可有未斷不起類耶答可有二義也兩方若有未斷不起類者今論疏中於聖位雖舉未斷不起之類異生位無出此類明知異生位無未斷不起之類云事若依之爾者順上分結異生位無起之豈非未斷不起之類哉答此事雖未習學且異生位無未斷不起之類可云也勘諸論説未舉此類故也但於順上分結異生位無起之可為未斷不起之類云難者未斷不起者一類法而乍成就其名體不能現起之義也如云慢類等我慢惡作中不善聖有而不起見疑所增故等也而異生位雖成就色無色二貪掉舉慢無明體無立順上分結名故婆沙論四十九中釋順上分結中掉舉云或有是結即聖所起者或有非法即異生起者文正理論五十四中述此事云於少是結謂聖者於少非結謂異生文顯宗論説全亦同之任此等論文異生位不立順上分結名故以順上分結不可為未斷不起之類也何況未斷不起者乍成就其法名體彼法見疑等所增故聖身中不現起之義也而婆沙論四十六中云於聖者中唯不還者所起諸結立順上分順上分結不還果聖者勝身中現起法故異生微劣身中不起之也旁思之異未斷不起之義歟問忍善根位可起五見疑煩惱耶答可起身見戒禁取疑煩惱也兩方若起之者忍善根是見道近加行也何可起五見疑煩惱哉依之見發智論文明忍善根位云見疑不行文若依之爾者見惑非擇滅者增上忍位得之下中二忍位寧不起五見疑煩惱哉是以婆沙論中忍善根位可見疑煩惱現前見如何答忍善根位有執我計淨之義故五見中可起身見戒禁取二見也不執斷常故不可起邊見不計劣為勝故不可起見取故婆沙論四十三中明忍善根位所起煩惱云此中見者謂有身見及戒禁取疑者謂疑文評家歎此義云評曰應作是説彼亦執我是故此中初説為善雖暫執我不執斷常故雖暫計淨不執為勝故文忍善根位作有耶無耶計故雖起疑煩惱不撥無四聖諦理故不起邪見也故婆沙論中述忍善根位不起邪見云得忍不撥四諦理故文但於見惑非擇滅者增上忍位得之云難者增上忍位總雖得見惑非擇滅其中得忍善根之後不執斷常不計劣為勝不撥無四聖諦理故下中忍位先立不起邊見見取邪見也重難云發智論中明忍善根相云見疑不行忍善根位五見及疑俱不現起見婆沙論中釋此文何舉忍善根位所現起身見戒禁取及疑煩惱哉答見發智論文云彼由此忍作意持故或由中間不作意故見疑不行設行不覺忍善根位容現起見疑煩惱由忍善根作意持力暫不現起云見疑不行故婆沙論中釋此文舉忍善根位所現起煩惱云此中見者謂有身見及戒禁取疑者謂疑能順發智論文也婆沙論一處中云如是三結近見道者數現行故如雜蘊説忍作意持見疑不行談行不覺煩惱微細覺慧劣故見謂有身見及戒禁取疑即見疑其意亦同之問現在五見各一念中除相應俱有法遍緣五部一切法類可有耶答可有有無二類也兩方若有此類者五部諸法種類無邊也設雖共相緣惑何可頓緣五部一切法哉是以今論中述遍緣五部義云不説頓緣自界地一切然説有力能頓緣五部婆沙論十九文問一剎那隨眠不能遍緣一切亦無遍隨增理何故名遍行耶答依彼種類相續而説故無有過任此等定判不可有此類云事分明也若依之爾者見光法師餘處二十解釋云現緣共惑雖亦有具二種遍行有不具者以不定故不言遍行文雖亦有具二種遍行之言可有遍緣之類見加之婆沙論五十八中上標述迷共相諸結云過去未來未斷定繫彼三世一切事現在不定文現在不定云言豈非許遍緣之類哉答就現在五見中身見邊見邪見一念中除相應俱有法遍緣五部一切法之類可有之見取戒禁取不可有此類也即見婆沙論處處之文或十八云有身見等一剎那中總於一界一趣生等或執為我或執我所或復乃至愚暗無知故是共相文或百三十四云第四靜慮其量無邊由此若依第四靜慮起有身見極難除斷以執無邊地為我故文準此等文思之於身見中有遍緣五部一切法之類云事炳然也任邊見必由身見起故之理邊見亦有此類之旨不可異求之加之正理論四十八中云若起邪見謂所修行妙行惡行皆空無果此亦非唯緣自身業總撥一切業生果能於邪見中亦有遍緣五部一切法之類云事分明也何況一方難中被舉光法師餘處二十雖亦有具二種遍行之釋婆沙論云迷共相諸結現在不定之文現在共相緣惑中有遍緣五部一切法之類見豈非指身見邊見邪見但於今論不説頓緣自界地一切之文者此就見取戒禁取論之故如此云也故見今論次上文云若頓緣者誰復普於欲界諸法頓計為勝能得清淨或世間因就見取戒禁取致問難也故光法師釋此文云若頓緣者誰復普於欲界一切諸有漏法頓計為勝起於見取能得清淨涅槃或世間生大因起戒禁取文既就見取戒禁取致問難故答不説頓緣自界地一切尤有其謂也故光法師釋此文云不説頓緣自界地中一切有漏法皆為最勝能得清淨或世間因然説有力能頓緣五部各少分法名為遍行文次於婆沙論依彼種類相續而説之文者理實而言身見邊見邪見中雖有遍緣五部一切法之類彼種類中亦非無緣一部二部等之類故就彼闕遍緣五部義之類云不能遍緣一切答彼種類相續而説也重難云於身見中有遍緣五部一切法之類云事先不可然凡於身見作我我所行相而一念中既無緣一切法為我我所何有遍緣五部一切法之義哉是一是以見婆沙論文或問薩迦耶見唯有漏緣非無漏緣自界地緣非他界地自界地中亦非一切一時而緣何故言彼一切等隨觀是我耶答此一切言是少分一切非一切一切故無有失或八云有作是説無有俱時總緣五蘊執為我者文或八云若執內蘊為我彼執外蘊為我所若執外蘊為我彼執內蘊為我所故亦無失文任此等文於身見中無有一時頓緣五部一切法義見是二何況正理論中釋遍行隨眠名云以於五部無礙轉故立遍行名非頓隨眠諸有漏故文如此文者遍行隨眠中無一念頃總緣五部一切法類見若有此類者寧可云非頓隨眠諸有漏故哉是三次證據所備之諸文皆非決定誠證婆沙論有身見等一剎那中總於一界一趣生等之文雖述一剎那中總緣一界等之旨未云遍緣五部一切法何為證據哉次婆沙論以執無邊地為我故之文是第四靜慮量無邊際之義也唯光法師餘處十一今準後文前文初師説初定如四洲者為正之釋此師既非正義見豈可為證據哉次正理論總撥一切業生果能之文只顯遍緣五部之義計也不足為證據哉答於身見中一剎那頃除相應俱有法遍緣五部一切法之類可有也所謂惑一念我見現前除自體相應俱有法遍緣五部一切法為我次念起我所見以彼我見自體相應俱有法為我所時於前念我見可遍緣五部一切法也或我見現前以後念我所見自體相應俱有法為我次念起我所見除自體相應俱有法遍緣五部一切法為我所時於後念我所見可遍緣五部一切法也故於身見雖作我我所行相一剎那中除相應俱有法遍緣五部一切法之義可有也如此料簡之時婆沙論若執內蘊為我彼執外蘊為我所等之文全非相違也次於婆沙論自界地中亦非一切一時而緣等之問答者彼就二十句薩迦耶見五蘊別緣論之也次於婆沙論無有俱時總緣五蘊執為我者之文者於身見中有總緣義云事婆沙論處處之文既分明故明知不總緣五蘊云有説非正義可云也次於正理論非頓隨眠諸有漏故之文者顯不遍緣之義邊許也更非遮遍緣五部一切法之義歟但婆沙論有身見等一剎那中總於一界一趣生等之文正理論此亦非唯緣自身業總撥一切業生果能之釋既述總緣一切法之旨豈非遍緣五部一切法之義哉次婆沙論以執無邊地為我故之文實雖第四靜慮量無邊際之義光法師以此師説為不正義事第四靜慮量無邊際云處也以身見總緣之義邊全非云不正義也有人云婆沙論以共相諸結云現在不定之文非光法師餘處現緣共惑雖亦有具二種遍行之釋證據婆沙論一段文中於迷自相諸結云現在亦不定故也問遍行隨眠中可有唯緣一部類耶答可有唯緣一部類也兩方若有唯緣一部類者遍行隨眠者具遍緣五部之義何可有唯緣一部之類哉是以今論中云然説有力能頓緣五部文若依之爾者識身足論七八九中可有此類見如何答遍行隨眠者必具遍緣五部之義也故見今論文或云唯見苦集所斷見疑及彼相應不共無明力能遍行自界地五部故此十一皆得遍行名文或云遍行隨眠普於自地五部諸法所緣隨增以能遍緣自地法故文正理論四十八四十九文顯宗論二十五二十六説其言雖替其意是同婆沙論云若法一剎那頃現在前時能緣五部為五部因令五部法於所緣愚名為遍行文任此等諸論説遍行隨眠專雖遍緣五部法其中自亦可有唯緣一部之類也故識身足論中出欲界繫有覆無記心所緣未斷其體已斷句云若見圓滿世尊弟子未離欲界貪諸欲界繫有覆無記心緣修所斷文別緣二部三部四部之義亦可有之識身足論前後之文其旨分明也問修所斷隨眠可緣上界耶答不緣上界也兩方若緣上界者以性相思之修所斷隨眠不可緣上界若依之爾者婆沙論九十一中出眼根斷道緣識為所緣相應二縛隨眠云謂三界遍行及修所斷隨眠文若欲界修所斷隨眠不緣上界者於眼根斷道緣識如何可為相應縛哉答見今論文云見苦集所斷諸見疑相應及不共無明遍行自界地於中除二見餘九能上緣九上緣惑者唯限見苦集所斷故修所斷隨眠不緣上界云事炳然也但於婆沙論謂三界遍行及修所斷隨眠之文者欲界不可有眼根斷道故欲界修所斷隨眠於眼根斷道緣識不可為相應縛婆沙論文實為難會然而婆沙抄五六十中會此文引二義云是故光法師抄云欲界中有欲界眼根伏斷道也又有解云及修所斷者唯説色無色界若遍行惑通三界有若作是説於義無妨而失論上下體倒勘問文任此二義可會婆沙論文歟重難云先就婆沙抄所引光法師釋不可然見婆沙論九十二文云不成就眼根斷道者若異生在欲界九結所繫三縛所縛十隨眠增六垢所染十纒所纒若聖者在見修道諸結所繫乃至諸纒所纒如未離欲染在見修道諸聖者説文若欲界有眼根斷道者未離欲染者豈不成就眼根斷道哉答眼根有伏斷道有實斷道若就伏斷道論之者欲界可有眼根斷道也勘婆沙論九十二文云不成就樂根斷道者應言在第三靜慮未起加行道文以伏斷道名斷道事此文尤足為其潤色歟但於未離欲界染者不成就眼根斷道云文者此以一地全斷道門也婆沙論中自本有二門可思之就婆沙抄所引有解之義亦可問答委細之旨第三卷抄記録之畢可引見之問九上緣惑可為遍行因耶答可為遍行因也兩方若不為遍行因者九上緣或既遍行隨眠也何不為遍行因哉是以論文述於中除二見餘九能上緣十一遍行隨眠中除身邊二見以餘九種名九上緣惑尤可為遍行因也若依之爾者識身足論四中於過去不善眼識所有隨眠為因非所隨增等四句分別之時出不為因非所隨增俱非句云若所餘緣若他隨眠若不同界遍行隨眠文光法師餘處六釋若不同界遍行隨眠謂自地九上緣隨眠如此釋者九上緣惑不為遍行因見如何答九上緣惑既遍行隨眠也豈不為遍行因哉是以婆沙論十九中遍行隨眠對遍行因作四句時出遍行隨眠非遍行因句謂未來遍行隨眠舉遍行隨眠亦遍行因句云謂過去現在遍行隨眠文今論之文其意同之明知過去現在九上緣惑為遍行因也加之婆沙論十九中出遍行因體一切過去現在遍行隨眠及彼相應俱有諸法文一切之言寧可除九上緣惑哉但於識身足論文者上古難義也學者會通雖非一準且存一義云識身足論中所有隨眠者所增隨眠云事也以所增隨眠云所有事有漏諸法必有隨眠增故也於彼漏隨增故説名有漏者即此意也今此四句分別於過去不善眼識就所隨增隨眠論之為言而九上緣惑於過去不善眼識無隨增義故不可云所有隨眠故前三句中不可出之第四句其義廣故舉非隨增隨眠也例如婆沙論九十一中於眼根斷道等緣識及緣緣識所增隨眠為所緣縛非相應縛等四句分別之時第四句中出非所增隨眠等也但九上緣惑與過去不善眼識雖為遍行因俱非句中出之事今此前三句就所隨增隨眠論之故所隨增隨眠為因此四句中可云為因而九上緣惑與過去不善眼識非所隨增隨眠故雖為遍行因此四句中不可為因句攝之故第四句中舉之尤有其謂也重難云披光法師餘處六定判解識身足論一段文或云於中心前不緣設緣已斷及相應隨眠已斷是非所隨增第一句攝若心前緣及相應不斷是所隨增第三句攝自餘隨眠皆不為因或云若餘心後同類遍行不緣及緣已斷此等已攝同類遍行因盡畢下舉不同界遍行隨眠明知不同界遍行隨眠不為遍行因云事是一次所有隨眠者所隨增隨眠云事不可然所有隨眠者諸隨眠云事也如今論餘處云由能緣彼自相續中所有諸惑究竟斷故也何云所有者所隨增義哉是二次前三句就過去不善眼識所隨增隨眠論之云事亦難思第一句能為因非所隨增云句也寧云前三句就過去不善眼識所隨增隨眠論之哉是三次見識身足論文上述於過去不善眼識所有隨眠為因非所隨增等四句畢云如眼識耳鼻舌身意識亦爾文如此文者於過去不善意識所有隨眠為因非所隨增等四句分別之時第四句中可云若所餘緣若他隨眠若不同界遍行隨眠歟若爾不同界遍行隨眠於過去不善意識豈無相應隨增哉是四次勘同論五文於過去欲界繫見苦所斷心所有隨眠為因非所隨增四句分別之時出第四句云若所餘緣若他隨眠若不同界遍行隨眠文過去欲界繫見苦所斷不同界遍行隨眠於過去欲界繫見苦所斷心可有相應隨增之義第四句中何舉不同界遍行隨眠哉是五答九上緣惑為遍行因之旨道理證文如前重出申也但於光法師餘處釋者今此四句專就容隨增隨眠論之故云自餘隨眠皆不為因也更非遮九上緣惑為遍行因之義亦就自界緣遍行隨眠云此等已攝同類遍行因盡故無相違也次所有之言實雖非一準今此所有隨眠者所隨增隨眠云事也其旨如上成之也次總而言之今此四句於過去不善眼識就容隨增隨眠論之也所謂在此心前為同類遍行因即彼隨眠若不緣此設緣已斷及此相應隨眠已斷為因非所隨增第一句在此心後不為同類遍行因即彼隨眠若不緣此設緣已斷為不為因非所隨增第四句也故於過去不善眼識就地體容隨增隨眠依若不緣之設緣已斷及相應隨眠已斷等義作出不隨增義四句分別故於過去不善眼識就容隨增隨眠論之云也其中第四句廣故兼出非所隨增之類云若所餘緣若他隨眠若不同界遍行隨眠也故前三句唯就過去不善眼識所隨增隨眼分別之云也次識身足論云如眼識耳鼻舌身意亦爾者如眼識於意識同有四句云也不必四句法體是同亦爾之言就大旨論之也非例證可求外彼論中於過去不善眼識作今此四句畢云如過去不善眼識未來不善眼識亦爾文豈於未來如過去有同類遍行因哉次彼論中於過去欲界繫見苦所斷心所有隨眠不為因非所隨增第四句中若不同界遍行隨眠者舉集諦所斷上緣惑故全無過也所有隨眠之義大概如此在此心後之義第六卷抄記録之畢問欲界九上緣惑與無覆無記眼識為異熟因歟答可為異熟因也兩方若不為異熟因者九上緣惑其性既不善也何不與無覆無記眼識為異熟因哉是以見今論餘處文述異熟因不善及善唯有漏善不善有漏法為異熟因定若依之爾者識身足論中於諸隨眠異熟眼識所有隨眠為因非所隨增等四句分別之時出不為因非所隨增俱非句云若所餘緣若他隨眠若不同界遍行隨眠文光法師餘處六釋若不同界遍行隨眠謂自地九上緣隨眠如此釋者欲界九上緣惑不與無覆無記眼識為異熟因見如何答欲界九上緣惑其性既不善故與無覆無記眼識為異熟因云事道理炳然也更不可異求之異熟因不善及善唯有漏之理豈非性相之所定哉但於識身足論文且存一義云彼論中所有隨眠者所增隨眠云事也今此四句分別於異熟眼識就所隨增隨眠論之而九上緣惑於異熟眼識無隨增義故前三句中不可出之第四句中兼雖出之異熟眼識不隨增隨眠既非所有隨眠故不顧為異熟因之義邊俱非句中舉不同界遍行隨眠也準前論義之答趣可沈思之問他界緣遍行隨眠不通無漏緣耶答不通無漏緣也兩方若通無漏緣者他界緣遍行隨眠者見苦集所斷也何可通無漏緣哉若依之爾者婆沙論四十六中云他界遍行通有漏緣無漏緣故文論判無諍他界緣遍行隨眠可通無漏緣見如何答他界緣遍行隨眠者見苦集諦所斷故不通無漏緣云事性相之所定道理炳然也更不可疑之但於婆沙論文者見一段起盡釋契經説三結永斷證預流果得不墮法定趣菩提之文意有多復次義十一復次意云是所斷結有是自界遍行有是他界遍行若説有身見當知總説自界遍行若説戒禁取疑當知總説他界遍行文就此義致問難云何故自界遍行但説一結他界遍行説二結耶文答此問云他界遍行通有漏緣無漏緣故若説戒禁取當知總説有漏緣結若説疑當知總説無漏緣結文此文意云他界緣疑煩惱雖直不緣無漏法總而見之疑煩惱中有緣他界之類有緣無漏之類故云他界遍行通有漏緣無漏緣故也重意云唯自界緣遍行隨眠者即身邊二見也彼唯限苦諦所斷無無漏緣身邊二見故異疑煩惱通有漏無漏緣故如此云也問光法師釋今論此二非見是邪智攝文云言邪智者謂無明相應邪智文爾者寶法師意可許此義耶答不許此義也兩方若許此義者寶法師述餘無覆無記亦緣於上故無覆無記邪行相智可緣上界見明知不許無明相應邪智云釋云事若依之爾者寶法師判有人云疑相應邪智及緣梵王名者恐非論意雖破光法師後二釋不破無明相應邪智云初釋若不許此釋者何不破之哉答見寶法師解釋正理論以欲界生不作是執我是大梵亦不執言梵是我所故非身見無故邊見亦無邊見必隨身見起故非有餘見作此行相故是身見所引邪智之文畢云準上論所釋邪智即是不染汚邪行相智不與疑等煩惱相應行相異故亦非貪等別相煩惱相應不上緣故餘無覆無記亦緣於上故文此釋意此二非見是邪智攝之論文不染汚無覆無記邪行相智非疑等及貪等相應邪智為言故不許光法師無明相應邪智云初釋云事炳然也但於寶法師雖破光法師後二釋不破無明相應邪智云初釋云難者難不與疑等煩惱相應行相異故之時疑等等言可攝獨頭無明故即被破初釋也問疑相應慧可名智耶進云光法師釋云疑相應智名為邪智文付之疑者猶預之稱智者決斷之義也何可疑相應慧名智哉是以八忍與疑得俱故不名智疑相應慧相例可同如何答疑相應慧前後相續現起之時有耶無耶雖不決斷於一念間或執有耶或執無耶有決斷義故名智也故光法師餘處述與疑俱慧相順同緣於境決斷亦名為智畢引婆沙論彼亦是智一剎那頃於所緣境亦決定故之文釋成疑相應慧名智之旨也但於八忍與疑得俱故不名智云例難者彼一念頃不論此義故非相違也問光法師意無覆無記心可緣上界耶進云光法師釋云無覆無記不緣上界文付之依光法師釋披今論現文問若緣大梵起有情見或起常見如何身邊見不緣上界地答不執彼為我我所故邊見必由身見起故重問若爾計彼為有情常是何見攝答對法者言此二非見是邪智攝邪智緣上界見光法師受此文釋欲界無覆無記邪智明知無覆無記心緣上界云事是以寶法師述餘無覆無記亦緣於上故何況光法師餘處解釋中無覆無記心緣上地判若許緣上地者何不緣上界哉答無覆無記心勢力微劣故不緣上界也故識身足論中明十二心四緣分別不云色無色界諸心與欲色界無覆無記心為所緣緣婆沙論中出色界五部法能緣識云欲界修所斷善識云色界修所斷善識無舉欲色界無覆無記識故光法師餘處引婆沙論此等文畢云無舉無覆無記識出無色界五部法能緣識無記力劣下緣上難故不緣上界上緣下易故能緣下界文任此等定判無覆無記心不緣上界云事分明也但於光法師受此二非見是邪智攝之論文云欲界無覆無記邪智之釋者光法師解此文作三釋中第三釋意也正見彼釋云又解身邊見後引起欲界無覆無記但緣欲界説梵王名謂為我常名為邪智非緣彼體無覆無記不緣上故如緣虛空非擇滅名非緣彼體緣於欲界説梵王名謂為我常非緣梵王體云故不釋欲界無覆無記心緣上界也次於寶法師餘處無覆無記亦緣於上故之釋者人師異釋也不可劬勞歟次於光法師餘處無覆無記心緣上地云釋者生上三靜慮借起初靜慮眼耳身三識身緣上三靜慮色聲觸境也光法師餘處釋此疑云雖緣上地由同界故所以得緣欲色界別下不緣上文重難云見今論文乘對法者言此二非見是邪智攝之文致何緣所餘緣彼是見此亦緣彼而非見耶之難何緣所餘緣彼是見云緣彼名緣上界此亦緣彼云緣彼其意可同何云緣於欲界説梵王名哉答雖實不緣梵王自體彼心中思緣梵王自體故任彼思云此亦緣彼無其例難也問寶法師意無覆無記心可緣上界耶進云寶法師釋云餘無覆無記亦緣於上故文付之無覆無記心勢力微劣也不可緣上界是以識身足論十一中明十二心四緣分別不云上地諸心與下界無覆無記心為所緣緣婆沙論八十七中出色界五部法能緣識云欲界修所斷善識無舉無覆無記心出無色界五部法能緣識云欲界修所斷善識云色界修所斷善識無舉欲色界無覆無記識明知無覆無記心不緣上界云事何況寶法師餘處二十二解釋中云無覆無記心總不緣上地息文若許無覆無記心緣上界者何不緣上地息哉答寶法師意四無記心之外立自性無記心故自性無記心緣上界云也餘無覆無記亦緣於上故之釋即述此意也但於無覆無記心勢力微劣也不可緣上界云難者自性無記心勢力非微劣故緣上界無過也次於識身足論並婆沙論文者就四無記心論之故不緣上界云也次於寶法師餘處釋者釋唯自上地心之所緣非下地威儀通果心境故之論文故此亦就四無記心云總不緣上地息也重難云見寶法師處處之釋或二云應言四無記心攝心不盡借識之類非四攝也或云此借識心是自性無記生上三靜慮所起耳識及發語表心可非四無記心所攝故自性無記心釋也今此邪行相智有何由是自性無記心非四無記心攝哉次寶法師餘處解釋中引婆沙論邪智有二種一染汚二不染汚之文畢云準上二種邪智攝一切邪智文而婆沙論所説無覆無記心者唯限四無記心明知邪行相智非自性無記云事何可釋邪行相智即自性無記哉答寶法師處處釋中以借識類自性無記者為成有自性無記心且先出顯一類也理實而言三界之中同可有自性無記心也以何知之者光法師餘處敘西方德光論師義云不染無知以未成佛來鈍自性無記心心所法為體非四無記攝通於三界恆成過未文寶法師意準之可思次於寶法師餘處婆沙論所説染汚不染汚邪智攝一切邪智之釋者彼亦任婆沙論文就四無記心論之故今此邪行相智中不可攝自性無記既云餘無覆無記亦緣於上故四無記心之外餘自性無記心亦緣上界為言問光法師意通果無記心可緣心及名等耶第五卷抄記録之畢問遍行隨眠相應心王遍行攝歟答遍行攝也兩方若遍行攝者婆沙論十八文云無明見有是遍行有非遍行愛慢心王一向非遍行文取意如此文者遍行隨眠相應心王非遍行云事分明也若依之爾者遍行相應心王極相鄰近法也定可遍行攝是以今論中云除得餘隨行亦是遍行攝更無簡心王如何答見今論文本頌云除得餘隨行亦是遍行攝長行云謂上所説十一隨眠並彼隨行皆遍行攝然除彼得非一果故文光法師釋此文云謂上所説十一隨眠並彼隨行相應俱有皆遍行因攝然除彼得得與所得非一果故非遍行因文正理論四十八云謂上所説遍行隨眠並彼隨行受等生等皆遍行攝同一果故然隨行中唯除諸得得與所得非一果故文顯宗論二十五説全亦同之婆沙論十八中問遍行隨眠相應俱有法亦是遍行因不答此問述評家義云評曰應作是説彼亦是遍行因因義通故相應俱有同一果故文任此等定判遍行隨眠與相應心王既有同一果義寧非遍行攝但於婆沙論文者遍行隨眠相應心雖亦是遍行攝非遍行隨眠故對性體時且云非遍行也問已斷遍行因可起與果用耶答可起與果用也若起與果用者其體已斷也不可起與果用是以婆沙論十九中述未斷已斷因差異云未斷位於自身中能取果與果已斷位雖亦為因而於自身不復能取果與果文取意如此文者已斷遍行因不起與果用云事分明也若依之爾者正理論四十八中述唯除先時已取果者今有與義可起與果用見如何答已斷遍行因可起與果用也先思其道理未斷位既起遍行因取果用其體設雖成已斷彼果至生相時豈不起與果用哉是以舊婆沙論云本作因時於自身中能取果與果今雖為因不能取果與果唯除已取果者文此文意未斷位起遍行因取果用者已斷後彼果生時起與果用見正理論云謂未斷位於自身中能為遍行因取果與果後已斷位雖能為因不能取果唯除先時已取果者今有與義文後已斷位雖能為因不能取果之文不簡與果用唯除先時已取果者今有與義之説如舊婆沙論文未斷位起遍行因取果用者已斷後彼果生時起與果用云事炳然也但於其體已斷也不可起與果用云難者斷煩惱者唯斷縛性無斷因用設雖已斷位可起與果用也彼異熟因等已斷不成就位既起與果用例亦遍行因雖已斷後可起與果用也次於婆沙論説者彼論未斷因已斷因差異故離未斷位於已斷位不起取果與果用云也未斷位起取果用畢至已斷位其果生時起與果用之義更非所遮也重難云婆沙論中云前位於自身中能取果與果後位雖亦為因而於自身中不復能取果與果是名未斷已斷差別雖未斷位已起取果用者已斷位不起與果用見哉是一次見正理論餘處文述先軌範師釋云諸同類因所引相續轉變差別與果功能若染汚者至得畢竟對治道時與等流果功能便息不染汚者隨心相續至無餘依般涅槃位與等流果所有功能方畢竟息文正理論師破此義雖判然彼所言微細相續轉變差別無少理趣可令智者録在胸襟唯有憑虛文詞假合無與等流果功能便息云處若爾準染汚同類因至得畢竟對治道時與果功能便息思之已斷遍行因不可起與果用也是二答婆沙論文會通如前也何況見舊婆沙論次下文云復次本作因時能於自身取依果報果與依果報果今雖為因不因不能取依果報果不云不能與依果報果故此文亦已斷遍行因可起與果用見或又聖禪僧都云婆沙論文非云已斷遍行因忽不起取果與果用對未斷位於自身中能起取果與果用已斷位於自身中不成就故不起取果與果用云也於自身中起不起取果與果用為未斷已斷因差異也非自身中起與果用之義更非遮也婆沙論三十八中問何故唯説現在煩惱是覆非餘答此問有多復次義中一復次意云現在煩惱於自相續取果與果過未不爾故説現在文此文亦就於自身中起不起取果與果用論之也非自身中總而云之過去煩惱豈不起與果用哉此文尤為今義例證也次於正理論餘處文者染汚同類因至得畢竟對治道時與等流果功能便息者於自部染汚法得畢竟對治道故自部染汚法永不可起故與果功能便息云也遍行因與五部染汚法為因故異之歟問婆沙論中引品類足論説云九十八隨眠中三十三是遍行六十五非遍行文爾者三十三是遍行中無明可通相應不共耶答可有二義也兩方若通相應不共者婆沙論中唯可限不共無明見若依之爾者以道理思之三十三是遍行中無明何不通相應不共哉答品類足論有二誦本若依迦濕彌羅國諸師所誦本者云九十八隨眠中三十三是遍行六十五非遍行也三界各有十一遍行隨眠故三十三是遍行也就之有見苦集所斷無明有是遍行有非遍行何故彼説三十三是遍行六十五非遍行耶云疑答此問有二義見故披婆沙論十八文云亦應作此誦而不爾者有別意趣以彼多分是遍行故謂見苦所斷有十無明七是遍行即五見疑相應及不共無明三非遍行即貪瞋慢相應無明見集所斷有七無明四是遍行即二見疑相應及不共無明三非遍行即貪瞋慢相應無明文依此義意者三十二是遍行中無明可通相應不共也是以下文云又此國誦三十三是遍行六十五非遍行者無明皆説不共無明唯遍非遍自力起故相應無明有八十三謂二十七遍行及五十六非遍行隨眠相應彼隨他力現在前故説所相應即亦説彼性不定故不別説之文依此義意者三十三是遍行中無明唯限不共無明也問無色界可有他界緣遍行隨眠耶答不可有他界緣遍行隨眠也兩方若有他界緣遍行隨眠者無色界無有上界何可有他界緣遍行隨眠哉是以婆沙論十八中無色界無他界緣遍行隨眠見若依之爾者光法師餘處十二解釋中引婆沙論佛得緣佛他心智此説能緣不説現起云師義判且以前説為正義若許得能緣非現起之義者豈不許無色界有他界緣遍行隨眠哉答染汚心是無始串習法故有能緣用者必可現起故不許得能緣非現起之義也故婆沙論云無色界亦有十一遍行隨眠皆是自界緣無他界緣者無上界故不緣下故有説亦有他界緣者然能緣定非現起定評曰彼不應作是説既無上界可緣如何有能緣定是故説無於理為善文加之婆沙論八中有餘師説有緣一極微起薩迦耶見此約所緣故説有非約現起故説有取意云義評家破之云評曰彼説非理所以者何如何此見能住所緣而不能起是故前説於理為勝文此文亦其潤色也但於光法師餘處解釋者善心不如染汚心無始串習故許得能緣非現起之義也故引婆沙論佛得緣佛他心智此説能緣不説現起云師義判且以前説為正全無相違也問見滅道所斷有漏緣或互可相緣耶答互可相緣也兩方若互相緣者見滅道所斷有漏緣惑緣無漏緣惑互難相緣哉是以見光法師解釋云滅道下有漏緣惑隨其所斷是若緣見此諦所斷為境名見此諦所斷文如此釋者見滅道所斷有漏緣惑緣無漏緣惑互不相緣云事分明也若依之爾者品類足論並婆沙論中見滅道所斷有漏緣惑互可相緣見如何答見滅道所斷有漏緣惑雖專緣無漏緣惑亦互可有相緣義也故品類足論中出於見滅所斷見取相應無明諸餘見滅所斷有漏緣及遍行隨眠見道所斷亦爾文婆沙論文述見滅所斷有漏緣煩惱與見滅所斷有漏緣煩惱為四緣云所緣緣者謂見滅所斷有漏緣煩惱緣見滅所斷有漏緣煩惱而生如見滅所斷二種煩惱與九種煩惱為緣多少見道所斷二種煩惱與九種煩惱為緣多少應知亦爾文任此等論判見滅道所斷有漏緣惑互相緣云事炳然也但於見滅道所斷有漏緣惑緣無漏緣惑互相緣云難者見滅道所斷有漏緣惑雖專緣無漏緣惑兼亦緣有漏緣惑故互可有相緣義也次於光法師解釋者從其多分云若緣見此諦所斷為境也今論餘處中以見滅道所斷有漏緣惑為斷彼所緣故斷其意亦同之非不許云爾故見滅道所斷有漏緣惑互相緣義也問色界上緣惑可緣憂根斷道耶答不緣憂根斷道也兩方若緣憂根斷道者憂根斷道有未至地色界上緣惑如何可緣之哉若依之爾者婆沙論九十中出憂根斷道緣識為相應縛非所緣縛隨眠云及欲色界他界地緣遍行隨眠文如此文者色界上緣惑可緣憂根斷道見如何答憂根斷道者唯有未至地故色界上緣惑不可緣之云事道理炳然也但於婆沙論文者及欲色界他界地緣遍行隨眠者色字地字剩也可云及欲界他界緣遍行隨眠也故婆沙抄五本云若不爾者論文應錯但應説及欲界他界他地緣遍行隨眠而加色字尊者謬出勘終論文者為難可思文問中間禪可有見惑耶答可有見惑也兩方若有見惑者品類足論文出無尋唯伺地所隨增隨眠云色界遍行及修所斷隨眠隨增文若中間禪有見惑者何可限遍行修所斷隨眠隨增哉若依之爾者婆沙論中中間禪可有見惑見如何答見發智論文云三結乃至九十八隨眠幾有尋有伺幾無尋唯伺幾無尋無伺答三結三種九十八隨眠中欲界三十六有尋有伺色界三十一三種無色界三十一無尋無伺文婆沙論中釋此文云三結三種謂或有尋有伺或無尋唯伺或無尋無伺文加之勘婆沙論處處之文或以邪見相應法望邪思惟相應法作四句中出邪思惟不相應邪見相應法云謂靜慮中間乃至有頂邪見相應法即九大地法及大煩惱地法惛沈伺心文或云梵輔梵衆依未至地心命終結生大梵依靜慮中間心命終結生文靜慮中間結生心豈不通見惑相應心哉任此等論文中間禪有見惑云事炳然也但於品類足論文者染汚法無有尋有伺無尋唯伺無尋無伺之差異故彼論六中明今此三地廢立之時云無尋唯伺地云何謂修靜慮中間得梵大梵及一分無漏法唯就善法論之故云色界遍行及修所斷隨眠隨增全無相違也重難云見品類足論九文明有尋有伺地云欲色界一切隨眠隨增釋無尋無伺地述色無色界一切隨眠隨增於今此二地廣取染汚法若爾何云明有尋有伺等三地差異之時唯就善法論之哉答云有尋有伺地無尋無伺地之時欲界無色界兼取染汚法故彼被引初靜慮並上三靜慮兼取染汚法歟問頌文云緣道六九地文爾者滅道法智所證離繫得唯限六地攝歟答唯限六地攝也兩方若唯限六地攝者見婆沙論百五十八之文以滅道法智離色無色界修所斷染時所證離繫得或云類智品攝或云法智品攝之二説中評家判之類智品攝云義為正若彼離繫得類智品攝者不可限六地攝哉若依之爾者既是滅道法智所證離繫得也定知唯限六地攝云事如何答勘婆沙論百五十八文云擇滅得隨能證道性類差別以諸擇滅自無作用但由道力求證彼時引彼得故隨能證道判離繫得性類也而既法智品道所證離繫得也隨能證道唯可限六地攝云事道理炳然也故婆沙論中難類智品攝義云若類智品攝亦不應理彼斷及得法智所證故隨能證道可法智品攝見但於婆沙論評家類智品攝云義為善云難者隨能證道雖可法智品攝由類智是不共決定上二界能對治道以彼滅道法智所證離繫得攝屬類智品也重難云見婆沙論一段之文問若以滅道法智離色無色界修所斷染時彼色無色界修所斷法無漏離繫得為法智品攝為類智品攝耶兩方舉難云若法智品攝此不應理彼法及斷類智所知故云若類智品攝亦不應理彼斷及得法智所證故畢答之出二師説初師意云類智品攝第二師意云法智品攝評家斷其正不云評曰此中初説為善以類智品是彼不共決定對治故以初師類智品攝云義為善判若爾彼離繫得類智品攝云事甚分明也何云隨能證法智品道唯限六地攝哉答問道諦所斷無漏緣隨眠中可有不緣心品唯別緣道共戒得四相類耶答可有二義也兩方若有此類者見所斷隨眠是共相緣惑也不可有別緣道共戒得四相之類是以見今論文當卷述緣道六九地道諦所斷無漏緣隨眠唯總緣六九地道見餘處二十七明無諍智不緣見所斷惑云諸無事惑不可遮防內起隨應總緣境故成見所斷惑總緣境界之旨以知見所斷惑中不可有別緣之類云事若依之爾者本論中云緣無緣法一切隨眠隨增文如此文者道諦所斷無漏緣隨眠中可有不緣心品唯別緣道共戒得四相之類見如何答道諦所斷無漏緣隨眠中可有不緣心品唯別緣道共戒得四相之類也即見婆沙論處處之文或百三十六云如本論説緣無緣法是一切隨眠隨增文或百四十六或云如十門説緣無緣法是一切隨眠隨增文加之品類足論九云緣無所緣法八界二處四蘊攝九智知除滅智一識識一切隨眠隨增文若道諦所斷無漏緣隨眠中無不緣心品唯別緣道共戒得四相之類者何可緣無緣法隨增哉但於見所斷隨眠是共相惑也不可有別緣道共戒得四相之類云難者道諦所斷無漏緣隨眠實雖共相緣惑共相緣惑中自亦可有別緣之類故別緣道共戒得四相全無所背也故勘婆沙論處處之文或問頗有於一蘊執我我所耶答此問云有謂色蘊行蘊中各有多法執一為我餘為我所受想識蘊雖無多類而有種種差別自性是故亦得計一為我餘屬我所有身見中許別緣類或百三十九述欲界三十六師句所緣云十八通緣欲色界繫欲界所繫上界緣惑引緣色聲獨境見準此等文思之見所斷隨眠雖共相緣惑有別緣義云事炳然也以之可為今義潤色也次於今論緣道六九地之文者此談道諦所斷無漏緣隨眠緣境之大綱也自有別緣之類更非所遮歟餘處內起隨應總緣境故之論文準之可會也重難云以本論緣無緣法一切隨眠隨增云文為證據成道諦所斷無漏緣隨眠中有不緣心所唯別緣道共戒得四相之類云義不可然彼就未來所有種類云緣無緣法一切隨眠隨增也何云現起道中有此類哉是以披發智論文以二十二根分別緣有緣緣無緣等云幾緣無緣答一十三少分未知當知根中有緣無緣之類見加之婆沙論中云緣無所緣法者謂若世第一法緣色心不相應行世第一法中亦有緣無所緣之義判而見道並世第一法唯是總緣共相觀門都無別緣之義故知就未來所有種類云有緣無所緣之義也準而思之本論緣無緣法一切隨眠隨增云文就未來所有種類論之可云也次若以本論緣法一切隨眠隨增云文為證據成此義無色界道諦所斷無漏隨眠中可有此類歟不可云無此類云緣無緣法一切隨眠隨增故也若有此類者不可然見婆沙論文云即諸異生若起無色解脫及後三念住時後三念住隨一現在修未來修三除身念住異生無色界心現在前時無別緣色法之義定善心既爾無色界道諦所斷無漏緣隨眠例亦可同次無色界道諦所斷無漏緣隨眠唯別緣道共戒得四相者唯別緣未至中間及四靜慮類智品道歟若爾上二界道諦所斷無漏緣隨眠必總緣九地類智品道見何唯別緣未至中間及四靜慮六地類智品道哉故光法師釋即由此因顯遍行惑有緣苦集諸地無遮境互為緣因非能對治故之論文云非是無漏能對治故有緣一地非緣六九不同道諦以緣道時緣六九地文此釋意道諦所斷無漏緣隨眠隨其所應總緣六地法智品道九地類智品道無有別緣地地法類智品道之義見何云無色界道諦所斷無漏緣隨眠中有別緣未至中間及四靜慮六地類智品道之義哉答染汚心者無始時來繫屬串習故於未來世有能緣緣用者必可現起故正義意不許得能緣非現起之義也故見婆沙論處處之文或八破有餘師説有緣一極微起薩迦耶見此約所緣故説有非約現起故説有取意云義云評曰彼説非理所以者何如何此見能住所緣而不能起是故前説於理為勝文或十八破有説無色界亦有他界緣遍行隨眠然能緣定非現起定取意云義云評曰彼不應作是説既無上界可緣如何有能緣定是故説無於理為善文準而思之道諦所斷未來無漏緣隨眠中有唯別緣道共戒得四相之類者必可現起也未來世中有此種類永不現起云事豈不背婆沙論處處決判哉但於見道並世第一法有緣無緣之義云例難者彼非無始串習法故未來世中有緣無緣之類永不現起全非相例也次染汚心者無始串習故無色界道諦所斷無漏緣隨眠中可有別緣道共戒類也善心非如染汚心無始串習故異生所起無色界善心中無有別緣道共戒類也次欲界道諦所斷無漏緣隨眠總緣六地法智品道上二界道諦所斷無漏緣隨眠總緣九地類智品道者述道諦所斷無漏緣隨眠緣境之大綱也其中無色界道諦所斷無漏緣隨眠自亦有別緣未至中間及四靜慮類智品道之類強不可遮之若亦許有此類者別緣道共戒得四相之類何不許之哉但於光法師釋者以上緣惑對無漏緣惑論其差別之時八地苦集雖為緣因疏緣疏因故上緣惑中有別緣一地乃至合緣八地之類六地九地無漏道各互為親同類因故無漏緣惑總緣六地九地道云也是即就大都相論其差別許也非遮云爾故自有別緣未至等六地類智品道亦別緣道共戒得四相之義歟聖禪僧都云道諦所斷無漏緣隨眠中不緣心品唯別緣道共戒得四相之類不可有也其難答趣如彼俱舍論第十九卷顯愚意抄可引見之問無色界道諦所斷無漏緣隨眠可緣下地能治類智品道耶答可緣下地能治類智品道也兩方若不緣之者類智品道是色無色界能治道品也無色界道諦所斷無漏緣隨眠緣類智品道之時設雖下地能治道何不緣之哉是以今論中述緣道六九地全不簡下地能治道哉若依之爾者辰旦人師解釋中無色界心不緣下地能治類智品道見如何答類智品道是上二界能對治道也無色界道諦所斷無漏緣隨眠緣類智品道之時九地類智品道互為同類因故可緣下地能對治類智品道云事道理炳然也是以見今論文云色無色界八地各有三種隨眠一一唯能通緣九地類智品道若治自地若能治餘皆彼所緣以類同故文既云若能治餘緣下地能治類智品道之旨尤分明也故光法師釋此文云若能治餘謂九地中類智品道能治餘七地者皆彼邪見疑無明所緣以是類智品類同故文寶法師釋此文云九地類智品道若治此地及有治餘皆屬八地邪見所緣以同是類智類故文正理論四十八云色無色界八地所有緣道隨眠一一唯能通緣九地類智品道若治自地若能治餘諸類智品皆能緣故文顯宗論二十五説全亦同之加之勘婆沙論處處之文或八十九云色無色界見道所斷邪見皆緣九地一切類智品聖道以種類同故文一切類智品聖道之言豈可簡下地能治道哉或出眼根斷道緣識所增隨眠為所緣縛非相應縛云謂三界見道所斷有漏緣舉為相應縛非所緣縛云謂三界見道所斷無漏緣無色界道諦所斷中有漏緣隨眠緣眼根斷道緣識無漏緣隨眠與眼根斷道緣識相應云故無色界道諦所斷無漏緣隨眠緣下地能治類智品道云事甚明鏡也更不可異求之但於辰旦人師解釋者是大乘義章第九卷金剛三昧義同第十三卷八解脫義釋也彼就無色界無漏心論之非云無色界道諦所斷無漏緣隨眠不緣下地能治類智品道頗異今此疑問之趣歟就中無色界善心緣不緣下地能治類智品道事第二十卷抄記録之畢仍亦恐繁有略之問光法師意於見修所斷煩惱對治決定對治不定義如何釋之耶進云光法師釋云以見所斷惑對治決定乃至以修斷惑對治不定文付之見所斷惑通忍智所斷故可云對治不定修所斷惑唯智所斷故可云對治決定何如此判哉是以光法師餘處二十一引正理論五十五説云然於此中為顯三界修所斷惑無不由九品道斷對治決定故説此言見所斷中唯有頂惑對治決定如前已辨文此釋意修所斷惑對治決定見所斷惑對治不定見如何答見所斷惑修所斷惑對治決定對治不定可有二義門也所謂苦忍苦智唯對治苦諦之下煩惱乃至道忍道智唯對治道諦之下煩惱故見所斷惑云對治決定修所斷惑是迷事煩惱四諦智中何智現起斷之故修所斷惑云對治不定也故光法師釋今論亦非全能治色無色不能治彼見所斷故之文云滅道法智亦非全能治色無色唯斷修惑不能治彼見所斷故以見所斷惑對治決定又於見位迅疾急速故見道中滅道法智品非能對治上界見惑以修斷惑對治不定文光法師餘處釋今論先未曾得此種姓故對治所緣俱決定故之文云又諸忍智對治決定所緣決定唯修同類不能傍修如苦忍苦智決定對治苦下煩惱決定以苦諦為所緣境如是乃至道忍道智應知亦爾故婆沙一百七云復次以見道所緣定對治定故唯修同分修道所緣不定對治不定故能修同分不同分文此等釋意同顯見惑對治決定修惑對治不定之義也若又除非想非非想處見惑之外所餘八地見所斷惑聖者以忍斷之異生以智斷之故對治不定修所斷惑聖者異生同以智斷之故對治決定云義門有之如云忍所害隨眠有頂唯見斷餘通見修斷智所害唯修也依此義門修所斷惑云對治決定見所斷惑云對治不定也疑難之中被出光法師餘處所引正理論文即顯此意也凡有此二義門故光法師處處之中各述一義邊更非相違釋也問見苦集所斷法中可有唯為相應隨增不為所緣隨緣隨增類耶答可有有無二義邊也兩方若無此類者非無漏上緣無攝有違故者性相之所定也見苦集所斷上緣惑豈非此類哉何況見滅道所斷法中有此類見相例可同若依之爾者見品類足論文述見苦所斷法云相應故隨增非所緣故者無文如何答九十八隨眠中一類論之者見苦集所斷法中不可有唯為相應隨增不為所緣隨增之類其旨炳然也但於上緣或可此類云難者九十八隨眠中無一類被云上緣惑之法體故無此句云也次於見滅道所斷法中有此類見云例難者見滅道所斷各邪見疑及不共無明即此類也故品類足論中於見滅所斷法分別此四句云相應故隨增非所緣故者謂見滅所斷無漏緣隨眠文見道所斷準而可知品類足論一段廢立其文雖繁其道如此但強論此義者見苦集所斷上界地緣惑為今此類之義邊可有也問以煩惱俱時四相等望同時煩惱可有繫縛義耶第一卷抄記録之畢問慢煩惱可為斷善根牢強加行耶答不為牢強加行也兩方若為牢強加行者光法師所引婆沙論中慢煩惱不為斷善根牢強加行見若依之爾者顯宗論二十六中釋欲界愛慢不善性故云又斷善時為強因故文如此文者慢煩惱為斷善根牢強加行云事分明也如何答慢煩惱是非如貪瞋癡強盛煩惱故不為斷善根牢強加行也故光法師所引婆沙論中明通五部遍在六識是隨眠性能起麁惡身業語業作斷善根牢強加行具此五義立不善根云慢通五部是隨眠性能起麁惡身業語業無餘二義文正理論四十九云又具五義立不善根謂通五部遍依六識是隨眠性發惡身語斷善根時為強加行慢等不爾非不善根義準已成故頌不説文顯宗論説大亦同之任此等論文慢煩惱不為斷善根牢強加行之旨分明也但於顯宗論又斷善時為強因故之文者慢煩惱雖不為斷善根牢強近加行可為遠加行故釋欲界慢煩惱唯限不善不通無記故如此云也重意云顯宗論中上段云又斷善時為強因故下段云斷善根時為勝加行慢等不爾一論前後之文似相違故推之上段之文顯為斷善根遠加行之旨下段之文述不為近加行之義故上下之文實非相違歟或又顯宗論二十六中云愛慢雖有順修福行而由見力引彼令起又斷善時為強因故背善友故欲俱不善雖標愛慢又斷善時為強因故者唯云愛唯不善故歟故正理論四十九云然貪於彼斷善根時説為強因故是不善唯舉貪一種下別云我慢亦隨身見後起令心高舉故不順修善業又違親近善友等故謂由我慢心自舉恃近善友等皆難得成慢唯不善事以別故釋之也準正理論文可會顯宗論説歟文永十一年甲戌五月十五日申時於東大寺尊勝院記録此論義之時當座回此愚案畢間可沈思歟問處中無表可有離欲捨耶答可有離欲捨也兩方若有離欲捨者見今論餘處十五文出處中無表捨緣述捨中由受勢作事壽根斷無舉離欲捨明知無此義云事若依之爾者光法師解釋中處中無表可有離欲捨見如何答披光法師解釋問惡作與憂根相應法離欲捨若發得別解脫戒豈有離欲捨耶思此問意惡作憂根所發無表可有離欲捨見答此問云惡作憂根但能發處中善不善身語業不能發別解脫戒故無有妨惡作追悔往事憂根別有所憂正發戒時無此相故文惡作憂根發處中無表者處中無表可有離欲捨云事炳然也但於今論餘處十五出處中無表捨緣中不舉離欲捨云難者今論餘處所舉處中無表六種捨緣出通捨善惡處中無表之緣也故光法師餘處釋云正理三十九意説處中六緣一一皆能通捨善惡所言根斷根通善惡斷是斷加行若處中善斷善加行捨若處中惡斷惡加行捨即是靜慮加行文今論意可同正理論説而離欲界染位唯捨惡作憂根所發善處中無表故略不舉之也重難云今論餘處十五中述處中無表第六捨緣云六由善根斷懷故捨謂起加行斷善根時便捨善根所引無表舉唯捨善處中無表位何云今論所舉處中無表六種捨緣出一一通捨善惡處中無表之緣哉答今論中所舉處中無表第六捨緣又出通捨善惡處中無表之緣也即同正理論説故光法師餘處十五敘俱舍師救云理實頌中所説根斷如正理説而於長行偏言斷善影顯斷惡或可論主試後學徒為覺不覺文文永十一年甲戌六月三十日午時於東大寺尊勝院護摩堂之南庇新學問之間窗抄之畢去四月十七日始此卷抄同夏林鐘今日終其微功居諸易遷徒贈孟夏中夏之候問端難決聊記六十六條之疑老後修學佛神垂哀就中被召自來七月三日欲始行法勝寺御八講證義者之間同二日欲上洛二諦匆忙雖無其隙志切之餘終日抄之春日大明神納受此勤彌勒大聖尊知見此願愚僧一期終焉之暮施引攝於兜率天之秋雲慈尊三會説法之曉憑聞法於龍華樹之春風乃至法界衆生平等利益而已右筆華嚴宗末葉權僧正宗性年齡七十三夏臘六十一
