body:
  text: 俱舍論第二十九卷抄問題問凡夫二乘所起四無量可緣他三千界有情耶問慈無量以何為體耶問悲無量以何為體耶問正理論意喜無量喜受為體義如何破之耶問正理論意引何經文破喜無量喜受為體義耶問正理論中明喜無量體云諸古師説喜即喜受文爾者今此師意劣喜名欣歟問品類足論中出喜無量體云謂喜及喜相應受想行識文爾者今此喜者喜受歟問四無量眷屬體中可攝得耶問四無量可緣見所斷法耶問未來四無量可緣自相續耶問四無量可通順勝進分耶問斷欲界煩惱九無間前八解脫道位可修喜無量耶問正理論中明喜無量體舉喜即喜受喜異喜受二義爾者今此二義意分別聞思修所成時可有不同耶問正理論中明喜無量體舉三師説爾者以欣為體云義意依上三靜慮近分地可起喜無量耶問慈無量可感第四靜慮異熟果耶問慈無量可感五淨居天異熟果耶問四無量唯感色界異熟果歟問悲無量可依下三靜慮耶問除後有異生所餘異生所起四無量可通未曾得耶問無佛世時除近佛地菩薩可起上三靜慮無量耶問未離欲染聖者起相似四無量時可得通行耶問以初靜慮無漏斷初靜慮煩惱九無間九解脫道位可修自地四無量耶問四無量緣欲界有情時具可有緣緣無緣等四句耶問勝解作意無間可生他地心耶問初二解脫為唯治顯色貪為當治形色貪歟問初二解脫為唯緣顯色為當緣形色歟問初二解脫為唯治眼識所引貪為當治耳等四識所引貪歟問依第二靜慮近分地可起初二解脫耶問未離第三靜慮染聖者可成就淨解脫耶問欲界可有相似四無色解脫滅受想解脫耶問論文云彼散善者如命終心文爾者無色界起散善唯限命終心歟問論文云近分解脫道亦得解脫名文爾者彼前八解脫道位未來所修麁等三行相可為四無色解脫體耶問今論意異生無色解脫現前位未來修身念住義可有耶問論中明無色解脫相云近分解脫道亦得解脫名文爾者寶法師意今此近分解脫道者可通四無色近分地解脫道耶問今論意以近分地加行道可為四無色解脫體耶問婆沙論意異生無色解脫現前位可修身念住耶問論中釋滅盡定得解脫名舉二師説爾者初師意解脫定障故名滅受想解脫歟問論文云有説由此解脫定障文爾者寶法師意今此文明滅盡定得解脫名歟問論中明滅受想解脫云微微心後此定現前文爾者寶法師意微微心位可有欣心所現起義耶問正理論意滅盡定出心可通識無邊處耶問微微心位必緣滅盡定歟問光法師解釋中云入心緣彼滅定寂靜方能入故故唯有漏文爾者今此入心者可通想微細微微三心耶問想微細微微三心位可斷滅盡定障耶問滅盡定障為唯限無覆無記為當通染汚歟問初二解脫對治何地貪耶問正理論意前三解脫為唯限勝解作意為當通真實作意歟問四無色解脫可緣下地法上擇滅耶問四無色解脫可緣下地能治類智品道耶問虛空無為可有多體耶問四無色解脫可通退分定耶問非想非非想處解脫唯緣自地歟問今論意第三靜慮不立解脫故如何釋之耶問以盡無生智可為前三無色解脫體耶問第二第三解脫可緣自相續耶問淨解脫可通曾得耶問外法異生可起淨解脫耶問起滅盡定時必伏非想非非想處煩惱歟問有學聖者所起滅盡定可受無色界等流果耶問前八遍處俱緣可見色歟問後二遍處為唯緣現在為當緣過未二世歟問勝處遍處觀門悉解脫攝歟問付前八遍處觀門觀青等四色後觀地等四大種歟問麟喻獨覺得滅盡定為加行得為當離染得歟問今論意依身在欲天可起前三解脫耶問論中明生上二界起色無色定緣云二由業力文爾者寶法師意今此業者為唯限順後業為當通順生業歟問頌文云佛正法有二謂教證為體文爾者諸佛正法滅盡釋尊正法滅盡其義同歟問論中明正法住時舉二師説爾者初師意如何釋之耶問論中明正法住時舉二師説爾者第二師意如何釋之耶問大師世眼久已閉堪為證者多散滅以下六行文為本頌為當長行歟
