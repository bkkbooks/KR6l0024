body:
  text: 俱舍論第二十三卷抄上問題問不淨觀持息念後念住前必得禪定歟問自性念住體可通生得惠耶問無漏身念住可現起耶問自性等三種念住一念觀門具之歟問所緣念住中染汚身念住可亘不善有覆二類耶問緣想行二蘊可名雜緣法念住耶問總想念住中可有不總緣身受心法類耶問佛及獨覺可作三義觀七處善觀門耶問七處善可通無漏耶問異生位可起七處善耶問七處善可依欲界等十地耶問未離欲染人修惠無間起暖善根義可有耶問聞惠無間可起暖善根耶問依上三靜慮起暖善根人總緣共相法念住無間起之義可有耶問未得未至地人思惠無間起頂善根義可有耶問暖頂二善根位觀四聖諦可通相續不相續耶問暖頂二善根位作十六行相觀上下八諦時一一行相唯限一剎那歟問寶法師意暖頂二善根初安足位所現修法念住可通雜緣不雜緣歟問忍善根位所現修法念住可通雜緣不雜緣耶問頌文云下中品同頂文爾者中忍同頂者為説現修行相為當論得修行相歟問中忍滿位為二行相二剎那為當一行相二剎那歟問暖等四善根以得為體歟問不淨觀持息念別相念住總相念住以得為體歟問暖善根初安足位曾得道現起歟問暖等四善根可有離染得耶問已離欲染人初起暖等善根時可得修前八品斷者所起暖等善根耶問異生位餘暖等四善根外可起餘順決擇分善根耶問今論意依第四靜慮起忍善根人今此忍善根位可起非順決擇分所攝心品耶問初苦法忍位未來可修四念住耶問非暖善根初安足位非聞惠現前位非滅現觀四心現前位依四靜慮未曾得心品現前位必得修受念住歟問寶法師所引婆沙論中明成就世第一法不成就彼離繫得等四句分別相致三重問答爾者第一重四句中成就世第一法不成就彼離繫得者於初靜慮煩惱可亘未離已離二類耶問依初靜慮入見道人可修未至地世第一法耶問未至地世第一法與初靜慮世第一法可為同類因耶問世第一法位可得修無漏道耶問暖等四善根四分定中唯順決擇分攝歟問無色界可有順決擇分善耶問暖等四善根可感眼等五根耶問尊者妙音意欲界繫暖頂二善根修惠攝歟問尊者妙音意暖頂二善根為唯依欲界為當通依色界歟問尊者妙音意頂善根中自暖善根劣類可有耶問尊者妙音意外暖頂二善根依欲界云義可如耶問六欲天中初起中忍義可有耶
