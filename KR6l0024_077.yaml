有漏善及無覆無記心等應亦名離貪心然彼亦是有貪心貪所繫故文此文分明於有漏善者悉名有貪心見若爾離貪心唯限無漏云事自明也如何答光法師初釋意論中述第二師義之時雖云是故應許餘師所説為貪所繫名有貪心不舉離貪心然法師當婆沙論正義而婆沙論百九十中述正義云如是説者好謂貪所繫故名有貪心貪對治故名離貪心以貪對治名離貪心之義同今論初師也故光法師釋其離貪心同第一師故不別説尤有其謂哉就中婆沙論以下文正義意難貪相應名有貪心貪對治名離貪心之義云若説貪相應故名有貪心貪對治故名離貪心者則貪不相應染汚心及無覆無記一分善心應非有貪心亦非離貪心然彼亦是有貪心貪所繫故文此文既雖難貪不相應染汚心及無覆無記心並非貪對治一分善心貪所繫故應名有貪心更不難貪對治一分善心猶貪所繫故應非離貪心明知正義意對治貪有漏善心名離貪心云事加之見次下文云離貪心如實知離貪心此四智謂法類世俗道皆如前釋文而見婆沙論上卷文出樂受能知智舉法類世俗道四智畢云雖無一樂受四智所知謂有漏者一智知無漏者三智知然以總説故言四智如實知樂受文此文意今能知智者漏無漏各知自類不知他類見而出彼離貪心能知智之文皆如前釋者指今文也若爾離貪心能知四智各可知自類云事分明也而能知智已舉世俗智定知所知離貪心通有漏云事但於法師意異初師貪所繫名有貪心故諸有漏心皆可名有貪心云難者法師意以治貪心名離貪心故設雖有漏心對治貪皆名離貪心以其餘有漏心名有貪心也如此存之時不可有一心更通有貪離貪之義次於毗婆沙師應通聚散故之能破文者毗婆沙師意染汚心名散心善心名聚心故聚心散心都無雜濫之義而西方師以眠相應心名聚心故於染汚相應眠者決定可有其雜濫故以自義決定不雜濫難他師雜亂之義諸師立破之常習也但於有貪心離貪心之雜濫者離貪心者專以無雜濫無漏心名離貪心之上兼以治貪有漏心名離貪心強不可有其痛於聚心者西方師意偏以眠相應心名聚心故此外無有無所濫之聚心已於聚心者偏有雜濫義故專難之歟次於不還墮三有等之論文並光法師釋者初釋意離貪心雖通有漏無漏契經暫舉為真對治之離貪心故云不還墮三有也是能順貪對治故名離貪心之義汝若云貪不相應名離貪心者有何故契經偏出離貪心等之時唯舉無漏哉故汝義違此經文破也為言非云爾謂離貪心限無漏也私案一義云光法師已釋第二師義作或云離貪心通漏無漏或云限無漏之二釋而今離貪嗔癡不還墮三有之文順第二釋意故今暫以第二釋意消文故云明知離貪心等唯是無漏也但就初釋意了簡不還墮三有之經文者經文暫舉偏非貪所繫專為真對治之離念心故云離貪嗔癡不還墮三有是則能順貪所繫名有貪心貪對治名離貪心之義汝謂貪相應名有貪心不相應名離貪心者此經文如何可消之哉難也次於婆沙論有漏善悉名有貪心云難者彼文有漏善及無覆無記等應亦名離貪心者以貪相應名有貪心師意除貪相應餘一切有漏心悉名離貪心故任牒彼師義也次然彼亦是有貪心貪所繫故者雖似上句所牒之法悉名有貪心是言總意別也意可云一分非對治有漏善心無覆無記心貪不相應染汚心貪所繫故名有貪心也問論中述有貪心離貪心相出三師説中釋第二師不舉離貪心故光法師作二解釋爾者第二釋意如何釋之耶進云光法師第二釋云又解後師既説為貪所繫名有貪心明知貪對治故名離貪心唯取無漏文付之法師以貪對治名離貪心若爾設雖有漏心有對治貪義者尤可名離貪心也依之論中述此師意之時終不舉離貪心若異初師存離貪心限無漏者尤可顯其起盡然已不別顯之定知同初師故不別顯之云事何況婆沙論百九十云如實知離貪心此四智謂法類世俗道文而今此能知智有漏知有漏無漏知無漏者上卷定判也明知離貪心通有漏云事加之婆沙論百九十評家意破貪相應名有貪心貪對治名離貪心云義之時雖述則貪不相應染汚心及無覆無記一分善心應非有貪心亦非離貪心然彼亦是有貪心貪所繫故不破以一分有漏善心名離貪心之邊許離貪心通有漏義云事此文又明也如何答第二釋意第二師意以貪所繫名有貪心故諸有漏心皆貪所繫也皆悉可名有貪心其無漏心是非貪所繫然真對治也偏以之可名離貪心存故離貪心限無漏釋也況若以有漏心名離貪心可有一心通有貪離貪之過更難消破西方師應通聚散故之文哉加之第二師既引離貪嗔癡心不還墮三有之契經文難第三師義第二師意離貪心限無漏云事尤分明哉依此等文理作離貪心限無漏云釋也但於婆沙論兩文者初釋意任婆沙論文雖存離貪心通有漏無漏之旨第二釋意婆沙論外作別釋也此則今論文限無漏見故也退勘光法師餘處解釋就斷善述頓斷師義之時今論中能斷邪見不云何品婆沙論中上上品邪見頓斷云云而光法師向今論文婆沙文外作文既不別説雖起何品邪見皆頓斷之釋是為其例證歟問婆沙論評家意離貪心可通有漏無漏耶準上二箇條論義可思之仍略之問論中述有貪心離貪心相舉三師説中述初師意云有貪心者唯説第一貪相應心離貪心者謂治貪心文爾者如何破法師義耶進云論中破云非貪對治不染汚性應許此心非有貪心離貪心等文付之設雖非貪對治不染汚性無覆無記心並一分善心非有貪心離貪等可有何過哉是以於聚心散心等八對心者雖唯攝善染汚心不攝無覆無記心全無出攝心不盡之過例可同哉抑此文中可付攝心不盡之過者尤舉貪不相應餘染汚心可難之何唯可限不染汚心哉如何答立十一對分別有貪離貪等專廣為顯諸心差別相也若於此不攝盡心者豈經中廣分別其差別之本意哉故婆沙論今論等中付攝心不盡之過尤顯契經旨者哉但於聚心散心等八對心雖不攝無覆無記心無付攝心不盡之過云難者論中述若爾有心非貪對治不汚性應許此心非有貪心離貪心等光法師判若非攝者即有十一對攝心不盡是非云十一對心各可攝盡心今能破意初師意若有貪心離貪心等初三對心不攝不染汚性無覆無記心等者於下聚心散心等八對心者決定不攝無覆無記心若爾總見十一對心之時終有不攝盡心之過為言若爾例難全非相違也次於不攝盡之心中尤可舉貪不相應餘嗔等相應染汚心云難者光法師釋能破論文非有貪心離貪心等之等言云等者等取有嗔心等文若爾此能破之文一具舉初三對心難之故且出無濫三對所不攝之不染汚心破之也實舉餘染汚心可難之也是以婆沙論百五十中云若説貪相應故名有貪心貪對治故名離貪心者則貪不相應染汚心及無覆無記一分善心應非有貪心亦非離貪心文此則暫就有貪心離貪心一對加能破之時無所濫故舉貪不相應染汚心也重難云攝心不盡者總見十一對之時有終不攝盡心者可付此過非十一對各付此過云事分明見能破論文云若爾有心非貪對治不染汚性應許此心非有貪心離貪等文此文既難貪不相應不染汚性心可有貪心離貪心所不攝全不難此不染汚心總十一對中所不攝明知各約一對中付攝心不盡之過云事是以寶法師釋此文云不治貪不染汚心不與貪相應故非有貪心不治貪故非離貪心此二心攝不盡文此二心攝不盡之言約一對付攝心不盡之過云事此釋尤分明也次論中唯舉不染汚心不舉離貪不相應餘嗔等相應染汚心者彼有嗔心等所攝故依有所濫且不舉之云事不可然若爾不可舉一分善心彼聚心等攝可有所濫故若爾會通之旨太不可然哉如何答攝心不盡之過總見十一對付之云事委前重成之畢若十一對各可攝盡心者聚心散心等八對是無攝心不盡之過哉但於今論並寶法師釋者不染汚心若不攝初對者以後諸對又不可攝之故終可為十一對不攝心故上就初對顯不攝義欲總成十一對不攝之義也次於不可舉難一分善心聚心等攝故云難者今初三對一具舉難之故於初三對中可有濫且除之故不舉嗔等相應染汚心於一分善心者雖聚心等所攝初三對中無所濫所不攝法故舉難之也問論中釋十一對心中散心云法與散動相應起故文爾者光法師如何釋此文耶進云光法師釋云散動即是散亂異名體即是定文付之定者心一境性法也散亂何以定可為體哉是以無明不以慧為體不信不以信為體相例可同如何答見今論餘處四文釋本論所説心亂云染汚等持名為心亂文婆沙論中或四十二云心亂即彼三摩地文或云四十三應知此中有二種三摩地一染汚二不染汚染汚已名三摩地亦名散亂文此文散亂以定為體云事分明也故光法師依此等論判意釋散動即是散亂異名體即是定約相續位數散動故立散動名也但於定是心一境性法也散亂何以定可為體哉云難者定心所一剎那中雖一境恆住多剎那間於境轉易故以剎那相續其義不同一體之上得立定及與散亂之二名也故光法師釋云如三摩地一剎那中於境恆住有時若與掉舉相應令多剎那於境轉易説名為亂文次於無明不以慧為體云例難者光法師問答此事云問定能除散動散動定為體智慧遣無明無明慧為體解云約相續位説定散動若約剎那定不散無明不爾相續剎那皆無智故故體非慧文次不信不以信為體云例難準之可會也重難云一剎那中於境恆住故雖名定多剎那相續之時於境轉易故名散亂者一剎那中於境決斷故雖名智多剎那相續之時於境猶預故即以智可為疑體哉是一況一剎那中既於境有恆住性設雖多念相續更依定心所不可成散動之義而令定於境轉易是與掉舉相應故尤以掉舉可為散亂體哉是二加之今論中釋十一對中定心不定心云不定心者謂染心散動相應故定心者謂善心能治彼故文光法師釋此文云謂能治彼散動之心即是定心故婆沙云不定心者謂染汚心散亂相應故定心者謂善心等持相應故文任此文是不定心相應散動還可以定為體哉是三答無一剎那中於境恆住之義者多剎那相續之時更不可有於境轉易之義所以然者於境既無恆住義望何可有轉易義哉若爾更散亂義不可成而定心所於一剎那中有住境義故多剎那相續之時有轉易之義故散亂終以定為體也但於智慧者一剎那中雖有決斷義依此決斷多念相續之時非成猶預性猶預剎那相續俱猶預性而與決斷義相違故以智不為疑體也如此了簡之時初二難勢皆以被遮畢次於釋定心不定之文者定心者非散心相應定心所是以定中名定心也對之染汚相應定心皆名散動名不定心也全非相違也問經部宗意聚心可限眠相應耶答可限眠相應也兩方若限眠相應者今論中經部師釋聚心相引經文云經言此心云何內聚謂心若與惛眠俱行或內相應有止無觀文如此文者聚心不限眠相應見若依之爾者今論云西方諸師作如是説眠相應者名為聚心文聚心限眠相應云事此文尤分明也如何答經部宗意聚心可限眠相應也是以今論云西方諸師作如是説眠相應者名為聚心文毗婆沙師難此義云又應違害本論所言如實知聚心具足有四智謂法智類智世俗智道智文經部宗意若聚心不限眠相應通餘心者更不可違本論文毗婆沙師豈可致此能破哉隨經部師救此能難云寧違論文勿違經説文自宗義若不違本論文者豈可云寧違論文哉加之婆沙論百五十中述經部師義云健馱羅國諸師言眠相應心説名為略心以世尊説眠名心略故如契經説云何眠夢謂眠夢位略聚心文此文明引以眠位名略心之契經説證眠相應心名略心之義任此等論判聚心唯限眠相應心云事尤分明也但於云何內聚謂心若與惛眠俱行或內相應有止無觀之經文者此文廣雖説內聚取其中眠俱行心名內聚之邊證十一對中之聚心也故於婆沙論所引契經文者述云何眠夢謂眠夢位略聚心偏説眠相應心名略心明知今論中經部師引云何內聚等經文偏取眠俱行心名聚之邊也何況今經內聚中所舉法皆是聚心者又外散中所舉法皆可散心若內相應有觀無止等法是散心者散心能知智更不可限世俗一智若爾何故婆沙論中出經部師意略心散心能知智云略心散心等一智如實知謂世俗智哉又今論等中何不難汝散心不限染汚心者不違本論中出散心能知智中唯舉世俗一智之文哉任此等義相思之今經中所舉法悉不可云聚心散心云事頗炳然也重難云寶法師釋又應違害本論所言如實知聚心具足有四智謂法智類智世俗智道智之論文云即違本論類智道智二智知也類智知上界道智知無漏道故文任此釋彼經部師此智知聚心見若爾聚心豈可限眠相應哉答寶法師具釋云若謂聚心是眠相應是即唯欲界有漏心即違本論類智道智二智知也類智知上界道智知無漏道故文已云若謂聚心是眠相應是即唯欲界有漏心聚心唯限眠相應云事分明也但不云違法智知事實今所舉法智道法智故雖可云違聚心法智知之文總見法智之時知欲界境故聚心又欲界法故且不云違法智知之文而唯舉無濫類智道智歟委論之時可舉法智也問有貪心離貪心等為他心智所緣歟進云今論疏中他心智緣有貪心等判也付之知有貪心者知心有貪義也專心與貪一時緣之時可知其義而他心智心心所各別緣之如何可有如實知有貪心義哉是以婆沙論百九十中云如實知有貪心此一智謂世俗智如實知離貪心此四智謂法類世俗道取詮全不出他心智也何況光法師所引婆沙論中雖聚心能知智舉法類世俗道四智略心能知智舉世俗一智更無舉他心智例可同哉如何答他心智廣緣他有漏無漏心心所法設雖有貪心等何不緣之哉是以見今論文上述他心智心心所一一別緣之旨畢次問若爾何故薄伽梵説如實了知有貪心等答此問云非俱時取食等及心如不俱時取衣及垢文光法師釋此文云若他心智心心所法一一別緣何故佛説如實了知有貪心等準此經文貪等與心俱時取也文次釋答文云如取衣不取垢取垢不取衣取食等心前後別取非俱時取也文此等定判他心智知有貪心等云事太分明也但於他心智心心所別知故如實難知有貪心等云難者他心智雖心心所一一別知如實了知所緣境相之時設雖一念不合緣貪心一念心所備之諸義明知此一心之時皆可知之故雖心王心所差別緣之可知有貪等義也次於婆沙論中有貪心等能知智中不舉他心智云難者實可舉他心智然不舉者依別意趣也故光法師解釋中上引婆沙論第百九十卷略心如實知略心此四智謂法智類智世俗智道智散心如實知散心此一智謂世俗智此隨所應如前釋之文畢云婆沙前卷釋云問何故此中不説他心智答他心智知他相續心心所法此中如實智知自相續心心所法是故不説復次他心智知現在心心所法此中如實智知過去心心所法廣如彼釋文準此文可思有貪離貪心能知智中不舉他心智也若爾聚心散心能知智中不舉他心智今文委釋之故彼文有別故且不舉之也實廣論能知智之時聚心散心文可出他心智也爾者聚心散心能知智不舉他心智云例難自被遮畢重難云他心智實知有貪心等者以貪所繫名有貪心云第二師意如何可會然他心智不緣貪得亦不可説緣緣心貪寧知他心是有貪等故非貪繫名有貪心之論主難哉答第二師意論主能難尤難遁歟學者爭暗可測之哉但彼師意一念心體上貪繫不繫之義相備而可在之設雖不緣心之能緣貪此心貪所繫耶非貪所繫耶其堺畔心上義而可備之故猶可會知有貪心等義歟四聖坊越前得業草也覺杲新講師卷
