説為正判麟喻獨覺所起他心智不知麟喻獨覺心云事此解釋尤分明也但於今論麟喻獨覺知見道心云文者且就容有談之歟次於婆沙論麟喻獨覺亦定得緣麟喻獨覺他心智亦説現起之文者光法師既判不正義之上者不及劬勞之也尋云不得麟喻獨覺緣麟喻獨覺他心智云師意麟喻獨覺知見道心者知誰人心乎答問今論意麟喻獨覺他心智可知見道四念心耶進云今論中述二三念一切麟喻獨覺唯判知見道三念心也付之麟喻獨覺起他心智用五念加行見若爾知第八心畢更五念加行滿何無知第十四念之義哉尤可云知四念心也依之見正理論七十三文云有説麟喻知四剎那謂初二心第八十四此言應理文設雖今論意何不許此義答今論中述麟喻獨覺他心智知見道心偈頌云聲聞麟喻佛如次知見道二三念一切長行述麟喻法分加行若滿知彼見道初二念心若為更知類分心故別修加行至加行滿知彼第八集類智心以此但由下加行故有説知初二及第十五心雖舉二説俱云知三念不舉知四念之義明知今論意不存知四念之旨云事但於知第八心畢更五念加行滿知第十四心者何無知四念義哉云難者光法師釋此事作四解釋即彼釋云解云欲知亦得而不知者見道位心總有二分一法分二類分知初二念是法分如第八念是類分既具知二其心萎歇故不更知又解欲知亦不得初修加行知初二念第二復以五心為加行知第八心至第三更修加行其力微劣以五六心為加行不能成也又解前心稍劣五心加行即能得知後心漸勝以五六心為其加行不能知也又解知初二念已意欲知彼第三苦類忍心五心加行至加行滿乘知第八集類智心以彼第三第八所緣苦集一物因果義分知時即易雖不能知第三能知第八知第八已更欲知彼第九滅法忍心用五心為加行不知第十四道法智心以彼二心所緣各別一緣有為一緣無為非是一物知時即難故不能知設用六心為其加行亦不能知第十五心文任此解釋可思其意也次於正理論説者論師所存各別也不及和會之故光法師引正理論今文畢云正理故違此論即取第三文尋云今論二師中以何師為正義耶答禪那院云以初師可為正歟又正理論中上如次舉今論初二師畢次述第三師義云有説麟喻知四剎那謂初二心第八十四此言應理所以者何許從知初二念心已唯隔五念知第八心若復更修法分加行經五念頃加行應成何不許知第十四念文此文閣第二師難初師而光法師引此文畢云正理故違此論即取第三文以之思之今論意初師為正見又尋云正理師意如以知四念云師為所存歟答正理顯宗兩論中俱評取知四念云師也難云若爾何故顯宗論中不改二三念一切之偈頌耶答顯宗論中長行中雖評取之不改偈頌常有之歟即問我已知苦等四行相即我生已盡等四行相歟答暫可各別行相也兩方若各別行相者同盡無生智後得智所作行相也何可云各別行相哉況彼兩種之行相名言雖不同難之其義門有異哉若依之爾者既諸論各別舉之尤可各別行相也如何答我已知苦等四行相與我生已盡等四行相同異事諸論説相幽玄暗雖難測其實義先案兩種之行相其四種行相之相頗難全同歟凡觀行者依先加行位要期意樂各別證羅漢果之後至後得智中所作之行相我已知苦等與我生已盡等兩箇四種行相是異歟所謂觀行者先加行位謂我當證羅漢果之時要應起於四諦理已知已斷已證已修之審察智依此意樂力證果之後至後得智中作知我已知等不應更知等之行相分別盡無生智之差別也是以正理論七十三中釋依先加行要期心作我已知苦等四行相云諸觀行者本修行時定起如斯要期意樂謂我當證阿羅漢時要應起此自審察智故今出觀此智必生為令此生所起之智隨應建立盡無生名文又觀行者先加行位起如此欣求意樂謂云何當令我生永盡乃至云何當更不受後有而證果時彼所欣求已果遂故至後得智中作我生已盡等之行相自生慶慰也故婆沙論二十九中釋依先加行意樂有我生已盡等行相云一由意樂謂加行時起此意樂云何當令我生永盡廣説乃至不受後有文依先加行意樂不同兩箇四種行相各別作之云事今正理婆沙論文分明歟況見婆沙論二十九文問十六行相外有無漏慧不若無者品類足論復云何通如説云何盡智謂如實知我已知苦已斷集已證滅已修道云何無生智謂如實知我已知苦不復知乃至我已修道不復修如是二智何行相檢契經所説復云何通如説實可知我生已盡梵行已立所作已辨不受後有是何行相取要若我已知苦等四行相即我生已盡等四行相者何引經論文各別可舉難之哉隨答此問之時各別儲答若同行相者兩段各別可答之哉同論第百二卷有此問答其旨如問答任此等文我已知苦等與我生已盡等各別行相云事分明也但於同盡無生智後得智行相何可各別哉云難者雖同盡無生智後得智行相意樂各異故各別作之何有所背哉次於兩箇四種行相名言雖異難之其義有異哉云難者兩箇四種行相相望之時我已證滅我已修道與梵行已立所作已辨雖似其義不異引彼兩箇四行相先加行意樂其趣異故所引行相中雖有相似更不可混亂也問正理論意得非擇滅時無生智轉可云耶答不可云正得非擇滅剎那無生智轉也進云光法師所引正理論七十三云得彼滅時此智方轉文付之或於煩惱或於生得非擇滅者尤可在金剛心位若爾得彼滅之時爭可有無生智轉之義哉是以見婆沙論三十二文述或於煩惱或於所潤生得非擇滅云若不起定者離非想非非想處染加行道時得非擇滅若起定者至第九無間道時得非擇滅云云兩處之文取意抄之設雖正理論意何可許得非擇滅之時無生智轉義哉如何答披婆沙論第三十二卷或述煩惱非擇滅得時云聖於修道不退法者離欲染時不起定者加行道時於欲界修所斷煩惱得非擇滅若起定者隨至彼彼無間道時得非擇滅乃至離非想非非想處染隨所應當説文或述生非擇滅得時云不退法者離非想非非想處染時不起定者加行道時於非想非非想處一生得非擇滅若起定者要至第九無間道時於非想非非想處一生得非擇滅文任此等文得煩惱並所潤生非擇滅無至金剛心以後設雖正理論意更不可背此理若爾正得非擇滅之剎那更不可有無生智轉義也但於正理論得擇滅時此智方轉之文者時解脫聖者金剛心位不得煩惱非擇滅故無無生智起義對之不時解脫聖者金剛心位得彼滅故得無生智起故云得彼滅時此智方轉也全非云正得彼滅之剎那即此智方轉也問無生智後得智可緣非擇滅耶答可緣非擇滅也兩方若緣非擇滅者見婆沙論二十九文釋我已知苦不復更知等行相云實知我已知苦不復知者緣苦二行相攝謂苦非常我已斷集不復斷者緣集四行相攝我已證滅不復證者緣滅四行相攝我已修道不復修者緣道四行相攝文此文已以盡無生智後得智攝屬四諦智定知不可緣非擇滅云事若依之爾者見光法師所引正理論文會有餘於此作是難言若詫無生名無生智則無生智緣非諦法是則所説違害自宗之難云彼不審察設此難詞我上已言於出觀後方起如是分別智故文此文分明無生智後得智緣非擇滅見如何答無生智後得智作不復更知等解故兼可緣非擇滅云事道理尤必然也即一方難所舉之正理論文其旨實分明哉但於婆沙論配釋四諦智之文者入觀之時於盡無生智上有我已知苦不復更知等之理故出觀之後得智中作此分別也故觀內四諦智中義分而備之故以我已知等判屬四諦智也正出觀之時所作之我已知苦等之行相非云即四諦智攝歟問光法師意依身欲界依無色界證羅漢果人無生智現前位可緣非擇滅得耶答不可緣之也兩方若緣之者非擇滅得隨命根衆同分判性類若爾彼得定可欲界繫何無色界心可有緣欲界繫法之義哉況又不背初唯苦集類之理哉若依之爾者光法師所引正理論中會若詫無生名無生智則無生智緣非諦法之難云或許此智緣無生得此苦諦攝非非諦故文若彼位無生智不緣非擇滅得者此釋意約彼位如何可會有餘之難哉如何答依身欲界依無色界證羅漢果人無生智現前位不可緣非擇滅得也其理即如一方疑難之趣但於光法師所引正理論文者或許此智緣無生得之釋意有餘付詫無生云言若爾無生智可緣非諦法難故為救此難詫無生者緣無生得也全非緣非諦法救許也一切時無生智皆非云緣無生得也但彼位無生智雖不緣非擇滅得緣無生得之智種類故詫無生名無生智云事全不可有相違也問論文云然説見言乘言便故或於諦理現照轉故文爾者光法師意今此文為有部會通為當經部釋歟答光法師意有部會通可云也兩方若有部會通者見論文上云有説無漏智亦作如是知文光法師釋此文云西方沙門經部等計文鄰此文云然説見言乘言便故或於諦理現照轉故文文相起盡無諍可云經部師義哉是以見寶法師解釋一具牒具此文畢云述異釋也文若依之爾者盡無生非見者專薩婆多宗所談也而本論中於盡無生智説見言故為會之云然説見言乘言便故等定是可有部會通哉如何答光法師意然説見言乘言便故等之論文專有部會通可云也所以然者有宗意定盡無生非見而本論中於盡無生智説見言故專所可痛也依之會然説見言乘言便故等是非有部會通哉故光法師於有説無漏智亦作如是知之文者雖判西方沙門經部等計於然説見言等文者只云通本論文不云經部計定知不存經部師釋云事何況見正理論七十三文問是不二智非見性攝如何乃言智見明等答有作是釋乘言便故等此則就薩婆多自義中致今問答明知今論然説見言等文非經部義云事但於鄰有説無漏智亦作如是知之文云然説見言等故可經部義云難者雖文相相續更不可云一師義見論文上引本論文畢致如何無漏智亦作如是知之問難釋此問難舉二師説所謂迦濕彌羅諸論師説從二智出後得智中作如是知故無有失者薩婆多宗義也有説無漏智亦作如是知者述經部宗義也已上二師義畢後然説見言等者又還薩婆多宗本義會本論文故以鄰次即不可云經部義也次於寶法師解釋者以文相鄰次一具牒之判述異釋也此則人師異釋也更不及和會矣問無生智與盡智可為同類耶答可為同類因也兩方若為同類因者同類因名等勝為果之義無生智與盡智何可為同類因哉是以見光法師解釋云或彼盡智非無生智為因故生不名因圓文加之披今論餘處六文云諸無生智唯與等類為同類因更無勝故文此等文無諍無生智與盡智不為同類因見若依之爾者正理論中見修無學三道互為同類因見準而思之無生智與盡智何不為同類因哉答無學勝進道位九智十智隨應現修者今論疏定判也若爾已生無生智與可生不生盡智尤可為同類因也故正理論七十三云謂有盡智非無生智為因故生無無生智不以盡智為因故起文謂有盡智非無生智為因故生者指初盡智也翻之思之有盡智以無生智為因故生云事尤分明也但於可背等勝為果之義云難者同是第六種性無學所得盡智無生智也何可有勝劣差異哉次於光法師解釋者無生智必以盡智為同類因盡智之中有以無生智不為同類因之類故如此云也次於今論餘處文者暫據一相漸次進修之類云唯與等類為同類因也以實云之無生智與盡智為同類因之義可有也問離繫得能證道唯限無間道歟答唯限無間道也兩方若唯限無間道者離繫得能證道種類萬差也何唯限無間道哉是以光法師所引婆沙論百五十八中以滅道法智離色無色界修所斷染時所得無漏離繫得類智品攝判若隨能證無間道判性類者寧非法智品攝哉何況道類智位及初盡智位所得離繫得隨無間道判性類者是不見道修道雜亂學無學道混濫哉若依之爾者婆沙論百五十八中判離繫得性類云擇滅得隨能證道性類差別以諸擇滅自無作用但由道力求證彼時引彼得故文此文意由道作用引起離繫得名能證道故能證道唯限無間道云事分明也如何可見次下論義問唯隨能證道判離繫得性類歟答唯隨能證道判離繫得性類也兩方若唯隨能證道判離繫得性類者離繫得種類萬差也何唯隨能證道可判其性類哉是以光法師所引婆沙論百五十八中以滅道法智離色無色界修所斷染時所得無漏離繫得類智品攝判若隨能證無間道判性類者寧非法智品攝哉何況道類智位及初盡智位所得離繫得隨能證道判性類者是不見道修道雜亂學無學道混濫哉若依之爾者已於離繫得有能證之功尤隨能證道可判性類哉依之披婆沙論百五十八文云擇滅得隨能證道性類差別以諸擇滅自無作用但由道力求證彼時引彼得故文唯隨能證道判離繫得性類云事此文尤分明也如何答能證道者是無間道也彼道現起能斷惑障與離繫得為同類因能引起離繫得故名能證道故唯隨此能證無間道所判離繫得性類也是以婆沙論百五十八云擇滅得隨能證道性類差別以諸擇滅自無作用但由道力求證彼時引彼得故文隨能證道判性類事立理釋成之旨此文尤分明也更不可異求之況見今論餘處四文云若有學道所引擇滅得即有學若無學道所引擇滅得即無學文此文亦隨能引無間道判性類之旨分明也光法師釋此文云若有學道所引擇滅得即有學隨能證道是有學故若無學道轉根時所引擇滅得即無學隨能證道是無學故文解釋文炳焉者哉加之見婆沙論百五十七文或明有漏離繫得界繫云擇滅者謂欲界下三靜慮五蘊擇滅彼世俗道類得皆色界繫以下地擇滅有漏得皆上地近分攝故文若有隨能證無間道不判性類之義者下地法上擇滅有漏得是不通上地根本地攝哉或百五十八述欲界見修所斷法無漏離繫得唯未至定攝義云評曰此中初説為善諸離繫得必由斷對治力所引起故文若有隨能證道不判性類義者是為成唯未至定攝義可儲必由斷對治力所引起故之由哉但於光法師所引婆沙論中以滅道法智離色無色界修所斷染時所得無漏離繫得類智品攝云文者以實云之彼無漏離繫得可法智品攝故婆沙論云若類智品攝亦不應理彼斷及得法智所證故文但評曰此中初説為善以類智品是彼不共決定對治故者論彼離繫得正性類雖是法智品攝由類智不共決定對治義邊且攝屬類智品中為言實是法智品攝故專順隨能證道判離繫得性類之義也次於道類智位及初盡智位所得離繫得者現起無間解脫道見道修道相替有學無學各別之時不隨現起無間道判離繫得性類道類智位未來修擬無間道修道攝道品初盡智位未來修擬無間道無學道攝道品故隨彼未來所修無間道判離繫得性類故無見修無學三道雜亂之過亦不背隨能證無間道判離繫得性類之理也重難云光法師所引婆沙論文會通之旨不可然以滅道法智離色無色界修所斷染時所得無漏離繫得實法智品攝者評家可嘆後説為善何判初説為善哉是一次道類智位及初盡智位隨未來所修無間道判離繫得性類云事甚難思以能證道名引因道而光法師餘處三解釋中引因義云引因謂同類因能引彼離繫得起為等流士用果文以未來所修道不可名引因未來無同類因故也是二何説婆沙論六十六中述有漏道證中間二果名沙門果舉尊者僧伽筏蘇説云以世俗道離染時亦修未來諸無漏道所得二果是彼果故亦得建立沙門果名文正義家破之云彼不應作是説所以者何未來聖道未有作用如何於彼此得果名文若以未來所修道為引因以離繫得為其果者可同僧伽筏蘇義勢是不蒙婆沙論正義家難破哉是三加之無間道是向道攝故得果位如捨之若道類智位及初盡智位未來修無間攝道品者寧無向果雜亂之過哉是四就中得果位未來修無間道攝道品云事論家定判人師解釋中未見其證據若無分明依憑者誰可信用之哉是五次勘婆沙論百五十八文云苦類智忍四得俱生三道得一離繫得苦類智忍與彼四得互不為因苦法智忍為四得因苦法智為三得因除苦法智忍得以加行苦法勝非劣因故有為法得隨法勝劣故文如此文者苦法智與苦類忍俱生欲界見苦所斷煩惱上離繫得為同類因見若唯隨能證道判離繫得性類者欲界見苦所斷煩惱上離繫得隨苦法忍可判其性類苦法智何與彼為同類因哉例如苦法智不與苦類忍俱生苦法忍得為同類因是六答光法師所引婆沙論意以滅道法智離色無色界修所斷染時能證引因現起無間道是法智故彼所引離繫得可法智品攝之理雖必然由類智是不共決定對治故以彼法智所引離繫得類智品中且可攝屬之義門傍亦有之法智品攝云後師説意不存此義門故評家雖判初説為善理實而言彼離繫得可法智品攝也次現起無間道與離繫得為同類因引起彼離繫得是其引因本故光法師餘處釋引因謂同類因也雖然修容起能證引因用未來斷對治道之時由彼所修未來斷對治道力引起離繫得故雖正不起能證引因用以彼未來所修斷對治道亦名能證引因道也故光法師餘處四釋各二離繫得之義云無漏道斷惑雖亦能引有漏得有漏道斷惑雖亦能引無漏得而非正引但是兼引故不互隨二道判性但隨自道彼能證道雖復不起然互相修而由彼力擇滅得起故各隨自能證道判文以未來所修斷對治道為能證引因隨彼判性類之旨此釋尤炳然也次於婆沙論中破尊者僧伽筏蘇説之文者僧伽筏蘇意未來所修無漏道實以中間二果為果云故正義家破之云未來聖道未有作用如何於彼此得果名也今以未來所修斷對治道為引因者由修彼道力得容為彼所引果離繫得故以彼為能證引因道判離繫得性類為言非云未來所修斷對治道正起引因用以離繫得為果異僧伽筏蘇意也次無間道是向道攝故得果位必捨之者長途所定也不可異求之今道類智位及初盡智位隨現起無間道判離繫得性類者可有大過故未來修擬無間道果道攝道品隨彼未來所修果道攝無間道判離繫得性類故向果二道全不雜亂也次得果位未來修擬無間道果道攝道品云事人師解釋中粗有所見故泰法師餘處二十一釋云今言一味者是一類義現實而得果之時修過恆沙四法四類對治智故得隨治道亦過恆沙法類得也文淨影大師大乘義章十七釋云言定體者須陀洹果聖德為體聖德不同泛論有三一是果體依如毗曇行修分別唯第十六道比智心是其果體得修分別通攝見諦十六聖心悉為果體文任此等定判得果位未來修果道攝無間道之旨分明也今論餘處二十四文云集斷得八智頓修十六行相即此意歟次隨能證無間道雖判離繫得性類離繫得者解脫道位始現起故其品類與解脫道同不可云隨無間道判其性類故品類自解脫道劣品類分齊既與解脫道同故苦法智與苦類忍俱生欲界見苦所斷煩惱上離繫得為同類因也有為法得隨法勝劣故苦法智不與苦類忍俱生苦法忍得為同類因其理尤可然文非相例歟問以滅道法智斷上二界修惑時所得無漏離繫得為法智品攝為當類智品攝歟此疑可見上論義問以滅道法智斷上二界修惑時所得無漏離繫得法類二智中何智所知可云耶答類智所知也兩方若法智所知者法智緣欲界四諦境而婆沙論評家意以彼得類智品攝定明知上界道諦攝法云事若爾法智何可緣彼得哉若依之爾者彼離繫得既法智所證也尤可法智所知何可類智所知哉是以見光法師所引婆沙論文難以彼離繫得可非類智品攝之時云豈不彼斷及得法智所證耶難可非法智品攝之時述豈不彼法及斷類智所智耶若彼得類智所知者何不云豈不彼斷及得類智所知耶可云彼法及斷哉以之知非類智所知云事如何答以滅道法智斷色無色界修惑之時所得無漏離繫得類智是上二界不共決定對治故隨彼類智品攝所定也故光法師所引婆沙論中嘆類智品攝云初師義云評曰此中初説為善以類智品是彼不共決定對治故文若爾彼得既類智品攝上界道諦所攝法也法智何可知之哉是以光法師所引婆沙論中舉初師義云有作是説彼離繫得類智品攝文難此師義云豈不彼斷及得法智所證耶文此師答今難云雖法智所證而類智所知故文任此難答之文彼離繫得類智所知云事尤分明哉但於彼離繫得已法智所證何可類智所知哉云難者彼得雖法智所證隨不共決定對治類智品攝定故為類智所知也次於婆沙論豈不彼法及斷類智所知耶之文者論所證之時斷與得二法正為其所證故唯舉此二法難豈不彼斷及得法智所證耶論所知之時上二界諸行並斷皆為類智所知故難之時述豈不彼法及斷類智所知耶也全非彼離繫得非類智所知故為簡之不云彼斷及得類智所知耶也若爾此文全非相違也問遠法師意無漏他心智以道智為加行云義光法師如何破之耶進云光法師違本論有學八智展轉相望皆容得作等無間緣之文破也付之於他心智有漏無漏二類之中設雖無漏他心智以道智為加行有漏他心智以餘七智為等無間緣者遠法師解釋更不可違本論文若爾光法師能破有何深意哉如何答光法師解釋中述遠法師義云遠法師云知他無漏心道智為加行故作道心行知他有漏心不以苦集智為加行所以不作苦集八行相文法師意有漏無漏他心智俱正知他心之根本終成之位有漏智也然知他無漏心之時以道智為加行剋論終成非道智然近道似道故約加行並似道之邊名為道智終成非正道體也知他有漏心之時不以苦集智為加行故加行終成皆是有漏故偏名有漏為體故有漏他心智不作苦集八行相無漏他心智作道四行相云也法師意既云有漏他心智不以苦集智為加行無漏他心智唯以道智為加行故漏無漏他心智俱無有苦集智無間生義故光法師破此義之時本論中既云有學八智展轉相望皆得作等無間緣此則非苦集智無間生他心智哉若爾汝云漏無漏他心智俱無苦集智無間生義豈不相違此本論文破也雖不見古筆迹任愚意記此一義了重可尋之問有漏他心智無間可生無漏他心智耶答有漏他心智無間可生無漏他心智也兩方若生之者見今論餘處二十八文云唯第四分能生無漏唯順決擇分生無漏定而婆沙論百六十七中明有漏他心智相攝四分定云此唯攝順住分文明知有漏他心智無間不生無漏他心智云事若依之爾者光法師破遠法師義云本論既言有學八智展轉相望皆容得作等無間緣文此文明於有學八智者無所簡展轉相望為等無間緣見依之見婆沙論百七文釋發智論他心智與苦集智為四緣云文云若有漏他心智與苦集智為所緣者定非因緣有漏不與無漏為因緣故文此文既雖簡有漏他心智與苦集智非因緣不簡等無間緣明知為等無間緣云事若與苦集智為等無間緣者豈可遮與無漏他心智作等無間緣之義哉如何答光法師破無漏