body:
  text: 俱舍論第二十六卷抄上問八忍不名智所以如何釋之耶進云今論云自所斷疑未已斷故文付之八忍已明觀諦理設雖自所斷疑未斷何不名智哉是以異生斷惑無間道雖疑得俱全無不名智又先離欲四法忍雖自所斷疑已斷非名智若爾何以自疑未斷之所以可成八忍非智之義哉加之以疑相應慧名智見八忍何依疑得俱可痛名智哉何況八忍雖自所斷無明未斷猶名見相例可等哉如何答八忍雖觀諦理無漏慧真對治若一分帶能障之時猶不名智故八忍自所斷疑未斷故依疑得俱不名智也故今論云此聖慧中八忍非智性自所斷疑未已斷故文光法師釋此文云八忍起時與自所斷疑得正俱爾時正斷敵對相違未已斷故而非決斷故不名智文但於異生斷惑無間道雖疑得俱猶名智並先離欲四法忍雖自起已斷不名智云難者光法師會此疑云雖先離欲四法忍位自起已斷是疑得俱忍流類故故亦非智異生斷惑諸無間道雖疑得俱非真對治非極相違後容退故而得智名文次於疑相應慧猶名智何不名智哉云難者光法師釋此事云與疑俱慧相順同緣於境決斷亦名為智文次於八忍雖自所斷無明未斷猶名見云例難者光法師會此例難云疑有相應無明助疑得有力能違忍獨頭無明無惑助忍與彼得俱可説名為見若言亦有相應無明今言助者據別剎那文諸難解釋光會之上者末學更不可及劬勞者也重難云疑相應慧名智獨頭無明相應慧不名見則知疑障決斷其用劣無明障推度其用強云事若爾獨頭無明設雖無惑助八忍與彼無明得俱何可名見哉是故見光法師餘處二解釋述獨頭無明覆損慧故彼相應慧不見云其過尤重過二煩惱文已其過重過二煩惱其得何不障八忍推度之義哉加之光法師餘處二十一解釋中述以無明不立蓋云等荷擔者立諸蓋中無明於中所荷偏重是故不立若立無明為一蓋者一切煩惱所荷障皆合比無明猶不能及設雖有相應無明助疑煩惱中是可勝獨頭無明哉抑若言亦有相應無明等之解釋其意如何答疑相應慧名智無明相應慧不名見者疑猶豫不決而障決斷雖非劣於無明障見於剎那有相順同緣於境決斷之義故猶名智無明相續剎那同癡暗都無推度義故無明相應慧不名見也次於其過尤重過二煩惱之釋者獨頭無明障相應慧親強故雖不令相應慧見障不相應忍疏遠故不及有惑助故八忍名見也依障相應慧之邊釋過二煩惱也次於等荷擔者等之釋者以一無明望一疑等煩惱之時無明廢暗蓋覆之用過餘煩惱其上又無明通與一切煩惱相應故其數越餘煩惱所謂且於苦諦所斷十隨眠中獨頭無明是其一又相應無明與餘九隨眠相應故無明數過餘惑故釋合比無明猶不能及也次於若言亦有相應無明等釋者雖有學者異義且一義云若言亦有相應無明者牒伏難也伏難意云於無明有相應無明彼與餘惑相應故彼相應無明蒙餘惑助可障見何八忍可名見哉為言今言助者據別剎那者救難也意云今言助者別頂起蒙餘惑助之義也相應無明隨從起雖助餘惑非蒙餘惑助何有餘惑助哉為言問光法師意不共無明相應慧可名見耶如第二卷明思抄與上論義表裏也仍略之問八忍名見所以如何釋之耶進云今論云可見性攝推度性故文付之八忍無漏真慧明觀諦理何可有推度境之義哉依之見光法師餘處二解釋釋計度分別云計度推度名異義同文而計度分別唯限散位非定中明知於定中無推度義云事加之披婆沙論四十二文云若在定者曰雖亦有慧非推度分別若推度時使出定故文此文又定中無推度義云事分別也如何答八忍明觀四諦理能審慮決度故名之為推度故判可見性攝推度性故也依之光法師餘處二解釋中問如定中有漏正見及學無學正見既無計度分別云何名見以計度分別唯散慧故答定慧雖非計度分別云能審慮決度故亦名見解釋意尤明也但於光法師餘處釋並婆沙論文者婆沙今文意以計度分別即名推度分別是則以分別籌度之義名推度也全非依審慮決度之義名推度推度名言雖是同其義頗各別也更不可混亂故光法師以婆沙論推度分別對今論計度分別判計度推度名異義同也更不可令亂當處推度性故之文者也問意識相應有漏善慧中可有非見類耶答不可有非見類也兩方若有非見類者見光法師解釋述有漏慧中見類云及意識相應世俗正見文已無簡別之言明知意識相應有漏善慧中無非見類云事若依之爾者意識相應有漏善慧是廣何無非見類哉是以見本論文衆事分第八於四念住於見處非見之句云謂見所不攝有漏緣身慧及五識相應緣身慧文已五識相應慧之外別學有漏慧明知意識相應有漏善慧云事如何答意識相應有漏善慧皆有推度義故悉名見更不可有非見之類是以見今論文云於中唯六亦是見性謂五染汚見世正見為六文光法師釋此文云於中唯六亦是見性推度性故謂身見等五染汚見及意識相應世俗正見為六文寶法師釋此文云除五識身相應諸餘善慧皆名為見即是世間正見攝也文加之撿正理論七十三文云諸有漏慧皆智性攝於中唯六亦是見性謂五染汚見世正見為六有餘師説能發身語五識所引及命終時意識相應善有漏慧亦非見性外門轉故如能引故勢力劣故此亦不然乃至故説所有意地善慧皆見性攝於理為善文顯宗論三十五文全亦同之任此等定判意識相應有漏善慧中無非見之類云事甚分明也但於意識相應有漏善慧是廣何無非見類哉云難者雖意識相應有漏善慧是廣悉是推度性故不可有非見之類也次於衆事分文者謂見所不攝有漏緣身慧之言譯者之謬也故考同品異譯品類足論文出此句云謂五識身相應善慧更無舉餘有漏慧加之次下出俱句體云謂世俗正見文明知上句中有漏慧者謬加之云事若爾更不可有相違也重難云設雖意相應有漏善慧於微劣善心者不可有推求猛利之義何可名見哉依之於意識相應無覆無記慧者不名見其義尤可同哉若即微劣猶名見者無覆無記心何不名見哉是一況盡無生智後得智尤可非見性所以然者已觀內之盡無生智非見性故出觀之後得智亦可非見性若觀內非見性後得智見性者是見與非見不相違我依之依後得智非我生已盡之行相觀內離空非我見例可等耶是二答設雖微劣善心其性已善故望無記其性猶強勝也故猶有審慮決度之義故名見也無記其性中庸無審慮決度之義故不名見也故光法師餘處二解釋中釋此事云謂意地異熟生等四無記慧其性中庸勢力羸劣而非猛利如不成善不成染汚故不成見文次於盡無生智後得智可非見性云難者盡無生智三乘所期果故至彼位必有息求義故非見性後得智非所期果故更不可有息求義何非見哉但於後得智非我生已盡之行相觀內離空我云例難者我無我正所作之行相故若令返者尤可有相違見非見非所作之行相設雖無違有何痛哉若如是令一切事同者是觀內後得可有有漏無漏之不同哉問苦集類智可緣欲界斷道耶答可緣之也兩方若緣之者既欲界能治也苦集類智如何可緣之哉是以道類智不緣欲界斷道例可同哉若依之爾者見今論文云法類二種如其次第以欲上界四諦為境無所簡類智廣緣上界四諦境定若爾苦集類智何不緣欲界有漏斷道哉如何答苦集類智緣欲界斷道云事其旨即如一方疑難加之考婆沙論九十一文或述女男苦憂根斷道緣緣識為所緣縛非相應縛之類云色無色界道諦所斷有漏緣無色界遍行及修所斷隨眠文若苦集類智不緣欲界斷道者何色無色界道諦所斷有漏緣隨眠於彼四根斷道緣緣識為所緣縛之義可有之哉或九十二述女男苦憂根斷道緣緣識成就不成就之相云一切有情皆成就文若苦集類智不緣欲界斷道者依身識處已上之人異生何可成就彼四根斷道緣緣識哉此等之苦集類智緣欲界斷道云事尤分明也但於道類智不緣欲界斷道云例難者道類智自元不緣法智故全非相例矣重難云婆沙論百九十云離嗔心如實知離嗔心此三智謂法世俗道此中依近對治説故不説類智文類智不知欲界近對治無間解脫道云事此文尤分明也是一加之又婆沙論九十二中述女男苦憂根斷道緣緣識所增隨眠成就不成就相云未離空無邊處染成就已離空無處染不成就文若苦集類智緣欲界斷道者設雖已離空無邊處染何不成就彼四根斷道緣緣識所增隨眠哉是二答於婆沙論中離嗔心能知智不舉苦集類智之文者見次上卷百八十九文云問此中復何故不説苦集智耶有説此中亦應説苦集智而不説者當知此義有餘有説苦集智是厭行相智此中如實智是欣行相智是故不説文任此文自本此中如實智不舉苦集智故今更不可簡苦集智故知此中依近對治説故不説類智者為欲界遠對治之加行道等位道類智可現前故彼離嗔心能知智雖可舉道類智今依無間道等近對治説故不舉道類智為言全非云苦集類智不緣欲界有漏近對治也次於婆沙論已離空無邊處染不成就之文者暫就有漏緣識論緣緣識所增隨眠也故見婆沙論一段之文上云女根斷道緣識所增隨眠未離色界染成就已離色界染不成就唯舉有漏緣識明隨眠隨增相畢乘之下明緣緣識所增隨眠故云未離空無邊處染成就已離空無邊處染不成就也兼就無漏緣識論緣緣識所增隨眠之時已離空無邊處染人可成就之云事更非所遮也重難云婆沙論已離空無邊處染不成就之文就有漏緣識論緣緣識所增隨眠云事不可然見婆沙論次上卷九十一文或云眼根緣識所增隨眠未離空無邊處染成就已離空無邊處染不成就緣緣識所增隨眠未離無色界染成就已離無色界染不成就耳鼻舌身根緣識及緣緣識所增隨眠亦爾文此文通就無漏緣識論緣緣識所增隨眠見若唯就有漏緣識論之者是云眼根緣緣識所增隨眠未離無色界染成就已離無色界染不成就哉是一或云眼根滅緣識所增隨眠未離色界染成就已離色界染不成就緣緣識所增隨眠未離無色界染成就已離無色界染不成就耳鼻舌身樂喜根滅緣識及緣緣識所增隨眠亦爾文此又通就無漏緣識論緣緣識所增隨眠云事分明也其旨如上文是二若爾明隨眠增相故就有漏緣識明緣緣識所增隨眠云事是不違此等文哉答婆沙論中明諸根等緣識緣緣識所增隨眠之文非一準或唯就有漏緣識論緣緣識所增隨眠或通就無漏緣識論緣緣識所增隨眠也所詮一段論文不必盡理歟問苦智唯知苦聖諦法歟答唯知苦聖諦法也兩方若唯知苦聖諦法者苦集一物因果義分者性相之所定也苦智何唯知苦聖諦法哉是以見今論文述十智建立云三行相故立苦集智此二智境體無別故文若苦集二智所緣別者何偏依行相可立苦集二智哉況衆事分十二云即苦諦所攝法非智知文此文無諍苦智兼知集聖諦法見加之品類足論十八云唯苦聖諦所攝法非隨眠隨增文以隨眠隨增思智品所知其義可同哉若依之爾者以道理思之苦智唯知苦聖諦法可云也答苦集滅道四智作各別行相深悟四諦各別之理故苦智作非常苦空非我四行相唯觀苦聖諦理不知集聖諦法集智作因集生緣四行相唯觀集聖諦理不知苦聖諦法也故品類足論十八云唯苦聖諦所攝法一智知謂苦智唯集聖諦所攝法一智知謂集智文前後之文取意攝之苦智唯知苦聖諦法集智唯知集聖諦法云事此文實分明也但於苦集一物因果義分理者有漏法必具為因為果義故苦集二諦雖其體一物無漏智品明差別因果義邊觀之故無苦智兼知集諦集智兼知苦諦之義也次於三行相故等今論文者苦集二諦其義異故雖述法類由境別立苦等四名其體是一物故不云由境差別立苦集智也次於衆事分文者是舊譯之謬也既背品類足論文更不可依用之次於品類足論文者煩惱於相應所緣之法隨增之時只縛彼法體無差別因果之義故設雖非遍行隨眠同於苦集二諦法隨增故云唯苦聖諦法非隨眠隨增也非如無漏智品明觀諦理故全非相例歟重難云見品類足論九文云苦集聖諦十八界十二處五蘊攝八智知除滅道智文如此文者苦集聖諦法各八智知除滅道二智見若爾是非苦智亦知集聖諦法集智亦知苦聖諦法哉是一加之見婆沙論百四十七文云謂苦智集智行相無雜所緣有雜滅智道智行相無雜所緣無雜文此文意苦智作非常苦空非我行相集智作因集生緣行相故彼行相雖無雜亂所緣苦集二諦其體一物故混雜互緣之見若苦智唯知苦聖諦法集智唯知集聖諦法者苦集二智所緣無雜寧云所緣有雜哉是二答品類足論文實雖難思暫會之者苦集二諦各別論者苦聖諦七智知除集滅道智集聖諦七智知除苦滅道智可云也然今合論苦集二諦故云八智知除滅道智歟次於婆沙論文者由苦集二諦其體一物之邊云所緣有雜歟故婆沙論百四十七中釋苦集二智行相無雜所緣有雜之相云離苦無集離集無苦故謂一一有漏事果義名苦因義名集即於一一有漏事中若智作苦等四行相轉名苦智若智作集等四行相轉名集智故苦集智行相無雜所緣有雜文問道法智可緣苦集滅三諦耶進云今論中云法類由境別立苦等四名道智唯緣道諦判也付之婆沙論十八中見道道法智位有知同類因不知彼所緣等四句不同之中出知彼所緣不知同類因之句云謂知未來四法智品文如此文者道法智緣苦集滅三諦見如何答分四諦智差別各別緣苦集滅道四諦境故也道法智何可有緣苦集滅三諦之義哉法類由境別立苦等四名之性相更不可疑之但於婆沙論文者具文云謂住見道道法智時有此四句知同類因不知彼所緣者謂爾時知過去苦集滅三法智品知彼所緣不知同類因者謂知未來四法智品知同類因亦知彼所緣者謂知過去道法忍品文於第一第三句者其義易知了簡第二句雖有學者異義暫可任婆沙抄解釋故彼抄二本云論云知彼所緣不知同類因者謂知未來四法智品者謂道法智不知自體故名不知同類因即此道法智緣未來四法忍及法智故名知彼所緣文此釋意云現在道法智與未來四法智品為同類因故名同類因未來四法智品與現在道法智為所緣故名同類因之所緣而現在道法智不知自體故名不知同類因然緣未來四法智品故名知彼同類之所緣云也如此了簡之時道法智全非云緣苦集滅三諦也重難云婆沙抄釋難思道法智位作此四句之時以自體望未來四法智品名同類因而為知彼所緣不知同類因句之事太難信哉是一次雜心論六中釋四諦智相云境界苦諦説苦智境界集滅道諦説道智文如此文者道智緣集滅二諦見是二答婆沙論中於一剎那頃知同類因不知彼所緣等四句欲分別之時舉道法智位而欲作立句數之日以道法智望未來四法智品為同類因事有其義勢故以之為第二句體何強可有疑哉次於雜心論文者禪那院一義云彼文具可云境界集滅道諦説集滅道智然唯舉道智者暫舉後也故阿毗曇心論四云苦諦境界故説苦智如是集滅道諦境界故名集滅道智文準此文可了簡雜心論文也尋云婆沙論中道類智位可有彼四句何唯出道法智位耶答暫出一位也實道類智位可有此義也準道法智位作此四句易知之問偈頌文云初唯苦集類文爾者為唯緣有頂苦集為當可通緣下地苦集耶答唯可緣有頂苦集也兩方若唯緣有頂苦集者金剛喻定廣通滅道法智初起盡智唯緣有頂苦集是無超緣多地之過哉若依之爾者見今論長行文云此二初生唯苦集類以緣苦集六種行相觀有頂蘊為境界故文唯緣有頂苦集云事論判尤分明也如何答有頂苦集從無始來未斷之今時創斷之故初起盡無生智先唯緣有頂苦集自生慶慰此位何可緣下地苦集哉若緣下地苦集者更非初唯苦集類之本意哉是以見今論文云此二初生唯苦集類以緣苦集六種行相觀有頂蘊為境界故文光法師釋此文云然此二智最初生時唯苦集類以緣苦集六種行相觀有頂蘊為境界故問何緣初位唯緣有頂苦集為境解云有頂苦集從無始來不能得斷今時創斷故先緣彼自生慶慰文寶師神泰圓暉等解釋其意同之任此等定判初唯苦集類者唯限有頂苦集云事甚分明也更不可異求之但於金剛喻定廣通滅道法智初起盡智唯緣有頂苦集是無超緣多地之過云難者凡於超緣可有念作意不念作意之二種不念作意之時雖超緣一地念作意之時超緣多地之義全不可遮之也故滅道法智無間所起盡無生智唯緣非想之苦集可有何相違哉重難云超緣通多地云事不可然見今論餘處二十八文云類智無間能生無色法智不然依緣下故文若有超緣多地之義者何法智無間不生無色等時哉即光法師釋此文述超有二種一者超定二者超緣此二種超俱至第三不至第四畢引婆沙論百六十五於中唯能超緣一地之文明知超緣者唯超一地云事是一何況光法師餘處所引婆沙論中明超定相云如不能越二地所緣超定亦爾故不入第四文而勘婆沙論百六十五説問何故不能超入第四答過殑伽沙數諸佛世尊及聖弟子超入諸定法皆如是故不應問既於超定唯超一地定同是超緣寧可超多地哉是二加之見婆沙論百六十五文云有説法智品但緣欲界及彼滅道緣欲界及彼滅道無間不得即緣無色地境以極遠故由此法智品非無色等無間緣文如此文者滅道法智無間爭可生緣有頂苦集初盡智哉是三答念作意之時超緣多地云事先重如成之但於今論餘處法智不然依緣下故之文者法智唯緣欲界境無色等至唯緣無色界境故法智無間生無色等至者頓超色界四地必可背不念作意超緣之相故法智無間不生無色等至也故光法師釋此文二十八云以法智緣欲界境無色等至緣無色境不可頓超色界四地故法智無間不生無色文滅道法智無間生緣有頂苦集初盡智事總見盡智之時或緣初靜慮或緣第二靜慮盡智法智無間現起事不背不念作意之超緣相故法智無間生盡智也其中念作意之時法智無間生緣有頂苦集初盡智事無其過也緣四靜慮空無邊處滅道之類智無間生緣有頂苦集初盡智準之可思次於光法師此二種超俱至第三等釋並婆沙論於中唯能超緣一地之文者依不念作意論之也故婆沙論云有説如所緣緣故唯超一謂觀行者不念作意於所緣緣唯能超一問云何觀行者於所緣超答彼由不念作意以初靜慮於九地境一一別緣於中唯能超緣一地文雜心論九云超越三摩提上下至第三及不念思惟於超緣亦然文彼論子注云不念思惟者率爾能緣超至三也文任此等論判超緣唯超一地者就不念作意論之云事尤分明也次於光法師所引婆沙論如不能越二地所緣超定亦爾之文者以不念作意超緣望超定之時超一地之義是同故云超定亦爾也全非遮念作意之時超緣多地之義歟次於婆沙論有説法智品但緣欲界等文者念作意之時超緣多地云義意不許法智無間生無色等至故此文更非疑也若法智無間生無色等至者必可背不念作意超緣之相故如此云也滅道法智無間生盡智中有不背不念作意超緣相之類故念作意時自亦滅道法智無間生緣有頂苦集初盡智有頂何相違哉一義云超緣不超多地者且就繫法論之也滅道是不繫法故滅道法智緣欲界滅道全非緣欲界繫故彼無間生緣有頂苦集初盡智更不背超緣之法也但就此義會類智無間能生無色法智不然依緣下地故之論文者法智唯緣欲界境無色等至唯緣無色境而苦集法智無間決定不可生無色等至滅道法智雖緣不繫滅道滅道法智以苦集法智為首故又不生無色心也以婆沙論二十八謂生上二界必不起法智以厭下苦集諦故不欲重觀既不觀下苦集亦不觀下滅道以滅道智用苦集智為上首故之文可為例證也於盡智者總見盡智之時緣初靜慮第二靜慮等之類有之故假令苦集法智無間生彼盡智事非理可遮之故亦滅道法智無間生緣有頂苦集初起盡智所不遮之也問未曾得他心智可知曾得心心所法耶答可有或未曾得他心智知曾得心心所法或不知云二義邊也兩方若未曾得他心智知曾得心心所法者光法師所引婆沙論九十九中雖述曾得他心智知曾得心心所法未曾得他心智知未曾得心心所法之旨未云未曾得他心智知曾得心心所法定知不知之云事若依之爾者未曾得勝曾得劣也何未曾得他心智不知曾得心心所法哉答此事雖難測暫盡推云義未曾得他心智知曾得心或未曾得他心智不知曾得心云二義邊隨義門可有其通局歟所謂以獨覺所起未曾得他心智可云知聲聞所起曾得心心所法餘乘相望之時其智用勝劣雲泥故曾得未曾得是不同類而雖似難知之以勝乘最勝品之智猶可知劣乘微弱之心也是以如來他心智知聲聞所起見道心之時如來他心智定可曾得如來無未曾得功德故見道心定可未曾得見道必念念未曾得故若爾餘乘相望之時是豈以曾得他心智非知未曾得心哉而又餘乘相望之時以未曾得他心智知曾得心事何理能遮之哉若就自乘中論之時未曾得他心智不可知曾得心曾未曾得是不同類而以勝劣不雲泥之智難知之故也是以光法所引婆沙論九十九云曾得有漏心心所法有十五種謂欲界及四靜慮各有下中上三品心心所法曾得有漏他心智有十二謂四靜慮各有下中上三品他心智此中初靜慮曾得有漏他心智下品者能知欲界三品及初靜慮下品曾得有漏心心所法如是展轉乃至第四靜慮曾得有漏上品他心智能知欲界及四靜慮各三品曾得有漏心心所法如曾得有漏他心智知曾得有漏心心所法未曾得有漏十二種他心智知十五種未曾得有漏心心所法亦爾文取意又婆沙論百云然他心智能知同類心心所法非不同類謂有漏者知有漏無漏者知無漏曾得者知曾得未曾得者知未曾得法智品者知法智品類智品者知類智品文此等文是暫就自乘中論之故不云曾得未曾得互知之也全非遮餘乘相望互知之邊也如此了簡之時總朿云之或曾得他心智知曾得心或未曾得智知未曾得心或曾得智知未曾得心或未曾得智知曾得心之四類不同可有之也重難云就自乘中未曾得他心智不知曾得心云事難思依何理能遮未曾得他心智不知曾得心哉依之勝地根位之他心智知劣地根位之心例可等哉是一次餘乘相望時勝乘未曾得他心智知劣乘曾得心者又就自乘中何勝根未曾得他心智不知劣根曾得心哉是二次獨覺未曾得他心智知聲聞曾得心者又獨覺曾得他心智知聲聞未曾得心哉否是三次婆沙論第百卷文標然他心智能知同類心心所法非不同類猶其所簡不同類中所舉有漏無漏法智品類智品之四種者互不相知事決定而無有改轉此一具所列舉之曾得未曾得依所望有互相知云事太難思哉是四次光法師所引婆沙論中偏就有漏他心智有漏心心所法分曾未曾得約無漏不分之其意如何是五答心心所法一實自相幽隱頗難現量證知故他心智證知之時有種種決定相其中曾得未曾得是不同類心故以自乘中智輒不知不同類心也但於勝地根位之他心智知劣地根位心云例難者雖上地下地異上地勝下地劣故於同類心中以上地勝智知下地劣心事何可為難義哉重意云以勝地根位望劣地根位之時只以勝劣為各別故勝智易知劣心依之能知之曾得未曾得相望之時其不同類之義非依勝劣分之只曾得種姓是異故名之不同類故今此不同類義互難知之也次於就自乘中何勝根未曾得他心智不知劣根曾得心哉云難者自乘中勝劣非如餘乘懸隔故猶不知之也次於獨覺曾得他心智知聲聞未曾得心歟云疑者佛最上利根故以佛曾得他心智雖知餘乘未曾得心獨覺其根不及如來故以獨覺曾得他心智難知聲聞未曾心歟次於婆沙論簡不同類心中於有漏無漏法智品類智品之四種者不相知事決定無改轉何一具所列曾未曾得又可許相知義哉云難者彼婆沙論所簡六種不同類心悉皆非舉一切時不相知之類設有時而云不同類心不相知之義者舉之故隨應有一切時不相知又時而不相知之類事何強可痛之哉次於無漏他心智不分曾得未曾得事上已就有漏分別曾得未曾得故準之可知故略不論之也一義云無簡別自乘餘乘若未曾得他心智欲知曾得心心所法者可知之然不知者起易起曾得他心智足知曾得心心所法何煩起難起未曾得他心智可知之哉故不云未曾得他心智知曾得心也是以光法師釋無漏他心智不知有漏心云無漏心勝難可知故有漏他心智不能知彼要起無漏心方能知彼所以知他無漏心作道下四行相有漏心劣易可知故有漏他心智足能知彼故不起彼無漏他心智所以者何有漏他心智從無始來數數修習起時即易無漏他心智從無始來不多修習起時即難有漏起易故知他有漏心還起有漏他心智無漏起難故知他有漏心不作苦集八行觀起易足知誰復捨易從難文以此釋可為其例證也如此了簡之時諸難皆被遮畢就此義重難答其趣只可如解釋問答可見彼解釋問答也此義宜歟問上地下品無漏他心智可知下地三品心耶進云光法師所引婆沙論九十九云上地下中品無漏他心智不知下地中上品無漏心心所法文付之上地勝下地劣也何上地下品無漏他心智不知下地三品心耶是以上地下品有漏他心智知下地三品心見相例可同哉如何答無漏三品者依根姓之差別分三品不同故以上地下品無漏他心智望下地中上品無漏心彼下地無漏心依地雖劣其根品勝故上地下品他心智不知下地中上品無漏心也但於上地下品有漏他心智知下地三品有漏心云例難者有漏心亦依三根雖分三品有漏種姓似而非真故一相續身中成就三品有漏心心所法其品類非有懸隔差降有漏繫地堅牢故依地上下其勝劣雲泥也故上地下品他心智知下地三品心也故光法師所引婆沙論中釋今例難云有漏無漏心心所法建立各異謂有漏心心所法依相續建立有一身相續中成就三品有漏心心所法無漏心心所法依根品建立無一身相續中成就二品無漏心心所法況有成就三者建立既別故知有異文尋云光法師所引正理論七十三云如何説一補特伽羅成就九品道斷九品惑此道差別九根有異由因漸增長後道轉增如次能令多品惑斷或諸種姓各有九品成一九品必不成餘故前後言無相違失文任此文於一種姓中成九品無漏心見若爾約此九品上地下品他心智可知下地三品無漏心耶答見光法師餘處解釋或云問如上忍現行未來下忍住不生法非等流攝應是剎那如何但取現忍解云苦忍名一剎那由具二義一者現行二非等流如不生下忍雖非等流而闕現行文此釋明上品忍與下品忍不為同類因見或六云若依德光論師解九地各能修九地聖道九九八十一種聖道展轉相望皆得為因此亦據同性同品應依九地修者説故得展轉為因文任此釋亦九地所修聖道互為同類因者付同性同品道論之若異品相望之時設雖上地所修設雖下地所修上品道與下品不為同類因見既同性內九品道相望之時上品與下品不為同類因準此思之上地下品無漏他心智不可知下地中品上品心也重案其理於同類因者上地道與下地道為同類因於他心智者下地他心智不知上地心是則為同類因之法上地猶不緣之況下地上品與上地下品不為同類因豈還有上地下品他心智知下地上品心哉此是無漏法真實種姓雖下地上品勝上地下品之故也重難云就一種姓內九品上地下品無漏他心智猶不知下地中上品心云事不可然同一種姓所成就九品也何上地下品他心智不知下地三品心哉是以於有漏心心所法者一相續身成就三品心心所法故上地下品有漏他心智知下地三品心定以之準知一相續身所成九品無漏心心所法也尤上地下品他心智可知下地三品心哉若雖一相續身所成就九品猶上地下品他心智不知下地中上品心者以一相續身成三品有漏心為其由成上地下品有漏他心智知下地三品心頗難得其理哉是一抑就有漏心心所法中可有殊加行生三品差降懸隔所謂如順決擇分善根等也彼位專修相應行地轉根止劣品種姓現行令起勝品種姓心故依不捨劣得勝雖一身成三品於其勝劣者雲泥也而於此乍許上地下品他心智知下地三品心於一種姓中無漏九品上地下品他心智不知下地中上品云事甚難思哉是二況今論中簡劣品他心智不知勝品心之時雖述於勝地根位未簡就同姓中九品下品等他心智不知上品等心若實不可知之者何論文一具不簡之哉是三加之光法師所引婆沙論九十九中雖述無漏心心所法依根品建立無一身相續