body:
  text: 俱舍論第七卷抄上問題問光法師意六因四緣作用可別耶問光法師意生等五因相攝四緣時作因緣攝增上緣攝二釋爾者何釋為正耶問無漏戒能造大種與所造戒可為因緣耶問通果心所依定與通果心可為因緣耶問初靜慮三釋中俱可有等無間緣非等無間緣法耶問眼識無間生眼識義可有耶問非定起意識於六識身耶問除命根外可有一體不相應行耶問經部意如來可有散心歟問今論意二無心定入心起等無間緣取果用可通過去耶問異熟長養眼各別發識歟問光法師意眼根與多眼識為通因事引今論第一卷何文證之耶問眼等五根望色等五境可具處事剎那三定耶問一念眼根唯發一眼識非多眼識所依者可有何過耶問光法師意識所依剎那定可通生相已前耶問寶法師意世第一法苦法忍相望所依剎那定義約何位論之耶問婆沙論意心心所如所緣有三定於所依有三定者引品類足論何文難之耶問論文俱有諸法未嘗為所緣文今此不為所緣俱有法中可攝隨轉色並同時得耶問光法師意起增上緣與取果用唯限增上果生相位耶問正理論意無想異熟等無間緣生歟問光法師意生等五因因緣增上緣中何攝耶問防定方便心者唯上地染汚心無間生下地善心歟問正理論意受生心與命終心為等無間義可有之耶問尊者妙音意無想天唯可有二剎那心耶問初靜慮不共無明無間起欲界善心義可有耶問光法師意二十心相生唯就意識論之歟問光法師意聲境可通威儀無記耶問光法師今解釋中釋工巧處心工巧之處故名工巧處工巧處之心故名工巧處心云云釋意約意識可有工巧處加行緣工巧緣工巧處起工巧處四義耶問無覆無記心望三性心時不相緣心可有多種耶問寶法師意生上三靜慮若起借識類悉自性無記歟問二十心相生唯依下地有捨受異熟一説意論之歟
