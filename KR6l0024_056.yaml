body:
  text: 俱舍論第十九卷抄上問題問論文云離隨眠業無感有能文爾者今此文為論造業時為當指感果時歟問論中明煩惱現起能為十事云五發業有文爾者今此發業有者可通善業耶問聖者可造引業耶問五見疑中可有迷事類耶問論中舉一箇問云此中何相見苦所斷乃至何相是修所斷文爾者光法師意問十隨眠五斷相歟問論中舉一箇問云此中何相見苦所斷乃至何相是修所斷文爾者寶法師意問十隨眠五斷相歟問修所斷隨眠可緣他身見惑耶問論文云若緣見此所斷為境名見此所斷文光法師釋此文作三解釋爾者第三釋意可攝他界緣惑耶問寶法師意身邊二見唯緣諦理歟問頌文云餘通見修斷文爾者唯限忍所容隨眠歟問婆沙論意有漏無明漏可立畢竟前行耶問婆沙論中明最初前行中見修不定句約異生聖者判五部通局爾者如何釋之耶問異生身中有漏無明漏中非唯見所斷唯修所斷見修不定三句所攝類可有耶問論文云有餘師説外道諸仙不能伏斷見所斷惑文爾者光法師意引婆沙論何文證此義耶問光法師釋六十二見中四遍常論云謂由天眼見諸有情死時生時諸蘊相續文爾者今此諸蘊相續者指未來蘊歟問異生可得死生智耶問菩薩可退自乘種姓耶問光法師引今論業品不退姓名堅文云或據天中故言不退文爾者今此釋意為唯限第六種姓為當可通前五種姓耶問欲界繫有漏法中可有非邪見所緣類耶問上界無覆無記心可緣虛空非擇滅名耶問光法師意邪行相智可通善耶問戒禁取可通集滅二諦所斷耶問外道所起戒禁取可通苦諦所斷耶問樂淨倒外可有見苦所斷見取耶問論文云有身中唯取我見以為我倒文爾者此師意我所見可有一向倒義耶問論文云有説我倒攝身見全文爾者光法師意今此有説意五見十二義中如何釋之耶問論文云有説我倒攝身見全文爾者今論意以此説可為正義耶問論文云要具三因勝者成倒文爾者今此勝者者三因外別因歟問於有漏法計樂淨見取可有一向倒義耶問以戒禁取可立顛倒耶問正理論中云於五取蘊執我我所心便高舉名為我慢文爾者今此我慢者可通見修所斷耶問我生已盡等四德所生增上慢俱可緣所執有漏行道耶問預流果聖者於預流向可起增上慢耶問九慢類中我慢類從何慢出耶問無色界七慢俱可現起耶
