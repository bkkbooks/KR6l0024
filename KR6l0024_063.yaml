body:
  text: 俱舍論第二十一卷抄下問題問光法師依婆沙論評家意忍所得斷名遍知義如何釋之耶問超越證不還果聖者於五下結中先斷二結類歟問舊婆沙論意以九遍知如何分別忍果見道果耶問光法師以九遍知分別根本靜慮果引婆沙論二師説爾者今此二師説俱正義歟問光法師釋根本靜慮果五遍知引婆沙論二師説爾者今論意同何師説耶問尊者妙音意以五下分結盡遍知為根本靜慮果歟問論文云且由三緣立六忍果文爾者寶法師如何釋此文耶問寶法師意立五下分結盡遍知必可由越界緣耶問苦智已生集智未生位可具得無漏斷得緣耶問婆沙論中云集法智忍滅集法智生時名滅雙因文光法師引此文作二解釋爾者初釋意如何釋之耶問婆沙論意集法忍現在前位立第一遍知緣悉具之歟問論中敘雜心師説云有立離俱繫亦是一緣故立遍知緣總有五種文爾者論主意如何破此義耶問正理論意以五下分結盡遍知為根本靜慮果歟問於第四意煩惱離繫未得無漏得位可得色愛盡遍知耶問退位捨遍知唯限起惑退位歟問聲聞乘人證阿羅漢果時捨一種遍知義可有耶問正理論意獨覺於凡位所斷下三靜慮惑上必起勝果道云義引何文證之耶問已離第三靜慮染依下地修練根者必下起勝果道耶問正理論意麟喻獨覺於下三靜慮修惑離繫可得無漏得耶問光法師意麟喻獨覺可得色愛盡遍知耶問菩薩可得不還果耶問可有捨四種遍知義耶問根本地攝不還果聖者捨五下分結盡遍知唯限得一切結盡遍知位歟問已離色染聖者修練根時可捨色愛盡遍知耶問起已斷煩惱退不還果時必可捨色愛盡遍知耶問光法師所引婆沙論中述有説意依六地道類忍滅道類智生時捨五遍知得五下分結盡遍知文爾者今此有説意同誰人義耶問染汚心不現在前位可有退煩惱義耶
