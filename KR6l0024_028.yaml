body:
  text: 俱舍論第八卷抄上問他化自在天可化聲境耶答可有二意也兩方若化聲境者聲境是間斷法變化心無化之設雖天上化用輒不可化之是以見今論餘處二十七文述餘生得等能變化心通善不善無記性攝如天龍等能變化心彼亦能為自他身化於十色處化九除聲天龍等生得化亦不化聲境定至他化自在天何可化之哉若依之爾者圓暉法師釋樂變化天相云於五欲境自變化故文以樂變化天思他化自在天尤可云化聲境也如何答見光法師餘處定判引集異門足論五諸下劣天子化作種種色聲香味觸諸妙欲境令高勝天子於中受用之文畢作三解釋云彼由業力令他化作非由化心不可為例或可從多分説以實而言聲由繫發不可言化以間斷故或聲不離所化色香味觸四境相從説故亦名為化文依初釋意者可云他化自在天化聲境也業力難思故由高勝天子之業力令下劣天子化作聲境非由能化心力化之設生得化設業得化由能化心力不可化聲必由相擊發有間斷故也不可為例之釋其意在之非由化心歟依第二釋意者他化自在天不可化聲境聲由相擊發不可言化以間斷故也集異門足論文從多分説聲境聲雖非所化五境之中化作四境故從多分説化作種種色聲香味觸諸妙欲境也為言依第三釋意者他化自在天不可化聲境其旨如第二釋集異門足論文相從而説雖有四境離聲全無聲離四境故相從四境化作聲境説也為言尋云光法師第十一卷疏中引集異門足論今文畢云準集異門聲亦可化文今三釋中當初釋意歟答彼只述集異門足論文而許也故今三釋中何釋不可相違歟問光法師釋南贍部洲名云或從林立號或以果標名云云爾者此洲南邊有贍部樹歟答此洲北邊有贍部樹也兩方若此洲南邊有贍部樹者披今論餘處文此洲北邊有贍部樹見若依之爾者圓暉法師釋南贍部洲名云此洲南邊有贍部樹文如何答見今論餘處十一文云此贍部洲從中向北三處各有三重黑山有大雪山在黑山北大雪山北有香醉山雪北香南有大池水名無熱惱於此池側有贍部林樹形高大其果甘美作此林故名贍洲或依此果以立洲號文正理三十一顯宗十六餘處之文其言少異其意是同此等論説此洲北邊有贍部樹云事炳然也但於圓暉法師此洲南邊有贍部樹之釋者實似難思且於二義可會通之一義云此釋意述此洲名南贍部洲之由故此洲須彌山南邊有贍部樹故名南贍部洲為言非謂贍部樹在所有此洲南邊也文一義云此洲之中北邊南邊處處可有贍部樹也故勘圓暉法師解釋餘處十一云於此池側有贍部林樹形高大其果甘美依此林故名贍部洲或依此果以立洲號任今論文明北邊有贍部樹當卷云此洲南邊有贍部樹指南邊有贍部樹也故清涼大師釋云若立世阿毗曇云樹在此洲之南云云清涼大師若立世阿毗曇云樹在此洲之南之釋花嚴宗枝葉抄第三委問答之可見彼抄也問論受道勝劣東洲勝西洲劣歟答問外法異生可生北洲耶答可生北洲也兩方若生北洲者見光法師餘處五解釋述應知將生北俱盧洲欲界天業亦於人中修無我觀加行時造以無我觀為北洲業因而外法異生者著我人也不修無我觀何可生北洲哉若依之爾者北洲是異熟障亦異生法也外法異生豈不生彼哉答外法異生非一準造業感果亦萬差故可有生北洲之類也但於以無我觀為北洲業因云難準婆沙抄一云此身在欲界有情起無我行後由惡友力起我見而便命終由先數習力故生時即得之釋思之先為內法異生之時修無我觀造北洲業因畢後遇惡友為外法異生之人由先所修無我觀業因可生北洲故全無所背也問聖者可成就北洲蘊處界耶答可成就北洲蘊處界也兩方若成就北洲蘊處界者北洲是唯凡非聖之所居也聖者更不可成就彼蘊處界是以品類足論中出異生法體舉北俱盧洲人蘊界處若聖者成就之者何可名異生法哉若依之爾者廣勘論疏定判無明北洲蘊處界之捨時爰知聖者成就彼蘊處界云事如何答將入聖時無捨北洲業煩惱故聖者可成就北洲蘊處界之理必然也但於品類足論中出異生法體舉北俱盧洲人蘊處界云難者婆沙論中會此疑云諸異生法聖者多無設有少者不名聖法以聖者於彼得而不在身成就不現前故唯異生於彼得而亦在身成就亦現前故名異生法云云問光法師所引正理論中明第三靜慮天立淨名爾者以何法名淨耶進云光法師所引正理論二十一云意地受樂説名為淨云云付之意地樂受既通染汚何立淨名哉答意地樂受説名為淨者第三靜慮異熟樂受説名為淨為言非謂意地染汚樂受名淨歟今論中述第四識住云第三靜慮由異熟想故言想一光法師釋此異熟樂曾無厭時故名想一第三靜慮名為想一由異熟見準而思之第三靜慮天立淨名由異熟樂可得意也重難云唯於善法可立淨名異熟樂受是無覆無記法也何立淨名哉答善法及無覆無記法名為淨法也故勘光法師餘處六解釋云問如邪見生有身見雖性不同同是染故名等流果善生無覆雖性不同同是淨故應是等流果解云染法易同故得為果淨法難同依故不為果文問光法師所引正理論中釋無熱天名云已善伏除雜修靜慮上中品障云云爾者今此上中品障者指上中二品歟答非指上中二品也兩方若指上中二品者一天中可除一品障更不可亙上中二品若依之爾者上中品障之言無諍指上中二品見如何答五品雜修靜慮者唯就上品中分別之也所謂一上下品無煩天業因二上中品無熱天業因三上上品善現天業因四上勝品善見天業因五上極品色究竟天業因也婆沙論云雜修靜慮是勝功德非下中品所攝唯有上下上中上上上勝上極故唯有五文準婆沙論文思正理説已善伏除雜修靜慮上中品障者以五品中上中品雜修靜慮為無熱天業因故云伏除上中品障也圓暉法師五無熱天已得雜修上中品定能善伏除上中品障之釋其意同之故云上中品障指五品中上中一品非謂亙三品中上中二品也上中品障之言無諍可指上中二品云難恐未辨此旨歟重難云勘婆沙論文云問雜修靜慮有幾品耶答有五一下品二中品三上品四上勝圓滿品五上極圓滿品文如此文者雜修靜慮可通三品中下中二品見何云五品雜修靜慮者唯就上品中分別之哉是一次正理論二十一次下文釋善現天名云已得上品雜修靜慮果德易彰故名善現文若就五品雜修靜慮論之者可云已得上上品雜修靜慮唯云上品寧不背一段廢立哉是二答婆沙論中云一下品二中品三上品雖上品中之下中上且略上言只云下品中品上品也第四云上勝第五云上極故唯就上品中分別之云事炳然也但第四第五置上言事只云勝只云極者難知上中之勝上中之極故於彼必加上言也次於正理論已得上品雜修靜慮之文者此亦於上上品且略上言也準婆沙論文可會之問光法師所引正理論中釋無熱天名作三解釋爾者第二解意如何釋之耶進云光法師所引正正理論云或令下生煩惱名熱此初遠離得無熱名文付之於無煩天中已遠離下生煩惱何云至無熱天初遠離下生煩惱哉答於無煩天中初離下生煩惱故無遠離之義無熱天是五淨居天中第二天更令遠離下生煩惱故云此初遠離得無熱名也如彼解脫道不名遠分對治勝進道名為遠分對治也問光法師所引正理論中釋色究竟天名作三解釋爾者第三解意如何釋之耶進云光法師所引正理論二十一云有言色者是積集色至彼後邊名色究竟云云付之色究竟天中積集非積集色俱至後邊何唯云積集色至彼後邊哉答非積集色者是無表色也而生無色界聖者成就道共無表故唯云積集色至彼後邊歟問異生所起天眼通可見淨居天事耶答可有二義也兩方若見五淨居天事者五淨居天者唯聖非凡之處也異生起天眼通寧可見彼天事哉是以光法師餘處二十七所引婆沙論百中述宿住通憶知五淨居天事云雖未曾見五淨居事而曾聞故亦能憶知云云若異生所起天眼通見五淨居天事者豈無曾見之義哉加之披婆沙論處處之文或百五十問依第四靜慮所引天眼極能見何繫色答乃至廣果繫或百八十六明神境通所至處云依第四靜慮發者能至廣果或色究竟判如神境通四通亦爾能至廣果或色究竟之言如次顯異生聖者不同見何況異生所起他心通既不知五淨居天心心所天眼通例亦可同哉若依之爾者第四靜慮八天同一繫縛地也設雖異生所起天眼通何不見淨居天事哉就中自下地為境之理唯簡上地境於同一繫縛地中更不可有不見之處如何答此事雖為古來未決且可存異生所起天眼通見五淨居天事云義也其故第四靜慮八天雖別同一繫縛地故異生所起第四靜慮天眼通可見五淨居天事也故婆沙論百五十所引施設足論云第四靜慮有八天處謂無雲福生廣果無煩無熱善現善見色究竟問如是八天互相見不答彼互相見皆以同一繫故云云但於五淨居天者唯聖非凡之處也云難者異生設雖不生彼天於下天中見彼天事有何所遮哉次於光法師餘處所引婆沙論雖未曾見五淨居事之文者未曾生五淨居天見彼天事為言光法師餘處宿住通憶淨居天者雖不生彼昔曾聞説今時能憶之定判婆沙論若爾此智應不憶知五淨居事無始時來未生彼故之問言此旨尤分明也重意云無始時來未生彼故之問言亙異生聖者問之雖未曾見五淨居事之答文隨亦亙異生聖者可答之若如文執之者聖者於下天中起第四靜慮天眼通豈不見五淨居天事哉爰知雖未曾見五淨居事者未曾生五淨居天見彼天事為言次於婆沙論乃至廣果繫之文者且就凡聖共居處云爾也若依此文異生所起天眼通不見五淨居天事云者文無簡別之言聖者所起天眼通之境界寧可限廣果繫哉次於婆沙論能至廣果或色究竟之文者此亦且就凡聖生處顯其不同也是則一往分別更非盡理之談歟次於他心通例難者於勝地根位其未來世不知者性相之所定故異生所起他心通不知五淨居天心心所也色身等異之故異生所起天眼通見五淨居天事全不可為相例之難歟重難云於下天中起天眼通見五淨居天事婆沙論所説曾見曾聞中何攝耶答且可云曾聞攝歟未生彼天故也已上相承義也問頌文云此上十七處云云爾者為有宗義為當經部宗義歟答或云有宗義或云經部宗義或云亙有宗經部宗義之三義可有也兩方若有宗義者今論文云迦濕彌羅國諸大論師皆色界處但有十六婆沙論九十八中述迦濕彌羅諸論師説初靜慮地唯有二處明知今此十七天説非有宗義云事何況正理論師破今此十七天義云何理中天倍增於下然其上處半勝於中顯宗論十二中改此上十七處等之頌文結此上十六處名色界於中初二二三三第四靜慮八若有宗義者豈破彼義改頌文哉加之圓暉法師釋於色界中立十七天依經部宗也若薩婆多宗唯立十六天除大梵天惠暉法師判有部要依同分方立天處大梵居獨一文無別處故不立大梵及無相天也任此等解釋此上十七處者非有宗義之旨亦分明也若依之爾者披一論之始末尋二部宗義本頌專載有宗義長行屢舉經部計既本頌所結此上十七天説也寧非有宗義哉答此事學者異義雖非一準且存一義意者可云有宗義也其故勘圓暉法師頌疏序云于時世親至本國已講毗婆沙若一日講便造一偈攝一日中所講之義刻赤銅葉書寫此偈如是次第成六百頌攝大婆沙其義周盡文任此解釋六百行本頌併述有宗義云事炳然也何況彼序次下文云悟入知非告衆人曰此頌非是專弘我宗頌置傳説之言似相調耳如其不信請釋即知文若本頌文直載經部宗義者悟入尊者何依傳説之言初知相調哉以此等道理思之此上十七處頌文述有宗義可云也故光法師釋云論主頌中述西方師義説有十七故婆沙云西方師説色界十七後師意説以大梵王壽量處等異餘二天故於初定別立三天故婆沙九十八云西方諸師作如是説初靜慮地處別有三一梵衆天處二梵輔天處三大梵天處此處即是靜慮中間云云此釋即云論主頌中述西方師義説有十七不云經部宗義故知西方薩婆多師義也以何知之者光法師餘處二釋今論西方諸師説有五種謂不生法復開為二之文云西方諸師即是迦濕彌羅國西健馱羅國彼亦多有説一切有部師云云元瑜法師餘處述文記九述正理論十二西方師説菩薩學位先起此定後得菩提之文云此乾陀衛國薩婆多師作如是解文案此等釋意今論等中以健馱羅國薩婆多師名西方師見故準知今本頌中所述西方師義者健馱羅國薩婆多師義也加之雜心論中偈頌結色界或十六長行云有欲令十七如前十六及大梵而彼論是尊者法救所造偏載有宗義何處舉經部宗義哉任此等文理今此十七天義述有宗義云事分明也但於今論迦濕彌羅國諸大論師等之文者迦濕彌羅諸師設雖但立十六天義論主意明健馱羅國薩婆多師立十七天義故今本頌中述此義也學有宗義不限迦濕彌羅國者今論之文全非相違婆沙論説會通同之次於正理論師破今此十七天義云難者十七天義雖為有宗義非正理論師所存義故破此説也寶法師引正理論要依同分立天處名非一梵王可名同分雖壽量等與餘不同然由一身不成同分故與梵輔合立一天高下雖殊然地無別少光天等與此相違故彼不應引之為例之文畢云準此論文正理亦以十六為正梵王無想皆唯一故地無別故云云次於顯宗論中改頌文云難者雖為有宗義非所存之時改頌文也如彼顯宗論餘處十一中改三界染心中得六六二種色善三學四餘皆自可得之頌文云三界染如次得七六二種色善二學三二無餘自得也次於圓暉法師於色界中立十七天依經部宗也等之釋者本頌之文所述十七天義雖為有宗義經部宗意亦立今十七天義故以其義勢相同且云依經部宗也歟或又圓暉法師意以西方師經部師得意故異光法師等釋如此判歟若薩婆多宗唯立十六天除大梵天者十六天義有宗本國義故云爾也若如釋得意者十六天義之外皆非有宗義可云歟若爾阿毗曇心論并法勝阿毗曇心中云色界説十七述除大梵天加無想天十七天義豈非有宗義哉彼若有宗義者加大梵天除無想天十七天義何非有宗義哉惠暉法師不立大梵及無想天也之釋準之可會也重難云六百行本頌併述有宗義云事不可然廣披今論處處之文當卷云像實有不成文光法師釋此文云於此頌中既破像實明知論主以經部義破文餘處之中或云感劫生天等為一梵福量文光法師釋此文云此即初師是經部或是大衆部或是當部異師文圓暉法師釋此文云或經部或大衆部軌範師也文泰法師釋長行以於餘師有伽陀言有信正見人修十勝行者便為生梵福感劫天樂故之文云引餘部頌證前餘部義文或二十八云後色起從心云云光法師釋長行此從心生非從色起謂昔所起色異熟因熏習在心功能今熟是故今色從彼心生之文云論主以經部義答正釋頌文後色起從心云云寶法師釋此文云經部答也云云泰法師釋此文云次依經部答從心生不同薩婆多從昔欲色界色起云云圓暉法師釋此文云此是論主依經部釋也此等本頌之文盛載經部宗義何云六百行本頌併述有宗義哉或二十九云迦濕彌羅議理成我多依彼釋對法少有貶量為我失云云光法師釋長行迦濕彌羅國毗婆沙師議阿毗達磨理善成立我多依彼釋對法宗少有貶量為我過失之文云我多依彼釋對法宗於中時以經部義宗少有貶量為我過失文泰法師釋此文云我多依彼毗婆沙師評家義釋彼發智及六足對法之宗然於其中薩婆多宗不盡理者以經部義少有貶量為我過失云云準此等處處定判思之本頌之中直述經部義云事炳然也是一次西方師者可名經部師也故寶法師餘處五釋今論西方師説菩薩學位先起此定後得菩提之文云述異部也云云圓暉法師餘處解此文是經部宗文泰法師餘處釋今論外國諸師作如是説若中間起不同類心此有何過之文云乾陀衛國在罽賓國西故前云西方沙門即西方沙門是罽賓國外故此中言外國諸師文外國諸師者迦濕彌羅國外印度國異部諸師也而此釋意西方沙門此中言外國諸師判故西方師者非薩婆多師見爰知是經部師云事是二答論主意屢明經部宗義故採其實意本頌之文密雖有志經部宗義有宗之中有其義勢頌文之面顯載之故將此本頌使人齎往迦濕彌羅國之時淺學之者披之謂弘我宗悟入尊者見之怪傳説言也若本頌文直述經部宗義者豈可有此義哉但於當卷像實有不成之頌文者大衆部意成無中有之義取質像喻故為破此義云爾也有部經部相對立破非述經部宗義故無其過也次於餘處感劫生天等為一梵福量之頌文者有宗之中亦有此義也故光法師一釋意云或是當部異師也今此三釋非相違釋歟次於餘處後色起從心之頌文者有宗意從無色界沒將下生時由無色界中順色生心勢力引欲色界色生云故後色起從心之旨有宗意亦存之故顯宗論中不改此頌文也長行謂昔所起色異熟因熏習在心功能今熟之文述經部宗義故諸師解此文之時雖釋經部義頌文之面不違有宗義故亦無背也次於餘處迦濕彌羅義理成等之頌文者六百行本頌專雖述有部宗義長行之中屢明經部宗義故云我多依彼釋對法少有貶量為我失全無相違也次於西方師者可名經部師云難者光法師元瑜法師意以健馱羅國薩婆多師名西方師釋尤叶文理也故見顯宗論餘處七之文云西方師説菩薩學位先起此定後得菩提文若非有宗義者彼論中何載此義哉但於寶法師圓暉法師泰法師釋者存光法師等釋之日且不可劬勞之問無想天中多有情可居在耶第五卷抄記録之畢問無色界中可有方處耶進云今論云無色界中都無有處以無色法無有方所云云付之既云空無邊處等豈無方處哉是以光法師釋今此處言云處是有情生長處故文如解釋者可云無色界有方處也何況披今論文云謂於是處得彼定者命終即於是處生故復從彼沒生欲色時即於是處中有起故云云既云是處生故亦述是處中有起故明知無色界有方處云事加之惠暉法師釋此文云以無色法名無處不是都無所處云云此釋意無色界有方處之旨分明也如何答若色界天上別有無色界天者可云無色界有方處而色界天上別無無色界天故云無色界中無有方處也故見今論文本頌結無色界無處由生有四種長行云無色界中都無有處以無色法無有方所過去未來無表無色不住方所理決然故正理論説其文全同顯宗論釋其意不異婆沙論中述評家義云然無色界無有方處云云任此等文理無色界中無有方處云事炳然也但於空無邊等之處言者以衆同分及與命根名處非方處名處也故光法師釋但異熟生差別有四之論文云但由同分今異熟生有勝劣故差別有四此釋意以衆同分及與命根為生本故名生之旨分明也退勘今論餘處十七文云依我所宗應作是説但由一業引一生此一生言顯一同分以得同分方説名生以衆同分名生命根亦同引業所感故可得生名之理必然也故衆同分及命根名生亦名處也次於光法師處是有情生長處故之釋者無色界中無方處者無別色處云意也雖無色處亦是有情之果報故云有情生長處可有何相違哉次於今論謂於是處得彼定者等之文者彼顯無色界中無方處義之文也何還為難哉光法師作二解釋委述成之其二釋旨趣至下可知之次於惠暉法師不是都無所處之釋者就得定命終之處云爾也同光法師初釋意歟非謂無色界中有方處也問無色界中可有自界他界不同耶答不可有自界他界不同也兩方若有自界他界不同者無色界中無有方處何可論自界他界不同哉若依之爾者披一段論文尋三界安立或問如是三界唯有一耶答三界無邊如虛空量或述若有離一欲界貪時諸欲界貪皆得滅離離色無色應知亦爾無色界中可有自界他界不同見如何答無色界中無方處故不可有自界他界不同云事道理必然也但於三界無邊如虛空量之論文者只顯三界無邊之義許也全非無色界中論自界他界不同次於離色無色應知亦爾之論文者欲色二界有方處故可云離一欲色界貪時諸欲色界貪皆得滅離無色界中無方處故離無色界貪時諸無色界貪亦皆得滅離為言非謂無色界中有一多不同也問四無色處可立三天不同耶進云四無色處不立三天不同也付之凡隨行者修因可有果報不同四無色處何不立三天不同哉例如四靜慮地立三天不同如何答無色界無方所故於欲色界中受彼異熟果也故依定勝劣雖論四無色處不同無方處故一處中不立三天不同也但於四靜慮地立三天不同云例難者彼有方處故一地中立三天不同更不可為相例之難也問光法師釋命終即於是處生故復從彼沒生欲色時即於是處中有起故論文作二解釋爾者初釋意如何釋之耶進云光法師釋云言是處者於欲色界隨其所應得彼定處云云付之是處之言指得彼定之處者於無色界還成有方處是以見婆沙論六十八一段之文或云欲界沒生無色界者無色界生有不在欲界死處起文或色界沒生無色界者無色界生有不依色故不可説彼在色界起云云若命終即於是處生故之文指得無色定之處者從欲色界沒生無色界者無色界生有豈不欲色界得彼定之處起哉何況婆沙論中述評家義云應作是説若欲色界沒生無色界及無色沒生無色界者彼無色界沒生欲色界時彼二中有即當生處而現在前文若得無色定之處彼中有起者寧不違婆沙論評家説哉加之婆沙論中出非在欲界死生之類云無色界沒生色界異生云云若從欲界沒生無色界從無色界沒無色界之時得無色定之處彼中有起者何非在欲界死生哉答光法師初釋意任今論現文也即彼論文上標謂於是處得彼定者下云命終即於是處生故述即於是處中有起故是處之言無諍可指上謂於是處之是處見故光法師初釋云既言是處受生是處中有現前明知無色無別方處若有別處應往受生彼處中有現前云云廣勘諸師解釋寶法師釋此文云又得四定欲界九處色界十六處差別不同若生無色皆於欲色命終處生故知離二界中更無別處從彼四天處沒生下界時即於前生死處中有現前傳識故知不從別處來也文泰法師釋此文云謂於是欲色界中隨何處得彼定者命終即於是前死處生無色界故復從無色界沒生欲色時即於是欲色界死處中有起故故知無色界無方處若作此釋甚順此文文圓暉法師釋此文云即於修定處命終受無色界生後時從無色沒生欲色界時還即於過去修得定處中有起故明知無色界無方所也文此等解釋皆同光法師初釋意誰不依用之哉何況見當卷論下文難異師義云若爾無色亦應非趣即於死處而受生故云云以此文思命終即於是處生故之上説得定之處即受無色界生之旨分明也故光法師初釋意既順一論前後之文亦同諸師定判之趣尤可為指南之異義也但於是處之言指得彼定之處者於無色界還成有方處云難者光法師自問答也即會此疑云言是處者謂得無色定處非言無色別有方處如眼識依眼根根有方所識無方所由斯理趣可言中有傳識受生文次於婆沙論不在欲界死處起故之文并不可説彼在色界起之文者將會此文可有三義一義云從欲界沒生色界者色界生有以色界色為所依故在色界起不在欲界死處而起云事炳然也從欲界沒生無色界并從色界沒生無色界者無色界生有不以色為所依故在欲色界得定命終之處雖受無色界生就其果報見之無色界生有故云不在欲界死處起故云不可説彼在色界起也不依色故者顯得定命終之處受無色界生之義故光法師初釋意不違婆沙論文也文一義云從欲界沒生色界者同有色地以色為所依故欲界分齊之內色界中有初起之時可云色界中有欲界死處起也從欲界沒生無色界并從色界沒生無色界者無色界生有不以色為所依亦異中有為生方便故不在欲色界死處而起為言然而不出欲色界中得定命終之處受無色界生云事諸論極成之理故光法師初釋意不違婆沙論説也文一義云婆沙論不在欲界死處起故等之文述評家在當生處中有現前云義意故與光法師初釋可相違也故第二釋意引此文為證據也不可説彼在色界起之文其意同之次於婆沙論評家彼二中有即當生處而現在前之文者光法師問若如後解可順婆沙評家若如前解豈不相違解之云論主以理為宗非以婆沙評家為量何勞通釋云云次於婆沙論中出非在欲界死生之類云無色界沒生色界異生之文者從欲界沒生無色界從無色沒生色界者云其過去得無色定命終之處雖為欲界分齊之內論其果報無色界死有故云非在欲界死也準婆沙論欲界沒生無色界者無色界生有不在欲界死處起故之文可思之也重難云從欲界沒生無色界從無色界沒生色界者彼中有可色界當生處起何遠至過去於欲界中得無色定命終之處起哉答從欲界沒生無色界從無色界沒生色界者彼中有色界當生處起者婆沙論評家義也故第二釋意存此旨也初釋意異之過去得無色定命終之處彼中有起云故同婆沙論第二有餘師説若從彼沒生無色界即在彼方處中有現在前云義也故泰法師釋云若作前身死處中有現釋俱舍文者同婆沙第二師釋為評家所非也文重意云初釋意任今論現文同婆沙論第二師説第二釋意依婆沙論評家義二釋意自本各別也混不可難之問光法師釋命終即於是處生故復從彼沒生欲色時即於是處中有起故論文作二解釋爾者第二釋意如何釋之耶進云光法師釋云又解言是處生者顯無方所乃至復從彼沒生欲色時即於應所生處中有起故文付之依光法師第二釋案今論文起盡上標謂於是處得彼定者下云命終即於是處生故述即於是處中有起故文言前後無諍指得無色定之處見何況披當卷論下文難異師義云若爾無色亦應非趣即於死處而受生故文以下文思上説得定命終之處即受無色界生之旨分明也加之從欲色界沒生無色界之時無色界生有不欲色界死處起者寧可何處起哉次即於是處中有起故之論文指當生處者無有傳識受生之義何用中有哉答光法師第二釋意專成無色界中無有方處之理亦任婆沙論評家説也若得無色定之處即受無色界生云者於無色界中還似有方處故命終即於是處生故之文顯無方處即於是處中有起故之説指當生處所得意也故光法師第二釋云又解言是處生者顯無方處非言是處別有方所如言空處故婆沙六十八云欲界沒生無色界者無色界生有不在欲界死處起故已上論文復從彼沒生欲色時即於應所生處中有起故故婆沙六十八云應作是説若欲色界沒生無色界及無色沒生無色界者彼無色界沒生欲色界時彼二中有即當生處而現在前云云立道理引證文此釋所存其趣如此但於上標謂於是處得彼定者下云命終即於是處生故述即於是處中有起故云難者是處之言雖同上文其意各別或顯無方處或指當生處有何相違哉次於當卷論下段即於死處而受故之文者第二釋意命終即於是處生故之文顯無方處非指欲色界中得定命終之處云許也受其無色界生不離欲色界中得定命終之處云事此釋意亦所存故即於死處而受生故之文全無背又從欲色沒生無色界之時無色界生有不欲色界死處起者寧可何處起哉云疑更不可來也次於即於是處中有起故之論文指當生處者無有傳識受生之義何用中有哉云難者光法師所引婆沙論六十九問答也即彼論中會此難云彼先已造感中有業雖無往來亦受中有業力所引必應起故文光法師又作一解云欲色四生要由中有而生方便隨染受生文問光法師所引婆沙論中述有説意從無色界沒生欲色界時在第四靜慮中有現在前文爾者評家如何破之耶進云評家破此説云若無色界有方處者可作是説然無色界無有方處何緣造至第四靜慮文付之若無色界有方處者即於彼處中有容現在前可難也何如此破哉答有説意雖存無色界無方處無色界果報鄰第四靜慮故從無色界沒生欲色界之時在第四靜慮中有現在前云也評家破此説意云若無色界有方處鄰第四靜慮其上有之者從無色界沒生欲色界之時在第四靜慮中有容現在前然無色界無方處故欲色二界之中隨其所應於當生處中有容現在婆沙何處遠至第四靜慮中有容現在前哉為言難破之趣尤有其謂也問論主意可存衆同分命根實有義耶第五卷抄記録之畢問正理論意眼等六識現在前位依非所依不相應行唯限七種歟答唯限七種也兩方若唯限七種者正理論二十一中出眼等六識現在前位依非所依不相應行云同分命根得等生等云云得等之等言豈非等餘類哉若依之爾者以道理思之可限七種也是以披婆沙論文今此不相應行可限七種見如何答眼等六識現在前位依非所依不相應行唯可限同分命根得及四相之七種也所餘非得無想異熟無想定滅盡定名身句身文身之七種望眼等六識甚疏遠故不可為依也故婆沙論二十七云若生欲界眼識現在前此識以眼及無間滅意為依及所依以眼根所依大種身根及身根所依大種命根衆同分俱生老住無常等為依非所依如眼識耳鼻舌識應知亦爾若身識現在前此識以身及無間滅意為依及所依以身根所依大種命根衆同分得生老住無常等為依非所依若意識現在前此識以無間滅意為依及所依以身根及命根所依大種命根衆同分得生老住無常等為依非所依文設雖正理論意更不可背婆沙論説哉但於正理論得等之等言者得中有法前法後法俱三得不同故置等言也生等之前既云得等不等餘類云事炳然也抑婆沙論中亦有等言何不疑之哉重難云元瑜法師問論文云欲所屬界説名欲界文爾者可有依主釋義耶答可有依主釋義也兩方若有依主釋義者見論下文云又欲之界名為欲界文光法師釋彼文云第二解約依主釋此界是欲之界故名欲界文若欲所屬界説名欲界之初解意有依主釋義者與第二解有何差異哉若依之爾者既云欲所屬界説名欲界尤可有依主釋義也如何答欲所屬界説名欲界之初解意欲是能屬界是所屬能屬所屬其體各別二法合論名欲界故可有依主釋義云事必然也但於與第二解有何差異哉云難者二解意雖同有依主釋義初解意第六轉聲第二解意第七轉聲故有其差異也故惠暉法師釋云貪心名欲境非是欲能生欲故名欲色界色勝不能生欲不名欲蘊名界欲屬此五蘊或界能生欲名欲界無色界準此釋無色即四蘊無色即屬四蘊法第六轉聲若欲之界即第七轉聲也云云問論文云所言色者是變礙義文爾者寶法師意是變礙義者可通十一種色耶進云寶法師釋云色有二種言變礙者通十一色文付之無表色者無變礙義何通十一色哉是以光法師釋所言色者是變礙義即十種色泰法師判所言色者是變壞義十種色也寶法師獨云通十一色寧不背道理哉答見論文述無色界中色非有義云所言色者是變礙義或示現義云云而無色界中一切色法悉非有故若以十種色云是變礙義以色處色云或示現義者無色界中成不簡無表色故寶法師釋色有二種言變礙者通十一色言示現者謂色處色尤有其謂也但於無表色者無變礙義云難者從所依大種有變礙義變礙色中攝無表色也準今論餘處眼識等五所依不定或有變礙謂眼等根或無變礙謂無間意無表所依則不如是故前所難定為不齊變礙名色理得成就之釋可思之也次於光法師泰法師釋者無表色體無變礙義故據其體云十種色也問有宗意於有情界可有窮盡耶進云今論云而不窮盡猶若虛空云云付之三世諸佛廣施濟度六道有情豈不窮盡哉是以光法師餘處釋總發別解脫戒之義云境雖有滅戒體無虧婆沙論中述評家義判應作是説律儀境界雖有多少而律儀體前後無異俱從一切有情境處發總得故若許有情界有減義者定知遂可有窮盡之期云事如何答三界無邊如虛空量故三世諸佛雖施濟度六道有情更不窮盡也故今論云三界無邊如虛空量故雖無有始起有情無量無邊佛出於世一一化度無數有情令證無餘般涅槃界而不窮盡猶若虛空云云正理論二十一文全亦同之顯宗論十二説其意無替但於光法師餘處境雖有滅戒體無虧之釋婆沙論評家律儀境界雖有多少之文者證三乘聖者之者遂入無餘涅槃故於有情界雖有減義三界有情無邊際故無有窮盡之期也問論中明世界安立云當言傍住文爾者有宗義歟答有宗義也兩方若有宗義者披今論餘處十二文述餘世界無佛出世云勿薄伽梵功能有礙唯一世尊普於十方能教化故文光法師釋此文云説一切有部解云云如此釋者有宗意許上下二方見以知無上下二方云説餘部義云事若依之爾者正理婆沙等論説中同載此義寧非有宗義哉答今論所述當言傍住之義可云有宗正義也故光法師釋此文云説一切有部答説有八方世界傍住云云泰法師釋此文云初述薩婆多計當言八方傍住無邊文正理二十一顯宗十二兩論之説全同今論文雜心論八云復次有欲令周遍傍立界文若非有宗義者豈此等論中載之哉加之婆沙論百九十三中述有餘師説鄰次傍布畢會陀羅達多所説下方世界無邊上方世界無邊之文云彼應作是説下方欲界無邊上方色界無邊云云既云應作是説有宗正義意云事亦炳然也但於今論餘處普於十方能教化故之文者實雖八方為顯世尊教化至廣且云十方也如彼法華經中十六王子成道實雖八方説今現在十方各得成正覺也問論中明世界安立云有説亦有上下二方文爾者有宗義歟答有宗義也兩方若有宗義者論中引餘部經説為此師證據以知非有宗義云事是以泰法師釋此文云真諦師云是法護部計有説八方同薩婆多亦立有上下二方故文若依之爾者披今論餘處十二文述有宗意云唯一世尊普於十方能教化故文如此文者許上下二方之説可云有宗義也如何答見今論文云有説亦有上下二方餘部經中説十方故文光法師釋此文云有説亦有上下二方餘法密部經中説十方故文寶法師釋此文云第二説也法密部中經等亦説有十方故云云任此等定判有説亦有上下二方者是有宗義故對之以法密部稱餘部見正理二十一顯宗十二兩論之説全同今論文加之婆沙論百九十三云此中有説上下重纍文雜心論云有説從下次第上文此等論中既云有説故有宗一説云事亦分明也但於論中引餘部經説為此師證據云難者引證文之習不必限當部經説餘部經中之言還為此義潤色哉次於泰法師真諦師云是法護部計之釋者法密部意亦許上下二方故如此釋也非謂云爾故今論有説亦有上下二方之文即載法密部義歟問論文云有説亦有上下二方文爾者依初靜慮所發神通可至上下二方梵世耶答不至上下二方梵世也兩方若至上下二方梵世者依初靜慮所發神通無至第二靜慮以上若許至上下二方梵世者寧不至上三靜慮哉若依之爾者離欲界染依初靜慮所發神通也何不至上下二方梵世哉答任五依四靜慮自下地為境之性相依初靜慮所發神通無至第二靜慮以上而世界重纍云師意依初靜慮所發神通至上下二方梵世者可過上三靜慮故不可至上下二方梵世也故婆沙論百九十三中上下重纍云師意會云何施設遍離彼染云何神通能遍至彼之難云若有離一欲界染時即名離一切欲界染以相同故然依初定所發神通但能至一欲界梵世非餘以處別故文此文意云以相同故離一欲界染時即離一切欲界染以處別故依初靜慮所發神通但至自所生一欲界梵世不至餘上方下方欲界梵世為言但於離欲界染依初靜慮所發神通也何不至上下二方梵世哉云難者上方梵世隔此界上三靜慮下方梵世隔下方上方三靜慮故雖同依初靜慮所發神通不至上下二方梵世也問離一界通障時可離餘界通障耶答可離餘界通障也兩方若離餘界通障者通障是難斷法也離一界通障之時何輒離餘界通障哉何況二乘通力不及他三千界未離餘界通障故也若離一界通障之時離餘界通障者二乘通力豈不及他三千界哉若依之爾者論中述若有離一欲界貪時諸欲界貪皆得滅離離色無色應知亦爾離一界煩惱之時可離餘界煩惱見以煩惱思通障其義可同如何答離一界通障之時隨其所應可離障自所知分齊餘界通障也所謂聲聞通力知二千界事麟喻獨覺通力知三千界事故聲聞離一界通障之時離障二千界內事餘界通障麟喻獨覺離一界通障之時可離障三千界內事餘界通障也但於通障是難斷法也云難者設雖通障是難斷法所障分齊其相同故離一界通障之時可離障自所知分齊餘界通障也次於若離一界通障之時離餘界通障者二乘通力豈不及他三千界哉云難者二乘聖者離一界通障之時離餘界通障者離障自所知分齊餘界通障也非謂離餘界一切通障全無所背歟問千世界中有幾梵王耶進云光法師釋云千世界中有一梵王文付之依光法師釋披婆沙論文述評家義云應作是説大千界中有俱胝大梵云云若大千界有俱胝梵王者千世界中可有十梵王哉答云此事有學者異義或一義云見今論文述依初靜慮起通惠時所發神通但能往至自所生界梵世非餘所餘通惠應知亦爾大梵王通力可至自所生千世界中見其通力所及不可有別大梵王故依此文光法師釋作千世界中有一梵王梵王通為千世界主之釋也是則同婆沙論有作是説小千界中有一大梵之義也論主以理為宗非以婆沙評家為量故背評家大千界中有俱胝大梵云義更非所痛也或一義云婆沙論評家意雖述大千界中有俱胝大梵不云小千界中有幾大梵推之小千界中千界中大梵王數可不定歟以何知之者婆沙論復有説者意云中千界中有千大梵千千獨梵俱胝梵衆者可云大千界中有千千大梵百俱胝獨梵千俱胝梵衆也而云大千界中有十千大梵俱胝獨梵百俱胝梵衆其數一一不符合也準此文思之大千界中雖有俱胝大梵小千界中千界中大梵王數可不定也即小千界中隨其所應可有或一二三乃至或十二十大梵王歟其中光法師且就極少釋千界中有一梵王歟問婆沙論評家意阿素洛何趣攝耶進云光法師所引婆沙論百七十二如是説者是鬼趣攝文付之阿素洛是與諸天交親與諸天鬪戰定知天趣攝可非鬼趣攝何況威德殊勝覆日月輪若非天趣攝者豈可有此義哉是以見婆沙論所引契經云帝釋語毗摩質怛羅阿素洛王言汝本是此處天文阿素洛天趣攝云事此文甚分明也如何答阿素洛者其性諂曲憍慢無入正性離生若天趣攝者寧無入聖得果之義哉故正理論二十一云諦現觀中無堪能故似非人故多諂曲故定非天趣是鬼趣攝文婆沙論評家意深存此理判鬼趣攝也但於與諸天交親云難者婆沙論百七十二中會此難云諸天貪美色故不為族姓如設足阿素洛女端正無比是故帝釋納以為妻亦如大樹緊捺洛王女名為奪意端正無雙雖是傍生趣攝而蘇迷王太子蘇達那菩薩求聘為妻此亦如是文正理論二十一中同述此旨次於與諸天鬪諍云難者婆沙論中會此難云亦有劣者與勝者共諍如奴與主鬪狗與人鬪云云正理論中會此難云且相違諍非證天因曾聞有人共羅剎鬪又聞羅剎與彌猴鬪曼馱多王破阿素洛如斯等事其類實多云云次於威德殊勝覆日月輪云難者正理論二十一中會此難云威德殊勝亦非證因曾聞曼馱多王威德勝於天故難陀等雖是傍生然其威德自在勝諸天衆故阿素洛唯鬼趣攝文次於婆沙論所引契經汝本是此處天之文者婆沙論百七十三中即會此文云帝釋應言汝本是此處鬼而言天者以尊敬婦公故作此愛語又令設足聞生歡喜文正理論中同述此旨畢又云又彼本住妙高山頂為天所逼退就下居言本是天亦無有失又彼傲慢自謂是天數與諸天興師相伐釋天為止巧慰令欣應時處言設虛無過文任此等論判成鬼趣攝之義可會疑難之趣也問五趣體可通善染汚耶進云今論云五趣體唯無覆無記不通善染汚也付之於五趣中既成就善染汚法其體何唯限無覆無記哉是以三界體廣通善染汚五趣體例亦可同何況披品類足論九文云五趣一切隨眠隨增文若唯限無覆無記者寧可一切隨眠隨增哉答五趣體若通善染汚者可有趣雜亂過故唯限無覆無記故見今論一段之文述五趣體唯無覆無記若異此者趣應相雜於一趣中具有五趣業煩惱故畢引七有經五趣有外別説業有之文成立故趣唯是無覆無記其理極成引迦濕彌羅國所誦契經尊者舍利子言異熟起已名捺落迦除五蘊法彼捺落迦都不可得之文結釋故趣唯是無覆無記正理論中云言趣體唯攝無覆無記者唯異熟生為趣體故畢引七有經説并舍利子言為證釋成趣體唯攝異熟無記非善染汚其理極成之旨其趣大同今論定判顯宗十二説亦以同之加之婆沙論百七十二中述評家義云評曰應説趣體唯是無覆無記云何知然如契經中尊者舍利子作是言異熟起已名那落迦除此五蘊彼那落迦都不可得乃至天趣説亦如是由此故知趣體唯是無覆無記文任此等文理五趣體唯限無覆無記云事甚炳然也但於三界體廣通善染汚云例難者光法師所引婆沙論百七十二中云然由煩惱界有差別由異熟蘊趣有差別是故趣體唯是異熟由煩惱繫縛論三界差別故三界體雖通善染汚無界雜亂過也次於品類足論五趣一切隨眠隨增之文者今論中會此文云彼説五趣續生心中容有五部一切煩惱趣及入心總説為趣無相違失譬如村落及村落邊總名村落文正理論二十一文顯宗論十二説其意同之婆沙論中會此文舉二師説初師云彼文應説四趣是欲界遍行及修所斷隨眠隨增天趣是三界遍行及修所斷隨眠隨增而不作此説者當知是誦者錯謬第二師説同今論等會通之旨也重難云五趣體若通善染汚者可有趣雜亂過云事不可然見婆沙論百七十二文有説趣體通三種云師意會趣雜亂過云若以成就則有雜亂若以現行則無雜亂謂地獄趣於地獄趣業煩惱成就亦現行於乃至他化自在天業煩惱成就不現行乃至他化自在天於他化自在天業煩惱成就亦現行乃至地獄趣業煩惱成就不現行是故諸趣無雜亂過文準此會通之趣思之五趣體雖通善染汚不可有趣雜亂過哉是一次光法師所引婆沙論然由煩惱界有差別等之會通亦有疑於三界中雖成就他界業煩惱由繫縛論三界差別故無界雜亂過者於五趣中雖成就他趣業煩惱望異熟果論五趣差別故無趣雜亂過可云哉是二次今論趣及入心總説為趣之會通亦難思品類足論七中明五趣體云生彼有情無覆無記色受想行識以五趣續生染汚心更不取趣體哉是三次婆沙論二十中述評家義云彼人若能精勤修道成阿羅漢更能引取地獄苦事人身中受此業不能引衆同分引衆同分業不可寄受故阿羅漢果聖者於人中寄受地獄異熟果見若爾五趣體設雖限異熟無記豈遁趣雜亂過哉是四次披今論餘處十五文云欲界中餘趣處業由別緣力異趣處受於欲天中等應受之業由別緣力於人中等受異熟果之時五趣體雖説異熟無記可有趣雜亂過也是五答婆沙論有説意約現行會趣雜亂過未得其意於他化自在天等造地獄等業之時可起彼業能潤煩惱故設雖約現行爭可遁趣雜亂過哉故正理論二十一云業若趣體趣應相雜於一趣身中有多種業故若趣因業即是趣者人有地獄業惑現前彼應是人亦是地獄亦不應説地獄趣體雖現在而非異熟如是則有大過失故謂異熟果正現在前應非地獄無差別故文顯宗論十二云若善染法是趣體者趣應雜亂一趣身中多趣惑業皆可現起及成就故文案此等文理五趣體若通善染汚者約現行可有趣雜亂過之旨分明也次五趣體雖通善染汚望異熟果論五趣差別故無趣雜亂過云事亦不可然五趣業煩惱從異熟果論之時設雖有五趣差別離異熟果無五趣差別故五趣體若通善染汚者可有趣雜亂過也煩惱繫縛三界各別故由煩惱繫縛論三界差別之時三界體雖通善染汚全無界雜亂過也次品類足論生彼有情無覆無記色受想行識之文出正趣體故云爾也廣取五趣眷屬體者通續生染汚心可為必然故今論彼説五趣續生心中等之會通更無所背也就中諸論一同致此會通何依彼論一處之文強疑之哉次阿羅漢果聖者於人中寄受地獄異熟果事是由勝定重修別緣力也故婆沙論二十一中述尊者世友説云謂若證得阿羅漢果殊勝定惠重修身故能為此事文由此別緣力之一事不可痛趣雜亂過也次今論餘處謂欲界中餘趣處業等之文非相違於欲天中等應感異熟果之業由別緣力於人中等受異熟果之時即轉為人等異熟果受之説無趣雜亂過也動業之稱寧非由之哉問論中明五趣相云體非中有云云爾者引法蘊足論何文證此義耶進云論中引法蘊足論眼界云何謂四大種所造淨色是眼根眼處眼界地獄傍生鬼人天趣修成中有之文證之也付之眼根眼處眼界雖皆是眼各別説之設雖五趣眼中攝中有眼何可妨各別説之哉答見法蘊足論十文説眼根相云謂四大種所造淨色或地獄傍生或鬼界或天或人或中有及修所成五趣眼外舉中有眼故五趣體不攝中有之旨甚分明也故今論中引此文證五趣體不攝中有之義尤有其謂也正理二十一顯宗十二兩論之中同引此文證今義也但於眼根眼處眼界雖皆是眼各別説之云難者二十二根門十二處門十八界門其廢立異故雖同是眼各別説之也若五趣中攝中有者有何故五趣眼外舉中有眼哉問論文云有説趣體亦通善染文爾者論主意可許此義耶答可許此義也兩方若許此義者五趣體通善染汚者趣雜亂過難遁哉若依之爾者見論文述有説趣體亦通善染畢會七有經文通舍利子言明知論主意評五趣通善染汚之義云事如何答披論文前後思此説用不雖述有説趣體亦通善染全無破此義剩會七有經中五趣有外別説業有之文云然七有經簡業有者非別説故定非彼攝如五濁中煩惱與見別説為濁非別説故彼見定非煩惱所攝如是業有雖亦是趣為顯趣因是故別説文又通迦濕彌羅國所誦契經之文云然彼尊者舍利子言異熟起已名地獄者説異熟起方名地獄非説地獄唯是異熟然復説言除五蘊法彼那落迦不可得者為遮實有能往諸趣補特伽羅故作是説非遮餘蘊故作是言文論主意若不許五趣體通善染汚云義者何可致此等會通哉何況見正理二十一文云然經主言非別説故定非彼攝如五濁中煩惱與見別説為濁非別説故彼見定非煩惱所攝如是業有雖亦是趣為顯趣因所以別説故有説趣體兼善染以今此會通判經主義引合有説趣體兼善染汚云義明知論主意許五趣體通善染汚云事但於趣雜亂過難遁云難者於一趣中雖成就現行五趣業煩惱望彼異熟果論五趣差別故不可有趣雜亂過也問大衆部意五趣體唯限善染汚歟答唯限善染汚也兩方若唯限善染汚者光法師釋有説趣體亦通善染之論文云有大衆部等説趣體亦通善染文寶法師釋此文云此述大衆部等計也文若爾亦通善染之言無諍可通無覆無記見若依之爾者大衆部意不許無記法思五趣體豈不限善染汚哉答宗輪論中述大衆部一説部説出世部雞胤部本宗同義云無記法文慈恩大師宗輪論述記中釋此文云隨一一境所望不同善惡業感各有異故善感名善惡感名惡故無無記文任此等定判大衆部意不許無記法故五趣體唯限善染汚云事必然也但於論疏亦通善染之言者有宗意異熟生法無覆無記為五趣體并善惡業及煩惱等非五趣體定大衆部意皆為五趣體故云亦通善染也重意云有宗意云異熟生法無覆無記大衆部意從能感業名善惡故理實而言五趣體雖不通無覆無記對有宗意云無覆無記法今為五趣體云亦通善染也問死有現前必本有無間歟答不必本有無間也兩方若必本有無間者正理論二十一中釋無本有名中有過云在中有地生死中間容有不起本有者故謂或容有生有無間死有現前非起本有文如此文者死有現前不必本有無間見若依之爾者披今論餘處九文云本有謂死前云云明知死有現前必本有無間云事如何答死有現前不必本有無間彼中般涅槃聖者中有無間死有現前故也但於今論餘處本有謂死前之文者從多分説也非遮少分有此義歟重難云中有等四有廢立就生死流轉可施設之中般涅槃聖者不可云死有現前哉答案今論餘處十雖説死有通三性心然入涅槃唯二無記之文意入涅槃心可死有攝見加之勘正理論二十一文云又必應然除在中有般涅槃者無住中有不至生有而命終故若別業果應同所餘別異業果以何因故諸受中有必復至生若餘有情在中有位生有等業亦已與果何不同彼中般有情未至生處中有便死文既云不至生有而命終故亦述未至生處中有便死中般涅槃聖者中有無間死有現前之旨分明也寶法師餘處九引正理論云一切中有唯除中般自餘中有無不至生有而命終者取此文意引之歟尋云正理論謂或容有生有無間死有現前非起本有之文都不起本有云歟答光法師餘處七引此文畢云正理所説即妙音義也勞會釋述妙音師義釋也彼師意云無想天唯有結生及命終二剎那心故就心品相生論之生有無間死有現前為言總而言之五百大劫之間無想異熟現前豈非起本有哉寫本云文永六年己巳正月二十日午時於東大寺知足院草庵當卷明思抄欲結集一帖之處頗依為大帖書分論義問題於別紙造成上下二帖畢以記録此明思抄之微功併奉仰春日大明神之冥助上生內院者晝夜所祈也遂素懷於閉眼之暮空值遇慈尊者寤寐所欣也待玄應於知足之朝雲遂使迦葉出定之砌禮拜付屬之化儀龍花説法之庭悟入唯心之深旨乃至有緣無緣之衆生自界他界之群類一善所及萬邦同剎而已應永十二年乙酉九月二十一日書寫了三論宗末學憲祐
