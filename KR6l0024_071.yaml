body:
  text: 俱舍論第二十四卷抄上問聖者斷欲界修所斷一二品惑未斷第三品惑前可有死生義耶答無此義也兩方若有此義者見光法師所引婆沙論五十三文云諸預流者若斷欲界一二品結無死生義文此文無諍不可有此義見若依之爾者異生位斷欲界修所斷一二品惑之人至聖位後未斷之前何無死生之義哉答見今論文釋家家聖者斷惑緣云一由斷惑斷欲修斷三四品故文若聖者斷欲界修所斷一二品惑未斷第三品惑之前有死生之義者何無斷一二品惑家家聖者哉是以光法師釋此文云雖有斷一品二品五品惑有出觀者或有退者必無中間經死生者故無斷一品二品五品名家家者所以得知無死生者故婆沙五十三云復次諸預流者若斷欲界一二品結無死生義故不説之如斷五品謂瑜伽師得初果已為斷欲界修所斷結起大加行必無未斷一大品結有死生故如斷五品必無未斷第六品結有死生義家家等三有死生故此中偏説準彼論文故知斷一二五品必無中間有死生義文聖者斷欲界修所斷一二品惑未斷第三品惑之前無死生之義云事引證據立道理釋成之旨今定判尤分明也但於異生位斷欲界修所斷一二品惑之人至聖位後未斷第三品惑之前可有死生之義云難者異生位斷欲界修所斷一二品惑之人至聖位後起彼一二品惑上勝果道之時剩必可斷第三品惑故斷一二品惑未斷第三品惑之前無死生之義也問斷欲界修所斷六品惑者可名家家聖者耶答不名家家聖者也兩方若名家家聖者者斷欲三四品三二生家家者性相之所定也斷欲界修所斷六品惑之者寧名家家聖者哉若依之爾者見雜心論五文云正使六品斷為家家者文此文無諍斷欲界修所斷六品惑之者可名家家聖者見如何答斷欲三四品三二生家家之理有宗依憑諸論一同之性相故斷欲界修所斷六品惑之者不名家家聖者云事其義必然也更不可疑之何況見雜心論五文云若斷三四種成就彼對治餘二生三生是名説家家文雜心論意同今論等説斷欲界修所斷六品惑之者不名家家聖者云事此文亦分明也但於彼論正使六品斷為家家者之文者出問答全文聊可會通之即彼論云問何故八品斷名一種子五品斷不名家家耶答正使六品斷為家家者猶生欲界是故欲界業煩惱不為障礙一種子九品盡生色界是故欲界業煩惱極作障礙文問意云何故斷八品惑未斷第九品惑之者名一種子斷五品惑未斷第六品惑之者不名家家哉為言答意云斷六品惑之者假為家家猶生欲界故欲界業煩惱不作障礙故斷五品惑畢必斷第六品惑也斷盡九品惑畢必生色界永不生欲界故欲界業煩惱極作障礙故斷八品惑未斷第九品惑之者受欲界生故名一種子為言如俱舍論云以斷第五必斷第六非一品惑能障得果猶如一間未越界故也重意云一來果聖者不具緣家家聖者必具緣故為顯斷六品惑之者猶生欲界之義云為家家者非謂斷六品惑之者實為家家聖者也或一義云為家家之言譯者加增也故惠算疏釋此文云六品斷猶生欲界煩惱與業不極為障故斷第五必斷第六無有五斷為家家者然此説云正使六斷為家家者為家家語此是剩文道理不順文尋云正使者其意如何答珍海已講云法華經云正使滿十方文正使者與假使同也云云問利根起定聖者斷欲界修所斷上上品煩惱無間道位於欲界二生可得非擇滅耶答於欲界二生可得非擇滅也兩方若於欲界二生得非擇滅者見光法師所引婆沙論三十二文云預流者趣一來果時不起定者加行道時於欲六生得非擇滅若起定者要至第六無間道時於欲六生得非擇滅文如此文者利根起定聖者斷欲界所修斷上上品煩惱無間道位於欲界二生不得非擇滅見若依之爾者婆沙論中云聖於修道不退法者離欲染時不起定者加行道時於欲界修所斷煩惱得非擇滅若起定者隨至彼彼無間道時得非擇滅文如此文者利根起定聖者斷欲界修所斷煩惱彼彼無間道位於能潤煩惱既得非擇滅於所潤生豈不得非擇滅哉答利根起定聖者斷欲界修所斷上上品煩惱無間道位於能潤上上品煩惱既得非擇滅於所潤欲界二生可得非擇滅云事道理實必然也何可疑之哉但於光法師所引婆沙論文者任一切從果退必得不命終之理證一來果之後永不受欲界修所斷前六品煩惱所潤生故不起定可證一來果之類利鈍同斷欲界修所斷煩惱加行道位於欲界六生得非擇滅鈍根起定聖者要至斷欲界修所斷第六品煩惱無間道位於欲界六生得非擇滅為言利根起定聖者斷欲界修所斷上上品煩惱無間道位於欲界二生雖得非擇滅無一時得六生非擇滅之義故略不論之也故婆沙論文更非相違歟尋云利根起定聖者斷欲界修所斷上上品煩惱無間道位唯於欲界二生得非擇滅歟答見婆沙論五十三文云諸預流者若斷欲界一二品結無死生義故不説之如斷五品謂瑜伽師得初果已為斷欲界修所斷結起大加行必無未斷一大品結有死生故如斷五品必無未斷第六品結有死生義家家等三有死生故此中偏説文準此文思之利根起定聖者斷欲界修所斷上上品煩惱之生必可斷上中下二品煩惱故斷彼上上品煩惱無間道位於欲界四生可得非擇滅也又尋云利根起定聖者何位於欲界第六生得非擇滅哉答見光法師解釋云論言以斷第五必斷第六者據不退者説無有中間有死生故必於現身斷第六也文準此釋思之利根起定聖者斷欲界修所斷第五品煩惱之生必可斷第六品煩惱故斷彼第五品煩惱無間道位於欲界第六生可得非擇滅也依為相傳義暫載一義之趣更有別義如同學抄也問不起定聲聞中斷欲界修所斷煩惱加行道位於三界一切生得非擇滅類可有耶答可有此類也兩方若有此類者見光法師所引婆沙論三十二文云預流者趣一來果時不起定者加行道時於欲六生得非擇滅文此文全不云於三界一切生得非擇滅明知無此類云事若依之爾者聖者種類是萬差得非擇滅非一準何無此類哉是以勘寶法師餘處解釋并婆沙抄定判可有此類見如何答不起定聲聞中斷欲界修所斷煩惱加行道位於三界一切生得非擇滅之類可見也即見寶法師餘處一解釋云菩薩麟角於七方便見修煩惱皆得不生餘一類聲聞等於七方便亦容見修惑不生其相不顯故不述也文婆沙抄中釋部行獨覺善根不定如聲聞説之論文云光師云若説聲聞雖無文説於一座得而無文遮彼一座不得故許一座得亦無失也文準此等定判思之不起定聲聞中斷欲界修所斷煩惱加行道位於三界一切生何無得非擇滅之類哉何況見婆沙論六十三文問異生聖者隨離何地九品染時為止息為不止息耶評家答既云應作是説此事不定離三界染皆或止息或不止息而離九品文有不止息離三界染之類云事此文甚分明也若聲聞中有不止息離三界染之類者斷欲界修所斷煩惱加行道位於三界一切生得非擇滅云事亦炳然也但於光法師所引婆沙論文者證一來果之後永不受欲界六生故就彼六生暫顯依起定不起定之類得非擇滅位之不同也是即四沙門果蘇息處故就得一來果之後不受之生論之也若不止息離三界染之類斷欲界修所斷煩惱加行道位於三界一切生得非擇滅事更非所遮歟問一來果聖者欲界七生中除二生於餘五生得非擇滅義可有耶答不可有此義也兩方若有此義者以道理思之一來果聖者欲界七生中除一生於餘六生可得非擇滅於餘五生得非擇滅之義難有哉若依之爾者見婆沙論六十一文云一來果除欲界二生及色無色界一一處一生餘一切生得非擇滅文如此文者一來果聖者欲界七生中除二生於餘五生得非擇滅見如何答斷六一來果者性相之所定也而任九品煩惱能潤七生之理上上品煩惱能潤二生上中上下中上三品煩惱各潤一生中中中下二品煩惱各潤一生下三品煩惱共潤一生故一來果聖者欲界七生中除一生於餘六生得非擇滅云事是必然也故見光法師所引婆沙論文云預流者趣一來果時不起定者加行道時於欲六生得非擇滅若起定者要至第六無間道時於欲六生得非擇滅文但於婆沙論一來果除欲界二生得非擇滅云文者開人天各一生云二生也人天合論可云一生也重難云見婆沙論次上文云謂預流果除欲界七生及色無色界一一處一生餘一切生得非擇滅文云預流果除欲界七生既人天合聚七生也云一來果除欲界二生定亦可人天合聚二生哉答一段論文頗為參差歟云預流果除欲界七生指人天合聚七生云一來果除欲界二生可人天別論二生也如此之事不一準經論之中其例多歟問光法師意不受三二生前可名家家聖者耶答可名家家聖者也兩方若名家家聖者者既不受三二生定可闕受生緣若不受三二生前名家家聖者者寧不背隨有所闕不名家家之理哉是以光法師釋家家聖者成根緣云先凡位中斷三四品後住初果未起勝果道雖有初緣猶未成彼無漏根故文如此釋者不受三二生前不具受生緣見若依之爾者見今論文云先斷三四七八品惑入見諦者後得果時乃至未修後勝果道仍不名曰家家一間未成治彼無漏根故文此文無諍不受三二生前可名家家聖者見如何答不受三二生前可名家家聖者也今論文既云先斷三四七八品惑入見諦者後得果時乃至未修後勝果道仍不各曰家家一間未成治彼無漏根故今此人若成治彼無漏根者可名家家一間見明知具受生緣云事依之光法師釋此釋云若於凡位先斷三四品惑七八品惑入見諦者後得預流果或一來果時乃至未修三四七八後勝果道仍不名曰家家一間雖具二緣未成治彼三四品惑七八品惑無漏根故文既云雖具二緣具受生緣云事尤分明也但於既不受三二生定可闕受生緣云難者雖未受三二生造彼三二生業畢可具受生緣也故見婆沙論五十三文明家家聖者三緣相云由業故者謂先造作增長欲界二有或三有業文婆沙論欲界二有或三有業之説當今論更受欲有三二生故之文準彼思之造彼三二生業之人不受三二生前具餘緣之時可名家家聖者也次於光法師雖有初緣云釋者或本云雖有初緣或本云雖有初後緣異本不同有之然而任雖具二緣之自釋亦準泰法師先斷三四品或後住初果時未起勝果道雖具前後緣未起勝果對治道故不名家家之釋以雖有初後緣之本可為正也問異生位可有分離染命終義耶進云光法師所引婆沙論六十四云聖者有分離染而命終異生不爾文付之聖者既有分離染命終之義設雖異生位何無此義哉何況上二界無退故上二界異生分離染位寧無命終之義哉答光法師所引婆沙論六十四中釋此事云以諸聖者有無漏定任持相續令極堅固異生但有世俗諸定任持相續非極堅固文此文意云聖者有無漏定任持相續令極堅固故分離一地染位不退分離煩惱有命終之義異生但有世俗諸定任持相續非極堅固無無漏定任持相續令極堅固故分離一地染位將命終時由未斷煩惱力必退分離煩惱還令成就故無分離染命終之義為言婆沙論中破尊者僧加筏蘇異生亦有分離染位而命終者之義云評曰彼不應作是説彼命終心勢力劣故先所斷結已得成就是故前説於理為善即述此意也但於上二界無退故上二界異生分離染位可有命終之義云難者上二界無退故上二界異生分離一地染之類必全離彼地染之後可命終也分離染位不命終故此難更不可來歟重尋云彼命終心勢力劣故先所斷結已得成就之義唯限欲界歟為當通上二界歟答唯限欲界也重難云尊者僧伽筏蘇意異生亦有分離染位而命終者者廣就三界異生論之而評家破此義云彼命終心勢力劣故先所斷結已得成就亦廣就三界異生可論之上二界異生何無先所斷結已得成就之義哉何況彼命終心勢力劣故等者釋述異生但有世俗諸定任持相續非極堅固之意也而異生但有世俗諸定等之文廣成三界異生無分離染命終之故若爾彼命終心勢力故等之文何不通上二界哉答彼命終心勢力劣故等之文雖似廣就三界論之上二界無退故更不可有先所斷結已得成就之義若上二界有此義者上二界異生何無全退命終之義哉但依身欲界異生上二界中隨於何地分離彼地染之人將命終時可有先所斷結已得成就之義也次先所斷結已得成就之義雖不通上二界而此文廣成三界異生無分離染命終之故也其故若上二界有退者上二界異生分離一地染將命終時無無漏定助故可有先所斷結已得成就之義若有先所斷結已得成就之義者上二界可有全退命終之義而上二界無全退命終之義故必全離彼地染之後方命終也又尋云依身初靜慮異生初靜慮具縛命終可云何命終哉答彼望欲界煩惱可云全離染命終也難云依身初靜慮異生望初靜慮煩惱可論分離染全離染之義何望欲界煩惱云全離染命終哉答設雖依身在初靜慮望欲界煩惱云全離染命終有何所背哉彼無色界聖者有分離染命終者生處與煩惱望各別地論之聖者無一處重生之義故初一地中難論此義故也準彼思之依身初靜慮異生初靜慮具縛命終望欲界煩惱云全離染命終全無相違也又尋云先所斷結已得成就之已言有何意哉答尊者僧伽筏蘇意云異生亦有分離染位而命終者然命終已結生心時先所斷結必還成就結生心時先所斷結初必還成就云故評家破此義對結生心時初還成就命終心位成就云已也問生無色界聖者可有分離染命終義耶答可有此義也兩方若有此義者思四無色處相一處之中無多天處何可有分離染命終之義哉若依之爾者生欲色界聖者既有分離染命終之義生無色界聖者相例可同如何答生無色界聖者可有分離染命終之義也故婆沙論六十四云生色界聖者有二事命終一全離染而命終二分離染而命終無有退者色無色界無退義故異生但有一事命終謂全離染彼無退故無分離染而命終故生無色界聖者異生應知亦爾文生無色界聖者有分離染命終之義云事此文甚分明也但於四無色處一處之中無多天處不可有分離染命終之義云難者生空無邊處聖者分離識無邊處染命終生識無邊處生識無邊處聖者分離無所有處染命終生無所有處生無所有處聖者分離非想非非想處染命終生非想非非想處同可云分離染命終也故四無色處一處之中雖無多天處有分離染命終之義更無相違也問論中明家家聖者受生緣云以有增進於所受生或少或過此故文爾者光法師意斷欲界修所斷三四品惑位受一生半生人或少類歟答可非或少類也兩方若或少類者寶法師釋此文云若至一來一間即生少也文光法師意亦可同若依之爾者案論文起盡為通説斷欲三四品義準可知受三二生故頌中如不説成根緣亦不可説受生緣云伏難云或少或無或過此故也若爾於斷欲界修所斷三四品惑位不受三二生之類中通此伏難也以非斷彼三四品惑位之受生多少何可顯其不定哉若斷彼三四品惑位無我少或無之不定者説斷惑緣之時寧不準知受生緣哉答論文既云以有增進於所受生非斷欲界修所斷三四品惑位之受生云事尤分明也何況斷彼三四品惑位都不可有受四生已上之類故或過此故者非斷彼三四品惑位之受生云事是必然也或少或無之類例亦可同是以見光法師解釋述如於欲界現般涅槃名為惑無如上流受四生以上之類故或過此故者非斷彼三四品惑位之受生云事是必然也或少或無之類例亦可同是以見光法師解釋述如於欲界現般涅槃名為惑無如上流受四生已上名或過此或無者出現般涅槃之類過此者指上流聖者受四生已上之者至或少之言寧舉斷欲界修所斷三四品惑位受一生半生之人哉何況見光法師下問答云問未滿七生得般涅槃即七生攝未滿二三生得般涅槃家家攝不解云七生不具緣雖不滿七是彼攝家家約具緣要須生漏方彼攝文若斷欲界修所斷三四品惑位受一生半生之人即或少攝者上既述彼人非家家聖者之旨畢何至下文重可有此問答哉明知斷欲界修所斷三四品惑位不受生或增進斷惑至一來一間位受一生半生之人云或少或增進斷惑不受生現般涅槃之類云或無或增進斷惑於色界中受四生已上之者云或過此也故光法師釋如受生或受半生名為或少同寶法師解釋意至一來一間位受一生半生之人云或少也但於論文起盡者斷欲界修所斷三四品惑位定置家家位其外出濫故斷彼三四品惑位受一生半生不為其濫於一來一間等餘增進位廣舉其濫也故光法師斷彼三四品惑位受一生半生之類別問答之云問不滿二三便般涅槃既非家家是何攝耶解云一來向攝以向寬故家家義狹故非彼攝文問論中明家家聖者受生緣云以有增進於所受生或少或無或過此故文爾者寶法師意或過此故者唯限上流聖者歟進云寶法師釋云若作上流那含及却退者此即復過三二生也文付之論文既云以有增進於所受生唯限增進位全無出却退者何背論文舉却退者哉是以光法師意任論現文唯舉上流一類如何答論文實述以有增進於所受生雖不舉却退者寶法師意廣為簡其濫或過此故之類中出斷欲界修所斷三四品惑位不受三二生退住預流果之後受四生已上之者為其濫也是則論文之外加却退者也故寶法師結釋云若進若退即非家家故置生言故簡此類非如治根義決定也文問論中述聖者斷欲界修所斷煩惱相云以斷第五必斷第六文爾者退不退二類俱可有必斷第六義耶進云光法師釋云論言以斷第五必斷第六者據不退者説文付之見論文起盡述家家聖者斷惑緣問何緣此無斷五品者答以斷第五必斷第六退不退二類俱可有必斷第六之義見光法師釋據不退者説有何深意哉答光法師意引婆沙論三十二預流者趣一來果時不起定者加行道時於欲六生得非擇滅若起定者要至第六無間道時於欲六生得非擇滅一來者趣不還果時不起定者加行道時於欲一生得非擇滅若起定者要至第九無間道時於欲一生得非擇滅之文畢云婆沙既不言第五無間道得欲六生非擇滅又不言初無間道得二生非擇滅第二無間道得三生非擇滅明知品品皆可出觀皆可退也起定聖者斷欲界修所斷九品煩惱品品出觀品品可退之旨釋成之時今論以斷第五必斷第六之文似相違故會論言以斷第五必斷第六者據不退者説無有中間有死生故必於現身斷第六也也非云斷欲界修所斷第五品煩惱之人總不退所斷煩惱光法師今解釋更有何疑哉重意云任非一品或能障得果之理若斷彼第五品煩惱不退之者不斷第六品煩惱之中間不命終云也若斷彼第五品煩惱之人退已斷煩惱或為全未斷或為三品斷或為四品斷之時可有命終之義也為言問天家家聖者可有天中得道義耶答依光法師三解釋意天家家聖者天中得道者無可有二意也兩方若有天中得道義者見光法師解釋作或云天家家者人中得道或云天家家者天中得道之二釋畢判雖有兩解前解為勝天家家者人中得道云前解為正釋如今決判者天家家聖者不許天中得道之義見若依之爾者聖者種類是萬差造業受生可不定若天家家聖者有人天各受三生二生之類者豈無天中得道天中涅槃之義哉答光法師釋家家聖者相引正理論若天家家受三生者人間受二天上受三受二生者人一天二如應例釋人中家家之文畢述一箇問答云問俱舍婆沙同正理不解云俱舍婆沙既無明文與正理同或正理據極少家家説此論婆沙據極多家家説或論意各別若作此解俱舍婆沙人天各受二生三生文依此三解釋意天家家聖者天中得道有無其義不定也初釋意云俱舍婆沙兩論既無分明之文故彼兩論意同正理論説不許家家聖者人天各受三生二生為言光法師即釋其故云問何故住果人天往返各有具受七生家家不受一少生耶解云住果容預各具受七向中匆迫二三數滿即般涅槃故不受後一小生也又解家家具緣若天家家天三人二若人家家人三天二三生二生緣滿即休故不受後一小生也文依此初釋意者俱舍正理婆沙三論意一同天家家聖者全無天中得道之義為言第二釋意云正理論文據極少家家聖者説若天家家受三生者人間受二天上受三受二生者人一天二若據極多家家聖者者可有人天各受三生二生之類俱舍婆沙兩論意據極多家家聖者述人天各受三生二生之旨若據極少家家聖者者可有人二天三人一天二之類為言依此第二釋意者俱舍正理婆沙三論意一同許家家聖者人天各受三生二生之類故天家家聖者可有天中得道之義也第三論意各別釋意云正理論意存向中匆迫二三數滿即般涅槃故不受後一小生也之理不許家家聖者人天各受三生二生之類俱舍婆沙兩論意任常途之習家家聖者三生二生者可人天合受三生二生為言依此第三釋意者正理論意天家家聖者不可有天中得道之義俱舍婆沙兩論意天家家聖者可有天中得道之義也但於光法師雖有兩解前解為勝之釋者初釋之前作或云天家家者人中得道或云天家家者天中得道之二釋之時天家家者人中得道人家家者天中得道云前解為勝判也天家家者天中得道還於天中入般涅槃謂於天中初得道已從彼處沒還生天中以樂生天故初受生還生天處初得道身非是家家二三生攝故生天趣不名重生後方人天往還間生人家家例此應釋云後解意違聖者一處不重生之理故以此後解為不正釋也依第二第三釋意之時非遮天家家聖者有天中得道之義故全非相違也重難云光法師三解釋俱不可然先就初釋難思聖者種類分萬差造業感果非一準若天家家聖者有人天各受三生二生之類者以何道理強可遮天中得道之義哉若由向中匆迫之理者任匆迫意樂何輒不受後一小生哉例如彼極七返有聖者雖極生厭離之思惑難斷故道未熟故受欲界七生也家家聖者由匆迫意樂不受後一小生云事道理甚不可然哉次就第二釋亦有疑正理論中云應知總有二種家家一天家家謂欲天趣生三二家而證圓寂或一天處或二或三二人家家謂於人趣生三二家而證圓寂或一洲處或二或三畢重明上所舉人天家家聖者受生相云若天家家受三生者人間受二天上受三受二生者人一天二如應例釋人中家家明一切家家聖者受生相見今論中標應知總有二種家家亦舉一切家家聖者盡見是以寶法師釋此文云論中既云家家總二謂天及人以此故知二攝一切家家盡也文若爾正理論文據極少家家聖者説殘極多家家聖者俱舍婆沙兩論文據極多家家聖者説殘極少家家聖者云事豈不背此等定判哉何況今論云一天家家謂欲天趣生三二家而證圓寂或一天處或二或三二人家家謂於人趣生三二家而證圓寂或一洲處或二或三文婆沙論五十三云天家家者謂於天上或受二生或受三生或一天處或二天處或三天處受二三生或一天處或二天家或三天家受二三生人家家者謂於人中或受二生或受三生或一洲處或二洲處或三洲處受二三生或一人家或二人家或三人家受二三生文此俱舍婆沙兩論文未云人天各受三生二生指何文判此論婆沙據極多家家説哉加之今論明家家聖者受生多少人天各受三生二生與不受後一小生差異許也只可云多少家家此二類外更無餘家家聖者何云極多極少家家哉次就第三釋亦不明今論云三由受生更受欲有三二生故文婆沙論五十三云由業故者謂先造作增長欲界二有或三有業文此俱舍婆沙兩論文更無背正理論若天家家受三生者人間受二天上受三等之文何作論意各別之釋哉答光法師三解釋俱非無其謂初釋意云俱舍婆沙兩論既無分明之文故由向中匆迫之理與正理論意同云也但於極七返有聖者例難者住果位容預故聖道未熟之間不起斷惑道故雖極生厭離之思受欲界七生向中既起斷惑道欣趣勝果故匆迫不受後一小生也住果容預各具受七向中匆迫二三數滿即般涅槃故不受後一小生也之解釋其意在之第二釋意云正理論中云應知總有二種家家一天家家乃至二人家家等雖攝一切家家聖者下云若天家家受三生者人間受二天上受三等暫就極少家家聖者論之今論中云應知總有二種家家一天家家乃至二人家家等亦雖攝一切家家聖者下云謂欲天趣生三二家而證圓寂等暫就極多家家聖者説之為言俱舍婆沙兩論文雖正不云人天各受三生二生凡於欲界經生聖者一生二生乃至七生者就人天合受生論中俱舍婆沙處處説故不云人二天三等只云生三二家亦述受二三生任常途之習可人天合受三生二生得意云此論婆沙據極多家家説也但極少云事實此二類外雖無餘家家聖者多無過人天各受三生二生少不超不受後一小生故置極言也第三釋意云正理論中分明云若天家家受三生者人間受二天上受三等非人天各受三生二生俱舍婆沙兩論文不云人二天三等只述受三生二生之旨故任常途之習可人天合受三生二生得意作論意各別之釋尤有其謂也問寶法師意正理論中三二生家家者説極多家家聖者歟答説極多家家聖者也兩方若説極多家家聖者見正理論文云若天家家受三生者人間受二天上受二生者人一天二如應例釋人中家家文此文無諍非極多家家聖者見是以光法師意正理論文非極多家家聖者釋若依之爾者見寶法師解釋引正理論根最鈍者具經七生非諸利根生定滿七之文畢云準上論文家家言斷三四品惑餘三二者亦據極説文如此釋者正理論中三二生家家者説極多家家聖者見如何答寶法師意正理論中三二生家家者就人天各受三生二生極多家家聖者論得意也即見寶法師解釋一段前後上云論中既云家家總有二謂天及人以此故知二攝一切家家盡也正理論云應知總有二種家家若天家家受三生者人間受二天上受三受二生者人一天二文此釋意今論應知總有二種家家之文攝一切家家聖者盡云畢引合正理論應知總有二種家家等之文故正理論今文亦攝一切家家聖者盡云事是分明也彼論三二生家家之文若非極多家家聖者者如何可攝人天各受三生二生家家聖者哉舉極少家家不可攝極多家家舉極多家家可攝極少家家故也如彼七生須陀洹攝六五生等也次引婆沙論四十六七生天上七生人中者此依圓滿預流而説故人天有等受七生然有預流人天生別謂或天七人六或人七天六或天六人五或人六天五或天五人四或人五天四或天四人三或人四天三或天三人二或人三天二或天二人一或人二天一此中且説極多生者故説預流人天各七之文畢云準此論文唯説天二人一等就不同説亦有天二人二等義亦無違文此釋意為會正理論若天家家受三生者人間受二天上受三等之文引婆沙論預流果聖者天七人六等不等受生之文為準例會唯説天二人一等就不同説畢鄰此釋云又準家家若斷三品餘有三生若斷四品餘有二生即唯有斷上三四品惑是生等家家也文此釋意正理論人間受二天上受三等之文上既會之畢斷欲三四品三二生家家之文據人天等受三生二生極多家家聖者説釋成見次引正理論根最鈍者具經七生非諸利根生定滿七之文畢云準此故知經生斷惑是七生攝準上論文家家言斷三四品惑餘三二者亦據極説此中非無減三二生若斷三品經一生已總斷餘結入涅槃者亦是三生家家攝也二生家家其義亦爾文此釋意正理論中斷欲三四品三二生家家者據人天各受三生二生極多家家聖者説此中斷彼三品惑受一生者亦是三生家家聖者攝也為言次文云詳諸經論説二家家人家家者若等不等生者皆得名人天家家若等生者據得道及涅槃者為名若不等生者據生多或涅槃處為名若斷三四品餘三二生者據根本者説言天一人二等據不滿三二生斷惑者説文此釋意正理論中上文云斷欲三四品三二生家家據人天等受三生二生極多家家聖者説下文云人間受二天上受三等據不受後一小生不等受生極少家家聖者論也為言任此等一段定判正理論中三二生家家者就人天各受三生二生極多家家聖者論云事是必然也但於正理論人間受二天上受三等之文者料簡寶法師解釋一段前後會通先顯畢重成其意者正理論中上文云斷欲三四品三二生家家舉極多家家聖者攝極少家家聖者故下文者為釋顯其所攝不等受生極少家家聖者相故云人間受二天上受三等也問光法師意可有受一生家家聖者耶進云光法師解釋中無此類見付之以道理思之斷欲界修所斷三四品惑聖者中何無受一生之類哉若有此類者寧不名家家聖者哉是以於預流果七生者雖不具經七生攝屬七生之類相例可同依之寶法師解釋中可有受一生家家聖者見如何答光法師意不許受一生家家聖者也其故見今論文偈頌結斷欲三四品三二生家家長行述若三緣具轉名家家一由斷惑斷欲修斷三四品故乃至三由受生更受欲有三二生故斷欲界修所斷三四品惑乃至受欲界三二生名家家聖者故斷欲界修所斷三四品惑聖者中雖有受一生之類不受三二生者既闕受生緣寧名家家聖者哉但於預流果七生例難者光法師會此難云七生不具緣雖不滿七是彼攝家家約具緣要須生滿方彼攝文彼斷欲界修所斷三四品惑聖者中受一生之類是一來向攝不名家家聖者也故光法師自問答云問不滿二三便般涅槃既非家家是何攝耶解云一來向攝以向寬故家家義狹故非彼攝文次於寶法師解釋者見彼解釋前後引正理論若有七生不必滿七非家家位中間涅槃何類所攝攝屬七生七中極聲顯極多故由此已顯生未滿前得般涅槃亦是彼攝根最鈍者具經七生非諸利根生定滿七之文畢云準此故知經生斷惑是七生攝準上論文家家言斷三四品惑餘三二者亦據極説此中非無減三二生若斷三品經一生已總斷餘結入涅槃者亦是三生家家攝也二生家家其義亦爾文此釋意例預流果七生斷欲界修所斷三四品惑聖者中受一生之類三生二生家家攝也為言是則人師異釋也何可致劬勞哉尋云見光法師解釋云無五生四生一生半家家文此釋意斷欲界修所斷三四品惑聖者中無五生四生半家家云歟答此釋非述斷欲界修所斷三四品惑聖者事也見所釋起盡上標無斷一品二品五品中間死生故下述無五生一生半家家故明知無斷一品惑受五生斷二品惑受四生斷五品惑受一生半家家聖者為言問光法師意凡位斷欲界七八品惑人入聖後未起彼能治無漏道時可名不還向聖者耶答未起彼能治無漏加行道之前不可名不還向聖者也兩方若名不還向聖者者未起彼先所斷七八品惑能治無漏道何可名不還向聖者哉若依之爾者見光法師解釋云即斷修惑七八品者應知亦名不還向聖者見如何答於欲界七八品修惑能治無漏道可有加行無間解脫勝進四道其中未起彼加行道之前不可名不還向聖者起加行道之後有向後果之義故可名不還向聖者也但於光法師解釋者必具斷惑成根受生三緣名為一間聖者凡位斷欲界七八品惑之人入聖之後於先所斷七八品修惑上雖起勝果道攝加行道未起勝果道攝無間解脫二道之前不具成根受生二緣故雖不名一間聖者已起加行道故可名不還向聖者故云一間具緣以立向但據斷惑故二差別也起彼能治無漏無間解脫二道之後名成根緣故也故光法師釋云即一來者進斷餘惑若三緣具轉名一間乃至二由成根得能治彼無間解脫無漏根故文問寶法師意依根本地入見道人可成欲界修惑能治無漏耶答不成之也兩方若成之者依根本地入見道人至道類智位必證不還果何可成欲界修惑能治無漏哉若依之爾者見寶法師定判釋家家一間緣闕具云若有依根本地入見道等定現般者至此位時雖成無漏及斷惑等由闕生故非是家家及一間也文依根本地入見道人若不成欲界修惑能治無漏者何可具家家一間成根緣哉答依根本地入見道人至道類智位必證不還果而以住勝果之後必不起劣向道無漏故全不成欲界修惑能治無漏也如云非住果時起彼向道以住勝果不起劣故也是以見光法師餘處二十一所引正理論五十六文述先離欲染人彼修所斷九品離繫亦一時得故云必不起彼無漏對治是不還果向道攝故文任此等文理依根本地入見道人不成欲界修惑能治無漏云事是必然也但寶法師解釋者述依根本地入見道現般人相雖非家家一間正成根緣斷惑緣成無漏故有成根緣斷惑品故有斷惑緣現般人故闕受生緣釋也重意云對現般人故受生緣全闕雖非欲界修惑能治無漏故有成根緣成斷惑品故有斷惑緣成云雖成無漏及斷惑等由闕生故非是家家及一間也更非云成欲界修惑能治無漏歟尋云寶法師意依根本地入見道人不現般者家家一間攝歟若非彼攝者寶法師意依根本地入見道人具成根斷惑二緣釋而不現般者可有受生緣若具三緣者何不名家家一間哉若亦彼攝者彼三緣皆非家家一間正緣寧可名家家一間哉答依根本地入見道人不現般者不可名家家一間彼三緣皆非家家一間正緣故也但於寶法師解釋者依根本地入見道人定現般者受生緣全闕故釋由闕生故許也以實論之不可具成根斷惑二緣加之不現般者雖受色界生依根本地人見道人故不可受欲界生若爾三緣皆非家家一間正緣何可名家家一間哉問先離欲染入見道人至第十六心證不還果位可總集欲界修惑無為耶答彼位不總集欲界修惑無為也兩方若總集者先離欲染入見道人於欲界修惑無為無有無漏離繫得至第十六心證不還果位何可總集彼無為哉是以光法師餘處二十一所引正理論五十六中述六時重得無為之相先離欲染超越證者欲界修所斷惑無為唯世俗道治生時得見以知今此位不總集欲界修惑無為云事若依之爾者今論中釋不還果名五下結斷云雖必先斷或二或三然於此時總集斷故文如此文者今位總集欲界修惑無為見如何答先離欲染入見道人至第十六心證不還果位由以住勝果不起劣故之理故不總集欲界修惑無為云事性相之所定也更不可疑之是以見光法師餘處二十一解釋引正理論五十六若依未至若依根本彼修所斷九品離繫亦一時得如前應知必不起彼無漏對治是不還果向道攝故之文畢云又準正理先斷欲六品惑第九品彼六九品修斷離繫唯有漏得畢竟無無漏得文今此位不總集欲界修惑無為之旨此等定判尤分明也但於今論然於此時總集斷故之文者古來學者聊簡此文雖有異義暫存一義云證不還果位於五下分結無有一時頓斷之義超越證人先異生位斷貪嗔結後見道位斷身見戒取疑三結次第證人先見道位斷身見戒取疑三結後修道位斷貪嗔二結故論其所斷雖有先後證不還果位得一類勝品無漏離繫得總集五下分結無為故不還果名五下分結斷云也所謂超越證中依未至地入見道人雖不總集修所斷貪嗔二結無為總集見所斷貪嗔二結無為及身見戒取疑三結無為次第證人總集先所斷身見戒取疑三結無為及見修所斷貪嗔二結無為故不還果名五下結斷為言更非云總集修所斷貪嗔二結無為也重意也五下分結斷位雖有先後證不還果位得一味勝品無漏離繫得總集五下分結無為故不還果名五下結斷云也故寶法師釋此或名曰五下結斷雖必先斷或二或三然於此時總集斷故之論文云雖超越者先斷二後斷三次第者先斷三後二兩種不同至得果時俱集五下分結盡無為一味得故故二種不還皆得名無五下分結斷文重難云依根本地入見道人全不得見修所斷貪嗔二結無為證不還果位無有總集五下分結無為之義何可名五下分結斷哉答依根本地入見道人由根本非欲斷對治故之理故不得見所斷貪嗔二結無為由以住勝果不起劣故之義故無得修所斷貪嗔二結無為然而證不還果位是容總集貪嗔二結無為位故相從正總集五下分結無為之類同名五下結斷也然於此時總集斷故者總集斷位故為言又尋云見光法師餘處二十一解釋述依根本地入見道人至第十六心證不還果位得五下分結集遍知云五下分中雖於欲界見修所斷不得遍知能斷上界見斷三結總相而言五中得三以少從多得第七名文何準此釋不會然於此時總集斷故之論文哉答今論然於此時總集斷故之文意超越次第之人俱證不還果位總集五下分結無為故不還果名五下結斷為言故就實得五下分結無為論總集斷故之義也光法師餘處五中得三以少從多得第七名云釋意依根本地入見道人至第十六道類智位或云得色無色界見道斷遍知或云得五下分結盡遍知者婆沙論六十三論二師異説也初師意據全得彼體故云得色無色界見道斷遍知第二師意據能得彼名故云得五下分結盡遍知也其中第二師得五下分結盡遍知云説意五下分結無為其體不滿足故難得五下分結盡遍知名云疑可有之故會之云五中得三以少從多得第七名也事起義趣既異何準彼會之哉重意云今論文意不還果名五下結斷事決定置之會於五下分結非一時頓斷之疑云然於此時總集斷故光法師餘處解釋意述婆沙論一師説意依根本地入見道人不得貪嗔二結無為事決定置之顯至第十六道類智位得五下分結盡遍知名之由云五中得三以少從多得第七名也若爾今論當卷之文光法師餘處之釋其趣途異也更難準例歟問從欲界生欲界中有位可有般涅槃類耶進云論中云言中般者謂往色界住中有位便般涅槃從欲界中有位無般涅槃類見付之設雖從欲界生欲界中有位何無般涅槃類哉是以光法師所引婆沙論百七十四中述從色界生色界中有位無般涅槃云色界無有如是災橫極可厭事令生厭逆文而從欲界生欲界中有位既有災橫可生厭離何無般涅槃類哉加之識身足論十一中出亦能起染亦能離染之類云及諸中有文諸中有之言是廣何不亘從欲界生欲界中有位哉答從欲界生欲界中有位無般涅槃類云事今論正理顯宗婆沙等諸論中出多所以述成此事披彼論文可知之也即今論云以彼聖道未淳熟故未易能令現在前故所有隨眠非極劣故毗婆沙者作如是釋諸欲界法極難越故彼尚有餘多所作故謂應進斷不善無記二煩惱故及應進得若二若三沙門果故并應總越三界法故住中有位無如是能文正理六十五云欲界中有依身微劣於多事業無堪能故住本有位於欲界法尚難越度況中有中能越欲界至得應果多事業者謂越三界及永斷除二種煩惱并得二三沙門果證住中有位無如是能又此有前未曾數習九品差別煩惱治故又不還等果非中有身得斷增上惑所證得故離三界染極為難故無欲中有能般涅槃色界中有與此皆異故有於中得涅槃者文顯宗論三十一文全亦同之婆沙論百七十四云問如色界有中般涅槃欲界亦有耶答無問何故答欲界是不定界非修地非離染地多諸過失災橫留難住本有時尚難得果況住中有微劣身耶色界不爾故住中有能般涅槃復次若住欲界中有般涅槃者則依中有能越三界然無依中有身能越三界者復次若住欲界中有般涅槃者則中有中能斷三界煩惱然無住中有身能三界煩惱者復次若住欲界中有般涅槃者則中有中能斷不善無記二種煩惱然無住中有身能斷不善無記二種煩惱者復次若住欲界中有般涅槃者則中有中能證若二若三沙門果然無住中有身能證若二若三沙門果者以是義故唯色界有中般涅槃欲界則無復次中般涅槃必於前生已離欲界染已離欲界染者必不起欲界中有故於欲界無中般涅槃復次欲界煩惱業重非於中有微劣身中所能除斷復次中有非得不還果所依但是得阿羅漢果所依復次欲界中有必不能起聖道現前以劣弱故色界不爾由此義故欲界無有中般涅槃復次中有微劣唯能起自根本地聖道現前非未至等以難起故若欲界中有般涅槃者則與此相違故必無有復次欲界有違故必無有復次欲界有違順相應煩惱有外六門煩惱有能引二果煩惱有無慚無愧相應煩惱及有忿等種種雜類諸隨煩惱難破難斷難越難離住本有中作大功用尚難除斷況在中有故無欲界中般涅槃復次要曾具修九品對治方於中有能般涅槃欲界中有必未具修九品對治故彼中有不般涅槃文從欲界生欲界中有位無般涅槃類云事此等論文委述其由後學私不可致劬勞歟但於光法師所引婆沙論文者從欲界生欲界中有位雖有災橫極可厭離中有依身微劣虛薄難斷欲界麁強煩惱故從欲界生欲界中有位無般涅槃類也次於識身足論文者從欲界生四靜慮中有位皆有離染之義故出亦能離染之類云及諸中有全非相違也問論中明中般涅槃聖者相云謂往色界住中有位便般涅槃文光法師釋此文作二解釋爾者初釋意今此涅槃者唯限無餘涅槃歟答唯限無餘涅槃也兩方若唯限無餘涅槃者以道理思之中般涅槃聖者初盡智位無入無餘涅槃住中有位便般涅槃之文何不通有餘涅槃哉何況任第二釋豈有斷惑已第二剎那即入無餘之理可通有餘涅槃云事是必然也設雖初釋意豈不存此理哉若依之爾者初釋意若通有餘涅槃者與第二釋有何差異哉答見光法釋師初釋云言中般者謂欲界沒往於色界住中有位起應生地聖道現前斷餘煩惱成阿羅漢即便般無餘涅槃故名中般故婆沙百七十四云從彼命終起色界中有即住中有得如是種類無漏道由此道力進斷餘結於無餘依涅槃界而般涅槃是名中般涅槃準婆沙文約無餘依釋中般也文此釋意準婆沙論於無餘依涅槃界而般涅槃之文今論住中有位便般涅槃之文唯限無餘涅槃得意也但於中般涅槃聖者初盡智位無入無餘涅槃云難者此事為必然道理故實雖可通有餘涅槃今論便般涅槃之言如婆沙論説唯約無餘涅槃論之以相不顯略而不言有餘涅槃為言第二釋意儲婆沙不説以相不顯略而不言之會通存豈有斷惑已第二剎那即入無餘之道理今論便般涅槃之文異婆沙論意通有餘涅槃云也重意云料簡今論住中有位便般涅槃之文初釋意云準婆沙論説唯限無餘涅槃第二釋意存任必然道理異婆沙論意通有餘涅槃是其兩釋大綱也問中般涅槃聖者可起未至中間聖道耶進云光法師釋云不起未至中間無色文付之中般涅槃聖者種類非一準既有住初靜慮地中有位般涅槃者何不起未至中間聖道哉答光法師問答此事云問起何地聖道解云起應生彼根本地道以是樂道起時易故不起未至中間無色以是苦道起艱辛故得無學已亦不能起如婆沙百七十五廣説文依今解釋見婆沙論文云如是説者應説不起所以者何由法爾故復次以時促故彼得果已疾般涅槃何容更起餘地無漏復次中有唯於根本地聖道隨順非近分地以近分地聖道苦道所攝難現前故復次若地有定亦有生者住中有中起彼聖道未至定有定無生靜慮中間雖亦有生而是異生所生非聖者四根本靜慮有定有生故住中有起彼聖道文加之正理論六十五中釋此事云又此地中有得般涅槃唯起此地中所有聖道初靜慮地中有位中般涅槃者唯起自他根本靜慮聖道現前非未至中間難令現前故在中有位依身微劣要易起者方能現前文由此等多義門故住初靜慮地中有位般涅槃者不起未至中間聖道也問正理論意有行般無行般人得涅槃時可有遲束不同耶答可有遲速不同也兩方若有遲速不同者寶法師引正理論六十五然有經説無行在先亦有經中先説有行時既無異隨説無違之文畢云準此論文有行無行在生般後即二相望不定前後文如此釋依之爾者見正理論六十五文云然諸三種一切皆由速非速經久得般涅槃故分為九種不相雜亂文此文無諍有行般無行般人得涅槃時可有遲速不同見如何答薩婆多宗意生般之人以具勤修速進二道故往色界中生已不久速證涅槃有行般者唯有勤修道無速修道故往色界中生已長時加行不息由多功用方證涅槃無行般者以無勤修速進二道故往色界中生已經久加行懈怠不多功用遲證涅槃故以此三類如其次第相配速非速經久非只正理一論所説今論并婆沙論中亦所述也故今論云生般涅槃亦分三種生有行等般涅槃故此皆生已得般涅槃是故並應名為生般乃至然諸三種一切皆由速非速經久得般涅槃故更互相望無雜亂失文婆沙論百七十五云如以三喻顯不生三當知亦已顯生三種是故前説若由此故立初生品即由此故立初不生乃至廣説文任此等論判有行般無行般人得涅槃時可有遲速不同云事甚分明也但於寶法師所引正理論文者有行般無行般人得涅槃時實雖有遲速不同才是一生之間暫時遲速不同非如上流聖者之中全超半超遍沒三類得涅槃時大有遲速不同故云時既無異隨説無違歟問半超中唯受二生類可有耶答可有此類也兩方若有此類者見光法師解釋明半超相云極少三生文明知無此類云事何況若有半超之中唯受二生之類者與全超者可有何差異哉若依之爾者半超之者種類非一何無唯受二生之類哉答半超之中唯受二生之類可有也故寶法師釋此事云如生二三四天等處中間般涅槃者是半超攝雖不隔越以超生故亦名半超文即出其體者如彼欲界沒生梵衆天沒生梵輔天而般涅槃之者等是則半超之中唯受二生之類也何況婆沙論第二師意退住第二靜慮等生少光天等少光天等沒超彼中間所應生處生色究竟天或非想非非想處而般涅槃之者亦是半超之中唯受二生之類也但於光法師極少三生之釋者彼就欲界沒生梵衆天乃至生色究竟天或非想非非想處而般涅槃之者明全超半超遍沒相故云極少三生也此外半超之類是多故唯受二生之類更非所遮也次於與全超者不可有差異云難者半超之中唯受二生之類者就或下不生梵衆等或上不生色究竟天等之類論之欲界沒生色究竟天等而般涅槃之類是全超者非半超者故全超半超二類遙別也重難云欲界沒生少光天少光天沒超彼中間所應生處生色究竟天或非想非非想處而般涅槃之者唯生二處悉超餘處可名全超者何屬半超者哉答全超者者一時超彼中間所應生處之類也而今此人欲界沒生少光天之時先超初靜慮二處少光天沒生色究竟天之時後超第二靜慮二處第三靜慮三處第四靜慮七處故先後合論雖超十四處非一時超十四處故不名全超者屬半超者也樂定上流準之可思問寶法師所引婆沙論百七十四中於生第二靜慮以上上流聖者判全超等有無舉三師異説爾者第三師意全超等三類可攝一切上流聖者盡耶答可攝一切上流聖者盡也兩方若攝一切上流聖者種類非一全超等三類何可攝一切上流聖者盡哉何況案第三師意全超等三類相對所立也若有全超者可有半超遍沒若無全超者不可有半超遍沒以今此義門思之更不可攝一切上流聖者盡哉若依之爾者寶法師引婆沙論三師説畢云雖無評文後二説正攝人盡故文如此釋者第三師意全超等三類可攝一切上流聖者盡見如何答見寶法師解釋引婆沙論問如説退住初靜慮生梵衆天作全超半超一切處沒上流彼若退住第二靜慮生少光天退住第三靜慮生少淨天退住第四靜慮生無雲天等彼亦得作全超半超一切處沒上流不耶有説不得以生梵世於上不還所應生處無缺減故依彼建立全超半超一切處沒若退生上地處便缺減故不依彼建立全超等有説彼亦得名半超以超少分中間處故有説亦得具名三種彼説從欲界沒隨生何處即於彼上所應生處亦可施設全超半超一切處沒故問若不還者欲界沒生無色界亦得作全超等不有説不得有説彼亦得名半超有説彼亦具名三種此中所以皆如前釋之文畢云雖無評文後二説正攝人盡故又上不至色究竟等亦此三攝下不從初定故亦此三攝即於此中後説為超於理無失若通生處已下即但名半超若唯説生處已上亦有全超義文任此解釋第三師意全超等三類可攝一切上流聖者盡云事甚分明也但於若無全超者不可有半超遍沒云難者第三師意唯約生處以上具可施設全超半超遍沒三類也所謂暫就樂惠上流明其相者欲界沒生少光天少光天沒生色究竟天而般涅槃之者名全超者欲界沒生少光天少光天沒於彼中間所應生十二處或生一處超十一處或生二處超十處如是乃至或生十處超二處或生十一處超一處然後生色究竟天而般涅槃之者名半超者欲界沒生少光天少光天沒生無量光天如是乃至次第遍生彼上所應生一切處然後生色究竟天而般涅槃之者名遍沒者為言樂定上流準之可思故此師意全超半超遍沒三類可攝一切上流聖者盡也重難云欲界沒生梵輔天如是乃至生色究竟天或非想非非想處而般涅槃之者全超等三類之中何類耶次欲界沒生梵衆天梵衆天沒生梵輔天梵輔天沒生少光天等而般涅槃之者全超等三類之中亦何類耶次欲界沒生善現天善現天沒超善見天生色究竟天而般涅槃之者及欲界沒生識無邊處識無邊處沒超無所有處生非想非非想處而般涅槃之者難分全超半超差異哉其故全超半超相對而立而超無殘處故不可云半超者若無半超者對何可名全超者哉答欲界沒生梵輔天如是乃至生色究竟天或非想非非想處而般涅槃之者亦可有三師異説也其中第三師意唯約生處以上亦可施設全超半超遍沒三類也所謂暫就樂惠上流明其相者欲界沒生梵輔天梵輔天沒生色究竟天而般涅槃之者名全超者欲界沒生梵輔天沒於彼中間所應生十三處或生一處超十二處或生二處超十一處如是乃至或生十一處超二處或生十二處超一處然後生色究竟天而般涅槃之者名半超者欲界沒生梵輔天梵輔天沒生少光天如是乃至次第遍生彼上所應生一切處然後生色究竟天而般涅槃之者名遍沒者可云也樂定上流準之可思故此師意欲界沒生梵輔天如是乃至生色究竟天或非想非非想處而般涅槃之者可有全超半超遍沒三類也即如彼退住第二靜慮生少光天退住第三靜處生少淨天退住第四靜慮生無雲天之者約彼上所應生處施設全超半超遍沒三類也次欲界沒生梵衆天梵衆天沒生梵輔天梵輔天沒生少光天等而般涅槃之者皆可名半超者也此人雖不超彼中間所應生處不至彼上所應生處故超彼上所應生處而般涅槃成故可名半超者也故寶法師釋云如生二三四天等處中間般涅槃者是半超攝雖不隔越以超生故亦名半超文次欲界沒生善現天善現天沒超善見天生色究竟天而般涅槃之者及欲界沒生識無邊處識無邊處沒超無所有處生非想非非想處而般涅槃之者亦皆可名半超者也暫就行無色上流論其相者欲界沒生空無邊處空無邊處沒超識無邊處無所有處生非想非非想處而般涅槃之者名全超者欲界沒生空無邊處空無邊沒超識無邊處無所有處隨一之處生非想非非想處而般涅槃之者名半超者欲界沒生空無邊處如是次第生識無邊處無所有處然後生非想非非想處而般涅槃之者名遍沒者為言故就欲界沒生空無邊處之類見之者具可有全超半超遍沒三類若就欲界沒生識無邊處之類云之者不可有全超者唯可有半超遍沒二類也所謂欲界沒生識無邊處識無邊處沒超無所有處生非想非非想處而般涅槃之者名半超者欲界沒生識無邊處如是次第無所有處非想非非想處而般涅槃之者名遍沒者可云也欲界沒生無所有處沒生非想非非想處而般涅槃之者不可名全超半超者故唯可有遍沒之一類也重難云第三師意欲界沒超下諸處隨生何處於彼上所應生處施設全超半超遍沒三類準彼思之不至色究竟天或非想非非想處此二極處而般涅槃之者亦可施設全超半超遍沒三類何偏屬半超者哉是以寶法師釋云又上不至色究竟等亦此三攝文亦此三攝之言可有全超半超遍沒三類見如何答全超遍沒者就至色究竟天或非想非非想處此二極處而般涅槃之者論之故彼上不至此二極處而般涅槃之者更不可名全超遍沒者也半超之者其類是多故以全此人偏可屬半超者也但於寶法師解釋者上不至色究竟天等極處而般涅槃之者全超半超遍沒三類之中是半超攝為言亦此三攝者更非云亙全超半超遍沒三類也問寶法師所引婆沙論中於生第二靜慮以上上流聖者判全超等有無舉三師異説爾者為唯望上地論之為當兼望上下地論之歟答三師所存其意相替歟兩方若唯望上地論之者見寶法師解釋引婆沙論三師説畢云若遍生處以下即但名半超若唯説生處以上亦有全超義文此釋意無諍兼望上下地論之見若依之爾者婆沙論中舉第三師義云即於彼上所應生處亦可施設全超半超一切處沒故文如此文者唯望上地論之見如何答於婆沙論三師異説可成其意也初師云有説不得以生梵世於上不還所應生處無缺減故依彼建立全超半超一切處沒若還生上地處便缺減故不依彼立全超等文此師意云生第二靜慮以上上流聖者處便缺減故不依彼建立全超半超超遍沒為言故依此師意時不可及望上下地之分別第二師云有説彼亦得名半超以超少分中間處故文此師意云生第二靜慮以上上流聖者名半超者超欲界與第二靜慮等少分中間初靜慮等處故為言明知兼望上下地論之云事若不望下地論之者遍生第二靜慮以上所應生一切處之者寧不名遍沒者哉故此師意望下地名半超云事甚炳然也第三師云有説亦得具名三種彼説從欲界沒隨生何處即於彼上所應生處亦可施設全超半超一切處沒故文此師意云生第二靜慮以上上流聖者唯望上地施設全超半超遍沒三類為言若兼望下地論之者何可有遍沒者哉故此師意唯望上地論全超等相云事亦分明也爰知第二師意兼望下地論之第三師意準望上地論之云事退見寶法師解釋引婆沙論三師説畢云雖無評文後二説正攝人盡故又上不至色究竟等亦此三攝下不從初定故亦此三攝即於此中後説為超於理無失若通生處以下即但名半超若唯説生處以上亦有全超義文料簡此釋意云雖無評文後二説正攝人盡故者婆沙論三師説中後二説為正初師意生第二靜慮以上上流聖者非全超等三類攝云故全超等三類之中不攝一切上流聖者盡故不正義後二説意全超等三類之中攝一切上流聖者盡故為正義為言又上不至色究竟等亦此三攝下不從初定故亦此三攝者上不生色究竟天等極處於初二三靜慮并第四靜慮下七處等中間處而般涅槃之者全超等三類之中是半超攝下不生初靜慮等欲界沒生第二靜慮等如是乃至生色究竟天等而般涅槃之者隨其所應全超等三類攝為言第三師意唯望生處以上施設全超等三類故如此釋也即於此中後説為超於理無失若通生處以下即但名半超若唯説生處以上亦有全超義者婆沙論三師説中後二説意説全超等相叶道理無過失第二師意通望生處以下但名半超者第三師意唯望生處以上施設全超等三類故欲界沒生第二靜慮以上之者亦有全超者為言重見次下解釋云如生二三四天等處中間般涅槃者是半超攝雖不隔越以超生故亦名半超文此釋意云生二三四天等中間處而般涅槃不至色究竟天等極處之者雖無隔越之義彼上所應生處有缺減故既超所應生處故亦名半超者為言此釋意下所應生處雖不缺減上所應生處有缺減故名半超者之故明知通望上下地論半超相云事故總云之兼望上下地論此義門也但於兩方疑難者寶法師若通生處以下即但名半超之釋述婆沙論第二師意婆沙論即於彼上所應生處亦可施設全超半超一切處沒故之文第三師義故其意自本各別也不可和會之歟重難云見婆沙論百七十四文云問若不還者欲界沒生無色界亦得作全超等不有説不得有説彼亦得名半超有説彼亦具名三種此中所以皆如前釋於行無色上流有三師異説見而第二師意欲界沒生空無邊處之者豈可望色界名半超哉全超半超者就超所應生處論之行無色上流自本無生色界之義依超非所應生之處何可名半超哉以此道理思之唯望上地可論半超相也是一次見光師解釋明半超相云極少三生文第二師意若望下地名半超者欲界沒生少光天少光天沒生色究竟天或非想非非想處而般涅槃之者可名半超者若爾豈無半超之中唯受二生之類哉是二次第二師意以超少分中間處故者上下地中指何處哉若於生處已有缺減處者論其超義何不望上地哉是三次第三師意唯望上地論超義者欲界沒生善現天善現天沒超善見天生色究竟天而般涅槃之者及欲界沒生識無邊處識無邊處沒超無所有處生非想非非想處而般涅槃之者難分全超差異哉是四次寶師雖不隔越次超生故亦名半超之釋難思暫就樂惠上流舉其疑者欲界沒生梵衆天沒生梵輔天而般涅槃之者既超彼上所應生十四處可名全超者何釋半超者哉是五就樂定上流亦可有此疑準此趣可思之次見婆沙論文於退住第二靜慮等生少光天等上流聖者明全超等有無舉三師異説準彼思之欲界沒生梵衆天梵衆天沒生梵輔天等中間處而般涅槃不至色究竟天或非想非非想處之者亦可有三師異説何無其異義偏屬半超者哉是六答行無色上流不生色界者自本雖為必然之理泛明全超等相梵衆天為初色究竟天或非想非非想處為終論其相故行無色上流望色界名半超事何強為難義哉若行無色上流不望色界論超義者婆沙論初師意豈可云若退生上地處便缺減故不依彼立全超等哉次於光法師極少三生之釋者是亦梵衆天為初色究竟天或非想非非想處為終明全超等三類相之時半超之者極少受三生故如此云也是則任今論言全超者謂在欲界於四靜慮已具雜修遇緣退失上三靜慮以初靜慮愛味為緣命終上生梵衆天處由於先世串習力復能雜修第四靜慮從彼處沒生色究竟最初處沒生最後天頓越中間是全超義言半超者從彼漸次生下淨居乃至中間能越一處生色究竟超非全故名為半超聖必不生大梵天處僻見處故一導師故言遍沒者從彼漸次生於一切處皆遍受生最後方能生色究竟一切處死故名遍沒之文定全超半超遍沒生數也若就彼中間處論半超相之日唯受二生之類有之云事更非所遮也次以超少分中間處故者退住第二靜慮生少光天之者指欲界與第二靜慮中間初靜慮二處云超少分中間處乃至退住第四靜慮生無雲天之者指欲界與第四靜慮中間初靜慮二處第二第三靜慮各三處云超少分中間處也退住第二靜慮生少光天之者遍生彼上所應生一切處既名半超者明知唯望下地云半超名云事設雖彼上所應生處有缺減處不望彼立半超名也次欲界沒生善現天善現天沒超善見天生色究竟天而般涅槃之者及欲界沒生識無邊處識無邊處沒超無所有處生非想非非想處而般涅槃之者可名半超者也唯超一處故對何可名全超者也次樂惠上流之中欲界沒生梵衆天梵衆天沒生梵輔天而般涅槃之者雖超彼上所應生十四處無生色究竟極處超彼中間所應生十四處之義故不名全超者任次超生故名半超之理屬半超者也次婆沙論何師意全超遍沒者就生色究竟天或非想非非想此二極處而般涅槃之者立其名也而欲界沒生梵衆天梵衆天沒生梵輔天等中間處而般涅槃之者雖不至色究竟極處彼處不缺減猶有可至彼之義故不可有非全超等三類攝云義實亦不至色究竟極處故不可有名全超遍沒云義故依超彼上所應生處之義唯名半超者也重難云第二師意生處以上處雖有缺減不望彼立半超名者可云唯望下地論之何云兼望上下地論之哉答半超之名實雖唯望下地立之若無望上地之義者何可名上流聖者哉是則生般等攝可非半超攝故兼望上下地論之云也尋云寶法師釋亦可有別料簡哉答或一義云即於此中後説為超於理無失者則後二説正之中其後師意説全超等相於理無失為言即於此中之言指上二説之旨文言分明也第三師意雖唯望生處以上施設全超等三類兼可許第二師望生處以下唯名半超之義故述第三師意之處云若通生處以下即但名半超也問寶法師所引正理論中云大梵所居非是別處即是第二梵輔天攝文爾者大梵天不梵輔天攝者可有何過耶進云寶法師所引正理論云遍沒半超應無差別文付之遍沒半超不同就聖者所應生處可論之而聖者全不生大梵天設雖大梵天不梵輔天攝何無遍沒半超不同哉是以樂定上流雖不生五淨居天咸談遍沒半超差異相例可同如何答見寶法師所引正理論文云由此義準初靜慮中大梵所居非是別處即是第二梵輔天攝若異此者大梵所居僻見處故一導師故必無聖者於中受生遍沒半超應無差別文此文意云若以大梵立別天者遍沒不生一切處故與半超者應無差別云也但於遍沒半超不同就聖者所應生處可論之云難者聖者雖不生大梵天若以大梵立別天者總見色界天之時遍沒既不生大梵天故難立一切處沒名故與半超者應無差別為言故婆沙論百七十四云問聖者上流亦於二處有礙謂大梵天及無想定何故得名上流答彼別處即梵輔處果二處攝故猶得名為遍一切處文此文意大梵天是梵輔天攝無別處故聖者雖不生彼天猶名遍一切處沒為言正理論今文其意亦同之次於樂定上流不生五淨居天云例難者樂惠上流不生四無色處樂定上流不生五淨居天云事自本所定必然之理故由樂定上流不生五淨居天不可立半超名五淨居天并四無色處之外諸天樂惠樂定上流隨其所應可受生處故若以大梵乍立別天不生彼天者可名半超故就遍沒半超應無差別之過尤有其謂也問雜修靜慮生無雲天人可成彼定耶答可成彼定也兩方若成彼定者見光法師所引婆沙論百七十四文云退住第四靜慮生無雲天等文既云退住第四靜慮何可成彼定哉若依之爾者由起下地煩惱可退捨上地定退住第四靜慮生無雲天之人何不成彼定哉答由起欲界下三靜慮煩惱可退捨第四靜慮起第四靜慮煩惱退住第四靜慮之時何可退捨第四靜慮哉如彼已離第二靜慮煩惱之人依第二靜慮起四無量初二解脫等之後起第二靜慮煩惱退住第二靜慮之時不可退捨彼雖染位所起第二靜慮四無量初二解脫等彼若不退捨者此豈可退捨哉故已離第四靜慮煩惱位雜修靜慮之後起第四靜慮煩惱退住第四靜慮生無雲天之人可成彼離染位所起雜修靜慮也但於光法師所引婆沙論文者雖述退住第四靜慮不云退捨彼定何為相違哉重難云已離第四靜慮煩惱位所雜修第四靜慮也退起第四靜慮煩惱之時豈不退捨之哉是以見婆沙論處處之文或七云然具縛者於具縛者所起暖等亦得亦在身亦成就亦現在前於離縛者所起暖等不得不在身不成就不現在前文或云頗有起第二靜慮纒退淨初靜慮耶答有謂阿羅漢所修淨初靜慮及雜修淨初靜慮等文此等文意離染位所起功德退起彼先所斷煩惱之時必退捨之見如何答先雜修第四靜慮事未離第四靜慮煩惱位修之已離第四靜慮煩惱位修之故由退起第四靜慮煩惱令不退捨彼已離第四靜慮煩惱位所雜修第四靜慮也但暖等善根是見道近眷屬不似餘功德故離染位所起暖等善根退起先所斷煩惱之時必退捨之也次盡智所修有漏功德云唯初盡遍修九地有漏德由初盡智力得修之故退彼能修盡智之時必退捨所修有漏功德也次雜修靜慮之習云先雜修第四必先雜修第四靜慮乘其勢力雜修下三靜慮故退起下三靜慮煩惱之時退捨為其能引第四靜慮故隨亦退捨乘其勢力所雜修下三靜慮也餘功德等不如是故起彼地煩惱退住彼地之時不退捨離染位所依彼地功德也問光法師意非想地可有上流聖者耶答可有二義邊也兩方若有上流聖者者非想地更無上地之可生何可有上流聖者哉是以見寶法師解釋云言上流者是上行義前生般者雖生上界即彼生處而般涅槃更不上生無上行義故生般等不名上流若生色界要轉生上皆名上流有上行故文準今定判非想地不可有上流聖者哉若依之爾者光法師餘處八解釋中非想地可有上流聖者見如何答若就從下地上流來之義云之者非想地可有上流聖者故婆沙論百七十四云上流有二種一行色界二行無色界行色界乃至色究竟天行無色界者乃至非想非非想天文若就從當地上生之義論之者非想地不可有上流聖者故今論餘處八所引嗢陀南伽陀中云唯六謂非想文光法師釋此文云非想地中於前七門又除上流得彼定已無上生故若橫望而言非想地中亦有上流般今據無上地可生言唯六謂非想文重意云來所顯故非想地有上流聖者去所顯故非想地無上流聖者也故婆沙論百七十四云又一切處沒上流有來所顯非去有去所顯非來有來所顯亦去所顯有來所顯非去者謂生色究竟或非想非非想處有去所顯非來者謂生梵衆天有來所顯亦去所顯者謂生中間諸處非來所顯非去所顯者無文問中般生般上流聖者如何相配上中下三根耶進云光法師釋云中般上根生般中根上流下根有差別故分為三種文付之上流聖者經歷多生其根能純熟尤可云上根哉是以見光法師餘處解釋云佛時長故其根最利聲聞三生獨覺四生非要利根亦通鈍根若極利者要經六十要經百劫文如何答光法師當處餘處定判各述邊邊義門更非相違解釋也當處解釋意云不還果聖者皆同欣樂速證涅槃而中般之人未至本有之前於中有位速證涅槃故云上根生般之類受色界生已不久證涅槃故云中根上流之者經歷多生極遲證涅槃故云下根也此亦非光法師私解釋源依及上中下根差別故之論文也餘處解釋意云經多時修行其根能調練故云佛時長故其根最利等也若爾光法師兩處解釋各談邊邊之理全非相違之義也問論中付明七善士趣相且上流中可分全超等三類耶重云論云中生各三上流為一經依此立七善士趣上流中不分全超等三類見付之於上流中既有全超半超遍沒三類何不分之哉是以於中般生般中各分三種不同相例可同如何答光法師釋此事云謂上流人有上流法故名上流由此義同雖有三種且立為一畢引婆沙論百七十五問答之文問意只如疑難之趣答中有多復次異義即彼論云答生不生各是一有相續於中分位差別難知欲令知故各説三種上流三種生數自辨差別易知是故但隨上行義勝合説一種復次生與不生一期時促差別義少分齊易知是故分三上流時長差別多種分齊難辨故合立一復次生不生亦有等義上流亦有別義欲以二文互相顯故作如是説復次生與不生善士趣相現前易了以彼速趣般涅槃故各分為三其上流者善士趣相微隱難知以彼尚經多生死故但合説一文正理論六十五云何故前二各分為三第三上流唯立為一以上行故名為上流由此義同但立為一前之二種雖亦義同然為其中別相難了欲令易了故各分三上流有三相別易了無煩於彼更別建立又前二別唯有爾所易顯示故各分為三第三上流別義多種卒難顯示故總立一謂初中般唯在將生根惑品殊故分三種第二生般唯在已生亦根殊勝故分三種上流通有將生已生將生上流復有二種謂於靜慮雜不雜修已生上流分二亦爾復於如是二上流中若無雜修容生二界若有雜修唯生一界者復分為三全超半超遍沒異故於半超內差別有多由此上流別相煩廣若一一辨難可周悉故依等義總立上流中生位中差別義少易顯了故分之為六雖彼一一亦有同義而等第三於上流中雖有異義而等前二為相影顯故唯立七文顯宗論三十一文全亦同之立七善士趣之時於上流中不分全超等三類之旨準等論判可知其由也問欲界經生聖者可生上界耶進云論云若在聖位經欲界生必不往生色無色界文付之聖者受生由樂欲不同三界果報任惑業有無設雖欲界經生聖者何不生上界哉是以今論中引帝問經説述天帝釋願云然天帝釋作如是言曾聞有天名色究竟我後退落當生於彼文文意天帝釋來佛邊證預流果畢願我命終後生人中為佛弟子當生色究竟天云也若欲界經生聖者不生上界者天帝釋豈可發此願哉佛寧不遮之哉何況婆沙論五十三中引帝問經頌云三於此知法二於彼勝進既得勝進已俱升梵輔天文三於此知法者明人中入聖之義二於彼勝進者顯天上離欲之旨既得勝進已俱升梵輔天者述離欲界染證不還果已命終生梵輔天之相欲界經生聖者生上界云事此文實分明也加之色界經生聖者生無色界相例可同如何答欲界經生聖者於欲界多苦處受生故厭苦之心轉深趣寂之思彌切故專求盡無生智菩提偏欣有餘無餘涅槃故必於欲界證得涅槃更不生色無色界也故今論云若在聖位經欲界生必不往生色無色界由彼證得不還果已定於現身般涅槃故文正理六十五顯宗三十一兩論之文全亦同之光法師釋此文云欲聖經生若能勵力起得聖道斷諸煩惱必不生上厭欲界生多苦惱故恐生上界有長時苦同欲界故故欲經生不生上界文寶法師釋此文云以先了苦受欲界生其生短促尚難可思上界命長深厭不往故得那含已由厭不上生必於現身般涅槃也文加之見婆沙論五十三一段之文上引增一經説云如説有五補特伽羅此間下種此間究竟一極七返有二家家三一來四一間五現法般涅槃此間下種者謂在欲界入正性離生此間究竟者謂在欲界得諸漏盡文下述評家義云若在欲界經生聖者定不復生色無色界所以者何若在欲界經生聖者必無三事一者不退二者不轉根三者不生色無色界聖道久住彼相續中極堅牢故恐上二界有長時苦同欲界故文但於帝問經所説天帝釋願者今論中會此文云毗婆沙師作如是釋彼由不了對法相故為令喜故佛亦不遮文文意云天帝釋雖得預流果由不能了對法相故作斯謬説然而為令彼一時喜故佛亦不遮此謬説也為言正理五十五顯宗三十一婆沙論五十三中引此經會旨同之次於婆沙論所引帝問經頌者彼論中會此文舉二師異説初師云時三樂神聞彼語已二極著愧得離欲染以神通力升梵輔天一猶住此是故彼二雖升梵世而非死生文此師意云是由神通力升梵輔天非此死生彼為言第二師云有説彼二雖有死生而不違理謂昔人中但曾修得順決擇分命終生在揵達縛中由瞿博迦譏誚彼故二極羞愧得入見道離欲界染證不還果命終生在梵輔天中故有死生亦不違理文此師意云順決擇分位受欲界生非聖位經生為言次於色界經生聖者生無色界云例難者光法師會此疑云色界無苦厭心劣故云於色界經生聖者容生無色文寶法師釋此事云此明色界經生聖人以厭心劣容上生也文重難云若於欲界多苦處受生故厭苦心深不生上界者於欲界不可有七返受生之義既於欲界多苦處有七返受生之義何無生上界之義哉何況聖者定可知欲界多苦上界微苦寧作恐生上界有長時苦同欲界故之思哉答於欲界多苦處受生故雖厭苦心深惑障難盡聖道未熟故輒不證涅槃更受欲界多生之後聖道純熟起惑道斷惑障盡現身之中必證涅槃永不受彼三有生也光法師雖於欲界經生聖者極生厭離惑難斷故道未熟故所以更受欲界多生若經生聖能起聖道於此身中必斷惑盡故不往彼上界受生之釋此旨甚分明也次聖者雖知欲界多苦上界微苦經欲界多苦處生厭苦心深故厭上界長時苦同厭欲界多苦故釋恐生上界有長時苦同欲界故也非云上界苦同欲界苦歟問欲界經生聖者起聖道後可有受生義耶答於聖道中其義不定若起斷惑道之後不可有此義若起非斷惑道之後有此義云師意可有也兩方若有此義者見光法師解釋云若經生聖能起聖道於此身中必斷惑盡故不往彼上界受生文如今釋者不可有此義見若依之爾者今論餘處二十三中説總七返有聖者相云中間雖有聖道現前餘業力持不證圓寂文此文無諍欲界經生聖者起聖道之後有受生之義見如何答欲界經生聖者聖道未熟故惑障難斷故起聖道艱辛斷惑障甚難而聖道純熟能斷惑障之程於此生中必斷惑障盡證得涅槃也故見光法師定判不限若經生聖能起聖道於此身中必斷惑盡故不往彼上界受生之釋上段云應知欲界經生聖者若起聖道能進斷惑必於此生得無學果但為斷道起時艱辛勵力起得誰肯更生以曾受生極厭苦故若七生位經生聖者能進斷惑必不更作家家等人若家家位經生聖者能進斷惑必不更為一來等人若一來位經生聖者能進斷惑必更不為一間等人文解釋既盡其理末學何殘其疑哉但於今論餘處文者欲界經生聖者於中間生非斷惑道之聖道起不起者婆沙論二説也故婆沙論云問受七有者前六生中起聖道不有説不起若當起者應般涅槃有説亦起業力持故不般涅槃文今論餘處文同婆沙論第二有説意也此師意就非斷惑道前六生中起聖道云也若起聖道斷惑障之程於此身中必斷惑障盡證得涅槃云事此師意同所存故光法師解釋全不違今論餘處定判也寫本云正元二年庚申三月二十七日午時於中川內地藏院抄之畢今即結集此卷抄出之間依為大帖以分上下初集文次訪義後草案重清書之間多費身心久送日月後學之輩可哀其志願依此微功速遂上生內院之素懷願答懇誠畢結值遇慈尊之芳緣凡厥始自恩愛知識有緣之衆生終至自界他方無邊之群類回向不限濟度無漏焉右筆華嚴示末學
