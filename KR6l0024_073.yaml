body:
  text: 俱舍論第二十四卷抄下問退雜修靜慮人所退雜修靜慮界熟果可現前耶答可現前也兩方若現前者既退雜修靜慮豈彼異熟果可現前哉是以見今論文云先於欲界人趣三洲如是雜修諸靜慮已後若退失生色界中亦能如前雜修靜慮文若退雜修靜慮之人彼異熟果可現前者生色界中何亦可雜修靜慮哉若依之爾者思修因感果之理設雖退雜修靜慮寧彼異熟果不現前哉答退雜修靜慮之人所退雜修靜慮異熟果可現前也思其道理先雜修靜慮之時成決定業起異熟因取果用畢後設雖退彼雜修靜慮豈其異熟果不現前哉何況準光法師身在欲界造五淨居引業若不爾如何名後之釋意依身在欲界先雜修第四靜慮造五淨居天引業畢退生梵衆天等樂惠上流之人後由依身在欲界所造五淨天引業生彼天之時寧所退雜修靜慮異熟果不現前哉加之見婆沙論百五十四文云有成就彼異熟非滅定謂得滅定已而退命終生非想非非想處滅定異熟現在前文此文明述退滅盡定之人所退雜修靜慮異熟果現前之義是必然也但於今論文者退雜修靜慮畢生色界中亦能雜修靜慮之旨述許也全非遮所退雜修靜慮異熟果現前之義歟問雜修靜慮第三剎那無間起無漏心義可有耶答可有此義也兩方若有此義者見婆沙論文云雜修靜慮初剎那時於無漏根滅而非起畢第三剎那時如初剎那説文如此文者不可有此義見若依之爾者心品現起隨時不定設雖雜修靜慮第三剎那無間何無起無漏心之義哉答雜修靜慮第三剎那無間起無漏心之義可有也其故見今論餘處二十六文述有學位雜修靜慮相云諸解脫道唯四法類加行增俗諸勝進道又加他心隨應現修未來皆八文明無學位雜修靜慮相云諸解脫道唯四法類加行增俗隨應現修未來所修銃九利十諸勝進道與練根同文正理七十四顯宗兩論之文全亦同之此等文意雜修靜慮勝進道位十智隨應現修之故雜修靜慮第三剎那解脫道無間起無漏勝進道之義可有云事甚分明也加之見光法師所引婆沙論百七十五文明雜修靜慮相云如是説者此則不定或有不起定能十五心相續而轉或復起定於中或有起三心已而便起定或有起六心已而便起定或有起九心已而便起定或有起十二心已而便起定是故於彼五品中間或起不起雜修成滿文此文既許五品雜修靜慮相續現起之類第三剎那無間起無漏心云事是必然也但於婆沙論文者五品雜修靜慮各別現起非相續起之者第三剎那無間多分起有漏心故從多分云雜修靜慮第三剎那時於無漏根滅而非起也其中自亦第三剎那無間起無漏心事更非所遮如彼既有聞思二惠無間起無漏心類若起聞思惠等時於無漏根非捨非得非滅非起也問雜修靜慮所雜修有漏唯限真實作意歟答可通勝解作意也兩方若唯限真實作意者所雜修有漏其類非一準何不通勝解作意哉是以光法師所引婆沙論中所雜修有漏可通勝解作意見若依之爾者所雜修有漏是斷微細定障無知無間道也何可通勝解作意哉是以斷煩惱無間道唯限真實作意相例可同如何答雜修靜慮所雜修有漏可通勝解作意也故見光法師所引婆沙論百七十五文云如是説者能雜修作十六行相所雜修或作十六行相或作餘行相謂無量解脫勝處等文此文既述所雜修有漏通四無量前三解脫八勝處等之旨通勝解作意云事是必然也但於斷微細定障無知無間道故不可通勝解作意云難者雜修無漏有漏靜慮由其熏修之力自然令不成就定障無知故雖勝解作意為定障無知能治道也凡斷定障無知實不用無間解脫道如彼斷滅盡定障不用無間解脫道也然而雜修靜慮前二剎那與不染無知成得俱滅似斷惑無間道第三剎那與不染無知不成就得俱生似斷惑解脫道故暫立無間解脫道稱也故光法師釋云前二剎那似斷惑無間道與不染無知成就得俱滅第三剎那似解脫道與不染無知不成就得俱生文若爾雜修靜慮所雜修有漏實非如斷惑無間道故斷惑無間道雖限真實作意雜修靜慮所雜修有漏亦通勝解作意也問雜修靜慮解脫道位未來可修他心智耶答未來可修他心智也兩方若未來修他心智者婆沙論百七十五中述雜修靜慮位所修智品相云如是説者能雜修是四法述雜修靜慮位所修智品相云如是説者能雜修是四法四類智所雜修是世俗智若總説者有學七智無學九智除他心智文此文若就現修云之者亦可除盡無生智而既不除盡無生智唯除他心智知雜修靜慮解脫道位未來不修他心智云事若依之爾者披今論餘處二十六又雜修靜慮解脫道位未來修他心智見如何答雜修靜慮解脫道位非斷障故未來可修他心智也故見今論餘處二十六文云學位雜修諸無間道四法類俗隨應現修未來修七諸解脫道唯四法類加行增俗諸勝進道又加他心隨應現修未來皆八無學雜修諸無間道現修如學未來所修鈍八利九諸解脫道唯四法類加行增俗隨應現修未來所修鈍九利十文正理七十四顯宗三十六兩論之文全亦同之光法師釋云此上三道未來皆修八智皆非斷障得修他心文但於婆沙論文者雜修靜慮解脫道位未來雖修他心智初二念無間道位未來亦不修之故總説雜修靜慮位所修智品相之時除他心智也盡無生智無學聖者雜修靜慮無間解脫道位隨其所應同未來修之故不除之也全非相例歟問雜修靜慮解脫道位盡無生智可現前耶答盡無生智不現起也兩方若盡無生智現起者披今論餘處二十六文雜修靜慮解脫道位盡無生智不現起見若依之爾者婆沙論百七十五中述雜修靜慮位所修智品相云如是説者能雜修是四法四類智所雜修是世俗智若總説者有學七智無學九智除他心智文此文若就未來修云之者不可除他心智而既除他心智不除盡無生智知雜修靜慮解脫道位盡無生智可現起云事如何答雜修靜慮解脫道位是見品攝非息求故盡無生智不現起也故見今論餘處二十六文云無學雜修諸無間道現修如學未來所修鈍八利九諸解脫道唯四法類加行增俗隨應現修未來所修鈍九利十文正理七十四顯宗三十六兩論之文全亦同之光法師釋云無學雜修諸解脫道唯四法類隨應現修無漏故現不修俗非他心通解脫道故非現修他心此解脫道是見非息求故盡無生智非現文但於婆沙論文者無學聖者雜修靜慮解脫道位盡無生智雖不現修隨其所應未來修之故總説無學聖者雜修靜慮位所修智品相之時取盡無生智也他心智初二念無間道位未來亦不修之故除之也全非相例歟問具雜修五品靜慮人直生色界究竟天歟答不必直生色究竟天也兩方若直生色究竟天者具雜修五品靜慮之人遍可生五淨居天何直生色究竟天哉是以見今論文云如是五品雜修靜慮如其次第感五淨居文如此文者具雜修五品靜慮之人遍可生五淨居天見若依之爾者具雜修五品靜慮之人由上極品力直可生色究竟天是以淨影大師解釋大乘義章十七中云五階熏中逐勝受生不先生下後上生故文如何答具雜修五品靜慮之人其生處可不定若具雜修五品靜慮之人中於一一品造決定業之類有之者如其次第遍可生無煩無熱善現善見色究竟五天也於前四品不造決定業於第五品造決定業之業之類有之者超前四天直可生色究竟天也故隨聖者意樂由造業強弱其生處可不定歟但於淨影大師解釋者人師異釋也不可必依用之歟問聖者可造牽引業耶進云光法師釋云明知聖人造牽引業文付之聖者除厭三有過患專欣二智菩提設雖由凡時故業受三有果趣證得聖果之後更不可造牽引業是以光法師所引正理論六十四中明家家聖者受生緣云此三二生由異生位造作及增長感三二生業非諸聖者於聖位中更能新作牽後有業以背生死向涅槃故由此契經説諸聖者唯受故業更不受新文隨見正理論餘處四十文述由因果相屬愚故造非福業由真實義愚故造福及不動業之旨畢云若已見諦者則無是事乘先行力漸離染時如次得生欲色無色文光法師餘處十五引此文云若準此文聖人不造感生異熟業文寶法師餘處十五引此文云若準此文聖人不造感生引異熟業文何況寶法師餘處十九解釋中引正理論雖離染者亦造善業而無勢力能招後有之文畢云若據引業感有即唯異生若據資助故業結當生有即通有學文任此等定判聖位受生唯由凡時故業見加之暖等四善根凡位起之猶不為牽引業證得聖果之後豈可造牽引業哉答聖者實厭三有受生故於凡聖共生三處雖不造牽引業五淨居天是唯聖非凡之處凡位非可造彼天牽引業故證得聖果之後造彼天牽引業也故今論云如是五品雜修靜慮如其次第感五淨居應知此中無漏勢力熏修有漏令感淨居文婆沙論云但由下品雜修靜慮引第四靜慮衆同分業生無煩天既生彼已唯受彼下品雜修靜慮法異熟果但由中品雜修靜慮引第四靜慮衆同分業生無熱天既生彼已唯受彼中品雜修靜慮法異熟果但由上品雜修靜慮引第四靜慮衆同分業生善現天既生彼已唯受彼上品雜修靜慮法異熟果但由上上品雜修靜慮引第四靜慮衆同分業生善見天既生彼已唯受彼上上品雜修靜慮法異熟果但由上極品雜修靜慮引第四靜慮衆同分業生色究竟天既生彼已唯受彼上極品雜修靜慮法異熟果文光法師自問答云問聖者生淨居造引業不解云此論既云熏修有漏令感淨居明知聖人造牽引業又婆沙異熟因雜修靜慮業引五淨居衆同分文撲揚大師云若準有宗雜修靜慮新造引業招淨居果名為雜修不據熏故俱舍論二十四云應知此中無漏勢力熏修有漏令感淨居釋曰初後無漏中間有漏名為成就由前後心修中有漏令招彼果既云令感明造引業不爾如何感義得成又婆沙論云異熟因雜修靜慮引五淨居衆同分既異熟因能引同分明定造業文此等定判以俱舍婆沙兩論之文為證成聖者造五淨居天牽引業之旨甚分明也何況見品類足論六文於非異生法法及不共異生法體之中問云淨居天蘊界處及生彼業文若聖者不造五淨居天牽引業者寧以彼業為非異生法法及不共異生法體哉加之正理論六十五云諸感淨居是業力為雜修力若是業力雜修靜慮則為唐捐若雜修力與品類足所説相違如彼論説雜修靜慮及由業故生淨居天諸所有處等非異生法有説業力感淨居天然不唐捐雜修靜慮以修行彼思現前故有餘師言是雜修力而不違害品類足文彼論先説雜修定者為顯先時入彼定故後復説及由業故生淨居者為顯先後時即由彼力生淨居故此中決定俱由二力以隨闕一不生彼故然唯有漏感彼異熟非無漏力并背有故文顯宗論三十一云諸感淨居由雜修力亦由業力相資助故然唯有漏感彼異熟非無漏力并背有故文正理顯宗兩論之文既述由雜修靜慮及彼俱生業力感淨居天異熟果之旨而雜修靜慮及彼俱生業唯是聖者所起也云由彼力感淨居天異熟果豈非聖者造五淨居天牽引業哉隨亦正理論中引品類足論生淨居天業名非異生法之文凡位不造彼業云事亦炳然也依之泰法師引正理論中全文畢云若依此文由熏禪業生五淨居即是聖人造感生業文準此文理聖者造五淨居天牽引業云事更不可疑之但於正理論此三二生由異生位等之文者光法師會此文云言不造者據欲界説唯受故業應知亦爾文文意云正理論文并契經説明家家聖者受生緣故聖者不造牽引業者據欲界説也為言次於正理論餘處若已見諦者則無是事等之文者聖者無由因果相屬等二愚造牽引業之義故凡聖相對述愚迷有無許也全非遮聖者造五淨居天牽引業次於光法師餘處若準此文聖人不造感生異熟業之釋并寶法師餘處若準此文聖人不造感生引異熟業之釋者任正理論文勢顯見之旨述其趣也次於寶法師餘處若據引業感有即唯異生等之釋者廣就三界論之者多是異生聖者共生三處故證得聖果之後助凡時故業受彼異熟果新不造牽引業故云若據資助故業結當生有即通有學也更非簡聖者少分五淨居天牽引業次於暖等四善根凡位位起之猶不為牽引業云例難者光法師自問答云問順決擇分善根尚不造牽引業今何至聖位造引業耶解云順決擇分善根憎背有故趣見道故順見道故所以但造滿業不造引業聖位不爾容造引業文聊簡此問答文學者異義有之或一義云暖等四善根位是道近加行故厭有心稍除故但造滿業不造牽引業所得聖果之後其位容預非如見道近加行故造五淨居天牽引業為言或一義云光法師今解釋非云暖等四善根位總不造牽引業就暖等四善根體不為牽引業為言故見今論餘處二十三文云此四善根能感色界五蘊異熟為圓滿因不能牽引憎背有故文正理六十一顯宗三十婆沙七等諸論説其意同之就位論之可造牽引業故依此義意者非指例難歟重難云寶法師意存聖者不造五淨居天牽引業也處處解釋如前重出難之也彼師意存聖者造五淨居天牽引業云事何處見者強會通處處解釋哉答勘寶法師解釋前後上云五淨居天若造新業不造新業後當分別指下由雜修五品生有五淨居之段見而披彼段解釋雖無分明定判引正理論如彼論説雜修靜慮及由業故生淨居天諸所有處等名非異生法也文此文意云由雜修靜慮及彼俱生業力生淨居天故聖者造五淨居天牽引業云決定誠證也云後當分別即指此文歟若爾寶法師意存聖者造五淨居天牽引業云事自分明也問伏第四靜慮何品煩惱生何天耶進云婆沙論云伏上上品者生福生天乃至伏下中品者生色究竟文付之上上品者是初品也伏上上品煩惱者可生無雲天哉次第四靜慮唯有八天若伏上上品煩惱者生福生天者可云伏下上品煩惱者生色究竟天何云伏下中品者生色究竟天何云伏下中品者生色究竟哉答第四靜慮九品煩惱全未伏者生無雲天故伏上上品煩惱者生福生天云也次此中以無想天別為一處故第四靜慮總有九處故伏下中品煩惱者生色究竟天云也故婆沙論具文云有説第四靜慮有九品善根次第生於九處謂下下善根生無雲天下中善根生福生天乃至上上善根生色究竟於此諸處不可增減是故淨居唯應有五有説第四靜慮有九品煩惱若於九品全未伏者生無雲天伏上上品者生福生天乃至伏下中品者生色究竟無有伏下下品而受生者是故淨居唯有五種文問十八有學中可列身證不還耶進云論云契經説有十八有學何緣於中不説身證文付之得滅盡定不還名之身證不還有學福田中何不列之哉是以見正理論六十五所引契經文列九無學中舉俱解脫相例可同何況披中阿含經説十八有學中列身證不還如何答十八有學中不取身證不還事不限今論所引契經説亦出正理論所引契經文即正理論六十五云謂世尊告給孤獨言長者當知福田有二一者有學二者無學有學十八無學唯九何等名為十八有學謂預流向預流果一來向一來果不還向不還果阿羅漢向隨信行隨法信解見至家家一間中生有行無行上流是名十八文顯宗論所引契經説其意亦同之此等諸論所引契經文同列十八有學中不舉身證不還定有依憑本説歟今論中釋其故云謂諸無漏三學及果依彼差別立有學故滅定非學亦非學果故不約成彼説有學差別文圓暉法師述此意云無漏三學是聖者因擇滅涅槃是聖者果滅定有漏不是依因依因無故不預其數文但於九無學中舉俱解脫云例難者寶法師引正理論六十五然諸不還所得滅定是有漏故不可説言自性解脫故名清淨彼所依身猶有煩惱未永斷故不可説言相續解脫故名清淨故不約成彼立有學福田無學位中有漏功德雖非自性解脫所收相續解脫故名清淨由此亦能生殊勝果是故約定及根差別説九應果皆名福田之文畢云由此有學不取身證無學取俱解脫也文文意顯也次於中阿含經説者凡二十七賢聖廢立源出中阿含經説今論等所引契經者同指中阿含經文歟而今論等所引經文列阿羅漢向之中攝身證不還別不舉之見引中阿含經文列身證不還中般等之中攝阿羅漢向別不出之是則誦者不同中阿含經梵本有二本不同歟例如品類足論中迦濕彌羅國諸師所誦本云九十八隨眠中三十三是遍行六十五非遍行西方尊者所誦本云九十八隨眠中二十七是遍行六十五非遍行六應分別也是以廣賢聖章云又諸部中列二十七賢聖之名皆引給孤獨長者經而其所列各不同者隨部異説故不同也文由誦者不同梵本有異本之旨此釋尤分明歟尋云十八有學中何不列現般哉答今論等所引契經意阿羅漢向中可攝現般見行中阿含經意身證不還中可攝現般也但何本中別不列現般意現般人者依身在欲界證不還果之後於彼現身斷餘惑盡證得涅槃故更無有別勝能故或阿羅漢向中攝之或身證不還中攝之別不舉現般也問無色定攝金剛喻定可緣下地能治類智品道耶問無生智可為阿羅漢果體耶答無生智中或有阿羅漢果體或有阿羅漢果攝非阿羅漢果體之類也兩方若為阿羅漢果體者見今論文述盡得俱盡智成無學應果以初盡智為阿羅漢果體而住不動盡智後必起無生智之理無生智第二念已後起之知非阿羅漢果體云事何況今論説此有八十九解脫道及滅以解脫道為沙門果性婆沙論判唯勝進道攝是無生智以無生智偏屬勝進道任此等定判無生智非阿羅漢果體見若依之爾者無生智既阿羅漢果位所起智品也尤可為阿羅漢果體若非阿羅漢果體者四向四果中可云何攝哉是以婆沙論六十六并六十七中無生智阿羅漢果攝見加之利根之人初盡智位所修無生智豈非阿羅漢果體哉答初盡智位所修無生智可為阿羅漢果體第二念已後無生智是阿羅漢果攝可非阿羅漢果體也其故見今論前後之文或偈頌結盡得俱盡智成無學應果長行述金剛喻定是斷惑中最後無間道所生盡智是斷惑中最後解脫道由此解脫道與諸漏盡得最初俱生故名盡智如是盡智至已生時便成無學阿羅漢果已得無學應果法故以與諸漏盡智最初俱生解脫道為阿羅漢果體云故以此位所修無生智可為阿羅漢果體云事道理實必然也或云淨道沙門性有為無為果此有八十九解脫道及滅沙門果體有八十九諸解脫道唯限一念不相續中述五因立四果捨曾得勝道集斷得八智頓修十六行道類智位斷欲界修所斷第六品煩惱解脫道位斷欲界修所斷第九品煩惱解脫道位斷有頂地修所斷第九品煩惱解脫道位於此四位具足五因故建立四沙門果故四沙門果體唯限解脫道不通勝進道見故初盡智位所修無生智可為阿羅漢果體云事此文亦分明也加之正理論六十七云盡智無生智無學正見品是謂有為阿羅漢果體文顯宗論三十二文全亦同之淨影大師大乘義章十七釋云羅漢果中聖德有二一是果體依如毗曇行修分別唯非想地九品治中末後解脫是其果體就此果體中分為盡智及無生智文準此等定判思之初盡智位所修無生智是解脫道攝非勝進道攝故可為阿羅漢果體第二念已後現修未來修無生智是勝進道攝非解脫道攝故雖阿羅漢果攝非阿羅漢果正體也婆沙論中云唯勝進道攝是無生智就第二念已後無生智論之也第二念已後無生智雖非阿羅漢果體既阿羅漢果攝故四向四果中可云何攝之疑不可來又婆沙論中無生智阿羅漢果攝云文更非相違也重意云總論之者解脫道為四沙門果正體勝進道是四沙門果正體勝果道是後果向攝非前果攝而阿羅漢果無後果故無有勝果道是後果向攝非阿羅漢果攝故阿羅漢果聖者第二念已後現修未來修諸無漏道既非阿羅漢果正體皆是阿羅漢果攝也故見婆沙論處處之文或六十六云諸阿羅漢所成就無學法此法阿羅漢果攝耶答如是謂阿羅漢所成就一切加行無間解脫勝進道皆是阿羅漢果攝以彼無有勝果道故無有勝果可趣求故設法阿羅漢果攝此是無學法耶答或無學或非學非無學義不定故云何無學答有為阿羅漢果謂盡智無生智無學正見及彼眷屬文或六十七云諸阿羅漢所成就無漏法此法阿羅漢果攝耶答或攝或不攝或不攝義不定故云何攝答有為無為阿羅漢果已得不失有為阿羅漢果者謂盡智無生智無學正見及彼眷屬文或六十八云時解脫阿羅漢轉根作不動時彼加行無間解脫道皆是果道勝彼無勝果道故乃至時解脫阿羅漢轉根作不動時唯捨果道得果道無學位無學果道故文或百四十七云諸阿羅漢所成就根此根斷何界結答無以阿羅漢諸結已盡無可斷故此根何果攝答阿羅漢果或無阿羅漢果攝者謂阿羅漢所成就無漏諸根或無者謂阿羅漢所成就善有漏無覆無記諸根文任此等論文阿羅漢果聖者所成就諸無漏道皆是阿羅漢果攝云事甚分明也重難云初盡智位所修無生智解脫道攝故為阿羅漢果正體云事不可然婆沙論中既云唯勝進道攝是無生智若初盡智位所修無生智解脫道攝者寧可云唯勝進道攝哉若解脫道位所修故解脫道攝云者其義不一定勘顯宗論三十二離第九品方可具二或應許得離繫道而修之文解脫道位修道位修無間道見例彼思之解脫道位何不修勝進道哉次初盡智位所修無漏道解脫道攝者後念永不現起歟若不現起者初盡智位所修無漏道種類非一準有何障礙後念永不現起哉若亦現起者以第二念已後悉屬勝進道如光法師餘處解釋中云第二念後諸勝進道九智十智隨應現修等也若爾起勝進道之後還起解脫道云事豈不背文理哉答能修初盡智既解脫道攝故所修無生智同可解脫道攝云事道理必然也更不可疑之但於婆沙論文者就第二念已後無生智論之得意更無所背也次於顯宗論文者有漏功德繫地堅牢故無間道位不修上邊有漏道解脫道位初修上邊有漏無間解脫道云也此別事也此外無間解脫道位不限自品類道兼修餘品類修之義難有歟次鈍根阿羅漢果聖者中初盡智位所修盡智第二念即現起之義可有也婆沙論十八中述果道相續之旨正理論餘處六十三中云諸解脫道或相續故即此意也但於光法師餘處解釋者從多分論之也自亦解脫道相續至第二念等之類可有故勝進道之後還可起解脫道之疑不可來也重難云見婆沙論文云從不還果不還勝果道及阿羅漢果阿羅漢勝果道退時如是等時捨道俱有戒亦捨定俱有戒文如此文者阿羅漢果可有勝果道見如何答無學位無勝果道云事道理既為必然之上婆沙論處處之文亦分明也如前重出之但於婆沙論及阿羅漢果阿羅漢勝果道退時之文者尤似難思若指勝進道云勝果道歟或亦乘從不還果不還勝果道云言便如此云歟問頌文云聖二離八修各二離繫得文爾者聖者以有漏道斷下八地修所斷煩惱時所得無漏離繫得以未來所修無漏道為引因歟答可為引因也兩方若為引因者見光法師餘處三解釋云引因謂同類因能引彼離繫得起為等流士用果文而未來所修無漏道無與彼無漏離繫得為同類因何可為引因哉若依之爾者光法師餘處四解釋中云無漏道斷惑雖亦能引有漏得有漏道斷惑雖亦能引無漏得而非正引但是兼引故不互隨二道判性但隨自道彼能證道雖復不起然互相修而由彼力擇滅得起故各隨自能證道判文如此釋者聖者以有漏道斷下八地修所斷煩惱時所得無漏離繫得以來所修無漏道為引因見如何答聖者以有漏道斷下八地修所斷煩惱時所得無漏離繫得由未來修容與彼無漏離繫為引因能治無漏道之力也光法師餘處但隨自道彼能證道雖復不起然互相修而由彼力擇滅得起故各隨自能證道判之解釋其旨尤分明也但於未來所修無漏道無與彼無漏離繫得為同類因不可為引因云難者未來無有作用故雖不正與彼無漏離繫得為同類因若現起者容與彼無漏離繫得為同類因之道故由未來修此無漏道之力得彼無漏離繫得也故光法師餘處釋引因謂同類因全無相違也重難云見婆沙論六十六文答世俗道力所證得者如一來不還果云何名沙門果之問舉尊者僧伽筏蘇説云以世俗道離染時亦修未來諸無漏道所得二果是彼果故亦得建立沙門果名之義畢正義破之云彼不應作是説所以者何未來聖道未有作用如何於彼此得果名文準此文思之聖者以有漏道斷下八地修所斷煩惱時所得無漏離繫得由未來所修無漏道容與彼無漏離繫得為同類因之義為引因云事豈不蒙今能破哉答尊者僧伽筏蘇意以世俗道斷欲界修所斷煩惱時所證得一來不還二果是未來所修無漏道正果云故蒙未來聖道未有作用如何於彼此得果名之難破也今義意聖者以有漏道斷下八地修所斷煩惱時未來修容與彼無漏離繫得為同類因之道故約容有之義為引因云也不云在未來時以彼無漏離繫得正為果故遙異尊者僧伽筏蘇意也問光法師所引顯宗論中述以無漏道斷上七地前八品煩惱無間解脫道位上地近分有漏道修不修相作三解釋爾者初釋意如何釋之耶進云光法師所引顯宗論云以無漏道離上七地前八品時不修上邊世俗八解脫道不能修上近分有漏云初釋意會此文云若以無漏道離下八地染亦能引生二離繫得者此據第九解脫道離下染盡方修上地近分有漏差別而言前九無間八解脫道離下染時未修上地近分有漏爾時唯有一無漏得故不相違文文意云聖二離八修各二離繫得者據彼第九解脫道位論為言彼第九解脫道位得有漏無漏二種離繫得故云用無漏道離彼亦然全非相違故正理論説雖同顯宗論初釋意云用無漏道離彼亦然亦以於中所作同故也重難云見今論餘處二十六文或云斷上七地諸無間道四類世俗滅道法智隨應現修乃至此上未來皆修七智文或云斷上七地諸解脫道四類世俗滅道法智隨應現修乃至此上未來皆修八智文如此等文者以無漏道斷上七地煩惱九無間道八解脫道位修世俗智見若不修上地近分有漏道者何可修世俗智哉彼位不修當地世俗智者婆沙論百六十三光法師釋甚分明故也答今論餘處之文就有漏道斷惑之類述修世俗智之旨也非云以無漏道斷上七地煩惱九無間道八解脫道位修世俗智歟故正理論説雖同顯宗論初釋意斷上七地煩惱諸無間道諸解脫道位明智品現修未來修相之文全同今論説也問光法師所引顯宗論中云離第九品方可具二文爾者此釋意為唯第九一品煩惱得有漏無漏二種離繫得為當前八品煩惱得之歟答可有二義也兩方若唯第九一品煩惱得之者既廣得上地功德位也前八品煩惱何不得有漏無漏二種離繫得哉若依之爾者非得果及練根位自品能治道不現在前得離繫得之義難有哉答此事雖非難義聊及學者異端歟其中暫存一義云以無漏道斷上七地煩惱第九解脫道位廣修前八品煩惱能治上地近分有漏道故前八品煩惱亦可得有漏離繫得也雖非得果及練根位餘位之中自品能治道不現在前得離繫得強非所遮歟問光法師所引顯宗論中述以無漏道斷上七地前八品煩惱無間解脫道位上地近分有漏道修不修相作三解釋爾者第二第三釋意如何釋之耶進云光法師所引顯宗論云或應許得離繫道而修或應斷染時許依下修上文付之有漏功德繫地各別也設雖上地近分有同對治有漏道下地無漏現在前位何可修之哉是以見今論餘處二十六文述諸道依得此修此地有漏修有漏功德唯限依此地得此地二位無依此修上之義見何況披正理論餘處七十四文云雖下聖道斷煩惱時諸上地邊有能同治然由有漏繫地堅牢未離下地未能修彼文如何答顯宗論第二第三釋意云有漏功德實雖繫地各別以無漏道斷上七地前八品煩惱位同治修故修上地近分有漏道為言故見今論文偈頌結聖二離八修各二離繫得無間斷前八品煩惱位長行述諸有學聖用無漏道離彼亦然由二種道同所依故以無漏道斷惑例同有漏道斷惑明知以無漏道斷上七地品品煩惱位修上地近分有漏道云事但於今論餘處諸道依得此修此地有漏之文者光法師餘處二十六述無漏道依下地離上地染九無間道八解脫道位上地近分有漏道修不修相作二解釋之中以無漏道離下染時九無間道八解脫道亦修上地近分有漏同治修故云第二釋意今此文云從多分説依此修此故論偏説之上地近分或修不修若無漏道離下染即修若餘無漏依下地起即不修上近分有漏以不定故是故不説文文意顯也次於正理論餘處雖下聖道斷煩惱時等之文者光法師釋云正理論説自是彼計非所許故無勞會釋文重難云光法師以不定故不説之會通不可然若如此釋者不可説依此地修依此地起無漏道地煩惱九無間道八解脫道位不修當地有漏餘位修之其義不定故也次光法師正理論説自是彼計等之釋亦不明正理論文暫述顯宗論一釋意也何降自是彼計哉是以見正理論餘處二十文述得心多少云若以聖道離色界染得無色善此中離言非究竟離以於色染未全離時無色善心已可得故文如此文者以無漏道斷上七地前八品煩惱位修上地近分有漏道見如何答依此地起無漏道之中修當地有漏是多分也不修當地有漏唯限斷上七地煩惱九無間道九解脫道斷非想地煩惱九無間道八解脫道位是少分也故依此地起無漏道之中當地有漏修不修其義雖不定從多分説依此地修不顧少分不修位也光法師從多分説依此修此故偏説之之釋即述此意也次正理顯宗兩論者同衆賢論師所造也顯宗論既作三解釋正理論意可存此義云事是勿論也然而就第七十四卷文暫作正理論説自是彼計等之釋歟尋云顯宗論第二第三釋意有何差異哉答第二釋意云有漏法離繫地各別前八解脫道望品品是出障位故斷上七地煩惱前八解脫道位同治修故亦修上地近分有漏道為言或應許得離繫道而修者即述此旨也此釋意不許九無間道位修之第三釋意云斷上七地煩惱九無間道位同治修故亦修上地近分有漏道為言或應斷染時許依下修上者即顯此義也重意云顯宗論三解釋次第云添也初釋所存之分第二釋意亦許之第二釋所存之分第三釋意許之也問論中舉餘師義云唯得靜慮利果聖道上惑離繫應皆不成文爾者光法師如何釋此文耶進云光法師釋云於八地中下五離繫可言有無漏得上三無色煩惱離繫應皆不成文付之任捨果勝果道唯得果道故之理若有學聖者斷下八地修所斷煩惱時不得有漏離繫得者已離無所有處染信勝解修練根作見至位唯得利果道無漏不得利勝果道無漏故四靜慮三無色煩惱離繫應皆不成何唯限三無色煩惱離繫釋應皆不成之義哉是以泰法師判三無色等上惑離繫應皆不成上惑離繫之言不限三無色煩惱離繫見如何答光法師得上惑離繫應皆不成之文意尤叶文理所謂已離無所有處染信勝解依第四靜慮修練根作見至位唯得六地利果道無漏未得利勝果道無漏故實雖無得四靜慮煩惱離繫之義於四靜慮得利果道無漏故暫與云下五離繫可言有無漏得於三無色不得利果道無漏故奪云上三無色煩惱離繫應皆不成也寶法師如有學聖先以無漏道離無所有處煩惱後依四禪練根至解脫道捨前鈍根果及向唯得四禪已下不還果道上三無色若無先修有漏道得無為者無漏得捨有漏得無煩惱應成既不成煩惱明知有有漏得之釋因述此意也加之見婆沙論六十八文問已離無所有處染信勝解轉根作見至時既捨三無色無漏對治道於三地斷為亦捨不於三無色斷問答捨不捨義於四靜慮斷成之定置不及疑捨不捨義尤為今解釋潤色也但於四靜慮煩惱離繫應皆不成云難者以實論之四靜慮三無色其義雖同於四靜慮得利果道無漏故暫得彼煩惱離繫成偏出三無色不得利果道無漏釋應皆不成之義也實不可得四靜慮煩惱離繫故泰法師釋無色等上惑離繫應皆不成等四靜慮也問退法種姓人練根作思法種姓斷非想地三四品煩惱後退彼思法種姓時必可退彼三四品煩惱耶答不必退之也兩方若必退彼三四品煩惱者設雖退彼思法種姓何必可退彼三四品煩惱哉是以見婆沙論文云若退姓者不必要起煩惱現前文若依之爾者光法師所引正理論六十六中云此二雖無煩惱斷得而勝進故遮惑得生雖無離繫得不成彼煩惱唯限勝進位見而退法種姓人練根作思法種姓斷非想地三四品煩惱之後退彼思法種姓之時不可得退法種姓所攝彼三四品煩惱能治無漏道退位不得未曾得功德故也若爾退位而無有離繫得寧不退彼三四品煩惱哉答退法種姓人練根作思法種姓斷非想地三四品煩惱之後退彼思法種姓之時若起煩惱退之者可退彼三四品煩惱若不起煩惱退之者不可退彼三四品煩惱其故退彼思法種姓之時即可得退法種姓所攝彼三四品煩惱能治未曾得無漏道故雖捨思法種姓所攝無漏離繫得得替退法種姓所攝無漏離繫得故不退彼三四品煩惱也但於退位不得未曾得功德云難者婆沙論百八十六中云諸未曾得聖道唯勝進時得故者就勝品未曾得聖道論之也此退法種姓所攝彼三四品煩惱能治無漏道剋其體見之實雖未曾得既是劣種姓所攝無漏道故攝屬曾得類也問頌文云近分離下染文爾者彼所離地唯限下八地歟答或云唯限下八地或云廣通九地二意可有也兩方若唯限下八地者見論文云所離有九謂欲八定文此文無諍彼所離地可通九地見若依之爾者既云近分離下染定可有漏近分地定知彼所離地唯限下八地云事答見論文偈頌結近分離下染長行述所離有九謂欲八定偈頌長行似致相違依之光法師會其相違作二解釋云近分但能離下八地此文應言所離有八謂除非想而言九者此通舉也又解初定近分是無漏者亦能通離有頂地染故言九也以實而言初定近分亦能離上前句中言近分離下從多分説文初釋意云近分地但能離下八地染故實可云所離有八而現文云所離有九者非想地雖非有漏道所離九地俱所離地故暫通舉之也為言第二釋意云初定近分地通無漏故亦能通離有頂地染故云所離有九以實云之初定近分地亦能離上地染而云近分離下染者從多分説也為言問以第三靜慮無漏道斷自地煩惱第九解脫道位起第四靜慮無漏道義可有耶答不可有此義也兩方若有此義者婆沙論中不可有此義見若依之爾者以第三靜慮無間道斷自地煩惱第九解脫道位欣第四靜慮根本地之類有之者何無起第四靜慮無漏道之義哉是以以未至地無漏道斷欲界煩惱第九解脫道位起初靜慮無漏道之義可有見相例可同如何答以第三靜慮無漏道斷自地煩惱第九解脫道位唯起第三靜慮無漏道也其故無間解脫二道必可同一地故依第三靜慮起第九無間道依第四靜慮起第九解脫道之義不可有也但於未至地例難者未至地是初靜慮攝同一地故以未至地無漏道斷欲界煩惱第九解脫道位起初靜慮無漏道之義可有也更非相例故見婆沙論處處文或百六十三出未曾得無漏初靜慮現在前而修淨初靜慮之類云若以無漏道離欲界染最後起根本地解脫道時文或百六十三出未曾得非初靜慮無漏智現在前而修淨無漏初靜慮之類云謂以無漏道離欲界染即依未至定起最後解脫道時文此等文意以未至地無漏道斷欲界煩惱第九解脫道位或起初靜慮無漏道或起未至地無漏道之兩類可有云事尤分明也或百六十四出未曾得無漏第四靜慮現在前而修淨第四靜慮之類不舉以第三靜慮無漏道斷自地煩惱第九解脫道位第四靜慮無漏定之類或百六十四出未曾得非第四靜慮無漏智現在前而修淨無漏第四靜慮之類云謂依未至定乃至第三靜慮離第三靜慮染最後解脫道時以第三靜慮無漏道斷自地煩惱第九解脫道位唯起第三靜慮無漏道之旨述明知以第三靜慮無漏道斷自地煩惱第九解脫道位起第四靜慮無漏道之義不可有云事何況婆沙論百六十一中出若得第三靜慮非第四靜慮命終生廣果之類云若依未至定乃至第三靜慮隨一離第三靜慮染未離上染彼命終生廣更文此文意以第三靜慮無漏道斷自地煩惱第九解脫道位起第四靜慮無漏道之義無之見問靜妙離觀可緣五部法耶答可緣之也兩方若緣五部法者染汚法其體非靜妙離何緣彼作靜妙離行相哉是以見識身足論文明色無色界繫修所斷心緣境述緣自界修所斷法麁苦障靜妙離六行相俱舉之云緣自地四部所斷法唯舉麁苦障行相無出靜妙離行相明知靜妙離觀唯緣修所斷法不緣前四部所斷法云事若依之爾者作上地靜妙離觀之時五部諸法之中何法非彼觀所緣哉是以今論中明靜妙離觀述緣彼次上地諸有漏法無所簡可緣五部法見如何答以有漏道斷惑之時對無間道位觀次下地為麁苦障解脫道位觀自他為上地靜妙離故雖染汚法上地悉可觀靜妙離也故見今論文云若諸解脫道緣彼次上地諸有漏法作靜妙等三行相中隨一行相文諸有漏法之言廣亘五部法之旨甚分明也但於識身足論文者約五部諸法體性各別見之見所斷四部法其禮是染汚非靜妙離故能緣行相之中暫不舉靜妙離也斷惑解脫道位對下地麁苦障故緣上地五部法作靜妙離行相之義門更不可遮之歟問光法師所引正理論中離欲界染解脫道位未來修麁等三行相文爾者今此麁等行相者無間道攝歟答解脫道攝也兩方若無間道攝者見光法師所引正理論文明彼前八解脫道位未來所修麁等行相云通緣欲界及初靜慮釋第九解脫道位未來所修麁等行相述通緣三界若彼所麁等行相無間道攝者豈可緣上地哉若依之爾者披今論文述世無間解脫如次緣下上作麁苦障行及靜妙離三麁等是無間道行相見設雖解脫道位未來所修麁等行相何云解脫道攝哉何況解脫道位不緣下地未來所修麁等行相既緣下地尤可無間道攝如何答既解脫道位未來所修麁等行相也尤可解脫道攝亦述緣上下地寧云無間道攝哉但於麁等是無間道行相云論文麁等是無間道行相靜等是解脫道行相者就現起道論之也解脫道位未來兼修上下地緣解脫道攝麁等行相可有何過哉何況第九解脫道是已離下地染位故未來所修麁等行相廣緣三界法豈可無間道攝哉次於解脫道位不緣下地云難者是亦就現起道論之也何為相違哉重難云見今論餘處二十九文明空無邊處解脫相云近分解脫道亦得解脫名空無邊處近分地解脫道是空無邊處解脫攝也彼解脫道位未來所修麁等行相亦解脫道攝者定可空無邊處解脫攝何可有緣下地之義哉答近分解脫道亦得解脫名者是亦就現起解脫道論之也未來所修緣下地行相更可非空無邊處解脫攝也問非想地可有有漏十六行相耶答有有漏十六行相也兩方若有有漏十六行相者光法師所引正理論中釋二禪已上近分地無十六行相云以上地邊無聖行故文若非想地有有漏十六行相者豈可云有聖行相哉若依之爾者非想地既有順決擇分善根何無有漏十六行相哉答見今論餘處二十八文述空等三三摩地相云世間攝者通十一地文此文意非想地有空等三三摩地之旨甚分明也有有漏十六行相云事誰可疑之哉但於光法師所引正理論文者二禪已上近分地無聖行相者非只無無漏十六行相亦無有漏十六行相云也十六行相專是聖道所作行相故有漏十六行相云聖行相也故見光法師餘處二十八所引婆沙論百六十二文云問有漏道亦作十六行相何故不能遍斷答彼雖學作聖道行相不明了故不斷煩惱如師子子未能害獸文有漏十六行相云事此文甚炳然也重意云以上地邊無聖行故者二禪已上近分地總無有漏無漏十六行相故為言而非想地有有漏十六行相故不可云無聖行相也問光法師所引正理論中述有餘師義云異生聖者離欲無間解脫道中亦修不淨息念慈等文爾者今此九無間前八解脫道位未來所修不淨觀等功德唯限未至地攝歟答唯限未至地攝也兩方若唯限未至地攝者未來所修功德其類非一準斷欲界煩惱九無間前八解脫道位未來所修不淨觀等功德何唯限未至地攝哉是以正理論今文云慈等等取餘三無量婆沙論六十四中述此師義具舉慈悲喜捨四無量而喜無量非未至地攝明知今此九無間前八解脫道位未來所修不淨觀等功德不限未至地攝云事若依之爾者斷欲界煩惱九無間前八解脫道位未來所修不淨觀等功德也定知唯限未至地攝云事如何答斷欲界煩惱九無間前八解脫道位未來所修不淨觀等功德唯限未至地攝也其故彼九無間前八解脫道位未離欲染故不可修初靜慮根本地攝不淨觀等功德三類智邊及初盡智位之外全不修欲界善故不可修欲界攝不淨觀等功德以此等義門思之今此九無間前八解脫道位未來所修不淨觀等功德唯限未至地攝云事道理實必然也是以正理論中述此師義云初靜慮邊善根廣故修如是行上諸定邊善根少故所修如前文顯宗論文全亦同之婆沙論六十四中出此師義云初靜慮近分有種種善根故能修此種種行相上地近分諸善根少故不能修種種行相文任此等之文今此九無間前八解脫道位未來所修不淨觀等功德唯限未至地攝云事亦分明也但於喜無量非未至地攝云難者凡云喜無量體異説非一正理論七十九中或云喜受為體或云以欣為體或云無貪為體三説有之婆沙論八十一中或云喜根為自性或云欣為自性二説有之其中以欣為體云師意喜無量通依欲界未至中間及四靜慮七地也故正理論七十九云若喜異喜受亦通思所成彼應説喜通依七地與樂捨受亦相應故文顯宗論四十云若喜異喜通思所成彼應説喜通依七地與樂捨受亦相應故文加之正理論七十九云若喜非喜受成一必具四若喜即喜受成一定成三生第三定等唯不成喜故文顯宗論四十云若説喜非喜成一必具四若喜即善受成一定成三生第三定等唯不成喜故文此等文意喜無量不喜受為體云師意述彼應説喜通依七地故喜無量依未至地云事是炳然也又云若喜非喜受成一必具四故生第三第四靜慮成喜無量見故無喜受之處有喜無量云事亦分明也故正理婆沙兩論之中斷欲界煩惱九無間前八解脫道位未來修喜無量者是未至地攝喜無量故全非相違也重難云見婆沙論文喜無量不喜受為體云師意無喜受之處無喜無量見故婆沙論中釋發智論第三第四靜慮與三無量相應云文云三無量者除喜無量後二靜慮無喜根故諸有欲令壽無量不以喜受為自性者亦説此與喜受相應故彼二地唯三無量文準此文思之喜無量不喜受為體云師意喜無量不可依未至地見如何答勘婆沙論文喜無量以欣為體之義中亦有異説見故婆沙論八十一云有餘師説此喜無量欣為自性欣體非受別有心所與心相應有説欣在喜根相應聚中可得有作是説喜根後生欣由喜力所引起故若作是説此喜無量與受相應亦不違理文此三説中初師意無喜受之處欣心所為喜無量體見故此師意喜無量可依未至地也倩推此事正理六十六婆沙六十四兩論之中所述有餘師意斷欲界煩惱九無間前八解脫道位未來修喜無量者當此初師意也即修未至地攝喜無量也正理顯宗兩論之中喜異喜受云師意喜無量通依七地者亦當此師意也婆沙論第百六十七卷中云諸有欲令喜無量不以喜受為自性者亦説此與喜受相應故彼二地唯三無量者當此後二説意也不辨各別師義何浪致難勢哉尋云正理論中云若喜異喜受亦通思所成彼應説喜通依七地者以欣為體并無貪為體云二師意俱喜無量通依七地歟答以欣為體云師意喜無量通依欲界未至中間及四靜慮七地無貪為體云師意喜無量唯依欲界初二靜慮三地也故正理論七十九中述無貪為體云師意此與喜根必俱行故三地可得如悔憂俱喜根相應無貪為體故唯限欲界初二靜慮三地不通七地也故喜異喜受云師意喜無量通依七地者唯限以欣為體云師意也重意云喜無量必作欣行相而欣心所雖與何受相應作欣行相為喜無量體故喜無量通依七地無貪不爾不與喜受相應與餘受相應之時寧作欣行相哉故喜無量無貪為體者不取泛爾無貪唯取喜根相應無貪故無貪為體云師意喜無量唯依欲界初二靜慮三地也問光法師所引正理論中離欲界染前八解脫道位未來所修麁等三行相通緣欲界及初靜慮文爾者一念緣之歟答一念緣之也兩方若一念緣之者欲界初靜慮兩界既各別也何一念緣之哉是以光法師所引正理論中述離第四靜慮染前八解脫道位未來所修麁等三行相云緣第四定及緣空處然非一念以界別故文準彼思之離欲界染前八解脫道位未來所修麁等三行相緣欲界及初靜慮定可非一念是以辰旦人師解釋中一念不緣之見若依之爾者色界既有遍緣智離欲界染前八解脫道位未來所修麁等三行相一念寧不緣欲界及初靜慮哉答色界有遍緣智故離欲界染前八解脫道位未來所修麁等三行相一念可緣欲界及初靜慮也是以見光法師所引正理論文上云離欲界染九無間道未來所修麁等三行唯緣欲界八解脫道未來所修麁等三行通緣欲界及初靜慮文既云通緣欲界及初靜慮定知一念緣之云事下云離四定染九無間道未來所修麁等三行緣第四定八解脫道未來所修麁等三行緣第四定及緣空處然非一念以界別故文至空無邊處近分地所有麁等三行相緣第四靜慮及空無邊處處初述然非一念以界別故之旨爰知未至地所有麁等三行相緣欲界及初靜慮一念緣之云事但於然非一念以界別故之例難者色界有遍緣智故離欲界染前八解脫道位未來所修麁等三行相一念通緣欲界及初靜慮無色界無遍緣智故離第四靜慮染前八解脫道位未來所修麁等三行相一念不緣第四靜慮及空無邊處也次於震旦人師解釋者是婆沙抄定判也更不可依用之重難云見婆沙論文云順住分者能觀下地為麁苦障而生厭背能觀自地為靜妙離而樂安住順勝進分者能觀自地為麁苦障而生厭背能觀上地為靜妙離而生欣樂文準此文觀下地為麁苦障觀自地為麁苦障是各別觀門也何可有一念緣自下地為麁苦障之義哉次無色界無邊緣智故一念不緣第四靜慮及空無邊處者離空無邊處染前八解脫道位未來所修麁等三行相何一念緣空無邊處及識無邊處哉答婆沙論文就現起道從多分説其行相也未來所修心品種類是多故一念緣自下地為麁苦障之類可有也次離空無邊處染前八解脫道位未來所修麁等三行相一念緣空無邊處及識無邊處同無色界故也離第四靜慮染前八解脫道位未來所修麁等三行相一念不緣第四靜慮及空無邊處是色無色界別故也正理論然非一念以界別故之文其意在之問異生斷初第二第三靜慮煩惱九無間前八解脫道位未來可修緣欲界心耶答可修緣欲界心也兩方若修之者異生斷惑位所現起無間解脫道如次緣次下次上地設雖未來修何可修緣欲界心哉是以見光法師所引正理論文云離初定染九無間道未來所修麁等三行緣初靜慮八解脫道未來所修麁等三行緣初二定靜等三行緣第二定乃至離二靜慮三靜慮染隨其所應皆準前説文如此文者今此九無間前八解脫道位未來不修緣欲界心見若依之爾者未來所修心品種類是萬差也今此九無間前八解脫道位何不修緣欲界心哉是以光法師所引正理論中異生斷初第二第三靜慮煩惱第九解脫道位未來修緣欲界心見相例可同如何答異生斷初第二第三靜慮煩惱九無間前八解脫道位未來可修緣欲界心也其故見婆沙論百三十九文述離染位得意近行云離初靜慮染前八無間解脫道時各得第二靜慮近分六第九無間道時得第二靜慮及彼近分十二離第二靜慮染前八無間解脫道時各得第三靜慮近分六第九無間道時得第三靜慮及彼近分六離第三靜慮染前八無間解脫道時各得第四靜慮近分六第九無間道時得第四靜慮及彼近分六文此文既云離初第二第三靜慮染九無間前八解脫道位得香味意近行明知未來修緣欲界心云事但於光法師所引正理論文者未來所修麁等三行相順現起斷惑道故不緣欲界也彼九無間前八解脫道位未來修緣欲界心者非麁苦障靜妙離六行相亦非非常苦空等十六行相只是事觀行相之中有緣欲界心故未來修之也重難云今此九無間前八解脫道位未可修同對治道若彼緣欲界心非麁等三行相攝者既非同對治道何未來修之哉答貞禪大僧都云未來所修心品種類是萬差故雖非麁等三行相攝而同對治道緣欲界心有之故彼九無間前八解脫道位未來修之也私云斷惑無間解脫道位非唯限同對治道兼可修非同對治道故彼九無間前八解脫道位未來修非麁等三行相攝緣欲界心也問無色界心緣第四靜慮唯限麁等三行相歟答唯限麁等三行相也兩方若唯限麁等三行相者心品緣境是非一準無色界心緣第四靜慮何唯限麁等三行相哉是以披今論餘處十文云初無色近分緣色四自一空無邊處近分地心緣第四靜慮通四意近行見若唯限麁等三行相者何可通四意近行哉若依之爾者光法師所引正理論中離第四靜慮染九無間前八解脫道位所修行相緣第四靜慮唯限麁等三行相見若有餘行相者何不修之哉答無色界心緣第四靜慮唯限麁等三行相也無色界中無有廣緣心麁等三行相之外有何行相可緣第四靜慮哉是以見光法師餘處七所引正理論三十六文云由無色心但能以下第四靜慮有漏諸法為苦麁等行相所緣文識身足論七中出無色界繫善心能了別色界繫法之類云謂若麁若苦若障若如理所引了別文此等論文無色界心緣第四靜慮唯出麁等三行相無舉餘行相加之婆沙論中出眼根滅緣識非所緣縛亦非相應縛之類云及無色界一切隨眠文此文無諍無色界心不緣眼根滅見若無色界心緣第四靜慮不限麁等三行相者何不緣眼根滅哉任此等文理無色界心緣第四靜慮唯限麁等三行相云事甚分明也但於今論餘處文者以空無邊處近分地心斷第四靜慮煩惱之時無間道位所起麁等三行相雖唯總緣第四靜慮加行道位所起鹿等三行相中亦可有別緣第四靜慮之類故空無邊近分地心緣第四靜慮有色聲法四意近行云文全非相違也重難云見婆沙論百三十九文云空無邊處近分若説有五者三唯緣色界繫一通緣無色界繫及不繫一通緣色無色界繫及不繫若説有二者一通緣無色界繫及不繫一通緣色無色界繫及不繫文如此文者空無邊處近分地心緣無漏法見若唯限麁等三行相者寧緣無漏法哉答空無邊處近分地心唯限麁等三行相者就緣第四靜慮之行相論之也非以彼緣下地麁等三行相緣無漏法以餘自相行相可緣滅道二諦等故空無邊處近分地心緣不繫法云文全非相違也重難云見識身足論七文出無色界繫善心能了別不繫法之類云謂若於滅謂滅謂靜謂離若於道謂如謂行謂出若無常若空若無我若有因若有起若有是處若有是事若如理所引了別文準此文無色界心以十六行相中滅靜妙離道如行出八行相外餘行相不緣不繫法見如何答空無邊處近分地心中雖有以自相行相緣滅道二諦等之類自相行相難云何行相故識身足論之文出無色界善心緣不繫法行相之中暫不舉之歟或一義云空無邊處近分地心作靜等三行相緣自上地有漏法故亦可緣彼有漏法上擇滅非擇滅等故緣不繫法云也難云見識身足論文述無色界善心緣不繫法之類雖舉十六行相中滅靜妙離道如行出八行相無出六行觀中靜等三行相明知六行觀中靜等三行相不緣不繫法云事答十六行相中滅靜妙離行相既緣不繫法準知六行觀中靜等三行相可緣滅諦等也但六行觀門本是緣有漏法行相故識身足論文出無色界善心緣不繫法行相之中暫不舉之歟問異生斷第四靜慮煩惱第九解脫道位未來可修近分地攝麁等三行相耶答可修近分地攝麁等三行相也兩方若修之者異生斷第四靜慮煩惱第九解脫道是根本地攝無緣下地之義若修近分地攝麁等三行相者豈不修緣下地心哉是以光法師所引正理論中述離第四靜慮染第九解脫道位未來所修麁等三行相所緣云皆緣空處乃至有頂文若修近分地攝麁等三行相者何不緣第四靜慮哉加之見婆沙論百八十九文明異生離第四靜慮染第九解脫道位修念住云未來修三除身念住文若修近分地攝麁等三行相者寧不修身念住哉若依之爾者婆沙論百三十九中云離第四靜慮染一切無間解脫道時各得空無邊處四意近行文既云無間解脫道時得四靜慮近行明知彼第九解脫道位未來修近分地攝意近行云事如何答異生斷第四靜慮煩惱第九解脫道位未來可修近分地攝麁等三行相也其故近分根本雖相替同是空無邊處道品也斷第四靜慮煩惱第九解脫道位何不修近分地攝功德哉是以見光法師餘處二十六所引顯宗論三十六文云隨依何地離下地染第九解脫現在前時亦修未來所得上地根本近分有漏功德離下地縛必得上故文離下地染第九解脫道現前位未來必修上地根本近分有漏功德云事此文既分明也若修近分地攝功德者豈不修麁等三行相哉但無色界根本地心不緣下地有漏法故異生斷第四靜慮煩惱第九解脫道位雖修近分地攝麁等三行相不修緣下地行相也故光法師所引正理論云何緣最後解脫道中未來所修麁等三行相靜慮攝者通緣三界無色攝者唯自上緣諸靜慮中有遍緣智無色根本必不下緣故二所修所緣有別文寶法師引婆沙論問何故最後解脫道中所修未來靜慮所攝麁等行相通緣三界無色所攝麁等行相唯緣無色界耶答靜慮地中有遍緣智能緣自地下地上地無色地中無遍緣智唯緣自上不緣下地問答畢云故無色不修緣下地行相文加之任光法師餘處二十一所引正理論豈不依止根本靜慮入見諦時亦修未來依未至地欲斷治道得斷治故亦應證彼欲見斷法斷無漏離繫得寧説根本唯得五果此責不然爾時所修依未至地斷對治者唯色無色斷對治故根本地道既不能為欲斷對治彼現起位如何能修欲斷治道由彼所修未至斷治唯治上界故果唯五之文依根本地入見道人未來雖修未至地聖道根本非欲斷對治故唯修上二界能治道不修欲界能治道例彼思之異生斷第四靜慮煩惱第九解脫道是無色界根本地攝不緣下地有漏法故彼位雖修近分地攝麁等三行相唯修緣上地行相不修緣下地行相也若爾正理論皆緣空處乃至有頂之文婆沙論未來修三除身念住之説還為誠證更非違文但存此義之時婆沙論離第四靜慮染一切無間解脫道時各得空無邊處四意近行云文似致相違故會此文云按婆沙論一段文意今此得者得有現在得有生相俱名得故第九解脫道位所現起道品第九無間道位彼得有生相故斷第四靜慮煩惱第九無間道位得空無邊處根本近分意近行盡畢何於第九解脫道位重可論得意近行之義哉故見婆沙論前後之文始自離欲界染終離第三靜慮染於九無間前八解脫道位論得意近行之義無舉第九解脫道位鄰之次下云離第四靜慮染一切無間解脫道時各得空無邊處四亦就九無間前八解脫道位論之全不可攝第九解脫道位何以此文第九解脫道位得四意近行得意為疑哉重難云會婆沙論文之旨猶不明離第四靜慮染第九無間道位四意近行得有生相者第九解脫道位彼得可至現在豈非第九解脫道位修四意近行哉答彼第九無間道位得四意近行者四意近行得有現在唯法意行得有生相彼此合論云得四意近行也故第九解脫道位唯法意近行得可有現在故彼位更不修四意近行也又難云婆沙論中異生離第四靜慮染第九解脫道位未來不修身念住者不修緣下地念住故歟若爾聖者離第四靜慮染第九解脫道位何未來修身念住哉答聖者以有漏道離第四靜慮染第九解脫道位不可修緣下地念住但聖者彼位未來修身念住者聖者已得無漏道故所得有漏善心勢力強勝別緣道共戒故未來修身念住異生不得無漏道故所得善心勢力微劣不別緣道共戒故未來不修身念住也問有漏道斷惑道四分定中唯限順住分歟答可通順住順勝進順決擇三分也兩方若唯限順住分者斷惑無間解脫勝進道俱通有漏無漏者今論等中盛所述也有漏解脫道無間起無漏勝進道者彼解脫道豈非順決擇分哉若依之爾者見婆沙論百六十三文云順住分者能觀下地為麁苦障而生厭背能觀自地為靜妙離而樂安住文如此文者有漏斷惑道四分定中唯可限順住分哉答思有漏斷惑道相四分定中可通順住順勝進順決擇三分也其故見今論餘處二十六文云斷欲修斷第九解脫俗四法智隨應現修斷上七地諸解脫道四類世俗滅道法智隨應現修斷欲修斷第九勝進斷上八地諸加行道俗四法類隨應現修斷上七地有頂八品諸勝進道俗四法類及他心智隨應現修文準此文聖者以有漏道斷煩惱時有漏解脫道無間起無漏勝進道之義可有見而見今論餘處二十八文云順決擇分能順無漏故諸無漏唯從此生文光法師釋此文云若依婆沙一百六十五淨生無漏中云此但從順決擇分有説亦從順勝進分雖無評家以前解為正故正理七十八云應知此中決定義者謂諸聖道必此無間生非此無間必能生聖道若異此者是則應説唯世第一法名順決擇分已上論文又諸論皆言順決擇分能生聖道文任此等定判唯順決擇分無間生無漏道云故明知生無漏勝進道有漏解脫道是順決擇分云事次披今論文云又如異生生二定等雖捨欲界等煩惱斷得而不成就欲界等煩惱異生生初靜慮必成欲界煩惱斷得見以知從第二靜慮等沒還生初靜慮之時必還得欲界煩惱能治道云事而婆沙論百六十三中明初靜慮沒生第二靜慮第二靜慮沒生初靜慮者相云彼於初靜慮順勝進分順決擇分往沒時捨還生時不得順退分還生時得往沒時不捨順住分及生得往沒時捨還生時得從第二靜慮沒生初靜慮之時所還得欲界煩惱能治道者是順住分見任此等文理有漏斷惑道通順住順決擇二分之旨尤分明也若通順住順決擇二分者亦可通順勝進分云事是必然也故有漏斷惑道四分定中可通順住順勝進順決擇三分也但於婆沙論文者為顯四分定差異從多分所作行相暫云順住分者能觀下地為麁苦障而生厭背能觀自地為靜妙離而樂安住順勝進分者能觀自地為麁苦障而生背能觀上地為靜妙離而生欣樂也以實云之順住順勝進順決擇三分同觀下地為麁苦障同觀自地為靜妙離斷煩惱之義可有也重難云見婆沙論百五十五文云從不還果證阿羅漢果離初靜慮染時以世俗道者乃至若世俗道為加行住加行道九無間道九解脫道時於無漏根非捨而得非滅非起文如此文者聖者以有漏道斷煩惱時有漏解脫道無間不起無漏勝進道見如何答聖者以有漏道斷煩惱時雖有有漏解脫道無間起無漏勝進道之義多分有漏道無間起有漏道無漏道無間起無漏道故如此云也問頌文云不動盡智後必起無生智文爾者第二念所起無生智初盡智所修歟答非初盡智所修也兩方若初盡智所修者以道理思之第二念所起無生智尤可未曾得之類何云初盡智所修哉依之婆沙論百二中云唯未得而得是無生智文如此文者第二念所起無生智非初盡智所修見若依之爾者披今論餘處二十六文述無學初剎那修九或修十利根之人初盡智位得修無生智見若爾第二念所起無生智豈非彼所修哉何況見正理論餘處七十四文云或有諸法先得現前如無生智等文明知第二念所起無生智是初盡智所修云事如何答不動種姓阿羅漢果聖者初盡智無間第二念所起無生智是未曾得之類故可非初盡智所修也故見今論餘處二十六文述無學位十智現修未來修相云勝進九十隨應現修未來隨應修九修十無學勝進道位有未來修見明知彼勝進道初念必有未來修云事以此道理思之第二念所起無生智可非初盡智所修也但於今論餘處文者利根之人初盡智位得修無生智云事自本非所諍今所成者第二念可起無生智非彼所修之類云許也云無學初剎那修九或修十何為非違次於正理論餘處文者第二念所起無生智雖非初盡智所修之類就總見之初盡智位得修無生智第二念已後無生智現起故云先得後現前如無生智等也非云初盡智位所修無生智第二念即現起亦非相違也重難云就前重所出難婆沙論文猶有疑第二念所起無生智初現起位故可云唯未得而後念所起無生智中可有曾得之類何無已得而得之義哉答婆沙論今文就初盡智無生智述未得而得已得而得相不明現起盡智無生智曾得未曾得相亦非論後念所起盡智無生智未得而得已得而得之義即見婆沙論百二文云復次未得或已得而得是盡智唯未得而得是無生智文此文意云盡智利純之人俱得之故鈍根之人初得阿羅漢果利根之人得阿羅漢果初盡智昔未來得今初得之故云未得而得鈍根之人退阿羅漢果已還得阿羅漢果初盡智先得盡智退已重得之故云已得而得非云初念所起盡智中有曾得之類第二念所起無生智昔未來起今初起之故云未得而得無退已重起之故無已得而得之義也非云後念所起無生智中無曾得之類也重尋云初盡智位所修無生智第二念不現現云事暫可許之後念亦不現起歟答初盡智位所修無生智後念永不現起歟其故初盡智位所修無生智是解脫道攝也而利根之人第二念起無生智以來是勝進道攝故起勝進道之後難起初盡智位所修解脫道攝無生智歟問一切阿羅漢必可起無學正見耶答不必起之也兩方若必起之者阿羅漢果聖者種類非一準何必可起無學正見哉如彼中般涅槃聖者并生非想地證阿羅漢果之者斷惑道之外輒不起聖道寧可起無學正見哉若依之爾者見正理論六十六文云此無學見一切應果之所共有猶如盡智文既云猶如盡智知一切阿羅漢必起無學正見云事如何答無學正見非彼因位中本所求法故一切阿羅漢不必起之也故婆沙論百二云一切阿羅漢皆修無學正見圓滿而非一切皆現在前文即中般涅槃聖者并生非想地證阿羅漢果之者或起無學正見或不起之其類可不定也但於正理論文者一切阿羅漢初盡智現在前位必得無學正見故云猶如盡智也非云一切阿羅漢如盡智必起之歟重難云見光法師餘處二十六定判釋迦濕彌羅諸論師説從二智出後得智中作如是知故無有失由此後得二智別故表前觀中二智差別之論文云若無餘心隔應盡智無間即有我已知苦等解無生智無間阿羅漢必可起無學正見見如何答我已知苦等二觀是盡無生智後得智故彼二智無間即雖可起之盡無生智無間起無學正見之類無學正見之後起我已知苦等二觀為言非云一切阿羅漢必起無學正見之後起我已知苦等二觀何為相違哉又難云中般涅繫聖者并生非想地證阿羅漢果之者中有起無學正見之類云事不可然見婆沙論處處之文或百七十四説中般涅槃聖者相云謂餘聖者學心無間或起無學心或起非學非無學心此則不爾學心無間必起無學心餘聖者非學非無學心無間或般涅槃或更起無學心此則不爾非學非無學心無間定般涅槃以餘聖者數起聖道現在前此不數起故文或百八十五説生非想地證阿羅漢果之者相云然彼聖道由因力強非加行力暫起現前斷餘煩惱得阿羅漢果已設更住壽經八萬劫終不重起以無用故文任此等之文中般涅槃聖者并生非想地證阿羅漢果之者斷惑道之外不起遊觀無漏見何可有起無學正見之類哉答此等論文意中般涅槃聖者并生非想地證阿羅漢果之者起有漏心之後重不起無漏心云許也蓋無生智無間起無學正見事更非所遮也既云不動盡智後必起無生智故利根中般涅槃聖者并生非想地證阿羅漢果之者斷惑無間解脫道之後起勝進道云事甚分明也若許起勝進道之義者何不起無學正見哉問依無色定得阿羅漢果位可修法智耶答修法智也兩方若修法智者見婆沙論三十六文云時解脫阿羅漢得盡智時能修二智三十行相謂盡智十四行相除空非我無學正見智十六行相若四靜慮未至中間一一具修法智類智各三十行相若三無色唯修類智三十行相文如此文者依無色定得阿羅漢果位不修法智見若依之爾者集斷得八智者姓相之所定也依無色定得阿羅漢果位何不修法智哉答今論中述具足五因建立四果云四得八智得四法四類智故文正理論六十七中明此義云四得八智謂一時中總得四法四類智故文顯宗論三十二文全亦同之婆沙論六十一中明根本果位具五因緣云四頓得八智文雜心論五中亦述此義云頓得八智文任此等論文依無色定得阿羅漢果位必修法智云事甚分明也但於婆沙論文者全非云依無色定得阿羅漢果位不修法智彼文意云得阿羅漢果位廣修九地無漏之中若修四靜慮未至中間所攝無漏具有法智若修三無色所攝無漏唯有類智為言彼文只云若四靜慮未至中間乃至若三無色更無依彼四靜慮未至中間三無色之言何以此文難依無色定得阿羅漢果位不修法智見哉問見道位先觀上苦諦後觀下苦諦義可有耶答不可有此義也兩方若有此義者以道理思之此義難有哉若依之爾者光法師所引正理論中釋見道名法輪云觀上苦等已觀下苦等故由此見道獨名法輪文如今文者可有此義見如何答見道位先觀欲界苦諦後觀上界苦諦其次第是必然故就界地論上下之時先觀上苦諦後觀下苦諦之義更不可有之但於光法師所引正理論文者先觀云上後觀名下歟或又見道位實雖無先觀上界苦諦後觀下界苦諦之義欲例聖王輪上下回轉暫云觀上苦等已觀下苦等故歟問頌文云或具輪等故文爾者誰人義耶進云論云尊者妙音作如是説文付之見婆沙論百八十二文舉餘師義述或具輻等故之旨出尊者妙音意云學八支道展轉和合一時至他相續中轉故名法輪此八支道見道位勝是故見道名輪文加之雜心論十中云尊者瞿沙説學八枝轉至他心名轉法輪文若爾今論説何背婆沙雜心兩論之文哉答廣披論家人師定判委尋尊者妙音之義今論云尊者妙音作如是説如世間輪有輻等相八支聖道似彼名輪謂正見正思惟正勤正念似世輪輻正語正業正命似轂正定似輞故名法輪文正理論六十七云尊者妙音作如是説如世間輪有輻轂輞八支聖道似彼名輪謂正見正思惟正勤正念似世輪輻正語正業正命似轂正定似輞故名法輪文顯宗論三十二文全亦同之加之玄贊四云尊者妙音作如是説如世間輪有輻等故八聖道支似彼名輪謂正見正思惟正勤正念似世間輻正語正業正命似轂正定似輞故名法輪文五百問論上云尊者妙音説正見思惟勤念似輻正語業命似轂正定似輞故名法輪文任此等定判尊者妙音意存或具輻等故之義云事甚分明也但於婆沙論文者尊者妙音意云唯以見道猶名法輪故並存或具輻等故之義及學八支道展轉和合一時至他相續中轉之義故舊婆沙論三十一云尊者瞿沙説曰八聖道一時在此身中轉故名法輪正見正覺正精進正念如輻正語正業正命如轂正定如輞此八法皆是見道中修故名法輪文而或具輻等故之義不限妙音師亦餘師存之一時至他相續中轉故名法輪之義妙音師猶存之故婆沙論中舉餘師義述或具輻等故之旨明尊者妙音意出至他相續中轉之故也雜心論文會通同之若爾今論等説婆沙雜心之文各據一義全非相違尋云婆沙論百八十二中述八聖道支相配輻轂輞有三師異説見爾者尊者妙音意同何師説哉答尊者妙音意同第三師説也其故見今論等文尊者妙音意正見正思惟正勤正念為輻正語業命為轂正定為輞而婆沙論第三師意云唯正定如輞餘如前説唯以正定為輞餘義讓前師説見上文雖舉二師異説正語業命為轂之旨是一同也爰明八聖者支中正語業命為轂正定為輞云事顯畢正見正思惟正勤正念為輻之義亦無疑故此第三師意與今論等所述尊者妙音義更無差異也問得預流果唯限加行得歟答不限加行得也兩方若唯限加行得者從上三沙門果退住預流果之時何不通餘緣得哉是以婆沙論四十五中得四沙門果通餘緣得見若依之爾者見婆沙論四十五文由加行故得非由餘緣之類中出道類智而道類智既預流果體也明知得預流果唯限加行得云事如何答得預流果不限加行得可通餘緣得退等之時所得善法名餘緣得故也故婆沙論四十五云或由餘緣故得者顯退等時所得諸善文而從上三沙門果退住預流果之時得預流果尤可由餘緣得也故見婆沙論四十五文由加行故得亦由餘緣之類中舉四沙門果任此等文理得預流果不限加行得云事炳然也但於婆沙論唯加行得之類中出道類智之文者就初得道類智論之也婆沙論一段文意就全不成而得論加行得餘緣得之義而聖者證預流果之後必成就道類智故由全不成而得後時得道類智之義無之故就初得道類智唯加行得之類中出之也若非全不成而得由後時退得之義論之者道類智亦可通餘緣得從上三沙門果退住預流果之時可還得道類智故也故見婆沙論十八文出從上沙門果退住預流果時有得同類因不得彼因等四句不同之中云得同類因不得彼因者謂爾時得過去初剎那道類智而不得彼因以不得見道故文道類智亦有退得云事此文尤分明也問依身在色界可起不還果道無漏耶答不起不還果道無漏也兩方若起不還果道無漏者今論中述三依欲後三依身在色界不起不還果道無漏見若依之爾者不還果道無漏既亘色界六地依身在色界何不起之哉何況果道相續之旨出婆沙論説若不還果道無漏相續者依身在色界寧不起之哉加之見光法師餘處十七所引婆沙論百三十四文述有學聖者生無色界成就過去五地大種所造無漏色云謂具依欲界四靜慮身於第三果或第四向諸無漏道已起已滅從彼命終生無色界文如此文者依身在色界可起不還果道無漏見如何答依身唯在欲界證不還果故依身在色界不起不還果道無漏云事道理實必然也故今論中明得四沙門果依身云前三但依欲界身得文光法師釋此文云於四果中前三但依欲界身得文寶法師釋此文云明前三果唯依欲界九依身得謂六欲天及三人下文正理六十七顯宗三十二兩論之中同述此旨任此等文理依身在色界不起不還果道無漏云事更不可疑之但於不還果道無漏亘色界六地云難者不還果道無漏雖有色界七地依身在色界不入見道故全不起不還果道無漏也次於婆沙論果道相續云文者得果之後果道無漏相續現起故雖有果道相續之義果道無漏現起畢起餘有漏心等之後亦不起果道無漏故依身任色界不起不還果道無漏也次於光法師餘處所引婆沙論文者依欲界身起第三果或第四向諸無漏道依四靜慮身起第四向諸無漏道故合論之云謂具依欲界四靜慮身於第三果或第四向諸無漏道已起已滅也非云依四靜慮身於第三果諸無漏道有已起已滅之義故全非相違尋云婆沙論何文述果道相續之旨哉答見婆沙論廾八文明從上沙門果退住預流果一剎那頃有得同類因不得彼因等四句不同之中出得同類因然得彼因之句云謂爾時得過去除初剎那諸餘剎那相續預流果文果道相續之旨此文甚分明也又尋云起後果向道之後起前果道無漏之義可有耶答不可有此義也故婆沙論六十三云問若八實體唯有五者云何建立此八種名答依道現行故立八種諸預流者乃至未起勝彼果道彼預流果得而亦在身成就亦現在前於一來向未得未在身未成就未現在前名預流果非一來向若起勝彼果道現在前彼一來向得而不在身成就亦現在前於預流果得而不在身成就不現在前名一來向非預流果文以一來果望不還向以不還果望阿羅漢向論此義門準之可思起後果向道之後不起前果道無漏云事此文亦炳然也
