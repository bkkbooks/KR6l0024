body:
  text: 俱舍論第二十三卷抄上問不淨觀持息念後念住前必得禪定歟答不必得之也兩方若必得禪定者光法師解釋中述未離欲染人總相念住思惠所攝之旨知不淨觀持息念後念住之前不必得禪定云事若依之爾者見今論處處之文餘處二十二云入修要二門不淨觀息念當卷説由此二門心便得定畢結依已修成止為觀修念住此等之文無諍不淨觀持息念後念住之前必得禪定見如何答未離欲染人多分思惠所攝總相念住無間引起暖善根故不淨觀持息念後念住之前不必得禪定歟故見光法師處處解釋當卷述此中且據未離欲染故言總相思惠所攝畢引正理論六十一諸有先時未離欲染依思所成惠引暖善根生之文為證餘處十四云如婆沙十七云暖隨轉戒於破戒有捨對治又正理六十一云諸有先時未離欲染依思所成惠引暖善根生又婆沙第七亦説未離欲染者思惠無間能引起暖準此三文有從思惠初入暖者文任此等定判不淨觀持息念後念住之前不必得禪定云事甚分明也但於今論處處之文者觀行者中亦有不淨觀持息念後念性之前有禪定之類故任觀門大綱云爾也非謂不淨觀持息念後念住之前必得禪定歟問自性念住體可通生得惠耶答廣論之者通生得惠也兩方若通生得惠者見今論處處之文當卷云自性念住以惠為體此惠有三種謂聞等所成文餘處二十五舉四念住等功德畢云實諸加行善文婆沙論百八十七中或云相雜念住復有三種謂聞思修所成差別文或云或説三謂軟中上品或聞思修所成文任此等論判自性念住體不通生得惠見若依之爾者品類足論中自性念住體可通生得惠見如何答廣論之者自性念住體可通生得惠也其故光法師餘處一本解釋中云又解生得惠以能分別學觀諦故亦名對觀生得惠有對觀之義見若許對觀之義者何不名念住哉何況見品類足論文約四念住分別見非見處等相緣身惠中出見處非見之句云謂五識身相應善惠文而以五識中無加行善故者婆沙論四十二定判明知自性念住體通生得意云事但於俱舍婆沙論兩論處處之文者就勝品念住論之也勝劣通論之時更不可遮生得惠歟重難云見正理論六十文云惠中何等名自性念住應知唯取聞思修所成文唯言無諍簡生得惠見答此亦就勝品念住置唯言歟問無漏身念住可現起耶答可現起也兩方若現起者無漏心作共相觀門身念住難現起哉是以披論疏定判未云有此義哉若依之爾者無漏身念住未來既有之何無現起之義哉何況無漏受心法念住既許現起之義無漏身念住相例可同如何答心品緣境隨時不定故無漏身念住可現起也故餘處正理論中述三十七菩提分法俱時現起相云由此理趣初靜慮中總而言之具三十七然於一念頓現在前極多但容有三十四如是未至第二靜慮極多但容有三十三三四中間極三十二前三無色極二十九欲界有頂極唯十九一切皆除三念住故其中滅者隨位應思文婆沙論中同明此義云未至定中有三十六菩提分法唯三十三俱時現前除三念住所以者何以四念住所緣各別尚無有二俱時現前況有三四初靜慮中具三十七唯三十四俱時現前除三念住靜慮中間及第三第四靜慮各三十五唯三十二俱時現前除三念住第二靜慮有三十六唯三十三俱時現前除三念住前三無色有三十二唯二十九俱時現前除三念住欲界有頂有二十二唯有十九俱時現前除三念住餘隨義説非要別體文光記二十五引此文而三十七菩提分法中七覺支是唯無漏法故此等文意無漏身念住可現起見加之婆沙論中説雜修靜慮四念住分別相舉評家義云如是説者能雜修所雜修皆容作四念住文既云能雜修通四念住豈非許無漏身念住現起之義哉但於無漏心作共相觀門故身念住難現起云難者共相別觀非始可疑故無漏心現起唯別緣之法更無所違也問自性等三種念住一念觀門具之歟答一念觀門可具之也兩方若一念觀門具之者顯宗論中云三中相雜能斷煩惱非二能斷大減增故文婆沙論中述三種念住斷惑相云自性念住暫時斷相雜念住究竟斷文取意斷惑既別時也觀門何一念哉若依之爾者一念觀門之中以惠名自性念住以相應俱有諸法名相雜念住以所緣諸法可名所緣念住也如何答自性等三種念住一念觀門之中可具之也以惠名自性念住以惠及相應俱有諸法名相雜念住以所緣諸法名所緣念住事義道既必然也更不可疑之但於顯宗婆沙兩論之文者不惠心所獨起必與相應俱有諸法俱起故自性念住不斷煩惱相雜念住能斷煩惱云也非遮一聚相應法中以惠為自性念住以惠及相應俱有諸法名相雜念住之義門何為論義哉問所緣念住中染汚身念住可亘不善有覆二類耶答可亘不善有覆二類也兩方若亘不善有覆二類者品類足論十二中明所緣念住相舉染汚身念住云謂有覆色蘊文如此文者唯限有覆一類見若依之爾者以性相思之所緣念住之中染汚身念住何不亘不善有覆二類哉答見今論餘處二文云此除色聲八無記餘三種色聲二境亘善等三性故所緣念住之中染汚身念住分別善等三性之時亘不善及有覆無記二類云事性相之所定也更不可疑之但於品類足論謂有覆色蘊之文者染汚法總云有覆不染汚法總云無覆之門也故次下文舉不染汚身念住云謂無覆色蘊文若如今疑者亦可有不染汚身念住唯限無覆無記歟云疑歟甚以非也諸染汚法總名有覆事是常談也如今論餘處十八云諸染汚法亦名有疑𪜈有覆𪜈及劣𪜈也至品類足論今文何始為疑哉問緣想行二蘊可名雜緣法念住耶答可名不雜緣法念住也兩方若名雜緣法念住者想行二蘊既非身受心緣之尤可名不雜緣法念住哉若依之爾者見婆沙論百八十七文云若於五蘊或二二緣乃至名為雜緣文如此文者緣想行二蘊可名雜緣法念住見如何答想行二蘊是身受心法之中第四法攝故若總緣之若別緣之名不雜緣法念住事必然也故今論云若唯觀法名不雜緣文但於婆沙論文者更非疑難即見論文前後上云若緣想行蘊及無為名不雜緣述緣想行二蘊名不雜緣法念住之旨畢次下若於五蘊或二二緣乃至名為雜緣者合緣想行二蘊之外若合緣色受二蘊若合緣色想二蘊若合緣色行二蘊若合緣色識二蘊若合緣受想二蘊若合緣受行二蘊若合緣受識二蘊若合緣想識二蘊若合緣行識二蘊名雜緣法念住為言問總相念住中可有不總緣身受心法類耶進云光法師釋唯總緣四名此所修無不總緣身受心法之類見付之總相念住行相非一準何無不總緣身受心法之類哉是以光法師所引正理論中明總相念住云厭患生死欣樂涅槃文既云欣樂涅槃可有唯緣涅槃之類見如何答見今論文明總相念住云彼觀行者居緣總雜法念住中總觀所緣身等四境修四行相所謂非常苦空非我文光法師釋此文云彼觀行者居緣總雜法念住中唯總緣所緣身等四境修四行相觀諸有為皆非常性觀諸有漏皆是苦性觀一切法空非我性雜緣法念住總有三種謂二三四唯總緣四名此所修前雜非唯故與差別文任此等定判總相念住必總緣身受心法見若總相念住之中有不總緣身受心法之類者與別相念住有何差異哉但於光法師所引正理論厭患生死欣樂涅槃之文者談觀行者之意樂也非謂總相念住之中有唯緣滅諦之類歟問佛及獨覺可作三義觀七處善觀門耶重云光法師釋云佛及獨覽不作文付之三義觀七處善者殊勝觀門也佛及獨覺何不作此觀門哉是以聲聞作此觀門見相例可同如何答光法師釋今論不説三義觀七處善作二解釋之中第二解云又解三義七處聲聞皆作佛及獨覺不作此中通據三乘加行是故不説彼二觀門文就此釋思其意問七處善可通無漏耶答可通無漏也兩方若通無漏者光法師解釋中在雜緣法念住後總相念住前加行位起七處善見知不可通無漏云事何況三義觀既不通無漏七處善相例可同若依之爾者寶法師依婆沙論文七處善通有漏無漏判如何答見發智論九文明七處善相云應言如實知色苦是四智謂法類世俗苦智如實知色集是四智謂法類世俗集智如實知色滅是四智謂法類世俗滅智如實知趣色滅行是四智謂法類世俗道智如實知色味是四智謂法類世俗集智如實知色患是四智謂法類世俗苦智如實如色出是四智謂法類世俗滅智如實知受想行識七亦爾文既云七處善通法類四諦智通無漏云事必然也隨見婆沙論百八一段之文或云如實知色是四智謂法類世俗苦智者此中法智如欲界色果類智知色界色果世俗智知一切色果苦智知有漏色果非常苦空非我此雖有四而立一善皆同觀察一色果故文説後六處善之文準之可思或云問七處善三義觀有何差別答名即差別謂名七處善名三義觀故有作是説七處善是無漏三義觀是有漏問若爾此説當云何通如實知色是四智謂法類世俗苦智等答此世俗智雖亦容有而不現行復次此七處善是聖行相説為無漏實通有漏對三義觀非聖行相唯是有漏故名無漏問為能以七處善入三義觀耶答不能以七處善是無漏行相三義觀是有漏行相故復有説者七處善通有漏無漏三義觀唯有漏文或云問三義觀在前七處善在後世尊何故先説七處善後説三義觀耶脅尊者言此中説四地謂修行地見地修地無學地如説七處善三義觀者説修行地如實知色色集色滅趣色滅行乃至識亦爾者説見地如實知色味色患色出乃至識亦爾者説修地速盡諸漏者説無學地文或云問何故於此七處善中再説前三諦一説道諦耶復次前四處善説見道位見道必具觀察四諦故具説四後三處善説修道位修道位中所修聖道即是道諦未必具觀四聖諦故但説三種文加之見寶法師解釋或云問何故七處善中再説前三一説道諦復次前四處善説見道位見道必具觀四諦故故具説四後三處善説修道位修道位中所修聖道即是道諦未必具觀四聖諦故但説於三文或云準婆沙一師云在見修道又婆沙云七處善觀色有四智法類苦俗又準婆沙有漏智觀諦總名俗智無漏智觀諦名苦集等準上文證七處善通有漏無漏也文勘道暹法師定判云依如毗曇前四在於四善根乃至見道後三在修道文任此發智婆沙兩論之説依今法寶道暹二師之釋七處善通無漏云事尤分明也但於光法師解釋者就聖道加行七處善在雜緣法念住後總相念住前加行位起之釋也次於三義觀例難者三義觀作非聖行相故唯限有漏七處善作聖行相故亦通無漏也更非相例歟重難云見婆沙論百六十三四兩卷之文出有漏功德之時通無漏之功德必置世俗之言如云世俗他心智通解脫道時云世俗念住云空無邊處世俗解脫云世俗無礙解增長時等也而於七處善者不置世俗之言若七處善通無漏者何不置簡別之言哉何況出無漏功德之中一處無舉七處善明知七處善唯限有漏云事如何答婆沙論百六十三四兩卷之文實以為難但七處善通無漏云事源出發智論説設雖婆沙論今文豈不有此義哉倩推之問異生位可起七處善耶答可起之也兩方若起之者見婆沙論百六十三文述未曾得淨初靜慮現在前而不修無漏初靜慮之類云即異生依初靜慮起四無量初二解脫前四勝處不淨觀念住三義觀暖頂忍世第一法有説亦起持息念時文此文雖舉異生所起初靜慮多功德無出七處善若異生位起七處善者今此類中何不舉之哉若依之爾者七處善是聖道加行也異生位尤可起之是以光法師解釋中在雜緣法念住後總相念住前加行位起七處善之旨釋成如何答七處善是聖道加行故別相念住後總相念住前加行位專起之也入聖之後雖亦起之異生位起之事必然也故見光法師解釋云問三義觀七處善何位起耶解云在雜緣法念住後總相念住前加行位起此二種引正理論此後引起緣三義觀此觀無間修七處善之文畢云解云此顯雜緣法念住後是總緣共相法念住前加行乃至四緣三義觀五修七處善文勘寶法師解釋引正理論今文畢云準上論文即是三義七處等後起總相念住入暖法也文引婆沙論若順次第説諸功德者應先説不淨觀或持息念等次説念住次説三義觀次説七處善次説暖次説頂之文畢云準此論文即念住後起三義觀及七處善而入暖也文任此等定判別相念住後總住相念住前加行位起三義觀七處善云事分明也加之見婆沙論處處文或釋世第一法分勝故名第一云而於異生所得靜慮無量解脫勝處遍處乃至所得第一有思及不淨觀持息念諸念住三義觀七處善暖頂忍中皆悉最勝暖等不爾故此獨稱世第一法文或五述世第一法加行廣大故云思所成者謂不淨觀持息念念住三義觀七處善文或述暖善根意趣云先所修集一切善根謂從布施乃至七處善皆以回向解脫是其意趣文準此等論文暖善根前加行位起七處善之旨亦炳然也但於婆沙論文者以實云之異生位依初靜慮雖起七處善七處善作聖行相亦通無漏故異生所起功德之中暫不舉之歟重難云見婆沙論百六十三四兩卷之文不限前重所出之文或出未曾得非初靜慮世俗智現在前而修淨初靜慮不修無漏初靜慮之類云即異生已離欲染依未至定起三無量初二解脫前四勝處不淨觀持息念念住三義觀時即異生依靜慮中間起三無量初二解脫前四勝處不淨觀持息念念住三義觀時文或出未曾得非初靜慮世俗智現在前而不修淨無漏初靜慮之類云即異生未離欲染依未至定起三無量初二解脫前四勝處不淨觀持息念念住三義觀暖頂忍世第一法時即異生依第二靜慮引發五通諸加行道五無間道三解脫道時起四無量初二解脫前四勝處不淨觀念住三義觀暖頂忍世第一法有説亦起持息念時即異生依第三靜慮引發五通諸加行道五無間道三解脫道時起三無量不淨觀念住三義觀暖頂忍世第一法有説亦起持息念時即異生依第四靜慮引發五通諸加行道五無間道三解脫道時起三無量淨解脫後四勝處前八遍處不淨觀念住三義觀暖頂忍世第一法時文次下出未曾得淨第四靜慮現在前而不修無漏第四靜慮之類並出未曾得非第四靜慮世俗智現在前而不修淨無漏第四靜慮之類隨其所應異生依未至定靜慮中間及四靜慮所起功德之中雖舉三義觀不列七處善準此等諸文異生位不起七處善見如何答問七處善可依欲界等十地耶答唯依未至定靜慮中間及四靜慮六地不依欲界并上三靜慮近分地也兩方若依欲界等十地者婆沙解中七處善不依欲界并上三靜慮近分四地見若依之爾者三義觀既依欲界等十地七處善相例引同如何答見婆沙論百六十三四兩卷之文或出未曾得非初靜慮世俗智現在前而修無漏初靜慮不修淨初靜慮之類聖者依上三靜慮近分所起功德之中雖舉三義觀不舉七處善聖者依上三靜慮所起功德之中三義觀七處善俱舉之或出未曾得淨初靜慮現在前而修無漏初靜慮之類聖者依初靜慮所起功德之中三義觀七處善俱舉之或出未曾得非初靜慮世俗智現在前而修淨無漏初靜慮之類聖者依未至定靜慮中間所起功德之中三義觀七處善俱舉之或出未曾得非初靜慮世俗智現在前而不修淨無漏初靜慮之類聖者所起欲界功德之中雖舉三義觀不舉七處善未離欲染聖者依未至定所起功德之中三義觀七處善俱舉之或出未曾得非第四靜慮世俗智現在前而修無漏第四靜慮不修淨第四靜慮之類已離第三靜慮染聖者依未至定靜慮中間下三靜慮所起功德之中三義觀七處善俱舉之或出未曾得淨第四靜慮現在前而修無漏第四靜慮之類聖者依第四靜慮所起功德之中三義觀七處善俱舉之或出未曾得非第四靜慮世俗智現在前而不修淨無漏第四靜慮之類聖者所起欲界功德之中雖舉三義觀不舉七處善未離第三靜慮染聖者依未至定靜慮中間下三靜慮所起功德之中三義觀七處善俱舉之廣勘兩卷前後委見一段首尾三義觀依欲界未至定靜慮中間四靜慮及彼近分十地七處善唯依未至定靜慮中間四慮靜六地不依欲界上三靜慮近分四地云事尤分明也就此論説思其旨趣三義觀作非聖行相唯限有漏故廣依此欲界等十地七處善作聖行相亦通無漏故不依欲界上三靜慮近分四地歟問未離欲染人修惠無間起暖善根義可有耶答可有此義也兩方若有此義者光法師釋此中且據未離欲染故言總相思惠所攝畢引正理論諸有先時未離欲染依思所成惠引暖善根生之文為證任今定判未離欲染人修惠無間不起暖善根見若依之爾者設雖未離欲染人已得未至地畢何無修惠無間起暖善根之義哉答雖未勘分明定判以道理思此事未離欲染人已得未至地之後修惠無間起暖善根之義可有也但於光法師解釋正理論定判者就未離欲染未得未至地之類論之也以何知之者婆沙論七中上述色界定修所成行相攝有厭離有渴仰有惡賎有思慕作意無間引起暖暖無間引起頂頂無間引起忍忍無間引起世第一法畢鄰之間已離欲染者可爾未離欲染者云何已離欲染人已得修惠故修惠無間起暖善根其理可爾未離欲染人之中有未得未至地之者如何可定修惠無間起暖善根哉問也答此問云欲界亦有似彼作意思所成行相攝有厭離有渴仰有惡賎有思慕未離欲染者此作意無間引起暖餘如前説者乘問意未離欲染未得未至地之者思惠無間起暖善根為言非遮未離欲染已得未至地之者修惠無間起暖善根之義也光法師解釋正理論定判準婆沙論今文可會通之也問聞惠無間可起暖善根耶答不起暖善根也兩方若起暖善根者聞惠是勢力微劣也彼無間難起暖善根哉是以光法師所引正理論中雖述修惠思慕無間起暖善根之旨不云聞惠無間起暖善根知無此義云事若依之爾者聞惠既作十六行相何不引起暖善根哉何況披今論餘處文聞惠無間可聖道現前見若起勝品聖道者何不生劣品暖善根哉加之辰旦人師解釋中聞惠無間可起暖善根見如何答暖善根是見道近加行殊勝善根初起極難故聞惠無間輒不起之也故見光法師處處解釋當卷云此中且據未離欲染故言總相思惠所攝若已離欲總相念住即修惠所攝故正理六十一云若有先離欲界染者依色界攝修所成惠厭離患生死欣樂涅槃多厭行俱作意次第能引異類暖善根生諸有先時未離欲染依思所成惠引暖善根生故彼不應作一向執文餘處十四云如婆沙十七云暖隨轉戒於破戒有捨對治又正理六十一云諸有先時未離欲染依思惠所成惠引暖善根生亦婆沙第七亦説未離欲染者思惠無間能引起暖準此三文有從思惠初入暖者文任此等定判聞惠無間不起暖善根歟但於聞惠既作十六行相可引起暖善根云難者聞惠雖作十六行相勢力微劣故不引起暖善根也次於今論餘處聞惠無間聖道現前云文者無漏聖道入聖以後數數修習極純熟故聞惠無間任運起之暖等善根入聖加行未得自在未純熟故聞惠無間輒不起之也光法師餘處七婆沙論文不説聞惠無間聖道現前作二解釋之中第二釋云婆沙約初修次等起者説此論等通約純熟位説故不相違文此釋尤為今會通之潤色歟次於人師解釋者婆沙抄中云若從聞惠無間得初剎那暖戒有捨惡戒之釋歟若爾聞惠無間起初剎那暖善根云事甚背文理更不可有依用之重難云見光法師餘處一本解釋云若據盡理共相別相及五停位皆通修惠思惠聞惠文總相念住通聞惠無間寧不起暖善根哉答總相念住通聞思修三惠者初修通論也初起之位難通惠正引起初剎那暖善根唯限思惠修惠不可通聞惠也問依上三靜慮起暖善根人總緣共相法念住無間起之義可有耶答可有此義也兩方若有此義者見今論餘處七文破有餘師唯從共相作意無間聖道現前聖道無間亦唯能起共相作意云義云若依第二第三第四靜慮證入正性離生聖道無間起何作意乃至非於彼地已有曾得共相作意異於曾得順決擇分文如此文者依上三靜慮入見道人不起暖善根已前共相作意見若依之爾者光法師所引正理論中云若有先離欲界染者依色界攝修所成惠厭患生死欣樂涅槃多厭行俱有作意次第能引異類暖善根生文此文意雖述先離欲界染者色界攝修所成總緣共相法念住無間起暖善根之旨更不簡依上三靜慮起暖善根之人哉答依上三靜慮起暖善根之人其類非一準或總緣共相法念住無間起之或可有不然之類也其故見今論文云若已先得暖等善根經生故捨遇了分位善説法師便生頂等若不遇者還從本修文光法師釋此文云若不遇者還住暖等根本修故或從持息念等根本修故文而任若依根本起暖等者必於前生已起暖等之定判依上三靜慮起暖善根之人前生已起暖善根之者也若依還從暖等根本修故之意者直從暖善根起之故總緣共相法念住無間不可起之若依或從持息念等根本修故之意者總緣共相法念住無間可起暖善根也是非相違二釋總出其種類也重勘光法師餘處七解釋今生入聖此身唯起暖等入聖不起前位共相作意者當還從暖等根本修故之類設有起者加行攝故亦不能起者當或從持息念等根本修故之類也準此等解釋依上三靜慮起暖善根之人其意樂或總緣共相法念住無間起之或直從暖善根之人類可有也但於今論餘處文者上三靜慮攝曾得共相作意異於曾得暖等順決擇分善根入聖之後起之可為聖道出心之類無之為言非謂總不起暖善根已前總緣共相法念住何為相違哉答今論云若先已得暖等善根經生故捨遇了分位善説法師便生頂等若不遇者還從本修文婆沙論七云問修暖滿已將欲起頂遂便命終彼餘生中為即起頂為從本起答若遇明師隨彼應起分齊説者即能起頂若不爾者還從本起然能速起非如初修文準此等之文思之前生起暖善根之人今生遇了分位善説法師未得未至地之前起頂善根之時思惠無間可起之云事必然也故婆沙論次下文云問若餘生中即起頂者從何作意無間起耶答如起暖時所有作意如説從暖起頂從頂起忍亦爾文而上文明起暖善根之時作意云欲界亦有似彼作意思所成行相攝有厭離有渴仰有惡賎有思慕未離欲染者此作意無間引起暖餘如前説文準前後之文思之未得未至地之人思惠無間起頂善根之義可有云事尤分明也但於光法師所引正理論文者述總相念住無間初起暖善根約已離欲染未離欲染分別其差異未離欲染人思慕惠無間起暖善根云許也不及前生起暖善根之人今生遇了分位善説法師起頂善根等之委曲歟次於婆沙論頂善根隨轉戒於破戒不舉捨對治之文者就一身中相續起暖頂忍等之類論之也婆沙論中答若爾何故説暖無間起頂頂無間起忍耶之問云依一身中相續起者作如是説然非一切文此文頗順今會通之趣歟尋云未得未至地之人思惠無間起忍善根之義可有耶答準婆沙論如起暖時所有作意如説從暖起頂從頂起忍亦爾之文思之可有此義也其上難答只如頂善根也問暖頂二善根位觀四聖諦可通相續不相續耶答可通相續不相續也兩方若通相續不相續者見今論文述從此生暖法具觀四聖諦等不云通不相續婆沙論中云暖頂位中唯有相續觀聖諦故唯限相續見若依之爾者暖頂二善根位分是長遠觀四聖諦剎那相續其義可不定何不通相續不相續哉是以忍苦善根位觀四聖諦通相續不相續相例可同如何答暖頂二善根其位分實久觀四聖諦可通相續不相續也故婆沙論中答初暖頂忍於四聖諦為相續為不相續之問初雖舉或云相續或云不相續之二説遂評家答之云如是説者此不決定或相續觀或不相續隨彼加行勢力轉故文但於今論從此生暖法具觀四聖諦等之文者只述暖頂二善根位觀四聖諦作十六行相之旨未及相續不相續之分別何為違文哉次於婆沙論暖頂位中唯有相續觀聖諦故之文者對忍善根位中有增上忍決定唯一剎那暖頂二善根位中無如增上忍決定唯一剎那之類故如此云也具文云以忍位中有時相續有一剎那觀察聖諦暖頂位中唯有相續觀聖諦故文問暖頂二善根位作十六行相觀上下八諦時一一行相唯限一剎那歟答不限一剎那歟兩方若唯限一剎那者有漏是劣觀也何無一一行相相續之義哉若依之爾者暖等四善根是見道近眷屬也見道位既作一一行相唯限一剎那暖頂二善根位尤可同彼何況勘舊婆沙論三文云如是三十二心是名下忍位作一一行相唯限一剎那見暖頂二善根位相位相例可同如何答披俱舍正理婆沙雜心等論説見光法師寶法師神泰圓暉等解釋雖未勘及分明定判伺淨影大師所釋有委悉再往分別故大乘義章十一云依如毗曇苦集滅道界行分別有三十二界謂三界行者所謂苦無常等十六聖行欲界地中有十六行上界亦然上下通説有三十二於一一行正能觀察説之為暖觀之未明名暖方便觀心分明名暖成就暖法如是於一一行心觀來去以漸略之至一心觀名之為頂二心觀前名為方便一心觀後名為成就此頂心中雖復漸略望於四諦及十六行相猶名具觀不名為略然此成處各一心觀與後忍中初觀相似如增上忍似第一法問曰善根漸多應好何故須略釋言始觀多心重緣猶不明了觀心後純少緣即見是以減之頂法如是次辨忍法於彼上下三十二行各一心觀乃至於彼欲界苦下一行觀來説之為忍文此釋意云暖善根位作一一行相唯相續觀之頂善根初同暖善根終故頂善根初位作一一行相亦相續觀之忍善根初同頂善根終故頂善根終位并忍善根位作一一行相唯限一剎那為言重難云見大乘義章次下文云或分為十前三各有上中下別世第一中其唯一品通前十也暖中三者於彼四諦三十二行始觀未見名之為下昧見為中明見為上頂中三者於彼諸行多心觀中初略一觀名之為下略二已後乃至於彼三十二行各三心觀説之為中各二心觀説以為上忍中三者初於三十二行之中各一心觀名之為下故毗婆沙云觀欲界苦行至上界道行三十二心是名下忍文如此釋者暖善根終位不略觀心唯相續觀之頂善根初位略一心觀故頂善根初不同暖善根終頂善根終位各二心觀忍善根初位各一心觀故忍善根初不同頂善根終何云後位善根初同前位善根終哉答貞禪大僧都云初略一觀名之為下者自不略觀心至略一心觀為頂善根下位云也非謂頂善根初位略一心觀頂善根初位不略觀心同暖善根終位也各二心觀説以為上者自各二心觀至各一心觀為頂善根上位云也非謂頂善根終位各二心觀頂善根終位各一心觀同忍善根初位也重意云頂善根下位略一心觀者出終頂善根上意各二心觀者舉初也云云問寶法師意暖頂二善根初安足位所現修法念住可通雜緣不雜緣耶答可通雜緣不雜緣也兩方若通雜緣不雜緣者寶法師釋如是暖頂二種善根初安足時唯法念住之論文云雙明二善初安足時行修唯雜緣法念位也文如解釋者暖頂二善根初安足位所現修法念住唯限雜緣見若依之爾者暖頂二善根初安足位廣緣四諦所現修法念住何不通雜緣不雜緣哉答暖頂二善根初安足位唯法念住現之中緣苦集道三諦雜緣法念住現起緣滅諦不雜緣法念住現起云事性相之所定也更不可疑之但於寶法師解釋者緣苦集道三諦有雜緣不雜緣法念住之中暖頂二善根初安足位唯雜緣法念住現起云也緣滅諦自本唯有不雜緣法念住無相濫故不論事也有雜緣不雜緣二種法念住之處唯雜緣法念住現起為言問忍善根位所現修法念住可通雜緣不雜緣耶答可通雜緣不雜緣也兩方若通雜緣不雜緣者婆沙論中説忍善根相云現在唯一雜緣法念住未來具四似見道故文如此文者唯限雜緣法念住見若依之爾者以道理思之忍善根位所現修法念住何不通雜緣不雜緣哉答忍善根位唯法念住現起之中緣苦集道三諦雜緣法念住現起緣滅諦不雜緣法念住現起云事性相之所定也更不可疑之但於婆沙論文者緣苦集道三諦有雜緣不雜緣法念住之中忍善根位唯雜緣法念住現起云也緣滅諦自本唯有不雜緣法念住無相濫故不論事也有雜緣不雜緣二種法念住之處唯雜緣法念住現起為言問頌文云下中品同頂文爾者中忍同頂者為説現修行相為當論得修行相歟答就現修行相同之也兩方若就現修行相同之者中忍位漸減行相何云現修同頂哉若依之爾者前後頌文偏就現修論之下中品同頂之文何獨就得修論之哉答披一段論文思二修分別上云如是二善根皆初法後四次忍唯法念下結上唯觀欲苦一行一剎那世第一亦然併就現修行相論之準而按之云下中品同頂亦就現修行相同之也但於中忍位漸減行相不可現修同頂云難者中忍位初具觀四聖諦境具修十六行相故就總相云下中二忍與頂法同也故光法師釋此疑云忍有三品下中同頂具觀四諦修十六行相此總想説若別分別於中品忍雖初具觀上下八諦行相漸略至後位中諦亦漸略次後當説文何況設就得修行相論之中忍位分漸亦減諦隨減彼行豈全同頂善根位哉問中忍滿意為二行相二剎那為當一行相二剎那歟答隨所留行相一行相二行相可不定也兩方若二行相二剎那者光法師所引正理論六十一中云乃至極少唯以二心觀欲界苦如苦法忍苦法智位齊此名為中品忍滿文婆沙論五中云至一行相二剎那觀察如苦法智忍及苦法智齊此名中忍文加之見寶法師解釋或云至唯緣欲苦諦一行二剎那前名中品忍或述唯一行二念名為中忍勘妙樂大師所判釋都有三十一周減緣減行後但有一行二剎那心觀於欲苦名中忍滿任此等定判中忍滿位一行相二剎那見若依之爾者淨影大師云乃至於彼欲界苦下唯觀二行是名中忍圓暉法師判如是乃至滅欲苦下二行相時但有二行二剎那心觀欲界苦名中忍滿中忍滿位二行相二剎那云事今兩師解釋尤分明也如何答於苦聖諦有非常苦空無我四行相之中留初非常行相入見道之者中忍滿位可二行相二剎那也所謂初觀非常苦空減無我次觀非常苦減空次觀非常減苦此觀非常苦減空之中後苦行相觀非常減苦之時非常行相作此苦非常二行相二剎那心名中忍滿位淨影大師定判圓暉法師解釋即就留初非常行相入見道之者二行相二剎那心名中忍滿云也留後三行相入見道之者中忍滿位可一行相二剎那也其中暫就留苦行相入見道之者顯其相者初觀非常苦空減無我次觀非常苦減空次觀苦減非常此觀非常苦減空之中後苦行相觀苦減非常之時苦行相作此苦一行相二剎那心名中忍滿位留空無我二行相入見道之者中忍滿位一行相二剎那事準之可知正理婆沙兩論之文法寶妙樂二師之釋即就留後三行相入見道之者一行相二剎那心名中忍滿云也見道暹法師解釋云次減欲界苦諦下先除無我行次除空行次除無常行留苦諦及苦行謂一行二剎那心名中忍滿留苦行相入見道之者一行相二剎那心名中忍滿釋尤可為此義潤色歟若爾隨所留行相中忍滿位二剎那心或作二行相或作一行相其類不定故論家定判人師解釋雖似參差更非相違也重難云圓暉法師釋云減欲苦下二行相時觀非常苦減空之時二行相二剎那心為中忍滿位見觀非常減苦之時即可增上忍位何為中忍滿位哉是一次見淨影大師處處解釋或大乘義章云忍中於彼上下四諦各十六行相合有三十二重觀行或大乘義章一述就此忍中具有三十二番觀行忍善根位總有三十二番觀行見苦觀非常減苦之時猶為中忍滿位者忍善根位總可有三十三重觀行豈不背淨影大師解釋哉是二答隨所留行相中忍滿位或二行相二剎那或一行相二剎那其類不定云義意圓暉法師解釋實以難思然而暫會之云作一行相減三行相之時為中忍滿位事是必然也作二行相減二二行相之中初念非中忍滿位後念是中忍滿位有其相濫故為顯彼後念是中忍滿位云減欲苦下二行相時等也非謂減二行相之時二剎那心俱中忍滿位亦非存作一行相減三行相之時增上忍位也次於淨影大師處處解釋者中忍滿位二剎那心之中作一行相減三行相之時與增上忍位同一行相故以此二剎那觀合為一番也彼下忍位雖數觀上下八諦同觀上下八諦故合為一番準彼可思之也問暖等四善根以得為體歟進云論云然除彼得文付之於暖等四善根論助伴體之時何可除得哉是以四沙門果以得為體見相例可同如何答暖等四善根不以得為體云事諸論同述之諸師舉成之故今論云如是暖等四種善根念住性故皆惠為體若并助伴皆五蘊性然除彼得勿諸聖者暖等善根重現前故文光法師釋此文云本起暖等為求聖道既得聖已理不應起加行善根以無用故然得聖已有成暖等若得為體即有暖等重現前過由此暖等非得為體文正理論六十一云暖等自性皆惠為體若并助伴皆五蘊攝定俱亦有隨轉色故然除彼得勿諸聖者暖等善根重現前故然已見諦不許暖等重現在前已見諦者加行現前成無用故文顯宗論三十文全以同之婆沙論四中上述彼得定非世第一法得聖果已順決擇分不重起故畢下舉評家義云若彼俱起若後起得一切皆非世第一法種類同故暖等亦爾是故初説於理為善文任此等定判暖等四善根不以得為體云事尤分明也但於四沙門果以得為體云例難者光法師即會此難云沙門果體成就所顯故得是沙門果暖等善根聖不重起故得非暖等文此釋意云述五因立四果捨曾得勝道集斷得八智頓修十六行由得果攝殊勝道總一得得諸斷得四法四類八智得修無常等十六行相等之義建立四沙門果故云沙門果體成就所顯也此釋源依婆沙論四沙門果成就所顯故沙門果得是沙門果之文也故四沙門果以得為體暖等四善根是聖道近加行可通痛入聖之後重現前過故暖等四善根不以得為體云也重難云若四沙門果以得為體者後果向道現在前後前果得猶現前豈無向果雜亂之過哉答光法師亦會此難云果得雖起所得果法即不現前故不相雜故正理六十一云又沙門果諸相續得雖亦許為沙門果體而無八聖位相雜失以諸安住勝果道攝者果攝所得法必定不行故安住果者勝果道攝諸所得法亦不成故文此釋意云後果向道現在前後前果得猶雖現前所得果法即不現前故無向果雜亂之過云也重難云若爾入聖之後暖等四善根上得雖現前所得暖等四善根不現前者何可有聖道加行善根重現前過哉答見今論餘處文述以後三果向不離前果故後三果向自本不離前三果故後果向道現在前後前果得猶現前更非所痛聊可有向果雜亂之分會果得雖起所得果法即不現前故不相雜故無其過也重意云後果聖道現在前後前果得猶現前者可有大過前果後果極違背故而後果向道與前果得不違背故後果向道現在前後前果得猶現起更無其名苦也亦尋云寶法師今為一釋前果非是後向道攝向後起得不違理故暖等是彼聖道加行道後起暖等是違理故之釋其意如何答問不淨觀持息念別相念住總相念住以得為體歟答以得為體也兩方若以得為體者不淨觀持息念別相念住總相念住有法後得故入聖之後彼得可現前若以得為體者豈無重現前過哉是以今論中説暖等四善根相云然除彼得勿諸聖者暖等善根重現前故文相例可同若依之爾者廣見論疏定判雖暖等四善根體除得於不淨觀等功德更不簡之知以得為體云事如何答不淨觀持息念別相念住總相念住是聖道遠加行不痛入聖之後重現前義故以得為體也暖等四善根是聖道近加行可恐入聖之後重現前過故不以得為體也重意云不淨觀持息念別相念住總相念住聖道遠加行起之餘時乃至入聖之後亦起之暖等四善根唯聖道近加行起之餘時全不起之故不淨觀等不痛入聖之後重現前義暖等四善根獨付入聖之後重現前過也俱舍正理顯宗婆沙等諸論中雖述暖等四善根體除得之旨不云不淨觀持息念別相念住總相念住體除得即存此旨故也重難云見光法師餘處解釋云今生入聖此身唯起暖等入聖不起前位共相作意設有起者加行攝故亦不能起文此釋意暖善根以前共相作意以得為體者豈無入聖之後重現前過哉答暖善根以前共相作意暖善根近眷屬故入聖之後彼法體亦不起之云許也彼法上得重現前事不及遮之歟問暖善根初安足位曾得道現起歟答不現起也兩方若曾得道現起者暖善根是見道近加行也全不可云曾得道現起是以今論中暖善根初安足位唯未曾得道現起見若依之爾者婆沙論百八十八中説暖善根初安足位云此曾得種姓故文如何答暖等四善根是見道近加行殊勝善根故初安足後增進位念念唯未曾得道現起也故見今論等諸論定判述暖等善根初安足後增進位未來修念住行相之旨若曾得道現起者豈可有未來修哉加之今論云若先捨已後得時所得必非先之所捨如捨已重得別解脫律儀以未曾熟修大功用以成故文光法師釋此文云暖等善根若先捨已復重得時所得必非先之所捨如人先捨別解脫戒已後重得戒所得必非先之所捨以暖等善根從無始來未曾熟修要由廣大功用成故於未曾得生欽重故得先未曾捨已曾得不欣樂故非得曾得以趣聖善求升進故文正理論云若先捨已後重得時所得必非先之所捨由先捨已後重得時亦大劬勞方得起故於先所捨不欽敬故如先已捨別解脫戒後重受時得未曾得暖等亦爾後得非先文婆沙論七云應言不得隨爾所度退已還生即爾所度新新而得所以者何極難得故未曾習故用功成故如別解脫戒隨爾所度捨已復受即爾所度新新而得此亦如是如説暖頂亦爾文任此等定判暖等善根初安足後增進位念念唯未曾得道現起云事尤分明也但於婆沙論此曾得種姓故之文者暖善根以前聞思二惠現在前位多作十六行相畢後起暖善根故云曾得種姓也非謂曾所得暖善根現起也今論中述暖善根後增進時修同分念住行相云由此種姓先已曾得文婆沙論文準之可會也問暖等四善根可有離染得耶答無離染得也兩方若有離染得者暖等四善根是殊勝善根也離染之時輒不可得之是以見婆沙論處處之文述暖等四善根唯加行得之旨不可有離染得云事若依之爾者唯初盡遍修九地有漏德者今論餘處定判也初盡智現前位得修暖等四善根者暖等四善根豈無離染得哉答暖等四善根是見道近加行殊勝善根故唯加行得無離染得也故見婆沙論處處之文或六述暖等四善根得捨相云得者由加行故文或七答若退暖已還生暖時為得先時曾得暖不之問云應言不得隨爾所度退已還生即爾所度新新而得所以者何極難得故未曾習故用功成故如別解脫戒隨爾所度捨已復受即爾所度新新而得此亦如是如説暖頂亦爾文或四十五云或有善法由加行故得非由餘緣如暖頂忍世第一法文或九十七約世俗正見述加得離欲得相出加行得之類即舉暖頂忍世第一法出離染得之類無舉暖等四善根或百四十四約非學非無學善意根述加行得離染得相出加行得之類無舉暖等四善根任此等定判暖等四善根唯加行得無離染得云事甚分明也但於初盡智現前位可得修暖等四善根云難者暖等四善根是見道近加行故付入聖之後可重現前之過其體除得之法也初盡智現前位豈可修得之哉若初盡智現前位得修之者鈍根阿羅漢退第四果之時可退捨忍世第一法上位所得修法退住下位之時必退捨之故也若爾寧不違初二亦退捨之理哉何況婆沙論三中約世第一法問為都勝故説名第一為分勝故名第一耶徴設爾何失次述其問意云若都勝故名第一者乃至又此豈勝初盡智時所修善根然修彼時離一切障所依清淨此法不爾文此文既以世第一法望初盡智位所得修善根論其勝劣故明知世第一法非初盡智位所得修善根云事若世第一法非初盡智位所得修善根者暖頂忍前三善根亦以可同也問已離欲染人初起暖等善根時可得修前八品斷者所起暖等善根耶答不得修之也兩方若得修之者已離欲染人初起暖等善根之時何可得修前八品斷者所起暖等善根哉若依之爾者見婆沙論文云離欲界一品染者於離欲界一品染者所起暖等亦得在身亦成就亦現在前於具縛者所起暖等得而不在身成就不現在前乃至離無所有處第九品染者於自所起暖等亦得亦在身亦成就亦現在前於餘處起暖等得而不在身成就不現在前文準此文思之已離欲染人初起暖等善根時不得修前八品斷者所起暖等善根者於前位所起暖等善根寧可有得而不在身之身之義哉答已離欲染位所起暖等善根八品斷位所起暖等善根種類是別體性各異故已離欲染人初起暖等善根之時唯得修自位所起暖等善根不可得修前八品斷者所起暖等善根其時彼前八品斷者所起暖等善根不得不在身無得而不在身之義也但於婆沙論文者就一人前後位論之也所謂於欲界煩惱全未斷位起暖等善根一品斷位起暖等善根如是次第乃至於無所有處煩惱八品斷位起暖等善根九品全斷位起暖等善根之人於前位所起暖等善根得而不在身成就不現在前為言非謂已離無所有處第九品染之後初起暖等善根之時得修前位所起暖等善根故有得而不在身之義也婆沙論中明起滅盡定云有具縛時起滅盡定即彼進斷一品染時復起滅盡定彼於爾時先所起者得而不在身成就不現前今所起者得亦在身成就亦現前即彼乃至從時解脫練根得不動彼於爾時前諸位中所起滅定得而不在身成就不現前今不動位所起滅定得亦在身成就亦現前文此文無諍就一人前後位於前位所起滅盡定云得而不在身成就不現前也於暖等善根隨離染位述得而不在身成就現在前之義準之可思也問異生位除暖等四善根外可起餘順決擇分善根耶答可起之也兩方若起之者淨定分四種之時能順無漏名順決擇分異生位除暖等四善根之外能順無漏之類難有哉是以見今論餘處七文破有餘師唯從共相作意無間聖道現前聖道無間亦唯能起共相作意云義云若依第二第三第四靜慮證入正性離生聖道無間起何作意乃至非於彼地已有曾得共相作意異於曾得順決擇分文若異生位除暖等四善根之外起餘順決擇分善根者寧可有此能破哉若依之爾者光法師餘處解釋中異生位除暖等四善根之外可起餘順決擇分善根見如何答異生位除暖等四善根之外可起餘順決擇分善根也其故光法師所引正理論中云若有先離欲界染者依色界攝修所成惠厭患生死欣樂涅槃多厭行俱作意次第能引異類暖善根生文而互相望如次生二三三一者又正理論定判也明知能引暖善根生修所成惠亦順決擇分攝云事何況勘光法師餘處十五解釋云今準此論及正理論唯暖等四順決擇分名殊勝善根命終捨餘順決擇分非是殊勝命終不捨文異生位除暖等四善根之外起餘順決擇分善根云事此釋亦分明也加之見婆沙論處處之文或百二十四出業是自業此業不成就之類云若初靜慮順退分順勝進分順決擇分等業已現在前已牽異熟此有四種謂順現法受等如前説果正現前此業已失由已離染故或易界地等故文此文意云初靜慮順退分業自業此業不成就者彼順退分業所感異熟果現前位已離初靜慮染捨彼順退分業故也初靜慮順勝進分業順決擇分業自業此業不成者於一相續依身不可有此義起初靜慮順勝進分順決擇分作順後業之後命終生上地之時由易地故捨彼順後業畢第三生等已後還生初靜慮彼順後業所感異熟果現前位不成就能感業故於第三生等已後有此業不成就之義順勝進分順決擇分還生之時不得法故也故異生位除暖等四善根之外起餘順決擇分善根作順後業云事此文必然也或百六十三出初靜慮沒生第二靜慮第二靜慮沒生初靜慮者往沒還生時捨不捨得不得法云彼於初靜慮順勝進分順決擇分往沒時捨還生時不得文既生初靜慮之人所成就順決擇分善根故非暖等四善根云事無疑亦許還生之義非聖者云事勿論也但於異生位除暖等四善根之外能順無漏之類難有云難者異生所起之淨定其類非一準除暖等四善根之外何無能順無漏之類哉次於今論餘處文者暫回愚推云上三靜慮攝曾得共相作意異於曾得暖等順決擇分善根入聖之後起之可為聖道出心之類無之為言其故今生依上三靜慮入聖之後者前生雖起暖善根已前彼地攝共相作意殊勝善根經生故捨之今生或有唯從暖善根起之入聖之類或亦雖有起暖善根已前彼地攝共相作意殊勝善根之類聖道加行善根故入聖之後不可起之聖道無間起何何共相作意哉破也非謂總不起暖善根已前彼地攝共相作意殊勝善根何為相違哉何況光法師釋此文云雖於彼地過去曾修共相作意殊勝善根經生捨故今生起者決擇分收文而依上三靜慮起暖善根之人任依本必見諦之理故入聖已前不可有經生之義明知過去曾修共相作意殊勝善根經生捨故者非暖等善根云事若爾此釋還為異生位除暖等四善根之外起餘順決擇分善根之證更非難勢之端哉相承義云異生位除暖等四善根之外可起餘順決擇分善根亦依上三靜慮入見道人聖道無間起共相作意之類可有也但於今論餘處非於彼地已有曾得共相作意異於曾得順決擇分之文者取出一類除暖等四善根之外不起餘共相作意善根之者如此破也有餘師意云唯從共相作意無間聖道現前聖道無間亦唯能起共相作意者一類無曾得共相作意異於曾得暖等善根之者聖道無間起何共相作意哉為言問今論意依第四靜慮起忍善根人今此忍善根位可起非順決擇分所攝心品哉答可起之也兩方若起之者今論意定互相望如次生二三三一故順決擇分無間不可起順住分順勝進分依身在下地不起上地散善故不可起色界生得慧聞慧若爾今此忍善根位何可起非順決擇分所攝心品哉若依之爾者忍善根位時分既廣設雖今論意何不起非順決擇分所攝心品哉答今論意依第四靜慮起忍善根之人今此忍善根位可起非順決擇分所攝心品也若不起之者寧可有出觀之義哉故推其心品生起次第第四靜慮順決擇分無間起第三靜慮順決擇分第三靜慮順決擇分無間起第二靜慮順決擇分第二靜慮順決擇分第二靜慮順決擇分無間起初靜慮順決擇分初靜慮順決擇分無間起欲界善心可出觀也重難云婆沙論五中述忍獨名順諦非暖頂故云以忍位中無雜作意暖頂位中有雜作意故意暖頂位數復起欲界善心觀欲界苦為間雜已復能引此善根現前忍位不爾文如此文者忍善根位總不起欲界善心見如何答忍善根位雖起欲界善心非數數起之故對暖頂二善根位數數起欲界善心云忍位不爾也非謂忍善根位總不起欲界善心全非相違歟問初苦法忍位未來可修四念住耶答可修四念住也兩方若修四念住者現修既限法念住得修何通四念住哉是以人師解釋中釋初苦法忍位現修同限法念住見若依之爾者暖頂二善根初安足位現修唯限法念住未來廣修四念住者性相之所定也初苦法忍相例可同如何答初苦法忍位現修唯限法念住未來可修四念住也故婆沙論百八十九云若入正性離生苦集現觀各四心頃道現觀三心頃法念住現在修未來修四一行相現在修未來修四一行相現在修未來修四同分修非不同分文但於現修既限法念住修得不可通四念住云難者現修斷對治道故唯限法念住未來修別緣道故通四念住也次於人師解釋者婆沙抄一本中云如苦法忍現行修唯法念住得修未來苦法忍唯法念住見道明了道故之釋歟若爾既違婆沙論文更不可依用之問非暖善根初安足位非聞慧現前位非滅現觀四心現前位依四靜慮未曾得心品現前位必得修受念住歟答必得修之也兩方若必得修之者心品現起非一準何必得修受念住哉是以人師解釋中不必得修之見若依之爾者既未曾得心品現起位也必可得修受念住哉何況於法念住者必得修之見相例可同知何答見婆沙論文上述入正性離生十六心間所修念住有其不同畢云從此以上一切聖者起未曾得善根現在前時未來皆修四念住十六行相唯除聞慧思所成慧及入滅定微微心時文準此文非暖善根初安足位非聞慧現前位非滅現觀四心現前位依四靜慮未曾得心品現前位必可得修受念住也但於人師解釋者婆沙抄中總緣非我觀現修得修俱唯雜緣法念住見釋意歟若以此釋為其疑者此釋既違婆沙論文更不可依用之問寶法師所引婆沙論中明成就世第一法不成就彼離繫得等四句分別相致三重問答爾者第一重四句中成就世第一法不成就彼離繫得者於初靜慮煩惱中可亘未離已離二類耶答可亘未離已離二類也兩方若未離已離二類者披寶法師所引婆沙論文明第一重四句分別相出成就世第一法不成就彼離繫得之句云謂若依此地入正性離生彼未離此地染文如此文者於初靜慮煩惱不亘未離已離二類見何況成就彼離繫得不成就世第一法之句於初靜慮煩惱不亘未離已離二類見相例可同若依之爾者世第一法種類是萬差彼離繫得成就不成就非一準成就世第一法不成就彼離繫得之類於初靜慮煩惱何不亘未離已離二類哉答委按婆沙論三重問答四句分別相第一重四句之中成就世第一法不成就彼離繫得者於所成就世第一法不成就彼上無漏離繫得故云成就世第一法不成就彼離繫得非於一切世第一法不成就彼上一切離繫得故云爾也第二重四句之中成就世第一法不成就彼離繫得者於所成就世第一法不成就彼上有漏離繫得故云成就世第一法不成就彼離繫得非於一切世第一法不成就彼上一切離繫得故云爾也第三重四句分別之中成就世第一法不成就彼離繫得者於所成就非所成就一切世第一法不成就彼離繫得也故第一重四句之中出成就世第一法不成就離繫得之句云謂若依此地入正性離生彼未離此地染者不必限未離初靜慮染一類依初靜慮入見道人未離初靜慮染依第二靜慮入見道人未離第二靜慮染依第三靜慮入見道人未離第三靜慮染依第四靜慮入見道人未離第四靜慮染皆舉之也雖各成就自地世第一法未離自地染位不成就彼世第一法之上無漏離繫得故也云謂若依此地入正性離生彼未離此地位染不云何地事廣取依四靜慮入見道人各未離自地染位故也第三重四句之中出成就世第一法不成就彼離繫得之句云謂若依未至定或初靜慮中間入正性離生彼未離初靜慮染一類依上三靜慮入見道人各未離自地染位雖不成就自地世第一法之上有漏無漏離繫得成就下地世第一法之上有漏離繫得故此句之中不取之唯舉依未至定或初靜慮中間入見道人未離初靜慮染位也一段論文如此得意之時第一法第一重四句之中出成就世第一法不成就彼離繫得之句云謂若依此地入正性離生彼未離此地染之文既舉未離初靜慮染已離初靜慮染二類依此文可限未離初靜慮染一類云難更不可來歟但依初靜慮入見道人已離初靜慮染位亦可有此義何唯舉未離此地染一類哉云疑尤可然也即出其類者凡位已離初靜慮染依初靜慮入見道人未起第九品勝果道位并依初靜慮入見道人已離初靜慮染之後修練根未起第九品勝果道位同可成就世第一法不成就彼無漏離繫得之類也然而論文先就其相顯暫舉依此地入正性離生彼未離此地染一類委論之者可有依此地入正性離生彼已離