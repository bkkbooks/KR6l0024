餘順決擇分是故無有世第一法文如此文者無色界無順決擇分善見若依之爾者無色界心品種類非一準若有順聖道之類者何無順決擇分善哉答若依四分定中順決擇分者無色界可有順決擇分善也以何知之者見今論餘處二十八文云於此四中唯第四分能生無漏所以者何乃至順決擇分能順無漏故諸無漏唯從此生文而若無色界無順決擇分善者依身在下地起無所有處無漏定之者何心無間起彼無漏定無間可起何心哉故無色界有順決擇分善云事道理必然也何況見光法師餘處十五解釋云若餘決擇亦命終捨無色亦有順決擇分何故不説命終捨耶文無色界有順決擇分善云事此釋亦分明也但於婆沙論無色界無餘順決擇分之文者就暖等四善根論之也無色界無餘暖頂忍所攝順決擇分善故亦無世第一法為言非謂總無暖等四善根之外餘順決擇分善何為違文哉問暖等四善根可感眼等五根耶答可有二義也兩方若感眼等五根者暖等四善根既憎背諸有何可感眼等五根哉是以泰法師解釋中暖等四善根不感眼等五根見若依之爾者見今論并婆沙論文雖述暖等四善根唯為圓滿因不為牽引因之旨無遮感眼等五根之義知可感之云事如何答此事頗難測暫可存二義也或一義云暖等四善根可感眼等五根也故今論云此四善根能感色界五蘊異熟為圓滿因不能牽引憎背有故文正理論六十一云此四善根能感色界五蘊異熟為圓滿因不能牽引衆同分故極厭諸有欣圓寂故文顯宗論三十文全亦同之婆沙論七云謂此善根厭背諸有於衆同分但能圓滿不能牽引文此等論文雖述暖等四善根不感衆同分之旨不云於滿果中有不感之類明知暖等四善根感眼等五根云事但於暖等四善根憎背諸有不可感眼等五根云難者厭背諸有故雖不為牽引因感衆同分有漏善根故能為圓滿因感眼等五根也次於泰法師解釋者既背此等諸論之説強不可依用之或一義云暖等四善根是見道近加行厭背諸有故不可感為生死根本眼等五根也故泰法師釋此四善根能感色界五蘊異熟等之論文云此四善根是有漏故能感色界五蘊異熟故涅槃經是法執得色界五陰然為助滿作圓滿因感得喜樂捨受心心所法色觸二處四相及得不能作牽引因感命根衆同分眼等五根以憎背有故文但於今論等文者暖等四善根不能為牽引因感衆同分故偏簡之也不簡盡滿果之中亦有不感之類歟問尊者妙音意欲界繫暖頂二善根修慧攝歟答非修慧攝也兩方若修慧攝者欲界無修慧者有宗常途之談也設雖尊者妙音何云欲界繫暖頂二善根修慧攝哉是以泰法師餘處解釋中述尊者妙音義云暖頂是思慧文若依之爾者見今論文上標四皆修所成更無舉異義下述六地二或七出妙音師説明知彼師意欲界繫暖頂二善根修慧攝云事何況勘淨影大師解釋云尊者瞿沙説此暖等是其欲界及色界攝非無色界彼説欲界亦有禪定可依修起故欲界攝文見妙樂大師定判云若大論中以隨人故並有欲定未到中間婆沙妙音亦同此説文任此等所判彼師意欲界繫暖頂二善根修慧攝之旨尤分明也如何答尊者妙音意欲界有修慧云事人師解釋多雖述此旨論家定判未勘得其證故任有宗常途之談彼師意存欲界無修慧云義可得意也若爾欲界繫暖頂二善根唯思慧攝非修慧攝可云也是以婆沙論六中依彼師意出暖頂二善根體云此二自性唯有四蘊欲界中無隨轉色故文若修慧攝者豈無隨轉色哉正理論六十一中破彼師義云對法諸師不許彼説非聞思所成順決擇分故文準今能破之文思彼所破義意欲界繫暖頂二善根非修慧攝被得但於今論四皆修所成之文者依正義意如此云也非謂二或七之義亦唯修所成歟次於淨影妙樂兩師解釋者既非自宗祖師定判強不可劬勞歟重難云婆沙論七中述暖等四善根位現在未來修念住行相云尊者妙音作如是説初忍及增長忍如初暖及增長暖説文如此文者彼師意暖頂二善根有未來修見若有修者豈非修慧攝哉答此難恐似不辨文意此文意云尊者妙音意初忍色界善根未曾得種姓增長忍色界善根已曾得種姓故如正義意初暖及增忍暖意現在未來修念住行相為言非謂彼師意初暖及增長暖位有未來修也重尋云若爾彼師意欲界繫暖頂二善根為唯思慧攝為當通聞慧攝歟答暖等四善根是道近加行殊勝善根故彼師意欲界繫暖頂二善根唯思慧攝不通聞慧攝也故勘泰法師餘處解釋云依正量部論及尊者瞿沙説暖頂是思慧忍及第一是修慧文重難云準正理論非聞思所成順決擇分故之能破文推之所破義意存欲界繫暖頂二善根通聞思二慧攝見歟答正理論能破文意總顯聞思二慧非順決擇分之旨也非所破義意存欲界繫暖頂二善根通聞思二慧攝故如此破歟問尊者妙音意暖頂二善根為唯依欲界為當通依色界歟答通依欲色二界也兩方若唯依欲界者披今論并正理論文述六地二或七彼師意暖頂二善根通依欲色二界見若依之爾者婆沙論六中述彼師義云順決擇分有欲界繫有色界繫欲界繫中下者名暖上者名頂文此文無諍暖頂二善根唯依欲界見加之婆沙論七中述彼師義云初忍及增長忍如初暖及增長暖説忍善根初安足位不得修不同類念住行相判若暖頂二善根通依色界者忍善根初安足位色界善根已曾得種姓也何不得修餘諦念住行相哉答廣披有宗依憑論藏委尋尊者妙音宗義今論中釋六地二或七之頌文云或聲為顯二有異説謂暖頂二尊者妙音説依前六及欲七地文正理六十一顯宗三十兩論之文全亦同之雜心論五云謂餘或依七者暖頂亦六地尊者瞿沙欲令欲界亦有文任此等論文尊者妙音意暖頂二善根通依欲界未至中間及四靜慮七地云事尤分明也但於婆沙論欲界繫中下者名暖上者名頂之文者珍海已講會云對後二善根唯色界繫以初二善根暫屬欲界繫也婆沙論意實存彼師意暖頂二善根通依七地故全非相違也云云次於婆沙論意忍善根初安足位不得修不同類念住行相云文者對後二善根唯色界繫以初二善根暫屬欲界繫之日忍善根初安足位色界善根未曾得種姓故不得修不同類念住行相云也以實論之暖頂二善根通依色界故忍善根初安足位可得修餘諦念住行相也重難云見舊俱舍論十六文云大德瞿沙説前二決擇分能善根以七地為依處或依欲界地起文如此文者尊者瞿沙義中云或云暖頂二善根通依七地或云唯依欲界之異説可有見若爾俱舍婆沙兩論之文各述一師義也何及會通哉答舊俱舍論文非舉各別二師異義只欲顯暖頂二善根通以七地為依處之旨云或依欲界地起也貞禪大僧都云見婆沙論文云尊者妙音作如是説欲界善心無間有未至定或初靜慮或靜慮中間或第二靜慮現在前彼四無間欲界善心現在前如超定時初靜慮等無間超第二靜慮等而第三靜慮等現在故尊者妙音意雖述欲界第二靜慮相生之旨不許欲界第三靜慮等相生之義而彼師意若暖頂二善根唯依欲界者依第三第四靜慮入見道人欲界頂善根無間寧可起第三第四靜慮忍善根哉如彼佛及麟喻獨覺依第四靜慮一座起暖等四善根之人此事實不可得也以此道理推之彼師意暖頂二善根通依七地云事是必然也云云問尊者妙音意頂善根中自暖善根劣類可有耶答可有二義也兩方若有此類者見婆沙論文述彼師義云順決擇分有欲界繫有色界繫中下者名暖上者名頂云云如此文者頂善根中自暖善根劣之類不可有見何況世第一法中自忍善根劣之類無之見相例可同若依之爾者婆沙論六中述彼師義云暖有三品頂有六品文若爾以頂善根中下下下中二品望暖善根中下中下上二品之時可有頂善根劣暖善根勝之義哉如何答此事頗難測暫可存二義也或一義云尊者妙音意於欲界繫順決擇分善根大分二類下者名暖善根上者名頂善根故頂善根中自暖善根劣之類不可有也但於婆沙論暖有三品頂有六品之文者暖善根三品分齊之中外頂善根別有六品云也故淨影大師大乘義章十一釋云或分十八如瞿沙説前二善根名之為動就此動品別有九始從下下乃至上上此九品中暖有三品頂中有六後二善根名為不動此不動中亦有九品始從下下乃至上上此九品中忍有八品世第一法唯一上上前後合説故有十八文文意云暖善根有三品頂善根有六品合為一箇九品忍善根有八品世第一法唯有一品合為一箇九品故婆沙論六中云尊者妙音説曰暖有三品頂有六品忍有八品世第一法唯上上品者總有二箇九品為言或一義云尊者妙音意存上能兼下之旨云暖善根有三品頂善根有六品故以頂善根中下下下中二品望暖善根中下中下上二品之時可有頂善根劣暖善根勝之義也故妙樂大師釋籤三釋云瞿沙説九品上能兼下故頂有六忍有八世第一近真故不可兼多故唯上上九品既以上兼下三品亦然故暖有一乃至忍三世第一亦唯一種意亦如前文但於婆沙論下者名暖上者名頂之文者頂善根中下三品類暫攝屬暖善根以其中三品獨為頂善根暖善根分齊之外別立之故云下者名暖上者名頂也次於世第一法例難者世第一法近見道故不能兼下故無自忍善根劣之類也問尊者妙音意外暖頂二善根依欲界云義可有耶答不可有此義也兩方若有此義者廣披論疏定判未見尊者妙音之外有此義云事若依之爾者欲界具有一切功德相似法故者出婆沙論四十三定判欲界何無相似暖頂二善根哉何況見婆沙論四十二文云有作是説欲界具有三慧文此師意若許欲界有修慧者何無暖頂二善根哉答披俱舍正理婆沙雜心等論説勘光師寶師神泰圓暉等定判未見尊者妙音之外暖頂二善根依欲界云義明知無此義云事但於婆沙論欲界具有一切功德相似法故之文者就無量解脫勝處遍處等功德論之暖頂二善根是見道近眷屬殊勝善根故欲界無相似暖頂二善根也次於婆沙論有作是説欲界具有三慧之文者見次下文云欲界修所成慧者如現觀邊世俗智空空無願無相無相三摩地俱及盡智時所修欲界善根相應然極少故諸處不説欲界攝修所成功德之中不舉暖頂二善根定知此師意欲界雖有修慧無暖頂二善根云事重按此師意功德依地如正義意存之欲界攝功德之中有修所成類云也重難云見婆沙論處處之文或四十三云欲界雖無順決擇分而亦有彼相似善根文既云有相似順決擇分善根何無相似暖頂二善根哉或八十二云欲界具有一切善根相似種子乃至亦有相似滅定文若許欲界有相似滅盡定者豈無相似暖頂二善根哉問六欲天中初起中忍義可有哉答可有二義也兩方有此義者見正理論文云除增上忍世第一法餘三善根三洲初起後生天處亦續現前所除亦依天處初起文如此文者不可有此義見若依之爾者行者意樂非一準何無六欲天中初起中忍之義哉答此事頗難測暫可存二義也或一義云以道理思之起下忍畢命終生六欲天之後初起中忍之類可有也但於正理論文者增上忍世第一法同唯一剎那法故天中得道之人天中起增上忍世第一法是必然故就顯暫除增上忍世第一法也委論之者六欲天中初起中忍之類可有也或一義云正理論文既云所除亦依天處初起述唯增上忍世第一法天處初起之旨故六欲天中初起中忍之義不可有歟天中得道之人必於人中初起中忍畢命終生六欲天之後亦可起中忍歟寫本云正嘉二年九月十日未時於東大寺知足院別所草菴抄之畢去中夏晚夏之間訪明師而草按之此七月八月之後調紙筆而清書之當處論義其數依繁多此卷抄出結集為兩帖願依此微功結值遇大聖慈尊之緣願答此懇志遂往生兜率內院之望而已右筆華嚴宗末葉法印權大僧都宗性年齡五十七夏臘四十五
