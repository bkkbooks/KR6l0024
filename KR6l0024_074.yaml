body:
  text: 俱舍論第二十五卷抄問題問一道所成思法種姓阿羅漢退住學位時必退思法種姓歟問經部宗意以有漏道可證中間二果耶問經部宗意引何經説證不退阿羅漢果義耶問論中述經部宗意云故於所得現法樂住有退無退故名退不退法如是思等如理應思文光法師釋此文作三解釋爾者第二解意如何釋之耶問可有本來第六種姓類耶問喬底迦阿羅漢退法種姓人歟問經部宗意喬底迦阿羅漢六返退失者在無學位退之歟問麟喻獨覺順解脫分位可轉向餘乘耶問論中引契經説云所得不動心解脫身作證我決定説無因緣從此退文爾者不動心解脫可有受用退耶問以不動心解脫對無生智相應可有四句不同耶問如來可有未曾得功德耶問修不淨觀修持息念入聖道者俱可有退失耶問於六欲天初入聖道者必可利根耶問時解脫阿羅漢退住學位後未還得無學果前修練根作見至類可有耶問一來果聖者起欲界上上品煩惱退時必可與預流勝果道得俱起耶問有漏道證不還果聖者證阿羅漢果後唯起無色界煩惱退阿羅漢果義可有耶問無學聖者修練根無間道可通曾得道耶問婆沙論中信勝解不轉根作見至者違識身足論文見爾者違何文耶問無學聖者修練根時用九無間九解脫道有何故耶問有學練根解脫道位可修有漏法耶問光法師意相應行地修練根時可斷無知耶問以生得善可為六種姓體耶問光法師意定障根障體可通善耶問光法師所引正理論中云故學位中修練根者正為遮遣見惑所發文爾者可亘三界見惑所發無知耶問光法師所引正理論中云無學位中修練根者正為遮遣修惑所發文爾者可亘三界修惑所發無知耶問寶法師所引正理論中明無學練根云雖八解脫漸得勝根文爾者今此勝根者指後種姓根歟問光法師意於天中不修練根故如何釋之耶問斷下三無色煩惱聖者修練根時捨下三無色無漏文爾者今此人還退練根所得勝種姓時可得先所捨下三無色無漏耶問正理論意超越證不還果聖者可修練根耶問已離色染信勝解依下地修練根無間道位可修上地無漏耶問退位可得未曾得無漏道耶問有學聖者修練根時可斷未得地根障無知耶問無學位不捨未曾捨無知義可有耶問聲聞阿羅漢可有九根不同耶問雜心論意七種聲聞中可有本得不動耶問論中明隨信行聖者云離染故成七十三文爾者今此七十三人者就各別人論之歟問思法種姓聖者作俱解脫後起非想地煩惱時必可捨滅盡定耶問分離非想地染者起滅盡定後起彼煩惱退時必可退滅盡定耶問退法種姓阿羅漢果聖者不起煩惱退滅盡定義可有耶問正理論意不動法阿羅漢果聖者可退所得功德耶問用樂遲苦速二通行作所作事可亘學無學聖者耶問可有用苦遲樂速二通行作所作事類耶問欲界善心現在前位得通行義可有耶問已離色染不還果聖者起色界煩惱退時得通行義可有耶問到究竟聲聞入見道時唯可依苦通行耶問樂通行中伺相應非隨尋轉心所唯限尋歟問未知當知根及喜覺支通相應根二十二根中八根歟問婆沙論中明三十七菩提分法實體舉三師異説爾者寶法師意以何説同今論耶問寶法師意以四聖種不立覺支有何故耶問雜心論意無色界心望欲界時可有厭患對治耶問論文云有餘師説神即是定文爾者論主意可許此義耶問論文云有餘師説神即是定足謂欲等文爾者正理論意今此足謂欲等者指欲勤心觀歟問今論意八聖道支可通有漏耶問七覺支可通有漏耶問光法師意部行獨覺所得有為無漏法僧寶攝歟問論文云然所信法略有二種文爾者寶法師意以四諦如何分別總別二法耶問光法師意在家聖人所得有為無漏法僧寶攝歟問光法師意麟喻獨覺可有理和義耶問十無學支捨緣中可有得果捨耶問有宗意斷離滅三界其體可同耶
